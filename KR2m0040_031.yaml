body:
  text: 盛事七千叟宴二御製千叟宴恭依皇祖原韻抽祕無須更騁妍惟將實事紀耆筵追思陛髫垂日有之皇祖于壬寅嵗舉行千叟宴實從古未曠典維時與宴王大臣命諸皇子賜觴以示慈惠至年末及嵗之皇子皇孫並耆筵命侍立觀禮祭時年甫十二躬逢嘉會親見慶錫龍光燕譽之隆閲今乙巳凡六十四年矣訝至當軒手賜年今嵗乙巳朕御極五十年恭依屆九皇祖盛典于新正初六日冉舉千叟宴禮其有年十及一品大臣以上皆召至御筵前手賜之觴以昭一堂天恩國慶酬酢之盛君酢臣酬九重會天恩國慶萬春筵祖孫兩舉千叟宴史册饒他莫並肩重華宫茶宴廷臣及內廷翰林以千叟宴為題得近體二首茶宴重華迓新祉年年聨句鬯文風每嵗新正茶宴廷臣及內廷翰林例於重華宫之東廂拈題聨句柏梁賡已宴千叟東璧筵恆異百工今嵗新正六日於乾清宫賜千叟宴用百梁體聨句內廷翰林多年未六十者不得與宴惟賡和朕恭依皇祖千叟宴韻詩此亦照康熙壬寅內廷翰林和韻之例也飬老奚防先講學今嵗仲春上丁講學釋奠後以新建之後辟雍告成臨視在千叟宴典禮也視踈其義宛歸同兩章亦可當長律向以聨句與諸臣茶宴重華宫之東廂今嵗既以柏梁體於千叟宴中選百人聨句故今日祗以此二律命諸臣賡韻頌莫忘規體我衷纍洽重熙沐昊恩得教耆宴繼前畨三千寬以禮數肅宴為從皇祖以壬寅年舉千叟古未有之嵗余荷昊蒼純佑得嗣之多前徽重光令典耆年與宴者至三千人仁夀同登實深慶幸酬酢加之笑語溫特喜曰於朱碩老國子監司業銜郭發嶽福建人年百五嵗精力強仕不逺數千里來與是宴尤為耆臣佳話同歡五代抱元孫自思此盛何修遇戒滿惟深敬永存千叟宴聨句用柏梁體有序寅荷昊蒼眷佑之長衍之數五十仰承祖德孳培之舊豫有臣三千爰稽家法以開筵共迓天恩而益夀式舉柏梁之詠代拈茶宴之題維時啓韶嵗之舊生近中天而已盛弧明見丙夀積逢辰開旬而綸播國祥浹日則綵攢人勝屬叶禔於泰運遂布愷於乾清樂在階楹几聨墀廡衣宵食旰乃向明咨庶政之庭爵洗弓堅忽憶昨燕宗盟之會人引杖鄉以上五年差以隨肩豫多志學之齡百爾達之上齒或華連共鄂逮于班寧棘槐或水溯還鄉又作朝宗江漢老而更事外宣牧伯之臣業且傳家下臯農商之侣年躋百五四門登孔民之堂嵗賀元正一介來箕子之國仙集彭佺安羡賚優鏐杖衣裳其有一品頭街九旬頥近不辭舉手召黼座以來前惟以介眉酌瓊巵而親賜依堯文之舊韻律疊一先得岐政之新知記詮三老十體分臯陶之賡載百韻殿方朔之盛星幼緬垂髫盛觀倚膝天為一笑遲卅年始揭紀恩日敢重光遜一載方期歸政況復祥徴衍瓞孫生孫皆聖祖之孫願同體有喬松老吾老及庶人之老毋徒效雅九如之作誦庶幾共疇五福之敷言喜起明良庶事康哉我君臣其猶抑之戒黃髮鮐背耉老夀也同億兆慶如皇之時御製夀世頻開千叟筵康熙癸巳年宴壬皇祖六旬舉行萬夀筵寅年再舉千叟宴行慶錫福耆耉盈廷余時年方十二預觀十年盛典今余仰承天祐古稀有五臨御已屆五因繩清宫祖武復舉千叟宴于乾實為從古未有之盛事敬祈宸藻例依前乾隆丙寅惇敘殿柏梁體聊句宗室凡一日三人皆上行賜句又香山九老履親王允祹詩亦乞上賜上代為者臣本不工詩今敬依此例乞句晉封郡王品級貝勒臣允祈萼華忝竊領耆賢臣今年八十嵗忝于宗室中齒為最長得侍恩宴首班昨又蒙慶衍賜御書宗翰慶頥匾額皆賴聖德召禧宗牒實深榮感和碩裕親王臣廣祿恩叨湛露過滌湔臣於雍正年間曽蹈重罪蒙爵復聖恩赦出授為內大臣加封公以檮昧失察家奴生事獲咎愧懼未遑乃邀逾格倍鴻慈仍授為散秩大臣恩施淪浹感激深臣與裕親王廣祿皆夙失學猥以近支引履親王允祹之例並乞上賜句散祑大臣臣𢎞晸上逮宗支下氓編預宴諸臣宗室王貝勒現任文武大臣官員豫告大臣官員藩王覃恩受封文武官階縉紳兵丁耆農工商外公台吉回部畨部士官土舍朝鮮賀正陪臣共三千人餘各給豫銀牌視康熙年間千叟宴數逾三倍益徵福禔之厚昄章之廓舉一世而躋仁夀之域也大學士臣阿桂元氣長飬資大圓大學士臣嵇璜敷福有原斂福先大學士臣蔡新福者德之致信然大學士伯臣五彌泰天其子一曰敬天尤見皇上旦明宥路無事不敬以作所而對越昭事翼翼小心見諸詩文訓諭中者深切著明無少懈弛亦無少間斷不特為辦大學昊天宗子直與造物同體矣協士户部尚書臣梁國治嵗三大祀躬致虔每嵗冬至雩常大祀孟春展恪致祈榖孟夏親詣行禮虔五十年精誠如一太廟及日北郊亦如之王廟月壇帝社稷壇中祀文廟諸凡遇感諴德馨親祭亦親禋蠲潔墉吏部尚書臣劉禱雨告風至諴宣己卯年孚立御製禱雨告風文仁愛相通感應禮部尚書臣德保信天主人著論詮西師蕆功天主御製開惑論招揭順信人以折羣蒙申明理天者昌由頥有慶之禮部尚書臣姚承烈四言詠寶義回旋天聖祖寶以鈐世宗傳用敬勤民御書詩上敬紹闡天民心傳一例寶用回旋御製四言視聼一二二一協應之理臣刑部尚書喀寧阿二曰法祖佛仔肩本朝承上敬創制顯庸事謨烈凡超越前古成列聖已之業之緒皇上善述而神明之恭讀皇上善繼而光大之列聖未竟御製創業守成難易説昔之為守成耿光大烈皆今之任丕顯丕承以創業實一身兼其書工部尚臣金簡實録寶訓旦誦専出事上每日夙興恭覽復始而列祖實録後始事分帙環誦周而於祖宗寶訓每述以告諭天下臣民原任左都御史臣張惹溎衣冠騎射謨罔愆昔王貝勒太宗文皇帝垂諭萬世嘗制時時諭諸大臣等衣服語言悉遵舊習練騎射母效漢俗卧碑皇上敬述示子孫前猷屢降諭旨並立於箭亭鐫臣庶俾敬遵聽母忘復于之中御製全韻詩及禮器圖式序新建圜水辟雍重申祇述都統臣德保部都四蒞溯澗瀍盛京為我承堂構列祖發祥基命之地皇上敬慕篤羮牆自癸亥嵗都追法駕東巡暨甲戌戊戌癸卯陳逺展誠御製盛京賦上四蒞列部朝丕績下述器神臯土風若民察吏壇慶施恩廟山川祑祀禮罔弗修舉訓行有加無已進都統臣王泰治定紀恩堂額懸康熙壬寅春月開皇上始覲圓明園之鏤雲嗣得聖聖祖於祖於避暑山莊以萬壑松風為讀書之所來內踐祚以後無時不厪懷恩眷數十年恬外闢治定恭讀功成至嵗丙戌乃兩顔其堂曰紀仰恩御製紀恩堂記二首見之至意皇上亹繼繩篤敬覲都統臣五岱三曰覲政矢惕乾暑山皇上凡夀山臨御聼政之所如勤避莊萬靜宜園者皆有政殿蓋本殿額聖祖舊題瀛台加推廣世宗舊題園明園之也皇上更日監在兹即兩字俱仰見將軍臣三朝心法江寧萬福宵旰曽靡一日遷於未皇上宵旰勤勞雖沍寒溽暑皆明求衣五十年常如一日近起垂念三品以上大臣年逾七十者逸其凌寒早入朝勞已恤人有位咸深忭勉福州將軍臣常青詢政晝殿批行旃本馳皇上接廷臣疇咨延晷帷宫奏各省大吏驛函帳殿巡幸時閣丹毫批閲凡外吏覆奏少逾時日即夜命廷寄馳詢而於軍務賑務事關重大者問冉三到即軍宗批答莽杭州將室臣古賚引對小吏辨伯阡各省文武職官凡屬薦銓調來京者均引對録用其月選分發員辨文職下至丞尉武職下至千把亦必帶領引見見寧夏將軍公宗室臣嵩椿四曰愛民心體連記曰民以君為心君以民為體相通皇上痌瘝在抱乙夜誠求一體或能記注所不盡書豈篇什所罄述廣州將軍臣存泰賑貸萬萬司農錢皇上愛飬元元間遇水旱偏災有司入告必限者施恩賑貸積斂之區且有頻年常賑不豫月每嵗新正特頒數十恩展用普春祺又豁免各省積欠錢糧動逾百萬蹕路所經蠲免地丁錢糧十分之三凡以藏富于民俾臻殷阜直𨽻總督臣劉峩一笞一杖銖兩權勾到皇上矜慎庶獄每嵗秋審讞詞並榜親核冉三時復酌其情罪輕重無枉無縱示案由使衆共悉且有於臨期雪至指示暗中疑竇復命大臣鞠訊平反昭平時案件無不裁以大公因其自取即一笞一杖之微亦不使畸重畸輕又屢經恩赦減等法外施仁而於辦理刑名諸臣問擬失當者分别失出失入處名以昭慎重兩江總督臣劉載課雨占雲佃爾田皇上屢行率先躬耕籍田之典親舉四推天下至於東作西成甘霖時玉問夜占雲行諸三期即馳詢地方大吏並冉吟咏或稍愆申諭母許諱飾一經奏報優霑必有天和志喜志慰之作由功誠即所以感召綏豐屢慶也閩浙總督臣富勒渾行此四者超嚳顓措正皇上敕幾凝積舉凡宏綱細目施行原不可以偏詞摹繪天日而勤政愛敬四大端天為民尤法聖心所祖兹在念兹者臣等管見之下臚舉件系僅以紀李世聖德聖政之實於萬一四川總督臣傑文章之夀道德淵文章之盛本諸道德纂輯皇上貫功德以立言鴻開館局羣書皆上稟度大睿裁指示訂正具有關於世道人心典章制則經藴史法小則博物洽聞聖學崇聞矣文成化煥乎文章可得而散秩大臣公臣觀音保御詩四萬文盈千皇上載道詩為詩文極富有日新之盛集四詩自丙辰以來每十二年編為一集初千一百五十餘首二集八千四百餘首三集萬有一千七百餘首兹四集刻至癸卯九千七百餘首自甲辰未刻者又九百餘首彚之以四萬計至今文自丙辰至癸未編初集者五百餘首甲申擬編二集者幾及五百首彚之以千計有嬴自有文字以來集者中從無此巨製也散秩大臣公臣傅玉樂府五什四聲全御製用白居易新樂府題成五十章述祖德之崇隆昭繼述之兢業雖曰聲俯同之作而意義廣大足為萬世法戒又以四全韻從無按次拈吟者幾餘發詠閲三月而成一百六首上下平聲則紀我則朝發祥東土及列聖宏規上去入三聲舉唐虞迄勝國得失炯鑑進退百王據事直書而終於敬標治天命守神器三致意焉二編雖示詩教實譜散秩大臣臣富保汗流愈甫僵且顛自古能詩文者必推杜甫韓愈聖製詩文發揮道德經緯天人逈足包韓軼杜如愈之師説千里馬説及雜説內紀綱理亂一語甫之北征諸詩一經散秩闢正真可開拓萬古心胸矣大臣臣呼尼爾圖四閣四庫功告竣乾隆癸巳祕閣之藏詔求海內遺書兼發命詞臣較輯並於永樂大典內採集散編以復古籍舊規內定為四庫全書每部三萬六千册於大欽盛京源御園四避暑山莊分建又文淵庫文溯擇文文津閣藏弆各一部於四中掇精華為薈要二部部各萬二千册分貯年大內之告摛藻堂御園之味腴書室於上十二月成皆御詩皇上親加乙覽定純駁而正魯魚並多文冠首復發帑繕録三分于揚州流傳文淵閣金山南文宗閣西湖布文瀾閣庋架旨許東人士傳抄廣護軍統領臣塔永阿書畫顧陸鍾王研遊藝皇上多能天縱妙印鍾王臨池大而擘窠尋丈小而細楷蠅頭各臻極詣墨刻帖墨御書敬勝齋帖垂則墨海雪內府鐫三希堂妙軒帖重刻淳化閣帖快堂帖蘭亭八柱帖各有題識鑒别精審書學集成至拈毫點染旁涉繪事元氣在握造化為師有非顧陸之規規六法所能仿佛護軍統領臣喀木齊布勳業之夀金石鐫皇上膚功耆定依古在泮之義御製碑文立于太學如平定金川平定凖噶爾平定回部平定兩金川豐碑四勒萬世瞻仰又有戰勝攻取之地犂庭掃穴之區紀以碑銘用昭撻伐如西師勒銘伊犁勒銘格登山後勒銘伊犁勒銘葉爾齊木勒銘伊西爾庫爾淖爾兩金川則勒銘諾勒銘勒銘烏圍勒銘噶拉依照耀殊域又以戰績分繪為圖系以紀事詩章泐成西師戰圖兩金川戰圖二册以頒賜中外烏珠穆沁貝勒臣逹什衮布凖回兩部恢幅員凖噶爾布乃元之逋孽自封狼貙聖祖仁皇帝平定溯漠後羆終梗大化恩豫罷兩朝經營厥緒未竟多爾皇上御極之初兵廣示燾載乃喇嘛濟逹瓦齊篡奪相仍部衆暌擕叩關內面願見爰於天日皇上大仁大勇拯一隅而張九伐乙亥嵗出兵兩路直抵伊犁一戰而克逹瓦齊就俘嗣阿睦爾撒納潛蓄異志中途叛逃羣醜蜩螳爭應一時衆志然疑夷之睿謀獨斷宵小既就爬梳逋逃旋伏冥極凖事大定回部兩和卓木始為凖酋纍繫我勞師皇上加恩復其爵位乃敢偝德反叛重貞克敵致果回部之功既集洽薩布魯特拔逹克山愛烏罕安集延䀶都喀斯坦霍罕之屬二萬餘里皆我幅員所屆矣爾喀貝勒臣阿玉爾屯越戊巳包先零凖回兩部平定後屯政大開特命大臣分駐經理種地兵丁咸得宅宅佃田安居樂業客民四逹輻輳報墾升科動成聚落至刑徒弛罪之人皆給廬舍牛種又自哈薩克來歸之厄魯特皆入旗籍並自盛京移貧乏西𤏡察哈爾諸旗貧乏察哈爾於伊犁皆給以牛羊俾安遊牧民户日增兵響不費行之二十餘年天時順成地利墾闢各該處大臣頻年奏報大熟分數有至二十上下者都爾伯特員勒臣博第宛駒徠皂璧撈闐西極自古稱多馬之地回部既歸版圖愛烏罕部哈薩克西部烏爾根齊部啓齊玉蘇部皆各奉其地産歸我哈薩天間駿愛皇上掄其神駿錫以嘉名若克十烏罕四駁拔達山八駿皆得仰荷三四宸題而哈薩克之貿易伊犁者每匹價不過金較之內地馬價僅三之一以充屯田之用並給沿邉營伍歲以內府之縀匹充馬價物銀值平中外蒙利御製反白居易隂山道樂府皆紀實也和闐即古于闐自史記已稱産玉今回人採獻者優加賞賚用旌其勞克扎魯特公臣彭蘇土爾扈特歸順堅土爾扈特舊為凖噶爾四衛拉特之一因苦俄羅斯徵調取質挈全部來歸皇上優加撫恤分地安居就糧資牧出牧羣之息以饋之衣食使無凍餒御發帑運茶市羊及裘充其製土爾特扈歸順優恤二記紀其事貝勒恩封渥巴錫為卓里克圖汗其下親王郡王貝子台吉等有差入覲山莊倍加札薩恩禮蓋蒙古自幪國初以來先後臣服內外克允荷帡至平定凖噶爾後惟土爾扈特一部先已逺竄至是而不加征討不事招徠萬里向化是順非降所謂天與人歸不期然而然者從此蒙古諸部無尺土不入職方無一民不供僕𨽻國家福崇仁浹愜列聖締搆之成功萬皇上纘緒之廓于是而志蕆全極盛回部工臣額色音剪兩金川湯沃蝝金川居西蜀桃關徼外于雍正年間從征得授符檄與諸土司齒後金川莎羅奔郎卡與鄰畨播釁自作不靖乾隆戊辰大師進勦革面請降開網宏仁加之赦宥甫十年而郎卡即與內地之革布什咱綽斯甲布三雜谷諸土司為難逆子索諾木與小金川僧格桑狼狽為姦我窮兵皇上決䇿征之廟算既定不惜帑費不力寬以五年期於烹網魚而縶檻獸大軍抵噶喇依賊巢飛走路窮面縛乞命俘于廟社大功告成設營駐守分定屯種邉徼永寧其各土司土官土舍頭人每年分班入覲恩賚有加此次千叟宴中與凖回兩部皆有蒙根敦恩入座者克什克騰頭等台吉扎薩克臣逹爾扎制作之夀垂丹鉛制作皇上酌古準今因時損益一時萬世法程如禮樂則釐定大駕親王法駕復睿恩禮儀駕王定諸行駕鹵簿從祀追太廟賜復諸王始封位號增通厯代帝王廟位祀勝朝殉節諸臣敷諡鑑更定壇藏廟舞官朝會添設宴饗樂章增用回部畨部西勝方則江寧布政使缺各省驛傳事務歸按察司添設安西道府州縣各缺承德府屬各州縣缺兵制則添設內外武職飬亷改京城三營為五營各省坐糧名糧改挑實兵設立健鋭火器二營四川省及直𨽻密雲添設駐防兵辨工程則重修功告成壇城武成廟葺宫殿光文廟改用黃瓦武建殿紫閣又修葺各部院衙署京師內外城垣並城外各石道凡大城內外溝渠河道每年簡派大臣稽查御帑修理翰林院貢院落成書匾臨幸賜宴賦詩又修理庶常館特賜御額郭爾羅斯頭等台吉扎薩克臣阿喇布坦右壇薦璧雩升煙乾隆二十四年注無薦玉之禮上祭玉庇嘉社稷壇以儀諭以榖於答隂之義為稱飭所司用玉將事著為令啓蟄龍雩祭大禮向未舉行乾隆七年上以見日郊至雩並重大祀同巴命禮臣集議舉行與林和碩額駙臣丹津法器範古肅豆籩乾隆十三年圖著範凡上監定禮器考天地之壇廟菜之祭社切日尊月簋神豆祗鉶農爼蠶奠一爵簠籩登筐為匏為陶為銅為竹木各隨方色用將祼獻詳見皇乾禮器圖式吏部侍郎宗室臣王鼎柱鎛鐘特磬諧㲈卷乾隆己卯江西臨江府得古鎛鐘以獻上既考古定名貯之韻古堂復貢玉詔樂部仿鑄鎛鐘十二以備宫懸並以和闐琢特磬十二以儷鎛鐘以律分宫備聲振始終之節而於御製銘詞歸本於示精祖德天庥立均出度闡詳中和韶樂之奏與㲈卷比盛矣户部侍郎臣諾木親杏壇十事陳蘭櫋乾隆己丑上丁周范上詣太學壺簠釋奠前一日命出內府所藏鼎尊卣疉簋觚爵洗各一陳林大成殿前以備禮器辛卯嵗事陳東巡謁廟孔詔頒內府周笵銅器十闕里後既副習禮之觀更體從周之志禮部侍郎臣莊存與更取士制播誦弦丁丑會試始試召命于二場增五言排律八韻鄉試及朝考同之其各省學臣嵗科兩試則用五言排律六韻永為取士定制俾士子揄揚鳴盛益溥誦弦之化兵部侍郎臣瑪星阿冬賚氷嬉秋獻豜定制八旗與內府三旗簡習氷嬉之技每嵗冬令太液鏡凝分棚校閲擲綵毬設旌門懸的演射仍按等行賞義又御製氷嬉賦以旌勇均賜而歸本於觀德之每嵗秋小從上行木蘭行圍八旗之旅期門佽飛之士大公蒙古扎薩克王公台吉等率所部千二百人隨圍執役威神上親御弧矢率先騎射或用虎神鎗天技有一日殪數虎射鹿數十者蒙古王公等互進詐馬宴作什榜以侑食陳相撲及教駣之技圍畢出鹿柴門恩賞王公筵宴下逮蒙古𨽻役之屬柔逺示惠蓋依古三田之制神而明之尤為本朝大政兵部侍郎臣紀均四學聽講講圜水漣辟雍見於王制蓋昉文王靈臺武有天下遂定為天子之學先是廷臣建議請立部議以泛水而格癸卯春雍汲上命詳稽古制於太學彛倫堂前肇建辟井穿池引為圜水甲辰之冬工竣可泥親製碑文記其經始並嵗上申訓復古而不古以垂戒萬世將以今丁釋奠禮成後祖迄親臨講學以光令典北京國子監建自元世今五百餘年而辟雍之制乃備蓋者兼聖人在上制度考文德時位三之矣刑部侍郎臣穆精阿恩澤之夀浹瀛壖年中皇上德洋恩溥浹洽寰區五十如覃恩頒詔九次並準臣工貤封伯叔兄嫂與外姻尊屬其大臣之宣力者則官其子孫為廕生中書舉人加恩國初功臣録其後裔雖忠於勝朝者如袁崇煥熊廷弼子孫亦邀録用內閣該部每年恩賜飬亷至八旗紅白事件均例有旗地賞給外此如飬育兵鰥寡孤獨等錢糧及八租銀兩告退出力官兵全半俸餉京城之普濟堂每冬例外加給米三百石又於河工料例價之外準銷銀數百萬其軍需例外開支亦復數準銷數千百萬並豁免銅厰節年欠項前後十百萬其餘南暹錫豫便蕃不可縷舉即新強藩部及朝鮮安羅琉球諸國均蒙賞賚凡朝覲來京者逾格侍郎隆施無逺弗屆圖署理藩院臣薩音博爾格至三至冉漕賦蠲史册所載蠲租賜復之詔或僅及一隅或僅免其半未有普免正供者乾隆丙寅庚寅丁酉三次降糧皆旨普免各省正賦丙戌己丑兩次普免七省漕輪年停運五載而遍恩施疊溥旦古無匹臣原任兵部侍郎史奕昂截糧平糶給粥饘嵗令督撫奏報民數榖數順天府月報糧價偶遇一隅水旱愆期即勘未成災者于青黃不接時特頒恩旨截漕以裕民食平糶以減市價復厰平念京師地大物博糧價昻時發豆麥減價設糶而於無業貧民三冬艱食者每嵗五城設飯厰至春中乃罷原任兵部侍即臣蔣元益巡狩慶讓虞典篇江浙自喁喁望聖祖巡後民幸皇帝六次南皇上登極緩至十五年之久始登進法士崇秩祖肇舉時巡采風察吏宥過賚老髦祀典嗣丁丑壬午乙酉庚子甲辰凡六次禮帥如初他若者三巡河南者一巡五台者四巡山東天巡天津者一戒諸鑾輅所臨無非事者而母阿心克已時以㣥省供帳為諄諄斥騎農田弗躪備屬車者遵法度迓之曠清蹕者樂就瞻非徒紹班嶽之縟文備升中典而已原任兵部侍即臣錢士雲省河觀海勵農田河工海塘為東南民生財賦所係未歲翠華戾止訓示周詳河工如辛之增築髙堰五壩建淮安城西北石丁丑丑則于徐州北護城土堤易石壬午定清口出水志疏濬六塘下遊庚子加髙徐州城外石工改築韓家山至奎山石隄至海塘潮勢不常敕令督撫月報情形庚子頒凡三旨大興工作于老鹽倉迄西塘工改柴為石千四百九十丈甲辰復命於章家菴迤西至烏龍廟接建石工而留范公堤柴塘種樹實土以為重門保障之計皆上親臨相度田衣指示機宜不惜帑金數千百萬為小民計農食之安萬世永賴矣江西巡撫臣伊星阿行葦具邇錫冠蟬壬寅餘間上諭將宗室王公子弟帶癸恩給官頂其散家室槩給豫四品頂卯新正賚有賜宴山乾清宫臣農錫差西巡撫起特科大選矜寒氊乾隆丙辰壬申庚辰庚寅己亥皆以逄之國大慶特開恩科鄉會試猶念士久困公車者選途壅滯因于壬戍甲戌會試後閲選落卷為明通榜丙戌壬辰辛丑會試後命王大臣挑選下第舉人分别等第引度年見以七品小京官知縣教職分發補用其自衰不任民社者朝考賞給京銜有差又選拔貢生十二年一舉後分别録用如舉人例又巡狩獻賦諸生舉人召試録取中書舉人又老儒鄉試業銜恩賜會試賜檢討學正且有至司者各以年嵗為差多士沐隆甲教澤際榜昌辰皆得奮志功名歡騰寒畯乾戌科武顧鏞辛丑科文榜錢棨皆鄉會殿試三元數百年科目盛事實􅉼育於夀考作人之化湖北巡撫臣李綬黌序開上塞新邉熱河既設郡縣户口日增秀良之士蒸蒸日上向就試附近州縣取入上命於承德府建立平廟學設教授置生員府學者六名其屬灤平泉豐寧建昌赤峰朝陽六州縣各四名並舉人一名新建文廟落成上豫鄉試取中御製碑文勒石又嘉峪關外鎮西一府迪化安西二州宜禾奇台昌吉阜康綏來燉煌玉門七縣皆設學官弟子鄉試中式者為西恩許馳驛會試上塞乃前代甌庠序區西邉羌烽燧之第今户盡絃歌人皆庠序外矣廣文治光昭斯真無西巡撫臣吳坦以兹夀宇祥氣填福建提督公臣黃仕簡甲子重疊回璣璿時憲書後舊有紀年一帙自一歲逆數至六十嵗辛卯上推皇上夀逾六旬因命欽天監重周花甲至一百二十嵗普為天下增年湖北提督臣俞金鏊升平人瑞地行仙定例民間夀躋百齡者題報建坊曰升平人瑞五十年來嵗舉每以十數賜詩上於百嵗以上者加賜內府縀匹或荷竇璸賜額尤極榮寵廣東提督臣數世同居三古還民間八世同居者二家七世同居者一家九世同居者一家並建坊異之封賜詩大夫提御書額以褒振武督臣李端百九四家孫見元民間上以初得元孫非常吉瑞因十四命查有元孫者直省奏聞凡百九家元旦欵所覃恩詔內優豫賞賚為從前詔未有副都統臣台蒙阿皇備諸福為陶甄副都統臣福福古稀有五增洪延皇上七旬萬夀採杜甫詩意刻古稀天子之寶並御製古稀説謙德尊光因文示義勵慎終如始之志自庚子至今籌添已五而虔恭寅畏無時或釋所由洪延曼羡以莫不增也副都統臣圖思義紀年大衍方至川帝王享國五十年者三代前自黃帝顓頊帝嚳堯舜以下凡十二君三代後則惟漢武帝今乘五聖夀古稀有五合天臨御適屆五十年以五天數五地數五地之數而成十推而衍之至萬有一千五百二十所以撰合清寧誠徵悠久也內閣學士臣伯興五福五代歌瓞綿甲辰閏三月宫顔上喜得元孫即寧夀宫之景福曰五福五代堂且為之記以志古今稀有之瑞復上六念我世朝自太祖髙皇帝至皇世下皇元孫為十世因奉字命宗人府查賜名曰太祖長子禇英支下得𣲖二人奉福奉夀蓋自宗積慶太祖以下為十一世矣足徴我隆祖之厚尤際今聖神篤祜之內閣學士臣塔彰阿猶日孜孜心勤拳文曰上既篆孜即古稀天子之寶下方維以刻猶日孜一璽篆抑埴中而持盈保泰全神若揭趙內閣學士臣鍈旦吟逾什筆如椽每日皇上披覽章奏之暇即寄興吟咏常得十數首精敏固由典學強固具見上駟夀徵臣內住務府大臣銜上院卿討巡能攬轡獵控弦鑒其時巡所屇擁道歡迎慰就上每愛戴為却輿按轡以瞻至于丘獮行圍控弦命中不改弓燥手桑之素良由保佑自天聖夀日增而康強純健故能如此總內務府大臣銜熱河管臣永和行健自然匪拘牽恭讀辟雍謂誠御論天一日一周健也中庸所者天之道出于自然也若誠之之君子則宜自勉強自強不息大哉德聖言自道所得蓋行健有常與天合矣武原任內務府大臣銜備院卿臣西寧遂啓嘉宴集偓佺山東登州鎮總兵臣馬如麟繼述祖德典相沿行大皇上慕法典禮必令察聖祖每舉大政事康熙年間例行仰見叟宴紹庭之念千猶初志也山繼序之思兹之臣福冉行西太原鎮總兵敏泰昔惟髫侍今端綖史部五帝皆一家之胄而年代隔逺聖與聖不相及禹不詒孫湯非翼子成康聖君不能逮事文武孰若我恩顧以皇上親侍聖見聖之聖祖備承製千叟盛御宴依韻詩有曰追思侍雘之勤陛髫垂日訝至當軒手賜年松雲之慕丹撫今追昔情深文明具于十四字中臣等生晚無康熙年間入仕者不獲從殿庭班列望見聖祖穆穆之清光抑可知當日宴中千叟拜手階前遙瞻天上庸能知紫微帝座之旁垂髫侍陛之尚有之必聖人乎惟備多福聖祖之明灼知皇上能臻上理以冉舉千叟之宴故深加縱之聖顧復隱付託以神器之重惟一皇上天必得其夀冉舉千叟之宴即稱觥之賜爵之間而知繩承美均非偶然也浙江授州鎮總受之隆處兵臣明安八八六十四卦聨自皇上聖祖肇舉耆宴至重修茂典凡六十四年適符周易全卦之數武浙江衢州鎮總兵臣賈魁三千黃髮溯始鬋預宴臣民六十五嵗以上者皆生康熙年間小草纎莖尚􅉼堯露四川重慶鎮總兵臣馬鎮國親見堯舜史莫傳稽古飬老之儀無可深考若三老五更之制人數取義諸説紛如且有憑臆而害理者所御製説既斥其謬近復作老作記一篇取孟子云文王治岐三語以為三注腳以經注經實千古未發之藴若夫恩滂喜聖治來史神孫兩舉盛宴普天率土洽從册所無也總廣東左江鎮兵臣薩郎阿鳳詔初覃土牛鞭今年祥符協應當五十年正月元旦皇上御極之特頒恩詔溥錫新祺臣雲南臨元鎮總兵陳大鈸蓂開六葉風和鳶本日為正月初六日御都察院左副都史臣梁敦書法宫觚稜淑景娟大理寺卿臣富炎泰瓊筵平墄排沿緣坐席各以品級班位凡八百筵元大理寺卿臣藍應醍醐泛盎肴芳鮮詹事臣德昌韶樂清樂聲鼘鼘座詔欽定千叟宴樂歌于樂奏隆平之章于大升宴進茶清樂奏夀愷升平瑞之章於樂奏進酒清樂奏紫禁春開之章于還宫韶慶平之章之盛夀世元音允諧徴角相悅太常寺卿臣肅普通阿天章成不移漏蓮原韻御製千叟宴恭依祖德景皇祖詩一章念梁天貺彰詩國慶樹大義而觀成垂訓逺復仿柏體聨句親製發端二句遴諸臣續賡臣太僕寺卿蔣良騏敢曰唱酬恩所憐臣等質微學陋恭承矜誨恩命賡續府尹奎章語拙情真知邀順天府臣虞鳴球頭行上夀寵詎偏預宴三千人中王貝勒以下至一品大臣凡五十三人九十以上至百五嵗者凡十人以爵以齒領袖耆年尤為被杭阿恩獨厚奉宸院臣珠爾座前手爵行毋遄是日至上者上召官躋一品及年屆九十以御座前手賜巵酒用示優老引年之至意來頭等侍衛宗室臣泰八寶如意大願船宴間賜珍便蕃如意尤徵吉語禪護軍統領宗室臣希布鳩杖扶老枝連蜷預宴人參賜鳩杖一具爾護軍領宗室臣都松阿銀牌刻字文蜿蜒賜銀頒牌寺四品宗室光祿少卿臣誠連貂錦縀布豪墨箋凡豐貂文錦彩縀布湖穎徽墨松箋諸珍物皆按品學閔頒賚內閣侍讀學士臣曹睿句捧出蓬萊巔預宴御筆千叟宴詩摹印遍懸用賜諸臣盥誦之下恭捧髙以傳示子孫永戴士臣聖德熊侯補內閣侍讀學吉夢君夀如天臣彭籛江寧織造臣成善耆英林下杖履便淮關監督臣福海老農大有雲壓阡左中允臣韋謙恆工商三倍利盈㕓候補國子監司業臣王太嶽太平之象霄際泉候補國子監司業臣曺錫寶萬萬嵗坐而理焉上時以始勤終怠為戒今年猶作信天主人自針詩我不國家法度既極修明綱紀既極整飭一張一弛過隨時化裁所謂無逸者心無為者治足為飬萬萬年久安長治之謨即為忱敬萬萬嵗頥神夀之道此中外臣民祝願私于蹈德含淳之下為正臣當寧獻欽天監監喜常大書屢書弧見躔典盛既舉從此更五載焉算將八旬萬夀又五載焉臣備六十紀年無強之見大書屢書不一書員靈台謹嵗占南弧見瑞欽天監監正臣髙慎思外方安樂屆九埏下國蒙歲列聖隆施俯鑒誠順近復荷有頒東藩繩美匾額作嵗復恩逾格前御製詩章朝鮮御製古稀説文房祕寶之臣賜暢垓􅀈埏尤為首被朝鮮正使陪李徽之海有屋東朝鮮陪臣等以奉使朝正適逢語瀛巨慶馬齒及格遂忝末筵歸裔君臣備述知天朝福德之全出為恩禮之篤共知膜拜讃歎必有海屋仙籌中國聖人瑞應臣朝鮮副使陪羌世晃百有五嵗積籌駢臣以泉南下士皓首儒業遭際蒙聖時己亥次年恩科鄉試以九十九嵗觀埸賜舉人南巡迓蹕復賜進士甲辰恭逢銜國子監司業六巡江浙趨迎道左章昨恩加恩賜御製詩復想頒賚慶頤黌序芥微御書匾額皆生世百年夢乘所不到者自分末將芹獻臣今百有五嵗之以百則為萬有五百嵗全登盈數畸叶昌期願祝聖人符兹積算恩賜國子監司業銜臣郭鍾嶽御製重熙家法貽萬年我祖垂裕宗昌後燕貽保世滋大豫每事必景前猷今夀宴禮成重熙慶洽豫所以心臨保皇祖之心蒙其諦思天之福者長此虔鞏流謙惕乾我子孫曾元之以引我大清億萬年丕丕基也千叟宴畢坐重華宫得句內安外靖升平世五代一堂康健身寶籙重開千叟宴柏梁慶萃百庭臣沐天恩實今古鮮切已懼厪否泰循忍弗孜孜敇幾命勗過十載作間人八旬萬夀盛典卷三十一
