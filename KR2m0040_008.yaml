body:
  text: 欽定四庫全書八旬萬壽盛典卷第八聖德四勤德一臣等謹案管子曰人君壽以政年蓋謂君所以壽考由於勤政以順年也惟夫秉孜亹之衷而又植貞固之體斯德新而業廣焉我皇上勤修實政於今五十五年耄期不倦逺軼虞姚良由敬天法祖備全德全福於一身乃克圖治惟蘉于于其其道而成天下之化觀夫親臨晝殿俯覲羣僚延晷惜隂疇咨倍切固已萬幾就理綱舉目張底於百工熙庶事康之盛者矣伏惟膺圖既久履慶彌長聖政所頒即茅簷蔀屋身被心知皆窺見祗勤于德夙夜弗逮之本衷其最大者如省方之典屢次舉行無非兢兢非愛民體物之要務南巡一記義備闡之乃至行程周視輒費咨謀中夜馳章猶勞擘畫實為恁且密焉又若占雲盻澤厪念田功雖屈八旬而雨㿩之驗惟殷時若聖人之劬心有備至者至於承平訓諫經國有常表一人之勤以增衆志之勵耆齡神武克結必親斯又萬古勤政之極軌矣何其懋哉皇上壽登八旬每舉御門御朝大典夙興成禮平時批章引對備著精勤御製敬題勤敬殿辛丑勤敬額康熙年陳考莫知此匾為年知為何皇祖御書但莫御筆也幾間雖一豫政要切疇咨兩字楣端揭千秋家法垂山莊及御苑一例永欽兹圓明園勤敬殿為萬皇祖御筆嗣是壽山香山及避暑山莊勤政殿皆余恪遵家法一例書額御製題勤敬殿甲辰勤政為君要此言孰弗知存中外達者以久從敬之察吏安民際深居獨處時名言憶光武樂此不為疲御製題勤敬殿丙午御園及山莊殿胥勤政名是處簷額壽山皇祖御題其圖明園萬清漪園香山靜宜園及避暑山莊凡聼政之所均以勤敬名之實數典於此數典實於兹皇祖額煥楹敢不敕天命敢不念民生戒忽忽以怠勿察察為明寄言聰聽者經權在敬勤御製御門日作辛丑御門折本待綸宣例事亦為勤敬先可識安民在察吏未能去慝且求賢心怡宿雪忘寒峭眼看神雲願澤連是日復險大學士兼裏行四合豫三百六旬年豫今年七十有一而大學士英亷七十五嵗嵇璜亦七十一嵗協辦大學士尚書永貴七十六蔡薪七十五合之得三百六十八嵗本日御門閣臣領旨耆年者四人實亦國家盛事御製進宫視朝之作壬寅御殿視朝官謝恩雖云例事禮斯敦不疏不數惟時舉既雨既晴應候論麥壠改觀曉涼合栁衢含潤逺煙昏十朝前此心憂旱一雨濯之敬倍存御製閲摺丙午題章黃閣票簽呈閲摺硃批手自評每日部部又各省督撫照例題本事件俱由閣臣票簽進呈覽畢批發其各省及新疆關係緊要事件俱用奏摺封函呈進手自批閲宵旰一心奉天理飢寒萬姓念民情大都奏請恩施事無不辰聞午即行凡有關民瘼加恩之事或于奏摺批準或特降諭旨無不即日辦理不令稍稽時刻底更即頒示中外諸臣或有以刋刻上諭及硃批諭旨為請者念皇考所頒訓諭臣工之旨足以昭垂萬祀不必更頒發矣聖人垂訓久光明御製月選辛丑月選明揚對廣廷聼無聲復視無形每逢濟濟目為朗設遇庸庸志弗寧每引見選官其日若多可用材器輒為之始設多庸流輒為之不懌念其當選又無過祗於所得缺之繁簡中調用之祗量缺之殊繁簡酌移人以寓調停為君難此一端耳詩云後來聰乃聼御製月官乙巳月官依次選冢宰司其事雖殊山公啓却非滋較資屈選者材原不一致缺亦有繁簡是在量其器量器權付人又恐沸物宜缺有繁簡亦有善惡使吏部堂官量才調用即至無私而得善缺者必感得劣缺者必怨得若朕臨引見時自定則無所施其感怨此雖細事亦政要也雜職品既微亦無甚關繫縣令父母官有民人社稷叶是宜親品閲來引見有例向例月選官自州縣以上有民社之責者由吏部堂官帶至引見缺之繁簡量其人材酌豫以更調至佐雜以下等官例不引見就其缺繁簡視其材次第時有相調用或即教官置月選州縣官視其才具中平或尚堪造就者酌量調用簡缺者九卿視其才具不勝民社及年老就衰者正途出身之員量豫改用教職亦必引見後定彼或稱抱屈亦無辭以對向作改教詩率已宣其義彼相固已差弗盡心差倍叶每當月選班中多佼佼輩年力胥可用則為之滿志設遇一班中劣多優罕值其日心不快而亦乏别計是即用人苦長言申吾意臣等謹案每嵗令節慶賀及內外各官謝恩文武臚唱諸儀皇上皆御太和殿若授官進本則有御門之典至時常聼政之所均以勤政名之蓋遵皇祖貽訓又且親書無逸全篇揭各宫殿蓋日日鑒之惟欽有自來矣至夫批答封章無稽晷刻引見官吏務核真才屢幾暇摛吟昭著宵旰勤勞之本臣等謹録御製題勤敬殿詩以著其大並約舉御門視朝閲摺選官數什以槩其全蓋惟聖天子精神夙夜黽勉未遑視虞書所稱闢四門明四目達四聰者實兼備之所由作覩萬物之先而丕懋萬年之績也皇上省方觀民設教自聖壽七旬以後乾隆四十五年五巡江浙四十九年載舉六巡四十八年聖駕四詣盛京四十六年五十一年兩次巡幸五臺五十三年巡幸天津五十五年聖壽八旬巡幸山東分載年東恩賚門本巡具昭勤省乾隆四十三年十月初三日奉上諭大學士管兩江總督髙晉浙閩總督楊景素等合詞陳奏以江浙臣民望幸甚殷且河工海塘皆兾親臨指示懇請唐子春再舉南巡盛典以愜輿情一摺朕於乙酉南巡回鑾時因耆庶攀戀情殷曽許以翠華再蒞然敬念聖母皇太后春秋已髙安輿長途逺涉遂諭江浙大吏不必復以南巡為請而江鄉士庶愛戴依戀之情狀未嘗不往來於懷距今十有四年其顒望悃忱自益諄切且自前巡撫定五壩水志以為展拓清口之凖下河從此遂免水災嗣聞黃河倒漾所繫甚重因酌定挑濬陶莊引河靣諭薩載籌辦河成而清黃交滙處移逺清口不復有倒灌之患但下遊尚有停淤不可不除其流弊而一切善後事宜若非臨蒞閲視究不能悉其實在情形至浙省海塘近來潮勢漸趨北岸深為厪念亦不可不親為相度機宜今髙晉等既有此奏著照所請於乾隆四十五年正月諏吉啓鑾巡幸江浙便道親閲河工海塘所有各處行宫坐落俱就舊有規模略加葺治毋得踵事增華致滋煩費御製南巡啓蹕四疊前韻有序庚子十六章溯懷繫念莫神蒼赤之誠三千里積悃就瞻難却東南之請矧清弱黃強之久悉復南坍北漲之夙期後悔先河民事咨其大者逺矣入越人情慰彼同然於是儀舉五巡循成例而禁申靡縟至此籌開七帙罷慶典而祝謝歌謡惟是蠲漕開科俾士庶各孚所願且更賜金發帑使上下勿耗其資冀連強共紓望幸之甚而發軔正逮祈言之日韻經四疊體踵七言眷維扶鳳雲中感舂音而增悵爰此鳴鑾郊外隨里鼓以繼賡云爾高齡逺馭慮勞辛色養由來關大綸乙酉以還罷斯役乙酉南巡回鑾以聖母春秋日髙難再奉以逺涖曽諭地方大吏向後不得復有所請三年云滿舉重巡因之俞允諸臣請前嵗江南浙江督撫以兩省臣民望幸並殷合嗣申籲且言河工海塘亦必籍親臨指授遂允其情於今春舉行惟七旬慶典降旨停止仍普蠲漕糧開鄉會恩科以慰士民之願亦欲行觀夙願申憶昔回鑾攀戀衆江浙羣黎於乙酉回鑾時依戀之情極為懇切余非不擊念實不忍訂以後斯合忽忽十六年復舉巡典此日就瞻之民仍多昔日攀留之衆也即今露冕拊循民殷哉一體逸圓切小矣七旬慶典陳瞥眼嵗華過十六迎人江浙逮春戒奢崇朴例依舊撫景得詩事又新賡韻茫然失掖輦不禁把筆愴懷頻乾隆四十八年正月十五日奉上諭兩江總督薩載浙閩總督富勒渾等合嗣陳奏以江浙兩省臣民望幸情殷且河工海塘以次告竣一切善後事宜尤冀親臨指示懇請於乾隆四十九年春六舉南巡盛典以愜輿情一摺朕自庚子南巡時巡閲髙家堰石塘及徐州城外石堤巨工俱逐一親臨指示兹據奏以次告成所有一切善後事宜自應臨蒞閲視指授機宜俾河流永慶安瀾至浙省海塘前經降旨將柴塘四千二百餘丈一體改建魚鱗石塘為濱海羣黎永資捍衛令要工將竣亦不可不親為相度且自四十一年告功闕里之俊閲時已久應行展謁孔林以伸景仰今據該督撫等合詞陳奏江浙兩省耆庶望幸悃忱尤為肫切著照所請於乾隆四十九年正月諏吉啓鑾祗謁孔林巡幸江浙順道親閲河工海塘所有各處行宫坐落俱就舊有規模略加葺治毋得踵事增華致滋煩費該督撫等其善體朕意妥協辦理副朕省方問俗觀民惠至意御製南巡啓蹕五疊前韻有序甲辰時邁東南望幸俞六巡之請言觀河海省方考三載之成惟民事之大宜勤先咨樂禮體乾行之健不息遑憚舟車典數虞周途循江浙昨嵗豳豐展禮萬年仰締造之艱今兹吳會敷恩兆庶慰尊親之戴石塘鱗次潮平籌走中亹砌岸山連軌順慶安髙堰况復源探星速瀾回際二月桃花若雨㿩蹕路看三春麥浪自郊畿以遵東魯由淮海而達錢塘陸館水程戒大吏改前巡之舊人和政肅示後昆知家法之嚴軔啓首塗韻仍五疊從此詔開九十因閠餘而媚景添長佇斯里記三千值幾暇而新篇嗣詠云逰云豫豈云卒休助期霑望幸倫五載考功速虞狩庚子南巡至金甫三嵗一章時邁舉周巡海塘條石從新築庚子年南巡時以海寧柴塘究不如石塘之鞏固因命該省督撫逐殷確勘凡可以改建石塘之處一概從新改築石塘並敕江省協濟石料次第建築俾濱海羣黎永資樂利河堰並三接舊申徐州河南岸既於於丁丑壬午乙酉三次南巡時添甃石堤其北土堤則戊寅年夏命劉統勳往徐議酌均資捍衛至南岸韓家山一帶工程四百餘丈地當徐城上遊於庚子南巡時命嵇璜與薩載會勘改築新石堤即令核實採辦接築原固况值黃流初順軌益厪赤縣安安民前嵗經大學士阿桂等奏白蘭陽三堡至商邱八堡南隄外添建大堤閘引渠一百六十餘里𨗳河水入渠下注商邱歸入正河故道安流入海其黃行經行處所如山東之曹州濟寧江南之豐沛等屬從前皆不論月分常於賑恤所有各該處情形元氣是否全復尤為軫念水程陸館惟遵舊綵結燈張戒慢陳擕子更殷身示度昨允薩載等陳請諏吉六巡臨幸江浙閲河工海塘以愜輿情所有沿途行宫坐落一概依舊毋稍踵事增華並命皇子等隨往觀看沿途水陸扈從人等約束整齊迎鑾士庶欣戴至誠必如此然則可言省方問俗度若不能不如罷巡幸之舉不啻耳提面命矣觀風誠幸氣如春媚依黎庶懷仍昔懷借精神句倍新佳麗山川往擬别逾古希以罷巡頻南巡諸作最多不無秀麗江山之助兹年逾古稀意此後可不事命駕矣御製南巡記甲辰舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昧幾以無成於宜遲而速必草就以不達能合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯能體物千古不易之理也豫臨御五十年凡舉二大事一曰西師一曰南巡西師之事所為宜速而莫遲者幸賴天恩有成二十餘年強於安晏兹不絮言若夫南巡之事則所為宜遲而莫速者我皇祖六度南巡豫藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名豫藐躬瞪乎景仰述且弗能作於何有然而宜遲莫速之義則不可不明示豫意也蓋南巡之事莫大於河工而辛未丁丑兩度不過敕河臣慎守修防無多指示亦所謂遲也至於壬午始有定清口水志之諭向來河臣率皆靳折清口恐干多費工料之議洪湖盛漲則開五壩下河一帶無嵗不被偏災自壬壬卒三次南巡始定髙堰五壩水志髙一尺清口則開十丈為凖俟秋汛後洪湖水勢既定仍如常接鑲口門嗣是河臣洛守此法數十年來下河免受水患田蘆并資保護丙申改有改遷陶莊河流之為向祖清口每慮黃水倒漾康熙己卯春皇南巡親蒞河干閲視形勢命於清口迤施隔岸挑陶莊引河𨗳黃使北引河臣董安國開放過早旋復淤墊其後庚辰辛巳壬辰甲午以及雍正庚戌歷倒灌命大臣會同河臣籌勘挑辦功迄未就嗣以黃水舍開陶莊引河更無善䇿乾隆丙申諭河臣薩載詳悉履勘繪圖貼説往返指示於是年秋興工至丁酉仲春藏事開放新河大溜暢達既免黃流倒漾之虞更收清水刷沙之益因命建河神廟以答神佑詳見御製碑記庚子遂有改築浙江石塘之工浙江海塘自戴家朝迤西皆柴塘不足資鞏護庚子南巡親臨閲視因飭該督撫於老鹽倉一帶改建魚鱗石塘仍諭令存留舊有柴塘以為重門保障辛丑壬寅等年陸續採辦石料勘估建築至癸卯八月該督撫富勒渾福嵩等奏報石塘三千九百四十丈全行告竣今甲辰更有接築浙江石塘之諭浙江海塘老鹽倉一帶魚鱗石塘雖已全竣而章家庵以西為籍范公塘土隄一道衛護形勢單薄不足以資捍禦因先期傳諭該督撫詳晰籌畫採石鳩工兹甲辰南巡親臨指示不惜百餘萬帑金降旨一律接築石築俾濱海黔黎永資樂利至於髙堰之增卑易磚庚子南巡閲視髙家堰工據薩載請將三堡六堡等卑矮磚工加髙余以磚工究不若石工之經久因命毋惜帑費一律改建石工分年修甃以冀永逺鞏固徐州之接築石工並山丁丑壬午乙酉三次南巡均至徐州閲視河工形勢次第籌辦添甃石堤俱用石十七層以資築固其舊有石工三假長九百七十餘丈較之丁丑新建石堤短少二三層於庚子南巡時命嵇璜薩載會勘一律加髙十七層又自韓山至奎山一帶向止土堰兹亦一律接築石堤四百五十丈直連山腳俾濱河永保安居不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而強諍者鮮矣河工關係民命未深知而謬定之庸碌者惟遵旨而謬行之其害可勝言哉故豫之遲之又遲者以此而深懼豫之子孫自以為是而後之司河者之隨聲附和而且牟利其間也與其有聚斂之臣寧有盜臣在他事則可在河工則不可河工而牟利宣泄必不合宜修防必不堅固一有踈虞民命繫焉此而不慎可乎然而為君者一二日萬幾胥待躬親臨勘而後剔其弊日不暇給焉則應仍於敬天明理根本去求之思過半矣豫之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施惠羣臣所頌以為亟美者皆人君本分之應為所為有孚惠心勿問元吉豫嘗以此自朂也至於克己無欲以身率先千乘萬騎雖非扈蹕所能減而體大役衆俾得循法而不優民亦亟難矣斯必有以振其綱而挈其要然後可以行無事而胥得宜實聰不出敬明兩字而已故兹六度之巡擕諸皇子以來俾視豫躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此未可言南巡而西師之事更不必言矣敬告後人以明豫志乾隆四十八年六月十六日奉上諭朕於本年前往盛京恭謁祖陵業經降旨改於八月十六日啓鑾既已展期月餘則沿途預偹一切事宜甚覺裕如著傳諭卓索圖盟長喀喇沁郡王拉特那錫等等將朕經過喀喇沁圖默特一帶駐蹕尖營橋梁道路等項均著從容預備其應赴熱河之蒙古王公等毋庸於七月初間前來仍照每年進峭之例御製啓蹕往盛京之作癸卯孟月虞涉潦中秋協旅程前本擬七月十一日由山莊啓行詣盛京因日始立秋又末伏首日恐作雨泥濘因改期於八月十六日啓蹕撰辰指故里是日起巡旌初歷千峯邏今年使八溝一帶取道邉外經喀喇沁部落皆新路非癸亥甲戌所經蒙古地沿觀萬室成午前微識熟却已行營乾隆四十五年十二月十四日奉上諭朕於明年二月二十二日啓鑾巡幸五臺所有應行預備事宜各該衙門照例預備至蹕路所經已降旨止就舊有行宫略加修葺毋庸再行添建該督撫等務宜妥協辦理不得踵事增華致滋靡費以副朕省方觀民之至意御製二月二十二日啓蹕幸正定府慶落隆興寺並至五臺瞻禮有序辛丑金身隋寺重瞻相好千年琳宇臺懷已隔清涼草載啓吉適仲春下浣嵗陽更叶卒穰迎鑾正積雪才隔農慶恰符土瓜見新膏普遍省耕覩耆幼同歡舊館仍因捐費飭緍錢預賜圓成法果携來讃喜真僧命章嘉國師扈蹕行慶讃禮湧現佛輪證入明明師利彈指紀翠華四度猶感前巡含毫詠繡甸初程爰抒八韻隆興建慶落臺頂重瞻依並以草年隔恆縈一念微光隂誠迅速來往勿稽遲自辛巳巡幸五臺閲今二十年本年二月舉行社稷壇經筵典禮於二十二日啓行計來往程途不過一月是日啓春蹕行程歷帝畿恤民還逭賦察吏驗歌祈憩館禁新擕去嵗即預行降旨直𨽻山西境內蹕路所經除舊有行宫四處賞給直𨽻銀三萬兩山西銀五萬兩以資修葺毋庸損亷辦理此外總御行營不許再有添建行營按舊折對時思育物敕命謹惟幾驀憶前巡况悵非奉懿翬乾隆五十年十一月十一日奉上諭朕於明年二月十六日啓鑾前往五臺所有應行應備事宜著交各該處預偹辦理乾隆五十二年十二月十六日奉上諭朕明春巡幸天津閲視河工擇於二月十八日啓鑾所有應行事宜著各該衙門照例預偹御製仲春啓蹕巡幸天津府順閲河工之作用丁亥詩韻有序戊申指邦畿而于邁十二年典協周巡諏春仲以時乘五百里地同夏甸溯丁亥遊河肇舉津門屢記郵籖泊丙申瞻岱旋臨星紀恰周躔部軫恬瀾于海若疆臣頻奏安流厪保介于田工民事先咨近服億萬姓之輿情企踵願切就瞻百五日之佳節屆期令宣警蹕芳郊歷歷流鶯乍囀花封春水差差畫一初臨鏡淀安艫穩泛春乘天上之槎夾道歡迎目擊衢中之壤鳩笻扶跽曽陪千叟之班驂條齊驅半領元孫之隊惟蒲瞻杏望羣黎之積悃足嘉而燈舞笙歌大吏之增華豫飭逰豫非云玩物河防與穡事交縈慶惠亦曰乘時輦路共舟程同蒞數彌文於載籍寧夷刻玉之儀循例事以賡吟用叶展軨之吉爰成新什聿至首塗申嵗津門翠蹕旋閲周一紀命巡船迅哉過隙白駒日啓也行時春仲天河務田功心所切笙歌燈舞意為蠲此次巡幸天津本為臨閲河務田功恐地方大吏踵事增華偹辦燈船歌舞一切點綴轉非省方本意是以上年冬即有旨豫加申戒來結習未除者觸景拈吟此始旃乾隆五十五年東巡諭旨至御製詩分載東恩賚門本年巡臣等謹惟我皇上展義觀民順時行慶初不以髙年釋巡省之勞爰自古稀之嵗五蒞南邦閲甲辰而更舉六巡茂典所以循法祖徽先勞示度者無出御製南巡記所揭惟敬與明一至夫民事之大仰費睿籌咸霑慶澤具詳於欽定南巡盛典一書兹臣等恭輯壽編備紀十載中鑾輿屢幸而若本年八旬履健載舉東巡尤徵聖天子勤恁宅衷允綏多祐於無既者耳
