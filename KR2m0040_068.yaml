front:
  text: 欽定四庫全書八旬萬夀盛典卷六十八恩賚七本年蠲賦四
  hash: sha256:9fb5f5c15673ecf2f2907af3b7b819f5d7ea4881fa765264457fd7923b1276ca
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_068-1a, image: WYG0660/WYG0660-0807a.png}
body:
  text: 山西巡撫臣書麟謹題為恭謝天恩事據布政使鄭源璹呈據太原府知府海昌等會詳據陽曲等州縣申據紳士裴謙耆民郭天隆等呈稱欽惟我皇上仁周宇宙澤普垓埏宵旰時勤率土咸臻康阜祥和遍洽敷天共慶盈寧涵濡深浹於髓肌瞻就共欽夫雲日謙等生逄聖世居近皇都鑿井耕田久享升平之福輕徭薄賦素蒙燾育之恩茲逄八旬萬夀之昌期更際五世一堂之盛會殊恩特沛正賦全蠲統萬國而靡遺無一夫之不獲窮鄉僻壤頻邀惠澤沾濡白叟黃童咸沭湛恩汪濊家家額慶處處歡呼洵史册所稀聞實古今所罕覩履南畝而瞻北闕難名浩蕩之仁酌汾水而仰恆山莫罄髙深之頌所有歡欣蟻悃感激葵忱合具公呈伏祈轉達等情會詳到臣欽惟我皇上德邁唐虞夀同顓嚳治臻上理八紘蒙樂利之庥化洽重熙四海荷升平之福固已慶同春而賡解阜合寰宇以詠盈寧矣茲際八旬萬夀之昌期欣逢五世一堂之上瑞恩綸特沛賜租賦以全蠲闓澤鴻施按府州而輪免蒙非常之曠典羣黎咸浹髓淪肌膺逾格之深仁到處皆衢歌巷舞籌添五福嵩呼遍汾涑東西算益萬年華祝騰霍恆南北茲據呈請代謝天恩前來臣不敢壅於上聞理合恭疏具題伏乞皇上睿鑒奉旨該部知道陜西巡撫臣秦承恩謹題為恭謝天恩事據布政使福寧等詳據署西安府知府􅌢光詳稱潼關等八十八廳州縣紳士耆庶祝萬年等呈稱欽惟我皇上運符軒紀化洽堯封撫億載之璇圗恆昭乾健調四時之玊燭共樂春熙茲逢寶算初開八旬增祜遂沐鴻施普被兆姓騰歡特蠲惟正之供實荷非常之賜含哺鼓腹村村不聼追呼比櫛崇墉户户益安耕鑿萬年等欣逢盛世幸遇昌期惠心益驗有孚莫罄升恆之頌曠典羣稱逾格彌殷蹈舞之忱地本周邦願對南山而介雅民仍豳俗擬依北斗以稱觴為此合詞恭謝伏乞轉詳等情據此該廳州縣覆查輸將罔後兆民安耕鑿之常蠲貸爰施四海食諴和之福欽惟我皇上治登熙皥澤洽垓紘正德厚生世際豐亨豫大阜民足用時方纍洽重熙茲逢八秩初開長綿景算共頌一人有慶普洽殊施綏豐既遍於寰陬屢登大有惠愷彌殷於比户特賜正供百室方盈念更切於求寧求莫萬方曲逮事已逾於至再至三既按省以均沾無間廣輪之逺邇復分年而遞免兼籌嵗序之盈虛奉行勵以實心侵隱嚴夫弊竇戴德則乾坤高厚俾熾而昌祝釐而日月升恆惟仁者夀地近三峰之並峙願抒三祝輿情恩偕八水以同流益懋八旬睿笇理合詳請代題等情由各府州轉詳到司道據此該布政使福寧等會看得撫蒼黎而錫福一人膺保佑之隆沐膏澤以輸忱四海際延洪之盛欽惟我皇上仁涵動植德協苞符天健有恆治既登於熙皥日新不已嘏自懋於純常知依而晹雨疇咨敷政而寰瀛疊洽八徵作記鴻庥益集夫八旬萬福攸同睿算彌增於萬嵗海宇遍堯民之祝夙沛恩膏殿廷凝軒渚之祥更敷渥澤繄貢賦之供由惟正而蠲除之令已逾三爰因鴻慶以施仁更布鳳綸而宣愷惟邠岐之舊域多耕鑿之淳風運際升平望北闕而常抒頌禱嵗多豐樂力東畬而願效輸將茲逢恩命之巽申共慶純禧之川至鼚乎鼓軒乎舞騰歡遍逮夫茅簷昌而大夀而臧介祉益殷於黼座茲據各府州縣會詳到臣據此欽惟我皇上福備箕疇祥凝華祝湛恩汪濊登六合於春臺闓澤覃敷躋萬方於夀宇欣際五世一堂之慶恭逄八旬萬夀之辰載廣天庥特頒恩綍篤祜方俾昌俾熾萬年之寶算初開殊施逾至再至三九有之歡呼疊起遞年輪免酌劑早切於宸衷按省分沾逺邇同叨夫渥澤含哺鼓腹長瞻日月升恆擊壤歌衢共慶倉箱千萬難名帝德共切羣情臣不敢壅於上聞謹會同陜甘總督臣勒保合詞恭疏具題伏祈皇上睿鑒施行為此具題奉旨該部知道又題為欽奉上諭事據布政使福寧等詳稱三辰垂象升恆卜睿籙之長六幕同春億兆慶天禧之羡迓鴻庥於南極仁夀同躋頒鳳詔於西陲謳歌遍溢欽惟我皇上易簡同符升恆久照八埏在宥爰陳無逸於辰居庶事維熙尚凛其咨於午夜恭遇八旬萬夀欣瞻五代一堂曠古希聞於斯為盛殊恩特沛既普免夫正供愷澤重邀復盡蠲夫餘欵輸將恐後久安耕鑿之常粟秷停催益叶倉箱之慶蓄芻糧於兵馬氣奮軍門寬輸納於序庠歡騰廣厦荷自天之申命愧無地以酬恩一曲秦風喜氣遍騰於三輔千家板屋歡聲上徹乎九霄地是華封爭獻三多之祝詩傳周雅長賡百祿之純茲據各府州廳縣申請彚題恭謝天恩等情到臣欽惟我皇上惠我有孚重民惟食化神並至惟天地與同流施濟頻加即唐虞猶莫逮恭遇八旬萬夀謄黃遍布於閭閻仰惟四海一家保赤彌縈夫宵旰沛覃恩於六宇普免正供頒曠典於三秦載蠲本色飽及於騏騮駟鐡露積芻糧澤深於灞滻渭涇春回圭篳溫綸重賁愷澤閎敷屬當萬國豐年共拜自天之賜從此三時樂嵗長騰率土之歡總總林林難禁輿情之欲逹巍巍蕩蕩實知帝德之難名聼蔀屋之效衢歌喜氣溢河山百二望楓宸而申嵩祝嘉祥徵福祿京垓臣謹會同督臣勒保合詞具題恭謝天恩伏祈皇上睿鑒施行為此具題奉旨該部知道陜甘總督臣勒保謹題為遵旨議奏事欽惟我皇上大德諴民至仁育物蠲租賜復深恩疊被於埏垓錫福用敷厚澤已淪於肌髓茲以八旬萬夀之昌期洵為千載一時之盛會布恩綸而普蠲正賦俾閭閻益阜蓋藏允廷議而輪免分年使逺近齊沾湛闓此誠曠古稀聞敷天同慶之鴻施也茲準蘭州道王曽翼等呈據各府州廳縣詳據紳耆合詞呈稱竊惟帝德如萬物同歸帡覆皇仁匝地八埏共沐鴻施屢煩宵旰之勞六府夙邀平凖三錫蠲除之令萬邦久慶恬熙茲當八旬萬夀之辰重申四免正供之典鳳詔頒於黼座中外咸煦春風鶴籌集於仙瀛遐邇同逰夀宇惟甘省隆恩疊被頻年特緩輸將積欠全蠲比户咸叨愷澤茲復再邀曠典重沛溫綸審多寡為均平無偏無黨酌後先為調劑孔惠孔時百室盈寧四時樂利幸逢郅治渥被醲膏食德飲和久享生成之福橫經負耒同依仁夀之天欣逢五福之徵疇陳箕範願效三多之祝頌溢華封等情懇請轉詳恭謝天恩準此該甘肅布政使蔣兆奎等欽惟我皇上軒紀延洪堯曦久照運符乾健升恆長衍於鴻圖恩協春生敷錫遍周於寰宇遡自龍飛御宇已三蠲惟正之供今茲鳳篆念徵復重荷無疆之錫甘省逺鄰邉徼屢被恩慈去嵗全蠲積賦和風偕萬彚以昭蘇三年分免正租湛露自九天而挹注適值青陽啓籥序叶韶華早聞紫禁宣綸占符渙汗追呼不擾慶盈寧於饁婦耕夫作息皆恬裕蓋藏於茅簷蔀屋瞻蒲勸稼有年預兆於兩河擊壤興謡美利均沾於兆姓快睹十行謄詔偕黃童白叟而頌皇仁共欣萬國綏豐統玊塞金城而徵聖瑞茲據詳請到臣欽惟我皇上久道化成惠心元吉湛恩汪濊閭閻共慶盈寧愷澤覃敷遐邇咸沾樂利溯自膺圗御宇已三免惟正之供養欲給求更屢下特蠲之令固已與民藏富敷錫無疆矣茲復以八旬萬夀之昌期為千載一時之嘉會特頒巽命再布恩綸酌多寡為均平凡三嵗而周甸服準盈虛為先後使萬家悉阜蓋藏惟甘省田本中中賦非上上前者蒙蠲積欠甫經渥被醲膏今茲分免地丁復得仰邀曠典歡聲雷動躋五十餘屬之黎庶盡上春臺喜氣雲蒸紓二十八萬之帑金都盈南畝此日衢歌巷舞共欣逄有道聖人從茲膜頂焚香願長依無量夀佛臣不敢壅於上聞謹恭疏具題伏祈皇上睿鑒為此謹題奉旨該部知道陜甘總督臣勒保謹題為欽奉上諭事據甘肅蘭州道王曾翼等詳據甘肅各府廳州縣轉據紳士耆庶等合詞呈稱竊惟帝澤覃敷遍九州而錫福皇恩普被育萬物以資生欽惟我皇上仁夀延洪德猷溥遍茅簷蔀屋盡躋赤子於春臺賜復蠲租久納蒼生於在宥固已人懷樂利户盡恬熙矣茲復於八旬萬夀之昌期下三載輪免之恩詔既免腹地編氓之正賦復貸邉畨黎庶之輸將甘雨和風遍及於金城左右祥雲化日咸照於大河東西白叟黃童俱有含哺之樂青疇緑野惟聞擊壤之聲感戴難名瞻依倍切謹合詞恭謝伏乞轉詳等情據此該府州等看得鴻仁逺播溥美利於不言厚澤旁流培豐亨於有象欽惟我皇上仁恩洋溢聖德崇深甘省地丁既已按年輪免臨邉糧草復邀分别除徵得免惟正之供悉出非常之賜金城玊塞咸沾浩蕩之恩青海黃河不盡汪洋之澤感深黎庶頌切邉疆茲據合屬紳士耆庶等籲請轉詳代題謝悃前來由府州呈道移司該布政使蔣兆奎等會看得惟錫年帝乃同其丕冒惟帝育物民悉荷夫帡幪欽惟我皇上仁育八方德隆千古深恩廣被普天共慶盈寧愷澤頻施邉地尤沾優渥輪年普免既寬惟正之供積欠全蠲屢貸編氓之賦固已胥登夀宇共躋春臺矣茲復推一視之仁再下九重之詔畨民糧草悉豫蠲除屯地輸將區分徵免邉關內外喜氣雲蒸大河東西歡聲雷動澤有加而無已恩屢及而愈深從此安作息於耕耘處處年豐物阜快優遊於里閈家家鑿井耕田茲據詳請題謝等情到臣欽惟我皇上大德諴民至仁煦物湛恩汪濊閭閻共慶盈寧愷澤覃敷遐邇咸沾樂利茲者恭逢萬夀八旬之嵗特頒三年輪免之恩既已貢額都除乃復芻糧悉免上勞宸念更降綸音謂邉陲稅額地丁少而糧草較多稽節次蠲畨屯分而休養宜一人欣曠典翻同舊例重沿時計卌年疊被天恩三錫十行詔下嵩呼遍洮水東西五色綸宣華祝動蘭山南北從此崆洞麥熟羣歌錫福無疆行看都尉禾豐總是與民藏富茲據籲請題謝天恩謹恭疏具題伏祈皇上睿鑒奉旨該部知道
