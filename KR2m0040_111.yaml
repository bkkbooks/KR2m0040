body:
  text: 欽定四庫全書八旬萬壽盛典卷一百十二歌頌三十二萬夀徵闡篇謹序翰林院編修臣盧蔭溥皇上御宇之五十有五年嵗在上章奄茂恭屆八旬萬夀聖節翕祜融庥騰歡敆愷仰惟皇帝陛下誕膺昊天眷畀者厚寅承斂錫褒大澤於天下蠲丁糧開恩榜詔書所列百禮肹飭羣生澍濡二月時巡東嶽以畣靈繹自百辟卿士以及吮毫握牘之倫莫不思竭葵藿詠歌景鑠先一載廷臣駢章掔籲恭循聖祖仁皇帝茂矩編緝萬夀盛典一書得詔報可謹按聖德聖功宸章盛事分類臚載皇上敬天法祖勤政愛民揆文奮武創制顯庸五十五年實心實政桄被於薄海內外重卷貤帙猶惵罣漏臣職業文字晝夜屏營思約要摛辭恐不足揚榷萬一竊惟戴穹窿者徒藻繢日星之焴爚雲漢之昭回而不原乎於穆不已之命悉數不能罄也恭誦御製八徵耄念之寶記至哉聖言天人格應之理至矣帝王欽崇之事備矣伏惟郅治之隆莫大於雨暘時若年穀順成三靈之薈萃諸福之權輿天之詔相惟是之不假易帝之慎省惟是之不敢康皇上念兹在兹夀身壽世端本於此然而聖情虔鞏撝抑讓德於天襲盛美而不居臣不揣黭陋抒管蠡之見作為徵闡一篇推廣大聖人敬念之心與天合撰迪萬萬年無疆之慶其辭曰於赫昊乾惟德為丕應監觀祇爍以集禧降祉量視小大曰豫是庸顯徵粵若太昊皇初之首洎乎陶姚子姒以逮蒼姬功德被乎生民雖殊尤絶迹罔嫓爰兹絣躬膺夀耈受福孔明亞斯之代綜千八百餘祀紛綸百四十帝齒及耄者三君眇蘭陵與天水鄙哉其無足述蒙古開拓之辟史號英哲然艾年踐阼而統緒迄乎四葉亦未極帝者之盛懿洪惟上帝之縡貞恆昭察孴元符神契蕃釐介祓藴隆遏蓄以傒鴻運用相聖神文武之君而全與畀惟我皇上德備功穹御圜則大呼吸感通謂德大者褫茂業豐者祚隆丕眷篤棐匪日月之笇覆載之量四時之運山嶽之體則保之佑之申之之命為弗亶俾何以興百代之闕遺而錫宙合之龎鴻方今純嘏在躬宫廷五世太和曼羡滭渤沕潏寰宇敉寧民物昌阜耆氓逾期頤者千餘衆撫曾元者二百戶嘉􅓿再穗四男駢育徽章儀軌亦以時復藪琅函祕籍于府闢璧池鏡流於雍叶歌詩重敏之譜次岐邍車攻之什墜靡佚而不匡徴奚瑣而莫舉雪嶺廓􅀈金川置堠聲威憺讋日益日附臺海生畨徠於南驃甸花象底於西巴勒布效譓而首經阮光平晣昧而面陛暀暀皇皇奄邁方䇿彼甘露靈草之祥儀鳥獸角之瑞哆敶譎詭竒偉不亦恧乎且夫風聲者知自望景者遡光天不愛道時諒徴也皇自敬德徵自召也姒王觀洛受圖肇垂大法箕衍為疇明於長事事以儷行作之者匪聲以色備之者率昔鮮聞聖人作肅敬天格祖圜壇嵗三祀祼鬯必親齋精對越一日罔弗忱寶訓寶録晙晨盥讀展謁僾愾迪光祇遹臮春御筵以惇誨秋于獮以覲藩端黈垂裳雲日輝煥都哉渙汗德音肆順民心迪爾臣若震聲之警蒙恤爾氓若恫瘝之在身漕輸蠲再租賦弛四滂仁汪惠乂孰甚焉聖人之明日月炳燭不踰戶闥觀火于六宇之逖開惑行師決䇿萬舍障澥回灉㝎橅一矚洞邃古之隆替剖百家之訛讆惟哲無有覆闢門達聰聖謨洋洋日樞臣嵗疆吏時見百執事六巡南邦亦越東嶽西臺省方􅓪俗邇言罔攸伏執兩用中天下觀成一日二日萬幾靡有或間之卓邁惟思囊括垓埏蟠際極維智與年劭神運精彌蜵蜎不自逸孔思周情詩四萬文千有竒匪睿聖疇其能之是故膏液滲漉順澤也景曜昭融光治也陽氣函煦放察也萬寶􅒫嗇象成也條和畼達叶化也劉向五位司月之説轇轕悂繆安石訓若如似之辭瞀誣怠忽灼觀虔體穹貺匪若事著物告厥敷冒於下土召休去咎均雨潤日暄雷動風散之功秩發生長嬴收成安寧之序玉燭通正五十五年靡有僭忒荒衛甸邑百稔一歉機餘縑廯溢粟沴厲弭協氣塞庸能庶寀釐其府事萬靈安其亭毒以之敷文而廞熙百廢以之詰戎而大武九成以之錫惠而流泉不匱以之徠逺而占雲景從瑞圖靈寶期應紹至故愚者測委智者􅘦流聖者導源神者鑑脈惟帝時念服景命於前劼昭事於後也仰臣又聞聖人之著論也受福單厚而勤恁者敷錫繹思於疇無能去憂夫恐致福損受益圖步機示大鈞轉圜將積萬祀羕寶算熲洪翼純純常常延延與天無極豈億兆京垓所能戩摩醯𨽻首所及悉哉侯其偉哉萬夀八徵歌五章謹序翰林院編修臣程嘉謨乾隆五十五年庚戌秋八月皇上八旬萬夀慶節臣工羣進嘏詞臣恭讀御製八徵耄念之寶記悅服尋繹研求萬一臣竊考三正之説黃鍾為天正天數二十有五林鍾之衝為地正地數三十太簇寅為人正以八為數陽氣大奏地而達物是為正月之律班志所謂正月乾之九三萬物棣通太簇為人統伏羲氏所以順天地通神明類萬物之情者也又所謂三五相包而生天地之正也所謂太極運三辰五星于上元氣轉三統五行於下其於人皇極統三德五事者也由是千之則莊子所謂大椿以八千嵗為春也乘百十而四之則孔子所謂萬有一千五百二十當萬物之數者也今年皇上八旬萬夀在人統之數初周于旬而自御極以來紀年五十有五乃初協天地之數帝者如春日之方午法天祖以治臣民惟誠惟勤數十年如一日伊古聖王所能致力之處造極而有過之而日單心于古聖王不能致力之處特鐫璽文曰八徵耄念之寶臣伏念洪範曰八庶徴曰雨曰暘曰燠曰寒曰風曰時又曰休徴曰肅時雨若乂時暘若哲時燠若謀時寒若聖時風若又曰王省惟嵗欽惟我皇上龍德正中至誠無息而於天下所望於天之事適於洪範休徴為天錫自然之符皇帝奉天以肅乂哲謀聖之德天錫皇帝以時雨時暘時燠時寒時風之休何也皇帝作肅以亮天之功夙夜宥密昭事不回之心以郊以雩以祈穀凛然承帝謂於圜壇之上焉時饗太廟敬亦如之以正朝廷正百官正萬民自宫庭苑囿逮巡幸山莊宵旰時幾乾綱獨攬休徴時若之肅肅以此也皇帝作乂以理天之事河淤得淮而刷海塘用石而固江防去洲而暢治地也引見不遺於一縣朝讞不寃於一民秋獮不間于一年庶獄不略于一案治吏治民治兵也休徵時暘若之乂乂以此也皇帝作哲以熙天之載正麈角解于經辨虎渡河于史補鄉飲之奏於雅駁商聲之謬於詩審羅㬋計都之次於天考淮水黃河之源于地定三老五更之誤于漢官傳三百三十二字之石鼓文于國學天佑下民作之君師休徴時燠若之哲哲以此也皇帝作謀以敕天之幾運籌九重決勝千萬里外定準部回部平大小金川以及臨清甘肅臺灣之尅期蕆事睿算神謨燭照數計誠至而前知不逆億而先覺休徵時寒若之謀謀以此也肅乂哲謀具而聖在其中矣尚書大傳鄭注引孔子説休徴云聖者通也兼四而明皇帝作聖以體天之撰又有非肅乂哲謀所能該者水旱偏災銀米並賑則舉含生之衆而被澤者也正供四免全漕再蠲則溥天下之大而邀恩者也頒祕閣四庫之書于江浙兩省紹聖祖千叟之宴于乙巳正月則天下紳士耆老振古未有之榮遇也鑒緬甸之誠納安南王阮光平之悃叩關奉表來同京師恭慶萬壽則跂行喙息所惕然不敢自必於如天之福者也休徵時風若之聖至矣蔑以加矣皇帝之肅乂哲謀聖日以天之心為事也皇帝念雨暘燠寒風之徴日以天之事為心也皆所以奉天也皇帝以天下所望于天之事為心天以天下所望于天之事時而應之以夀萬年有道之天子臣故曰皇帝奉天以肅乂哲謀聖之德天錫皇帝以時雨時暘時燠時寒時風之休徵事有必至理有固然也竊維鄭康成以庶徴揆五行木氣為雨金氣為暘火氣為燠水氣為寒土氣為風按水火金木土為禹謨九歌之五九歌則卻缺所謂九功之德皆可歌也鄭衆以周禮大司樂職九德之歌者也臣謹本康成之説作頌五章以仰贊升平之治謹拜手稽首而獻曰辰為龍星震方是舍沛澤如春自上下下皇自敬德匪居匪康德洋恩普帝勤省方四詣陪京六巡吳越懷柔翕河典禮無闕奄觀東魯率俾析津登臺調幕屢綏兆民嵩洛臺懷會同有繹慶惠覃敷鴻龎舄奕右徴肅第一金穰叶德曰暘而暘萬民成熟于音為商道契珠囊治闡金鏡拊本引綱御門聼政六府既修三事允治無逸作所猶日孜孜稽古右文辟雍立學論著經筵牖民先覺髙岡翽羽中沚菁莪夀考作人式廣禮羅右徴乂第二平秩南訛暑以養物羣生啿啿四方無拂皇仁喣育長之養之逰于化宇夀考維祺百九四家曽元蕃衍幸際昌期聿光盛典熙朝篤慶五代一堂延釐受祜申錫無疆如日中天臚歡洽宙合萬萬人祝萬萬夀右徴哲第三猗歟睿謨久靖不庭拓地二萬新疆敉寧戊已開屯遂一尉候土爾扈特歸順恐後雁臣鱗集北漠東瀛亦有南掌獻賮傾誠重譯來朝有巴勒布懷德畏威延頸企慕凡兹廣運覆燾􅴝埏五氣順序用協冬權右徴謀第四嵗在上章日德重光介福單厚聖節迎長王會圖陳萬方來賀從律同風衢歌樂播先庚後庚五位十成京垓演䇿用溥寰瀛惟聖合天惟天佑聖八帙肇開一人有慶聖敬日躋德又日新衍籌譯範萬福駢臻右徴聖第五萬夀恭紀五言排律一百二十韻翰林院編修臣邵玉清羲畫重三啓箕疇次八陳陽純行自健徵庶念尤諄憶自乘乾始於今閲紀頻文昭兼武震德盛亦功神經緯輝三曜聲名溢八夤端居恭作肅靜御夀敦仁夙夜嚴明旦馨香格昊旻牲陳容必恪龍見節惟諲曙色迎蒼輅條風拂皂袀縣和笙籥奏鬯縮桂椒申善繼丕基纘虔維衣德紉徽稱尊太室實録課昕晨騎射前模凛衣冠祖訓循緑江蟠渺㵿白嶺鬱峮嶙水木追思逺關山展謁親報隆深僾愾法久益精純太學恢皇制淵衷服道紃瓦鋪金熀爛碣樹碧璘珣十器頒周舊三雍建璧新芹香初出水檜古復榮神御幄勞宣講儒官敬助禋鼓徴交秩秩幣獻各齗齗雅化張綱紀旁求列佩紳疊章丹管答羣吏緑籖甄威嚮書欽洛農桑圖繪豳朱紘端亥日黛耜藉元辰率作勤千畞乘時亟萬畇甌窶人共祝土葦俗殊誾蔀屋仁咸被深宫慮未泯雨晴時顧問宵旰軫吟呻既截通河漕還頒內府緡謄黃蠲賦貢保赤責宣旬湛露寧枯蘖汪波不涸鱗何須歌集雁豈復賦懸鶉皞皞安耕鑿雍雍講睦姻剛柔隨所克道路信咸遵闈試分經義鄉賓重介僎堅心松有節比禮竹生筠大造洪陶鑄羣倫乘穆忞墨題龍虎壯黃甲李桃蓁四庫搜殘簡詩家入聚珍訂訛如掃葉去穢等披榛宛曲千函出琳琅七閣輑三希名共寶八柱迹無磷鼓撰周辝賸經存嶽板真庸歌天掞藻著論聖傳薪睿學深難測宸章續未竣奎光爭敬仰鴻略復遐振清問通鞮象雄圖靖鼓錞廟堂籌密運師旅氣同瞋蔥嶺風煙息桃關戊巳填車螳殱漯博穴蟻掃澎閩纛展擒渠長蹄驅竄藪侲義征原載史威眇果如荀服化分投首懲頑衆閉狺勳看銘鼎鐸戈偃理鉏􅚙贊象光麟閣頒貂陋鹿巾共沾恩浩浩彌矢志恂恂祇以東南重頻煩嵗月巡夾車招訓氏練日問占人豹尾穿低栁雞翹踏軟塵雲油天擁蓋雨織地舒茵齊魯通門戶江淮接齒脣黃頭擎畫槳青雀下煙津常膳炊蒸玉行厨膾斫銀賜衣榮艾耋録秩起沉湮大閲鷹揚賚宏才鳯翽掄丁男霑澤普甲户效嵩均喜氣侵烏榜歡聲蕩白蘋飛潛偕暢遂冠蓋走頒斌機要隨宜授封疆取次臻龍堂恬赭嶺鳯輦度湖漘堤築雲根固潮通石壁峋鑾回黃瀆岸舟漾汛波粼祀典崇金簡豐功紀翠珉桃花新漲穩竹楗舊防因伊水隨疏瀹陶莊引泛淪宸逰工畢舉帝省利無垠每嵗木蘭獮迎涼濡水瀕風髙驅朔馬塞逺布修罠叢薄時穿虎環山亦射㕙滿開弓似月巧喻蝨如輪御箭欣連中羣材奮莫逡蕃侯叨醴酪侍從餉麚麕勞習貔貅旅詞摛鵷鷺倫裁成無棄物宥密轉洪鈞元氣浮閶闔雙丸麗柍振拂絃財共阜運掌世臻淳如保藝情洽時敷帝惠奫極惟皇所建德與福為鄰衍慶徴綿瓞延洪比大椿範開文琢璽抑奏韻諧籈懋懋幾康意安安斂錫身頭銜加碩彥漏院宴耆臣洛杜鬚眉皓香山屨杖彬熙朝人瑞集嘉節物情旻元日開黃道祥煙護紫宸條章羅典制施惠煥絲綸位育涵中外帡幪遍士民蠲糧沿户口豁稅按畦畛讞決囚從減瑕湔志獲伸貤封官誥疊遣祀使臣侁登岱觀雲日升階緬鳯麟交誠文必肅已事衆方踆祿享山川納膏敷雨露勻南弧麗丁丙西皓值庚辛增受泰元策臚歡率土濱緯稱陽壯酉詩詠日升寅桂苑林飄馥蘭觴液泛醇英韶調簡簡玊帛會莘莘交趾親輸欵朱波利用賓梯航齊萬國筐篚塞重闉和韻傳陪吏同文志醜甡漫誇來白雉屢見貢青驎吉帛琳宫曳春駒樂寺馴太和祥靉靆上瑞彩蚡蜦嘉頌羅枚馬微臣愧􅐧駰近光依朵殿分俸仰天囷葵藿同懷悃芻蕘亦備詢鴻禔延五福億萬祝恆春萬夀恭紀七言律詩一百韻翰林院編修臣陳萬全維皇建極凝蕃祉八秩宏開瑞應孚壽自天增全四得福由德政奉三無重華啓運恢綱紐元液含淳浹壤壚至健行從乾象闡庶徴念用範言敷曰明曰旦衷嚴翼時雨時暘景泰幠郅治彌綸參覆燾升平歌詠邁唐虞五朝醲化周帡宇億祀丕基紹鼎模昔溯火流烏紀赤今徴果熟鵲銜朱溟長嶽固鍾伊始電繞虹流托尚膚聖有徇齊敦敏性人歸正直蕩平途躬膺乃眷惟時憲帝謂豫懷實畀俞禮擇元辰親耒耜樂先首夏肄笙竽泰元穆穆迎長至殷薦洋洋舞吉雩四季焄蒿虔以肅一人對越慤而愈明禋不隔馨香達熙載難忘櫛沐劬儼晤羮牆披實録欽繩光烈定訏謨紀恩堂迥梠楣耀述訓碑穹騎服摹薩爾滸涯森衛尉吕梁山側耀戈殳肇稱姬籙依瀍澗長發商家奠亳姑全韻詩皆該本末陪都俗必備咨諏式瞻清廟思無射胥視崇壇敬不渝長此寅恭持夙夜幾曽劼毖間斯須呈來驛奏封連匭聽到雞籌漏滴壺澄飭官聨先刈莠慎銓司牧為求芻朝紳延晷咨機要台耉凌寒緩恪趨大計判隨年黜陟殊褒那被例攣拘鞫分枉縱尤詳讞針警風愆首辨巫薄眚懲還優廩餼微猷録豈置枅櫨職官修表權名實月令諧吟軫菀枯董勸歌宣賓蠟里畢箕情念受㕓夫上生下澤覘穜稑卑隰高原望杏蒲雨報均霑方志喜租逢儉穫便蠲逋農陳耕器還兼纎畫仿雞塒正引雛春在閭閻饒樂利化行陬澨弭雈苻庶而加富彌勤矣教以觀文益進夫嵗啓經筵崇實學家徴博士奉先儒芳徽壁契音絲竹雅範堂陳器璉瑚廣額庠升鄒魯彥拔尤賦試馬枚徒黌宫傑構興邊塞璧水圜流溯泗洙版合相臺傳藝圃楹恢祕殿列籖廚編年特筆嚴司馬輯覽公平折董狐續簡三通新竒劂羣書七閣富珣玗聚珍井井輪排綴掃葉紛紛細抹塗縹帙親搜詞散佚丹毫手抉義含糊折衷御論超千古題識宸章播九隅物向麈麋窮􅑠角川從涇渭析錙銖國書譯篆蝌侔古經館翻音貝截腴敬勝珉鐫躔炳宿蘭亭柱嵌蕚承跗鍾王翰墨拋窠臼顧陸丹青避染濡臚敘多能寧罣漏僉驚神勇詎揚鋪旌旃奕奕聨貙貐組練行行搢鏷􅣏移頓秋郊行梐肅周阹塞峪獮程紆鬃翻緑耳憑馳野箭帶于菟失負隅眼疾俄揚鷹矯矯鳴長侍哨鹿麌麌歡騰諸部庖分炙飫遍名藩酪點酥纘武惟宜嫻獵射好生原不務征誅都緣螳奮當車臂遂使㕙投匝地罦初定準夷窮廣漠繼平回部及岷瀘革梟食椹頑堪憫佩犢安屯困乃蘇沙磧勻添臺迤邐碉樓改置屋屠㢝氛銷濟泊株槯朽浪靜閩洋鼓息桴總倚宸謀先指授胥關睿斷弗踟蹰威弧耆定還藏纛武帳高懸待受俘像繪鄂褒何颯爽庸酬弓矢是彤旅鏗鏘宫徴黃神樂曼衍河山白圖秋水撈闐羅縹玉天開徠皂相宛駒乘軺肆覲恩隨輦徯后時巡望擁騶首涖吉林詹鞞琫徐由左輔厯闉闍清涼禮佛周嵩泰沂兖觀風逮越吳溜引陶莊疏瀹暢潮回龕嶺漲坍殊培隄料豈斤論秸磡石工須億計帑頓爾厮離奔竹箭自然較鞏置新蘆百川澎湃恬歸壑萬國共球肅會嵞蔀屋盈寧同厥樂郵椽靡飾戒其毋習流金鎧材爭捷委地銀牌拜用膜榮賁堂坊歆醴鬯慶行疆􅎌闢榛蕪宜蠶天氣桑垂岸近淀人煙柳映郛翠罕雲齊環甲帳雕艫帆轉卸丁沽四方臨御如旋斗六合安恬等覆盂瑶譜支綿瓜有瓞金穰戶足黍兼稌錦貂鏐杖優頒賚安羡彭佺大賜酺蝶戀神州分沆瀣繒飄窣堵現毗盧玉裁磬叶中和奏金鑄鏞開造化爐排詠鐙詞羲卦準補刊獵碣籀文俱攸芋寧夀翬飛棟多吉朝陽鳯集梧旦復旦咸歌喜起孫生孫共協祥符籥豳宛覩熙熙也罄牒難名蕩蕩乎長荷眷貽宏壽宇疊宣綸綍惠寰區鑾回闕里薰風至蹕駐仙莊廣嶺踰照宇鏡圓秋皎潔登臺牢享衆歡娛銀蟾馥揚蟠根桂瓊島波明綻蕚芙萬六椿祺贏積笇再三嶽瑞效齊呼龍陀會卓真如錫鷲嶺來參定慧珠域外名王通桂管御前優秩比金吾章身頓釋衣冠陋賡什仍陪宴樂需小部韶成迎綵仗右平景綴接銅衢旭升暘谷纒黃道星耀弧垣傍紫樞祝嘏班隨螭陛舞躋堂酒願兕觥㪺康強逢吉恭承祜曼羡延洪頌匪諛侍學微臣依禁近操觚嵗嵗賦臺楰萬夀賦恭集御製文句并序翰林院編修臣汪廷珍我大清奉昊天撫薄海兆庶五后纘承佑啓聖哲皇帝繼序斂時敷錫建中表正萬國咸寧凝命敕幾兆民攸賴自御極以後敬天法祖勤政愛民禮序樂和文經武緯省方觀民河清川翕制作侔造化穢澤洽人心茂登上理以成久安長治之業巍乎煥乎古昔帝王未有躋此崇隆者也爾乃吉祚大來介祉錫羡鐫古稀天子之寶于兹又浹旬矣兹者屆延洪之八帙寶算盈積率土稱慶臚歡祝嘏敬上無量夀羣臣例當進獻詞賦臣自愧無文無能仰喻髙深齋肅披閲聖人之言仰見義藴之淵洪炳日星而章雲漢實與典謨訓誥相輝映謹拜手稽首莊誦繹思事以類分言以條舉竊擬南山之頌敬為賦以紀之其辭曰神聖首出敷錫八埏治化翔洽謨烈丕宣兆綏洪算厥彰祥源茀祿多益京垓紀年吉語臚實祝頌闐歡祥呈合璧慶溢敷天欨愈大同亘古今而莫不仰焉皇矣上帝日監在兹信天主人夙夜是祇爰主郊禋陟降格思必躬必親唯瞻唯依不可言報奉三無私無為而不息聖人則之粵我列祖天人協應披觀實録如親聼命於薩爾滸之戰克敵制勝紀其緣起賴天耆定載涖陪都用展孝敬撫草創之鴻圖􅘦鍾祥而衍慶法祖是朂殿曰勤政紀皇祖之恩以聖繼聖一切衣冠典禮仰紹先型以昭大一統之盛修明庶政整肅官方批發奏摺纍牘連章未明求衣匪居匪康引見官吏濟濟蹌蹌察吏求賢綱舉目張課晴問雨宵旰不遑運萬宇於几席乃潛揆夫陶唐齋名敬勝兮厪肯構而勿忘茅茨土階兮豈其飾榱橑之焜煌期無逸以勤恤子卜百世之靈長總總林林唯此嘉師凡有水旱皇帝曰咨蠲逋賑恤有德孔時親載耒耜先之勞之皇風播其徽恩勤大其慈每遇重囚屢飭法司肆赦緩刑亂獄無滋用昭畫一之守率乂于民棐彞然後能兼容並育而冀百姓之恬熙禮時為大乃天之經按器譜圖必考必精儀仗輦輅著為章程行釋奠禮大昕鼓徴三雍育材遹觀厥成石鼓之文法物修明非作伊述彪炳日星功成作樂諧協六同金聲玊振元氣昭融瑞出西江既製鏄鐘琅磬鏘韻條理始終範器識年辛巳乾隆研窮律本萌柢佟筒皆主一字一音則律吕還為宫復推闡為樂問定變化之宗俾四始六義之文皆可歌詠炳焉與三代同風猶復表章經術興其德以立教荒略之區也率置郡縣立學校廣勵士風蔚有德造文治光昭日月所照作人棫朴倬為章于夀考叶右文稽古前典敬劭搜四庫之書乃下明詔分四閣以庋之於以窮道德之閫奧嘉與海內學者勤聖學而談王道叶習武木蘭是匡是飭陳我氷嬉戎兵是詰叶準夷昔強二酋背德彼􅉰不量罪深惡極師出于京二月卜吉叶闢疆二萬運資衆力粵有金川始亂為賊王旅嘽嘽羽林神䇿見幾而作指示經畫聲罪致討連戰皆克南奠臺澎奏捷頃刻緬甸之歸順也筐篚備陳庭之實叶而於安南之事復不戰而成功為遐陬圖寧謐叶圖功臣像英姿奕奕是蓋天佑我皇清以成茂績也武成九次以休以息也煌煌聖訓實紀其詳悉叶也省方問俗虞夏以來六度南巡敬仰前規御安福艫濟河涉淮駕言徂東祇謁先師天中嵩洛夀相臺懷巡覽海淀解愠􅀈財展義示度調幕登臺駢肩接踵扶杖而觀者擁佳氣於蓬萊河之來子自積石徑豫徐陶莊之土屢挑屢淤下河七州縣嵗苦沮洳關係民命城郭田廬一一履視測度河臣稟受聖謨詳議築塞令鑿引渠黃流順軌大溜直趨開示方略周於海隅盡改石工凛懷永圖濱海之民有那其居民無昏墊逺邇欣愈江鄉父老藹然親愛於山川清晏之餘訏謨大訓王言如綸悉出睿裁代天覺民講論經義不尚虛文為詩古文賦炳炳麟麟數逾千萬富有日星考訂得失詳悉宣論叶舉江淮河濟無不各得其源褒貶豫奪衮鉞照然圓頂方趾之衆語言文字之傳無不通其文解其意精研聲律之元奎章寶翰覃被海宇信乎有德者必有言也恩紀渥洽肫然慈母蠲惟正者萬千推澤敦厚樂生遂性皇之人多壽以三千餘人松蒼花茂叶肆筵設席愈敫酌斗特榜興賢揚言拜手宗室天潢之胄垂黻佩玖秀眉黃髮國之耆耉或祿成均或續賢書繄皇古以來所未有開萬年有道之長希周家卜世之久是篤昊縡之佑緯兆郁郁三代以下古稀天子才得六兹逮八十羲和增録三夀頌眉四序佇馥身體康強巖廊睟穆五世曾元一堂雍肅百穀以成四方從欲門旌人瑞支蕃五世不一而足天數諧乎挂揲藻華昌乎姬籙欣逢萬夀之期共晉九如之祝巍巍聖皇保泰持盈久而彌篤擇言鐫璽和闐良玊庶徴之八所謂致中和而天地位萬物育念兹在兹以綏後祿惟體列祖之心以為心而合億兆人之福以為福祝嘏延洪伊古之制梯航重譯慕義斯至咸來獻壽自京畿達於四裔瀛壖炎島大漠蠻陬並西藏青海等地雲集景從眉列掌示畢獻方物圖於王會且於山莊燕賚禮儀隆備合萬國之歡衡質文之紀叶譜韶韺之歌敘堂亷之誼達萬國之虔悰偉嘉徴之薈萃際重熙纍洽之盛續虞廷賡歌之義九垓布大順之休六幕蒸太和之氣金根兆祉弧南表瑞鳯翽麟逰雲蒸霞蔚臚歡訖於鴻濛狄光含其愷悌九有輸誠百福備致小大稽首唯曰欲至于萬世八旬萬壽盛典卷一百十二
