front:
  text: 欽定四庫全書八旬萬夀盛典卷五十三
  hash: sha256:cbcef2ba0b134a677bdea1d8639ec4d7519aeb19ad7b607b01c1bdbf7c3f4c15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_053-1a, image: WYG0660/WYG0660-0621a.png}
body:
  text: 典禮四朝會臣等謹按大朝受賀制起漢初其曰尊卑以次上夀曰上殿稱萬嵗云者皆尋常頌美之詞而非實遇誕辰率公卿庶僚百蠻朝貢之屬修稱祝之禮也洪惟我皇上八旬慶節位正當陽被四表之榮光肇億齡之亨會于時禮官詳稽令典請於正夀之日御殿受朝俾展嵩呼之悃猗歟盛哉臣等仰惟聖天子健合乾元洪延寶算以精神之康豫勤臨涖於九重凡預班聫莫不以得瞻睟穆天顔交慶幸於拜手稽首之際茲者常朝諸臣肅恭在列舊藩𨽻屬畢集彤墀逺至炎陬之長欣奉冠裳域外之愚亦嫻拜跽為從來朝會所未有蓋元正冬至暨萬夀三大節嵗有常儀而若茲之大耋膺釐敷天慶會表進萬年之頌班臚九拜之歡濟濟翔翔同聲效祝其所以奉光華而稱曼羡者又從來獻夀之典所未聞焉謹詳著於編以彰洽愷垂鴻之茂軌云爾乾隆五十五年七月十五日禮臣以萬夀八旬正誕請於聖誕日御殿受朝賀詔從之禮部謹題為萬夀聖節舉行慶典事臣等伏查定例皇上萬夀大慶聖節前期一日遣官祇告天地宗廟社稷至日御殿受賀等語欽惟我皇上幬載同符升恆久照馨香上格久孚眷顧之心保佑重申彌擴延洪之祚兼全五福驗五代之一堂密念八徵躋八旬之萬夀六陽行健長斡運乎天樞萬彚熙春咸會歸乎皇極鵷班鷺序共申祝嘏之忱壤叟衢童亦進延年之頌况軒夔之奮武七德昭宣兼舜羽之敷文四方和會南風入律新添驃國之音北闕稱觥併有鳶封之長蓋康強逢吉實自古所未聞即荒憬歸心亦於今為獨盛人天悅豫既溥洽其歡心禮樂休明宜宏昭夫慶典臣等詳稽舊制敬舉隆儀仿效祝於堯封擬升歌於周雅同伸忱悃增聖主之鴻禧待付編摩繪熙朝之盛事度分三百六十願同天運以常周年逾一萬八千冀比人皇而更益謹照例恭請於萬夀聖節前一日遣官祗告天地太廟後殿社稷奉先殿其奏請遣官由太常寺內務府具奏應辦事宜交各衙門敬謹辦理至日恭請皇上御禮服升太和殿受諸王內外臣工拜表行慶賀禮恭候命下臣部行文各衙門遵行所有應進儀注臣部屆期具奏臣等未敢擅便謹題奉旨依議照例行禮八月十三日皇上御太和殿升座王以下文武百官暨蒙古回部安南國王朝鮮安南南掌緬甸等國使臣金川土司臺灣生畨等恭進萬夀賀表行慶賀禮是日早鑾儀衛預陳皇上法駕鹵簿於太和殿前陳步輦於太和門外陳五輅於午門外陳馴象於五輅之南陳仗馬於丹墀中道之左右俱東西相向樂部和聲署設中和韶樂於太和殿簷下兩旁設丹陛大樂於太和門內兩旁俱北向禮部鴻臚寺官預設表案一於太和殿內東旁禮部司官捧王以下文武各官所進慶賀萬夀表文安置於殿內東旁黃案上鴻臚寺官引和碩親王安南國王以下入八分公以上在丹墀上文武各官在丹墀內各照品級按翼排立朝鮮安南南掌緬甸使臣等列於丹墀西班百官之末禮部堂官奏請皇上具禮服乘輿出宫午門鳴鐘鼓禮部堂官前引至保和殿後降輿皇上御中和殿升座內大臣侍衛內閣翰林院詹事府起居注衙門禮部樂部都察院理藩院鴻臚寺執事大臣官員由鴻臚寺官引進排班不贊行三跪九叩禮禮成禮部堂官前引皇上御太和殿中和韶樂作奏乾平之章皇上升座樂止鑾儀衛官贊鳴鞭階下三鳴鞭鳴贊官贊排班丹陛大樂作奏慶平之章鴻臚寺官引諸王文武各官暨朝鮮安南南掌緬甸使臣等排立鳴贊官贊進贊跪王以下衆官暨朝鮮安南南掌緬甸使臣等皆進跪贊宣表宣表官從黃案上捧表至殿簷下正中跪大學士二員左右跪展表樂止宣表官宣表畢捧表興樂作宣表官捧表仍安置黃案上退鳴贊官贊叩興王以下百官暨朝鮮安南南掌緬甸使臣等行三跪九叩禮鳴贊官贊退王以下百官暨朝鮮安南南掌緬甸使臣等俱復原位立樂止王以下入八分公以上並滿漢大學士進殿列班行一跪一叩禮坐皇上進茶王以下官員各於坐次跪行一叩禮茶畢仍就坐侍衛進前分賜殿內列坐之王公大臣官員等茶各就坐次行一叩禮飲畢復行一叩禮鑾儀衛官贊鳴鞭王以下文武百官暨朝鮮安南南掌緬甸使臣等俱起立階下三鳴鞭中和韶樂作奏泰平之章皇上還宫樂止王以下文武百官暨朝鮮安南南掌緬甸使臣等俱出內監預設中和韶樂於乾清宫簷下設丹陛大樂於乾清門內俱北向俟皇上還宫內監奏請皇上御內殿中和韶樂作奏乾平之章皇上升座樂止內監奏請妃嬪於皇上前行六肅三跪三拜禮丹陛大樂作奏雍平之章禮成妃嬪俱退樂止內監奏禮成中和韶樂作奏泰平之章皇上起座樂止內監奏請妃嬪還宫皇子皇孫皇曽孫皇元孫等詣皇上前行三跪九叩禮禮成和碩睿親王臣淳頴等諸王貝勒文武官員臣等誠歡誠忭稽首頓首上賀伏以皇統斟元運璿璣而協瑞帝圗表正開閶闔以迎庥聰明睿智足有臨體中庸至誠之道康強逢吉錫之福備洪範嚮用之徴慶洽人天歡騰朝寧欽惟皇帝陛下保合太和緝熙純嘏積萬億年之甲子算衍蓂階萃千百國之車書珍羅菉幣北辰建極紫微髙拱以居中南面當陽丹扆端臨而在上睿謨綜文經武緯軼唐虞夏商周之隆泰運協時和嵗豐順雨暘燠寒風之序仰承天地祖宗之篤眷保右命申俯順子孫臣庶之臚歡尊親戴備開八旬之寶籙檢龍編鳳籀所未書捧萬嵗之瑶觴聨鷺序鵷班而有喜雲凝黼座欣列侍以鏘洋日映珠庭共承顔於睟穆凡皆本健行之德符嘉會於乾元是用依久照之光叶升恆於天保臣等躬趨九陛慶溢三呼頌福祿之來崇欽儀璘之丕冒伏願玉燭常調金甌鞏固太平有象合東西南朔而上春臺景祚無疆衍億兆京垓而稱嵩祝臣等無任瞻天仰聖歡忭之至謹奉表稱賀以聞詔定慶節衣蟒袍補服日期禮部謹奏為奏聞請旨事臣等伏查每年恭遇萬夀大慶聖節此一月內王公百官應衣蟒袍補服其前後各三日內常朝處仍衣朝服均前期具奏請旨通行遵照本年八月十三日恭遇皇上八旬萬夀聖節普天同慶率土騰歡凡中外大小諸臣躬逢盛典抃慶嵩呼應請照定例於八月初一日起衣蟒袍補服一月其常朝仍衣朝服之處亦照例遵行理合敬謹具奏伏候諭旨通行遵照為此奏聞請旨奉旨萬夀慶節所有王公百官應穿蟒𫀆補服著於八月初一日起至二十一日旨諭安南國王阮光平仍以該國衣冠行朝賀禮御製安南國王阮光平乞遵天朝衣冠嘉允其請並詩賜之庚戌丹誠萬里近瞻依惇史全無寧渠去聲稀不肯有更頒鳳詔却欣無意乞鶯衣阮光平來山莊瞻覲最為恭謹豫亦甚憐之彼且感恩籲請遵從天朝衣冠益嘉其誠悃因賜紅寶石頂三眼翎黃褂以示優寵然豫前此未肯有旨令其更易本國服飾也清涼取適嘉應允典禮如常慎莫違今春加恩已賜阮光平黃鞓玉帶兹既懇遵天朝衣冠于山莊筵宴之日並即令依皇子所用金黃色蟒袍四團龍褂賜之至進京朝賀之日典禮所闕仍命用該國衣冠以昭體制且念該國王係一國之主彼國臣民所具瞻若欲剃髮竟更彼國服飾轉非豫意所嘉悅因令詳悉宣諭以示恩禮兼至詎曰一家覃父子各外藩蒙古王公貝勒等今皆為豫子孫輩君臣恩誼不啻家人父子前阮光平奏請表文有君為父為師之語伊具有天良肫誠所發豫亦不忍外之也海邦奕葉永禎禨臣和珅等謹奏竊照安南國王阮光平欽奉恩旨賞給紅寶石帽頂三眼翎黃褂並賞用金黃色蟒袍四團龍補服俱即遵旨頒賞該國王伏地叩頭歡感祗領並將臣等面奉諭旨今於進京朝賀之日仍用該國衣冠不必竟行更易服飾詳悉宣示該國王向臣等跪稱屢蒙皇上如天之恩事事俯察愚誠特加優寵今既獲邀被服之榮復許于慶賀之期備列朝班仍從本俗惟有恪遵恩訓仰體聖慈俟進京之日仍用下國衣冠隨同朝賀理合據情轉奏謹奏候補候選及原任人員詔準於午門外行禮禮部謹奏為奏聞請旨事伏查乾隆三十五年四十五年恭逢皇上萬夀聖節據候補候選及原任人員等呈請隨班慶祝俱經臣部奏請在午門外排班行禮奉旨允行欽遵在案本年恭遇皇上八旬萬夀聖節所有候補候選及原任人員皆情殷叩祝可否照前兩次慶祝之例仍令在午門外分班行禮理合奏聞請旨如蒙俞允臣部轉行劄知鴻臚寺官員帶領以昭整肅為此奏請奉旨知道了臣等伏覩是年自元旦御太和殿頒綸賜宴萬方朝會咸祝聖之維殷然猶曰賀首祚之恆儀未足以罄廷陛臚句之盛洎乎山莊舉典稱慶攸同覲來朝之外吏榮畫接而兼洽對揚諭賜服之新藩入朝班則仍昭體制隆禮所在恩意彌周有交慶於靡已者敬惟我皇上每嵗介夀之期皆值駐輦灤京諸臣未獲同時綴班共申蹈舞今恭遇受賀臨朝星拱辰會萃衣冠於萬國列鵷鷺以成行一時黼芾輝煌雍容晉祝而自午門以外遙瞻叩拜者又復踵接肩摩歡愈成禮斯成千古典章之極盛遭遇之至榮者哉八旬萬壽盛典卷五十三
