body:
  text: 欽定四庫全書八旬萬夀盛典卷二十四聖功七附載平定甘肅回臣等欽惟我皇上仁化覃敷內輯編氓外拓疆土凡所以宣揚於鑠者皆本天錫之智勇從無佳兵黷武之為至于不得已而用則古所稱應兵由乎道德齊禮教令或有弗從是用炳斷幾先紓有嘉獲匪之䇿不威不懲義在是耳甘省畨回雜處與內地民人同庇光天化日安居聚族者有年乃乾隆四十六年遽值撒拉爾回匪肆擾四十九年復糾其餘孽梗化滋萌此實潢池小醜原未足重煩九重霄旰之勞乃蒙我皇上軫念邉隅親籌謀略簡重臣馳徑旅擒渠掃穴先後蕩平既製論著遲速之機為用兵者之所必慎復發明聖經哀矜勿喜之義以示一視同仁之本𠂻臣等欽懷聖意謂置其事于弗薌而即小以見大惟不以天寵自矜乃以荷鴻釐而多貺十年中聖武維揚赫怒篤此其一也謹約著其要次于平定臺灣之後蓋以事之大小為序至奏記之繁則不贅敘云乾隆四十六年三月命大學士公臣阿桂尚書臣和珅等統兵勦捕甘肅蘭州回匪六月馘獲首逆蘇四十三餘黨以次平之乾隆四十六年三月二十九日奉上諭據勒爾謹奏蘭州撒拉爾回匪蘇四十三等搶據河州城勒爾謹因兵力尚少現在屯兵狄道州俟各路營兵調齊即行進剿等語現已傳諭西安提督馬彪帶兵二千名迅速前往並諭西安將軍伍彌泰寧夏將軍莽古賚各選集兵一千名預偹倘須調用即令前往協同勦捕並于火器健鋭兩營兵丁內挑選預偹阿桂此時查辦河務已將次就緒著即速起程來京倘有必須徑旅之處阿桂即可帶兵前往著將前降各諭旨及勒爾謹仁和奏到各摺一併抄寄閲看四月初一日奉上諭本日畢沅奏逆回進逼蘭州焚燒關廂省城眼前失事已飛札文綬等調兵會勦復札富勒渾雅德調河南山西兵前赴西安聽調並懇迅發京兵熟悉軍務大臣帶領前往等語昨已傳諭阿桂令其即由河南星赴甘肅今逆回如此猖獗阿桂應迅速遄行現派尚書和珅額駙拉旺多爾濟領侍衛內大臣海蘭察護軍統領額森特馳驛前往甘肅並派巴圗魯侍衛帶健鋭營兵二千名火器營兵二千名即日分起迅速前往如和珅等先到甘省即行調遣辦理俟阿桂到彼即交阿桂接辦和珅仍即回京供職御製確信辛丑彌月繾蘭州確信披驛至河州雖已復蘭州解嚴未撒拉爾畨回肆逆一案自三月三十日奏到以來厪念昨四月初六日據勒爾謹奏已克復河州省城圍解并有半月成功之語意謂事可速蕆乃今已及彌月直待大學士阿桂尚書和珅先後到蘭州奏明實在情形披閲始覺明晰然得信已遲致誤事機實堪憤悶莊涼兵初集賊暫向山避勒爾謹奏甘肅提督仁和涼州總兵德寧等帶兵赴蘭州協勦奮勇殺賊圗欽保復手刃數賊將賊衆擊退逃竄入華林山時來竄焚擾城門原尚閉四月草九日據阿桂和珅奏伊等未到之先蘭州西南關外一帶通賊處所賊人竟敢往來彺意搶劫民間牲畜口食并于燒剩民房內藏匿乘間放火又于黑夜不過數人潛至城下騷擾而守城兵丁虛張聲勢施行鎗炮徹夜張皇和珅到彼始嚴飭禁止并搜捕殺賊數人又各路所調之兵零星散處不俟力齊催令打仗以致間有傷亡士氣不振現在阿桂等申明軍律激勵戎行并安設卡柵彼此接應又于山間札一大營照料各卡俾賊知大兵逼近不敢不晝夜防守民心亦漸安貼等語如此辦理始漸有就緒覽奏略慰知賊渠將不日就擒矣勒爾謹誑奏謂半月功遂因命所發兵中途回以暨前勒爾謹奏現在所調各路官兵先後到蘭惟有公同啇酌四路擒勦並分派漢土官兵分途前往預偹擒拏半月可以成功等語阿桂于途中聞此信遂令頭起領兵之人不必前往候旨而回奏到因將所發健鋭火起營京兵撤回其前調川兵及阿桂山兵亦經勒爾謹咨撤庸臣輕舉敗事未見靣目頓止援兵以致遲誤實為可恨設無此奏京兵及川兵阿拉山兵均早抵蘭州可以一鼓擒滅兹阿桂和珅復奏請選調川省曾經出師之屯練兵一千名阿拉山兵七百名兼程赴蘭協同勦捕此亦無聊之計雖現在軍容整頓壁壘一新奏功指日可期而前此舉碁屢易貽誤已多言之徒增慚恚耳和珅及阿桂先後到次第乃據實情報庸臣敗國事我兵初到蘭衆力未齊備率即驅之戰而又乏董帥一二致傷亡遂乃餒士氣緑旗兵本怯聞戰先驚悸設京兵弗回此時將逮至舉碁屢易著兵法之所忌二臣謂阿桂和珅調川兵是亦無聊計申律勵戎行鼓旗重新示僨轅雖抵罪貽悮已不啻功雖指日蕆旰食徒增恚庸臣誰所用自責志吾愧御製阿桂奏報撲殱賊營已誅賊首蘇四十三詩以志事辛丑畨回滋事信竒談嘯合千人死守甘邪教縱能令志固元戎原是用兵諳前以撒拉爾畨回蘇四十三肆逆官兵圍之於華林山而賊衆甘為死守阿佳節次奏報調派官兵安設木卡斷絶水道諸務辦理皆合機宜填壕撲柵羣心奮斷水焚糧衆力戡乃得一朝破巢險猶然數百冒鋒酣六月草一日巳刻據阿桂等奏到于本月十五日令海蘭察明亮率同領隊大員并侍衛章京等帶領官兵屯練降畨及阿拉山兵先在卡邉埋伏相機進攻乘密雨時出賊人不意將枝捆土袋拋填賊人所掘壕溝我兵奮勇直進哈當阿帶領川省降畨首先躍入壕內與賊匪攪殺官兵拋擲火彈乘勢擁進勦殺賊衆占得賊卡賊壕俱經折毁填塞海蘭察明亮督率官兵逺則鎗箭齊發近則短兵相接各路官兵咸懷振奮分占墈上賊卡海蘭察明亮又拏立木柵帶兵直撲賊營痛加剿殺拋射火箭火彈燒毁帳房板屋奪獲賊人刀矛鳥鎗無算餘賊竄回華林寺死守呈驗割得賊首一百二十餘顆隨令前此擒獲監禁之賊黨家屬逐一辦認據認出首逆蘇四十三韓一提把拉周阿渾即張懷德馬黑提卜等首級確鑿無疑并據投出老教杜山别等供稱賊人被殺死并帶傷者三百餘人所存殘敗賊黨尚有二百餘人遁入華林寺不敢復出現令官兵四靣圍緊架炮轟擊數日之內即可勦戮淨盡等語因明降諭旨將首先奮勇出力之海蘭察明亮并哈當阿交部從優議敘其餘在事出力員辨及受傷陳亡官兵查明分别議敘優恤降畨等槩行賞給一月錢糧以示奬勵并令阿桂將蘇四十三首級傳諭各省梟示俾回民共知警戒異哉狠戾撒拉爾馘矣倡狂四十三不屑紅旗飛報捷但云蕆事更云慙御製阿桂奏報淨勦畨回信至詩以志事辛丑賊首雖斬陳餘黨十遺四乃竟弗出降死守華林寺釡􅔄困仍鬪延草日弗潰邪教固人心亦誠大竒事築柵近逼之火攻下策試縱拚命跳跟圍戮無噍類勦回績斯蕆飛章馳信至賊首蘇四十三先于六月十五日經阿桂令海蘭察明亮等督率官兵直入賊壕勦殺賊衆割取首逆蘇四十三等首級其餘黨四百餘人尚死守華林寺思欲乘隙突圍竄逸兹阿桂奏報于七月初六日海蘭察明亮率同侍衛官兵等由華林寺撲入重重圍裹拋擲火彈鎗箭齊發短兵砍殺生擒賊六十七名割取首級四百五十寺內躲藏餘賊殱戮無遺不致一名漏網等語因思一月前賊或紛迸避爾時圍未周使賊于一月前未立木柵時衝突而逃追捕正自費力每召見軍機大臣等豫諭及此然賊衆自蘭州被官兵擊退後即死守華林寺俾我兵得拏柵環攻盡數勦殺不留遺孽實感上蒼恩賜也鳥散艱羅致知不足為患當更延久滯負嵎待盡殱誠感天所賜然世有逆民即為君德纍教化所未孚言及惟抱愧乾隆四十九年五月命大學士公臣阿桂會同尚書授陜甘總督臣福康安等統兵勦捕甘肅石峯堡回匪是月首逆田五伏誅餘黨悉平乾隆四十九年五月二十日奉上諭甘省逆回滋事未能迅速勦滅已派福康安帶領巴圖魯侍衛章京等前往勦辦著再派阿桂帶領侍衛章京并京兵一千名分作五起阿桂先帶領頭起由驛起程從河南一路行走前往其隨帶軍機處司員並著一體馳驛又奉上諭現令阿桂前往甘肅會同福康安辦理勦賊事宜所有福康安佩帶之欽差大臣關防即可令阿桂作為將軍印信福康安海蘭察五岱等並為參贊大臣協同經畫至屆期進勦時賊匪內有應誅戮者即行誅戮若俘獲賊首要犯酌㨂數名派委幹練官兵護送迅速解赴熱河務飭該解員等沿途小心防護毋稍疏縱並於起解時飛咨所過省分督撫嚴飭地方文武員辨按站派兵協同護解御製陜甘總督福康安奏勦洗隆德􅔄店山梁賊匪詩以志事甲辰狂回倡新教潢池煽孽氛緑旗兵多懦是用遣重臣巴圖魯侍衛速領掃邉塵甘省逆回田五等倡興新教糾衆滋擾自四月十五日起事至今兩月該督提等雖屢經殺賊并殱斃賊目田五等而總督李侍堯不早赴軍營督剿提督剛塔不嚴籌邀截又緑營兵丁懦怯無能致賊匪於馬家堡馬營街兩次翻山逃竄復得糾黨肆出于隆德靜寧伏羌之􅔄店鹿鹿山石峯堡等處勾結搶掠因命尚書福康安與領侍衛內大臣海蘭察率領巴圗魯侍衛等帶領西安旗兵及􅊾調寧夏阿拉山等處官兵進勦并即命福康安為陕甘總督督兵勦賊次第發京兵健鋭火器軍統之以宿將威名天下聞福康安既啓兵行復先後命大學士阿桂尚書復興帶領健鋭火器營徑旅二千名分隊前進以期迅掃賊氛雖彼小么麼何足稱敵人肆掠其罪重迅靖期安民福康安先至旗鼓乃一新兹福康安已于六月初七日先抵隆德軍營即命傳旨將李侍堯革職戴罪軍前效力剛塔革職拿問整頓兵力定期進勦軍威壯盛壁壘一新逆賊懾喪膽巢穴保死頻石峯厥巢穴􅔄店為户門恃此為守禦蟻聚更蜂屯四路直攻進逆賊分竄至伏羌城外即據五岱等殱戮三百餘名又據傅玉奏於鹿鹿山殺賊六七十名而􅔄店及潘隴等山梁均劄有賊營為賊人門户其巢穴及潘隴等堡先是屢經傳諭福康安先洗隆德􅔄店等處之賊冉以次搗石峯堡賊巢茲據福康安奏于十一日丑刻挑選奮勇辨兵三四千名分為四路令涼州鎮總兵蘇靈參領阿滿泰帶固原涼川兵由正路進攻總兵策卜坦三品職銜法靈阿巴圗魯章京等帶延緌肅州寧夏兵為一路攻其左巴圗魯參領巴逹瑪副將和倫帶撒拉爾舊教回兵為一路攻其右阿拉山公多爾濟色布騰帶兵為一路攻其傍海蘭察帶領巴圗魯侍衛等在各路誘賊勦殺復令侍衛台斐音阿福寧領兵往來邀截併分兵於後聫絡放卡又旺沁班巴爾帶寧夏滿兵阿拉山兵在大兵後策應莽古賚催儧進勦官兵乾糧並火藥鉛彈并知會五岱同日進攻福康安仍帶領巴圗魯侍衛督催各路指示攻勦禨宜一可當百羣大輮與大膊辰戰至酉申賊衆乃大敗逃竄迸紛紛營卡奪十餘山梁據以陳官兵分作四路前進合力截殺至辰刻會齊士氣振奮鎗箭齊發拜唐阿薩克丹布鎗斃騎馬賊目一人官兵等奮勇追擊殺死賊人二百餘名生擒賊三十餘名奪得賊人所占山梁賊營四座賊卡十餘處器械帳房牛羊糧食無數海蘭察等追趕敗竄餘賊又殺死一百餘名是日官兵即于所得賊營屯劄并于左右山梁放卡駐守搜捕餘賊以清糧道即統兵進攻石峯堡直搗賊巢此次福康安海蘭察等帶領官兵初次進勦即能迅速掃清􅔄店賊匪可嘉之至因各賞給大小荷包并命查明出力員辨分晰具奏交部議敘將進攻石峯指日捷音臻御製大學士阿桂陜甘總督福康安奏殱擒石峯堡賊回淨盡志事三十韻甲辰邪回倡新教略經數年矣厥有馬明心回民倡禍始僧之一炷香道之五斗米本因斂貨賄遂至兵戈起明心被人訐拘繫囹圄裡而蘇四十三竟敢欲救彼彼實撒拉爾畨回而已耳辛丑三月蘭州撒拉爾畨回蘇四十三等因救馬明心殺官拒捕占據河州城旋竄省城外之華林山命大學士阿桂等往勦首逆蘇四十三于六月十五日授首至七月初六餘黨殱除悉盡詳見辛丑年志事詩興兵旋勦除謂其類盡已赦過李侍堯實資能經理明練夙著名孰謂僨轅是偷安一切怠養癰近尺咫辛丑年蘇四十三滋事時李侍堯獲罪繫獄因其平素尚明練曉事加恩赦宥復用為陜甘總督賁以經理善後事宜詎李侍堯姑息養癰致邪教回民田五等復糾衆謀逆田五等係內地回民近在咫尺尤非撒拉爾畨回可比乃于四十六年逆回等修理石峯堡且聚衆禮拜寺謀逆李侍堯均毫無覺察及田五等起事肆逆李侍堯復逗遛靖逺並不親督官兵速行勦捕以致賊人兩次翻山逃竄糾黨肆逆實為始終貽悮田五明心徒復讐謀亂詭據阿桂福康安奏獲賊李泰恭訊即李鬍子之父據供田五係馬明心之徒因欲與馬明心報仇于本年三月內令李泰恭父子糾人入夥約于五月初五日起事謀逆嗣緣被人告發所以四月十五日即從小山起事等語被創雖自戕應者如蜂蟻遂不可爬梳流言滅回邇以故應者衆攻城切閭里賊首田五雖于五月內被創自戕餘黨李鬍子馬鬍子復以流言恐嚇聲稱官兵欲殱滅回衆勾結黨與于通渭隆德靜寧伏羌及鹿鹿山􅔄店石峯堡等處肆出滋擾嗟我遭燹民蠲租早頒旨逆回滋擾地方先經降旨令該督查明被難良民酌量憮恤並將本年應徴錢糧全行豁免自此民情大定并有鄉村百姓縛送逸出賊匪紛紛擒獻者民情遂大定縛送賊比比更因遣重臣勇將進兵駛􅔄店折賊鋒石峯圍賊壘甘省逆回之事李侍堯剛塔不能辦理因命福康安為陜甘總督同海蘭察帶領巴圗魯侍衛等馳往福康安甫到隆德即進剿􅔄店奮勇殺賊數百名生擒三十餘名賊勢先已挫折後路肅清隨直搗石峯堡而阿桂所率之八旗徑旅亦至因四靣設卞層密環圍濬掘壕溝斷絶水道賊已如釡􅔄遊魂尅期殱滅防竄周濬壕蹙命亟斷水猶慮如華林成羣鬪以死兹乃得生口盡善仍盡美阿桂福康安奏石峯堡賊人自斷水以後晴霽數日情甚惶急七月初三四日陸續投出男婦一千五百餘名初四日悗福康安同海蘭察等及巴圗魯侍衛率領各營奮勇官兵阿拉山兵屯練降畨于石峯堡卡隘之外層層分布埋伏至子刻賊首張阿渾同楊填四等率賊向外直撲大通阿渾帶賊在後接應思欲奪路逃竄我兵鎗箭如雨盡力截殺維時海蘭察即率同台斐英阿福寧阿滿泰帶兵馳往自外層層圍褁痛加殱戮福康安于各路督催明亮保寧成德圗桑阿額爾恆額法靈阿蘇靈等見賊即截殺賊匪自相殘踏黑夜力戰直至寅刻殺賊千餘尸積滿壕縱橫遍地張阿渾被我兵射傷復與大通馬阿渾等竄回堡內至黎明福康安同海蘭察明亮等帶領各路官兵一擁直上復興旺沁班巴爾傅玉等督率官兵進堡搜捕擒殺將賊首張阿渾即張文慶茂通阿渾即馬四娃及賊目楊填四黃阿渾即黃明馬建成馬良大馬金玉楊存義馬建機馬建業馬保等全數擒獲又生擒賊七百餘割取首級八百餘計兩日內共殱擒賊回二千餘拿獲首從逆犯及婦女孩稚三千餘所獲牲畜糧食器械帳房無數此次勦滅賊巢成功迅速大學士公阿桂加一等輕車都尉世職福康安晉封嘉勇侯海蘭察加一騎都尉世職伍岱授為都統并豫騎都尉世職旺沁班巴爾加一公職銜與其弟其餘在事出力之大臣官員及巴圗魯侍衛等均令阿桂福康安查明分别具奏叧降諭旨甄敘軍機大臣和珅加一輕車都尉世職餘俱著交部以軍功議敘躬返審為政勉愛民如子弊吏首以亷亦鮮叨簠簋水旱莫不賑肯令溝壑委數去聲節可自信實未應有此彼回本吾民奚曾少異視而忽逄此變斯誠劫數爾究緣化未淳慙愧惟責已更憶聖經云哀矜而勿喜御製遲速論甲辰今春為南巡記亦既詳論宜遲宜速之機大抵于兵事宜速河務宜遲而要于敬天明理非漫論也蓋屢省而有得於己之言也歸而有甘肅逆回田五之事彼時以為盜弄潢池不過藉邪教以惑人心如五斗米一炷香之類地方官自能平之頗不芥于懷既而思之不芥於懷或即違敬明之義得毋有所失乎已而剛塔有小勝之報李侍堯有坐守之乖以致賊徒翻山而遁餘黨蔓延猖獗肆虜民居攻縣城自今年四月南巡回蹕日即有甘肅逆回田五等復借新教名色糾衆滋擾提督剛塔帶兵往捕田五鎗傷後自刎賊目田介洪吳二韓二等均已就殱乃剛塔武夫無知李侍堯不早赴軍營調度督勦致餘黨李鬍子馬鬍子等于馬家堡馬營街兩次翻山逃竄因復糾黨張文慶馬四娃楊填四馬文熹等四出攻犯隆德縣靜寧州通渭縣伏羌縣城于該處之􅔄店鹿鹿山石峯堡等處肆行搶掠賊勢遂致蔓延西安巡撫畢沅遂有徴兵防守之義蓋恐秦隴煽動不可收拾朕閲所奏即硃批以為若汝所議雖十萬兵不敷用又將何以滅賊乎西安巡撫畢沅因見回匪猖獗恐秦隴煽動請于各處要隘分兵堵塞使其無路奔竄等語畢沅書生之見未嫻軍旅朕謂用兵在厄其要而折其鋒茍不殱厥渠魁東西抵禦何益因即批諭如汝所籌十萬兵亦不敷用又何以滅賊搗穴乎然知李侍堯剛塔畢沅及本省緑旗兵不能了此事即降旨用福康安為陕甘總督同海蘭察領乾清門巴圖魯侍衛章京等二十八人馳驛先往並調阿桂山蒙古兵一千四川降畨兵二千寧夏滿洲兵一千撒拉爾老教回兵一千及甘涼兵二千延綏兵一千共兵不滿一萬又命大學士阿桂領健鋭火器營兵二千以為後徑福康安一臨􅔄店即與海蘭察等率先至之寧夏阿拉山兵二千立挫賊鋒逼之入石峯堡福康安至隆德軍營即與海蘭察率先至之寧夏阿拉山兵進剿􅔄店奮勇殺賊數百名生擒三十餘名賊勢膽落後路肅清餘賊追逼入石峯堡於時諸路大兵雲集直搗石峯堡賊巢而阿桂所率之八旗徑旅亦至因四靣設卡層密環圍濬掘壕溝斷絶水道不十日間賊匪殱戮淨盡將賊首張文慶馬四娃楊填四等全數生擒與先獲之馬文熹等一同解赴熱河廷鞫分别斬磔以申國法而快人心於是諸路兵陸續畢集而阿桂所領之京兵亦到周圍築柵困之斷其水路不十日而淨殱餘孽生獲渠魁此又南巡記所謂宜速而莫遲未致昧事機而無成也夫兵凶戰危且豫老矣豈更樂于用兵而有窮黷之為然事機之來應之不速設果至賊氛蔓延全秦煽動如畢沅之所慮者豈不貽笑無窮而豫肯辭以老坐視弗理乎豫更思之勝國之兵即今之緑旗兵也而其訓練或尚不如今之緑旗其董事之臣似今之李侍堯剛塔畢沅者或亦少矣文臣掣肘於中武臣作偽于外其君付之不問弗如是則我皇清何以得有明之天下乎雖然是宜鑒宜懼而不可恃天之寵以自矜且即小可以喻大蕞邇逆回設非應之速而剿以淨其害有不可勝言者始之一念之忽豫深自以為過繼之一念之敬仍蒙天佑而速蕆功則是遲速之論可以默置而弗以明示子孫乎可弗以前明為戒而怠於敬天暗於明理而弗慎於用兵乎用兵固貴速而不敬不明未有弗致僨事者是豫所以惓惓也臣等謹案平定甘肅逆回之舉由乎新教倡禍本宜申憲典而快人心重以其黨濳相煽誘肆虐里閭竊據城邑爰有勦逆之師此所謂不得已者也伏見我皇上慎重軍營先以安輯民志為要故雖鴟張至再率皆殱洗無遺而其間經聖明洞照深悉一二董軍之非其材與本省緑旗兵之不能蕆事用是神謀密運紀律申嚴先後兩奏斯績民情于是乎大定自兹昭宣威德善後安良百姓咸安堵慶太平而聖心猶謂不肯以老坐視特反復申明著之于遲速論中逮今入帙大年觀成三捷豈非天賜嘉貺增耄齡之美盛以延豫順之庥者歟八旬萬夀盛典卷二十四
