body:
  text: 歌頌三十八萬夀恭紀八徵引一篇謹序翰林院庶吉士臣張師誠臣師誠稽首頓首言伏惟皇帝陛下立極斟元集瑞篤祜乾構廓紘泰策禔祉於今五十有五年斂時用敷寰圍豐靖而孜孜宵旰益惟時若是厪特鐫八徵耄念之寶而為之記仰觀天文發揮洛疇廣大悉備既於五福頌闡其奧於讀洪範綜其原復於是記宣均和合照之量暢保樂洽夀之旨寰區匝宇莫不砥屬敻乎爍乎粲也晏也臣謹案雨暘燠寒風天德之順肅乂哲謀聖帝德之純蘇軾言至極者謂之極朱子言極有湊會之義所謂三十輻共一轂故太極為萬物本根皇極為兆人標凖庶徵備則建極昌保極久則會極歸極胥延光而普汜矣洪惟八旬純嘏陔夤均禧率土臣黎鼚鼓軒舞而旃裘魋結之長髽首雕題之君罔不陸讋水慓棧壑浮川熙熙喁喁覗粹表祝龎禠唭㘈蹈踊舉謂戰圖展而棡曲干舞未足耀也奎翰諷而糾歌嗛銘未足煥也五代一堂而螽斯瓞衍尤未足艷羡也樂林祥樹何彌乎宙也齯齒台背何闐乎衢也庖瑟炎琴軒裳舜黼何翕於庭而爚於寧也翔泳夀宇歡呀無極小臣奏賦行館備官薇省重以恩榜成進士濫厠詞苑洊荷殊恩快逢盛典自為謭劣萬不能雍容醇懿竊考蔡雍注典引曰引者伸也長也伏讀御製記文奧義昭宣彛訓炳著歡喜鑽仰不能自閟於是鏤思傾忱罄窺管所得簮筆所録引而伸之觸類而長之敬陳八徵引一篇闡繹念用之實政光揚禔福之所由庶俾巷語衢謡獲所皎述云爾其詞曰於穆昊縡篤畀聖皇皇建有極昭登維綱襲熙瀳洽載榮懷祥五雲卷煽七曜順方珠弧介祉玉管凝商旋八八而應律鬯絫萬萬而握紀長契象執而金樞縈鏡雲仍衍而旋題爥堂惟行健以保合乃逢吉而康強先是作噩之嵗薄海臣民隅辟傱集赲趩􅂒趚涣衍戢孴伏願拱南極以酌㪺環北斗以仰挹萬人歌億人合絣紱舄趨闛闔籲請祝釐者嘔嘔欯欯翕翕帝乃曰俞乎於義其協然猶屏琛賮戒珍納湛恩龎鴻滒淖浸洽爰於上章元日十行布昭歆遍羣祀秩晉庶僚紫泥誥錫黃髮賚饒譽髦璋奉肆赦竿翹與夫賦蠲􅀢萬氓醉鴟飄榜開甲乙士摶鵬霄上儀具舉擊壤歡謡於時寶貺寅承福躔丙見金􅒫露瀼霱氣雲縵天子方蒞塞垣敞行殿梐枑衛嚴旌斿采絢灤水滮滮濡水涆涆四知臨軒山莊四知書屋所皇上理庶政之萬樹蔭蔓熱河外藩入設筵覲俱於萬樹園廣宴普陀延洪須彌錫羡熱河兩崇寺一日普陀宗乘一曰須彌福寺羣后濟濟舉釂式宴逮夫秋巡典備玉軑言旋籞苑揚靄藻井敷鮮內則暢襟晴空挹泉輝淵松篁集逺靜虛觀瀾福海迤邐匒匌奫潫外則明湖㶖㴸夀山巑岏繡猗亘梁倚虹輝椽紫氣緼以拂蓋丹旭晃以迎旃於是排仙仗步通門棽麗葩瑵鍧和鳴鑾街衢洞達闤闠輑連嵩呼封祝郛溢城闐衢歌三百宸章萬千奏衢皇上自章圓明園至御宫沿途歌三百皆集製詩句拮隔救石擫捻管絃兜離僸佅哮呷畢宣崇臺曲館之庨􅀈嘉卉異荂之馚馧尋橦角抵之踸踔魚龍曼衍之縈蟠殷脤􅀈霩實㩼且繁信春皇之景鑠曼夀之休臻也乃大和會會同有懌維彼蒙古爰及西域若衛拉特若布魯特從者台吉𨽻者伯克偕爾生身奔走絡繹蒙古未出痘者謂之生身今嵗西北新舊各蒙古偕來祝嘏其中生身者於山莊宴賚莫不越幕踰沙效修孔亟加以海邦頻朝樂浪環翊暹斛遙馳􅔢鼊重譯花象來遊越裳舊國江頭蒲甘畏懷交愓既納賮而欵關復請符而承敕又何論乎獅子社畨魚通土職更有交趾新藩躬覲趨驛寵接山莊班躋列辟安南國王阮光平來朝親王諭令班在宗室親王之下外藩之上荒徼維藩忭膺異寵璇璣仰成昨嵗阮光平請頒正朔冠珮珠飾阮光平籲請更换服色黃馬特賞四團龍褂紅寶石頂三眼孔雀翎褂尤為史册中所未見陋元帝之徵朝卑陸賈之捧檄猗歟煒哉洵宙總於土中而勳兼乎在昔蓋惟天衷之作肅也鐘磬式訓扆量著銘旻旻穆穆栗栗兢兢曰明曰旦泰元命凝亥藉親畝辛祈韞靈應雩􅉈渥報榖液蒸泰壇方丘峛崺恪登大采少采熛煬允升肅奉琮幣潔盛鼎鉶百神諴感茀祿川增近年一中祀申虔禮親祭周用况復光迪衣紹念摰武繩芝璽册奉玉碣謨徵春秋匪懈泔淡皆馨閟宫普淖是蕭是蒸是以保單厚於元會協尊化於清寧惟天功之作乂也縷晰條修緯經緝紀乙夜懷殷辰告布駛宵燭待章宵旰皇上綜理庶務不遑每日寅初即起時問所司有無驛報隨到隨遞政恤諭勿留待或至夜分猶取奏章重加披閲勤民古無倫比曉疇讀史讀皇上每日昧爽恭列祖實録命申晨明疏覽晝晷每晨題本批諭奏摺之外晚膳後復閲疏體冗長輒至千萬言而一經纎悉睿覽指摘訛謬畢昭節宴雖張披函弗怠遇慶莭演劇事無皇上即于臺前召對理異平日含章詄開凝旒瑶陛臣每皇上萬幾勤理無一日不召見召見羣月旬餘又必擇日御門以昭巨典笏書拜揚絲言篤棐日昃不遑萬言承旨凡遇事繁之際當軍召見軍機大臣懷籌旨書宣日或至再至三而書奏報睿度指示機宜如綍如綸每至數千言之多微不到萬里之外恍如目覩故聖慮周詳無天兵所至輒奏膚功蹕路勤咨周廬殫理恭逢照常聖駕時巡于中舟駐蹕之地聼政且于輿中時時以驛報迎報垂問遇要務或遣員往前途故從無遲滯之患文囿時臨勤求無已凡廟拈駕至瀛臺清漪園靜宜園及各寺香俱于傳膳後照常批摺辦事引對氊廬近光尺咫外任員辨遇以重巡幸之時令就近引見疆圉兼示體恤傾潤輟霖章來逺邇朂無飾詞戒無坐視課晴問雨最厪問無聖懷廷寄詢日無之各省覆奏情形必令無稍諱飾玊粒漕除鏐租户弛廪賑偏隅逋寬㕓里重展醲膏快乘春始各省偶有偏災除隨時加賑飭令撫恤外復於新春諭令以示有加無已安土愛敦恆沙數比是以昭天漏泉惠孚靡涘惟天智之作哲也蔭暍棫薪陶甄茅彚周柄馭官漢條計吏溥涵育于四門廣鎔冶于三肄講筵嵗宣羲農仰味湯湯雍流方中圜外視學昕徵樅鏞合制孔殿釋儀卣簋頒器宣鼓集篇車斿排字飫飲新歌拜洗酌觶樂譜宫商詩補笙吹抑戒鳴謙韶成闡祕七閣書全五經室萃觀燃金燈遺搜玊笥籍啓木天人遊福地近有中祕旨願讀書者許赴翰林院繕録梵音譯經吉帛獻瑞語正遼金元之未純通續杜鄭馬之未備恢昄章而識略統方輿而輯志表定職官鑑垂儲二辨麈角以授時圖雞雛以敷治睿藻風行藝林津逮而成皇上賦詩敏捷過于擊鉢者見御製飛爆竹詩編詩煥文功同五二輘轢古今含吐仁義厪農皇上心功詩集中多望雨望雪之作三希星輝八柱霞蔚鳯翥蠅飛夀八聖旬猶能作蠅頭小楷無藉眼鏡行健日強洵無倫比奎鈎珉翠是以學府緝熙禮園發粹惟天心之作謀也一曰巡狩一曰行師宜速則速宜遲則遲速者伊何神旌搟麾北覲渥巴錫西定噶喇依犁伊犂之庭􅀈烏孫之遺拓疆萬宇廣幅四維屯田播植鄉校建規烏蘭獾獥飇電紛馳赤嵌蛩駏靁䨨迅施鳬藻騰躍鴻績瞻巍纛藏武成之殿鐃喧郊勞之臺褒贊于紫光之像勒記于太學之碑金塔呈而𬗟文順貝葉納而佛土歸英謨赫運震􅀈邉陲遲者伊何江表六幸省觀疇咨金隄築鞏石楗保綏陶莊濬澮鹽官障崥陪都四詣胄矢心儀赫圗阿拉啓宇肇基松路展禮錫類延祺桑乾永定展義邦畿沽循疃壩淀靖海湄嵩室麗罕臺剎驤騏壇杏沃澤岱松耀曦上蘭秋獮南苑春圍親射虪虦屢獲麔麋盤登髙矗園蒞靜宜舉兹茂典行慶集釐是以惠浸萌茁協應神祗惟天德之作聖也浩乎難名無思不服夤威皓穹宅心沕穆覲揚烈光單心繼續庶績虔臨黎元亭育淵體嶷嶷員照郁郁潼溶蒸濡烽涌沐浴康乂盈區阜畨比屋氣孚丹甑時調玉燭三皇不足四五帝不足六是以勒崇垂閎永膺圗籙爾乃房翼出景慶矞輝雯地寶磊砢天符氤氲八徵咸備五福常新鶴齡飲醴蠕動化醇登臺調幕鼓舞逡巡蔥蔥鬱鬱莫可殫論爰稽古帝史乘相參七旬才六八秩惟三方兹福緒倫擬疇堪將見蘿圗鼎盛椿嵗籌添萬有千祀焱焱炎炎非休徵之普應繁沚之廣覃歟萬夀恭紀念勤九針謹序掌江西道監察御史臣江德量乾隆五十五年龍集上章月名貞壯恭逢聖夀八旬泰元增策保右申命列祖篤祜五世延祥闓澤涣太極之泉肆眚福無方之外官集奮庸之俊野逰擊壤之􅙕文思被於四表威稜抗乎八荒嶽效川修鯷趨鰈致廣輪均禧陬壖提福維皇上醇洪鬯之德豐茂世之規沕潏湛􅐮暢垓泝埏協氣旁魄薰為太平吉帛羂於窣堵仙蝶翾於太常誕育倍僆孳之男嘉􅓿茁䄮生之􅣴艾氓耋嫗臻百齡繞曽元者纍牒而疊告汦汦懷生含甘吮滋鱗萃仰流以祝我皇億兆京垓無疆之夀我皇虔鞏勞謙夙夜不敢康斥瑞應之藻文抑祝釐之縟節懼從臣嘉頌逰童歡謳之藝以飾也爰抉疇範之精厪蕃廡之備篆八徵耄念之寶製記以訓天下萬世嵗正元日溫綍實降普蠲租賦巨典備舉郊廟壇學躬親祼燎遂東巡狩至于岱宗幸闕里召試魯諸生繕庸隍察吏治讓慶交行回鑾䇿多士于廷授官有差駐蹕山莊時于幾餘猶集期門佽飛之士校射如例先是廓爾喀生畨向化內附而安南國王阮光平親身入覲其蒙古外藩衛藏喇嘛及朝鮮琉球暹羅南掌𬗟甸土司社畨等皆憬誼蹈仁後先穈至七月駕回圓明園八月慶莭前一日御禮輿還宫萬流景附九陌臚歡夾轂分鄽駢音櫛綵正誕日御太和殿受萬國賀臣侍班豹尾肅覩朝儀用仰丕天之大律胥源帝念之克勤洋洋乎若聖德頌讃莫能名已謹按小雅序庭燎美宣王也因以針之毛萇謂美其能自勤以政事左氏傳針尹之官亦訓在勤是皆祖唐虞敕命賡歌頌不忘規之恉昔帝媯期頥謨弼在兹之念周武綏萬訓矢夙夜之勤我皇上念切庶徵而以五之斂福與六之三憂同凛孜孜愓愓之戒良以憂勤致福千聖一揆也臣謹推廣八徵之念退效九州之針蓋包犧以八定卦實以九演爻極之萬一千五百二十揬䇿綿延至于無可紀酈統于九而實肇于九故九紀者大圜之所成化也九廟者抱蜀之所觀德也九式者匪頒之所沛恩也九刑者勑罰之所弼教也九官分職亮凝績之熙九功惟敘懋厚生之德九類焕文章之祖九伐馭張皇之威即共球之輯享王之來亦以九賔昭其儀約之以九而我皇所念壇廟之祀雨暘之時中外之政民物之養皆備已夫衛武公不忘􅉏御之針作懿戒以訓御于其國蓋上之德下之徵也矧幸際冠德卓蹤錫羡曼夀之世者哉敢綴官針發揚聖軌竊比矇誦敬告庶司辭曰泰元幹運於穆不已崇效弗違健行同體躬親祡祈懿懿歆升講筵闡義培栽覆傾君子自強貞于髙明峻德同天堯曰久恭純德享天文曰肅雍旦明弗渝盤杅銘在天官贊王敢告冡宰右欽若針聖作明述求福聿懷橱峯書事猷式基開定制銘石垂戒鐫碑五福紀恩四針遹訓典披實録詩排平韻拓跋可鑒摛詞示後宋孝茍安嘉名則負聖訓孔昭萬世聰聼欽哉紹聞敢告宗正右繼述針帝念敘時殷籌民計隂陽和甘弗私一類免漕蠲租二千萬萬酌瀣翺祥澤解風涣族燕親九耆筵集千華階普晉微眚豫湔虎旅宿飽鸞章式宣獨行表宅無告給饘節儉製論皇慎度圗自奉則約遍德則腴賚悅四海惠尊五美賜豫必書敢告內史右敷錫針堯法三宥蘇論不經縱囚來歸貞觀沽名大哉王言監兹祥刑秋讞慎疑其生是求輕非邀譽重乃罪浮刃傷申禁爰書衢榜憲使馳軺璋原雪壅光徹覆盆風澄投缿鑑無留影權乃在衡惟刑之恤敢告廷平右降典針唐德宣三周牧倡九帝攬乾綱太阿在手鏡燭凖平視其自取勿謂帝逺心周萬里勿謂民玩若保赤子弗率爾屬爾餗斯覆甄録有命仍杜其競各藎爾衷懋官懋功飭簋飾羔敢告百工右釐工針藝藝蒸蒸綺疆鱗室唯民有依依于無逸黛耜親耕青旗載蹕奠海籌河民生攸恤徐豫防宣赭龕波閼仁夀已登雨暘猶飭振發有加撫循先亟助給貸粻代賑興役傾不涸倉帑儲弗惜久道占恆無方簭益固本寧邦敢告常伯右求莫針奎園漢倬麗緯示則典學遜敏誕敷文德室萃五經閣羅四庫獵碣珉刋璧流海注禮秩其圗律調其元書增國篆志纂同文皇書再編帝歌四輯範古模今文成法立藝林逮津敢告從臣右焕章針紫閣嵬崔武成九炳搜閲知方禡征爰整凖部犁庭回疆掃穴寶甕斯徠珍球乃戞勒圍摧碉石峯搟堡鐵壁懾威金編效表氛靖臨清邑旌嘉義天戈所揮殱其醜類幄運堵安睿謨若神錫號褒勇寫形象勳事不得已非以耀武布在方略敢告司馬右詰戎針弗征而屬謂之歸順棧山航海憬琛敻賮理藩隸院會同闢館比于內臣永為外扞受土扈衆綏廓喀部前衛後藏及東印度越裳萬里阿瓦八關重瀛絶島羅斛中山吐魯樹頷臺畨附覲南交欵關虔奉朔正萬里躬趨五章籲易忱逾鑄金榮叨曵翠南車占波東風測吕昔慕聖人今帡夀宇皇弗勤逺化必歸仁天聲永揚敢告舌人右柔逺針萬夀頌謹序户部員外郎臣趙秉沖臣聞玉英賁采有開金卯之祥璽澤呈華尚溯蒼牙之瑞天貽純嘏昭川珍嶽貢之誠聖握洪圗輸日升月恆之象欽惟皇帝陛下乾符啓運鼎命凝禔斂五福以宜民康萬人而錫極四方來賀衍貞元妙合之昌期百祿是總綜章蔀希逢之異數嵗德庚守月令酉司欣迎震夙之辰正協泰平之會金􅒫玉宇答爽籟以呼嵩白水丹邱被晴曦而駐景煙調百和鼎祉山峩贊唱三成衢歌海溢翠媯鱸篆文騰甲子之宵赤伏麟輝瑞浥壬寅之露久儲始發乃造化千百年之春不占自孚維聖人億萬載之紀昊天其子祇深欽若之思率祖攸行丕顯烈光之􅍇潔齊相見非徒侈典禮於琮璜對越於昭寧僅效儀章於圭鬯繩謨列祖溥治寰區本無逸以為針而康而色喻羣情以悉叶好雨好風三穗呈祥總是豐年之玉萬箱告穫弗煩廣惠之倉釜給厨炊醇化擬青陽共盎征寬禺策湛恩偕紫渤同流舉一墢於春田鸞旗載笩課三盆於典婦繭館同稱乃淳懿不居孜孜益勵翠華時展康馗欣就日之忱清問頻加廣野洽如雲之望川流竹箭通八閘之疏排塘屹魚鱗奠三亹之潮汐靡不本仁為體載道於文奎章掞而日新麗正儲而海滙全書四庫酉山發金碧之藏萃室五經乙夜啓丹黃之御至若禮崇視學典重臨雍通經陋毛鄭之専家恩榜破漢唐之令格華顛賜第胥同鄉國之登青佩迎鑾並録星雲之頌音尋工尺三百篇樂以諧聲譜定中和十二鐘器惟求舊徵軒鼚於唐陛偕搏拊於虞廷既文德之誕敷亦武功之載纘疆開二萬天戈麾蔥嶺之西凱奏五年日鏡照桃關以外馳朱旗而送喜憺稜逮躬髮之區畇緑壤以興屯疆㯺無不毛之土訶羅畢撥尚方之嘉果同珍目宿蒲桃上苑之靈根得氣崇昆表瑞陳十玨以充庭宛野調良進九關而考牧竒勳懋賞三圗紫閣之形開惑摛文四勒春爨之碣固已南諧北燮西被東漸蒲盧毛朵之抒忱阻卜鐵驪之向化卅六部稱藩保塞不徒者舌之封九萬里纍譯來庭大有􅠫鱗之號雕題鑿齒測海水以知歸食德飲和酌衢尊而咸飫祥徵乙乙羣依聖日之光兆叶庚庚共祝曼齡之錫一人有慶萬夀無疆然猶謙之又謙聖不自聖歡臚百職俞請牘於再三詔沛十行播醲膏於九有迓鴻釐於青帝玉帛升歆儀鳯德於素王金絲聆緒壯圜橋之觀聼爰著攻同修宣鼓之疑文兼釐􅞚趩金填石刻資鑒古而必精翠琰丹珉繼豐年而有作於是芝泥儼潤玉紐從新義演九疇位洛書之九位言敷錫徵洪範之八徵蝌書鳥篆擬承天受命之文鼂采昭華中既夀且康之説念漢晉以來凡六帝古稀以後尤稀信堯舜之治在萬民會極其歸有極蘿圖式煥寶胄長延開萬年纍葉之禎襲五代一堂之吉耆英宴廣扶鳩杖者三千户口籍增推燕詒者二百日徽月琯律叶軒皇青鳥白環神孚媯后廓爾喀受持西極貢多羅摩跋之香阮光平新宅南交拜九摺銀黃之印朱波效順越雉輸忠忱達洞溪誠通畨社表騰金葉從菉幣以偕徠圖燦碧璂會爻文而最盛斒璘填玉苕華焕鸞鳯之文録曲軒屏絺繢緝海山之頌秋八千而得嵗月三五以重輪越契踰繩未有斯盛歌衢擊壤同矢其音臣願獻南山欣依北極字探玉檢叨摹寶篆於八徵職是金倉敬晉瑶樞之萬福謹拜手稽首獻頌曰維泰元尊誠通一理維皇則之不息為體懿爍隆茂文德武功聲教逺播福祿攸同旰食宵衣孜孜益懋行健悠久萬方在宥曰乾而惕曰夀而康五十五載莊敬日強帝有恩言觀民恤賦右粥左餐以寧以裕湯則解網禹乃下車屢頒寬詔人樂華胥帝觀于河東爰及海奕奕鴻謨南邦是賴柔逺能邇至諴感神周蠻漢撣稽首來賔矧以亶聰學抽祕奧惟聖折衷咸資指導倬彼雲漢為章于天欲知睿略敬仰瑶編鬱鬱文淵巍巍傑閣安問唐宗四庫待索殳書蝌篆六體兼收精心純固旁及藝遊典寶載陳奎章爰勒煒煌八徵備兹維克橋門觀聼獵碣鴻文正訛訂繆炳若星雲鼎鼎昌符五福維備介夀曼齡冠于百代大椿在望八千為春徵嵗月日欽我聖人詵羽綿瓜一堂之上五世介繁雲礽揖讓有感斯應嘉瑞聿昭耆英濟濟錫宴有章疆吏陳言民庶滋蕃二百餘户普豫旌門菁菁者莪在彼中沚夀考作人特科增試恩覃澤湛歡洽九衢嵩呼華祝厥來喁于岱宗有松貫時不易二月東巡純釐用錫奉琛執斚同我太平正位惟午卜嵗長庚篤慶錫光宸居建極於萬斯年皇圖孔碩小臣橐筆十載禁林恩銜覆燾感勵寸心莫繪者天難名者德祝聖人夀與天無極萬夀賦內閣侍讀臣孫球欽惟皇帝統御洪基寅紹列聖斟元握樞撫辰敕命亮庶事而允釐迪前光而紹盛恢赫濯之聲靈回部歸而金川𨽻屬溥教澤之涵濡四庫編而七閣傳録一道同風訓民成俗澤無逺而弗洽物靡瑣而不頥是以勳軼乎二十二人之襄贊治臻夫五十五載之皥熙太和翔宇嘉祉集時躋介齡於八帙齊貞符於兩儀履端瑞啓宣詔歡騰神祇遍秩臣庶丕承咸欲詠功而誦德莫由殫述而博稱溯逾古稀之紹猷篤祜積兹旬嵗而益彚庥徵皇上穆穆辰居乾乾元始泊耄期而增虔祗壇廟而綏祉爟火宵炎虬鐘晨啓毖誠慤於三齋薦壬林之百禮大典特重以躬親嵗祭猶周乎中祀𬗟懷祖烈祥發興京景鑒觀之眷顧思締造之經營四謁珠邱而展敬遹追駿業而有聲凛詒謀於寶録衣德言以日新珍若球圗燦列炳焉矩矱畢陳幾餘省覽世美率循由是典惇族睦義浹恩隆彤廷宴賚華爵尊崇醉飽之情既洽愷樂之志胥通篤天潢之慶展親藩之封瑶圗祚衍麟趾祥鍾洵為古皇之所罕有詎徒六帝之所難同且夫念民依重力田咨雨暘於大吏耕藉畝於頻年裕窮閭之萬秭普正供之四蠲恤囏加賑宿逋遞除截漕艘之餉發太倉之糈莫不飫衢尊之優渥而欣化日之長舒皇上猶厪下情之未達民隱之難周省方問俗匪豫匪逰涉淀津之碧湍躋臺麓之丹邱惟河海之隄防為吳越之保障邀睿慮之精詳協神功之輔相乃申六巡於南邦慰萬姓之徯望今二月之吉日驂五輅之蒼龍躬詣闕里展禮岱宗暢春暉之靄靄沛慶闓之溶溶遂使山陬海澨之氓翹首而瞻臨幸者咸懇懇而喁喁爰乃考制度飭典常紀職官之表舉鄉飲之觴列瓊筵於千叟出珍幣於尚方養老之儀攸茂而臨雍之典聿彰疏辟沼之遺規著京師之首善詩歌靈囿靈臺禮隆釋菜釋奠帝用虔祀事於升香御講筵而南面集諸生而圜觀矌百年而創見至於審伶倫之律吕定樂譜之宫商製鏄鐘以應鼉鼓造特磬以叶笙簧蓋雍雍乎禮明而樂偹郁郁乎文焕而道光帝乃廣作人勤拔萃三升開六榜之恩兩科定五經之試耆儒拜增秩之榮髦士奮彚征之志沐樂育之仁戴甄陶之惠相與紬繹帝文涵泳聖製羣俯仰而揖讓頌曰盛哉乎斯世薄海歸仁之日深宫遊藝之時包情思於周孔嫓制作於軒羲文排石鼓句補笙詩仙蝶賦而匪矜祥瑞雛雞繪而宛載仁慈仰宸章之朗爥昭雲漢之光華帙盈五集統滙百家故觀感羣倫而式化亦捧誦琅函而拜嘉若夫振威稜於撻伐揚偉略於韜鈐掃蘭州之苞孽靖石堡之烽煙長鯨息氛於臺海神雀效靈於樓船戰無往而不克師所至而胥恬是惟秉睿謨之指授乃以操勝算於幾先每嵗行圍時巡塞部沸渭汾沄蹈厲揚詡日射旃門風清鼖鼓於是皇上張玉箭與雕弓倐星馳而電瞥的必同開堋咸貫徹匪誇示乎佽飛實不忘乎戎詰斯皆體乾健以自強閲恆久而弗輟無資却老之方寧假延年之訣夀禧丕劭福祉懋昭珠囊翕赩玉燭均調豐亨萃聚需樂泰交頌譜華封之祝歡播康衢之謡爾乃風聲四馳殊文顒傾協律諧驃國之音入覲有越裳之掌伯克奉朝生畨列嚮先期而慶嘏者朝鮮叩關而修職者南掌𬗟貢馴象藏奉名經嶽輸賮川納珍自禹貢之方州所未載周書之王會所未臻莫不企九重而瞻聖踰萬里而來庭皇上方念庶徵懋居敬勵精求治順時為柄應晷披章嚮晨聼政樞臣日宣庶司承令浹上下欱愷之忱俞中外奉觴之請於時秋宇澄鮮祥雲布濩斗焕珠􅋃宵團玉露風清萬年之枝煙靄恆春之樹帝乃駕金根乘玉輅自御苑而啓鑾至大內而受賀綵結充衢頌聲夾路天閶旭麗仙仗雲開內則王公卿士咸列外則帥長牧伯偕來典樂升歌於韶頀司儀贊拜於軒階懿矣茂矣皇哉唐哉禮既成於寶殿宴乃設於璿宫晉百福之觥而蕭露湛譜升平之曲而樂奏融卜皇心之悅豫知聖夀之延洪微臣才慙珥筆願切呼嵩謹作頌曰粵稽古初代選令辟玉牒所鐫鴻名斯勒祚錫繁衍光垂舄奕校德論功猶未躋極惟我聖皇本身作則道契天心治光世德宵旰勤勞紀綱整飭保泰持盈淵衷淳默湛恩逺施祥和允塞兆姓熙春咏歌帝力侯甸要荒東西南北詣闕稱觥藩王奉職媚兹一人其夀必得集福凝禧以引以翼純嘏茂膺至誠無息作頌揚休時萬時億
