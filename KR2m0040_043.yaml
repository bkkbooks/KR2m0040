body:
  text: 盛事十九民數榖數一臣等謹按周禮大比登民數自生齒以上登于天府孟冬獻民數于王王拜受之盖祀上星司民吉月陳籍即生齒以騐蕃昌也詩楚茨誌倉庾之富歸美于萬夀者再甫田頌茨梁坻京之慶而亦申重之曰萬夀無疆斯愛戴之私所云然歟亦由室盈婦寧皆人君之有以福其下故尊親之感彌摯耳今天下民數日滋自苖猺畨屬弗編查弗計外凡直省奏報以歲遞増兹自乾隆四十五年臚計至五十五年得民數三萬一百六十餘萬而贏榖數則綜常平義社各倉不下四千餘萬石孳長之緐稠儲積之充牣實周制所臻雅歌所未備宜乎胥生息保聚之衆樂効于一人且願以萬億秭數上為我皇増積筭而普天寰海蕃祉老夀熙熙率育於仁夀之宇斯真盛事矣御製民數榖數辛丑民數榖數國之本每歲各省令具奏因命司農計損益觀之持盈懼益懋榖數較於初踐阼増纔十分一倍就乾隆初年各省存倉榖數共三千五百餘萬石厯年督飭各省以積榖為要逮乾隆四十六年各省存倉榖數纔至四千二十一萬石零較之初年計多四百六十餘萬石然其所嬴不過増十分之一民數増乃二十倍國朝順治初年民數僅一千六十三萬至乾隆初年民數已至一萬六千餘萬是已増至十倍至乾隆四十六年民數乃至二萬七千九百餘萬是増至二十倍矣固幸太平滋生富以二十倍食一倍榖價踊貴理非謬榖貴因之諸物貴何怪近利居竒售現在各省存倉官榖較之乾隆初年不過増四百餘萬而民數増至萬萬是以二十倍食一倍無怪榖貴而諸物因之無不較前昻貴小人近市居竒因縁牟利實勢所必至耳返淳擬欲禁奢費遊手謀食恐難副昨歳大理寺少卿劉天成奏請風俗崇儉還淳一摺余心是其言而行之實有所難盖太平日乆由儉入奢不期而然驟加禁令罹法者多且游手謀食之人轉失生計非善䇿也設曰驅之盡務農那得許田供耕耨水旱賑濟數逾萬自乾隆初年至今每歳各省水旱偏灾賑濟銀米動輒數百萬計多者至千萬其偏灾蠲免銀榖數亦約畧視此合計四十七年中所費不啻萬萬矣無過補苴其罅漏三免正供兩免漕丙寅庚寅丁酉曽三次降㫖蠲免天下地丁正供丙戌庚子兩次降㫖蠲免各省漕糧未見閭閻生計茂長此安窮不敢言蒿目怵心籲天祐綏豐或尚可支持惕息中豐又難遘乾隆四十五年户部奏直省具報民數二萬七千七百七十萬四千五百三十名口榖數四千二百三十二萬六千二百六十七石零奉天屬男婦大小七十八萬一千九十三名口較上屆増二千九百五十四名口倉存榖米四十九萬四千四百六十九石零吉林烏拉寧古塔伯都訥三姓阿勒楚喀等處男婦大小十三萬五千八百二十七名口較増二千七百九十一名口倉存榖一萬八十九石零直𨽻省民户竈屯男婦大小二千一百六十八萬九千九百六十三名口較増二十二萬二千八百一名口倉存榖二百四十八萬一千六百一石零江蘇省男婦大小二千九百四十九萬五千五百三名口較増一十九萬九百九十五名口倉存榖一百二十八萬七千五百一石零安徽省民屯男婦大小二千八百八萬五千三百六十六名口較増一十五萬二千八百四十八名口倉存榖一百二十七萬一千九百七十五石零江西省民屯男婦大小一千八百四萬九千二百六十八名口較増一十五萬八千三百九十七名口倉存榖一百七十五萬九千八百二十四石零浙江省男婦大小二千四十九萬四千一百五十二名口較増二十三萬四千五百一十四名口倉存榖二百一十五萬五千一百六十六石零福建省民屯男婦大小一千一百九十八萬一十二名口較増一十五萬六千二百一十九名口倉存榖二百八十七萬五千七十七石零湖北省民户軍丁男婦大小一千六百二萬一千六十九名口較増三十四萬五千三百九十四名口倉存榖一百十萬七千八百二十九石零湖南省除苖猺户口例不編查外民屯男婦大小一千五百四十二萬三千八百四十二名口較増七萬一千四百八十三名口倉存榖一百九十二萬六千四百一十一石零河南省男婦大小二千二十七萬五千二百六十三名口較増八萬七千八百九十一名口倉存榖四百三十五萬五千三十七石零山東省民軍竈丁二千一百七十六萬三千八十五名口較増七萬一千四百五十九名口倉存榖米麥二百三十八萬九千三百九十石零山西省男婦大小一千二百八十五萬四千七百九十二名口較増五萬九千一百四十名口倉存榖米豆二百一十六萬五千五百九十四石零陜西省男女大小八百二十三萬七千八百八十七名口較増七千七百二十九名口倉存榖二百八十五萬八千四百二十七石零甘肅省男女大小一千五百一十三萬六千八百八十二名口較増一萬五千九名口倉存榖二百八十二萬四千九百二十一石零四川省男婦大小七百九十四萬七千七百六十二名口較増五萬一千一百六十四名口倉存榖三百五十八萬一千七百一十四名零廣東省民屯男婦大小一千五百二十一萬一千九百六十名口較増八萬八千一百九十名口倉存榖米三百三十七萬一千五百八十一石零廣西省民屯男婦大小五百七十四萬九千九百九十七名口較増九萬五千九百一十九名口倉存榖一百七十八萬一千二百六十九石零雲南省除畨界苖疆例不編查外民屯男婦大小三百二十萬一千二百六名口較増二萬六千八百六十七名口倉存米榖麥荍青稞一百七十四萬六千四十石零貴州省民屯男婦大小五百八萬一千一百五十七名口較増八千九百五十九名口倉存榖一百二十四萬九百一石零荍六千五百一十五石米四萬二千一百六十八石零巴里坤烏嚕木齊等處男婦大小八萬八千四百四十