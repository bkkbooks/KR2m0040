body:
  text: 欽定四庫全書八旬萬夀盛典卷一百十三歌頌三十三萬夀九有九如萹謹序翰林院編修臣劉鳯誥臣鳯誥言臣以西江下士備職詞館隨蹈舞之末恭祝我皇上八旬萬萬夀臣敬仰皇上膺位禄名之極盛而以大夀統輯諸福保右天命之純即殚兆億人之誠莫効稱揚于萬一且悉京秭垓壤之数曷闡其紀顧循繹我皇上之祗事元穹馨承三祀與夫紀恩述訓誦錄裁章無逸以知依屡豐而歡穡普蠲振貸鏐糈五十五年中之郅徳善政周洽萬㝢皆従来求治者所孜孜而未遑若夫睿謨覃敷徹㣲彰柔剛之藴武成九奏笇遲速致信孚徕服者納降隸屬者綏順無不勞旰宵之籌畫動恊羙全是以拓土二萬里而遥凡鐫銘紀績之區多亥步所未之屆者至如御文二集詩五集治與道所合并講筵敷言書庫萃秘經發㣲而史惇實禮修器而樂訂音塞域之設庠圜璧車攻之泳澤恩榜作人凡兹六度唐哉皇哉集大文之成以宏徳教實軼姚思姒命而上之以至清蹕屡勤讓慶交舉莅陪都者四幸江浙者六而嵩而岱而臺麓瀛津山國聲呼水鄉恬景矧衍天家五代之上祥叟讌三千之積算頻嵗以見曾元告者躋期頤告者絫世同居告者拜恩賚彌有加益天苞地符㑹萃時合罄頌禱之所弗及徧舉無弗徧者允為軒轅甲子四千四百八十七年以来乍遘之鴻軌也兹者在廷儒臣在野憲老下及轅童衢叟情知窮於摹繪臚忭之不已而臣殖庳詞陋奚克揄揚隆典申頌我皇上萬萬年無疆之庥竊惟聖哲天縦同文盛治乆矣鑒羣方之殊習訂重譯之正音今集爻閭門者北踰額濟勒西底霍罕東朱蒙而南駱越奔走偕来懐風稱祝一視内地臣民其類不一其寫愉誌慶則同其樸野或未能胥稱文言其歡誠則無不可通諸體委以備謳誦斯又周官土訓象胥所弗具詳者矣爰為原其方俗貌其聲情時則有若蒙古回部安南朝鮮南掌緬甸以暨金川臺灣之畨衆呼圗克圖之化人復藉以誌臣忻幸之私綜之曰九有九如萹釐之為賦一為詩一為頌六為集範一為詞三為祝辭一為鼓吹曲八為謡四為讚一謹拜手稽首以獻蒙古塞宴賦天臨四宇圓幕髙張金􅒫日麗玉葉雲凉清商節物朔漠庭障駝圖馳於廣埜蒙古地馳驛皆以駝毳服集於賔行屬鞬執役奉幣来王皇帝方駐清暑之宫倚承華之盖日隨月侍星拱辰㑹地匝周盧天髙行斾中施帳殿旁唘旌門三秋上塞萬樹芳園山荘張幄賜宴地千二百騎之圍蒙古毎嵗備圍以一千二百騎為例四十九旗之屬譜内扎薩克之藩盟多倫諾爾之族喀爾喀部海西市駿青海部蔵外熬茶詣西蔵熬茶為䝉古要務貟渠尚存衛拉都爾伯特部烏孫不限羅义土爾扈特部霍碩霍碩特部生身諸部未出痘者率曰生身烏梁烏梁海部丁户循扎穆蒙古語謂路以偕徕望伊綿舊名布祐圖昻阿乾隆三十六年以衆䝉古全不遺一類因名伊綿峪猶漢語㑹歸意也而競赴于是華茵錯逮繡芾威㽔響遅行漏塵肅穹帷酥凝特黙駝酮熟和尼羊雞寒纎屑牛胾調胹陳筵愷樂授几威儀既羅三醴之馨爰敞六閑之地駭谷鎗聲行空馬戲進宴時列名馬数百去羈韀用孩童馳之以鎗聲為節謹按御製塞宴四事詩具詳蒙古舊俗臣擬斯賦皆恭夲語詩意及觧題摩哩馬綰􅐢積蘇馬毛色弛轡驫賊飍矞騰卓犇墜解拉鐡而發蹝籋浮雲而疾至至只孫呈俗只孫即蒙古所云積蘇仍元御詩有只孫古俗想像中句雖人舊稱已于解題正其誤什榜樂名侑尊春風一曲朔吹全畨御詩解題指楊萬里全畨長笛横腰鼓一曲春風出塞聲句謂塞外樂曲名畨今俗所謂十畨因此箏絃手語笳管脣翻渾撥四之柱促火不思之節繁雁飛隂磧花落闗門起舞則清歌未闋轉喉則古韻猶存既乃壮土挽褠健兒揎䄂布克爭雄俗重相樸戯蒙古語謂布克與國語布庫同廣場迸就跮踱後先扲掑左右乍撇捩而奮身俄踞蹋而控首席次頡頏酒邉勝負以蹶為負勝者賜巵酒少焉執竿豪選教駣良家馬三嵗為駣蒙古習教駣法驅生馬命子弟特尋丈竿繫革繮其上以為控縶謂之騎額爾敏逹驆䮃驌驦之萬錦罥䮂䮧之千花追􅀈趫趒放驏紛拏泉寒城窟草浄塵沙馴毛龍與逸虎曵飛虹與流霞時也蕃長扈班名王獻斚兒孫則冊次承顔䝉古侍宴今皆為年巳皇上孫曽軰獻宴則自乾隆六年至五十四四十次屡見御製詩賔客則九邉介雅物賚分紅蒙古謂紅色為物賚所獲獸多稱阿巴見顔和樂御製巴行闈詩恩袍映赭欣燕頒三爵之同願夀晉萬年之嘏回人厎貢詩皇圖開西濛鴻化天方亶慎徳昭咸賔并包詎勤逺逖哉彼和通久釋厄魯限厄魯特謂冋人曰和通急呼為厄魯鄂爾圖玉兹哈薩克左右部有三玉兹如衛拉特之稱其左部玉茲曰鄂圖爾行國異冷暖噶克义莫朶膜拜枝宛轉回神樹名鄂哷引噶克又莫朶如蒙古鄂博過其下者必膜拜初時請内附佉盧表誠懇五王康居封四駿阿特馬選阿比里斯汗西駐塔什罕右部汗曰阿比里斯居其境西塔什罕城布魯鄂拓克布魯特東西部急呼為布魯回稱汗之部屬曰鄂拓克先後軍門欵牛驅喀拉牛場羝呼哲楞羊圏驛呈玉匕首寒芒月芽偃布哈爾迤東逰牧事豐衍布魯特内屬以布哈爾東二十萬衆並供㳺牧霍罕長四城霍罕亦布魯特種東為瑪爾噶朗又東為安集延又東北那木干帕爾西語辨帕爾西回語三種之一鶻斯鷹喀察海海青繡韝致縧綰問獲龍泉謂宋龍泉窯器材古盤色沉隠有来安集延靶握水晶短瑪爾噶朗隣那木干回語謂河河近送喜騰神驄拔逹克山八駿馬之一名送喜驄傾心接素坦汗名素爾坦沙急呼為素坦寳刀錯斧函鋒銛瑩鶻眼小部博洛爾㧞逹克山東境利器秋毫斷長劒雙玉欛佩之水可翦愛鳥罕龍駒伯時畵圖展畵愛命撫字公麟五馬圖法鳥罕四駿見御製詩武庫開匣蔵銀鏤雪舒卷㾗都天竺間㾗都斯坦為北印度交界見度考御製天竺五卬訛喀嗎回巧匠國工善水磨擎都丸掌貨税者花趺粲瓶盌平回回悉平境落盛圖版乾隆二十四年回部平圓志命纂輯皇輿西域線天磧地寛萬里服耕墾雪苗滋塔哩回語謂黍曰曰塔哩克風蔓芳喀衮𤓰丹椹餐屯軍竒蜜登禁苑竒石蜜食緑蔔萄種急呼為竒蜜曽移植禁中貢金麟褭成回部貢金命鑄麟趾褭􅾣肖麟趾五出状奉寳騰格算回錢制以百普爾為一騰格平定後加鑄乾隆通寳于靣而其幕附回字城名大纛圖克搴圖克嗎呢回語謂大纛旗重器噶愛篆唐回銅器篆有噶愛字陀犁繙史書陀犁克回史書名阿渾敬經典通經典者曰阿渾玉圭㗶嚕匜祝嘏善稱引回玉圭㫄行篆吉語㗶嚕篘匜屬元回銅器鏤文悉祝嘏辭即今上風郵花門樂恬晏紀嵗摩和爾一嵗一環轉回語謂印曰摩和爾篆文紀年閲嵗遞加之年班列燈筵伯克輪燈覲賀正率與莭宴舞技按琴管回樂琴曰喀爾奈管曰巴拉滿之屬命扵燕饗兼設更以祖國名新鐫哈什玉産回制刻年分于玉次紀祖國相傳名自派噶木巴爾至今凡一千二百有四年本年製玉獻祝益萬夀即用此式算無疆詘膝效捧觴吉語臚歡悃本年哈宻郡王品級額爾徳錫爾各部落汗王子弟伯克台吉等至山荘並詣京慶祝恭惟大皇帝夀齊阿思滿回語謂天曰阿思滿安南冠裳襲慶頌昊天錫貺佑順我皇威鬯溟徼化亶炎荒虞都明宅周制蠻方析圭示寵偃伯徴祥用輯聖武定功煌煌仁義中正㣲彰柔剛用兵貴决先㡬乃易象介石貞吉之道也御製四知書屋記交南舊邦拜封鼎卜七世共球十王典屬安南黎氏自順治十七年歸化百三十年以来凡七世十王維帝承天栽培傾覆恩洽懐新義申舍服仇爾婚媾黎阮世為婚媾一居黎城一居廣南素無統屬歸我臣僕天垂逺燾聖廣亭育安南始末詳見文御製書事記臺崇昭徳鎮南闗内昭徳臺與闗外仰徳臺對闗唘畏天入訶􅴎柱右要路已搘銅柱不下樓船沙縈白鶴江名在三帯州霧刷朱䳒漢交距屬縣来蘇江黎城東北境廣順化城即順化府轄順州化州連居風漢九真屬縣今清葉府瘴息北景漢日南屬縣暉延維十三道地有東西都分十三道慎守聿䖍帝有恩言俾宅維鎮肇造圖寧克恭表信綸綍大文吉祥新印太命撰勅書鑄吉祥金塗印于和殿前頒賜齎回宣封阮光平為安南國王上爵爾膺崇班爾晉固爾疆圉職爾貢覲寵命載綏屏藩丕振爰表方物有徕族親上年遣其姪阮光顯賫表貢乞恩蒙賜覲扵山荘嘉讌入繪安南戰圖末繪光顯入覲賜宴之圖賚予迭申崇封世賞逮爾子身子先恩封光平長纘為世子奉朔奉詔萬里陽春光平懇體正並一頒時憲書本年元賜萬夀恩詔三沐瞻藻詩章御製以賜九􅉔頌仁矢心敂闕稱夀世臣奉表有云逢而有之恭聖天子天生至徳位録名夀兼八旬萬夀同效華封之祝實為至願之優詔許夀世之臣允賔于國見待諭督撫相以賓禮謁帝威儀近聖顔色瞻覲時天顔准行抱見請安禮謝表有睟穆僅似五旬之語卷阿獻歌親擕樂人演所進祝嘏詞十章捧觴上夀湑露賜食章采殊榮冠裳奉則光平乞遵寳石天朝衣冠孔特賜紅帽頂三眼雀翎黄褂金黄色蟒袍四圑龍補服復制申命到京朝賀仍用該國衣冠以昭體朱邸亞班列郡命班王上紫㣲捧極襲慶延恩願祝萬億朝鮮集範惟天隂隲下民惟皇建極曰念用庶徴本年副寳以御製八徴耄念之八旬開袠之慶曰予攸好徳歛時五福而康而色以為天下王王道正直皇極之敷言睿作聖㡬未御製寳記有云一日萬形智哀不可不自勉天乃錫禹洪範九疇于帝其訓六三徳乂用昏不明六帝登八旬者三梁武宋髙尤為失徳惟元世祖差賢見文記王省惟嵗日月之行土爰稼穡曰休徴百榖用成既富方榖嵗月日時無易汝則錫之福又曰記文云民物之養不可不心存敬念庻徴即皇極歛錫之福謀及卿士卿士惟月人之有能有為人無有比徳卿士從俊民用章乂用明明作哲而邦其昌無偏無黨有猷有為于其無好徳惟辟作威八曰師彊弗友剛克是之謂大同歸其有極王道蕩蕩王道平平于汝極錫汝保極是訓是行相恊厥居敬用五事庶民惟星恊用五紀天子作民父母身其康强皇建其有極斂時五福嚮用五福堂額皇上慶得五代同堂因増書五福五代並鐫五福五代堂古稀天子寳兹八徴耄念之寳仍以嚮用五福為副家用平康彛倫攸叙時人斯其惟皇之極用敷錫厥庶民子孫其逄吉上年得有恩諭朝鮮國王李祘俟子嗣即奏明冊為世子兹奏本年六月得子乞暫緩冊封表稱以願大堯夀富多男之盛寫洪範敷錫庻民之意待其稍長以不方来之福皆我皇上生成萬物終始之恩惟辟玉食無有作好朝鮮貢覲以時本年正貢外復備物先期呈進恩諭朝鮮國王並准作次年萬夀正貢以近天子之光遵王之道八庶徴用靜吉曰雨曰暘曰燠曰寒曰風曰時騐又記文云雨暘之時不可不常曰念庶徴即所以念萬民九五福一曰夀皇則受之南掌進象詞丹徼炎荒有越裳遺裔今之南掌大清一統志南掌古越裳氏地久矣鞮鞻載在周官籍上誰識文身酋長刀線歹曽通來往又何事宣慰覊縻中疎蠻國歸嚮明永樂中刀線歹入貢始置軍民民宣慰使後不復至聖朝天廣一從叭猛花夷使初謁仙仗金冊呈函特地瑶階投顙本朝雍正八年部長素馬喇薩遣頭目叭猛花始奉金表入貢萬里都歸馴養申吚唱一心䖍仰猶然是獻雉餘風朝天人解騎象萬年歡十年例貢皇恩許南掌貢道遥逺乾隆七年定為十年一貢百獸前頭舞熊熊南極夀星明輝映瑶光齊吐洗經香海來經重譯蹋到中華土大平真象慿㸔取品料鑾儀所騶虞仁育上林多未要撾家南掌老撾夷民俗呼為撾家調拊㲲巾頷飾珠鐺耳玩七就朱纓組御街行崇班金馬門前曵韶箾兩階排比五色香烟百花琱輦早入昇平圖繢真依象魏見象與人馴人知象意舞蹈蠻奴懐風上慶大皇帝本年南掌國王召温猛遣陪臣叭整烘等賫蒲葉表文一道子象二隻䖍申祝悃大皇帝夀無量備威徳更備福祥之至名馬文皮生犀翠羽逺物何曾稱貴生生世世願咸若駢珍咸賓集瑞萬載清寧表文云遣使叩慶伏願永荷大皇帝常調玉燭萬載清寧使小臣渥凙云云萬方呼萬嵗齊天樂𬗟甸金葉祝辭臣聞炎皇治壃際日月之表軒帝推筴登甲子之鴻希風漢代三歌稱主長夀徴典唐宫九奏演佛大乗伏惟大皇帝萬嵗萬萬嵗廣大宅中駿龎服逺無私覆私載私照山海諧諧正同軌同文同倫蠻夷戢戢遄上滇池之使乞通驃國之朝乾隆五十三年益隕恩准𬗟甸國長投誠納貢種呼十𬗟𬗟族有得楞普澣洞吾擺古等十種香焚阿瓦王所居城名城中路進八闗𬗟境有銅壁鐡壁虎踞天馬等八闗馬渡金沙江對阿瓦城上在昔新街輸欵曾来祝髪之人乾隆三十一年新街受降各頭目遵制薙髪御製𬗟甸詩有㝡先乃新街歸附髪已薙句至今錫刺𬗟兵名護邉不擾邦牙即元邦牙軍之籍西孟養北孟宻其地西至孟養北至孟宻分㸑𤏡為界㸑奴之箐落無驚大昭禄小昭綱𬗟俗稱宣慰為昭把事諸目為昭禄昭綱酋長則箠鞭可使悉吐嚕吐嚕無知也一生之衆為噠喇噠喇猶言公道主人諸部之尊天迴氣候摩勒知春土告豐腴野蒲消瘴處處屋廬舟筏漫稱漢三彛七之風家家茶布鹽錢兼擅四庄五苗之利緬用貝數一貝為庄四庄為手四手為苗五苗為索聚如鳥雜竒到象花地産竒異花象本年呈進洪惟中朝大順從来武不勤矣異域来同益信仁能馭外幸附天庭之職貢適逄帝夀之洪延偕種人香花蠡鼓𬗟制以八月十五日盛陳香花蠡鼓為朝㑹節北面而祝長生遣把事錦衣革鞮中國而瞻至聖本年差心腹頭目便居未駝等赴京叩祝表文云願大皇帝夀如山海萬年吉慶云云恩光如暘谷日升臣躬受卜剌浪𬗟人呼其王之稱之號本年恩封孟隕為𬗟甸國王福徳比恒河沙算佛説獻坎扒窪本年佛呈進萬萬夀經名之之經仰企彤墀俯呈金葉無任歡呼抃蹈誠感誠頌之至金川畨鼓吹曲吐嚕畨居西服遥山行烏道水䋲橋天家新得降人用四川甘肅各住牧屯練降畨屡經従戰立功獲備天朝勁旅樂府休誇蠻子朝生成身手練精彊萬衆都教隸護羌勇觧擒生智擒賊報恩特許就戎行鳴鉦攂鼓從官軍諸堡爭先束矢勤慿仗皇威占得勝紅旗髙掣陣前雲俊鶻攀山越嶮重令行苞枿翦戈鏦千家板屋辭金塔肅州金塔寺十日煙塵掃石峯四十六年従𠞰石峯堡逆回河上簞醪洗甲来樓船萬里次平臺五十四年従𠞰臺灣逆匪西人膽壮爭飛渡又築鯨鯢海上回巴圖魯錫効忠身授㪚秩大臣四川土守備穆塔爾加贊巴巴圖魯屯練二等侍衛丹巴錫拉布加多布蔵巴圖魯屯練守備阿忠加扎克布巴圖魯等號第賞論功寵命新何幸邊方備材武也隨畵像入麒麟紫命入光閣圖像之列並製贊累世長官承號紙先春土舍覲年班各土司世受國恩遵例輪覲夲年克給㫖命七月内同回城伯驛来京時平逺寨安無事嵗嵗貔貅隊裏閑都京蠻館集鱗多獻賮䖍擕蕃目羅榮奉至尊翔慶輦凱歌新譜萬年歌臺灣生蕃渡海謡臺灣平内山傀儡收蠻兵薩豉宜鐡響器以繫手腕響㪣丁丁鵞管教冊書左行習紅毛字者曰教冊削鵞毛管注墨横書箬箭囊鐡鏃藤弓綰苧䋲飄颻麻達畨人之捷走者插雉尾于首雙雉翎伊珊頌祖語俗有頌祖歌謂祖曰伊珊礁巴勸畨名畨以祖父稱名遞傳為姓有甲礁巴乙礁巴之稱還家語曡腰眉聲腰眉勇往自負之謂臺灣平畨車伊軋牛畊春做田宻呪其斗寅畨語謂年沙螺麻轆鎖米登竹囷起向謝雨曰起向謝神雨聴鳥知豐年俗以鳥卜黍粒如豆萁如薪霞籃迦喇巴編籐竹為籃以供槩量瑯袍卓戈紋畨布為短衣挽手嘻嘻樂天民臺灣平畨人敬官如父母花輿竹緑迎左右螺錢如古貝式輸税網袋取以網袋貯物首戴以行哨望貓逹竹樓中社餉出草捕鹿後蟒甲獨木舟射魚粉咂酒蠻唱簫按鼻簫以鼻吹漢塾書上口畨童肄經書者曰上漢塾麻丹畢壮夫稱服王化乆臺灣平畨民忻睹天日光生畨隨同剿平逆匪後屋鼇等社曽于乾隆五十三年臘月入覲兹獅子等十二社畨頭目復至京慶祝萬夀東南一髪浮扶枽蛟龍窟宅飛帆檣亞班占風望向者占風信香公迎神者拜潮王沙更線路婆娑洋名山蔵所謂華嚴婆娑洋即今臺灣望蟾秋正好俗不知紀年毎以月圓為一月獻鹿夀無央海屋添籌祝聖皇呼圖克圖無量夀讚爾時哲卜尊丹巴呼圖克圖暨噶爾丹錫勒圖呼圖克圖衆扵彼庫倫所居廟地聞國大慶合辭恭敬願以隆教安生正派乾隆二十一年加封哲卜尊丹巴呼圖克圖為隆教安生國師及慧悟智宗雍正十二年始封噶爾丹錫勒圖為慧悟禅師廣演法輪来至帝所頂禮我佛長夀無量真實寶相圍繞祝釐膜拜萬遍而作讚曰敬禮我滿珠是常喜世界萬佛擁一佛無量夀最尊統攝四天下咸悉登夀宇康彊乆御世真足大福力普福利衆生蕃盛而愛樂善思議菩薩乃不可思議塞土黄金色羅漢師峯圍百部諸賢王来䕃如意樹禽禽唱梵樂香象寳輦承佛所經逰地種種妙荘嚴綵幢華葢中行至快樂園是為最勝塲大雲吉祥聚夀佛示現日金殿開九重諸天歡喜縁一一朝宫闕無量夀無量各滿大願心發願之所宏天地無終極日月常輪轉大衆修讚唄格隆班第䓁扎薩克大喇嘛徒衆日格隆如僧中受五戒者曰班第司役使者隨喜叅秘乗功徳無有邉芬郁旃檀聞迦陵轉㣲妙結無量夀㑹諷無量夀品無量夀如是非算数可知算數所不知云何供慶祝上奉丹舒克畨名慶祝禮獻五色哈逹吉祥製帛之稱佛座牟尼珠金經八吉祥銀塔及滿逹蔵香氆氌屬以此陳祝願拈花盡無際無量如是夀更有無加量示悟無量者佛福徳智慧備扵長夀身我聞阿含經由旬城髙下滿中貯芥子百年取一芥芥盡劫不盡又聞樓炭經大石四十里百嵗諸来天羅縠衣拂石石盡劫不盡以此讚無量勝彼恒河沙一沙一萬年聖夀逾沙數亦勝尼拘類嵗收實數萬萬萬積有數聖夀積無量是為大勝果自小千中千三千暨大千惟願聖夀延聖夀即佛夀夀統諸善佛従上諸佛證上亦無等等了了正見知人天皆䕶持凡在佛土中三身仰一徳超刼長圓滿善㢤同一聲夀世真無量敬讚長夀佛八旬萬夀盛典卷一百十三
