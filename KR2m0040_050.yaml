  text: 欽定四庫全書八旬萬夀盛典卷五十
  hash: sha256:9a9bb211e17ae5e026339dc559778380d4f38ab156e61646e4b90911f08179a1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_050-1a, image: WYG0660/WYG0660-0585a.png}
body:
  text: 典禮一慶祝一臣等欽惟我皇上以康強備福之躬臨御五十餘紀天下臣民沐化澤之久長際禔祉之純備無日不思以祝帙之末誠藉伸感恩之積悃非襲介眉頌嘏之具文也蓋聖崇實德禮順人情前者稀齡籲祝特示謙沖今閲十年而耋夀茂增輯諸蕃祉天人之欣合中外之歡愈允軒皇甲子以來所未覯臣等仰惟皇上鼎籙凝禧蘿圖集福時時敬天以迓庥祥事事法祖而惇彞典兹鴻慶之舉篤昊貺則億齡未艾遵前軌而草載有加禮時為大殆斯謂歟維時元正肇祝秋覲偕來奉慶輦之輝煌應簫韶之儀舞禮明樂備茂典光昭懿哉萬年嘉會孰能罄鋪張於禕儀者耶乾隆五十二年八月十二日詔允諸王貝勒大學士九卿及直省將軍督撫提鎮臣等之請命於五十五年舉行八旬萬夀慶典乾隆五十二年八月十二日內閣奉上諭朕寅紹鴻圖仰承昊眷臨御五十餘年夀躋上耋五世一堂錫光篤慶介景延禧允為史册罕覯升平盛瑞兹王公大臣及直省將軍大吏等以乾隆五十五年朕八旬萬夀籲請舉行慶典預祝蕃釐覽奏具見誠悃前此朕七旬慶節內外大臣奏懇恭祝萬夀朕以徒增縻費未俞所請今內而王公大臣外而將軍督撫大吏以朕夀屆八旬臣工身際昌期久承渥澤感激歡忭出自積誠朕若仍不允準無以申臣下臚歡祝嘏之願轉似近於矯情且載稽前史三代以後帝王克享大年蒞國最久者不過六君其年逾八旬者僅梁武帝宋高宗元世祖三君而其在位則不過三四十年若朕躬膺上夀海宇乂寧親理萬幾孜孜不倦五十餘年如一日者實古所未有此皆朕仰賴上天嘉佑列祖垂庥用能膺受純熙康強逢吉允宜光昭盛軌以答昊貺而洽輿情著照所請于五十五年舉行萬夀典禮所有一切儀文俱恭照朕從前率天下臣民恭祝聖母皇太后六旬七旬八旬萬夀慶典之例備辦毋得稍有加增致滋縻費若內外臣工等不能仰體朕意惟務踵事增華鋪張過甚轉非至誠愛戴之心逮時朕亦必不受也至此次慶節率土歡騰宜特沛殊恩以光巨典所有應行加恩各事宜著內閣及軍機大臣擬開條欵進呈候朕酌定另降諭旨和碩睿親王臣淳頴率領諸王貝勒大學士九卿等謹奏為慶集昌期歡臚率土敬陳積悃願睹隆儀事欽惟我皇上福備箕疇治光軒紀慎厥修而思永寅紹丕基久于道以化成緝熙純嘏建極保極會運世乃統于元大生廣生祿位名必得其夀粵若紀逢開甲萃一堂五代之祥洎兹嵗叶先庚肇萬夀八旬之慶功文極乎巍煥典禮觀其會通瑞軼古今歡騰中外溯自豐規則大苞符開乾健之爻馨德升聞圖籙演泰元之策業兼守創纘洪緒而仔肩統合君師遍藝生而在宥神武則星源月竁𨽻漢唐宋元明莫𨽻之方輿聖文則奎藻雲章開唐虞夏商周未開之郅運况復父母羣物天地一家惠我有孚所其無逸東作西成之補助問夜求衣先河後海之宣防乘春蒞蹕罷催科于廬井鏐租普免者三停轉漕于艅艎玊粒全蠲者再千百萬帑金疊沛發綸言而山積泉流草四科慶榜聨開籲髦俊而雲蒸霞蔚是以九流仰鏡翊鞏固于金甌六氣調鈞賚延洪于玊劵蒼縡應房心之位德乃福基紫垣明角亢之占仁為夀體際淳龎之懿軌惟讓善而弗居臻盛美之上儀洵推恩其有自錫類廣施仁之量典勿奓于五旬六旬單心裕基命之原幾恆敕于一日二日逮夫古稀躋帙昊貺增庥千載一時萬方同慶瑶源育祉曽元衍姬瓞之庥翠瀣流甘耆耉普堯尊之惠珠囊錫羡未足摹繪光華玊檢登封詎能鋪張英茂顧乃道沖為用播鴻名而莫能名澤兑旡疆施美利而不言利謹德隅而念典黃屋凝旒凛心矩以敷言丹書陳扆時幾交毖昭祐助于穹儀茀祿允康席純常于景祚太和所謂道惟久則徴嘉會得其亨於斯為盛洪維椿紀迓上章之嵗覽揆延禧蘿圖應曼夀之辰期頤兆瑞披草二朝之甲子享國疇如三代以前統八千嵗為春秋介年初度百分之一實鳯籀龍編所未覩洵電樞星渚之莫京猶復謙德彌尊淵衷益懋際纍洽重熙之治華祝三辭厪持盈保泰之懷豳觥再讓典隆法祖考鴻章而已展草年祜篤承天富鼎籙而粵開萬祀雖元功不宰大鈞昭易簡之符而協氣所蒸寰宇切尊親之戴驗風受吏梯航無間于遐陬獻曝酬恩舞蹈不遺于編户沐陽春之煦育草木貢其蕃廡覩復旦之文明星雲呈其糾縵揆厥感孚之理倍萬歡欣凖諸協應之情大千讃誦臣等幸依黼座常侍彤廷仰晬穆之天顔康強逢吉祝升恆之聖笇福祿來崇夀宇偕逰頌禱罕徴諸史牒恩輝久被就瞻彌篤于班行竊惟鞠􅎽稱觴共志循陔之喜矧夫賡揚拜手羣伸聨陛之歡荷燾載之深仁效抒誠于葵藿普垓埏之至樂擬祝嘏于臺萊伏願俯順輿情踵修巨典集千春之慶祉量福海以添籌合九宇之歡心測恆沙而益紀庶幾郊逰棷集咸應帝期巷舞衢謡交陳王會九萬里圓顱方趾褰裳來鶼鰈之區三千叟皓首龎眉扶杖集龍鸞之隊臣等實深踴躍歡忭激切屏營之至謹合詞恭摺具奏伏祈皇上聖鑒施行謹奏將軍臣都爾嘉同直省將軍總督巡撫提督總兵都統學政鹽關織造諸臣等謹奏為聖夀凝禧輿情積忭敬抒誠籲共懇恩俞事欽惟我皇上福基自德夀本諸仁積籌開七帙之初既超六帝而治功甚逺握籙越五旬而外更後三代而往牒未聞仰敬天法祖愛民勤政之心豫億兆人以共見臚文德武功創制顯庸之盛絫千萬牘而難窮莫贊一詞維抒衆志達下情之忠孝彰上瑞之苞符必有德乃其有心曰以頌實蘄以祝竊以天皇萬嵗史臣喜紀其春秋黃帝百年大撓慶編其甲子堯耄期而勤著衢壤效歌舜大德而夀符星雲同慶雅賡戬穀徴日長川至之祥豳晉無疆躋朋酒羔羊之獻允合詩書之古義真由草野之至情惟我聖主久道化成惠心元吉撫綏黎庶則蠲紓賑備之不絶書覆冒臣工則教誨成全者亦多術特科廣選澤屢被于縫衣厚廪酬軍恩悉周于袀服極天所覆偕一十八省而共樂舒長入人也深閲五十二年而彌加淪浹凡平日之塗歌巷舞咸欽有道聖人際昌辰而膜頂焚香同依無量夀佛前值古稀之鴻度並􅎋祝嘏之蟻忱皇上謙德示沖天懷崇儉念切於君心民體知兆姓有願稱觥樂惟在吏畏民懷諭列服無庸詣闕莫展祝釐之典仍邀行慶之恩雖天地為心如父母不言施報而嵗月以兾即愚賤亦具性情含意未申久懷欲吐事豫則立積七年當後甲之辰誠感而通期萬夀值先庚之嵗虹流電繞箕疇備五福之堂日升月恆軒紀周八旬之算蘭階就傅蕃椒衍瓞之益臻楓扆敕幾食旰衣宵之逾劭日又新而富有天不息而貞恆八卦生八卦成八八紀大衍之䇿五數天五數地五五居河圖之中運悠於乾清坤寧慶洽乎上蟠下際皇春帝夏閲夀宇而偕逰卿月民星望春臺而共上虔思引領肅布齊心嵗序逢春在蟲鳥亦鳴其豫曦光正午凡夭翹莫閟其榮山當呼嵩嶽之三水解向朝宗之四况乎三千人叟宴引熙朝長養之年亦有二百户元孫羅盛世蕃滋之衆銅鳩竹馬各懷益夀之心極北弧南併作稱觴之宇自天子所莫不尊親為聖人氓偕來奔走軒乎舞鼚乎鼓音如大海潮音暢者垓溯者埏數比恆河沙數願乘嘉會樂舉上儀叶萬夀之逢辰先三秋而卜吉相小民之年及嵗尚邀束帛之頒如赤子之夀其親猶效萊衣之舞芹雖微而可獻曝亦寫忱葵以賤而知傾日能回照臣等情依愛景職在宣風仰乘乾出震持謙保泰之衷康強逢吉萃東漸西被北燮南諧之悃聲教大同採自輶軒民之情大可見酌言康爵天之聽且弗違仰懇俞音獲成盛禮粵惟述祖德期已展於草年從此祝聖人典更隆於萬度斂厥福錫厥數五皇極而道乃會歸南有臺北有萊萬夀祺惟民之父母兹據官紳兵民等合詞歡籲前來臣等謹合同繕摺具奏伏乞皇上聖鑒施行謹奏乾隆五十三年三月十四日特派大臣總理五十五年萬夀慶典事宜乾隆五十三年三月十四日內閣奉上諭上年八月王公大臣及直省將軍督撫大吏等以乾隆五十五年朕八旬萬夀籲請舉行慶典朕因王公內外大臣等身際昌期久承渥澤臚歡祝嘏出自積誠且朕自臨御以來親理萬幾孜孜不倦五十餘年如一日兹仰荷上蒼眷佑列祖垂庥膺受純熙錫光篤慶躬躋上夀五世一堂實古所未有允宜光昭盛軌以答景貺若却而不行轉覺矯情是以特俞所請並恐王公內外大臣等過事鋪張業經諄切諭令祇照聖母皇太后六旬七旬八旬萬夀慶典之例備辦毋得稍有加增現在王公內外大臣等因朕俯允所請踴躍歡忭亟欲抒誠其應備儀文典禮甚巨若不専派大臣董理其事恐承辦之員未喻朕意仍不免踵事增華致滋繁費非所以體朕嘉與諸臣效誠獻悃之心也所有五十五年萬夀慶典各事宜著派阿桂和珅劉墉福長安胡季堂金簡李綬伊齡阿總辦以期經理得當用光巨典臣阿桂等謹奏為天開夀宇薄海臚歡敬伸祝嘏微忱恭襄盛典事乾隆五十二年八月十六日奉上諭兹王公大臣及直省將軍大吏等以乾隆五十五年朕八旬萬夀籲請舉行慶典預祝蕃釐覽奏具見誠悃著照所請於五十五年舉行萬夀典禮等因欽此又於本年三月十四日欽奉上諭現在王公內外大臣等因朕俯允所請踴躍歡忭亟欲抒誠其應備儀文典禮甚巨若不専派大臣董理其事恐承辦之員未喻朕意仍不免踵事增華致滋繁費所有五十五年萬夀慶典各事宜著派阿桂和珅劉墉福長安胡季堂金簡李綬伊齡阿總辦以期經理得當用光巨典欽此竊臣等身際昌期恭遇皇上八旬萬夀普天同慶率土騰歡凡內外大小臣工莫不欲各抒忱悃共效祝釐臣等前經酌定章程並將內外大小臣工願抒經費分别清單恭呈御覽後面奉諭旨朕八旬萬夀舉行慶典原因王公大臣等籲請祝釐出自積誠俯俞所請止需令伊等少出經費以遂其臚歡祝嘏之願不必踵事增華過於縻費前所降諭旨甚明今所擬經費各數未免太多著將章程另為酌議並將經費再行酌減具奏欽此仰見我皇上體恤羣工黜華崇儉之至意臣等復將原定章程及原議經費各數悉心酌議大為核減惟期儀文隆備不敢過事鋪張恭查從前二十六年三十六年節經總理大臣等奏準自西華門至西直門分為三段令兩淮長蘆浙江商衆來京辦理點景西直門外自長河一帶至暢春園宫門舊有房座亭臺重加修理由總理大臣等相地間段點設景物城內外兩旁鋪面一律修葺整齊油飾見新所需經費由王公大臣八旗各部院衙門及各省督撫解交應用工竣後據實核銷等因在案今此次應請仍照從前辦定之例自西華門至西直門仍分三段段令兩淮長蘆浙江商衆來京自行辦理點景以遂其衢歌巷舞之忱臣等仍董率稽查其西直門外石道兩旁至圓明園宫門前臣等酌量地勢點綴亭臺房座山樹景物使疏密相間不至過於繁費至城內城外兩旁鋪面房間亦一例修葺油飾見新俾觀瞻整肅臣等派員詳細踏勘另行繪圖恭呈御覽敬候聖明指示再行核實辦理報銷所有王公大臣八旗各部院官員應交經費行令户部在各該員俸廉內分别坐扣其各省督撫府尹將軍副都統鹽政織造監督等應交經費容臣等寄信令其毋庸解京即令各於本省藩庫運庫織造關稅等庫就近存貯候撥臣等於户部間欵項下照數撥運廣儲司另貯備用以省將軍督撫等運解之繁至各省督撫應交之項臣等現在按其通省養廉數目量其多寡酌量令其扣繳十分之二五俾各督撫等既得效悃抒誠而養廉仍有贏餘足敷辦公之用仍令不得借端派纍致滋弊竇是否有當伏祈訓示為此恭摺具奏伏乞皇上睿鑒謹奏乾隆五十五年旨諭直省將軍督撫副都統提鎮藩臬諸臣每省特派二三員來京并酌帶道府丞倅將備等隨班慶祝乾隆五十五年正月二十九日奉上諭朕本年八旬萬夀寰宇臚歡薄海內外臣民咸深慶忭即在屬國藩封或親赴闕廷或遣使叩覲無不競趨王會抒悃祝釐外省將軍督撫副都統提鎮藩臬等官自必情切葵傾羣思瞻覲苐念各省文武大吏職守綦重若同時並赴恐地方營伍事務管理乏人或有貽悮轉非敬事效忱之意朕於各省將軍督撫副都統提鎮藩臬內每省各酌派二三員均于八月初五日以前到京並各酌帶道府丞倅將備等二三人隨同班列其未經派定來京者毋庸紛紛籲請庶各省文武官員既得遂其祝嘏之忱而於本任職司要務又可不虞曠廢方為妥善將此通諭知之遵旨赴京祝嘏文武大員兩廣總督協辦大學士公福康安直𨽻總督梁肯堂署江西巡撫姚棻福建巡撫徐嗣曽湖北巡撫惠齡河南巡撫穆和藺雲南巡撫談尚忠江寧布政使陳大文江蘇布政使奇豐額山東布政使繆其吉山西布政使鄭源璹甘肅布政使蔣兆奎四川布政使和寧廣東布政使許祖京廣西布政使英善貴州布政使汪新直𨽻按察使阿精阿江西按察使司馬騊湖北按察使孫曰秉湖南按察使恩長陜西按察使姚學瑛廣西按察使湯雄業黑龍江將軍都爾嘉寧夏將軍旺沁班巴爾福州將軍魁倫杭州將軍寶琳荆州將軍圖桑阿江寧將軍永慶察哈爾都統保泰錦州副都統薩克慎吉林副都統索喜伯都訥副都統僧保齊齊哈爾副都統巴里木達西安副都統阿克棟阿涼州副都統竒臣乍浦副都統科靈阿福州副都統色克圖青州副都統慶霖直𨽻提督閻正祥江南提督陳大用固原提督王彚浙江提督陳杰四川提督成德廣東提督高瑹廣西提督梁朝桂宣化鎮總兵愛星阿蘇松鎮總兵魏轍建寧鎮總兵顔鳴漢黃巖鎮總兵劉文敏定海鎮總兵伊里布登州鎮總兵朱泰德大同鎮總兵巴揚阿河北鎮總兵王普重慶鎮總兵諸神保永州鎮總兵劉君輔襄陽鎮總兵彭之年宜昌鎮總兵馬定鼒碣石鎮總兵陳莊臨元鎮總兵定柱騰越鎮總兵劉之仁安籠鎮總兵范建豐督撫臣等疏報直省耆民遵奉不必來京恩旨恭載門恩賚俱於各本籍叩祝萬夀江蘇巡撫臣福嵩謹奏為耆民遵奉恩旨在籍慶祝萬夀事竊臣欽奉諭旨前恐各省耆民等情􅎋葵向思欲逺來效悃祝釐此等年老之人正須頤養跋涉辛勤轉非朕安老引年之意特明降諭旨令各督撫轉飭地方官出示曉諭不必來京等因欽此臣跪讀之下仰見我皇上體恤耆民恩施優渥之至意伏思本年恭逢聖主八旬萬夀普天洽慶薄海臚歡江省耆民情􅎋葵向咸思赴京叩祝競效嵩呼各府州縣官據情籲請者不一而足臣欽遵前奉諭旨謹將皇上體念高年恐致跋涉辛勤之恩意明白宣布未經伴送起程除應行賞給粟布等項先已照例分别給賞外並諭以爾等祝嘏情􅎋不妨於本府縣萬夀宫門外隨官叩祝臨時仍賞夀麵與食併給與銀牌各耆民俱皆同聲抃頌感戴皇仁兹當慶賀之辰各府州縣等詳稱該耆老人民或隨地方文武官員在本城內萬夀宫龍亭前歡呼拜舞或就各鄉村市鎮扶老挈童捧香叩祝共稱聖夀無疆實為非常慶幸所有臣遵旨曉諭未令耆民赴京俱在籍慶祝緣由理合具摺奏聞伏乞皇上睿鑒謹奏以後各省奏報同臣等謹案周官嘉禮之職六曰賀慶蓋朝廷有備致之福祥臣下之愈慶同之爰乃臚歡志喜於非常而克成盛禮焉我皇上八帙昌辰臣等獲奉俞音敬修茂典屢繹聖訓諄諄以毋侈繁文毋涉縻費為誡期協典則之宜是以專董事之責成裁經費之浮冗籌酌悉歸盡善而又親遴詣闕諸臣昭慎重於職守于時悃忱畢達當大慶鴻龎之際荷聖慈曲體之加莫不忭躍奮興願偕擊壤堯民長深頂祝是則熙朝禮度極情深而文明從兹億紀延洪有益切無疆之慶者耳八旬萬夀盛典卷五十
