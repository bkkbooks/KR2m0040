body:
  text: 典禮三慶祝三琉球國王尚穆遣陪臣朝正預祝萬夀如禮琉球國中山王臣尚穆誠歡誠忭稽首頓首謹奉表上賀伏以聖德覃敷萬國歸心而拱極皇齡衍慶八方效祝以朝宗航海梯山玉帛來同於禹甸望雲就日冠裳率舞於堯階喜溢寰區歡騰海表欽惟皇帝陛下夀齊天地福被乾坤合九有以享王久洽綏懷之德履萬年而悠久益增曼羡之庥率土歡呼普天稱慶臣穆每值梯航之嵗但深拜舞之心今天朝純嘏用錫方照臨普而日月長在下國職貢以時則風雨調而年嵗稔爰齎方物虔蘄椿算之崇恭祝聖禧聊獻葵傾之悃謹遣陪臣紫巾官向處中正議大夫鄭永功等薰沐奉表叩祝萬萬年之慶外恭進金鶴形一對鶴蹈銀岩座各全五爪龍碗三十個五爪龍盤三十個花素蕉布一百五十匹綵畫圍屏一對圍屏箋五千張福夀箋五千張錦扇二百柄薄修琛賮之末愧阻蹈抃之班遙企恩暉有如躬叩伏願泰運長亨夀圖孔厚聖而益聖溥德澤於環瀛年復加年備綏成之茀祿臣無任瞻天仰聖歡喜頌禱之至謹奉表稱賀以聞暹羅國王鄭華遣陪臣朝正預慶萬夀是年秋復陳祝如禮暹羅國王臣鄭華誠惶誠恐稽首叩首大皇帝陛下萬嵗萬嵗萬萬嵗伏以聖德崇隆備膺乎位祿名夀皇仁溥博大沛乎南朔東西普天之下沐化日而景光華重譯之邦測海水而修職貢况臣身沐鴻恩荷受藩封敢不敬獻菲誠以效芹曝兹期值年貢偹物表虔而尤難遇者欣逢聖天子萬年正夀共祝華封九州陳玉帛之辰萬國拜冕旒之日鳯儀獸舞成天上之簫韶鰈水鶼林極人間之翔泳臣忝叨蔭庇際斯吉祥泰運宜應親自航海赴京泥首階次祝嘏稱觴方遂所願但僻處重洋職守難離只得朝北辰而叩祝隔南瀛以拜揚兹備年貢方物外另備慶祝萬夀方物一分特遣使臣丕雅史滑里遜通那赤突帕喎汶悉呢􅀈喔撫突朗拔察那丕汶知突汶丕匹汙遮辦事代躬泥首匍赴金闕叩祝萬夀無疆臣不勝榮幸感激之至謹拜表以聞廣東巡撫臣郭世勳謹奏為外夷祝嘏情殷恭摺奏請聖鑒事本年七月十一日準暹羅國王鄭華咨開下國于上年遣使呈進例貢附呈慶祝萬夀貢品業蒙轉奏欽奉諭旨令將萬夀貢使一併于年底到京俟新正頒詔時準其同伸叩祝皇恩髙厚感激無涯惟是致慶愧未應期心切惶悚兹專具表文方物遣陪臣等恭賫應期赴京隨班叩祝聖夀俾小國未使得瞻王會之盛尤深慶幸臣等察核情詞倍極尊親之戴其歡欣踴躍實出至誠所有暹羅國籲請貢祝合先奏聞並將該國王表文咨文譯呈御覽伏乞皇上睿鑒謹奏暹羅國王臣鄭華誠歡誠慶稽首叩首上祝大皇帝陛下萬嵗萬嵗萬萬嵗伏以夀宇禧凝人獻華封之祝熙朝瑞靄數添海屋之籌軒紀八旬之慶攸長箕疇五福之隆大備躋堂酌斚誼尤切于外臣航海奉琛誠實深于下國臣忝受皇恩深重因職守海隅不能親自赴京祝嘏然身處南瀛心拱北極葵向之私彌為親摯是以前附例貢預展慶賀萬夀之誠荷蒙聖諭準其新正叩祝兹專敬具金葉表文一道大夀燭十對馴象一對及各方物特遣使臣拍簮令思逺那末蚋剎秃􅀈疏越理買抵屋八秃等賫詣京師匍伏金闕代躬泥首恭祝萬夀無疆藉申頌禱之忱俾預王會之盛臣不勝歡幸感激之至謹拜表以聞廓爾喀國長拉特納巴都爾遣畨目入覲恭獻夀經元旦隨班預祝萬夀如禮禮部謹奏為奏聞事竊查廓爾喀遣來頭目人等已於嵗前到京於十二月二十一日在西苑門外恭覲天顔節次蒙恩宴賚本年欣逢皇上八旬萬夀臣部恭請舉行元旦朝賀禮儀照例令該頭目人等隨班行禮俾得同伸末悃叩祝鴻釐為此謹奏大頭目二名巴拉巴都爾喀哇斯哈哩薩野小頭目六名怎達克德哩僧克墨呢喀哇斯布底巴拉喀哇斯碧瑪哩碧喜扎巴爾底滿巴碟巴拉碧爾喇野散畨十七名御製詠廓爾喀所進貝葉經用乙卯詠貝葉經詩韻庚戌戊申藏事費親裁廓爾喀歸誠息戰賅前嵗廓爾喀侵擾後藏邊界命鄂輝等率兵往討彼一聞大兵將至遂即逺遁繼又悉其有屈抑未伸因治慶林等阻不以聞之罪于是廓爾喀中心感服即願歸誠降順可謂不戰而屈人之兵者矣爰以錦函進葵表先之貝葉出蓮臺痕都别部隔遙逺信使昨年始到來廓爾喀乃厄訥特可克䀶都斯坦之别部距京師將二萬里自去嵗夏初鄂輝等具奏廓爾喀情願歸順降旨允其入覲今彼所遣大頭人巴拉巴都爾喀哇斯等于嵗內嘉平望間始到京因識一仁物可格似勝千旅力為摧畨僧有目迷空霧貝葉經出厄訥特可克即釋迦宣教本處衛藏不多見也內府祇弆一部逮此而雨京師雖多衛藏喇嘛僧然所識皆畨字至厄訥特可克之梵字率不能識非智慧聰明深解梵義者不能昔惟班禪額爾德呪及章嘉國師識之內府舊弆梵字無量夀經即章嘉所檢出者今閲貝葉經文與舊者同故知為無量夀經也梵帙無聲演法雷却與舊藏成合璧三乘於是潔宗荄四川甘肅土司恭祝萬夀是月十三日叩覲於避暑山莊仍入京稱慶如禮署四川總督臣孫士毅等謹奏為土司頭人進京慶祝萬夀恭摺奏聞事竊照本年川省各土司年班入覲前奉諭旨令各土司等於七月底到京與安南暹羅等國一同朝賀瞻仰祝釐盛事等因欽此臣等當將川省西南兩路所屬各部落土司按其應行進京班次分别𣲖調並恭摺奏請帶領進京仰蒙俞允茲據各該處土司頭人等以本年恭遇聖主八旬萬夀歡騰中外重譯來朝為普天同慶之昌期實千古難逢之盛典各土司受恩深重莫不願效嵩呼逺近爭先紛紛籲請在該畨等情敫瞻仰羣思赴京祝釐均出至誠惟是部落既多逺近不一未便概從所請臣等酌將未屆班次住居較逺者善為撫諭令各管束畨衆安靜住牧歸于下次班內赴京其本年應屆進京者飭令如期就道謹照四十五年前赴熱河恭祝萬夀所帶各土司數目酌定現已派調松潘建昌所屬之明正穆坪瓦寺穆裡靜州冷邊巴塘等正副土司七員名鄂克什從嘎克綽斯甲布莎謨丹巴卓克采東科爾裡塘巴旺布喇克迪德爾格忒土舍大頭人二十一名金川之河東河西八卦碉别思滿汗牛雜谷五寨屯備辨八名土千户內之雲昌包子寺麥雜蛇灣寒攀起敏五員名約共二十餘處共土司土舍大小頭人四十餘名屆期仍照上次分起行走沿途需員照料查川省現蒙恩旨著派道府丞倅將備各員隨同班列以申祝嘏臣等啇酌即於此項人員內㨂選熟悉畨務者就便帶領均于八月初五日以前至京俾各畨等妥適遄行以期仰副聖主體恤懷柔之至意合先恭摺會奏伏乞皇上睿鑒謹奏明正宣慰司甲勒恭德侵遣伊子甲木參諾爾布穆坪宣慰司甲勒參納木喀穆裡安撫司桑結扎布穆裡土舍胡圖克圖阿旺巴勒丹甲木錯瓦寺安撫司索諾木永忠冷邊長官司周廷棟靜州長官司董勤什巴塘宣撫副土司成勒春丕勒鄂克什安撫司丹怎嘉木錯遣土舍安多爾莎謨宣慰司丹巴遣頭人阿拉卓克采長官司聶噶爾布木遣頭人呢瑪卑勒丹巴長官司棍噶丹怎嘉木錯遣頭人那木嘉勒東科爾長官司胡圖堅圖巴根敦嘉木錯遣頭人喇嘛伊吉控薩安撫司䇿勒丹納木扎勒遣頭人衮布䇿聆裡塘宣撫司阿郤錯氏遣大頭人扎什登珠布巴旺宣慰司雍中嘉勒遣頭人扎什嘉勒布喇克迪宣慰司阿多爾遣頭人沙嘉多爾結布木雲昌寺土千户索諾木包子寺土千户索諾木麥雜蛇灣寨土千户䇿旺雅寒攀寨土千户喇嘛嘉木起敏寨土千户曽相乾堡寨土守備嘉木錯扎布丹巴别思滿土守備琅爾結汗牛土守備棍噶河東土守備丹巴西拉布河西土千總僧格明正頭人登珠扎布小頭人甲噶多爾濟穆坪宣慰司甲勒參納木喀之子丹怎旺嘉勒穆坪頭人包上賓小頭人包添華穆裡頭人舍拉布嘉勒燦羅布藏索諾木瓦寺土舍索諾木文錦頭人羅嘉勒冷邊頭人周玉山靜州頭人伊濟塔爾巴塘頭人阿蒼鄂克什頭人琳親塔爾從嘎克小頭人僧格綽斯甲布小頭人果郭特陕甘總督臣勒保跪奏為土司懇請叩祝萬夀恭摺奏聞事據甘肅布政使蔣兆奎詳據洮州土司世襲指揮僉事楊宗業呈稱宗業世受天朝豢養深恩自乾隆四十六年承襲土職仰荷賞加正三品頂帶並蒙賞戴花翎感激鴻慈十載以來涓埃莫報本年恭逢皇上八旬萬夀普天同慶宗業幸際昌期實深歡忭用敢瀝情懇奏請俯準進京叩祝以伸蟻悃曷勝榮幸等情到臣伏查各該大小土司仰蒙聖主綏輯懷柔恩同覆載乾隆五十一年莊浪土司魯璠懇請入覲經前督臣奏準隨同回城伯克進京并欽奉上諭嗣後該省各土司有情殷瞻覲者俱賞給馹廩以示體恤等因欽此欽遵今該土司楊宗業因欣逢皇上八旬萬夀情殷祝嘏籲請進京察其情意實出至誠理合據情奏懇可否準其前赴闕廷隨班叩祝之處出自聖恩如蒙俞允容臣飭知該土司俟本年各回城伯克赴熱河恭祝萬夀時即令該土司隨同行走俾伸誠悃為此恭摺具奏伏乞皇上睿鑒謹奏臺灣生畨恭祝萬夀是月十三日叩覲於避暑山莊仍入京稱慶如禮御製臺灣提督奎林布政使萬鍾傑奏報生畨虔請赴京祝夀詩以志事庚戌生畨巢內山化外教無頒靖逆嘉力助朝正厚賜還前福康安等帶兵剿捕臺灣逆匪林爽文莊大田內山生畨均知向化協同搜捕俾凶渠不致漏網臺灣平定後屋鼇等社生畨于五十三年臘月入覲朝正因優加宴賚遣還路三胥羡社呼萬願隨班兹奎林等奏北路之獅仔等四社中路之八洞關等四社南路之望仔立等四社共生畨頭目十二名懇請赴京祝萬夀于三月內風浪恬靜時內渡等語雖曰弗關政國威鬯海寰臺灣提督臣奎林等謹奏為臺灣生畨籲請赴京慶祝恭摺奏聞事竊照臺灣各社生畨自上年春間由京回社之後據道府稟報該畨等得覲天顔霑被皇仁交相榮幸其上次未及進京之畨聞之益深欣慕又據清查埔地各員稟稱該畨等出界叩頭各求輪流進京等語臣等以叩求進京之畨係何社何名共有若干是否出于至誠俱飭確查去後今據覆北路獅仔等四社中路八洞關等四社南路望仔立等四社共計生畨頭目十二人俱係情出至誠籲求入京叩祝萬夀現飭熟悉生畨之義民首等帶領來郡於三月內海波恬靜當即委貟護送內渡等情前來臣等復查南北中三路馴化生畨上次未及進京者前經附摺聲請準于次年陸續到京欽奉俞允在案今嵗恭逢皇上八旬萬夀該畨等虔懇入都叩祝其喁喁向化之誠似難阻抑臣等現飭厦門海口及經過地方官照料至省臣等親加察詢再飭妥協護送赴京所有生畨籲請赴京慶祝緣由理合恭摺奏聞謹奏獅仔社畨頭目懷目懷沙裡興社畨頭目烏答老域末篤社畨頭目囉沙懷祝屋鼇社畨頭目也􅀈哇丹八洞關社畨頭目邁阿台珠蘿大埔社畨頭目投旺茄茇藔社畨頭目阿眉達主吧里荖濃社畨頭目勞達樓兵雅望仔立社畨頭目均力力旺子立社畨頭目阿邦七腳亭社畨頭目知母戀浮圳鹿社畨頭目大匏西洋人供職欽天監各員恭祝萬夀隨班稱慶如禮欽天監謹奏為慶祝萬夀事據西洋人監正監副及各堂供職人員等呈稱本年欣逢皇上八旬萬夀大慶西洋在京各貟例應隨班慶祝謹呈得勝圗册玻璃杯合西洋香等物藉伸蟻悃恭慶鴻釐屆日懇請隨班叩祝不勝榮忭之至等因理合謹具奏聞伏乞皇上睿鑒謹奏西洋波爾都亞國人安國寧索德超湯士選張繼賢劉思永西洋弗郎濟爾亞國人趙進修錢德明潘廷璋賀清泰羅廣祥吉德明巴茂興西洋依大理亞國人德天賜羅繼洲髙臨洲彥思莫麥守德臣等竊惟嵞山玉帛王會爻閭固足彰暨訖之同風而無與於獻祝來朝之令典若夫蕃王蠻使陪位上夀史册間亦稱之要亦不過盛文物之鋪張非實有逺介長年羣方輳集之慶方今化澤綏柔八荒在闥幸為臣僕者無不快生逢聖世煦育於仁夀之宇日惟傾心企踵冀效祝於萬年乃者八帙崇釐垓瀛萃祉若蒙古回部之舊𨽻若安南國王之新封先後偕徠身親獻夀若朝鮮南掌緬甸琉球暹羅諸國或遣價以代躬或先春而預慶畢達于重譯又若土目社畨之叩覲西洋微職之綴班凡皆以獲預稱祝為榮且庶乎共效其尊親之戴者也臣等恭讀御詩有生身鱗集西合北虔念駢臻東及南之句既以徴翕慶於非常而大聖人之謙鞏持盈於斯倍切以是知聖朝丕冒如天體之大圜併包無外斯聖齡悠逺亦如天之運行不息舉得仰而知戴者焉夫豈僅紀中外一家之盛謂遂足以宣昭鴻典也哉八旬萬夀盛典卷五十二
