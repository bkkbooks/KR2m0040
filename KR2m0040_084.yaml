body:
  text: 欽定四庫全書八旬萬夀盛典卷八十五歌頌五萬夀恭擬念雅十章謹序大學士臣王杰欽惟我皇上躋敬日彊安仁益夀歛時五福慶衍無極今嵗恭逢聖夀八旬䔍膺天佑歡騰宙合慶溢臣民皇上特鐫八徵耄念之寳並御製記文以示𠡠㡬凝命之至意淵哉穆乎非愚臣所能究宣也竊以治道莫備扵尚書禹陳六府三事善政養民而先之曰帝念哉傳者以為重其詞誠以自古帝王撫時出治宰世子民莫不本諸一念之誠周乎四海之廣所謂心法為治法之原一以貫之也而念之大者莫如洪範雨暘燠寒風之庶徵盖昊天以隂陽五行之運亭育萬物寒暑迭應品物咸彰所以主宰之者理也聖人覆燾民物有與天合契之徳則必能荷天寵錫悠久無疆所以凝承之者念也且念用為洪範之次八而九疇全體實無不包涵綜貫扵其中故五者之徵本乎地則為水火木金土應乎人則為貎言視聴思形扵治法則八政以是舉三徳以是治達扵天道則五紀有由協稽疑有由同皇極既建五福備臻惟敬念有以致之臣恭讀御製讀洪範篇曰疇雖有九無不闗扵為君者之一身一心盖云念也又曰春雨冬雪無不先時忖度切切扵懐盖云念庶徵也大矣㦲膺福凝禧與泰清泰寧同其恒乆者其見扵此矣惟聖人以一人之福錫為天下臣民之福則天下臣民咸願以億萬萬人之夀仰増大聖人之夀此又理所固然誠所必至者也皇上駿徳鴻猷純熙浃乎海㝢以臣之愚詎能頌述髙深扵萬一惟是近聖人之光至親且乆竊見皇上念念不忘者大之若齋肅以承昊眷寅恭以紹祖烈旰宵以勤㡬務修和以播仁恩以至觀文而至教敷經武而鴻勲集而且藴之為聖學發之為奎製或先天而篤感召之原或奉時而盡裁成之用要無一時一事不與庶徵之念相維繫而睿念鞏謙孜孜惕惕方鐫寳以自勵禎符㑹合瑞應昭彰盖大徳超乎皇王福慶逾扵羲昊矣葵藿之忱竊用歡欣舞蹈不能自己敬依念用庶徵之義緝為念雅十章稽首頓首以進其辭曰昊眷維清膺圖發祥我皇曼夀曰篤不忘寅奉天縡眀旦皇皇健法天行不息自强行無皇上懋膺息乙巳臨雍天眷昕夕欽承健暨前後經筵御論屡以乾卦大象發明自强不息之義嵗三大祀必躬必荘凝承鴻貺上達馨香詣行皇上極誠敬南北郊大祀必今閲親禮備自御極至數十年益昭䖍恪自民視聴回旋義詳世宗傳聖祖用敬天勤民之寳旋協皇上御製四言詩扵視聴惟民廻應之理三致意焉論開羣蒙順天者昌西師告成闡發御製開惑論特掲信理天主人順天者昌之惟天扵民若時雨暘暨燠寒風五叙有常嘉庥滋至皇逾不敢康不可言報承之以蘉成熱御製平䑓灣告河文廟碑文有云子扵父天地者天子之父母母不可言報奉時斂福敬荅顥蒼錫御製八徵耋念之寳記有云予之所寅承政與羡當何如亦曰體天愛民誠心勤洪範五之斂錫八之念徵孜孜惕惕日進無彊云爾欽念以忱純佑無疆右昊眷章第一祖烈顯承聖聖綏祜䔍祐我皇紹庭上下叶以守為創神眀規矩恭讀成難御製創業守易說敬仰烈皇上覲身兼創光揚任實以一守之煌煌盛烈紀薩爾滸之戰御製文惓惓太祖大破眀師扵薩爾滸山書事扵凝命鞏圖示億萬年子孫臣庶無忘難焉祖宗創業之艱實錄䖍誦百千萬數興恭皇上敬承實錄一前烈毎日夙覽卷始出視事大訓恪遵矞皇天府射懍遵祖宗寳訓毎恭述以宣示臣工如衣冠騎舊制肄勤勞崇儉樸訓示不啻再三䋲武六廵海河式叙叶皇上聖祖仁皇帝廵江南者六次敬䋲祖武自辛未至甲辰六舉周而南廵之典扵凡察吏安民行慶施恵澤靡不海塘河防親承睿畧訓定者為尤大定清口水誌扵壬午改遷陶荘引河扵丙午改築浙江石塘扵庚子接築石塘扵甲辰髙堰則増卑易薄徐州則接築石堤規畫周詳萬世永賴嵗位山荘綏藩覲武地聖祖締搆山荘為柔逺詰戎重皇上自辛酉以来嵗必臨莅仲秋行獮木蘭輳環訓武頒恵新舊各藩部順時展覲輻轃撫綏備至陪亰慤臨懋集純嘏詠皇上四廵歌述盛亰䔍念祖徳念天前猷著之世眷允為萬法程紀恩訓懸羮墻如覩邇年皇上冲齡膺受扵圓眀園及避署聖祖䔍眷山荘皆有紀之自扵恩堂記扵受恩山荘紀御園紀受蹟恩之唯至孝根心丕顯宏緒本而皇上聖孝誠䔍永言維則實為眀天察地之孝之大者尤在纂前烈育黎元垂億萬年無疆之慶伏讀紹承御論有云人君之孝與庶人不同而競競以先烈為重此所以光纉無極也訓謨繼䋲萬姓暑寒八方風雨漠瀛来宗覆育同㝢周頌有言念茲皇祖右祖烈章第二時㡬在勤正位凝命咸速恒乆億齡仰聖㡬不啻萬因心緯經此㡬御論一日二日萬㡬有云應訓心而不訓事事之来扵外者非以心應之扵内乎心藴扵中無一息之停則其思慮有不啻以萬計者無逸掲屏周書無逸一篇莅政皇上御書數四如屏圓眀園静宜園引見之所御皆掲是萹久道在敬言足御製讀召誥文以曷其奈何弗敬一蔽全書實千古讀尚書者所未及拓統振綱表勵庶正大吏親掄百僚日覲悉由皇上簡任官僚内自閣部九卿外而封畺大吏宸鑒掄擢因材委任毎日引見内外官員黜陟勸勵備盡随材器使之道燭秉章披綸宣猷定民隠周知桴發響應咨畺皇上勤恤民隠周吏凡地方事宜有可以厚民生遂民性者之淹訓示允行未嘗有晷刻斷必先機鑒惟圓鏡紫殿巍峩額顔辰映我以朝自㡬務為列祖創業以来尤勤飭亟皇上扵書静宜圓額實本避暑山荘題聖祖臨御之地皆以勤政瀛臺世宗題園圓明之制懿列祖以来訓勤錫慶觧雨應節巽風依令兩曜均眀四時為柄惟耄益勤念哉善政右時㡬章第三仁恩育物皇世如春吟徳懐和依我大君錫以多福泰平夀人帝厪耕作四推躬親下自皇上夀逾古稀尚臨御以来親躬耕耤田以勸率天耕之典凡舉行二十八次帝軫食天民糓數陳順治初年天下民數一千六十三萬口近来増至二萬八千餘萬口乾隆初年各省倉糓三千五百餘萬石近年四千二十一萬石野溥甘澤馳驛是詢形皇上念切雨暘凡甘霖時玉問夜占星屢吟詠或雨澤稍稽即驛詢地方大吏得諭以毋諱飾倄易和難至論亟申而惟御論正徳利用厚生謂惟倄可以由己和不能由己必求隂陽之和雨暘以時亦惟祈年慎徳饑溺在懐而尤重扵察民隠不諱灾斯為致和之道偶歉偏隅蠲賦截囷大偶皇上軫恤黎元綏豐疊奏即以四海之或一隅偏灾必亟命蠲賑並施常賑之外毎扵新正加夫不恩展賑總期澤沛生民無一得其所疊沛殊澤正供免頻乾隆丙辰庚寅丁酉三次普免天下正供毎次計免二千七百餘萬兩丙戍己亥兩次普免七省漕粮皆令輪年停翰五載而徧欽奉鴻慶湛闓恩綸今嵗恭逢㫖各八旬萬夀普天同慶復扵元旦頒降恩省正供普免一周曠典隆恩亘古罕遘積數萬萬藏富生民上稔康樂協氣和誾有孚弗問御論有孚恵心謂不當問民而施恵又論有孚恵我徳謂不當計及人之愛戴不獨闡揚經義寔為萬世君臨之要在懐惟諄諄曰一御製八徵耄念之寳記有日未息肩萬民恒在懐念敬我衆大哉鴻鈞觀文化成覺世善俗夀宇作人以陶以淑六經榘訓百氏聫軸乃編四庫卷盈六六中大欽定四庫全書卷以三萬六千計其義宏綱皆經睿覽裁定書成庋藏於津大内文淵閣溯閣御園文源閣加避暑山荘文閣盛京文並命覆校核悉臻精善攬厥精醇薈要著錄要一欽定四庫全書薈萬二千卷共繕二部一藏園大内摛藻堂一蕆御味腴書屋曰瀾滙宗頒從天祿四庫全書告成後頒庋扵揚州文特發帑金續繕三分滙閣金山文宗閣杭州鈔文瀾閣俾東南士子傳肄習以廣文敎圜雍海流癸卯學之命詳稽古制肇建成辟雍圜水扵太彛倫堂前乙巳告皇上親臨釋奠講學多士環橋聴瞻備深榮幸特科廣目乾隆丙辰壬申庚辰庚寅己亥皆以逢國大慶特開恩科至己酉庚戌特開試八句萬夀恩科譽髦之慶亘古未有耆儒鄉㑹完場者分别賞給編修檢討學正及舉人副榜有差上塞新邉弦歌比屋西陲平定以後安西鎭西廸化等新建府州各設學官弟子熱河承徳府建立新文廟並各予鄉試中額弦誦之廣日月盛斟定禮制郊壇恭肅允飭彛倫典章儀服備具皇上欽定禮制典物宏載大清通禮並審訂禮器繪圖秉式垂訓萬禩圗式序有云自郊御製皇朝禮器壇祭器及鹵簿儀杖輦輅以次釐正冠服以彰物采樂器以備聲容觀象臺儀器武備器什皆是笵是程進御審定釐正元聲宫商肇復宫商皇上以俗工但知工尺不知即角徵羽之五音命樂部大臣扵樂章内駢注宫商俾遵循肄習以復扵古一字一音全詩譜續皇上以古樂皆注一字一音虞書依永和聲祗扵一句之數字内分抑揚髙下不得扵一字一音之内㕘以曼聲因既堙心之謬命訂正明朱載堉樂譜闢其煩手命經筵歌抑戒之詩瓊林應揚二宴歌棫樸干城之詩復以三百篇全詩未有譜定者並命詳加訂正被之宫商書成名曰詩經樂譜全書同莭同和調時玉燭念廸有功大文炳煜右觀文章第五經武維揚求是扵天征非得已纉烈承先扵御製薩爾滸山之戰書事云我畧用成太祖求是天親胃矢石授方鴻勲又藏御製非窮得堂記有云子欽承皇祖征朔漠服衛也不得已也先志擴土兼逺非敢恃亦惟是不得之强将之畧而用之耳功成九次景略洪宣平凖達瓦齊阿睦爾撒納定回兩和卓木二萬幅員儧拉促浸靖兩金川索諾木僧格桑朱波乞臣緬甸南交申䖍安南潢池竊弄刈茅菅然王倫田五蘇四十三林爽文之属惟師有本四知額懸彰知御製四知書屋記以知微知柔知剛為熙政詰戎之本勒銘濛徼如平皇上平定西陲並格登御製碑文鎸石示逺凖噶爾部則伊犁山平回部則葉爾竒木伊西洱庫爾淖爾平金川則羙諾勒烏圍噶喇依盛烈鴻勲景鑠濛極告成璧圓平伊犁回部金川並御製御製碑文告成太學戊申平臺灣有告成熱河文廟碑文法祖實勝穹碑特鐫金川之役成功命設石碉扵西山簡佽飛之士肄習攻碉既因建寺曰實勝立為雲梯健銳營眀十御製碑記云昔我山之間太宗嘗以偏師破三萬衆扵松山杏歸而建實勝寺扵其盛京以紀其烈識弗忘一也習武以豫應機以遄用如時雨綏萬慶駢候律占風八極跂延念茲戎功景貺乾乾右經武章第六聖學淵粹勵寅維嚴叡齊篤心祺夀益覃抑齊表額顧諟義諴潔治皇上自冲齡居實重華宫書室名曰抑齋為藏修典學之所是題御極以来製記御園行館所置書室無不以額御闡明陳天命謹屋滿凛顧諟欽㡬微之義至為詳切丹書頊受泰䇿羲占惟聖希天太極函三主静立極一氣是咸中正御論聖人定之以仁義而主静云賢希聖聖希天等而上之雖聖人亦無可止之功又謂人與物胥歸於中正仁義則人極立而太極復本一氣也察倫眀物不遺微纖載考天時月令候拈十二御製七候詩如化工賦物各盡精理而辨訂詳審多前儒所未窺載察地緯川瀆精探河源皇上俯察地理考核詳明河考御製四瀆詩簡眀語淮源考濟水考熱灤河濡水源考証涇清渭濁紀實皆精騐當今之實蹟訂正前古之訛傳下逮羣彚動植飛不求甚觧淵眀論芟陶有讀書不求甚觧之語御製文屢正之謂在彼隠居之士則可非所語扵帝王之學也春温秋肅四氣備兼性道之合一貫萬含念典于學與天地参右聖學章第七奎製宣昭元氣景鑠乾苞坤符日星河嶽大範式彰参兩磅礴精探性命鴻闡政略上研羲姚下周垠堮夀世立言理大物博文製盈千典謨渾噩百餘御製文初集丙辰至癸未五萹二集甲申至乙巳㡬五百萹與丙午後末刻者彚計共一千一百餘萹詩成四萬邁韺逾勺千一御製詩初集丙辰至丁卯四百餘首二集戊辰至己夘八千四百餘首三集庚辰至辛夘萬一千七百餘首四集壬辰至癸夘九千七百餘首甲辰至今恭編五集者又五千餘首彚之以四萬餘計天縱多能㡬餘偶託精理道心化工同籥涉翰皇上萬㡬之閒研墨御書宸畫造化同工皆本之精理道心非操觚家所可窺見彛訓攸垂經程是作時玉甘霖春耕秋穫天道民事感孚時若敷言皇上御製詩文本事大皇極之垂為彜訓凡大政建置無不民事親灑宸翰闡揚精藴尤以述穫未嘗天道勤為亟即如課雨占晴報霖報不申之而形歌詠盖㑹千古聖王之心法治法集其大成諸奎製洵非管蠡之見所能讃頌也念哉聖謨訓行六幕右奎製章第八大徳是基繼天立極位祿名夀惟聖必得好徳御製五福頌序謂五福皆受之扵天而攸則倄之扵人中庸言位祿名夀必推本扵大徳正蒙謂徳者福之基福者徳之致故扵攸好徳頌反覆申明詳著其義法宫大寳敬臨萬國大寳御製負扆銘有云大徳曰生曰位負扆荅陽天以民寄又思以國朝傳寳云有云人君承凝受宗付寄永膺斯寳謂夫日新厥徳祖皇天大寳命則徳足重寳而寳以愈重仰見天九重之上無日不以寅敬之懐欽承位羙利不居黎民穰積書義御製讀易繫辭上傳云鼔萬物而不與應作一句如舜禹有天下而不與之與春生夏長秋收冬藏天地實不居其功又五福富頌有云有天下者其富若無然亦有焉乃在民乎仰見聖人不侈言四海之富維以萬民豐穣為得祿之大巍巍蕩蕩名言奚測論語稱堯徳之大民無能名可見者惟成功文章至我皇上功巍文焕凡在臣民竭頌揚之忱無能想像萬一盖不獨徳盛難名即事蹟之顯著者亦非名言所能測也智仁相資萬世引翼其夀御論知者樂仁者夀云其樂豈一己之私哉實冺彼此該物我樂以天下夀以萬世盖于仁聖人大徳躋一世扵仁夀實躋萬世夀矣在昔虞舜重華被格端福賅四符我帝徳云五御製攸好徳頌有云福何由生端在于徳又福之四賅彼四則與中庸大徳得福之義實相表裏徳之廣孚綏猷允塞漠洱㑹同竁濛順則東西朔南循軌合轍八旬皇上至徳廣被無逺勿至恭逢西蔵萬夀逺近藩服自蒙古喀爾喀青海暨四衛拉特回部伯克哈薩克使臣先期鱗集而安南國王阮光平親覲祝釐朝鮮緬甸南掌暹羅諸陪臣抒悃行未慶之盛合四海為一家實為伊古有太和洽翔雲景輝赩雨莭風調保極是錫念徳不忘曼齡萬億右大徳章第九福慶自天率土歡臚角亢㑹次爾雅夀星角亢也實為八月所躔之次五十衍圖皇上肇登大寳時二十有五毎至紀年逢五則為天地旬慶若紀年逢十則聖夀適又逢五盖演之數惟五與十與易之大衍自然符合有不期然而然者泰皇成鳩萬八千俱五福五代輝耀寰區甲辰景福皇上慶得五代元孫因於宫及避暑山荘皆以五福五代顔堂並製記文欽迓天御貺百九四家榮承慶譽三千髪華垂恩賜酺奏至皇上命直省督撫查有五代同堂者以聞共計百九十四家嗣後陸續奏報共二百餘家乙巳百五國慶遵入晏者聖祖成典重舉千叟晏自一嵗以下三千餘人其未經入晏蒙千餘恩賞賜者又人律琯應候景緯彰符勿言祥瑞藻飾是祛史所皇上崇實斥浮於凡甘露慶雲前稱為嘉祉者屏而弗道惟以時和嵗稔昇平仁夀為上瑞昨嵗因各省諸臣謝賜御製太常仙蝶詩特申誡諭綏豐遥陲夀宇同娱邇年寰宇之大屢報慶豐即如西陲新疆二萬餘里屯政日開儲獲殷富與内地盈寜無異咸躋春臺並祝康衢擇言鐫寳奎記特攄凝承䔍祜箕疇斂敷念庶御製八徵耄念之寳記云耄而敬徵仍古稀猶日孜孜之志也亦五福五代堂之記所謂皇極斂錫之志也天子萬年幬載穹輿敬繹帝念建極鴻模右福慶章第十萬夀雅九章謹序原任大學士臣蔡新臣新稽首頓首言欽惟我皇上握乾樞昭恒治區㝢飫化山川納祿五十有五年嵗在上章昊天純佑親徳饗道五代慶加八旬錫羡泰元神䇲増受益算鴻範丕祉敷錫来紀特命鐫八徵髦念之寳并御撰記文以示斂福凝命之意維時四海之内六幕以外圜顱方趾跂行喙息緩耳雕題繩度接飲之倫莫不陸抃水躍䴢至鱗集並矢衢謳載占景見臣久侍内廷備叨恩養晉直綸扉愧乏涓埃報稱旋以衰憊仰荷格外鴻慈許歸田里恭逢慶莭祝釐赴闕獲遂依光之願私心慶幸莫可名言臣在田野間飫聞擊壤之歌稱觥之祝孚于逺邇臣親沐徳輝宜率先歌咏謹攟拾經義比附雅章以伸慶悃伏念皇上自御宇以来克敬上天肸蠁豐融毎嵗三舉大祀䖍禮方澤躬詣壇陔親奉圭瓚契昊縡協坤靈此欽若之念敬信之原所由受天監而懐多福也我祖宗以謨烈肇基功徳顯赫用敷遺後人休維皇上繼序紹聞以一身兼創守之任覲光揚烈仰穆率昭欽承彛訓如見羮墻此聰聴之念纉緒之本所由繩祖武而昭来許也若夫臨御之處署書勤政行在之所秉燭徯章御門厪勅㡬之思待旦作晏眠之歌疇咨尠晷昃之暇疏奏無一夕之淹慎重弼教審克惟允以萬㡬之恒勅徵百度之用貞所由求厥寧而觀厥成也至於孩養黎元所重民食勤耕耤於四推咨雨暘於三時金堤虹繚河出榮光石防雲亘海不溶波復軫如傷之懐普非常之賜免正供四豁漕糧二其它蠲積逋加賑䘏者不可以數計此固非南山禹甸嘉糓稷播所得睎其萬一者也若乃秉知人之哲開博選之路釐毛攬翮抽淪掇沈察京宷計外吏崇實政重親民用能衆績咸熙吏治烝烝雅有之曰維君子使言奉職盡力也又曰維君子命言不失職也故文徳則紬四庫跱七閣建辟雍舉特科觀乎人文以化天下雖棫樸菁莪南有嘉魚不足為其光華彪炳也武功則平凖噶爾定兩金川撻回部犂烏什徕𬗟甸靖臺灣大勲九集拓地二萬雖六月采芑江漢常武不足為其扵鑠震疊也禮制則輯㑹典圖禮器秩從祀繪勲臣宴千叟表百官經曲之等軌物之度㦽㦽份份莘莘濟濟雖皋門應門肆筵授几食飲君宗不足為其纖悉備具也樂律則編律吕譜詩歌奏中和舞慶隆銘鐘磬備回畨驤咸騰䪫符韶莭濩雖靈臺樅鏞鹿鳴笙簧不足為其廣大清眀金聲玉振也聖徳之懋聰眀亶智勇錫則廣運邁于緝熈聖學之粹盤論日新扆繪無逸經筵誦抑臨雍講徳則念典崇于臨保聖治之大五福誕旉八粃由弭蕩候休徳鏡清砥平攸暨之羙百倍泂酌聖製之備文集千有餘萹詩編五萬餘首闡史鑑以擥綱考同文以統均大成是集羙富具并徳音秩秩民辟之紀至若六龍于狩清蹕展義四詣盛京𬗟懐豐芑六幸江浙以觀民風燔柴泰山殷祀少室登五臺以柔逺適津門而問俗山荘諺夏木蘭獮秋武閱香山文徵闕里以休以助無非事者時邁之舉又非陟巘降原夹皇溯過所得嫓其裒對也于是泰階告平信星昭見玉燭調乎四時珠囊叶于五緯休徵丕應畢萃人事八旬曼夀五葉餘慶譜牒所錄繩繩振振聖瑞也大法小㢘悃愊無華夙夜寅恭忠愛自藎臣瑞也耆英觀光稽古榮榮文武襃然三為舉首士瑞也數世同爨義門樹聲百年皤髪元孫加膝民瑞也忠厚成福行葦無以過太平飽徳既醉不能加貞符嘉貺莫此為盛是以殊方慕義絶徼来享哈薩克拔達山布魯特安集延痕都斯坦廓爾喀之儔咸企王㑹朝鮮冠帯以納賮琉球航棧以朝正暹羅遵軌以獻悃南掌梯徼以懐憓越在安南匪惟内首禀朔其名王至不憚萬里之逺蛾伏闕廷焉以視徐方来庭北國奄受侈陳王猷之塞誠不足擬于我朝之盛也皇上乃聖不自聖猶日孜孜以念用庶徵為建極錫福之本鐫諸昭華以迓億萬年無疆之休臣竊不自揆慕召康公尹吉甫之流願附于羣雅之末謹撰雅一篇凡九章章十二句以效拜颺之義焉維清承運景福孔新我皇纘服純嘏載申維天有命維皇其寅之維祖有訓維帝其宣之受祿于天宜祚于前臣拜稽首天子萬年一章皇圖厥政罔或不蘉乃慎乃省乃勅㡬康皇愛厥衆以莫不嬴乃疆乃畎乃恭生生民之寧矣政之成矣臣拜稽首天子萬齡二章皇有天職疇叙有秩皇有天祿疇不家食藹藹萋萋廸簡在皇室言告于天言爵于祏以弼以翼以亮皇安邦國臣拜稽首天子萬福三章文命溥将文思廣被爰雝爰備爰蔚爰賁匪惟賁之又果毅之匪惟蔚之秉徳畏之九成丕吿式侯式尉臣拜稽首天子萬嵗四章於昭聖徳允翕帝縡學以緝熙克自敬止敬乃用乂萬國樂愷大哉皇言如山如海貢歌正範典謨布在臣拜稽首天子萬載五章皇于省方四海齊軌匪紹匪逰吉五十里或補春祺或助秋祉乘石之洗民之燕壴翠華之莅民之倚恃臣拜稽首天子萬紀六章肆皇天降康元符載協維嘉有禾維仙有蝶維彼吉帛匪瑞應之飾宗枝芘本天潢流浹曽曽元元仍仍雲雲曼衍于玉牒臣拜稽首天子萬葉七章東踰泰逺西越䝉汜幽都交阯聲教攸暨道路如砥山河如矢貢其每牛雖馬象兕乃命舌人其體委之臣拜稽首天子萬禩八章洪惟我皇徳冠來寓績邁往宙天無私覆地無私載祖宗無私佑千億百禄庶徵輻凑式永念之俾凝承于純佑臣拜稽首天子萬夀九章八旬萬夀盛典卷八十五
