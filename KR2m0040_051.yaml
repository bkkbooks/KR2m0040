body:
  text: 典禮二慶祝二乾隆五十五年七月初九日内外扎薩克諸蒙古汗王貝勒貝子公額駙台吉等㳟赴避暑山荘慶祝皇上八旬萬夀二十四日宣命都爾伯特土爾扈特霍碩特烏梁海等部落回㳺牧其扈駕進京者從之餘各遣所属稱祝如禮理藩院謹奏為奏聞事本年恭逢皇上八旬萬夀大慶查得内外扎薩克各䝉古汗王貝勒貝子公額駙台吉等俱於七月初旬先後趋至熱河行慶慶祝萬夀臣等擬於初九日帶詣依清曠殿一同敬謹瞻覲天顔理合奏聞謹奏科爾沁和碩卓里克圖親王貢格喇布坦和碩逹爾漢親王旺扎勒多爾濟喀爾喀圖什葉圖汗車登多爾濟車臣汗齊旺多爾濟土爾扈特汗䇿凌納木扎勒都爾伯特汗瑪克蘇爾扎布喀爾喀親王固倫額駙拉旺多爾濟齊巴克多爾濟土爾扈特親王䇿林烏巴什巴林親王品級郡王巴圖喀喇沁親王品級郡王多羅額駙滿珠巴咱爾阿拉善親王多羅額駙旺沁班巴爾科爾沁郡王喇什端羅布羅布桑占三喇什嘠爾當奈曼郡王拉旺喇布坦敖漢郡王齊黙特魯瓦蘓尼特郡王䇿凌衮布阿巴噶郡王喇特納錫第喀爾喀郡王雲端多爾濟桑齋多爾濟徳木楚克扎布土爾扈特郡王舍楞都爾伯特郡王那旺索諾穆科爾沁貝勒三音察衮土黙特貝勒索諾木巴勒珠爾翁牛特貝勒濟克濟扎布阿魯科爾沁貝勒阿爾逹錫第扎嚕特貝勒嘠爾桑烏珠穆沁貝勒旺楚克喀爾喀貝勒衮布多爾濟阿裕爾青海貝勒濟克穆特伊什霍碩特貝勒徳勒克烏巴什土爾扈特貝勒黙們圖都爾伯特貝勒巴桑逹瓦品爾科爾沁貝子錫第巴林貝子和碩額駙徳勒克喀喇沁貝子丹巴多爾濟敖漢貝子桑濟扎勒徳威多爾濟翁牛特貝子圖們巴彦阿巴喀納爾貝子逹克丹彭楚克鄂爾多斯貝子拉什逹爾濟永瓏多爾濟喀爾喀貝子索諾木旺扎勒多爾濟土爾扈特貝子沙拉扣肯科爾沁鎮國公薩木丕勒扎木素郭爾羅斯鎮國公固魯扎布敖漢鎮國公納木扎勒多爾濟翁牛特鎮國公逹瓦錫里喀爾喀鎮國公額林沁多爾濟科爾沁輔國公色璫嘠瑪勒哈逹喀喇沁輔國公瑪哈巴拉輔國公喇扎布温篤爾瑚郭爾羅斯輔國公貢格喇布坦蘓尼特輔國公額林沁阿巴噶輔國公拉旺多爾濟青海輔國公垂忠扎布喀爾喀輔國公車登逹什拉蘓瓏多爾濟巴圖濟爾噶爾科爾沁公品級頭等台吉拉旺林沁多爾濟丹怎旺布巴林公品級頭等台吉索特納木多爾濟賽尚阿喀爾喀公品級頭等台吉敏珠爾多爾濟薩蘭多爾濟扎哈沁公托克托巴頭科爾沁和碩額駙敏珠爾多爾濟雅里木丕勒喀喇沁和碩額駙永庫爾忠索納木巴勒丹端岳特多爾濟克什克騰扎薩克頭等台吉根敦逹爾扎霍碩特扎薩克頭等台吉諾海青海扎薩克頭等台吉沙拉布提里科爾沁頭等台吉敏珠爾多爾濟色楞丹巴奈曼頭等台吉巴勒楚克喀爾喀頭等台吉固木扎布車登扎布烏爾占扎布霍碩特頭等台吉騰特克布顔克什克額魯特頭等台吉舍楞土爾扈特頭等台吉徳爾徳什科爾沁多羅額駙索諾木雅木丕勒巴林多羅額駙丹津翁牛特多羅額駙班珠爾喀喇沁多羅額駙扎宻揚多布丹額魯特縂管碩通察汗烏巴什阿爾太烏梁海散秩大臣布顔徳勒克敖漢二等台吉巴勒珠喇布坦濟克濟扎布喀爾喀二等台吉䇿凌扎布翁牛特二等台吉巴彦巴圖爾哈斯巴圖爾哈喇沁固山額駙喇特納吉爾第土爾扈特二等台吉庫奎喀喇沁固山額駙扎南吉爾第敖漢固山額駙扎勒瓦阿爾太烏梁海縂管碩博克哈薩克敖漢三等台吉察克多爾扎布鄂爾多斯四等台吉拉旺多爾濟額魯特四等台吉貢楚克納木扎爾土爾扈特四等台吉顔徳勒格爾喀爾喀協理台吉衺楚克扎布八十六巴咱爾囘子王公伯克及哈薩克汗台吉之子弟於是月初七十二等日㳟覲於避暑山荘仍随扈至京慶祝萬夀如禮哈宻郡王品級貝勒額爾徳錫爾喀什噶爾四品伊什罕伯克貝子邁哈默特鄂三庫車三品阿竒木伯克輔國公邁瑪第敏伊犁三品阿竒木伯克公品級頭等台吉鄂羅木咱布吐魯畨頭等台吉丕爾敦阿克蘓二等台吉伊薩克喀拉沙爾所属布古爾三品阿竒木伯克瑪瑪逹布拉葉爾羗五品阿竒木伯克博巴克沙阿克蘓所属賽里木五品噶咱那齊伯克愛黙特庫車所属沙雅爾五品噶咱那齊伯克岳果布喀什爾宻圖瓦里伯克阿布都瓦伊斯葉爾羗六品色徳爾伯克阿布都拉伊木喀什噶爾六品明伯克博巴克和闐所属哈拉哈什六品哈資伯克愛瑪爾霍卓阿克蘓六品伯克阿布都爾咱克伊犁五品回子色瑪特伯克布古爾伯克瑪瑪逹布拉之子六品囬子伊斯瑪伊爾哈薩克汗杭霍卓之弟爾齊副使唐噶拜庫聘逹爾濟穆拉特巴圖爾台吉博普之弟庫庫岱副使塔什特穆爾薩賽阿勒塔拜保伍博克台吉阿體勒之子薩體巴勒逹副使玻勒瑚魯木蘓扎逹克之弟佳拜副使布庫木拜阿勒逹克圖爾圖勒鄂拓克哈薩克阿哈拉克齊圖博特新封安南國王阮光平載賜封始末㭟聖功門躬詣祝釐是月初九日恭覲於避暑山荘仍入京隨班稱祝如禮乾隆五十五年正月二十二日奉上諭本年朕八旬萬夀安南國王阮光平赴闕祝釐先至熱河瞻覲於三月中自該國起身進關距八月萬夀之期尚有數月該國王初入内地道路遥逺著傳諭福康安計算程期令阮光平於七月二十一二日前抵熱河俾途中行走從容以示朕體恤逺人至意新封安南國王臣阮光平奉表言臣昨欽奉硃批謝恩表内玉諭云相見在即同此殷念也欽此仰承天語温存奎文炳煥聖恩之隆重聖心之眷注真曠世希逄之遇臣以猥陋祇叨異寵榮逾分外感激無涯臣母復奉特賜上葠謹即九􅉔㳟領榮施萱背感切葵衷竊喜今秋正逢皇上八旬萬夀聖節吉祥盛㑹慶滿寰瀛航海䑯山共球悉集臣節次籲請躬詣闕廷祝釐展覲仰邀恩俞不勝雀躍昨因臣回富春省親於三月望後甫旋乂安兹諏吉本月二十九日起程并擬携帶臣陪臣吴文楚潘輝益武輝瑨武名標阮進祿杜文功等六員員從叚阮俊橋文權潘文典黎文碧枚文東謝文昇范文生陳有和等九員符印郎李致和一員行人九名伶工十二名䕶衛三十名從人四十六名等俱於四月十五日進闗北上遥憑天慶坦歩雲衢何幸来遊夀宇随閫節以驅馳亟願親見聖人奉綵觴而鞠􅎽以忠為孝惟訓是行臣有母有身報荅仰憑於洪造君為師為父成全深兾於隆霑臣無任瞻天仰聖欣戴企望之至謹奉表以聞臣福康安等謹奏為奏聞事竊臣帶同阮光平進京㳟祝萬夀節經奏䝉聖鍳兹於五月初六日行至廣東省城泊舟登岸該國王與将軍廵撫副都統監督等一同接晤叙談極稱感激天恩舉動甚為謙謹西洋夷人争来觀看俱以外藩親自叩祝聖夀千載罕聞靡不鼓舞欣羡初七日在廵撫署設宴大堂㳟排香案臣等率領該國王及陪臣員從等與将軍以下各官先行望闕叩頭謝恩行禮宴畢而退臣随帶該國王開船前進計自廣州至京途中䟎程行走七月初十日以前儘可行抵熱河行在㳟與王㑹趨赴慶祝之期理合恭摺奏聞謹奏安南國王臣阮光平奏言臣叨荷龍光情殷瞻就謹於前月先具表奏明䟎程趨覲拭目五雲馳神萬里進闗以後重䝉恩㫖體恤一路供頓備極豐隆臣所經両粤之間江山秀麗總在恩霑風物繁華無非聖澤觀光之願誠知慰足現奉總督公福康安與臣䕶伴事事仰體聖主覆載鴻慈曲為照料逮進廣州省城江樓接晤溢車騎之香塵賓館延留藹門䦨之瑞彩旋奉頒給筵宴笙簧雅韻綵幣繁儀仰膏澤之沛来撫葵衷而増感臣承霑獨渥向化維䖍現從粤東進程惟祝早早瞻覲獲慰㣲忱臣下情無任銜感激切之至謹具奏聞御製安南國王阮光平至避暑山荘陛見詩以賜之庚戌瀛藩入祝值時廵初見渾如舊識親伊古未聞来象國勝朝往事鄙金人明正徳間安南黎譓之臣莫登庸逼逐其主明興師討之踰年師不出登庸進代身金人遂封為都統其後譓孫維潭奪莫茂洽都統亦進金人復封為王是明代即不能致彼入朝而為金人以代兼有黷貨之譏其行事殊為可鄙九經柔逺祇重譯嘉㑹於今勉體仁武偃文修順天道大清祚永萬千春朝鮮國王李祘遣陪臣慶祝萬夀是月十一日㳟覲於避暑山荘仍入京随班稱祝如禮乾隆五十五年正月二十七日奉上諭本年朕八旬萬夀萬國臚歡凡属庶邦君長同忻祝嘏今朝鮮國王於年例正貢之外復備物先期呈進具見㳟謹悃忱著即賞收並准作次年萬夀正貢以示體恤朝鮮國王臣李祘奉表言竊臣僻處海隅厚沐皇上東漸之化禮遇迥超諸藩眷顧罔間内服隆恩殊渥簡䇿所曠臣毎一承奉徒積銘鏤瞻天祝聖報荅無階廼者恭遇本年八月十三日慶為八旬介齡萬夀聖節千載一有溥天同歡梯航雲集充溢廷陛臣與一國臣民不勝抃躍頌禱謹遣正使臣昌城尉黄仁㸃副使臣禮曺判書徐浩修㳟執土物奉表稱賀者臣祘誠懽誠忭稽首頓首上賀伏以如升日之高齡載膺純嘏之錫當流虹之令節丕振長發之祥盛軼百王騰歡九牧欽惟皇帝陛下念徴八庶福備十成敬勤罔懈之動法祖宗茂晠化者五十餘紀悠乆無疆之合撰天地履夀考以億萬斯年肆當庚穣酉熟之亨期備臻川效嶽修之駢瑞伏念臣夏貢荒服殷師舊封處日出逖矣之鄉莫覩塗山之執玉詠天保定爾之什每祝海屋之添籌幸遘皇禧恭修侯度箕疇久庇於協居徧荷歛錫之福葵忱爰効於獻悃用祝曼衍之庥伏乞天慈俯垂聖鍳俾伸小邦殫誠事大遇慶稱夀之懇誠不勝萬幸臣無任瞻天仰聖欣喜祝頌之至謹奉表稱賀以聞南掌國王召温猛遣陪臣慶祝萬夀是月十一日恭覲於避暑山荘仍入京随班稱祝如禮御製雲貴總督富綱奏報南掌國王遣陪臣進貢祝八旬大慶詩以誌事庚戍南掌由来古越裳十年一貢例遵常按大清一統志南掌古越裳氏地雍正八年奉表入貢後五年一貢乾隆七年念其道逺定為十年一貢嗣自恪遵朝典依期遣使慈據富綱奏南掌國王召温猛遣陪臣叭整烘等賫表貢象並稱貢期本在来年因今嵗欣聞大皇帝八旬聖夀敬於職貢之外另具蒲業表文一道子象二隻以申祝悃等語因先将表文譯出馳奏乃知八月八旬慶䖍祝九如九頌章南掌表文有云欣聞庚戌八月大皇帝八旬萬夀慶洽普天歡騰中外小臣逺居南徼未獲親赴闕廷泥首十叩謹具表文象隻遣使叩祝伏願常調玉燭萬載清寕使小臣得永荷渥澤曷勝頌禱云云情辞極為恭懇所遇何修貺有獨𠡠幾撫萬敬無遑昌黎歌􅋵思深義益凛孰治平聲與孰荒按昌黎越裳􅍾曰我何意於彼為言無意求逺也又曰孰荒於門孰治於田言當勤内治也所以頌先周訓後世其意深逺矣昔曽選之唐宋詩醇嘉其措辭簡而當兹南掌即古越裳於雍正八年始入貢盖即韓愈所云厥臨孔威者耶至於不享其贄不臣其人雖閉闗預防之意乎然以今時勢論之殊方畢來誠以祝釐却之不受豈不寒逺人之心嗇中國之氣既非招致厚往薄来可也予昔評韓􅍾意有所未盡故並識於此雲貴總督臣富綱等謹奏為㳟報南掌國遣使祝釐仰祈聖鍳事臣等接據普洱鎮朱射斗迤南道宣世濤禀稱探得南掌國王恭聞本年大皇帝八旬萬夀䖍偹表文馴象遣使祝釐并附進明年應進例貢不日即可抵邉等語仰見皇上恩覃九有徳及萬方是以異域抒誠莫不争先恐後臣接閱之下不勝欣抃現飭該鎮道等即行赴邉等候接收好為照料送省一切宴賞欵待悉從優厚計到省日期亦與緬甸貢使前後相等俟分起前後䟎程務於七月二十以前同抵熱河共沾聖澤所有南掌國遣使慶祝緣由合具奏聞謹奏南掌國王小臣召温猛恭奏天朝大皇帝陛下伏以聖徳㴠濡化行禹貢山川而外皇仁浩蕩人在堯天雨露之中四海共慶昇平萬民咸歌樂利此真自有天地以来亘古帝王中所未覯者也欣聞庚戌年八月恭逢大皇帝八旬聖夀慶洽普天歡騰中外小臣累世䝉恩倍深欣躍祗以逺居南徼未獲親赴闕廷泥首千叩謹􅂒具蒲葉表文一道子象二隻敬差當事頭目叭整烘等赴京叩祝伏願我大皇帝常調玉燭萬載清寕使小臣得以永荷鴻庥仰沾渥澤曷勝頌禱小臣召温猛臨表無任瞻天仰聖遥祝之至謹具表以聞新封緬甸國長孟隕載賜封始末㳟聖功門遣陪臣慶祝萬夀是月十一日㳟覲於避暑山荘仍入京随班稱祝如禮雲貴總督臣富綱等謹奏為緬甸遣使祝釐𣲖員伴送㳟摺奏聞仰祈聖鍳事竊臣等前聞緬甸國長䖍備表貢於本年正月二十日以内専遣頭目賫送起程進京㳟祝萬夀當經馳摺奏聞并擬於該貢使人等到闗添𣲖委員䕶送欽奉諭㫖緬甸國長孟隕前年遣使輸誠敂闗納貢業經恩准内附賞賚回國此次敬備表貢致潔告䖍遣使来京祝釐請封實係好事該督等於該貢使抵闗後務宜遴委妥員䕶送前来等因欽此先經臣等札飭騰越鎮總兵定住知州屠述濓赴邉祇候一俟貢使到闗即好為欵待收接兹於三月十四日據禀緬甸國長差老官屯頭目孟幹同貢使大頭目四人一名便居未駝一名便居覺抓一名細例覺抓一名南逹佳蘇率領小頭目及跟役二百餘名齎送金葉表文一道長夀聖佛一尊萬萬夀佛經一部紅黄檀香四十筒花象一隻馴象六隻象牙五對孔雀屏十對緬錦四十疋緬布八十疋紅呢三板於三月初四日至鐡壁闗當即逐一查明收接進闗随從優筵宴給賞無不歡欣叩謝頂頌皇仁臣等現擬添派妥員伴送起程務令行走從容以仰副聖主體恤逺人至意再該頭目孟幹感仰天恩優渥極欲進京叩祝因該國長令管官屯蠻暮地方今既到闗稟逹國長感激誠敬之意並令先回報信當即從優犒賞遣令出闗所有緬甸貢使到闗日期謹㳟摺馳奏并分繕貢物貢使清单同譯出表文敬呈御覽伏祈皇上睿鑒謹奏管轄緬甸地方小臣孟隕謹奏大皇帝寳殿小臣前嵗遣目投誠納欵仰䝉鴻慈允准實属萬分僥倖恩徳如天将何圖報欣聞今年八月恭逢大皇帝八旬萬夀萬國来朝小臣已經歸附天朝理應進表祝慶叩謝皇恩今䖍具金葉表文竒異花象並小國土産物件差心腹頭目便居未駝便居覺抓細例覺抓南逹佳蘇等叩闗求請總督代為奏明伏願大皇帝夀如山海萬年吉慶小臣不勝瞻天祝聖歡欣頌禱之至謹具表以聞八旬萬夀盛典卷五十一
