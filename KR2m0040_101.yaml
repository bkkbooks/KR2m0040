body:
  text: 歌頌二十二萬夀恭擬説夀一首謹序順天府府尹臣吳省欽嵗上章奄茂壯月日十有三恭遇我皇上萬夀八旬之紀紀年則乾隆五十五年也易繫辭曰天數二十有五地數三十今聖夀紀十則紀年當五紀年當十則聖夀紀五前紀年四十五合九五之數為皇上七旬萬夀兹紀年五十五為天地初合之數禾一孰曰年年從禾從千千生萬萬生億億生兆兆生京京生秭故曰萬億及姊凡天地之欣合統於人人皇嵗四萬五千六百較天地皇三倍之古人臣之頌君曰天子萬年曰天子萬夀曰萬有千嵗夀即年也嵗也自萬而贏非自萬而圉也皇上日強莊敬自丙辰前未御九五與紀年九五以前聖神文武之德若業館臣恭纂萬夀盛典例不備載而臣日在燾載戴天而不知天之何以高明與悠久謹竭愚陋繹洪範嚮福始夀之義撰説夀一篇拜手稽首獻焉其辭曰福者天所以嚮勸也福莫先於夀夀久也年齒也一曰酬也夀之得養之得也養非有他也和順于道德而理於義也神仙之訣服食之術無憂患思慮之恉泊然無為聖者弗尚也祈天永命所其無逸也則何以曰仁者靜仁者夀也曰智仁一也仁者無不知知故動動故樂也樂莫樂于夀也知仁互宅動靜互根言動靜猶言中和言樂夀猶言位育也位者天地之夀育者萬物之夀也萬物之夀萬物之福之大者也我皇上念之斂之錫之也宴耆筵者三千叟抱元孫者二百有餘户集試而首以皓也從耕而背以鮐也四男一乳雙穗一苗蝶以冬栩象以甸馴莫非育也何莫非夀也四方正供普蠲再三費也惠也金粟億萬萬計也偏災振貸無嵗無之豫遊所經減租賦又不資也福之富亞于夀維一人之富散之以馭天下之富故天下之夀聚之以獻一人之夀也夀靜體也靜可樂動亦樂也樂本和和本中中者天地之心也天地無心聖人之心乃其心時雨時暘時燠時寒時風位在天地者也肅乂哲謀聖位在耄念者也耄通耄旄髦期倦于勤非舜之言偽古文尚書之言也書言來備庶用徴皇用建也五緯之汁七政之不忒海之委淮與河之原自然而位非自然而位也由山川鬼神等而上之至兩郊之大祀靡誠弗應靡敬弗格也格之必佑之佑之必夀之孔子于舜之大德以夀賅位祿名之全此其義也舜德在大孝我皇上覲揚前光啓迪後緒舉衣冠服御及舉錯張弛之道時對越也是宗廟饗也舉語言文字及敬信節愛之道時訓行也是子孫保也舜之大知在用中我皇上舉從衡懸凖平繩直若河湟逆回先後伏誅與夫海臺之耆定黎交之罙入也猶是平凖回平促浸趲拉之烈也中之發諸怒者然也元日布告中外篤慶與夫葺勝朝之陵廟封逺蕃之嫡胄也猶是恤渥巴錫之歸順嘉班禪額爾德尼之嚮慕也中之發諸喜者然也發動也未發靜也靜仁之體也中象也不中則不和不中和則不位肓位育者天所以酬皇上也中和者皇上至誠無息之所以格天也不息則久久即夀也夀世者文御文自二集以溯初集也御詩自五集以溯初集也六詩之補四詩之譜十鼓之摹則述而作也夀考者作人正科恩科自已酉以溯丙辰也諸科自行在擢選詩賦以溯經學之舉博學鴻詞之試也三館以輯四庫以成七閣以建則巍而煥也而皇上淵然不自以為夀也惟日孜孜五十五年一日也即萬年一日也而下欣然頌得夀也衆人熙熙百千萬人一心也即百千萬心心一人也舄芾之集也外諸侯以其職來貢也其他喁喁雁使若朝鮮暹羅南掌東由塞西南由徼也頂經巴勒布也遣孫布魯特也宅南小邦之長蛾伏闕廷願附陪𨽻古史䇿見未有也立壇者誦經也撤幕者張樂也化城涌于綺陌寶炬爥於碧霄也華封人之祝豳七月詩人之稱觥皆稱夀也至今日而稱天夀也夀本作從老省􅔧聲􅔧亦作書疇咨若時疇咨若豫采是也其作則田之耕治者也書九疇謂龜文象田疇錯落也其從書疇若豫工疇若豫上下草木鳥獸是也誰也書言疇者三一聲三義言夀者再聲義一也爾雅夀星角亢也數起角亢是曰夀也軫十二度至氐四度皆夀星次也然未足以語我皇上之夀也與天同用蓋與天同體也雲霞日月天之用日新而天體今猶昔也禮樂政刑聖之用日新而聖體今猶昔也體主靜用主動動知也靜仁也乾之象曰天行健君子以自強不息君謂君臨天下子謂子愛萬民也八徴念民乃申以五福之嚮夀也以夀嚮勸是謂酬也是謂久也是謂中和是謂位育是謂仁夀之統會夫知樂也萬夀恭擬八徴頌五章謹序詹事府少詹事臣平恕臣聞戴鈐懷斗之聖亹亹穆穆面稽天若天錫大法以綱紀九有青縈九陽荒邈之所除靡不內拱八風循通六府三事允治顧稷扈之間其繼躅者已粵自方牙窮賾盛水録符伊耆沉璧而赤文升媯帝披圖而榮光起莫不題期立象擲洛鉤河敶其法而敘其類執其契而寶其真枋泰始成鳩之道策天命以治天下故天報眉夀逺者億齡我皇上紹天闡繹勤恁民依經緯萬端燾覆六幕御極之五十四年迹赤鈐翼皇象選玉為八徴耄念之寶以副今年萬夀八旬開帙之慶御製記文闡明其義於體天愛民誠心勤政三致意焉彼向歆眭孟京房李尋之説則概置弗道大矣哉聖人祈天永命誕保愛民之旨非淺見所測萬一矣謹案洪範次八念用庶徴疏以天時衆氣之驗皆於念慮包之爾雅曰徴召也曰肅曰乂曰哲曰謀曰聖五事既修即建用皇極之實所以和五行厚八政協五紀艾三德兆大同廣敷錫也然則至誠無息之徴徴在是已肅者持事振敬也皇上昭事明察莭登降之縟一是對越釐乘陽之義以定上辛重龍見之雩以祈膏雨廟左社右祇奉有恪餘功令遣祭者猶親詣行禮至二十餘次比復下詔凡中祀親祭一周抱蜀不言有孚顒若在廟之肅也申戒得之義作知過之論履衆美而不矜懷聖明而若歉席景貺而夕惕內心之肅也奉三無私阿柄在握天下莫不竦身戴聽以稱德音紀綱之肅也乂治也皇上循機提象於九重之上而從欲風動於四海之外軼親族之典邁行葦之隆錫爵命名肆筵大賚世綿十一人逾二千敦睦之治也批閲章牘引對庶僚亷法必飭賞罰必當董正之治也時邁四巡以省以助免天下正供者四􅒩糈者再因事貸蠲動以億計民榖之數晴雨之宜收穫之多寡市糴之貴賤命大吏隨時上列兆豐則有喜少稽則馳詢焉仁民之治也若乃議禮制度考文定樂國學建辟雍上塞創􅓺舍輯四庫之富廣三閣之儲開特科以譽髦疏選途以振滯修羣籍正音譯譜全詩使入樂新十鼓以存真右文之治也實軍伍習獮狩開屯政褒勳績震聲日景旁薄無垠軍旅之治也西北諸部王公台吉伯克東至使犬諾羅南暨海外暹羅琉球微若土司社目咸得覲清光庇仁宇綏懷之治也爾雅又以淈為乂淈同於汨舜釐下土作汨作禹決汨九川説文汨治水也然則增髙堰五壩建淮徐石隄開陶莊立清口水志以治河楗石鱗比重障實薪以治海剔淤蓄清以治􅒩塘埝閘匱之工時罔不舉皆乂也書言濬哲言知人則哲能官人我皇上知幾其神凛微彰之介辨遲速之宜慎盈虛消息之機知天也不逆不億而先覺知人也知天之必可信而西師集勳知時之必可乘而金川底定知土爾扈特之來降不可不恤而四衛拉特以全知交址之內訌由天意而班師之旨早降於封册之時知巴勒布之擾蕃必有欺抑而輸誠之表即達於偏師壓境之日官吏之誠偽閭閻之利弊訟獄之曲直雖逺萬里洞若觀火兼覽博照曕覩未形哲之濬也謀心也有熊氏并天下之謀帝高陽淵而有謀放勳好謀能深我皇上顯承謨烈詒燕萬年兼創業守成之難鑠犁庭掃閭之績裕保世滋大之略守衣冠騎射之謨咫尺八紘括囊四海藏則洗心動猶運掌凛天命故先天弗違自天佑吉也斷先幾故動罔不臧赴機應會也慎永圖故濬發一時豐雍奕祀也恤衆勞故事必有成民不及知也告功勒銘紀事之文方略紀略之書可得而詳也事無不通者聖也皇上執中立極稽古集成涉三皇之登閎軼五帝之淵穆睿周萬品思暢精微天縱神授乃文乃武詩四五萬萹文千有餘首包舉經史格物博聞古稀以後猶嵗獮木蘭馳駿疊雙貫鹿殪虎乾健之體彰布昭之烈盛聖之至也易曰聖人作而萬物覩是以覆載之內喁喁嚮風前大慶之一月棧山軼漠浮琛梯賮蹌蹌濟濟斐斐翼翼集於避暑山莊者百千萬計若衛藏若蒙古回部哈薩克都爾伯特朝鮮南掌之屬圖職貢者舊已若臺灣生畨阻鯨波之險九姓土司慿干闌之岨𬗟甸處六詔徼外山林毒霧之所蒸也厯代羈縻弗之及也若安南自元明盛時撻伐招徠勢屈情見終不能使其王一入鎮南關今則交臂樹頷鱗集蛾伏結轍象胥駢羅典屬且孟隕再奉金表屈􅀢請封阮光平襲冠帶彯孔翎祝釐宿衛爰自七月初吉日覲藩辟陪臣太蒙太平空同丹穴之宴設於一庭嗛羊獨鹿每牛俞馬之幣菉於一室越候甸男邦采衛百工四方民大和會塗歌邑誦殷軫京師自御園達于宫禁咸羾忱獻悃請祝聖人焉聖人執要四方來效克念之至也五韙備矣皇極建矣故曰百榖用成乂用明俊民用章家用平康此福錫于天下而氓庶草木皆有殷昌繁廡之徴也而我皇上以時若屢豐為瑞以人和政平為慶方儲思醲化參神昊乾立極召和以福無方之外襲九窾重九道九紀念兹在兹勒諸延喜彼軒帝之銘機唐堯之刻玉方兹蔑矣月正朔旦渙汗大號使天下沐洪鬯肴樂胥戴巍巍履植植敦龎淳固夀於翼箕紹盛錫宴則三千之叟接武焉夀考作人則觀光之耄聨襼焉崇禮百年則期頥之楔相望焉題五福五代之堂因以推恩海內則曾元繞􅀢者二百餘家焉同居或十世焉一乳或四男焉非聖主勤勤懇懇鑠德布和嘉祥殊貺不召自至者歟徴諸五事既如彼克永寅念又如此推一人之福以錫億兆合億兆之夀以奉一人自今伊始徴建極之福即徴無息之誠期應紹至博厚高明又悠久也臣經術淺薄文辭弇陋不足以道揚盛美竊幸預恭纂八旬萬夀盛典之列伏讀御製記文欽懌罔已敬拜手稽首獻頌曰上帝敘疇惟皇備福惟恭則夀惟恭作肅操之翼翼臨以穆穆釐整天衢拊引綱目內自撝宫外暨六服罔敢不祗敷爾心腹乃沛膏渥汜濩滲漉天之降甘崇朝遍沐皇之降澤下土率育時曰肅徴乾乾黃屋右肅徴憲天首出萬邦作乂煦之春溫就之日戴若保用康亮工其代惟昔古稀孜孜不逮日新又新念釋斯在宵旰者躬乾惕於內光天之下窮海之塞暾曜􅑍澨晞景暘昧會其有極欽若昊縡時曰乂徴治億萬載右乂徴亶聰惟皇亮章天哲淳耀耿光天鏡爰挈萬彚熙陽羣物區别天視民視顯融章徹知天知人臨照明決如彼長贏靡生不悅如彼日月靡幽不揭天為粵宛暄燠以節大智象圜休有丕烈時曰哲徴向離昭晢右哲徴慮善以動自天稽謀可大可久訏謨逺猷下詒萬祀旁運九州沉幾淵若斷乃霆侔萬里決勝乙宵運籌大勳九集巍巍罔儔成物于天冬藏秋揫成務于聖莫知使由動罔不臧萬福來求時曰謀徴大同叶庥右謀徴生民未有作覩惟聖皇昔五旬太蒙拓敻皇昔六旬衛拉歸命亦越七旬法王讃慶夀祺晉八益懋勤敬朱鳶越裳親受獻令白狼貗薄封爵來請典屬千百輯瑞頒政四方風動六氣通正時曰聖徴億齡鼎盛右聖徴萬夀頌三十章謹序原任詹事府少詹事臣錢大昕臣聞龍圖呈籙萬年衍泰䇿之祥麟紱開爻八位乘乾行之健天數地數有合而大衍適成律生吕生相隔而元音自振苞苻演算牙紐增年欽惟我皇上五福申祺八旬演慶川修嶽效際五十五載之重熙日升月恆協萬國萬民之臚頌昔古稀早屆籲開七帙之夀編乃大德彌謙却受千秋之寶鑑閲十年之景運慶八月之昌辰上章為庚嵗曜降西崑之瑞留熟于酉夀星明南極之躔始乃俯鑒羣情俞其共稱慶典元正初蒞綸誥先頒王會大同集共球于五國正供普免開版籍于兆民酬鵷序之宣勞紫泥載賁啓鵬霄而造士蘂榜重懸展幣陳牲明虔嶽瀆頒金賚粟錫福期頥共欣聖夀之鴻厖羣沭天恩之滲漉臣舊依詞館得窺祕書侍講幄之尊嚴效內庭之趨走自蒙恩假長荷慈庥幸遭普慶之亨期仰瞻雲日敬就延洪之懋敘進祝華嵩唐哉皇哉美矣尚矣謹拜手稽首獻頌三十章其詞曰蒼昊嘉貺夀為初祜算衍箕疇錫福惟五皇帝合撰順紀協序惟億萬年長滋夀宇右一章圓壇兆陽方澤答隂春祈夏雩必肅必欽視版執玉昭格以心日強莊敬穆穆監臨右二章簠簋馨香用定祭器榮壇享宗中祀周備右壇加玉庇蔭農事圭邸璧羡為榖表瑞右三章大清開基締搆維艱戎衣受命薩爾滸山服色敬守騎射必嫻書事勒碑垂諸宇寰右四章聖祖逮事紀恩獨隆曰牡丹臺萬壑松風纘此丕基早在幼沖日誦寶録羮墻慕崇右五章五福名堂亦承祖志五代曾元古今嘉瑞垂裕後昆雲仍錫類玉牒天潢福夀雙備右六章勤於庶政宵旰必蘉無逸作所不息自強經筵耕藉嵗舉有常惟天行健復旦重光右七章丹毫批奏相時威賞引對末吏因材勵奬風雨露雷恩兼教養大公至正天日共仰右八章南巡六舉闡記宜遲河洛拯民臺懷受釐淀流順軌翠輦時移羣黎被澤補助兼施右九章長白混同肇基王迹周室居岐寧王上畢法駕四巡惇宗布澤著賦歌詩垂諸寶册右十章嵗之二月東登岱宗望祀山川不禪不封更幸闕里儒術攸崇監於百代聖人所從右十一章橋門璧池法古肇造臨雍講學香流芹藻石鼓親排戟門鴻寶會萃時合崇儒重道右十二章升平人瑞千叟開筵老更著説左氏真詮期頥耄耋奚啻三千共祝八旬天子萬年右十三章四蠲正供再免漕庾億兆京垓德洋恩溥百有餘年萬萬編户民用益饒是賴助補右十四章偏邑偶歉即厪宸𠂻加賑截漕民食皆充文筆親製禱雨告風念此八徴萬邦屢豐右十五章河海巨工帑發億萬親臨指示石塘重建潮順浙亹瀾安淮堰水志既定清黃莫溷右十六章闢門四達恩闈六開計偕大選及時用材承德安西抱經賁來天下文明大化所培右十七章大樂之原聖心神契三百篇詩宫商次第笙詩從毛抑戒宗衛凡諸樂章咸歸睿製右十八章睿哲天縱道統德元文冨千篇詩億萬言經緯天人萬派共源典學之勤邁迹羲軒右卜九章祕文遺籍積卷數萬四庫既分七閣斯建辨言煌煌多邀宸翰聖世右文千古獨冠右二十章文治既隆武功用彰秋獵冬嬉習勞乃強木蘭周阹肅肅圍場柔逺威衆絶塞來王右二十一章凖噶爾部聲教自絶因勢帖馴偵時肆突我武維揚摧巢掃穴拓土開強承謨繼烈右二十二章兩和卓木偝恩襲狂擒渠獻俘師貞再行巍巍成功信天者昌開惑一論煥乎文章右二十三章惟兩金川同彼狼狽擾諸土司蠶食為害決䇿命征摧碉焚寨渠魁就俘屯其疆界右二十四章海外有截移師平臺交南受封瀛藩員來抒誠效順天意所開德感威畏銅柱巍巍右二十五章金齒木邦厥為孟緬及巴勒布貢使並遣南掌馴象西衛經卷王會勒圖猗歟盛典右二十六章七旬洪祚璽刻古稀念用八徴益飭萬幾嚮用五福敷錫九圍聖人先天而天弗違右二十七章嵗協庚庚夀星之次萬國祝釐籲請再四俯俞悃誠華靡戒吏渥恩覃敷嘉符表瑞右二十八章九重閶闔萬國梯航衢歌擊壤庶恱且康月盈三五多寶輪光曼夀洪禧無量無疆右二十九章萬八千朔三皇二九我皇受福昊眷孔厚法天健行悠逺徴久福祿來崇萬萬年夀右三十章萬夀恭擬羣臣賀表太僕寺少卿臣弋源伏以瑞啓璇圖八伯爰歌復旦運符蒼籙三皇之世皆春萬祀乘乾得位得祿得名得夀六龍御宇乃聖乃神乃武乃文樂清晏者九州普天擊壤執玉帛者萬國率土瞻雲日升月恆卜一人之有慶瓞綿椒衍欣五代之同堂十年越古稀之期長庚肇嵗八月叶大橫之吉南吕調音蠕動翾飛庶類均徴咸若嶽輸淵效山川亦獻貞符薄海熙春敷天效祝臣等誠歡誠抃稽首頓首上言竊惟聖君受命必錫祉於永康仁主當陽每化成於久道考金天之踐祚臨御八十有四年即伊耆之承祧得齡一百十八嵗耄期不倦廣開四目四聰統緒長膺用奏九歌九敘萬年來賀受祜斯隆三夀作朋錫純益固太古而降未之聞六帝之中差可録顧守成非易或狃於長治久安創業維艱未臻乎禮明樂備介繁釐而祝嘏縱多中外臣鄰向德化而抒誠莫遍梯航貢享未有庶徴克念雨暘寒燠風時端拱無為博厚髙明悠久如今日者也兹蓋伏遇皇帝陛下曦璘久照幬載同符奉三無私俾緝熙于純嘏函九有夏用敷錫厥庶民躋一世於春臺作覩慰雲從之望開八埏之夀宇率俾遍日出之區天地以生物為心雨露風霆莫非至教聖人之大寶曰位刑賞舉錯共仰無偏嵗紀上章恭屆八旬萬夀候當少皡欣符五位十成中天懸麗日之輝三辰告正河渚獻流星之瑞五老來逰與時偕行昭昭可紀至誠無息蕩蕩難名精求衣問夜之心帝出乎震厪課雨占晴之念人本於寅禮重三推百榖樂豐盈之慶賦成九等四番蠲維正之供而乃乙夜勤披酉陽遍采書藏七閣彚百代之藝編史載二臣列千秋之寶鑑五集數萬首盡敲金戞玉之音疊韻每十全陋合璧聨珠之格中和樂音鬯偹鑄來寧夀金鐘史籀字體屈盤重立辟雍石鼓而且照朱纓之九曲璧水流清飛翠蓋之三英圜橋春靄寶圭璋於俊乂鶴在隂而鳳在陽隆爵酳於老更兔有罝而魚有藻敬迓鑾輿星幸金門分鵠立之班肅看組甲雲屯玉關映龍鱗之彩五材並用辰開河鼓之津七萃斯行戎整新田之伍勾陳奕奕招搖靖昴畢之氛格澤煌煌指顧捲欃槍之迹偝我俘恭我僕藩部肇定年班德曰順威曰降屯田聿歸嵗額西戎來享貢馬獻玉以傾心蠻目輸誠銷兵鑄耒而利用屹豐碑於絶域銘陋燕然藏勝纛於武成績髙河朔增其式廊王道平則三階平惠此嘉師蒼生福即一人福輯共球於萬國聲靈被陽氷隂火之鄉舞干羽於兩階政教通館海巢山而外河探星宿中原永慶乎安瀾工築海壖澤國咸遵夫故道文運蒸騰日上榜揭三元英竒矍鑠偕來宴開千叟程材銓部寒儒釋褐登朝擢秀甲科多士彈冠志慶揚化光于藻黼奮武揆文席上瑞於蘿圖重熙纍洽乃於正月元日大沛絲綸遂令萬國九州齊生歡幸俯允臣民之釐祝臚陳典禮於昌期爵一級以賜官僚嵗二月而舉巡狩誠通呼吸告諸天下名山大川學證心源觀於廟堂車服禮器光流玉琯泰運啓乎重暉采煥璿璣瑞符昭於聚舍陽至八月而方壯天本健行書紀八帙之初開福真無量南球北漠奉賮歸忠東鰈西鶼獻琛上夀生民以來未嘗遇百王之盛何以加臣等幸值昌辰得逢茂典抒蠡測管窺之見莫贊一詞荷天覆地載之仁惟呼萬嵗伏願時幾丕敕化育長參乾以體元備太和而徵保合皇惟敬德本攸好以協康寧鏡朗大圓之光福智無盡燈燦文昌之彩珠月同輝從此憓愫新編展夀籙重重蕃禧軼赫胥驪連而上抑且千度增紀聼衢歌處處景祐遍京垓禆瀛之區矣臣等無任曕天仰聖踴躍歡抃之至謹奉表稱賀以聞八旬萬夀盛典卷一百二
