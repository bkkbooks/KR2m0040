body:
  text: 欽定四庫全書八旬萬夀盛典第一百三歌頌二十三萬夀無疆詞六十首㳟集百萬御製詩句成百夀字翰林院侍讀學士臣陸伯焜天與夀因徳與夀萬年康健福駢膺願将甲子週千億夀錫寰區百廿増重熈累洽萬年清福夀駢臻筭介瀛閭里仁風世仁夀夀籌添擬海山盈錫羡八旬開寳袠歛時五福恊箕疇南山如夀惬忱願恒此千春與萬秋萬六春秋食履綿位名禄夀徳為全敷天大慶今朝始願共薰風億萬年介夀還欣福似川氷輝萬里朗澄鮮籌添南極應無算億萬人増億萬年玉座稱觴夀菊黄萬年為祝慶方長南山獻夀方當面桂月光浮萬夀觴九州萬物同如意行樂宫中例萬年一曲昇平萬民慶蟠桃果熟嵗三千夀域鴻禧詄蕩開稱觥曽獻聖人来福凝東海増芝算萬夀昌哉更熾哉惟無量夀福無量無量夀希與佛同行慶施恩舉次第萬方民物照臨中卜嵗大横祝實成光天萬物樂由庚詔書寛大衘金鳯夀㝢恩將遍九瀛禮偹太和萬邦㑹大清萬載鞏天禧一時上瑞蘿圗展玉醴椒芬萬夀巵菊泉益夀傳佳話萬樹恒春自在芳正是逺来近悦候敷天夀域慶方長綏猷建極敬惟劭景福如川御正饒夀酒介眉添鶴算金甌萬禩九瀛朝萬㝢顒希福轃轃更看仁夀鏡宜人邇来四萬八千嵗稠叠欣増夀算頻對時育物志惟勤實政惟期被萬民百嵗熈和九州晏夀徴福履自駢臻柏酒擎来獻夀觥欣逄萬寳慶西成横雲夀嶠萬年夀不盡萬齡祈祝誠福並海山増寳帙命鐫琬琰夀千春仁斯夀寓知惟樂此樂還期萬國均山光萬夀迎春麗散作園林萬樹花巷舞衢歌申衆悃稱觴獻夀自家家皇清職貢萬方均夀域宏開茂以新此慶古来應少見九瀛萬物盡皆春减賦蠲逋施次第莫如千萬與全蠲更期夀世多黄耋惟曰保民欲萬年十成紀嵗五常并樂奏彤墀萬舞呈虔肅祝年永期萬都知獻夀座前擎萬年枝是彤墀植五代一堂康健身起舞稱觴齊上夀孫曽躬率綵衣彬十一代綿𤓰瓞永誠惟萬夀祝康強瑶池桃實三千嵗好是團圞獻夀觴鶴其性人夀其似夀世頻開千叟筵延美重庥垂萬禩大清國祚萬斯年康強真是夀無量隹話天家貽萬春百九四家慶繁衍便因敷錫萬方民介夀祥徴亞嵗駢熙春篤祐萬斯年杯因獻夀圎浮玉𣲖衍天潢数萬千夀為福先語可思南山為夀獻新詩宜暘宜雨真如願萬廩千倉嵗可期益夀何須九轉丹萬方生計廟廊端翕河察吏諮民隐四海㑹同永晏瀾六度南巡慶典行禹工萬古仰平成五絲延夀占遐算萬夀増如大海并大造無私澤被均萬民瞻就愛情真諸峯獻夀皆堪指靈夀聼教手握筠夀民夀婦本恒披保泰心猶念在兹户口嵗増逾萬萬夀増肇祚算無涯康強福夀誠誰並宵旰山荘勑萬㡬新捧霞觴介眉夀瀼瀼瑞露湛金巵舊藩新部扈相将畨徼回城畢享王萬夀字屏金匼匝萬方歡奉萬年觴萬民安實一人福東澥南瀛許並陪玉帛萬方咸奉朔綺筵夀介紫霞杯寰瀛真見悦無疆都尉宜禾千萬箱萬里伊犂朝北極屠蘇延夀玉為觴曼殊師利夀無量萬億無央錫兆民四海一家萬民子流沙今越海西濱夀世休徴真是罕靖遐耆定萬年基萬年循例今年始夀酒翹歌福禄宜兵洗金川永不波歡欣萬姓氣増和東皇善錫無量夀祝夀惟期萬嵗多海疆耆定誠神速萬國春臺願美全際此繁滋仁夀世養恬引欲溥垓埏七聞鴻㨗叨天佑福夀如山自兆釐旗籍緑營維内外詰戎家法萬年垂如意惟徴獲十全朱波懐畏靖蠻邉迎鑾祝夀陪臣价誌鬯國威萬里宣祝夀外藩兼内吏統惟天眷萬年承南交三百餘年國萬夀稱觴合作朋稽古右文惟是亟書蒐四庫足研摩鄴侯三萬卷誇富願作籌添曼夀多辟雍新建因遵古萬夀平眀歩輦移夀世熙民宜賦咏無疆萬夀永無期江山介夀慶如何静對詩書趣更多四集吟成三萬首萬年永式省賡歌恩科萬夀試京師春到人間萬物知雅化育材欣夀世萬年有永祝如斯智者樂兼仁者夀八千秋祝萬千秋太和訢合人心豫獻夀都為海屋籌敷天萬物資仁育寰宇増年耄與倪億兆京垓莫終極岱宗夀算願同齊天垂旗翼眀徴夀訢合東皇萬福禔曼夀益増體益健如斯實願萬年斯七旬登夀凡六帝萬六春秋且漫論名夀都縁大徳得萬㡬絜矩一心存寳閣便成無量夀山圍萬夀倚如屏飛来徳夀青蓮朶聖夀應増億萬齡蓮花萬朶葉千萬萬夀都添海屋籌枝暖萬年曦蓲嫗綵屏延夀玉麟洲榖登萬寳真成瑞亥字書年夀世長夀徳醇風耀閭里羣仙引進萬年觴萬嵗千秋申慶疊介眉夀酒正思柔欣徴人夀樽浮柏箇箇来添祝夀籌延夀戩禧輝吉語俯臨萬井樂亨衢六街三市誠殷富仁夀鏡呈獻夀圎樂嵗三元慶有餘夀山東障枕長渠萬年祝願兾如願有願山同萬夀如五福箕疇夀居首萬年祝袠念惟誠重増綺甲普増嵗於萬斯年未覺盈夀同松柏映瑶階獻夀欣當風物佳嘉夜寳燈輝萬夀大清萬載萬民諧五福中天綿萬福萬斯年例始斯今普天億兆人同願夀獻岡陵酒滿斟端識福綿夀益綿天恩國慶萬春延稱觴共上南山夀更祝如斯億萬年萬夀恭擬乆徴頌九章謹序國子監祭酒臣韋謙恒臣聞夀以政年則順時敷治為本福在養人則宜民利物為先粤稽太古神霛三代聖哲紹天闡繹以康四海徃徃單厚多益祜篤慶駢若夫政積乆而彌隆化積乆而彌浃恩覃澤滂景照醴飲成天下之亹亹而熈洽臶轃福應總萃闢以来来自今以始盖千萬世而一遇也洪惟我皇上大鈞斟化健運持樞箕疇􅊀五福之堂軒紀啟八旬之笇中外臣庶藩服長𨽻鼚鼓軒舞䖍祝萬萬年甚盛典也至於凝福多夀所由来汦汦含生飫見飽聞詎能殫舉然大經大法有尤顯著者焉敬法天祖惟時惟㡬凡計闗民生籌厥安全洪纎周具剏立制度禮樂醇偹文思巍焕武功顯鑠幅􅊷拓於無外柔徕徧乎陬澨蒸蒸然日新月盛恒乆而不已盛乎哉時和嵗豐户封鬴給怡昇平而康茀禄洵為郅治極軌迺皇上保泰乗乾敬寅滋懋鐫璽曰八徴耄念之寳繫以記文昭示萬禩臣尋繹恱服伏思徴者由天而驗之人也五事修則類應焉中庸曰不息則久乆則徴久積於中徴驗於外其義與洪範相發明皇上福由徳致仁為夀符充積五十五年之久由是以推福我烝黎閱億萬年無有紀極至誠不息之久徴於是乎益信臣叨蒙聖恩屡邀拔擢職司成均欣際夀愷洪延偕鼓箧多士涵泳聖涯沭浴醲化自揆檮昧不足以稱述萬一惟舉歡騰喜洽之實徴臚為乆徴頌九章恭呈睿覧臣曷任欽戴忻抃之至謹拜手稽首而獻頌曰聖徳如天旦明祗寅崇三大祀志鞏儀彬圓壇躬陟牲玉虔陳天眷聖徳夀世夀身燭調甌固雨暘普均美利不言萬吉維新帝心祈嚮孚通翕臻敬信之徴保右命申其一大清緝熈五朝燕翼寳訓實録有典有則國書國語騎射冠服叶㢲命重申不忘不忒留都四莅覲揚開國仰惟鴻佑雲礽千億振振䋲䋲如㡬如式繼述之徴丕顯世徳其二勤政書殿無逸書屏萬㡬宵旰疇咨在廷彤扉務理仙荘蹕停憲平吏察萬里户庭獮塞嵗舉省方叠經金隄靈瀆石磡滄溟均禧六幕恊氣三靈劭勤之徴以清以寧其三啿啿群生以食為天恵鮮懐保藏富田㕓再免艘粟四免丁錢户帖逋豁庾帑賑蠲䘏商恵工厥利同焉鴻禧之宇樂我康年歌衢擊壌生齒溢編百齡五世瑞叠祥駢恵孚之徴暢泝垓埏其四事必待時制度斯啟圗稽品式器詳籩簋周笵兩設周鼓重擬璧水淵然黄瓦仰止鏄鐘特磬譜復宫徴詩三百篇洋洋盈耳爼豆庠序徧於邉壘制作之徴大同倫軌其五天亶徇齊典學敏求經論宣藴史評闡幽鴻篇三緝藻什五裒經緯盖輿載道宣猷典册具纂善本廣流四庫淵積七閣芸抽士讀中秘古汲綆修文治之徴雅化旁周其六勇錫武揚算勝宸衷金川両㨗徳威暢崇定凖噶爾逺收筠沖闢二萬里古所未通臺瀛氛殄潢池穴空天戈所指九奏武功鱗集嚮化麇至遡風耆武之徴四海㑹同其七慶基孔固祥凝祚蕃綸賁十行典臚八門昌枝五葉舞綵獻罇億兆葵舒逺逮漠崑瀛嶂梯航有南交藩請襲衣冠曰親曰尊凝翕萬福彌裕其源福嘏之徴淪浃厚坤其八禹疇箕演帝念貞符来叙時若導和昭蘇庶徴嵗省億萬数逾是謂久徴至誠之孚徴則悠逺用鞏籙圗髙明慱厚與幬載俱芸生熈皡液滋醲㪺聖夀之徴歛福錫敷其九萬夀恭集詩經句三十章謹序通政司叅議臣馮應榴皇帝御宇五十五年嵗庚戌秋八月聖夀躋八旬懿爍隆軌從古未有徳施恩溥紀述靡殚海宇内外臣士庶民罔不舞巷歌衢頌揚盛典以抒歡忭慶祝之私臣惟古之言純嘏祝夀耉者惟詩經為多所謂言之不足故永歌之永歌之不足不知手之舞之足之蹈之也我皇上聖徳至治既超軼三代㡬餘典學發為天藻御製詩文諸集炳炳焉與雅頌同昭又嘗御書詩經全部藏於内府盖宸翰之含咀於三百篇者深也臣不揣檮昧敬就蠡管之見集詩經句三十章以獻天作髙山東方自出長發其祥夙夜基命宥宻維清緝熈三后在天紹庭上下於萬斯年本朝發祥長白萬年鞏累洽重熈章皇上纉紹丕基固基命第一民之父母昊天其子之必恭敬止天難忱斯永言配命休有烈光昭假遲遲降福穣穣敬章第二天苾芬孝祀敬㳟明神匪我言耄弗躬弗親皇上夀躋八旬於親詣行郊壇大祀猶必禮濟濟蹌蹌天子穆穆既右享之綏以多福享祀章第三天鑒在下求民之莫恵我無疆天子是若不識不知或歌或㕺欲報之徳萬夀攸酢恵民章第四奄有九有幅員既長敷政優優莫敢或遑訏謨定命日就月将明發不寐曰求厥章實皇上每旦恭閱五録勤政章第實畆實籍歳取十千恩斯勤斯舎旃舎旃賦四特恩普免天下正次七省漕粮二次以綏四方四方有羡婦子寧止言笑晏晏蠲賦章第六祈年孔夙以社以方以祈甘雨農夫之慶嗟我農人稼穡維寳自天降康實堅實好佳嵗章第七雞棲于塒亦既抱子取譬不逺民亦勞止筆繪御雞雛待飼圗朂以頒賜中外臣工保赤百辟卿士天子是毗誨爾諄諄鬻子之閔斯飭吏章第八辭之輯矣為章于天頒發御製宸章已集詩四集文二令聞不已四方于宣秉文之徳學有緝熈于光明服之無斁示我周行天章章第九思皇多士克廣徳心允文允武有壬有林遐不作人以任天子瞻言百里亦云可使者七特詔開鄉㑹試後恩科次復屡于㑹挑選下第舉人其一等者皆膺民社作人章第十烝我髦士古訓是式獻于公所其麗不億文淵等七閣藏書各二十餘萬冊受言藏之有覺其楹矢其文徳展也大成藏書章第十一瞻彼溥原麀鹿麌麌維熊維羆有貓有虎悉率左右我馬既同永錫難老載纉武功習武章第十二来遊来歌匪居匪康星言夙駕綱紀四方登是南邦及河喬嶽湛湛露斯既優既渥章第巡幸十三瀏其清矣淮水湯湯就其深矣河水洋洋念彼不蹟修之平之朝宗于海不日成之河防章第十四以薪以蒸雈葦淠淠至于海邦不瑕有害漸漸之石築之登登其比如櫛以莫不増浙省海塘以資特命築石鞏固十海塘章第五薄伐西戎自彼氐𦍑實墉實壑外大國是疆于彼原隰徹田為糧式遏㓂虐正域彼四方西域章第十六無小無大如蠻如髦為鬼為蜮載號載呶王赫斯怒左右陳行仍執醜虜用逷蠻方金川章第十七民之回遹方茂爾悪有嚴天子用戒戎作如火烈烈執訊連連無思不服其心塞淵平回章第十八民之罔極在水一方蟊賊蟊疾如蜩如螗六師及之一月三㨗既伏其辜海外有截臺灣章第十八自西徂東奄受北國式是南邦四方之極柔逺能邇申錫無疆赫赫業業莫敢不来王柔逺章第二十价人維藩居國南方天子萬夀入覲于王王親命之衮衣繡裳南土是保為龍為光安南章第二十一於樂辟雍薄采其藻遹觀厥成小子有造于以奠之孔恵孔時昭茲来許各敬爾儀辟雍章第二十二呦呦鹿鳴肅肅兔罝樂既和奏亦孔之嘉抑抑威儀芃芃棫樸以雅以南以似以續定制文武鄉㑹試晏歌鹿鳴棫樸干城樂經筵宴歌抑戒詩正章第二十三坎其擊鼓白石鑿鑿駕言行狩先民有作有倫有脊秩秩徳音追琢其章始者不如今石鼓章第二十四人亦有言涇以渭濁周爰咨詢我言維服觀其流泉下土之式聖人莫之鮮不為則諸水皇上於河淮濟源武列涇渭皆有考正咨詢章第二十五黄髮台背其㑹如林孔燕愷弟和樂且湛或獻或酢為酒為醴以介景福以洽百禮宴叟章第二十六受天百禄綏我眉夀自古在昔莫予云覯允也天子如松柏之茂萬有干嵗靡届靡䆒第二古稀章十七民莫不榖勉勉我王維其時矣􅂒曰式臧御製八徴耄念之寳記以念庻徴即所以念萬民體孜孜不天愛民誠心勤政息時若昭庥亦既聿耄旅力方剛温恭朝夕以念穹蒼徴二十念章第八螽斯羽麟之趾克昌厥後既多受祉莫莫葛藟綿綿𤓰瓞本支百世子孫千億昌後章第二十九聖敬日躋思皇多祜溥天之下式歌且舞四方来賀則篤其慶大小稽首萬夀無疆第三聖夀十萬夀恭擬栢梁體一百六十韻謹序光祿寺少卿臣阿肅臣聞宥宻基命莫崇於徳神靈甄貺莫厚於夀故惇徳之朝不陳瑞應而緜算即其至瑞延洪曼羡川至日増懿乎詎猶是尋常景星卿雲洛符河寳之偶示庥徴而已欽惟我皇上御極五十有五年乾行益健聖敬彌躋綏履茂嵩睿神純固膺泰元之増䇲運悠久以無疆自開闢来珍貺靈符竒祥盛瑞靡有逾于斯者矧夫偕一世之民胥躋仁夀之世數㝢縣以逮蕃服耆黎夀耉逾期頥者絫千見曽元者絫百其享大耋履耄朞比屋皆是禕矣哉一人錫祉萬域均禧雖宓犧氏之民侗然自得以獲永年陶唐氏之民職職植植號稱難老尚未臻兹盛也又况夀㝢洪開八紘輻輳麇至鱗集依我樂郊皇上式廓帡幪遍􅉼濡而蓲蘛之盖體覆載之大徳以為徳溥覆載之大功以為功即綜覆載之大壽以為夀浩浩乎亘元㑹而緜鞏而所謂安如磐石壽如箕翼更無庸贅頌也已臣儤值内庭夙與賡揚之末欣抒矢音之誠敬成栢梁體詩一百六十韻言雖不文聊自托於負暄獻芹之義其詞曰天眷皇清畀八維奕葉聖聖昌重熈我皇纉緒光慶基卓蹤冠徳軒昊羲法宫髙拱衣裳垂上式乾穹下坤儀照以日月三無私惟天祚聖錫蕃釐祥符顯慶鍾夀祺惟聖法天懋緝熈健行一氣日萬㡬五十五載垂于斯龎洪闓澤漸瀛禆下及跂喙蠉而飛泳逰醲化含甘滋上章之幹奄茂支六合和㑹際昌期籲行慶典申忻愭帝曰俞哉衆所祈予兹與爾均祥禧孟陬之月貞攝提九天詄蕩開閶扉煌煌丹詔宣綸絲露膏湛渥璚霄霏元功溥博参神施九州則壌正賦規二千八百萬有奇嘉爾亞旅力耘耔耕鑿順則無他岐普蠲與衆同豐綏壽考作人髦士宜芃芃棫樸薪槱之沭浴教澤逾芬菲邇者臨雍開􅊰帷釋奠釋菜衷惟寅圜橋聴覩從祁祁特科甲乙増兩闈弧南斗北光陸離驊騮得路鴻漸逵既登仕版崇級資偶有瑕玷亦湔澌推恩錫類封且貤龍章螭篆蟠躨跜五花藻采紛葳蕤杖朝杖國崇耉耆三千叟宴錯履綦夀算徃徃踰期頥膠庠老宿龎其眉甿黎恬養胥齒齯閨門貞壽傅蘭幃和氣所浃咸歡怡一堂五代森孝慈少勤洗腆老含飴可封之俗戸相比頒以銀粟旌門楣恩波普汜無一遺柔化既洽英聲蜚洸洸武義逺邇彌威弧溯昔清西陲皇耆其武張六師萬全之䇿發疇咨灼然天㫁决群疑睿謨恊吉卜與蓍露布曉出天戈麾㨗書夜報軍郵馳凱奏入塞聲凉伊沙磧繩橋平不﨑亦粤金川性詭随自外仁宇怙而􅀈天子有命将徃治桓桓虎旅捜麏麋隳碉破柵及朝炊攙搶掃蕩無險巇邉疆稂莠既翦劙二萬餘里歸藩籬區畫經界如布棊雪山屯戍均畬菑撫制可操三尺箠逺洗甲兵天漢涯壮士倒載包虎皮繪圗紫閣賞有差駿功偉烈銘豐碑殊方慕義咸招擕康居烏秅族冐耏重三譯語通嗢咿敂闗納賮闐軿輜西来天馬精權奇葡萄蒟醤盛以瓻九華七采間琉璃蕃樂色色轟龜兹東耀扶桑西崦嵫南逾交趾古珠厓蛾伏膜拜趋京畿六詔徼外國旄犛多羅之葉金表齎赤嵌畨種氓蚩蚩欣然受吏占祥颸遵王道路由坦夷鴻臚典覲班魚麗舌人賜饗酣醴酏竒樂甬觗觀且嬉襲我冠帯樂逶迆猗歟盛哉古所稀帝曰昊蒼實相台冝以成功告神祇夙整龍駕雲騤騤東巡泰山躋厜㕒齋宫蠲潔詣壇壝燔柴植璧䖍牲犧鑾輅重臨洙泗湄式瞻車服儼瑰琦正學昌明日月爔省方問俗舊典稽視民如子拯溺飢塞防發帑數不貲禹跡所至胼以胝九山既奠澤既陂春郊布榖和鳴鸝畇畇原隰安耕耚嘉禾垂頴麥秀畦陌上懿筐日遲遲民情纎悉咸周知玉衡稱量金壺釃淪浃骨髓及膚肌薫風觧阜茂對時琳瑯萬首奎章題安安文思如無為亶聰典學樂不疲睿裁親秉四庫披百川浩瀚文瀾漪定禮修樂詳鼎彛諧聲依永授諸䕫中和鐘磬合笙箎如聞大章聼咸池天和出虗蒸菌芝元氣真洽人心脾八千之秋少皡司金莖玉露斟天巵重輪復旦星雲輝天潢五葉蕃金枝彬彬濟濟盈彤墀干官待漏晨光熹魚龍百歳陳坳螭翹瞻聖人天日姿拜手稽首前致詞我皇洪算與天齊帝曰予惟日孜孜撫兹㤗運益保持敬天勤民祖訓詒拳拳宵旰鐫琳琪建極歛錫範闡箕無逸作所語佩姬庻徴之八念在兹用答鴻貺康黔黎仰承祖武長繩其臣殷頌禱心傾葵天窺以管海測蠡栢梁之體辭竊摛天保雅材敢企而長言敬作堯衢詩八旬萬夀盛典卷一百三
