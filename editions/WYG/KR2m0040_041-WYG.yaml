body:
  text: 盛事十七辟雍二乾隆五十年二月初七日上丁皇上釋奠於先師禮成臨辟雍講學御論乙巳為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信此雖言文王之止於至善而實訓萬古五倫之要道也夫文王固身厯為君臣父子與人交而各盡其善者矣試思人孰不在五倫之中而各有當止於其善之道乎是故為君者匪惟博施濟衆以為仁即癉惡弼教之義亦必當本於仁而出之所謂止也人臣之敬詎其夙夜匪懈恪恭承㫖之謂即繩愆紏謬陳善閉邪亦必當本於敬而出之所謂止也生事死𦵏祭之以禮人子之止於孝盖終身之事非謂無父母即無子之止於善也若夫父之曰嚴似殊乎母之慈而不知父之嚴正所以行其慈也至於兄友弟恭夫唱婦随皆與人交之義而朋友之信固該其中矣予故云此雖言文王之止於至善而實訓萬古五倫之要道也天行健君子以自强不息天一日一周是行健也然天之運行終古不息不惟不息盖並不息亦無意於其間斯乃健也此應與中庸至誠無息之語並觀之所謂誠者天之道也若夫法天之君子乃誠之者人之道然亦不外自强不息而已盖天之不息無為而為人之不息則在自强自强者必本於克己復禮人十已千成己成物胥在乎是聖人之言非特為為君者言盖人人皆有法天之責此責不在於外而在於心人各盡有心之誠所謂天君㤗然百體從令而為人君者益當法天行健夕惕朝乾孜孜亹亹不遑暇逸以是為亟耳御製仲春釋奠先師孔子禮成有述乙巳考古今春舉辟雍䖍因釋奠致寅恭於焉敬對神如在遑不深思道所從實願樸莪作舟楫詎徒觀禮聳羔縫武公耄耋猶勤學予少于伊志敢慵御製上丁釋奠後臨新建辟雍講學得近體四首乙巳國學由來教化先北京建五百餘年空𫝊中統廟修矣按元史稱太祖平燕京以金樞宻院為宣聖廟又世祖紀中統三年修宣聖廟此皆言彼時南城國子學盖元太祖初定燕京時所建也至選舉志稱至元二十四年遷都北城立國子學於國城之東又世祖紀二十四年閏二月設國子監乃今城東國子監之權輿也是以己丑年曽製重修文廟碑記云國學始於元太祖置宣聖廟於燕京乃指燕京初設國子學之始而言兹城東之文廟國子監則世祖至元二十四年遷都北城所立而非中統所修矣向來紀載重沓毎自相牴牾因為訂正明晰附識於此獨惜辟雍典闕然酌古準今圖以創穿池引井璧成圓崇儒重道心難亹懼亦在兹記語宣古制天子之學曰辟雍諸侯之學曰泮宮北京國學自元厯明以至本朝五百餘年有國學而無辟雍名實不稱雖有建議請復以乏水而格部議昨癸夘春始命酌古準今穿池引井新建圜水復親製碑文以復古而不可泥古諄切誥誡詳見辟雍碑文記放勲巍蕩未言學教胄命䕫始有虞夏序殷宗因逓述文豐武鎬豈相殊橋圜莫作徒觀者廷獻應為有用儒却憶永平稱億萬後漢紀稱明帝永平二年上始率羣臣躬飬三老五更於辟雍饗射禮畢帝正坐自講諸儒執經問難於前冠帶搢紳之人圜橋門而觀聽者盖億萬計云云所記未免失實臨雍盛典觀聽雖多然搢紳冠帶何至億萬人之多且圜橋之間豈能容而人多擁擠亦必觀聽有所不及史傳之誤徃徃類是雖云善善却鄰誣三老昔經著説詳謂他杜撰失荒唐三老五更之說不見詩書惟禮記出漢儒非孔子之言左傳始有三老凍餒之文註疏者紛紛不一而蔡邕獨㫁遂有父事兄事之説白虎通直以為老更各一人且曰父一而已不宜有三其謬更甚杜佑通典亦宗其說真成杜撰矣向嘗著説闢之詳見三老五更説今命刻於辟雍碑隂祇宜養老示恩渥難並臨雍贊禮煌韓愈不甘弟子列蔡新或備伯兄行韓愈答吕巫山人書謂世無孔子不當在弟子之列其見甚髙語亦正若今之羣臣孰可當老更之席者獨大學士蔡新長於予四嵗或可居兄事之列然恐其局趣弗敢當舉王導對晉元帝之語耳慮其驚懼謝無當去聲王導稱曽喻太陽晉書王導𫝊帝登尊號百官陪列命導升御床導固辭曰若太陽下同萬物蒼生何由仰照帝乃止祭毋欲數上丁逢釋奠禮成臨辟雍舉事率因待時節北京國子監自元迄今五百餘年而辟雍圜水之制未備癸夘春始命興建甲辰冬工竣此誠舉大事者亦必有時節之待也化民寧渠去聲在儀容五倫知止須勤朂一己自彊切戒慵是日講章題大學為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信易經天行健君子以自强不息文質彬彬衆和樂重熙茂對志滋恭大學士伍彌㤗協辦大學士管理國子監蔡新祭酒吉善鄒奕孝講四書易經清漢文講章為人君止於仁為人臣止於敬為人子止於孝為人父止於慈與國人交止於信此𫝊者述大學止至善因舉文王以立人倫之極也聖人所止無非至善而必有尤大且著者為天理人情所必盡為萬事庶物所由推然後可以法天下而垂萬世盖天生烝民有物有則所居之位不一則所止之善不同故為人君則其所當止者在於仁為人臣則其所當止者在於敬為人子則其所當止者在於孝為人父則其所當止者在於慈與國人交則其所當止者在於信惟文王緝熙敬止以五者為之綱而庶務萬幾皆有以知其所止而無不歸於至善故曰聖人人倫之至也其在詩曰儀刑文王萬邦作孚此之謂歟學者於此誠能殫其知止之功盡其得止之實則明倫飭紀悉復其本然之性真而觸類旁通自具有當然之準則入徳有基而由此以幾於聖學不難矣仰惟皇上道契𫝊心化隆主善敬勤交宻作之君兼作之師誠信允孚以是學即以是教璧水煥鎬京之制橋門展庠序之規多士幸際昌辰欣逢盛典其各思淑性敦倫擴充懋勉以上副聖天子夀考作人之至意焉天行健君子以自彊不息此節乃言君子體乾之功以見盡人合天之學也盖天以太極為之主宰而二氣五行相推相盪於其間隂陽迭運一日一周循環不已天之道然也若夫聖人則與天合其徳故帝載所常周之處即聖心所黙運之處惟是天渾然莫測善言天者必於行而觀之行者天之用也是故春夏秋冬有其時日月星辰有其度晦明盈縮有其候萬古此天即萬古此行健之至也法天之君子荘敬日彊極之純亦不已其見之行也禮樂刑政措置咸宜即春夏秋冬之各因乎時也紀綱法度有條不紊即日月星辰之不爽其度也立道綏動張弛悉協即晦明盈縮之常符其候也本自彊不息之功以徴乆道化成之盛故能與天合徳天人之際妙合無間非聖人而能若是乎仰惟皇上道契乾元功符廣運帡幪罔外彌彰宵旰之勤福祿來崇允建中和之極五十年總如一日億萬紀同其運行多士幸際昌期恭逢曠典咸宜遏私存理敦行不怠以副聖天子體天立極之至意焉是日瑞雪應期加恩四氏及聽講官生有差御製雪二月初七日敬以臨雍祀上丁夜霏稷霰曉無停春雲愷澤凝春雪六出文華燦六經自幸麥麰發苗頴敢云爼豆假香馨微憐人士濕衣履歛福恩應錫在廷本日奉上諭朕此次釋奠禮成臨雍講學諸生觀禮環集橋門允宜廣錫恩施以昭盛典著於乾隆五十一年丙午科順天鄉試皿字號卷内廣額十五名用示嘉恵膠庠鼓勵人才之至意又奉上諭朕此次釋奠禮成臨雍講學圜橋觀聽文教覃敷實為矞皇盛典且自冬春以來雨雪尚未霑足朕心焦切兹當爼豆馨聞恰值春膏霑霈深為欣慶第念随從執事諸臣及觀禮多士衣履霑濕允宜廣錫恩施所有執事扈從之王公大臣衍聖公並文武官員俱著紀錄一次其觀禮諸生及至聖各氏後裔並著查明分别加恩賞賚二月初八日國子監堂官率合屬官員及諸生衍聖公率聖賢後裔進表謝恩二月初十日頒賜衍聖公國子監堂屬各官諸生等冠服銀幣仍賜宴於禮部是年朝鮮國謝恩在京之正使臣錦城尉朴明源副使臣吏曹判書尹成烈并随帶書状官李鼎運從官通官洪命福趙逹東方㤗運等俱欽奉諭㫖准令随班觀禮禮部謹奏為奏聞事據衍聖公孔憲培咨稱恭遇皇上臨雍盛典遵例帶陪祀觀禮人等相應造具清冊送部等語臣等伏查陪祀人員至聖後裔應帶五人四配十二哲應帶二人觀禮人員至聖裔應帶二十人四配裔應帶八人十二哲裔應帶四人俱擇通曉文義堪加培植者送國子監准其一體觀禮如不得其人寧缺毋濫職官准其紀錄一次貢監生准予應考職銜廪生准作貢生増附生准作監生今衍聖公帶來陪祀觀禮各後裔均在定例人數之内理合奏明俟皇上臨雍禮成後臣部行文吏部國子監照例辦理奉㫖知道了又奏為請㫖事查定例恭遇皇上臨雍講學禮成由臣部查明陪祀觀禮聖賢後裔及國子監官員進士舉貢生監官學諸生人數請㫖分别頒賞上年十一月准軍機處交出奏准恩賞清单内開賜衍聖公貂冠朝服頒發刋刻御論二篇徽墨二匣貂皮四張陪祀至聖後裔五經博士各氏後裔八絲縀各一卷御論各二篇徽墨各二匣貂皮各二張滿漢祭酒司業八絲縀袍褂各二卷監丞助教筆帖式等官八絲縀各一卷肄業諸生及在京觀禮進士舉人貢監生廕生八旗官學教習官學生銀各一兩陪祀各氏後裔送監讀書等因奉㫖此項八絲縀交内辦欽此經臣部行文各該衙門照例預備本年衍聖公到京冊送觀禮各氏後裔先經臣部奏明禮成後照例移交吏部職官准其紀錄一次貢監生給予應考職銜廪生准作貢生増附生准作監生等因奉㫖知道了欽此欽遵各在案今據國子監送到應行頒賞之衍聖公滿漢祭酒司業並五經博士十三員監丞助教筆帖式四十九員陪祀各氏後裔三十七名聽講肄業諸生進士舉人貢監生廕生八旗各項官學教習官學生三千九十三名應照上年軍機處奏准恩賞清单欽遵辦理其衍聖公等冊送觀禮各氏後裔六十名應照本年臣部原奏行文吏部國子監分别查辦恭候命下臣部遵奉施行再查大學士伍彌㤗蔡新奉㫖派出進講應否與祭酒等一體賞給八絲縀袍褂各二卷之處理合請㫖奉㫖着賞給又奏查從前各氏後裔陪祀生員監生奉祀生一體准作恩貢無所區别此次復有貢生武生俊秀等項為向來所無臣等酌議所有生員監生照舊例准作恩貢外其貢生武生俊秀并奉祀生四項謹酌擬恩例開列清单恭請欽定至陪祀例由衍聖公及各氏五經博士帶領族人向經定有額數其中亦有應行核定及節次増設博士之處并繕单進呈伏候訓示所有孔毓琯等三十七名即照此例辦理并纂入臣部則例永逺遵行謹奏酌擬陪祀恩例一貢生向來陪祀并無此項此次陪祀貢生應請照乾隆三年吏部奏准觀禮貢生之例以本身應考職銜掣簽註冊一武生向來陪祀亦無此項若照文生員之例准作恩貢将来由恩貢銓選教職難資考課應請准作監生一俊秀向來陪祀亦無此項伊等原無項帶但既係聖賢後裔躬逢盛典在陪祀之列應請酌量加恩准作監生一奉祀生向來陪祀雖有此項但該生等以嫻熟儀節専司祀事與考試録取者不同若照從前一例准作恩貢銓選後亦於考課非宜應請将舊例酌改准作監生核定陪祀人數清单一至聖裔向例陪祀五人皆曲阜籍由衍聖公帶領此次衢州孔氏南宗五經博士帶領二人查與各氏博士帶領人數亦符但不行區别恐致牽混嗣後應請定為曲阜五人衢州二人一元聖裔向例陪祀二人係山東之東野氏今查陜西姬氏於乾隆四十四年蒙恩添設五經博士應請将元聖裔照各氏博士毎員帶領二人之例定為東野氏二人姬氏二人一有子裔向來陪祀二人此次係江蘇崇明有氏由奉祀生有照熊帶領與各氏五經博士帶領族人之例不符且随從奉祀生之人邀恩轉過於奉祀生實未允協自應照例扣除現在有氏五經博士經臣部議覆山東撫臣學臣奏請以山東肥城有氏承襲俟查明准襲後令該博士遵例帶領一朱子裔向例陪祀二人查安徽婺源福建建安各有額設五經博士此次二人俱係婺源籍未免偏枯亦未便照衢州孔氏陜西姬氏之例嗣後請将原定二人於安徽福建二處分派定為婺源一人建安一人衍聖公孔憲培表言伏以昌期熙洽萬年瞻有道之光聖學淵涵九域仰同文之治播和風於禹甸式大禮於虞庠羣黎昭徧徳之休髦士協彚征之吉欽惟皇帝陛下化孚九有撰合兩儀本主敬以綏猷治恢鎬洛體執中以御宇功邁勲華爰昭釋奠之儀載沛臨雍之澤絢黌宫之黝堊圜殿流丹滙璧水之奫淪環池漾碧鴻規特建肇開輪奐之華盛典聿新近擷藻芹之秀鑾輅式臨羮墻最切仁敬孝慈信聖徳常昭乾元亨利貞天行不息教新日月示五止之精微義闡苞符啟六爻之閫奥羣言受範多士觀光咸就日而瞻雲務采華而擷實臣幸先鷺序獲覲龍光世沐國恩荷襲封之褒寵恭承祖澤覩創制之輝煌伏願駿業日新協乾坤而同夀鴻圖孔固昭卿景以長輝雅化旁流極霞蔚雲蒸之望慶符駢集備麟逰鳯舞之祥臣無任瞻天仰聖激切屏營之至謹奉表恭謝以聞大學士蔡新等表言伏以景運長新河洛啟苞符之秘文光朗映圖書聫奎璧之輝際元化之覃敷慶鴻規之肇建欽惟皇帝陛下道該仁知學備生安治煥大猷四海備車書之統化成乆道萬邦惬瞻就之忱特隆勸學之儀䖍舉尊師之典溯辟雍之建置實太學之觀瞻百册年禮樂振興三千載圖書詳考稽作人於周代統虞夏殷而制度綦詳數首善於神京閱金元明而規模未具惟君師之兼備仰徳福之並隆乃昭盛典於垓埏遂鞏鴻圖於膠序千尋輪奐瞻飛跂於橋門一鑑淪漪挹芬芳於芹藻翥鳯翔鸞之額寳墨輝煌聲金振玉之音宸章煜赫龍旂夙至紳佩臚歡雉扇初開鼔鐘叶奏五善歸於敬止宣言昭文徳之全六位本乎健行析義闡羲經之藴臣等虎闈備職槐市依光雍宫布雲日之華誠傾葵藿璧水覩綍綸之煥榮逮章縫伏願帝祚洪延宸禧懋集章昭倬漢常瞻有道之光澤溥菁莪永效無疆之祝臣等無任瞻天仰聖激切屏營之至謹奉表恭謝以聞朝鮮國王李祘表言乾隆五十年四月十四日臣承准謝恩陪臣錦城尉朴明源等囬自京師齎到禮部咨二月初七日皇上行臨雍大典朝鮮國謝恩使臣欽奉諭㫖一同觀禮本月初十日随同衍聖公等在部筵宴一次十五日恩賞正副使大縀各一疋書状官大通官八絲縀各一疋相應知照朝鮮國王可也等因奉此臣竊伏念我皇上莅周王夀考之慶剏漢雍度越之典尊先師而躬行舎菜引章甫而親臨論經禮成一日風動四方而不意柔逺之化逈踰常格右文之治覃及賤蹤至令陪臣猥厠天朝之崇班獲覩賢闗之縟儀爰推在笥之恩又侈賜錦之榮隆眷殊渥往牒罕覯寵光所暨瞻聆咸聳臣與一國臣民歌詠洪慈不勝感戴之忱謹奉表稱謝者臣祘誠惶誠恐稽首稽首伏以東藩效筐篚之供誠切就日西雝厠冠珮之列恩逮使星同文之治匝域皆聳伏念臣化被偃草地僻扶桑侯度恪修春秋玉帛之匪懈帝徳廣運雨露帡幪之至周豈料旅庭之行人獲覩臨雍之盛舉璧沼晝永欣瞻横經之儀玉音春温得預環橋而聽至若頒文錦之渥亦洪被内服之仁兹蓋伏遇皇帝陛下六合車書一視遐邇功参覆載已見五十年升平政先柔懐克致大小邦咸服遂推殊眷亦及敝封臣敢不仰戴皇仁俯安民庶鯷封跡逺縱阻於樂之筵象闕心懸祇切無疆之祝臣瞻天仰聖無任激切屏營之至謹奉表稱謝以聞臣等謹按古者昭至徳本人倫勸學修禮崇化勵賢以風四方莫重於學而國學為尤重成均始自五帝周謂之辟雍自漢以來西京元鼎東京永平疏璧池而延冠帶啟橋門而引諸生說者稱盛然圜橋觀聽侈言億萬語本近誣魏晉空尚靡文元明缺修軼典豈所以恢至道闡茂懿歟我皇上崇文心亹舉事必待其時乾隆癸夘春特命興建辟雍乙巳仲春釋奠禮成親臨講學其所為演迪醇化陶鈞庶類者實盡美盡善而無遺非夫亶聰首出曷能損益就中上契古皇制作之精微以成昭代文明之治有如此者伏讀臨雍御論示萬古彞倫之凖著體天行健之誠心法治法一以貫之正懋學之本敦化之原也御製辟雍記文中誥誡周詳於凡衣冠典禮更惕以祖制之當遵不可炫名而失實尤億萬年保世滋大之謨也嘗考靈臺辟雍之詩序言民附徳及鳥獸昆蟲鎬京辟雍之詩序言廣聲教思服扵西東南北我皇上撰契清寜治徵悠逺矢文徳以懐邦告武成而執訊詒謀燕翼乆道垂庥而斯舉也正當熈洽之時仰流者鱗集逖聴者風聲觀國之光於帝其訓爰有百齡司鐸逺服陪臣鳬藻駿奔來預盛禮揚教澤而溥恩施綱紀四方以烝髦士於是升香應候時玊告豐所為克叶天心允符盛事者矣八旬萬夀盛典卷四十一
