body:
  text: 欽定四庫全書八旬萬夀盛典卷九十歌頌十萬夀祝釐茂典記一首禮部尚書臣紀昀欽惟我皇上正位星樞凝神雲牖九陽元氣運槖籥以周流二曜貞明轉璣衡而不息萬萬年綿延鳳紀積算無窮五五數契合龍圖循環復始當由庚之直嵗八袠宏䦕卜太乙之降祥四瀛同慶衢童壌叟咸泳化而謳吟氷海炎州亦聞風而詠蹈丁未八月多羅禮親王臣永恩等上占景命欣叶瑞於南弧博採輿情共陳書於北闕祈増舜夀預陳河渚之苻幸荷堯俞俯鑒封人之願許以庚戍八月舉行慶典従衆志也然而冲懐謙挹明訓諄詳雖席豫而履豐恒戒奢而示儉戊申三月詔以大學士臣阿桂臣和珅等經理其事曲従民志容申芹曝之忱仰體天心不改松雲之素觀瞻所繫惟昭帝制之荘嚴節度斯存不極人工之巧麗盖我皇上執中建極規矩生心稱物平施權衡合道義當修舉雖億萬而無辭事近紛華即纎㣲而亦謹是以黄河紫澥斸石搴茭粉堞丹樓甃郛造邑冬官計直恒盈轉運之舟車農部持籌弗靳度支之金幣至於春旗遥蒞輯瑞時廵秋獮親臨艾蘭講武屬車所至鄉閭無力役之征行殿雖陳棟牖鮮雕礱之飾屢聞丹詔勿踵事以増華或發朱提毎量工而給直今逄聖節方同文囿之經營預降温綸俾守堯階之樸遫持盈保㤗聖心之所見深矣是年八月預行正科鄉試即以明春㑹試而以正科之嵗加舉恩科歌鹿鳴而開宴不待三年登雁塔以題名探支一嵗碧桃重放春風長天上之花丹桂添栽秋露浥月中之樹銀袍及第咸稱夀考之作人鐵網求材應見文章之報國此行慶施恵之始也至於伏生耆耉白首研經曺鄴棲遲青衫隨計来扶鳩杖皆邀免觧之恩得到龍門總入奏名之例人登雲路争㸔老鶴之冲天官帯氷銜亦似新鶯之出谷盖年老諸生以鄉試賜第㑹試賜職者三載之中殆數百焉是皆我皇上金華嵗講念典維勤壁水親臨栽培有素奎章寳字括典謨雅頌之精壁府芸籖蒐甲乙丙丁之秘箕疇演範建皇極以敷言羲畫傳心觀人文以成化元元本本惟聖教之開先炳炳麟麟遂儒風之彌盛加以澄清士習滌宋儒朋黨之風慎重科名遏唐士夤縁之竇敦崇道義俗盡還淳砥礪亷隅人思自立是以滋蘭種蕙才彌取而彌多映雪嚢螢年益髙而益壮幸登夀㝢得荷榮光豈非久道之成俾恊彚征之吉歟是月緬甸國貢使至十二月䑓灣生畨亦至白狼赤虺唐姚州旁帯之區青草黄茅楚荘蹻未開之地當年負險避七萃而潛踪此日輸誠慕兩階而向化甘稱臣僕不矜驃信之題詩無待招徕迥異趙佗之納貢至於峒蠻别種翠嶂週圍海國旁支赤嵌控帯土風各别在山都木客之間王化不通自栗陸赫胥之世屬以樓船下瀬横衝鹿耳之濤戈甲捜巖净掃雞籠之雪狼􅋃討逆始知九伐之聲靈蜃窟傾心願附八閩之版籍鳥言卉服到朝廷初習威儀瘴霧蠻烟如天地乍開混沌是皆皇穹眷命申保佑之無疆故令荒憬歸心昭天人之合契當其仰瞻宫闕經九譯而来庭皆蒙俯允臣鄰效三呼而致祝豈偶然歟是年冬禮部侍郎臣徳明以太常寺仙蝶恭進䝉御製詩章我皇上道源洙泗乆斥神仙治法唐虞寧矜符瑞故天文寵錫雖特記共来儀聖諭丁寧仍預防夫好異然當昆蟲之俯蟄咸避風霜惟兹薄翼之蠉飛近瞻雲日共間共見事有明徴時往時来象非偶幻良由得天乆照逢洪算之緜延所以與物皆春飲太和之洋溢休徴感應則草木長蕃協氣沖瀜則禽魚咸若亦似陪筵之千叟各遂生成因偕表宅之百齡並登仁夀較諸連珠合壁天著神符九穗雙岐地徴靈契洪纎異類論其事似若殊途位育同原考其理實無二致帝垂彛訓雖云却而弗居臣頌昇平未敢闕而不錄也己酉正月大學士臣阿桂等奏請纂修萬夀盛典摛詞東觀金匱紬文比夀南山琅函紀盛自七旬而託始十年之歌頌彌多列八目以分門兩載之蒐羅未竟盖九重之綸綍嵗嵗増宣兼萬國之梯航時時遝集浩繁難罄本如海之無涯接續添書亦似川之方至羲和測騐不能寸晷而周天章亥步量難以數程而盡地固其所也是年五月安南國阮光平奏表乞降七月西畨廓爾喀亦遣使内附鄧侯去國失地書名鄅子無歸従孥不返廢興有數識天意之所存順逆能明即帝心之所鑒陳情納䞇願隨軒帝合符稽首稱藩不待周文因壘當經始祝釐之嵗恰值敂関計臚歡稱慶之期猶能来賀若夫蓬婆之外地漏山經井絡之餘人依梵域大荒西去已逺隔乎坤維懸度東行但遥稱以震旦初以下情未達觸蠻搆釁而兵争繼以聖鍳周知虞芮質成而心服稽其龍媒人貢路出三巴正逢桂蠧封函人来五領聞風讋慄均為不戰而降接踵馳驅大似相期而㑹若或使之斯亦異矣是嵗也嘉祥並祥已届昌辰乾􅅥彌深猶形睿藻徳能基福理􅘦其淵源聖本希天心符乎幬載九疇布列惟皇極之居中五事分占信庶徴之有騐文鐫寳篆詞比湯盤記勒瑶編義深堯誡上孚帝縡知息息之潜通獨握乾樞恒兢兢之宻省則有御製八徵耄念之寳記焉雙鈎精妙墨拓烏金十鼓團圞石瑩蒼壁援今證古縷陳一器之源流摘謬存真親定三家之同異集王書而刻帖妙勝懐仁補周雅以成詩逺逾束晳已殘焦尾重膠百衲之琴久碎精金再鑄九州之鼎㡬餘旁涉足知聖智之兼周物小能勤益見睿思之曲到則有御製重定石鼓文焉夫岐昌演易法天者在於健行姬旦陳書享國者由於無逸箴銘咨儆是真保治之樞機强固精明抑亦延年之符券矣庚戍正月頒萬夀恩詔於天下大撓推䇲候届新正太皥司辰時當元旦筩吹太簇為東風入律之初柄指攝提是北斗回天之始寳袠啟長生之籙天禄方増盎漿㪚太極之泉春祺用錫嵗朝申賀拜黼座而分行聖節推恩布綸音而涣號台衡承㫖擎来一卷黄麻宗伯司儀捧到三層丹陛鳯銜而下日華耀五色之紋蛾伏而聴風影漾雙垂之穗鴻臚迭唱春生廿二條中儀部分頒澤浃三千界内霆聲啟蟄八夤之壧處傾聴雲液流甘百族之桐生茂豫喧呼相告真如大海潮音沾溉無窮未減恒河沙數然而我皇上淵乎深念彌軫衡茅邈爾遥思先知稼穡乾元各正雖溥育夫寰中巽命重申再加施於格外更於頒詔之後命普免天下錢糧九州成賦為數原多一體蠲征承恩最溥滋培有素已兩停轉粟之舟敷錫無疆又四輟催租之吏膏雨一時而再降九榖増蕃福星每嵗而移躔三年徧到固宜堯封禹甸人人後舞而前歌兼使戎索蠻疆處處懐仁而慕義矣是月十日命外國貢使隨宴於御園髙句驪東藩之首近接三韓暹羅斛南海之隅遥通六詔集榕城之市舶獻篚者地號中山欵桂管之闗門奉表者人居北户復有天西之絶域驂鹿呈圖新従棧北之長途貢􅋙通道先来後至均當慶節之前舊屬新封並入華林之宴五筵列俎叨天酒之親斟三國同文喜宸章之賡和顔師古繪圖貞觀曽所未聞明悉獵聨句蓬莱知其不逮豈非山川萬里咸知威徳之昭所以中外一家共效拜颺之盛歟二月東廵岱嶽親祀孔林百神咸秩迹尋黄帝之合宫六藝常昭禮重素王之闕里萬象入光明之燭風被青徐四民游樂利之天恩沾河濟惟皇歛福無煩探策於山靈是處祈年定信添籌於海屋况乎臨瞻車服道本崇儒宏奬詩書政先造士地連郊甸博収冀野之驊騮俗尚章縫添種頖宫之芹藻燈明黄卷争奮志於黌中草映青袍毎成名於額外傳毛萇之雅頌多吟嘉樂之章習言偃之絃歌半奏熾昌之咏良有由矣七月緬甸國貢使與䑓灣生畨皆復至狼䐠初返求錫命而重来龍户纔歸因介眉而再到就瞻志切寧辭川陸之遥頌祝情深敢避風潮之險紅綃􅇢額金葉髙擎緑罽垂腰瓊筵曲跪花紋宻簇辨佛天香象之形錦段輕舒出海國靈鮫之手珍函秘寳宜増修瑞應圖中異状殊名具譜入昇平樂裏他如昔来豐鎬曽錫南車後逮嬴劉遂停北轍迨威稜之震叠逺被丹垠乃逖聴之風聲重輸白雉十年一貢平時原有常期萬夀八旬今日特申賀悃飛章先告正當岱宗輯玉之時函表初呈恰符泮水獻琛之地足見綏柔之徳厯乆而彌深亦徴銜感之忱有増而無已則南掌貢使至焉攣鞮故地南北二庭突厥遺封東西二部赤山青海袤延斜繞乎長城烏弋黄支控制全歸乎都䕶不侵不叛一百年松漠銷􅇏無詐無虞二萬里玉闗通驛来經冰磧知屬國之同心跪上霞觴願聖人之多夀則䝉古回部咸至焉雷音説法逺接金容雪嶺安禅别開銀界西方佛國夙尊大寳法王東土聖人早識曼珠皇帝曇花浄域尚傳五百之應真貝葉新經敬上十千之天子企瞻舜日皆生歡喜之心膜拜堯階齊賀延洪之祚則西藏逹􅀈喇嘛班禅貢使至焉大宛舊壤夙建五城毋寡餘民今分二族捎雲古榦問神樹而猶存踣鐵髙蹄貢花驄而屢至時因譯長得聞中土之歡吟敬遣翎侯逺達外臣之賀悃黄雲入塞来經甌脱之區赤帟聫行亦預爻閭之㑹則哈薩克貢使至焉周封箕子古有遺風李代王瑶今仍舊國樂浪郡乆為外域實宻邇於邉疆覺華島一震天威遂長修夫職貢毎逢聖夀原隨虎拜之班幸值隆儀更切鳬趨之願途經風雨雖淹滯而難行志仰雲天竟馳驅而迅赴則朝鮮貢使至焉岷源曲折江水東流石紐巉巖維州西控狼心叵測近依巴屬之疆鳥道難登舊是冉䮾之地自六師之戡定全然列戍開屯遂九姓之敉寧莫不輸賨納賮更畨入覲得瞻龍衮之光隨隊躋堂亦附雁臣之次則兩金川土司至焉若夫呼韓覲漢雖有前聞蘓禄朝明亦徴舊史然皆偶因他故隨貢篚以来庭都非特矢専誠奉夀觥而詣闕兹獨山程水驛逺跋涉以觀光月館雲階躬趨蹌而申慶嘏詞金盞迥逾唐莋之歌蕃樂氷絃絶勝龜兹之譜核諸越史堯以来之所未聞徴以蠻書唐以前之所莫紀則安南國王阮光平親至焉是皆我皇上天弧震耀八極宣威心鏡澄明九重握算河源棡鼔冄清葱嶺之塵月窟牙旗雙獻花門之馘闢蠶樷而破陣梟獍巢空跨鯨海而揚舲魚龍氣净路窮地絡八絃拓白阜之圖響徹天閶十曲奏黄神之樂是以玉河珠海悉主悉臣鰈水鶼林来王來享九如陳頌際流虹繞電之期四海趨風預鼓瑟吹笙之宴㑹歸之盛至是而蔑以加矣七月十有九日聖駕至自避暑山荘自八月朔為始日召王公大臣及諸外藩錫宴作樂於同樂園朱廊列坐共侍堯樽紫殿分曺同聴軒樂風生繡罽廿四畨迭換雲衣響滴銅壺卅二刻細浮銀箭對曈曈之日影化國恒長望穆穆之天光聖容倍肅綈嚢叠進仍章奏之勤披錦帙時開更圖書之頻玩管絃聲裏事毎親咨歌舞筵前人猶輪對起居無倦是為静而有常荘敬彌强益信恭則能夀此尤近依日月衆目之所同瞻恭詠䑓萊羣情之所共慰者矣是月十二日聖駕自圓明園入宫金支啟蹕道路光輝玉􅋴鳴鑾人天瞻仰幔亭帳殿稍供睿賞之遊觀巷舞衢歌聊作太平之潤色九華煜爚黼繡周張百戯駢闐魚龍曼衍盖恩膏之沾沃物力原豊况茂賞之便蕃工徒胥逮露䑓猶惜雖知聖徳之謙沖鼛鼔弗勝難禁羣情之踴躍四圍周顧如登忉利天宫六御徐行真見無量夀佛十三日昩爽皇上御太和殿受賀千官黻珮候虬箭而晨趨萬國衣冠待鳬鐘而夜警東皇日出五色曈曨北極天臨九闗肅穆華旗金翠交動影之龍蛇寳鼎烟雲裊薫香之龜鶴五疇歛福表陳出洛之符萬嵗徴祥拜效呼嵩之願仰皇躬之康豫慶洽禆瀛修茂典之煒煌光昭禮樂豈但大同紹興至元之帝莫克比隆抑亦攝提合雒禅通以来未逢斯盛於是上遵祖制瓊筵展八日之期下慰人情綵服過兩旬之外自天眷命僉云茀禄之加贏與衆同歡共卜修齡之錫羡皇運萬八千嵗蕩蕩天長易圖三十六宫盎盎春滿歌舞溢於九野音兼乎僸佅兠離滋榮徧於百昌澤洽乎飛潛動植茅簷蔀屋咸擊壌以歌唫鷺序鴛班争操􅒀而賦詠臣起家詞館本業文章承乏容䑓又司典禮恭逢聖節叨㐮賛乎鴻儀宜奏和聲用發揚乎盛烈惟是乾坤之象非尺寸所能量日月之光非丹青所可繪毎思掞藻動輒含毫况乎福徳兼隆篇章易富上擬班揚之作叠積書山追摹枚馬之音争流學海金春玉撞已㸔衆體之兼陳蠡酌管闚寧待庸音之複述惟是春風乍暖則鶯囀叢花夏雨初晴則蝉鳴髙樹在小物適逢佳候尚解舒吭豈㣲臣幸遇昌期竟能秘響緬惟古義守官與守道無殊揆度常情所見較所聞為悉爰稽舊牘起合詞籲請之初敬述新綸至大禮慶成之日規模畧具惟臚職掌之相闗挂漏猶多實覺揄揚之不盡雖知駢四儷六非記言記動之體裁所欣咸五登三皆得夀得名之證騐獻諸黼扆惟仰祈悠乆之無疆布在書林庶共識康疆之逢吉八旬萬夀盛典卷九十
