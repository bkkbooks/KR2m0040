body:
  text: 欽定四庫全書八旬萬壽盛典卷第八聖徳四勤徳一臣等謹案管子曰人君壽以政年盖謂君所以壽考由於勤政以順年也惟夫秉孜亹之衷而又植貞固之體斯徳新而業廣焉我皇上勤修實政於今五十五年耄期不倦逺軼虞姚良由敬天法祖備全徳全福於一身乃克圖治惟蘉于于其其道而成天下之化觀夫親臨晝殿俯覲羣僚延晷惜隂疇咨倍切固已萬幾就理綱舉目張底於百工熈庶事康之盛者矣伏惟膺圖既久履慶彌長聖政所頒即茅檐蔀屋身被心知皆窺見祗勤于徳夙夜弗逮之本衷其最大者如省方之典屢次舉行無非兢兢非愛民體物之要務南廵一記義備闡之乃至行程周視輙費咨謀中夜馳章猶勞擘畫實為恁且宻焉又若占雲盻澤厪念田功雖屈八旬而雨𤾉之騐惟殷時若聖人之劬心有備至者至於承平訓諫經國有常表一人之勤以増衆志之勵耆齡神武克結必親斯又萬古勤政之極軌矣何其懋哉皇上壽登八旬每舉御門御朝大典夙興成禮平時批章引對備着精勤御製敬題勤敬殿辛丑勤敬額康熈年陳考莫知此匾為年知為何皇祖御書但莫御筆也幾閒雖一豫政要切疇咨兩字楣端揭千秋家法垂山莊及御苑一例永欽兹圓明園勤敬殿為萬皇祖御筆嗣是壽山香山及避暑山莊勤政殿皆余恪遵家法一例書額御製題勤敬殿甲辰勤政為君要此言孰弗知存中外達者以久從敬之察吏安民際深居獨處時名言憶光武樂此不為疲御製題勤敬殿丙午御園及山莊殿胥勤政名是處檐額壽山皇祖御題其圖明園萬清漪園香山静宜園及避暑山莊凡聼政之所均以勤敬名之實數典於此數典實於兹皇祖額煥楹敢不勅天命敢不念民生戒忽忽以怠勿察察為明寄言聰聴者經權在敬勤御製御門日作辛丑御門折本待綸宣例事亦為勤敬先可識安民在察吏未能去慝且求賢心怡宿雪忘寒峭眼看神雲願澤連是日復險大學士兼裏行四合予三百六旬年予今年七十有一而大學士英亷七十五嵗嵇璜亦七十一嵗協辦大學士尚書永貴七十六蔡薪七十五合之得三百六十八嵗本日御門閣臣領㫖耆年者四人實亦國家盛事御製進宫視朝之作壬寅御殿視朝官謝恩雖云例事禮斯敦不疏不數惟時舉既雨既晴應候論麥壠改觀曉凉合栁衢含潤逺烟昏十朝前此心憂旱一雨濯之敬倍存御製閲摺丙午題章黄閣票簽呈閲摺硃批手自評毎日部部又各省督撫照例題本事件俱由閣臣票簽進呈覧畢批發其各省及新疆關係𦂳要事件俱用奏摺封凾呈進手自批閲宵旰一心奉天理饑寒萬姓念民情大都奏請恩施事無不辰聞午即行凡有闗民瘼加恩之事或于奏摺批准或特降諭㫖無不即日辦理不令稍稽時刻底更即頒示中外諸臣或有以刋刻上諭及硃批諭㫖為請者念皇考所頒訓諭臣工之㫖足以昭垂萬禩不必更頒發矣聖人垂訓久光明御製月選辛丑月選明揚對廣廷聼無聲復視無形每逢濟濟目為朗設遇庸庸志弗寧每引見選官其日若多可用材噐輙為之始設多庸流輙為之不懌念其當選又無過祗於所得缺之繁簡中調用之祗量缺之殊繁簡酌移人以寓調停為君難此一端耳詩云後來聰乃聼御製月官乙巳月官依次選冢宰司其事雖殊山公啟却非滋較資屈選者材原不一致缺亦有繁簡是在量其器量器權付人又恐沸物宜缺有繁簡亦有善惡使吏部堂官量才調用即至無私而得善缺者必感得劣缺者必怨得若朕臨引見時自定則無所施其感怨此雖細事亦政要也􅄂職品既㣲亦無甚闗繋縣令父母官有民人社稷叶是宜親品閲來引見有例向例月選官自州縣以上有民社之責者由吏部堂官帯至引見缺之繁簡量其人材酌予以更調至佐􅄂以下等官例不引見就其缺繁簡視其材次第時有相調用或即教官置月選州縣官視其才具中平或尚堪造就者酌量調用簡缺者九卿視其才具不勝民社及年老就衰者正途出身之員量予改用教職亦必引見後定彼或稱抱屈亦無辭以對向作改教詩率已宣其義彼相固已差弗盡心差倍叶毎當月選班中多佼佼輩年力胥可用則為之滿志設遇一班中劣多優罕值其日心不快而亦乏别計是即用人苦長言申吾意臣等謹案毎嵗令節慶賀及内外各官謝恩文武臚唱諸儀皇上皆御太和殿若授官進本則有御門之典至時常聼政之所均以勤政名之盖遵皇祖貽訓又且親書無逸全篇揭各宫殿盖日日鑒之惟欽有自來矣至夫批答封章無稽晷刻引見官吏務覈真才屢幾暇摛唫昭着宵旰勤勞之本臣等謹錄御製題勤敬殿詩以著其大並約舉御門視朝閲摺選官數什以槩其全盖惟聖天子精神夙夜黽勉未遑視虞書所稱闢四門明四目達四聰者實兼備之所由作覩萬物之先而丕懋萬年之績也皇上省方觀民設教自聖壽七旬以後乾隆四十五年五廵江浙四十九年載舉六廵四十八年聖駕四詣盛京四十六年五十一年兩次廵幸五臺五十三年廵幸天津五十五年聖壽八旬廵幸山東分載年東恩賚門本廵具昭勤省乾隆四十三年十月初三日奉上諭大學士管兩江總督髙晉浙閩總督楊景素等合詞陳奏以江浙臣民望幸甚殷且河工海塘皆兾親臨指示懇請唐子春再舉南廵盛典以惬輿情一摺朕於乙酉南廵回鑾時因耆庶攀戀情殷曽許以翠華再莅然敬念聖母皇太后春秋已髙安輿長途逺渉遂諭江浙大吏不必復以南廵為請而江鄉士庶愛戴依戀之情狀未嘗不徃來於懐距今十有四年其顒望悃忱自益諄切且自前廵撫定五壩水誌以為展拓清口之凖下河從此遂免水灾嗣聞黄河倒漾所繋甚重因酌定挑濬陶莊引河靣諭薩載籌辦河成而清黄交滙處移逺清口不復有倒灌之患但下游尚有停淤不可不除其流弊而一切善後事宜若非臨莅閱視究不能悉其實在情形至浙省海塘近來潮勢漸趋北岸深為厪念亦不可不親為相度機宜今髙晉等既有此奏著照所請於乾隆四十五年正月諏吉啟鑾廵幸江浙便道親閱河工海塘所有各處行宫坐落俱就舊有規模略加葺治毋得踵事増華致滋煩費御製南廵啟蹕四疊前韻有序庚子十六章溯懐繋念莫神蒼赤之誠三千里積悃就瞻難却東南之請矧清弱黄强之久悉復南坍北漲之夙期後悔先河民事咨其大者逺矣入越人情慰彼同然於是儀舉五廵循成例而禁申靡縟至此籌開七袠罷慶典而祝謝歌謡惟是蠲漕開科俾士庶各孚所願且更賜金發帑使上下勿耗其貲冀連彊共紓望幸之甚而發軔正逮祈言之日韻經四疊體踵七言睠維扶鳳雲中感舂音而増悵爰此鳴鑾郊外隨里鼓以繼賡云爾高齡逺馭慮勞辛色養由來闗大綸乙酉以還罷斯役乙酉南廵回鑾以聖母春秋日髙難再奉以逺涖曽諭地方大吏向後不得復有所請三年云滿舉重廵因之俞允諸臣請前嵗江南浙江督撫以兩省臣民望幸並殷合嗣申籲且言河工海塘亦必籍親臨指授遂允其情於今春舉行惟七旬慶典降㫖停止仍普蠲漕糧開鄉㑹恩科以慰士民之願亦欲行觀夙願申憶昔回鑾攀戀衆江浙羣黎於乙酉回鑾時依戀之情極為懇切余非不撃念實不忍訂以後斯合忽忽十六年復舉廵典此日就瞻之民仍多昔日攀留之衆也即今露冕拊循民殷哉一體逸圓切小矣七旬慶典陳瞥眼嵗華過十六迎人江浙逮春戒奢崇樸例依舊撫景得詩事又新賡韻茫然失掖輦不禁把筆愴懐頻乾隆四十八年正月十五日奉上諭兩江總督薩載浙閩總督富勒渾等合嗣陳奏以江浙兩省臣民望幸情殷且河工海塘以次告竣一切善後事宜尤冀親臨指示懇請於乾隆四十九年春六舉南廵盛典以惬輿情一摺朕自庚子南廵時廵閱髙家堰石塘及徐州城外石堤鉅工俱逐一親臨指示兹據奏以次告成所有一切善後事宜自應臨莅閱視指授機宜俾河流永慶安瀾至浙省海塘前經降㫖将柴塘四千二百餘丈一體改建魚鱗石塘為濱海羣黎永貲捍衛令要工将竣亦不可不親為相度且自四十一年告功闕里之俊閱時已久應行展謁孔林以伸景仰今據該督撫等合詞陳奏江浙兩省耆庶望幸悃忱尤為肫切着照所請於乾隆四十九年正月諏吉啟鑾祗謁孔林廵幸江浙順道親閱河工海塘所有各處行宫坐落俱就舊有規模略加葺治毋得踵事増華致滋煩費該督撫等其善體朕意妥協辦理副朕省方問俗觀民惠至意御製南廵啟蹕五疊前韻有序甲辰時邁東南望幸俞六廵之請言觀河海省方考三載之成惟民事之大宜勤先咨樂禮體乾行之健不息遑惮舟車典數虞周途循江浙昨嵗豳豐展禮萬年仰締造之艱今兹呉㑹敷恩兆庶慰尊親之戴石塘鱗次潮平籌走中亹砌岸山連軌順慶安髙堰况復源探星速瀾廻際二月桃花若雨𤾉蹕路看三春麥浪自郊畿以遵東魯由淮海而達錢塘陸館水程戒大吏改前廵之舊人和政肅示後昆知家法之嚴軔啟首塗韻仍五疊從此詔開九十因閠餘而媚景添長佇斯里記三千值幾暇而新篇嗣詠云逰云豫豈云卒休助期霑望幸倫五載考功速虞狩庚子南廵至金甫三嵗一章時邁舉周廵海塘條石從新築庚子年南廵時以海寧柴塘究不如石塘之鞏固因命該省督撫逐殷確勘凡可以改建石塘之處一概從新改築石塘並勅江省協濟石料次第建築俾濱海羣黎永資樂利河堰並三接舊申徐州河南岸既於於丁丑壬午乙酉三次南廵時添甃石堤其北土堤則戊寅年夏命劉統勲徃徐議酌均資捍衛至南岸韓家山一帶工程四百餘丈地當徐城上游於庚子南廵時命嵇璜與薩載㑹勘改築新石堤即令核實採辦接築原固况值黄流初順軌益厪赤縣安安民前嵗經大學士阿桂等奏白蘭陽三堡至商邱八堡南隄外添建大堤閘引渠一百六十餘里𨗳河水入渠下注商邱歸入正河故道安流入海其黄行經行處所如山東之曹州濟寧江南之豐沛等屬從前皆不論月分常於賑恤所有各該處情形元氣是否全復尤為軫念水程陸館惟遵舊綵結燈張戒慢陳擕子更殷身示度昨允薩載等陳請諏吉六廵臨幸江浙閲河工海塘以惬輿情所有沿途行宫坐落一概依舊毋稍踵事増華並命皇子等随徃觀看沿途水陸扈從人等約束整齊迎鑾士庶忻戴至誠必如此然則可言省方問俗度若不䏻不如罷廵幸之舉不啻耳提面命矣觀風誠幸氣如春媚依黎庶懐仍昔懐借精神句倍新佳麗山川徃擬别逾古希以罷廵頻南廵諸作最多不無秀麗江山之助兹年逾古稀意此後可不事命駕矣御製南廵記甲辰舉大事者有宜速而莫遲有宜遲而莫速於宜速而遲必昧幾以無成於宜遲而速必草就以不達䏻合其宜者其惟敬與明乎敬者敬天明者明理敬天斯能愛民明理斯䏻體物千古不易之理也予臨御五十年凡舉二大事一曰西師一曰南廵西師之事所為宜速而莫遲者幸賴天恩有成二十餘年彊於安晏兹不絮言若夫南廵之事則所為宜遲而莫速者我皇祖六度南廵予藐躬敬以法之兹六度之典幸成亦不可以無言我皇祖蕩蕩難名予藐躬瞠乎景仰述且弗䏻作於何有然而宜遲莫速之義則不可不明示予意也盖南廵之事莫大於河工而辛未丁丑兩度不􅂈勅河臣慎守修防無多指示亦所謂遲也至於壬午始有定清口水誌之諭向來河臣率皆靳折清口恐干多費工料之議洪湖盛漲則開五壩下河一帶無嵗不被偏灾自壬壬卒三次南廵始定髙堰五壩水誌髙一尺清口則開十丈為凖俟秋汛後洪湖水勢既定仍如常接鑲口門嗣是河臣洛守此法數十年來下河免受水患田蘆并資保䕶丙申改有改遷陶荘河流之為向祖清口毎慮黄水倒漾康熈己夘春皇南廵親莅河干閱視形勢命於清口迤施隔岸挑陶荘引河𨗳黄使北引河臣董安國開放過早旋復淤墊其後庚辰辛巳壬辰甲午以及雍正庚戌歴倒灌命大臣㑹同河臣籌勘挑辦功迄未就嗣以黄水舎開陶荘引河更無善䇿乾隆丙申諭河臣薩載詳悉履勘繪圖貼説徃返指示於是年秋興工至丁酉仲春藏事開放新河大溜暢達既免黄流倒漾之虞更収清水刷沙之益因命建河神廟以答神佑詳見御製碑記庚子遂有改築浙江石塘之工浙江海塘自戴家朝迤西皆柴塘不足資鞏䕶庚子南廵親臨閱視因飭該督撫於老鹽倉一帶改建魚鱗石塘仍諭令存留舊有柴塘以為重門保障辛丑壬寅等年陸續採辦石料勘估建築至癸夘八月該督撫富勒渾福崧等奏報石塘三千九百四十丈全行告竣今甲辰更有接築浙江石塘之諭浙江海塘老鹽倉一帶魚鱗石塘雖已全竣而章家庵以西為籍范公塘土隄一道衛䕶形勢单薄不足以資捍禦因先期傳諭該督撫詳晰籌畫採石鳩工兹甲辰南廵親臨指示不惜百餘萬帑金降㫖一律接築石築俾濱海黔黎永資樂利至於髙堰之増卑易磚庚子南廵閱視髙家堰工據薩載請将三堡六堡等卑矮磚工加髙余以磚工究不若石工之經久因命毋惜帑費一律改建石工分年修甃以冀永逺鞏固徐州之接築石工並山丁丑壬午乙酉三次南廵均至徐州閱視河工形勢次第籌辦添甃石堤俱用石十七層以資築固其舊有石工三叚長九百七十餘丈較之丁丑新建石堤短少二三層於庚子南廵時命嵇璜薩載㑹勘一律加髙十七層又自韓山至奎山一帶向止土堰兹亦一律接築石堤四百五十丈直連山脚俾濱河永保安居不籌度咨諏得宜而後行是皆遲之又遲不敢欲速之為夫臣之事君其有知不可而强諍者鮮矣河工闗係民命未深知而謬定之庸碌者惟遵㫖而謬行之其害可勝言哉故予之遲之又遲者以此而深懼予之子孫自以為是而後之司河者之随聲附和而且牟利其間也與其有聚斂之臣寧有盗臣在他事則可在河工則不可河工而牟利宣洩必不合宜修防必不堅固一有踈虞民命繋焉此而不慎可乎然而為君者一二日萬幾胥待躬親臨勘而後剔其弊日不暇給焉則應仍於敬天明理根本去求之思過半矣予之舉兩大事而皆幸以有成者其在斯乎其在斯乎若夫察吏安民行慶施恵羣臣所頌以為亟羙者皆人君本分之應為所為有孚恵心勿問元吉予嘗以此自朂也至於克己無欲以身率先千乗萬騎雖非扈蹕所􅀎減而體大役衆俾得循法而不優民亦亟難矣斯必有以振其綱而挈其要然後可以行無事而胥得宜實聰不出敬明兩字而已故兹六度之廵擕諸皇子以來俾視予躬之如何無欲也視扈蹕諸臣以至僕役之如何守法也視地方大小吏之如何奉公也視各省民人之如何瞻覲親近也一有不如此未可言南廵而西師之事更不必言矣敬告後人以明予志乾隆四十八年六月十六日奉上諭朕於本年前徃盛京恭謁祖陵業經降㫖改於八月十六日啟鑾既已展期月餘則沿途預偹一切事宜甚覺裕如著𫝊諭卓索圖盟長喀喇沁郡王拉特那錫等等将朕經過喀喇沁圖黙特一帶駐蹕尖營橋梁道路等項均著從容預備其應赴熱河之䝉古王公等毋庸於七月初間前來仍照每年進峭之例御製啟蹕徃盛京之作癸夘孟月虞渉潦中秋協旅程前本擬七月十一日由山荘啟行詣盛京因日始立秋又末伏首日恐作雨泥濘因改期於八月十六日啟蹕撰辰指故里是日起廵旌初歴千峯邏今年使八溝一帶取道邉外經喀喇沁部落皆新路非癸亥甲戌所經䝉古地沿觀萬室成午前㣲識熟却已行營乾隆四十五年十二月十四日奉上諭朕於明年二月二十二日啟鑾廵幸五臺所有應行預備事宜各該衙門照例預備至蹕路所經已降㫖止就舊有行宫畧加修葺毋庸再行添建該督撫等務宜妥協辦理不得踵事増華致滋靡費以副朕省方觀民之至意御製二月二十二日啟蹕幸正定府慶落隆興寺並至五臺瞻禮有序辛丑金身隋寺重瞻相好千年琳宇臺懐已隔清凉廿載啟吉適仲春下澣嵗陽更叶卒穰迎鑾正積雪􅅻隔農慶恰符土􅓊新膏普徧省耕覩耆㓜同懽舊館仍因捐費飭緍錢預賜圓成法果携來讃喜真僧命章嘉國師扈蹕行慶讃禮湧現佛輪證入明明師利彈指紀翠華四度猶感前廵含毫詠繡甸初程爰抒八韻隆興建慶落臺頂重瞻依並以廿年隔恒縈一念㣲光隂誠迅速來徃勿稽遲自辛巳廵幸五臺閱今二十年本年二月舉行社稷壇經筵典禮於二十二日啟行計來徃程途不􅂈一月是日啟春蹕行程歴帝畿恤民還逭賦察吏騐歌祈憇館禁新擕去嵗即預行降㫖直𨽻山西境内蹕路所經除舊有行宫四處賞給直𨽻銀三萬兩山西銀五萬兩以資修葺毋庸損亷辦理此外總御行營不許再有添建行營按舊折對時思育物勅命謹惟幾驀憶前廵况悵非奉懿翬乾隆五十年十一月十一日奉上諭朕於明年二月十六日啟鑾前徃五臺所有應行應備事宜着交各該處預偹辦理乾隆五十二年十二月十六日奉上諭朕明春廵幸天津閱視河工擇於二月十八日啟鑾所有應行事宜著各該衙門照例預偹御製仲春啟蹕廵幸天津府順閱河工之作用丁亥詩韻有序戊申指邦畿而于邁十二年典協周廵諏春仲以時乗五百里地同夏甸溯丁亥遊河肇舉津門屢記郵籖泊丙申瞻岱旋臨星紀恰周躔部軫恬瀾于海若畺臣頻奏安流厪保介于田工民事先諮近服億萬姓之輿情企踵願切就瞻百五日之佳節届期令宣警蹕芳郊歴歴流鶯乍囀花封春水差差畫一初臨鏡淀安艫稳泛春乗天上之槎夾道歡迎目撃衢中之壌鳩笻扶跽曽陪千叟之班驂條齊驅半領元孫之隊惟蒲瞻杏望羣黎之積悃足嘉而燈舞笙歌大吏之増華豫飭逰豫非云玩物河防與穡事交縈慶恵亦曰乗時輦路共舟程同莅數彌文於載籍寧􅆥刻玉之儀循例事以賡吟用叶展軨之吉爰成新什聿至首塗申嵗津門翠蹕旋閱周一紀命廵船迅哉過隙白駒日啟也行時春仲天河務田功心所切笙歌燈舞意為蠲此次廵幸天津本為臨閲河務田功恐地方大吏踵事増華偹辦燈船歌舞一切㸃綴轉非省方本意是以上年冬即有㫖豫加申戒來結習未除者觸景拈吟此始旃乾隆五十五年東廵諭㫖至御製詩分載東恩賚門本年廵臣等謹惟我皇上展義觀民順時行慶初不以髙年釋廵省之勞爰自古稀之嵗五莅南邦閱甲辰而更舉六廵茂典所以循法祖徽先勞示度者無出御製南廵記所揭惟敬與明一至夫民事之大仰費睿籌咸霑慶澤具詳於欽定南廵盛典一書兹臣等恭輯壽編備紀十載中鑾輿屢幸而若本年八旬履健載舉東廵尤徵聖天子勤恁宅衷允綏多祐於無既者耳
