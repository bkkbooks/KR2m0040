body:
  text: 歌頌三十八萬夀㳟紀八徵引一篇謹序翰林院庶吉士臣張師誠臣師誠稽首頓首言伏惟皇帝陛下立極斟元集瑞篤祜乾構廓紘泰筴禔祉於今五十有五年斂時用敷寰圍豊靖而孜孜宵旰益惟時若是厪特鐫八徵耄念之寳而為之記仰觀天文發揮洛疇廣大悉備既於五福頌闡其奥於讀洪範綜其原復於是記宣均和合照之量暢保樂洽夀之㫖寰區匝㝢莫不砥屬夐乎爍乎粲也晏也臣謹案雨暘燠寒風天徳之順肅乂哲謀聖帝徳之純蘓軾言至極者謂之極朱子言極有湊㑹之義所謂三十輻共一轂故太極為萬物本根皇極為兆人標凖庶徵備則建極昌保極乆則㑹極歸極胥延光而普汜矣洪惟八旬純嘏陔夤均禧率土臣黎鼚鼓軒舞而旃裘魋結之長髽首雕題之君罔不陸讋水慓棧壑浮川熈熈喁喁覗粹表祝龎禠唭㘈蹈踊舉謂戰圖展而棡曲干舞未足耀也奎翰諷而糺歌嗛銘未足煥也五代一堂而螽斯瓞衍尤未足艶羡也樂林祥樹何彌乎宙也齯齒台背何闐乎衢也庖瑟炎琴軒裳舜黼何翕於庭而爚於宁也翔泳夀宇懽呀無極小臣奏賦行館備官薇省重以恩榜成進士濫厠詞苑洊荷殊恩快逢盛典自為謭劣萬不能雍容醇懿竊考蔡邕注典引曰引者伸也長也伏讀御製記文奥義昭宣彛訓炳著歡喜鑚仰不能自閟於是鏤思傾忱罄窺管所得簮筆所録引而伸之觸類而長之敬陳八徵引一篇闡繹念用之實政光揚禔福之所由庶俾巷語衢謡獲所皦述云爾其詞曰於穆昊縡篤畀聖皇皇建有極昭登維綱襲熈瀳洽載榮懐祥五雲巻煽七曜順方珠弧介祉玉筦凝商旋八八而應律鬯絫萬萬而握紀長契象執而金樞縈鏡雲仍衍而旋題爥堂惟行健以保合廼逢吉而康强先是作噩之嵗薄海臣民隅辟傱集赲趩􅂒趚涣衍戢孴伏願拱南極以酌􅆽環北斗以仰挹萬人歌億人合絣紱舄趨闛闔籲請祝釐者嘔嘔欯欯翕翕帝乃曰俞乎於義其協然猶屏琛賮戒珍納湛恩龎鴻滒淖浸洽爰於上章元日十行布昭歆徧羣祀秩晉庶僚紫泥誥錫黄髪賚饒譽髦璋奉肆赦竿翹與夫賦蠲􅀢萬氓醉鴟飄榜開甲乙士摶鵬霄上儀具舉擊壌懽謡於時寳貺寅承福躔丙見金􅒫露瀼霱炁雲縵天子方莅塞垣敞行殿梐枑衛嚴旌斿采絢灤水滮滮濡水涆涆四知臨軒山莊四知書屋所皇上理庶政之萬樹䕃蔓熱河外藩入設筵覲俱於萬樹園廣宴普陀延洪湏彌錫羡熱河両崇寺一日普陀宗乘一曰湏彌福寺羣后濟濟舉釂式醼迨夫秋廵典備玉軑言旋籞苑颺靄􅇨井敷鮮内則暢襟晴空挹泉輝淵松篁集逺静虚觀瀾福海迤邐匒匌奫潫外則明湖㶖㶒夀山㠝岏繡猗亘梁倚虹輝椽紫氣緼以拂盖丹旭晃以迎旃於是排仙仗步通門棽麗葩瑵鍧龢鳴鑾街衢洞達闤闠輑連嵩呼封祝郛溢城闐衢歌三百宸章萬千奏衢皇上自章圓明園至御宫沿途歌三百皆集製詩句拮隔捄石擫㩶管絃兠離僸佅哮呷畢宣崇䑓曲館之庨􅀈嘉卉異荂之馩馧尋橦角觝之踸踔魚龍曼衍之縈蟠殷脤􅀈㸌實㩼且繁信春皇之景鑠曼夀之休臻也乃大和㑹㑹同有懌維彼䝉古爰及西域若衛拉特若布魯特從者台吉𨽻者伯克偕尔生身奔走絡繹䝉古未出痘者謂之生身今嵗西北新舊各䝉古偕來祝嘏其中生身者於山莊宴賚莫不越幕踰沙効修孔亟加以海邦頻朝樂浪環翊暹斛遥馳􅔢鼊重譯花象來遊越裳舊國江頭蒲甘畏懐交愓既納賮而欵闗復請符而承敕又何論乎獅子社畨魚通土職更有交趾新藩躬覲趨驛寵接山莊班躋列辟安南國王阮光平來朝親王諭令班在宗室親王之下外藩之上荒徼維藩忭膺異寵璇璣仰成昨嵗阮光平請頒正朔冠珮珠飾阮光平籲請更换服色黄馬特賞四團龍褂紅寳石頂三眼孔雀翎褂尤為史冊中所未見陋元帝之徵朝卑陸賈之捧檄猗歟煒哉洵宙總於土中而勲兼乎在昔葢惟天衷之作肅也鐘磬式訓扆量著銘旼旼穆穆慄慄兢兢曰明曰旦泰元命凝亥耤親畝辛祈韞靈應雩􅉈渥報榖液烝泰壇方丘峛崺恪登大采少采熛煬允升肅奉琮幣潔盛鼎鉶百神諴感茀禄川増近年一中祀申䖍禮親祭週用况復光廸衣紹念摰武繩芝璽冊奉玉碣謨徵春秋匪懈泔淡皆馨閟宫普淖是蕭是蒸是以保單厚於元㑹協尊化於清寧惟天功之作乂也縷晰條修緯經緝紀乙夜懐殷辰告布駛宵燭待章宵旰皇上綜理庶務不遑每日寅初即起時問所司有無驛報隨到隨遞政恤諭勿留待或至夜分猶取奏章重加披閱勤民古無倫比曉疇讀史讀皇上每日昧爽恭列祖實錄命申晨明疏覽晝晷每晨題本批諭奏摺之外晚膳後復閱疏體冗長輒至千萬言而一經纎悉睿覽指摘訛謬畢昭節宴雖張披函弗怠遇慶莭演劇事無皇上即于臺前召對理異平日含章詄開凝旒瑶陛臣每皇上萬幾勤理無一日不召見召見羣月旬餘又必擇日御門以昭鉅典笏書拜揚絲言篤棐日昃不遑萬言承㫖凡遇事繁之際當軍召見軍機大臣懐籌㫖書宣日㦯至再至三而書奏報睿度指示機宜如綍如綸每至數千言之多微不到萬里之外恍如目覩故聖慮周詳無天兵所至輒奏膚功蹕路勤咨周廬殫理恭逢照常聖駕時廵于中舟駐蹕之地聼政且于輿中時時以驛報迎報垂問遇要務或遣員往前途故從無遲滯之患文囿時臨勤求無已凡廟拈駕至瀛臺清漪園静宜園及各寺香俱于傳膳後照常批摺辦事引對氊廬近光尺咫外任員弁遇以重廵幸之時令就近引見疆圉兼示體恤傾潤輟霖章來逺邇朂無飾詞戒無坐視課晴問雨最厪問無聖懐廷寄詢日無之各省覆奏情形必令無稍諱飾玊粒漕除鏐租户弛廪賑偏隅逋寛㕓里重展醲膏快乗春始各省偶有偏灾除隨時加賑飭令撫䘏外復於新春諭令以示有加無已安土愛敦恒沙數比是以昭天漏泉恵孚靡涘惟天智之作哲也䕃暍棫薪陶甄茅彚周柄馭官漢條計吏溥涵育于四門廣鎔冶于三肄講筵嵗宣羲農仰味湯湯廱流方中圜外視學昕徵樅鏞合制孔殿釋儀卣簋頒器宣鼓集篇車斿排字飫飲新歌拜洗酌觶樂譜宫商詩補笙吹抑戒鳴謙韶成闡秘七閣書全五經室萃觀燃金燈遺捜玊笥籍啓木天人遊福地近有中秘㫖願讀書者許赴翰林院繕録梵音譯經吉帛獻瑞語正遼金元之未純通續杜鄭馬之未備恢昄章而識畧統方輿而輯志表定職官鑑垂儲貳辨麈角以授時圖鷄雛以敷治睿藻風行藝林津逮而成皇上賦詩敏㨗過于擊鉢者見御製飛爆竹詩編詩煥文功同五二輘轢古今含吐仁義厪農皇上心功詩集中多望雨望雪之作三希星輝八柱霞蔚鳯翥蠅飛夀八聖旬猶能作蝇頭小楷無藉眼鏡行健日强洵無倫比奎鈎珉翠是以學府緝熈禮園發粹惟天心之作謀也一曰廵狩一曰行師宜速則速宜遲則遲速者伊何神旌搟麾北覲渥巴錫西定噶喇依犁伊犂之庭􅀈烏孫之遺拓疆萬㝢廣幅四維屯田播植鄉校建規烏蘭獾獥飇電紛馳赤嵌蛩駏靁䨨􅌺施鳬藻騰躍鴻績瞻巍纛藏武成之殿鐃喧郊勞之臺褒賛于紫光之像勒記于太學之碑金㙮呈而􅃡文順貝葉納而佛土歸英謩赫運震􅀈邉陲遲者伊何江表六幸省觀疇咨金隄築鞏石楗保綏陶荘濬澮鹽官障崥陪都四詣胄矢心儀赫圗阿拉啓宇肇基松路展禮錫類延祺桑乾永定展義邦畿沽循疃壩淀靖海湄嵩室麗罕臺刹驤騏壇杏沃澤岱松耀曦上蘭秋獮南苑春圍親射虪虦屢獲麔麋盤登髙矗園莅静宜舉兹茂典行慶集釐是以恵浸萌茁協應神祗惟天徳之作聖也浩乎難名無思不服夤威顥穹宅心沕穆覲揚烈光單心繼續庶績䖍臨黎元亭育淵體嶷嶷員照郁郁潼溶蒸濡㷭涌沐浴康乂盈區阜畨比屋氣孚丹甑時調玉燭三皇不足四五帝不足六是以勒崇垂閎永膺圗籙爾乃房翼出景慶矞輝雯地寳磊砢天符氤氲八徵咸備五福常新鶴齡飲醴蝡動化醇登臺調幕鼓舞逡廵葱葱欝欝莫可殫論爰稽古帝史乗相叅七旬纔六八秩惟三方兹福緒倫擬疇堪將見蘿圗鼎盛椿嵗籌添萬有千禩焱焱炎炎非休徵之普應繁沚之廣覃歟萬夀恭紀念勤九箴謹序掌江西道監察御史臣江徳量乾隆五十五年龍集上章月名貞壯恭逢聖夀八旬泰元増筴保右申命列祖篤祜五世延祥闓澤涣太極之泉肆𤯝福無方之外官集奮庸之俊野逰擊壌之􅙕文思被於四表威稜抗乎八荒嶽效川脩鯷趨鰈致廣輪均禧陬壖提福維皇上醇洪鬯之徳豐茂世之規沕潏湛􅐮暢垓泝埏協氣旁魄薫為太平吉帛羂於窣堵仙蝶翾於太常誕育倍僆孳之男嘉􅓿茁䄮生之􅣴艾氓耋嫗臻百齡繞曽元者纍牒而曡告汦汦懐生含甘吮滋鱗萃仰流以祝我皇億兆京垓無疆之夀我皇䖍鞏勞謙夙夜不敢康斥瑞應之藻文抑祝釐之縟節懼從臣嘉頌逰童歡謳之藝以飾也爰抉疇範之精厪蕃廡之備篆八徵耄念之寳製記以訓天下萬世嵗正元日温綍實降普蠲租賦鉅典備舉郊廟壇學躬親祼燎遂東廵狩至于岱宗幸闕里召試魯諸生繕庸隍察吏治讓慶交行廻鑾䇿多士于廷授官有差駐蹕山莊時于幾餘猶集期門佽飛之士校射如例先是廓爾喀生畨向化内附而安南國王阮光平親身入覲其䝉古外藩衛藏喇嘛及朝鮮琉球暹羅南掌􅃡甸土司社畨等皆憬誼蹈仁後先穈至七月駕廻圓明園八月慶莭前一日御禮輿還宫萬流景附九陌臚歡夾轂分􅆵駢音櫛綵正誕日御太和殿受萬國賀臣侍班豹尾肅覩朝儀用仰丕天之大律胥源帝念之克勤洋洋乎若聖徳頌讃莫能名已謹按小雅序庭燎美宣王也因以箴之毛萇謂美其能自勤以政事左氏傳箴尹之官亦訓在勤是皆祖唐虞𠡠命賡歌頌不忘規之恉昔帝媯期頥謨弼在兹之念周武綏萬訓矢夙夜之勤我皇上念切庶徵而以五之斂福與六之三憂同凛孜孜愓愓之戒良以憂勤致福千聖一揆也臣謹推廣八徵之念退傚九州之箴蓋包犧以八定卦實以九演爻極之萬一千五百二十揬䇿綿延至于無可紀酈統于九而實肇于九故九紀者大圜之所成化也九廟者抱蜀之所觀徳也九式者匪頒之所沛恩也九刑者勑罸之所弼教也九官分職亮凝績之熈九功惟叙懋厚生之徳九類焕文章之祖九伐馭張皇之威即共球之輯享王之來亦以九賔昭其儀約之以九而我皇所念壇廟之祀雨暘之時中外之政民物之養皆備已夫衛武公不㤀􅉏御之箴作懿戒以訓御于其國葢上之徳下之徵也矧幸際冠徳卓蹤錫羡曼夀之世者哉敢綴官箴發揚聖軌竊比矇誦敬告庶司辭曰泰元幹運於穆不已崇效弗違健行同體躬親祡祈懿懿歆升講筵闡義培栽覆傾君子自强貞于髙明峻徳同天堯曰乆㳟純徳享天文曰肅雍旦明弗渝盤杅銘在天官賛王敢告冡宰右欽若箴聖作明述求福聿懐橱峯書事猷式基開定制銘石垂戒鐫碑五福紀恩四箴遹訓典披實録詩排平韻拓跋可鑒摛詞示後宋孝茍安嘉名則負聖訓孔昭萬世聰聼欽哉紹聞敢告宗正右繼述箴帝念叙時殷籌民計隂陽和甘弗私一類免漕蠲租二千萬萬酌瀣翺祥澤解風涣族燕親九耆筵集千華階普晉㣲𤯝予湔虎旅宿飽鸞章式宣獨行表宅無告給饘節儉製論皇慎度圗自奉則約徧徳則腴賚悅四海恵尊五美賜予必書敢告内史右敷錫箴堯法三宥蘓論不經縱囚來歸貞觀沽名大哉王言監兹祥刑秋讞慎疑其生是求輕非邀譽重乃罪浮刄傷申禁爰書衢榜憲使馳軺璋原雪壅光徹覆盆風澄投缿鑑無留影權乃在衡惟刑之恤敢告廷平右降典箴唐徳宣三周牧倡九帝􅄃乾綱太阿在手鏡燭凖平視其自取勿謂帝逺心周萬里勿謂民翫若保赤子弗率爾属爾餗斯覆甄録有命仍杜其競各藎爾衷懋官懋功飭簋飾羔敢告百工右釐工箴芸芸烝烝綺畺鱗室唯民有依依于無逸黛耜親耕青旂載蹕奠海籌河民生攸恤徐豫防宣赭龕波閼仁夀已登雨暘猶飭振發有加撫循先亟助給貸粻代賑興役傾不涸倉帑儲弗惜乆道占恒無方簭益固本寧邦敢告常伯右求莫箴奎園漢倬麗緯示則典學遜敏誕敷文徳室萃五經閣羅四庫獵碣珉刋璧流海注禮秩其圗律調其元書増國篆志纂同文皇書再編帝歌四輯範古模今文成法立藝林逮津敢告從臣右焕章箴紫閣嵬崔武成九炳蒐閱知方禡征爰整凖部犁庭回疆埽穴寳甕斯徠珍球乃戞勒圍摧碉石峯搟堡䥫壁懾威金編效表氛靖臨清邑旌嘉義天戈所揮殱其醜類幄運堵安睿謨若神錫號襃勇寫形象勲事不得已非以耀武布在方畧敢告司馬右詰戎箴弗征而屬謂之歸順棧山航海憬琛夐賮理藩隸院㑹同闢館比于内臣永為外扞受土扈衆綏廓喀部前衛後藏及東印度越裳萬里阿瓦八闗重瀛絶島羅斛中山吐魯樹頷臺畨附覲南交欵闗䖍奉朔正萬里躬趨五章籲易忱逾鑄金榮叨曵翠南車占波東風測吕昔慕聖人今帡夀㝢皇弗勤逺化必歸仁天聲永揚敢告舌人右柔逺箴萬夀頌謹序户部員外郎臣趙秉冲臣聞玉英賁采有開金夘之祥璽澤呈華尚溯蒼牙之瑞天貽純嘏昭川珍嶽貢之誠聖握洪圗輸日升月恒之象欽惟皇帝陛下乾符啟運鼎命凝禔斂五福以宜民康萬人而錫極四方來賀衍貞元妙合之昌期百禄是總綜章蔀希逢之異數嵗徳庚守月令酉司忻迎震夙之辰正協泰平之㑹金􅒫玉㝢答爽􅄜以呼嵩白水丹邱被晴曦而駐景烟調百和鼎祉山峩賛唱三成衢歌海溢翠媯鱸篆文騰甲子之宵赤伏麟輝瑞浥壬寅之露乆儲始發乃造化千百年之春不占自孚維聖人億萬載之紀昊天其子祇深欽若之思率祖攸行丕顯烈光之􅍇潔齊相見非徒侈典禮於琮璜對越於昭寧僅效儀章於圭鬯繩謨列祖溥治寰區本無逸以為箴而康而色喻羣情以悉叶好雨好風三穂呈祥總是豐年之玉萬箱告穫弗煩廣恵之倉鬴給厨炊醇化擬青陽共盎征寛禺筴湛恩偕紫渤同流舉一墢於春田鸞旗載笩課三盆於典婦繭館同稱廼淳懿不居孜孜益勵翠華時展康馗忻就日之忱清問頻加廣野洽如雲之望川流竹箭通八牐之疏排塘屹魚鱗奠三亹之潮汐靡不本仁為體載道於文奎章掞而日新麗正儲而海滙全書四庫酉山發金碧之藏萃室五經乙夜啟丹黄之御至若禮崇視學典重臨雍通經陋毛鄭之専家恩榜破漢唐之令格華顛賜第胥同鄉國之登青佩迎鑾並録星雲之頌音尋工尺三百篇樂以諧聲譜定中和十二鐘器惟求舊徵軒鼚於唐陛偕搏拊於虞廷既文徳之誕敷亦武功之載纘畺開二萬天戈麾蔥嶺之西凱奏五年日鏡照桃闗以外馳朱旗而送喜憺棱逮躬髪之區畇緑壤以興屯疆㯺無不毛之土訶羅畢撥尚方之嘉果同珍目宿蒲桃上苑之靈根得氣崇崐表瑞陳十㲄以充庭宛野調良進九闗而考牧竒勲懋賞三圗紫閣之形開惑摛文四勒春爨之碣固已南諧北爕西被東漸蒲盧毛朶之抒忱阻卜鐵驪之向化卅六部稱藩保塞不徒者舌之封九萬里累譯來庭大有􅠫鱗之號雕題鑿齒測海水以知歸食徳飲和酌衢尊而咸飫祥徵乙乙羣依聖日之光兆叶庚庚共祝曼齡之錫一人有慶萬夀無疆然猶謙之又謙聖不自聖􅂬臚百職俞請牘於再三詔沛十行播醲膏於九有迓鴻釐於青帝玉帛升歆儀鳯徳於素王金絲聆緒壯圜橋之觀聼爰著攻同修宣鼓之疑文兼釐􅞚趩金填石刻資鑒古而必精翠琰丹珉繼豐年而有作於是芝泥儼潤玉紐從新義演九疇位洛書之九位言敷錫徵洪範之八徵蝌書鳥篆擬承天受命之文鼂采昭華中既夀且康之説念漢晉以來凡六帝古稀以後尤稀信堯舜之治在萬民㑹極其歸有極蘿圖式煥寳胄長延開萬年累葉之禎襲五代一堂之吉耆英宴廣扶鳩杖者三千户口籍増推燕詒者二百日徽月琯律叶軒皇青鳥白環神孚媯后廓爾喀受持西極貢多羅摩跋之香阮光平新宅南交拜九摺銀黄之印朱波效順越雉輸忠忱達峒谿誠通畨社表騰金葉從菉幣以偕徠圖燦碧璂㑹爻文而最盛斒璘窴玉苕華焕鸞鳯之文录曲軒屏絺繢緝海山之頌秋八千而得嵗月三五以重輪越契踰繩未有斯盛歌衢擊壌同矢其音臣願獻南山欣依北極字探玉檢叨摹寳篆於八徵職是金倉敬晉瑶樞之萬福謹拜手稽首獻頌曰維泰元尊誠通一理維皇則之不息為體懿爍隆茂文徳武功聲教逺播福禄攸同旰食宵衣孜孜益懋行健悠乆萬方在宥曰乾而惕曰夀而康五十五載莊敬日强帝有恩言觀民䘏賦右粥左飡以寧以裕湯則解網禹乃下車屢頒寛詔人樂華胥帝觀于河東爰及海奕奕鴻謨南邦是頼柔逺能邇至諴感神周蠻漢撣稽首來賔矧以亶聰學抽祕奥惟聖折衷咸資指導倬彼雲漢為章于天欲知睿畧敬仰瑶編鬱鬱文淵巍巍傑閣安問唐宗四庫待索殳書蝌篆六體兼收精心純固旁及藝㳺典寳載陳奎章爰勒煒煌八徵備兹維克橋門觀聼獵碣鴻文正譌訂繆炳若星雲鼎鼎昌符五福維備介夀曼齡冠于百代大椿在望八千為春徵嵗月日欽我聖人詵羽綿𤓰一堂之上五世介繁雲礽揖譲有感斯應嘉瑞聿昭耆英濟濟錫宴有章畺吏陳言民庶滋蕃二百餘户普予旌門菁菁者莪在彼中沚夀考作人特科増試恩覃澤湛歡洽九衢嵩呼華祝厥來喁于岱宗有松貫時不易二月東廵純釐用錫奉琛執斚同我太平正位惟午卜嵗長庚篤慶錫光宸居建極於萬斯年皇圖孔碩小臣橐筆十載禁林恩銜覆燾感勵寸心莫繪者天難名者徳祝聖人夀與天無極萬夀賦内閣侍讀臣孫球欽惟皇帝統御洪基寅紹列聖斟元握樞撫辰敕命亮庶事而允釐廸前光而紹盛恢赫濯之聲靈回部歸而金川𨽻屬溥教澤之涵濡四庫編而七閣傳録一道同風訓民成俗澤無逺而弗洽物靡瑣而不頥是以勲軼乎二十二人之襄賛治臻夫五十五載之皥熈太和翔宇嘉祉集時躋介齡於八袠齊貞符於兩儀履端瑞啟宣詔歡騰神祇徧秩臣庶丕承咸欲詠功而誦徳莫由殫述而博稱溯逾古稀之紹猷篤祜積兹旬嵗而益彚庥徵皇上穆穆辰居乾乾元始泊耄期而増䖍祗壇廟而綏祉爟火宵炎虬鐘晨啟毖誠慤於三齋薦壬林之百禮大典特重以躬親嵗祭猶周乎中祀􅃡懐祖烈祥發興京景鑒觀之眷顧思締造之經營四謁珠邱而展敬遹追駿業而有聲凛詒謀於寳録衣徳言以日新珍若球圗燦列炳焉矩矱畢陳㡬餘省覽世美率循由是典惇族睦義浹恩隆彤廷宴賚華爵尊崇醉飽之情既洽愷樂之志胥通篤天潢之慶展親藩之封瑶圗祚衍麟趾祥鍾洵為古皇之所罕有詎徒六帝之所難同且夫念民依重力田咨雨暘於大吏耕耤畝於頻年裕窮閭之萬秭普正供之四蠲恤囏加賑宿逋遞除截漕艘之餉發太倉之糈莫不飫衢尊之優渥而欣化日之長舒皇上猶厪下情之未達民𨼆之難周省方問俗匪豫匪逰涉淀津之碧湍躋臺麓之丹邱惟河海之隄防為吳越之保障邀睿慮之精詳協神功之輔相乃申六廵於南邦慰萬姓之徯望今二月之吉日驂五輅之蒼龍躬詣闕里展禮岱宗暢春暉之靄靄沛慶闓之溶溶遂使山陬海澨之氓翹首而瞻臨幸者咸懇懇而喁喁爰乃考制度飭典常紀職官之表舉鄉飲之觴列瓊筵於千叟出珍幣於尚方養老之儀攸茂而臨雍之典聿彰疏辟沼之遺規著京師之首善詩歌靈囿靈臺禮隆釋菜釋奠帝用䖍祀事於升香御講筵而南面集諸生而圜觀矌百年而創見至於審伶倫之律吕定樂譜之宫商製鏄鐘以應鼉鼓造特磬以叶笙簧蓋雍雍乎禮明而樂偹郁郁乎文焕而道光帝乃廣作人勤抜萃三升開六榜之恩兩科定五經之試耆儒拜増秩之榮髦士奮彚征之志沐樂育之仁戴甄陶之恵相與紬繹帝文涵泳聖製羣俯仰而揖譲頌曰盛哉乎斯世薄海歸仁之日深宫游藝之時包情思於周孔嫓制作於軒羲文排石鼓句補笙詩仙蝶賦而匪矜祥瑞雛雞繪而宛載仁慈仰宸章之朗爥昭雲漢之光華帙盈五集統滙百家故觀感羣倫而式化亦捧誦琅函而拜嘉若夫振威稜於撻伐揚偉略於韜鈐掃蘭州之苞孽靖石堡之烽烟長鯨息氛於臺海神雀効靈於樓船戰無往而不克師所至而胥恬是惟秉睿謨之指授乃以操勝算於㡬先每嵗行圍時廵塞部沸渭汾沄蹈厲揚詡日射旃門風清鼖鼓於是皇上張玉箭與雕弓倐星馳而電瞥的必同開堋咸貫徹匪誇示乎佽飛實不忘乎戎詰斯皆體乾健以自強閲恒乆而弗輟無資却老之方寧假延年之訣夀禧丕劭福祉懋昭珠嚢翕赩玉燭均調豐亨萃聚需樂泰交頌譜華封之祝歡播康衢之謡爾乃風聲四馳殊文顒傾協律諧驃國之音入覲有越裳之掌伯克奉朝生畨列嚮先期而慶嘏者朝鮮敂闗而修職者南掌􅃡貢馴象藏奉名經岳輸賮川納珍自禹貢之方州所未載周書之王㑹所未臻莫不企九重而瞻聖踰萬里而來庭皇上方念庶徵懋居敬勵精求治順時為柄應晷披章嚮晨聼政樞臣日宣庶司承令浹上下欱愷之忱俞中外奉觴之請於時秋宇澄鮮祥雲布濩斗焕珠􅋃宵團玉露風清萬年之枝烟靄恒春之樹帝乃駕金根乗玉輅自御苑而啟鑾至大内而受賀綵結充衢頌聲夾路天閶旭麗仙仗雲開内則王公卿士咸列外則帥長牧伯偕來典樂升歌於韶頀司儀賛拜於軒階懿矣茂矣皇哉唐哉禮既成於寳殿宴乃設於璿宫晉百福之觥而蕭露湛譜昇平之曲而樂奏融卜皇心之悦豫知聖夀之延洪㣲臣才慙珥筆願切呼嵩謹作頌曰粤稽古初代選令辟玉牒所鐫鴻名斯勒祚錫繁衍光垂舃奕校徳論功猶未躋極惟我聖皇本身作則道契天心治光世徳宵旰勤勞紀綱整飭保泰持盈淵衷淳黙湛恩逺施祥和允塞兆姓熈春咏歌帝力侯甸要荒東西南北詣闕稱觥藩王奉職媚兹一人其夀必得集福凝禧以引以翼純嘏茂膺至誠無息作頌揚休時萬時億
