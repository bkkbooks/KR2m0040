body:
  text: 盛事二十五收成分數四乾隆五十五年直省收成分數直𨽻省二麥七分有餘秋禾八分有餘江蘇省二麥九分有餘秋禾八分有餘安徽省二麥秋禾八分有餘江西省二麥八分有餘早稻中晩二稻九分有餘浙江省春花蠶絲早禾晚禾九分有餘福建省二麥八分有餘早稻晩稻九分有餘湖北省二麥八分有餘早稻中晚二稻九分有餘湖南省二麥八分有餘早稻中晩二稻九分有餘河南省二麥秋禾八分有餘山東省二麥秋禾七分有餘山西省二麥秋禾八分有餘陜西省二麥九分有餘秋禾八分有餘甘肅省二麥秋禾九分有餘四川省二麥秋禾九分有餘廣東省早禾晩禾八分有餘廣西省二麥七分有餘早晩二稻八分有餘雲南省豆麥秋禾九分有餘貴州省二麥秋禾九分有餘伊犁各屯十八分至三十分零塔爾巴哈台各屯二十三分零喀喇沙爾各屯一十二分至十五分零烏什各屯一十八分至二十分零烏嚕木齊巴里坤各營屯一十五分至一十八分零吐魯畨各屯一十二分至一十五分零哈密各屯一十二分零御製浙江巡撫琅玕奏西塘沙漲多雨澤麥收情形詩以誌慰庚戌北坍南漲十餘年海塘沙勢須南坍北漲則塘根鞏固自壬辰以後漸覺北坍至庚子則北岸漲沙盡坍今已幾二十年時為繾念黙識天心當轉旋已報沙痕漲西起今據琅玕奏西塘一帶自潮神廟迤西至烏龍廟於上年春間随塘漲出隂沙約長五千七百餘丈寛至三百丈至一千五百九十丈不等經冬及春日漸髙阜所有該處居民在上挑運䭾載粮重物件業已堅實現在水勢趨南其南岸隂沙日漸坍卸而北岸日見日増因命賫送炷香交該撫親詣海神廟䖍申禱謝亟希夏風向東連總祈神佑海恒晏敢恃人工堤已堅庚子甲辰兩次南巡親臨海塘相視前後命將老鹽倉迤西塘工改柴為石復於章家菴迤西至烏龍廟接建石工雖足為重門保障之計然究賴神明佑䕶若茲近塘沙漲向東日寛則塘身益資鞏固庻可永慶安瀾矣若雨暘登二麥同民額慶更䕫然御製江西巡撫何裕城奏二麥收成分數詩以誌慰庚戌西江重稻弗重麥江西素稱産米之區近年來頗多種麥盖多一夏收於閭閻生計大有禆益近嵗方知勤夏收通計八分有餘穫兹據何裕城奏通省産麥各屬内收成八分者十九㕔縣九分者五十四州縣合計麥收共八分有餘洵屬豐稔亦資春末早豐投却憐此地吐穗際正盻優膏灌粒稠雲密雨㣲不成寸雖然日遇日増愁御製直𨽻總督梁肯堂奏報二麥約收分數詩以誌事庚戌去歲秋霖雖過甚却因利麥種成稠滿期穫十符全盻可惜嗇三祇七收直𨽻因上年秋雨充足民間種麥甚廣滋培芃茂本期十分豐稔兹依冬春雨雪未足祇據報七分有餘殊為可惜冬雪春霖胥致欠低優髙歉普牽酬梁肯堂奏麥收分數順天保定河間正定永平宣化等府及遵化州易州趙州等屬均七分有餘大名府及定州所屬均七分天津順德廣平承徳等及冀州深州所屬均六分有餘等語凢髙阜之地雖覺歉少而􅊠窪處所尚屬稍有通融核計猶在七分以上亦屬望出意外市間麫價翻稍减則以豫齊通販舟昨詢問順天府尹等據稱將來麥收分數不無歉薄而近日市間麥價轉覺稍減蓋因豫齊二省去嵗豐收商舟懋販抵運者頗多賴資接濟耳御製河南巡撫穆和藺奏報二麥收成分數詩以誌慰庚戌豫以麥為秋流通畿輔稠豫省麥收為民食最重上年河南二麥豐稔商販流通現在京畿麫價轉减實資其接濟也云十平聲見陸游老學菴筆記云轉平聲可讀曰諶白樂天詩紅欄三百九十橋宋文安宫詞三十六所春宮館鼉以道詩示我十年感遇詩豈易得稱八即中收據穆和藺奏各屬報到二麥約收分數復加確核查豫省一百八㕔州縣約收九分有餘者洛陽等四州縣約收九分者滎澤等二十州縣約收八分有餘者祥符等十五縣約收八分者杞縣等五十州縣約收七分有餘者尉氏等十五州縣約收七分者林縣一縣約收六分有餘者安陽等三縣合計通省收成八分有餘時雨既已遍晩田並可耰又據奏河以南十府州縣雨澤早已霑足惟河以北三府得雨較少飭委道員往查據覆稱懐慶衛輝兩府與河以南相等彰徳所屬雖三月後雨澤稍稀而二月前雨雪亦已深透現又據彰徳衛輝懐慶三府所屬各縣並開封歸徳河南南陽汝寕陳州許州汝州所屬具報於本月十七八日得雨一二三四寸及深透不等現在髙粱早榖俱已出土得此膏澤滋培倍加暢荗晚榖雜糧亦可於刈穫二麥之餘乘時播種等語載咨司牧吏課賦漫深求河南麥收既稱中稔恐地方官趂稔督納稅糧良有司亦應體予惠養元元之意也御製山東巡撫長麟奏報麥收分數詩以誌事庚戌歸舟過東省望雨早為愁各屬茲通計七分仍報收據長麟奏查得登州府本年雨水優足二麥本屬豐稔其濟南等十一府州屬地處低窪麥苗均未受傷即髙阜處所自得雨後麥根之旁所生新苗亦多結實飽綻兹據各屬稟稱二麥約收九分有餘者登州一府九分者青州萊州二府八分者濟南兖州二府濟寧一州七分者泰安沂州二府六分者曹州東昌二府臨清一州五分者武定一府通省牽算核計本年二麥收成約七分有餘現在俱已刈穫其新生之苗亦漸成熟端陽節後即可收割通省大田亦已播種齊全一律長發自四五寸至八九寸不等穀豆亦俱出土一二寸至五六寸不等秋成可期豐稔民情寧貼市價平减等語轉施賴天佑餅餌惠民疇畿輔幸同等本年直𨽻迤南府屬冬春雨雪亦未優渥以致髙阜之地分數减少昨梁肯堂奏稱通省麥收牽計尚可得七分以上是以情形與山東相等雖不獲上豐猶可稱下稔也失中小得酬御製總督書麟奏安徽二麥收成分數詩以誌慰庚戌邇嵗南方知種麥向來南省多種禾稻不以二麥為重近因疆吏督課漸知廣種麰麥而安徽毗連豫省種麥尤勤民食頗資接濟歙因接豫用功勤奏來通省八分穫據書麟奏報安徽二麥約収分數十分者阜陽英山二縣九分有餘者黟縣青陽二縣九分者望江六安等十四州縣八分有餘者懐寕無為等十三州縣八分者歙縣績溪等七縣七分有餘者祁門等三縣七分者鳯陽夀州等十三州縣六分有餘者巢縣宿州等四州縣六分者靈璧一縣統計通省収成約有八分等語足接青黄為慰云御製浙江巡撫琅玕奏報春花蠶絲收成豐稔詩以誌慰庚戌一日批觀兩奏摺浙江巡撫琅玕奏報春收與江南總督書麟奏報安徽麥收之摺同日批覽浙稱收麥更兼蠶據琅玕奏浙省二麥收成杭州嘉興湖州寜波紹興五府属計九分有餘金華衢州嚴州温州四府属計九分台州處州二府属計八分有餘統計通省麥收共九分有餘又奏杭州嘉興湖州三府属養蠶之處收成九分有餘統計通省蠶收亦九分有餘等語該省麥收計比安徽較優兼以蠶絲豐裕有闗民生衣食不淺覽奏深為慶慰慰哉衣食資民計額慶維箴戒滿談御製湖北巡撫惠齡奏報麥收分數詩以誌慰庚戌通省六十作平聲八州縣麥收合計八分餘據惠齡奏湖北省各屬雨晹時若二麥現已登塲計麥收分數九分者十州縣八分有餘者二縣八分者五十六州縣合計通省六十八州縣麥收共八分有餘際此大田甫種之時適得麥收接濟農民口食有資輿情頗為歡豫幸哉足接青黄際慰矣真同黔赤如况復農時若晹雨庻其民氣得舒徐邇來報穡多佳信今嵗江西河南安徽浙江等省陸續奏報麥收自八分以上至九分有餘不等佳信頻仍批覽之餘益增欽􅅥弗敢心愉益惕予御製湖南巡撫浦霖奏報二麥收成八分有餘詩以誌慰庚戌湖南不以麥為重大吏課耕勤為去聲民湖南省土性多不冝麥向來種植二麥之處止有二十四州縣邇年大吏督課如茶陵武陵華容等縣亦知種麥計通省冝麥州縣共三十一屬餘八分應號中稔屬三十幸穫皆均㨿浦霖奏報麥收分數湘隂瀏陽等八州縣収成九分茶陵道州等九州縣八分有餘耒陽酃縣等十州縣收成八分華容武陵二縣七分有餘龍陽安鄉二縣收成七分統計各属三十一州縣共收成八分有餘屢綏處更資接濟去年湖南秋成九分有餘實属上稔茲當青黄不接之時又得麥収接濟民食益臻充裕渥被澤仍利隰畇批摺不勝稱額慶惟虞志滿益増寅御製陜西巡撫秦承恩奏報夏禾收成九分有餘詩以誌慰並書賜之庚戌常慶麥收餘八分今嵗麥收各省報者直𨽻山東浙江江西河南安徽湖北湖南已有八處其多者亦祗八分有餘至九分以上實為罕見九分收實鮮曽聞忽來秦省佳音報幸穫夏禾上稔殷兹據秦承恩奏陜西夏禾約收十分者咸寕等十五縣九分有餘者孝義等二十九㕔州縣九分者五郎等二十五㕔州縣除延安榆林綏徳三府節候稍晚尚未報齊以上六十九㕔州縣收成九分有餘洵為上稔覽奏益深慶幸昨嵗前年灾未逮秦省屡綏無歉去嵗冬雪優霑今春甘雨時被實為萬姓慶幸無已春霖冬雪澤猶勤西民為去聲感何修遇戒滿應同爾我云御製四川總督孫士毅奏報夏收分數詩以誌慰即書賜之庚戌西秦近報九分餘川蜀夏收又似諸據孫士毅奏川省稻田甚多雖頼塘堰灌溉究須雨澤滋培而山坡髙地樹藝雜糧尤頼甘霖溥被今嵗自春徂夏屡獲優霑兼復晴雨應時邇來二麥俱已収穫完竣成都重慶順慶叙州䕫州潼州嘉定眉州卭州瀘州資州忠州逹州七府六直𨽻州收成均九分有餘龍安寜逺保寜綿州酉陽叙永三府二直𨽻州一㕔均有九分雅州石砫一府一㕔八分有餘理畨一㕔及茂州所屬八分統計通省麥收共九分有餘等語川省與陜西境壤毗連昨秦承恩奏陜西麥收九分有餘兹川省春禾一律豐穰覽奏益為欣慰兩省比隣胥上稔萬民連嵗慶安居雖云富矣難言教既富而教夫子之訓固當遵也然有父母之責者茍不存父母之心則不以為獲利之區即以為立名之地如栁宗元種樹之喻所言長人者好煩其令民輟饔飱以勞吏且不得暇又何以蕃吾生而安吾性盖其弊有必至於是者向批桞文曽詳著其義居今之時生齒日繁物價日長兼之長吏鮮有能實心愛養斯民者幸而地方連獲豐稔小民庻得平康若遽髙言教化則其令更煩不誠有若宗元所言非以愛之實以害之者乎孫士毅為督撫中之賢能者自能善體予意也祗曰幸哉稍救虗方伯載咨體予意鞏謙戒滿漫驕如御製雲南巡撫譚尚忠奏報麥豆收成詩以誌慰庚戌路逺報來遲寜因逺或遺孰非予赤子總為去聲計農時菽麥九分穫譚尚忠奏雲南省二麥蚕豆收成分数内麥豆并種之䝉化等一十八㕔州縣髙下俱有十分鎮沅等十州縣判治低下十分髙阜九分永北等二十六㕔州縣縣丞治髙下俱有九分大関等一十五㕔州縣低下九分髙阜八分祗種蚕豆之思茅一㕔低下九分髙阜八分合計通省收成實得九分有餘至􅜲邉各土司地方所種麥豆收成合計八分有餘滇省僻處萬山不通舟楫全積本地所産以為生計麥豆雖非稻穀可比而逺近豊收足資接濟邉民無不欣悦閭閻萬姓怡南瞻誠慰志慰以敬為基御製雲貴總督富綱奏報兩省二麥收成分數及雨水情形詩以誌慰庚戌夏收兩省九分餘渥雨頻霑髙下畬富綱前奏滇黔二省榖雨前後每旬均得膏澤一二次麥苗俱極暢茂兹復據奏滇省於小滿前後天氣晴朗二麥登埸極資曬晾及節届芒種大田正資翻犁播種之時旬日内或陣雨頻霑或宻雨連綿入土極為深透不特溝渠充滿即髙阜處所亦俱積水盈疇現在近河田畆栽挿完竣髙田並可一律耕種齊全至黔省各州縣稟報得雨情形亦大概相仿其兩省麥收分數通省牽筭約計均有九分餘市集糧