front:
  text: 欽定四庫全書八旬萬夀盛典卷六十一
  hash: sha256:1f92c1b9c94b4b52bf8a84b3281714631e358f01a6810c744b59043b1845135e
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_061-1a, image: WYG0660/WYG0660-0724c.png}
body:
  text: 典禮十二樂章六安南國王阮光平恭進大萬夀祝嘏詞十章七月十四日躬獻夀於澹泊敬誠殿携該國樂人演奏如儀臣福康安謹奏為呈進安南國王祝嘏樂詞仰祈聖鑒事據安南國王阮光平咨稱現在諏吉起程進闗詣京躬祝萬夀兹恭撰祝嘏詞十章業令樂工演習按拍定譜先行咨送即請核正以便進京演奏等情臣未嫻音律而按其詞義頗合頌揚之體且其嵩呼華祝悃忱竟欲自附於天保九如并帯同樂工到京演奏希圖列入太常尤為恪恭慶忭理合将該國王所製樂詞先行進呈御覧謹奏安南國王阮光平㳟進大萬夀祝嘏詞十章山海鍾英隂陽合德彌綸乾始坤生綏猷維后豈弟作儀型八袠台黄得夀乾乾不息體天行真正是聖人乆道萬化妙裁成雞寒逢盛㑹光囬慶滿寰瀛荒陬歸闥户葵藿傾誠辰極煌煌絢彩四旁旋繞拱羣星銅柱外普覃恩渥瞻覲效山聲一芳滿庭慶穰穰慶穰穰夀無疆虹渚在辰添海屋螭頭有穆引天香僊仗翕趨蹌風招邀風招邀響笙簫驛路九千通玉帛宸垣咫尺接鈞韶衮冕見軒堯月團圓月團圓映管絃宫扇光囬霓羽宴御爐暖出綺羅筵翰羽到鈞天二引法駕秋光皎皎祥雲華黼藻桃始熟椿未老遒總膺純嘏訓彞敷乆道希逢事中國聖人兼夀考健行符大造柔附綏遐徼所照至時怙冐宸襟仰清穆明堂䖍舞蹈將葵悃九祝賡天保三嵗千秋丹霞燦爛秋雲曉天門次第重開飄飄霓羽月中来韶音和玉府嵗酒馥金盃九采冠裳歌聖夀山聲響徹蓂階新藩玊帛仰柔懐祥光瞻彩仗和氣暢寒崖四仙臨江中天紫極燦秋光帝祉保悠長聖人多夀星雲恊慶嶺瀆呈祥楓廷馥郁御爐香班列奉瑶觴天家盛㑹九階鼓吹萬國梯航五媚秋波皇圖日月長聖徳乾坤大春盎瑶池醉碧桃夀紀同山海燦爛紫垣髙渥優洪澤沛鶯歌鳳吹繞僊洲喜溢明堂外六子卜筭輝耀北辰在覩崒􅙣南山齊夀休嘉軼出羲軒古艾臧膺景祚道化成恩澤􅄎舉紘埏同闥户明堂玉帛遵侯度昌辰䖍祝嘏七門謁金聖功巍蕩配乾坤瑞彩耀宸垣春融萬宇祥徴雲色慶恊山言海渜地逺覃聲教共球覲帝閽天威咫尺香風馥郁恩渥便蕃八朝賀聖春醉桃英香濃桂秀銀蟾當牖祥雲縹緲瓊樓玉宇鈞韶九奏傳宣室萬國衣冠燦千行鵷鷺陽光和煦承恩貺楓陛彤弓湛露厪媚祝億萬斯年聖夀九風樂春閶門開黄道九重清穆丹鳳樓前鸞鷺肅璀璨華簪麗服炊金浮玉咸韶響徹齊聲祝檀香噴暖宫扇五雲開處鈞天迭唱瑶池曲河漢曙僊籌引千秋海屋長照耀堯階玉燭十閣鳳凰是年緬甸國王孟隕遣使祝釐㳟進萬夀樂詞一闋雲貴總督臣富綱謹奏為呈進􅃡甸國王祝夀樂詞仰祈聖鑒事據緬甸國王孟隕咨稱本年欣逢大皇帝八旬萬萬夀現在㳟備金葉表文竒異花象等物遣頭目進京代躬叩祝聖夀無疆兹另撰得祝夀詞一闋敬頌天朝純嘏之長藉誌下國欽服皇恩之大伏祈代進進等情理合譯出代為呈進仰乞聖鑒謹奏緬甸國王孟隕㳟祝萬夀樂詞一闋聖治巍煥化宇光昌天錫純嘏國祚綿長爰産靈竒禀精瑶光鳳凰麒麟自古稱揚紅象白象曠世嘉祥稽首以獻率土來王階生蓂莢人樂堯封朱草呈瑞生于殿庭維兹蒲葉向化鬱葱西陲弱植獻瑞從同既沾甘雨亦被和風聖世咸若芸類景從臣等謹按周官鞮鞻所掌裔樂罕𫝊漢世筰都向化槃木來賔始有樂徳慕徳懐徳之歌頌長夀而慶安樂然其所述祇在繒布賜賚之㣲所見殊隘良由當日託言綏化僅示覊縻逺道呈歌不足以稱盛事我皇上徳威所屆不戰歸誠丹徼炎荒共球踵集若兹安南祝嘏之曲緬甸獻夀之詞欽巍煥之洪勲介洪長之景祚抒忱効祝預列太常真有詠歌之不足而長言之長言之不足而舞蹈之者是以仰天顔於咫尺企鴻慶於駢蕃雖各操其土風彌自形其親切臣等謹以附諸典禮徴聖朝聲教之暨訖入人也深而夀世之宣豫揚庥且弗遺於殊方之末奏也豈非同節同和萬方顒抃之昌㑹也乎八旬萬夀盛典卷六十一
