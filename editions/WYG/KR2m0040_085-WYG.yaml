body:
  text: 歌頌六萬夀恭擬南交問答一篇謹序協辦大學士吏部臣尚書而廣總督公福康安皇上御極之五十有五年秋八月恭遇聖夀八旬大萬夀醲化匝洽湛恩汪濊東西朔南外暨裔夷君長靡有小大奔走偕來蒲伏闕廷臣奉節在粤經理安南國納欵事成皇上俯念臣世受國恩夙侍禁近特命還朝與乎拜舞之列並帶領安南國王阮光平以來俾得仰瞻雲日遂其夙夜祗慕歆嚮延跂之私忱自始戒塗以逮伏謁山莊舉凡宴勞錫賚臚句典屬所司孰為舊典孰為新恩胥出睿裁所以示慈恵而式綏徠者典盛禮隆既優既浹荒服末藩瞻天仰聖歡若家人戴巍巍履翼翼從容饜飫口不能言抒為謳吟㤙至周也澤至渥也惟是躬際昌辰在廷臣工咸有撰述冀以宣上徳而攄下情臣受恩深重恭逢盛典不敢以拙於文辭輒自緘黙洪惟我皇上膺八徴嚮用之庥啓萬夀無疆之袠至聖至誠立隆萬古紹天闡繹緝熙光明與帝合撰匹羲嫓軒自御極以來五十五年敬祖之誠法天之猷勤政愛民之實與夫典學髙深武功顯鑠以及幅員之廣瑞應之孚無一不輳其極盛稽諸往牒亹聞罕見即欲萬一仿彿如今日者抑未之有夫大徳之必得位祿名夀徴諸中庸我皇上至徳之運如此諸福之應如此日引月長延洪曼羡於億萬年者曷有紀極豈臣謭陋所能殫述第即職事所及舉阮藩之敬詢聖主徳威福夀與臣所以具答之者作南交問答一篇言由譯達情冩心藏謹拜手稽首以獻安南國長阮光平遣其兄子光顯詣闕求欵奉章匍匐闗前願上言大皇帝𨽻名大鴻臚誓今以往世世子孫長為臣僕比古徼外屬國臣封章驛聞皇帝曰俞天既全付予鞏圖寧兹炎徼芸生非予蒼赤非予怙冐爰降㫖允請引之天衢居之譯館班之乎帝庭九賔之下飯之珍飯觴之雕觴肴之以犓牛之腴薄耆之炙享以雞寒佐以秋黄籩焉而有稲粱穱麥粔籹餦餭筐篚焉而有齊縷鄭綿秦篝蜀錦金華之舄懸黎結綠紗榖之裳屬佽飛之吿獲中於菟於神鎗陳豹仗之末賜螭陛之旁示服猛而飫鱻咸交駴而旁皇蓼蕭既奏帝庸作歌丹豪垂露倬乎天章阮光顯拜手稽首退而竢命閣臣承㫖書敕歸錫厥長俾王其國延及奕䙫奉我大清作我南藩其亦有慶迺命候吏𨗳遣出畺阮光顯炎陬黔首愚戅懵昧習於國俗初未嘗識中國也至是􅋺讋於威稜涵濡於至徳厯遊莊馗見聞殊昔還復於國王而言曰嗞嘻乎嚮壹不知圓穹所覆方輿所載曽有仁夀之域至乎斯也憶自敂闗伊始迤邐而達於椘豫之境陸有車水有艦雲集輻輳而至者意其為大都劇邑之㑹耶道如砥屋如櫛蹈和鼚豫而處者意其為神臯奥區之勝耶至於瞻宸極於向晨朝龍墀而初晝爛振袂以霞飛藻爓烺于虹廇將所稱蓬閬樊桐者非耶樂聴鈞天噌吰鏜􅝅華酌既陳萬舞就列鏗鯨鐘伐鼉皷竽瑟繁㑹撙撙揔揔紆紆逢逢金支翠葆霓旌月珮颯以舂容鳯藪麟棷繽紛熠煜平地變現不知所出六莖六英咸池咸黑不聞厥聲古有其説今者震于耳矣莫測其為鍾為吕何隂何陽駭于目矣莫測其為文舞為武舞猗綴兆長洞扵心矣莫測其為韶為濩抑誠雲門抑誠大章雖有電光之舌雕龍之辯固不能盡諸詞矣國王矍然而起曰聖主之世㴻雨所及罔不沾濡恵風所被罔不嘘拂小國僻處徼外皇上錫以土宇畀以封號維天好生維皇再造罔極之恩莫能名報藐兹荒裔抑猶靦然人也未見聖若弗克見豈可生聖人世為聖人氓而弗親覩聖人者乎明年庚戍恭遇聖主八旬萬夀庶幾從九夷八蠻七戎十狄之後備爻閭門外之數以展微忱以觀昌會於是繕郛郭飭畺圉擇留守理羈靮季春之吉涓辰肅裝驅而就道叩鎮南之闗泛蒼梧之江與督粤使者相見言敢吿執事敬從後塵騶鈴既發心趨帝都所過山川城郭之壯麗人物之秀偉戎行之整飭盖非其兄子光顯之所能殚述者國王衎愉眙愕竟昔不自勝於是過使者而問曰至矣哉聖朝郅治之隆也覽百物之殷昌與士民之闐溢濬畝為澮輑隄成畦厥原桑麻厥利蠶織淵客鬬其珠琲和氏獻其尺璧至于翹闗超距之倫䝉犀渠執莫邪而陳者金鉦一振牙旗畢舉爍乎皇哉毋論小國荒陋之規模不容同日語即唐虞夏商周以來中華令辟克恭克乂小治小康有徳業可稱道者亦烏從有是竊意使者遭逢隆盛仰依日月之光敭厯中外見見聞聞固宜䛚其治平以發矇而振瞶焉使者迺歛容正襟答曰方今之世治矣安矣蔑以加矣然亦知治安之所由致乎夫大聖之宣豫也以盛徳徳無不包而所尤重者莫先於敬天法祖勤政愛民皇帝懋膺綂緒昭事翼翼本䖍恪以敬奉蒼昊初辛祈榖首夏雩雨既揚柴於元穹復薦琮于黄墠毎嵗三大祀必躬親之先三日而潔齋通神明于沕穆野廬拂涂掌舍設柢青旂綏綏蒼龍孔阜廩乎淩兢濯乎濩肅凝承以對越俟翼日而吿䖍於是清塵洒道星陳而天行奉輦而祇步鏄鐘宣間衆奏帗翿立干戚舞九變叶成六清敬侑惟聖人之薦馨懿闡禔而昭貺春秋報祀禘祫烝嘗升歌九廟以致福受釐天下咸欽帝心之誠國家重熙累洽百數十年我皇上膺圖御宇懋宣重光述訓則有碑焉紀恩則有堂焉毎於晨興莊誦實錄載揚前烈傳餐而後延攬庶政批答封章日理萬㡬不為勞勩御書無逸以掲諸宫殿凡皆以為民也且民事莫重於農毎暮春初吉將有事于耤田躬秉耒以勸農功轉日馭御時風簡紺耦􅓊土堫雍雍肅肅以竢于天田者固不獨京尹與司農昨年聖夀七十有九矣尚親操夫青耒枉天步于町疃通蒼靈于謦欬書大有報屢豐陳陳億億由畿甸而垓埏奚啻際溟而暨海若夫木穰金飢蠲貸並施沐恩而被澤者以千萬萬計再免直省漕糈三免中邦正賦丹詔十行醲膏疊布斯為愛民之實政伊古所未睹國王曰皇帝治化之諴和淵衷之嚴翼誠非蠢愚所能窺測至於六師所至摧枯拉朽績用底成幅員之廣亥步未經庶得聞睿算大概乎使者曰國王亦怖于天朝之兵力矣昔凖噶爾恃逺負固不共不譓其地當拘彌渠勒以西烏秅婼羌之外自元代額森托渾者狼跋不馴逞其殘害延及其裔曰噶爾丹䇿凌曰䇿妄阿拉布坦者陸梁漠北自作弗靖屢申天討既殄元兇茍四部相安則覊縻之覆育之而已詎達瓦齊睢盱恣肆虐其國人我皇上天地為心不忍令彼之生靈罹于塗炭爰遣六師陟賀蘭沿疏勒横甲左右不誓不禨天兵所過農不輟耕㕓不停市若庫爾都若庫特齊納爾若扎哈沁若阿爾塔沁等咸懾威懷徳厥角膜拜長驅罙入先收烏梁海次撫五集賽冄納綽羅斯噶爾藏多爾濟盡撤其樊籬八旗索倫之勁旅振奮揮霍迅乎若長風捲籜沛乎若洪流赴壑飛渡伊犁而曾不一勺既定準部釋小和卓木之拘俾居伊犁以撫舊衆其時波羅泥都已歸葉爾羌而阿睦爾撒納煽亂霍集占啖狙流言脅衆倉猝變更於是睿慮逺周神謀夙定整師伐叛所向辟易彼以詐来此以直應伊犁既定回部悉平一挫之霍斯庫魯克再殄之阿爾楚爾三縻之伊西洱庫爾淖爾微特安集延和罕諸部望風景附而拔達克山之驅除先路者一如左右哈薩克東西布魯特咸震慴􅌓眙效同仇而殱大憝葢兵出於不得已而開疆拓土者二萬餘里西域自此寧謐矣藐兹金川僻在西徼索諾木與僧格桑始則蠻觸争衡繼則狼狽作慝忘天朝矜撫之恩逞蜂蟻聚屯之智神人共憤天地不容皇帝曰吁是不可赦用是詔司馬飭五兵宣九伐鞭列􅆙於雷硠捎欃槍于月􅒸及克美諾撫定塞落逆酋竄逃促浸潛匿移師征之搗其窟穴冰柱全摧雲梯逺突八門簇陣一皷升陴劖鐵額而盡仆刼紅燄以成灰凡五載之師萬里之役一朝而始即天子乃紀偉績勒穹碑鎮卭筰之裔衆揚撻伐之軍威八荒戰慄九有綏懷繩懸棧度之區悉𨽻我疆域繄戎索之所未規洪荒之所未闢若夫閩海臺灣莠民逞亂始訛言而惑衆繼糾結而交煽圍巖邑以恃險乃發羽林命虎賁簡調屯練樓船並進自崇武而抵鹿港揚颿弭櫂閲千里扵一瞬風伯陽侯咸知効順舳艫飛渡壁壘重新指揮號令爰皷大軍越崙仔與崙尾躪賊壘如輕塵兼晝夜而攻屯寨驅雷雨而盪妖氛遂解重圍之困徑趨斗六之門十圍五攻罙入其阻大里杙巢穴既傾水沙連屬孥就虜逆首乃竄内山之林箐結生畨之獷狙延脰息喘逃匿無所于是宣示徳威賞順罰逆聖化覃敷無頑不格異類同仇傾心効力遂蹙之於老衢踦布彌天之羅罼既組繫乎渠魁悉殱擒而勦洗由北趨南風馳電掃勦洗枋藔進攻瑯嶠水陸合圍肅清窮島檻致二渠功成三月欣臺海之永寧莫不讋威而戴徳即今幅員之廣南窮朱鳶北踰濟勒西越烏孫東暨日出凡跂行喙息奔走恐後願隸臣僕者何莫非普被埏紘之盛烈哉且國王但知武功之震疊矣而不知文徳之巍煥也賢才簉乎選舉則有親臨貢院之什著作萃於詞科則有躬莅翰苑之典煌煌天詔照耀日星又以成均首善時夏觀型辟雍弗舉於義闕如迺命司空眡以景􅈏營以般倕丹楹玉磶芝栭蘭榱重屋八達橋門四開仰承辰極廣涵聖涯璇榜蟠以雙螭乾文爥乎六堂上丁舉釋奠禮召生徒簡儒侣御幄崇啟講筵宏開皇帝乃整法駕鳴和鑾詣于太學禮官告備大胥起而登歌摯㐮望以並拊拜獻恪䖍羮牆儼睹載莅彛倫之堂擊大昕之皷賢裔博士彬彬莘莘國子僚屬曵􅅂彯紳咸逡廵而揖譲洵蹈徳而詠仁皇帝宣玉音霽天容進衆講闢宸聰用敷彛訓玉戞金摐勒前説與後記儗合璧於璜琮宣聖既逺巵言殽真奎文炳煥轢古振今御製文初二集積千有餘首周情孔思貫串合并葢皇上兼徳位時三者而一之故宣為文也與治與道而合若大典若水利若武功若柔逺出之為明堂之治敷之為皇極之言而御論之剏發五經進退諸史正諸儒舊聞之失闡褒忠討貳之義微而音韻象數精而當名辨物是皆周公孔子之文而非千古文人之文㡬暇賡詠嵗積日新御詩五集四萬餘首念民依而時切雨暘熙庶績而罔間宵旰隨事物以闡理奥因茂育以暢天機叠韻則増而彌新聯章則多而益善用以昭示海㝢布及陬澨臣工之賡和誦習者雖濡毫和墨殆知摹天繪日極闚管捫籥之智反復擬議而莫解所思欽定三禮義疏舉賈逵鄭衆蕭奮李悊諸家之説而釐正之命纂滿漢源流白山黒水瞭如指掌若儲貳金鑑貳臣傳勝朝諸臣錄皆親加㸃定垂鑑萬年而於史事尤遍為綜核御批通鑑輯覽褒貶詳宻佐以五代史遼金元三史國語明紀綱目明臣奏議一經睿定繩直衡平考律吕則音韻述微溯其源詳畿輔則日下舊聞考挈其要而輿圖之書一綂是志包絡宇宙囊括紘埏又復編纂熱河志以臚陳分野辨别經界凡刋刻武英殿者十三經卄三史續纂三通以及聚珍版不勝枚舉固知集大成者之必歸聖人也至於開四庫㑹羣書浩如淵海燦若琳琅命建文淵文源文溯文津四閣次第落成各貯三萬六千册聳宏璉之規敞竒瑰之宇寶篆髙題璇文細鏤架珊樹以紅齊籖璚枝而綠凍翠函錯落錦軸參差覽八紘於繡卷緬九囿於丹縢又復嘉恵士林俾大江以南咸得仰聖學以窺祕籍於揚則建文滙於杭則建文瀾而文宗則建於金山冊府鼎峙濊澤泉流抒乙夜之編摹擴酉山之篇帙自古及今未有若斯之盛者也石皷由來舊矣雖以韓韋之淹雅罔克㸃竄成文皇上綜諸説而論定之重排十章製皷鐫刻一頒於太學一庋於熱河繚垣虚檻周器周文畫辦蟲殳光薄雲漢至於詩經樂譜全書以宫商角徴羽正變之名増五六工尺上四合之字改十六弹之琴瑟配十二月之隂陽定一字以一音字駢注以儷行悉奉宸裁丕彰詩教洋洋乎中和合樂盛世之元音也他若八體銀毫游心紫殿鉤摹古墨神物㑹歸三希法帖八柱蘭亭以及淳化快雪墨妙諸刻脱文畢綴裂幅仍完綂承寶翰之光並耀奎題之彩而御刻敬勝齋法書則尤迥軼羲獻列舞鸞龍抑且心融名象趣寓丹青臨李迪之雞雛橅樓璹之耕織偶摛天章即仰見九重無逸作所子恵懷保之衷薄海内外覩宸藻服至教者咸蒸蒸而敦實學秀髦蔚起迪牖衆儒肅肅蹌蹌河漢黻黼觀恩榜之及今而五知聖夀之作人以普使者言方及此國王仰而眙俯而思矍矍乎不啻神馳於廣漠之野親覩攻伐擊刻震掉暈􅀈而不能仰視又如游厯乎嫏嬛福地茫乎不辨棐几燦陳而不覺亹亹乎有進國王之聴聞方聳而使者之言未竟也乃曰聖天子文徳武功章章若是以揚武則百蠻不足攘也以施教則罄牒不足殚也文經武緯致于治平朝廷遵榮隂陽和調五徳嘉符千載壹合天子乃巡狩方岳登嵩㤗抵五臺詣陪都者四幸江浙者六皇帝曰咨予省方實民事是亟戒有司勿務華靡詔書屢下供頓不煩鑾輿莅止童叟懽呼瀛鄚之郊春冰初泮翠䍐映波綠荑被岸渠陋鄭白之饒井有猗頓之富皇上察原隰審泉脈指授機宜疏淀及泊維鷹嘴與鹿疃資洩宣而瀦蓄若乃齊魯之交漕運所厯汶濟洞流隠現潏汨兩江兩浙號為水鄉沐浴日月翕闢隂陽故湖則有微山蜀山駱馬洪澤甓社震澤江則有揚子錢塘松江婁江東江其浸淫輸貫消長漫溢也捍衛之疏𨗳之而已繄古言水土者内屬水衡外董畺吏未有親試樏橇目營而手畫之也皇帝謂省方觀民事莫此鉅於治運河也則以湖為櫃以啓閉而節宣之於治淮黄也則𨗳源桐栢疏流雲梯既引經而𨗳絡弗懲羮而吹虀挽倒漾開陶荘事艱於往昔而利多於方將黄流繞北清流下注湖河闗鍵帖妥頓挫河伯揚旗而前趨烝徒荷鍤而雲騖眄滄溟之混茫洵一葦而可渡維淄澠之不淆鞏金隄而永固洪湖清口水誌是凴丈尺分寸與水升沉設木龍以挑溜塞髙堰之漏巵桃宿六塘農鹽是資釃之障之渠用以治逺尋其源越火敦腦兒得之於阿勒坦郭勒作河源紀畧以薌之訂張騫之鑿空闢都什之游辭皇帝喜睹黄淮之順軌而廑浙江海塘之弗鞏弗葺也迺駛龍艑渡鴛湖紆蹕路而晨駕抵鹽官而周諮命有司以相度需石瀃之延長鳩瀛壖之安宅功期建乎久常惟皇躬之親履乃端委之悉詳潮汐衝刷蹲矬迸裂當險要之區籌永固之策束龕赭而下輸鑿雲根以環衛石鞏於柴而柴輔乎石益坦水以洩怒栽坡栁以防囓維北漲與南坍仰聖謨之深切皇上心通造化仁愛黎元不惜金錢億萬萬為東南之氓謀袵席而計安全洵亘古之所未聞而江神海若之所以助順而効䖍清蹕所臨讓慶並舉行殿有引對之儀停輦聞省耕之語桑塍麥隴天光日輝綠波春水鳯䑵龍旗惟布徳與行慶覩萬物之華滋爾乃廣額加科陳詩抜萃庠序之間菁菁靄靄玉輅經臨免見租者十之三豁宿逋者數十萬如春雲之含膏雨舉數千里而潤於一旦耆老有賚役徒有廩勸風俗恤部伍復鞶帶宥鉗釱毎沛徳音下綸詔逺近觀聴喁喁恐後則又從古及今稀覯之曠典也且夫五世同堂上瑞也萬方樂愷庥應也四夷咸至鴻烈也往嵗乙巳正月上吉列宴三千叟於殿廷自耆及耄迄期頤有贏鬗皤登降拜恩駢踵樹頷延脰祝嘏同口一詞曰願我皇之夀萬萬年猗歟庥哉洵昌期景運千載不可逢之嘉㑹比者直省大吏奏報民間五世同居者數百家皇帝皆優詔加賚九州民婦夀至百嵗者不勝僂數蓋天苞地符含蓄薈萃淳寰夀宇敦固隆龎五六為天地之中合兹恭際中天之運宜乎顯懿景鑠有如是也夫化日本是悠長而佛域豈能測量妙因之墖吉帛靡華矣奉常之署仙蝶効靈矣不言瑞而瑞已彰徹則凡四海之外六合之内孰不以手加額皷舞盡神慕景光而望閶闔其能至者則筐篚琛賮曲􅎽帣鞲曠千載而為盛事也若是者何哉盖由聖天子本徳以致治而治超於三古徳惟在勤勤於政事而萬物理勤於制度而禮樂興徳惟主敬敬以握心之要而心與昊縡合契敬以立化之源而化與厚載同符而又頒崇儉之詔懲奢侈之習戒蜉蝣之所刺採蟋蟀之所朂是以吏不易其守民不逐於末士懷忠而農力穡商服賈而工規矩羣生以遂萬彚以昌浩乎蕩乎帝力於我何有皇帝聰明天亶於典籍無所不觀於義藴無所不究文思睿照殚見洽聞窮源竟委遺觕得精敬之敬之聖躬康强而勤念典學學日懋矣敬日躋矣三皇之世如春五帝之世如夏此猶積笇可稽也惟聖皇之徳與天同健故聖皇之夀與地同乆大衍之數五十以五乗十推而演之萬有一千五百二十為天地自然之數皇上誕膺大寶之嵗二十有五是紀元逢十之成數即聖誕逢五之中數聖誕逢十之成數即紀元逢五之中數以羲圖衍之萬億算正未有艾惟徳備故福備執沖含和榮鏡宇宙郁郁焉嶷嶷焉貫九窾九愸而經紀之者五十五年於兹是以孕唐包虞甄殷陶夏治邁乎繩契而化同於覆載也國王徒震乎豐功偉烈而未泳游乎聖量之奫潫徒慕乎庥徵仁夀而未窺見夫宸衷之粹穆是猶測景而目徒為眩望光而身處乎隠也國王乃蹶然而興茫然失據側席而言曰今而後知帝徳之如天夐矣高矣無以嫓矣大徳大夀理數必然夀世夀民景福備至葢蕩蕩無能名焉宜乎非光顯之所能殚述也逺人傖陋懵昧檮鄙幸聞所未聞豁蒙開蔽敬知中國聖人乃超千百聖而為集大成之聖人也自粤達都萬餘里悃寅情洽言語覼縷叙次問答兼豪叅紙既而聯鑣山莊旋軫京邑觀乎鈞臺合宫仰乎象魏辰極燕饗之便蕃賚畀之洋溢榮抱見之禮捧天筆之額誦雲章之詩文遵皇度之冠服簉班列侍天顔咫尺親見堯舜眩上儀而飫郅徳彼又將歡呀唭㘈歸而述且頌於駱將馬人扶南林邑之國八旬萬夀盛典卷八十六
