front:
  text: 欽定四庫全書八旬萬夀盛典巻六十六恩賚五本年蠲賦二
  hash: sha256:ac82d88e7ef6ed31ae2cdca6d9b82a68799fc53de30834b6f8e0cc1a8c80f7f4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_066-1a, image: WYG0660/WYG0660-0780c.png}
body:
  text: 大學士以下直省臣民以萬夀覃恩普蠲天下錢糧具摺請題各陳謝大學士臣嵇璜等跪奏為恭謝天恩事欽惟我皇上軒紀洪延堯仁廣被運符乾健萬年長鞏於璇圖恩協春生四序均調於玉燭卜豐綏之告慶地寳咸登瞻雲物以書華嵗星恒朗念雨暘而錫福正八徴作記之年度量衡以省方先二月東巡之候天倉秸銍曽再蠲惟正之供農部度支已三荷如綸之霈被聖澤於通寰洽宙無一夫不浹髄淪肌慶逢八袠之元春復奉十行之闓諭雞竿表闕甫聴宣恩詔之條兕爵躋堂方共拜新正之宴南郊祈榖七十二候之化日延長左个宣綸三百六旬之泰辰伊始豳風可繪小民切籲於稱觥禹甸偕畇至徳更周於賜粟樂民生之康乂幾忘舉祉為勞課吏治之循良無慮催科或拙千萬禩中天慶集十七省間嵗膏流陋免半之前文準輪蠲之舊例築場納稼洽隣惟聴村舂剥􅀥烹葵安枕無驚縣帖此皆聖慈燾冒仁化㴠濡而且親御丹毫丕宣寳訓時已臻扵郅治尚托小康誠不息於健行恒深夕惕仰尊光之謙徳掲宥宻之全功帝力不知耕鑿滿春臺之上一人有慶謳歌遍月窟而遥觧愠阜財奉瑶觴於舜日西成東作増寳算於堯年皇極之敷錫無涯庶彚之感銜曷既臣等欣依魏闕仰誦宸謨惠心益驗有孚曠典實昭逾格念枌榆之逢嵗何地非春譬葵藿之傾陽無言可述惟願璇樞朗耀周天拱北以羅星寳籙長生大衆和南而禮佛繼觀華之祝莫罄蟻忱和撃壤之謡同遊鴻造臣等謹合詞繕摺恭謝天恩謹奏奉㫖知道了直𨽻總督臣梁肯堂謹題為恭謝天恩事據布政使馮光熊等詳具直省十一府六直𨽻州属一百四十三州縣㑹詳據紳士耆民呈稱欽惟我皇上乾元廣大泰運洽熙慶輯堯封闡貞符於嵗琯仁敷禹甸周大澤於輿圗惇善政而養民爰修水火金木土榖備休徴而錫庶惟若雨暘燠寒風時際萬邦之告屢綏樂承平于已久寛四方之供惟正宏大造以無私計財賦金錢之特蠲迥非莢籌可算靡逺邇陬瀛之弗逮咸令囷廪常盈况夫身依化國化雨先濡地接春臺春陽蚤被九重之快晴佇雪近占協應于神京三時之閲稼課耕首驗登豐於畿輔芸類之謳歌正切椿齡之曼羨重逢八袠肇開十行申錫伊租庸原一定之舊章迺豁除有非常之曠典謄黄首出萬衆焚香粲白優霑三農餘粟騰歡聲於輦轂羣欣日近長安荷夀世之絲綸同効山呼萬嵗莫名下悃冀達上聞所有欣感微忱謹合詞呈請代題等情由各府州縣詳司由司轉詳到臣欽惟我皇上徳備福徴治孚恒久衍疇時叙襲慶於天苞地符調幕日蘉勰序於皇春帝夏一堂五代瓞詠増祥四海三登禾書紀瑞荷天賜頻臻大有為民謀不啻家人誠求在宥以赤子之心為心元吉有孚後天下之樂而樂方正月嵗華之始普錫春祺欣八旬夀牒之開先頒恩詔沛新膏而免賦全寛秸􅖽之輸分嵗額而停徴益廣黍稌之積澤下尺生上尺稱物平施畊九年餘三年阜民足用此皆聖慈仁育用昭皇極福敷萬年之景祚方長一人之惠心勿問欽承紫綍忭溢黄圗兹據詳請具題前來臣謹㑹同管理順天府尹户部左侍郎臣蒋賜棨順天府尹臣呉省欽合詞繕疏恭謝天恩伏乞皇上睿鑒謹題奉㫖該部知道題為恭謝皇上徳懋健行化成純久軒階調一元之運象闡貞符姒圗膺五福之全算增神莢光華鏡宙際川􅊹澥瑩之期熙藹登春徧日􅒸月竁之域廼者北綏南屢洽比户之盈寧總由隂量晴籌廑深宫之宵旰乾乾惕若鼎鼎福來慶逢八萬嵗之蕃釐特頒十七省之恩詔方元春之肇祚協九如戩榖之歌普二富之蔵氓申四免丁租之諭固已醲沾匝地驩溢敷天者矣竊念身生盛世更居江南財賦之鄉世業先疇復擅呉下膏腴之壤河流沭澤亘緑野千里而彌滋天表承顔迓翠蹕六巡而有慶愜就日瞻雲之大願召和風甘雨之上祥春及杏蒲最好水鄉之力作秋成秔稻屢占江國之豐收在羣情之望君望嵗同欣樂利于倉箱而聖懐之為下為民更切留餘于租税按三年而遞及毋煩編户之催科合八郡而全蠲並逮佃田之减息荷翔和之溥率卜介祉之悠長從兹兆民允賴東阡西畮頻書大有之年同稱萬夀無彊北斗南山莫罄長生之頌所有感激下忱仰冀申詳上達等情由司道據此㑹詳到臣欽惟我皇上蘿圖席瑞椿紀延禧五福題五代之堂俾昌叶吉八旬記八徴之寳嚮用叙時言如絲而出如綸恩逾綏夀宵以衣而旰以食政務養民箕畢之好攸從風和雨順斗牛之區増耀星拱雲環頻年登豐稔之庥庶彚沐㴠蒸之澤除徴發粟幾同恒例之循納糈輸鏐各効正供之獻矧兹呉壤屢奉軒遊禹度維勤千里之河壖流潤堯巡所莅六度之膏雨含滋維魚維旟豐年之室家誌慶宜􅅙宜稻太平之耕織成圖民知勤利用以厚生皇惟厪恵心之孚吉本年恭逢聖夀叠沛温綸遍九土以全蠲計三年而遞免胥主伯亞旅之衆荷敬授于平秩東西乃金錢榖粟之除邀博施于大江南北聴田間之詠澤情摯於豳風介眉瞻闕下而臚歡頌溢乎康衢撃壤兹據詳請代題恭謝天恩理合繕䟽具題伏乞皇上睿鑒施行奉㫖該部知道安徽巡撫臣朱珪謹題為恭謝天恩事據署布政使事按察使恩明等詳據安慶等八府六安等五州㑹詳據懐寧等五十四州縣詳據闔省紳士蕭應植蓍民祝無彊等呈稱欽惟我皇上至誠有物盛徳統天錫福綏猷厚澤久邀夫漸被蠲租賜復湛恩屢濊于東南㳟逢聖夀無彊八旬臚慶共仰皇仁載沛萬姓䝉庥免一嵗之正供謳歌樂利分三年以遞及調劑精詳况業佃之均霑更災區之先被十三州郡悉扇祥風億萬人民共嬉燠日應植等優㳺梓里寧敢期逾分之殊恩忭祝椿齡何幸逾非常之敷錫莫名至徳每巷舞而衢歌乞達微忱倍瞻天而仰聖所有感激下情仰冀申詳上達不勝踴躍歡忭等情由各州縣㑹詳到府州據安慶府知府孫藩等㑹詳轉請題謝等情到司道據此該署布政使恩明等㑹看得欽惟我皇上福昭斂錫徳懋生成和風漸被湛恩慰箕畢之心淑氣薫蒸大澤沛斗牛之野屢荷蠲租蠲賦共享昇平依然餘九餘三同逰熙皥廼者一人有慶萬夀無彊茂膺八袠之洪禧載溥九重之恩賚呉頭楚尾咸占樂和䝉庥皖水龍山首覩豐亨有象按三年以輪及惠歉地而先霑紳耆概免於輸将農庶亦邀乎减息望千邨之蒲杏雨露無邉瞻萬井之桑麻謳歌莫罄從此催科不擾相期大法小亷秉耒増歡常獲時和嵗稔倍淪肌而浹髄咸沐大君特沛之恩長祝華而呼嵩永戴聖主延洪之福兹據安慶等庥州詳據紳士軍民感激㣲忱理合據情㑹詳題謝到臣據此該臣欽惟我皇上至治調元深仁保泰風清徼外梯航踰萬里而來日麗寰中秸總免五方之賦慶豐亨於比户家溢朱提溥樂利于茅簷室餘白粲酌後先而遞及合逺近以均霑幸逢八旬萬夀之昌期正際五世一堂之盛㑹命蠲貢賦諭减佃租有田者既裕倉箱秉耒者兼分擔石八埏普遍六皖均霑從此暑雨祁寒耕鑿咸知帝力小廉大法敉寧永答天禧兹據請代題恭謝天恩前來臣不敢壅于上聞臣謹㑹同兩江總督臣孫士毅漕運總督臣管幹珍江南總河臣蘭第錫合詞具題伏乞皇上睿鑒施行為此具本謹題奉㫖該部知道江西巡撫臣何裕城謹題為恭謝天恩事據布政使姚棻等詳具南昌等十四府州㑹詳據寧州南昌等七十八㕔州縣詳據紳士鄒玉藻百嵗耆民趙登祐等呈稱欽惟我皇上治懋登咸道隆攸久衍箕疇而錫福彤庭開五世之祥握軒鏡以膺圖黼座篤萬年之祜扇仁風扵函夏陬澨咸熈覩化日於中天垓埏普鬯億兆盈寧之象含龢聿召庥嘉九重懐保之誠錫羨惟殷康阜粤以上章獻嵗八旬延聖節之釐際兹太簇宣詔六合藹天閶之瑞五五叶乾坤之數皇如春而澤為春萬萬超圖牒所聞仁者夀與世皆夀仰新綸之寛大惠溢十行象寰宇之正供恩覃四度惟西江之版籍繄南國之方隅提封接呉楚而遥則壤視荆揚以錯指江湖為襟帶本魚羮稻飯之鄉依田宅以幹年悉火耨水耕之俗頻嵗沐撫綏之渥既十雨而五風昌辰臚介景之歡真千齡之一日南弧朗耀光分翼軫之躔北闕銜書慶洽豫章之域瑞徴蕊榜已占多士彚征喜動茒簷何幸羣黎徧徳比户而同登袵席躋堂則並頌臺萊溯仁祖上夀躬膺特播普蠲之詔我聖主重熈化浹更邀叠沛之恩計小民生長太平以來皆大造覆育郅和之宇扶杖而聆恩詔提携更見曽元撃壤以頌康年酬唱還同亞旅室有蓋蔵之富胥荷天慈人忘佃作之勞難名帝力堯尊普酌勤撫字而勿事催科禹甸同逰被膏澤而惟聞歌詠藻等身棲櫟社心繋楓宸捧日下之徳音聴田間之嘉諺梓桑在望惟殷下里之謳葵藿同傾敢冀太陽之照匡廬峰峙願偕五老以呼嵩彭蠡波㴠莫並九天之湛露合十四郡輿情交慶銘肌叨賜復之仁更億萬齡寳祚長新企踵効祝延之悃所有欣感下忱謹合詞呈請具詳等情由各司道㑹詳到臣據此欽惟我皇上福並升恒恩均幬載瑶圖闡籙祥徴華祝之三玉扆含元瑞獻泰符之六勅幾康而省嵗雨𤾉時切諮諏宣懐保以寧民金粟預籌補助兩免漕儲之運野有餘糧三蠲地額之供室多朽貫固已風淳宙合胥萬彚以咸熈澤㴻蒸黎亮九功而時序矣兹者恭逢萬夀八旬之慶欣集一堂五世之釐珍符萃而貺通晷緯昭而祥源溥月吉卜始和之詔慶洽中天年豐占大有之書賦除寰宇鴻施下逮期三載以咸周渥愷旁流與十行而廣布念蔵富必謀本富積京垓億秭而贏廼敷仁悉視同仁合甸稍縣都以遍聖夀與湛恩無量皇慈本至徳難名臣職守兹邦躬逢盛際仰縣書于象魏陽和布而膏澤俱融採輿頌于衡茅惠凱宣而條風偕鬯聴率土衢歌巷舞驩呼騰萬歲之聲願頻年櫛比墉崇熈穰愜三農之望所有紳耆等感激下忱理合繕䟽代題恭謝天恩伏乞皇上睿鑒施行謹題奉㫖該部知道浙江巡撫臣覺羅琅玕謹題為恭謝天恩事欽惟我皇上極建無私化成久道宵衣旰食知稼穡以念民依巷舞衢歌安耕鑿而思帝徳在昔温綸三錫久邀上則之全蠲届今聖夀八旬更荷正供之輪免隆施稠叠湛闓彌綸紵看萬寳告成薄海拜康年之賜羣黎徧徳普天飫夀世之恩矧兩浙夙被恩施而三亹久恬聖澤湖光山色翠鑾奉六度南巡稻蟹桑􅅙紫綍沛月正元日輿頌咸知帝力山呼並祝聖齡兹據杭州等十一府属並各衛所紳衿士庶屯運各丁呈請㳟謝天恩前來擬合據呈詳請㑹題等情到臣欽惟我皇上徳協清寧功參化育春耕秋斂頻施補助之仁賜復蠲租叠見雨膏之沛一人之宵衣旰食與物皆春四方之鑿井耕田為民蔵富兹於乾隆五十五年欣逢皇上八旬萬夀特頒巽命覃布鴻慈萬方之賦税全蠲九有之輸将輪免茅簷白叟含哺而慶昇平蔀屋黔黎忭舞而逰熙皥叨隆施于逾格共躋春臺邀曠典于非常咸登夀域從此五風十雨萬年歌有道之長耕九餘三兆姓獻無彊之頌據浙江紳耆錢載等具呈由府司詳請代題恭謝天恩等情前來臣謹㑹同福建浙江總督臣覺羅伍拉納合詞具題伏乞皇上睿鑒謹題奉㫖該部知道又題為欽奉上諭事據布政使顧學潮等恭照地分三壤登廣斥于海濵耕蓄九年賦銍總于天府欽惟我皇上道隆有慶福錫大同詔普免夫丁糧曠典幾同常例念額徵之銀榖殊施特沛温綸沙塗蠲二千八百之朱提海澨免二萬二千之玉粒流膏匝地欣逢萬夀無彊拜賜自天詎有一夫不獲東西兩淛相聞衢頌之聲山海偏隅共效嵩呼之頌兹據杭州府玉環同知等具詳紳士耆民呈請恭謝天恩前來理合據情轉詳察核㑹題等情到臣欽惟我皇上盛徳參三懋功咸五隆恩育物以愛養臻樂利之庥善政厚生本節儉成生平之福恭逢八秩之春普錫萬方之祉正賦既蠲於全省餘糧復免於海濵惟兹斥鹵之區曠典有加靡已即至畸零之税温綸一視同仁共祝萬夀無彊咸頌一人有慶兹據詳請具題前來臣謹㑹同福建浙江總督臣覺羅伍拉納合詞具題伏乞皇上睿鑒奉㫖該部知道八旬萬夀盛典卷六十六
