body:
  text: 欽定四庫全書八旬萬夀盛典卷一百四歌頌二十四萬夀頌十六章集文選句并序翰林院侍讀臣徳昌臣聞天生烝人樹之以君莫不開元於太昊伊昔有皇勲超䆳古伏羲始君軒轅承紀禀仰太和多厯年所上獲千餘嵗下可數百年然詩書所載鴻荒朴畧不能究其精詳且希世之所聞前聖靡得而言焉揆厥所元於茲為盛維清緝熙誕隆駿命天子受四海之圖籍宅中拓宇含至徳之和平朂自强而不息斟洪化酌憲典休徵自至念茲在茲是以萬邦凱樂躋俗於仁夀之地蹈徳詠仁莫不抃儛於康衢皇皇哉此天下之壯觀未有如今日之盛者也聖皇穆穆順時立政昭事上帝聿修祖宗之志訪萬機振民隐通旦忘寐昃晷忘餐體三才之茂兼聖哲之軌盛徳大業至矣哉乃崇禮官考文章又有天祿石渠典籍之府并包書林上庠肆教辟雍海流道徳之富大備茲日文徳既昭武節是宣王者之師有征無戰龔行天罰諭以威徳於彼西疆罙入其阻南夷之君歛袵魏闕殊方異類喁喁然皆嚮風慕義是以六合之内莫不陸讋水慄神應休臻喟然相與歌曰皇朝以治定制禮功成作樂詠世徳之駿烈率由嘉則乃整法服搢紳濟濟嘗以此為國家之大務禮不愆器可得披圖而校詩三百篇作畫一之歌抗五聲極六律良自然之至音各守一以司應乃今日發矇廓然已昭矣天子乃撫玉輅遵皇衢決江疏河交渠引漕亦所以省風􅂇教勸稼穡於原陸當斯之勤不可勝數夫黄河清而聖人生西盪河源呼吸萬里有自來矣涇渭之川罕能精古今之清濁乃研精而究其理信而有徵往者綴學之士靡得而詳焉今邉境乂清若斯之盛疇咨熙載小大畢力翼翼邕邕無懈于位興亷舉孝刑簡枉錯黔首豈不羙歟於是皇澤豐沛茂育羣生普天所覆莫不沽濡流春澤之渥恩展三時之宏務仁聖之事既該而帝王之道備矣於斯之時海内同悦曰五十之年賦詩稱夀鮐背之叟授几肆筵於今五稔夀考無疆更宜膺受多福涓吉日協靈辰稱萬夀以獻觴貽宴好㑹下獻南山之夀将絣萬嗣揚洪輝於是聖上覩萬方之歡娛夜郎滇池朝鮮昌海烏滸狼荒夫南西屠莫不蹻足抗首具惟帝臣似衆星之拱北辰也當是之時宗固磐石備言錫命盛烈光乎重葉威靈震乎無外柔逺鎮邇安於覆盂國風所禀弓矢斯御翼乎徐至於上蘭示武懼荒所以固本也是以雍雍穆穆萬祥必臻日月聫璧風雨玉燭瑰異日新應圖合牒犀象競馳白質黒章煒煒煌煌殚所未見奉常之號靈物咸秩翩翩然有以自樂也於是乎鯢齒眉夀皤皤然被黄髪者嘗被君之渥洽保延夀而宜子孫豈不盛乎然而聖上猶孜孜靡忒作範垂訓妥綏天保恭惟永圖受厚福以浸黎元地乆天長固萬葉而為量者也臣之愚蔽無有㳺觀廣覽之知逺慕鹿鳴君臣之宴雍容揄揚潤色鴻業允答聖王之徳曠千載而流光也頌曰顯朝維清發祥流慶大人長物對揚成命功君百王聖徳隆盛徠祗郊禋天祿保定一章率作興事防儉於逸夙興以求夕惕若慄率民耕桑惟穀之恤洪縻在手恊風應律二章闡揚文令天下衆書萬流仰鏡味道之腴辟雍湯湯勵精羣儒驤首天路應㑹皇都三章耀我皇威恢拓洪業合為一家附麗皇極九有雍熙五方率職施徳百蠻皇猷四塞四章體元立制憲章稽古品式周備纂承基緒治定作樂黄鐘為主一音稱物設宮分羽五章省方廵狩時乘六龍江河既導言戾舊邦泝洛背河登岱勒封徳洋恩普草偃風從六章申命羣司帝迹懸衡課職責咎簡良授能視民如傷敬法䘏刑將寘於理貴露下情七章肅承明詔皇皇帝祜元澤滂流普天率土恵此黎民澤如時雨家給年豐於皇樂胥八章皤皤國老如熙春陽人永其夀齒算延長式宴嘉㑹娱樂無疆人瑞又明徳􅄎化光九章四隩入貢冠帶之倫中外禔福既陶既鈞越裳重譯抗手稱臣囬首面内入覲天人十章大化隆洽爰考休徵天地交泰品物咸亨嘉禾垂穎玉燭陽明圖以百瑞皇慶攸興十一章族茂麟趾充我皇家作藩作屏我榮我華天子校獵射中獲多於時肄射其儀可嘉十二章恢恢皇度穆穆聖容如淵之量如嶽之崇巍巍弗與茂徳淵沖孕虞育夏允執厥中十三章考之前載箕子造周永錫洪算洪範九疇理宣其奥六府孔修天瑞之徵協氣横流十四章大化既洽王猷允泰道之既由恩無不逮緝熙皇圖功鈞天地以隆徳聲無為而治十五章一人有慶百姓歡欣塗歌邑誦下泝八埏聿懐多福子子孫孫天錫難老綴以萬年十六章萬夀恭擬連珠三十首翰林院侍讀臣曹城臣聞大横協於卦象八十度遷其嵗差留熟㑹於月躔十三徽應於鍾琯是以地天交泰章蔀胥統夀元律吕相生億萬彌増福算臣聞雲和孤竹禋天神以告䖍纁幣黄琮致地祇而展敬是以昊縡申命徳合位祿名夀之符坤靈貺嘉數衍億兆京垓之慶臣聞瑞呈圭璧庇䕃者嘉器用陶匏笵模於古是以常雩定禮加玉而制穀蒲右壇親儀考象而設尊俎臣聞顯謨承烈啓佑後人衣徳紹聞繼光先志是以棟雲崇殿雒誦實錄之編松風舊齋兩作紀恩之記臣聞涿鹿阪泉之戰六師定兩戒河山火龍藻粉之施三正革九章文質是以特書戰事述光烈以無忘肇立卧碑遵訓典而罔失臣聞喬嶽懷柔昊天其子泉流相度公劉于豳是以􅘦發祥於白山開國一統念毓瑞於朱果陪都四巡臣聞飭幾莅政庶績其凝稱事用材知人則哲是以勤於帝治總工虞水火之成朂以官箴有風雨露雷之别臣聞三階布政御六幕於乾行五夜披章掲重輪於離照是以覲班聨於日昃旰食傳餐待封事於嚮明宵衣秉燎臣聞璿璣運乎斗車星環紫極金鋄籋乎雲駕旗耀翠華是以嵩洛臺懷天子所至謂之幸海塘淮甸聖人之徳無以加臣聞漸江濤湧隄堆淛海之錢瓠子波寛楗下淇園之竹是以中亹築石帝收敷土之功髙偃廵河民享安瀾之福臣聞東方羣物之始瑞啟登封聖人百世之師典隆修祀是以徧羣神而先望廵守至岱宗合一揆而同符釋奠於闕里臣聞木蘭上塞古為甌脱之區崖口興桓今是周阹之境是以秋獮大狩出鹿柴門而行圍天健自强御虎神鎗而服猛臣聞羲畵開圖天地由之經緯虞歌賡拜時幾㑹其明良是以文成初二編闡經史為訓誥詩臻五萬首括道徳與典章臣聞偃波埀露掞鳯藻以長新玉版銀􅗚䕶虬文而不泐是以臨池而銘机鑑齊楣題敬勝之書列璧以置琳瑯墨妙萃淳化之刻臣聞寳簡琅函羣玉貯西崑之府丹書綠字文星耀東壁之躔是以聖世右文書羅萬千竹冊幾餘典學詩題數百芸編臣聞坐論道徳講席分陪禮集縉紳圜橋環列是以御經筵而陳傳疏闡六經四子之文建辟雍而闢注箋製三老五更之説臣聞包葱嶺而築三城悉是受降之地破花門而分兩道盡歸都䕶之司是以削平四部凖夷在二十五騎之克㨗俘馘兩和卓木陋三十六國之覊縻臣聞幅􅊷既長􅎋疆紀於釋地土宇孔厚周索載於職方是以瀛海數十邦皆為臣僕流沙二萬里胥𨽻土疆臣聞狼貪蠶食罔知覆幬之恩螳斧蝟鋒敢恃山川之固是以俘促浸與䟎拉功成五年取羙諾及葛依地開三路臣聞且甌通乎海南嚮風孔亟尉佗役乎駱越慕化匪遥是以屋鼇社畨畏天威而入覲南交藩服感聖徳以親朝臣聞西域卅六畨統𨽻烏斯之藏南蠻八百社近連阿瓦之城是以廓喀獻金經敂闗通欵緬文貢花象望闕輸誠臣聞占風測水鞮譯偕來航海梯山竁淵並集是以西崑入貢萃西北之共球南掌咸賔萃東南之玉帛臣聞辨磬號鐘應昌期而器出編詩定樂播盛徳而音和是以刻玉鑄金十二律盡諧節奏流宫振羽三百篇皆入聲歌臣聞龍觚兕敦千年尚有吉金鳥篆蟲書三代不多貞石是以周器特賜用儕宅壁之琴石鼓重排同列橋門之㦸臣聞螽斯麟趾持慶其蕃昌𤓰瓞椒聊彌敦其親愛是以聖能繼聖萬世之業卜萬年孫又生孫五福之堂増五代臣聞太平之世多夀仙集彭佺化國之日以長年躋安羡是以大衍五十稽家法以開筵有臣三千拜天恩而賀讌臣聞㑹常賦於度支承恩斯賚効正供於天庾逢慶乃蠲是以普賜算緡沭洪仁者四次再停轉漕溥恵澤於八埏臣聞青袍射䇿願奮甲科絳縣引年試叅亥宇是以重開蕊榜簮􅅂咸被殊榮特沛綸音金粟同邀寵賜臣開堯符五字聿傳延喜之章舜璽雙文曽致昭華之玉是以古稀説著萬斯年慶洽珠囊耄念記昭八庶徵時調玉燭臣聞矩執乾樞蘿圗錫羡仁符帝縡寳籙徵祥是以蓂數二十九千旬八旬有慶椿齡一萬六千夀萬夀無疆萬夀七言律詩十六首謹序翰林院侍讀臣陳嗣龍臣聞中庸舉至誠之效特推悠久之徵尚書陳恵迪之謨首厪修和之念兼覆載成而御世撰合無疆薈府事功以勸歌徳原廣運蓋斟元闡繹體上帝之心為心斯保極提釐後天下之樂而樂昌祺炳著景貺丕臻欽惟我皇上治洽紘埏福敷疇範撫五辰而凝績致水火金木土榖之咸宜正四選以調元彰雨晹燠寒風時之備叙寰宇􅄎春臺之樂鬯闓澤於衢尊神臯開王㑹之圖燦􅖤輝于宸極粤在上章仲秋之吉恭遇八旬萬夀之辰寳籙延洪瑶籌錫羡玉劵輯十華之瑞茂衍昌禔福庭臚五代之􅖤駢増介祉敷天率土沐日月而騰懽梯嶂航瀛集共球而稱慶於是俯俞籲懇廣沛恩施特科則兩牓重開惟正則九寰普錫屆元日而韶宣舜琯進羣工而宴飫堯厨嘉千百國之来同布廿二條之孚恵專官分命告䖍升岳瀆之儀寵誥優頒晉秩徧鵷鸞之侣玉鳩杖賜示隆渥于引年金鳯書銜播寛仁于肆𤯝凡蒙燾覆共戴崇鴻復於二月之初懋舉東廵之典秩岱宗而展敬詣闕里以升馨時則元化覃敷太和翔洽貢來緬甸既獻表以請封欵納生畨亦嚮風而覲闕維日南之逺徼接嶺外之蠻方感切恩慈衷深欣忭率臣民而奉朔長依屬國之班遵冠帶以朝天乞作降王之長至有地更遥於後藏古不逹於中朝慕仁聲義問之洪宣悦蠕動翾飛之各得獻琛納賮趋蹌争叩乎九閶合掌誠心敬奉願同乎三寳斯蓋由我皇上法天不息率祖攸行履豐亨豫大之昌辰㿽廑敕命膺累洽重熈之景運彌惕守成隂量晴籌躋羣生於􅎋阜衣宵食旰劭屢省於㡬康綜内外而簡掄辨材總期於熈績叙法亷而董正察吏即所以安民聖治懋勤文思光被賅帝典王謨而著訓富有日新本對時育物以攄吟金聲玉振奎章表正㳺孔藝於臨池寳繪含元示稷思於司牧蒐羣書而大備啟七閣以分儲建圜雍而澤廣四瀛排獵碣而藻摛十鼓新疆上塞並増黌序以甄陶禮器樂章悉御丹毫而釐正既崇宣夫文徳復疊告夫武功合天山二部以登圖統雪嶺兩金而蕆績氛消雁磧千屯恊豐稔之占颶息鯨波三月奏凱旋之喜胥荷睿謨之燭逺式揚聖武以綏猷用彰有截之勲遹播大同之治至若濬䟽九𣲖禦鞏金隄籌度三亹流恬碧海刻玉而功昭順軌楗石而績㡳安瀾大羙利於不言繄平成之攸頼况復四蠲常賦再免全租俾蒼黎㿽慶盈寕使逺邇均臻饒裕所以養恬普浃熈皥偕逰三千叟耆耋駢肩盛紀彤墀之宴二百家曽元接武榮邀藻翰之褒十世同居型仁講讓期頥千計泳澤含和詎惟咸五而登三信是超圖而溢牒皇上猶復勵寅承于鴻貺昭敬徳於寳文爰著記以抒懷庸作歌而攄志嘉徵恊應倍深求莫求寜宸念維殷恒凛曰明曰旦自此道愈光而福愈厚龎褫極暢泝之洪洵宜徳彌懋而估彌隆純嘏裕京垓之逺臣學踈蛾術恩荷蓬山叨陪講殿之班行與記聖人之言動恧未工乎茟札敢云擬天保之萹竊有願於􅆳颺欣共效華封之祝謹撰七言律詩十六章拜手稽首以獻昌祚延禧夀宇崇瑶墀獻斝慶來同貞符奕葉開羲䇿鈞樂重霄暢舜風四得備膺穹昊貺八徵猶廑聖人衷舊藩新部齊軒舞巍蕩難名帝徳洪景命凝承式九圍至誠昭事契淵微燔柴禮必圜壇詣禱雨文還寳翰揮本以健行符昊縡恒廑敬勝敕時幾共欣萬福申純佑乆照長瞻聖日輝耿光大烈典章留䋲武心勤播逺猷頻詣陪都懷創業欽觀實錄溯詒謀崇規騎射期嫺習成憲衣冠訓率由上塞詰戎家法乆諸藩嵗嵗覲宸旒懷保頻邀異數繁聖心長自軫黎元賜租至再徵藏富蠲賦曽三更沛恩歌徧黍與兼稷翼頌臚叟壤逮童轅要知八表綏豐象隴畆春生挾纊温教育寰區荷大鈞特開恩牓命重申茅茄泰象占征吉薪槱周詩誦作人文體諭頒崇雅屢耆儒榮拜賜銜新􅉼濡定致翹材盛騰茂蜚英誼軌遵亭育鴻施盎太和昇平人瑞紀駢羅引年詔讌三千叟疊韻章賡八伯歌上夀榮之坊表盛元孫見者姓名多繁釐徧錫由禔福五代堂中慶有那璧沼新開一水紆六飛臨講聖言敷周亰鐘鼓儀瞻備漢史橋門語闢誣義取海流㴠雅化訓申廷獻朂真儒諸生槐市争誇説黄髪人㸔百嵗踰羣書四庫貫洪􅊏七閣重教盛軌瞻名繼淵源津溯錫部森甲乙丙丁籖湖山秀挹瑶林勝江甸輝分璧府占萬億蘿圖延寳算五雲多處祝籌添三千禮樂待昌期徳盛功崇百度釐圖器特教頒典則譜經親與訂歌詩常雩肇祀當龍見特磬和聲叶鳯儀制作自來同幬載極天蟠地仰鴻禧東南六度駐鑾輿相度頻劳睿慮攄蜜砌魚鱗安海澨暢流竹箭定河渠榮登薇省掄材典澤徧茅檐給復書蹕路耆民胥抃頌熈春化日本寛舒兩金川繼凖回平更喜天南浄洗兵萬里雲㠶澄線路重洋蔗稻復畬畊贊標紫閣三圖像文勒蒼珉五告成天貺神庥皆􅂇順皇衷彌自凛持盈生畨島外徧騰懽入覲榮霑湛露漙曽助軒弧平蟻穴新瞻虞舞學鴻磐途經海澳風潮逺身到天階宇宙寛自是甄陶溥羣彚依光亦觧慶瀾安滇南􅃡甸獻蠻賨􅉼泳皇仁效敬恭馳使早呈金葉表披誠來請紫綸封􅖤占鳯律還雲吕瑞輯春朝與夏宗尺地寸天都納欵訢誾醲化洽時雍南交新宅徳威宣鞠􅎽來庭效順䖍率土之濵咸戴聖因材而䔍本同天初正頒朔珠崖外此日稱觥玉案前汜濩仁恩綏逺徼宴餘渥賚更駢闐㾗都安集貢瑶除又見殊方𨽻象胥沙度繩行西藏外葵傾芹獻北辰居伻來恭順瞻天近膜拜皈依奉佛如無量福增無量夀大千世界衆歡臚帝念勤民記寳章福徵來備叶康彊時廵東岱山齊夀極拱南弧曜應昌導輦衢歌和氣洽祝釐梵唄吉雲颺微臣欲奏純常頌寸管窺天詎易量八旬萬夀盛典卷一百四
