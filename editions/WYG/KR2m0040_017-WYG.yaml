  text: 欽定四庫全書八旬萬夀盛典卷十七聖徳十三謙徳二
  hash: sha256:7e2eacd69bc70b75cf92ec3afb04749d9ca689fbb9c821d1d303147e6b55fd48
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_017-1a, image: WYG0660/WYG0660-0199a.png}
body:
  text: 乾隆四十五年福建撫臣摺奏夀民夀婦特諭不得藉陳符瑞乾隆四十五年六月二十七日􅆢上諭據富綱彚奏夀民鄭國璽夀婦鄭柯氏等俱年逾百嵗洵屬熙朝人瑞盛世嘉祥理合繕摺奏聞等語夀民夀婦年過百齡為各省常有之事該撫既經分案具題何必多此一奏其意不過以朕萬夀節近以此吉祥之語入告不知督撫身任封疆全在辦理民事而朕尤以勤政愛民庶事就理為念如果各省雨水調匀年豐民樂祥瑞孰大於此豈必以景星慶雲鳯凰麒麟侈陳符瑞耶将此傳諭該撫知之臣等伏睹我皇上普育民生胥霑醲化是以太平夀考下逮編氓比户皆是皇上劭謙之度凡臣工陳奏讓而弗居且申諭以勉勤政事共保昇平為要盖由聖世庥徴百祥恒有本屬無竒而一渉侈言轉似史家志貞符圖瑞應之為非所以仰體鞏謙崇實之聖心睿訓至為明切矣至各省龎眉益算幸際昌辰仰邀恩例襃榮具循令典謹分載盛事門乾隆五十年正月初六日京城妙應寺塔輪吉帛現命勿宣付史館御製妙應寺八韻乙巳遵綸增位祀前朝禮畢更衣憩梵寮五百餘年𫝊妙應新正令日現祥標法輪廿丈誰飛陟瑞帛一端自綴飄日下舊聞載白塔寺遼夀昌二年建元至元八年世祖發視石函銅瓶香水盈滿含利堅圓瓶􅔄獲一銅錢上鑄至元通寳帝后閲之因加崇飾制度之巧古今罕有天順二年改名妙應寺云今嵗新正初六日賜千叟宴是時塔頂輪下懸有哈逹哈逹者蒙古語謂奉佛吉祥製帛也塔髙二十餘丈瑞帛􅂒綴實非人力所能升陟盖是塔靈應夙著扵今益騐矣不後不前千叟宴祝禔祝夀曉春朝艶稱雖弗為宣付頂禮亦非禁衆翹都中逺近瞻禮咸謂吉祥善事佛力神通不可思議既弗艶稱宣付史館而中外臣民瞻仰頂禮亦弗令禁止也迎迓異㦲致韓疏荒唐乆矣息童謡唐時迎佛骨張大其事致韓愈正言得罪甚無謂也又元初童謡有塔兒紅北人来作主人翁塔兒白南人作主北人客之語見帝京景物畧事涉荒唐乃紀載者幸災好竒之為耳幻真真幻謂何謂空色色空超又超七字偶然為紀實𫝊訛防彼遞騰囂此事為都人耳目所共見聞因賦此詩以紀實免致日後傳訛耳臣等伏睹是年皇上賜宴千叟之期吉帛于塔輪飄綴都中近逺臣民爭仰佛力神通現兹竒瑞奏入諭勿宣付致涉禨祥閲月法駕臨視梵宇爰復製詩紀事盖以杜好竒之漸而其日祝禔祝夀慶有適逢益仰聖人執徳之謙隨事而具者矣乾隆五十一年安徽省奏進瑞麥命勿宣付史館臣李世傑臣書麟跪奏為恭報瑞麥呈祥仰祈聖鑒事竊臣等據蒙城阜陽建平三縣及宿州禀呈該州縣地方長有三岐雙岐瑞麥等情臣等隨加查騐無異欽惟我皇上至治馨香太和醖釀厪田功扵宵旰多稌黍而大有頻書裕粒食扵閭閻慶倉箱而豐年屢告惟兹安省在去秋則偶被偏灾仰荷聖慈軫民依而疊加撫䘏鴻恩􅄎被厚澤均濡潛孚仁愛扵天心遂應休祥扵地利是以採山得米挖草見糧皆従来災地所無實亘古民間罕遇兹者麥秋告至更看嘉應洊臻千萬頃羣茂来牟兩三岐爭𫝊􅕗穂産非一色慶徧江南斯皆元化感通聿昭上瑞益見仁風鼓盪動協休徴臣等幸際昌期恭逄盛事稽諸史冊覺漁陽豐水僅在一隅覩此休和卜瑞榖嘉禾并開萬寳謹将瑞麥二種封呈御鑒外理合恭摺具奏伏乞皇上睿鑒謹奏奉硃批覽御製兩江總督李世傑安徽巡撫書麟奏呈瑞麥詩以誌事丙午歙徽昨嵗被災深言念災黎時切心幸得恩膏霑翼翼那全元氣復林林葍根米粒資饑命昨嵗安徽被災蠲賑不遺餘力幸今嵗春耒屡次得雨二麥有收然元氣豈能驟復先經書麟奏太湖縣鄉民穵蕨得有黑米千餘石貧民藉以充饑又奏泗州河灘生有葍菜災黎穵根煑食以資接濟歉歳聞之毎為之慽然皆有詩紀事兹李世傑書麟復奏蒙城阜陽建平三縣及宿州地方均獲三岐雙岐麥穂甬封呈覽災區麥稔稍資接濟惟欽天貺三穂雙岐漫瑞吟宣付弗行滋忸怍李世傑等遂以為瑞朕惟愧慙視之弗宣付史館也佑民天貺謝惟欽乾隆五十二年山西撫臣奏晉省河清諭㫖不得誇耀署山西巡撫臣明興謹奏為恭報晉省河清仰祈聖鑒事乾隆五十二年十二月十四日據汾州府屬之永寧州禀報該州地瀕黄河扵本月初八日河水澄清當即親詣河工查看屬實等情續據太原府屬之興縣汾州府屬之臨縣石樓寧鄉隰州屬之永和大寧等縣陸續具報同日河水澄清臣隨飭屬確查查得興縣至永濟共十三州縣計一千三百餘里自乾隆五十二年十二月初七八等日漸次清澈至二十八九日時屆二旬澈底澄清臣伏查晉省志書康熙二十二年十一月河清一次雍正四年十二月河清一次由雍正四年逮今六十載正當花甲冄周我國家重熙累洽屡召嘉祥至乾隆五十二年冬河清獻瑞逾千里期及兼旬尤為罕逄盛事臣世霑聖澤幸際昌期所有查㸔縁由謹繕摺奏聞併繪具圖説恭呈御覽奉硃批此不足誇並有旨諭乾隆五十三年正月初八日奉上諭據明興奏山西境内河清獻瑞一摺内稱接據永寧州等十三州縣禀報黄河自十二月初七八日漸次澄清至二十八九日時屆二旬河水澈底澄清可鑑共計一千三百餘里等語此不足為誇美已扵摺内批示矣國家景運光昌太和翔洽惟在年榖順成豐綏屡告五風十雨普被和甘乃為昇平瑞應至厯代史策侈陳符瑞大率出扵傅㑹鋪張無闗實政即如麟逰鳯翥固為僅見嘉祥然亦必湏来遊棷澤翔集殿廷得之目覩方足𫝊為盛事若不過騰章入告並無指據亦祗屬粉飾虚詞不足為信至河水澄清雖亦間有之事但似此侈陳祥瑞誇示休徴殊屬無謂况上年黄河扵睢州十三堡地方隄工漫溢淹浸田廬甫經堵築完竣若以河清為獻瑞之騐又何若安流順軌竟無漫溢之更為嘉瑞耶且河水澄清如以為地方大吏徳政所致則明興厯任地方毫無整頓試令伊自思前在山東何無嘉應今署晉撫又行何徳政而能致此祥瑞耶封疆大臣惟應實心任事承流宣化使吏民治生共臻上理方為稱職倘因此等事屬僅見臚陳祥應即宣布史館予以襃嘉而遇有災祲即加之督責勢必至身任封圻者藉端粉飾爭相效習以博虚名而扵地方水旱偏災或恐干讁譴竟至諱匿不報扵政體民生大有闗係現在晉省既有河清之事則下㳺各省自必由漸澄清該地方官不奏則已倘亦有似此具奏者冄将此意明降諭旨以示朕敬天勤政以實不以文至意将此先諭明興知之不必稱揚其事也御製山西巡撫明興奏報得雪並河清詩以示志戊申明興今日忽騰章批覽餘因示志詳誠慰春初雪積白上年山西省入東以来各屬雨澤頻霑據明興今奏十二月二十八日省城得雪三寸餘並通省陸續報稱得雪自二三寸至六七寸不等祥普被實為豐稔瑞徴深為欣慰並稱河裏水無黄又據奏各屬稟報自興縣至永濟共十三州縣計一千三百餘里于十二月初七八日等日至二十八九日黄河澄清等語了知宣付徒虚謂即騐猷為亦豈當予自即位以來每以年嵗豐熟為上瑞其餘一切嘉祥槩所弗取且即年嵗豐歉亦従不以此為督撫賢否之辨恐各該督撫藉此迎合遇有災歉轉致諱飾不報明興自任巡撫以来識見拘迂辦事諸多竭蹷此時河清之瑞必非該撫徳政所致可知夏決成災上年夏間睢州十三堡黄河異漲隄決亳州寧陵商邱一帶民田被淹雖命重臣㑹籌堵築並将被災貧民加意賑恤然予方引以為咎與其冬間澄清何如夏月安瀾耶冬澄瑞愧之不暇漫言祥乾隆五十三年冬禮臣以太常寺仙蝶呈覽御製誌實詩分賜五十四年督撫諸臣奏謝得㫖訓誡御製太常仙蝶詩戊申昔曾問之尚書三泰以為誠有昨召見侍郎徳明亦偶言及翌日徳明以錦匣呈覽並云冬月入蟄每不見兹忽至其家似欲入禁中者然詩以誌實蝡動蟄之時来賔果是竒異夫羣物體覩此一仙姿薌久太常號人皆謂之太常仙蝶合署人無不知而敬者神超犬造司欣兹百年遇用誌五言詩乾隆五十四年八月十六日奉上諭前将御題雞雛待飼圖韓幹試馬圖及太常仙蝶詩等墨刻分賞内外大臣近據各督撫陸續奏謝閲其奏摺俱用駢體未免意涉鋪張不知試馬圖之題朕原因唐太宗以英武定天下不數𫝊而至天寳躭扵逸樂罔念祖宗創業艱難文恬武嬉釀成漁陽之變倉猝播遷國勢遂以不振朕撫圖增憎形諸篇什以為考鏡得失之林非如雞雛待飼圖之覽切民依凡有撫綏之責者各應顧名思義至扵仙蝶詩亦因太常署實有其物朕曾目睹于㡬餘吟咏藉紀事實適該衙門大臣鐫搨呈進卷幅太多遂以分賞于民生吏治均無闗係各督撫祗領後扵奏事之便附陳謝悃數語可畢何必紛紛駢體鋪張過尚詞華使𫝊之日久将無識之徒誤疑朕為躭嗜縑素並好神仙幻妄之説此則所関甚大盖玩物䘮志帝王所戒是以宣和鑒賞無捄扵國是廢弛而天書符瑞等事尤為誕妄不經朕素所鄙笑豈肯以玩好禨祥唘𨗳臣工流傳後世耶兹因批覽各督撫奏謝之摺特為明白宣諭嗣後凡屬内外大臣務宜益矢殻誠勉襄政治以副朕黜華崇實至意将此㫖入于各督撫交代永識朕志臣等欽惟我皇上誠著乆徴中孚逺格惟兹躋羣倫扵仁夀俾各適含生遂性之天初不必以氣化効靈藉稱嘉瑞是以太和煦嫗咸若凝庥欣邀㡬暇宣吟事實扵一時而至扵愛民育物之肫懐則未繫乎此前者疆臣摺奏夀民夀婦且誡諭勿侈言祥矧在蝡翹之族偶應氣機顧可稍事鋪張弗仰體聖人崇實黜浮之本意也耶乾隆五十五年江蘇撫臣奏途過直𨽻山東瑞麥嘉禾重生復實得㫖訓誡乾隆五十五年五月初三日奉上諭據福崧奏經過直𨽻山東一帶均已甘霖普被二麥俱己結實飽綻大田苖禾長發青葱晚禾現亦出土又另片奏稱山東齊河長清等處巳萎麥苗復又吐穂結實飽綻一律等語所奏殊不可信本年直𨽻山東一帶得雨較遅麥苗未能及時長發朕蹕路所經之處自東昌臨清迤西一帶至直省地方沿途望澤惟􅎋總未得有透雨旋蹕後曾親自祈禱􅀈經得雨尚欠優沾今福崧據稱甘霖普被未免過扵飾言至麥苗已萎復生之事前據長麟奏聞朕即以春膏未能霑足方深慚悚曾扵摺内批示并不以此為竒福崧路過該省又復將此具奏矜為異事殊不知麥苖被澤已遅收成不無歉薄即間有黄萎麥苗另生新枝結實扵農田大槩收成未見禆益朕臨御五十餘年勤求民瘼每遇各省地方偏隅被旱宵旰憂勤無時或釋即麥禾有三穂雙岐之事従不侈言祥瑞督撫等惟當仰體朕懐盡心民事感召天和俾閭閻共慶盈寧方為無忝厥職今福崧意存粉飾附摺凟陳封疆大吏豈可如此存心福崧係經過山東並非本屬即以此等事件率行由驛馳奏将来前抵江蘓新任自更縁飾虚文致有諱災匿報之事殊負朕棄瑕錄用之意福崧着傳旨嚴行申飭若不知改悔存心髙興㫁不能曲加寛貸也将此通諭知之各省督撫務當引以為戒臣等欽惟我皇上徳美治隆成功不宰御極五十餘年以来惟務勤求民莫凡夫大政宣綸天章煥藻篇溢萬千従未有一語侈及禨祥一事見諸宣付矧今耋夀禔和備膺多福嵗豐民樂嘉瑞洊臻而仰窺睿念持盈保泰之維䖍曾何事以一水之澄清三岐雙岐之潁發等於景星卿雲鳯凰麒麟之云藉徴實事扵末節耶夫書美放勲著之曰允恭克讓由今凖古先後同符而聖人尤有大扵此者以徳致夀而繁禧彌篤以夀兼徳而廣運無疆無非本此欿然不自足履焉而弗勝之懐以荅穹庥而昌泰運夫以是億齡絣盛揚茂實恢鴻名将有翠媯之籙下稷之書所未紀者焉豈非集祥效祜之至者哉八旬萬夀盛典卷十七
