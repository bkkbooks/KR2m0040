body:
  text: 欽定四庫全書八旬萬夀盛典卷四十五盛事二十一一産四男三男臣等謹案攣生之事自諸史志及文獻通考咸有專門列於瑞應誠以盛世休養之隆太和涵育之茂與三登豐兆同編者大有之與廣生皆昊蒼眷錫之庥也然孜宋遼諸史所載惟一産三男者或數十年而一見或一方而偶聞與夫人瑞之坊均稱僅事未有如我皇上至仁茂育羣族繁滋適逢大慶之年帝祉多夀既煦化於生民天室多男更衍祥於氓庶至有以一産四男告者洪惟國家户口日増祇令州縣冊具實數悉免丁糧如一産三男之瑞經禮部以時彚奏賞賚嵗不絶書計自庚子至庚戌每牒報或六人或七八人凡五十餘户得百六十餘口殷繁之象非特史書所未覩而宜民廣被實較堯之祝華文之歌麟尤備美焉爰登一産四男於簡首以彰聖朝禔福之駢敷其三男者並按十年以來編載用孚洽熙之盛扵靡已爾乾隆五十五年恩賞直𨽻完縣民陳化新妻劉氏一産四男直𨽻總督臣梁肯堂謹奏為㨿報一産四男恭摺奏聞事本年五月二十六日㨿完縣知縣戴書培禀報縣民陳化新之妻劉氏一産四男現俱存活請照例給賞等情臣即批行藩司轉給賞錢米布疋並諭令加意撫養竊惟大化涵濡民物致滋生之盛太和翔洽閭閻昭蕃庶之休故禾以九穗呈祥而人以攣生衍慶三男並育已屬希聞四子偕生尤為僅見占嵗無年月日時之異一乳得伯仲叔季之全頌邰室之𤓰綿上應聖朝嘉瑞贈黎陽之榖帛奚誇舊史傳聞除㨿詳咨部外謹具摺奏聞奉硃批覽乾隆四十五年恩賞直𨽻景州民梁功妻申氏等六人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督袁守侗咨報河間府景州民梁功之妻申氏四川總督文綬咨報保寕府昭化縣民王宰仕之妻張氏原任浙江廵撫王亶望咨報杭州府錢塘縣民張軼眉之妻裴氏湖北廵撫鄭大進咨報襄陽府光化縣民魏子桃之妻楊氏調任河南廵撫榮柱咨報開封府鄢陵縣民張起雲之妻邢氏山西廵撫喀寧阿咨報潞安府屯留縣民孫兆寳之妻牛氏俱一産三男其應賞各本家米五石布十疋各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆四十六年恩賞直𨽻寧津縣民萬富民妻馬氏等四人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿原任直𨽻總督袁守侗咨報河間府寧津縣民萬富名之妻馬氏河南廵撫富勒渾咨報開封府鄢陵縣民馬永恕之妻張氏陞任湖南廵撫劉墉咨報衡州府常寧縣民張生菽之妻吴氏原任四川總督文綬咨報綿州梓潼縣民羅全秀之妻楊氏俱一産三男其應賞各本家米五石布十疋各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆四十七年恩賞直𨽻通州民劉佩妻馬氏等三人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿原任直𨽻總督鄭大進咨報通州民劉佩之妻馬氏江蘓廵撫閔鶚元咨報髙郵州民于志學之妻管氏河南廵撫李世傑咨報裕州民羅鳯舞之妻皮氏俱一産三男其應賞各本家米五石布十疋各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆四十八年恩賞直𨽻元氏縣民劉竒妻髙氏等四人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿原任直𨽻總督袁守侗咨報正定府元氏縣民劉竒之妻髙氏山東廵撫明興咨報平度州民劉晏之妻王氏萊州府掖縣民髙起林之妻孫氏兖州府嶧縣民孫毓恩之妻鄭氏俱一産三男其應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆四十九年恩賞直𨽻鉅鹿縣民王三平妻尹氏等五人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督劉峩咨報順徳府鉅鹿縣民王三平之妻尹氏江蘓廵撫閔鶚元咨報淮安府山陽縣民陳起之妻班氏浙江廵撫福崧咨報紹興府㑹稽縣民吴如璋之妻宋氏調任湖南廵撫伊星阿咨報長沙府醴陵縣民李宗桞之妻譚氏河南廵撫何裕城咨報南陽府裕州民薛文照之妻李氏俱一産三男其應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆五十年恩賞直𨽻寧津縣民劉丕服妻張氏等八人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督劉峩咨報河間府寧津縣民劉丕服之妻張氏兼管奉夫府尹鄂寳咨報承徳縣民于朝亮之妻張氏山東廵撫明興咨報登州府萊陽縣民劉成盛之妻吕氏河南廵撫畢沅咨報汝州民李大士之妻季氏䕶理江西廵撫李承鄴咨報南昌府新建縣民黎獻文之妻熊氏陞任福建廵撫雅徳咨報福州府連江縣民滕奎珍之妻吴氏署湖南廵撫特成額咨報辰州府乾州㕔民吴老貴之妻石氏調任貴州廵撫永保咨報鎮逺縣清江㕔塘兵許必顯之妻王氏俱一産三男其應賞給各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆五十一年恩賞四川新寧縣民傅學義妻羅氏等三人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿調任四川總督李世傑咨報達州新寕縣民傅學義之妻羅氏河南廵撫畢沅咨報陜州民鄭順之妻陳氏安徽廵撫書麟咨報寧國府南陵縣民任及賴之妻羅氏俱一産三男其應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆五十二年恩賞直𨽻曲周縣民麻佳彦妻齊氏等七人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督劉峩咨報廣平府曲周縣民麻佳彦之妻齊氏協辦大學士仍管陜甘總督事務福康安咨報鞏昌府洮州民王芝臣之妻侯氏安徽廵撫書麟咨報寧國府涇縣民呉謀之妻徐氏河南廵撫畢沅咨報衛輝府獲嘉縣民聶士聰之妻史氏懐慶府修武縣民朱永富之妻馮氏湖北廵撫姜晟咨報安陸府京山縣民李羣來之妻毛氏湖南廵撫浦霖咨報長沙府益陽縣民吴東漢之妻周氏俱一彦三男其應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆五十三年恩賞直𨽻天津縣民黄世達妻孫氏等三人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督劉峩咨報天津府天津縣民黄世達之妻孫氏陞任河南廵撫畢沅咨報衛輝府延津縣民申令友之妻袁氏江蘓廵撫閔鶚元咨報徐州府睢寧縣民歐成起之妻王氏俱一産三男其應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了乾隆五十四年恩賞直𨽻寕津縣民李成用妻于氏等十一人一産三男禮部謹題為一産三男事查㑹典内開一産三男准給米五石布十疋今㨿直𨽻總督劉峩咨報河間府寧津縣民李成用之妻于氏順天府順義縣民張理之妻柯氏前任四川總督李世傑咨報保寧府昭化縣民張應輝之妻劉氏廣安州民廖伯萬之妻朱氏叙州府宜賔縣民萬方麟之妻陳氏河南廵撫梁肯堂咨報南陽府南陽縣民楊有信之妻王氏山東廵撫覺羅長麟咨報濟南府陵縣民孫耀才之妻曹氏萊州府掖縣民王登之妻孫氏江西廵撫何裕城咨報南昌府武寧縣民雷元溥之妻張氏原任貴州廵撫李慶棻咨報思州府民李運貴之妻髙氏管理奉天府尹事務宜興等咨報海城縣民陳佐龍之妻杜氏俱一産三男應賞各本家米五石布十疋除各該督撫咨明户部查照賞給外理合照例彚題奉㫖知道了臣等謹案庥嘉之應惟以實事可徴者方不騖於禨祥之説方今仁化翔洽齠穉咸霑皇上保赤誠求惠懐周浹是以民間同産三四男之盛疊輳駢臻人瑞之繁允為僅見而湛恩所及令典攸施錢布之頒小民生而戴徳正不特徒循例事盖實足以備盛世之祥徴者矣八旬萬夀盛典卷四十五
