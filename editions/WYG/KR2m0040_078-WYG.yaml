front:
  text: 欽定四庫全書八旬萬夀盛典卷七十九
  hash: sha256:0310838fe8c01facdee7d2a1e3c66191e04f8067417cd2d7340806081feaf8f6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_078-1a, image: WYG0661/WYG0661-0061c.png}
body:
  text: 圖繪三圖説一臣等謹案圗以京師宫闕為主就臣民北面仰矚摹繪而成故始自西華門以達於圓明園記以聖駕進宫為主隨鹵簿之次第先後而作故始自圓明園以達於西華門云自圓明園至西直門圖説圓明園宫門外東西為音樂亭各一扁曰宣豫曰導和宫門直南為重簷樓五楹曲檻迴廊平臺傑閣清流洄澴嘉木蓊蔚重門洞啓氣象萬千迤西為迎夀山上建夀星亭其後為閣扁曰錫羨延洪聫曰暘雨協豐占徴念九疇之八京垓増泰筴呼聞萬歳者三按以下各聫扁登載圗内者俱不贅叙其有圖内未能登載者謹於圖説内叙述御道北面為王貝勒貝子公等慶祝處自此折而南左為西洋樓一平臺二宗室覺羅官員於此慶祝右為奉天吉林黑龍江官員慶祝處稍折而東袤斜數百步兩水夾鏡雲影波光一望渺瀰西設龍舟九首尾舳艫旍旗五色篙師櫂郎鼓枻容與東為金山景上建江山寺扁曰江天一覽又有觀音閣御書樓龍王廟韓公祠裴公洞諸勝又為亭三曰朝陽洞玩古亭望江樓為塔一俱仿江南位置飛甍畫棟結構岧嶤如中泠挂帆仰瞻樓觀時也其東為内閣順天府翰林院詹事府各官員分列慶祝沿堤緑陰中綴以亭臺廊宇葯欄花架直抵紅橋紅橋之北面為山一形如曲尺翼以朱欄西旁巖洞為門取逕而登上有亭二扁曰瀛壺曰西嶠亭上演萬國來朝劇山之麓為安南國王阮光平及其陪臣並朝鮮南掌緬甸各國使臣金川臺灣山番以至蒙古回部各汗王台吉等均鞠􅎽道旁瞻就天日又順天府屬耆民及各省在京耆老亦於此慶祝橋南北各有綵坊左右各有跨水亭過此又折而南矣東西各設樂亭右為城闗者一扁曰函闗瑞靄稍前為山子一左演劇重簷臺旁置小軒編籬落仿西洋式為牆垣南過綵坊迤西依石牆為亭直𨽻省官員及順天學政率衿士慶祝亭臺迤邐岩洞嶔﨑鳩笻竹馬夾道駢羅自此直至清梵寺殆應接不暇云清梵寺北面為亭一扁曰延禧集慶聫曰花雨能仁祝嵩齡億載曇枝普茂鞏海甸三乘南為山子一上建方亭蓮花亭為山洞一道東為綵坊一吏部户部官員於此慶祝兩岸茨椽鱗次櫛比間以清歌雜伎稍折而東為重簷演劇臺南為浙江福建省官員北為禮部兵部刑部官員慶祝處亭臺之外一川如練密樹千章迤東為百子圖山中有洞門羣兒俱雙丫倭鬌手持八寶及旗繖鐃鼓等物或騎竹馬或控雲虯周旋嬉戲出入盤辟後則峯嵐排列繚以白石欄植以青松枝逺望直如壺嶠過此即永新莊矣莊之東方亭一座工部官員於此慶祝亭後就土為山饒有位置其上緑陰似幄雜英竒蕊獻麗敷榮依山有演劇臺又有重檐六方亭南面枳籬低亞綴以花陰絡以藤蔓過湖北省官員慶祝處則粉牆一曲繪石壁天池之勝四壁煙雲淋漓真宰其北紺殿飛甍屹然遥對者則雙闗帝廟也廟前直南大路左右方亭二旛竿二綵牌坊一座迤東文石修筠繚繞坡陀西洋式房五楹重廊疊檻素壁堊丹隐起花竹魚鳥之狀庭階翼以朱欄分置盆盎青蕖白蓮羅列左右中為臺演八仙上夀西為湖南河南兩省官員慶祝處又西洋式牌坊一座東為都察院六科理藩院倉場侍郎侍衛處鑾儀衛通政使司大理寺步軍統領衙門内務府三旗三院圓明園三山各衙門官員西為山西山東陜西甘肅四川廣東廣西雲南貴州各省官員慶祝處椶亭一座旁臨小池漁舟三兩演漾其中牽罾扳網絶似漁樂圖中景物跨水為樓五楹可以逺眺水田禾稼一望如雲又東為三星牌坊花架葯欄夾道對出樓臺亭閣掩映曲折過三劵牌坊則茶寮卷幔草舍編籬西南為慶夀山多植長松一亭如笠覆以喬陰南為碉樓凡八碉房三楹俱依土山為基過演劇臺為演武㕔墩臺亭堠屹然相向東為十錦墻長數十武刻畫㸃綴各盡其致又為山子一座上多作流雲瀰漫林樾山頂立南極老人八仙環侍仰而望之如天半仙人驂鸞跨鳳而來山下過綵牌坊紅牆屈曲為萬夀閣其東演劇臺俱以翠羽疊為瓴甓上有獨立孔雀作和鳴狀又為垂雲牌坊旁列花架乃太常寺官員慶祝處直北石欄一帯欄外方池如罫玉蝀連蜷橋上為聖夀盛會前列獅象導以旌麾舁一綵亭中設部樂鑪煙香裊韻繞仙韶東為控鶴仙人西為蟠桃進獻拔地聳起望若雲表曼衍百戲臚置前後觀者如堵人海騰歡過此又折而東矣經西洋式牌坊北為百祥菴寺門旁舍分植竹籬中為綵牌坊南有花臺蒔以竒葩瑶草其後壘石為牆植援成幙迤東為小山小橋流水上有數童子作獻花狀過方勝亭又為西洋劵洞牌樓左為梅花亭右為竹亭三省織造各闗監督於此慶祝前為桃亭丹實翠陰紛敷如繪廊宇重簷流雲四繞重樓二座形若龍脊又東過河樓三楹為太僕寺官員慶祝處三元亭一座列如鼎足屋瓦皆作魚鱗形六方亭一内設太平有象對峙西洋房上建平臺自此為光禄寺鴻臚寺國子監内務府八旗圓明園三旗官員沿途慶祝過綵牌坊始至夀福禪林夀福禪林之前路直東南為綵牌坊一西洋房一帶健鋭營官員於此慶祝右為十字亭欽天監太醫院及鑲白旗滿洲蒙古漢軍官員慶祝處直東為山子一適當駱駝灣折而南又牌坊一座過火器營正黄旗慶祝處為演劇臺右則百老迎夀山層樓疊閣與林巒髙下丹顔白髪迴翔容與其東則正紅旗鑲白旗正藍旗鑲紅旗各官員慶祝處北面土山迤邐南則倣回子城式甃築碉樓又為堡房一所左為耕織房秧稻計畝絡絲當牕農夫驅犂而耘織婦秉杼而績海宇盈寧光景粲然具陳自此平臺小軒皆設部伎綵坊二座並峙中逵則慈獻夀安兩寺翼如在望矣寺西土山數仭松栢森鬱其南鑲藍旗官員慶祝處則廊宇鱗比髙下錯落北為百夀同慶山紅稠緑艷間以亭臺倚牆為方亭一上歌八方樂業之曲絲竹並奏又東南坊對峙為廣通寺又東為天仙廟祗林梵釋恭設無量聖夀壇場潮音讃佛歡動人天自此復折而南左為桃亭内演三星獻瑞劇過綵坊一座為倚虹堂聖駕進宫於此傳膳時則輦下臣民襟袂相屬黄童白叟夾道如雲仰瞻天表普慶夀祺咸稱萬古未有之盛莫不忭舞踴躍争效嵩呼也倚虹堂南倚髙梁橋兩岸淺水粼粼東為水亭廊廡銜接如浮梁跨水水上小艇打槳往來西望長河一帶亭閣參差煙波𣺌瀰迤南則郊㕓列肆萬瓦如櫛右為蓮花臺演四方來賀劇扁曰聲教綏來聨曰集山海梯航東鰈西鶼萬國圖歸王會感風雲律吕南兜北昧九重樂奏鈞天直南一山聳起樓閣俱因山布置池沼欄楯宛然如畫又折而東直抵西直門過綵牌坊即䕶城河橋城樓之下面東為三重臺演普天同慶劇第一層扁曰南山賡雅第二層扁曰蹈德詠仁聨曰春臺煦育歌綏萬化日舒長紀大千第三層扁曰㲈舞九成聨曰八月際昌期玉琯金鐘譜成一十三徽律吕億年開景福丹緘翠籙歌徴萬八千歳春秋臺左右各有遊廊以次迭降望如削成轉而逕南過綵牌坊北面倚堞築屋窻闥洞開燈綵鮮耀果樹華滋月城内恭設萬夀經棚喇嘛千衆於此諷經慶祝此自圓明園至西直門圖繪之大槩也八旬萬夀盛典卷七十九
