body:
  text: 欽定四庫全書八旬萬壽盛典卷五十四典禮五祭告臣等謹按五禮之序首吉禮百順受福祭統稱之是以國有大慶聿修昭告之典以歆格天祖和悦神人盖本馨徳上通迓蕃釐而申崇報皆凖古義而行之者也我皇上行健致恭五十餘年中躬承郊廟大祀精誠罔間近屆脩齡八袠猶親中祀一週欣逢聖夀正辰徧修瑞祝見於頒詔之條本年載詔欵恭恩賚門于時分命臣工恪恭将事誕節前一日更從禮官之請敬遣親王具展䖍禋懿乎哉聖人感備至諴用克延俶祺於悠乆詩所歌君曰卜爾萬夀無疆又曰以享以祀以介景福者維吉蠲而荅祜益鴻祚之凝庥奚啻交於神明光於四海闡一時之茂典云爾哉乾隆五十五年皇上八旬萬壽詔遣官致祭嶽鎮海凟風雲雷雨火各神及前代帝王陵寢先師孔子闕里禮部謹奏為欽奉恩詔事乾隆五十五年正月初一日恭奉恩詔内開五嶽四瀆等祀及風雲雷雨火各神應遣官致祭著察例舉行又開前代帝王陵寝先師孔子闕里應遣官致祭著察例舉行欽此欽遵臣等伏查向例恭逢慶典遣官致祭嶽瀆等神及前代帝王陵寝先師孔子将内閣等衙門滿漢學士侍郎以下四品以上堂官開列職名并致祭處所具奏恭候欽㸃差往祭文交翰林院撰擬祭帛交太常寺預備紫降等香由户部取用帛匣罩袱等項由工部取用賫送香帛由臣部及太常寺筆帖式内照例出派欽天監選擇吉期起程往祭官員先期齋戒一日臣部将祭文香帛交與致祭官員敬奉前往其致祭品物行文各地方官照例備辦等因在案今致祭五嶽四瀆等神及前代帝王陵寢先師孔子共六十處分為六路遣官六員前往致祭謹将各部院衙門開送職名暨應祭處所分繕清单恭呈御覽伏候欽㸃其祭香祭帛帛匣罩袱等項照例交與該衙門備辦遣祭官及賫香帛筆帖式由兵部照例給發勘合屆期臣部堂官敬謹看視祭文香帛交承祭官賫往至致祭日期各省程途逺近不一應俟遣官到日㑹地方官擇吉致祭再欽奉恩詔内告祭風雲雷雨火各神臣等仍照乾隆五十年之例於京師勅建風雲雷雨火各本廟致祭應用祝版祭品香帛等項交太常寺照例備辦祭文由翰林院撰擬致祭吉期交欽天監選擇至遣官致祭屆期臣部另行奏派合併聲明為此謹奏請㫖乾隆五十五年正月初八日奉欽派内閣學士鄭際唐往祭山海闗吉林廣寜等處北海之神長白山之神松花江之神北鎮醫巫閭山之神遼太祖陵共五處内閣學士依蘭泰往祭陕西四川等處西嶽華山之神西鎮吳山之神江瀆之神黄帝軒轅氏陵周文王陵周武王陵周成王陵周康王陵漢髙祖陵漢文帝陵漢宣帝陵後魏文帝陵唐髙祖陵唐太宗陵唐憲宗陵唐宣宗陵共十六處内閣學士圖敏往祭山東江南浙江等處東嶽泰山之神東鎮沂山之神東海之神南鎮㑹稽山之神少昊金天氏陵帝堯陶唐氏陵夏禹王陵明太祖陵先師孔子闕里共九處内閣學士傅森往祭河南湖廣等處中嶽嵩山之神南嶽衡山之神濟瀆之神淮瀆之神太昊伏羲氏陵顓頊髙陽氏陵帝嚳髙辛氏陵炎帝神農氏陵帝舜有虞氏陵商髙宗陵商中宗陵漢光武帝陵周世宗陵宋太祖陵宋太宗陵宋真宗陵宋仁宗陵共十七處宗人府府丞孟邵往祭廣東南海之神一處内閣學士李潢往祭直𨽻山西等處北嶽恒山之神中鎮霍山之神西海之神河瀆之神女媧氏陵商湯王陵金太祖陵金世宗陵元太祖陵元世祖陵明宣宗陵明孝宗陵共十二處禮部謹奏為奏請欽派事乾隆五十五年正月初一日欽奉恩詔告祭風雲雷雨火各神經臣部奏准查照五十年之例於京師勅建風雲雷雨火神各本廟致祭在案今據欽天監選擇得二月二十五日丙子宜用夘時致祭吉臣等謹将各部院開送職名繕寫清单恭呈御覽伏候欽㸃五員屆期前往致祭為此謹奏請㫖二月十二日奉㫖是欽派吏部尚書彭元瑞祭風神廟侍郎瑪興阿祭雲神廟户部侍郎諾穆親祭雷神廟禮部尚書常青祭雨神廟兵部侍郎吉慶祭火神廟二月十一等日欽差官員赴禮部祗領香帛祝文御仗分詣直省致祭長白山之神祝文皇帝遣内閣學士兼禮部侍郎鄭際唐致祭於長白山之神曰維神奠極東維鍾靈震位肇王基而天作不讓鳴岐興嶽之祥屹巨鎮於神區實符降雨出雲之瑞通三江之􅎃絡延澤彌長錫萬禩之蕃釐鞏基益固茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告望祀而豆籩特重永期衍福於無疆升香而岳鎮齊隆倍信發祥之有自神其歆格鑒此明禋松花江之神祝文遣官同前維神疏潤東溟鍾祥北渚秀􅎃接混同之派迆演靡涯嘉名稽速末之文靈長自古延袤千里雅號花源拱衛神臯真如帯水茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告慶安瀾之協瑞滋生荷利涉之功酌清滌以明䖍務本合祭川之義維祈歆格式鑒精禋北鎮醫巫閭山之神祝文維神祥開東服瑞應北辰環遼海以鍾英表營州而作鎮野分箕斗十三山秀嶺連輝岳峙滄溟億萬載福源綿祉茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告集繁禧于帝里司出雲降雨以延康迓純佑於陪都嫓山鞏川増而篤佑用祈鑒格祗荅靈長北海之神祝文維神量包鯷壑徳湛鯤溟座惟儷於汴光契實司於顓頊坎方正位遥敷潤物之功坤澤涵靈允協拱辰之極茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告澄淵莫外扈白山黒水以呈祥澔涆無涯衛赤縣黄圗而錫福用祈歆享庶溥嘉庥西嶽華山之神祝文皇帝遣内閣學士兼禮部侍郎依蘭泰致祭於西嶽華山之神曰維神位崇西極徳表中條瑞彩起於星壇祥光流於石室舒蓮花之十丈巨掌南擎通箭栝之一門諸峯羅列翠厓丹谷式著真源金鼎瑶池常瞻灝氣茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告控河流而布澤崇冠二州連霄漢以延釐深培萬物允符秩祀瞻祠宇之長新嘉賴洪庥仰聲靈之式播神其來格歆此苾芬西鎮吳山之神祝文遣官同前維神位崇豫鎮望肅金祇靈根逺接乎崑崙精氣上通于閶闔四方成矩功符兑澤之孚萬物生華徳闡坤珍之秘兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告冕旒挺秀占瑞拱乎北辰觴豆鑒誠仰輝聮于東井尚歆明祀式篤鴻庥江瀆之神祝文維神原委同河朝宗納漢溯遥流于蔵徼經途及萬里而遥導近派于岷山赴壑實百川之長兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告翼安瀾之永順靈長作紀南條仰利濟之宏施光耀恒垂東井尚祈鑒格式展明禋東嶽泰山之神祝文皇帝遣内閣學士兼禮部侍郎圗敏致祭於東嶽泰山之神曰維神功隆作鎮瑞啓登封通靈氣於天門燭榮光於日觀徧羣神而先望萬物資生卓五嶽以稱宗三公視秩地臨左海因名山而致升中澤嫓上穹不崇朝而徧天下兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告髙山是仰魯邦所瞻虞巡守至岱宗允矣親修望秩周職方曰兖鎮於焉載迓蕃釐潔籩豆于司存薦馨香于神在庶其昭鑒式是居歆東鎮沂山之神祝文遣官同前維神位當出震徳在宣陽攝青社而居尊鎮黄流而表静星野接奎婁之次克佐元功輿圗跨齊魯之交永綏疆索茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告烟開九㸃遥瞻就日之心澤被羣黎普慰出雲之望尚祈歆格益茂嘉庥東海之神祝文維神徳叶坎占位居夘地朝宗比象上通析木之津重潤徵庥首著扶桑之記紀効靈於川后瑞溢蓬瀛肇秩祀於波臣禮先溟渤兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告地稱表海委輸含出震之符祥集添籌錫羡永流坤之澤靈長宜荅馨潔是陳南鎮㑹稽山之神祝文維神鍾英越甸萃秀揚州秘玉簡于東南應珠躔于牛斗名區直望啓千巖萬壑之竒巨鎮呈祥昭十雨五風之瑞兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告錫繁禧于兆庶升香荅東浙之庥備景福于京垓衍慶詠南山之夀尚祈鑒格歆此精禋中嶽嵩山之神祝文皇帝遣内閣學士兼禮部侍郎傅森致祭於中嶽嵩山之神曰維神配天表峻鎮地鍾靈祥躔應曜于夀星協氣凝基于中土北巖東嶺神通𫝊移樹之年瓊笈琅函珍秘示弆經之蹟茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告企仙臺而致敬秩視三公禮玉象以延禧輝騰二室尚祈來格鑒此精禋南嶽衡山之神祝文遣官同前維神功彰荆鎮位直離宫嘉符徵寳露之祥福地紀青壇之勝名𫝊岣嶁䕶銀編金簡之文峯卓芙蓉秘風穴雷池之積茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告真形是仰式昭至治于衡平景貺攸承長叶昌祺于山夀神其來格妥此精禋濟瀆之神祝文維神徳美通和量符齊度清水資貫河之溢洑泉徴行地之能導沇東流經瀆自昭其潤下溢滎南注重源早卜夫靈長垂秩祀于方州助溉輸于列郡茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告恬波赴壑期恵澤之長貽邃宇升香荅鴻施之永賴明禋孔潔歆鑒是承淮瀆之神祝文維神桐柏鍾靈泗沂㑹澤滙黄流而佐運利濟維均釃清口以安瀾功昭其乂率彼江浦徵順佑于連圻恵我瀛壖資沃饒于近甸茲以朕八旬展􅂟萬國臚歡懋舉崇儀特申昭告作三洲之保障源流共衍澄清列四瀆以節宣肸蠻長貽福佑神其昭格鍳此苾芬南海之神祝文皇帝遣宗人府府丞孟邵致祭於南海之神曰維神澤沛離方靈昭丙位祝融濊徳控疆理以無邉廣利凝祥湛文明而有曜賴重溟之式靖瑞協當陽表百谷之維尊功深養物茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告千艘鱗集鴻臣抒職貢之忱列島螺分狼宿符夀昌之應式稱殷禮尚兾來歆北嶽恒山之神祝文皇帝遣内閣學士兼禮部侍郎李潢致祭於北嶽恒山之神曰維神功資朔土位應辰星水經標石窟之竒地志表蘭臺之勝亘冀方而作鎮衆山聿拱夫威靈臨代郡以垂庥五穀屢占夫蕃熟茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告福佑協純常之義禮秩攸崇嘉名符悠乆之徵馨香用薦惟祈鑒格式是居歆中鎮霍山之神祝文遣官同前維神河汾奠位晉綘儲靈衍祥用表乎堯封作鎮爰徵於周禮方輿峙秀名開嵩室之先太嶽稱雄秩比岱宗之貴茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告土爰稼穡仰成位于中央山出雨雲助資生于萬物鑒歆來格納祉無疆西海之神祝文維神兑位居貞金精孕澤螭虬戢浪餘波輸弱水之歸麟鳳成洲巨浸衍流沙之派臨井躔而挹注奥區迴洑崑崙象月御以澄淵瑞靄遥瞻濛汜茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告瑶池逺界定稱介夀之觴玉水長流宜荅効靈之績秩斯殷禮鑒此明禋河瀆之神祝文維神徳協懐柔功昭澄晏導遥源於九曲竹箭流平防急溜于三門桃花浪静濟運則清黄交㑹効靈恬赴海之波安瀾而保障攸資報享重翕河之典茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告溯崑墟之衍澤升香逺致夫蠲誠環瀛澨以䝉庥束帛長承夫嘉貺神其歆格鑒此明禋前代帝王陵寝祝文皇帝遣某官某人致祭於某帝之陵曰維帝膺圗撫運建極宜民澤洽當時聲教動寰瀛之慕勲垂奕世典章昭方册之貽思英爽以長存秩春秋而匪懈茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告荷蕃釐於昊縡益緬皇春帝夏之隆仰景行于前朝倍殷夕惕朝乾之志尚祈來格鑒此維馨先師孔子闕里祝文皇帝遣内閣學士兼禮部侍郎圖敏致祭於先師孔子曰維至聖先師道合時中聖維天縱範圍今古為帝王治法之師聲振始終示賢智訓行之凖謁林廟而攄積悃瞻依每慰親臨陳簡編而溯㣲言趨步恒殷嚮往茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告緬昔從心所欲實宏立道綏動之猷際此申命用庥益懐祖述憲章之盛神其來格鑒此精禋風神廟祝文維乾隆五十五年嵗次庚戌二月壬子朔越日丙子皇帝遣吏部尚書彭元瑞致祭於風神之廟曰維神功參長養徳布清寜導甘雨以資生佐神霄而運化祥昭通正授時宣四氣之和凱送冲融調律徵八方之應茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告巽徳秩明禋之報夙備彛章箕垣徴衆好之孚式欽靈佑神其肸嚮鑒此苾芬雲神廟祝文祭日同前皇帝遣吏部左侍郎瑪興阿致祭於雲神之廟曰維神慶昭糺縵瑞煥絪緼瞻捧日以為章覩垂天而育物逺人向化青知干吕之祥豐嵗䝉庥黄識占年之吉兹以朕八旬展慶萬國臚歡懋舉崇儀特申昭告嫓升恒而錫羡表嘉貺于泰符仰卿矞以延洪綿景祺于需宴祗陳秩祀式迓蕃釐雷神廟祝文皇帝遣户部侍郎諾穆親致祭於雷神之廟曰維神徳昭豫順象著震亨調剛應于乾符奮陽舒于坤軸發宣甲坼昭茂育以對時收歛白蔵兆盈寜而致福茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告布令調三時之協釐卣維馨流形徵百彚之昌函香式薦神其歆格鑒是苾芬雨神廟祝文皇帝遣禮部尚書常青致祭於雨神之廟曰維神徳協施生功參流潤挾雲雷而布澤庶彚咸藉以昭蘇占月畢以宣和品物胥資夫長養洪疇衍瑞惟應候之不愆于時解澤敷膏實利物之黙司其柄茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告祥符十日太平之嘉應頒邀望洽三農年榖之順成屢報祗陳嘉薦用荅神功火神廟祝文皇帝遣兵部左侍郎吉慶致祭於火神之廟曰維神象徵炎上徳秉文明令播維時應丙丁而列位光昭有曜助日星以呈輝仰靈貺之顯融普厚生以温燠茲以朕八旬展慶萬國臚歡懋舉崇儀特申昭告景運際光昌之㑹陽徳方亨元功資調燮之宜洪庥式荷神其歆格鑒是明禋八月十三日萬壽聖節前期恭遣親王等祇告天地太廟社稷奉先殿太常寺謹奏為恭逢萬夀昌辰請舉袛祀大典事准禮部文稱八月十三日皇上八旬萬夀慶節照例於前期一日遣官祗告天壇地壇太廟後殿社稷壇由翰林院撰擬祝文其開列遣官恭設祝品由太常寺照例備辦等因到寺臣等謹将宗人府送到親王郡王等職名繕寫清單恭候欽㸃四員行禮為此謹奏請㫖奉硃筆圏出淳頴永琅雅朗阿𢎞暢行禮天壇祝文維乾隆五十五年嵗次庚戌八月朔己酉越十有二日庚申嗣天子臣恭遣睿親王臣淳頴敢昭告于皇天上帝曰臣寅承景命祇紹丕基夙夜兢兢不遑暇逸於今五十五年仰賴蕃禧申錫夀屆八旬逺邇綏安精神强固惟有益厪乾惕以期永荷恩慈敬展誠禋尚祈昭格謹告地壇祝文祭日同前嗣天子臣恭遣怡親王臣永琅敢昭告于皇地祇曰臣寅承景命祗紹丕基夙夜兢兢不遑暇逸於今五十五年仰賴黙垂鴻祐夀屆八旬逺邇綏安精神强固惟有益厪乾惕以期永荷恩慈敬展誠禋尚祈昭格謹告太廟後殿祝文孝孫嗣皇帝臣恭遣克勤郡王臣雅朗阿敢昭告于肇祖原皇帝原皇后興祖直皇帝直皇后景祖翼皇帝翼皇后顯祖宣皇帝宣皇后神位前曰臣仰荷洪庥紹承丕緒勤求治理夙夜孜孜於今五十五年仰賴恩慈黙佑夀屆八旬逺邇綏安精神强固惟有益懐乾惕以期滋迓蕃禧敬展明禋伏祈聖鑒謹告社稷壇祝文嗣天子恭遣諴郡王臣𢎞暢敢昭告于太社太稷之神曰朕仰荷神庥勤求上理孜孜熈績夙夜不遑茲以壽屆八旬䖍申潔薦維冀庶徴協應六府孔修世長享夫昇平俗共躋於仁夀謹告内務府謹奏為奏請欽派事准禮部文稱八月十三日皇上八旬萬夀慶節應請於前期一日遣官祗告奉先殿所有祭品祝文照例交各衙門備辦等因為此奏請欽派一員屆期敬謹行禮謹奏奉㫖著綿偲行禮奉先殿祝文維乾隆五十五年嵗次庚戌八月朔己酉越十有二日庚申孝孫嗣皇帝臣恭遣皇孫臣綿偲敢昭告於太祖承天廣運聖徳神功肇紀立極仁孝睿武端毅欽安𢎞文定業髙皇帝孝慈昭憲敬順仁徽懿徳慶顯承天輔聖髙皇后太宗應天興國𢎞徳彰武寛温仁聖睿孝敬敏昭定隆道顯功文皇帝孝端正敬仁懿哲順慈禧荘敏輔天協聖文皇后孝荘仁宣誠憲恭懿至徳純徽翊天啟聖文皇后世祖體天隆運定統建極英睿欽文顯武大徳𢎞功至仁純孝章皇帝孝恵仁憲端懿慈淑恭安純徳順天翼聖章皇后孝康慈和莊懿恭恵温穆端靖崇天育聖章皇后聖祖合天𢎞運文武睿哲恭儉寛裕孝敬誠信中和功徳大成仁皇帝孝誠恭肅正恵安和淑懿儷天襄聖仁皇后孝昭静淑明恵正和安裕欽天順聖仁皇后孝懿温誠端仁憲穆和恪奉天佐聖仁皇后孝恭宣恵温肅定裕慈純賛天承聖仁皇后世宗敬天昌運建中表正文武英明寛仁信毅大孝至誠憲皇帝孝敬恭和懿順昭恵佐天翊聖憲皇后孝聖慈宣康恵敦和敬天光聖憲皇后神位前曰臣仰荷洪庥紹承丕緒勤求治理夙夜孜孜于今五十五年仰賴恩慈黙佑夀屆八旬逺邇綏和精神强固惟有益懐乾惕以期滋迓蕃禧敬展明禋伏祈聖鑒謹告臣等欽惟聖天子景命常新崇祺洊至今嵗春仲敬以夀登八旬躬親岱祀並修謁聖之儀是我皇上之勤毖精嚴允臻極至矣乃若天地祖宗之䔍眷肸蠁彌崇暨夫心法之丕紹列朝純嘏之感叨神祐贊幽明而慶孚應殷薦咸秩益以荅百靈翊助之庥盛矣乎上下格而神􅅘享咸應期而畢集者也斯時承祭諸臣仰體聖敬以告潔而致䖍匪惟燔蕭祼鬯歆合隂陽玉帛鼔鐘鏘洋嘉㑹而馨香之徳降福孔多從此雨風徴協應之祥日月符升恒之瑞於我皇慶隆備焉斯眉夀之洽於将享者也八旬萬壽盛典卷五十四
