front:
  text: 欽定四庫全書八旬萬夀盛典卷十三聖徳九文徳一
  hash: sha256:3851e13467cb2bceaa486e2854c260ee856efd0d142316e7df9405f7a01d6172
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_013-1a, image: WYG0660/WYG0660-0164a.png}
body:
  text: 臣等謹案道之顯者謂之文將以闡緝熙典學之原牖世觀成之盛是必有心法昭於萬年治法隆於亘古者乃以鬯皇風而光夀世焉帝王之學所由與儒生異尚也我皇上耄學維勤鴻文富有常以㡬餘精詣煥發睿思今逮八旬丹毫時御無非著𠡠幾勤政之本以懋立言載道之功若夫講席解經特以精力之强従容坐論義陳抑戒徳劭彌崇有四方承學之士所驚服不盡而景矚咸􅇻者又况慶牓登於六科全書頒於四庫勉通經而敦實學志好古以迪後儒即至竺國梵言亦皆全蔵繹成薈完編而昭大義臣等久沐聖人之教日近天子之光仰見洽夀増禧同文協􅁤實由於昊乾錫佑靡不宣臻而引嚮者也猗歟偉㢤詔允廷臣所請編次御製文第二集敬謹刋布復恭編御製詩第四集成其第五集以乾隆四十九年始先是乾隆五十一年五月二十五日臣梁國治等謹奏為恭編御製文二集告成敬請鐫刻以示訓行以彰美備事欽惟我皇上聖學淵富文徳日新以内聖外王之功致健行恒久之治文因見道化以觀成自癸未以前編刻御製文初集久巳經緯輿盖照耀羲娥兹自甲申至乙巳二十二年復得文四百一十一首臣等獲侍禁近每丹稿初成輒蒙宣示相與誦習講貫適然若驚怳然若迷復渙然若釋思欲竭管蠡闚測萬一竊以為自虞夏商周秦漢唐宋之文所謂渾噩醇厚博大奥衍者各有専長論文者亦各有専主其言大而夸者莫如李漢序韓愈之文曰周情孔思是言也愈何足以當之周公之文多言治自易之爻辭書之立政周官無逸詩之豳風大雅諸什周禮之六官皆其文也不惟其文所以立法度宅宥宻萬世言治者之所守也孔子之文多言道自易之十翼春秋之褒貶論語之遺言禮記孝經諸賢之𫝊述皆其文也不惟其文所以昭天地系民物萬世言道者之所宗也臣等排次二集仰窺御製於祈天永命念祖由舊每篇之中三致意焉若巡典若水利若政經若武功若逺化凡出之為明堂之治即敷之為皇極之言若是者為周公之文若經筵之論若剏發易書詩春秋之微言大義進退諸史之得失是正諸儒之舊聞慎守器失統之由闡褒忠討貳之義旁逮聲音文字名物象數以當名辨物正言斷辭即小見大若是者皆孔子之文然後知李漢徒有是語舉千古之文皆不足以當之至我大聖人而後周情孔思之得合而有真也然且漢之言曰情曰思者何也周公有其徳有其時而無其位孔子有其徳而無其位并無其時故其扵文以是為聖人之情爾思爾我皇上坐而言即舉而措或綏猷建極經數十年夙夜劼毖而後為文以紀之或溥博淵泉萬㡬未起而先為文以發之藴為情思顯為事功盖兼徳位時三者而一之故合文與治與道三者而一之也臣等恭依初集體例排類為四十四卷繕録進呈並請發下刋刻以𫝊布九有垂示萬世臣等曷勝欽服欣幸之至謹奏奉㫖如所請行臣等竊覩御製文初集成編聖夀方閲五旬兹二集之成則已逾古稀而念典時勤於課藝之有常見頤神之彌固盖天以生知之哲亶聰明於聖人皇上以敷訓之言昭保錫扵皇極是以鴻篇宣示數彚千贏煌煌乎竹素之大觀也御詩之富每十二年獲允編排與文集同布藝林四集並成夀棗梨而式模楷而五集編巳七年積六千首盖自有文字以来無斯鉅製由是日新富有琅函寳帙有與星漢増輝者爾皇上嵗御經筵乾隆五十五年聖夀八旬躬親講學如初是年特命皇子及皇次孫従至文華殿聽講御製春仲經筵庚戌慶節都過返禁垣講筵詄蕩此臨軒崇文要在敦實力發義仍教著御論傾覆栽培順天道自强不息法乾元是日四書題講栽者培之傾者覆之經題講天行健君子以自强不息非沽八十猶勤學抑以躬行示子孫命皇子等及皇次孫於是日亦従至文華殿聽講御論栽者培之傾者覆之解是二語者率以栽傾屬之人物培覆屬之天是猶視天與人物為二也予以為天與人物呼吸相通本為一體夫春生夏長非栽者培之乎秋收冬蔵非傾者覆之乎四時代運貞下起元天何所容心於其間㢤人與物胥在乾元一氣之中人得其全物得其偏則所謂因材而篤之者也天之栽培傾覆一嵗所必有人之栽培傾覆一生所不能無是則栽傾由自取培覆亦由自取人惟當順天之常克己之私或庶幾乎若必求其栽而避其傾是猶有吉凶禍福之見於其心者吾見其不能如四時之運行焉天行健君子以自强不息此教人以聖希天之法也夫士之去賢聖且逺矣而况天乎然而不可無希之之志若不希之是自畫也昔為三希堂記略見斯義且天之行健日日在人目前予以為較聖賢之去人為尤近耳君子以是為徳自强不息焉不庶㡬可希天乎盖所謂自亦有二義一曰自已二曰自然自已尚覺有私自然則無為也無為而不息此天之所以行健而人之所當以為法也設曰何以不息則註之曰克己復禮臣等伏惟我皇上臨御經筵不以耄齡而謝躬親盖舉典弗尚虚文而垂訓惟昭實踐彌用勵宥宻之勤精求政本筦握道樞以見君師統合積萬年如一日者耳敬繹本年御論闡乾元一氣之符宣聖學三希之藴要皆立言夀世發抒乎至誠不息之本體以契合乎躬行心得之粹精矧乎八旬親講亘古未聞並命皇子孫近仰提撕預聞至教彼衛武公耄而好學詩人薌之為美徳以視我皇上之志篤敏求相距何啻萬萬也乎若夫辟雍臨講事在乾隆四十八年謹分載盛事門皇上以八旬萬夀特開恩科先扵乾隆五十三年詔命分經試士自是年戊申正科始輪次一週五經並試先是乾隆四十三年中外臣民以庚子嵗恭屆聖夀七旬籲請舉行慶典未蒙俞允特頒恩㫖五開鄉㑹試科本年八旬萬夀詔於戊申秋預舉正科鄉試己酉春預舉正科㑹試其恩科事宜即於五十四年秋五十五年春次第舉行恭奉諭㫖及士子陳請題謝諸疏分載恩賚門乾隆五十二年十二月二十五日大學士九卿等遵㫖㑹議得鄉㑹試二場向用經文四篇論一篇但各省定例俱係分經中式或一經佳卷較多或一經佳卷獨少考官按例取中未免為經額所限致有偏枯且各經分載卷面其中或有暗蔵闗節之卷亦易於檢閲伏思士子束􅄠授書原應五經全讀現在鄉㑹兩試秪就各生所習本經取中應試各生秪須將本經揣摩誦習即可倖中而於本經之外或竟至束書不觀殊非崇尚經術之道自應於鄉㑹試二場酌改每經各出一題每人作經文五篇俾應試士子咸讀五經以敦實學即不安義命之徒夤縁闗節勢必不能盡人請托而通場卷面並不分經各房官亦斷不能繙閲全場將闗節之卷檢出呈薦在主考憑文錄取無庸查照經額拘泥遷就於防閑闗節甄錄佳卷均有禆益惟士子専習一經奉行已久明嵗即屆鄉場為期甚近若即改用五經考試在大省不乏兼通五經之人或可取中足額第恐邊隅小省全讀五經者較少猝難通習或致二場不諳題解背謬經㫖難於取中查宋臣朱熹有將各經分年試士之議應先請仿照其法自明嵗戊申鄉試為始用易經出題次年己酉㑹試用書經出題以後按照鄉會科分将詩經春秋禮記依次出題考試並令各省學政於某科應用某經之年考試生員即用某經出題鄉㑹五科之内以次考畢五經即邊隅小省經輪年考試之後亦俱能誦習五經曉悉義㫖再於鄉㑹試二場裁去論一篇五經各出一題此後即作為定例其生員嵗試俟五科後令該學政不拘何經酌出一題随時輪流間出至童生考試自明嵗為始仍復舊例用四書文二篇裁去經文以歸畫一等因具奏奉上諭大學士九卿議奏科場條例嚴申功令豫絶弊源各欵所議俱屬詳悉周妥已依議行矣但鄉㑹二場改用五經請自戊申鄉試為始用易經出題以後按照鄉㑹科分將五經依次輪試一週再於鄉㑹試二場五經並試一節雖極為允當士子束􅄠授書原應五經全讀向来止就本經按額取中應試各生秪知専治一經揣摩誦習而於他經並不旁通博涉非敦崇實學之道今改用五經既可令士子潛心經學又可以杜絶場内闗節弊端而衡文取中復不致限於經額致佳卷被遺自應於分年輪試畢後即以五經出題並試惟所請明歳戊申鄉試先用易經出題之䖏周易理藴深奥猝難通曉並恐邊省未必人人誦習明嵗鄉闈為期較近若遽以易經命題考試其向非専經者或致不諳經㫖難於取中因思士子以詩經為本經者多所有明嵗戊申鄉試著先以詩經出題次年㑹試著用書經俟下次鄉試再用易經以後按照鄉㑹科分輪用禮記春秋庶士子得以漸次兼通講求精熟不致臨時草率應試諸生務須經明行修争自濯磨以端實學而期仕進其膺衡文之任者亦應精白乃心秉公鑑抜以副朕作人雅化
