body:
  text: 典禮七樂章一臣等欽惟我國家仁夀昌期禮隆樂盛承雲六瑩九招晨露之奏久矣騰愷豫而暢鴻禔至夫比樂成聲發之於子孫臣庶之歡誠徴之於彝訓敷言之實事且極之於侏離禁昧之屬之矢音伊葛天八闋以來未臻兹美備也慶惟皇上八旬正誕匝㝢臚愉祥籟畢宣懽呼湛溢臣等恭聞霞莊晉祝瑞靄鈞天洎乎法仗導迎椿廷抃舞自中和應律丹陛揚庥而外逺至朝鮮畨囘蔵部諸樂具綴宫縣顧竊繹豳介萬夀雅奏九如皆所以取協元音申頌蕃祉則夫茂典矞皇之㑹相與揚詡蹈詠闡億紀之洪慶志萬類之同和廣哉熙熙乎夀之有樂此其宜也是豈特蟠際天地藉彰符貺於一時寔有如𫝊所云樂安徳而禮以行之者彌足徴殿邦國同福禄來逺人之嘉軌焉用釐次其詞志諸簡編以昭聲容之盛乾隆五十五年八月十三日皇上八旬萬壽聖節受賀禮成御乾清宫皇子皇孫皇曾孫皇元孫等㳟陳綵舞奏樂十八章敬獻萬萬壽之觴以次抃舞稱慶綵舞樂十八章皇帝萬萬夀福如大海源亭育徳恩普熙和暢八埏一章嵗維庚戌恭遇八旬神人祝嘏天庥益臻二章洞開九重辟公呼嵩祥光罨靄歌舞攸同三章敬天勤民嵗書大有萬夀無疆山岳悠久四章文光炳二曜武烈宣萬方義正仁以育遐邇胥來王五章宴千叟兮嘉龎眉賜笻杖兮拜鴻施臚歡介祉兮叩彤墀羣登夀㝢兮祝蕃釐六章篤天潢錫章服燦五采親九族本支百世感殊恩歡洽羣情益敦睦七章臨雍釋菜文教振興人材樂育為國之楨八章輯四庫書譽髦鼓舞恵兹萟林上下今古九章修大蔵兮譯金經廣善緣兮福羣生慈雲布濩兮光晶瑩和風甘雨兮彌八紘十章藩王部長咸來賔遐荒重譯職貢陳依光景化同尊親赤子之慕中外均十一章􅃡甸來歸恩施幬覆錫賚駢蕃奔走先後十二章生畨向化傾心太平恩浹肌髄感畏惟誠十三章聖人久照福綏綿綿吉祥屢臻億萬斯年十四章慶承天貺祥徵滋至載衍九疇祚延萬世十五章卿雲糺縵光華復旦於萬斯年久道成如松栢茂如升恒十六章子孫曽元戲綵舞夀而康兮備純嘏歳歳年年兮福履增天地合徳同博溥十七章中和樂舞邁韶韺普天率土懽同聲慶萬夀兮茀禄膺受天祜兮莫不承十八章臣等謹案斑衣綵舞為臣民家奉親之娯至扵歡效天宗仰承國慶以繩繩揖揖之盛問三安而繞膝獻萬夀以介眉允億禩初逢之鉅典我皇上篤禧龎厚增五福五代之祥兹八袠之正辰親見萃祉一堂綵衣獻舞爰乃御乾清而膺賀開家宴以聯歡一時樂奏和嗈褊褼絢彩欣荷聖容眷顧輝溢扵金鋪玉磩之間臣等恭繹御詩有八旬開袠春秋永五代同堂今古稀之句葢以子臣躬率孫曽臚陳郅瑞播諸樂什用洽捧觴稱夀之忱以視周室之龡豳酌兕躋公堂以介無疆者尤為義廣大而詞真摯焉矣八月十二日駕自御園還宫樂部合奏恭集御製詩句衢歌三百章分班前導臣彭元瑞謹奏為恭進萬夀衢歌樂章仰呈睿鑒事乾隆五十五年秋八月皇上八旬萬萬夀億兆臣民四裔君長籲行慶典駕自圓明園進宫大駕鹵簿全設臚歡祝嘏者闐郛溢闕鼚鼓軒舞臣竊按詩豳雅多歌天子萬年萬夀天保九如歌以答君蓋夀之有樂所以宣豫鬯和合扵經義我朝鹵簿有導迎樂行幸樂皆駕出入常用而未專頌聖夀從前西域金川兩次大功告成躬親郊勞有凱歌之製其樂章用一字一音古法自郊臺至行宫左右随行繁㑹合奏為大樂聲容之極盛載在律吕正義後編臣謹依倣節奏恭集御製詩句譔為萬夀衢歌樂章以揚一人之綏福寫萬類之歡誠比聲成文攦事紀實凡三百首冀上邀甄錄付諸樂部奏在仗間自大撓納甲伶倫吹律以來郅徳全福大文和樂扵今而始一遇而臣以不知不識得附康衢堯民擊壌矢音慶幸實為莫大謹㑹同臣鄒奕孝填綴宫譜駢注繕冊恭呈睿覧伏候指訓臣曷任歡喜舞蹈之至萬夀衢歌樂三百章恭集詩句御製黄鍾宫笛譜萬年歡前衆樂和工凡五六凡工凡工尺工凡上工凡凡工工尺上工尺上工凡乙上乙上四合凡上工尺上工凡上乙上工尺上乙乙一萬夀皇上八旬萬萬夀夀羽凡徴角上福徵工履羽凡自宫五駢羽凡臻徵工五宫四代徵工一宫四堂商乙康角上健徵工身角上慶羽凡益徴工繁角上滋徴工年角上益徵工茂羽凡天羽凡恩徵工沐宫四得商乙八徴工之角上旬商乙上工凡五工上乙四二中外臣民恭舉慶典古角上稀徴工慶羽凡典角上未宫五教羽凡行徵工慮羽凡拂徴工羣宫四黎商乙愛徵工戴角上情商乙履徴工慶羽凡延角上洪角上俞徵工衆宫五籲羽凡萬羽凡年角上祝徵工袠羽凡念商乙惟宫四誠羽凡凡工工上工四乙上三總叙治致聖徳由聖福之萬羽凡方角上歡徵工奉羽凡萬宫五年羽凡觴徵工上羽凡下徵工情角上親徵工福商乙禄宫四長商乙大宫五徳羽凡之徵工徵角上四徵工胥羽凡得徵工要徵工惟角上治羽凡理法商乙虞宫四唐羽凡工凡上乙四凡工凡四敬天自羽凡古角上迄角上今徵工元角上后羽凡夥角上欽徵工膺角上天徵工數羽凡惠宫五偏羽凡鍾徵工子角上於徵工父羽凡母角上敢角上言徴工報羽凡戒商乙滿宫四撝角上謙商乙滋徴工勵羽凡恭徴工上工凡五工上乙四五每嵗祀躬詣三大行禮六宫四旬商乙初角上願徵工矢宫四躬角上親商乙壇角上陟徴工三羽凡成徴工典宫四恪宫四循商乙祗角上祝宫四精羽凡誠徵工通羽凡帝宫五載羽凡一徴工元角上旋徴工轉羽凡運徴工鴻角上鈞商乙凡工工上工四乙上六常定禮雩靈角上壇角上登徴工陟羽凡肅角上誠羽凡将徴工龍角上見徴工應宫四修商乙雩宫四祭角上常商乙師徴工古角上仍角上惟徵工舊羽凡典角上式徴工福商乙民宫四育宫四物商乙受徴工禋角上長商乙工凡上乙四凡工凡七天御詠敬寳勤民之要羽凡在徴工勤角上民徴工與宫四敬角上天商乙三羽凡朝徴工寳角上訓徴工四宫五言羽凡𫝊徴工鐫徴工琳角上藉羽凡此角上資角上抑羽凡埴徴工摛角上什徴工因商乙而宫四示徴工萬角上年商乙上工凡五工上乙四八鐫信人之寳天主易宫四云商乙天角上所宫四助羽凡者角上順徵工首徴工肯角上吾宫四言商乙信角上有宫四徵商乙要羽凡義角上已徵工具角上開徴工惑羽凡論羽凡信商乙天宫四爰宫四以角上主商乙人宫四稱羽凡凡工工上工四乙上九法祖大宫五清羽凡奕角上葉徴工鞏角上金羽凡湯徴工北角上漠商乙南宫四球商乙總徵工享羽凡王宫四祖角上徳徴工宗羽凡功徵工誠角上浩宫五浩羽凡用羽凡欽角上家羽凡法徴工守宫四惟角上長商乙工凡上乙四凡工凡十製太廟尊藏新五朝冊寳五角上廟羽凡重角上陳徴工冊宫四寳商乙䖍角上雲角上螭徴工蟠商乙虺宫四得宫四齊角上肩商乙和角上闐角上撈角上玉徴工春羽凡秋徵工貢羽凡此宫四日商乙惟羽凡新宫四理徴工合羽凡然宫四上工凡五工上乙四十一上每晨恭讀始實錄週而復史角上宬徵工實角上錄徵工每角上欽羽凡觀徴工可角上識徴工為宫四君商乙總宫四是角上難商乙祖羽凡訓宫五聰羽凡聼徴工仰角上深徴工意羽凡永宫四懐商乙惟角上望羽凡萬徵工民角上安商乙凡工工上工四乙上十二閒國命編方畧祖角上業徵工維宫四艱商乙刻角上敢宫四忘商乙爰角上成角上方羽凡略徴工識角上青羽凡緗徵工敬羽凡觀徵工締宫五造羽凡披徴工實角上錄商乙開羽凡國徴工規角上模角上百宫四務角上詳商乙工凡上乙四凡工凡十三爾滸御製薩書事過徵工闗角上躬徵工戰羽凡薩角上爾角上滸徵工每徴工至羽凡欽角上瞻角上有宫四所商乙思角上大宫五智宫五大徴工仁角上兼徵工大羽凡勇角上其宫四詳商乙則角上見徴工書宫四事角上詞商乙上工凡五工上乙四十四太諭立臥碑述騎射宗訓守冠服守徵工成角上恒角上慮徴工失商乙前宫四法商乙射羽凡是徴工朝角上家徵工夙宫四所商乙長角上冠羽凡服角上依徴工然角上貽角上髙羽凡祖徴工碑徴工亭角上贔羽凡屭徵工泐商乙宸宫四章羽凡凡工工上工四乙上十五紀御題恩圓明園堂額纉徵工承角上責徴工重羽凡凜角上貽羽凡謀徴工恒商乙此宫四千角上春角上與宫四萬角上秋商乙頷羽凡領角上當羽凡年徴工承角上厚宫五澤羽凡祖宫四恩商乙孫徴工受羽凡憶徴工從角上頭商乙工凡上乙四凡工凡十六荘紀御題避暑山恩堂額追羽凡憶徴工髫角上齡徴工侍羽凡御徵工園角上紀角上恩徴工何角上處羽凡不宫四思角上恩商乙松徴工風角上萬宫五壑羽凡還角上依徴工舊羽凡昔宫四日商乙那徴工能羽凡忘宫四凊商乙温宫四上工凡五工上乙四十七勤政五角上旬徴工五角上載商乙乆宫四臨商乙莅角上祖角上訓羽凡由宫四來商乙勤宫四政角上先商乙旰羽凡以徴工食角上而角上宵徴工以角上衣羽凡百徴工千角上禩角上世徴工示商乙乘宫四乾羽凡凡工工上工四乙上十八門聽御政御羽凡門角上摺徴工本羽凡待宫五綸羽凡宣徴工治羽凡協角上柔宫四剛商乙志角上體宫四乾商乙撫羽凡此徴工羣角上臣角上賛羽凡予角上治徴工泰徴工交角上堂角上陛徴工列商乙鴛宫四聫羽凡工凡上乙四凡工凡十九毎日大臣召見内外官員常角上朝角上地羽凡本角上同角上廊徴工廟羽凡視徴工事羽凡𫝊角上餐徴工有宫四定角上時商乙閣徴工部羽凡諸徴工臣角上恒徴工宴宫五見羽凡餘角上閒角上仍宫四不商乙廢角上疇宫四咨商乙上工凡五工上乙四二十文武員弁引見勅角上幾徴工視宫五事羽凡有角上餘羽凡閒徴工那商乙可宫四遲徴工延羽凡引宫四見商乙班宫四必徴工有角上真羽凡才徴工濟羽凡實角上用徴工民角上瘼角上無徴工刻羽凡不宫四心角上闗商乙凡工工上工四乙上二十一批諭硃筆奏摺閲角上摺徴工硃羽凡批徴工手角上自羽凡評徴工拈角上毫角上敢宫四忘徴工體宫四乾角上情商乙古角上今徴工政宫五蹟羽凡如角上懸角上鑑羽凡獨宫四待角上封宫四章宫四剪羽凡玉商乙檠宫四工凡上乙四凡工凡二十二秉燭行在待章布羽凡帳羽凡氊角上廬角上繪羽凡目角上前徴工在徵工宫角上時徴工邁羽凡總宫四應角上然商乙京徴工畿角上尚宫五未羽凡謄角上章徴工至羽凡仍徵工是羽凡東徴工山角上月商乙上宫四圓羽凡上工凡五工上乙四二十三有臨御處皆勤政殿為羽凡瞻角上奎徴工畫羽凡麗宫五文羽凡軒徴工何角上莫徴工神宫四堯商乙遺徴工訓羽凡恩角上勤徴工政羽凡日角上臨徴工勤角上庶羽凡政徴工奉商乙天宫四眷徴工命角上性商乙存宫四存羽凡凡工工上工四乙上二十四篇揭御書無逸各宫殿克羽凡明宫四無角乙逸角上訓徴工堪角上聽商乙内羽凡聖徴工外羽凡王角上後徴工世羽凡型角上幅羽凡幅宫五書羽凡箋徴工仍角上健宫五逸羽凡全角上篇角上曽徴工是羽凡屢徴工書角上屏商乙工凡上乙四凡工凡八旬萬夀盛典卷五十六
