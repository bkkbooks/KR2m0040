木溟盃嶽豆遇乙嵗而重陳松棟雲軒偕三光而齊耀書隆儀于金匱迥超乎七十二代之功紀聖夀于瑶圖逺逾乎萬八千年之數所有臣等感激歡忭下忱謹率同官員兵丁耆民等合詞繕摺恭謝天恩伏乞睿鑒謹奏朝鮮國王臣李祘言乾隆五十年三月十八日臣承准禮部咨本年正月初六日舉行千叟宴朝鮮差来正副使二員俱經與宴所有賞賜縀疋等物抄单移咨朝鮮國王可也奉此竊伏念臣乆沐洪化偏荷聖眷迺茲進賀陪臣朝天之行庇覆愈摰禮待愈優特令遐陬之賤蹤獲参法宫之清讌隨中朝耆老之後觀太平文物之盛擎宸章而龍光照耀拚夀杖而恩波洋溢既蒙内府之殊錫更荷前席之晉接天髙地厚報答無階臣與舉國臣民不勝感戴頌祝之至謹奉表稱謝者臣祘誠惶誠恐稽首稽首伏以無思不服三元伸起居之儀式燕以敖兩价䝉優異之渥欣然相告聞者亦榮伏念臣幸藉皇靈嗣守先業聘享之禮靡懈萬折江漢之朝仁夀之化方彰一念岡陵之祝不料􅄒職之賤价忽蒙陪晏之洪恩千叟之盛晏獲陪親拚雲漢之什九闕之勝賞迨遍恍疑鈞天之逰異恩視前後逾加寵鍚難一二以計兹盖伏遇皇帝陛下漸被遐邇賁飾昇平治天下五十年混區宇而並育環海東數千里囿動植而咸熙遂令奉琛之蹤亦被錫爵之寵臣敢不恪謹候度歌詠聖庥跡逺箕藩縦阻長纓之與宴心懸魏闕敢緩短表之頌㤙臣瞻天仰聖無任激切屏營之至謹奉表稱謝以聞命編刻千叟宴詩分賜羣臣預宴王大臣郡王品級貝勒允祁以下八十九人詩一百四十六首預宴官員封武功大夫嵩山以下一千八百七十八人詩二千一百五首預宴按察司銜商人程謙徳以下舉貢生監及在官人等二百五人詩二百三十四首預宴馬甲愛新等七百三十五人詩八百三十九首預宴老民李恒榮等九十一人詩一百二首預宴朝鮮陪臣李徽之等二人詩二首預宴共三千人詩三千四百十七首臣永恩等謹奏為恭謝天恩事欽惟我皇上昊籙延洪堯文作則萬年家法煥日月而重光千叟恩筵普乾坤而益夀嵗逢已盛恊時和世㤗之徴典茂寅承紀君酢臣醻之㑹庸作歌推天命敕㡬之肇始于其訓昭皇極錫福之大同聖謨崇實遡史䇿莫可比肩國慶介繁序禮儀聿云尚齒惟尊祖綦嚴於述事斯言詩盡善於繼聲仰睿情之抽祕萹依七字以𫝊心諧衆志以聨唫韻綜一先而備體既叶栢梁之風藹更題茶宴之春濃義交贊於元首股肱歡奚啻乎家人父子几榮捧賜驪珠駢五十六顆之珍廷接拜賡鶴籌積三千四百之算屬以班崇親貴乞宸藻而源𨗳宗潢因之宴衎臣僚侍慶霄而潤霑仙露六卿分職率其屬近知有喜承顔四岳迺覲敷以言羣効來朝輯瑞雁藩充職今天下議禮同文貔旅登行爾有衆披戈講藝其在簪纓舊列秩隨上中下之分或為杖履耆英秀逮農工商之衆百齡頖樂度大千福海之航一介箕封演九五夀疇之䇲悉由㲈鈞宣奏振三代以上之元音咸偕衢壤臚歡申萬夀無疆之殷悃藉希鳴盛曷罄鐫恩迺蒙採詠徳之謳歈鑒抒忱之淪浃俾叨藜照映閣上之星辰爰付棗材次函中之甲乙帝彰詩教攦一風二雅三頌而皆可以興天闡治符齊六律五聲八音而予惟汝聴斯極崇閎著典衍京垓數而宜咏宜歌况依曼羡凝庥俾億兆人之共聞共見祗邀寵賚忭預鴻施臣等才慚潤色繪豪素以難工澤被引年附汗青而不朽優游耄耋識在國在野之春秋鼓舞軒鼚味既醉既飽乎仁義滙簽羅于寶帙彌欽集大成者聖人披錦襲于瑶編恒頌亘古稀之天子惟有輝瞻雲倬續炎羲巢燧未見之書祥羾山呼舉岱崋嵩衡共聞斯祝所有臣等感激歡幸下忱謹合詞繕摺恭謝天恩伏乞睿鑒謹奏臣等伏覩是年元正六日慶舉耆筵自王公貝勒大臣以迄紳士庻民外藩陪臣與宴者三千餘人紺髪鮐丈駢羅階戺視康熙年間與宴之數至逾三倍良由漸仁摩義沐浴涵濡是以禔福彌崇嘉祥彌著孫謀祖武先後重輝為従來瑞牒所未紀臣等職司數典推遡上儀敬繹御製千叟宴依韻詩有曰追思侍陛髫垂日訝至當軒手賜年仰見聖人一心一身六十四年之間再親盛典其中授受之隆繼述之善世徳作求之羙實本聿修念祖之忱運㑹輳隆福有由致而其時禮儀之肅賚予之優咸霑湛渥有獻觥酌斗之忱所末由仰報於萬一者爾八旬萬夀盛典卷三十二
