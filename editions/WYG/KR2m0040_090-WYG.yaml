body:
  text: 欽定四庫全書八旬萬夀盛典卷九十一歌頌十一萬夀恭頌九章謹序兵部尚書臣慶桂臣聞籙秉皇時緜萬八千齡之夀䇿推昊嵗肇京垓億禩之祥調元大埏埴之功闡貞符於玉冊提象應斗樞之曜章奥祉於雲書並溯祥源式揚馨業然而詩稱單厚未聞幬載之同流書美嚴恭罕覯曽元之衍慶善芳竒幹祇潤色於夸辭鳯水龍山僅鋪張夫瑞應信暢垓泝埏之有待何超圖溢牒之可言必茂實允協乎昊穹斯繁釐備徴於景運欽惟我皇上福敷禹範命敕堯幾煥珠囊而平叶三階朗金鏡而照臨萬㝢調四選於通正熈衆登春均六氣於咸和陳常時夏蓋地緝蘿圖之祉澤溥飫夫衢尊敷天依藻黼之光歡徧騰乎軒舞茲届五十五年之紀恭遇八旬萬夀之辰寳牒延洪瑶籌錫羨嵗直上章之次景鬯由庚月輪留熟之占義符益壮設蔀則十居成數乗十而䇿衍方長闡苞則五位中宫重五而袠開無量律生隔八風諧舜琯之音算積由旬卦肇羲圖之畫徳基福致五代一堂星拱辰居萬方同軌時則生番嚮化胥鞠􅎽以趨朝􅃡甸歸誠特拜章而請冊南交親覲身章請賜衣冠西極偕徕頂禮䖍呈唄夾郅治孚於翔泳和氣暢其訢誾斯盖由我皇上至健法天􅅷勤繩武衣宵食旰叙府事於修和問雨占晴溥田功於懐保行殿惕寸隂之競恒秉燭以待章品官逮初試之微必簽名而引對鞏兩隄於萬禩安瀾貽樂利之庥勤四載於六廵孚恵入豫遊之諺劭農則三推親舉藏富則二賦頻蠲徧瀛漠以敷文炳典謨於渙藻賅内聖外王而示訓嵗華偕寳篋俱増綜經天緯地以成章政化與鴻篇並永掲敬明之精義治本從心闡遲速之大原時中惟聖一百六部之披宣治道述光烈而全史兼羅七十二候之抒寫化工備行生而大鈞在握奎題耀采盎元氣於簡端寳繪攦華暢天倪於幾暇訂元音於七始葩經薈樂譜之全標正雅於六篇藻詠補笙詩之闕四籖廣集藝林更播以聚珍七閣分儲文府勝探乎羣玉建黌宫於上塞邉陲並仰夫宣風䂓璧水於周京獵碣還瞻夫集古天文光被聖武丕昭合凖回二部以登圗統大小兩金而底績開疆拓土訂方輿於數萬里之遥掃幕犁庭窮分野於廿八躔而外威弧逺指靖鯨波而奏凱維三宸翰頻裁勒翠石而告功次五所以烏孫别種率属來庭暹斛名王踰瀛獻賮六符輯瑞三千宴佺羡之倫十體聮吟八伯頌星雲之旦惟大徳之祿位名夀申保佑于自天皆至誠之博厚髙明徴悠乆以成物粤軒甲初周之嵗未許觴稱迨古稀介景之年尤殷葵向兹俞籲懇遹沛恩言特科則甲乙宏開正供則庚壬輪復屆元日而韶宣鳯琯進羣工而宴賜仙厨覃敷六幕之春廣播十行之詔升馨嶽瀆崇儀特命乎専官氾澤簪纓寵命咸邀乎申錫耆耉荷粟縑之賚鳩杖分榮祥霄空貫索之躔鵠書布恵凡䝉覆露共戴髙深爰于二月之初懋舉東廵之典謁素王而展敬聿彰尊聖崇儒登㤗岱以告䖍祗是為民祈福神人洽慶中外臚歡皇上猶復厪駿業之仔承掲寳文之深㫖聖徴時若疇當八位之乘帝念在茲治倍耄勤之惕福隆嚮用益晴籌隂量以靡寧徳朂自強彌䖍鞏持盈之是劭從此演圖布算千百國共慶純常允宜保極延禧億萬年長瞻仁夀臣世叨宸澤欣侍恩暉愧髫齓未讀父書依豢飬更承聖教雖未工乎詞賦附嵩呼華祝以同聲竊有願於賡颺偕叟壤童轅而志忭謹撰頌九章拜手稽首以獻維天隂隲下民保合各正惟聖憲天闡繹凝命祗承翼翼民視民聴撫茲五辰􅇆於一敬惟南郊北郊祈榖上辛龍見而雩嵗嵗躬親豈惟躬親皇心孔寅著論篆寳曰信天王人禱雨告風祝文親製感不旋日甘霖徧被馨香攸通曰惟至治至誠格天斟元司契頊書之銘曰恭則夀範陳作肅膏雨叶候我皇敬天嘉祉増茂於萬斯年永膺純佑其一我大清受命累洽重熈肇域彼四方寳訓攸貽峩峩史宬敬藏實録宸興嚮晨回環披讀四詣陪都欽瞻弓劍創業艱難時厪聖念薩爾滸之戰國威斯張文以記之大烈丕揚衣冠是遵騎射是習申戒毋忘碑亭文述秋獮詰戎氷嬉勵武家法祗承因時逓舉仁皇眷聖執中允傳羮墻追慕堂題紀恩聰聴作謀厥應時寒舊章率由丕基鞏磐其二六府三事政在飬民愛育黎元厥惟聖人蠲租者再蠲賦者四藏富於民不言所利民生聖時豐豫繁衍偏隅偶歉發帑數百萬展賑常賑滋液滲漉蹕路所經申之給復東南六幸相度河海磡石安瀾楗茭順軌潤下既鬯稼穡咸宜民益殷阜啿啿春熈帝心周至籌民萬全思睿作聖時風應焉大徳曰生實體昊乾敦仁綏夀純嘏洪延其三皇極敷言是訓是行因言見道脩辭立誠詩五集編文千餘首煥乎文章日新富有幾餘灑翰奎畫焜煌正心作則函括三倉既㳺孔藝亦作虞繪天筆發生含元陶彚聲教四訖薄海同文安西承徳咸寘學官圜橋教澤辟雍肇建講學親臨敷宣至論十鼓重編星輝雲縵載籍極博四庫旁羅聖鑒釐定别贋訂訛言從作乂時暘攸應文治離光南弧朗映其四皇仁如天燾育八極除蟊殖苗用威成徳維凖噶爾暨兩和卓木蟻聚狼貪乃世其惡王旅嘽嘽悉臣其部族開屯鑄幣家給人足金川二酋恃險偕恩摧碉掃穴五載蕆勲臺員荒徼逺在重洋生畨糾錯匪徒竄藏天戈一揮瀛堧永靖蔗田蕷畦綏豐洽慶曰師武臣力咸禀聖謨幾先燭逺四知義抒作哲惟明曰時燠若闓陽普煦民大和樂其五畇畇禹甸九州限之殷土芒芒亦惟曰九圍我朝幅員職方未經我皇式廓以莫不増宛馬在閑闐玉充庭土爾扈特昔阻羅义來依仁宇式舞且歌曰安集延曰痕都斯坦負暄獻芹通誠納欵後藏之外曰廓爾喀古不通中國嚮風願附敬奉大皇帝如三寳佛膜拜貝葉自請薙髮緬甸夀經南掌象子懐徳畏威肱車越雉安南底定戴我皇慈稟朔易服親獻夀巵騐風占雲粤載曩編嵗月日時無易盛軌斯全㑹極歸極王道蕩平共球輯瑞天子萬年其六化民成俗必由禮樂百年後興待聖人作常雩肇禋惟民是福用玉右壇庇䕃嘉榖鉶籩師古咸秩有倫禮器圖式郁郁乎文周笵十器文廟是陳教民孝弟鄉飲典循鏄鐘特磬協于韶律親定樂章笙奏補佚工尺譜興宫商義闕訂音駢注全詩昭掲制度之大莫如寳章曰八徴耄念猶惕幾康彛倫攸叙此之謂大同極天蟠地聖夀崇鴻其七聖風播淳不言符瑞至徳感孚祥徵自薈我皇提釐麟振衍慶五福五代天題紀盛玉牒百億秀瓞緜緜乾清曲宴行葦歡聮臚叟三千耆筵廣錫隆禮廸光珍頒舄奕百嵗夀民以千餘計見曽元者百九十四耆儒賜第優給華資多躋大耋或逾期頥伊布魯特有百九嵗婦二萬餘里效誠獻夀惟皇嚮用五福用敷錫庶民民祝夀祺􅆽海為樽其八恒稱不已益繋无疆體乾立極曰惟自强我皇緝熈基命宥宻殿掲勤政屏書無逸無逸作所念切兆人首先察吏要舉安民御門聴政臨軒召見執兩用中省成慎憲仲春之月四廵東方觀民設教恩紀滂洋恵逺詰武嵗莅山荘鴻臣就瞻晋萬年觴性彌體貞徳劭福厚荘敬日强不息則乆近天子光咸拜稽首疇圖衍羨保樂洽夀其九萬夀恭紀七言律詩三十首謹序刑部尚書臣胡季堂臣聞皇極居中帝錫九疇之五聖人在上山呼萬嵗者三既叶應夫嘉祥自臚歡於億兆欽惟我皇上堯仁溥被舜夀延洪記親著夫八徴聖日益聖堂増題夫五代孫又生孫茲嵗籥聿啟乎庚金廼帝眷益隆夫申錫惟天為大誠蕩蕩乎無能名與物皆春舉欣欣然有喜色實罕聞乎徃牒更卜慶於來章乾坤之榮萬一千當兹數也登封之君七十二方斯恧焉臣不揣禱昧爰發康謡用切葵忱欣増椿笇上下平為二韻體歸乎歌叙平成三十幅共一轂義取乎景禧輻湊維清景命式延洪元后乘乾允執中聖世天髙兼地厚皇圖祖徳與宗功八旬曼夀八徴念徴耄皇上八旬萬夀特鐫八念之寳御製記文五代同堂五福崇寰海臚歡歌錫羨欣随華祝效呼嵩右總叙於穆穹圓盖九重信天夙夜矢嚴恭西師蕆功因鐫信天主人之寳郊雩祈榖䖍三祝牲玉升禋告六宗璇運自强乾法健今年春明自皇上御經筵製論發勉自然之義碑鐫言報觀孚顒戊申平臺灣子父御製告成熱河可文廟碑文有天地者天母子於父母不言報之論順昌著論心欽若順御製開天者昌語惑論中純佑緜緜福祿從右敬天猗歟列祖秉麾幢神武何勞因壘降大烈䕫鳴薩爾滸肇基龍躍混同江五朝玉檢輝前古四駕金輿謁舊邦繩武紹庭兼創守恭讀實以御製剏業守成難易説一身兼創守之任九鴻元氣固敦龎右法祖琴奏南薫叶翠媯克勤庶政敕幾時牋批鳯諾㸐銀燭匾署鸞書牓綵楣凡夀山臨御之所如有避暑山荘殿萬静宜園皆勤政晨起寅階常聴漏晏眠丙夜待搴帷製晏皇上御眠詩深宫丹扆書無逸數四皇上於無逸一篇處皆御書凡莅事引見掲之萬里駸駸化若馳右勤政浩蕩皇仁徧九圍應圗瑞草茁靈葳紅菌借夏人頒粟綠埜行春馬觧騑申戒皇上清蹕所至毋得稍躪禾稼補助金捐中府帑雨暘穡寳小民依雞雛待飼心重念得飼欣看天下肥右愛民文教光昌達象胥鴻儀麟炳此權輿庠膠序學三雍制津溯淵源四庫書已向瓊林歌棫樸毎從經囿朂菑畬幸逢合璧聨珠㑹羣繞薇垣拱帝居右文教於鑠皇威被海隅四知睿照仰神謨前嵗籌畫臺灣軍務微知皇上先知如神有合於繫詞知彰知柔知剛之義因額四山荘之後室曰知西征雨降東瞻蜺南伐風馳北貢駼廟告九成開紫閣田屯八表展黄圖平定西郵之後屯政大開於今卧鼓櫜弓後耆定清寧合六符右武功緜蕝相沿百代稽折衷義疏述宣尼千官合表傳青簡職官欽定表六典封函檢紫泥大清欽定通禮周禮鉶籩陳水陸皇朝欽定禮器圗式漢京輿服壹東西諭立卧碑述服太宗訓守冠試觀器運份份盛文物聲明孰與齊右定禮元音全不費安排律吕精研韺濩儕義後皇上御纂律吕正編復備器數之用梵唄貫珠三合統同文欽定韻統葩經振玉一音諧皆可皇上以三百篇絃歌主一字一音之説新編白體庭儀鳯府用御製新樂白居易題舊訂朱書井笑蛙朱載堉樂律全書之繆御論斥其一字數音韶樂中和慶隆舞更成徳勝有虞階右正樂殿名惇叙五雲開未許髙陽擅八才神鵲逺銜朱果下星潢遥挟緑江来金枝錫慶分桐册官頂上諭宗室王公子弟給閒散宗室給四品頂帶瓊葉聨吟採栢臺丙寅梁惇叙殿效栢體聨吟子梓孫蓀歌茂豫我二朝宗室合十一世現已逾千人自古無此繁衍鬱葱佳氣望蓬莱右睦宗懽悰喜氣浹嘉辰近自宗枝及薦紳乾惇叙殿清宫賜宴宗室傑閣繪圖容列座宴紫光閣外藩仙瀛俯鏡許聨茵宴瀛臺廷臣斚斟萬夀恩融旦元旦十太和殿賜宴年一舉茗捧重華例賞春共飫大官欣飽徳從来湛露被無垠右錫燕虞廵周邁舊傳聞清蹕頻瞻瑞靄紛芝盖香飛三竺雨祖六皇上法以慰喁聖次南廵望翠旂晴拂五臺雲臺者廵五四灤陽避暑歌陳諺台吉皇上嵗幸熱河俾蒙古五十三旗均霑闓澤雒上觀圖範羾文南者廵河一幾度升香東岱下不教封禪侈亭云四廵山東者方右廵夏禹無隄細討論貢無御製詩有禹隄字之句功髙砥柱暨崑崙桃花𤓰蔓河如帶辛未増築髙堰五壩淮安石隄丁丑易徐州䕶城土隄為石壬午定清口出水誌濬六塘下游庚子加髙徐州石隄改築韓家山至奎山石隄鮷渚鱘沙海作門庚子老鹽頒㫖大興海塘工作於倉等處改築石塘指示皇上親臨萬年水賴虹架湖梁通月窟洪湖微弱黄有倒漾之慮上敕河臣多方籌度復以消息盈虛申戒各工加意熟籌以防漲溢鰲擎江柱束雲根荆州被水賑恤皇上命大臣馳徃查勘發帑并改建城垣衙署春帆秋稼都安稳萬頃汪洋頌聖恩右治水治㝡都将猛濟寛願為保障各修完衝繁難計旬宣吏清慎勤箴内外官榮衮嚴鈇憑自取春華秋實各参觀自陳皇上循名責實京察則屏虛文大計必核優劣實跡至人心鏡同懸象好矢微忱一寸丹右察吏審克寛嚴枉縱間舊制秋審牘朝審皆三次覆奏覽止皇上恐案繁多轉致不能詳令一次覆奏又行批命勾到時将原本進呈覆閲再發以昭慎重好生心每念恫癏理由皇上謂求其生者乃詳酌情其自取以辯明歐陽修之説堯刑五服咨流宅漢約三章守入闗鳯髄龍筋勤乙判中疑皇上矜慎庶獄毎鞫多指示案竇命大臣詳所昭雪金科玉律重申頒加編皇上簡命大臣取律文及逓年奏定成例重輯為四百三十六門千有餘條凡四十七卷頒發各省以昭畫一爰書入吿權銖兩仁夀敷恩到九寰右詳讞糺縵光華復旦年枕經葄史快争先天開龍榜恩如海自丙辰至己酉六開進恩科鄉㑹試以廣登人預鵷班望若仙廵蹕所至入彀者欽召試諸生録取賜内閣中書枝選碧梧卿月外如明通榜大挑舉人㧞貢以小京官用皆属曠典花探紅杏矞雲邉辛丑甲戌得文武三元為百年来科名盛事五明洞闢虞廷扇夔拊皋颺喜並肩右籲俊南極星輝燭九霄華顛叠獻太平謡秋来聴鹿歌鳴埜春宴扶鳩許杖朝入學五更分介席臨雍三老辯圜橋耆英更比芝英茂屢有河圖告帝堯右優老甘雨和風遍樂郊躬推帝耤軫方苞近八皇上親舉耕耤典二十八次去嵗以年旬始命自後遣官行禮實古所未有稻旁省穡歸禾頴花外敦耕望杏梢勾盾㺯田晴緯耒索綯乗屋晝搴茅演耕皇上於豐澤園行禮田家風景時縈宸念四民月令農家諺繪入宸吟義曲包詩御製七十二候右劭農仰流乆已集犀􅋙垂拱長懐汗馬勞火器連營蹲鐡獸氷嬉結隊抃金鰲嵎攖猛虎鎗摩刄鎗一上嘗親御弧矢或用虎神日中數虎射鹿數十天威神技憺懾中外館射飛熊矢建櫜聖祖皇上侍熊於永時嘗射安湃睿武飭戎兼耀徳羽林鳬藻肄兵韜右訓武昇平綏屢得嘉禾斂福敷民受福那腰米再蠲船漕夥口錢四免鏹輸多餘糧粒粒分紅稻美飯家家裹緑荷擊壤羣知歌帝力寰區汪濊湛恩波右蠲免閭閻生計在桑麻宫府諄諄戒泰奢三十年通籌嵗杪南東畆稔算禾秅籍稽負版邨千户名協司商姓萬家順治初各省民數一千六十三萬餘口近年増至二萬八千餘萬口是加二十餘倍節儉論殊鹽鐡論節儉御製論教行富庶又何加右積貯耳食由来等靣墻仰憑剏義發天光老更衆説定於一老五御製三更説河濟諸源考特詳御製欽定河源紀畧淮源考濟水考二至鹿麋訛早訂時憲書改麋角觧為麈角觧五明門扇典原彰扇引御定五明扇為門虞書闢門為證從容指㸃真詮出正使諸儒愧未遑右正訛淵純聖性本天成刪定從来仰至精經史一時登秘刻三武英殿刻十經二十三史薛歐雙列允公評五代命輯薛居正史入正史金陀細校歸温室校核岳珂五經記作五經萃室石鼓重排付上黌千載闡微垂聖治廣微應愧補吹笙詩御製補笙古右訂九牧金鑱不若形擴清九宇讋威靈國戰圖開西陲勝績新披鑑西師戰圖烏什䧺圖古鑄型烏什戰圖氷嶺雪碉摩地險金川戰圖鯨波鼉窟繪天刑臺灣戰圖交南旌勇明培覆安南戰圖徧錫諸藩炳日星圖賜諸國戰右刋圗宸章美富與川増謨烈煌煌丕顯承文焕六經垂宇宙詩明五際麗升恒丹青壁府暉金䇿翰墨奎光貫玉繩書契以来真未有藝林欣播剡溪藤右聖製非烟紛郁景星稠寳道都随灝氣浮上夀元符臻上理中天景運集中秋九宗合爨真人瑞五葉駢茵賴帝庥禾穂芝莖諸福物彚呈嘉貺滿皇州右庥徴徳威緜宇戴咸臨職貢昌圗冠古今六幕車書同㑹極萬方玉帛並輸忱紈牛露犬陳王㑹卉島花門入睿吟製職皇上御貢圗詩式廓况踰重九譯尊親長此輯龍琛右職貢鳯篆由来抑埴諳四言詠璽義包函之寳皇上紹用敬四言詩天勤民並御製闡義古稀秘印三光焕耄念貞符萬福涵既夀永昌殊國寳自强不息與天参之寳皇上既鐫八徴耄念即副以自強不息璽交龍作紐金泥匣摛藻焜煌教逺覃右鐫寳夀星見丙徳星占四表歡騰暨被漸廓爾喀懐真唄讚屋鰲社捧祝籌添朱波金表求符篆銅柱名王效鰈鶼同獻九如歌十有箕疇錫夀喜恩霑右臚慶瑞席蘿圖應至諴珠囊玉燭吐機緘梯山車順寰中軌測水航来海上帆璿運窺星暉寳籙金穰占嵗燦琅函微臣稽首申䖍祝萬夀無疆萬國咸右獻頌八旬萬夀盛典卷九十一
