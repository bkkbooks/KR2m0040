  text: 欽定四庫全書八旬萬夀盛典卷二十三聖功六附載平定臺灣二
  hash: sha256:067be00a8161f1157fc4a449b3555852b4f281a6bee89c1efa5cd275fc2008fc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_023-1a, image: WYG0660/WYG0660-0263c.png}
body:
  text: 六月駕駐避暑山莊以平定臺灣大功告成御製記文勒碑於承徳府文廟御製平定臺灣告成熱河文廟碑文戊申昨記平定臺灣生擒二兇之事亦既舉平伊犂定回部收金川為三大事専文勒太學其次三為誅王倫翦蘇四十三洗田五以在内地懐慚弗薌其事而平定臺灣介其間固弗稱勒太學然較之内地之次三則以孤懸海外事經一年命重臣發勁兵三月之間擒二兇定全郡斯事體大訖不可以不紀因思熱河文廟雖承徳府學耶而余每至山莊必先瞻拜廟貌秋仲丁祭常遣大學士行禮則亦天子之庠序矣且予去嵗籌畫臺灣之事日於斯天祐予衷命福康安海蘭察率百巴圗魯以行及簡精兵近萬亦發於斯而諸臣涉重洋冒艱險屢戰屢勝不數月而生擒二兇且無一人受傷者是非上蒼黙佑海神助順曷克臻斯則予感謝之誠兢業之凛亦實有不能已於言者籌於斯發於斯臻於斯文廟咫尺我先師所以鑒而呵䕶者亦必在於斯記所謂受成告成正合於是地也則平定臺灣告成熱河文廟所謂禮以義起非創實因且予更有深幸於衷而滋懼於懷者予以古稀望八之嵗五十三年之間舉武功者凡六七胥善成其一惟征緬之事以其地卑濕瘴癘我軍染病者多因其謝罪求罷兵遂以振旅是其事究未成也近據雲南總督富綱奏報緬甸謝罪稱臣奉貢之事命送其使至熱河将以賜宴施恵是則此事又以善成於斯矣夫奉天治民百王誰不為天子而予以涼薄仰賴祖宗徳施受天地恩眷獨厚近八旬之天子蕆八事之武成於古誠稀示後有述使一事尚留闕欠予之懷慚終不釋也自今以後益惟虔鞏持盈與民休息敢更懷佳兵之念哉夫天地天子之父母也子於父母之恩不可言報中心感激弗知所云繫之辭曰瀛壖外郡閩嶠南區厥名臺灣古不八圗神禹所畧章亥所無本非扼要棄之海隅朱明之世始聞中國紅毛初據鄭氏旋得恃其險逺難窮兵力每為閩患訖無寧息皇祖一怒遂荒南東郡之縣之闢我提封一年三熟蔗薯收豐漸興學校頗晉生童始之畏途今之樂土大吏忽之恣其貪取臺灣逺隔重洋風濤冒涉其始陞調之員原以為畏途既以該郡物產豐饒頗獲厚利調任之員不以涉險為慮轉且視為樂土如近日福康安等㕘奏文職自道員以至㕔縣武職自總兵以至守備千總巡查口岸出入船隻於定例收取辦公飯食之外婪索陋規每年竟至盈千累萬而督撫大吏輒委之耳目難周不能詳查於是益無忌憚兹據㕘奏不可以不分别嚴加懲治以儆官邪而申國憲既嬉其文復恬其武匪今伊昔叛亂屢覩向辛丑年昨丙午嵗一貴爽文其亂為最地方文武既皆習於恬嬉則文員祇知傥慾壑豈復以撫字為心武員甚至縱兵離營牟利自總兵以下各衙門設立四項聽差名目多者三百人少亦三十餘人存營之兵㡬無又豈復以操練為事以致奸民既得藉口更無畏心煽誘愚民屢形叛亂其甚者如康熈辛丑年之朱一貴及昨丙午嵗之林爽文糾衆戕官據城僣號更為罪大惡極水陸提督發兵於外奈相觀望賊勢張大林爽文滋事之始水師提督黄仕簡陸路提督任承恩一同帶兵渡海謂可即時撲滅不意南北互相觀望遂致賊勢日益披猖天啓予衷更遣重臣百巴圗魯勇皆絶倫川湖黔粤精兵萬人水陸並進至海之濵上年正月雖燭於㡬先命李侍堯代常青為總督而以常青為将軍専司征勦常青究未經行陣祇能保守府城不能奮加勦殺幸天牖予衷六月内即諭令福康安入覲熱河繼而常青亦請㫖令簡重臣来閩随於八月初命福康安為将軍海蘭察為㕘賛帶巴圗魯侍衛章京等百人並預調四川屯練二千廣東兵三千湖南兵二千貴州兵二千水陸並進以待福康安至彼領勦至海之濵崇武畧駐後兵到齊恬波徑渡一日千里以遲為速叶百舟齊至神佑之故福康安等至厦門於十月十一日自大擔門開舟連次遇風阻囘復在崇武澳守候逾旬適四川屯練與廣西之兵踵至而風亦轉利遂於二十八日申刻放洋至二十九日申刻兵船共百餘隻齊抵鹿仔港千里洋面一日而達其始似覺遲滯而既渡之後所向無前轉得迅蕆大功信非神靈佑助何以至是馳救諸羅郡賊蜂擁列陣以待不值賈勇如虎摶兔案角隴種頃刻解圍義民歡動維時賊匪久圍諸羅聞大兵既至亦蜂擁迎拒福康安海蘭察及巴圗魯等即日統兵前進勦殺無算立即解圍義民等無不歡忻踴躍出城迎師斗六之門賊為鎖鑰大里之杙更無巢落長驅掃蕩如風捲蘀夜攜眷屬内山逃託斗六門為賊門户最為險要官兵乗鋭立㧞随即搗其大里杙巢穴林爽文膽落連夜攜其家屬逃至埔裏社一帶遂成釡底㳺魂矣生畨化外然亦人類怵之以威賚之以恵彼知畏懷賊竄無地遂以成擒爽文首繫先聞林爽文計窮即欲逃入内山而生畨狙獷未必能喻利害或将逆首藏匿則難速蕆預命福康安既怵以威復賚以恵生畨等果即傾心効命協同官兵社丁人等竟於正月初四日在老衢﨑地方将林爽文生擒解京俾元惡不致漏網可知凡有血氣無不各知自為顧所以經理者得當否耳狼狽為奸留一弗可自北而南如上臨下叶海口遮羅山塗闗鎖遂縛大田畧無遺者叶擒林爽文逃入内山勢已成荘大田在鳯山一路窺伺府城慮其事急遁海而逸乃福康安悉心籌畫預令烏什哈達帶水師兵丁絶其去路而分巴圗魯等為六隊各自山梁挨次排下四面合圍適值順風烏什哈達水師兵丁連檣而至沿海宻布荘大田逃竄無路立即就擒並其頭目四十餘人無一脫者又殺賊衆二千餘名又有逃入柴城瑯嶠各畨社者三百餘人被生畨等立即擒獻伏誅於是賊匪一時殱戮殆盡合郡頓稱平定二人同心其利斷金曰福康安智超謀深曰海蘭察勇敢獨任三月成功勲揚古今既靖妖孽當安民庶善後事宜康安並付定十六條諸弊袪故永奠海疆光我王度此次臺灣用兵其始不能滅賊非盡由士卒怯懦之故亦由領兵者不得其人遂至稽延時日若福康安之智謀算無遺䇿海蘭察之勇敢所向披靡可謂一時無兩而又同心共濟以此士卒用命勢如破竹未及三月而大功告成洵能不負任使至於平定之後不可不亟籌善後之方以為永靖之計嗣據福康安奏定袪除積弊十六條俱能悉心籌酌切中肯綮已令大學士九卿議行以後地方文武實力遵守海疆庶可永慶安怙矣凡八武成䝉佑自天雖今耄耋敢弛惕乾如曰七徳實無一焉惟是敬勤勵以永年命以紀事語及平定臺灣功臣像賛序告成熱河文廟碑記勒石臺灣及厦門乾隆五十三年三月十一日奉上諭此次勦捕臺灣逆匪軍書籌筆宵旰焦勞一切𦂳要機宜朕思慮所及随時指示福康安等禀承方略擘畫周妥仰賴上蒼眷佑於三月之間生擒二逆首全郡賊氛掃蕩無遺現屆大功告蕆所有辦理此事顛末曾親製紀事語二篇及平定臺灣功臣像賛序一篇備述用兵機要及賞功罰罪諸大端而一本於敬天勤民孜孜不怠之心宜勒之貞珉以昭彰癉著将御製文三篇用清漢字書冩發交福康安李侍堯於臺灣府城及厦門二處建碑碣三座照依尺丈慎選石工妥為鐫刻俾巖疆海徼咸喻朕勤政愛民明慎用兵之意六月初三日奉上諭從前平定伊犂囘部大小金川皆於太學立碑以示武功臺灣不過亂民聚衆海島一隅雖不值刋碑太學而此次辦理迅速首夥生擒亦不可無紀實之作朕現在駐蹕熱河欲将此次平定臺灣事蹟御製記文於熱河文廟大成門廡内嵌石刋刻俾振武敷文盛軌永昭上塞俟記文製就後當一併發與福康安等在臺灣厦門等處配建碑亭勒石所有前次發去之御製文三篇著福康安等暫緩鐫刻俟此次記文發徃後一同敬謹摹勒庶規模丈尺咸歸畫一足以壯觀瞻而垂久逺命刻臺灣戰圗製詩紀績御製臺灣戰圗補詠四首有序己酉丙戌年曾為西師戰圗補詠六首序而行之葢其事厯五嵗地逾萬里部為兩類故久稽博訪而後圗成兹臺灣之役雖越重洋至内山撫生畨然成功未至三月全師凱旋前席親詢厯厯明明故前已詠而後兹補隔嵗而蕆以全雖然余更有深懼於斯者焉二逆偝理倡亂天鑒昭然其取滅亡固不待數計而龜卜也然而林爽文既入内山欲南赴荘大田忽自疑而北返是一竒也林爽文當大里杙既破之後向南逃至集集埔小半天山等處當欲直赴南路與荘大田合并因福康安於南路阿裏山等處派兵預防竄逸並屢次拿獲林爽文荘大田通信之人賊人彼此既不知去嚮而林爽文似又不甘投奔荘大田處且其始本欲以内山為遁跡之所以為官兵必不能窮追至此於是遲疑向北復至生畨獅頭屋鼇等社不知福康安先已厚賞諄諭各社協力同緝追奔數百里剿殺萬餘人遂於老衢﨑地方将林爽文擒獲荘大田實近海而弗逃海以入内山又一竒也荘大田聞福康安帶領巴圗魯及各省勁兵過海亦知畏懼惟不能得北路林爽文信息是以尚復窺伺府城但當大兵南下之時荘大田在鳯山一帶距海甚近意其必即赴海逃遁以圗倖免乃又被官兵追殺至極南瑯嶠山内而各社生畨俱受福康安預飭非惟不敢容留並且一同堵截於是官兵分隊四面合圍将荘大田及其大頭目四十餘人一并生獲即此足騐上蒼佑助也幸而福康安預諭内山生畨厚與賞項故内山之畨皆為我用二逆皆為畨所遮以就我兵之擒是豈人力哉天也上天佑予並佑予所用之臣所發之兵不有圗形紀勣以旌其勞亦非所以答明賜而示後昆也且福康安者故大學士傅恒之子而孝賢皇后之姪也使不能成此功朕必重罪之今幸成此大功惬予之望不重賞以表忠則予為矯情其何以勵衆臣哉故予之惬願在兹懼懷亦在兹觀斯文者其庶㡬有以諒予乎亦庶㡬有以知予乎大埔林之戰諸羅圍解即進攻斗六門賊匪萬餘分據大埔林各荘阻截道路福康安令普吉保等進攻大埔林鄂輝等進攻大埔尾海蘭察等率兵馳射克其中林於是大埔林大埔尾同時並潰追奔二十餘里殺賊六七百名鎗斃賊目十餘人賊氣遂奪諸羅圍解迤南通福康安等於上年十一月初八日既解諸羅圍後自山麓以至瀕海村荘為賊所佔據者即日奮勇剿殺全行收復而普爾普亦即将迤南至府城道路打通於是大兵得以専力直攻斗六門奪賊要隘斗六門當所必攻不與暇因操勝計破其堅乃易成功路經三埔皆酣戰賊擁千羣尚肆訌大膊大鞣消頃刻雄風何異捲飛蓬集集埔之戰賊巢既破林爽文同賊夥徃来水沙連之水裏社等處預為退守地步而集集埔為入山要路地形斜夹南北兩山中横大溪名濁水溪沿溪數萬畆田藉此灌溉賊匪壅遏溪水既為迫脅良民之計並壘石陡墈上阻溪自固及官兵至溪賊約萬餘人蔽牆發火器官兵排鎗前進兼用大礟斃賊甚衆海蘭察等乗馬浮過福康安等督催官兵齊進人人泅水徑渡直摧賊壘自入内山戰功此為第一攻開大里逆潜逃領衆進踪佈置牢齊率健兵涉溪險别差精騎據峰髙賊匪固守集集埔並於北山草嶺設卡自防福康安派令普爾普許世亨等由山路進攻及官兵過溪普爾普等亦攻克草嶺前来㑹合痛加勦洗有奔無路賊投水官兵既克集集埔雖将溪水當時開放而一時不能盡瀉其老㓜婦女不及奔避投水死者不可勝數恩并威行士飲醪此是内山第一戰首兇将待釡其膏大武壠之戰小半天山戰勝之後林爽文旋即就擒福康安遂移師而南圗剿荘大田維時南路賊匪屯聚大武壠山内於是有大武壠之戰首逆已從内山獲次惟南路大田荘存北路林爽文雖已就擒而荘大田在鳯山一帶尚復窺伺府城設令事急遁海逃逸勢難捕獲迨後福康安令烏什哈達帶水師戰艦絶其去路并即生擒大田真所謂自作孽不可逭也當車尚作螳臂計武壠安𫝊蟻陣屯福康安訽知南路賊匪屯聚大武壠山内令鄂輝許世亨鳥什哈達六十七等於正月十九日帶兵前進賊匪放鎗礟抵禦官兵撲上山梁壓下赶過大武壠河殺賊三百餘名生擒一百餘名適普爾普亦由内山大埔等處捜勦至大武壠隘口帶領格綳額等分路迎賊斬首四百餘級生擒一百二十餘名餘黨旋即潰竄攫戾破堅千隊奮駾驚喙竄一時奔舟師更遣預防海餘狽林爽文為狼荘大田則狽也真成釡底魂枋寮之戰餘匪自大武壠南下復在枋寮聚集福康安至牌頭即令海蘭察鄂輝等進剿福康安沿途捜捕随後接應殺獲無算荘大田勢已成擒矣枋寮武壠比鄰接敗後賊人聚守岑頗解沿山截後路那防勦隊出深林正月二十六日賊匪二千餘人沿山抄截官兵後路海蘭察與賊遇即分穆克登阿梁朝桂等備賊南來分許世亨六十七烏什哈達等回兵迎擊而自由蔗園内出其不意横衝賊陣射死賊目十餘人殺賊三百餘名乗勝追至海岸復殺賊一千餘名其餘自行投海及擠入海淹斃者不計其數奪獲馬匹鎗礟器械甚夥蜂屯蟻襍都喪膽倡亂呈奸爾悔心投海沙蟲不計數大田山竄待生擒荘大田若使預逃入海當亦無計窮追惟其奔竄内山於是福康安令巴圗魯等分隊合圍不啻待擒伏法可知覆載不容斷難漏網有若陰奪其魄者然七月賜凱旋將軍福康安㕘賛海蘭察等宴並命於臺灣建功臣生祠御製賜凱旋將軍福康安㕘賛海蘭察等宴即席成什去年此際未登程蕆績今朝凱宴迎来徃算仍先一月福康安於上年八月初旬由山荘奉命前徃督剿今以七月望後凱旋来此復命計期尚未及一年驅馳真是賴羣英國威海嶠揚惟烈祖徳山莊佑實明迴憶旰宵斯擘畫不徒勞耳慰猶誠慰中豈不自懐慚何致愚民蹈法甘論武邉防乃就弛曰文諸吏率為貪臺灣設立總兵道府大員如果皆能實心整頓奸匪何由匿跡乃武職不以操防為事文職専以肥槖居心於是牟利遂致吏治兵防日以廢弛而逆匪無所顧忌竟至釀成大案僨轅方悉誠吾過伏鑕奚辭信彼堪逆首林爽文等滋事之始總兵柴大紀始則以囘郡調兵為辭繼則遷延不即前徃勦賊方以困守諸羅邀予憐憫及福康安等至彼方悉其僨事之由已令革職拿解治罪彼實不能巧言置辨也善後雖云大端定猶餘厪念望東南福康安於平定臺灣後命留彼詳酌善後事宜大端已定惟是有治人無治法因思普吉保於臺灣總兵名望未足以資彈壓而奎林獲咎尚輕其操守訓練乃所深信即令徃代普吉保為總兵庶可望其整勵戎行俾東南海隅永臻寕謐善後詳陳十六條用斯兩月駐成遥臺灣善後事宜必得福康安之忠誠明練方可籌畫及詳陳事宜十六條果皆悉中弊源命廷臣集議准行而福康安歸期以此遂遲兩月抒猷山海安萬姓錫宴君臣㑹一朝念汝父當惬懷永視如子合受恩饒受恩饒處人知否不嗜殺邀天恵昭逆匪林爽文等固屬罪大惡極然亦有良民被其迫脅者悉予駢誅亦殊可憫瀕行時因即諄戒以脅従罔治之義而福康安果能體予之心専意生擒渠魁惟抗拒者痛加剿洗凡歸降者概從寛貸即以不嗜殺一念乃其克膺恩眷者也西域金川宴紫光臺灣凱席值山荘敢稱七徳七功就予自即位以來弗敢輕言用兵然前次平伊犂定囘部收金川誅王倫翦蘇四十三洗田五及兹俘林爽文而七要皆不得已而用之故皆仰邀功則天鑒俱獲成功若唐太宗之侈陳七徳以為己實自恧耳又報一歸一事償徃嵗緬甸之役亦由事非得已彼時将計日蕆事予以水土惡劣憐我将士多受病者適緬酋亦籲求貸罪遂令撤兵乃二十年来業已置之度外近據雲南督臣富綱奏新掌緬甸國事孟隕進貢稱臣是此一事雖未就於當年而此日之歸誠亦可償予夙願矣戒滿持盈增惕永安民和衆繫懷長養年歸政應非逺益此孜孜勵自强八月十九日奉上諭前因臺灣賊匪剿捕完竣但該處民情剽悍雖經此畨懲創恐事過即忘不足令其怵目儆心常思安分特令於臺灣建立福康安海蘭察等生祠俾民人望而生惕昨據徐嗣曾奏臺灣應建生祠擬於御碑亭後附連建葢因思福康安海蘭察等帶兵渡臺勦賊固屬有功而李侍堯在泉州厦門一帶辦理軍需始終無悮徐嗣曾前赴臺灣帮辦善後一切亦為妥協且督撫為守土大員若不得與帶兵之将軍㕘賛等同沐褒功之典亦恐該處民人意存輕視李侍堯徐嗣曾著准其一體列入俟生祠建竣後所有設立木牌福康安自當居中其左則海蘭察右則李侍堯左次普爾普右次鄂輝左再次徐嗣曾右再次舒亮並将御製功臣生祠詩一首誌事詩一首繕冩清漢字發徃一併刋刻碑旁以示朕優奨勤勞至意御製命於臺灣建福康安等功臣生祠詩以誌事戊申三月成功速且竒紀勲合與建生祠垂斯琬琰忠明著消彼萑苻志黙移臺地期恒樂民業海灣不復動王師曰為曰毁似殊致近年以各省建立生祠最為欺世盜名惡習因令嚴行飭禁並将現有者概令毁去若今特命臺灣建立福康安等生祠實因臺灣當逆匪肆逆以来茶毒生靈無慮數萬福康安等於三月之内掃蕩無遺全郡之民咸登袵席此其勲績固實有可紀且令奸頑之徒觸目警心亦可以潜消狠戾是此舉似與前此之禁毁跡雖相殊而崇實斥虚之意則原相同孰能横議且勵大小諸臣果能實心為國愛民確有羙政者原不禁其立生祠也崇實斥虚政在兹恩准臺灣生畨入覲其屋鼇社頭目華篤由東等聞㫖准令入京即自行薙髪以表畏懷臣福康安等為恭摺具奏事竊查臺灣南北各路民人仰沐恩施普加賑恤復於出力剿禦之村荘畨社特賞匾額以昭奨勵民畨等感激歡呼歸荘益衆至内山生畨等雖野性難馴而懾以兵威結以恩信未嘗不深知感畏向来地方官視為異類阻其向化之心奸民等又復越界滋擾致啓釁端前臣追勦逆匪時親至内山宣揚威徳該生畨等皆知効順協力堵截實為出力可嘉兹復欽奉恩㫖令查明出力生畨優加賞給派員前赴隘口𫝊㫖加恩無不歡欣踴躍出於至誠伏思此等生畨既知慕義自應廣示招徠民畨等得以共慶昇平相安無事臣曾遣熟悉畨情之貢生張維光至畨社曉諭酌令生畨頭目數人照四川屯練土司之例進京瞻仰天顔使化外畨黎優霑恩澤而海疆荒僻之地咸得被服聲教永慶敉寧兹據張維光禀報生畨等極為欣悦情願前徃如䝉俞允請俟天氣涼爽交與徐嗣曾妥協辦理派員帶領於年前至京是否可行伏候訓示奉硃批覽乾隆五十五年恩准臺灣生畨入京恭祝皇上八旬萬夀生畨人名恭事詩覲日期暨宴賞儀物御製誌分載典禮及恩賚門福建巡撫臣徐嗣曾跪奏為恭報臺灣生畨到省及臣帶領起程日期恭摺奏聞事竊臣前奉上諭奎林奏稱獅仔等社生畨頭目懷目懷等一十二名籲懇祝釐洵屬好事徐嗣曽前已派令八月来京祝嘏即著帶領行走照料一切更為妥善欽此兹據䕶送委員泉州府知府徐夢麟禀報内渡生畨頭目一十二名及義民通事社丁等於四月初九日自鹿耳門開船仰賴聖主洪福一路海波恬静十六日由厦門登陸於二十八日行抵省城臣當即𫝊見並著通事宣諭聖恩優加賞待各畨目歡欣舞蹈咸頌皇仁随令知府徐夢麟並添委延平協副将特克什布協同管帶該畨目等於初三日自省起程按站行走臣亦即起程馳赴前途妥為照料計至七月初旬定可前抵熱河親率該畨目共效嵩呼恭預臚歡慶典所有䕶送起程日期各縁由理合恭摺奏聞伏祈皇上睿鑒謹奏奉㫖知道了臣等謹案平定臺灣之役凡命将䇿兵籌餉蹙賊諸事宜悉由我皇上燭照公明指畫詳慎迅成克捷所謂遲在任事之外臣而速在籌策之予心者二語實櫽括其要葢自小蠢初萌即勞睿算馳軍書而熟計易董帥以遄臨三月之間天聲逺懾遂使勇騰慣将氣奮義民組繫俘人渠魁並獲全郡因而底定應機之順莫逾於是焉觀夫文廟告成祖徽善述所以迓天地神明之佑者胥本兢兢業業以承之而刋圗繪像加爵建祠諸典宣威旌勇次第舉行從此民歡宅里之榮吏戒恬嬉之習烽塵息警薯蔗慶豐賴兹偉烈維揚允綏南嶠而屋鼇獅社之衆並得以優㳺化宇効祝添籌有共樂我國家昇平悠逺之福於無疆者耳八旬萬夀盛典卷二十三
