body:
  text: 欽定四庫全書八旬萬夀盛典卷二十五盛事慶得皇元孫一臣等欽惟我國家累洽重光天庥滋至皇上緝熈凝命純嘏爾常御極以来孜孜夙夜凡所以仰承昊眷和恒兆民徳威之所綏懐聲教之所暨訖巍巍蕩蕩集福履之成古無有倫冊不勝紀宸衷淵若兢業滋深臣等朝夕左右仰見宵旰彌勤乾行彌健無時無事不以天祖為心民物為念黜華崇實無取繁文若前代瑞應之圗符瑞之志皆斥而弗道而自七旬萬夀至今上自宫廷下逮臣庶内而都邑外至荒逺不賓之地靡不鍾祥集慶輻輳鼎来同我郅隆福應尤盛葢天儲千古非常之福以厚畀我皇上皇上萃千古非常之福以敷錫寰區六合之間太和蒸洽敦為夀祉鬯為醇風引為雲礽㑹極歸極而臻大同大順故備福之盛則有五福五代之堂焉錫福之盛則有三千叟之宴焉雲漢章夀考之符辟雍流道徳之富期頥之老肩踵相望生齒之繁曽元遞衍年榖則順成屢報鄉閭則婣睦成風在國為嘉祥在民為家慶至如西禪慶讚頤婦榮施凡皆不期然而然備吉祥之應徵諸事則實而非虚揆諸義則正而不詭臣等恭纂盛事一門以昭仁夀同登之慶焉乾隆四十九年正月皇上以新嵗将慶得五代元孫晉封皇長孫綿徳固山貝子乾隆四十九年正月十四日奉上諭皇長孫綿徳之子奕純新嵗可以得子朕慶抱元孫五世一堂實為古稀盛事自應特沛恩施以衍奕禩雲礽之慶綿徳著加恩晉封固山貝子嗣後宜益加謹飭常府敬畏以期永承恩澤副朕諄切訓勉之至意閏三月初八日皇元孫生時聖駕六巡江浙十二日駐蹕龍潭行宫留京王大臣馳奏稱賀御製詩誌喜御製留京王大臣飛報得五代元孫之喜詩以誌意甲辰飛章報喜達行軒十二日駐蹕龍潭行館留京王大臣等由六百里馳報本月初八日皇曽孫奕純慶得皇元孫之喜具摺稱賀歡動中朝及外藩予得五世元孫實自古帝王罕有之盛事一時扈從王公大臣及外藩䝉古王公等下逮官員人役聞之無不額手歡忭同聲頌慶曽以古稀數上聲六帝何期今復抱元孫百男周室非五代三祝堯封是一言耄耋人多兹鮮上聲遇世之登耄耋者甚多而五世一堂則所鮮覯予今年古稀有四已得五代元孫實為我國家萬禩雲礽之慶上蒼眷佑如此優渥予惟日益孜孜勤政愛民以期仰副耳獲兹惟益凛天恩御製命彭元瑞曺文埴撿四庫全書古来有元孫者有幾據奏自唐迄明凡六人詩以誌事甲辰五世元孫膝上珍子為膝下至若元孫反當抱之膝上矣撿兹有幾命儒臣奏来詳悉翻四庫特出禎祥得六人四庫全書載唐錢朗宋張燾元吳宗元明羅恢歸璿文徵明六人皆以耆夀得見元孫恰彼古稀帝同數庚子年屆古稀因查自三代以下帝王年逾七十者漢武帝梁髙祖唐明皇宋髙宗元世祖明太祖凡六帝然皆未親見元孫也贏其家慶我饒臻如斯天貺叨駢叠忍不􅃯幾心愛民昨因慶得五世元孫命彭元瑞曹文埴撿閲四庫全書自古以耆夀得見元孫者凡幾人兹據奏三代以上不可考秦漢以後隋以前未有其人惟山堂肆考載唐錢朗南昌人仕唐官光禄大夫元孫數人皆以明經為縣宰年一百七十餘嵗又周必大平園續藳載宋張燾饒州人孝宗時叅知政事年七十五見元孫一人又宋濓潛溪集載元吳宗元紹興人不仕年八十八及見元孫舉觴為夀抱置膝上望者謂神仙中人又明文衡載明羅恢吉安人永樂時官國子監博士年八十二見元孫一人又明歸璿常熟人即歸有光之髙祖見有光集璿有髙元嘉慶堂顧九和為之記又明文徵明甫田集載戊午元旦詩有百嵗幾人登耄耋一身五世見曽元之句考徵明年九十有元孫二人等語臣庶以耆夀得元孫者僅止六人帝王中臻斯盛者尤未之前聞余叨膺天貺嘉慶駢蕃若此惟有益深乾􅅥􅃯幾愛民以兾仰答昊蒼純佑耳御製元旦試筆己酉農諺申過酉入礽乞漿得酒祝休徵論旬負扆七将八數上聲世弄孫元繼曽漫惜嵗増為嵗減且欣年減是年増處尊莅久滋深畏消息理昭切業兢四始開晨法太微􅃯幾方寸凛惟幾亮功凝績理紀協九寓萬邦留熟祈戒老已忘戒彼壮用寛自勝用其威厯干以六逮乎丙歸政吾将冺是非賜皇元孫名載錫聖祖親見曽孫四五人嘉名肇錫皇子輩行用永字皆聖祖所賜也乾隆丙寅宴宗室於惇叙殿始命皇孫一輩衍𣲖以綿嗣後皇曽孫輩用奕字至戊子新正御題嵗朝圗以進慈寧有永綿奕載奉慈娛之句首三字既以慶源三世排序成文更為萬年佑啟按字開支引之無極皇元孫既誕遂命是名焉駕幸皇長孫第臨視元孫是年十月十一日駕自圓明園幸綿徳邸第閲視皇元孫親抱置膝上膳畢還宫乾隆五十四年正月十四日皇上於奉三無私小宴宗藩命皇元孫入宴加賜先是皇上命皇元孫六嵗讀書時即令入宴以實副五代同堂之慶屢有御製詩紀盛至是年皇元孫已屆六齡因命入宴加賞御製上元前一日小宴宗藩及諸孫曽乙巳昨經千叟柏梁聨例用今朝祖宴𫝊康熈壬戌科梁體皇祖同廷臣昇平嘉宴賦詩用柏乃正月十四日也先節親親宜此日于時語語視常年座間帝系欣看奕孫曽輩凡娶媳者乃准入宴今逮奕純矣編展書房待與元孫曽輩例于六嵗即入上書房讀書欲元孫載錫六嵗讀書時即令入宴以實副五代同堂之慶然亦不過遲待四年耳撫序允應増慰慶却因望雪意怦然御製上元前日宴近支宗室及子孫輩有感而作丙午熈朝慶節未宜孤始自親親和以愉可識平章建皇極要惟敦叙握神樞一元雖有待長去聲彼元孫載錫方三嵗未可入宴行禮待其六嵗讀書即可入宴矣去嵗此宴即有編展書房待預元之句同行去聲不無都少去聲吾今予同行弟兄即一二長於予者率不能行走同宴者皆少於予矣叔輩斯今不可見欣然􅄼勝戚然乎御製上元前一日家宴近支宗室及孫曽輩即席成句戊申天横繁衍逮千多支近節前家宴和晴烘去聲葦筵連座暖雪凝玉樹喜庭羅顧無長上聲嵗過於我剩有七年且待他計至乙夘歸政之期尚有七年已看曽孫厠席末元孫預立酉春睋明嵗己酉元孫載錫年已六嵗當入學上元前一日家宴可預列矣御製上元前一日小宴宗藩及諸孫曽元用乙巳年韻己酉到園已是掛燈聨節宴葦行柑例𫝊詎幸七言成昔日竟符五代慶今年孫曽輩例於六嵗入上書房讀書至娶媳後乃與節宴惟元孫載錫慶衍𤓰綿尤為天家盛事不必拘以常例欲俟六嵗讀書時即可令其入宴是以乙巳上元前一日小宴宗藩及諸孫曽詩有編展書房待預元之句今嵗載錫已及入學之年遂同預宴拜跪如儀允符五代同堂之慶宗枝繁以承諸祖世代増惟叨上元顧鮮長年肆筵者座中久無叔輩即同行皆三十嵗之人亦無長於予者躬黄耉矣笑何然乾隆五十四年二月十二日皇元孫入學向例皇子皇孫皇曽孫俱以六嵗入上書房時皇元孫年屆六齡於二月十二日命入學讀書命宗人府查宗室内載字下一輩特恩賜名乾隆四十九年十月初四日内閣奉上諭向来宗室惟近支依皇子皇孫輩命名其支𣲖稍逺者命名即不得依此行軰本年因得伍世元孫命名載錫将来載字輩下再得六世来孫應用奉字因令宗人府查宗室内載字下一輩逺支已有希賢覺隆阿二人是自太祖以下至今已有十一世𤓰瓞繁衍本支極盛朕心深為欣慶著加恩依奉字輩希賢賜名奉福覺隆阿賜名奉夀并查其父今當何差著宗人府奏聞以示朕親族推恩仰承天眷啟佑萬年之至意御製新正重華宫丁未青宫花甲嵗週諳雍正丁未予年十七始居重華宫至今嵗丁未正六十年襲慶何非帝澤覃十一世兹親見七前嵗得元孫載錫因名查于太祖長子禇英支派下載字輩下又得一輩因賜名奉福奉夀為十一世而予逮事皇祖皇考下見皇子皇孫皇曽孫皇元孫是親見七世矣仰䝉未有天眷錫慶蕃昌實為古所八旬夀逮近餘三予今年七十有七閲三年即為八旬正夀夙願乾隆六十年歸政則為八旬有六矣兹尚孜孜自勵不敢少懈敬勤耳聨茵東壁開文讌迓祉初正賦雅談舊什新題遍楣梠不渝一敬祝農蠶皇上喜得五世元孫推恩海内命各省督撫查所屬紳士庶民身及五代同堂者加恩賞賚並御製詩章御書匾額以賜詩章匾額俱恭載各本條乾隆五十年正月十六日内閣奉上諭朕仰承天眷上年喜得五世元孫嘉慶駢臻恩施宜渥因令各省督撫查明所属紳士庶民有身及五世同堂者加恩賞賚兹據造冊咨送軍機處彚奏共一百九十二户内郭有英張羽劉湘鍾君寵四人俱夀逾百齡曽元繞膝洵為昇平人瑞朕親製詩一章分賞四家並各御書匾額以賜用示寵榮所有應賞銀兩縀疋及建坊之處仍著該部照例具題其未屆百齡五代同堂之張文聚等一百八十八人並著各督撫分别年嵗給予匾額賞給縀疋銀兩以昭錫福推恩同登夀宇之至意臣等謹按唐堯觀華封人效祝曰夀曰富而繼以多男自是以後篤祜延祺莫如周文之麟趾螽斯叠登風始然繩繩蟄蟄祗以喻其衆多至於公姓公族不過泛引旁支以揚盛美而已求夫曽元遞衍一體相承拜抃同堂稱觴介景者博稽載籍概乎未有聞焉我皇上錫羡凝庥備膺多祉乾隆四十九年閏三月初八日皇元孫生恭屆翠蹕南留京王大臣飛章馳報一時扈從王公大臣外藩逺使下逮官吏紳庶莫不額手騰歡同聲頌慶仰見聖天子徳以基福和以召祥天眷申重康彊逢吉是以舉伊古帝王未有之嘉慶咸萃於斯以光瑞牒也且備考四庫書所載編氓中得見元孫者唐以後止有六家今則八埏之内夀宇廣開沐浴太和休養生息直省所奏五世同堂者共有數百家咸得寵賁天章榮叨卓楔斯又昇平盛事所謂敷錫厥庶民者矣五十四年皇元孫己屆六齡初正賜宴宗藩特命皇元孫入宴即于二月命入上書房讀書榖詒之逺家法維昭况我朝𤓰瓞蕃昌自太祖至今共十有一世即今宗室中倫序之最小者為奉字輩於皇上為来孫於皇元孫為猶子我皇上仰膺昊貺聖夀日躋恭遇期頥衍慶之期皇元孫已臻壮齒将見来晜仍雲隨肩接踵遶膝承歡詩曰干禄百福子孫千億在昔為稱願之虚詞在今為重熈之實事職司珥筆者又當何如軒鼚鼓舞以昭舄奕之昌符也哉八旬萬夀盛典卷二十五
