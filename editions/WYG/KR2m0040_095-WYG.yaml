body:
  text: 歌頌十六萬夀恭頌十六章謹序禮部侍郎浙江學政臣竇光鼐乾隆五十有五年庚戍秋八月辛酉恭逄我皇上八旬萬夀慶辰光天道洽率土歡同中外臣庶咸願攄忱祝嘏用介崇禧皇上俯允衆請先嵗申命戒華靡禁貢獻豫開恩科輪蠲天下錢糧作人益下鴻渥均濡廼以正月元日肆頒恩詔慶典所冝秩然具舉涓吉於二月己未啓鑾祗謁兩陵移蹕畿南經過州縣特諭截漕三十萬石加賑一月考察疆吏慶讓兼適東土守臣候鑾有喜賜詩褒勵賞差費盈萬紳士耆民鬗皤夾道百齡以下賚予有差迺練辰陟岱升馨告䖍膚雲潤覃嘉宴惠布陳詩第頌一如往例遂詣闕里釋奠于至聖先師翼日詣孔林酹酒盖自戊辰始勤法駕迄今八度適當聖夀八旬之期紀盛成製求諸往古未嘗有也輦路所經均用恩例蠲賦十三加滿漢營兵口粮兩月復奉特諭増直𨽻山東本年入學額名免山東因灾緩征民欠糧一百七十萬有竒慶澤叠施周浹宏􅄎香壇禱頌山呼歡吁聲動天地煌煌乎盛矣禮成旋蹕迺依嵗例仲夏初旬幸避暑山荘維時塞外諸部扎薩克與哲布遵旦巴呼圖克圖噶爾丹錫勒圖呼圖克圖雲從飈至而逺人慕徳則安南國王哈薩克各蒙古回部甘肅土司䑓灣生畨緬甸南掌各陪臣趩趩偕徠並集山荘七月己夘朔越八日以次瞻覲肆筵展慶洎駕旋届期直省文武大臣奉恩綸入京者駱驛畢㑹與在廷諸臣共上萬年夀觴臣光鼐叨陪侍從近五十年毎逢嘉㑹輒竭愚撰述功徳為獻兹復荷䝉特恩重叨卿貳徒以奉使浙學不獲趨赴丹陛與於拜舞之末而望闕慶忭不能自己伏惟聖人紹天凝命貞符可諶昔武王帯有銘曰恭則夀魯論曰仁者夀而周公述殷三宗及周文王享國久長之由皆歸之無逸誠以無逸作所乃能致恭以行其仁保民之誠凝命之本也皇上御極以來敬天法祖愛民勤政逾五紀又五載有如一日至於乾斷豫動經武緯文綏靖四和荒遐􅄎育三代以後實無比倫而猶日孜孜念用庶徵律天時以自考篤勤罔倦矣允至誠無息與貞元同運悠久無疆也臣校士之餘比事属辭謹撰頌十六章竊希詩人歌天保之義而文辭淺薄未盡萬一徒滋慚恧其辭曰天祐我清世繼維聖在昔仁皇緝熈基命守業為創六紀時乘譬猶作室堂構是營亹亹憲皇灑掃塗雘我皇受之迺増式廓方始降誕毓徳重華執中授受淵源匪餘聿修永念祖武聿䋲紀恩成堂敷言攸徴紹庭夙夜陟降在茲丕顯寳訓是儀是師無斁先典無忘國俗度身律聲稽諸實錄儗堯見羮儗舜見墻億萬斯年遹遵舊章其一維天眷徳曰其子之維聖繼天曰父事之天道隂陽無物不體禮隆大報縁以義起圓壇國南冬郊夏雩大祀春祈上辛用諏嵗舉必躬迄今八袠翼翼憢憢寅孚毖秩日至方澤母事如在六宗羣望嵗時匪懈曰晹曰雨應禱而慿帝謂無言廼嘘噏通誠至兆􅀢恒于先㡬庸以敷福庸以宣威皇武耆九維天式信億萬斯年得助思順其二肅肅清廟以祀以饗於昭在天駿烈是仰五聖宣光升恒繼照几筵著存孝慈嘉告夀皇奏假奉先時薦肹蠁懓愾如視寢膳載謁神鄉盛京製賦申䖍再三並賦神樹全韻裁詩容功為史英咸濩武共貫條理瑶牒釐正辨忠顯微若木蟠霄本枝交輝皇春帝夏時各有適先聖後聖道揆惟一念兹重負實欽大寳億萬斯年求徳承保其三亶聰我皇作民父母永言保之如哺黄口灼知所依田功攸暨躬耤劭農閲廿九次仍勑桑宫盆繅教勤題繪耕織豳雅儷陳閔雨快雪田父同課一隅告𤯝思已饑餓農給糧種征别緩蠲頒帑盈億祭粟如山國有正供史韙賜半旉天賜全古未聞見蠲漕至再蠲賦迺四分核省府輪年為第易占損益上下道光億萬斯年兆民賴慶其四易象觀民典重省方我皇師古展義習祥母易言遊聖言斯廣鸞旂涖止萬民斯仰徳大春生儀隆禮岱减賦第才久成恩例南服六廵實纉祖緒防河捍海事宏功鉅水為利害莫甚淮徐濬築咨周因創智俱浙海鹽官為塘自昔尖山鱗石先皇之績鹽倉廼西發帑増建柴石兼資屢省廼㫁成不欲速明繇敬克億萬斯年永頼帝力其五逖矣凖戎阻化西陲二聖屢戡卒用覊縻逮逹瓦齊席簒已狃部衆心離水火籲救師至兇遁格登及之執醜來獻迺霍集斯彼狡覆煽鋌走既殞二和卓木負恩肆蠢餉繇地來馬從天降回醜潰犇回朋廼䘮遂函逆首驛驛徠嚮紫閣勒勲惟曰乾貺方事之棘羣僚驚猜獨仰睿㫁衆惑終開武稱善述猷不忘逺億萬斯年靈䑓伯偃其六金川異區吐蕃遺燼始撫終戡蹂􅇖為畛䑓灣阻海有莾廼榛命相􅉨遄二䜿成禽逷彼緬甸匪戰及廸不戰廼徠嫓庥干格安南外臣興滅既奏其廢難興唯天所授懐徳畏威去逆効順因之錫封以孚入覲伊古疆索視徳大小禹實訖海武亦通道我皇體仁代天司牧帝庸耆之全畀所覆罔隔中外並育並生億萬斯年同我夀觥其七道為治本行以義方秘殿傳心堯舜禹湯性得生知學猶念典講帷嵗涖御論闡演討源洙泗至聖先師闕里親詣祖製恭依迄今八度已逮八旬六依前韻還賡歸仁韵有御製六依王化歸皇祖過闕里詩敷賴素仁有越裳之句仰瞻御繖黄雲如擁戊辰韻有御製恭依繖黄皇祖過闕里詩元御雲擁之句一杯酹酒仍勤躬奉本年有一御製詣境孔林酹酒詩杯天地之句祠牢奠楹往牒稱喟我皇繼述肇執徐嵗見聖由聖君師統兼入墻自謂今年韻有御製六依魯或應皇祖過闕里詩自謂設生引入墻之句恭言撝謙睿賛久傳日月仰均億萬斯年立極人倫其八書契既興載籍遂博羣言殊塗衷諸聖作自昔仁皇纂經垂訓我皇繼武學古日進三禮三通館局各擅丹毫裁批珥筆莫賛瓊笈琅函證今徴故更蒐遺書遂滙四庫進退百家刪修是班構閣充貯塊視酉山更繕三分詔示江浙㠑嵬鼎峙榮光斗掲兹復考文石鼓重刋竝陳大學興桓同頒藝羅千古道惟一貫億萬斯年倬章天漢其九聖固天縱抑又多能修道謂教敷訓為經嶽峙川流時至成雲珠璧循度經緯自分睿思所通遇物即付右有左宜不移而具製文計千詩成計萬元氣之行觀止同歎頒在學官儒林講斆御書鐫勒藻寖輝嶠時出百一近臣命和寸斑未窺臂汗履跛商有盤銘周及户牖纔傳數語已炙衆口懿矣我皇㡬餘㳺藝億萬斯年天人合契伊古造士皆育于學周文譽髦爰歌芃樸尊曰辟雍其東不又漢建迺三已非其舊京師有學肇于至元明政憒憒如井而眢我皇詔建旃蒙落成親臨講道中外觀聴制罔泥古冝以時措觀文成化彛倫明著麟麟黌序並興興桓勒功告成與國埒觀天方西極府州建治設為庠校師生業肄我皇聲名與天共燾億萬斯年親睦成教其十一皇帝立政敬銘負扆愽思周行用人惟已帝典稱首明生于欽揆事策力大知咸臨螢爝或効魑魅自隠獨攬元樞萬紀恒凖健法乾行運如磨旋羣僚宿列蟻隨以轉朝詢康功宵畫軍籌靡逖不灼靡􅊏不周凡百有位行令惟恭郵章萬里浹旬可通重巽時申播諸萬竅頌聲並作天籟應妙㫁惟神决聰惟直與億萬斯年悉臣悉主其十二職方辨壤錯繡分疆守土食肥持禄為常上下順承飾言難詰我皇臨察辟隠盡悉聖心毋意詐來自覺軒鏡在懸莫揜羙惡黜蠧先墨弊計本亷彰癉聲樹並濟寛嚴雨澤寸分榖價昂减以時奏報用慰省覧入疆閲政接晝錫馬戒華嫉奢沛綸矩下繄無柱木授之櫽􅀢繄無躍金洪鑪烟㶿大訓咨牧懐保實親乙巳節題經筵大學樂只君子一御論頒示各省督撫令傳示各属億萬斯年哲恵安民其十三皇久于道禮樂聿興圖列容臺器頒孔楹迺譜周經肄雅揚風底貢特磬古韻鏄鐘皇恤于刑秋讞親斟竿有祥羽林有好音皇嵗于狩塞山列仗典有教駣歌奏什榜皇臨于郊還帥再勞命服皇皇有新吹鐃皇亟于賢恩榜聨増詩有律比經明輪登皇優于老褒瑞羞耉第多賜耆宴有千叟損益百王不相襲沿億萬斯年偉業無前其十四昊曰明旦日監在上多福敬銘斂錫惟嚮極斂御製多福硯銘即推闡洪範五皇時五福用敷錫厥庶民之㫖授時賓餞徧絡四極撓甲増輪勾股周測化行自近型成安止穆穆宫闈肅若殿陛聖慈詒燕振麟趾定五代同堂五福記慶五福御製文有五代堂記伊維髫齡斆學共黽俾通六藝厲意孫敏我朝家法越軼􅉨古繼繼承承祗台不距順徴顯見信逯豚魚家旌偕老族表世居嘉吉穰穰天下之肥億萬斯年孚成九圍其十五嵗在奄茂慶齡攸届百禮備舉神人畢逮有徠翊翊列牧總戎有徠驫驫月竁扶桑朔南暨訖梯航重譯雕題卉服臚驩㗲嘖元臣奉觴天子萬夀闐駢雷呼僉曰天佑皇曰俞哉受命不易予民在懐予肩敢息憶在古稀製説言志歴載轃兹懼終始八徴耄念撰記自律無逸朝昃猶逸是毖有能謙式奉天時億萬斯年福禄永綏其十六萬夀恭紀九言詩一章一百四十韻謹序原任禮部侍郎臣錢載臣聞徳盛者福自傋仁至者夀彌昌此必至之理而自然之符欽惟我皇上法天行徤體道至誠御極以來五十五年實心實政所以和通扵天人之際而久淪浹扵臣民億兆之膈臆者至深至厚扵是天命保佑永錫純禧葢聖人之徳實生民以來未有之至徳而聖人之福乃開闢以來極盛之備福龍集庚戍恭逢八旬綏眉夀扵無疆懿普天之同慶臣夙被鴻慈備員禁近洊擢卿班癸夘之年蒙恩予告俾歸桑梓優㳺扵聖世昇平之樂臣跡逺蓬門心依雲闕用敢不辭媕鄙敬託謳吟同寸管之窺天效康衢之擊壌謹撰九言詩一章拜手稽首以獻其辭曰惟天眷聖聖徳契穹蒼聖夀八旬久道福萬方懿惟至誠式固扵純常開闢未有今兹大吉祥五十五年宵旰勤黎蒸叶暢垓泝埏氤氲協氣翔清寧合撰單厚以綿長受天之祐緐禧慶夀昌祥煙瑞靄八月玉宇涼萬年枝秀仙露垂珠嚢穥䆊稙穉丰茸穋䄫梁含甘吮滋康年樂羣生叶維時秋廵廽蹕自山荘金支秀華匼匝桂吐芳山呼虎拜冠佩羣趋蹌騎竹扶鳩童叟胥悦康四海一家敬舉萬嵗觴詠仁蹈徳悃欵由中誠叶聖人錫福徳音下巖廓月正元日詔書恩滂洋渥澤乃遍海澨山陬鄉蜎飛蝡動蒙化逰龎鴻叶熈熈春䑓之樂樂未央教養恩厚涵濡扵膠庠特命開科抜擢其俊英叶橋門黌序益振絃誦聲叶窮廬蔀屋婦子謀葢蔵皇心軫念四沛澤濊汪普蠲惟正萬姓歡餘糧瞻蒲勸穡兮望杏敦農叶十日五日靈貺調雨風叶陸壤麥熟澤國秔稻香􅅤餔酣酺忭悦䄈褐民叶猗與式孚醲化整懿綱滌瑕蕩垢江海宏包荒赦過宥罪雷雨蘇凋傷如天好生之仁邁禹湯執沖􅅤和茂為百福宗叶考冣鈘鈞賞罰秉至公叶賢否覝詧淑慝務瘅彰薫蕕斯列涇渭斯激颺羣寮匪懈萬民慶胥匡侔璉儗瑚懐瑾挺圭璋恂恂峩峩卓犖紛顒卭騶麟逰囿鳳凰鳴髙岡馮翼孝徳琅琅玉鳴鏘因公詿誤矜全道無妨範圍曲成鎔鑄獧與狂帝徳廣運匡飭扵用中叶葑菲並採茅茹其彚升叶賚奨躐級踴躍羣赴功叶推恩錫類紫誥榮邀封叶金枝玉葉毓慶自天潢展親睦族賜予惟隆崇叶十五以上大小咸率從叶鞠􅎽上夀肅肅奉瑶觥叶俱叨渥惠湛露湑瀼瀼璿蕚分輝耀日皆琳琅暨彼外藩封賞俱肅将維屏維翰稽首逺効忠叶皇仁㴻濡濃厚霑扶桑駢羅琛賮烟海來浮航輸心向化逺逮生蕃衆叶交趾緬甸面内竭𠂻腸諧南爕北鼓舞聖徳滂楛砮篠簜方物覲天閶水有挂颿陸路沛馬韁喁喁噞噞莫不來享王歸仁服教魚雁相頡頏曰惟帡幪至徳與天同叶齊祝大皇帝夀咸造庭叶中外禔福萬里奉篚筐儲祉之本宥宻仰聖躬叶夀踰古稀夙夜勵自强敷錫扵下萬㝢樂蕩平叶民風醇樸庶物茂牂牂皤髪龎眉扶杖阡陌傍彷彿偓佺員㠐相忀徉歌曼夀兮竽瑟陳浩倡夀世之民夀真不可量曽元喜見子孫厥心臧型仁講讓夜績晝蒔秧不識不知擊壤歌虞唐春風化日至適適亦忘此其恬養蒸被周八紘太和保合天衢共瞻仰叶鮐耉欣欣赴闕樂化光億人兆人咸賴一人慶禮樂陶淑孝義户相望恩綸表里綽楔猗輝煌睦親弼教崇譲以有坊有道悠久乃致此化成叶民逰華胥蕩蕩無能名叶猶日孜孜敬念乎雨晹中和建極陶鈞在隂陽是曰庥徴斯降福穰穰萬年聖主履綏萬國寧叶百榖成熟樂利蕃牛羊天人協應消息叅微茫義取洪範勅幾炳宸章聖心昭事翼翼以祗承叶緝熈典學寅畏彌嚴恭叶崇儉黜靡渾噩淳風隆叶紛華盛麗郤勿使經營叶卿尹士夫以及農工啇憲度恪守追琢金玉相維彼秀彦横經富縹緗維彼淑媛習禮飾珩璜維彼孝飬逺賈牛服箱維彼執技事上噐必良職職植植循軌以有程叶彬彬郁郁守度以自防優㳺厭飫休養際亨豐叶是訓是行潔朗鏡太清叶侯其禕而醇化掩羲黄惟河瀾恬惟海波不掦惟嶽興雲惟瀆流泱泱使者祭告持節兩驂驤百神懐柔逺道酹椒漿蓊葧葐蒀赫燡以妥祊叶五色之慶三色之矞明叶糺縵縵兮積和下上充叶玉燭均調青隴無虸蚄籽種借給優免勿取償何生不育何物不舒張行間効力有曽着裲襠亦以年老拜賜得異粻共躋仁夀偕樂諴和邦叶先疇舊徳職業其交蘉軒乎鼚乎遐邇㑹輪裳大順之情其和若球鍠叶大順之世其樂諧羽宫叶欣逄顯懿扵鑠古未嘗麟趾瑞應五代慶同堂百僚萬民騰歡洽笙簧微臣管窺蠡測徒面墻深愧無文如錦爛七襄葵忱獨抱誠懽誠恐惶延洪景運繁祉萃我皇天庥滋至億萬年無疆萬夀恭擬讚佛頌謹序平韻並集聖教序全文頌依上下兵部左侍郎臣趙鍈乾隆五十五年聖人在上八十大慶慱敷其福於時珪月波現金桂林開䴡漢霞起糺雲烟朗中地外地迥域同風而覩聖顔也仰惟彼蒼者天重以葢下儀天御宇百二神區昔聞先典積累早深以是遵前宅國神威之撥控於四方則西坤後藏來輕千里廓爾喀在後藏之外嚮化内附東謝遐區書知仰逹唐書南蠻傳有東謝蠻入朝顔師古請圖王㑹事今緬甸遣使逺呈金表并貢花象鹿門鹿耳門滅燄三苞浄影王師平䑓生番効命恊力剿捕投入年獅番復來京祝來京祝覲今釐桂海有截水濤不掦昨所不庭彌知其非驚猶昏夢未征而歸御製土爾扈特全部歸順記有曰始逆命而終徠服謂之歸降弗加征而自臣属謂之歸順安南阮光平欵闗歸誠今年復親身詣有闕恭祝祝萬夀求易冠服為從來未之盛事以及越波躡岸引領恐遲舉䄂驟馳騰幽投誠重途内附然猶心乎精一測於危㣲思難圖易兾厚物類復慮學偽而謬將未可行導知正學賢才璋序屢荷年恭上諭文以清真雅正為主今逢萬夀恩科㑹試雅化作人嫓羙菁樸而況哲智而文敏業鑑古躬詢豪翰周宣之文潛蔵西地珠礫罕探瓦砂易累孤隻掩晦石鼓文十詞類風雅然多磨滅不可辨世傳周宣王獵碣初在陳倉野中唐鄭餘慶始遷之鳳翔而失其一皇祐四年向傳師求於民間得之十鼓乃足慮莫能測既注􅆙失標識其間分對簡墨彌勞是正太學舊有岐陽石鼓字多漫漶元潘廸有釋文而周秦魏之説究紛紛未定今年正月丙申并御製石鼓所有文成十章製鼓重刻并木柵製序言定以韓昌黎之言為正舊鼓舊文置以蔽風雨外新石鼓以刻十章竝立太學以公天下惠後儒且命依所鼔刻立熱河文廟以廣文教抑八徴時省續往製之言而言子之皇上扵七十萬夀之寳御製古稀天寳繼以猶日孜孜今年復製八徴耄念之寳記備舉五福五代堂堂記以及近製讀洪範論尤承明㫖㓜小者杖者六七八十百十者得要於真愛元旦奉加上者俱萬夀恩詔自王以下覺羅十五嵗以恩賜其滿漢内外臣民男婦年過六十七十八十九十以上及百嵗者一概俱加恩分别賞賚有差是故承乾受釐邁古陵今也前以清文循譯内典慙總習業深謝訛拙奉譯蔵㫖以充國書經臣職清字經館提調有年而方晈㭊譬況部分篋䇿足㧞汙穢之墜全品類之善則一人之福詎非西土之善縁至教耶爰成讚言庸為稱慶道髙徳崇佛日當空三千塵刼光照流通端凝法象貞若長松垂慈大地無所不容先天顯化無比無雙自西而東及於羣邦本生之上勝地之遺承之而遵廣法之基其心之心之深其道之歸聞乎奘將爾雅釋文秦晋謂大為奘孫樊作将知夫細㣲而空而寂而浄而虚露流雨挹晨夕相於由法之門濟庸若愚寒霜夏暑不忍鄙夫雖蠢然者知得所栖有生有欲無惑無迷風教流形其被者皆窮彼世宙常攝於懐民生以足道境以開而靈而蠢其進之哉賢故出閑愚故迷津空明月出真而求真無顯無隱無賾無紛非褒空寂口訓經文乍馳於途未遊於門窮神窮数象窺於言疑㫖奥趣忽洞其源於無窮理於有求端智珠潔水心鏡空山俗師鄙論謬而知還法像遐顯大業以宣四方四域三萬六千凡有託者縁途善遷乘茲妙際力於福田或迷而悟或愚而翹道味能飡法宇斯超雪峰七林則布其條蓮川蓮葉則􅅤其苞蹤飛跡逹仰道於髙雲泫墜露雨渌分波莫不共識方昇之華仙儀法曲異卉竒花大乘之運施之也長拯乎罪惡致乎善良陽昇隂濁莫不常生遵茲無極以凝以貞唯天之教形乎能形慈悲之教能乎不能窮覆與載資之而興性情之所廣朗是慿湛然而處時焉而逰能識所欲能因所求木火水濕土而生金寒沿暑替陽陽隂隂形色質像妙契則心形端影正萬有其􅅤而倫而物臻於飛潛以潤成菀化莫不沾鷲嶺百世永逺是瞻三乗三教廣益塵凡八旬萬夀盛典卷九十六
