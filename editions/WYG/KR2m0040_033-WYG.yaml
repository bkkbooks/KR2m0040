body:
  text: 盛事九賜科第職銜一臣等謹按記曰三代盛王未有遺年者凡在夀耉之倫必有養恬之澤矧夫裦然充賦扶杖而觀上國之光斯尤躋一世於仁夀者推恩所必及已我國家教澤涵濡淪肌浹髓皇上甄陶羣品加惠耆儒每於貢舉之期屢降旌揚之典故夫及時効用者恒不乏人至於年齒彌髙神明益壯在州里為典型在庠校為先進考之於古亦有詔耆艾絶倫各舉所知者復又試太學年六十以上除郎中太子舍人至王家郎郡國文學吏者盖僅偶舉一行人數亦寥寥無㡬今自乾隆四十五年以後或百嵗而翠華再迓或登科而花甲重週内自綸扉外暨閩疆滇徼莫不普錫夀祺共邀闓澤其餘八旬九旬者每南宫彚奏率多至三四十人遇恩㫖大挑兼逮六七十嵗名皆特賜冠慶同彈榮以甲科寵以華秩視漢唐來所謂版授之官五老之牓有非可同年語者在諸人皓首一經幸逢盛際初非夢想所敢期而惠罔弗周恩加無已應試者固償膺秩之夙願赴挑者復軫待榜之需時又按其年嵗賜之幣帛既沐引年之典兼䝉稽古之榮斯真夀考作人之盛皇極錫福之徵歟謹比次詳誌按科臚敘以例其餘俾千萬世而下知多士彚征之吉大年保艾之庥皆聖皇福祚洪長之所被焉若夫慶牓六開彌光文治謹分載恩賚門乾隆四十五年賜迎鑾百嵗舉人郭鍾岳進士乾隆四十五年三月初六日奉上諭據三寳奏上年福建省欽賜舉人郭鍾岳年百嵗又陳應騰年八十八嵗宋耀年八十五嵗該舉人等情􅎋感激現由福建來至浙省謝恩等語郭鍾岳等以海隅寒畯年臻大至茲因翠華南極逺涉迎鑾各賞御書墨刻緞二疋荷包一對郭鍾岳夀躋百齡尤為熙朝人瑞著加恩賞給進士以示優眷耆儒至意乾隆五十三年賜重赴鹿鳴宴前四川知縣賽嶼進士乾隆五十三年八月初十日奉上諭據譚尚忠奏雲南石屏州舉人賽嶼係雍正己酉科鄉試中式曽任四川知縣現年九十二嵗本年又屆舉行己酉科鄉試之期請重赴鹿鳴筵宴等語賽嶼係前己酉科中式舉人今重赴己酉科鹿鳴筵宴洵屬儒林盛事允宜特沛殊恩用彰昇平人瑞賽嶼著賞給進士並著俟年屆百嵗時該省督撫再行奏聞朕降恩㫖以示夀世作人嘉恵耆齡至意乾隆五十五年賜大學士嵇璜重赴恩榮宴乾隆五十五年四月初九日奉上諭大學士嵇璜係雍正庚戌科進士服官有年精神矍鑠茲當庚戌㑹試已屆週甲之期與新進士先後同年實係人文盛事著照從前史貽直之例重預恩榮筵宴以為藝林佳話御製大學士嵇璜重赴庚戍科恩榮宴詩以賜之木天希遇兩恩榮戍茂前庚逮後庚祖節昔同唐真杲康熙初年閩藩耿精忠謀逆時嵇璜之祖永仁在浙閩總督范承謨幕中一同盡節平逆後優加褒贈擬之顔杲卿真卿尤為過之盖杲卿真卿食禄服官自當致命遂志若嵇永仁僅為幕友即全身逺害亦為責備所不及乃竟能矢志不移從容就義深堪嘉憫其子曽筠及爽孫璜兩世居官至大學士天之報施忠義洵為不身階今似漢韋平可知襲慶縁脩徳所喜力行不附名黄閣重逢錫褒什進士𫝊臚後例賜恩榮宴􅀙從大學士史貽直為康熙庚辰進士至乾隆庚辰科尚在朝因重赴恩榮宴曽賜什以彰人瑞今嵇璜雍正庚戌進士至今年庚戌科亦重赴是宴實為縉紳希遇依例賜詩以為綸扉佳話云絲綸盛事紀皇清臣嵇璜奏為恭謝天恩事本月二十六日臣遵恩諭前赴禮部預宴並望闕叩頭行禮恭謝天恩伏念臣忝竊詞科欣依夀㝢荷恩綸之特沛承宸藻之新頒捧奎文而華衮逾榮叨錫宴而儒紳増忭仰作人於盛世廿六科蕋榜恭逢偕多士以登筵六十載瓊林再赴花簪白髪憶舊侣之都稀餅啖紅綾覺後生之可畏文綺獲邀恩賚更逮章身素絲勉企清修同欣拜賜徵瀛洲之故事前賢及繼三人陪鴈塔之新題榮遇恰掄八袠晨星猶綴依瑞日之光華碩果僅存託大椿之廣䕃誠傾葵霍敬長頌夫升恒勉竭駑駘愧難酬乎髙厚臣實深感激榮幸之至謹繕摺恭謝天恩謹奏臣嵇璜為恭奏為恭謝天恩事本月十四日䝉恩賜御製詩一章臣謹叩頭祗領伏念臣質本庸愚文尤荒陋㓜而未學既倖竊夫科名老矣無能復備叨夫恩遇閲人材之輩出逾廿六科感嵗序之隙過已八十載恭逢夀宇宏開之盛㑹恰值多士登進之昌期特沛温綸俾陪芳宴載頒宸藻重沐深仁褒祖節之貽休勉思脩徳朂臣心之崇實慎無近名帝歌作而韶鈞鳴寳翰揮而龍虎躍訓詞深厚誦萬徧而不停循省悚惶銘五中其曷罄聳觀僚寀欽為希世之珍敬示子孫奉作𫝊家之寳荷生成之至意長頌升恒殫衰拙之㣲忱難酬髙厚臣不勝榮幸感激之至謹繕摺恭謝天恩謹奏奉㫖知道了乾隆四十五年庚子恩科㑹試賜髙年應試舉人李實生等三十一名翰林院檢討國子監學正等銜有差乾隆四十五年五月初五日奉上諭本年恩科㑹試各省士子雲集觀光其中龎眉皓首挾䇿偕來者多至三十餘人實為熙朝盛事宜加渥澤用廣作人除石震萬邦獻朱鏡已加恩賞給國子監學正銜外所有年八十以上之李實生劉克柔王熊應馬士榮黄鼐係鄉試中式舉人著加恩賞給翰林院檢討銜其劉耄學郭元標馮出佐劉夢花李崶索止任張廣基張純仁李蘧王景績康銑李天民許祖健李欽元謝士豪徐常淳李作朋董斌李成章彦俱係上年鄉試未經中式欽賜舉人著與年七十以上之呉兆魁周仲連宋瑞孫凌雲毛肇一體加恩賞給國子監學正銜俾耆儒膺秩各遂夙願以彰推恩引年之至意乾隆四十六年辛丑科㑹試賜髙年應試及赴挑舉人吳球等七十三名光禄寺署正等銜有差乾隆四十六年四月十二日尚書額駙公福隆安等奏乾隆三十一年大挑舉人奉有諭㫖舉人内年八十以上者賞給六品京銜七十以上者賞給七品京銜六十以上及雖未及六十而騐係實屬衰頽者賞給八品京銜等因經吏部酌議六品内都察院都事經歴等官及七品八品之大理寺評事太常寺博士國子監學正學錄各職銜按其年嵗分别賞給職銜奉㫖允准在案嗣于三十七年大挑經派出揀選之王大臣等奏請將年老舉人照例賞給京銜亦在案此次錢載所奏本年㑹試内有年老應試三場完竣者三十一名相應請㫖循照上兩屆之例交與吏部分别年嵗照例辦理謹奏乾隆四十六年四月十九日奉㫖是吏部謹奏乾隆三十一年三月三十日奉上諭前因歴科舉人銓選壅滯特命揀選分别錄用廣為疏通其年齒衰邁難以服官任事者並令查明奏請量予職銜以慰其寒窗攻苦之志今據王大臣等奏各省舉人内騐㸔及自呈實在年邁龍鍾不堪民牧并不能司鐸共六十餘名此内八十以上者著加恩賞給六品京銜七十以上者著賞給七品京銜及雖未及六十而騐係實屬衰頹者著賞給八品京銜俾頹齡寒畯均沐殊榮以副朕格外優恤至意欽此當經臣部議定于六品内酌定都察院都事經歴大理寺寺丞光禄寺署正七品内酌定大理寺評事太常寺博士國子監監丞中書科中書八品内酌定國子監學正學録翰林院典簿國子監典簿以上數項作為賞給舉人職銜等因具奏奉㫖知道了欽此欽遵辦理續于三十七年壬辰科舉人大挑亦遵照辦理各在案今乾隆四十六年辛丑科經尚書額駙公臣福隆安等奏准將知貢舉錢載查明年老三塲完竣之舉人吳球等三十一名交與臣部照例辦理并現在王大臣挑選後臣部查明六十以上情願得受京銜之馮綱等三十八名又年未及六十自揣精力已衰情願得受京銜之馬元文等四名共七十三名臣部俱遵照上屆之例按其年嵗分别掣與京銜俾得叨沐殊榮臣等謹将該舉人吳球等掣得京銜開列清單恭呈御覽為此謹奏乾隆四十六年五月十七日奉㫖依議年九十以上者二人吳球江蘇人光禄寺署正楊最徳廣東人都察院都事年八十以上者二十一人髙本亮順天人都察院經歴張廣基順天人都察院都事孟盼郭青塏直𨽻人都察院經厯韓庚申杜子甫直𨽻人都察院都事梁丙瑨鄭其徳直𨽻人大理寺寺丞李成李允實直𨽻人光禄寺署正張龍光河南人都察院經歴杜琦江蘇人都察院察厯劉行芳江蘇人光禄寺署正汪日强安徽人大理寺寺丞鄭忠亮鄭定猷江西人大理寺寺丞何朝福建人都察院經厯沈聚奎湖北人光禄寺署熊世焱湖南人都察院都事朱瑞湖南人大理寺寺丞郭元標陜西人光禄寺署年七十以上者八人刁應龍直𨽻人大理寺評事史注山西人國子監監丞宋瑞山西人中書科中書程篤慶河南人楊方亭江西人太常寺博士萬邦獻湖北人中書科中書譚起韜廣東人大理寺評事李正廣東人國子監監丞年六十以上及未及六十者共四十二人焦天淵卞榮泗直𨽻人國子監學正王夢麟直𨽻人國子監典簿邢羽文山東人翰林院典簿王作喆山東人國子監典簿王普文山西人國子監學正楊朋楹山西人國子監學録王朝士山西人翰林院典簿潘鯤化栗卓河南人國子監學正錢九府河南人國子監學錄何棫河南人翰林院典簿員映第河南人國子監典簿徐葉榆江蘇國子學正曹柏齡馬元文吳鎮施文淵江蘇人翰林院典簿徐馨江蘇人國子監典簿吳隆安徽人翰林院典簿湯炳誥江西人國子監學正吳國棟胡熙載江西人國子監學録陳元澄江西人翰林院典簿董達著王喆浙江人國子監學録孫文瀚余炳浙江人翰林院典簿樓卜瀍楊維信浙江人國子監典簿莊膺瑞福建人國子監學錄龔廷耀福建人國子監典簿黄之顯湖北人國子監典簿周旋吉陜西人國子監學正鞏締疆甘肅人國子監典簿鄧肇翰李世叅廣東人國子監學正龎錫澍鄭翼亭廣東人國子監學録蘇汝汪廣西人國子監學正蔣埰廣西人國子監學錄馮綱廣西人國子監典簿乾隆四十九年賜迎鑾一百四嵗進士郭鍾岳國子監司業銜并御製詩章以賜乾隆四十九年三月十四日奉上諭福建欽賜進士郭鍾岳年屆一百四嵗茲來浙迎鑾皓首龎眉允稱人瑞著加恩賞給國子監司業職銜以示朕嘉恵期頤至意御製福建一百四嵗老人郭鍾岳自閩來迎加恩賜予國子監司業銜詩以賜之登袠夀百四來朝程二千誠云天下老疑是地行仙忱悃足嘉矣精神尚躍然恩榮司業秩酬爾矻芸編乾隆四十九年甲辰科㑹試賜髙年應試舉人潘峩等二十一名都察院都事等銜有差吏部謹奏乾隆四十九年閏三月二十九日知貢舉莊存與奏本年甲辰科㑹試舉子内有老年應試者掲曉後未經中式臣案查文册年九十嵗者一名八十嵗以上者二十名七十嵗以上者五名共計二十六名皆係鼓舞觀光三塲完竣實為熙朝盛事臣伏查數科以來年老士子未經中式者鄉試由監臨查奏㑹試由知貢舉查奏謹開列清單恭呈御覽本月二十四日奉上諭莊存與奏本年㑹試各省舉人年屆九十者一名八十以上者二十名七十以上者五名皆三塲完竣未經中式等語此次老年舉子應試者至二十六名之多皆年躋耄耋志切觀光允為昇平人瑞著交吏部查照向例分别賞給京銜以示朕引年勸學嘉恵士林之至意摺併發欽此内除八十以上之張廣基李成梁丙瑨鄭其徳等四名已于四十六年辛丑科㑹試後奏明賞給六品職銜無可再加又七十嵗以上之萬邦獻一名四十六年辛丑科㑹試後年在七十以上奏明賞給七品京銜今該舉人年嵗仍止七十以上亦毋庸再行加銜外查八十嵗以上之索止任馮出佐於四十五年庚子科奉㫖賞給國子監學正八品京銜又年屆七十之陳元澄於辛丑科大挑後呈請願就京銜彼時年止六十七嵗經臣部奏明賞給八品京銜今既奉恩㫖交部查照向例分别賞給京銜所有索止任馮