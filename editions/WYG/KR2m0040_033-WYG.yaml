先孫公輔李垠閻輔輝劉洪文王體亨鄭學洙董作礪劉䋲準閔之琰馮全修魯孟朱光章歐陽席梧貴王宗逺趙泉郭偉勣孫元麟李如山師尚友胡禮泉張啟梧李文沛涂文魁宣鵬劉鴻徐日暄葉逢年姜球張諤涂宗詔朱有榮吕樸季如璧趙瑞嵐吴企哲孫有誦郭長源胡東安傅錫信王克立馬銘張進履于令芳趙敦典俱著賞給翰林院檢討銜七十嵗以上之董繼允王志逺楊士元朱孟份蔡綬劉泰孫有謐單備孫保亨馮起鳳錢柏汪元棟丁釗朱浩賀錫冕張正倫陶煒江永譽程謙俱著賞國子監學正銜其九十以上者各加賞緞三疋八十以上者各加賞緞二疋七十以上者各加賞緞一疋並年在九十八十七十以上前經賞給職銜之段三連等七名亦著一體分别賞給緞疋以示朕嘉恵耆儒仁夀作人之至意禮部謹奏為據情代奏恭謝天恩事乾隆四十五年五月初五日奉上諭本年恩科㑹試各省士子雲集觀光其中龎眉皓首挾策偕來者多至三十餘人宜加渥澤用廣作人所有年八十以上之李實生等係鄉試中式舉人著加恩賞給翰林院檢討銜其劉耄學等俱係上年鄉試未經中式欽賜舉人著與年七十以上之吳兆魁等一體加恩賞給國子監學正欽欽此臣等𫝊集各該員親身到部宣示恩㫖各該員跪聆之下感􅈭叩首隨據李實生等呈稱竊實生等早嵗觀光長年沐化或屢下南宫之第未許㸔花或新霑北闕之恩儼同折桂庸材薄植原非玉筍之班皓首龎眉敢擬瓊林之選迺荷引年之曠典特邀賜爵之殊榮惟聖作人惟皇錫福婆娑鶴算盍簮符利用之占次第鵷行分秩見因材之篤紀大年於絳縣合二千四百十嵗有竒續特榜於黄扉在一百五十八名而外寵方承而驚非分感至極而拙名言凡臣等夢想之不敢期實自古科名所未嘗有從此祥開粉署花磚之仙晷彌長瑞靄黌宫璧水之恩波愈渥奮三千之雲路請先多士而鳴傾一寸之葵心願祝聖人之夀所有感激下忱伏乞據情轉奏等情前來臣等理合據情代奏並率領該員等詣圓明園宫門叩首恭謝天恩謹奏奉㫖知道了八旬萬夀盛典卷三十三
