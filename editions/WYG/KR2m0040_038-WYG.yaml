body:
  text: 盛事十四夀民夀婦四乾隆五十二年旌表夀民魏懐朴夀婦范氏等二十人禮部謹題為題請旌表事據山東廵撫明興疏稱太和保合如天之大徳曰生純嘏緝熙薄海之羣黎在宥茲有鉅舒縣夀民魏懐朴現年一百三歲昌黎縣夀民劉富齡現年一百五歲家傳孝友業守農桑勤作息于西疇永保桑榆之景錫便蕃于北闕用希綸綍之輝臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議魏懐朴劉富齡俱著加恩賞給上用縀一疋銀十兩又題為循例請旌事據江蘇廵撫閔鄂元疏稱太和敷育物之仁因材而篤至治廣斟元之化佑善維均茲有宿遷縣夀婦張范氏現年一百三歲武進縣夀婦范姜氏儀徴縣夀婦程葉氏俱現年一百歲婦徳無愆大年彌茂禮法克循于内則嵫景方長褒旌允合于彛章國恩宜荷臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議范氏著加恩賞上用用縀一疋銀十兩又題為題請旌表事據安徽廵撫書麟疏稱彛倫攸叙箕疇徴錫福之長夀耉無遺壼範表順貞之吉茲有蹟溪縣夀婦章程氏銅陵縣夀婦陳余氏各現年一百歲温㳟率徳孝敬宜家引榆景之舒長鴻仁乆被享松齡之强徤鳯綍宜褒臣等查興定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議又題為題請旌表事據江西廵撫何裕城奏稱徳興縣耆民劉永安現年一百歲服疇敦安土之仁克延耄齒好徳㑹遵王之極用迓蕃禧瑞協民彛恩由天錫奉上諭劉永安年享期頥精神矍鑠洵屬昇平人瑞所有應行建坊旌表之處著該部照例辦理欽此臣部查與定例相符應行令該撫轉飭該地方官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據江西廵撫何裕城奏稱聖世廣施生之徳惠錫無疆熙朝崇恬養之仁叙倫有典茲有新昌縣夀婦張毛氏現年一百一歲臨川縣夀婦傅周氏現年一百歲思柔恊順眉夀鍾祥鶴添百歲之籌家多餘慶人望三霄之澤國有稠恩臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議毛氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據福建廵撫徐嗣曾疏稱秉籙陳樞馨徳隆于䆳古循機提象眉夀及於黎元茲有侯官縣夀婦陳王氏現年一百二歲龍溪縣夀婦楊甘氏現年一百一歲武平縣夀婦李饒氏現年一百歲婦道克敦母儀足式階庭列秀用昭式榖之祥閭里増輝宜降如綸之寵臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議王氏甘氏俱著加恩賞給上用縀一疋銀十兩又題為題請旌表事據湖南廵撫浦霖奏稱仁懐茂對百昌咸遂其生蕃祉駢臻五福先徴曰夀茲有善化縣夀民寗士尚現年一百歲性秉淳良居安作息析薪有子已逾杖國之年貽榖多孫共守力田之訓洵稱上瑞宜荷殊恩奉上諭寗士尚夀享期頥精神矍鑠洵屬昇平人瑞所有應行建坊旌表之處著該部察例具題欽此臣等查與定例相符應請官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為請旌表事據湖南廵撫浦霖奏稱我皇上徳備中和治隆化育萃羣生於在宥人殷華祝之三茂純嘏于緝熙道叶箕疇之五惟聖世咸登於仁夀斯編氓並慶夫遐齡茲有龍陽縣夀民萬銘現年一百一歲秉性慈祥持身端慤服疇力穡沭三朝雨露之恩食徳飲和撫四代孫曽之慶允協鄉評於月旦宜邀寵錫于天慈奉上諭萬銘年逾期頥孫曽饒膝洵為昇平人瑞所有應得建坊旌表及加恩賞賚之處著該部照例辦理欽此臣部查與定例相符應由内務府支領縀一疋銀十兩轉給祗領仍官給建坊銀三十兩並昇平人瑞字様奉㫖依議萬銘着加恩賞給上用縀一疋銀十兩又題為題請旌表事據四川總督保寧疏稱萬年昭景祚之庥恵孚有象九叙正厚生之徳怙冐無疆茲有三台縣夀婦李陶氏現年一百二歲内則夙嫻令儀久著婦順叶安貞之吉徳履惟恒天髙宏覆育之仁恩施有典臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議陶氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據廣東廵撫圖薩布疏稱吉事有祥保合著延洪之慶徳音是茂廸康徴從又之庥茲有髙要縣夀民張景閑現年一百歲性秉淳良躬型二讓詠優游于化日耕鑿胥怙廣夀愷于熙朝旌揚有典臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據兩廣縂督兼署廣東廵撫孫士毅疏稱容保無疆夀榖逺周于嶺海惠孚元吉斂敷並逮于閨幃兹有南海縣夀婦麥何氏現年一百一歲持躬淑慎賦性幽閒事舅姑而菽水承歡廸孫子而箕裘紹慶久沐皇仁之恬養宜邀聖世之褒旌臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議何氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據雲南廵撫譚尚忠奏稱虞庠引飬經垂尚齒之文魯泮來游頌叶介眉之慶惟一人膺萬年之慶祚斯羣黎臻百歲之稀齡茲有浪穹縣生員施光烈現年一百歲賦性醇和持躬謹飭際重熙之歲月椿樹長榮撫奕葉之孫曽蘭階並茂洵屬昌時上瑞宜邀盛典榮施奉上諭施光烈夀至百齡精神矍鑠洵屬昇平人瑞其應行建坊旌表之處著該部照例具題欽此臣等查與定例相符應請官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據貴州廵撫李慶棻疏稱盛世之徴仁則夀徳無逺而不周聖人之志老者安恩靡賤而弗逮茲有畢節縣夀婦盖傅氏現年一百歲温柔秉質榖似貽祥科第聫綿並擅孫曽之秀閨門雍穆允推禮法之宗慶協昌辰旌符令甲臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議乾隆五十三年旌表夀民岳壯玉夀婦張氏等十八人禮部謹題為題請旌表事據直𨽻總督劉峩疏稱百祥基作善瑞首黄圗九功叙厚生福敷丹扆茲有静海縣民岳壯玉現年一百二歳有年有幹近依就日之光不識不知乆迪從風之化欣逢夀世宜表徳門臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議岳壯玉著加恩賞給上用縀一疋銀十兩又題為請㫖事據山東廵撫覺羅長麟奏齊東縣民王雲漢現年一百一歲賦性樸誠持躬端謹孫曽繞膝耕讀𫝊家荷聖朝休養之仁應盛世平康之福欣躋上夀宜荷殊恩奉上諭王雲漢夀逾期頥精神矍鑠允為昇平人瑞所有應行加恩賞賚及建坊旌表之處著該部察例具題欽此應行文該撫轉飭地方官給建坊銀三十兩並昇平人瑞字様其加恩賞給縀疋銀兩由内務府支領轉給奉㫖依議王雲漢著加恩賞給上用縀一疋銀十兩又題為遵㫖旌表事據山東廵撫覺羅長麟奏恩縣夀民周經現年一百三歲𫝊家忠厚賦性淳和沐雨露于百年勤安稼穡撫孫曽于四代慶衍箕裘仰籲恩綸用昭人瑞奉上諭周經年越期頥精神矍鑠洵為昇平人瑞所有應行旌表及賞給縀疋銀兩之處著該部照例具題以示優奬髙年至意摺併發欽此臣部查與定例相符應由内務府支領縀一疋銀十兩轉給祗領仍官給建坊銀三十兩並昇平人瑞字様奉㫖依議周經著加恩賞給上用縀一疋銀十兩又題為循例請旌事據山東廵撫覺羅長麟疏稱澤普春臺物正太和之性仁周蔀屋家餘積善之祥茲有汶上縣夀婦胡張氏現年一百五歲習禮無違持躬允淑洵屬閨門之懿範益彰聖世之庥徴宜沐旌揚以光貞夀臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議張氏著加恩賞給上用縀一疋銀十兩又題為循例請旌事據江蘇廵撫閔鶚元疏稱澤被生生秩養重百年之典恩推老老引恬同一視之仁茲有長洲縣夀婦呉周氏現年一百歲通州夀婦陳施氏現年一百一歲徳性幽貞精神強固咸歌燕喜綵衣繞膝下之娯未藉鳩扶彤管紀人間之瑞隆施宜渥鉅典允昭臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議施氏著加恩賞給上用縀一疋銀十兩又題為遵例請旌事據陞任安徽廵撫書麟疏稱作人宏化閭閻徴愷悌之庥育物推仁閨閫荷慈祥之福茲有鳯陽縣夀婦年王氏現年一百一歲黄髪康强青年節操奉翁姑以孝敬課孫子而恩勤欣承化日之舒長並荷仁天之怙冒宜邀綸綍用表期頤臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議王氏著加恩賞給上用縀一疋銀十兩又題為遵㫖旌表事據江西廵撫何裕城奏萬年縣夀民洪元芳現年一百歲素行醇良居心忠厚服先疇于禹甸性恊敦仁歌擊壤于堯衢居惟順則洵屬熙朝上瑞宜邀盛典榮褒奉上諭萬年縣夀民洪元芳夀至百齡精神矍鑠洵屬昇平人瑞其應行建坊旌表之處著該部照例具題欽此臣等核與定例相符應遵㫖准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據浙江廵撫覺羅琅玕奏平陽縣民鄭士洪現年一百三歲品行端方精神矍鑠孫曾四代孝友一家曽邀粟布之恩宜沛旌揚之典奉上諭鄭士洪夀逾百齡精神強健實為昇平人瑞所有應行旌表及賞給銀兩縀疋之處著該部照例具題欽此臣等核與定例相符應由内務府支領縀一疋銀十兩轉給祗領仍令官給建坊銀三十兩並昇平人瑞字様奉㫖依議鄭士洪著加恩賞給上用縀一疋銀十兩又題為題請旌表事據福建廵撫徐嗣曽疏稱永福縣民鄢道具現年一百歲福清縣民潘月三現年一百一歲又莆田縣夀婦游朱氏現年一百二歲上杭縣夀婦郭莫氏現年一百歳或賦性温良或居家孝敬喜門庭之多吉繞膝同歡望宅里之非遥介眉承慶洵稱瑞事宜沐恩光臣等查與定例相符應准其旌表各給建坊銀三十兩並給與昇平人瑞及貞夀之門各字様奉㫖依議潘月三朱氏著加恩賞給上用縀一疋銀十兩又題為請㫖旌表事據陜西廵撫覺羅巴延三奏稱鄠縣耆民萬世澤現年一百歲素行淳良精神矍鑠忠信交推于十室仁里鍾祥生成乆荷于三朝康衢食徳允恊旌揚之典宜膺綸綍之恩奉上諭鄠縣民萬世澤夀屆期頤精神矍鑠實為昇平人瑞所有應行各事宜著該部照例具題欽此臣等查與旌表之例相符應請官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為請㫖旌表事據暫署陜甘總督勒保奏稱伏羗縣夀婦李謝氏現年一百二歲朝邑縣夀婦井孝氏鄠縣夀婦李石氏各現年一百一歲賦性幽貞持躬淑慎鶴籌紀歲壺中之日月方長鳩杖含飴膝下之孫曽並茂克諧燕譽宜荷龍光臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議謝氏李氏石氏俱著加恩賞給上用縀一疋銀十兩又題為題請旌表事據廣東廵撫圖薩布奏髙要縣民朱鶴年現年一百二歲秉性敦龎居心忠厚四代之孫曽並繞慶集􅅾門九重之粟帛頻頒榮𫝊梓里既合請旌之典宜隆羞耉之文奉上諭髙要縣耆民朱鶴年年逾百齡孫曽繞膝洵屬昇平人瑞所有應行建坊旌表之處著該部照例具題欽此臣等查與定例相符應請官給建坊銀三十兩並昇平人瑞字様奉㫖依議朱鶴年著加恩賞給上用縀一疋銀十兩又題為請㫖旌表事據廣東廵撫圖薩布奏新安縣夀婦廖李氏現年一百二歲賦性柔嘉持躬淑慎愛景駐壺中之日蘐草増榮恩輝鍾嶺外之祥松姿益茂閨中甲子既溢期頤天上􅁝綸宜彰貞夀臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議李氏著加恩賞給上用縀一疋銀十兩旌賞布魯特一百六歲夀婦並伊子畢班璧特賜戴藍翎伊犁將軍保寧等奏為請㫖事茲有雅薩克部落布嚕特畢班璧特等九人來至伊犁叩謝天恩後畢班璧特復向臣等靣禀伊母今年一百六歲身體健壮尚䏻乗馬因係婦女不便前赴伊犁令畢班璧特躬詣將軍叅贊處禀明伊母現在㳺牧地方㳟祝大皇帝萬夀無疆等語臣等看得畢班壁特言語真誠禮儀㳟順詢之衆布嚕特等僉稱畢班璧特之母今年實係一百六歲此皆我皇上徳洋恩普夀考作人之所致除臣等倍加賞賫外為此謹奏奉上諭據保寧等奏稱布嚕特畢班璧特伊母今年一百六歲尚屬壯健感激天恩㳟祝萬夀令伊禀知等語布嚕特畢班璧特之母現年一百六歲精神矍鑠西域逺徼共沐昇平上瑞朕心深為欣慰著施恩賞給大縀二疋貂皮六張伊子前來具稟禮儀㳟順亦屬可嘉並著賞給藍翎以示朕優奬髙年無間内外至意御製伊犁將軍保寧奏布嚕特夀婦一百六歲既賜之貂帛並詩以紀事耕牧伊犁卅載仍自甲戌平定伊犁後二萬餘里咸安耕牧迄今三十餘年世際純熙祥登仁壽茲據伊犁將軍保寧奏布嚕特畢班璧特之母今年一百六歳昇平人瑞逺邇胥徵深為欣慰外疆欣報百年登祝釐乃以遣子告獲健還䏻遇馬乗保寧並奏畢班璧特稱伊母身體健壯尚䏻乗馬以婦女不䏻前赴伊犁遣子詣將軍處稟明伊在㳺牧地方㳟祝萬夀等語因加恩賜大縀二疋貂皮六張伊子前來具稟禮儀㳟順亦属可嘉並賞給藍翎以示優奬髙年無間内外至意貂幣用頒貞夀奬干戈早戢禮儀興深惟初念未期者保衆惟增業與兢八旬萬夀盛典卷三十八
