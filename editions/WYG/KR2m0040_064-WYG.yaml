  text: 欽定四庫全書八旬萬夀盛典卷六十四恩賚三本年恩詔三詔賜年老旗兵及内扎薩克之䝉古老人等銀兩有差
  hash: sha256:d32a407151332505892332c4c61080f3eb2d9190d7d945461f49416bf394d522
