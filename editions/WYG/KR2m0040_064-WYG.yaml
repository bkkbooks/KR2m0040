body:
  text: 戶部議得恩詔内開八旗滿洲蒙古漢軍兵丁及内扎薩克喀爾喀等蒙古年七十八十九十以上者分别賞賚至百嵗者題明旌表並加賞大緞一疋銀十兩一欵酌議得八旗滿洲䝉古漢軍兵丁年七十以上者每名賞銀三兩八十以上者每名賞銀五兩九十以上者每名賞銀八兩百嵗者題明給與坊銀並遵照加賞大緞一疋銀十兩其扎薩克等䝉古年七十八十九十以上人等均照八旗之例賞給至百嵗者䝉古地方向無建坊之例酌議賞銀十五兩相應行文各將軍都統等衙門照例查明賞給造冊具題核銷八旗滿洲蒙古漢軍兵丁年七十以上者一千一百九十二名八十以上者一百五十名内務府包衣三旗兵丁年七十以上者一千二百八十一名八十以上者二百十三名九十以上者十名共賞銀七千三百十四兩盛京駐防兵丁年七十以上者五十名八十以上者八名内務府所屬兵丁年七十以上者十六名共賞銀二百三十八兩吉林駐防兵丁年七十以上者二十六名八十以上者十名共賞銀一百二十八兩黒龍江駐防兵丁年七十以上者五十七名八十以上者一名共賞銀一百七十六兩察哈爾駐防兵丁年七十以上者九十四名八十以上者九名共賞銀二百八十二兩達布遜諾爾牧羣兵丁年七十以上者四十二名八十以上者一名達里岡崖牧羣兵丁年七十以上者十四名八十以上者三名共賞銀一百八十八兩内務府三旗牧羣兵丁年七十以上者四十四名左右兩翼兵丁年七十以上者七名共賞銀一百五十三兩伊犁駐防兵丁年七十以上者九十三名八十以上者十九名錫伯部落兵丁年七十以上者三名索倫部落兵丁年七十以上者十四名八十以上者一名恵逺城兵丁年七十以上者二十七名八十以上者五名九十以上者一名共賞銀五百四十四兩烏嚕木齊駐防兵丁年七十以上者七十一名八十以上者七名共賞銀二百四十八兩西安駐防兵丁年七十以上者五十九名八十以上者九名共賞銀二百二十二兩寧夏駐防兵丁年七十以上者二十四名八十以上者四名凉州駐防兵丁年七十以上者十五名莊浪駐防兵丁年七十以上者一名巴里坤駐防兵丁年七十以上者十一名八十以上者七名古城駐防兵丁年七十以上者三名吐魯畨駐防兵丁年七十以上者七名八十以上者一名共賞銀二百四十三兩綏逺城駐防兵丁年七十以上者二十九名八十以上者三名右衛駐防兵丁年七十以上者三名共賞銀一百十一兩成都駐防兵丁年七十以上者十六名八十以上者二名共賞銀五十八兩荆州駐防兵丁年七十以上者八名共賞銀二十四兩江寧京口駐防兵丁年七十以上者一百十一名八十以上者十名共賞銀三百八十三兩杭州駐防兵丁年七十以上者二十五名八十以上者五名乍浦駐防兵丁年七十以上者六名八十以上者二名共賞銀一百二十八兩青州徳州駐防兵丁年七十以上者二十六名八十以上者四名共賞銀九十八兩廣州駐防兵丁年七十以上者四名共賞銀十二兩科爾沁親王諾爾布林沁等七旗年七十以上者兵丁九百三十九名八十以上者兵丁一百十三名九十以上者兵丁四名共賞銀三千四百十四兩科爾沁郡王羅卜藏占三等六旗年七十以上者兵丁一千七百七十一名八十以上者兵丁一百五十一名九十以上者兵丁四名共賞銀六千一百兩科爾沁郡王旺札爾多爾濟等七旗年七十以上者兵丁一千七百二十一名八十以上者兵丁一百八十五名九十以上者兵丁七名共賞銀六千一百四十四兩霍齊特郡王敏珠爾多爾濟等六旗年七十以上者兵丁一千五百零五名八十以上者兵丁一百六十七名九十以上者兵丁六名共賞銀五千三百九十八兩鄂爾多斯郡王錫丹巴拜等九旗年七十以上者兵丁二千二百四十五名八十以上者兵丁二百三十四名九十以上者兵丁十二名共賞銀八千零一兩奈曼郡王拉旺喇布坦等八旗年七十以上者兵丁二千八十八名八十以上者兵丁三百十二名九十以上者兵丁八名共賞銀七千八百八十八兩阿拉善親王旺沁班巴爾等二旗年七十以上者兵丁九十九名八十以上者兵丁十三名九十以上者兵丁二名共賞銀三百七十八兩以上共賞銀四萬七千八百七十三兩業經報部核結餘飭各該省陸續題銷詔賜直省年老軍民絹棉米肉有差戶部議得恩詔内開軍民年七十以上者酌加賞賚八十以上者給與絹一疋棉一斤米一石肉十斤九十以上者倍之百嵗者題明旌表並加賞大縀一疋銀十兩一欵酌議得老民年七十嵗以上者每名賞給絹一疋棉一斤米五斗肉五斤八十嵗以上者每名賞給絹一疋棉一斤米一石肉十斤九十嵗以上者每名賞給絹二疋棉二斤米二石肉二十斤均許一丁侍養免其雜派差役等因相應行文各督撫府尹將軍等照例查明賞給造冊具題核銷奉天省老民年七十以上者五千四百十四名八十以上者七百四十四名九十以上者一百十八名共賞給絹六千三百九十四疋棉六千三百九十四斤肉三萬四千八百七十斤共折價銀六千七百三十二兩零共給粟米三千六百八十七石吉林等處老民年七十以上者三百八十名八十以上者一百二十九名九十以上者十八名共賞給絹九百四十五疋棉九百四十五斤米二千六十五石肉三千五百五十斤共折價銀六百四十八兩零又本色米一石折糧二石共折糧五百三十一石江西省老民年七十以上者七千三百四十九名八十以上者一千九百八名九十以上者一百六十二名百嵗以上者四名共賞給絹九千五百八十九疋棉九千五百八十九斤米五千九百十四石五斗肉五萬九千一百四十五斤共折價銀一萬一千四百二兩零湖北省老民年七十以上者五萬五千一百六名八十以上者九千八百八十六名九十以上者二千一百六十二名共賞給絹六萬九千三百十六疋棉六萬九千三百十六斤米四萬一千七百六十三石肉四十一萬七千六百三十斤共折價銀七萬九千一百五十八兩零陜西省老民年七十以上者二萬八千二百四十一名八十以上者四千一百八十五名九十以上者五百三十九名共賞給絹三萬三千五百零四疋棉三萬三千五百零四斤米一萬九千三百八十三石五斗肉十九萬三千八百三十五斤共折價銀六萬一千四百九十九兩零四川省老民年七十以上者一千二百九名八十以上者四百九十二名九十以上者三十二名共賞給絹一千七百六十五疋棉一千七百六十五斤米一千一百六十石五斗肉一萬一千六百零五斤共折價銀三千一十九兩零廣東省老軍年七十以上者一千二十一名八十以上者一百二十三名九十以上者一名老民年七十以上者一萬九千二百四十五名八十以上者三千九百八十名九十以上者二百八十名百嵗以上者三名共折給絹棉米肉價銀三萬八千六百六十九兩零貴州省老民年七十以上者一千一百六十五名八十以上者二百四十三名九十以上者十三名共賞給絹一千四百三十四疋棉一千四百三十四斤肉八千五百十五斤共折價銀一千七百四十七兩零賞過米七百八十九石其餘米六十二石五斗共折銀五十六兩零以上俱經各督撫府尹報部核結餘飭陸續題銷臣等謹案古來養老之政未有與犒軍之典一時偕行者葢兵與民雖分而宸衷注念則怙冒咸歸一體况乎生長郅隆同登夀考熙熙然逰春臺之上者典被有年澤流無間固所謂有慶兆民同論年天子萬也皇上涵嫗羣生凡引戶挍年之輩以及荷戈列戍之夫飽飫恩膏由壯至老無虚嵗若八旗之免地租養育兵鰥寡孤獨之加錢糧告退閑住之給全半俸餉所以綏我士卒者皆俯推格外之仁而弗少靳至於蒙古𨽻役比於内地每年優賞所部沙塞歡呼故得長養安居共享昇平之福非一日矣若夫嵗時粟帛徧逮庶甿或夀杖銀牌或賜金表楔屢登人瑞益廣恵施本年宣諭耆民不必逺来慶祝而丹綸先沛大賚攸行尤為疏賤不遺中外無間真導迎善祥之盛治也哉詔命欽恤刑獄大赦天下凡一應罪犯分别減等寛宥有差刑部謹奏為欽奉恩赦事乾隆五十五年正月初一日恭逢皇上八旬萬夀欽頒恩詔内䦕一各省現犯軍流以下人犯俱著減等發落其在配軍流人犯已過十年安分守法别無過犯者著各省督撫分别咨部查照向例核議奏請省釋欽此欽惟我皇上法天行健久道化成三元開五代之堂萬夀協八徵之瑞澤靡不被既鳳詔之頻頒悦且旡疆遂雞竿之肆赦盖祥刑早慎夫成讞而解網更畀以殊恩郊遂逺方悉予自新之路胥靡城旦益昭宥過之仁凡聖朝特沛之宏慈寔夀㝢難逢之盛典臣等謹查向來辦理軍流减等條例及近年屢奉恩赦臣等奏定章程除常赦所不原及叛逆縁坐强盗免死發遣家奴吃酒行兇棍徒生事擾害用藥迷拐子女䦕窑誘賣為從并例應給披甲人為奴及擬遣之積匪猾賊搶竊滿貫並三犯竊盗擬絞緩決減等及偷刨人參私鑄十千以上為從不及十千為首并擬遣新疆以及由新疆改發内地等項人犯凡情罪較重者不准減等外其餘尋常軍流以下人犯一概酌予減免等因遵照在案今此次恭逢恩詔應請仍照節次章程辦理凡各省原犯軍流以下事在本年正月初一日以前不在前議不准減等各條之内者軍流遣犯概減為杖一百徒三年徒罪人犯概減為杖一百襍犯准徒總徒人犯遞减一年以上徒犯已經到配者即行釋放已經決杖逃徒并免緝拿枷杖人犯悉行寛免應刺字者并免刺字應追􅂍者仍行追贓又應減軍流遣犯内已審未結已結未解已經起解在道㑹赦計其程限不能到配者均照定例准其援減各省督撫于接到部文即日飛飭地方官檢核原案查照奏定章程分别辦理務于一月内照例題咨并摘叙簡明案由彚冊送部核覆臣部辦理現審案内軍流徒罪各犯已經起解者應聴各該督撫查照己未到配定例辦理其已經審結尚在羈禁未經發落者臣部亦照議定條欵酌核彚總具題其各省題咨現已到部尚未議覆及嗣後續到題咨案件查事犯在恩詔以前者臣等於議覆時随案聲明酌減至辦理軍流在配十年無過釋回之案臣等恭查乾隆十一年臣部奏定章程内稱除發寧古塔等處及改發烟瘴地方遣犯内係强盗免死減等以藥迷拐子女開窑誘賣家奴吃酒行兇偷刨墳塚寔係兇惡棍徒情罪重大有闗十惡常赦條例内不准原免之項均毋庸查辦外其餘情罪較輕之外遣内遣以及安置安插編發為民駐防當差旗下家奴犯該軍流給發駐防兵丁為奴者均與尋常軍流人犯一體查辦等因又臣部于四十三年奏明新疆人犯内有無力捐貲入厰其人尚安分守法者請㫖勅令該將軍查明遣犯内已過十年並無過犯之人其中有年逾七十及衰病無能不任耕作者令其回籍其年力强壯者仍留各該處歸入内地送往種地民人之内起除刺字俾令永為良民其新疆為奴遣犯續經奏明不准回籍各等因均經奉㫖允准遵行在案此次恭逢恩㫖自應遵照乾隆十一年及四十三年兩次辦理章程將所定應准不應准條欵行令直𨽻各督撫府尹將軍副都統查明各項人犯在本年正月初一日欽奉恩㫖以前到配已過十年寔係安分守法别無過犯及現今年逾七十以上者均摘叙犯案事由罪名到配年月日期議以應釋不應釋分類彚造清冊咨送臣部覆核摘由䦕單按照省分逺近陸續奏請釋回並行令伊犁烏嚕木齊哈宻等處各將軍辦事大臣將當差人犯内衰病無力年逾七十在配已過十年安分無過者亦照内地人犯之例摘叙原犯罪名事由及到配年月造册送部查核其年力强壯者仍遵四十三年奏准章程仍由各該處歸入内地送往種地民人之内起除刺字俾令永為良民至此次各項欽奉恩㫖應行釋回之犯如有在配年久不願回籍者聴從其便其回籍之犯已經刺字者准照竊盗寔能悔過例起除刺字復為良民若于省釋後故智復萌仍有在地方生事不法者應照所犯之罪加一等治罪再遇恩施不准援免所有臣等遵㫖酌議軍流以下減等及十年無過省釋章程理合恭摺具奏俟命下行文内外各衙門一體遵照辦理本年正月二十五日奉㫖依議又奏為欽奉恩赦事乾隆五十五年正月初一日恭逢恩詔内開一各省監禁人犯著將上年秋朝審緩決至三次各犯仍照節次查辦之例查明所犯情節分别減等發落其緩决一二次人犯内有案情本輕可予矜原者亦著該部查明請㫖定奪欽此仰見我皇上澤普天衢仁敷夀㝢純嘏集八旬之慶庥和溥被于八埏貞元啟萬夀之祥愷樂宣昭于萬類恩覃格外圜扉䝉解吉之占喜動寰中胏石免訟終之咎不惟緩決三次以上人犯共沐洪慈即一二次緩決者亦得仰邀巽命原其罪戾予以生全事雖近而必矜四表上春臺之頌恩屢推而愈溥九霄空貫索之躔此聖朝特沛之殊恩實亘古難逢之曠典臣等謹查得現在秋審朝審緩決常犯共七千七百餘名内業經緩決三次以上者共四千四百四十餘名遵照向年減等條欵詳加酌議除減等人犯復犯死罪監候待質寔犯大逆縁坐之子孫以及殺死期功尊長情重等項人犯毋庸議減外其尋常鬬毆共毆及戲殺誤殺夫毆妻至死及毆死大小功以下卑㓜良人毆死他人奴婢威力主使致死等項情節本輕者擬以減流毆死緦麻尊長故殺妻故殺胞弟奴婢毆死良人夥衆丢包等項情節稍重者分别擬發近邊邉逺極邉充軍又尋常軍犯在配犯鬭殺謀殺人傷而未死以及畧誘誣告等項情節畧重者并旗下正身及旗下家奴應减軍流人犯均發黑龍江等處分别當差為奴又奉天等處所屬旗人應減軍流人犯照例解部酌發各省駐防兵丁分别當差為奴又毆死期功以下尊長人犯内除情重者不減外其中如有救親情切毆由義忿並廹于尊長之命勉從加功及戲殺誤殺等項人犯俱因情稍可原由情實改為緩決酌核情節分别減發邊逺極邉黒龍江等處至竊盗拒捕刃傷事主及折傷以上搶奪滿貫等項人犯應發新疆者面刺改遣改發雲貴兩廣烟瘴充軍至緩決一二次人犯共三千二百五十餘名遵奉恩㫖詳晰查核擇其案情本輕可予矜原者酌量擬減恭候欽定又新疆緩決人犯應與内地一體查辦令該將軍照例調發臣等謹將朝審及各省秋審人犯核其案情輕重擬以應減不應減按人犯多寡省分逺近分為三次以雲南貴州四川廣西廣東福建等省共二千四百六十餘名為一次奉天陜西湖廣浙江江西安徽等省共二千六百餘名為二次江蘇河南山東山西直𨽻及朝審人犯共二千六百三十餘名為三次各繕清單陸續具奏請㫖將減流者杖一百流三千里減軍者分别發遣發黒龍江等處者解交黒龍江等處各將軍酌量分别安插嚴行管束奉天旗人應發各省駐防者令將人犯解送臣部轉交兵部定地發配老㓜婦女以及篤疾者俱照例收贖各犯内有祖父母父母老疾應請留養者俱照例核辦䝉古人犯仍照蒙古例辦理所有臣等遵照節年緩決減等條欵分别查辦縁由理合奏聞請㫖本年正月二十五日奉㫖依議臣等謹案訓典率於下嘉祥萃於上良由政教旁流用以底蒸民之生而大協中之化焉耳皇上布徳行仁太和翔洽之㑹無時不本睿情欽慎昭議獄之持平至於裁律意之重輕核罪名之出入或再三昭雪或委曲生全凡皆憫恵元元務歸於仁至義盡恭際萬夀敷恩徳音大赦並育並生曲賜原情俾所司從例減釋一時幪屝之衆沐解澤而嘘㢲風何其幸歟顧竊惟寛刑宥罪在聖徳為緒餘而雨露雷霆寔並昭夫至教是我皇上以誠感物之理即以仁得夀之徵行見淑氣蒸濡普為良善所以答天庥而錫民祉者寧有既極哉八旬萬夀盛典卷六十四
