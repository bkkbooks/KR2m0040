body:
  text: 歌頌三十萬壽叙徴篇集五經翰林院編修臣錢栻惟天恵民書天生民而立之君春秋傳奄有九有詩後天而奉天時易兼利萬物禮聲教訖於四海書日新之謂盛徳易子民如父母禮用能協于上下以承天休春秋傳聿懐多福詩福者備也禮一曰壽書於萬斯年詩位乎天位易徳莫厚焉春秋傳維清緝熈詩光有天下春秋傳皇建其有極書參天兩地易以致五至而行三無禮其在于今詩五十有五易嵗書庚戍春秋仲秋之月禮天子萬壽詩八十禮南北東西春秋傳無逺弗屆書四方來賀詩惟曰欲至于萬年書大有慶也易聖人南靣而聴天下禮亶聰明書崇效天易繩其祖武詩臨照百官春秋傳而民康樂禮夙夜不敢康詩念用庶徴書徳之裕也易天之道也春秋傳天道至教禮三百有六旬有六日書寒暑相推而嵗成焉易日月星辰春秋傳照臨下土詩鼓之以雷霆禮潤之以風雨易安且燠兮詩曰暘書書時也春秋傳凡厥庶民書春秋冬夏禮動在其中矣易勤則不匱春秋傳爰衆爰有詩若農服田力穡書必以時禮以介我稷黍詩是謂大順禮謂其三時不害而民和年豐也春秋傳惟帝念功書親載耒耜禮勞民勸相易農夫之慶詩震東方也易二月東巡狩書東方者春禮有孚恵心易如百榖之仰膏雨焉春秋傳泰山巖巖詩乃修祭典禮羣神羣祀春秋傳必釋奠于先聖先師禮誕敷文徳書譽髦斯士詩禮也春秋傳社稷宗廟書必躬親之禮無有不共恪春秋傳降福孔皆詩萃亨易念兹戎功詩師出以律易内平外成春秋傳逖矣西土之人書悉率左右詩推而放諸東海而凖禮朔南暨書無思不服詩近者禮日南至春秋傳來獻其琛詩皇則受之書嘉乃勲春秋傳車服以庸書有加禮焉春秋傳若此則周道四逹禮無有逺邇書嵗事来辟詩觀國之光易賦嘉樂春秋傳僉曰書萬壽無疆詩民説无疆易情深而文明禮貺之以大禮春秋傳晝日三接易陳樽俎禮萬舞洋洋詩四方民大和㑹書徳至矣哉春秋傳作者之謂聖禮聖人作而萬物覩易單厥心詩念終始典于學書經緯天地曰文春秋傳詩言志書倬彼雲漢詩若日月之照臨書徳音之為樂禮天下誦而歌舞之春秋傳作樂崇徳易八音克諧書五聲六律十二管禮以相濟也春秋傳命大師陳詩禮律和聲書既偹乃奏詩凡三百易皆可歌也春秋傳鐘禮音之器也春秋傳用特書喤喤厥聲詩大哉易鼓咽咽詩介于石易其周之舊乎春秋傳天子視學禮咸與維新書其文炳也易聖謨洋洋書四方其訓之詩帝徳廣運書求民之莫詩重㢲以申命易大賚于四海書發倉廩禮至于再至于三書教以紀之春秋傳時萬時億詩闢四門書曰選士禮濟濟多士詩抜茅連茹易賦菁菁者莪春秋傳以近天子之光書説以先民易行慶施恵禮熙熙乎春秋傳以美利天下易則王道偹矣禮昊天其子之詩降之百祥書必有餘慶易嚮用五福書天子之堂禮子孫千億詩齊齊皇皇天降膏露禮雲行雨施易屢豐年詩百榖用成書其所以繁祉老壽者春秋傳何施而得斯扵民也禮一人有慶書無小無大詩實受其福易年自七十以上春秋傳百年曰期頤禮分之采物春秋傳三壽作朋詩厥孚交如易罔不承徳書夫是以天下泰平也禮念兹皇祖詩受兹介福易有典有則書史載筆禮徳言盛昜天子當陽春秋傳率祖攸行書如南山之夀詩慶賜遂行禮克篤前烈所及其逺哉春秋傳凡此者禮天行健聖敬日躋詩水火金木土榖惟修書徳刑政事典禮不易春秋傳視履考祥易訏謨定命詩知人則哲書利以平民春秋傳以天下為一家禮丕冐海隅出日書允猶翕河詩執玉帛者萬國春秋傳内和而外順禮廣矣大矣易聖人以是為未足也禮朝夕臨政春秋傳一日二日萬幾書於穆不已詩於時春秋傳念兹在兹書追琢其章詩以球玉禮聖人之大寳易所以達天道禮敬授人時書久扵其道而天下化成易臣不敏春秋傳拜首稽首颺言曰書天子萬年詩萬壽頌十六章集文選并序翰林院編修臣程昌期臣聞天稱其髙者以無不覆惟主創物繼天接聖一六合而光宅握樞臨極經緯乎陰陽元化所甄羣生㴠濡皆返中和以美風俗以隆徳聲而炳諸典謨福之上也猗歟偉歟肇自昊穹生民五徳初起紛綸威蕤煥炳可觀羲農有熊亞斯之代莫崇乎陶唐然記籍所載辨其要趣未有如今日之盛者也皇帝體膺上聖秉籙御天纉承基緒體元則大徳澤洪茂昭景飲醴是以四海之内枝附葉著千品萬官小大畢力百物殷阜屢惟豐年庶草蕃蕪恵風廣被東震日域西盪河源莫不蹻足抗首驟山驟水移珍来亨覩萬方之歡娱膺多福以安悆揆厥所元夤奉天命紹隆前緒聖孚也仁洽道豐禮交樂舉立教也邉境乂清樂率貢職定功業也醇鴻鬯之徳垂仁義之統偹㢤粲爛暉光日新然而聖上猶孜孜靡忒昧旦丕顯夕􅅥若慓訪萬幾勤屢省酌典憲考庥徴雲潤星輝風雨玉燭故令斯人揚樂和之聲覩㤗階之平咸在扵此于時秋也少昊司農六合清朗上膺萬夀海内同悦懐生之類誠思畢力竭情美盛徳之形容而盡忠孝猶謙讓而未俞也而公卿大臣因函夏之趣謹拜表以聞扵是天子俙然動容曰俞乎乃申舊章發榮號對揚天人奄受敷錫經緯禮俗勤恤民隱雲行雨施湛恩龎鴻光于四表穆穆焉皇皇焉固萬葉而為量者也臣凡庸固陋遭千載之嘉㑹美盛徳之形容事以頌宣頌其所見也遂作頌曰顯朝惟清業光列聖皇上纂隆遂重熙而累盛星虹樞電膺籙受符妥綏天保恭惟永圖一章其恭惟何嚴㳟帝祖禮上下而接山川有秩斯祜其祜伊何允當天人用融前烈受釐元神二章一日萬幾匪遑底寧並命在位以獻精誠欽哉欽哉顯猷翼翼審聴髙居總八方而為之極三章條風發嵗肅駕在祈年惟榖之䘏躬三推于天田黍發稠華稉稲莫莫家給千豐萬邦愷樂四章嶢榭迎風飛陛凌虚連閣煥其相徽乃有祕書鳥策篆素煒煒煌煌正俗崇文文以化光五章文徳既昭威武紛紜義征不􅀈惟道所存既光厥武莫不陸􅀈水慄却赱馬以糞車海外有謐六章既苖既狩以闡大猷夏載歴山川爰豫爰㳺天下安瀾耕穫不愆封岱勒成聖上同天七章於廓靈海乃流辟雍講論乎六藝参象乎聖躬嘉車攻伐靈鼓集而讃之各得其所八章昔之為文者宣徳以詩為三百篇非聖人孰能修之大予協樂廣樂四陳觀法扵莭奏流管弦而日新九章聴覽之暇留思文章敷道徳之宏麗光㷔朗以景彰理宣其奥言以暢神流詠太素煥乎有文十章皤皤國老愔愔醧讌三千景附仁風内扇以介丕祉徳博化光沐浴聖澤稱萬壽以獻觴十一章景命是膺皇家帝世將絣萬嗣慶流来裔綿綿𤓰瓞族茂麟趾殷五世之純熙本枝之盛如此十二章殊方區别同量乾坤皆嚮風慕義蹈徳詠仁南夷之君歛袵魏闕幸㳺建徳鄉四方無拂十三章斟洪範述易道八象成文謂之大寳皇慶肇建永錫難老念兹在兹庥徴之所偉兆十四章月旅太簇吉日良辰宣布詔書養之如春敀敀率土禀仰太和登春臺之熙熙兮擊壌之歌十五章時聖道淳睟容有穆備致嘉祥允懐多福究庥祜之所用惟徳動天天人合應永永萬年十六章萬壽恭紀七言律詩三十首翰林院編修臣秦承業寶籙呈符福聖躬八旬鏡㝢日輪東治成耕鑿相忘外道契清寧合撰中岳貢川珍俱品列年豐物阜是庥風元正肇祉咸臚祝雷動歡聲六幕同其一三多有願獻堯封掞藻誰能繪衮龍念祖聿修惟黽勉法天中道自従容大公至正辰維拱戒滿持盈海是宗徳者福基仁者壽占如箕畢雨風従嵗祀躬親古莫雙禮隆大報浹鴻龎陳常自繹周詩正歸福真訾漢政龎鐫寳不忘銘敬信嚴禋况復念耕䎫昊天其子恭承命于萬斯年恵萬邦其三耿光大烈萬年基式廓宏猷聖所治肇迹規模真邁古傳家典則自相師尊藏螭玉承天統編定雞彛展孝思寳錄五朝心法在紹聞惟是凛晨披其四勤政朝開敞禁闈毎趨庭燎有光輝天顔不隔常朝對睿畫分緘逺驛飛内廐馬調随歩輦衆流籖引覲垂衣烝烝日奏昇平業無逸書屏更勑㡬其五逮下深仁保赤如盎然元氣浹宸居恵鮮􅆟切文三老廣濟寧論禹二渠奏雨封章嚴大吏書民版籍辨方輿即看祈澤多神應親躡丹梯百級餘其六蘭陔唱和協喁喁宜爾欣看接履絇尾宿漫湏占析木耳孫行復祝懸弧幾家並有曽元見八士寧惟達适俱聖世不言符瑞事牧人旟旐即旋圖其七宥宻單心聖敬躋右文常是邇緗綈禮經舊注威儀盛史例新標日月齊方語譯来参地志逸書捜得荷天題巍巍七閣雲霞表氣壓名山二酉低其八偉構難従著作階波瀾根柢富天懐文成典誥為規矩詩統宫商示爕諧魚藻臣工慚染翰東西琛賮入吟牌㡬餘妙展翔鸞帖雲朶常凝敬勝齋其九功巍文煥六經来進講春風鬯九垓前席集賢宸極眷説書崇政侍臣陪煌煌著論卿雲筆抑抑歌詩湛露盃藻繢士林宗雅正不離典籍選瓊瑰其十國家教飬重成均圜水今看壁沼新俎豆視元昭敬慎老更従漢闢因循别開廣宴延千叟叠獻膚功格七旬塞北安西皆學舍四門三鼓况儒巾其十一石鼓重排紀大勲鴻都車馬日紛紛坡仙缺月行邉字吉甫清風頌裏文文碣斯碑争入古三希八柱廣流芬溯従尼父刪詩後寳鼎氛氳陋漢汾其十二鳯鳴何䖏仿雲門治定功成是樂原同律舊評周尺短中和今識大賢温遍翻篇什賡新譜合奏兠離奉至尊特磬鏄鐘皆地寶宫懸信有太音存其十三羽獵年年出木蘭簡軍上塞地圍寛諸藩部視家人禮異姓王兼宿衞官鋭士洗兵香阜雨浮簁􅋔艦玉湖瀾六㷱雙兎題篇在神武常従中雋㸔其十四五十五王欵玉闗披圖還笑漢功孱但聞都䕶屯沙磧未有農田過雪山馬貢今来邉市賤雁臣随到戍樓閒闐河西去逢金母一粲當時寳玦環其十五魚海天根瀛海堧郵亭㡬萬道平平冉䮾向外無畨境赤嵌􅀙深盡禹佃氷嶺雪碉銷戰壘鯤身鹿耳靜潜淵水西流䖏趨東靣可但覘星共此天其十六童叟䏻知祝帝堯八鸞常出聴風謡五䑓梵樂迎仙仗太室呼聲應舜韶况是白山懐水木有如皇澗憶舟瑶祥基物土俱堪賦四度宸遊過瀋遼其十七津門水濶舞潜鮫岱頂松髙架鶴巢輦下恩波通斥鹵巖間煙靄合香茅安期𤓰棗珍厨進闕里金絲殿壁交偫糗先時行内府但觀桑稼省農郊其十八舟臨椘甸泛銀濤民力東南睿畫勞漢志但憑多發卒水官早署喜渠漕冊羅宿海探源逺瓴建清淮立凖髙一濬陶莊看底定祗今帆過鼓停鼛其十九吴根越角幾来過錦字鐫題勝䖏多一水平江經虎阜六橋花港聴鶯梭南坍舊患潮頻徙東注俄欣海不波金簡玉書空禹迹紀功岣嶁較嵯峩其二十野無緡筭籍逋家士有詞章托後車挾纊温生輕組練賜牌恩重抵瑶華看回建業千峰棹又過揚州十里花望幸情殷香案近駕前羽衛不教遮其二十一中統論年亦小康開天壽籥紀徽章鎮圭長此封川岳半壁當時隘宋梁五代鍾祥元凱並八徴益壯徳威揚帝知兹寳膺殊貺詔曰推恩大澤滂其二十二彈冠多際後先庚瑞應魁匡戴斗明六度榜收文武士萬餘人聴雅歌聲銜加皓首窮經慰額溢黌宫發軔輕家自三番膺國慶毎聞科詔寵如驚其二十三荷鋤倚仗鏤心銘桃李垂街户不扄蠲賦縣門胥吏靜截漕水驛舳艫停嵗功豐告占星紀民氣歡龤擊壤聴承輦况當畿輔近新恩剛奉翠華經其二十四一色朝衫寵秩増五花鸞軸徳音承更逢曲宥生成大却喜微瑕祓濯勝枉縦平衡端慎讞科條寛減亦知懲欲憑盛典裁鴻筆罄寫輿情實未能其二十五勃律希聞鑿空逰彈丸􅃡子隔旄牛貝多卷寫遵龍藏金葉文成覲冕旒越險不辭懸度逺歸誠豈識瘴巖幽石油樹酒俱堪獻銘栝惟看職貢修其二十六帝鑒歸藩効棐忱入朝驅馬賦駸駸終軍非待長纓請許業依然靣壁心舞獸招邀来象邑家禽馴擾逐雞林衣冠允乞旋申錫雲日光昭快自今其二十七共球絡繹觧征驂宴賚頻煩聖澤覃寶額歸懸瞻斗似瑶章属和采風参白題黒齒尋相習吉貝兜羅半未諳右相圖成舌人譯吾皇萬壽邁彭聃其二十八鑾輿過䖏曉風恬夾道駢肩快聚瞻曼衍魚龍翻海立玲瓏樓閣與天粘晨開閶闔簫韶奏曲宴園林雨露霑正是御筵當北極弧南星映水晶簾其二十九龍書鶴算正開緘霓羽天街共舞衫自昔光華欽帝大扵兹曼羡驗民諴詩惟天保臚吟什經有長生轉誦凾億萬斯年同此日衢歌播樂奏韺咸其三十萬壽叙疇徴福頌二十四章恭集并序御製文句翰林院編修臣俞廷棆皇清荷天之龍列聖垂庥天子以四海為家歛時錫福八􅐆初開延洪錫羡曽元繞膝小大稽首思有所以副八旬開袠之慶盖莫若洪範八徴之念采古製為璽永言保之臣聞萬年賡庥一人有慶箕疇五福福應備臻共兹大慶罔不忭喜普諸福緣祝無疆壽羣臣所頌不可勝紀聖徳廣運莫可名言奉若天道丕纉先型勤求治理撫育羣民文教彰明武功赫濯崇示禮秩貫徹樂義睦親彰善殊恩榮老廣途銓士察吏求賢省方觀民蠲租發賑卒伍服習刑章平允懋敬厥徳繹聖析理宅中圖治吐辭成經吉祚大来梯航重譯永珍世寶慶忭攸同凡此諸福無不如意昭徳之致以莫不増星紀長庚之宿山呼萬嵗之聲湛露升歌弧南表瑞中秋八月匪今斯今洪範九疇嵗萬又萬容保萬國而其福始大永膺天祿而其福始長天然多福惟曰欲至于萬年自求多福惟曰欲至萬世仰瞻天藻用輯繁禧倫叙秩然箕疇凡九明徴定保景福維祺並悠久於兩儀集衣冠扵萬國臚歡祝嘏欣逢萬夀之期錫祉延齡竊擬南山之頌頌曰維皇作極欽若昊天齊政協紀道在莭宣兩郊大祀必躬必親迎日揆景省嵗祈年自御極以後弗懈益䖍法天行健歴久彌新皇圖永緜惟恭則壽瑞叠祥駢福自天錫用敷錫厥庶民一章篤念前徽定統建極累洽重熙有典有則禁習漢俗以詔示無斁毎觀寶錄朝乾夕愓敬繩祖武興思手澤養育宫中紀受恩之蹟志切紹聞兢兢業業叶郅福垂裕念兹弗釋二章殿曰勤政貽萬世規以聖繼聖廣大精微理事引見未明求衣累牘連章乙夜手批萬里以外往復周諮勵精圖治弗懈於時八旬初暨猶日孜孜恒保此福宵旰攸資三章勤咨民隱知稼穡艱課晴問雨當食忘餐洪縻縹軛以身率先萬人之命呼吸相闗凡賑助撫䘏俾享安全轉歉為豐敷錫八埏恵心勿問義闡韋編福國佑民將萬斯綿四章文治光昭與時茂育四庫全書儲之延閣叶廣示藝林心沃身㳤右文臨雍作人棫撲石鼓之文重加經度特榜興賢不一而􅁕表彰窮經敦崇實學歛福用敷矢其文徳叶五章六師順動攄忠敵愾西域既定疆界厥地永靖筰巴豐碑並峙瀛壖炎島随宜指示雖有梗化生擒亦易由知幾而推為四知無逺勿屆疆闢二萬武成九次福厚功崇紫閣形繪六章大聖創制折衷損益自郊壇祭器禀為程示及鹵簿儀仗條分縷析至于衣冠祗承家法叶按器譜圖允符定則文經武緯官稱其職一凖㑹典萬年惟無斁福履永綏儀偹禮洽叶七章作樂崇徳聲與政通親定中和韶樂克臻郅隆瑞出西江鑄十二鐘篇章音莭諧協六同依字旁注元氣昭融皆主一字一音警聴達聰譜以正調肅肅雍雍以介福釐彌􅅥皇風八章敦宗睦族潤盈玉潢世篤忠貞載在宗盟克昭駿業亮采有邦爰及苖裔毋忘舊章生聚蕃衍長發其祥重増秩祿榮號崇封叶設席肆筵日吉時良咸得福慶帝系緜昌九章天子養老導龢軒樞逢國大慶兆庶孔愉肆筵設席共味醍醐槐街鄉禄棘院耆香秀眉黄髪或續賢書並賜進士綽楔表閭三老五更之説成洋洋之聖謨斯引福紀徳教㴠濡十章知人則哲曰簡賢而用之晝日三接靣命耳提曰予作君曰予作師禮樂刑政各有分司慎兹綸綍悉出睿裁闢四方之門翕受敷施五明之扇厥義入微五福歛錫庶績咸熙十一章設監置牧旌亷擢䏻惟崇大體匪祗循名爰進大吏詔之曰無或荒寧承宣表率察其考成誅恣懲貪政肅風清力加整飭百度惟貞重撫字之勞㴠浹羣生實受其福吏治蒸蒸十二章省方問俗匪居匪康六度南巡渉河渡江治在塘堰風濤是防巡覽淀海東眺扶桑安瀾之􅂅與日俱長於鑠盛亰無疆惟慶天中嵩洛有蔚清凉東巡闕里至于岱宗叶用以祝釐資福身其康强十三章徳音洋洋普被曰仁業經三次矣蠲惟正者萬千兹逮八十特布恩綸加之宜厚藏富在民國家荷天庥百有餘年間遇水旱湛恩既深際時屢豐慶溢敷天並受其福合萬萬人十四章嵗事秋獮周阹合圍據鞍策馬殪虎洞麋聖武布昭哨以出竒班獲行賞四十九旗閲健鋭兵莭制之師訓練有素其勇㷱羆維嵗之晏陳我氷嬉長享昇平之福謹度莭時十五章象刑有典法物修明一切獄凖諸人情痌瘝在抱如天好生曰欽曰恤必公必平刋布律令著為章程仁育義正克協于中叶屢飭法司刑期無刑雷霆亦福久道化成十六章維徳之純神聖首出居正臨民均平如一克勤克儉發皆中莭履盛持盈不遑暇逸禔躬日强敬於心而達扵物戒得之義示後有述欲至于萬年亦惟一日二日是為福徳聚敬勝怠者吉十七章聖學髙深全體偹焉外王内聖曰明與新蘉哉負扆無逸一篇貫串䀭洽周誥殷盤講論經義一中允得懿戒有訓敬奉成編敬兹九五衍繹範言建極斂福體用一源十八章治化翔洽仁漸義摩諴民阜物各得其宜叶醖醲釀厚六合一家干吕入律擊壤聴歌協氣汜濩萬邦惟懐叶逰于化宇咸睹光華昇平累洽凛懐氷圖叶福利仁化以和召和十九章聖有謨訓發明㫖要煥為宸章符乾嫓昊鎔範羣言道象之妙抉疑示的無非至教時及臨池渉筆惟肖嘉與海内是則是傚倬為章于夀考同天所燾五福之義曰惟久照二十章天庥是滋瑞應頻仍屢綏普徧諸事順成珠聮璧合鳯集麟生畆穂叢岐河色成榮門旌人瑞户慶盈寧𤓰緜其瓞月益嵗増駢彰壽牒嘉應在庶徴百福備至曰升曰恒二十一章九有輸誠受小共大共大漠蠻陬莫不来同西旅底貢自㾗都以東緬甸歸順揚我仁風衛藏雖徼外實在震旦中安南雖南瀛小邦耶受命惟崇且扵山莊宴賚雲集景􅀙禔福無疆萬國朝宗二十二章擇言鎸璽庶徴之八八惟庶徴洪範疇一時若雨暘吉語臚實念兹在兹所其無逸選擇精璆永為定制叶繼用此寳範圍莫越承以髤几用殿諸御筆嚮用五福引而勿替叶二十三章五世同堂八旬萬壽舉行大慶禮膺禔孔厚莫不来同萬里奔走航澥梯嶂麗天拱斗奉萬年觴子來恐後猗歟純禧實為􅀙古所未有念之㢤箕疇之九萬福來崇以常以久二十四章
