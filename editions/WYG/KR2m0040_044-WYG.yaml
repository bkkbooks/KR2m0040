body:
  text: 盛事二十民數榖數二乾隆五十一年戸部奏直省具報民數二萬九千一百四萬九千四百八十五名口榖數三千七百四十四萬二千八百三十七石零奉天屬男婦大小八十萬七千四十六名口較上屆增一千六十九名口倉存榖米四十九萬七百六十四石零吉林烏拉寧古塔伯都訥三姓阿勒楚喀等處男婦大小共一十四萬七千五百三名口較增一千二百七十四名口倉存榖八千二百六十六石零直隸省屬民户竈屯男婦大小二千二百八十一萬五千七百六十二名口較增一十一萬九千一百八十五名口倉存榖二百四十二萬五千三百五十六石零江蘇省屬男婦大小三千一百一十四萬二千三百六十二名口較增一十八萬一千七百六十七名口倉存榖八十四萬八千三百一十三石零安徽省屬男婦大小二千八百八十二萬五千九百九十九名口較增七萬五千九百五名口倉存榖米一百六萬七千三百五十六石零江西省屬民屯男婦大小一千九百萬七千五百四十二名口較增一十七萬五千二百五十九名口倉存榖一百六十九萬五千九百六十石零浙江省屬男婦大小二千一百四十七萬二千七百六十六名口較増一十五萬二千八十名口倉存榖米二百一十五萬四千五百四十二石零福建省屬民屯男婦大小一千二百八十萬九千一百一名口較增一十三萬九千七百六十六名口倉存榖二百七十五萬一千九百八十七石零湖北省屬民户軍丁男婦大小一千八百五十萬六千一百三名口較增四十七萬六千八百九十六名口倉存榖米七十五萬二千六百四十六石零湖南省屬除苗猺户口例不編查外民屯男婦大小一千六百六萬七千六百三十四名口較增一十萬三千六名口倉存榖一百八十七萬九千四百五十四石零河南省屬男婦大小二千九十萬七千三百五十六名口較增一十六萬七千九百八十六名口倉存榖一百九十四萬七千九百二十一石零山東省屬民軍竈丁男婦大小二千二百四十七萬八千六百二十一名口較增二十五萬五千五百二十三名口倉存榖麥髙粱七十一萬八千九十六石零山西省屬男婦大小一千三百一十八萬九千六百八十四名口較增四萬七千三百五名口倉存榖一百七十一萬八千四百五十一石零陜西省屬男婦大小八百三十八萬九千三百七十九名口較增四萬四千七百二十五名口倉存榖二百七十九萬五千五百三十六石零甘肅省屬男婦大小一千五百一十五萬九千四百二十九名口較增一千五百七十三名口倉存榖三百八十四萬四千八百一十六石零四川省屬男婦大小八百四十二萬九千四百五十五名口較增一十萬五千七百七十名口倉存榖三百四十萬三千九百八十二石零廣東省屬民屯男婦大小一千五百九十二萬二千九百六十六名口較增八萬九千七百四名口倉存榖三百二十三萬九千七百四十一石零廣西省屬民屯男婦大小六百二十九萬四千四百五十六名口較增八萬三千七百三十三名口倉存榖一百七十四萬二百九十七石零雲南省屬除番界苗疆例不編查外民屯男婦大小三百四十一萬三千一百六十三名口較增四萬五千九百九十三名口倉存榖米麥荍青稞一百七十一萬七千九百八石零貴州省屬民屯男婦大小五百一十五萬八百八十名口較增三千九百八十四名口倉存榖米荍一百五十萬八百六十八石零巴里坤烏嚕木齊等處男婦大小一十一萬一千七百七十七名口較增二千九百六十六名口倉存榖七十四萬五百七十六石零乾隆五十二年户部奏直省具報民數二萬九千二百四十二萬八千九百四十八名口榖數三千七百五十二萬五千一百七十四石零奉天屬男婦大小八十一萬八百二十一名口較上屆增三千七百七十五名口倉存粟米榖四十七萬三千三百六十石零吉林烏拉寧古塔伯都訥三姓阿勒楚喀等處男婦大小一十四萬九千五百三十八名口較增二千三十五名口倉存榖七千九百六十三石零直隸省屬民户竈屯男婦大小二千二百九十五萬七千二十六名口較增一十四萬一千二百六十四名口倉存榖二百四十六萬二千五百三十四石零江蘇省屬男婦大小三千一百四十二萬六千七百五十名口較增二十八萬四千三百八十八名口倉存榖九十萬四百三十九石零安徽省屬男婦大小二千八百九十一萬七千七百七十四名口較增九萬一千七百七十六名口倉存米榖一百二十四萬三千九百二十三石零江西省屬民屯男婦大小一千九百一十五萬六千三百四十九名口較增一十四萬八千八百七名口倉存榖一百四十五萬七千三十二石零浙江省屬男婦大小二千一百七十一萬八千六百四十六名口較增一十四萬五千八百八十名口倉存榖二百一十一萬二千二百八十五石零福建省屬除臺灣府俟勦匪事竣另報民屯男婦大小一千二百二萬三百一十六名口較增一十四萬一千六百三十五名口倉存榖二百二十一萬九千一百二十六石零湖北省屬民户軍丁男婦大小一千九百一萬八千八百二名口較增四十五萬八千六百九十九名口倉存榖米八十二萬七百二石零湖南省屬除苗猺户口例不編查外土著民屯男婦大小一千六百一十六萬四千八百八十七名口較增九萬七千二百五十三名口倉存榖一百六十七萬六千七百九十石零河南省屬男婦大小二千一百三萬六千三百六十九名口較增一十二萬九千一十三名口倉存榖二百六十八萬四千九百一石零山東省屬民軍竈丁男婦大小二千二百五十六萬四千九百六十四名口較增八萬六千三百四十三名口倉存榖米麥髙粱九十萬九千二百五十二石零山西省屬男婦大小一千三百二十三萬二千一