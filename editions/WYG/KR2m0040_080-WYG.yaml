  text: 欽定四庫全書八旬萬夀盛典卷八十一歌頌一
  hash: sha256:2db9b3b3dbfe4695688449fd280313b0167d0498cd99161787377c3afa97bb54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_080-1a, image: WYG0661/WYG0661-0071a.png}
body:
  text: 臣等謹案歌以申其愉懌頌以著其雍容三百篇之被管絃匪惟取協中聲抑亦昭政治之相通導羣情之歸美用以鳴龢而宣豫耳洪惟我皇上徳廣運而立聖神文武之極福大備而膺位禄名夀之全欣開八袠慶辰延嘉集祉自蜚仡以來未覯兹盛則亦結䋲書契以來未易揚兹鉅典者也臣等間考前代夀節臣僚進獻詩文在唐則張說有集賢表端之詩于邵有甲觀神光之頌在宋則晏殊賦陳述聖楊億頌著神光或雕繢美詞或摭引符瑞本非有鴻徳大猷可昭久逺而祗欲以虚文相夸耀宜乎侈言之而無以薌其事飾言之而無以羾其情矣若廼帝期曼羡敂愉大同以鼚鼓軒舞之忱抒浹髓淪肌之感所臚者實事所效者歡心不啻人一其聲聲一其誠洋溢乎篇章之外顧自皇子以逮臣工士人悉聖教所涵濡文治所陶淑然且竭愚稱頌皆不及御製四得兩論之理大而藴深是舉江淮河濟以贊海雖不知海而莫非海納之舉嵩岱恒華以贊地雖不知地而莫非地載之至大難名有摹繪之所不及者臣等肅禀睿裁釐次一百本彚成卷帙藉以欽大文之萬有兼賅並以見大聖人之弗遺片善斯誠歌頌諸臣所懽忭蹈詠於無已者爾萬夀錦屏聨句七言二百有十韻子臣永璇等昊眷我朝勲被表聖承累代迪光前普天玉燭調三界子臣永璇建極金甌鞏萬年奕禩神謨功永賴至人心鏡照無邊有猷秩秩文増賁子臣永瑆猶日孜孜健體乾郅治彌綸亭育大精勤習貫旰宵便楓宸寳數兼參兩子臣永琰椿筭春祺拓八干廣袤審方兹徧舉苞符畫卦此開先典興禮樂菁華富子臣永璘祥溯宫垣緯宿連帝者如春生萬物日之方午炳中天丙辰鳯紀風調律孫臣綿恩甲子龍提政察璿輔相元黄資黙運顯承謨列契真詮徇齊敦敏通思睿孫臣綿億好古鉤深勵學堅聖徳壬林資性始天工寅亮得心傳奉時袛若淵𠂻惕孫臣綿恵熙載從凝庶績宣觀象臺儀精股曲升馨壇位法穹圓元辰穡事祈其實孫臣綿志先夕齋宫坐必遷盛樂大雩時盛夏南郊長至日南躔每年三舉年為典孫臣綿懃肇祀六宗祀曰禋特製陶匏遵古昔前期繭票慎犧牷宵昇奠璧宫燈却孫臣綿懿次出更衣御幄褰殷薦洋洋陳几上泰元穆穆降壇巔天心聖敬孚顒若孫臣綿總帝謂予懐凛肅然衛列儀營旋以吉命其宥宻靜斯専執圜乆矣誠無息孫臣綿偲恭舊從來率不愆皇史世編傳實錄聖人時展庋長筵是彛是訓深由繹孫臣綿慶敷賁敷前永克肩艱鉅必然師廪廪尋常亦不漏戔戔旂名辨色軍皆整孫臣綿寧文鑑諧聲義備研騎射相承嫻省括衣冠無改敬銘瓀澤沿鴨緑江頭舊孫臣綿憙花數牡丹臺上鮮全韻體詩依韻賦紀恩堂記與恩鐫層樓屹若岐陽鳯曽孫臣奕純靈沼逌然華井蓮聖有謩勲長定保風留淳樸大陶甄奏椷摺待宫中鑰曽孫臣奕紹錫養亷加俸外錢功緒焜煌崇肯構廟廷深䆳肅鳴鈃萬春統業傳弓劍曽孫臣奕綬四季焄蒿列豆籩神御夏秋瞻永佑宗宫冊寳琢和闐以之率祖居無倦曽孫臣奕紋况自尊天積有䖍握要所存心翼翼恃源而往道平平宵分便審壺中漏曽孫臣奕綸景昃猶批案上箋申命允釐堯作易迪功荒度禹胝胼髙明覆物霄升旭元孫臣載錫晝夜盈科海滙泉萬世萬方圖乆大匹夫匹婦念懃拳殿開勤政惟無逸子臣永璇管欲窺天是一偏翹首徽猷分件繫拈毫臚頌各條銓六聫八柄衡羣吏子臣永瑆大法小亷凛衆員徳始懋官功懋賞躬惟修道國修權乾綱獨攬樞機宻子臣永琰泰運交孚化澤延内自閣臣兼部務外而牧伯飭官聫法司秋讞咨三宥子臣永璘學士晨趨戒八磚特闢史家書虎渡為防偽吏傚蒲鞭存神非是行鉤距孫臣綿恩問俗由來黜削朘晰事鑒雖毫必辨安民苗有莠宜搴錦無學製絃無改孫臣綿億金待鎔罏埴待埏班見曷嘗遺下縣一嚬總未假中涓即看吏治均無􅎖孫臣綿恵原與民生乆作縁孚惠矧教常徧徳盈倉自爾概連阡正供遇慶兹四免孫臣綿志全漕邀恩已再蠲賦列周官懸法象田分禹貢􅉍聨蟬不毛尚復征其布孫臣綿懃有銍羣然納在廯何幸屢豐收積畝普教無稅享安廛偏灾頻復連年欠孫臣綿懿特賑遄流九府圜沛澤神倉先事發滿腔民膜積忱填省耕甲帳張隨輦孫臣綿總灑道丁男念挈鋗減賦符除三分一賞牌街舞萬人駢淳風共戴皇仁洽孫臣綿偲曠典非縁舊例沿率土恩膏恬慣沭問民疾若喜俱痊厚生正徳堂基叙孫臣綿慶洽國矢文星日懸治以道隆光韡韡詞縁氣盛浩沺沺文編二集詩編五孫臣綿寧法到從心理到穿輯鑑評都超往論研經義必邁前賢逺尋襄野曽尋緒孫臣綿憙秘啟尼山欲啟鍵言志渾然籠宇宙成章卓爾捨蹄筌正而葩矣吟排日曽孫臣奕純麗以則兮語壓仙自是文瀾翻若水豈惟筆力大於椽條分通禮同倫習曽孫臣奕紹器有新圗取次編樂擬白居易新什譜翻朱載堉譌圏書㕘松雪草皆聖曾孫臣奕綬畫仿雲林筆有禅館積三開先國史閣今七建首文淵皇朝檔冊新加簒曽孫臣奕紋往代縑緗古未湮舊槧取謄讐别本耆儒剏見渇流涎瀋遼畿輔珍彌富曽孫臣奕綸江浙維揚貯弗騫累轡千函䭾計輛連檣萬卷載盈船儒林江漢朝於海元孫臣載錫禮教衡紘覆有綖太學渌池環似璧大成黄瓦餙如璇九斿曲柄華􅓚矗子臣永璇四面明堂彩桷梴西域開疆咸設校東階舞羽不惟幵國書字母天垂象子臣永瑆經館禪宗日耀焆貝葉語皆嚴校勘龍龕音必正􅨵􅨏修文廣教傳滋逺子臣永琰奮武垂勲赫有燀首定凖夷澄玉水繼平回部馘金川狼心蠆尾貪多毒子臣永璘鴟義鴞張蹶且蹎下令嚴程戈甲靜中樞奉諭羽書遄鯨無京觀陾捄築孫臣綿恩羊許和門肉􅃝牽箸早前籌如破竹捕無諸犄却殱􅂒三方版籍開疆廣孫臣綿億一例車旗奏凱還沙渡排來臺記里碉樓改與屋連櫋快哉葉已隨風掃孫臣綿恵蠢爾蛙還向井挻砲獮雈符清濟漯竿梟回鶻盪蘇田海隅小醜螗當轍孫臣綿志神助將軍虎扼咽哂彼緬酋初哭豕偶逢瘴氣墮飛鳶震鄰索索聲先奪孫臣綿懃整旅闐闐事已竣忽見輸琛來累譯有如韜刄服西零表求丹陛人瞻闕孫臣綿懿冊奉金絲象渡滇八用兵旋民擊壤大濡筆記學鐫􅪗月支絶域仍輸馬孫臣綿總羲馭當天敢耀蚈畫苑鏤青紫光閣鐃歌第一九龍旃圖傳拓本如曹覇孫臣綿偲樂奏聫聲擅左􅗬每嵗秋郊行梐肅連程星駕向山谸熱河蹕啟萬家郭孫臣綿慶上塞圍張百子弮清道風師灑塵雨掃霓旄羽彗雲鋋晨裝雷動輿縢載孫臣綿寧午騎雲屯韔露􅱯風入鬃翻騰騄駬草枯眼疾下鶗鵳爭先陣若魚麗結孫臣綿熹獲隽歡如鵲起翾五色墮翬猶帶箭連畨殪兕屢鳴弦起車止馬雄如􅆙曽孫臣奕純接軌連鑣勇若悁最是及鋒三尺笴問誰差馬九方歅此中軍禮嚴而泰曽孫臣奕紹各墜營員敏且顓决眥歸鴻飛湛淡弛罝脱走聫猭好生不碍街南罼曽孫臣奕綬習武非躭塞外佃狩野師從憑指使謁陵躬拜愴桮棬維新帝命由東瀋曽孫臣奕紋自古輿圖屬北燕炎漢國祥起宛沛宗周世澤在岐岍龍興吉壤鳴鸞輅曽孫臣奕綸鵠立崇班䇿駜駽次第省方雲罕舉先期下詔鳯文翩津門職貢逢時集元孫臣載錫運漕河身相地輇三晉輿情羣有幸五臺頂禮佛曽仚禪林西謁文殊寺子臣永璇徳教東廵闕里埢美富宫墻山仰止風流洙泗水西㳬淮南地本資耕織子臣永瑆江北河先導澗瀍㡬道樁初排石下連條篾為合龍纒東偏澤國塘沿海子臣永琰南迤泉亭郭外􅕨鑿就雲根排砐硪浮將新簍盪漩澴六巡宸駕躬親度子臣永璘兩省民情目乆䀽不吝朱提偕赤仄㡬經秋蟀與春鵑沿流閘建重闗鎖孫臣綿恩引重舟浮一葉扁子午潮低無弩射飴形鹽判各場煎三神山有風收浪孫臣綿億太史河如鏡啟烻金碧蜃騰樓絢爛清黄牙錯縠淪漣一巡五載書同律孫臣綿惠多吉朝陽雅有卷展義朔南棽鳯葢告功清晏蟄蛟跧化成祗是恒亨爾孫臣綿志政治於何後倦焉在吏在民情遍察乃文乃武事俱揵贊參上下三才建孫臣綿懃天地中間萬福全五代一堂徴燕喜深根遂實慶𤓰綿樂逢偕樂紆行斾孫臣綿懿孫又生孫報驛駩龍種宗支歌蟄蟄麟祥族讌舞躚躚引潢天𣲖昭昭界孫臣綿總敦葦春田泥泥虇座啟黄流人洗爵鞭揚紫禁馬垂韉五更三老排邕鄭孫臣綿偲千叟同筵㑹羡佺紳士往來聫洛社桑麻歸話問彭籛杏花春雨農遮笠孫臣綿慶麥浪薰風婦饁箯村塢千倉場啄雀車箱萬貨市停騝三邉牧兆維魚夢孫臣綿寧八熟蠶看在箔眠絃誦自然推上士工商曽未服長鬈斜陽樵採肩盈擔孫臣綿憙初月漁歌手扣舷咸若無私到花栁太和遍洽及蠕蠉試聽萬嵗呼嵩麓曽孫臣奕純豈效羣仙訪豆圌七秩古稀頒鳯蔚八徵耄念篆龍蜒方諸六帝三皆邁曽孫臣奕紹超彼一元二寔孱親製鴻文鈴以璽仰惟天貺宻於緶箕疇九次申洪範曽孫臣奕綬班老五行闢小譞肅乂哲謀聖所事風寒晹雨燠無邅鏄鐘大叩筍鳴獸曽孫臣奕紋石鼓重新栁貫鱣元日朝正陳象馬南交乗朔化鷹鸇梯山有譯降蠻鴃曽孫臣奕綸鏡海無風請雜縣樂此昌期長化日恭逢夀宇藹祥烟星連八表燈輝柱元孫臣載錫露湛千官轂擊軿金鳯口銜綸卷下陽春脚遍草芽芊加階特賜新銜爵子臣永璇寛賦無征舊宅畋咸秩百神隆肹蠁開科多士取楠楩貤封賜誥書爭誦子臣永瑆起廢彈冠綬未蔫户集華顛更黄髪賚差雲錦及霜秈鸛鵞分墜均邀賞子臣永琰犴狴䝉汙尚許湔一札十行羅總總九垓萬彚恱􅚳􅚳鬰葱在望東西謁子臣永璘逰豫無憂外内蜷五嶽視公升泰岱二知揆聖見羮饘周朝在鎬魚依藻孫臣綿恩虞狩當春蟻慕羶底事封中占馞馞獨於川上㑹潺潺桃花津逮明箕尾孫臣綿億櫻薦歸期刈麥䅌五色臚雲親甲第北壇至日省牲犍時當消夏山宜駐孫臣綿惠人說今秋月倍娟電繞虹流嘉㑹節雲需雨解徳恩澶中朝喜氣開閶闔孫臣綿志寰宇歡聲遞簡䉳鐘鼓九天傳廣樂共球萬國藹温瑄貢登王㑹城連野孫臣綿懃欣動民情屋飾枅大有年張燈簇簇太平風送鼓鼘鼘名花好景排佳麗孫臣綿懿仙羽明粧綽婉嬋走馬飛黄金匼匝為梁映碧水鞦韆千篇奏御雕龍虎孫臣綿總萬舞陳庭戲曼狿瑞見卿雲光糺縵人生夀世暢蜵蜎杓携龍角三千宿孫臣綿偲琯獻瑶池十二鈿無量僧祗金聚體長生仙侣鬒還鬋民躋仁夀衢尊酒孫臣綿慶帝念封疆國柱磌為允祝延鳩致慶無多引重馬徒驙南山詎必加銖壤孫臣綿寧文貝何如緯木棉自是堂階停菉幣祗逢郊廟合供鱻衡陽品物仍登柚孫臣綿憙淮浦珍竒未數蠙地醴天膏皆世瑞川金山璧為民捐恩言如此心求赤曽孫臣奕純豳頌維知嵗獻豜最幸庭前趨侍榻相將座上出懐鉛承顔有喜先臣庻曽孫臣奕紹遶膝臚歡入筦絃欽訓乆聆圗治切陳詩敢擬騁詞妍日新其徳恢前烈曾孫臣奕綬業廣惟勤契上元燾載為皇増慶瑞兒孫上夀舞褊􅝆臺萊奏已參笙籥曽孫臣奕紋籌幄添寧止算純兆姓登春薰碧醴八紘張樂敞紅氊珠光露自瓊林浥曽孫臣奕綸金徳風依玉砌扇南極夀星秋炳焕東嵎聖澤日奫潫罄宜戬榖無疆慶彩服長賡祝嘏篇元孫臣載錫萬夀錦屏四得頌謹序敬集御製文句内廷大學士翰林臣阿桂等中庸言位禄名夀必推本乎大徳隆古以來惟舜能用之要惟本精一執中之奥藴天徳王道一以貫之富有日新孶萌萬物握乾符合太和以迓上天無疆之庥五三六經之所傳夐乎褘而萬年之鴻寳矣大聖人受天眷命夀世而夀身欣開八袠萬萬夀無疆化成乆道景祚延洪儲祥錫羡福應備臻三代以下為天子至八旬者纔得三未有躋此崇隆者也聖人至徳有以得此歟萬八千嵗之朔稱觴獻夀於其間敂愉大同罔不忭喜羣臣例當進獻辭賦共晉九如之祝夫表徳紀實集慶垂光洪纎咸備神聖之藴也繪句絺章其理莫賅挂一漏百形迹之論也聖徳淵懿聖學髙深道綜百王集羣聖之大成故言出而成經炳日星而章雲漢所為御製文㫖藴宏深心源符契以是為學亦以是為治琅函玉簡宣示萬方咸覩光華是訓是行天下之文章孰有大於此者臣愉殷酌斗兼誦宸章之美富因辭以見帝王之學合徳乎天地盛徳之致福永年天人之際固有不求而至焉維舜重華有同揆也有大徳者之得其位得其禄得其名夀景鑠哉盖貞元嘉㑹在斯時乎在斯時乎非甚盛徳其孰能及此乎夫獻夀表誠修辭立其誠以介福釐有要有倫益相發明聖人之言天之文也井裏窺天不自笇量次第甲乙以盡錯綜之數薈萃行間據實書事莊誦繹思而歡欣鼓舞慶宜歌頌拜手稽首曰大寳曰位應期受命國家肇興東土迨入闗定鼎耿光大烈自古得天下之正累洽重熈適際其盛黄中正位皇帝繼序聖祖恩眷異常甫十餘嵗精一之心傳及登寳位純佑命於日引月長紀受恩之自聖人致治謹㡬慎微日昃不食未明求衣展誦列祖實錄夙興夜寐覘開國之規模櫛風沐雨一日萬㡬奉三無私遹求厥寧維此嘉師博考典章斟酌損益甄以大鈞是匡是飭兩郊大祀必躬必親五廟册寳炳炳麟麟敬念右壇迺開琳笥嵗舉耕耤之典以劭樹藝覆以黄瓦永揚教澤升歆議禮上自羲軒下至勝國靈貺孔時載稽祭義八旬初暨咸䄮典祀黼黻文章犧尊象尊圗以臚之五禮五器之文巡狩之典厥有舊章觀風展義盛典矞皇澤洽圻甸聿遵伊洛覃齊浹魯周豐殷亳展禮清涼六度南巡明者明理敬者敬天載在宗盟畀以爵䄮以親九族肆筵設席繼絶昭屈元徳顯功爰及苗裔展親之隆闕廷莅政引見官吏批閲章奏訓勑有位無曠庶官簡任公卿百執事心可干城棫樸誦詩文武並勵典在有司健鋭火器豢養旗兵羽林神策煌煌帝京嵗事秋獮陳我氷嬉是以詰戎揚烈安不忘危有温有肅雨露雷霆亦惟視其自取敷教明刑胥出内帑為興工作公旬不勞遵堯之約王者制事立法物度軌則凡百有位各有攸職矧以大聖人正位宸極致治規條以詔示無斁聖有謨訓祈天永命尚書五十八篇奈何弗敬祗祗翼翼敬奉神器嵗萬又萬常厥徳保厥位右位紫垣三友曰夀曰祿富即禄也歛是五福富有四海理大物博駢坒殷闐後天下之樂而樂生聚蕃衍土宇之富農部尚書核户口田賦聖人對時育物而察登耗之故菽粟如水火耕九餘三喣以淳風扇景濩甘既屢豐錫羡因五方之財貢賦物産聫軫偕来浮漕利渉帆檣數千里蕃廡盈寧鏐租漕糈暨三千大千朝貢之國兹以其䴢至輻凑鱗集玉山是矗騰格是供不脛而走戊巳告豐道通縑馬坰牧之場騂騏駱驔雲錦七襄受天百祿荷天之龍一嵗度支以二萬計樸儉是崇勿問元吉有孚恵心博施濟衆匪今斯今供職惟欽重増秩禄兵衆咸給月糧賜之廩榖八旗根本之地旗樂屯莊嵗暮星窮豐錫殖康且天子安得有財藏富在民故國以民為本民以食為天徳心是懋省嵗祈年宵衣旰食誠知稼穡艱難貴榖劭農即康功田功而較晴量雨詩詠豳風命直省旬月奏報雨雪禾黍沐澤郵圅所諮訪運萬㝢於几席臘雪盈疇沃以甘㴻睿顧以懌修和六府蠲復徧扵各省凡有水旱蠲逋賑䘏則言傳號渙親臨河淮指示經畫又呉越海塘易柴以石海趨中亹俯臨衆壑則之鬟之以䟽以瀹是以茀禄引康户慶盈寧農桑被野敷錫多福于有生福彼蒼赤滋液渗漉以節制保豐亨以綏後禄右祿抑謂名者匪循其名實者名之主武緯文經文教彰明躬釋奠於先師璧水環之見圜斯池十鼓井井無縫天衣避暑山莊而陽闗玉門上庠下庠教育羣倫經筵所進口授指畫令歌抑戒之詩矢其文徳詩三百譜以正調與三代同風磬不可闕鑄十二鐘右文稽古首列經史刋成善本以造就士五經萃室校刋三通燦焉明備列在學宫通鑑輯覽之書建中表正昭監戒著㡬微示羣生以金鏡一體賜謚另立貳臣傳斧鉞昭然一褒一貶若淵若源若津若溯四庫全書萬流景附譯以國書三藏十二部煌煌簡冊不可勝數皆㫁自聖心而昭來許文有二集多文以為富訏謨大訓萬物咸覩事以頌宣邠岐之地列薩爾滸山而特書其事為古稀說為開惑論為南廵記武成而勒碑太學較創業守成孰難此其大者矣立徳立功立言卿雲有什聲為律身為度推而益廣以符天數大徳曰生而四時行作笙詩吐辭成經月令古書爰答嵗華書皆備韻譜韶韺之歌鼓盪元音體察物情潄六藝之芳潤彪炳日星奎章寳翰形於心畫宫殿屏扆所其無逸拂素揮豪天球琬琰名家墨妙以嵌石版文徳武功同其廣大武成九次無逺弗屆我師洸洸戈鋋所指掄二十五伊犁平矣數世梗化兩朝志竟操刀必割由頤有慶二酋偝徳怒臂當車我師堂堂電掃風驅遂來獻馘諸回永靖䫜面纒頭各保性命小金首禍金川助惡我師深入大鞣大膞碉摧垣裂利斧其吭滴博蓬婆屯戍我兵曰梟曰獍賊固其壘揚我仁風一日千里三月成功後實先聲我武維揚南奠臺澎大漠蠻陬瀛壖炎島張皇六師順者撫逆者勦紫閣形繪磨盾告㨗師出有名豐功駿烈睂列掌示指授方畧大智若神武功赫濯文揆武奮道兼創守蕩蕩難名料名實其並夀右名位禄名以夀彌昌俾夀而臧故中庸曰悠乆無疆天行之健匪居匪康動靜有養身其康疆繭版蠅頭匪伊朝夕據鞍䇿馬一人之心力仁夀之域也苞符延洪蒸為太和寳甕八鴻厥彰祥源膺禧單厚予得元孫載錫之純佑麟振其趾𤓰瓞衍慶宫用題額五代同堂念我羣從斯引福紀昌我宗潢本支百世圎頂方趾之衆曽元繞膝得造物生生之元前後凡二百國之耆俊星紀長庚之宿綺眉聃耳黄髪鮐背乃穰穰綏夀門旌人瑞既日滋而日繁以三千餘人於乾清宫追一日歡曰布魯特村嫗里媪協氣汜濩氷山雪窖或禄成均棘院耆儒祝嘏来庭閩嶠南區率俾紘瀛共效子來各得其所寧老安少懐羲和増籙靈臺時憲三元甲子積萬乃無算浮圗九級以所被香祴太常之司肖翹跂喙侈稱瑞貺者見何小哉惟聖所樂解愠阜財萬福來崇而重新寧夀宫式奐式壯柰苑神工殿稱皇極竹苞松茂吉語臚實慧燈普照中和大備景鐘發聲為圜為金震耀華鯨蕩蕩由庚八袠爰開生物之元調幕登臺用叶崇禧行慶施恵輪蠲各省其所供賦稅式燕且喜雲上于天豳堂用躋九寰􅆽醲乎衢尊大君有命特科興賢百辟卿士因沛殊恩國家秩祀之典祗薦明禋刑章平允廣敷解澤醖醲釀厚至於恵我徳豐紐重臺擇言鐫璽箕疇九九出於洛水八惟庻徵曰時曰恒其義見八十曰耄介祉錫羡衍繹範言念兹在兹鏤以合璧厥義入微二月東廵狩遂躋岱宗金泥玉檢陋彼陟封登夫子廟堂先後同揆其樂與夀夀以萬世萬里奔走如星拱北䝉古舊屬及都爾伯特和碩特土爾扈特其汗王台吉等淵竁億臣南盡交阯邁呼韓之朝天貢音於僸裔遵我王度至於衣冠廓爾喀逺連衛蔵貝葉霏烟緬甸歸順生畨化外自暹羅南掌等國圗于王㑹中秋八月日徳則酉占留熟正夀之慶萬年永卜川阜増嘏旗翼之夀乾圜坤方貞固恒乆敬上無量夀時萬時億京垓紀年端在乎徳右夀八旬萬夀盛典卷八十一
