body:
  text: 欽定四庫全書八旬萬夀盛典卷十聖徳六健徳臣等謹案天行健自强不息乾之道也聖人則之以貞固幹事而有日新之功中正純粹而著无疆之譽亦惟體乾之健以法天之行而已矣我皇上秉作聖之姿法行健之體臣等恭讀本年御製經筵易論挈自已自然二義而約其要於無為正與八徴耄念寳記所云幸賴天佑身體康强一日萬㡬未形智衰不可不自勉者其理互相發明方兹聖夀日隆聖躬日健莅祀親政倍䔍敬勤前以禮官請以耤田特詳示保躬頤性之㫖而精神之充裕見於每嵗肄武行圍挽强輙中時巡于邁控轡自如無論耆艾少此矍鑠即少壯亦未有能習勞整暇若此者又况旰食宵衣精闡恒語晏眠曉起備恤人情凡兹著在篇章無非徴乆弗懈之實事臣等伏惟視履吉祥固由天賦異稟非尋常所可仰企要之聖人夕惕朝乾習勤守靜其養之也有素其持之也以恒乃益臻乎剛健篤實輝光而如天之運行不息常乆而不已者也皇上以夀登八旬於乾隆五十四年躬行耕耤禮乾隆五十四年三月初六日皇上詣先農壇致祭畢親至耕所行三推禮過御觀耕䑓從耕王各五推大臣等各九推順天府大興宛平兩縣各員率耆老農夫行禮至耕耤所終畆禮成是日奉上諭本日舉行耕耤適值天氣晴明一切典禮辦理俱為妥協所有執事之大臣官員人等俱著交部議叙順天府係承辦衙門蔣賜棨已經賞戴花領仍與吳省欽一併交部從優議叙其老民人等舊例有應得賞賚此次著加倍賞給此内有八十一嵗之老民劉榮著賞給七品頂戴再加兩倍賞賚至隨從之侍衛人等並著分别賞給緞疋以示朕行慶施恵至意御製耕耤禾詞己酉午未申仍三載違甸師申命此清畿七旬有九勤耕耤自審庶無負古稀六十一禾詞昔詠補今三什册書中向於耕耤日祀外先農禮成􅄒事復有禾詞或三四首或五六首不等皆彚書於册厯年已得六十一首今又為三首補書册内數符羲卦義兆生生冀協屢豐之象數上聲成上下經羲卦占吉惟殷籲屢豐中祀一週行合當予立願歸政以前祀嵗必恭承近思中郊亦欲廟大祀於兩三年内皆親祭一週葢自揣八旬之年䝉則當天眷佑精力尚强勉盡恪虔以盡為君之職此後依例遣官矣及兹身體尚康强盡予懇款抱蜀職能此都縁天賜祥先是乾隆五十年二月初三日奉上諭此次致祭先農壇舉行耕耤朕自揣精力康强尚能躬舉三推所有應行事宜各該衙門照例敬謹預偹候朕親詣行禮是年二月二十七日奉上諭此次親行耕耤朕躬舉三推應令諸皇子隨侍觀禮以昭劭農務本至三王王著派睿親王質郡王皇六子儀郡王皇八子皇十一子皇十五子著隨耕佈種是年十月二十一日奉上諭每嵗春三月應祭先農壇行耕耤禮禮部俱先期將祭祀日期及耤田一應事宜預行具題雖屬照例辦理但國家典禮以實不以文朕臨以來來兢兢以敬天勤民為念郊壇大祀無不躬親即耤田親耕亦從未嘗稍憚煩勞雖本年夀已七十有五猶親舉三推之典惟是春秋已髙或恐步履稍遜若二三年後自揣精力如常偶一舉行豈非熙朝盛事至本年甫經親行耕耤明應應否躬莅自候朕酌行乃禮部仍照例具題親詣行禮者親親詣行禮者然豈不轉成為具文耶我國家受命延洪純嘏敷錫世世子孫若能皆似朕之敬勤不倦自必景祚綿長享國乆逺朕所用古稀天子之寳特於乾隆宫存貯一分若我子孫内有享永祚而登上夀者亦得鈐用此寳洵為社稷靈長之福嗣後我子孫繼承奕䙫惟當不懈益勤凡遇親耕典禮若年在六十以内禮部自應照例具題年年躬行耕耤之禮若年逾六十令禮部先期以親莅或遣官之處具本請庶鉅典不尚虚文文而展禮昭益誠恪著為令所有此次禮部具題一本即著照此㫖改繕進呈乾隆五十四年十一月初二日奉上諭禮部按例題耕耤所謂具文而已朕臨御以來恭遇郊廟大祀無不祗肅躬親即中祀之禮亦嘗親行而耕耤則不啻數十次矣仰荷上蒼眷佑列祖鴻庥春秋日髙精神强健明嵗已屆八旬是以一切中祀典禮如先農朝日夕月等壇俱於八旬以前兩年内以次親祭一週即今春亦曽耕耤矣至於八旬後恭遇南郊北郊太廟袷祭大祀仍嘗嵗嵗躬親以及歸政之年始終勿懈若此六年内筋力設有不逮未克躬親鉅典朕亦不敢或有勉强稍滋隕越臨時自有㫖其餘中祀及耕耤之禮若復仍事親行轉非體天𠡠躬保養精神或有類於矯枉沽譽不肯為也即如木蘭秋獮朕恪遵家法四十餘次無不控騎行圍今秋圍場仍乘騎而行至明年八旬以後則理宜頤養起居擬勿䇿馬而今嵗仍必舉行者亦猶中祀親祭一週之意也嗣後凡遇中祀耕耤著禮部即於本内奏請遣官行禮其應否親詣之處不必聲明請㫖矣若太廟時享及致祭社稷壇仍著内閣將親詣遣官之處雙簽呈覽候朕臨時酌量降㫖庶鉅典不尚虚文而祀禮益昭誠恪其每年經筵講學從容坐論原不勞筋力較衛武公之年尚少十嵗歸政以前仍應照舊舉行以示始終典學至意臣等謹案耕耤之典所以勤民劭農伊古所重我朝演耕加推罷綵棚斥蔬圃皇子從耕回人列侍規制視往代加隆皇上臨御以来親莅者不啻數十次自七旬以後猶勤躬行總由健體綏康迺能從容蕆禮亦猶中祀一週皆本自然之敬而非有勉强於其間邇以禮臣聲請恐涉具文申諭至再葢聖人揣量精力固未嘗稍悄煩勞而節慎起居正所以體天而善養其徳為純全矣皇上行獮木蘭御製神槍發必命中至八旬舉行如初御製山莊啟蹕木蘭行圍曡去嵗作韻戲用倒勾體己酉二載期猶試獵鞭昨秋遇潦罷于田向以八旬後理宜節勞頣養可弗乘馬是以昨秋啓蹕幸木蘭詩有逮八旬將罷乘騎欣兹一再尚鳴鞭之句乃去秋以雨多溪漲扈行行李率未能到而各獵場亦多沮洳不可佈圍因命罷獵明年慶典應宫禁此日行圍勉惕乾明年予八旬萬夀屆期自應回京師御殿受賀以昭盛典今嵗秋獮仍當祗遵家法未敢躭於安逸然亦自揣精力尚健並非有所勉强也豈為去聲禽從娛樂已亦惟家法繼繩前中闗行宫名五十里而吉駐早拈詞拂翰筵御製入崖口己酉崖口平從舊路入昨年遇潦偶然思情當曲體惟兹衆知不可違者是時去年入崖口偶縁潦水成漲雖扈從人等俱至大營而行李多未能到不可不曲體衆情罷圍旋蹕然農隙講武時不可違而家法昭垂意最深逺今年自當依例舉行及老仍應厪武詰柔遐兼以沛恩施予雖年屆八旬而精力尚健不敢以詰武為勞矧䝉古王公台吉等每年於萬夀前至山莊宴賚駢蕃即佈圍之千二百人俱有賞賜是柔遐之中兼寓恩施法制誠為美善秋雲朗霽山原廊獮典前年正若斯御製䝉古王公等進晏即席得句己酉塞嶺秋暄紅間去聲緑諸蕃備晏効尊親穹廬進酒重孫壻席間進酒者喀爾沁王曼珠巴匝爾乃皇次孫綿恩之壻則予之重孫壻也詐馬臨場􅕊次人每年塞晏䝉古王公等設詐馬什榜相撲教駣四事以表敬候覽自乾隆六年至今已四十次矣左右顧憐鮮等輩憶自乾隆辛酉行圍木蘭爾時扈從者科爾沁親王羅卜藏滚布喀爾喀親王成滚扎布喀爾沁郡王伊達木扎布巴林郡王琳親敖漢貝勒羅卜蔵等皆皇祖之孫行與朕等輩年亦相齒自二十年以後次第凋謝兹行圍侍晏者皆子孫或曽孫輩矣長年何慶之有支持幸尚有精神天花示喜霏微落那學維摩不著身御製巴顔和樂行圍即事巴顔䝉古謂富和樂䝉古謂溝俗即謂巴顔溝己酉秋獮誠欣物賚紅䝉古謂紅色為物賚所獲獸多則稱阿巴物賚巴巴顔果不負名崇佽飛虎一鎗真壯命中鹿三矢未空是日射中三鹿將至八旬猶䇿馬迴思昔嵗送歸鴻及能欲畢為君職中祀躬親此意同夙願致政以前恭遇中祀郊應遣廟大祀嵗必躬親凡例官者欲於一二年内皆親祭一週以盡負扆抱蜀之職今春躬祀厯代帝王廟詩曾識此意若木蘭行圍乃恪遵不覺家法已四十巡於兹矣即數日以来圍場命中頗勞然八旬後理宜節勞頤養擬弗䇿馬而今嵗必舉行者及兹身體尚健亦猶中祀親祭一週之意耳御製出崖口作己酉君職詰戎率蕆為擬八旬後可弗乘騎今嵗仍必舉行秋獮亦猶一二年内欲於中祀皆親祭一週以盡君職之意詳見前巴顔和樂行圍即事詩注出崖口合御車宜明秋禁苑開八慶後嵗山莊望九期明秋八旬慶典固當於京城御賀受賀後嵗至山莊避暑則年已望九理應節勞罷乘騎矣未致政寧當自逸擬臨觀敬效前規子年十二侍皇祖皇祖行圍維時詢之年矣御前諸臣知圍中弗乘騎者已數今秋連舉十三圍馬上命中不減昔時仰邀優厚後嵗即不欲乗騎然秋獮令典我朝天眷更加家法所貽予未致政以前不敢自逸屆時仍擬率皇子及孫曽元輩進哨令皇子等行圍而予於看城臨觀或坐而引弓射獸倣傚待之盛事惟前規是亦伊古所無天恩之黙佑耳能如是否心誠願䖍待天恩佑賚垂臣等欽惟我皇上恪循家法行獮木蘭所以詰武柔遐厥典綦重遡自沖齡十二親侍神武即謹習勞迨今夀登八袠控弦命中率以為常而射虎洞麋善獵者猶弗能逮至每嵗行圍紀實詩篇不可勝載臣等謹錄己酉年御製數什以仰見聖意而天體之健亦於斯可徴焉若夫校射選材以程衆勇者分載本門勤徳類皇上時巡每常乘馬乾隆五十五年聖夀八旬東巡啓蹕策騎如初先是乾隆四十五年皇上夀屆七旬聖駕五巡江浙四十九年載舉六巡皆䇿馬觀民以便瞻覲至嵗幸避暑山莊行圍閲稼無不按轡習勞本年東巡啓鑾至迴蹕天津率皆控御從容著在詩什御製策馬庚戌策馬曉春晴輕寒輕暖程畿南接山左駕送更鑾迎不覺八旬耄相闗一念情所欣入佳境稔後麥抽莖右恭録本年東巡策馬詩一首其策馬由天津府城至栁墅行宫詩謹分載本門敬徳類臣等竊以屬車清塵類陳露冕觀民之盛我皇上巡方法駕珠勒安行萬姓伏謁道旁靡不欽聖躬之矍鑠咸快就瞻至於莅蹕山莊嵗常策騎雖聖意擬於八旬後稍從頥養而髙年益健未覺其勞則亦聖不自聖之一端也皇上夀登八旬聖躬强健約舉每嵗詩篇具徴全體御製精神一律癸夘精神自信尚如常筋力微嫌遜昔强雖曰氣之率者志敢圖逸以懈其忙宵衣旰食身逢偶夕惕朝乾心朂長一紀佇將歸政後養餘年或樂時光按宵衣旰食朝乾夕惕二語古今承用習焉不察余謂宵衣旰食以體諸身者言朝乾夕惕以存諸心者言敬勤之意則同而内外之功各異且所謂宵衣旰食者亦偶遇機務繁重是以曉求衣食則不遑暇食耳至尋常寢興飲食自有常度設必每日中宵即起過午方食致徒勞無益而使文武諸臣僕御衆役疲于奔走難以為常詩所謂顛倒衣裳究何當於率作興事之義耶設以為勤政套語則是有名無實益不可若夫朝乾夕惕則易所謂自强不息書所謂所其無逸凡為人君者當常存欽翼無一念不敬天愛民無一事不謹小慎微庶乎萬㡬就理不負承天子民之責余臨御四十八年年逾古稀雖精力微遜昔時而精神自信如常猶日孜孜不遑暇逸惟益以此自朂而已因繹宵旰乾惕之義得什并識御製鮮寐庚子冬夜本亟長髙年復鮮寐交寅率已醒未肯披衣起叶近侍彼亦人丙夜念劬伺又思宵而衣端居應問事朝臣来自家或者有未至我自無眠耳人豈乏眈睡晏起既興箴自公復致議謂東方未明章進退兩涉咎為君難不啻腹藁漫成吟天明書已誌御製曉起癸夘老年率鮮寐丑末寅初醒未肯即披衣恐勞􅉏御等東方昔致剌晏起復為眚無是有多非為君難可省夘興或其可摺奏批各省引見對明廷人材酌莠潁豈以豫卷阿而忘𠡠政整御製少寐甲辰少寐老人常况當冬夜永寅初已懶睡寅正無不醒披衣坐徘徊明旦氣堪省且弗問政務恐勞衆馳騁我寅彼當丑齊風早致警謂東方未明章未明而求衣虚頌一以屏因復降温綸嵗邁七旬等貭明来亦可宜避夙興冷朕以年老少寐每日夙興即於養心殿視事諸臣自家入直起必更早大學士嵇璜蔡薪伍彌泰俱年逾七旬冬令衝寒頤養非宜因降㫖加恩令於日出後入朝如遇風雪沍寒即不入直亦可其三品以上七旬之大臣凖此用示優眷君逸戒予心臣勞憐爾景勉以勤賛襄陳善繩愆黽御製晏眠庚戌晏眠人為樂晏眠我謂苦豈其性異人聽我陳覼縷寐賴神之全老年人短阻是以寐弗長每每醒四鼓設如即求衣東方剌應覩侍御實亦勞侍御之人每日先一時早起祗候若四鼓求衣彼當三鼓而起是終夜不能休息矣彼非人子否叶無奈攬衾眠其晏翻有楚消煩或句成欹枕仍延佇貭明乃夙興斯苦向誰語問不早朝人用白居易語其樂誠何所臣等伏見我皇上夙夜宥密心矢惕乾御製精神一律發明宵旰之宵而不肯騖宵旰之名此誠躬行有得之言而示民以常度者也若夫求衣問夜古王以為盛軌而我皇則本諸性成葢勵明作體下情念念胥周無非以積健盡先勞之職夫豈拘拘於髙年養體謂可稍躭安逸也哉御製登望蟾閣極頂作歌丙午崇閣搆来已多年却祇四頂兩登頂乙亥年因里衮聖母大慶阿所備仿武昌黄鶴樓三層木料給值築於此厯年以來雖四登惟庚辰甲申兩登其最上層作歌暢目甲申今復閲廿年駒隙光隂真似騁古稀有六步尚强拾百十級消俄頃問斯老健以何得身每習勞以守靜詎惟養體此要詮夕惕朝乾胥是省昆明湖及萬夀山其餘事耳偶眺領御製白玉鳩頭杖口號壬寅白玉鳩頭刻杖扶即今健步尚非須山莊置待耆艾用耆艾猶能至此無御製詠漢玉鳩杖乙巳刻玉為鳩杖炎劉賜老民古應習多見今却作希珍獻徒稱瑞撫時堪寓仁健行權弗藉置待倦勤一辰御製篋韘用癸邜恭題皇祖御用韘詩韻辛丑門前呈射年十二壬寅嵗余年十二侍每邀皇祖于宫門前呈射發矢連中恩奬仰惟十有家法肄勤尚射癸巳嵗敬以垂示皇祖御用韘二弆之箧衍用昭手澤萬年耳䝉奬深恩識至今劼毖幸惟無忝澤覲揚敢或有渝心步艱中鵠已常愧自庚辰臂病後步射艱于持滿命中每引為愧而行圍藉馬力控射時仍以為常也馳可殪麋衆聴欽箧弆泐詞賡舊韻永懐寧為寳球琳御製詠和闐玉韘丁未璧圭題顆見决韘詠希聞儒士多䡖武熈朝率重文敢因家法懈猶日獵瑒勤騎射為我朝守是家法每諄諭子孫當萬年遵以予年逾古稀必嵗幸木蘭行獮猶能引控自如多有中獲葢以身先之不敢自逸至于步射以臂痛不能中鵲乆不為矣步射則乆置思之畧愧云御製乆不作蠅頭兹題夷齊廟四景於自寫卷中以限於畫境遂勉為之輙成此律癸夘二老聖之清者處為圖題句置齋中甲戌嵗駐此題廟中四景詩並冩屈蟠松圗攜歸戊戌及今巡再叠舊韻倶親書卷中兹以詩字較多限於圗幅因勉作蠅頭細書年逾古稀目力尚能不資眼鏡因示皇子及軍機大臣等並命賡和四景詩元韻題於卷末畱弆此處重来撫卷心難恝便以拈毫意有融促就八叉原則慣閒尋四景本相同蠅頭作不資眼鏡似勝據鞍矍鑠翁御製眼鏡辛丑眼鏡不見古来自洋船徑勝國一二見今則其風盛玻璃者過燥水晶温其性目或昏花者戴之藉明暎長上聲年人實資翻書棐几凭今四五十人何亦用斯競一用不可捨捨則如瞀定我兹逮古稀從弗此物慿叶雖艱悉蠅頭余昔年喜作蠅頭細書今所蔵卷册甚多近作憶昔詩仍書册尾目力頗覺遜前矣原可讀論孟如刻板四書字視之原如故也觀袖珍遜昔然斯亦何病絜矩悟明四勿倒太阿柄言一用眼銀則不可捨將被彼撡其權也御製眼鏡戊申眼鏡有二種水晶與玻璃玻璃價實亷水晶貨居竒水晶雖艱致用之無害滋玻璃出冶鍊薫蒸火氣貽長上聲年目力衰視物或可資今率五旬用何異同佩觿予古稀有八依然弗用斯蠅頭雖難工豆顆恒書之以小可喻大常理非竒思藉已明於他其道乖君師詩成既而思之明目達聰非藉已明於他人乎葢明目達聰公也寄耳目於左右私也此其間蹟相似而道不同差之毫釐謬以千里故大舜好問好察固明目達聰之公猶必執兩端而用其中若後世庸主以猜忌之私寄耳目於左右求其明適成其暗是故申而論之臣等伏覩我皇上承自天之保佑裕聖體之康寜雖當大耋増年而莊敬持躬從容適性允符丹書恭夀之訓是用諷㝷睿什循類恭輯葢凡一切用人行政宵旰勤勞何一不足以徴精神之康豫無能仰窺亦無能殫紀惟是日用行習髙年氣體所必資而尤多不能裕如者聖人以行健之緒餘而即為耆齡耋祘之所未能企及萬一若跋馬控弦登髙濟勝以至寢興之節明逹之公見諸指事成吟寓物徴實者即小見大莫不具有本原伏繹御製四徳論謂惟慎起居節飲食為養生之常道而若求仙服餌素鄙其術以是為我皇上之夀則皆由我皇上之徳之純固有以備致焉本年安南國王阮光平奉表有云仰瞻天容睟穆僅似五旬葢逺徼藩臣且知以敬服之心備形容之實矧臣等親依禁近常接龍光其慶幸為何如者乎八旬萬夀盛典卷十
