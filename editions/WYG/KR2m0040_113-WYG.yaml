body:
  text: 歌頌三十四萬夀恭紀宗經徴夀説翰林院編修臣阮元臣聞三極彛訓其書言經經者堯舜禹湯文武周公孔孟之説帝王稽古同天聖徳備焉慶惟乾隆五十五年皇上八旬萬夀萬夀臣仰思盛徳大業非三代以下史冊所可擬萬一者惟宗諸經傳以徴聖夀或管窺而得其詞焉臣謹案尚書洪範九五福一曰夀夀者福之初祐福者徳所致也恭讀五福頌以為夀富諸事皆受于天惟好徳修于人五皇極曰予攸好徳女則錫之福皆五福主徳之證至哉聖人之徳即福之基聖人之所以夀也帝王之夀必本於天書曰天夀平格孔安國傳曰言天夀有平至之君禮記中庸曰大徳必得其夀徴詩曰保右命之自天申之我皇上昭事惟敬書曰勑天之命惟時惟㡬恭繹讀召誥篇一言以蔽之曰曷其奈何佛敬以諴民為祈天之本以敬徳為諴民之本理益明焉大戴禮曰戒慎必恭恭則夀又引丹書曰敬勝怠者吉亦其義也皇上躬親郊壇大祀極致精䖍其在周禮曰大司樂冬日至地上圜丘夏日至澤中方丘祭法燔柴于太壇祭天也瘞埋于泰折祭地也又以正月上辛祈榖孟夏常雩者公羊春秋曰郊用正月上辛月令天子乃以元日祈榖扵上帝左氏春秋曰龍見而雩月令大雩帝用盛樂是也社稷壇加玉者祈農事也周禮小宗伯掌建國之神位右社稷春秋外傳曰玉足以庇䕃嘉榖朝日夕月諸中祀兹復躬親一週及扵岳瀆咸命使祭告禮記祭義曰祭日于東祭月扵西以别外内周禮大宗伯以實柴祀日月星辰以槱燎祀司中司命飌師雨司公羊春秋曰祭大山河海山川有能潤扵百里者天子秩而祭之禮記王制天子祭天下名山大川五岳視三公四瀆視諸候是也定壇廟祭器者周禮司尊彛掌六尊六彛之位禮記郊特牲曰鼎爼竒而籩豆偶法古制也恭逢聖聖相承重熙累洽百有餘年皇上寅承丕基無事不敬法列祖詩曰下武維周世有哲王三后在天王配于京我國家創業東土締造維勤皇上編開國方畧以闡功徳書曰惟先王建邦唘土公劉克篤前烈至于大王肇基王迹書薩爾滸戰事者仁者無敵受命伊始書曰壹戎衣天下大定諭立卧碑述太宗訓守冠服騎射者遵成憲也詩曰思輯用光弓矢斯張干戈戚揚又曰率由舊章作紀恩堂前後記敬誦實錄者逮事聖祖不忘恩教也皇矣之詩述文王逮事大王大王受天命及王季文王其詩曰維此王季帝度其心乂曰克順克比比扵文王四巡盛京親製詩賦以彰謨烈詩曰天作髙山大王荒之彼作矣文王康之又曰昭兹来許䋲其祖武于萬斯年受天之祜皇上䋲祖武詒孫謀五代一堂古今未見復致玉牒十一世之慶爾雅曰子之子為孫孫之子為曾孫曾孫之子為元孫元孫之子為来孫来孫之子為晜孫晜孫之子為仍孫仍孫之子為雲孫皇上明俊徳以親九族恩澤深厚禮記大𫝊曰尊祖故敬宗敬宗故收族詩序曰行葦忠厚也皇上勤扵庶政睿思所周事必立豫易乾象曰天行健君子以自强不息書曰一日二日萬㡬御書無逸萹掲為座銘臣㐲讀經筵御論君子所其無逸訓所為處與召誥王敬作所相發明聖人之言經訓所折衷也法宫行在皆秉燭待章左氏春秋曰夙興夜寐朝夕臨政視事移晷𫝊餐嚮午書曰自朝至于日中昃不遑暇食内外奏章皆丹毫親批日数十事周禮内史凡四方之事書内史讀之皇上猶無湏内史之讀也内外臣工日有召對下至一命亦無遺焉周禮小臣掌三公及孤卿之復逆大僕掌諸侯之復逆宰夫叙羣吏之治以待諸臣之復萬民之逆是也法祖六巡江浙觀民察吏不自暇逸岱岳五臺豫河皆親駐蹕易曰省方觀民設教孟子曰天子適諸侯曰巡狩巡狩者巡所守也禮記禮器曰因名山升中于天詩般序曰巡守而祀四岳河海也天下庶獄事必親覽兹復恩詔减等王制曰刑者侀也侀者成也一成而不可變故君子盡心焉昜曰雷雨作解君子以赦過宥罪耕耤之禮必躬親者禮記月令天子乃擇元辰躬耕帝籍春秋外𫝊曰民之大事在農上帝之粢盛扵是乎出食為民天民為國本皇上愛民重農民數榖數要㑹時聞周禮小司㓂大比登民數自生齒以上登于天府禮記王制五榖皆入然後制國用周禮天府若祭天之司民司禄而獻民數榖數則受而蔵之至扵祈謝雨澤驛詢天下雨暘收穫每霑足豐稔必詩以誌喜爾雅曰四時和謂之玉燭甘雨時降萬物以嘉謂之醴泉榖梁春秋曰五榖大熟則為大有年又曰閔雨者有志乎民者也喜雨者有志乎民者也正賦漕運嵗億萬計皇上臨御以来免賦者三免漕者冄兹復恩蠲天下正供臣謹案周禮小司徒鄉師遂人遂師遂大夫皆有辨其施舍之事鄭康成讀施為弛盖周時什一雖輕皆無普免之事豈若我皇上蠲貸至二千萬萬乎臣伏讀經筵御論有孚恵我徳以九五君位恵即我徳當置恵心于勿問聖謨洋洋所以損上益下有孚元吉而説无疆也偏隅偶歉恩加蠲賑截漕平糶以劑盈虚䘏民也周禮司稼以年之上下出歛法均萬民之食而賙其急平其與河防者民生所闗皇上命濬陶荘六塘伊家諸河清黄交滙誌水宣洩海塘建石重隄保障書曰予決九川距四海濬畎澮距川考工記曰以防止水禮記月令曰完堤坊春秋外傳曰陂障九澤民間五世同堂二百餘家夀逾百齡同居十世皆夀世人瑞也爾雅曰子子孫孫引無極也禮記曲禮曰百年曰期頤孝經曰示之以禮樂而民和睦命重舉千叟宴者皇建有極歛福以錫庶民也禮記王制曰凡三王養老皆引年周禮伊耆氏共王之齒杖爾雅曰黄髪齯齒鮐背夀也皇上典學髙深文徳淳懋毎嵗必御經筵宣講書曰念終始典于學抑戒之詩曰抑抑威儀維徳之隅臨雍講學釋奠幸魯崇儒重道也禮記王制曰天子曰辟廱詩曰於論鼓鐘於樂辟廱文王世子曰天子視學大昕鼓徴乃命有司行事興秩節祭先師先聖焉御製三老五更説證以左氏孟子其義乃明重排石鼓文者存周法物用光我文治武功也詩車攻序曰宣王復古也吉日序曰羙宣王田也御製詩五萬餘萹文千餘萹尚書帝庸作歌易伏羲畫卦文王作卦辭大戴禮曰武王作機鑑楹帶十七銘庶足擬焉御書寳繪咸臻極詣論語曰固天縦之将聖又多能也親定祭祀朝饗樂章及詩經樂譜其在周禮大司樂大吕應鐘小吕夾鐘皆歌以祀享詩鹿鳴以燕羣臣書曰詩言志歌永言聲依永律和聲即其義也鏄鐘特磬列于大樂御製笙詩依義補辭其在爾雅曰大罄謂之毊大鐘謂之鏞儀禮鄉飲酒燕禮諸儀皆笙南陔華黍白華由庚諸萹即其義也河源淮濟涇渭諸水考厥源委其在爾雅曰河出崑崙虚書曰𨗳淮自桐栢𨗳流水東流為濟詩曰涇以渭濁即其義也詔收天下遺書分為四庫儲以七閣其在周禮外史掌三皇五帝之書鄭註所謂三墳五典也皇上闢門籲俊正科之外六開恩榜冄舉制科書洪範曰俊民用章詩卷阿序曰言求賢用吉士也皇上神武邁倫嘗發廿矢中十九周禮射人王以六耦射三侯三獲三容也每嵗秋行圍木蘭䝉古進宴所以詰武綏逺也榖梁春秋曰因蒐狩以習用武事禮之大者也詩時邁曰薄言震之莫不震疊皇上奮武開疆戡㬥柔逺蕩伊犁平回部收金川定臺灣為亘古未有之功業書序稱湯伐三朡成王踐奄皆不足比數左氏春秋以禁㬥戢兵保大定功安民和衆豐財為七徳惟皇上武功備焉至扵先征而後歸服者謂之歸降回部􅃡甸是也書曰帝乃誕敷文徳舞干羽于兩階七旬有苗格也不加征而自来歸者謂之歸順土爾扈特㧞達克山安集延㾗都斯坦布魯特哈薩克巴勒布是也書序曰巢伯来朝芮伯作旅巢命巢逺國自来也邇者安南王阮光平入覲祝釐則我皇上推亡固存承時行之道大戴禮曰重華南撫交阯中庸曰栽者培之傾者覆之海外逺國若髙麗暹羅琉球南掌皆入貢夀宇不可縷計爾雅曰距齊州以南戴日為丹穴北戴斗極為空桐東至日所出為太平西至日所入為大䝉大戴禮曰海外肅慎北發渠捜氐𦍑来服是也是惟我皇上大聖大仁允文允武用是承天純佑盛徳曰新登八衍範念用庻徴嚮用五福臣仰見庶徴之應本於五事寅恭對越為夀之基此貌之恭作肅也恵澤優渥是可徴曰肅時雨若矣王言作則臣下禀令此言之従作乂也當陽用命是可徴曰乂時暘若矣克知灼見照詧㡬先此視之明作哲也徳化如春可是徴曰哲時燠若矣達聰兼聴發慮出謀此聴之聰作謀也凝成萬物是可徴曰謀時寒若矣精一執中廣淵齊聖此思之睿作聖也従欲風動是可徴曰聖時風若矣皇上臨御五十五年慶夀八句由是推之萬年為萬萬旬易䇿天數二十有五地數三十凡天地之數五十有五經卦皆八因而重之爻在其中二篇之䇿萬有一千五百二十自然之數也又萬夀年幹在庚爾雅曰太嵗在庚曰上章庚猶堅强也章明也日躔在酉酉為夀星之次爾雅曰夀星角亢也是生成推衍皆與苞符象曜相應故曰聖人之夀皆本扵天錫羡延洪惟億萬年天保之詩臣下歸羙崇尊頌福禄也曰詒爾多福曰受天百禄曰萬夀無疆猗歟盛哉聖夀之徴諸經者盖逺邁皇王哉萬夀恭紀七言排律一百四十韻翰林院編修臣那彦成羲輪鼂彩麗扶桑軒筴榮徴寳祚長昊縡欽承臻景貺睿謨廣運迪前光貞禔闡洛康而色鑿度占乾健自强算亥數應稽隸首横庚嵗恰叶璣囊神圭日月分雙璧篆笈龍魚唘八琅玉刻苕華心念耄苞推元命籙膺昌三才道合三皇紀五代歡臚五福堂澤與雲㳺膏乍普聖時風若羙斯彰踰䋲越契難摹盛繞電流虹共溯祥訓庫大中皇有極域依曼夀佛無量嘉符預卜羣靈奏隆軌徒教六帝望萬嵗佇聴呼嶽麓一誠先矢格穹蒼璇庭敷繹開晨朗瑄玉懐濡練日良形具禺龍昭肹飾輝生爟火逹炎煬四嚴警漏停清蹕八溢和容振廣塲精爽湏摇慿兆位祥甘咫尺答雩禳函蒙黙貺神来止親仰㽞俞志肅将敬以信天知所助聰惟䋲祖凛無忘十三甲勁威遐邇二四旗明辨正鑲創制一編文鑑定守成千古卧碑防曼珠風土開金障靈鵲源流紀玉筐華黼九乾嚴對越珠邱四駕奉蒸嘗風清秋甽黄雲地氣王真人白水鄉弓劍有遺承慶澤烟霞無恙接蕭薌萬年龍虎青山䕶五廟神靈寳冊蔵篇什已頒新樂府畵圖猶寫舊戎行艱難百戰思松杏肅穆羣臣侍衮裳實録宏宣天始旦慈恩髙紀室中央黄榆紫塞觀其勝松棟雲軒質在傍自昔典謨垂渾渾方今禮樂表煌煌設容次第分同異審律森嚴辨抑昻監夏殷周存矩矱合風雅頌叶笙簧神尊太乙陳瑶薦萹重由庚補樂章較黍詎慿田父尺浮蘭還媵武安鈁聲傳鏘珮遵綿蕝響戞鳴球截玉肪鹵簿肅傳天罼隊太常新隸狄鞮倡摹形有取圖傳聶正雅何曾議待姜乙覽已先窺奥突辰儀自妙挈維綱波濤海立雲霞接翰墨天来雨露香文訂兩編含象緯詩題五萬發宫商元音鳯舞鸞歌寫宻􅇨爐烟扇影颺上界奎光東壁耀仙人廣樂洞庭張經曾搆室金陀岳帖待臨池玉版王一統志垂窮亥步十年書奏壓辰陽侍臣劉向勤編校謁者陳農集㪚亡金鐀嚴儲捜史柱石函深秘發謨觴瓠蘆舊序傳開士漆壁零璣拾大航往復訂訛如數米殷勤去穢類排穅誤叅衛客河邉豕訛證将軍白下羊善本春明㽞姓氏快心秋葉埽綈緗讀書燈許分藜杖得意花齊放筆牀傑閣嶒􅗆聫七緯遺文緝孴補三倉杓瞻北斗權衡正路得南車指示詳每錫鴻萹題竹素全慿炯照定鉛黄勤披丙夜銅籤報速逓庚郵寳䭾装心矩徽徽通萬類威棱隠隠讋遐荒采薇治外天聲壮搏獸于苗士氣揚九伐常申司馬法兩甄頻合羽林郎催殘笳雪靈銔震拓破鈴風畵㦸趪大将縂能嚴細柳聖人原不侈長楊秋呈馬戲金騠駚寒肄氷嬉繡裲襠薄海共知安葆就長空自合掃欃槍䕫皮制鼓寧爭鶚井底彎弧偶直狼勢挟順風捜􅈎筰智矜㺯雹笑蜣蜋中宵燈火夷回凖半日鐃歌度鄯湟宻算幄中遥制勝良籌閫外喜偕臧庚辰授䇿先清路戊巳㽞屯即䕶𦍑圖像許教登紫閣洗兵真欲挽銀潢銘詞大字厓雙壁勝纛靈風殿兩廂决䇿乆欽周内外綏猷彌復凛㡬康養心衡庫惟時勅勤政巖廊敢不蘉㸐燭行帷儲驛奏視星清曉聴鸞鏘所其無逸孜孜急昔曰先民賛賛襄大典克諧歌棫樸盛時特達重圭璋春風共羡芙蓉鏡花様爭呈芍藥箱野有苹蒿原飼鹿苑多梧竹待棲凰篇稽汨作叅虞夏學廣成均邁漢唐圓海泉回泉井汲飛甍雲起状翬翔大昕同聴伊耆鼓列㦸如環闕里牆黄帕進書承講畫緇衣拜仗學趨蹌橋皆觀者圜如壁制逮羣候半即璜春可學詩秋學禮細而為桷大為杗儒林簮管窺中秘獵碣揮戈證外攘􅏶馬迷離尋􅞚趩其魚細碎辨􅀢魴摩挲雲物罍為坎組織璿璣斗戴匡不遣闕文㽞夏五何湏正字問春坊圖書推闡光斯炳更老申明論益荘樂譜賔筵隆酒醴圖披耆舊話滄浪投壺算益東王箭具饌香分太乙糧左掖沐恩騎叱撥上林受賜杖桄榔龍衣宴愷歌雲縵鶴髪歡餘賦露瀼會擬羣仙身各徤經題千佛願能償滿頭雪刺誇新第兩字氷銜慰上庠人瑞孰如今日盛年豐更喜普天慶深宫軫念惟耕耨蔀屋闗心為雨暘待補漏天刑黑蜧欲濡渇地下商鴹元辰藉綵申圭壁吉亥親畊重稲粱田意艱難談后稷農祥次第順勾芒民傳古法除鼃黽祠聴村巫賽虸蚄三白占祥題快雪二紅得味騐初霜旋觀芸耔旋觀穫盡埽風霾盡埽蝗著茟丹青多説稼踏燈風景但歌秧羣情毣毣申鳬􅇨帝意􅚳􅚳慰鳥䀪指日斗車行婉僤籋雲天驥效騰驤翠鱸折溜分蘭采華盖従風聴玉瑲旒擁四圍森翠嶂畵開一􅖵現朱方迎鑾謡咏時相接夹路耕漁絶不妨照屋光明騰寳燭𨗳民節儉罷珠璫潜敖瀛蜃歸安帖豈有氷蠵不悚惶塘斵魚鱗摧犖确楗排𤓰蔓下篔簹浪沙鬟剔虹新亘臠葑䟽除葦可杭無復漢歌憂鉅野早同禹跡底衡漳黄紓秋信知誠格緑滿春波見徳洋九囿生成咸得所一人宵旰厪如傷消除瘯蠡軒光竈斟酌陽和左个房候屆青黄籌接賑粟蠲紅白罷連檣寧分畛域還賙晉不惜膏腴屡發棠三錫晉階隆爵賞十華溥賚逮嫠孀允諧簫勺潜除慝恵念蜎蠉凛納隍慎爽鳩官施穏枯放金雞赦静鋃鐺雛經天繪皆推爱蝶有仙心亦奉常壬吕聳誠翹旭卉寅賔稽首罄紘滄驃傳蠻驛繙金葉象效文身綴玉瓖鳥使呈圖森鹿角禅師吹貝度羊腸嶽形攀律蟠方丈王㑹敂歈誌善芳黄潤比筒編吉貝赤華嗅地獻狼㬻化遥路盡重鞮譯秋半星方候角亢陛制含瑜陳象戴衢尊合飫酌神漿旁交光碧蓬莱島宻絡純青靈夀罔一氣祥和開夀宇九重詄蕩闢天閶蘿圖推紀髙蜚仡蒿柱提符邁武梁五十五年仁所被八旬八月慶無疆恩叨累世心傾藿職愧簮毫手歛薑巢閣早㸔儀鸑鷟矢音雅願托鴛鴦金波朗淬千秋鏡釦砌香生九節菖備算六觚無紀數海籌萬億祝吾皇八旬萬夀盛典卷一百二十四
