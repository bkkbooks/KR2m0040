front:
  text: 欽定四庫全書八旬萬夀盛典卷六十七恩賚六本年蠲賦三
  hash: sha256:d9fd2d6ad0f4de66d972676463c3b463087807314a6a94a6efeb7a330fc68bd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_067-1a, image: WYG0660/WYG0660-0794a.png}
body:
  text: 福建廵撫臣徐嗣曾謹題為恭謝天恩事據布政使伊轍布詳據福州府知府成寧等㑹詳據閩縣等各州縣詳據在籍大學士蔡新等僉呈稱欽惟我皇上徳洽羣生恩周寰宇天庥滋至久保合於太和聖敬日躋用緝熈於純嘏歌盛治而已欣熈皥念民依而尚厪盖蔵遡自御極以来叠荷皇仁之被家給人足再蠲惟正之供慶行恵施三奉温綸之沛固已陬澨咸安耕鑿黔黎乆慶昇平恭逢八秩昌辰重荷元正曠典一人有慶兆民賴而率土歡騰萬夀無疆九有同而普天澤廣綸書特下全蠲秸銍之徴温㫖遙頒並免租庸之納一十七省共戴尊親億萬斯年長沾樂利丹山碧水湛恩與膏雨偕流白叟黄童喜氣與頌聲俱暢民安作息三山之兊澤彌亨年慶豐登七月之豳風如繪康衢尊獻含哺稱介夀之觴海屋籌添食徳上長生之籙所有感激下忱謹合詞呈請轉詳代題恭謝天恩等情據此該署閩縣知縣吉夀等詳稱伏惟聖徳懋昭皇仁廣被呼嵩祝華延夀㝢於無疆扇景濩甘荷殊恩於莫外有年頻紀早覘庾積廪盈常賦特蠲更見衢歌巷舞三山喜溢十郡歡騰躋萬姓於春臺信億齡之嘉㑹堯階日麗愷澤覃敷禹甸風遙湛恩屢沛青疇緑壤億萬里銍秸並除白叟黄童十七省笙歌齊奏南山北斗仰黼座以呈祥十雨五風共康年而獻祝兹據該紳士蔡新等僉呈謝悃理合轉詳等情據此該福州府知府成寧等欽惟帝徳覃敷皇仁叠沛和風甘雨涵濡於侯甸要荒文徳武功震耀於東西南朔太和醖釀一人肇錫蕃釐化日舒長六合咸登夀宇夫耕婦織屢兆豐年巷舞衢歌欣逢盛世信熈朝之極軌誠郅治之休風仰維乾徳無疆泰辰伊始騰恩詔於八旬萬夀共慶盈寧蠲正賦於五十五年盡沾樂利阜財觧愠如被南薫千倉萬箱獨饒滄海長申燕喜永載鴻熈據此該布政使伊轍布欽惟軒紀洪延玊燭恒調於六宇堯仁廣被璇圗久協夫萬邦補助頻施數已逾於億秭丁糧普免恵更越以再三兹荷元日恩綸為普八旬慶典該紳士等優㳺夀宇沐浴仁膏蒙申錫之有加荷推慈於無極凡納緫納銍納秸全弛度支合杖鄉杖國杖朝感臚樂利仙霞益夀枌榆之食徳何窮南海稱觴葵藿之傾心自切理合據情轉詳察核具題等情到臣據此該臣欽惟我皇上仁孚九有道洽三無問俗省方時厪知依之念阜財制用屢勤若保之求閭閻乆享盈寧蒼赤咸歌熈皥兹欣逢皇上寳集八徵論抒四得特霈始和詔㫖普免天下錢糧春膏無遲速之區恵澤逾尋常之格豳風可籥禹甸胥畇沐三次之鴻慈於今而四頌萬年之景運自古無雙九陛承流三山齊舞歌康衢之黎老惟頌昌期耕瀛海之生畨亦申嘏祝允聖朝之盛事盖前代所罕聞臣不敢壅於上聞謹㑹同閩浙總督臣覺羅伍拉納合詞具題伏祈皇上睿鑒謹題奉㫖該部知道湖北廵撫臣惠齡謹題為恭謝天恩事據布政使陳淮等詳據武昌等十府轉據江夏等州縣衛所士民呈稱欽惟我皇上仁育萬方澤周四表瑞符協應兆五風十雨之祥民氣恬和享千倉萬箱之慶固已薄海乆安於熈皥羣黎共樂夫盈寧茲乃恭逢萬夀八旬之期欣邀千載一時之典特頒綸綍普免賦租統十八省而均荷皇慈合億萬人而咸霑聖徳仁同一視遐陬無不被之方隅期以三年次第有因時之良法殊施稠叠生成厪切於小民渥澤滂洋髙厚直逾於大造幸際方中之景運億載蒙庥難酬莫大之鴻恩同聲祝嘏所有感􅈭㣲忱理合恭籲轉詳題謝天恩等情由府轉詳到司欽惟我皇上徳含覆載仁並生成念厪於箕風畢雨之情勤施於旰食宵衣之際殊恩遍布已邀錫賚之三週温詔下頒還幸恩膏之四洽恭逢萬夀八旬之盛賜復九州百姓之家賦稅全蠲草野之葢蔵尤厚遐陬普被閭閻之康樂為書經國計而均以三年法良意美合寰宇而仁同一視室盈婦寧恩諭從天懽聲動地江深漢廣莫名聖澤之汪洋日升月恒幸際昌時之熾盛仰北辰而抒悃受福無疆聴南紀之呼嵩普天同慶茲據武昌等十府詳據江夏等州縣衛所士民人等籲詳代題等情理合據情㑹詳查核具題到臣欽惟我皇上徳協清寧恩同覆載健行不息易占六位之成茀祿維康詩頌九如之句兹當八旬萬夀忻看五世一堂慶集宫庭懽騰海宇特沛初春之膏澤普蠲直省之金錢躋萬姓於春臺開八荒之夀宇江永漢廣難名帝徳之高深巷舞衢歌彌戴皇仁之浩蕩從此京秭垓壌慶比户之皆盈南朔東西集萬方而来賀臣謹㑹同湖廣總督臣畢沅合詞恭疏題謝伏乞皇上睿鑒施行奉㫖該部知道湖南廵撫臣浦霖謹題為恭謝天恩事據布政使王懿徳詳據長沙等府㑹詳據各州縣㕔衛詳據紳士羅典耆民鄭永清等呈稱欽惟我皇上徳懋健行化成久道八紘霑闓澤普蒙樂利之庥六合徧淳風聿著皥熙之象固涵濡之普被已淪浃之難名茲者欣逢萬夀慶洽八旬備名位祿夀之全必歸大徳統南北東西之廣咸被鴻庥引飬引恬富已久蔵於庶納㥎納秸賦頻惟正之蠲合直省以輪年先周瘠土减輸租於業户更廣深仁典等生際昌期恭逢曠典泳逰夀㝢順帝則於不知不識之天渙汗恩綸樂豐年於多黍多稌之日益臻康阜莫罄歡欣循出作入息之常敢忘帝力效撃壤呼嵩之祝仰答天恩伏乞詳請題謝等情由府州轉詳該布政使王懿徳等㑹看得世際郅隆賴一人之有􅂟民安豐樂欣萬國之咸寧兹者恭逢皇上衍慶八旬集禧五代聴十行之𫝊詔正賦全蠲分三載以輪年歉區先及湛恩汪濊匝瀛嶼以咸周闓澤覃敷溯瀟湘而渥被堯天篤慶彌仰延洪禹甸騰懽益臻安阜耕田鑿井羣欣有脚之春剥􅀥稱觥願上無疆之頌茲據士民合詞籲請題謝等情到臣據此該臣看得鳩民昭郅治皡皡成風鳯闕下恩綸元元徧徳覩盈寧之益著宜歌頌之難名欽惟我皇上至仁丕冒兩大無私愷澤旁流萬年有祜恭慶八旬之萬夀齊呼萬嵗於八紘軒籙誕膺堯天共戴綿延𤓰瓞萃五世於一堂小大共球來萬邦之重譯實古來所罕覩共仰光華更望外之有加廣宣綸綍綜丁田之賦遍九域以全蠲量出入之均别三年以遞免嵗亦無恙既蠲緩之攸分富以其鄰更佃租之並减序後先而廣被昭裒益之平施胥蒙睿慮之周益見生民之厚十行詔布統海内以騰歡三楚地偏望日邉而銜戴臣等依光北極供職南邦嵗屢豐而共慶承庥恩彌渥而益徴蔵富衢歌巷舞已遍瀟湘七澤之鄉受禄宜民願上松柏九如之頌臣謹代抒下悃敬達上聞㑹同湖廣總督臣畢沅合詞恭疏題謝伏祈皇上睿鑒施行奉㫖該部知道河南廵撫臣穆和藺謹題為恭謝天恩事據布政使景安等詳據開封等九府四直𨽻州轉據祥符等一百三州縣士民呈稱欽惟我皇上仁育萬方恩敷九有堯尊普酌符願聖人夀之辭舜軫常調致阜吾民財之盛福徵備於時若風風人而雨雨人善政篤於厚生衣衣我而食食我頻年緩徵賜復廣露積於閭閻到處登榖告穰比崇墉於囷廩大河南北乆流浩浩之仁二室東西曷喻巍巍之徳茲逢八旬萬夀欣際千載一時詔沛雞竿恩頒燕席並元辰之特㫖布諭宣恩免直省之正供奉時行慶當家給人足之㑹勤施四次普蠲洵法良意美之圗量予三年遞及欣聞巽命幸沃豐膏徧河聲嶽色之間雲蒸喜氣同日升月恒之久山祝聖齡伏乞申請題謝等情由府州彚詳到司由司轉詳到臣欽惟我皇上夀富熾昌聖仁博濟洪禔普錫洽慶於東西南朔之區時憲省成協順於嵗月日星之軌六合躋春臺之上民氣恬熈八旬欣夀宇之開帝期曼羡維中州之宅土本宜沃野深耕相小民而知依恒共逢年力穡茲荷恩綸蠲賦一寛令甲之常更籌良法輪年盡免地丁之入奉宣徳意共樂豐年山農澤農地農每幸催科之無擾五榖九榖百榖自饒高廩之多儲地告河清詎俟千年而一人齊嵩祝咸呼萬嵗者三臣不敢壅於上聞謹具疏代題恭謝天恩伏祈皇上睿鑒奉㫖該部知道山東廵撫臣覺羅長麟謹題為恭謝天恩事據布政使繆其吉等詳據濟南等府州轉據歴城等州縣衛所紳士呈稱竊思九賦為經國之常夙垂令典什一廼中正之法乆奉成規上地下地辨其方恒用一而緩二納秸納􅖽殊其制毎耕三而餘三欽惟我皇上徳協羲軒仁同姚姒􅄎祥和於宙合共沐生成敷愷恵於田功羣安恬養固已士民被澤化國之日舒以長耕鑿蒙庥康衢之民作而息萬邦告屢豐之慶億齡欣有道之長方殷惟正之供敢覬有孚之恵茲值五世一堂之慶恭際八旬萬夀之期特降諭㫖將乾隆五十六年錢糧通行蠲免澤如雲行而雨施徳已髓浹而肌淪當翠華之七廵荷綸音之叠沛宸𠂻籌邦本深知稼穡之艱難睿慮念民依益廣閭閻之儲蓄鮮一夫之不獲期三年而有成常邀樂利於昇平咸享安恬於盛世含哺鼓腹皆由帝力之生成巷舞衢歌一本輿情之歡愛惟是下懐愚悃無由上達宸聰伏祈轉詳據情題奏等情據此該厯城等縣查得草野急公之願每樂輸將國家惟正之供久垂令典欽惟我皇上徳􅅷堯階仁周禹甸廣春秋之補助屢兆豐穰知稼穡之艱難尤敦儉樸固已昇平共享樂利咸臻矣兹復邀賦額之全蠲沛恩施而通免山陬海澨既致慶於盈寧魯甸齊郊更荷恩而豐裕讀十行之丹詔深仁偕渤海同流齊萬嵗之山呼聖夀與岱宗並峙茲據各紳士公籲前来轉請具題以甲謝悃等情據此該濟南府知府等㑹看得維正偹度支之需自有成則薄歛渥閭閻之恵叠布深仁欽惟我皇上宵旰精勤仁慈普覆知周稼穡常願百室盈寧念切雨暘惟冀三時不害固已羣登熈皡歌浩蕩於昌期共沐安康樂生成於盛世兹復承普天同慶之日施率土廣被之恩免億萬之丁糧異數夐超今古逾再三之申命殊恩迭沛寰區分次第於三年魯甸齊郊咸歌樂利遍和甘於四海山陬海澨悉沐豐盈所以夀總歸仁羣効華封之祝民惟徧徳咸歌天保之章屢荷鴻庥均登夀宇雖户安耕鑿難名帝徳之無疆而世際亨嘉莫喻輿情之交忭兹據厯城等州縣衛詳請題謝等情到司據此該布政使繆其吉看得夀宇鴻開仰光華於舜日恩施特沛沐雨露於堯天欽惟我皇上躋八旬萬夀之昌期備五世一堂之盛事普天同慶薄海騰歡誠史冊所希聞實古今所罕覯伏念愛民如子錫福同天平時軫念蒸黎每不惜萬千之帑藏此日舉行慶典更普施億兆之恩膏承異數之頒逺及於山陬海澨被至仁之育近周乎魯甸齊郊本年之嵗額全蠲數載之舊徵盡豁憶自正供全貸迄今已四免輸將即此分郡停徵統計而三年溥徧皇仁廣布億萬家鼓腹含哺丹詔遥𫝊十八省民安物阜梯山航海集萬國之共球巷舞衢歌極兆人之頌祝理合轉詳具題等情到臣該臣看得茅簷蔀屋久安耕鑿於昇平魯甸齊郊咸享豐亨而愛戴欽惟我皇上乾行合撰泰運重熈年三登而闡帝期嵗豐人樂夀八旬而躋仁宇詠徳含淳當翠華之七廵荷綸音之叠沛已無一夫不獲欣看萬姓咸寧兹恭逢八旬萬夀之昌期普天同慶快覩五世一堂之盛事率土騰歡伏念帝徳醲敷頻施和煦皇仁廣浃復免徴輸十八省之嵗額全蠲次第而計期三載億萬家之舊徴盡貸今茲而已免四輪三齊長沐涵濡十郡同深頌祝是以輿情歡忭齊呼聖夀之無疆慶祉延洪共感天恩之大賚兹據布政使繆其吉詳據濟南等府州縣衛所轉據紳士萬斯年等合詞叩謝恭懇代題等情前来臣不敢壅於上聞謹代題恭謝天恩伏祈聖鑒謹具題聞奉㫖該部知道
