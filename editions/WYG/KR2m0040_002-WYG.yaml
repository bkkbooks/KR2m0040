body:
  text: 乾隆四十八年皇上聖夀七十三御製詩文重華宫記宫殿之制乾清坤寧二宫為紫微正中左右各二永巷每一永巷以次列三官斯為十二宫其後東西以次各列五所重華宫則昔之西二所也雍正年間予䝉賜居於此即位後應升為宫彼時大學士鄂爾泰張廷玉擬以重華為額雖頌之意耶而規即在此是以俞而稱之夫重華協帝豈易言哉必有所以勅㡬興事知人安民而其本則在於審危微之心執精一之中是以四十餘年惟日孜孜宵衣旰食雖未致隕越而於熈世化民究無所成是故紀恩堂之記為於丙戌抑齋之記作於辛夘凡所以遲遲慎重者恐有言行不符致負初心耳若夫重華宫之記自不可闕而其應慎重又奚啻前二記之比哉少而居之長而習之四十餘年之政皆由是而出之兹去歸政之年亦祗一紀然予猶是予也政猶是政也寰區猶是寰區也而户口日以増穀帛日以昂養且不能那更言教蒿目焦心難臻大當迴思居是宫勤聖學而談王道不惟莫之有為而竟失於無策則是記也亦是訟自責之章益増慚愧而已昔宋孝宗倦勤之後所居號重華宫此係近年觀武林舊事而知者其名不約而同然既為上皇奚取重華之義彼其之人實非予所羡也一紀之後將退居寧夀宫亦不忍移此名於彼蓋宿學之所安舊劍不能忘也是以四十八年以来元旦除夕無不於此少坐新正與諸臣茶宴聨句率為例典異日歸政或時一来臨更成佳話其能踐斯言與否則敬俟昊蒼之眷佑今日之下亦不敢預為侈談也臣等伏見我皇上省成慎憲凝績亮工與濬哲文明之聖後先合揆而是記作於擬定宫名四十餘年之後於熈世化民猶若有歉然不自足者且謂户口日増穀帛日昂蒿目焦心失於無策聖人之憂民如此所由位禄名夀申保無疆也歟癸夘元旦嵗朝嵗徳重陳揆天紀欣逢茒茂覃踐阼而今四十八得年忽爾七旬三未登耄耋慎如始䖍祝雨暘利作甘詰曉瓣香顒籲佑大河舊路復江南元旦試筆去嵗元辰因值齋朝儀移後五朝排敬天較向賀正異乾隆己未丙寅戊寅丁酉皆元旦遇上辛應齊以慈寧賀正故于次辛元祈穀詳去嵗旦試筆詩注恭已從兹擬例皆自去嵗依雍七年四月上辛元旦即齋之之為例㫖永以矣禮偹太和萬邦㑹樂含泰簇八音諧垂衣黼扆皇云乆謙受滿招益惕懐瑞葉仙蓂初茁辰根棋萬物樂生寅周書法古惟無逸堯典放勲在睦親派衍千年四品秩支繁十世一家倫本朝宗室繁衍向来閒散者例無頂戴昨冬降㫖將王貝勒貝子公之子嗣俱照䝉古王公台吉之例分别給與頂戴其餘閒散一槩給四品頂戴兹于新正初十日錫宴頒賜凡二千人皆太祖以下本支雲礽蕃衍正及十世笙簧酒醴承筐繼大宴乾清待以旬臣等謹案我國家本支百世瓞衍椒繁皇上惇叙推恩典明禮偹于壬寅冬特詔王貝勒以下之子嗣俱分别給與頂戴其餘閒散宗室一槩賜四品秩新正十日大宴於乾清宫加之渥賜睦親之典自古所未有矣癸夘春帖予俶律入初嵗正月初三日嘉占協重寅寅正初刻五分立春萬方一氣遍慶莫不知春臘雪符三白條風鬯八埏物和時共泰民以食為天癸臨夘茂又過辛與物皆春共和春紀嵗憲書列重格忽為七十有三人新正樂夀堂一嵗依然一嵗新百年得㡬上聲百年人古稀天子有去聲三益勅命時㡬以萬真住此尚當遲週紀臨斯怯復值初春庭軒規制肖淳化長眷園之淳化軒先已落成原為歸政後園庭憇息之所兹寧夀宮之樂夀堂乃仿其規制為之風俗惟慙未返淳迴思一律踐阼迴思廿五嵗朝班較我嵗都多怱怱􅜼八春秋閲忽忽熈康雍正文武磨余初踐阼時朝班文武大臣率皇祚皇考所簡用年齒皆長於余閲今四十八年荏苒代謝康熈雍正年間舊臣消磨無一在朝者矣㡬個老臣用由我其餘在列長上聲於他現在廷臣中年逾七十以上者惟大學士英亷嵇璜協辦大學士尚書永貴蔡新尚書曹秀先綽克托都統王進泰等數人率皆乾隆初年以後漸行擢用其餘如大學士阿貴三寳及内外大臣等雖多六旬以上者皆較余年少云驀然自問率興事蒿目焦心愧若何塞湖弗泛月疊去嵗霞標弗待月詩韻待月弗遊山辛丑壬寅両嵗然而猶塞湖事泛月沙棠之舟無礙銀浦漾迴旋今嵗仍試行婆娑於此興亦不淺焉待月弗遊山塞湖弗泛月亦可依例而言止厯年夏魄與秋輪未負吟望多綺語叶雖云遊藝亦一端意有所牽必有偏於喜水風晩寒亦非養身道古稀天子誠老矣夏魄秋輪湖山固恒在吾將擬之季札觀韶雖云觀止無止耳昨嵗以年逾古稀不復待月霞標策馬遊山因彚書厯年夜遊山月之作成卷然當塞湖秋望仍復命棹即景成吟不殊往嵗兹念水風亱寒亦非髙年調攝所宜並當依例言止爰疊前韻成塞湖弗泛月之詩并取厯年泛月諸什彚錄一卷塞苑夜月遊山遊湖伊古所無非中外一家奚得能此是予之所以汲汲也而習勞戒逸於玩賞之際不為長夜之歡適可而止二卷之中三致意焉并弃山莊予子孫覽此卷者可以知予意矣登四面雲山亭子孟秋下澣數上聲庚全昨日末伏恰數完快霽金􅒫景颯鮮四柱遙看千樹杪輕輿徐至萬峯巔物情人意髙斯靜澗草巖花秀弗妍試問山亭得嵗㡬古稀天子正同年亭内皇祖御詩題辛夘年書厯年塞湖遊月之作既畢倣髙房山法冩意成圗並成是什山月將湖月年髙兩弗遊横圗成自手厯咏冩從頭覺尚興無盡慚非意不㽞錘峰傍玉魄弗共水東流御崇政殿受賀御殿視朝禮異常陪京受賀益徴祥祖功宗徳承天貺累洽重熙與物昌年越古稀心戒怠民資我養愛毋忘語云百里半九十歸政以前敢不蘉自盛京迴鑾至都之作啓程夏仲返冬初里閲三千月四餘諸禮從容幸已蕆老年康徤故猶如觀農大有他秋勝勑政原無片刻疎殷意繩前兼示後此行庻可告非虚臣等謹案盛京既建開創規模遂以大定陟巘降原酌匏執豖舊家禮俗公劉之詩所為垂咏也皇上聿懐前烈于是秋四詣陪都恭謁祖陵禮成御崇政殿受賀大典以次舉行而皆一再吟詠以示毋忘土風迴鑾日特命皇子分繕癸亥甲戌戊戌及癸夘四次幸盛京詩詩曰匪棘其欲遹追來考所由善繼善述以守成而兼創業之隆歟乾隆四十九年皇上聖夀七十四御製詩文三老記予既為三老五更之説以闢諸家之謬然以三老之稱數典于左氏其何以稱三老則求其解而終不得其辭兹以三餘之暇書辟雍詩冊有三老之語臨池下恍然悟曰三老之言實出孟子所謂老而無妻老而無夫老而無子此非三老而何孟子雖出左氏後而此語自由古以𫝊故即繼之曰文王發政施仁必先斯四者可知文王時即有三老之稱左氏提其綱孟子晰其目耳且晏子對叔向歎齊之時為陳氏所云公棄其民三老凍餒乃指一國鰥寡獨窮之民之無恤者設以上夀中夀下夀論之豈八十以下之老即可以弗恤乎其餘傅㑹之論愈説愈逺然總於辟雍養老興賢有何涉乎自是而三老之稱徧於鄉閭所謂三老董公壺闗三老之類不一而足蓋耆艾而長於鄉者即可稱三老而非定三人也夫予三老五更之説成於戊戌逮今又六年求其説而不得而筆下偶得之是不可以不記且此六年中何嘗不讀孟子而未有㑹兹偶㑹之益見理不可不日窮書不可不日讀寧渠呈已之是顯人之非以為博聞廣識而已哉臣等謹案三老五更議禮家各以臆度紛如聚訟甚至執虚文而乖大義為斷不可行之論實由不知三老當作何解是以衆説支離㡬等扣槃捫籥皇上據左傳孟子以經解經千古之疑曠若發䝉諸儒之所齗齗爭辨者真不值一噱矣甲辰元旦自新由昔欽先甲踐阼而今逮五辰莅臨乆斯益滋懼熙和值乃倍生寅穰穰茀禄崇三統濟濟衣冠受萬人累葉䝉庥誠富庶所思風俗未還醇元旦試筆達曙聲聲爆竹喧皇都景物慶滋繁持盈保泰從頭起課雨量晴切已論昔日謾教思老伴齊孝賢皇后與予年若在亦當古稀有四視元孫矣開年且喜得元孫曽孫奕純完婚已數年新嵗可得元孫如䝉昊眷辰重值快覩吾兒初改元乾隆元年為丙辰計六十年歸政支幹正周今距歸政尚十一年余亦惟日孜孜以期燕翼繩承敬迓昊天佑命耳古稀天子承天佑􅜼九年臨萬國朝肅肅予心惟主敬熈熈物意總含韶孟春朔旦肇顓頊元載四千仰帝堯帝堯元載亦甲辰故云嵗甲朔辰後三日丁寧民事始今朝得聞堂叠庚子詩韻古稀有加四步履尚能强䆳造山房迥平臨烟野光栁隂欲籠院梅馥不藏堂閲五春秋矣爾閒我祗忙古希詞古希天子古希詞幻以為欣幻以悲十七男惟剩斯五好逑配早賦其離釋迦曽是説無法尼父則嘗云未知歸政猶需浹旬嵗即今敢懈日孜孜信天主人自箴開惑昔年著論曽信天爰以主人稱曩以西師功成曾著開惑論仿四子講徳之意設為春秋碩儒臻成大夫二人問答而以信天主人之語結之謂危反用成安屢逮失還資為得仍二語􅕍括開惑論義事定不堪迴首憶途長惟益勵心兢逮歸政尚餘十一年前途猶長也信天天眷古稀有余御極四十九年無日不以敬逾古天動民為念仰荷昊蒼眷佑年稀康强逢吉實從古帝王所希有惟思日孜孜益深乾惕以冀永迓天庥耳顧我何修遇此能啓蹕幸避暑山莊之作微雨晨曦散薄隂撰良又值啓鑾吟行春甫自南邦返避暑仍兹北塞臨昨嵗乘輿今嵗馬老年躬勵少年心向年每幸熱河率乘馬啓行昨嵗因徵疴未獲親詣禮北郊啓蹕時亦遂乘輿今嵗體氣安健方澤成後諏吉啓鑾策騎出大東門從容控御不減少壯仰䝉純佑錫福康强惟益勵初心敬承家法俾萬年恪守耳兒孫試聽殷勤語莫忘家風此意深中秋日作萬古中秋萬古天一畨塞景一畨鮮祀儀原自如昨嵗慶節乍思闕兩年壬寅癸夘中秋皆遇掩魄雖祀儀如例而慶節禮樂率未舉潦水已澄銀鏡印錘峯初上玉輪圓老當益壯勵無逸遂以詰朝啓獵旃乙巳春帖子一嵗逢春兩四時運㑹重建元開五十負扆乆滋恭月尚居丑紐律光中去聲寅螾探支悉新朔七日肇元辰立春在嘉平廿四日明嵗元旦辛亥乙巳年春乙巳日重重奮軋發生機身為之度心為律旰以食而宵以衣乾隆五十年皇上聖夀七十五御製詩文題張廷玉三老五更議戊戌年為三老五更説亦既闢其蹖駮而勒之新建辟雍之碑矣今秋駐避暑山莊檢續書之四庫全書内文潁集中有三老五更議之篇而掛漏其名因命檢文津閣之書乃知為張廷玉所撰憬然憶之事在乾隆戊午為廿七月既閲諸禮畢舉之時於視學之前曽向軍機大臣等談及三老五更而咨其可行與否彼時卾爾泰依違其間張廷玉則斷以為不可於是奏此議而遂寢其説葢卾爾泰固好虚譽而近於驕者張廷玉則善自謹而近於懦者且二人彼時皆可望登此席者也以今觀之則廷玉之議為當設爾時勉强行之必有如廷玉所謂資後人之議者矣若朕戊戌之所謂三老五更説戊戌去戊午厯四十年其事早已忘之葢戊午朕方廿八嵗而戊戌則六十有八此亦足騐四十年間學問識見之效而年少時未免好泥古之意至今則灑然矣兹觀廷玉之議與朕之説不約而同樹之前旌焉因命並勒辟雍碑以識已學之淺深及弗掩人之善也夫廷玉既有此卓識何未見及朕之必不動於浮言遵皇考遺㫖令彼配享太廟而臨休致歸里時乃有求入廟之請此所謂老衰而戒之在得乎朕又以廷玉之戒為戒且為廷玉惜之臣等謹案御製三老五更説及三老記闢諸儒之瞀説證經傳之明文其義至為精確乃於舊臣奏議之篇事隔數年年猶䝉記憶而嘉許之益見聖量髙深不遺片善云乙巳元旦奮軋偏欣已盛連對時惟益勵乾乾一堂幸值五代慶兩世繼開千叟筵獨覺䝉庥逾今古敢忘保泰凜氷淵自惟猶日孜孜者此志持之待十年元旦試筆昒昕曙色晃辰光玉帛太和朝萬方累洽重熙百年乆思艱圗易一心長滿旬冀授吾嫡子其繼應稱太上皇能否如斯豈敢必顒乎企矣籲穹蒼康熙元載在壬寅六十一年重值新不敢相同夙申願憶予踐阼之日叩位不天而祝若皇祖上蒼錫嵗至乾隆六十年即當禪敢同六十一年也豈知可㡬讀作計庶褆身即位初年幼竟未計及若至六十年予當八十五嵗後逾五旬方始計及八十五嵗豈易得者然兹竟過古稀去歸政之年亦祇餘十嵗或可副所望惟敬俟天佑耳七旬登夀凡六帝已見古稀説五十紀年惟一人六帝中在位五十年者惟漢武帝一人漢武却非所景仰宋家髙孝更非論漢武帝雖尚稱有能為之主然失徳頗多非吾所慕若宋之髙宗孝宗國讐未復而遽圖逸身未老而稱太上皇遊宴西湖益堪鄙薄吾豈為之哉新正幸御園即事有作御園又閲隔年春上年春自宫中啓蹕南巡未至御園人自依然景倍新雖是髙齡非壯概却欣諸禮竟躬循昨嵗上辛遣皇子恭代行禮今嵗仰䝉承躬昊貺自元旦行禮朝正及千叟宴禮成後大祀康强倍昔得展積誠實深欣幸輕黄陌栁含韶染嫩緑塍麰待雪皴過午同雲濃四宇殷希瑞玉霈膏均啓蹕幸避暑山莊即事成詠今嵗京畿若雨暘時巡啓亻例依常天垂澄宇地無􅅽􅎟蔚青雲麥有黄目攬近郊信徼倖心牽逺省益傍徨幸避暑山莊出大東門仍循向例乘馬蹕途所見麥隴雲黄黍禾芃蔚堪為欣幸惟河南山東等省被旱之區尚未據報普霑渥澤實切傍徨耳七旬有五仍乘馬行健體乾勵自强至避暑山莊即景避暑年年北郊後登程六百一朝臨麥黄黍緑厯怡攬細雨輕隂颯啓吟莅止宵衣旰食處敢忘孫沐祖恩深古稀底是相應者未失由来赤子心題鑑始齋萬壑松風側三間别室居顔之曰鑑始意乃在箴予有望皆如畫無閒可讀書紀年兹五十成者竟奚如藴竒齋口號開惑曽經著論辭闢疆二萬詠西師古稀天子元孫抱視若多竒有底竒中秋後一日啓蹕木蘭行圍之作夏仲来臨五月下浣至避暑山莊秋仲行八旬安養於山莊駐蹕兩月餘二旬程木蘭行圍往返不過廿一日程如斯遊日賞心處却每較晴量雨怦駐蹕山莊以河南山東及淮徐等處望雨又兼運河水淺清口沙淤日馳諭詢問而近畿及熱河等處又因雨水畧多恐致傷稼兹幸齊豫均得透雨雨而直隷及口外西成獲稔稍為慰藉忘習勞勤北幸畧欣報稔閲西成據鞍數里易輿進啓蹕木蘭首頓向常乘馬兹據鞍數里即易肩輿以年逾古稀亦不欲勉强也力不從心老則誠八旬萬夀盛典卷二
