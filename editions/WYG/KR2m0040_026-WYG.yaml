  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_026-1a, image: WYG0660/WYG0660-0291c.png}
body:
  text: 盛事二慶得皇元孫二乾隆四十九年皇上於寧壽宫之景福宫建五福五代堂御製五福五代堂記五福堂者皇祖御筆賜皇考之匾額也我皇考敬謹摹泐奎章於雍和宫圓明園胥用此以顔堂以垂永世丙申年予葺寧夀宫之景福宫以待歸政後宴息娛老景福者皇祖所定名以侍養孝惠皇太后之所也予曾為五福頌以書屏而未以五福名堂者盖引而未發抑亦有待也兹䝉天貺予得元孫五代同堂為今古希有之吉瑞古之獲此瑞者或名其堂以薌其事則予之所名堂正宜用此五福之名且即景福宫之地不必别有搆作而重熙累慶仍即皇祖皇考垂裕後昆貽萬世無疆之庥也若夫獲福必歸於好徳而好徳尤在好其善以斂錫厥庶民五章之中三致意焉兹不複贅予子孫曾元讀是記及堂中五福頌者應敬思皇祖皇考所以承天之福必在於敬天愛民勤政親賢毋忘舊章予之所以心皇祖皇考之心朝乾夕惕不敢暇逸以幸獲五代同堂之慶於萬斯年恒保此福奕葉雲仍可不勉乎可不慎乎御製新正雍和宫瞻禮丙午例以新正禮那能舊邸忘聖蹤餘想像佛道合宣揚臘雪資田潤春風與物昌於斯蕃五代五福肇名堂昔敬摹皇祖御書五福堂以賜繁衍皇考因奎文以顔楣額今五代皆是堂有以肇慶也五福五代堂聨句有序丙午箕疇次九曰五福未及太人之占華祝惟三曰多男徒紀堯民之頌荷天地祖宗之篤眷欲至萬年慶來晜仍雲之開先其量百世堂承五代爰即舊額以増題宴錫重華用啟新韶而聨詠夫其位居左禁典奉東朝閣道旁通地發生而出震文峯對峙山靜夀以安頤都合宫而夀考且寧開别宇則福介爾景璇題賜邸兩言光雲日之躔銀牓分楹一例揭宫園之殿厪肯搆肯堂而重葺他年預卜菟裘值而昌而熾之曡轃昨嵗㩦來文褓衍瓞曰曾孫之慶占熊維男子之祥時舉春廵章馳日騎達佳音於蹕路騰喜氣於江乗驩聲繞豹仗之民額手集鴻臣之使古來有幾𫝊宣繙四庫之書唐後方聞希濶臚六家之事先教晉爵有加禮而恩誌抱孫且予錫名取諸詩而文聨篤慶結佩叶宜孫之吉語捧觴待就傅之初齡薌盛事以顔堂抒予懐而作記敬䝉昊蒼之貺念符祖考之心既沿地以宜名况書屏之有頌俾純嘏爾常矣古實所稀攸好徳則錫之皇其有極矧復潢源上溯户版廣稽仰興運之綿長逮奉福夀而十有一世計齊民之長養有見曽元者百九四家斯則襲冠帶於天宗萬葉皆由一本繁丁黄之生齒四海不啻同堂者矣屬者入冬告三白之祥獻嵗兆八蠶之盛𤾉而𤾉復雨而雨汜勝占之大有年子生子又孫生孫爾雅釋云引無極排籖入座授簡言堂拈吉韻之庚庚抽􅇨思之乙乙予一人敬以作所福維千億恒益凛保右命之自申爾諸臣詩以永言賡乃再三其毋忘風雅頌之各正也哉御製帝王無不䝉天眷天眷由來萃大清上五世承下五世我朝仰䝉共有天眷𤓰瓞蕃昌自太祖至今十一世朕躬以上太祖以下太宗皇孫世祖孫皇皇祖又命皇考凡五世朕躬皇子皇曾元孫宗人府查出字輩太祖長子禇英支派下得皇元孫載下又一輩賜名奉福奉夀亦凡五世今初生溯昔初生生民兩見於雅厥初生民舉后稷而言民之初生舉太王而言周家奕葉相承文王所以極本支百世之盛之基之致福斯備攸芋攸寧堂以名朱果祥貽支萬葉長白山之東有布庫哩山其下有池曰布勒瑚里相傳有三天女浴於池有神鵲銜朱果置季女衣女含口中忽已入腹遂有身産一男生而能言體貌竒異及長母告之故因錫姓為愛新覺羅名之曰布庫哩雍順與小舠乗之母遂凌空而去此本朝發祥之始也臣阿桂白山源衍海重瀛長白山為鴨本朝發祥之地綠混同愛滹三江出焉源逺流長形家以為億萬年衍派延洪之象武姬鳦子祥長發雅瓞風麟兆早呈四祖全光開似續臣􅄞璜五朝駿業大宗祊禩周百八昌厥後由乾隆五十一年上溯太祖髙皇帝天命元年紀元一百七十有九年迪尤衍慶垂裕無疆人越二千盛莫京我已朝宗室繁衍合十一世現在逾二千人實前古所未有詠發瑶舟深意示皇上四廵來盛京恭謁者有祀諸宗室迎駕祖陵奉詩御製朂以水源木本無忘至法教養成全無微不臣祖宗家伍彌㤗旬修玉牒巨編成向例每十年恭修期編帙王牒一欠本年正届應修之較前愈盛延禧垂裕先一揆履順凝庥御八紘繼繼繩繩斯揖揖臣梁國治御製兢兢業業久怦怦紀元大衍重開袠今嵗五十一年符大衍重開之數有六古稀賴賜禎佇待九年幸歸政自明年丁未至乾隆六十年乙夘歸政之期尚有九年予惟日益孜孜以待昊蒼純佑猶欽一日慎提衡天容春睟龍為表稽古聖夀古稀有六每日萬幾之暇讀書無間寒暑吟詠日十數篇臨池則擘窠蠅頭各臻神妙心力目力因應有餘實由自强不息積中形外自宜天日之表益彰睟盎神武秋髙虎亦驚上年九月初一日莅行駕行圍阿濟格鳩獵罷已營虞人報西山有虎指其處上復榮騎前徃虎㐲叢薄中左右約上親御聖祖所遺虎神鎗一發中其要害立殪隨圍内外臣僕無不驚服歡悦夀叟恩聨排席燕康熙壬寅年曽舉千叟宴上年復於皇上御極五十年仰繩祖武乾清宫舉千叟宴􅂄耉盈廷數至三千人之多視康熙年間入宴人數更逾三倍錫福之隆蕃禧之厚伊古未有臣和珅􅂄臣朝許待宫鶯垂皇上宵旰勤勞五十年常如一日而凌念三品以上大臣年逾七十者免其寒早起入朝凡在有位靡不感激加勉躬耕勸稼南東畝上年皇上御極以來常舉耕耤之典聖夀七十有五復履畝耒親耕從容成禮不惟隨侍耆臣所不能及即扶牽牛之耆老亦皆六十以上之人並無年逾七旬者親講圜橋大小􅓺京師自元太祖建立太學以來五百餘年辟雍之規未備皇上詳稽典制酌古準今肇立橋門圜水於上年二月上丁釋奠之後親臨講學多士圜橋觀聼踴躍歡欣其時瑞雪繽紛自辰入夜盈尺有餘畿輔廣霑麥苗因之渥潤遂以有秋不惟文治光昌因時大備抑且來牟率育道合陳常閣滿琅函峙吳越文源皇上右文典學於閣文淵全文津文溯四四庫書既成之後復之三部分弆揚州命發帑雇募書手繕録全書文滙閣金山之文宗閣杭州之觀文瀾閣嘉惠東南士子俾得抄錄摩廣敷文教臣劉墉義存金鑑括周明於上欽定古今儲貳全鑑年冬告成頒賜吉祥梵印玉螭糾乾隆壬寅春得王印二方鐫大西天草書一曰薩爾瓦漢語普也一曰莽噶拉穆漢語吉祥也獻嵗徵祥實為萬民禔福之兆妙應塔尖銀練横日下舊聞載白塔寺遼夀昌二年建元至元八年世祖發視石函銅缾香水盈滿舍利堅圓瓶底獲一銅錢文曰至元通寳逮明天順二年改名妙應寺上年新正初六日者䝉恩賜千叟宴時是塔頂輪上懸一哈達哈逹古語奉佛吉祥製帛也塔髙二十餘丈瑞帛飄綴非人所能升陟佛力神通吉祥善應益信而有徴也律吕聲更九宫譜客秋論樂皇上披閲四庫全書内張照劄子云世所𫝊五六工尺上等字即宫商角徵羽五音因五六命典司樂部諸臣將現習各樂章譜内駢注工尺上及宫商角徴羽字俾樂工肄習通曉引俗入雅彌昭天地同和之盛臣曹文埴介僎禮肄六篇笙為首御製補笙詩六篇久譜宫商以京師善之地命順天府招選佾生肄習嫻熟於鄉飲酒禮用之以廣化民成俗之治大雲臺麓金瞻象本年二月中巡聖駕五次幸五臺曉月盧溝石補鯨盧溝橋剏建金明昌時元明迄今幾經重葺而輪蹄雜遝石面漸致弊壊洞門亦開有鼓裂者爰發帑重葺司事之人有欲圻洞門而改築者鐵釘上命先拆石面以觀洞門皆石工鱗砌錮以堅固莫比因祇令重葺石面並橋之兩垂取坡就長以便重運車行不致摇震洞門於是成功不毁人力不勞自能杜侵冒而復舊觀去之御製記中申明重葺非重修之故以揚舊過善而防新將來之弊即一事而皇上行政權衡於斯畢具矣勝事頻年登瑞牒臣徳保御製吉音昨嵗迓廵旌甲辰閏三月南廵江寧迴蹕駐龍潭行館是日留京王大臣飛報得五代元孫之喜迎鑾喜氣騰鳬藻扈駕歡聲逮鹿苹時扈從王公大臣及外藩䝉古王公等下逮地方官吏老㓜黎民無不額手歡忭同聲頌慶因命儒臣翻四庫馳諭内廷翰林彭元瑞曹文埴檢查四庫全書古來見元孫者有幾詳悉奏聞稀聞古史溯三正禹湯文武三代聖王考其年代世次俱未及見元孫嬴劉來尠天家胄唐宋下徵編户氓徧翻四庫全書自秦漢至明帝王從未得見元孫者編氓中雖間有之然自唐以來亦止於六家朗教明經仕州縣山堂肆考載唐錢朗南昌人年一百七十餘嵗有元孫數人皆以明經為縣宰臣福長安燾官執政出簮纓周必大平園續藁載宋張燾饒州人孝宗時官參知政事年七十五見元孫一人延陵仙眷巵為夀元吳宗元紹興人年八十八及見元孫舉觴為夀抱置膝上望者謂神仙中人見宋濓􅇓溪集國博儒風金滿籝明羅恢吉安人永樂時官國子監博士年八十二見元孫一人事載程敏政選明文衡中嘉慶璿因作記顯明歸璿崑山人即歸有光之髙祖有光集文中載璿有髙元嘉慶堂顧九和為之記臣王杰元春璧本以詩鳴明文徵明甫田集載戊午元旦詩有百嵗幾人登耄耋一身五世見曽元之句考徵明年九十有元孫二人遼哉六氏人閱世美矣兩章辭見情内廷皇上喜得元孫有翰林查奏後復有御製誌喜詩一章據御製誌事詩一章忍弗民之愛是亟心愛御製誌事詩中有忍不勃幾民之句仰見皇上絜矩引申誠求保赤臣金簡凛兹天所貺非輕天御製誌喜詩中有獲兹惟益凛事一恩之句仰見皇上凝承昭氣感通古來亦有薌其事時至應知候不爭上葺皇寧夀宫内之名景福宫曽而未御製五福頌書屏而未以五福堂者盖引發今五代一堂期累洽天庥於國慶允協昌重熙斯為極盛五福語從洪範演臣紀昀御製重修宫憶考工營丙申年寧夀宫落成及今十載前寧夀寫廟堂制寧夀宫之制仿坤寧宫為歸政後祀所神之所其前為皇極殿則朝堂規制將來受朝臨御也後景福圖燕寢亨聖祖當年奉孝惠景福宫為所居皇祖恭奉頌序孝惠皇太后詳見五福皇王作宇養昇平庭披都福東分戺景寧夀宫在運門之東室邃頤和左接楹景宫制分中東西三路路福宫為寧夀宫東象取日升滄澥上臣彭元瑞宿臨星夀角亢瑩角亢為東七宿之首爾雅夀星角亢也翠鬟雲竇盤㞳肖又景福宫相近有翠鬟亭山有石洞鎸雲竇二字佛日梵華垂珞瓔佛日梵華二樓俱在景福樓後保泰門開横雉堞保泰門東出正對紫禁左垣臣董誥暢音閣迥面雕甍閣在上皆景福宫前以寧夀宫東路與密景福宫邇年長者石文而質文峯石在外景福門之春盎有梅元起貞櫺景福宫西外植梅内外福連楣藻麗宫景福額懸門外前簷堂内懸存五福五代堂扁臣莊與詩書典引帖芝榮内堂徵御筆聨云燕翼仰貽謀斂時五福𤓰綿篤祜至於萬年句述詩書義藴廣大不華不樸居惟適即舊即新後豈更寶示諸有典有則子寳皇上七旬萬夀鐫又鐫古稀天甲辰嵗既顔斯堂五福五代堂寳又連其文鐫鈐五福五代堂古稀天子寶奎章寶帙皆用之臣陸費墀御製記言之為法為程前年既掲堂額因作記以述事垂訓御園藩邸恒欽仰五福堂額乃考敬皇祖御書以賜明園皇考者皇摹於雍和宫圓皆用之以顔堂予自少至於今朝夕毎深欽仰歛已錫民永惠行有待額斯竟如願予臨御五十年未循五福之名遽以顔堂者葢有待天庥而邀祖貺今竟得古今希有吉瑞實我國家萬世子孫申錫無疆之慶也欲𫝊心本自先盟以下恭繹堂記御製五福五代中語徳攸予好泉旁達記云𫉬福必歸於好徳善與人同木鬯萌在好記云好徳尤其善以斂錫厥庶民敬曰明而敬曰旦天記云敬初臣沈安其鑿與安其耕云愛記民幾惟萬政法行健云勤記政經次二賢占彚征云親記賢由厥舊章欽自昔毋忘記云舊章臣以粤撫入敷天覲䝉臣向恩預宴欽惟機司聖學聖政共仰以中書為軍員親見徵事愈勅幾典學今更得讀本行健之功致福之睿文而賡盛臣孫士毅所其無逸語詳精不敢記云暇逸曰三致意親書扆製五記云五章之中三致意焉盖於堂御福頌文經宸翰書屏揭中於萬斯年厪見羮祖記云於萬斯年恒保此福盖體見羮見聖世祖朝乾夕愓之心以致牆之慕論採蘇文洵具備景福語出周雅既醉之章所謂既醉備五福也蘇軾有論朱臣珪詞卑何賦但譻􅘱何晏景福殿賦駢儷華藻無闗大義物浮大小水為氣韓愈云氣水也言浮物也舉以示為文之法伏讀御皇上每製文鴻鈞黙運元氣充周非取喻於水所能盡也中判危微言乃聲法直御製堂記推本獲福之由上溯乃心之心契精一危微之旨著之為文言聲矣子梓孫蓀徳金玉今皇子元孫命名皆从玉旁皇命名以金旁高臣胡望御製祥詳珮佩器瑶瓊近咏古玉宜子孫珮詩有是珮誠堪佩言祥試可詳之句今既辨珮佩二字从玉為器从人為事因以祥詳亦韻同而義别連類及之聨句詳紀祥徵於宜子孫之珮恰相叶吉也晉封識喜含飴合甲辰新正以皇長孫公綿徳將有抱孫之喜先晉封貝子以為迓喜延祥之兆既而果如所願一堂五代祖孫共慶飴含洵天家希有之瑞也載錫命名置膝并皇祖親見曽孫四五人嘉名肇鍚則自最長之永琛始是以予之子姪輩用永字胥皇祖所賜也乾隆丙寅宴宗室于惇叙殿其時綿徳尚未生而近支宗室中已有與皇孫同輩者衍派以綿則予所命也後一年而綿徳生又二十一年而綿徳生子命名奕純至戊子新正題皇六子永瑢所畫嵗朝圖恭進慈寧因有永綿奕載奉為後慈娛之句首三字既以慶源三世排序成文意更來似續按字開支引之勿替是以皇元孫以載錫命名並查宗室中載字下一輩二人賜名奉福奉夀計予歸政後年至九十則載錫年當十七或可見奉字輩來孫增六代同堂之慶雖此願未敢預必而上年千叟宴中九十以上親為賜巵者且十數人可知夀世長齡亦屬尋常之事予惟顒祈天佑以為召祥迓福之本耳麟角崢嶸能仰笑甲辰初冬予親臨綿徳邸第閲視元孫抱置膝上見其頭角崢嶸依依仰笑實深欣慰龍珠的皪見髙擎生三月解瞻仙仗天一笑看擕錦綳曲賚優恩數亦異節慶皇上篤愛有元孫凡年例賞賚加臣阿肅重熙屢洽祉加贏后慈慶聖祖躬承輩凡下至永字孝莊文皇親見六世已為世所希覯我親見皇上逮事未艾備聖祖今又得元孫既七世衍祥祉彌隆歸餘值閏桐枝長日皇元孫於閏三月初八生桐孫叶瑞知閏春長獻夀維南華盖迎報正聖駕南廵喜聞吉合維南獻夀之占佇教方名臻總角臣童鳳三即陪家宴預稱觥向例上元前一日筵宴皇子以下凡授室者方得侍座上年御製小宴詩有編展書房待預元之句盖令預聖意待副皇元孫六齡入學之年即宴以實五代同堂之慶也寅秋惇叙膏流葉乾隆丙寅年於宗惇叙殿賜宴室夘嵗乾清露浥莖乾隆癸夘新正於俱乾清宫普宴宗室凡年已及嵗之閑散賞給四品頂帶視奉字行尚猶子現在宗室中倫序之最小者為奉字輩於皇上係屬來孫皇元孫雖在繡褓已居季父行矣臣吉夢熊在元孫輩總為兄上福皇履所綏椒蕃瓞衍將來接皇元孫輩鴈序衆多皆肩隨踵之弟也周男則百世非衍有周御製得元孫誌喜詩室百男非五代之句唐院計千慶未宏唐有千孫院亦非五代一堂詎數磐宗系著表臣季學錦御製爰咨畺吏奏馳伻前因慶得元孫隨傳詢各督撫將民間得元孫者查明咨報彚奏六家見者期頤逮據直𨽻江西山東四川廣西各督撫奏報百嵗夀民五世同堂者現有六家五代同將二百盈據各督撫奏報五世同堂者共得一百九十四家計其數已將盈二百矣夀世共民沐天佑泰朝有詔荷恩令乾隆五十年正月初一日凡民間得元孫者均加賞恩詔賜蜀中翼已儕期羡四川達州夀民張子翼年百嵗有子三人孫八人曾孫六人元孫三人江右爵還倫偓鏗江西龍泉縣夀民古朝爵年百嵗子孫曽元並萃一堂若粤若齊若郊甸廣西桂平縣生員鍾君寵山東聊城縣張羽厯城縣劉湘直𨽻順義縣郭有英四人皆夀登百嵗曽元五世臣黄軒汝張汝李汝月英直𨽻張璧湖北李進也責州孫月英各得元孫自八人至四人不等在一百九十四家中尤為繁衍門烏卓楔標人瑞㑹典載凡民間夀至百嵗以上者給與建坊銀三十兩表其門曰昇平人瑞竹馬照盤圖戲嬰嬰圖皇上安懐厪念寓意翰墨如戲照盆孩兒圖屢見吟詠今蕃昌大化翔洽閭閻生齒驂篠嬉遊天然活畫皆際辰昌蕃以殖臣吳夀昌彼因文顯炳而弸四庫全書中唐後僅錢朗等六家均以仕籍得存記載齊氓御製詩比之馬遷青雲之羡若今日之編户亦得以國慶附彰家慶名列奏章事登遭逢御集真曠古未有之也牓書四字妙八法古朝御書賜張子翼扁曰衍慶頤齡爵曰繁頤餘慶鍾君寵曰養庠衍福張羽曰引年鍾盛劉湘曰延齡餘慶郭有英曰期瑞繁昌賜句曡章諧五韺子翼御製祥字韻詩一首朝爵賜張曡韻一首賜古再疊韻一首世一賜鍾君寵等四家又之盛詩二首紀各省五堂得一百九十四家先後共成五章數叶元音宣布五韺民子君親衣臮食伏讀可憐御製黔黎滋盛寧非喜衣食謀艱厪之匄仰見我皇上愛民如子授衣謀食無日不厪仁夀宸懐是以如洋徳洋恩溥舉一世而胥登也臣汪夫耕婦織襏兼荆織一御製賜古朝爵詩有夫耕婦家昌之句于歛時敷錫之中即具訓俗型方之義大生之宇皇春啿中午當陽榖日晴宴以承歡效堯祝臣鄭際唐御製詩毋侈頌慕臯賡嘉祥允矣超前古負荷艱哉凛後庚堂構克昌百世永箴辭惟朂一心誠御製重華宫茶宴廷臣及内廷翰林用五福五代堂聨句復得詩二首重華復此試茶筵共迓春禧恩沐駢憶昔室家賦琴瑟雍正五年於此娶孝賢皇后至今襁褓逮曾元一身上下見七世朕曽侍孫是皇祖承七世恩訓今得元一身見矣百嵗光隂餘廿年未免定安畧迴惜元孫載錫為皇長子定安親王永璜之曽孫惜其未得見也尋思萬事那兼全門前雙象峙崢嶸十二重樓積玉霙瑞色春膏誠罕遇聨吟接席敬逾生諸臣蹡濟數合宿聨句諸臣共二十八人五代賡揚韻用庚茗椀文房頒有例浮香真不負三清重華宫茶宴以梅花松子佛手用雪水烹之即以御製三清詩茶椀并賜乾隆五十年皇上於圓明園五福堂増題為五福五代堂御製題五福堂乙巳五福堂昭聖日臨園中最古厯年深聞詩聞禮那忘昔益敬益慙直至今祖徳宗功慶貽世曽看元抱幸從心待之五十載一詠五福堂額為並摹皇祖御書以賜得五皇考雍和宫及圓明園此堂泐恭懸昨嵗喜代元孫為五福五代堂記因數典於此仰惟所以貽慶鍾祥當始一賜額時已逺兆庥徵而予遲至五十年題詠者亦留以有待于今日耳得以艱惟慰以欽御製五福五代堂題句敷錫名垂洪範篇洪範云歛時五福用敷錫厥庶民本非自厚其身之謂迨至庶民保極實則一人永膺多福也祖功宗徳已身肩三朝厚幸雙文益五福堂之名乃辰子皇祖御書以賜皇考者甲見元孫得増二字曰五福五代堂以昭䝉福垂裕盖八袠初開五代早全予之實為厚幸八袠初開五代全苞茂即今看秩秩旰宵惟是勵乾乾奉時佈惠宜春日欣遇多收鮮緩蠲每嵗新正加恩展賑偏灾州縣用普春祺昨己酉嵗各省收成俱在八九分以上雖直𨽻江蘇安徽河南湖北五省間有被水處所合計各省尚不及二十分之一已飭加意賑恤是以新嵗蠲緩之數甚稀上天眷佑嘉與億兆同荷福禔惟當益勵乾寅以協敷錫保極之意耳乾隆五十二年皇上題避暑山莊勤政殿之後殿為五福五代堂御製避暑山莊五福五代堂記五福五代堂之匾既額於寧夀宫之景福宫兹復額於避暑山莊者何故敬惟本朝家法於凡内殿理事處御書之匾莫不厯代橅勒以誌繼繩殷志故正大光明自世祖至今四世勤政殿自聖祖至今三世摹額諸楹是訓是行章章可考自祖書世正大光明四字懸於乾清宫嗣是之避聖祖書之觀徳殿世宗書之圓明園予又書暑山莊勤政殿凡三在瀛臺者山靜聖祖所書在圓明園者書之世宗所書予於香宜園及兹避暑山莊亦予因是而繹思之正大光明修身正心之要勤政則治國平天下之本也内外交朂本末相資觸於目而儆於心敢不以是為棘乎若夫五福五代之堂則自予始予䝉祖考之佑昊天之眷古希有七曽元繞膝是宜題堂以薌其事而勵其欽然五福之名實亦皇祖昔年所賜皇考之堂名也皇祖御書五福堂匾額泐懸賜我皇考皇考敬謹摹之雍和宫及圓明園乾隆丙申予葺寧夀宫内之景福宫以待歸政後居也因為五福頌書之屏間至甲辰予得元孫五代同堂為古今罕有之瑞因即景福宫増書五福五代堂之額誌慶五福之義見於景福之記訖不複綴兹特舉厯世所為正大光明勤政之書以申寓修身正心治國平天下之訓盖守此訓然後可以保五福是則相需殷而相得彰我子孫曽元敬承天貺世世書此必思祖宗垂訓之意慄慄危懼永保天命可不蘉乎因用此例書五福五代堂之匾以額於避暑山莊勤政殿之後殿盖此山莊即予十二嵗時受皇祖教養深恩之處也今得五代同堂神御咫尺有不愉悦而慶幸者乎則予所以慕含飴而懼隕越又豈言辭所能宣述者哉設予子孫不負祖宗垂訓惟日孜孜正心修身治國平天下或邀天錫亦得若予五代同堂而重書五福五代堂之匾以額各處又予所永望而不敢或必者也是為記臣等謹按詩小雅斯干之篇備言堂室之制而必以攸芋攸躋攸寧頌美君子且繼之曰太人占之維熊維羆男子之祥是又以子姓之繁昌徵福祚之永錫然亦不過詩人虚譽之辭非必實有其事而後為堂為室落其成而紀其盛也又考之書既勤垣墉惟其塗塈茨既勤樸斵惟其塗丹雘設輪奐之美必别有搆作而不惟舊貫之仍則於肯堂肯搆之義猶未協也欽惟我皇上徳懋作求道光垂裕御極之四十有九年春皇元孫生五代一堂為古今未有嘉慶於是有五福五代堂之作以薌其事而觀厥成按堂以五福五代名者凡三一則寧壽宫之景福宫為聖祖仁皇帝所定名我皇上敬繹景福之義而因以是名堂者也一則御園之五福堂為世宗憲皇帝摹聖祖仁皇帝御書以顔斯堂我皇上敬惟五福之説而因以是名堂者也一則避暑山莊之勤政後殿我朝家法如正大光明勤政諸御書莫不摹勒内殿以誌訓行爰仿其例而以是名堂者也盖五福之徵必原好徳延祺鍚羨慶衍曽元受福孔多允足光昭瑞牒乃宸衷乾惕猶日孜孜殷然以繼繩之志為貽榖之謀凡所為敬天者即體天行之健以仰承天庥所為勤民者即本民碞之畏以斂錫庶民溯垂訓於前寧儼羮牆之如見兢兢乎履盛思謙之意具著於御製記中而且嘉樹不忘興懐顧復為詠歌者至再至三然則斯堂之作非徒侈美盛之觀而實寓無逸作所之訓日監時出垂範無窮是豈懐鉛握槧摹繪光華者所能揚扢萬一也哉八旬萬壽盛典卷二十六
