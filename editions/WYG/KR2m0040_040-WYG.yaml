body:
  text: 盛事十六辟雍一臣等謹案詩歌育才必務以人君之夀為頌如泮水三章以芹茒喻多士之景從即繼之曰錫難老順長道盖以祈君多夀乃獲恒承教澤咸順此長久之道焉是以風化日崇下之服教畏神而上之敬徳受祜者倍著也洪惟我皇上統合君師集羣聖之成以儀炳萬世惟是文欽立教夀廣作人所𫝊者唐虞三代之心所行者唐虞三代之政所議者唐虞三代之禮凡夫剏建非常悉由大聖人折衷至當若兹辟雍之作舉數百年未舉之曠典至今日而興起特隆者景鑠哉洪化惟神遹觀厥成斯實昭徳而譽彌億年延長而卜膺天慶逺逾班固三雍瑞應詩之所稱者矣乾隆四十八年二月命於國子監度地増建辟雍乾隆四十八年二月初七日奉上諭稽古國學之制天子曰辟雍所以行禮樂宣徳化昭文明而流教澤典至鉅也朕此次釋奠禮成念國學為人文薈萃之地規制宜隆而辟雍之立自元眀以来典尚闕如自應増建以臻美偹著派禮部尚書徳保工部尚書兼國子監事務劉墉侍郎徳成敬謹前徃閲視度地鳩工􅓪吉興建落成之日朕将舉行臨雍典禮以昭久道化成之盛乾隆四十九年十月新建辟雍成皇上親製碑文記其經始並申訓以詔萬世御製國學新建辟雍圜水工成碑記甲辰名者實之賔實者名之主為學之方應務其實以蘄循其名不可炫其名以致亡其實興學之源綦要於國學國學者天子之學也天子之學曰辟雍諸侯之學曰泮水北京之國學自元厯明以至本朝盖五百餘年矣有國學而無辟雍名實或不相稱焉雖有建議請復以乏水而格部議至今未復癸夘春始有復建之諭甲辰冬乃觀新工之竣将於乙巳仲春行釋奠禮遂臨雍以落成焉夫北京為天下都㑹教化所先也大典缺如非所以崇儒重道古與稽而今與居也雖乏水然有不改之井汲以綆而用之無窮亦在人為之而已於是石之鱗次見圜斯池水之鏡澄見明斯漪殿之據中見隆其榱橋之通行見接其基上庠下庠雖難考二典之制而東序西序總不出三代之規則是工之舉也又予知過論所謂不可已者仍酌行之之意而物給價工給值原非勞民動衆之為若夫三老五更之説予以為括於飬老化俗之儀而非天子臨雍所必應並行而不遺者盖弗見於詩書乃特出杜氏通典之私耳且予向有三老五更之説已明闢其謬兹不復綴乎辭雖然余更有所懼於是舉者夫是舉豈非復古興學之懿有何懼而予懼之者恐後之人執予復古之説於一切衣冠典禮皆欲效漢人之制則予為得罪祖宗之人匪教伊虐甚慮不宜也予之子孫臣庶體予此心於可復古者復之其不可復者㫁不可􅅺古而復之夫徒慕復古之虚名而致有忘祖宗之實失非下愚而何予不為也予敬以是吿子孫以保我皇清萬年之基也辟雍御書匾額雅涵於樂御書對聨金元明宅於兹天邑萬年今大偹虞夏殷闕有間周京四學古堪循彛倫堂御書匾額福疇攸叙琉璃牌樓上刻御書横額圜橋教澤學海節觀臣等欽惟我皇上典學茂修以大文而昭至道毎新工蕆事必徧稽徃制之異同互證羣言之得失發皇聖藴煥乎若日星之麗天也恭繹御製碑文首揭循名之要辟池考義於禮經次詳復古之規汲井玩辭於易象固已因時定制酌斟於事不可已之圖矣復諄諄然示訓於子孫臣庶毋稍渉泥古好名之為而於樂之庥攸叙之福於奎藻垂炳燿焉其碑之左右側刻向所製三老五更説及題張廷玉三老五更議文恭載宸章門益以見聖人道徳之富教萬世無窮者在兹矣乾隆四十九年八月皇上以辟雍既成諭於來嵗仲春釋奠日親臨講學乾隆四十九年八月初四日奉上諭稽古明倫設教典重學官國學為首善之區橋門觀聼規制尤宜隆備前命尚書劉墉徳保金簡侍郎徳成鳩工庀材興建辟雍現在已届落成朕於明年仲春釋奠禮成即臨雍講學所有應行典禮著各該衙門詳議具奏禮部謹題為請㫖事臣等謹查㑹典内載皇上視學之禮臣部預期題請行取衍聖公五經博士至聖裔五人元聖周公裔四配十二哲裔各二人乘𫝊赴京暨各氏子孫列官於朝者并各官學師生直省在京之進士舉人貢監生等及國子監行文各省取到情願觀光之官廕生恩㧞嵗副優貢生咸與觀禮禮成次日衍聖公率五經博士各氏後裔祭酒司業率所属官暨進士舉人諸生等上表謝恩等語該臣等議得乾隆五十年仲春恭逢皇上臨雍講學應照例行取襲封衍聖公孔憲培帶領族中俊秀五人并至聖裔元聖裔四配十二哲後裔世襲五經博士各帶族中俊秀二人照例馳驛赴京并行令各該管衙門各該督撫一體遵照辦理可也又奏為酌定臨雍禮儀恭請聖訓事欽惟我皇上稽古崇文明倫設教創舉辟雍之制特修講學之儀簡命師儒敷揚經義親製御論闡前聖之精微埀萬古之彛訓實為從来未有之盛典前奉諭㫖令臣部等衙門詳議應行典禮除衍聖公五經博士各氏後裔業經臣部題准令其来京陪祀遵即行知外所有應行查照則例行知在京各該衙門偹辦事宜謹條列於後一明嵗臨雍典禮奉㫖即於上丁釋奠後舉行所有是日大成殿行禮應依毎嵗仲春儀節一聖賢後裔有現列朝官及各直省在京之進士舉人貢監生各官學教習及官學生應行知各該處造冊送部届期咸令詣學觀禮一國子監六堂肄業生應令各助教學正學錄等官率領圜橋聼講一講案及案衣應行知内務府将文華殿預偹經筵講案案衣敬謹移徃陳設一辟雍殿内進講各官及侍班之王公衍聖公大學士九卿詹事起居注等官坐氊應令内務府鋪設一講畢賜茶應行知内茶房光祿寺照例預偹一臨雍次日衍聖公率五經博士各氏後裔國子監祭酒率六堂及各官學師生於午門外奉表謝恩應派鴻臚寺設案臣部官捧表御史紏儀鳴賛序班賛引行知各衙門預偹一臨雍禮成後賜衍聖公五經博士及執事諸臣等宴於臣部應由光禄寺辦理衍聖公現在服制應不用樂一辟雍殿階下設中和韶樂太學門内設丹陛大樂應行令樂部和聲署届期陳設一向例臨雍三日後内閣撰擬𠡠諭一道頒國子監刋刻頒行今奉有御論二篇於立極埀訓之謨尤為深切粹精擬於禮成由國子監敬謹刋刻通行頒發在京各衙門官學及直省學政轉發各儒學師生咸資誦習以廣教思以上各條臣等謹案㑹典則例詳細酌議所有行禮作樂儀注及厯次臨雍恩賞事例分别繕单恭呈御覽伏候訓示俟命下臣部移咨各該管衙門先期預偹其儀注載入臣部則例届期仍照例恭進謹奏奉㫖知道了禮部為知照事恭照乾隆五十年二月初七日辰時皇上臨雍講學是日早工部官設更衣御幄於大成殿階下之東南向樂部和聲署設中和韶樂於辟雍殿階下設丹陛大樂於太學門内設丹陛清樂於大樂東武備院設寳座鋪陳鴻臚寺設經書案一於寳座前又設講案二於寳座下稍南東西向祭酒恭捧御覽講章陳於案上書左經右捧進講副本陳書於左案陳經於右案進講滿漢大學士二人左案西面滿漢祭酒二人右案東面左翼王公四人衍聖公内閣大學士及吏部户部禮部通政司詹事府堂官滿漢各一人在進講大學士之後西面右翼王公四人兵部刑部工部都察院大理寺堂官滿漢各一人在進講祭酒之後東面起居注官四人立西南隅亦東面侍儀給事中御史各二人在東西檐柱内聴講各官在橋南甬道東西六堂師生各序立堂階下東班率性堂誠心堂崇志堂以上在樹内甬道東翼進士守部貢監六堂有職人員左翼幼官學左宗學東西旗覺羅學咸安宫學八旗貢監生滿漢候補教習東以上均在樹東正東四旗官學在牌楼南之西班修道堂義堂廣業堂筭學翼以上在樹内甬道西四舉人六堂有職人員右幼官學右翼宗學西旗覺羅學景山官學俄羅斯館清字經館楼以上俱在樹西西四旗官學在牌南之西朝鮮國使臣立甬道西班百官之末鴻臚寺鳴賛二人立東西檐柱外鳴賛官二人立扵階下又鴻臚寺官四人分立辟雍橋南左右鴻臚寺官四人分立太學門外左右皆東西面届時太常寺卿奏請皇上具禮服乘輿出宫午門鳴鐘不齋戒王以下文武各官於東華門外分翼排立候駕過跪送法駕鹵簿前導不作樂駕出東華門至成賢街國子監祭酒司業率所属官俱朝服諸生俱公服於街左跪迎陪祀王公大臣百官俱朝服先至大成門外祇候随駕入皇上至更衣幄次降輿賛引對引官二員恭導俟皇上釋奠於先師禮畢乘輿御彛倫堂更衮服各官咸更蟒袍補服王公大學士以下各官衍聖公率五經博士各氏後裔祭酒司業率所属官及肄業諸生各學教習進士舉人貢生監生官學生均先至辟雍南分東西班序立朝鮮國使臣立西班百官之末起居注官侍儀給事中御史各按位立届時臣部堂官奏請皇上臨辟雍行講學禮太學鳴鐘鼓臣部堂官恭導前引後扈如儀皇上御辟雍殿陞寳座中和韶樂作奏盛平之章對引禮部堂官前引内大臣趨至前廊下立侍衛於階下東西翼立樂止鳴賛官賛齊班丹陛大樂作鴻臚寺官分引衍聖公進講大學士五經博士各氏後裔在東班祭酒以下各官在西班肄業諸生各隨東西末聽鳴賛官賛引二跪六叩禮畢退復原位立樂止鴻臚寺堂官二員分引進講官四人由南橋升階鴻臚寺官二員分引王公衍聖公大學士九卿詹事由東西橋升階俱入左右門各就位立鴻臚寺堂官退就東西檐下立皇上賜派出之講官坐講官就位一叩坐王公大臣咸按班立鳴賛官賛進講滿漢進講大學士以次講四書皇上闡發書義宣示臣工王公衍聖公大學士以下及諸生并朝鮮國使臣跪聆畢王公等及圜橋各官師生朝鮮使臣俱興滿漢祭酒以次講經皇上闡發經義各官及諸生朝鮮使臣跪聆亦如之畢王公及各官師生朝鮮使臣俱興進講官退就橋南偕司業以下各就拜位北面立丹陛大樂作鳴賛官賛跪叩興行三跪九叩禮以次退樂止國子監師生先至成賢街底立祗候御前進茶丹陛清樂作皇上賜王公衍聖公大學士九卿詹事茶俱行一跪一叩禮坐賜茶畢樂止鴻臚寺堂官引王公大學士以下各官自左右門出至橋南東西序立臣部堂官奏禮成中和韶樂作奏道平之章皇上起座乘輿出太學門樂止祭酒司業率所属官暨進士舉人諸生跪送候駕過興各官及朝鮮使臣咸退臨雍陞座奏盛平之章辟雍建規矩圓方復古自吾皇先聖宮墻千仭近講學升堂於論鐘鼓鏗鏘春水圜橋流浩蕩作君師時萬億隆禮樂煥文章還宫奏道平之章聖人出天下文明玉振叶金聲日月江河昭法象自古經行講筵雝肅和平熙事純常茂典成覺羣黎敷五教彛倫叙萬邦寜臨雍御殿羣臣行禮奏慶平之章禮成典樂辟水監姬章中天日月瞻顒卬宸儀有肅拜舞行夀考延昌聖化滂洋進茶奏仰君師清樂章仰君師兼道統集講筵唘圜橋聼御論宣皇極示綱常五倫叙君仁臣敬家慈孝與國人交正誠不息維天之命體行健同徳乾元亹緝熙合符前聖一解向階前初聼講罷穆穆瞻天垣正左右趨耆彦服膺誠摳衣拜朝班黌席聖賢裔弟子青衿整紹心學外王内聖五十載久道而成萬千嵗生民之盛二解况鴻儀彰盛典備四門學岐周並王制云天子曰辟雍陋炎漢三雍非正訓辭著復古真王政泥古誣重言申命燕千叟新嵗禮行辨五更舊文論定三解告禮成晉玉茗霑渥賜敷茵共慶一規璧水長隨教澤生趨辭八旬萬夀盛典卷四十
