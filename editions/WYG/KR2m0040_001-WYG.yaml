body:
  text: 欽定四庫全書八旬萬壽盛典卷一宸章一臣等謹案詩書所載帝王年夀若堯典在位七十載禹謨舜宅位三十三載雖皆自言而其文則史臣所紀至若喜起之歌有篇名而言夀南風之歌有篇名而無其辭雖庸作有傳而無闗久道未有若我皇上藴涵造化綱絡乾坤舉所為敬天法祖勤政愛民之實發為文章於以彰夫誕膺鴻貺曼壽無疆之盛者伏讀御製詩文自御極以來五十餘年數絫千萬亦既按集成編臣等纂輯萬夀盛典未能備載爰自皇上七旬萬夀以後敬謹研繹各依門類分載聖徳聖功盛事典禮恩賚各卷中若夫睿藻所抒有闗紀年之作自御製文古稀説至四得論御製詩庚子元旦至本年庚戌萬夀諸什敬依御集編年之例恭録為宸章一門弁於盛典之首臣等慶逢我皇上延洪錫羨至隆極盛盥誦循環仰見秉德立言垂經夀世從此躋億萬之齡衍化工之筆臣等惟當涵泳聖涯依時續繕篇帙亦有非億兆京垓所能紀數者矣乾隆四十五年皇上聖夀七十御製詩文古稀説余以今年登七袠因用杜甫句刻古稀天子之寳其次章即繼之曰猶日孜孜蓋予宿志有年至八旬有六即歸政而頤志於寧夀宫其未歸政以前不敢弛惕猶日孜孜所以答天庥而勵已躬也正夀之慶羣臣例當進獻辭賦於是彭元瑞有古稀之九頌既以文房等件賜之以旌其用意新而遣辭雅顧一再翻閲頗有不得不為之説以申予意者其詞曰古人有言頌不忘規兹元瑞之九頌徒見其頌而不見其規在元瑞為得半而失半然使予觀其頌洋洋自滿遂以為誠若此則不但失半又且失全予何肯如是夫由斯不自滿歉然若有所不足之意充之以是為敬天之本必益凜旦明毋敢或渝也以是為法祖之規必思繼前烈而慎聰聴也以是勤民庶無始終之變耳以是典學為實學以是奮武非黷武以是籌邊非鑿空以是制作非虚飾若夫用人行政旰食宵衣孰不以是為慎修思永之樞機乎如是而觀元瑞之九頌方且益深予臨深履薄之戒則其頌也即規也更惓思之三代以上弗論矣三代以下為天子而夀登古稀者纔得六人已見之近作矣自三代以下帝王年逾七十者漢武帝梁髙祖唐明皇宋髙宗元世祖明太祖凡六帝昨七旬慶典詩有七旬屈指數今古六帝因心驗法懲之句至夫得國之正擴土之廣臣服之普民庶之安雖非大當可謂小康且前代所以亡國者曰强藩曰外患曰權臣曰外戚曰女謁曰宦寺曰奸臣曰佞倖今皆無一仿彿者即所謂得古稀之六帝元明二祖為創業之君禮樂刑政有未遑焉其餘四帝予所不足為法而其時其政亦豈有若今日哉是誠古稀而已矣夫值此古稀者非上天所賜乎天賜古稀於予而予設弗以敬承之弗勵慎終如始之志以竭力敬天法祖勤政愛民古云適百里者半九十里慄慄危懼誠恐耄荒而有所隕越將孤天恩予又何敢如是然則元瑞九頌有禆於予者大焉故為之説如右羣臣獻辭賦者甚夥大約不出於元瑞之九頌予將以是説槩之則所謂有頌而鮮規者亦畢視之為進規而非啻頌矣臣等欽惟我皇上福祉之盛治道之隆實千古帝王所未有不僅云稀已也聖懐若谷取杜甫之語以刻璽猶恐稍有懈弛次章即繼之曰猶日孜孜葢即此勞謙之勅健徳之恒已為自古帝王所無能嫓美者恭譯是篇之㫖敬以迓釐謙以集福總原於不自滿假之一心與危㣲之訓無逸之篇體異而意同斯所以億萬年荷天之寵與天無極歟庚子元旦首祚庚庚吉兆頻嵗維輪子旦維辰田蠶四海殷同祝禮樂三年此重新玉帛依然拱北極輿艫將以事南巡廻思廿五方踐阼開袠誰知忽七旬元正太和殿賜宴紀事二律用旋轉韻體十年一舉又逢庚元㑹應從舊典行午始辰循綿國慶寅過子值沐天榮桃符煥處宜春殿柏酒擎來獻夀觥敷錫欽時崇實政鷄竿爰命覃恩并五位輪年十必遇十成紀嵗五常并予踐阼時年二十有五毎至紀年逢五則為旬慶若紀年遇十春秋又恰逢五乾隆十五年庚午四十萬夀正值五位輪年始舉元㑹典禮葢五與十成數相合有不期然而然者發陳羣所進五十萬夀詩序曾發明其義其言演天地之數所頼者五十與易之大􅄛自然符合頗為詳晰今嵗庚子紀元四十五年正朕七十萬夀爰於元旦賜宴并特頒恩詔敷錫臣民用以綿國慶而荅天庥龍鱗旭朗青瑣闥雉尾春輝白獸觥黼黻元黄胥賀祉飛潛動植總含榮行年七十知非合揆庚吾惟凛後庚臣等謹案五位十成實河洛之精藴天地自然之數所以推衍於萬億京垓至靡有極者也我皇上紀算紀年循環符合有不期然而然者葢開闢以來貞元遞運延洪之慶必有獨鍾積厚儲祥以萃於亘古一人之聖非偶然也皇上七旬萬夀不允舉行慶典命循常例行禮而賜宴以示慈覃詔以錫福與天下臣民共躋夀宇嵗乙巳紀元五十行慶賜恵復覩隆儀迨今紀元五十有五而慶展八旬龎鴻彌懋自兹以徃十五相乗時萬時億非𨽻首所能推測矣新正養性殿兩年未此慶春禧亦有長言誌嵗時新正至養性殿例有詩以紀嵗時戊戌己亥兩年雖未慶春亦仍循例有詩也五位十成開七袠新來舊除去聲指前期猶餘卅半恒居此余将以八十五嵗歸政居此此自今計之猶隔十五年以春初再識斯古紀懸車繫臣職自憐宵旰益孜孜幸避暑山莊啟程之作祭澤傳臚遴庶士蕆諸務益敬勤増巡方歸未半月閲避暑諏惟吉日應鷺序鴛行列班聚玉鞭珠勒啓行仍古稀天子猶乘馬迴蹕旬日各官北郊殿試散館選翰林引見文武諸務次第悉舉即於二十一日起程幸避暑山莊凌晨策騎控御如常雖年已七十未覺鞍馬煩勞也無逸幾去聲垂元與曽至避暑山莊駐蹕即事一律過嶺廣仁遙看日出東山莊萬木翠雲籠右祠城隍廟左廟文廟胥瞻暨後海先河此意同避兼因避慶典朕五旬六旬大慶之年皆於宫中御殿受賀後乃啟蹕來熱河今年有所不欲故照常例五月即啟行致閒返以致躋公熱河官吏兵民乃畧有綴景為迎鑾慶夀之舉雖事已成然非所喜也雖然昨嵗曽經駐切切懐思未解衷臣等謹案自古帝王撫郅隆之運躬延洪之算者三代而還不易卄今幸數千載而一遇夀考康寧之聖内而億兆臣民外逮殊方君長孰不喁喁焉思效䑓萊之祝通梯航之獻而聖懐淵穆不允舉行慶典之諭至再至三天下臣庶抱誠欲羾於蹕路所經小有綴飾猶屢形詩詠謂非所喜信乎愛民之心無所不至也而所以錫福推仁則又視常有加焉徳彌劭而福彌隆億萬斯年之慶正未有艾也矣八月十三日於避暑山莊行七旬慶典即事成什御殿庚寅禮未仍毎嵗誕辰率在山莊逢大慶始於京師御殿受賀故庚寅有十年一度一臨軒之句今嵗以不能似庚寅率羣臣於例舉慈寧宫行禮故不忍御殿受賀祗在山莊照常行山莊聊聴慶岡陵七旬屈指數上聲今古六帝因心驗法懲三代以後帝王享國年逾七旬者六帝漢武帝梁髙祖唐明皇宋髙宗元世祖明太祖其中可法者惟元世祖明太祖耳然亦不能無遺憾焉其餘皆余所鄙以為戒者北塞駢田朝衆部西天歡喜祝神僧班禪額爾徳呢自後藏逺來慶祝各䝉古王公台吉喀爾喀衛拉特等一聞其來無不歡忭踴躍實為我國家吉祥盛事宜言吉日弗言憾東望松齋憾不勝正殿之左即率羣松鶴齋為昔年逢萬夀節臣行禮之處臣等謹案士庶之家年至七袠猶必奉觴稱夀侈為美談矧夫運際重熙期膺曼羨臚歡介景自古誠稀皇上聖徳撝謙不允舉行慶典先期駐蹕山莊僅照常例行禮法懲六帝進退百王誠以行健康强自天保定億萬年凝命迓釐本一心之操存非臣下所能仰測也乾隆四十六年皇上聖夀七十一御製詩辛丑元旦年庚甫過月來庚正月建庚寅卜嵗大横祝實成丑始紐芽宣地徳寅方族出協人正千門竹爆催天曉萬户桃符迓朔禎元㑹太和欽首祚越因久御凛持盈元旦試筆子逾丑逮月維寅天地人三統㑹均自是貞元循不息共欣嘔咐被無垠雨𤾉祈嵗調鴻籥坱圠含和沐大鈞垂拱七旬又開袠慎終如始惕心頻舂容曙報午門鐘元㑹太和受大共䝉業敢云值熈皡執規惟益勵􅐚恭已知嵗始春來信是月十一日始立春怕説庚過辛繼蹤向年毎逢庚嵗為余正夀之期次嵗過辛即值慈寧大慶今值辛丑弗克舉行九旬慶典不覺撫時増感一種對時心憾者向年所望副無從用乾清宫西暖閣貯敬天勤民寳之例貯古稀天子之寳於東暖閣既刻古稀説於寳端並繫以詩祖宗貽玉寳敬天及勤民兹予逮古稀爰始刻貞珉敬勤𫝊家法奕世當永遵設我子孫中年或古稀臻此寳亦宜用弆之檀匣陳斯則待乾貺未敢預卜頻西清者恒守謂西暖閣之敬天勤民寳左个者偶循謂東暖閣之古稀天子寳嗣服祈承命鞏謙朂慎寅臣等謹案自古帝王受天眷佑未有舉千古希有之福畢萃于一人者我皇上備千古未有之徳躬千古未有之勤是以福應畢臻洪庥滋至繼自今八旬九旬以逮千萬億年鎸延禧而迓蕃釐正未有艾也不息則久有開必先受天永命申錫無疆是寳實肇其端矣新正養性殿古稀天子兹開袠自一數來又指旬更閲四年乃居此今嵗辛丑余年七十有一計至八十五嵗歸政尚得十四年恰當斯日又逢春孜孜敢懈仔肩佛余仰䝉上年天古稀祖眷估年逾七十精神如昔刻天子之寳即聫刻猶日孜孜之璽以自朂勵歸政以前不敢少懈也藹藹惟欣與物誾底識予懐暢俯仰重樓鴛瓦積餘銀憶昔射鵠廿發中去聲十九撫繭蠅頭書自手射已前園泐以詩戊辰秋九月于大西門集近侍諸臣較射連發二十矢中十有九因成四律紀事泐于集鳯軒壁書則西清貯之久慢論臂病射弗為書亦眼昏小字醜文武臣中昔陪侍余向年目力精審時每喜作蝇頭細書今所存卷冊甚夥爾時侍直如張照汪由敦梁詩正諸人皆久謝世今惟嵇璜猶尚及見至御前侍臣親見射鵠者如來保阿岱博爾奔察等亦久物故現祗扎拉豐阿福隆安經見皆年少命侍禁廷養育者也經親見者今稀有無我質我弗重能憶昔渾如滕誑口臣等謹案挽强破的與據案揮毫二者僅有專工罕能兼擅即使兩藝俱習亦無過窺樊涉户而已未有如我皇上多能天縱乃武乃文御􅋃矢則自冲齡即已精嫻迨今䇿馬行圍無不應弦洞貫親翰墨則大書小楷目力腕力並臻純妙學者皆不能逮萬分之一而即事鳴謙猶若有欿然者近於御書樂毅論小楷後命儒臣書是什􅈓玉搨賜臣工臣等朝夕左右與夫扈蹕之期門表貉之藩部靡不共見共聞咸仰健行不息初無間於今昔也古希古希希世未從心負扆遑云久莅臨惟是惕乾勵朝夕戒其玩愒度光隂龍乘不息法一健象譯犭來通六音國語自㓜習之六嵗習漢書乾隆八年始習䝉古語二十五年平囘部遂習囘語四十一年平兩金川方習畨語昨四十五年因班禪來謁兼習唐古忒語今䝉古及回語已精通其畨語唐古忒語亦能解名物器數而尚弗純熟未能言達事之始末然並國語及漢文則已通六處語音矣使自八年弗習此四處語則至今尚藉人通譯不能盡悉其情而亦無過虚度此數十年可見諸凡不可自畫而弗勤學也愛樂紛哉尚何託積成三萬首餘吟臣等謹案典學之勤古稱典墳邱索備矣至於殊俗方言狄鞮象寄之音則従無能兼通者非特習之難也九州之外古在荒服梯航重譯輾轉傳訛秦漢而還或為敵國或使命未通亦何從得其語言而習之我朝中外一家䝉古諸藩本同内地名王部長宿衛周廬西域西藩亦獲預勾陳之選皇上萬幾偶暇清問周咨聲入心通聰斯作睿類情指事以及名物器數之㣲無不習若性成貫通盡妙是以數萬里外咸得畢達其情而三合之音同文之志悉出睿裁可以旁達萬國語言而上刋史乘流傳之謬考文盛典亘古所無至幸避則追制作之原漢文則究書契之始尤臣下所莫能仰贊一詞者而聖懐勤黽以為向若弗習無過虛度此光隂垂訓之心更為深切于以見聖人欲立欲達之仁而所其無逸之衷亦可藉以窺見萬一也已幸避暑山莊啟蹕之作通宵雲净曉晴豪避暑行旌例向遭衣用袷紗破晨爽帽垂氂毳却炎饕東門依舊千官送廣甸懐新多稼叨䄂嚲玉鞭控珠勒珠勒雖為鞍轡用語然國語及䝉古語皆為小步馬之稱即俗所謂步馬也敢為圖逸謝年髙稱老昔也我不忍稱老謂六十七嵗以前傷哉其意過已藐今也我却可稱老惕哉末路恐難保復憶曽為夀者詠願老悲老愚之道丙戌嵗詠金剛四相夀者云幾多願老還悲老云此非愚愚竟誰古之六帝我居七考古帝王年逾七旬者漢武帝梁髙祖唐明皇宋髙宗元世祖明太祖凡六帝元明二祖為創業之君禮樂政刑有未遑焉其餘四帝不足為法詳見古稀説及七旬慶典詩彼豈盡能保泰好莅册六年以久敢曰輕車熟路造萬幾㦯一之弗謹失毫釐謬千里杳邇日正書抑之戒彼諸侯耳我亦曉臣等謹案三代而後年逾七旬者僅六帝而道兼守創運際郅隆未有如我皇上者乃兢兢業業持盈保泰之心發為歌詠覺典謨所載堯咨舜儆猶未若是詩之深切而著明也是以聖齡愈崇聖徳益慎億萬載之天行即一日之天行法天不息即與天合徳矣八月十六日避暑山莊啟蹕往木蘭之作去嵗罷圍因大慶今年行獮例依常中秋甫過餅𤓰節上塞非遙麅鹿場幾度溪橋消野漲歴觀村圃得中穰今年塞外雨雖勤然旋雨旋霽不致大潦尚有三鬴之収古稀有一仍繩㱏武不息體乾勵自强出鹿柴門門經鹿柴總肩輿向年出入鹿柴門率乘馬自己亥始始乗肩輿而圍中仍騎射如常云過古稀應如是遵養因圖理幾政自强寧祗在佃漁篚筐率已大娯衆弓馬原仍未廢初六十年來於此矣余自十二嵗恭隨柔逺敬承家皇祖木蘭行圍自乾隆辛酉後習武法嵗以為常思一瞬閲居諸臣等謹案騶虞之詩極言春蒐之盛然地不越郊甸而獻禽數獲亦左右及射夫之事若乃萬乘之尊逾古稀之夀秋獮塞外嵗以為常習勤罔懈則自古未之前聞者至於鴻篇誌事惟是勵自强而匪躭遵養更於習武之中兼示柔逺之慈其斯為勞以身先而樂與衆共者哉乾隆四十七年皇上聖夀七十二御製詩文避暑山莊後序我皇祖於辛夘年成此避暑山莊三十六景繪圖賦什為序以行之而予適生於是年此中因縁不可思議即位後於辛酉年始為巡狩之舉至山莊徘徊思慕因敬依元韻以誌景仰甲戌年又増賦三十六景蓋以皇祖昔曽題額而未經入圖及余遊覽所至隨時題額補定者總弗出皇祖舊定之範圍故永恬居之詩曰已是洞天傳玉簡得教福地續琅書永恬居即皇祖御書也御序至矣盡矣兹後序何為而作蓋予之生年既同山莊而予之侍皇祖適以壬寅而今嵗又恰當壬寅六十餘年藴於深衷者不可以不明白宣示以自戒己者戒彳後人耳夫居此山莊日凛敬天法祖勤政恵民柔逺寧邇諸大端見之詩文者不知凡幾何尚有未宣之深衷乎無而為有是欺己有而弗宣是欺人我皇祖建此山莊所以詰戎綏遐崇樸愛物之義見於御製序中意深逺也是以皇考十三年之間雖未舉行此典常面諭曰予之不往避暑山莊及木蘭行圍者葢因日不暇給而性好逸惡殺生是予之過後世子孫當遵皇考所行習武木蘭毋忘家法煌煌聖訓予與和親王及爾時軍機大臣實共聞之而今皆無其人矣予如不言後更無知皇考聖意者又數年來日涉成趣於向所定景外不無建置如創得齋戒得堂之類不下二十處既見之昨嵗知過之論矣而予之意猶有未盡者亦不可不宣示後人也葢漢唐以來離宫别苑何代無之然不過費人財逞已欲其甚者乃至破國亡家者可戒無足法也若今之山莊乃在闗塞之外義重習武不重崇文而今則升府立學駸駸乎崇文矣然杜甫所云將軍不好武稚子總能文之句余常駁之以為各有其地其職也設衆人遂以此為美亦美中之不足矣又扈蹕之衆歴數月于役采􅅔出車古人所以恤下此亦不可不念俾人知其所繫者大且時加恵施焉則勞而不怨若圖已樂而忘人苦亦非仁人之所為也若夫崇山峻嶺水態林姿鶴鹿之遊鳶魚之樂加之岩齋溪閣芳草古木物有天然之趣人忘塵世之懐較之漢唐離宫别苑有過之無不及也若躭此而忘一切則予之所為羶薌山莊者是陷穽而予為得罪祖宗之人矣此意蓄之久而不忍言今老矣終不可不言故書之既以自戒仍敬告我後人若後人而忘予此言則與國休戚相闗之大臣以及骨鯁忠直之言官執予此言以諌之可也設諌而不從或且罪之者則是天不佑我國家朕亦無如之何也已矣臣等謹案山莊之建聖祖創制於前皇上繩武于後家法昭垂實億萬禩所當遵守聖謨深逺睿慮周詳於詰戎綏逺崇樸愛物之義垂訓諄諄崇文教即戒文勝勵先勞必恤衆勞葢繼志述事之隆與燕翼詒謀之切胥于是篇見之矣壬寅元旦壬寅年值壬寅月獻嵗祥重符發春任養鴻濛敷大徳始生煦嫗沐深仁物含喜意宣舒疊人語宫聲達鬯誾元㑹太和移五日遇齋祈榖倍䖍申四日上辛受賀祈榖元旦值齋因移御殿禮于初五日臣等謹案元正朝㑹古今鉅禮皇上以是嵗四日得辛祈年禮重不可展用次辛于元旦即御齋宫而朝正之期移于五日葢敬天之誠與劭農之念均非自古帝王所可及也元旦試筆古云七十嵗懸車嵗過懸車有二予奢望乾隆滿週甲即當寧夀就閒居十三年月彼猶逺余意於乾隆六十年歸政頤志寕夀宫自今計之尚有十三年宵旰勤勞兹敢疎俶祉昌昌迓元旦綵箋試筆遂成書新年四日值初辛齋在元朝致敬寅己未丙寅戊寅丁酉殊徃嵗今年正月初四日上辛朕以雍正七年期于皇考諭㫖因元旦朝賀不宜展祈穀之次辛行禮其乾隆己未丙寅戊寅丁酉四次用次辛者以詣東朝慶賀儀節不宜有闕也今非向年可比宜謹遵朝賀皇考明諭初五祈榖仍用上辛自元旦即齊戒其行禮改用日禮以義起斯之謂乎豆籩璧帛合躬親爰遵雍正明禋諭那重慈寧慶禮申撫今思昔不覺悵然審理酌情垂典則邀庥奕葉福斯民題樂夀堂面水復背山因名堂樂夀初亦本無意義託智仁茍後因閲宋史知與髙宗偶彼其躭燕閒率非吾所取宋髙宗内禪後亦有樂夀老人之稱維時外患方殷髙宗不思卧薪嘗膽以復祖宗之業而急圖息肩謝責所謂晏安鴆毒實吾所不取也設吾老遜政斯實天恩厚古稀猶孜孜前嵗庚子余七旬萬夀因刻二寳一曰古稀天子之寳一曰猶日孜孜書畫並印用之副望庶幾否題畫寫真世寧擅郎世寕西洋人寫真無過其右者繢我少年時入室皤然者不知此是誰幸避暑山莊啟蹕之作老年人率不禁暑避暑誠應每嵗行況是山莊貽聖祖遂教吉日發都京前朝炎熱兹更平聲爽左近霑霖此却晴步出東門仍御馬既勤已亦愜輿情晴碧亭憶舊萬􅐿松風山之隂枕溪有亭曰晴碧我年十二隨至此即指殿旁為賜宅望見御舟泊亭畔呼名趨下層巖壁顧謂勿疾恐蹉跌是即初䝉恩眷日即今步履偶借扶那復騰蹌健如昔白頭宫監消磨盡祗有巖松足為質左右無人知此者六十年遙迅瞬息而我勿言更誰言永朂惕乾酬祖徳赤子心皇祖避暑山莊詩辛夘同我七十二皇祖皇祖避暑山荘三十六景詩成於康熙辛夘計今七十二年矣而我十二扈蹕來即今花甲正週暨康熙壬寅嵗余年十二扈詳見蹕至此今瞬息又週壬寅晴碧亭憶舊詩其間憂樂實紛哉緑水青山本無事雖然聖日照萬年谷陵豈共光隂逝願言不失赤子心羮牆恒見亹繩繼臣等謹案惟聖人能知聖人皇上當冲齡之時聖祖仁皇帝即恩眷異常盖深念祖功宗徳之仔肩與夫内聖外王之統緒有深契焉皇上紹聞衣徳言松雲棟牖之思形諸歌詠者不啻千有餘篇酬祖徳則曰永朂惕乾亹繩繼則曰不失赤子心葢惟聖祖聰明睿智達天徳是以皇上冲嵗受知皇上善繼善述故覲耿光揚大烈于悠久無極視周家纘緒為尤隆矣霞標弗待月霞標弗待月去嵗斯已然徃年夜遊山月每於望後登霞標之平䑓坐待月升跋馬而下昨嵗即未如向例故有待月當平原有例今年勿試夜行鞭之句萬山之中夜跋馬自覺磬控艱周旋有如銜橛亦何要身先去聲習武寧渠謂此焉霞標弗待月肩輿卓午宛莅止適纔雖有言或者好逸為游語叶即景婆娑興不淺未免見獵心猶喜其如力弗從古稀天子誠老矣四壁泐有夜遊山月詩歴吟祗益増慚耳臣等謹案塞山待月跋馬夜行實千古詩人所未歴之境皇上駐蹕山莊夜遊山月嵗嵗有詩率為常例古稀以後致慎弗為至於閲稼沿隄木蘭行狩仍磬控如常且是嵗伊瑪圖小獵吉駿餘馳即應弦命中永安湃圍場一發中鹿額勒蘇西那圍場御鎗殪虎盖待月則為吟咏之資獮狩則闗習戎之典聖心妙有權衡而天健無殊今昔也
