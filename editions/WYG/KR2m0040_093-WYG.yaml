body:
  text: 欽定四庫全書八旬萬夀盛典卷九十四歌頌十四萬夀恭擬江淮擊楫謡九章謹序漕運總督臣管幹珍臣嘗考洪範九疇次八庶徵曰九五福而以夀居福首盖王者念用時叙休徵洽汁於時珍符闓懌之氣鴹萃一人之身天用眷於有徳㳫祉厖褫罔弗攸俾􅞗應之理有如斯者我皇上健行不息靡日不以敬天勤民為念臨御以来文徳敷武功鑠宙合宴謐荒憬遐鬯雖古稱太平之盛無以加諸而猶孜孜於持盈保泰之道厪厪於斂時敷錫之原宜其綿瑞産嘏與天無極矣嵗庚戍仲秋之月辛酉恭逢聖夀八旬開袠之期上方旋蹕自避暑山荘受臣民慶賀禮景雲叢聚八風循通五世一堂䋲䋲翼翼凢踰沙軼漠棧山航海之國俱以次敂闗来朝洎夫禮官儒林惇用䔍誨之士鯢齒梨眉鮐背之叟莫不抃蹈衢壤頌天子之萬年皇上廼申錫無疆之庥滋液渗漉復田賦賚粟帛開特科攽曲赦既有詔施行復命鐫玉為寳曰八徵耄念仰見省嵗之殷勅㡬之謹夙夜不敢康聖人之情見乎辭視彼延夀之刻及觀河拜洛獻媯遊扈之説相懸奚翅億萬耶臣以懵學玷侍從洊膺寵數拔置卿貳簡督漕庾一年扵兹毎往来江淮間聞篙師櫂郎沐膏咏勤之語居多言雖不文而順則喁于猶有扣轅擊壌之遺意謹裒采為謡九章敢拜手稽首以獻懿哉聖徳恒久離章梯霄磬域躋爾夀康荃宰俛鏡降祉滂洋青龍在商横夀星見於丁方八千椿算開無疆星輝虹繞駢轃乎五代之堂山膏潄醴河潤榮光盧牟六合而不言瑞惟雨暘燠寒風時乃是用蘉丹文赤篆蟠螭截肪照灼圖牒􅀆孕虞育唐其一灝英旋樞若皷有楟至誠無息則圜而行合天地數為五十有五席蘿圖而奠清寧六􅛍斿乎江介四展謁乎豐京翕河抱溟檢岱䄄亭洋嗈協軫其聲中乎韶韺氓羞幸覷吏礪端平四海之内咸承風濯俗以荅􅀈而效靈吾儕蚩蚩如踐旄敦而度髙酌汍濫而闚深曽何能磬萬一之名其二奎曲縟景緯儒館為淵源宸翰十萬第甲乙豈數葛天八闋堯神人遊羣玉之冊府緑函緗帙籖幐爇芸嵗給上谷墨月縻大官紙三萬六千軸載以瑶華輪自天禄延室以達於外史抗七閣為通津洪教闡象載一再譯同文審三微晞七均采歸昌命伶倫驥毛虬甲獵碣十辯宗韋韓斥紛綸編琲叠璧媕周雅綠槐黌市重鐫珉哂曲學之瀐濇幸演迤乎糺雲其三泰儀斡運威噞秋霜神武七式粤振旅自金方回凖革靣犁庭掃穴寘耕桑􅀢瓠通譯促浸拓疆蠢彼蘇田臮林荘震盪慴慄揮天槍南漸島崓西隴𦍑譬若風隕蘀海澆螢曽不匝月而殱䕫魖與獝狂洗兵刷馬鋒銷燧障萬里一坰尉候相望願世世長為安樂甿其四燾幕遐夐縯紘垓埏我皇道平平竁􅒸何逺陬澨何偏東南徑二萬里西北之廣倍焉青海澔涆渌江淪漣嵗一納賮浪舶駝韉兹白之獸獻驃國徕控洱而泝滇䳒瘴簪鼓球江彗鋋承天助順奠彼山川廓爾哈面内欵塞居延凢白澤之未圖大章之未步西王母之未獻疇勿登我爻閭菉幣之編其五曲臺眂上儀遺年古未有渥瑞兹龎鴻帝曰人惟舊圜流建橋門送拜迎三夀茨階􅆽衢尊需雲飫千叟乾元開大酺丞尉致羊酒哂彼元㑹儀較此瞠乎後瀛嶽䔍蕃禔累牘入函奏禮官甲乙科窮經紛皓首賚秩均有差署年量從厚老臣帝座旁髙領彭佺袖聞喜宴重遨嘉話洛中九恒春蒲栁榮南山松栢茂其六斟元鞴化觀文以成釐正宗黜絺繪詔自今决科其課試夫五經際闡禧而晉袠廣翹材以育英桐岫簉翼桂譜搴榮羾奎垣而旁魄爥藻儷􅀆漢京充庭金箭匝序笏纓上廼念䖍鞏扵有位凢百執事洎卿大夫各就見階進一秩俾寵告扵爾所生鳯銜十賚翠章淑旌僉含和吐氣而頌徳聲其七察鳸調鷃井壌登豐均振迭蠲俶􅅷田功維醲化汜濩隠賑眎赤𦂳望差上下中普免天下惟正之供顧猶厪茨檐之卑處恐實不至扵劬鴻其今占名田雇力者毋收今年租庸梠無懸㭒野有滯種它如豁逋牒䘏孤􅀢禁罔濶圜土空晷緯景應長庚春融允宜槱燎薦熂疈辜升中告綽綰扵名山大川百神秩祀之宗其八戴穹圓者不知昊縡之巍巍依陽曦而宅照不知皓靈扵何胚胎堯襟舜抱詎聞思擬議所能賅恭維八旬天子念八徵疇圖表裏相根荄先天卦位昉成數從茲泰元増䇲自萬有一千五百二十逓推衍夫億兆亰垓瑶光下燭星雲回我皇萬夀萬萬夀有如此稊米之積川之来稊米之積川之来呼耶歈唱歌臺菜夐乎盛哉其九萬夀恭紀七言詩一首栢梁體二百韻謹序吏部左侍郎臣金士松皇帝膺圖御宇介受純祉五十有五載嵗在上章日月會夀星之次其辰辛酉恭屆八旬萬夀昌辰寰瀛凱豫充被熙和粤若初恩言肇宣詔開春秋甲乙科蠲四方惟正之供迺月正元日頒温綸敷慶澤普錫福扵四表辯扵上下神祗咸秩迺昭燕扵廷山豆瀛尊佅僸率舞太史告百糓之瑞兆扵田功爰撰令日祡燎泰壇嘉貺絣荅遂東廵泰岱祗禮孔林令章備舉問俗陳詩百工黎庶大和㑹五月鑾輅幸避暑山荘羣藩翹跂奔走偕来徼外曠逺屬國輸琛納賮南交君長親覲祝釐願受冠帯矢長列藩服懿夫聖徳之廣被靡逺不暨也維時共球之集敭逷率邇勰滙扵亰師輯昭王㑹軒舞迎鑾樹頷竦􅖪思旅底厥悃皇上廼順輿情懋舉盛典膺延喜之玉晉萬年之觴越在内服王公卿尹庶士百執事越在外服岳牧羣有司暨里居耉成人僉瞻瞩丹墀䖍祝聖天子祜䔍融長之運純純常常奕奕允自今寳算延洪天庥滋至其周扵元㑹運世如環斯循申翼以萬億年臣備員卿貳侍直内廷飫聴驩歈窃慕賡颺之義惟七言昉扵漢世而全篇備自栢梁謹仿其體成千四百言遭逢之盛視尹吉甫召虎之倫實逺過之臣不勝大幸不揆媕陋謹拜手稽首以獻其詞曰光融夀宇舒延覃角亢星麗瑶階南庚長戌茂景曜占成嘉扵酉月日兼卿雲藂藂醲露馠駢祥輯祉和氣涵純常寳算瀛籌添八徵帝念感至諴承滋納凱調和甘榮光鏡宇通蔚藍元正丹綍彩鳯鵮與春偕来澤普霑昊縡契合帝徳欽苾芬肹蠁親奉歆毎嵗躬舉大祀三圜壇方澤昭事嚴執徐之嵗集議僉方成田步夙所堪簡儀倍致崇肅瞻閱乆無斁天心監泰壹神䇿啟佑深如㡬如式調和愔仰惟謨烈天與参紹衣䋲武昭誠諶灌秬對越升香馦䖍奉冊寳輝珠函豐岐四詣瞻旌縿雲雷締造神威戡伊薩爾滸豐碑劖紀恩之堂貽橚椮松風萬壑開晴嵐𤓰瓞引紹緒遞􅀈宗藩錫宴歌懕懕聖皇勤治日照臨百工信飭功績廞封章批發時無淹宁依聼政曦光暹樞臣日對承綸音岳牧時覲来駸駸諏咨民隠宣幽隌金科玉律釐洪纎與時攸宜民所忺官方澄叙計上㢘因材而䔍辨杞柟蕩平遵路無頗譣𤯝瑕洗滌恩波沾慈雲覆被芳澍􅬆時廵展義春和湛南國六望鑾旂毵維茲浙海臨沙溓兩山夹峙排赭龕三亹吞吐廻潮濫親臨相度懐民碞長茭用楗巨石嵌北岸漸漲南坻坍范塘鞏固聫岈㟏籌河豫計波澂湉憶昨儀漫工懘惉徙清河議徒詀諵北崇南庳形勢覘金門遏溜風卷􅀈歸徳古隄舊鑿鏨因髙培厚融泥黏瀾寧淮甸茂秫稴天門練卷雲襹􅗒嵩髙漢栢蟠蒼岑兩淀綠鋪伊水衾五臺花馥栴檀林經過翠輦民樂妉春膏疊被饒浸潭優租賜復濡列䦲鏐牌捧持錫髮鬖黄綿温换冬衣襤寒原翹秀精擇撢書升論秀増新銜苔紋湔濯潤雨􅀢稠華上黍苗䅧䅧水青羅帯山碧簮象契仁智諧宸襟懸崖睿藻鐫瑶瑊彤霞萬丈披層䨧益道長裕孚恵心林林環繞歌有壬夏而平糶滋玉䊤寒給糜淖春生鬵便程補助増飽饜更昭茂澤普沃漸四蠲正賦潤閭閻穫登再稻繭八蠶隴翬翟羽桑飛鵀春臺納豫薫含㶣墉崇百室凌阜􅀈羔羊朋酒頥老酖力田孝弟俗静倓運漕再免翔南颿屯衛優洽蕃丁男通庾充溢鋪􅭜􅀈四時玉燭融和􅀢八荒暨訖通鰈鶼疇或渝教煩戈錟天鑒順佑逆者􅨹井鉞煌燿参旂緂帝握神筴操玉鈐電驅雙轂颷馳驂凖噶爾部元餘􅑒兩和卓木狼噬貪天戈所指光熊􅀈威㥄貙兕批虪甝雪搏圓礫月銳鐮天山瀚海鉦鼓儳犁庭掃穴騰金鐵論昭觧惑息衆􅠗金川負固逋鼪䶃攻碉氣振􅇒巖巉霧衝叢箐剪宻䈄巢穿鵂鵩窟取毚遂使鳥道成平巖鴻圗益地通崟㕋里闢二萬韜弭䤴安西屯種渠引􅅗新疆雪水洗鹵鹹嘉禾翼秀蕫莭芟維州麥稞環韭籖宅畋樂業飽且酣暍䕃樾下松檜檆回孽競閧兩用餤折箠旋踵收猲獫臺島鯨突化觸麙鹿耳波涌迎祥帆榑桑曙色消氛䘲凱歌海外和聲韾悉禀睿算揚威銛武成九告逷逺詹詔繪紫光肅劔鐔戰圖宣示輝旂綅勒銘紀績謨炎炎埏紘齊軌舒帷幨同文雅化敷閎譚典學稽古聖性耽集成四庫供捜探永樂舊典驅陳蟫獻書不待邀帛縑舟車捆載留梅黬鑒别誰區珪與㻸經進乙覽排芸籖折衷至訓昭古今經子奥義窮深湛史集垂後徵信訦逺紹上溯雲師郯掌故間及稗乗談四閣翼翼度廣尋𣲖分南國三江潯亦如星宿拱彩蟾流貽善本梨棗槧傳鈔並許伸畢佔教澤䕻土霑時霖御詩五萬諧韶咸鴻文二集天筆拈奎壁璀璨開雲緘詔開圜璧溶流瀐香生芹茆槐披隂禮行釋奠排旌彡御論義符敬勝箴作君作師位並任集成石鼓鎸珉琳橋門觀聴環胄衿士不談道樵夫慙或鉏而帯或織簾繹思經訓味粹醰六開恩榜采箭金中林棫樸鹿野芩宣㝎律吕審玉玪重敏迭栁分清耹黄鍾響詎同􅀢甔中倫古調無差侵熊朋来瑟姜夔琴一音一字辨堮􅬺訂全詩譜黍析孅慶隆進舞煇􅢹􅢹中和備樂調彀綝克龤聲叶来儀禽即今諸國納賮賝暹羅踰渤通航􅻽南掌呈象竒毛傪名香西蔵宣馣􅴭臺畨旅致眀月蚶緬驃錫命感覆盦廓爾喀進貝葉函交藩躬覲南指鍼請奉冠帯孚厥愖五福五代堂翬簷夀民夀世嶺髮黅瑞人坊斵山嵒嶜曽元提抱調和鹼嘉徵駢萃化宇恬聖敬悠乆持以謙皇極敷錫周蒼黔中衢之尊共酌斟九如晉祝臣民諳萬方鼚舞同歡吟萬夀恭紀四言詩一篇三百二十二句謹序吏部右侍郎臣沈初欽惟我皇上御宇之五十五年秋八月恭遇八旬萬夀聖莭先是嵗庚子羣臣以皇上夀躋古稀籲詞祝嘏聖徳謙沖不允所請至是又十年天庥滋至聖夀益隆鴻施駿業顯懿景鑠率土氓庶咸願上萬夀無疆之祝中外大吏覩羣情之恱豫合辭請舉慶典乃發徳音覃慶恵滋液渗漉暢垓泝埏自元旦賜宴羣工孟秋之月扵山荘宣奏鈞樂肆覲藩服蹕旋亰師屆慶辰御正朝受賀自王公以至卿尹庶司舊藩新部抃舞訢暢莫可名言煌煌乎千載一時之遇也粤稽自古帝王大徳得夀無不多㦄年所誠以聖同乎天天之行不息聖之誠亦不息天之命不已聖之徳亦不已所謂同也然而伊耆之惇九族未聞詳臚子姓姬后之育百男亦未聞迭見曽元則受天之祜雖昌而大猶未極其至也蕩蕩之徳巍巍之功純純之祉䋲䋲之慶􅀈有盛扵今日者乎皇上猶兢兢業業日慎一日既于七旬萬夀之年製古稀天子之寳副以猶日孜孜並著說以申其義兹復取洪範次八念用庶徵語篆八徵耄念之寳又副以自彊不息御製記以寅承昊貺旉錫庶民乾乾夕惕日進無疆為念是猶書無逸之文于屏掲戒得之訓于堂薄海臣庶咸喻皇自敬徳祈天永命之至意所以壇廟大祀必皆躬親行禮今年復宣諭禮官中祀皆親詣一周以昭誠敬諏二月初吉舉東廵守之禮躬秩岱宗展謁闕里聖容穆穆不懈益䖍健行之徳與天合符洵嘉樂之詩所謂受祿于天保佑命之自天申之者也徳孚于上光化于下夀期頤者以千計見曽元者二百家和氣醇化涵濡浃洽耆民耉長仰副夀考作人之盛矧復皇風溥被浩蕩靡涯異域荒陬喁喁慕義自古聲教未通之國無不稽首闕下恭獻夀巵臣等敬編萬夀盛典一書于天章聖徳典禮恩賚圖繪歌頌六門之外復増聖功盛事二門誠足卑塗山之玉帛而軼爻閭之車乗矣臣獲侍内廷目覩皇上盛徳大業炳麟逴躒冠乎謨典欲效詩人詠歌之義以宣上徳而達下情而管窺蠡測不能揄揚萬分之一謹撰四言詩一萹拜手稽首以獻嵗在上章支直奄茂月應金穰星見弧宿皇帝陛下八旬萬夀協氣和醲化洽厚庶彚訢誾羣生阜富中外受福莫不瞻就羣工籲祝勤懇敶辭廼下俞㫖廼沛恩施天子若曰予思民依予代昊蒼恵此庶黎貸汝稅賦汝家用肥賚汝粟帛汝老用依予宥汝諐衿恤圜扉其汝卿士用錫爾禧典命晉秩禮官布儀簮􅅂蹈舞戴我皇慈聖懐謙沖慎徳若始曰時庶徵予永念爾八十曰耄記在曲禮天惟顯斯敢不敬止遴玉鎸篆遹示深㫖八徵耄念厥寳莫儗既作大寳大文爰記奉天惟寅視民猶子孜孜自强有進靡已扵赫我朝受命孔長戰薩爾滸威㥄丕揚列聖逓嬗緝熙重光昌基景祚畀於我皇我皇建極文武聖神聖不自聖舊章率循陪都四莅南國六廵製全韻詩羮墻儼親史宬峩峩實錄蔵珍我皇欽觀間日一陳凡大謨訓是奉是遵萬㡬之繁綜覽魁柄批荅封章敷宣詔令監司牧尹下逮一命召見引見用人必稱有隠必陳並觀兼聴疇倄厥職帝則有慶疇曠厥官帝用董正聖人無心遇事立應若水鑑形如天正性埏埴萬類乂安兆姓捍海治河隄防綿亘相度平險擘畫緯經鉅費發帑咸奏底定皇錫庶民曰大賚爾蠲租者再惟嵗丙已蠲賦者三逮今四矣富蔵閭閻力􅅷耘耔偏隅或歉帝用厪止展賑常賑命善經理及告豐登皇心廼喜詔封疆臣雨雪嵗啟陳奏稍遲責其懈弛有涉祥瑞必戒其始環頋隰原髙廪錯峙邉屯之外亦穫秬秠沐浴歌詠綏屢樂只對時育物建極敷言日新富有積數萬萹敬天勤民盛徳聿宣倬矣雲漢浩乎淵泉至文昭布闡揚精詮理絜其綱大中無偏古所未發今則躍然意惬辭卓㫖立義堅與道為體因言以傳王謨帝典聖備其全苞孕星嶽琢磨方圓化成天下是為衡權心法治法一貫斯文用合神妙功参地天諸家說經傳䟽注箋睿觧訂譌識據象嶺周觀前史得失糾紛丹豪評隲剔隠抉根覺世衷聖垂訓體乾蒐輯羣書四閣四庫既刋聚珍復頒三部全書之副詞垣是貯日下多士均俾傳布翼翼太學羣材受鑄爰建辟雍式周榘度親臨講學圜聴快覩石鼓遺文重編章句以恵来者典則備具載定樂譜補佚正誤宫商悉調工尺駢注發為中和諧于韶頀制作善羙教澤汜濩扵惟聖人義正仁育有不率教必令讋伏昔準噶爾兩和卓木大小金川先後濟惡臺灣阻海蠢兹蠻觸堂堂王師雷迅電速搗穴犁巢逐竄執􅕚浄洗甲兵嵗則大熟五告武成成于帷幄逺方聞之罔不觳觫土爾扈特願就藩牧痕都斯坦願作臣僕維廓爾喀路隔西竺敬慕皇風請受羈束方物畢獻遣大頭目奉三寳佛合掌頂祝罽賧陸離靸鞜連續緬甸南掌暹羅之属及夫生番無有不服安南君長懐徳向風禀朔職貢稽首来同服我衣冠列我臣工事我君父肫摯由衷帝嘉悃欵錫予優崇鴈臣鳬藻喈喈雝雝我朝幅員逺軼三代我皇拓土益廣而大鎮迪道属嘉峪闗外曰安西府曩牒未載横經鼓箧士數百輩惟承徳府設扵上塞特創文廟亦置官廨日􅒸月竁蒸蒸藹藹風雲測占海宇亨泰是由我皇奉若天時壇廟大祀祈糓崇儀精禋蠲潔必親必祇五十五年聖敬日躋天人叶應習習祁祁雨晹時若福履綏之昔在沖齡親侍聖祖題五福堂實兆纉緒乾隆甲辰帝見元孫増書五代用紀麟振昨嵗就傅新正入讌皇家盛事從古未見維天維祖眷祐聖躬彌性純固篤祜延洪宵衣視事秋獮肄功四闢進善三推劭農健行不息執兩用中民生聖時熙煕皥皥黄髪台背期頤夀考拜恩宴者三千耉老賜杖賜幣重以天藻百嵗之坊聯属王道五世同堂屢見奏表春試耆儒官以檢討及學正銜恵溥澤浩百有十嵗閩之龎皓晉階鴻臚寵命綏保諸福之来環應叠兆美哉盛哉大哉皇哉天冒八極聖陶九陔髙明悠久鼓舞化裁衢歌聲暢王㑹圖開萬方臣庶奔走偕来臣願聖夀萬億京垓八旬萬夀盛典卷九十四
