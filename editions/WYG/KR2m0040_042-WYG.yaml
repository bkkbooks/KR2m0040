body:
  text: 盛事十八班禪入覲臣等謹按蔵地内屬肇自元代實為經喀木而次烏斯之外境攷梵帙佛受記五百年後佛法漸微而漸流行東至震旦迺復興若今之稱後蔵因班禅額爾徳呢所居地而名其與居前衛之達賴喇嘛興修黄教盖同一祖燈遡自凱珠布格埒克巴勒蔵六轉世而迄今法源遞續乃以志心皈向不逺二萬餘里來至京師躬祝萬夀七旬慶増寳算實以徳致弗事招徠溯乾隆庚辰年烏特噶里畢拉竒碩拉汗初遣婆羅門進表奉貢閲廿載而班禪額爾徳呢又獲親依夀佛演乘延洪真所謂誠重勞輕求深願達如有天人宻契者矣豈非希遘之盛歟乾隆四十五年皇上七旬萬夀之年西蔵班禪額爾徳呢來覲祝釐詔允其請先是章嘉呼圗克圗奏西蔵班禪額爾徳呢欲於庚子年來京親祝七旬萬夀皇上鍳其誠敬歡喜之悃特諭副都統職銜臣留保住親赴後蔵靣見班禪商定來京一切事宜旋據留保住奏稱班禪擬於四十四年六月十七日自後蔵起程留住塔爾寺於次年由青海西寜一帶行走前詣熱河行在乾隆四十四年七月二十九日奉上諭明嵗班禪額爾徳呢入覲據哲哩木盟長齊黙特多爾濟等奏稱情愿帮馬二千匹駝二百隻冄喀爾喀回部落亦情愿帮助馬駝等語盖因班禅不由伊等境内行走各愿出其馬駝稍申敬意俱屬可行即欲叩見班禪額爾徳呢亦足見伊等敬奉之意着交該院通行班禪額爾徳呢自西蔵前來經由之隣近盟長以及内外札薩克等於班禪額爾徳呢來時有各申敬意情愿帮助馬駝者均聽其便乾隆四十五年正月初七日奉上諭本年班禪額爾徳呢來京瞻仰朕躬衆蒙古等逢此吉祥盛事大率皆欲迎接叩拜如全行随至熱河人數過多難於安頓此内必欲随見者自貝勒以上准來貝勒以下不准餘未經行過王公台吉等如在乾清門行走之人尚属不多情愿來者俱准前来其閑㪚王公台吉人等甚衆亦自貝勒以上准來貝勒以下不准都爾伯特土爾扈特和碩特等處甚逺向來年班原俱賞給乗驛此次班禪額爾徳呢來京所用乗驛甚多况此來皆伊等情愿叩見班禪額爾徳呢又正青草發旺之時自口外起程亦可喂養馬匹緩行前又何用驛站之費如情愿随來者俱自偹資斧其平䓁無力之人亦自貝勒以上者准來貝子以下毋庸前來将此自該部内至扎薩克喀爾喀都爾伯特土爾扈特和碩特及衆爱曼盟長等盡行知照外伊勒圗巴圗䓁亦照依咨行一體辦理九月十八日臣伍彌㤗留保住法福里謹奏為奏聞事班禪額爾徳呢呈稱小僧由札什倫布起程蒙文殊師利大皇帝普施宏恩沿路並無勞苦之處甚属安妥渡過穆魯烏素河不乆可至固穆布穆廟皆托大聖主威福渡河甚稳小僧理合差来使請大聖主萬安叩謝天恩懇請将差遣岡沁沙爾塞依堪布綽爾吉羅卜蔵端珠卜随徒一名白人一名因便發徃等語臣等竊見班禪額爾徳呢感戴皇上天恩差來使請皇上萬安獻佛哈逹甚属䖍誠相應遣發來京為此具奏奉㫖甚妥知道了十一月二十八日臣伍彌㤗謹奏為奏聞事班禅額爾徳呢與臣等稱言明年恭遇大皇帝七旬萬夀欲将祝釐大慶諸典舞童帶來現因來覲未得携帶請俟明年随仝逹賴喇嘛使臣令十二名舞童跟随三人共十五人同來此十五人毎人應給騎馬一匹駝一匹祈為遣去将此劄知駐蔵大臣等語遂将給駐蔵大臣䝉古書字一包給堪布諾們汗阿旺綽爾吉木札什倫布唐古忒書字一包併付臣等臣等見班禪額爾徳呢為㳟慶聖主七旬萬夀之儀意甚誠懇随照所稱将寄去蒙古唐古忒書字移交駐蔵大臣令将随逹賴喇嘛使臣同來之舞童勿致遲悮轉咨後蔵俟明年仝逹賴喇嘛使臣照例辦理遣來為此謹奏奉硃批好知道了勅仿後蔵班禪所居廟式特建扎什倫布廟於熱河以資安禪乾隆四十五年正月初三日㫖諭班禪差進丹舒克來使朕聞明年班禅額爾徳呢來京深為喜悦皆以吉祥有縁始得此㑹合恰如朕意實宏衍黄教普恵衆生矣朕今已照五世逹賴喇嘛來京例建造扎什倫布廟及時尚派王大臣前去迎接朕現習唐古忒語班禪額爾徳呢到來時冄為歡談御製扎什倫布廟落成紀事庚子華言福夀等湏彌唐吉特語倫布者湏彌山扎什者福夀也建以班禪來祝釐今年班禅額爾徳呢來熱河為余祝七旬萬夀因倣後蔵班禅所居廟式特建此寺舊例已遥遵順治謂西黄寺因五輩逹賴喇嘛于順治年間来京特勅建寺居之新工猶近比去聲康熈溥仁寺康熈五十二年建為熱河最古寺層樓初聳輝佛日萬樹分栽蔚慧枝一語欲詢駐錫者有為法也抑無為御製再題扎什倫布廟庚子曉趁輕凉出苑門扎什讀作平聲倫布煥崇垣班禪輜重先云至班禅額爾徳呢昨遣喇穆占巴四人並喇嘛随從䓁五十餘人賫送輜重先至熱河因即以扎什倫布旁舍居之夏季生衣預沛恩喇穆占巴及喇嘛䓁来自後蔵尚服氊毳因各頒賜紗葛銀兩藥物有差彼以敬來酬以惠識其委欲溯其源荘嚴毎謂非斯謂那待他人有後言御製須彌福夀之廟碑記庚子黄教之興以宗喀巴為鼻祖有二大弟子一曰根敦珠巴八轉世而為今逹賴喇嘛一曰凱珠布格埒克巴勒蔵六轉世而為今班禪額爾徳呢喇嘛是二喇嘛盖􅉍相為師以闡宗風而興梵教則今之班禪額爾徳呢喇嘛實逹賴喇嘛之師也逹賴喇嘛居布逹拉譯華言為普陀宗乗之廟班禪額爾徳呢居扎什倫布譯華言為須彌福夀之廟是前衛後蔵所由分也辛邜年曽建普陀宗乗之廟於避暑山荘之北山以祝釐也亦以土爾扈特歸順也今之建須彌福夀之廟於普陀宗乗之左岡者則以班禅額爾徳呢欲來覲而肖其所居以資安禪且遵我世祖章皇帝建北黄寺於京師以居第五逹賴喇嘛之例也然昔逹賴喇嘛之來實以敦請兹班禪額爾徳呢之來覲則不因招致而出於喇嘛之自願來京以觀華夏之振興黄教撫育羣生海宇清晏民物敉寜之景象適值朕七旬初度之年並為慶祝之舉也夫朕七旬不欲為慶賀繁文已預頒諭㫖而兹喇嘛之來則有不宜阻者盖國家百餘年昇平累洽中外一家自昔逹賴喇嘛之來至今亦百餘年矣且昔為開創之初如喀爾喀厄嚕特尚有梗化者今者重熈休和喀爾喀乆為世臣厄嚕特亦無不歸順而一聞班禅額爾徳呢之來其歡欣舞蹈欲執役供奉出於至誠有不待教而然者則此須彌福夀之廟之建上以揚厯代致治保邦之謨烈下以答列藩傾心向化之悃忱庸可已乎既為記復作讚言印度既迥遥佛教亦式㣲梵僧捨天竺多臨衛蔵地自唐代已然是為法源處一譯猶云近三乗無舛訛宗乗向東昌誠如佛所記衛蔵雖徼外實在震旦中逹賴及班禪宗喀巴高弟前後燃智燈三車之綱領真文與滿字於是溯軌躅䝉古衆林林莫不傾心向皈依三寳門神道易設教兹聞班禪来如嬰兒遇母觀化闡宗風誠為吉祥事布逹拉既建倫布不可少擇向興工作亦已不日成都綱及寝室一如後蔵式金瓦映日輝玉幢揚風舞自成動静偈朗標色空喻以是善因縁資無礙法喜祝嘏猶其小所欣象教宏舉似西域居無來亦無去上人演法輪蠢蠢普超度佐我無為治雨順與風調衆生登夀世慧炬永光明合十作讃言初非為一已如懸大圎鏡徧照於十方而鏡本無心迴向亦如是臣等謹案天保稱夀一則曰如山再則曰如南山盖山為静體宜叶貞固之符也佛書須彌乃山之最大者班禪額爾徳呢本居後蔵之扎什倫布唐古忒謂須彌山為倫布謂福夀為扎什因其舊居之名鑒其逺來之意詔建兹廟以為班禪栖止之所非由中心誠敬有感必孚適與周雅九如副兹吉語乎至夫經營不日傑搆一新天然羅漢之峰環以師子之座迥非尋常梵宇琳宫所可並者其與北黄寺資逹賴喇嘛之安居普陀宗乗廟誌土爾扈特之歸化舉足以揚洪烈而迓重熈聖謨之逺大即一端可見矣秋七月班禪額爾徳呢入覲於避暑山荘七月二十一日班禪額爾徳呢至避暑山荘於澹泊敬誠殿丹墀跪請聖安後皇上召至依清曠殿慰問賜茶駕詣寳筏喻烟波致爽雲山勝地各佛堂拈香班禪額爾徳呢随從行禮御製七月二十一日班禪額爾徳呢至避暑山荘晉謁詩以誌事庚子祝釐逺至鬯宗風三接欣於避暑宫敬一人而千萬悦垂名册亦乃予同雪山青海胥増忭班禅額爾徳呢自後蔵䟦涉二萬里來祝余七旬萬夀各蒙古王公台吉及喀爾喀衛拉特等一聞其來無不歡欣舞蹈欲執役供奉出于至誠實為我國家之吉祥盛事色罽精金許獻􅇆初見宛然舊相識本來如是匪神通七月二十四日賜班禪額爾徳呢筵宴於萬樹園八月十九日復賜筵宴如初入宴呼圗克圗等名號十五名逹爾罕啇卓忒巴崇巴呼圗克圗羅卜蔵津巴一名根敦巴岡沁堪布大遂綳羅卜蔵開穆楚克一名綽爾吉喇穆扎穆巴羅卜蔵喇卜坦巴爾丹蔵布噶爾蔵䇿旺羅卜蔵䇿􅇒羅卜蔵根敦羅卜蔵嘉爾燦羅卜蔵扎爾燦羅卜蔵格勒克津巴格勒克以上九名拉倉喇嘛呼必勒罕喇穆扎穆巴羅卜蔵色布騰噶沁綽爾吉羅卜蔵丹珠卜羅卜蔵丹多卜伊什宗囉衣以上四名御製於萬樹園宴班禪額爾徳呢成什紀事庚子聖僧永佑小棲遲永佑寺在萬樹園張幕賜宴之東内有神御是日班禪因候宴寺中小憩班禪與逹賴喇嘛本西蔵宗喀巴二大弟子之轉世衆蒙古尊之為佛此間世俗遂亦呼之為佛云神御巍臨欲覲宜今佛云當拜古佛我朝此禅云家法凡喇嘛入覲惟令跪不受其拜班古佛宜行拜禮遂聴之益見喇嘛之敬誠為可嘉也古時希有見今時舊藩新部益生敬設席承筐共受釐中外一家逮葱嶺大清萬載鞏天禧勅於香山静宜園肖衛地廟式特建宗鏡大昭廟是年落成班禪慶讚居之御製昭廟六韻庚子昭廟縁何建神僧來自遐因教倣西衛既建須彌福夀之廟於熱河復建昭廟於香山之静宜園以班禅逺来祝釐之誠可嘉且以示我中華之興黄教也是日自謁陵廻蹕至香山落成班禅適居此慶讃又昭廟肖衛地古式謂之衛者畨語謂中俗謂之前蔵班禅所居後蔵乃實名蔵蔵者善也並以示中華是日當慶落便途禮脱闍見楞嚴經注唐語謂法幢也黄衣宣法雨碧嶂㪚天花是日本晴甫至經壇乃㣲雨皆以為㪚天花之喜云六度期羣度三車演妙車雪山和震旦一例普庥嘉臣等謹案昭廟之建與布逹拉皆倣前蔵式為之者廣殿重臺穹亭翼廡無一弗嚴浄如制香山浄境近帶御園有健銳營以肄禁旅有實勝寺以昭成功福徳兼隆竝成勝果當夫聖輦經逰拈花獻祝堪布嚢蘇之衆同聲随喜圍繞旃檀是維我皇康强御世延夀命最尊之慶乃得廣大千為福界如瞻竺乾祖庭之妙勝也十月班禪額爾徳呢随駕至京師初三日命於保和殿再賜筵宴一次節次賞賚班禪額爾徳呢儀物金幣初次命㪚秩大臣萬福署侍郎保㤗等至塔爾寺迎接班禪額爾徳呢賞東珠朝珠一盤雕鞍一副白馬一匹三十兩重銀茶桶一銀壺一銀盞一各色大縀二十疋大小哈逹各十二次命乾清門行走副都統烏爾圗那遜迎至歸化城賞上用車轎傘儀仗二十對䝉古包一分黄布城一分三次命皇六子章嘉呼圖克圗尚書永貴迎至岱漢賞嵌東珠㡌一頂嵌東珠袈裟一件東珠朝珠一盤頭等玉鞍一副白馬一匹五十兩重鍍金銀茶桶一銀壺一銀盞一各色大縀五十疋大小哈逹各二十班禪額爾徳呢至熱河行在初次瞻仰天顔恭進伯勒克回賞三十兩重金滿逹一三十兩重銀滿逹一玉鞍一副金座磁把盌一金水壺一金盒一金碟一金香爐一遵㫖加添玻璃盌十玻璃盤十玻璃瓶十磁盌十磁盤十磁瓶十哈逹五百初次萬樹園筵宴賞嵌東珠斗篷等衣一分雕鞍一副哈逹二十金五百兩銀一萬兩各色大縀五十疋玻璃盌十玻璃盤十玻璃瓶十随從班禪徒衆入宴者十五名毎名賞大錁子三個錦二疋漳絨二疋玻璃器四磁器四二次萬樹園筵宴賞大東珠一顆五十兩重銀茶桶一各色縀一百疋遵㫖添賞磁碗十磁盤十磁碟十三次保和殿筵宴賞五十兩重金茶桶二三十兩重金盤二五十兩重銀茶桶八三十兩重銀盤八一千兩重銀鍋一各色大縀一千疋茶一百包貂皮七十猞猁猻二十水獺皮二十黄􅈢皮二十銀䑕皮二百特賜御畫詩扇一柄御製寫山荘内白蓮箑頭贈班禪喇嘛庚子本是出塵體塞湖託浄真卻紅色俗韻修白業良因風拂香含慧露承淡沃神寫圗合誰贈無著與天親臣等欽惟我皇上具大福徳普大吉祥以長夀無量之勝因成衆生如意之宏願縱悉百千萬億恒河沙數莫殫諸方膜拜之䖍兹於班禪之來上承古佛遺規下順列藩歸向自蒙古王公台吉及喀爾喀衛拉特等無不驩舞忭躍竭供奉之誠以遂瞻仰之志班禪之擎薌頂禮歡喜慶讃則惟以積實之根性為上樂之護持而聖朝之所以昭褒荅廣恵施者承筐設席不啻羅百寳之玲瓏供諸天之肴饍備美而極馨至夫恩優於徠逺而投謁者必嚴體節之閑教寓於畏神而執役者兼厚柔懐之誼善哉化宇偕登羣生共樂敬一人而千萬悦有不知其然而然者近繹御製國語譯漢蔵經序推闡佛乗第一義諦由漸深入之本原而諄諄以尊君親上去惡從善示中外觀化之準又如廓爾喀在後蔵外上年投誠進表内稱敬奉大皇帝即如敬奉三寳佛等懇悃之言以視前代之厚遣名僧虚陳方貢何本末之懸殊也乎益讚嘆我大聖人善思議之所至乃真不可思議有如是爾八旬萬夀盛典卷四十二
