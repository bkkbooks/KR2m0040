front:
  text: 欽定四庫全書八旬萬夀盛典卷十六聖徳十二謙徳一
  hash: sha256:6798d48f02d29a50071f729a4121ba94c32da22533c444539b634a6d56bd5f9c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_016-1a, image: WYG0660/WYG0660-0191a.png}
body:
  text: 臣等謹案易之為書廣大悉備惟謙一卦其内卦三言吉外卦三言利盖謙者徳之柄也王者徳盛禮恭以至厚之實持戒滿之衷則天地神人咸奉之以福是以致恭存位而履無疆之慶也洪惟我皇上盛徳大業積厚流光躋八旬之崇禧為萬古所希遘舉夫文謨武烈聖徳神功古聖人得其一端即足以照耀簡冊者我皇上皆躬有而兼備之所由三靈荅以蕃祉五福嚮其宣臻焉耳乃猶聖懐沖抑鞏執勞謙於七旬慶典則弗俞臣民之籲逮八袠鴻儀復屢申裁抑之㫖以及徳水澄流嘉禾栖畆特却宣付之請並傳訓誡之辭凡皆聖衷之保㤗持盈備昭撝吉雖堯之克讓文之小心豈是過哉臣等恭纂夀編謹循錄乾隆四十五年以來屢奉宣諭之實事以仰推我皇上不自滿假之實心敬載謙徳一門用見夫履慶延洪之盛惟大徳足以致之而聖人之抑然自牧者正所以尊而彌光也乾隆四十五年皇上七旬萬夀臣工籲行慶典詔弗允先是乾隆四十三年十月初三日大學士管兩江總督臣髙晉等以江浙臣民望幸甚􅇻懇請庚子年再舉南廵盛典並以是年恭屆皇上七旬萬夀擬就近舉行慶典合詞具奏奉上諭朕本意以庚子年七旬慶辰越嵗辛丑即恭逢聖母九旬萬夀斯則敷天同慶自當臚歡祝嘏以抒萬姓悃忱今既不能遂朕初願尚復何心為己稱慶况朕蹕途所經老㓜歡迎扶携恐後未嘗不頋而樂之若經棚戯臺及侈陳燈綵㸃綴紛華餙為衢歌巷舞深所不取且非所以善體朕意也不特江浙臣民不當為祝釐之舉即凡内外大小臣工于朕七旬萬夀時亦均不得請行慶典以及進貢獻詩若伊等謂欲藉以申其尊敬之誠是轉増朕心之不悦尚得謂之忠愛乎但天下士民遇朕七旬萬夀皆不免望恩倖澤此亦情理之常朕亦何肯因不舉行慶典並靳恩施乎著于己亥年八月舉行恩科鄉試庚子年三月舉行恩科㑹試以彰夀考作人之盛至各省漕糧曽于乾隆三十一年普免一次茲䝉昊倉眷佑累洽重熈朕敬體天心愛飬億兆用是再沛恩膏著于庚子年為始復行普免天下漕糧一次俾藏富於民共享盈寧之福所為歛福錫民慶莫大焉其開科事宜著交禮部查例辦理其各省漕糧應如何分年輪免之處著交户部詳悉妥議具奏将此通諭中外知之乾隆四十四年八月十八日奉上諭前因江浙督撫等以兩省臣民望幸奏請廵閲河工海塘已降㫖允于庚子春正月諏吉南廵至所稱明嵗為朕七旬萬夀欲就近申祝則斷乎不可業經宣諭飭禁盖朕本意原以庚子為朕七旬誕辰辛丑即為聖母九旬萬夀連嵗叠逢大慶中外臚歡自可聴其抒誠祝嘏今既不能遂朕初願朕復何心為已稱慶惟念士民想望恩澤積有嵗年因詔開鄉㑹恩科並輪免各省漕糧一周以洽羣悃明年南廵回鑾後俟北郊禮成即啟程避暑山莊駐蹕八月慶辰一切仍照常年例行若在京受賀惟恐轉多棖觸遂至山莊以避之至於西藏班禅額爾徳尼預請覲祝實屬吉祥盛事是以允其前來即令於山莊瞻謁俾從其便朕並非因其稱祝先期往就之也恐内外臣工尚未能深喻朕意仍有以慶典為請者非惟不能博朕之悦適以増朕之懐又豈臣子愛敬之道乎俟朕八旬大慶則當聴從諸臣稱祝此次必不允行又前屆朕六旬萬夀時自古北口熱河兩處曽有㸃綴叚落燈綵之類本屬朕所不敢明年尤當嚴禁将此再行通諭知之臣等謹案祝釐之典上以彰國家之洪祉下以貢臣子之縷誠所願嘉納同懽庶以順人情而光熙運也我皇上椿紀増崇本年萬夀八旬始荷允行慶典爰溯古稀之嵗中外請祝聖齡皇上執徳謙沖再三辭讓雖未許臣工之稱慶而猶恐虚衆庶之望恩預啟特科普蠲漕糈頒恩詔舉時廵章焯令儀推曼夀之殊施以廣億兆之攸賴盖閲十年而鴻禔茂介衆志顒孚所謂鳴謙中心得勞謙萬民服實有以叶吉占而垂盛􅁤焉爾乾隆四十五年聖夀七旬命於山莊敬搆戒得堂並著記文以闡皇祖鐫璽垂示之意御製戒得堂記庚子孔子三戒之論朱子注謂以理勝之則不為血氣所使又引范氏之言以為飬其志氣故不謂血氣所動䝉引又引新安陳櫟之語以為志亦定向於理志有善惡理無不善諸説繹聖析理各抒所見亦既擇之精而語之詳矣我皇祖聖夀望七時嘗欲鐫通用小璽命内廷翰臣擬文皆無當聖意者乃定戒之在得字用之此語聞之張照蓋爾時伊在南書房裏行也然當時聖意引而未發予今年亦屆七袠於元旦試筆即􅕍括此語為什茲駐蹕避暑山莊乃皇祖朝乾夕惕用此璽之處而予受恩之所也適作書堂於清舒山館之左即以此題額而為記以闡皇祖之義曰帝王之學與佔畢書生有不同則所戒亦當各異未定方剛之戒茲不復論茲所戒者當在得矣而得豈與庶人同乎欲得賢才而用之此可戒乎欲得億萬年永承天眷此可戒乎欲得寰宇安寜萬姓樂業此可戒乎欲得五風十雨屢綏普徧此可戒乎若夫欲得貨財為􅌦林大盈金花内帑之私則是剜肉補創自速其亡之舉古有明戒而戒及此其亦小矣因敬思皇祖所云戒得者其在擴土無逺之為乎擴土兼逺之不已必有窮兵黷武之事我皇祖雖征朔漠復衛蔵非窮兵也不得已也予小子欽承先志亦既平伊犂定回部靖金川擴土不為不遐兼逺不為不備然非敢恃兵之强将之畧而窮黷以逞已之欲亦惟是不得已而用之耳幸䝉天助諸事順成今則夀登七旬亦既老矣尚何所不足敢弗以皇祖之戒為戒乎如是則先儒所謂志氣血氣胥不外一理然此理實非佔畢儒生所得同而或有合於我仁祖垂示萬禩之義乎臣等謹案謙六五象辭曰利用侵伐征不服也程𫝊謂謙徳之君豈問威武不得已征之耳伏讀御製記文因孔子戒得之言闡聖祖鐫寳之意謂兵者不得已而用之且以擴土既遐兼逺既備嗣後所當為戒大哉王言嚴恭寅畏之心洵非佔畢書生之所能窺及矣要之仰天知戴共極咸歸邇若安南緬甸等之歸誠内面均非利其尺土一民有心於得而嚮風景附重譯偕徠聖夀彌隆聖功日懋奏武成者九次矢文徳于萬年天道福謙於斯益信云御製戒得堂後記辛丑戒得之義於前記言之宜無不盡茲後記何為而作也曰前記之義盖言其欲得茲後記之義乃言其已得欲得者有形得與失任彼其過小已得者無形得與失任已其過大茲後記之戒所以不可不講不可不作也夫已得則有形而吾謂之無形且曰任已而其過大者何試以吾之所得者言之平伊犂定回部靖金川不為不遐不為不備是皆有形者然而消息盈虚之理滿損謙益之機伏於無形茍有或渝復隍随之故戊寅之嵗作勒銘伊犁之碑於凡栽培傾覆之道屯種萬里外非計之得三致意焉至今亦廿餘年矣荷天之寵疆宇日以安耕闢日以廣方敢言有形之得而吾心之慄慄危懼於無形以戒夫或有所失而不能保其得全之意豈謂此一記遂足以息吾肩而䣃吾責哉亦惟日慎一日以待吾歸政之日而已爾臣等恭繹前記所戒在欲得其義至大後記所戒在已得其義至精而以有形無形反覆推闡兢兢於消息盈虚之理滿損謙益之機斯實帝王精一危㣲之學保世茲大之謨合内外而宥宻㒺間統覆載而悠乆無疆更非佔畢書生之所能窺及者矣御製題戒得堂辛丑書堂昨夏始經營蹕駐宛㸔此落成攻匪庶民大雅異戒惟老者魯論精庭餘古樹全鋪䕃堦繞新花自放榮雖曰殷勤曽著記得通皇祖聖夀望七時嘗鐫戒之在用小璽庚子駐蹕山莊作書堂於清舒山館之左因額曰戒得堂並為記以闡皇祖垂示萬禩之義斯干爰處愧猶生御製題戒得堂壬寅泐筆壬寅尚欠詩山莊蒞止已多時曽無羲畫髙輝宇是處為新搆故無皇祖御書宜有藐躬祖述詞見堂記雨鮮庭莎緑猶淺雲生峯樹白徒披即今亟望甘霖得此得又安能戒之御製題戒得堂乙巳兩月頻來未著詩今朝心適一題詞較晴量雨曽何暇幸北繾南忽閲時駐蹕山莊每因南北較量晴雨時切於懐詳見前誌事諸作兹幸近畿及口外雨後連日晴霽而河南山東淮徐一帶均得透雨惟安徽湖北尚有未霑渥澤之處殊深繾念耳陽暴大田㸔遍穫露霑小草許同滋西成指日将登寳於得吾原弗戒斯御製題戒得堂丙午皇祖垂明訓成堂敬額之在得皇祖夀望七旬刻戒之小璽行用予庚子年屆七袠因於山荘敬搆戒得堂用志紹承䝉庥百年乆保㤗一心寅國晏民熙世内安外闢時書云滿招損戒得有同斯御製題戒得堂丁未搆得書堂乆慶落流隂七載􅌺分明堂築於庚子今閲七載矣不踰已邁宣尼嵗戒得原循聖祖情璽庚皇祖聖夀望七時曾鐫戒之在得通用小子於山荘清舒山館之左搆書堂數楹亦以戒得題額葢仰循皇祖垂示之意也望道依然慚未見化民肫若竟何成余即位五十餘年以來無日不以化民惠鮮為先務乃近日臺灣逆匪林爽文等謀為不􅁤廹脅良民抗拒官軍半載有餘尚未就獲雖撫躬循省尚無致此之由然頑梗未化殊深憤懣每教新什隣舊詠藉騐年來已所行御製題戒得堂戊申書堂述祖額檐開肯構而今亦乆哉已是居安九年閲曰惟謙益一言該有無形著後記悉辛丑作戒得堂後記謂前記言其欲得者有形得與失任彼其過小後記言其已得者無形得者而曰無形盖言消息盈虚之理滿損謙益之機即潜伏于其中也以此慄慄戒懼日慎一日若今嵗臺灣之三月蕆功緬甸之萬里入貢當亦仰邀上蒼鍳予夙昔不得已而用兵之心刀益昭茲寵眷耳覆載恩叨此日培平得臺灣順得緬莫非篤念戒中來御製題戒得堂已酉金風皜日曉秋清徙倚書堂静六情下卷魯論堪意㑹上篇孔子重躬行戒之原在耄而耋得也還分實與名近誌安南終始事更申知過義尤精安南用兵之始意在興㓕繼絶原無欲得其土地之心然得其名與得其實同當孫士毅初復黎城予不能無得名之意迨後阮光平復來予不處孫士毅之乆駐失防而自咎其喜而忘懼為未能體得皇祖戒得之訓因書安南始末事記以誌過而戒之義為尤精矣御製戒得堂自箴庚戌書堂樸不詡耽耽硯净甌香性所諳聖祖兩言記闡兩得四皇祖聖夀望七時鐫用戒之在字通用小璽然聖意引而未發予七袠時駐蹕山荘剏作書堂即以戒得題額因為記以皇祖之義盖皇祖所云戒得者在擴土兼逺之為予欽承順成先志平伊犁定回部靖金川幸䝉天助諸事敢不以皇祖之戒為戒乎嗣有後記之作謂前記之義言其欲得後記之義言其已得消息盈虚之理滿損謙孟之機伏于無形敢不日慎一日以待歸政之年詳見前後兩記先師三戒戒宜三兹年登八旬是宜第三之戒得矣生身鱗集西合北今嵗西北諸藩如額魯特霍碩特都爾伯特土爾扈特烏梁海哈薩克及各回城伯克等皆逺來祝嘏念其未出痘生身多俱今至山荘宴賚虔念駢臻東及南其東南如安南國王阮光平及朝鮮南掌緬甸各國使臣咸來京稱慶亦俱令先至山荘一體與宴似此中外一家可稱極盛䝉天佑能不益切虔寅且以盛滿為懼矣極盛何修遇而得天恩深沐懼兼慙臣等伏讀御詩敬懐天貺恒以時處極盛益深戒滿之衷即如五風十雨叶應屢綏而聖念攸勤惟因大順而増大惕若本年諸藩鱗集祝嘏來同以必得之徳而猶申戒得之箴謙斯受益義與謨典並昭矣八旬萬夀盛典卷十六
