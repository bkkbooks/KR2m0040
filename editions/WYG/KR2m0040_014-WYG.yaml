front:
  text: 欽定四庫全書八旬萬夀盛典卷十四聖徳十文徳二皇上命頒布四庫全書詔許士子檢錄乾隆五十五年復諭翰林院一體遵行御製命頒布四庫全書時許願讀中秘者抄錄毋靳詩
  hash: sha256:98bb8217fe180c61a4465625ac54c4ef4c7a7a8612a7496738fb5e014b6ce92c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_014-1a, image: WYG0660/WYG0660-0171c.png}
body:
  text: 以誌事庚戌發帑増抄四庫書更非㨗徑為崇儒前因江浙為人文淵藪特命繕寫四庫全書三部分弆揚州文滙閣鎮江文宗閣杭州文瀾閣俾士子得就近抄録𫝊觀用光文治其抄錄書手皆特發内帑雇覔不致濫邀議叙為仕途㨗徑也擬公寒士廣聞檢預禁守臣嚴䕶符全書繕竣分庋三閣恐地方大小吏過扵珍䕶以致徒供挿架無禆觀摩因復降㫖曉諭有願讀中秘書者許其陸續領出廣為傳寫但令督撫等派委妥員董司其事設立收發檔案登註明晰不致遺失舛錯俾多士得殫見洽聞以副朕樂育人才稽古右文之至意褒博三倉實富矣精英二酉任觀乎欲期寰宇敷文教濟濟明廷治贊吾先是乾隆三十八年命館臣蒐輯永樂大典散篇成帙並校勘各省所進遺書彚為四庫全書共三萬六千册繕寫四分分貯大内之文淵閣圓明園之文源閣避暑山莊之文津閣盛京之文溯閣復命擇精粹者輯為四庫全書薈要一萬二千卷繕成二分一貯大内摛藻堂一貯圓明園味腴書室乾隆四十四年四十五年薈要二分告成四十六年至四十九年四庫全書四分次第告成又乾隆四十七年特頒諭㫖俯念江浙為人文淵藪發給内帑續繕四庫全書三分扵揚州文滙閣鎮江文宗閣杭州文瀾閣各貯一分至五十五年陸續頒發其自四十五年以後編纂成書者若皇清開國方略滿洲源流考平定三逆方略大清一統志皇朝通典通志續通典通志盛京通志宗室王公表傳蒙古王公表傳繙譯五經通鑑綱目續編通鑑輯覽附錄改正名字之金元遼史契丹國志明宫史明臣奏議職官表河源紀略蘭州紀略熱河志日下舊聞考補繪離騷音韻述微詩經樂譜等書均諭令錄入四庫全書以昭美備乾隆五十五年五月二十三日奉上諭四庫全書薈萃古今載籍至為美備不特内府珍蔵藉資益覽亦所以流傳廣播沾溉藝林前因卷頁浩繁中多舛錯特令總纂等復加詳細讐校俾無魯魚亥豕之訛兹已釐定蕆工悉臻完善所有江浙兩省文宗文滙文瀾三閣應貯全書現在陸續頒發藏庋該處為人文淵藪嗜古好學之士自必羣思博覽藉廣見聞従前曽經降㫖准其赴閣檢視抄錄俾資蒐討但地方有司恐士子繙閲汚損或至過為珍秘以阻其争先快覩之忱則所頒三分全書亦僅束之髙閣轉非朕捜輯羣書津逮譽髦之本意即武英殿聚珍版諸書排印無多恐士子等亦未能全行購覔該督撫等諄飭所屬俟貯閣全書排架齊集後諭令該省士子有願讀中秘書者許其呈明到閣抄閲但不得任其私自攜歸以致稍有遺失至文淵等閣禁地森嚴士子等固不便進内抄閲但翰林院現有存貯底本如有情殷誦習者亦許其就近檢録掌院不得勒阻留難如此廣為傳播俾茹古者得覩生平未見互為抄錄傳之日久使石渠天禄之蔵無不家絃户誦益昭右文稽古嘉恵士林盛事不亦善乎臣等欽惟我朝圖籍垂光儲珎藝藪皇上以聖學崇深迪稽古右文之治爰羅三萬六千册之閎富編摹檢校悉禀睿裁既快全書之集大成分藏四閣備著記文美矣盛矣復發帑繕録三分頒之江浙兩省特沛恩言許令𫝊抄毋靳其情殷誦習者翰苑存貯底本亦得就近檢録盖聖人敷宣雅化嘉恵儒林有加無已之至意允宜祥徵太乙輝映長庚天文人事並昭煒郁者哉乾隆五十五年皇上重排石鼓詩特命製鼓重刻置太學及熱河文廟御製集石鼓所有文成十章製鼓重刻序庚戌凡舉大事者必有其㑹與其時而總賴昭明天貺以成其功武成九次無論矣即如四庫全書及以國書譯漢蔵經皆始於予六旬之後自癸巳年蒐輯海内遺書並於永樂大典内採集散篇命館臣依經史子集督繕四庫全書四分又佛經本出厄訥特珂克一譯而為唐古忒之番再譯而為震旦之漢其蒙古經則康熙及乾隆陸續譯成而未有國書之佛經先於乾隆三十七年亦命開館譯定兹二事卷帙浩繁俱非易於觀成者乃皆在予六句後始命舉行初亦覺其遲也既而悔之以為舉事已晚恐難觀其成越十餘載四庫全書則早㕘攷裝潢畢以貯之閣而所譯漢藏兹亦將告畢就此非天恩垂佑俾予雖老而善成此二事乎近因閲石鼓文惜其嵗久漫漶所存不及半夫以國學興賢述古之為使千萬年之後並此僅存者胥歸無何有之鄉有治世之責者視之而弗救予且不成為讀書之人矣斯事體大千古讀書人所不能任亦従無道及者予故不怍不文及此未至耄耋智昏爰蕆此事盖石鼓之為宣王時作與夫宜置國學為萬世讀書者之津逮自以韓昌黎之見為正車攻吉日之章班班可考也後人議論紛出如董逌程大昌據左傳成有岐陽之蒐以為成王鼓鄭樵據殹㞼二字見秦斤秦權以為秦鼓馬定國據後周書以為宇文鼓陸友仁據北史以為元魏鼓至楊慎之偽作全文為尤謬甚總不若韓愈之見為正盖即本鼓之文取証小雅可信也若歐陽修集古錄云韋應物以為文王鼓宣王刻今應物石鼓歌具存明以為宣王何曽有文王之説近者尚悮况與論三代以上㦲夫昌黎有其見而無其力且未思及存其詩則予較昌黎為勝矣兹用幸翰苑之例乾隆九年重修翰林院落成親臨錫宴以張説東壁圖書府五律四十字為韻予賦東字及末音字二韻其餘飭諸臣各分一韻賦詩親定首章截其長以補後數章之短即用文中字並成末章自第二至第九命彭元瑞按餘字各補成章非因難以見巧實述古以𫝊今於是石鼓之文仍在十鼔井井有條而不紊矣舊鼓舊文為千古重器不可輕動但置木柵蔽其風雨以永萬世而新為十鼓以刻十章並列國學以公天下恵後儒則仍周宣之文也熱河文廟為嵗嵗恵逺詰武之地則亦命置之以詔来世庶乎宣王中興之烈不冺宣聖牖世之道恒昭而予耄耋之年尚得蕆此崇文之舉孰非㑹之萃時之合深蒙昊貺之所致㦲希周家卜世之久鬯皇清重道之規後世子孫尚慎念之是為序􅏶我車既工攻􅏶我馬既同􅏶我車既好􅏶我馬既􅥹阜君子員員云邋邋獵其斿麀鹿速速君子之求右一八句凡二十九字重文三郭廓猷合衟道允熾隹維􅀢宣天子謂公􅞁徒我其㠯以田簡􅞁徒徇衆除􅂒道具駕􅇌􅏶我􅀈馭其亞師􅏶我弓其射右二八句凡三十五字亞車趍趍趂􅀢酋車䢱䢱續左驂䮯䮯敖右驂􅀈􅀈音速其游丑若反司馬相如大人賦休奔走其未詳旛旛君子其来導導􅏶我鳴鑾右三八句凡二十六字重文六􅇌車趩趩丑亦反行聲也欶䇿馬䟏䟏音瀝導導􅀈彼盭盩邍原隮􅀈彼大􅀈陸彤矢鏃鹵鹵弓音臺其斿􅛼􅛼音洛君子其来右四八句凡二十七字重文五遄来騝騝音堅寺時余卅三十里余射鹿于兹六轡寫缷止出勿憂微􅀢霾或以時雨邍原溼隰隂陽霝靈帛泊􅀢華􅏶籞天子之所右五九句凡三十七字重文一其淵殹也孔深帛泊淖􅀢􅀢洋滔滔沔沔泛澫漫之一方其魚不識㞼㞼烝隹維鱮􅀢鯊鯁鱄鮒􅤺音白又极楫又罟右六八句凡二十九字重文四其􅧦阪又多𣗳為􅀈㯶􅀈音咎棫樸楊桺及㮚栗既氐柢既柞如莽如箬及􅀢華及碩禽􅂒翰攸宫以寺時而乍右七八句凡三十四字其邍原孔􅞈獸迺寍寧處麋豕􅀈豚蜀犢麀鹿雉免􅂒􅂒音即其旲古老反白澤也􅞚􅞚憲其虎左驂馬執之大黄弓射之右八八句凡三十二字重文二即鹿又奔搏麀又真填鮮葅時㫖異􅀈音拉今作䏠博雅􅀈謂之􅀈是申如天之喜潘迪作嘉朱彜尊石鼓考據施宿引説文作喜秀藝員云乍作未詳􅀢􅀢未詳即以寫樂右九八句凡三十字重文二􅞁徒􅀈馭既射􅏶我馬載止用賢孔􅞈康康敇治田車既安日隹維丙申用各為章害曷不永寧右十八句凡三十一字重文一御製重排石鼓詩得句庚戌就石鼓所有三百十字分排十章並鑿成十鼓各泐其面十什排成十鼓咸崇文漫議創非凡就其本有差鱗次弗以所無為雁讒潘氏迪詳詮尚可取楊家慎偽作概従芟拈題既復囅然笑那禁千年後削劖臣等謹案古来金石之最夀者莫石鼓若其宜寘國學以津逮萬世之讀書者誠如御製序文韙唐臣韓愈之言為正慶逢我皇上登耄耋之年剏億萬載非常之舉舊文重次貞石新刋用以公天下而昭来許而聖意深逺命於國學於熱河文廟分列其間臣等竊以車攻吉日之詠周宣不過揚中興之駿業而未嘗膺運㑹之極隆若我皇上文謨武勲炳灼今古偉鴻烈之九奏拓疆宇於二萬里之遥胥藉天眷祖貽蒙庥悠逺則今新鼓之成羲娥齊耀夫豈容成𨽻首所能布算及之者乎乾隆五十五年命以清文繙譯全藏經成皇上親製序文申訓御製清文繙譯全藏經序庚戌為事在人成事在天天而不佑事何能成人而不為天何従佑然而為又在循理為不循理之事天弗佑也予所舉之大事多矣皆賴昊乾黙佑以致有成則予之所以感貺奉行之忱固不能以言語形容而方寸自審實不知其當何如也武功之事向屢言之若夫訂四庫全書以及國語譯漢全蔵經二事胥舉於癸巳年六旬之後既而悔之恐難觀其成越十餘載而全書成兹未逮二十載而所譯漢全藏經文畢蕆夫耳順古稀已為人生所艱致而况八旬㢤兹以六旬後所剏為之典逮八旬而得觀國語大藏之全成非昊乾嘉庇其孰能與於斯而予之所増惕欽承者更不知其當何如矣至於以國語譯大藏恐人以為惑於禍福之説則不可不明示其義夫以禍福趨避教人非佛之第一義諦也第一義諦佛且本無而況於禍福乎但衆生不可以第一義訓之故以因縁禍福引之由漸入深而巳然予之意仍並不在此盖梵經一譯而為番再譯而為漢三譯而為蒙古我皇清主中國百餘年彼三方久屬臣僕而獨闕國語之大藏可乎以漢譯國語俾中外胥習國語即不解佛之第一義諦而皆知尊君親上去惡従善不亦可乎是則朕以國語譯大藏之本意在此不在彼也兹以耄耋觀蕆事實為大幸非溺於求福之說然亦即䝉天錫佑如願臻成所為益深畏滿怵惕儆戒而已耳是為序臣等謹案佛書以有全藏不與經史並列我皇上精究法乘以為梵文雖異其義則同亦既三譯成編番漢蒙古字體俱備則國語譯經之舉所闗固有甚鉅者焉仰惟皇上以長夀無量之身康强御世慶登八旬而兹所譯全藏經文適以本年告蕆是不可思議之因縁皆由善思議之福智有以快如願而覩圓成信非偶然也恭譯序文推本於上天之黙佑示要於中外之尊親要皆以循理之為廣大同之化然則文思光被至徳難名彼三竺之秘典且將與四庫之鴻篇同垂不朽豈非億載昌期之盛事乎哉八旬萬夀盛典卷十四
