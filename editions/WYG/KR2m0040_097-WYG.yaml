body:
  text: 歌頌十八萬夀雅九篇三十六章謹序工部左侍郎臣鄒奕孝臣聞祁姚氏之世封人有祝八伯有歌逮乎成周大小雅之材翼然大備天保詠九如召虎誦萬夀其㫖歸扵導揚盛羙期願永福故得播諸樂章垂示永乆乾隆五十五年皇上八旬萬萬夀中外臣民踴躍歡喜普天同慶臣竊綜采古義集詩經成句為萬夀雅九篇伏惟我皇上聖徳郅治上超三五雖恢意單辭莫可得罄臣今所撰集商周治世之語譜昇平太和之音誠知萬分未得一端亦欲以對揚敷錫抒寫歡愉比扵古者詩人之義恭呈乙覽臣誠歡誠喜舞蹈以竢皇矣敬天也上法天健行乾乾􅅥若屢見扵御製詩文每嵗三大祀親詣行禮精誠昭格實為諴民致福之本皇矣上帝日監在兹保兹天子昭假遲遲假㢤天命於穆不已天命匪觧民之攸塈一章雝雝在宫扵緝熙敬止不顯亦臨聖敬日躋將受厥明思皇多祜以綏後禄以榖我士女二章我將我享龍旂承祀其香始升以洽百禮禮儀既備既多受祉應候順徳福禄如茨三章如茨如梁維天其右之綏我眉夀我應受之受禄于天萬福來求洽此四國四國是遒四章天作法祖也上率祖攸行每晨恭讀實録命編開國方畧圓明園避暑山莊皆御題紀恩堂額天作高山長發其祥三后在天休有烈光允也天子率由舊章繩其祖武遹觀厥成一章訏謨定命無競維烈繼序其皇之昭㢤嗣服不愆不忘夙夜基命宥宻萬邦作孚下土之式二章我受命溥將正域彼四方四方為綱介爾昭明以孝以享則篤其慶降福穣穰萬夀無疆三章夙夜勤政也上所臨御處皆有勤政殿每晨秉燭待章硃筆批諭召見文武大臣引見文武員弁每嵗春御經筵御製論宣講秋獮於木蘭各觀氷嬉以習勤行賞夙夜敬止遹求厥寧匪居匪康不顯不承鷄既鳴矣以莫不興維其有章矣以奏爾時我視謀猶庭燎晣晣朝夕不暇逸豫無期一章文武維后維民之則平平左右率由羣匹髦士攸宜秉文之徳嗟嗟臣工共武之服朝既盈矣心焉數之或肅或乂天子予之二章春日遲遲敷時繹思俾筵俾几烝我髦士載纉武功發彼有的射夫既同用戒戎作鑿氷沖沖薄言觀者不敢怠遑庶幾夙夜三章維清愛民也上軫念民依庶徴協應䖍恭祈謝普免錢糧者四普免漕糧者再遇偏災即詔蠲賑巡幸所至皆蠲免正供積欠維清緝熙徳音是茂有嚴天子民之父母恵此京師迄用康年日靖四方四方于宣一章寤寐求之求民之莫福履綏之以綏四國教之誨之日用飲食肆其靖之永錫爾極二章祈年孔夙稼穡匪觧既齊既稷既種既戒三事就緒爰得我所葢云歸處三章籥舞笙鼓以祈甘雨靈雨既零既優既渥既安且寜播厥百榖實函斯活四章時邁其邦既景乃岡允猶翕河綱紀四方四方為則干禄百福萬夀攸酢五章維天有漢廣文教也上右文典學御製詩文積數萬首欽定四庫全書重排石鼓文建辟廱定禮器樂譜制作大備維天有漢不顯其光維此聖人其徳克明克明其徳日就月将一章秩秩大猷其詩孔碩朝夕從事時萬時億展也大成矢其文徳二章先民有作古訓是式受言蔵之綿綿翼翼乃覯于京四方爰發三章我車既攻先民有言聖人莫之為章于天匪今斯今扵萬斯年四章於樂辟廱孔曼且碩譽髦斯士既飽以徳無小無大無思不服五章式禮莫愆有壬有林樂具入奏鼓瑟鼓琴百禄是總以矢其音六章嘉種揚武功也上平定凖噶爾回部烏什兩金川臺灣聖武布昭大功耆定誕降嘉種去其螟螣回遹其徳苞有三蘖明明天子赫赫業業宣昭義問孔淑不逆四方以無拂一章進厥虎臣徒御無斁我徒我御不測不克不留不處匪疚匪棘執訊獲醜一月三捷則莫我敢曷二章質爾人民是穫是畆維彼不順是伐是肆敷天之下式歌且舞以燕天子三章令徳化藩服也上撫馭外藩徳威昭著土爾扈特緬甸安南廓爾喀哈薩克抜達山歸順安集延痕都斯坦南掌入貢文軌無外為前古所未有顯顯令徳烝烝皇皇肆于時夏用逷蠻方薄言震之莫敢不來享四國于蕃曰求厥章一章此邦之人居國南鄉烝然來思依其在京來獻其琛來游來歌正是國人俾臧俾嘉二章赫赫厥聲聞于四國因時百蠻莫不震叠有倬其道于時廬旅獻其貔皮天子之所三章翩彼飛鶚載好其音鴥彼飛隼依彼平林福禄既同四方來賀匪且有且溥天之下四章烝民恵耆老也上循舊典舉千叟宴夀民夀婦五代同堂以至布魯特夀婦有加賜焉又賜年老舉子科第職銜有差天生烝民俾爾夀而富有覺徳行自求伊祜降之百福孔恵孔時今此下民夀考維祺優哉游㢤樂且有儀一章黄髪台背于京斯依以引以翼其車三千帝命率育或肆之筵㫖酒欣欣式飲庶幾燔炙芬芬式食庶幾二章偕偕士子夀胥與試呦呦鹿鳴芃芃棫樸式燕且譽以似以續如云不克誨爾序爵則不我遺天被爾禄三章外大國是疆裒時之對懿厥哲婦眉夀無有害道之云逺謂我來矣同我婦子維其偕矣其類維何爰衆爰有既登乃依迺慰迺止四章南山誦聖福也上八旬萬萬夀五世一堂徳備福全普天同慶妙應吉帛太常仙蝶祥徴叠見本年元旦恩詔錫福延庥讙謳載路南山有臺佛時仔肩君子至止瞻彼溥原如南山之夀天子萬年三夀作朋稱彼兕觥如坻如京恵我無疆一章曽孫來止亦既抱子子孫繩繩用錫爾祉萬億及秭自今以始昭兹來許有秩斯祜上帝是皇降福無疆二章飄風自南萬夫之望其帯伊絲無曰高高在上如彼飛蟲我行永乆屢舞僊僊亦集爰止自天降康申錫無疆三章順彼長道民胥傚矣不顯維徳神所勞矣神之聼之福禄艾之獻之皇祖中心喜之四國是皇受福無疆四章萬夀恭擬範引一篇謹序工部右侍郎臣張若渟臣聞堯舜書曰典禹曰謨而禹敷文命承天瑞錫洛書法而陳之則曰範範釐九疇根柢皇極行事政紀極所由見三徳稽疑天人變化而省躬之縡莫若庶徴雨暘燠寒風協氣致祥實基五福皇極所由歛敷與六㝢同慶夀富康寜者斯道得也上章奄茂恭逢皇上八句萬萬夀紀年為五十五演袠為八數符大衍而書之五居中以運十者又適符旬慶臣伏讀御製八徴耄念之寳記仰見皇上勵精建極行健自彊欽承鴻庥光纘駿烈時幾密勅至敬至誠于洪範三致意五之歛錫九之三憂八之念徴孜孜惕惕日進無疆葢天時民事皇心念之百榖成乂用明俊民章家平康臶福翼祺靡弗臻茂曩者論著洪範斯以上耄之年彌垂彛訓延鴻勒寳鞏意萬載丕丕基夐乎遐㢤剖判以來蒼牙通靈乾出天苞坤流地符于斯萃為盛㑹以絣億葉之暉烈三五之蹤八九之跡未之有也時臣工籲請慶釐久而廼俞停貢獻之繁文禁郡邑之私祝天下黄耉駘背熈熈盱盱擊壤撫塵嬉乎春臺二百餘家曽元在抱數百餘姓期頤過嵗睇三千叟之開筵傳一十世之合㸑庥和晏粲不可殫紀迺邇者逰原逺者泳沫欽聲教之覃敷大徳威之無外羣藩拱向航海棧山凖夷囘部䟎拉促浸震叠膚功罔不協順石峯萌掃赤嵌波馴緬甸函表而來衛藏皈風而至朝鮮琉球暹羅南掌諸國納琛獻賮畢修享王比南交君長慕化近光親拜闕下輸誠奉朔喁喁欵忠心悚乎聖神感啣乎恩愷周家王㑹之篇唐室職貢之圖馳驅趢趗方斯狹矣當首嵗迎禧舉行元㑹盛典昉自庚午嵗四旬大慶洎今八旬之庚戌嵗庚庚協兆熙輯光明二月東巡狩祉洽恵章少皥司秋雲荘宣慶藩王暨各國陪臣並年班來覲之呼圖克圖都爾伯特土爾扈特霍碩特烏梁海哈薩克等俱鞫􅛏趨風合歡介景南吕之月玊衡指酉日躔于角弧南星耀拱應斗樞帝乃御殿受朝庥對天下合八紘之抃舞同萬國之尊親五代一堂慶垂奕禩錫禧曼羡懿鑠崇隆所謂歛福敷錫訓行近光蕩蕩平平㑹極歸極者實宣洪範之珍符焉而皇上淵冲毖徳萬幾宰心敬念庻徴勤思民瘼不以臚懽而一念弛也懐保下方貸賑緩除有加無已而天下惟正之供履端宣詔普蠲億萬萬至三至四滋液渗漉無㣲不軫無物不綏欽帝廣運之神凡經文緯武修禮備樂察吏勤政諸大端悉與天同體臻于乆道化成耶詩文懋學亦闗訏謨典要所由暢垓泝埏旁魄四塞彰雨暘寒燠之應紀嵗月日時之成箕畢從星福夀備吉衍範之五皇極而推至于京垓億兆而浩無極也臣伏念漢班固有典引之作謂堯之常法能紹其緒紳而長之固雖稱相如靡而不典自以為得典實顧掞藻攄華猶近符瑞即效忠悃亦侈而鮮要今熙朝功徳不特逺軼炎漢實􅊶唐孕虞育夏前后無兹盛軌臣陋固之侈諛采固引伸之㫖伏讀御製寳記窺知聖治上光洪範聖夀永演福疇節取典引舊體敬撰為範引一篇不揣檮昧稱述萬分之一不敢溢媺思以記實謹拜首稽首以獻曰泰元之始循蜚因提呿呿吁吁沕穆氣齊柱州龍門天地開闢逮于人皇三才啟焉喬齡之享一萬八千嵗四萬五千六百嵗羲畫八卦乾坤數衍軒轅設紀始定章蔀紀元繇千四百四十氣以暨無窮運世循環時從辰惠然求厥治理繩契荒邈末繇殚而述也五帝之徳唐虞卓絶丹陵孕瑞諸馮毓華金符玊牒鴻算多齡或在位七十載或得夀百十嵗自姚暨姒平成績懋牧金鑄鼎九道攸通諸侯嵞山四方鞀磬神靈錫洛第疇衍範出入典謨已然而流星貫􅄧石紐臻夀範禹衍之禹體之自時厥後闡繹斯難求剖判之盛㑹貞元之昌期皇極歛敷庻徴協應徳以基福福以基夀者其生民來未易遇乎惟大清凝命鍾叡震方白山緑江奄有區宇文祖神宗蘿圗熙洽星尾輝度常羊耀維汁三靈而嬗運撫五辰而凝績洪惟皇上􅊶元履徳日煥山巍璇穹體化珠邱承烈真一心司炁開篤祜配京之原也埢垣潔秘登降峛崺郊壝肆秩必親肸蠁扵以知帝敬天之誠絳宇玊堂肇禋迄用縮茅欝鬯九廟升香于以知帝纘祖之敬問夜求衣闗衷民瘼豊綏屢告時豁租庸暑雨祁寒痌􅟂在宥普蠲正賦至三而四于以知帝愛民之仁夕惕朝乾所其無逸懸旌馭朽萬幾簡心批章晷移召問漏永勵精體道夜寐夙興于以知帝勤政之義班朝涖官羣䇿羣力撫綏保障畺臣是毗曰郡曰縣安良戢宄慎簡乃司展采錯事于以知帝察吏之明經緯萬端金聲玉振鉤貫鑿㡯搜討符珍壁府富藏奎垣羅纂載籍海河淵源津逮迺復鑑古西清森圖禮器和闐琢琯臨江采鐘禮修樂備銖錙百代于以知帝光宅之文廟算千里神機獨斷天山月竁拉朽摧枯井絡印崃闢叢掃箐鹿耳門通屋鰲社靖茍或不譓罔弗底定貫􅒸穿域壓壘踰墉風聲所震南北西東于以知帝徳威之武舄奕乎彌綸三才籠絡萬有有滭浡沕潏之量靡矢敦奮麾之容用宏厥化豈不神明㢤若夫嶞山裒對展義習祥康度河渠疇咨溟嶼樹舍吴㑹夹車岱宗露灑旐旗風移筦鍵此所以大時邁而宣慶恵焉古北塞垣興安漠嶺嵗親訓旅秋舉行圍詐馬草夷教駣霜肅樹堋决拾風勁弓鳴所以承家法而重獮典焉武列湜湜錘峯峩峩高啟雲莊萬方和㑹鶼邦鰈國蛾伏麕至霞開山積瑰異旅呈近天子光祝聖人夀所以廣懐柔而洽藩部焉碧漢垂雲銀潢潤水隆凖殊常麟振邁逺五福五代卜世卜年靈祉蝉聨延庥億萬山鞏川溶凝祥錫羡所以厚貽燕而綿神筴焉家傳曼齡世増耆碩千叟秩筵十世同室旌里揚輝賜章闡懿皓齒龎眉三朋樂易簪管而書莫能殫誌所以熙春祺而普引翼焉若此景鑠茍得二三足以鏡區㝢禔品物煦燾天下昭登于無已而皇帝絣而綜之兼而􅊶之匪開一匱之跡實運萬鈞之模蟠上際下鬯溢九鴻雲靡風移存神過化日月之華容光必照江河之流有坎畢洊蕩蕩乎平平乎㑹歸于維皇之極景從于大同之盛富夀康寧普于庻民縡於一人至誠不息日進無疆其疇能亘之哉且夫徳富道宏淵渟海流崇化也為辟雍講禮以示之考聲定律鏄宣磬收集成也為全詩譜樂以風之車攻馬同于苗勒碣布績也為石鼓補文以永之真文滿字溯軌傳燈設教也為梵經譯法以鑽之為隆譽髦也則開科廣額之制宏為榮稽古也則予秩頒第之澤盛為翹才匠秀也則上塞邉陬之風逺為㧞尤舉萃也則區途分類之用彰外運乎渾元内霑乎毫芒兼綜條貫順性循物本無逸之精神感斟酌而肴覈三五六經載籍之傳考斯光烈蔑以加矣至矣且繹幾暇之㳺藝秉天亶之聰明垂文二集垂詩五集如日月星辰之麗天如江淮河海之行地罔非民生國計流示敷言又非典謨所能盡範所能殚者已窺管測蠡引申萬一重稼穡五行順也精思睿五事通也食貨養民祀崇天祖賔柔逺人師昭偉畧八政協也嵗月日星時和邦稔五紀效也平康正直人才進退三徳彰也卿士庻民大同徯應身其康健子孫逢吉稽疑定也風雨從星咸蕃庻草康寜好徳茂臻夀富則八徴念用實基五福也福所繇歛所繇敷錫則全本于皇極建中作民父母為天下王以綿景祚于億萬斯年也範不能殚而實挈範之奥藴祥源福緒璣貫璇循峻極之鴻規口無以名心知其意鳬藻歡忭不能已也金秋之仲旦觜觹中日在夀星之次皇上八旬萬萬夀恰應珠嚢天地之符五五遞衍黄鍾之數八八相生䌰紀積算浩乎無極統六幕以呼嵩裕萬祚而祝嘏中外禔福昇平有象歟彼金泥玉牒刻石封壇鏤迹燻今鐫徳麗逺鄗黍江茅紛綸詭譎天門窔遼侈迎嘉貺固熙朝所撝斥即山川器圖蟲鳥之屬駢集靈符亦弗侈靡黄河清吉帛垂仙蝶告何預天子道徳之原哉極以錫福範貫典謨兢業業即仁夀無量必单心敬誠斯則博厚髙明悠久貽萬萬世丕丕基也泰乙成鳩以來卓乎不可尚也已萬夀樂府十八章謹序内閣學士江蘇學政臣胡高望臣聞行健者自然之運也至誠者不二之道也執大同之制調㤗鴻之氣鈞旋轂轉悠久無疆物之所以成也夫大徳曰生太和謂道徇齊敦敏而推準循繩延美大光而周徧溥博懿綱醲化規矩乾坤累洽重熙潤澤豐美春臺夀宇統輯羣黎邇陿游原迥恬泳沬誠閎區之上軌而建極之嘉徴也我國家景貺昭融延洪錫羡慶綿萬禩化㝢日長㤗運元辰時惟㑹萃先是嵗紀庚子為皇上七旬萬夀之辰綸詔叠宣鉅典隆茂緝熙純嘏敷錫兆民􅍭生遂性之倫優游幬載飲和蹈豫莫不思歌九如而頌三多聖徳謙冲抑而弗許萬物熙熙懷而慕思願伸其祝嘏臚歡之志者十年如一日也洪惟五十五年恭逢皇上八旬萬夀俯鑒顒忱俞允衆請猶復㢲命重申毋得踵事増華於同樂之時寓持盈之意嚴恭寅畏孚應天心百昌用豐駢蕃集祉四方來賀天子萬年里忭塗歡羣聲和㑹何其盛歟臣伏見皇上欽若昊天䋲其祖武允廸厥徳建中於民引見臣工披覽章奏兢兢業業以日以年運而不息也子惠元元勤恤民隐豁丁賦蠲漕庾不一而足偏隅偶歉賑恤必周雨雪之期民榖之數莫不隨時奏報上逹宸聰煦嫗覆育無一物不得其所也且天縱之聖齋心典學虞歌禹牒朗耀星雲御製文二集詩五集周情孔思㑹六經而為言者也至於蘭臺金匱册府圗書述古崇文彌綸無外一道徳于辟雍昭至教于闕里觀文成化而麗乎正也聖䇿風行神威電發海隅日出懐徳畏威西域之底定也金川之蕩平也澎湖撃楫而安瀾日南歸誠而奉義煌煌乎九伐行而聲靈震也若夫鸞旗寳軑展義觀民近自泰嵩逮于吴㑹舳属艫翹灌輸斟酌雲梯宣洩竹箭安流鞏堰屹塘束淮障海順動過化無為而成也惟時五代同堂榮鏡宇宙庥徵翕習逢涌原泉升中展幣河嶽薦馨告精禋也秋賦春闈蜚英擢秀登俊良也増秩加粻布澤推仁恵寮寀也衢尊賚酺蕊牓升耆優髙年也程軍吏簡師徒加儲胥恤戎士也蠲年也程軍吏簡師徒加儲胥恤戎士也蠲懸逋免户課復廢籍廣赦宥補不足而予自新也協氣嘉生上蟠下際巍乎煥乎盖無得而名也臣聞𨗳和以樂宣徳以詩伶簫詠歌象容鳴盛夀人安世自古為然我朝同律協音上侔韶䕶慶平和平之奏畨部回部之章𨽻在太常化動翔泳而𨗳揚聖節尤宜依永和聲引而伸之以昭極盛之軌臣不揣檮昧謹撰樂府十有八章曷勝踴躍顒忭之至其詞曰元㑹世曼夀祚我聖清皇帝萬萬嵗久道化成三光昭融兮中外禔福二儀絪緼廣運大亨右第一章仰夀星兮景弧南建其有極湛恩覃八袠肇開億算維皇咸五登三右第二章勑天之命萬幾惟日夙興以求屏書無逸右第三章率皇祖之攸行紹庭陟降精誠夙夜宥宻統百度以惟貞右第四章八方視如户牗勤政日惟孜孜敷言於帝其訓並觀公聽勤堯咨右第五章劭農食為本帝耤親耕殷于民全蠲算億萬錫慶施惠古無倫右第六章霆威奮神武嫓虞陛干羽二萬里新疆文教啟黌宇右第七章建櫜偃伯波恬鹿耳悠悠富良其流順軌右第八章宸章闡盛藻卿靄森寳翰獵碣句重新光華瞻復旦右第九章論定史宬兼三才帝璣甄度思深哉典册祕書四庫開壁府藻耀照九垓右第十章昌辰演福疇龍綸膏澤周貞符介景錫類揚庥右第十一章酺讌賚千臾老更闡天言􅚳􅚳敐敐㑹陽澤慶裕流水之原右第十二章省方咨牧時巡鑾輅岱嶽升香嘉㑹表祚右第十三章寳賢舉典開恩榜矣瓊班優秩曰懋賞矣右第十四章九功叙兮四和華封人作歌鳬趨而鱗集擊壤兮婆娑右第十五章車書王㑹駢闐共球自八埏同太平兮舞蹈樂相兮延年右第十六章皇極歛錫蕃昌惟帝八徴耄念引且長自彊不息曰恒久丕庥其應時雨暘右第十七章咸池雲門理八風賡颺喜起夀㝢同惟天鴻貺眷聖躬萬年有道景運隆右第十八章八旬萬夀盛典卷九十八
