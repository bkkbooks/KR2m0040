body:
  text: 欽定四庫全書八旬萬夀盛典卷三十盛事六千叟宴一臣等謹案禮王制云凡養老有虞氏以燕禮夏后氏以饗禮殷人以食禮周人修而兼用之又云三皇養老皆引年葢惟崇嘉事而慎令儀上以尊譲潔敬之道行斯下有耆艾昌熾之福應然此猶一代優養之恒經云爾而非若篤祜承徽之茂舉也我國家景運延洪蕃釐懋輯聖祖仁皇帝乆道化成躋斯民於仁夀肇開千叟宴與中外臣民行慶錫祉誠為億齡罕遘之亨期我皇上丕紹寅圖敬承光烈以民胞物與之量繼重熈累洽之庥御極之五十年聖夀七旬有五爰詔禮官重陳愷讌一時龍光譽處懽洽當軒耉夀臚愉咸仰天恩國慶之駢集葢所以紹家法而介景禧有蹈舞歡詠於無疆者爾乾隆四十九年命於次嵗新正舉行千叟宴乾隆四十九年十月初九日奉上諭繄古帝王御世建極凝庥上有敷錫之君下享康寜之福洎乎近代史冊尠稱我皇祖冲齡踐阼統馭寰區仁漸義摩涵濡休養康熈年間曽舉行千叟宴與中外臣民躋夀宇而迓繁禧誠為千載一時之嘉㑹朕誕膺丕緒敬紹鴻圖仰承昊蒼眷顧福佑朕躬年逾古稀尚能康强勤政惟是歛時錫福期舉世咸登仁夀著於乾隆五十年正月初六日舉行千叟宴盛典用昭我國家景運昌期重熈累洽嘉與中外臣民耆老介祉延禧之至意所有一切事宜著各該衙門敬謹預偹命官員年六十以上者俱准入宴十一月二十三日奉上諭明嵗舉行千叟宴原定四以下官員年六十五嵗以上者始准入宴現在人數已増至三千而官員與兵丁不同如必六十五嵗以上方准入宴則年過六十之職官不得邀榮者甚多著加恩凡在京四品以下現任原任各員年六十者俱准其入宴用昭普錫春祺加惠耆臣之至意命朝鮮國貢使陪臣入宴九月二十八日奉上諭朝鮮國進獻年貢陪臣向例於嵗底到京明正舉行千叟宴中外大小臣工耆庶年逾周甲者咸得預宴用普夀祺朝鮮國素稱恭順比於内臣其陪臣亦應一體入晏以昭寵眷著禮部即速行文該國王所有今嵗年貢正副使酌派年在六十以上者一二員来京俾得預兹盛典共沐光榮以示朕加恵逺邦優禮耆年之至意十二月二十三日奉上諭明嵗舉行千叟宴盛典特命朝鮮國王酌派年在六十以上陪臣二三人充正副使来京預宴據禮部奏接准朝鮮國王咨稱遵㫖将陪臣年六十以上者専差進賀正副使即日登程進京入宴等語該國王恪守藩封最稱恭順接奉前㫖即行遴選耆年派充貢使觀光預宴其忱悃甚屬可嘉著加恩特賜該國王澄泥仿唐石渠硯一方梅花玉版箋二十張仿澄心堂紙二十張花箋二十張花絹二十張徽墨二十錠湖筆二十枝即交該國貢使祗領並著禮部行文該國王毋庸具表謝恩以示朕恩加無已體恤逺邦之至意命大臣年七十以上官員兵民九十以上准子孫扶掖入宴十二月二十三日奉上諭新正舉行千叟宴所有與宴之官員兵民年在九十以上者俱准其子孫一人扶掖入宴其文武大臣年逾七十者令其自行揣量如歩履稍艱亦准其子孫一人扶掖入宴以示朕優眷耆年有加無已之至意乾隆五十年正月初六日賜千叟宴於乾清宫與宴者自王以下大臣官員兵民等凡三千人召一品大臣及年九十以上者至御座前親賜以酒總管内務府謹奏為請㫖事正月初六日乾清宫恩賞千叟宴是日設中和韶樂於乾清宫檐下設丹陛樂於乾清門内北向坫桌設八大件玉噐陳賞賜物件於甬路下兩傍檐下搭藍布棚預偹飯桌宴桌於殿檐下設五十張丹墀設二百四十四張甬路設一百二十四張丹墀下兩邊設三百八十二張共擬八百張将三千老人酌量排坐但所有桌張臨時一齊安設人衆不能整齊請将飯桌熱鍋菜蔬餑餑預先指示䕶軍等俱各妥協擺設應入宴王公頭二品大臣於殿廊下各照品級列坐三品以下五品以上官員俱於丹墀甬路各照品級列坐其餘六品以下至衆年老栢唐阿䕶軍領催披甲匠役人等俱令於丹墀下兩邊排坐如皇上陞座後始引伊等各歸班次勢不能整齊請将丹墀甬路丹陛下應入坐老人等先行入班恭候外殿廊下應入坐王公大臣等皆於殿下左右階下跕立等候俟皇上陞座後樂止賛禮郎排班賛進樂作御前大臣二員引王公大臣等由兩傍進至丹墀賛禮郎賛跪賛叩衆老人俱隨王公班後於坐次行三跪九叩禮賛禮郎賛興樂止御前大臣仍将伊等各照品級引領入班行一叩禮歸坐衆皆於坐次隨同行一叩禮列坐樂作尚茶正遞茶皇上進茶衆俱於坐次各行一叩禮茶下侍衛等進至殿廊下丹墀列坐王公大臣官員等前賜茶王公大臣官員等接茶行一叩禮茶畢仍将玉碗撤囘磁碗毋庸撤囘即賞給各員其遞茶侍衛如不敷用請添派䕶軍叅領及各項藍翎帶朝珠官員帮同侍衛等賜茶樂止皇上前恭進菓桌桌袱撤後掌儀司官員於坫桌前恭捧杯碟壺盞由中路進樂作衆起立執杯碟壺盞官員於殿廊下東翼西向立斟酒遞酒大臣釋褂進跪衆皆跪執杯官進跪遞進酒大臣畢起立退進酒大臣接酒跪進皇上接酒後遞酒大臣起立跪於原跪處皇上進酒遞酒大臣行一叩禮衆皆隨行一叩禮遞酒大臣進接杯退跪於原跪處執杯官進跪接杯退立将盞盛酒立遞與遞酒大臣衆皆起立遞酒大臣跪接盞行一叩禮飲畢執盞官進接盞退歸原處遞酒大臣行一叩禮起立穿褂入班歸坐衆皆坐皇上進酒畢樂止唱戯仍照賜茶式於殿廊下及丹墀列坐王公大臣官員等前賜酒王公大臣官員等接酒行一叩禮飲畢将酒鍾不必交囘即賞給戯止賞宴畢皇上前菓桌下賛禮郎賛衆皆於坐次行一跪三叩禮樂作皇上還宫樂止其頒賞物件辦理千叟宴事務大臣等監賞衆皆跪領後辦理千叟宴事務大臣二員引至乾清門前排列行三跪九叩禮入宴王公大臣官員俱穿蟒袍補褂外執事王公大臣侍衛官員等亦俱穿蟒袍補褂應将宴圖併應入宴老人名单一併恭呈御覽俟命下之日所有應行辦理預偹之處交各該部院衙門辦理預偹為此謹奏請㫖奉㫖知道了陞座奏隆平之章中和韻樂乾隆五十年春月王正日辰帝世重熈盛典陳髙年髙㑹楓宸有盈庭鶴髪臣民望罏香開扇輪共尊親年逾書亥福迓重申還宫奏慶平之章中和韶樂雲開黼座氤氲望天囘紫宸九拜龍光舞蹈申仙韶聲逺偏聞退朝班仙仗繽紛到蓬莱携紫雲散仙羣九重㬅夀千叟長春進茶奏夀愷昇平瑞之章丹陛清樂夀愷昇平瑞慶叶重熈仰宸躬行健天儀乾符象顯㤗階期久於其道唐虞際超頊俈軼循蜚正宵衣旰食徳之純不已徳之純不已輿圖二萬鴻勲啟全書三萬奎文麗允文武古稀天子四海羲圖萬年軒紀一觧宴啟拜舞首宗支首宗支公卿牧伯共追隨歸田人許扶鳩至扶鳩至更陪臣海外髙麗更陪臣海外髙麗封翁夀爵上丹墀並皤皤皓首龎眉二觧黄鸝練雀羣僚厎兠鍪隊帥旅熊羆濟濟章縫士宸躬敷錫徧羣黎老農匠藝鼔舞軒鼚喜軒鼚喜春筵上萬萬萃斯頥三觧􅘦當年龍光喜起到於今燕翼謀詒吾皇繼述茂前徽重開宴重光奠麗四觧尚爵朝廷先尚齒觥稱兕千復千人介維祺樂清時東膠養老三王治南山獻頌九如詩九如詩引年今日多加禮五觧况天家諸福備慶曽元五代同堂喜桐有蕤蘭載猗春風花發萬年枝瓜瓞衍洪禔六觧福有由基人惟徳致君王有道嘉祥偹風皥皥景熈熈風皥皥景熈熈合諸天環大地都是吉雲垂日月無私普人間添甲子七觧寳翰天題元音虞陛人分一首􅆳颺義聨百韻柏梁詩帝庸歌人七字金石播英詞日月無私普人間添甲子普人間添甲子八觧天人嘉應重華世間史䇿誰能嫓美珥茟慶昌期稱觴千萬嵗趨辭進酒奏紫禁春開之章丹陛清樂紫禁春開壺天雲靄羣仙㑹願祝臺菜春滿三千界一觧春風寰海紫霞同上萬年杯仰乾清辰共正泰運天開紅瑟瑟初陽升若木白輝輝晴雪在宫槐換桃符千門懸綵喧爆竹萬户轟雷南弧獻瑞北斗􅆽醅二觧大禹崇情惡㫖懷但尋常却酒杯獸樽庭下醴成醅衢樽陌上春濃海瓦樽田畔􅐻堆菜同浮玉罍不是等閒排是豳風春酒公堂介稱觥衆徧九垓稱觥衆徧九垓三觧雲縵縵卮琢瓊瑰皚皚暎玉階光灔灔和闐白玉材碧瀣漿芳滿壺黄封醖甘滿罍徳産自西来四觧有年華九十㡬人夀耉鮐更頭銜一品㡬人廊廟材總優老恩推㡬人手賜杯照天光席近前斟天酒春生靄三爵也酡貎春囘五觧更芳筵布兩階蒲萐堯厨桃實瑶臺但到處飽餐沆瀣問何人曽聞天籟六觧三百嵗合三槐綸扉阿伍兼嵇蔡朝天免使晨星戴寒風免使朝珂待天教頥養享康寜𫝊来感激羣寮宷七觧瞻雲日閩嶠来春巡六度江干届春綸兩度殊恩沛新銜司業諸生拜持将百五嵗春秋酬恩萬倍籌添海八觧堯尊沛周賚排如意瓌材繡縀雲裁鳩杖天街三十兩人帶銀牌萬民衣字冩皇恩大萬民衣字冩皇恩大帶爐烟捧出瑶階兒孫巷陌𫝊佳話人間誰到天上初囘九觧山龍繡綵金石雍諧徳貫三才堂顔五代勝上春臺勝拜堯階勝祝華封人在帝揮絃民阜財夀世羲媧大有埏垓問来朝菜甲挑纔樂春􅐻有酒如淮樂春􅐻有酒如淮願年年天上春来香山洛社人千倍燕毛禮洽燕喜圖開十觧願從今嘉㑹冄夀宿長明上台千叟恩榮宴屢開重将十體詩排積篇章無量京垓敷錫宜民福孔皆感雨露恩栽夀佛醍醐海五雲長是繞蓬莱趨辭進饌奏夀宇同登之章丹陛清樂夀宇同登萬國咸寜協氣徧寰瀛三霄露盈三殿春生一人端拱乾清鵲鑪鸞扇祥烟裊珠樹銀旛繡影縈鷺序横虎拜成布筵設席同慶一觧先春瑞雪農祥正上辛一日豐年定鷄竿詔下新韶令階蓂六葉良辰慶迎氣浃旬旗剪綵明朝勝都来瑞叶筵前應二觧昭敬白髪蒼顔氣屏營黄怕正髙擎瑶檻如迎瓊陛如繩移雕案近金莖柘黄繖直龍銜柄望紅雲低傍前楹調寳鼎晋仙􅃵捧向御筵端正三觧何須侈麟腴鳯脡何須詡駝峯豹􅃵君王旰食為民情菲飲食禹功成四觧綏桃露零碧藕風清摘棃大谷瑞烟凝金盤㡬層安期巨棗如瓜贈餦餭粔籹髙頭飣不是尋常讌席横囘城三果徕包貢帝来天戈種得成五觧龍墀排定啟黄封四豆甘凝天厨味永看八百瓊筵班列整羣臣長飽天家祿有田間瓦鬴鼔腹兒孫偕慶今朝筵上又来飽徳堯厨含滋周鼎六觧執醤爵祝噎哽更有春仲羅鳩君親􅃝割牲古儀傅㑹諸儒掇拾何如此日誠一堂和樂仰君酢臣醻情親禮敬七觧歡慶玉筵頒天語命克食賜𫝊餐盛鼎珍禁臠共得斟􅃵更招来孫曽扶掖六膳擕歸仙味夐向堯蒲荷分惠衢樽非幸八觧授几儀成三千黄髪盈庭今古何人見此曽億兆京垓讌屢行願長此萬夀稱觥照世杯明仁夀鏡趨辭賜酒堵王宗室郡王品級多羅貝勒允祁年七十四和碩裕親王廣禄年八十賜酒一品大臣大學士公阿桂年六十九大學士嵇璜年七十五大學士蔡新年七十九大學士伯伍彌泰年七十五協辦大學士尚書梁國治年六十三吏部尚書劉墉年六十禮部尚書徳保年六十七禮部尚書姚成烈年六十九刑部尚書喀寜阿年六十七工部尚書金簡年六十五左都御史周煌年七十二原任左都御史張若溎年八十三都統王進泰年八十一都統徳保年七十一都統五岱年六十二綏逺城将軍積福年七十一江寜将軍覺羅萬福年七十二杭州将軍宗室莽古賚年七十八寜夏将軍宗室嵩椿年六十二福州将軍常青年七十五廣州将軍存泰年七十四直𨽻總督劉峩年六十三兩江總督薩載年六十七閩浙總督富勒渾年六十五四川總督李世傑年六十八内大臣公西銘年六十一烏珠穆沁貝勒逹什衮布年六十八喀爾喀多羅貝勒阿玉爾年六十七都爾伯特固山貝子博第年六十扎魯特輔國公彭素克年六十七福建水師提督公黄仕簡年六十六湖廣提督俞金鰲年六十九廣東提督竇璸年六十七賜酒年九十以上誥封振武大夫李瑞年九十恩賞司業銜郭鍾岳年百有五誥封通議大夫逹春年九十一馬甲愛新年九十馬甲强兒年九十馬甲八十年九十李恒榮年九十六盧萬敖年九十四丁國榮年九十二兆宗年九十八旬萬夀盛典卷三十
