front:
  text: 欽定四庫全書八旬萬夀盛典卷六十五恩賚四本年蠲賦一
  hash: sha256:c27d90341d5a694c1c67448f3d26d810ef0e704b8cb12af88e62c57b8bf65804
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_065-1a, image: WYG0660/WYG0660-0767a.png}
body:
  text: 臣等謹按通免天下田賦史不數覯自漢文帝下詔勸農始見舉行然僅賜租稅之半厥施未溥唐以後間有擇地量蠲計分遞免之事要亦不過偏隅之恵及半之施已耳從未有如我國家履綏全盛制用阜財而猶叠沛皇仁正供普免至於四次之多者前此嵗丙寅庚寅丁酉荷闓諭者凡三已極敷施之渥至因時因事截漕發粟展賑除逋數已百二十萬萬兹際八袠昌辰錫福元正復通免天下錢糧二千七百七十萬兩有奇輪免三年而徧猗歟溥哉臣等仰惟皇上富増五福之崇祿備四得之應而乾惕之慮著於聖訓者恒謂天子安得有已財至於民皆蔵富而天益示其無私嵗本占穰而皇惟重夫行慶聖仁博濟上軼姚溈豈特漢唐捐租賜復之詔為無足稱耶若夫減租及於業佃納秸貸於邉屯寛海濱沙地之額徴停畨社苗人之供粟凡此非常之鉅澤曲逮靡遺宜乎隂陽協和雨風應候豐膏之所被胥天下而飫仁化樂夀愷之彌殷也乎乾隆五十五年正月初一日皇上以慶開八袠特頒普免天下錢糧之諭統計各直省額徴款項二千七百七十萬兩有奇全行蠲免三年一週用溥錫羨延禧之至意御製乾隆五十五年八十夀辰普免天下錢糧諭朕頼昊蒼眷佑既逾古稀欣開八袠幸得小康時懐大惕自乾隆十年以迄四十二年特布恩綸普免天下錢糧業經三次矣今嵗屆朕八旬夀辰仰荷天祖貽庥率土稱慶以至梯航重譯祝嘏来庭從古史牒實所罕覩是宜廣宣湛闓敷錫兆民用叶崇禧以答嘉貺著将乾隆五十五年各直省應徴錢糧通行蠲免其如何按年輪蠲之處著大學士㑹同户部即速核奏遵行大學士公臣阿桂等謹奏為欽奉上諭事本年元旦内閣奉上諭著将乾隆五十五年各直省應徴錢糧通行蠲免其如何按年輪蠲之處著大學士㑹同户部即速核奏遵行欽此欽遵臣等恭讀恩綸仰見我皇上福錫無疆化成乆道查乾隆十年二十五年四十二年共普蠲過天下錢糧三次深仁厚澤萬姓均沾兹復仰荷聖徳以八旬萬夀之昌期際五世一堂之盛㑹曠古希聞敷天共慶蠲租賦而益阜盖蔵念民依而彌臻康樂始和布令特沛殊恩命将五十五年各直省應徵錢糧通行蠲免鴻施稠叠聖徳彌綸此誠茅簷蔀屋屢沐恩膏千古罕覯之盛典也臣等謹查乾隆十年乾隆三十五年乾隆四十二年普免天下錢糧除蘆課漕項例不蠲免外其地丁錢糧額徴銀共二千七百七十萬一千餘兩向係按照各省地丁數目均匀搭配分作三年輪免但查分年輪免各直省邀恩年分有越至一二年之後者究於聖徳鴻慈一時未能溥徧且各省錢糧多寡不齊而需用經費各有定制在有餘省分輪免之年自可無藉協撥其地丁較少之省向值輪免之年所需經費或全數協撥或撥觧數成必湏另款籌酌轉滋繁擾臣等公同酌議擬将現在蠲免錢糧於五十六年為始按照各直省實在額徴銀數将所属之各府直𨽻州次第均匀搭配分作三次按年輪免毎年應免三分之一仍按上三屆普免之例通計三年一律蠲免仍令各該督撫府尹查明該年應免府州先儘五十四年之灾緩各府州作為首次蠲免分别先後銀數造冊按年具題是一年之内各直省均得仰沐鴻慈在小民亦易於周知而於普沾渥澤之中更少展轉撥觧之繁似較按省輪免尤為允協至應徴地丁錢糧内随徴耗銀一項係充地方一切公用並非觧部之款節次普免案内定議照例輸納此次亦應照舊徴收留充地方公用其有向年緩徴帶徴之項應於各該年徴收者不便以正項既蠲再行展限轉致下年新舊並徴應請遇有緩徴帶徴錢糧省分仍於蠲免之年照例徴收所有各省嵗需經費銀兩或有不敷户部臨時籌酌辦理伏候命下行文各該督撫府尹按照户部指示情節先行出示曉諭並即悉心核議具題到部俟部覆到日再行遵照辦理務使編氓均沾實恵為此謹奏奉㫖依議此次普免錢糧按照各直省額徴銀數将所属各府州次第搭配分作三次按年輪免通計三年一律蠲完較之按省分年輪免各省年分先後不同者似更覺恩施早被逺近齊沾至一省之中應免府州當先儘五十四年灾緩之區首先蠲免於灾黎更有裨益該督撫務湏悉心籌畫妥為分别辦理並督飭所属實力奉行務使編氓均沾渥澤毋令吏胥從中影射侵漁稍滋弊混以副朕行慶施恵敷錫兆民之至意仍令各督撫自行具奏是月初八日詔直省地方官示諭紳衿富户量減佃民地租内閣奉上諭今嵗朕屆八旬夀辰敷錫兆民普天臚慶特降恩㫖将乾隆五十五年各直省應徴錢糧通行蠲免農民等皆可均沾恵澤因思紳衿富户田産較多之家皆有佃户領種地畆按嵗交租今業主概免徴輸而佃户仍全交租息貧民未免向隅應令地方官出示曉諭各就業主情愿令其推朕愛民之心自行酌量将佃户應交地租量予減收亦不必定以限制官為勉强抑勒務使力作小民共享盈寧之樂以副朕孚恵閭閻廣宣湛闓至意二月二十九日詔免浙江省玉環㕔額徴租榖海寧州沙地租銀内閣奉上諭本年朕八旬萬夀業經特降諭㫖将天下錢糧普行蠲免浙江省温州府所属玉環㕔額徴租榖及杭州府所属海寧州沙地租銀本不在應免之例第念此項銀榖按畆輸将實與地丁無異若照舊徴收小民未免向隅著加恩将玉環㕔租榖二萬二千餘石海寧州沙地租銀二千八百餘兩一體蠲免俾瀕海黎民均沾實恵該部即遵諭行三月十二日詔免甘肅省臨邉各屬畨糧草束並免河東河西屯糧草束十分之三内閣奉上諭本年朕八旬夀辰業經降㫖将各直省地丁錢糧普行蠲免甘肅省臨邉各属應徴畨糧草束及河東河西各属應徵屯糧本不在蠲免之例第念該省所徴糧草較多著照舊徴收小民未免向偶著加恩将臨邉各属畨糧草束一體蠲免其河東河西屯糧草束亦著照上次之例蠲免十分之三俾邉省民畨共沾渥澤該部即遵諭行三月十四日詔免福建臺灣畨黎應徵供粟並免官荘租息銀兩十分之三内閣奉上諭本年朕八旬夀辰業經降㫖将直省地丁錢糧普行蠲免臺灣府属有應徴供粟及官荘租息銀兩本不在蠲免之例第念該省各府州縣錢糧俱已全行蠲免臺灣瀕臨海外若不獲一體邀恩畨黎等未免向隅著加恩将臺灣府属一㕔四縣應徴供粟按照内地之例分作三年輪免其官荘租息銀兩亦著蠲免十分之三以示加恵海疆至意該部即遵諭行三月二十日詔免烏嚕木齊額徴地糧三分之一内閣奉上諭本年朕八旬夀辰業經降㫖将各直省地丁錢糧普行蠲免烏嚕木齊各州縣毎年額徴地糧本不在蠲免之例第念内地錢糧俱已全行蠲免該處若不獲一體邀恩邉氓未免向隅著加恩将烏嚕木齊所属各州縣户民額徴地糧七萬餘石豁免三分之一以示加恵邉黎至意該部即遵諭行四月二十九日詔免山西省太原等屬并口外各㕔應徴本色米折銀兩十分之三又大同等府應徴本色糧石和林格爾等處牧厰地租各款全行蠲免内閣奉上諭山西省太原遼州等十六府州并歸化城應徴本色及清水河等㕔並太僕寺牧厰地畆應徴折色銀兩著仍照上届之例加恩蠲免十分之三其應徴本色之大同朔平二府及和林格爾等處新墾地畆應輸折色並荘頭退出招種地租銀兩又豐寧二㕔地畆折色租銀亦照上届加恩一體蠲免以示朕普恵羣黎有加無已至意該部即遵諭行六月初九日詔免湖南省乾州等㕔縣額徴苖民雜糧内閣奉上諭湖南乾州鳯凰永綏三㕔并城步綏寧二縣毎年額徴苗民雜糧八百六十一石九斗三升著仍照上届之例加恩一律蠲免随同地丁分年輪豁所有應徴兵糧等項亦著照上届蠲免苖糧之年另行動款撥支以示朕普恵邉黎有加無已至意該部即遵諭行七月初六日詔免陜西省應徴本色及學租各款額糧内閣奉上諭本年朕八旬夀辰業經降㫖普免天下錢糧令各省按照各府州分年輪蠲陜西省正項錢糧既經輪免所有各㕔州縣尚有應徴本色起存並學租共糧二十萬五百一十五石草一萬五千六百三十五束棉花四十九斤零著仍照上届之例加恩一律蠲免以示朕普恵邉黎敷錫延禧至意該部即遵諭行十一月三十日户部具題恩蠲直省錢糧實數户部謹題為各省分年輪免錢糧事該臣等查得本年元旦欽奉恩㫖普免各直省應徴錢糧當經大學士公阿桂等㑹同臣部議奏奉㫖依議欽此欽遵辦理在案並節經臣部行令各該省造冊題報今據該督撫等陸續題奏到部臣等逐加查核統計各直省共額徴地丁等項實應蠲銀二千七百七十萬一千餘兩臣部通行各督撫等一體遵辦謹将奉天等省分年輪免錢糧數目一併開列恭呈御覽奉天省額徴地丁等銀三萬六千五百一十九兩乾隆五十六年輪免岫巖等一㕔四州縣額徴銀一萬一千九百四十三兩零五十七年輪免寧逺等四州縣額徴銀一萬二千三百六十六兩零五十八年輪免遼陽等四州縣額徴銀一萬二千二百一十兩零安徽省額徴地丁等銀一百五十七萬五千九百六十六兩零乾隆五十六年輪免鳯陽等四府州属額徴銀五十二萬八千六百九十九兩零五十七年輪免安慶等五府州属額徴銀五十二萬五千三百五十五兩零五十八年輪免徽州等四府州属額徴銀五十二萬一千九百一十二兩零江西省額徴地丁等銀一百八十萬四千六百五十二兩零乾隆五十六年輪免南昌等五府州属額徴銀六十萬二百二十五兩零五十七年輪免瑞州等四府属額徴銀六十萬四千六百四十兩零五十八年輪免撫州等五府属額徴銀五十九萬九千七百八十七兩零浙江省額徴地丁等項銀二百四十五萬七千一百七兩零乾隆五十六年輪免杭州等三府属額徴銀八十萬六千五百四十四兩零五十七年輪免紹興等三府属額徴銀八十三萬四千二百二兩零五十八年輪免寧波等五府属額徴銀八十一萬六千三百六十兩零湖北省額徴地丁等銀一百九萬三百二十四兩零乾隆五十六年輪免漢川等一十六州縣衛額徴銀三十五萬七千九百四十四兩零五十七年輪免江夏等十五州縣額徴銀三十五萬八千一百六十一兩零五十八年輪免嘉魚等四十七州縣衛額徴銀三十七萬四千二百一十八兩零湖南省額徴地丁等銀一百一十三萬八千六百六兩零乾隆五十六年輪免岳州等六府州属額徴銀三十七萬四千九十五兩零五十七年輪免衡州等四府属額徴銀三十七萬四千七百六十兩零五十八年輪免長沙等三府州属額徴銀三十八萬九千七百四十九兩零河南省額徴地丁等銀三百萬一千零一兩乾隆五十六年輪免歸徳等四府属額徴銀一百一十九萬五千九百四十六兩零五十七年輪免開封等四府州属額徴銀九十三萬二千六百六十兩零五十八年輪免河南等五府州属額徴銀八十七萬二千三百九十五兩零山西省額徴地丁等銀二百九十七萬六千三百二十四兩零乾隆五十六年輪免大同等八府州属額徴銀九十九萬四千二百七十五兩零五十七年輪免太原等六府州属額徴銀九十八萬三千四百二兩零五十八年輪免平陽等五府州属額徴銀九十九萬八千六百四十六兩零又太原等府州并口外各㕔清水河豐鎮額徴本色米折等項欽奉恩㫖蠲免十分之三大同朔平二府額徴本色糧石和林格爾清水河朔平府豐鎮寧逺等處額徴牧厰地租清水河㕔額徴草折等銀欽奉恩㫖全行蠲免共本色糧六萬三千三百八十六石零米折地租等銀四萬一千三百五十九兩零乾隆五十六年輪免大同等八府属并口外各㕔三分本色糧四萬六千七百六十一石零清水河㕔三分米折銀五