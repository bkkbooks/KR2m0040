front:
  text: 欽定四庫全書八旬萬夀盛典卷二十二聖功五附載平定臺彎
  hash: sha256:fa9e9f580d60d6941e7a13b8da80c309c5d2e79ce16422be049b9c365e5b526c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_022-1a, image: WYG0660/WYG0660-0255a.png}
body:
  text: 臣等欽惟我皇上􅅥乾慎事恒以圖度先㡬展大勲而耆神武竊仰窺聖念所勤重審夫周易繫𫝊所云知微知彰知柔知剛之義平日用之以宅心莅政而更謹持於用兵之時葢由羲畫軒韜理通一貫而皇上基以介石之誠應以不終日貞吉之速豫順以動天地如之其於行師尤著也臣等恭誌聖功以平定臺灣附載盛典良以勒功之製炳燿奎文紀事之編燦陳方畧天下臣民已無不共仰宸謨而惟是近八旬之天子蕆八事之武成誠有如御製記所謂勵敬勤以永年者鬯國威而昭帝祉其本端由於此夫以臺灣距海一隅受國家百餘年愛育漸摩之澤允宜安兹樂土同我太平乃以莠稂間雜致勞我皇上垂念重瀛籌㡬午夜一舉而蕩平之其為生民寧謐之慶悉徴上天助順之符葢至山莊凱席快睹㨗勲島社畨丁頻隨班舞萬年之祝胥海隅日出而交忭焉従來書戰績者有如是之煒煌懿茂者哉乾隆五十二年六月㫖召陜甘總督臣福康安至熱河行在親授方畧八月命福康安為將軍領侍衛内大臣海蘭察為叅贊統兵勦捕臺灣逆匪五十三年正月擒賊首林爽文觧京誅之乾隆五十二年八月初二日奉上諭茲特命福康安前來行在面授機宜令其攜帶欽差闗防馳赴臺灣更換常青督辦軍務即授福康安為将軍並授海蘭察為叅賛大臣普爾普舒亮為領隊大臣並㨂派曾經戰陣之巴圖魯侍衛章京一百餘人分起前往領兵征剿至臺灣初次調撥及續調官兵已有數萬嗣又於廣東浙江添調緑營及駐防兵萬餘名並於福建本省派撥兵六千現又添派四川屯練降畨并扵湖北湖南貴州等省挑備兵數萬陸續遄程前往合計徴調各兵不下十餘萬福康安到臺灣後察㸔情形如以兵力多多益善冄行添兵若干即一靣檄調一靣奏聞所有應用軍需已扵浙江江南江西湖廣四川等省撥運米百餘萬石軍餉火藥等項亦已廣為儲備著李侍堯通盤核算妥為經理御製勦滅臺灣逆賊生擒林爽文紀事語戊申平伊犁定回部收金川是三事皆闗大政各有専文勒太學誅王倫翦蘇四十三洗田五是三事雖屬武功然以内地懷慙弗薌其説至扵今之勦滅臺灣逆賊生擒林爽文則有不得不詳紀顛末以示後人者向之三予惟深感天恩蒙厚貺次之三予實資衆臣之力得有所成若兹臺灣逆賊之煽亂乃卒然而起兵出於不得已而又不料其成功若是之易也葢自康熙二十二年平定臺灣之後厯雍正迨今乾隆戊申百餘年之間率鮮卅嵗寧静無事而其甚者惟朱一貴及兹林爽文朱一貴已據府城僣年號林爽文雖未據府城然亦僣年號矣朱一貴雖據府城藍廷珍率兵七日復之不一年遂平定全郡林爽文雖未據府城亦将一年始獲首渠平定全郡則以領兵之人有賢否之殊故曰事在人為不可不慎也林爽文始事之際一總兵率千餘兵滅之而有餘及其蔓延猖獗全郡騷動不得不發勁兵命重臣則予遅速論所云未能速而失于遅予之過也然而果遅乎則何以成功葢遅在任事之外臣而速在籌策之予心故始雖遅而終能成以速非誇言也葢紀其實而已若黄仕簡任承恩初遅矣而予于去年正月即命李侍堯速往代常青為總督辦軍儲常青往代黄仕簡藍元枚往代任承恩司𠞰賊之事而郡城與仕簡弗至失于賊手是幸也是未遅也黄仕簡任承恩既至臺灣南北互相觀望兩月餘遂至與賊以暇日以滋蔓幸予于正月初旬值李侍堯入覲即命往代常青為總督而命常青代黄仕簡又隨命藍元枚代任承恩是以郝北猷于三月初八日自鳯山棄城敗歸立即置之于法常青適扵初九日到郡屢挫賊鋒郡城得以無失使常青不即到則郡城必失守仕簡或被賊獲皆未可知是始雖遅而實未為遅也既而常青祗能守郡城藍元枚忽以病亡是又遅矣而天啟予𠂻于六月即自甘省召福康安來熱河授之方畧八月初即命福康安海蘭察率巴圖魯及各省精兵近萬往救諸羅是又未遅也常青雖固守郡城未能統大兵往救諸羅藍元枝正籌㑹剿旋以病亡又幸予于六月内早令福康安来覲熱河即命于八月初二日同海蘭察率巴魯侍衛章京百餘人馳赴閩省並預調川湖黔粤精兵近萬人分路赴閩維時諸羅被圍日乆糧餉火藥道梗不能運送若非事是天啓予早命重臣統勁旅前往㡬至緩不濟常青等救諸羅雖遅而予所辦亦未為遅也福康安等至大擔門開舟阻風風畧定而啟行又風􅃒至崇武澳不能進是又遅矣然而候風之際後調之兵畢至風平浪靜一日千里齊至鹿仔港是仍未遅也福康安到厦門于十月十一日自大擔門開船被風打回十四日得風駛行半日又以風轉遮至崇武澳停泊似覺遅滯然當此候風之際四川屯練二千廣西兵三千俱至而風亦適利遂于二十八日申時放洋至二十九日兵船齊抵鹿仔港千里洋面一帆直逹其餘之兵亦陸續配渡福康安率此生力之兵旬日内頓解諸羅之圍繼克賊巢生擒逆首是未渡以前若遅而計其成功又未可謂遅也夫遅之在人而天地神明䕶佑每以遅而成速視若危而獲安有如昔年開惑論所云者予何修而得此于天地神明之錫祉哉如是而不益深敬畏勤政愛民明慎用兵則予為無良心者矣予何敢抑又何忍乎夫用兵豈易言哉必也凛天命屏已私見先㡬懷永圖方寸之間日日如在三軍前而又戒掣肘念衆勞且予老矣而精神尚健不肻圖逸以遺難于子孫臣庻藉以展成大勲此非天地神明之佑乎亦豈非弗失良心得䝉天鑒乎福康安等解圍殱賊以及生擒賊渠諸功績見聫句之詩之序兹不贅言獨申予之不得不用武又深懼用武之意如是以戒後世占騐家以正月朔旦值剝蝕為兵戈之象逺者固莫考自漢至明屢逢其事然亦有騐有弗騐元旦日食自漢迄明有四十七其本係政治廢弛及僣竊偽朝無論矣如唐之太宗宣宗元旦日食其年俱寧静無事至宋仁宗四十餘年之中元旦日食者四最後嘉祐四年亦無事此其弗騐者也惟寳元元年元昊反康定元年元昊㓂延州皇祐元年廣源州蠻儂智髙㓂邕州又元代世祖至元二十九年元旦日食是年廣西上思州土官黄聖許結交趾為援㓂䧟忠州江州及華陽諸縣此其有騐者也若昨丙午可謂有騐矣以予論之千嵗日至可坐而致剝蝕亦可笇而定也既定矣其適逢與不逢原在依稀戃怳之間且亦乏計預使必無也若使之無是為詐也不惟不能避災或且召灾故史載宋仁宗朝第二次康定元年正月朔當日食司天楊惟徳請移閏于庚辰嵗則日食在正月之晦帝曰閏所以正天時而授民事其可曲避乎夫日食必當在朔可知古稱月晦日食者見移閏曲避之説耳至于不得已而用兵惟在見㡬而作先事以圖遅不失于㡬先速不失于不逹惟敬與明秉公無私信賞必罰用兵之道其庶㡬乎夫行此數端甚不易矣知不易而慎用兵又其本乎凡軍旅事必當有方畧之書書成即以此語冠篇首亦不更為之序矣御製福康安奏大勦諸賊開通諸羅並進攻斗六門賊勢潰㪚信至詩以誌慰因改賜諸羅縣名為嘉義合縣士民守城之忠實堪彰善也丁未笨港雖攻取諸羅仍艱進前據李侍堯奏據臺灣府知府楊廷理稟報蔡攀龍等于八月中旬将諸羅道路打通之信不意竟屬傳訛嗣據普吉保奏九月十三日收復笨港與恒瑞訂期前進旋以後路無繼不敢輕離為辭不知救兵如救火豈可少緩湏􅁷乃柴大紀忍餓待援而普吉保等懦怯無能仍未能直抵諸羅殺賊解圍幸早續發兵重臣威名震勇將選以百新兵强夙振度海雖遅日以遅翻成迅幸予燭于㡬先于八月即令福康安海蘭察等帶同巴圖魯等百餘人前往又調四川屯練及貴州廣西湖南等省精鋭之兵趨行前進福康安于十月十一日自大擔門開船被風打回十四日得風駛行半日風色又轉復在崇武澳停泊候風似覺稽滯然當此候風之際四川屯練兵二千及廣西兵三千先後到彼風色轉順遂于二十八日申刻放洋至二十九日申刻所有兵船齊抵鹿仔港千里洋靣一帆即逹為従来渡海罕有之事此實仰頼上天賜恵海神靈佑而福康安帯此新兵乗鋭長驅即舊存兵丁及義民等亦有所倚恃踴躍爭先是渡海雖遅而事機轉為迅速也齊力遂翦瀛一日風資順進由鹿汓港三朝倐臨陣大克倫仔頂一當百以奮蔗田及草寮蹂躪率稱盡叶即解諸羅圍資賊糧胥運兹據福康安奏十一月初六日凡遇賊荘即行勦冼初八日黎明行抵崙仔頂賊匪多人潜伏竹園施放鎗砲一齊擁出官兵屹立不動衝入賊中所向披靡及崙仔尾等各荘賊匪前来抗拒福康安預令扼其左右要路並焚所竹園蔗田及各處草寮繼至牛椆山地方賊匪阻溪自固屯劄山梁待官兵将至四靣圍裹不下萬餘海蘭察等直越溪河衝過賊陣剿殺無算官兵無不以一當百於是賊匪紛紛迯竄福康安等即扵酉刻入城城中義民爭先出迎歡聲動地福康安入城慰諭並將賊荘所存糧石令民人儘數搬運米價頓減數倍民情無不歡慶勞軍及義民歡呼逭饑饉全活數萬命旌功恩不吝彰善樹風聲嘉義名新晉諸羅被圍日久饑困情形深堪憫惻福康安海蘭察等不俟貴州湖廣之兵到齊即先彭勇罙入立解重圍城中數萬生靈藉以全活因改賜諸羅縣名為嘉義以旌士民此皆由調度有方振作士氣用能克敵致勝自應厚加寵錫福康安海蘭察俱即晉封公爵各賞紅寳石帽頂四團龍補褂以示優異其鄂輝舒亮普爾普等及巴圖魯侍衛章京與在事出力之将弁等并令查明部従優議叙至此次大功痛勦賊人膽落已成破竹之勢福康安等隨即籌至斗六門一帶擒獲首逆林爽文等迅奏㨗書慰予盻望不難指日以俟耳籌攻斗六門破竹應解刃佇勦大里􅍻賊首生擒訊指日以俟之速逓大㨗信御製福康安奏報攻克斗六門詩以誌事丁未斗六門攻克今朝至㨗音遅聞因海上兹據福康安奏十一月廿一日與海蘭察等分據大埔林中林大埔尾三荘沿途殺賊六七百名鎗斃騎馬賊目十餘人将器械馬匹全行奪獲直攻開斗六門即日已進捣賊巢惟其摺遅至月餘始到是此時擒獲賊匪佳音想亦在途縂以海上風信不常不能速至也别信逼山隂又據李侍堯奏探聞官兵已攻破大里􅍻賊匪迯入内山生畨等稟稱願将林爽文擒獲獻出等語百戰雄皆勝諸臣嘉不禁福康安海蘭察鄂輝恒瑞普吉保袁國璜等此次奪據賊卡奮勇勦殺百戰皆勝甚屬可嘉已先行交部議叙至普爾普打通府城道路及分外出力之侍衛章京並鎮将官弁等除賞給巴圖魯名號及陛等賞翎各員外凡在事出力之員弁令一併查明咨部議叙所有打仗出力之兵丁亦令酌量分别賞給錢糧以示嘉奨東南望翹企實報首兇擒御製福康安奏報攻克大里􅍻賊巢詩以誌事丁未斗六門既取直前抵賊巢躍溪飛馬渡掃穴短兵交福康安等奏官兵于十一月廿一日攻克斗六門之後次日即檄調埔心二林舊存之兵移駐水沙連山口隨向大里杙進發因大里杙東倚大山南繞溪河水勢甚深福康安等馳馬先渡賊匪乘官兵尚未到齊自城内擁出萬餘人三面圍裹捨命前撲巴圗魯等鎗箭如雨四川屯練及廣東廣西兵丁亦即争先涉水攬殺一處斃賊甚多天色昏暮于溪邉整齊行隊以待移時果有賊匪潜來攻擾官兵屹立不動鎗砲大震賊匪旋即敗走逾刻又沿溪来撲如此往返五六次至丑刻攻擾愈力隨用短兵相接殺死賊目賊匪數百計自日暮至次日黎明官兵力戰一夜痛殱賊衆無算實屬可嘉背壘犯雄陣乘宵揮遁鞘廿五日夘刻福康安派兵一面與賊接陣一靣率同巴圗魯侍衛等分路攻入賊巢殺賊目十餘名賊衆二百餘名生擒賊目劉懐清林茂嚴訊林爽文下落據供林爽文見官兵壮盛不能抵敵遂于夜間帶同春屬遁入大山隨即分派官兵入山捜捕並諭令畨社一體擒拏是此時林爽文亦不過茍延殘喘㫁不至􅉟誅漏網惟盻望擒獲逆首日内信至甚為懸切耳渠魁猶待獲盼切㨗旌捎御製福康安等奏攻勦小半天山賊匪並圍截賊首情形詩以誌事戊申曉接軍營報攻平小半天前稱獲眷屬前據福康安等奏稱林爽文父母家屬逃匿水裏畨社俱已按名拿獲今復走兇奸今日奏至攻小半天山得勝又據生畨頭目等僉稱林爽文迯往埔裡社埔尾一帶現在恊力擒捕等語與暇近旬日聚羣至二千福康安于十一月廿五日攻克大里杙後即應乗官兵鋭氣迅即追捕使賊無駐足之暇無難速擒逆首乃遅至旬日使賊匪得扵集集埔聚衆固守迨十二月初五日攻克集集埔後又遅至旬餘賊匪復得于小半天山聚集據險固守尚有二千餘人何啻與賊以暇耶層層涉持重屢屢戒遅延將士真宣力領軍可謝愆據奏林爽文餘匪在扵小半天山頂拏立末柵柵内壘石作墻又将道旁大樹砍倒横塞道路官兵踴躍用命蟻附而上打死賊匪百餘人賊始竄回柵内投石放鎗抵死抗拒普爾普率先領屯練兵丁攀倒木柵賊匪登時潰敗各兵盡力追殺鎗斃賊目十餘人生擒賊目五人殺賊二百餘人将士官兵屢次奮勇攻堅實屬可嘉使福康安前次乗勝迅追餘黨豈能復聚為列柵固壘之計而逆首當早就擒官兵又何用如此涉險力攻是直領兵者自取勞苦而其咎亦無可辭也並行賞與飭期速奏功全御製福康安摺奏生擒逆首林爽文信至詩以誌事戊申大里灰􅀈破巢穴頻繁馳諭戒逍遥福康安于上年十一月二十五日攻破大里杙賊巢後正云畨社等恊力緝拏未曾奏及速即帶兵乗勝追捕誠恐事機少緩生畨等不知畏懾未必肯上𦂳恊拏是以頻降諭旨深以遅緩為戒撫降輯衆日無暇執訊招畨井有條兹得生擒林爽文捷音奏至據另摺稱該處民人投出者絡繹不絶皆安為撫輯又于所執賊目追究逆首去路及招出各社生畨嚴切曉諭令其協同堵截擒獻又令巴圗魯二十員屯練兵丁數百名改装易服扮作民人同淡水義民及社丁通事等分投捜緝遂于正月初四日在老衢﨑地方将林爽文並賊目何有志等一同擒獲現在捜查餘孽不遺所辦俱井井有條可謂弗孤簡用者矣究得生擒盡羙善不教餘孽伏根苗移師南指如破竹又據奏俟将北路捜查净盡令各兵少為休息即統率大兵肅清南路擒拏賊目荘大田等語賊首就擒先聲奪氣自當勢如破竹想續奏㨗音亦只在早晚間耳待㨗音惟暮與朝二月將軍臣福康安叅賛大臣海蘭察等收復鳯山縣城擒賊目莊大田誅之臺灣平御製福康安奏報生擒荘大田紀事語戊申昨生擒林爽文則勦滅逆賊事可稱蕆大端兹生擒荘大田則肅清臺灣事方稱臻盡善二逆狼狽為奸得一而不得二餘孽尚存慮其萌芽且彼既聞首禍被獲則所以謀自全而倖迯生入山固易追赴海則難捕矣是以先事周防累申飭諭荘大田在南路距南海甚近不慮其入山而慮其入海則追捕甚難因累次降旨令福康安等慎諭防其入海之路思慮所及隨時飭兹福康安盡心畫䇿凡港内可以入海者無不移舟設卡因聞荘大田率同匪衆俱在柴城初二日欲往蚊率社經畨衆極力抵禦復行退回初五日黎明官軍由風港發兵越箐穿林遂有賊匪突出拒敵我兵迎撃海蘭察率領巴圖魯侍衛奮勇齊攻殺賊三百餘生擒一百餘追至柴城賊愈衆多然恐攻撲過急荘大田或臨陣被殺或乗間竄逸轉不能悉數成擒福康安分兵數隊以徐合攻自山梁布陣抵海㟁適烏什哈逹所率水師得順風連墻齊至沿海進圍水陸合剿自辰直至午刻殺賊二千餘羣賊奔潰投水屍浮海如㕍鶩而獨荘大田伏匿山溝以致生擒是豈人力哉天也二逆以么䯢小民敢興大亂殺害生靈無慮數萬使獲一而迯一未為全羙斯皆生致闕下正國法而快人心反側潜消循良樂業福康安海蘭察等謀畫奮勇不負任使固不待言然非天佑我師俾獲萬全豈易致此耶更查康熙六十年四月朱一貴于臺灣起事提督施世驃縂兵藍廷珍于五月由澎湖進兵至六月收復臺灣郡城計閲七日于閏六月始擒獲朱一貴計閲一月餘至雍正元年四月而餘黨悉勦盡自朱一貴起事至臺灣全郡平定始末閲兩年兹林爽文于五十一年十一月起事其黄仕簡等前後誤事經一年福康安等于上年十一月由鹿仔港始進兵其間解諸羅縣之圍克斗六門攻破大里杙賊巢由本年正月獲林爽文計閲四十二日繼獲荘大田計閲三十二日自林爽文起事至臺灣全郡平定始末共閲一年三月是較之藍廷珍等成功更為迅速矣夫逆賊入内山生畨非我臣僕情性不同言語不通其遵我軍令與否未可知也福康安示之以兵威使知畏給之以賞項使知懐其經畫周宻賢于施世驃藍廷珍逺甚又得海察蘭率百巴圗魯攻堅䧟鋭遂得前後生獲二囚且李侍堯悉心董理軍儲無誤行陣使不以李侍堯易常青之縂督則軍儲必誤不以福康安易常青之将軍則成功必遅兹盡善盡羙以成功于三月之間則上天之所以唘佑藐躬俾以望八之年而獲三㨗之速則予所以深感昊慈豈言語之所能形容也自斯以後所願洗兵韜甲與民休息保泰持盈日慎一日以待歸政之年庶不逺矣雖然仔肩未缷必不敢以娱老自怠所為猶日孜孜仍初志耳御製福康安奏報生擒荘大田信至詩以誌喜戊申正殷㨗信盼連朝忽接佳音至自遥鹿耳鯤身防海逸荘大田在鳯山一帶距海甚近初慮該匪情急遁入海内追捕更難得手轉不如林爽文竄至内山者尚覺人力可施也柴城瑯嶠獲山跳此次福康安多方籌辦令巴圗魯等各帯官兵分隊自山梁挨次排下而烏什哈逹所帶水師兵丁適值順風連檣齊至沿海宻佈水陸並進四靣合圍遂将荘大田及有名頭目四十餘名全數擒獲又殺賊二千餘名其餘迯入生畨者被柴城瑯嶠各畨社縛獻三百餘人未及兩月南北二兇悉行俘獲全郡俱已平定實深嘉悦一之為甚竟致再䲭既成擒豈赦鴞永靖瀛瓀揚國武益深兢業昊恩昭八旬萬夀盛典卷二十二
