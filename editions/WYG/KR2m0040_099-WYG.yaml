body:
  text: 欽定四庫全書八旬萬夀盛典卷一百歌頌二十萬夀恭擬連珠三十二首謹序内閣學士臣玉保粤惟太極函三布懿純于夀宇乾元用九昭茂育于貞符累洽重熙照世炳洪暉之耀含淳詠徳垂裳光乆道之謨欽惟我皇上衍緒承庥綏猷建極光昭泰運瑞集昌辰綿寳構于中天閎區曼夀鞏金甌于萬􅑤慶㑹凝禧匝㝢歸仁敷天裒對夏諺普由庚之祝春祺沛令甲之頒聿瞻景度于璿璣聲昭遹駿爰紀嘉祥于金鑒化洽龎鴻欣兹周伯徴符軒紀增八旬之􅄸况復堯階臚頌箕疇備五世之堂臣依景貞圖攄忱夀牒偕歌衢于率土謹攦韻以連珠其詞曰臣聞四時為柄體元同蕩蕩之天三辰昭華負扆厪孜孜之日是以苞符介景並悠乆于兩儀圖䇲延洪協康寧於八袠臣聞位育中和玉燭炳無疆之治春秋温肅瑶樞彰廣運之方是以健法天行瀛宇胥歸怙冐寅孚昊眷淵衷彌凛幾康臣聞承天之祜寳系儲庥率祖攸行璿圖膺祚是以冠裳由舊崇燕翼于英謨騎射宣勤式鴻儀于記注臣聞矩法規圖劼毖周於總宙天臨海鏡孚恵徧於蕃畿是以聼玉漏以披章深宵達匭啟銅扉而􅊩政未旦求衣臣聞安民則恵爰徴四達之庥大徳曰生式􅄎中孚之化是以雨暘時若沛闓澤以如春政事懋哉彰休和扵有夏臣聞天璣甄度柏梁肇始宸章帝範崇謨玉海先編御集是以丹書翠箧經綸髙金鏡之篇嚳詠唐歌巍煥軼雲珠之笈臣聞黼座陳謨三接廣延扵晉晝金華顧問四聰上達夫璇穹是以道原於天銓鑑仰奎文之煥言衷諸聖髙深欽皇道之融臣聞書倉縑素義海文河册府編摹天包地絡是以蘭臺排架侔縣圃以三成芝檢充厨峙神州之七閣臣聞溯雕鏤於長興鈔胥比㨗盛挍刋於端拱剞氏相沿是以槧仿荆溪石室記五經之萃􅈿儲天禄書林廣萬本之傳臣聞蘭亭八柱羅墨妙而星輝瓊笈三希排寳章而錦纂是以寓璇題於石墨綏豐標快雪之堂啟璚箧之琳瑯篆額陋停雲之館臣聞蕭斧衮章筆削䋲乎玊尺芸籖縹帙權衡協以金模是以鳯紀提綱翠牒正編年之統麟書衍緒丹毫垂經世之圖臣聞刻玉逰河風雲翊乎宸駕披圖巡洛衛仗拱以鉤陳是以命倌展儀鷲嶺則閣名領要入疆咨岳龍泉之堂署行春臣聞秋補春原習祥邰室雲瞻日就視典堯亭是以泮水文壇杏参天而布藻臺懐佛域蓮迓蹕以含馨臣聞三亹消息潮起伏於鹽官九曲支流漲渦盤於淮甸是以連排鷹齒海塘鞏屹以梅樁宣洩龍門河軌安趨其竹箭臣聞陶邱利導濟縁伏見而為滎㶚滻分流涇本澄清而别渭是以辨菏汾之分派逺箴桑杜之訛訂孔鄭之㣲言始别淄澠之味臣聞蒲昌之海河乃導其重源桐柏之山淮匪潛于雙井是以槎尋博望崑侖伏鹽澤之流經注道元豐水析胎簮之嶺臣聞天山北界廣徴兀格之言震旦西通重譯支那之義是以龍沙式廓葉爾羗志乃同文象教洪宣土伯忒經曽受記臣聞輯瑞嵞山叙渠搜於禹㑹獻琛蕃國來西旅扵周京是以凖𨽻衞拉布岵圗錫伊緜之號藏通宗喀廓爾喀展歸順之誠臣聞有征無戰如時雨之行師惟㫁乃成儼衝風之振籜是以石􅄘電掃威螗斧以天弧鹿港􅇏銷靖鯨波于海若臣聞驃樂狼歌道通鳥譯鱗趨鳬集状献鴻臚是以逺奉龍函戞里則齋心日域䖍朝鳯闕富良則稽首星樞臣聞編弇山之玉簡版進益疆臚宛委之銀文圖呈括地是以宸居星拱黄輿増度邑之篇亥歩區分赤縣廣元和之志臣聞發言為詩三類諧夫頌器徳音謂樂九韶譜以中聲是以連類含章按譜悉睢麟之意象容表慶升歌皆鸞鳯之音臣聞堯韭禹糧粒食豐于四融白苞丹虋農祥卜以千倉是以再豁漕儀藏富倍九年之積四蠲丁賦屡豐鍚萬寳之穰臣聞韶華虞館左制肇乎環林纉武岐陽獵碣森乎璧沼是以觀文成化三雍拓豐鎬之規釐舊増新十鼓燦星雲之藻臣聞連科錫羡茅茹共㧞扵新恩特奏升名椿算咸成夫茂典是以雲章倬漢作人徴夀考之祥蕊榜引年造士廣春秋之選臣聞歌風解阜撫五辰而庶績咸熙思日賛㐮綜六典而百官以治是以鵷班懋賞署銜榮進夫升階鸞誥馳封鈿軸恩推乎錫類臣聞歌駿發以祈年神猷協契美鴻釐而薦祀令序登豐是以望秩燔柴瓊乎遍懐柔之徳先河後海琳壇報率育之功臣聞龢神舒亹三夀集于福衢齯齒鼚愉千叟翔乎仁路是以歡騰人瑞耄耆祝軒頊之年義闡天言更老訂星辰之誤臣聞鶼林鰈水職方呈土訓之書颿海繩山王㑹集爻閭之幣是以龍光萬國稱觥則樂奏雲門鰲抃千班奉賮則人来月竁臣聞春臺皥皥與物咸熙綿宇誾誾諸福畢至是以承暉光而訢藹義門萃族姓之居洽協氣以遹翔慶牒錫曽元之瑞臣聞三象騰輝升恒頌夫天保九功攸叙荘敬昭其日強是以皇極歛敷螭璽鏤八徴之篆昌辰樂愷鴻圖申五福之堂臣聞乾闓坤懌晏粲皇儀河慶山呼駢蕃夀祉是以三三積黄鐘之數以莫不増五五符大衍之圖自今伊始萬夀恭擬八徴耄念頌九篇二十八章謹序内閣學士臣翁方綱皇帝御極之五十有五年㳟逢八旬萬夀慶辰皇上御製八徴耄念之寳記錫訓敷言推本箕子陳疇之㫖與前此古稀天子之寳猶日孜孜之義五福五代堂之義相為經緯表裏光煒炳煥照耀天地皇哉丕天之大律䆳古以來所未臻已臣謹案尚書正義曰庶衆也徴念也王者用九疇為大中五氣各以時來所以為衆事之騐也蔡沈書傳曰庶徴曰念所以省騐也林之竒尚書解曰五者各以時至無過無不及各得其多寡先後之序盖疇範之精微托本于君徳以皇極為九疇之中而以念徴為九疇之實事也然自古傳注諸家逓相推衍義蕰以為禹傳于箕箕傳于武而己未有躬行實踐親履厥祜親敷厥訓如我皇度越千聖貫疇福之大原者也先是有御製讀洪範著論深切發明兢惕敬誠之㫖盖皇上敬天法祖勤政受民翕受单厚諸福之物可致之祥莫不備至文教之宣武功之暢教養之經綸膏澤之優渥與嵗増多與時増集恩言春煦綏多祜于衆兆民復詔普蠲正供開鄉㑹恩科龎鴻協氣浹于海表逺藩歸仁稽首闕下懽忭之誠四逺市應九寰承流蔀屋夀民年逾期頤暨䔍慶曾元者各以千百計駢叠受祉遶慶霄而騰喜氣皇上猶復兢兢戒慎求寜求莫黜繁文崇寔政宵旰精勤六飛巡涖鏗泗水之鐘琴勒辟廱之籀鼓元音夀牒寳典瑶章貞符叶貫珠躔璧合自有書契以來丹甲秘寳所紀于今徴實矣臣竊嘗綜研諸儒洪範解詁無若朱子之言曰人君履天下之至中有天下之純徳立至極之標凖故必順五行敬五事以修其身厚八政協五紀以齊其政然後至極之標凖卓然有以立乎天下之大中使夫四方輻輳面内而還觀者莫不于是取則焉此葢皇極之所以建五福之所以歛而即庶徴之所以念用也㣲臣伏思聖經疇範攸叙之㫖今于聖人躬行之實事徴之自古諸儒或得窺見其理而不能恭逄其事臣之愚陋得㳟逄聖人而不能闡揚萬分之一臣實慙悚不敢安敬繹範疇之義撰頌九篇仍于每篇之首謹為小序依九疇之次臣謹案箕子陳疇始于一五行我皇上聖徳同天天徳之要念徴之本為疇叙所資始謹撰頌四章欽惟聖皇體天錫極洪鈞一氣萬福是式體信達順各以其職萬福之㑹㑹于至徳一章惟和惟脩彚于六府惟功惟叙五徳斯溥至徳至誠旋宫應吕太和保合承天之祜二章斗為帝車運乎中央節均四序昭被萬方中和位育玉燭道光延釐申之曼夀無疆三章受釐熙載載撫五辰日用飲食錫福庶民至誠之徴健行日新得天乆照萬福長春右頌第一篇四章章八句臣謹按箕疇次二敬用五事以敬為主合于聖人致福之本實為念徴之劵謹撰頌四章聖徳之基聖敬主之聖學之本聖敬聚之聖祜之源聖敬溥之敬用之實惟範疇叙之一章聖敬日躋敬天法祖聖心勤民無逸作所以貫萬事以凝萬祜執兩用中圓規方矩二章惟律惟度至精斯鏡惟物惟則大中斯慶疇範之要基于作聖聖祜之䔍闡于用敬三章九思四勿魯論歸仁千祥萬善聖祜日新道之大原推本于修身福之大本合撰于天人四章右頌第二篇四章章八句臣謹案箕疇次三農用八政孔安國傳曰農厚也馬融注曰農為八政之首故以農名二義葢兼資焉皇上念切民依為念徴之本務謹撰頌三篇帝念阜農康功田功惟醇化時醲惟湛恩時庸黎民時雍教養攸同既聚而豐百司百工備挈于皇衷耕鑿胥從胥叶扵大中萬福攸崇一章帝綏百福帝總百禄三農九榖萬寳時熟黍稷穜稑禾麻麥菽疆遂畛瀆利甿以膏沃帝咨于司牧宅里善俗則民用親睦胥戬榖是䔍二章正供普蠲屢遍于普天帝心浹于農田土宜胥便嵗功聿宣畎涂山川畊讀誦絃里豆庠籩考藝興賢覈實凛其權化工陶甄多祜萬年三章右頌第三篇三章章十二句臣謹案箕疇次四協用五紀孔傳曰協和也蔡傳曰五紀曰協所以合天也皇上念徵煕績協天人之應謹撰頌二章帝念福之徵帝挈紀之成錫極均平以握璣衡四序時行百嘉時榮百度時貞庶績時凝一本于至誠行健元亨品物流行利貞性情六位時乗萬物由庚茀禄茂承經緯升恒一章斗樞珠光挈魁戴筐節度隂陽六飛集祥協時月日之章協律度衡之常熙春澤滂律筩鏘鏘吹布于萬方岱宗蒼蒼大海泱泱洙泗之鄉金絲之堂奎文矞皇慶嵗豐穣胥樂歌夀康二章右頌第四篇二章章十六句臣謹案箕疇次五建用皇極曰皇建其有極念徴之建也曰歛時五福用敷錫厥庶民念徴之錫也曰皇極敷言是彛是訓念徴之訓也敬惟乾坤之容日月之光非語言文字所能繪也謹撰頌一章昔唐虞之治曰執中用中惟聖合揆心法攸同而聖心之精一益仰叶於昊穹惟聖念徴惟天比崇念念疇叙於穆昭融是以立大中之極至觀彛範之㑹通髙明博厚悠乆延洪㑹極保極釐工亮工杓建星拱海滙風從河洛㑹于中五律吕統于黄鍾五行總于大極五福萃於皇躬萬里㑹原萬川朝宗萬福偕來萬國呼嵩右頌第五篇一章二十六句臣謹按箕疇次六乂用三徳傳謂乂以治民也敬惟皇上乂安海宇為念徴之實用謹撰頌二章帝念徴無頗建極中和台垣峩峩萬象包羅剛柔弗過正直弗阿大化漸摩慶民有那瀼瀼恩波祜偹且多奉三同科吹萬載歌一章帝念徴無斁中和錫極納民範式軌物咸則平康正直剛柔弗忒無偏無側規矩䋲尺恵此萬國純嘏千億以釐萬福以乂三徳三章右頌第六篇二章十二句臣謹案箕疇次七明用稽疑曰康強曰逄吉葢聖人心與天通為念徴之實騐謹撰頌二章帝念天之諶心天之心鑒銘規箴顧諟惟欽至誠照臨帝謂聞音接以精忱切民隐之深和氣所歆錫嘏壬林民氣樂湛遍海澨山岑一章帝念天之載致天之瑞豐穣滂沛景福攸介精誠所㑹􅆄蠁如對萬福來㑹與穆清一氣慶祺薈萃醇膏普賚光被周暨環薄海内外右頌第七篇二章章十二句臣謹按箕疇次八念用庶徴傳釋詳矣未有以聖人履天位篤􅂟念徵如我皇上徳福兼備者也謹撰頌五章惟聖念徵惟聖至誠至誠之念與天合并召律調風寒暑雨晴貞恒之驗久道之成以時來叙訢合于昇平一章惟聖念徵惟聖念敬庶徵之念驗于庶政綏猷綏祜单厚保定五代同堂八方同慶曰敬用之實功曰肅乂哲謀聖二章惟聖念徴惟聖念典日月光華乾坤合撰手釐四庫道賅萬卷岐陽籕鼔其光大闡郁郁増新煌煌寳篆三章惟聖念徴惟聖念用以熙庶績以綏萬衆撫字柔懐同文一統捧觴喜氣普天來共長春瑞靄普天合頌四章惟聖念用惟聖念徴煌煌寳篆惟天慶之承奎文作記惟寅惟兢夀牒瑶章霞蔚雲蒸道光蟠際與嵗日月俱增五章右頌第八篇五章章十句臣謹按箕子陳疇摠括於九五福聖天子五福名堂八徴篆寳質之經義心印揆合天作慶符謹撰頌五章聖皇錫福聖皇錫徳五徳之崇五福之則五福堂開多福増益胥于範之錫胥于徳之積是九疇之本是萬福之式一章聖皇錫福聖皇錫政實福之本實政之應五福探原四時為柄一氣環瀛粹精如鏡是攸叙之凖是念用之證二章聖皇錫福聖皇錫訓讀範敷言兢業戒慎惟日孜孜健行益進惟錫訓之式行惟經義之協順惟疇範之㑹歸惟帝徳之廣運三章聖皇錫福聖皇錫瑞科詔蠲詔沛綸沛惠夀民夀世萬祥來備梯山航海環踵拜賜呼嵩之聲盈乎天地四章聖皇錫瑞聖皇錫疇五福之藴隂隲所酬禹以傳箕箕以傳周聖皇兼之敷訓綏猷於萬斯年萬古是遒五章右頌第九篇五章章十句八旬萬夀盛典卷一百
