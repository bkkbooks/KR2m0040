body:
  text: 歌頌七萬夀恭紀五言排律一首用八庚全韻謹序吏部尚書臣彭元瑞運函苞符數合天地上章司籥南吕暢䇶日衍葉於閏桐辰稱觥而得酒三百六羲和所授晝夜平分萬八千蜚仡而前春秋並夀時則蒼靈薦祉柔祗告祥日月會而升恆川嶽納其貞固六甲錫羡二策汁期聖人挈乾瑞坤倪之精積帝夏皇春之算躬履百順慶躋八旬於是嵩效三聲雒呈五福九如探乎岱石三夀朋於魯宫臯賡明良壤諧作息丁中黃白不足為其夥賨渝槃驃不足為其遙然而籥日管天或舉庳而遺迥海驚河灌乍洞目而駴神不聞聖言孰識本殊未受佛諦曷提滿半爾乃杼軸睿思發揮煥章壓百爾之獻詞欽兩篇之製論於溈贊大德堯協重華在宋敘微言伋傳祖述謙三吉三利道下濟而光眀乾六位六龍天健行而保合位祿名夀額為四得之堂嵗月日星鈐以八徴之寶理足而幬載莫能外氣盛則大小無不浮藴抉夫中庸孔演舜所云義注以夏書益贊禹之語蓋惟文有全學武有全功聖有全能神有全運福者德之致為天下君栽者天所培使聖人夀用虔申以五字聿件系以四端伏讀御詩曽吟全韻妙裁特出舊體未聞括百六部聲音文字之囊兹區一部懸四千年古今法戒之鏡更頌萬年譬之鵬運天池餘潤牛涔之滴烏踆羲曜依光螢爝之微立德功言而為三義聞自左全夀富貴之謂福意取諸韓咸本實徴式臚吉語數旋生而隔八嵗襲吉以由庚徒忸蚓鳴彌殷雀躍凡全部百八十有九字都為一章其詞曰軒紀嵗臨庚堯章雲煥卿八徴方篆寶四得昉題楹八月初四日懸四御製四得論並得堂額著論惟崇質敷言必擇精凝承欽昊縡歸善讓宗祊以此髙羣簡因之示八紘聖神文且武位祿夀兼名條貫道原一發端語乃更位祿名夀之由于德中庸之言天人合一歸之眷皇上備德集禔乃讓而著四得論佑而于德弗居髙深元妙之理布帛菽粟之文俯括羣言昭示九有臣竊以位祿名夀總本于文武聖神敬以四端臚舉德如實左觀文天下化典學聖人情書事鴻勳闡薩爾滸之戰書事銘宫駿烈營五乾清宫屏風銘談經超講肆經筵御御述德侈研京京盛賊十月陽春復小春説三元泰運亨開泰説敬明天即理巡説南創守重非輕創業守成難易説建國寧圖韙書司空圖論封建事傳賢愈亦瞪讀昌黎對禹問辨辰陳郝誤三韓訂謬更老佑虔爭三老五更説匏葉通名物讀邶風匏有苦葉章楊梯辨菀榮周易枯楊生梯辨詰誰知雀抵玉玉璞抵鵲説豈有璞包珵卞和獻璞説師利三千界五臺諸寺碑文阿羅五百擎萬夀山五百羅漢堂記闢門訛扇啓五明扇説記里斥車傾記里鼓車説印度何年塞天竺五印度考訛陽關幾處棖陽關考萬流泉趵玉萬泉莊記四面島堆瓊塔山四面記河訂張騫鑿河源簡明語盤尋李願鳴濟源盤谷考證淮疏逺源確淮源記濟指伏流縈濟水考夏僎書箝喙書夏僎尚書詳解費誓篇程頤劄息黥讀程頤經筵劄子雲天氣上下雲上于天解風國議縱橫國風正訛塵異三冬解鹿角解説馬嗤千里程千里馬説躗洵開奧窔讕頓絶譻􅘱五集觚編富千秋雅頌宏元音全韻韻全韻詩造化廣生生四生詩大什彰謨烈避暑山莊百韻詩彛倫敘治平一字至七字五倫詩鐙詞六十四六十四證詞樂府頀韶韺新樂府五十章西極棡旋凱西師詩南陔晳補笙補笙詩六章候時裁吕覽月令七十二候詩飬正付焦評題焦竑養正圗四十詠吟辨劉班録題書詩研箋端歙坑題研詩靈占世旭淑四靈詩瀆列派渟泓四瀆詩響壯巨鐘銑覺生寺大鐘歌調雄剛甲綳剛甲蕃甲蕃劍諸行對音汗冒頓冒類行九字閣邢洺真定興隆寺大佛閣九言詩李泌矜􅶲齓方圓動靜五經詩江淹報嫈嫇擬江淹雜詩六如裝佛貝金剛六如四相四生二事一事詩雜體聚侯鯖擬數詩四聲十二辰建除五雜組諸體旦夕編年舉每年元旦除夕皆有詩以為聲振春端製帖成每立春亦有製帖子三首端午帖子詞柏梁聨請筆惇敘殿千叟宴柏梁體諸王不能詩者恭請御製代吟茶宴韻浮鎗嵗首華重宫聨句每排皆有多御製二聨天藻為桃綻顒甘􅉈梅含盻瑞霙多望上心厪農功每雨望雪之作一聲鉢未歇捷過上賦詩敏於擊鉢而成者見竹詩御製飛爆十疊帙猶嬴疊韻御製詩每至十猶有换韻更賦者周孔情思接羲娥制作晶官經曲分部三禮義疏杜鄭馬增籯讀三通偉略白山峻國方略開祥源黑水瀯滿洲源流論儲從禹鼎儲二金鑑紀狩自虞衡巡盛南典旗籍垣躔宿八旗通志陪都雅柘柳通盛京志垂規圗器服器皇朝禮圗式命德表簮纓職官表宋志蒲昌濫河源紀略桑經武列浤熱河志萬邦摹撙總聰貢圗三合切咿嚶同文韻統户版遙踰汜西域圗志章縫盛志黌國子監志史修續綱目明史明紀綱目鑑輯慎彈抨通鑑御批輯覽畨梵國書統譯國語全藏宫商詩譜訇詩經樂譜全書諡褒風裏徑勝朝殉節諸臣録二别鐵中錚傳國史二臣分甲乙珍萃泥燒畢仿宋畢升活板式為聚珍板室羅孰鏤荆重鐫宋嶽珂荆溪家墊五經本郁乎文治焕朂爾教思并鎮迪膠絃縵安西立學興桓木鐸鍧承德府立學緑槐繁古幹太學古槐重榮黃瓦耀髙甍文廟易蓋黃瓦鐫鼓宣攻馬重排石鼓文頒銅姬尚觪闕里太學俱頒周器耆儒登别籍恩賜老儒舉人進士特榜惠長檠五閛科恩千籥興圜水新建辟雍縹緗勒武英武英殿校刋十三經二十三史判闈和雅曲宴歌定文武兩闈棫朴兔罝詩釐庫貯崇閎四庫全書貯七閣允際光華旦右文還昭赫濯征幕庭産騊駃沙野穴鼯鼪昔也恃其逺幾于敵者勍右甄由北漠前隊出西頃墉隼虗弦墮巢鶹密網紭掄驍騎伍伍斫陳漏丁丁鏖急呀呼促塗窮鋭走趟檄馳魂震脅俘獻鬢披鬇遂竟兩朝緒平伊犂重摩萬里旌于初為默啜其境越丁令威見繫纓越恩忘置禇罃覆翻臣乍虜首尾弟依兄計譎穿山蝟堅慿戴甲蟛樹丸天助順窖米地輸禎二負骸終獻蚩尤首竟棖平回部蓬婆山畔窟滴博嶺邊坪裂眥曾讐敵排頭忽舅甥鄰戕徴糌粑姑惡醜媌娙水曲縫皮渡碉層樹炮轟圍環器洶湧膽落視盯􅟑相救卭肩蟨同羈蜴踵蠑無憂城名傳露布有喜落欃槍平兩金川閩介鯤身絡溟壃鹿耳撑畦諸連町蔗竻竹間棕栟琅嶠邀鏢麂葑田好種蟶土饒或吏墨渡驀矧民儜妄欲封礁線姦俄鼓颶䬝險洋飛帖帖輕帆去聲張去聲翃翃賊屬縻徽纒生畨感祼裎二心賞使讋一足路難􅚢水面多浮鶩﨑腰半染猩永恬銷破獍並捷縶奔麖平臺灣凡厥聲揚迹都由指示呈有熊親教戰光武重興兵遲速皆韜略見擒林御製遲速論生爽文紀事語微彰謝諜偵先機占介石見知堂御製四記逺見洞紋枰騰格麟千趾屯田犢萬牼藩臣雲際雁驛使隴頭鸚宛皂來騏騄闐河羾玼瑛耆功宅密勿右武聖治致彪弸陛引氷壺鑒引大小見文武官員庭趨玉珮琤內外召見臣工糈充在官祿恩給降革留任官俸米塗廣讀書傖老科恩挑舉人代步珂風馬紫禁城內賜騎馬遲朝樹曉鶯老臣恩免早朝年成豐校約直省奏報收成分數嵗計榖權氓户部嵗暮奏民數榖數率土蠲藏阜普免錢糧三次漕糧二次偏隅賑恤惸偏災厚賑截糧停夏鷁截留漕糧裕民食平糶濟春鶊減糶平市價租錫旗裘褐嵗底旗租恩賜八銀城施厰粥羮冬月五城設飯厰偶逋紓舊額蠲積恩欠豫展沛新正每年展賑恩旨齋殿抒虔詠詣齋上每先祭虔言詩宫有齋宫四常雩肇潔盛特考古制始行常雩禮兩圭苴墠土定用兩圭社稷壇有邸百代麗碑牲定王廟歷代帝祀典器改盤陳食祭器舊用碗盤依古改籩豆鉶登諸器宫移簫賣餳定宫調製樂章旌麾簿肅肅定駕大鹵簿鎛特虞吰吰中和韶樂製鎛鐘特磬冠服垂謨守射太宗訓守冠服騎上特命刋碑箭亭符章數典盲定寶國朝傳語見記中紺壇書版禱步禱上親製祝文南郊黑唳陟梯禜黑龍潭禱雨試取詩言志鄉會場改試排律詩燕由抑戒酲歌經筵宴抑詩介僎循禮飲舉行鄉臣飲酒禮庶率躬耕耕藉親田苑閲黃旗閃大南苑閲氷嬉響鐵砰每嵗冬季太液池氷嬉肄武塞筵生駣絆蒙古王公隨圍進宴秋獮角弓觪每秋行圍幸木蘭軍籍差毋占裁虗糧增實額兵辨亷俸足烹增武職飬亷河聲填火氣長河設火器營山影植雲輣杳山置雲俤健鋭營武滿勳階注增定武職品級賞延帶礪盟世襲次滿尉給恩騎限期針闒茸新定案件限期駁案謹敲搒施一上明慎用刑於妄笞杖者亦加駁正示榜稂除畝秋審示榜詳勾草長桁詳見秋讞閫闍馗砥矢修三門石道郛郭堞峥嶸修直省城工册府湔封配近復睿親王爵並諸王舊封號配享天家畀黻珩四品賜宗室頂帶社枌瞻鬱鬱盛四詣京津樹俯泙泙幸天巡津嵩室巖呼蹕幸中巡州臺懷座禮瓔幸五巡臺禹航潮軸撼幸江巡浙舜格岱霄峥幸山巡東發軔須祈榖回鑾及薦櫻盧溝盤贔屭修盧溝橋白淀浴鵁鶄治淀閲河隄鞏河容蟻河工屢經告慶閲治平成塘聫海下蜻海塘閲治增修永固告成除墊湫率育遍孤嬛布治陶無間右聖超神密獨嬴難諶心凛尹如保説敦郕誠感上每言必蒼昊篤念羣黎寅讀尊宬册列祖上每晨恭奉而復如實録敬誦周親郊整仗鍠每嵗詣行三大祀躬禮恩堂翼燕圓明園熱河皆有紀恩堂志授受之隆勤政榜翔鶁每處皆揭勤政殿額硃扎批封摺見批摺御製詩氊廬待達伻京巡幸時於行帳待師奏章恆至夜分籌宵儲士馬問夜測隂晴敬以奭言蔽見讀召御製誥憂將箕範怦見製讀御洪範精勤虞逸伏逸揭御書無殿屏節儉杜奢萌見節儉御製論奎翰揮蠅細有敬上精研八法日灑能蠅宸翰刻勝齊法即今猶能頭小楷天間馭馬獰旬猶上聖夀八御馬按轡證竒三篋漏古籍上考訂無一字蓄疑問多聖學髙深每者發臣等所不知柅奧衆儒瞪論經筵御及辨正經史皆千古儒先所未發畫喻哺雞渲圖御畫雞雛待飼宣示有司弓連中鵠搒射法上髙妙嘗於大西門發矢二十連中十九觀書供枕葄無日御製有一年不觀書之句惡旨絶沈醟不飲上性酒首御製詩數萬無一酒字耳順諸方譯每逺上能通諸國語藩入見不藉舌人傳譯音通一字鏗一字上妙解宮律譜定雅音以一音古法駁正諸家之謬健非資服餌仙弗問蓬瀛恭本得論御製四告瑞奚經意見帛及御製妙應寺吉太常仙蝶詩遊山略駐睛馳驛觀山之語上於遊覽每及之右神臚敶四德至根柢一心誠躍抃情殷雀梯航衆聚虻迢遙橦索境闐殷斗樞城未酌七旬斚祈稱八帙觥天憐羣籲切詔允上儀行鐙柱懸禧帖建寧夀宫鐙柱宫韶鑄吉鐄夀寧宫中和韶樂鎛鐘成璇題五代益見福五御製題五代堂詩繡褒百家絣直省先後奏報得元孫者二百餘家化宇饒耆耉豐年屢稻粳同居卓坊楔集社賽村鉦元旦謄鸞草本年元旦恩詔山莊宴鹿蘋七月十四日宴諸藩生身人於山莊淡泊敬誠殿羣神頒潔帛告祭嶽瀆中祀薦香藑中祀上親行一周免賦農餘穗開科髦育菁旗觀絲竹宅菜釋楷模塋巡甸凌溟渤臨東小嶧巆雕題人讋帶廓爾喀及安南國王阮光平皆請易衣冠僸佅樂搊筝阮光平獻祝嘏曲篠馬萊衣爛藤鳩紺髮鬡甕承霄露白輪佇月華瑩丹綻微芬桂黃濃快熟橙占弧望珠極把斗傍金莖旨召鵷班對顔先燕喜迎初十日得續上召見諸臣於義勤政殿謂宣示四論引伸崇廣無不包羣臣所進嘏詞皆不如兩論為實語并命於九衢屏去綵飾書綸俾廣布繹論又重賡孔孟區差等中庸再發明莫將晶比玊詎謂缶儕罌受祿餐無素求名説總硜伊周各有位回跖若為貞繡綺張衢陌詞章挈茝蘅豈繄心所樂匪我念能攖祖德仔逾重天恩受若驚知艱膺服旦久敬義從嬰獨矢震來福常銘坎不盈嘏詞祛藻飾麗景屏華棚下愛上惟惠言條理則楨人心欣翕翕天語誦喤喤夀列三皇代歡同萬口聲得全規獨創排韻記來清小部頻翻螙長篇敢掣鯨羽儀傍鳷鵲么巢類鷦鵬實事指堪僂蕪文面久頳歌衢先附稚坐井祗慚彭御題彭元瑞詩册羣臣所獻萬夀詩詞自當以彭元瑞此册為巨擘愛其用意巧而不纎行文正而胥實因自首聨讀至末惜其尾聨平仄不諧蓋長律格調所最重也翼日召見元瑞言及之實亦驚惶無措豫當下恍然有悟庚韻一百八十有九字讀至尾聨自當不諧首句因即口占將尾聨上句之庚移為首句用韻去一聨將末句諧平仄即為全璧此實西清佳話不可不紀因命董誥書册後御題軒紀嵗臨庚原作軒紀參輿蓋庚字韻原在末聨上作璇宫生八八吉兆卜庚庚今刪移押首句堯章雲煥卿原作堯章煥景卿歌衢先附稚原作已附歌衢稚坐井祗慚彭原作徒慚坐井彭臣瑞恭撰八庚全韻嘏詞自惟殖薄文蕪凡所排次皆我皇上聖政聖學紀事臚歡匪敢云陳詩抒頌也既塵御覽蒙恩召對親加指示謂長律最重格調須首尾平仄相為鈎貫八庚百八十有九字一字一聨遂致末句與首句不黏雖韻字所限而詩體未嚴應於首句入韻以成偶數格調始轃完善臣恭聆驚服方頓首申謝之頃即承天語裁定移詩末庚字韻於起句以標部首改末聨二句以合黏法於是曠若發蒙犂然至當回思操觚之際注想躊躇無從措手而聖人以一覽而爥之一語而正之匪特灼知抑豫曲成析片語於豪芒含萬響於聲振造化在心經綸在手凡平日用人行政胥凖諸此而詩律之細特出緒餘且以聖夀八旬之年察邇言而敷彛訓逢源左右聲入心通通書所謂誠精故明神應故妙益徴純固之精神舉凡耄耋之年疇能幾及萬一也哉自古人臣以文章受知者若楊徽之之選聫十桞公權之賡一韻即已詫為殊榮傳諸詩話從未有臣下之詩仰邀天章筆削者不材之木沾滴露而向榮在礦之金入洪爐而成器臣以檮昧仰邀誨育有年偶獲一知半解皆由牖迪之恩三生多幸君以作師執經請業正未有艾所為膺服者真服而心悅者真悅也謹重繕一通附識末簡以彰詩教以寫感銘臣彭元瑞拜手稽首敬書恭跋八旬萬夀盛典卷八十七
