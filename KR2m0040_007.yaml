body:
  text: 欽定四庫全書八旬萬夀盛典卷七聖德三孝德臣等謹按聖人之德無以加於孝者詩下武六章推闡孝思丕昭順德而必極之繩武於祖受祜於天乃以致萬年來賀之庥則夫以作求之盛彰篤慶之符理有同原而其量固恢之彌廣者耳洪惟我皇上纘紹鴻圖寅承寶構欽垂裕之久持守成之難繼序不忘於今五十餘紀欣荷祖宗貺佑世茂洽熙衍國祚之洪長駢天家之介祉凡皆本紹聞聰聽之蘉用以創制顯庸勉遹追而申詒燕蓋我皇上克孝之念所為通神明光四海者根乎至性之自然驗諸大德之必得是以夀登八帙嘏錫純常得萬國之歡心而膺長久安寧之嘉福也臣等謹就本年躬謁隆禮以備遡十載中大聖人覲揚之篤與夫迪監之殷自是而日引月長允萬􅑤貽庥而勿替者歟乾隆五十五年皇上以夀登八旬躬謁兩陵乾隆五十五年二月初八日皇上啓蹕恭謁兩陵恩賚諭旨分載巡門本年東御製恭謁孝陵庚戌勝朝運終甲撥反奉天申正建成王位賢資公旦臣我朝定鼎之初親王世祖尚在沖齡維時睿攝政一切開國規模俱資輔理繼繩茲四代撫御願千春祈佑重三奠銘衷永一寅御製恭謁景陵庚戌奉侍才十二春秋逮八旬回思瞬息幻感顧刻心真自審多慚抱那能副誨諄痛深開七慶成鼎在壬寅御製躬謁泰陵庚戌乙卯至今嵗五旬有五年倐開八十帙痛拜鼎湖天揚覲深增愧旰宵朂體乾孜孜待歸政屈指佑希虔御製恭謁泰東陵庚戌承歡􅞀二載不盡十方心忽爾八旬到未邀百嵗臨更無言可道祗有痛增深孰弗長年願可知根亦尋臣等謹按漢唐上陵之儀雖曰禮不可易而非因洽慶以將誠猶循故事云爾我皇上仁孝誠敬之懷惟景羮牆於如在是以前次乾隆四十五年五十一年俱有謁陵述事之篇本年以夀登八旬躬謁兩陵敬籲恩禧而伸瞻慕謹恭載御製詩什以昭不匱之思至四十八年聖駕四蒞陪都展禮珠邱典關巡幸謹分載本門勤德類皇上每嵗親饗太廟暨嵗暮祫祭禮乾隆五十五年聖夀八旬躬舉孟冬時享及祫祭如初御製孟冬時享太廟禮成述事庚戌孟冬朔值立冬辰是日立冬時享欽承年八旬不與祭誠如不祭能躬親籲更能親祖功宗德仰太室日麗風和靄小春復此五周當致政卜符願否倍生寅先是乾隆四十九年孟冬時享御製述事詩有邇常躬祭值冬蒸夾祀恆親奉豆登之句蓋皇上自御極以來時享多躬詣成禮不啻百餘次近年自熱河回蹕率值孟冬親饗惟四十八年駕詣盛京遣代一次至嵗暮祫祭無不躬行五十三年並命皇曽孫入班執事是年御製祫祭禮成詩復有皇祖來孫兹預禮藐豫七世閲親人句溯逮事以慶曽元於斯禮實備見之皇上每嵗瞻拜邸園神御乾隆五十五年聖夀八旬敬謁如禮御製新正雍和宫瞻禮庚戌躍龍真福地奉佛永潛宫此宫為宜賜皇考潛邸雍正年間即稱此名後有人竊稱和親王居之者朕以為皇考舊臨御之殿孰可當且和親王府曾經回祿向若聽浮言賜之則此地不可問矣尚憶初生我忽來八十翁親恩寧有極祖顧感無窮百念一時具難言色即空御製永祐寺瞻禮庚戌敬惟神御奉山莊義起亦惟禮所當詎料凖噶爾回葉爾羌喀什噶爾和闐阿克蘇四大城歸版籍新兼安南緬甸敘瀛疆祖功宗德資憑藉保泰持盈益朂蘉宴賚生身遵舊惠俱在皇祖時凡蒙古生身瞻覲者即不令其入京駐蹕山莊之際宴賚以示惠恤逺人之意在天應喜國威揚右敬録本年御製首春禮雍和宫暨山莊禮永佑寺二什若聖駕在宫瞻拜夀皇殿在圓明園瞻拜安佑宫每嵗多至數次若熱河之溥仁寺率於蒞蹕拈香又乾隆四十五年四十九年兩次南巡俱於西湖之聖因寺恭拜皇祖神御至嵗時奉先殿饗祀申虔罔間本年萬夀祗告慶節前一日舉行謹分載典禮門祭告類皇上命重刻五朝册寶以乾隆四十七年告成尊藏太廟乾隆四十七年七月十六日奉上諭前以太廟尊藏列朝寶册經隨時鐫造玉質顔色不能一律整齊特命英亷福隆安將和闐貢玉慎選良工敬造列朝寶册一分以奉太廟其舊藏之寶册恭送盛京太廟尊藏以昭祖宗功德之成於萬代意深逺也今將列朝寶册敬謹鐫造完成朕維我國家受天庥命列聖相承玉檢金繩虔申對越自朕躬繼序以來仰荷上蒼眷祐中外蒙庥迄今年逾古稀日理萬幾孜孜不倦無日不以敬天勤民為念皆秪承祖宗之彛訓永維餘慶篤念前徽所有此次鐫成寶册本年孟冬時享閲視版祝之日著禮部堂官敬謹安設中和殿俟朕親加閲視後次日于行禮以前先派宗室親王賫捧供奉其舊藏一分寶册於明嵗敬諏吉日簡派皇子恭送盛京太廟尊藏以志文謨武烈顯承佑啓之盛御製重刻五朝册寶尊藏太廟禮成諭壬寅朕承上蒼眷佑列聖垂庥平伊犁定回部闢疆二萬餘里回子伯克盡為臣僕和闐良玉充貢內廷敬維太廟尊藏五朝册寶係隨時鐫造玉色長短未能一律用是選擇精璆特派大臣董率敬造五朝册寶全分以今嵗孟冬時享恭奉入廟舊有册寶送至盛京太室尊藏玉檢金繩虔申對越聿昭我祖宗功德之成於萬祀甚巨典也所有恭造餘存未鐫各分朕親加檢閲其玉色與五朝册寶相符者均編為廟字號嗣後有舉行册寶入廟之事槩用此玉以昭畫一其玉色較白而未能一律者另編為喜字號將來朕歸政後嗣位之皇子崇上尊稱即將此玉成造册寶並嗣後皇孫皇曽孫輩有承事東朝尊崇徽號者皆以此等喜字號玉一體呈用永為定制洪惟我列祖列宗荷天之龍重熙纍洽勤求治理不敢康寧用克上協天心暨於朕躬纘緒承庥撫有方夏弗懈益虔克集大勳版圖式廓迄今年逾古稀猶日孜孜益不敢不敬天益不敢不勤民自新疆底定以來伊犁將軍及駐劄大臣盡皆恪遵功令撫綏安輯仰體朕一視同仁德意新疆萬里無不安居樂土效悃抒忱即有一二滋事之臣如素誠髙朴者皆不旋踵而敗露治罪不動聲色力加整飭俾享安全是以回部伯克納如色提巴爾第鄂斯滿等久在乾清門行走竭誠供役與內地臣民無異其派令採玉者亦皆歡欣踴躍共效子來我子孫繼序繩承敬瞻册寶益當凛天命之難諶知守成之不易聨內外以同心設或稍存怠忽所用非人以致撫馭失宜則和闐珍産未必能源源而至又或意存徵索苛求苦纍則不惟玉不可得而且别啓事端其所關係甚大思艱圖易可不慎乎可不戒乎用是諄切訓諭面命耳提我子孫當以朕此心為心凝承鴻貺篤念前徽永存無疆之恤以保無疆之庥庶無負朕反覆教誡之至意此旨著録三通一存內閣一存尚書房一存內務府其敬承無斁欽哉御製孟冬時享適重刻五廟册寶告成恭奉尊藏敬成長律志事有序壬寅文謨武烈列聖所以觀成玉檢金繩在天于焉對越賁龍章於太室册寶重陳鐫鴻績以和闐球圖式煥精微德産致吉蠲於四十七載以前孝享靈承殷啓迪於億萬斯年而後於時日惟甲子幹枝徵長發之祥祀展孟冬函牒麗方新之象祗膺餘慶言奉陪京庶幾陟降於紹庭思文光配允矣照臨於時夏景命同昭用告升禋虔攄長句五廟重陳册寶虔珍球精刻致和闐方長色質同一律册寶皆隨時敬造玉色長短率未能相符茲賴材一祖功宗德全有回部和闐産玉之區選致良律造成册寶祭不欲數因以孟冬時享恭奉入既展廟徹出舊有册寶即送至盛京太廟尊藏孝思亦申殷鑒謨烈顯承奉大全太室升新值冬孟陪京弆舊溯基先奈何弗監乎二代惟曰欲臻於萬年皇上命編開國方略以乾隆五十一年告成詔命刋布併恭録一分貯敬典閣先是乾隆三十九年皇上敬念祖宗功德熾盛開創艱難所以克承天眷者雖事具實録而尊藏史宬莫由仰覩乃敕館局恭輯開國方略一書以揚孝思而覲光烈越十三年聖夀七旬有七是集告成親製序文刋布並命於頥和殿後之敬典閣専録一分尊藏御製開國方略序丙午粵昔成湯放桀於南巢惟有慙德曰豫恐來世以台為口實斯誠大聖人昭德垂裕萬世之訓而非漫為謙辭也蓋世之治亂猶日月之盈晦四時之周序治極必亂亂極亦必返治此守器者所宜保泰而嬗代循環所由有開創也湯之後為武王其於處桀紂則武已不如湯矣三代以下武之不如其餘又何足屈指數故以開創論之實不如有元之與我大清也夫中國之嬗代莫非其祖宗本其君之臣子也有元興於北漠我大清興於東海與中國無涉雖曽受明之官號耶究不過羈縻名繫而已非如亭長寺僧之本其臣子也况乎戴不共之讐乘自壞之勢我國朝始基居長白山北之俄朵里城號滿洲越數世至肇祖居赫圖阿拉在俄朵里城西一千五百餘里當明境邊徼之外本非屬國傳至景祖顯祖為尼堪外蘭搆釁於明貽害綱廢二祖我弄權太祖以不共戴天之讐又乘明季紀壞閹官之勢乃奮志復讐於天命三年以七大恨告嗣於天遂滸破親統師征明撫順招降守將擊敗全軍薩爾明四路兵率萬衆肇於神武布昭克定遼瀋我此至我太宗雖亦國家億萬載之丕基實躬環甲胄臨陳決戰然既得盛京規模已定較之太祖斯稍易矣撫定中原建基立極以武王于湯有光擬之則實于漢明有光而唐宋在所勿論矣故茲開國方略之著不重於繼明定中原而重於自俄朵里以至赫圖阿拉因十三甲篳路藍縷得盛京而定王業若夫興王之始長白未果蓋猶簡狄元鳥薑嫄履迹天生聖人治四海必有祥符與衆不同而更在於聖人之奮智勇受艱辛有以冠人世答天命夫豈易哉豫小子守祖宗之業每於讀實録觀我太祖開國之始躬干戈冒鋒刃有不忍觀不忍言而落淚者繼思不忍觀不忍言之心為姑息之仁其罪小觀至此而不念祖宗之艱難不勤思政治以祈天永命慎守神器其罪大故令諸臣直書其事以示後世即明臣之紀本朝事迹如黃道周之博物典彚之類不妨節取以證信實然豫此為非啻自勵而已也欲我萬世子孫皆如豫之觀此書之志其勿動心落淚深思永念以敬天命守祖基兢兢業業懼循環治亂之幾則亦非豫之子孫而已矣此開國方略之書所以作也嗚呼可不敬哉可不慎哉臣等欽惟我皇上纘緒維殷當兹西賮充庭亦既敬新册寶昭天瑞而闡祖徽逮夫開國方略書成序述王業之艱難欽識睿懷之兢惕凡子孫臣庶無不共仰鴻規蓋萬世無疆之庥由於萬年有慶之聖乃克集盛而觀成者也乾隆四十八年命皇子分繕四詣盛京恭謁祖陵御製詩什乾隆四十八年七月二十六日奉上諭王迹肇基之地朕御極以來敬惟祖宗開創艱難佑啓萬年統緒於癸亥甲戌戊戌暨今癸卯四詣盛京恭謁祖陵以申積悃所厯川原形勝因見徵聞並為詩以識而於太祖太宗締造鴻規耿光太烈咸恭紀成篇實足以垂法守非僅託為吟咏所有四詣盛京御製詩著皇子等分年按次每人各録一分裝成四卷彚貯一匣以昭覲揚垂裕之至意御製命皇子分繕癸亥甲戌戊戌癸卯四詣盛京恭謁祖陵詩卷即事成什癸卯四度陪京謁祖陵敬思前烈益兢兢易非開創誠辛苦難是守成勵繼繩向嘗為創業守成難易説以岑文本對唐太宗撥亂難守成不易之語為非蓋守成者遺大投艱單心繼序茍無以光前烈啓後圖斯凛然有不終畝之憂是創業者未竟之難皆守成者分內之難不待失道失衆始為慚負前人但使式廓之版圖或有侵削垂裕之成憲或有廢弛即無以覲耿光而揚大烈是非安不忘危存不忘亡鮮有不盛滿中之者以此思難則所以持難者可知故豫獨以難責夫守成者非敢忘創業者之難正以慰創業者之初心耳茲命皇子等分繕四詣盛京謁其説陵詩卷復申以示之此别回瞻增有愴再來度入聲已恐無能厯吟皇子命分繕豫意期知雲與仍臣等謹按是年車駕四詣盛京命皇子隨侍敬瞻弓劍之遺俾咸知創垂之不易且得習觀舊家禮俗用識勿忘意深逺也恭讀御製進山海關詩中有保泰持盈慎守器赤心語告後人聽之句仰見聖人繼述維殷闡鴻徽而詒燕翼􅕍括於此二語故或堯文賡韻或邰室興懷懇摯溢於言表而皆以垂奕葉守成之逺模乃復命皇子分繕癸亥甲戌戊戌及癸卯四次幸盛京詩卷重示以即事之篇臣等循諷再四益欽我皇上至孝純篤錫極萬年宜與玉檢金繩同茲珍襲夫豈徒陟巘降原之雅詠山川風物之盛云爾哉八旬萬夀盛典卷七
