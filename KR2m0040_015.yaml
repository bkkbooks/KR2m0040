body:
  text: 欽定四庫全書八旬萬夀盛典卷十五聖德十一儉德臣等謹案帝王飭德以儉蓋欲以身率先納軌物於大同而非徒示謙讓以延譽也易曰天地節而四時成節以制度又曰損上益下民説旡疆中正之慶道備是焉耳我國家承百餘年熙和之久重以我皇上臨蒞五十餘載之勤法守祖徽敦勵純化從不輕勞一民力輕費一民財是皆由克己無欲之念素切於宸衷用能洽淳龎而登康阜乃猶著文申諭昭示再三謹度支之歲用而明慎體驗於在躬志工作之偶興而敬謹握持其大要以至因時裁省具有常經斥供頓增華之費禁燈綵無益之觀惟恐稍涉鋪張易滋浮靡習尚至矣哉聖人之用心所以杜漸防微誠有見乎其大者若夫臣民恭遇萬夀獻悃介釐固由不可遏之情而率示以不容過之舉所謂禮從其節用戒其盈不事粉飾太平之為而自臻仁夀同風之盛夫孰非慎乃儉德惟懷永圖之一心有以導揚郅治於無窮也乎皇上聖懷崇儉乾隆四十九年敕內府備查節年度支實數著文申訓御製節儉論甲辰嘗讀皇祖實録云明季宫中嵗用七十萬漸次節省至康熙五十年祇用七萬至臣民僭用妄費非不禁約徒致法令滋繁究於無補大哉王言誠得治國平天下之要道矣因令內務府查近年一嵗度支則稱乾隆二十年以七萬計三十年以三萬計四十年以二萬計豫非以此自鳴也蓋修己治人之道無過於節儉節儉則嗜欲不行無聲色貨利之失德所以為善也然天子之節儉與庶人不同矣世道人心日流日下逢君之欲者多引君以道者寡為君者設自鳴其節儉則出納之吝者有之矣量入為出者言之矣弊衣羸馬者形之矣甚而至於興利虐民漢唐宋明之以此而失民心侵尋以至於亡國者皆由是也且升平日久户口日滋物價騰踊勢所必然是以內務府近有加價和買之議即如請行此亦可以節儉而不與之乎嗟夫節儉豈易言哉至於返朴還淳豈非善政然天地所生之物止有此數昔以十人食之今以百千人食之順治初年各省民數一千六十三萬餘口近年增至二萬八千餘萬口是加至二十餘倍之多也米安得不貴米既貴諸物安得不貴遊手好間僧道之流且藉此以糊口設盡驅之力田言之易而行之難安得許多田與之乎均田井田之事設行之今未得其利而先致其亂非至愚泥古者不為也為今之計補偏救弊之不暇實無一勞永逸之法也即近代之崇禎著布袍其時羣頌為美德何救於亡國乎若晉武之焚雉頭裘唐明皇之銷銀器胥為暫博美名其後更窮奢極欲而齊建武之欲毁酒鐺直令蕭頴胄譏其曲宴之奢益為可笑可鄙故吾之所為節儉者亦如吾君子小人論中所云不可不明不可不慎而又不可顯其迹而已耳臣等恭讀御製論仰見我皇上敬承祖訓而得修己治人之要道以推為治國平天下之逺模初未嘗以玉食萬方或稍疏其節制者也伏惟萬年垂鑑即木盂角椅皆欽儉朴之貽是以省約性成守不邇不殖之素兢兢於導民制用而恆不欲以之自鳴至於天子之節儉與庶人不同已於論中備著其義而聖人之恩澤則又不因情崇節儉或稍靳夫施豫者故若每嵗特詔蠲除數絫千萬孚惠勿問惟冀藏富在民以臻還淳返朴之盛風焉臣等幸依夀宇仰德靡涯實有不勝悅服者耳乾隆四十五年聖夀七旬諭禁督撫等請輸經費及呈進貢品五十五年八旬萬夀詔停止如前先是乾隆四十四年十二月二十日奉上諭據國泰奏明年恭遇朕七旬萬夀請在熱河布逹拉廟左近建蓋民房添設鋪面於通省官員扣捐養亷二十八萬兩以備經費一摺甚屬無謂已於摺內批示矣前此國泰奏於沿途添建兩處行宫又於德州建造喇嘛廟已屬繁費但因成事不説是以難於禁止至朕明年七旬萬夀恐各省臣民欲行申祝早經屢降諭旨飭禁甚明何以國泰復有此奏若各省相率效尤尚復成何事體耶國泰著傳旨嚴行申飭乾隆四十五年三月初四日奉上諭前以庚子年為朕七旬萬夀恐內外臣工欲申祝嘏屢經宣諭飭禁此次南巡回鑾後一俟北郊禮成即啓程幸避暑山莊各督撫等斷不必前來稱祝恐外省督撫不能仰體朕懷因七旬萬夀欲取九九之義購備貢品誇多鬭靡甚至力有不逮而隨衆效尤勉為充數尤屬不必各省督撫身任封疆惟當大法小亷奉公勤職副朕委任本不當以進奉見長著再傳諭各督撫今年八月慶辰一切仍照常例若借七旬萬夀為名多事繁文以申媚茲之悃不但為朕所不取且現經降旨令奏事處屆期遇有多進貢物者一概不準接收諸臣其善體朕意毋得藉詞請覲致增煩費翻滋擾瀆將此通諭各督撫知之乾隆五十三年九月二十日奉上諭前據王公大臣及直省將軍督撫大吏等以乾隆五十五年朕八旬萬夀籲請舉行慶典已俞所請其應備儀文典禮恐不免踵事增華致滋繁費因専派大臣董理其事現經阿桂等酌籌經費奏定章程王公大臣及將軍督撫等分别銀數於亷俸內坐扣備辦亦已準行以遂其效誠獻悃之心苐念各督撫等抒忱祝嘏既將五十五年分養亷扣辦其餘剩亷俸尚須留為辦公之用若是年該督撫等仍照每年之例備進萬夀貢物未免稍形竭蹶况所進物件內如寶座屏風各宫殿皆有陳設不便更換即佛像亦屬過多無處供奉亦無另建廟宇之理其五十五年萬夀貢品不但各督撫等俱不準其呈進即王公大臣等亦無庸備進至各該省是年應進土貢內除橘子荔子石花魚哈密瓜等物仍照舊呈進以備薦新之用其餘土物槩行停止以示朕體恤臣工至意乾隆五十三年十一月二十二日奉上諭前因五十五年值朕八旬萬夀經辦理慶典大臣議令各督撫等分别扣養亷備充經費以遂其效誠獻悃之心恐該督撫等既於養亷內酌為分扣若仍備進萬夀貢物未免稍形竭蹶業明降諭旨是年各督撫等俱不必呈進萬夀貢品以示體恤此次辦理慶典原因王公大臣等再三籲懇出於至誠不便固却是以俯俞所請特派大臣經理其事勿任踵事增華致滋糜費各督撫等既分扣養亷以充經費已定抒誠祝嘏又何必另備貢品為此繁文縟節乎各督撫等承受恩眷簡任封圻惟當體朕之心以為心其恪遵諭不但是年即明年概毋庸備進萬夀貢品以仰副朕諄諄訓諭至意若該督撫等自以養亷豐厚所扣經費無幾又兩年不準備物將虔則其所省之養亷不為不少於心有所不安則前此酌議經費內道府以下俱得遞減分扣此等職分較小之員其所得亷俸不及督撫藩臬之優雖所扣無多究恐不無拮據督撫等如果情切祝釐莫若即將伊等兩年備物之費及藩臬多餘養亷為該省官員酌量代扣大員等多扣幾分則職分較小者即可節省幾分自無因此苛派小民之纍而有貪贓壞法亦可以繩之以法該督撫等誠能如此仰體遵辦更勝于另備貢品朕必深為嘉許也將此再行通諭知之臣等謹案豳風所祝小民躋彼酒羔周誥所陳父母慶其洗腆慶逢我皇上萬年晉祝各以亷俸之豐贏願備經費亦臣子區區之分所宜然乃蒙聖慈曲體酌定分數俾弗絀於公事所需復申諭諄嚴勿得侈呈進奉即土物之微亦僅令以瓜果為獻略備薦新因伏思我皇上膺萬國之貢珍本年如外藩列服備物祝釐率命留抵下次正貢內外臣藩仰邀恩施逾格仁愛撙節益不知所藉以上報矣乾隆四十五年御題知過堂著論申訓御製知過論辛丑豫去嵗為古稀説厯數古來粃政之過曰強藩曰外患曰權臣曰外戚曰女謁曰宦寺曰姦臣曰佞幸而幸今都無其事非驕也蓋記其實且以自勵也然則豫遂無過乎曰有為何過曰為興工作蓋豫承國家百年熙和之會且當勝朝二百餘年廢弛之後不可無黻飾壯萬國之觀瞻四十餘年之間次第興舉內若壇廟宫殿京城皇城禁城溝渠河道以及部院衙署莫不為之葺其壞新其舊外若海塘河工城郭堤堰莫不為之修其廢舉其湮是皆有關國政則胥用正帑物給價工給值而弗興徭役加賦稅以病民他若內而西苑南苑暢春園圓明園以及清漪靜明靜宜三園又因預為莬裘之頤而重新寧夀宫别創長春園外而盛京之屬城式築其頽永陵福陵昭陵陪都宫殿胥肯構以輪奐又景陵泰陵往來之行宫以及熱河往來之行宫避署山莊盤山之靜寄山莊更因祝釐而有普陀宗乘之廟延班禪而有須彌福夀之廟以至溥寧普樂安逺諸寺無不因平定凖夷示興黃教以次而建是皆弗用正帑惟以關稅盈餘及內帑節省者物給價工給值更弗興徭役加賦稅以病民夫弗興徭役加賦稅則雖有工作閭閻本不知而物給價工給值貧者且受其利是實我朝之善政家法是以各省偶水旱率興工作有以工代賑之請而內之司園囿工程者且或以其年無工作為若如是則所為興工作者為無過矣而豫引以為過者蓋心有所縈繫必有所疏忽得毋縈繫於小而或有疏忽於大者乎夫小者遊目賞心是也大者敬天勤民是也豫雖不敏實不敢因其小者廢其大是以向偶遊萬夀山諸處率過而弗留尹繼善遂有馳驛觀山之語豫不惟不責且笑而肯之實獲我心也若夫時巡所經各督撫每繕行宫以備駐憩雖云出自捐養亷資商力然爭竒較勝豫不為之喜且飭諭之究其致如此者過應歸于豫謂之無過實自欺也夫不知過其失猶小過而弗改又從而為之辭是文過也其失大既知過矣欲改矣如向所云者繼自今豫惟視其不可已者仍酌行之其介於可已不可已之間者率已之而已耳巳過伯玉知非之年未逮武公作戒之嵗細審實有此過故著論書卷以當自訟乾隆辛丑八月中浣並識於避暑山莊之抑齋御製題知過堂壬寅去年著論曽自訟匪逞虛文敬畏存誰謂庸臣貢漆飾去冬山東巡撫國泰呈進雕漆櫺檻屏扇等物以其費工無益甚不愜懷傳旨嚴行申飭苐念成器不毁又不肯因此添建大屋不得已于慎修思永殿後舊有之雲香清勝室接楹裝用並泐所著知過論於壁遂以名堂云仍因舊室構松軒知非早過伯玉嵗作戒常思衛武言摛藻染亳泐堂壁斯多愧那待他論御製題知過堂癸卯成事由來不説乎何當漆飾貢紗厨既憐棄置成廢物聊與廓營因舊模上年以國泰所進雕漆屏扇等件成器不毁棄置可惜因於舊有之雲香清勝室接楹用詳見前題知過堂詩並注坐傍明忩欣律暖看餘曲砌識韶蘇接楹堂以知過額試曰過曾知也無御製題知過堂乙巳人若不知過既知改為貴弗改已為非甚者文去聲與遂繄我顔斯堂已閲兩三嵗不吝成湯心未能伯玉志我胥企之哉摛辭志深愧御製題知過堂丙午向陽處必得春早莩甲旋看緑到荄自是一元資以始可欣萬寓與之皆梅心栁眼侵尋問江硯宣毫次第排知過由來貴改過空言改亦有何佳御製重題知過堂丙午知過堂之名本因好工作顔堂用自針以當銘右座然豫細思之渠去聲止一端那敬天在於誠屋漏或失課寧民圖其易溝壑或多餓勤政應無間去聲延攬或致惰察吏慎彰疸涇渭或淆些有一之弗臻是皆豫之過重題書壁間惕悉慎起卧御製題知過堂丁未搆築書堂成五載偶來清憩亦題詞星添鬚鬢依然我曦閲隙駒豈改其未致閭閻衣食足敢言禮樂俗風移過而能改則無過徒此云知實未知臣等伏睹我朝凡大工作皆承重熙纍洽之治會萃時合以待我皇上之振新而修舉焉是以鼛鼓弗煩於民水衡厚給其直不必襲堯舜茅茨周文栝柱之迹而自無過舉乃若豫遊之地無過仍舊飾陳而聖念惟恐稍縈或渝敬勤之本用是著論顔堂摛吟志省是所謂儉在我而不在物心居中虛而謹節其所受者歟乾隆四十五年聖夀七旬詔却原任人員請建經壇五十五年八旬萬夀申諭如前並却內府臣等成造佛像之請乾隆四十五年六月十七日禮部奏據原任工部右侍郎李友棠等呈請本年恭逢皇上七旬萬夀聖節擬赴熱河恭建經壇一疏奉諭旨著照前旨毋庸伊等前赴熱河並令各回原籍乾隆五十一年十二月二十六日奉上諭據總管內務府大臣奏乾隆五十五年朕八旬萬夀請循照前例諸王內外大臣虔造無量夀佛延禧祝嘏等語因思朕六旬七旬萬夀該管大臣俱先期奏請成造佛像以伸慶祝維時朕恭侍聖母皇太后慈闈凝禧篤祜內外臣工共抒忱悃是以允所請藉用承歡錫慶兹因朕八旬之慶先期備辦非朕所喜且回思益增悵然朕仰邀昊眷年逾古稀康強勤政惟期日慎一日敬迓鴻庥以俟八旬有五之歸政朕一人之福即億兆臣民之福又何必循用具文徒滋繁費乎所有該管大臣等奏請成造佛像之處著不必行乾隆五十四年六月初一日奉上諭保寧尚安奏據伊犁烏魯木齊兩處各廢員等二百七十餘員名呈稱恭遇八旬萬夀歡躍難名謹於今年預慶明年恭祝虔建經壇稍申蟻悃等語所奏殊屬非是新疆各廢員俱係緣事較重之人是以發往該處令其效力自贖非尋常廢員可比從前遇有慶典各直省廢員赴京建立經壇曽加恩擇其情節稍輕者量豫録用並分别賞給頂帶然亦出於特恩非臣下所得陳請保寧等此奏必係為該廢員等設法邀恩地步試思此等效力之人既不準其赴京祝嘏且獲咎俱重豈在彼建立經壇遂可望施恩釋回耶所奏斷不可行至明年朕八旬萬夀前經俯準王公大臣等之請舉行慶典原因中外臣工籲請祝釐效悃抒忱情詞懇切亦古來稀有之事朕若却而不允轉似類於矯情是以準其各輸經費在京辦理襄兹盛典仍諭令務從節省毋得踵事增華其各直省距京既逺又何必紛紛仿辦萬夀亭經壇等項所有明年萬夀各直省建立萬夀亭經壇之處著行停止各省且然新疆地方更可不必也將此通諭知之臣等謹案九如祝夀之篇先之以神詒多福後世祠官祝釐延祥仁宇義率昉此欽惟我皇上萬夀凝禧中外臣民莫不欲少抒悃忱效億齡之祝故或假唄誦之宣揚以慶讚無量證莊嚴之寶相以頂禮長生歡喜實有同心陳請遂聯衆願乃蒙皇上體念周至屏却繁文既不致有糜費之虞更不使有濫邀之澤即一事而敦本抑末具見崇情誠所謂躬至德而不自德者乎聖駕時巡諭禁工作及諸綵飾乾隆五十五年八旬萬夀慶節前預命撤減宣示中外乾隆四十五年三月初八日奉上諭朕清蹕時巡臨蒞江浙原因厪念河工海塘親臨閲視兼以省方問俗順時行慶非為遊觀計也前屢經降旨所有經過地方止須掃除蹕路一切供頓無庸踵事增華今浙省仍有添建屋宇點綴燈彩之事兼多華縟未免徒滋繁費朕心實所不取三寶等均著傳旨申飭嗣後如再有似此過費者朕必加以嚴譴不能寬貸也乾隆四十五年三月十四日奉上諭朕自三十年南巡以後迄今十有五年東南土俗民風易趨華靡每朂督撫大吏諄諄化𨗳務期返朴還淳以臻郅治而江南之陶莊清口浙江之海寧塘工修舉尤關民瘼因允兩省督撫籲請于今春再舉時巡之典乃自啓蹕以來所過直𨽻江南一切行營供頓不過就舊有規模略加修葺辦理尚為妥協而從事浮華山東已開其端至浙江為尤甚朕心深所不取現在陶莊及海塘各工經朕親臨指示所有應行修理工程特命頒發帑金交該撫等悉心妥辦將來工程完竣後朕自當再行親蒞閲視恐後任督撫見此次所辦差務已多粉飾未免踵事增華從而加甚勢將伊於何底且江浙士民情殷瞻覲者固多而窮鄉僻壤或有名附讀書不能上進之徒本自憤悶不平今因巡幸一切點綴過華朕視之實覺過當又安能免若輩之議論乎朕臨御四十五年無日不厪念民依乃以省方問俗之殷懷轉貽口實是誠督撫大吏之不能善體朕心而朕亦以為愧矣著再通諭各督撫以後務宜黜奢崇儉於地方諸大政實心經理毋得徒事繁華致滋浮費以稱惠朕愛東南黎庶之至意乾隆五十四年二月二十日奉上諭朕明年巡幸山束啓鑾約在春分之後彼時已過燈節蹕路所經毋庸預備燈綵煙火以省糜費著傳諭劉峩長麟一體遵照恭查乾隆五十五年八月初九日諭此次點綴不過塗飾一時聊以娛目更為無益繁文幸荷上天恩佑彌月晴明設或連遇風雨豈不徒耗物力今已成事不説未便全行裁撤仍著該管大臣將一應綵飾量為減省以示朕式靡崇儉至意將此通諭中外知之載卷上諭全文恭首謹節録入臣等謹案采椽不斫斥題不枅從來述儉約者以為美談然原其自處則然而出於臣下之營作則未聞有示之以範者我皇上節用愛人在宫時邁厪念同之屢以東南民俗易趨浮靡朂大吏多方化𨗳使之返朴而還淳爰于鑾輅將臨先期頒諭毋滋冗費而侈縟文偶有踵事增華即諄諄訓誡務使咸知仰體至如點綴綵飾不過耳目之娛取適一時而事屬無益不特巡典示之裁撤即本年八旬大慶臣工方以萬邦轃集逺服偕徠欲藉以壯觀瞻而陳王會之盛而我皇上感念天時重惜物力仍命所司量從減省煌煌綸綍遵奉敬録冠諸盛典首編以是知聖人之德無所不備而聖人之夀將逺紹夫循蜚疏仡之年與太初同其沕穆也矣八旬萬夀盛典卷十五
