body:
  text: 盛事十二夀民夀婦二乾隆四十七年旌表夀民陳克明夀婦髙氏等四十一人禮部謹題為公報夀逾百齡懇請題旌表事據原任直𨽻總督袁守侗疏稱夀宇祥開近輔之依光尤切昌時化洽喬齡之表瑞宜先兹有唐縣夀民陳克明現年一百三嵗性本淳良行敦朴實耕田鑿井沐熙皥之仁風蹈德詠和享期頤之上夀洵為人瑞宜荷殊榮臣等查與定相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議陳克明著加恩賞給上用緞一匹銀十兩又題為年逾百齡請旨建坊事據原任直𨽻總督袁守侗疏稱聖世引年之典承恩先及於郊圻鴻鈞育物之仁表瑞兼徴于閨闥兹有獻縣夀婦髙氏現年一百二嵗開州夀婦王氏現年一百三嵗任氏現年一百二嵗韋氏現年一百一嵗皆持躬淑慎賦質幽貞鳩杖延禔繞膝有門庭之樂鶴籌衍算頻年邀粟帛之榮兹屆期宜承褒顯臣等查與㝎例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議髙氏王氏任氏韋氏著加恩各賞給上用縀一匹銀十兩又題為題請旌表事據山東巡撫國泰疏稱撰協清寧士庶食和平之福恩隆煦育閭閻徴耆夀之庥兹有聊城縣夀民謝文訓現年一百一嵗夏津縣夀民李名達現年一百二嵗寧海州夀民王在諧現年一百一嵗汶上縣夀民吳大業現年一百四嵗李宗禹現年一百一嵗齊東縣夀民韓大臣現年一百七年德平縣夀民程國興現年一百六嵗巨野縣夀民田漢揮現年一百四嵗夀光縣民邢玉珍現年一百一嵗陽榖縣生員趙曰徴現年一百一嵗皆秉性醇良持躬孝友一道德以同俗雍熙久沐朝參居邑而相望忠信並推十室俱越期頤之夀冝邀寵錫之榮臣等查與㝎例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議謝文訓李名達王在諧吳大業李宗禹韓大臣程國興田漢揮邢玉珍趙曰徴俱著加恩賞給上用縀一匹銀十兩又題為題靖旌表事據暫署山東巡撫諾穆親疏稱龍光錫慶期頥昭福􅊀之徴燕譽宜家豫順洽時雍之化兹有汶上縣夀婦嶽孔氏現年一百五嵗賦性幽貞持躬勤儉壼德協惟嘉之則母儀貽式榖之庥昔屢沐夫榮施今允符於旌典臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議孔氏著加恩賞給上用縀一匹銀十兩又題為題請恩旌事據江蘇巡撫閔鶚元疏稱曰攸好德錫之福保皇極而用章若有恆性綏厥猷孚兆民而允殖兹有宿遷縣夀民張松現年一百三嵗震澤縣夀民吳啓雲現年一百嵗鎮洋縣夀民陸漢臣現年一百三嵗銅山縣夀民李世文現年一百六嵗秉彛克訓代食惟勤積寉算之春秋咸登夀耉荷鴻鈞之雨露共樂升平允符表宅之文用冀自天之錫臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議張松陸漢臣李世文俱著加恩賞給上用縀一匹銀十兩又題為夀逾百齡循例請旌事據江蘇巡撫閔鶚元疏稱聖朝之恬養彌隆治徴仁夀景運之嘉祥疊應福錫柔嘉兹有宿遷縣夀婦顧孫氏現年一百四嵗如臯縣夀婦蘇丁氏現年一百一嵗靜好宜家溫恭協德蘋蘩有度聿昭禮法之宗葑菲無遺並荷栽培之化允稱上夀敢籲殊恩臣等查與定例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議孫氏丁氏俱著加恩賞給上用縀一匹銀十兩又題為題請旌表事據調任安徽巡撫農起疏稱帝錫民用祉夀耉無遺天祐命惟純庥祥疊應茲有鳳陽縣夀民王盛輔現年一百一嵗懷逺縣夀民崔占一現年一百二嵗婺源縣夀民江芳桂涇縣夀民胡一開各現年一百一嵗緒守箕裘業承堂構樂仁天之怙覆擊壤歌衢遊化日之舒長飲和食德人稱瑞世典合旌閭臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人端字樣奉旨依議王盛輔崔占一江芳桂胡一開俱著加恩賞給上用縀一匹銀十兩又題為循例請旌事據調任安徽巡撫農起疏稱敘萬年而懷德夀愷宏敷申百祿以宜民柔貞克協兹有無為州夀婦許趙氏現年一百三嵗萃百齡之善慶久依化日舒長綿四代之孫曽並荷熙朝樂育欣逢盛事宜沐殊恩臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議趙氏著加恩賞給上用縀一匹銀十兩又題為題請旌表事據江西巡撫郝碩疏稱運際升恆率土保維皇之極仁隆布濩敷天徴難老之祥兹有寧都州夀民郭肅昭現年一百嵗鉛山縣夀民秦翹翰現年一百一嵗持躬端謹秉性醇良孝友著於家庭人言無間推解施於里閈輿論交孚同為夀世之祥符宜荷引年之巨典臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議秦翹翰著加恩賞給上用縀一匹銀十兩又題為請旨事據江西巡撫郝碩奏稱道奉三無洋溢遍太和之化澤涵四表延洪卜仁夀之祥兹有南昌縣夀民李益榮現年一百一嵗新建縣夀民熊孟源現年一百嵗孝友性成朴勤世守荷朝廷之休養為閭里之光榮採民風而瑞應昌時稽事實而旌符令典仰祈恩綍表厥宅閭奉上諭李益榮熊孟源著該部照例旌賞欽此應行文該撫轉飭地方官各給與建坊銀三十兩並升平人瑞字樣奉旨依議又題為題請旌表事據原任閩浙總督兼署浙江巡撫陳輝祖疏稱體仁足以長人庶民惟時保極用德於以彰善萬邦爰慶咸和兹有永嘉縣夀民張引商現年一百七嵗夀世蒙庥康衢順則居心淳朴家傳式好之風薰德善良里有觀型之化前此年登九秩已邀錫賚之恩今兹夀越百齡宜荷旌揚之典臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議張引商著加恩賞給上用縀一匹銀十兩又題為題請旌表事據原任閩浙總督兼管浙江巡撫陳輝祖疏稱好生之德俾從欲熙宇同遊積善之家有餘慶夀祺庸錫兹有山隂縣夀婦平陶氏現年一百一嵗蹈和協吉體順含貞諧瑟琴而靜好宜家矢丸獲而辛勤課子依升恆之日月長葆春暉嫓景慶之星雲並稱時瑞宜絲綸之特賁俾綽禊之用光臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議陶氏著加恩賞給上用緞一匹銀十兩又題為題請旌事據湖南巡撫李世傑奏稱頌川增而錫祉廣永涵恩安野處以含淳養恬順則兹有安鄉縣民金有璉現年一百一嵗性真自葆天全而閲嵗滋多熙皥偕遊帝力則康衢共樂既符上瑞宜沐殊榮奉上諭據李世傑奏安鄉縣民金有璉年一百一嵗請旨旌表等語金有璉著照例旌表該部知道欽此應行文該撫轉飭地方官給與建坊銀三十兩並升平人瑞字樣奉旨依議又題為請旌夀民事據陕西巡撫畢沅疏稱奉三錫極協和允際同風綏萬延禧夀耉不遺並塞兹有白水縣夀民吳治現年一百嵗持躬孝友賦性朴淳際重熙纍洽之朝養恬獲福安鑿井耕田之業矍鑠徴祥昔邀粟帛於覃恩今籲旌揚於特典臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議又題為恭報人瑞懇賜請旌事據原任廣東巡撫李湖疏稱秩祜無疆人瑞疊徴於海國德音是茂皇仁逺被於編氓兹有髙要縣夀民李樂善開平縣夀民談嶽綱各現年一百一嵗張雲西現年一百四嵗星麗弧南春長嶺表不知不識同為順則之民是訓是行宜荷近光之慶仰邀褒典用表期齡臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議李樂善談嶽綱張雲西俱著加恩賞給上用縀一匹銀十兩又題為懇請題旌事據兩廣總督暫署廣東巡撫巴延三疏稱知仁宏樂夀之原慶敷多福位育建中和之極恩錫喬齡兹有英德縣夀婦何袁氏現年一百一嵗賦性安貞持躬淑愼事髙堂而盡禮撫幼子以成名允徴聚順之庥宜荷賜旌之典臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議袁氏著加恩賞給上用縀一匹銀十兩又題為題請旌表事據貴州巡撫李本疏稱恩波廣被邉隅蒙樂利之庥夀宇宏開婦德獲期頤之慶兹有開泰縣夀婦宋吳氏現年一百三嵗清平縣夀婦王劉氏現年一百二嵗質本柔嘉身惟勤儉閲皇春與帝夏嵗月遂多兼松夀與柏貞門閭宜表實熙朝之盛事籲旌典之榮頒臣等查與定例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議吳氏劉氏俱著加恩賞給上用縀一匹銀十兩乾隆四十八年旌表夀婦朱王氏夀民郭良棟等五人禮部謹題為題請旌表事據江蘇巡撫閔鶚元疏稱朝廷推保艾之仁翔和式普家室兆維旟之慶降福攸同兹有丹徒縣夀婦朱王氏現年一百嵗率禮無違稱詩協順挽鹿而志安林下無慙綦縞之風扶鳩而賜拜天家彌永疊榆之景宜光翠楔志美彤編臣等查與定應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議又題為題旨事據江西巡撫郝碩奏稱道隆參贊敷天宏化育之仁德懋中和率土荷生成之慶惟閭里久涵乎愷澤斯嘉祥上應夫升平兹有廬陵縣夀民郭良棟現年一百二嵗品行醇良精神強健服先疇而食德考祥符元吉之占表厥宅以引年彰善協風聲之樹仰懇聖恩準豫旌表奉上諭據郝碩奏盧陵縣民郭良棟現年一百二嵗懇恩旌表等語良棟著該部照例旌表欽此應行文該撫轉飭地方官給與建坊銀三十兩並升平人瑞字樣奉旨依議又題為題請旌表事據廣東巡撫尚安疏稱惇德敷于五教引年靡間遐陬作善降之百祥詒福用徴上瑞兹有新會縣夀民蘇餘利現年一百嵗恩平縣夀民唐發後陸豐縣夀民邱逹德各現年一百二嵗百齡未艾三夀作朋敦古處之淳龎有年有幹遊太平之伴奐以飬以恬仰籲恩綸錫之旌典臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人端字樣奉旨依議唐發後邱逹德俱著加恩賞給上用縀一匹銀十兩乾隆四十九年旌表夀民郭有英夀婦馬氏等二十人禮部謹題為題請旌表事據直𨽻總督劉峩疏稱箕疇五福首重期齡華祝三多尤推上夀惟聖澤之涵濡既渥斯編氓之卜算彌長兹有順義縣夀民郭有英現年一百三嵗資秉醇良行敦朴實食德際重熙之久慶衍春長推恩承六宇之先光依日近洵屬升平人瑞宜邀寵錫隆慈臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議郭有英著加恩賞給上用縀一匹銀十兩又題為題請旌表事據山東巡撫眀興疏稱茂育施仁佑吉慶承大有太和布德利貞化溥家人兹有堂邑縣夀婦吕馬氏現年一百嵗性秉溫柔躬持淑慎夙夜雞鳴之訓日月其除恩勤燕翼之謀子孫勿替耄耋屢承寵錫期頤允合旌揚臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議又題為循例請旌事據江蘇巡撫閔鶚元疏稱太和歸于保合正而固曰貞積善必有餘慶錫之福曰夀兹有沛縣夀婦朱蔡氏現年一百一嵗寶應縣夀婦陳韓氏現年一百嵗秉性幽貞持身孝敬繞膝偹承歡之慶介眉徴難老之祥幸際昌時宜邀褒典臣等查與定例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議蔡氏著加恩賞給上用縀一匹銀十兩又題為題請旌表事據原任江西巡撫郝碩疏稱治臻上理孚元吉於惠心德遍羣黎俾輯熙於純蝦兹有上髙縣夀民晏百祿現年一百嵗秉資醇朴處世寬和講讓型仁久荷甄陶之化飲和食德長依熙皡之天慶值昌期恩宜表宅臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議又題為題請旌表事據江西巡撫郝碩疏稱昭大德以建厥中民罔迪不適敘萬年而保極天佑命惟純兹有萍鄉縣夀婦林葉氏現年一百四嵗新昌縣夀婦蔡熊氏