  text: 欽定四庫全書八旬萬夀盛典卷三十六
  hash: sha256:60c661c37b886b01ba5ec4e01db290c21a1e3f40ff7b2e1a786149a64336598f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_036-1a, image: WYG0660/WYG0660-0424a.png}
body:
  text: 盛事十二夀民夀婦二乾隆四十七年旌表夀民陳克明夀婦髙氏等四十一人禮部謹題為公報夀逾百齡懇請題旌表事據原任直𨽻總督袁守侗疏稱夀宇祥開近輔之依光尤切昌時化洽喬齡之表瑞宜先兹有唐縣夀民陳克明現年一百三嵗性本淳良行敦樸實耕田鑿井沐熙皥之仁風蹈徳詠和享期頤之上夀洵為人瑞宜荷殊榮臣等查與定相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議陳克明著加恩賞給上用緞一疋銀十兩又題為年逾百齡請㫖建坊事據原任直𨽻總督袁守侗疏稱聖世引年之典承恩先及於郊圻鴻鈞育物之仁表瑞兼徴扵閨闥兹有獻縣夀婦髙氏現年一百二嵗開州夀婦王氏現年一百三嵗任氏現年一百二嵗韋氏現年一百一嵗皆持躬淑慎賦質幽貞鳩杖延禔繞膝有門庭之樂鶴籌衍算頻年邀粟帛之榮兹届期宜承褒顯臣等查與㝎例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議髙氏王氏任氏韋氏著加恩各賞給上用縀一疋銀十兩又題為題請旌表事據山東巡撫國泰疏稱撰協清寧士庶食和平之福恩隆煦育閭閻徴耆夀之庥兹有聊城縣夀民謝文訓現年一百一嵗夏津縣夀民李名達現年一百二嵗寧海州夀民王在諧現年一百一嵗汶上縣夀民呉大業現年一百四嵗李宗禹現年一百一嵗齊東縣夀民韓大臣現年一百七年徳平縣夀民程國興現年一百六嵗鉅野縣夀民田漢揮現年一百四嵗夀光縣民邢玉珎現年一百一嵗陽榖縣生員趙曰徴現年一百一嵗皆秉性醇良持躬孝友一道徳以同俗雍熙乆沐朝参居邑而相望忠信並推十室俱越期頤之夀冝邀寵錫之榮臣等查與㝎例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議謝文訓李名達王在諧呉大業李宗禹韓大臣程國興田漢揮邢玉珎趙曰徴俱著加恩賞給上用縀一疋銀十兩又題為題靖旌表事據暫署山東巡撫諾穆親䟽稱龍光錫慶期頥昭福􅊀之徴燕譽宜家豫順洽時雍之化兹有汶上縣夀婦岳孔氏現年一百五嵗賦性幽貞持躬勤儉壼徳協惟嘉之則母儀貽式榖之庥昔屡沐夫榮施今允符於旌典臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議孔氏著加㤙賞給上用縀一疋銀十兩又題為題請㤙旌事據江蘇巡撫閔鶚元䟽稱曰攸好徳錫之福保皇極而用章若有恒性綏厥猷孚兆民而允殖兹有宿遷縣夀民張松現年一百三嵗震澤縣夀民呉啟雲現年一百嵗鎮洋縣夀民陸漢臣現年一百三嵗銅山縣夀民李世文現年一百六嵗秉彛克訓代食惟勤積寉算之春秋咸登夀耉荷鴻鈞之雨露共樂昇平允符表宅之文用冀自天之錫臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議張松陸漢臣李世文俱著加恩賞給上用縀一疋銀十兩又題為夀逾百齡循例請旌事據江蘇巡撫閔鶚元疏稱聖朝之恬養彌隆治徴仁夀景運之嘉祥疊應福錫柔嘉兹有宿遷縣夀婦顧孫氏現年一百四嵗如臯縣夀婦蘇丁氏現年一百一嵗静好宜家温恭協徳蘋蘩有度聿昭禮法之宗葑菲無遺並荷栽培之化允稱上夀敢籲殊恩臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議孫氏丁氏俱著加恩賞給上用縀一疋銀十兩又題為題請旌表事據調任安徽巡撫農起疏稱帝錫民用祉夀耉無遺天祐命惟純庥祥疊應茲有鳳陽縣夀民王盛輔現年一百一嵗懐逺縣夀民崔占一現年一百二嵗婺源縣夀民江芳桂涇縣夀民胡一開各現年一百一嵗緒守箕裘業承堂構樂仁天之怙覆擊壌歌衢遊化日之舒長飲和食徳人稱瑞世典合旌閭臣等查與定例相符應准其旌表各給建坊銀三十両並昇平人端字様奉㫖依議王盛輔崔占一江芳桂胡一開俱著加恩賞給上用縀一疋銀十兩又題為循例請旌事據調任安徽巡撫農起疏稱叙萬年而懐徳夀愷宏敷申百禄以宜民柔貞克協兹有無為州夀婦許趙氏現年一百三嵗萃百齡之善慶乆依化日舒長綿四代之孫曽並荷熙朝樂育欣逢盛事宜沐殊恩臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議趙氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據江西巡撫郝碩疏稱運際升恒率土保維皇之極仁隆布濩敷天徴難老之祥兹有寜都州夀民郭肅昭現年一百嵗鉛山縣夀民秦翹翰現年一百一嵗持躬端謹秉性醇良孝友著於家庭人言無間推解施於里閈輿論交孚同為夀世之祥符宜荷引年之鉅典臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議秦翹翰著加恩賞給上用縀一疋銀十兩又題為請㫖事據江西巡撫郝碩奏稱道奉三無洋溢徧太和之化澤涵四表延洪卜仁夀之祥兹有南昌縣夀民李益榮現年一百一嵗新建縣夀民熊孟源現年一百嵗孝友性成樸勤世守荷朝廷之休養為閭里之光榮採民風而瑞應昌時稽事實而旌符令典仰祈恩綍表厥宅閭奉上諭李益榮熊孟源著該部照例旌賞欽此應行文該撫轉飭地方官各給與建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據原任閩浙總督兼署浙江巡撫陳輝祖疏稱體仁足以長人庶民惟時保極用徳於以彰善萬邦爰慶咸和兹有永嘉縣夀民張引商現年一百七嵗夀世䝉庥康衢順則居心淳樸家𫝊式好之風薫徳善良里有觀型之化前此年登九秩已邀錫賚之恩今兹夀越百齡宜荷旌揚之典臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議張引商著加恩賞給上用縀一疋銀十両又題為題請旌表事據原任閩浙總督兼管浙江巡撫陳輝祖疏稱好生之徳俾從欲熙宇同遊積善之家有餘慶夀祺庸錫兹有山隂縣夀婦平陶氏現年一百一嵗蹈和協吉體順含貞諧瑟琴而静好宜家矢丸獲而辛勤課子依升恒之日月長葆春暉嫓景慶之星雲並稱時瑞宜絲綸之特賁俾綽禊之用光臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議陶氏著加恩賞給上用緞一疋銀十兩又題為題請旌事據湖南巡撫李世傑奏稱頌川増而錫祉廣永涵恩安野處以含淳養恬順則兹有安鄉縣民金有璉現年一百一嵗性真自葆天全而閲嵗滋多熈皥偕遊帝力則康衢共樂既符上瑞宜沐殊榮奉上諭據李世傑奏安鄉縣民金有璉年一百一嵗請㫖旌表等語金有璉著照例旌表該部知道欽此應行文該撫轉飭地方官給與建坊銀三十兩並昇平人瑞字様奉㫖依議又題為請旌夀民事據陕西巡撫畢沅疏稱奉三錫極協和允際同風綏萬延禧夀耉不遺並塞兹有白水縣夀民吳治現年一百嵗持躬孝友賦性樸淳際重熙累洽之朝養恬獲福安鑿井耕田之業矍鑠徴祥昔邀粟帛於覃恩今籲旌揚於特典臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為恭報人瑞懇賜請旌事據原任廣東巡撫李湖疏稱秩祜無疆人瑞叠徴於海國徳音是茂皇仁逺被於編氓兹有髙要縣夀民李樂善開平縣夀民譚岳綱各現年一百一嵗張雲西現年一百四嵗星麗弧南春長嶺表不知不識同為順則之民是訓是行宜荷近光之慶仰邀褒典用表期齡臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議李樂善譚岳綱張雲西俱著加恩賞給上用縀一疋銀十兩又題為懇請題旌事據兩廣總督暫署廣東巡撫巴延三䟽稱知仁宏樂夀之原慶敷多福位育建中和之極㤙錫喬齡兹有英徳縣夀婦何袁氏現年一百一嵗賦性安貞持躬淑愼事髙堂而盡禮撫㓜子以成名允徴聚順之庥宜荷賜旌之典臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議袁氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據貴州巡撫李本䟽稱恩波廣被邉隅䝉樂利之庥夀宇宏開婦徳獲期頤之慶兹有開泰縣夀婦宋呉氏現年一百三嵗清平縣夀婦王劉氏現年一百二嵗質本柔嘉身惟勤儉閲皇春與帝夏嵗月遂多兼松夀與栢貞門閭宜表實熈朝之盛事籲旌典之榮頒臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議呉氏劉氏俱著加恩賞給上用縀一疋銀十兩乾隆四十八年旌表夀婦朱王氏夀民郭良棟等五人禮部謹題為題請旌表事據江蘇巡撫閔鶚元䟽稱朝廷推保艾之仁翔和式普家室兆維旟之慶降福攸同兹有丹徒縣夀婦朱王氏現年一百嵗率禮無違稱詩恊順挽鹿而志安林下無慙綦縞之風扶鳩而賜拜天家彌永叠榆之景宜光翠楔誌美彤編臣等查與定應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議又題為題㫖事據江西巡撫郝碩奏稱道隆參賛敷天宏化育之仁徳懋中和率土荷生成之慶惟閭里乆涵乎愷澤斯嘉祥上應夫昇平兹有廬陵縣夀民郭良棟現年一百二嵗品行醇良精神强健服先疇而食徳考祥符元吉之占表厥宅以引年彰善協風聲之樹仰懇聖恩准予旌表奉上諭據郝碩奏盧陵縣民郭良棟現年一百二嵗懇恩旌表等語良棟著該部照例旌表欽此應行文該撫轉飭地方官給與建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據廣東巡撫尚安䟽稱惇徳敷于五教引年靡間遐陬作善降之百祥詒福用徴上瑞兹有新㑹縣夀民蘇餘利現年一百嵗恩平縣夀民唐發後陸豐縣夀民邱逹徳各現年一百二嵗百齡未艾三夀作朋敦古處之淳龎有年有幹游太平之伴奐以飬以恬仰籲㤙綸錫之旌典臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人端字様奉㫖依議唐發後邱逹徳俱著加㤙賞給上用縀一疋銀十兩乾隆四十九年旌表夀民郭有英夀婦馬氏等二十人禮部謹題為題請旌表事據直𨽻總督劉峩䟽稱箕疇五福首重期齡華祝三多尤推上夀惟聖澤之涵濡既渥斯編氓之卜算彌長兹有順義縣夀民郭有英現年一百三嵗資秉醇良行敦樸實食徳際重熈之乆慶衍春長推㤙承六㝢之先光依日近洵属昇平人瑞宜邀寵錫隆慈臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議郭有英著加㤙賞給上用縀一疋銀十兩又題為題請旌表事據山東巡撫眀興䟽稱茂育施仁佑吉慶承大有太和布徳利貞化溥家人兹有堂邑縣夀婦吕馬氏現年一百嵗性秉温柔躬持淑慎夙夜鷄鳴之訓日月其除㤙勤燕翼之謀子孫勿替耄耋屡承寵錫期頤允合旌揚臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議又題為循例請旌事據江蘇巡撫閔鶚元䟽稱太和歸于保合正而固曰貞積善必有餘慶錫之福曰夀兹有沛縣夀婦朱蔡氏現年一百一嵗寳應縣夀婦陳韓氏現年一百嵗秉性幽貞持身孝敬繞膝偹承歡之慶介眉徴難老之祥幸際昌時宜邀褒典臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議蔡氏著加㤙賞給上用縀一疋銀十兩又題為題請旌表事據原任江西巡撫郝碩䟽稱治臻上理孚元吉於恵心徳徧羣黎俾輯熙於純蝦兹有上髙縣夀民晏百祿現年一百嵗秉資醇樸處世寛和講讓型仁乆荷甄陶之化飲和食徳長依熙皡之天慶值昌期恩宜表宅臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據江西巡撫郝碩䟽稱昭大徳以建厥中民罔廸不適叙萬年而保極天佑命惟純兹有萍鄉縣夀婦林葉氏現年一百四嵗新昌縣夀婦蔡熊氏南城縣夀婦王程氏各現年一百一嵗建昌縣夀婦朱胡氏現年一百嵗福届大年慶餘積善釐士女而罄宜戬榖難老徴祥保室家而蹈徳含和順貞叶吉洵属昇平上瑞宜邀寵錫殊恩臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議葉氏熊氏程氏俱着加恩賞給上用緞一疋銀十兩又題為夀登百嵗事據浙江廵撫福崧疏稱成萬物而不遺箕疇普錫佑下民而允殖壼範兼旌兹有秀水縣夀婦姚曺氏現年一百一嵗桐廬縣夀婦孫陳氏現年一百嵗秉性柔嘉居家勤儉臻百齡之上夀舜日長依裕五世之後昆堯衢共樂允作南邦之瑞䖍希北闕之恩臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議曺氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據原任廣東巡撫尚安疏稱聖澤宏敷海國同登樂利皇仁溥鬯遐齡並慶恬熙兹有海陽縣監生成伯年現年一百嵗四㑹縣夀民吕朝燦現年一百三嵗東莞縣夀民黄卿佐現年一百五嵗孝友堪風醇龎足式心臧物愛敦仁守安土之常食徳服疇保極㑹遵王之路恩祈魏闕瑞表炎陬臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議吕朝燦黄卿佐俱著加恩賞給上用縀一疋銀十兩又題為題請旌表事據廣東巡撫尚安疏稱乆道化成率土叶安貞之吉庥徴來備寰瀛覘夀耉之祺兹有番禺縣夀婦黄謝氏現年一百嵗揭陽縣夀婦洪林氏現年一百一嵗行符正内義協含章慶衍北堂並䕃謝庭之秀輝聫南極允鍾庾嶺之祥典合引年恩祈表宅臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議林氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據雲南巡撫劉秉恬疏稱太和宏育物之仁承庥無斁夀考普作又之化樹徳務滋兹有定逺縣民陳徳竣南寧縣民錢應琨各現年一百一嵗克享遐年偕逰盛世慶同碩果沐雨露之多偏喜並喬松閱春秋之逓積幸逢錫羙宜與推恩臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議陳徳峻錢應俱著尚恩賞給上用縀一疋銀十兩又題為題請旌表事據雲南巡撫劉秉恬奏稱天無私覆九重覃夀愷之恩家有餘慶萬里應昌期之瑞並有賔川州夀婦馮林氏現年一百四嵗性惟淑慎夀越期頤作善降祥式駐桒榆之景含章有譽用希綸綍之光臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議林氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據貴州巡撫李本奏稱聖盡人之性老安不間遐陬民受中以生婦順同躋夀宇兹有貴筑縣夀婦劉馬氏現年一百一嵗精神強健孫子蕃昌此皆景福宏敷恩慈普被是以邉方綦縞共依樂育之仁欣兹上夀期頤允合褒揚之典臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議八旬萬夀盛典卷三十六
