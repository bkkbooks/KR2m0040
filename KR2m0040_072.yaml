  text: 欽定四庫全書八旬萬夀盛典卷七十二恩賚十一本年東巡
  hash: sha256:f042ece1caf580c48ae5cf7d1043a36b1efd744e0b26bfc758714ed38edb760a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_072-1a, image: WYG0660/WYG0660-0859a.png}
body:
  text: 臣等謹案禮國有大慶及巡狩所至輒舉方望之祀虞周之覲后朝嶽尚已至夫闡釐懋賞則我朝之上儀為尤煒矞焉皇上受祉孔時方庚子慶七旬即擬於夀躋八帙時升秩岱宗展儀闕里兼以省民風而厚惠施蓋聖衷裕得夀之符協至誠之感詩所謂卜爾百福如幾如式者也乃者禮嶽薦馨尊師獻爵適愜大聖人修禋著恪之夙忱而蹕路所臨周咨曲賚吏志入疆之慶士揚譽髦之庥即在袀服掃塗皤顔樹踵靡弗優霑湛澤駢感臚祝之彌殷於以見嶽宗之庇德生民聖揆之植體仁夀胥由我皇上洽神崇道有以致馨格而履洪庥記曰禮時為大宜次之稱次之不特金泥玉檢妄侈升中即魯頖宫之鸞旗從公視此猶百不逮一也而况膏流畿輔愷布瀛津德意之所周殆遍浹於春旗玉車犬間也乎乾隆五十五年春二月皇上以八旬行慶載舉東巡之典躬祀岱嶽闕里如儀乾隆五十四年十一月初一日內閣奉上諭朕明春恭謁兩陵巡幸山東並親詣曲阜祗謁孔林於二月初八日啓鑾所有一應事宜著各該衙門照例預備二月初八日皇上自東華門啓鑾御製以夀登八旬恭拜二陵遂巡山東祭岱宗闕里是日啓程得長句六韻有序庚戌年八十耄徴篤念於箕疇嵗二月東禮舉巡於舜典允臣民之請秋弧慶佇於稱觴承祖考之庥春露惕深於瞻鼎敢曰報眷貽之厚尚久持孜亹之衷矢抱蜀之宜勤邇嵗期周中祀矧升香之可即順塗便詣靈區維嶽宗司萬物之發生而聖揆實百王之師表於焉修禮陋遷書封䃭之夸足以體仁驗魯論樂山之夀登福艫於濟水程印前言駐日馭於瀛津巡經隔嵗撫齊甸豐盈之豫臚羣黎瞻就之歡昨接疆吏之封章年穰榖賤甫下元辰之恩詔民足賦蠲夀宇萬氓憑輿若附循赤子朝家五代迓蹕亦提抱童孫溯冒苑東國草年愈情藹若憶執徐南巡六度愛景依然里記車安臺登春樂月維初吉三朝過元鳥之分初五日春分榖乃用成先日卜社公之雨初七日春社初程發軔長句排籖八十干支天眷錫二陵風雨聖恩延何修而遇誠徼幸不息以強勉惕乾中祀一心期備舉定例在中祀惟即位一親行餘皆遣官載會典豫五十餘年親詣致祭者屢矣去嵗曾諭以歸政前當舉行一周以昭重祭之義今時巡而升秩岱宗展儀闕里猶此義也岱宗闕里例應然書稱二月東巡日禮慶升中庚戍年展敬自當叩先鼎撰良遂以發行旃甲辰風景夫何異瞥眼流隂五載還自甲辰南巡過泰山祀闕里今又五載矣是日奉上諭朕祗謁兩陵巡幸山東道經畿甸當春行慶首塗所及宜沛恩膏著將直𨽻經過州縣本年應徴地丁錢糧加恩蠲免十分之三初十日奉上諭朕此次東巡所有經過直𨽻地方各營汛兵丁有派辦差務者俱著查明賞給兩月口糧十五日奉上諭朕此次巡幸山東祗謁闕里覃敷愷澤允宜首自近畿著將直𨽻本年入學名數大學增額五名中學增額四名小學增額三名該學政其悉心校録甄萃拔優以副朕加惠士林至意又奉上諭朕此次巡幸山東經臨畿甸曾諭令該督撫等沿途毋事點綴繁文致滋縻費祗須就向有行在坐落略事掃除其自濟寧登舟以後水宫額制亦悉其舊但途中程站較多雖無興建工程而修葺粘補究屬不無所費著加恩於長蘆山東運庫內每省各賞給銀二萬兩以示體恤十六日奉上諭朕此次巡幸山東駐蹕往來經由直𨽻所有該省承辦差務之文武大小各員一體加恩用昭渥澤著該督查明咨部凡有罰俸住俸降級之案俱準其開復其無此等案件者各加一級二十日奉上諭朕仰蒙昊眷年屆八旬已降旨將各省錢糧普行蠲免兹恭謁兩陵巡幸山左鑾輅經臨之處童叟歡迎殷殷愛戴允宜廣敷愷澤普惠畿民因念直𨽻各屬節年因災緩徴帶徴錢糧貧民無力完納積欠甚多著再加恩將乾隆四十五年至五十三年未完地糧銀一百四十二萬八百六十八兩零改折銀二萬一千九百三十兩零屯糧四萬二千九百八十一石零屯榖七百九十八石零屯米三百十四石零全行豁免俾窮簷得免追呼共安耕鑿用副朕省方觀民行慶施惠有加無已至意該部即遵諭行是日駕駐紫泉行宫賜隨駕王公大臣蒙古王公貝勒額駙台吉及直𨽻大小官員等食御製降旨免直𨽻緩徴積欠並賜大小官員等食庚戍東西瞻謁兩陵周畿輔觀民事豫逰雖值度年陳衆樂却思潦地切先憂緩徴百萬全教逭新正以朕八旬大慶已降旨將各省錢糧普行蠲免兹恭竭戴允兩陵禮蕆將幸山左蹕輅經臨童叟歡迎情殷愛宜廣敷愷澤加惠畿民所有直𨽻各屬節年因災緩徴帶徴未完地丁銀一百四十二萬餘兩改折銀二萬一千餘兩屯糧四萬二千九百餘石屯榖七百七十餘石屯米三百餘石降旨全行豁免俾窮簷得免呼呼共安耕鑿用副朕省方觀民行慶施惠至意欠賦山東更待諏山左節年因災未完錢糧或亦有之俟長麟迎鑾到日詢得實數自應一例豁免俾令同被渥恩賜食門前勞去聲執役眼飢餒者飽餐不又奉上諭上年順天及保定河間天津等府屬及各州縣因夏秋雨水較多田禾被淹秋收稍歉節經諭令該督實力撫恤銀米兼賑春初正賑畢後又加恩展賑一月今朕巡幸山東經行畿輔見田畝均已播種遍野青蔥但麥秋為期尚早恐災歉之餘元氣未能驟復自當再霈恩施以期並臻康阜著將現在經過及回鑾經過之雄縣任邱河間獻縣阜城景州滄州天津青縣靜海武清等十一州縣照二月展賑之例再加賑一個月該督務督飭所屬實心經理俾閭閻均沾愷澤以副朕行慶施惠有加無已之至意御製經雄縣城南因命加賑有作庚戌雄縣城南草里餘大隄護淀滙波瀦途經一線左右水堰外平湖髙下淤淀之北隄所以禦水衛民也兹出雄縣城南經二十餘里因去秋霖雨過多旱路左右潦水尚未全消皆漫淀隄所積不可播種目覩情形實堪心惻昨潦甚哉傷切已吾民病矣嘆非魚曰蠲曰賑勤優恤一再加寧帑惜豫新正以上年順天及保定河間天津等府屬被淹州縣雖已實力撫恤銀米兼賑猶恐今春正賑已畢青黃不接民食不無拮據已加恩將成災七八分之極貧並九分災之極次貧民俱展賑一個月今蹕途經覽念距麥秋為期尚逺災歉之餘元氣不能驟復仍即降旨將現在及回鑾經過之雄縣任邱河間獻縣阜城景州滄州天津青縣靜海武清等十一州縣照二月展賑之例再加賑一月庶稍救飢民耳又奉上諭朕此次巡幸山東沿途接駕各廢員著將職名交軍機大臣俟回鑾後會同該部查明緣事各原案請旨分别辦理二十一日奉上諭朕此次巡幸山東回鑾時自濟寧登舟由水程回京前以三四月間正漕船銜尾北來之時若因回避御舟停泊不前未免守候稽遲致誤漕運曾降旨傳諭管幹珍等令各幫漕船於御舟經過時暫在岸傍排列因思上年直𨽻被水災區秋收歉薄全賴東豫二省販運糧食及南來貨物以資接濟所有商民船隻亦未便因有礙河道驅入港汊令其久候著即照漕船之例準其於兩岸暫泊候御舟一過即可遄行庶使商販流通物價平減以副朕恤商便行之意著總河巡撫巡漕御史皆善為經理御製命截留漕糧三十萬石於北倉以備直𨽻賑恤之用詩以志事庚戌畿南沴勢見經行日日慿輿切切情幸得山東資接濟直𨽻去秋被水淹浸處所正賑已畢疊加展賑尤幸山東去嵗上稔畿南接壤商販貿遷閭閻毫無菜色然豫軫念民生時切於懷矧連年全漕抵通天庾充盈現在糧艘已入直𨽻境內因復降旨令倉場侍郎蘇凌阿藩司熊光熊會同前往截漕三十萬石留貯北倉以示多方籌備至意更宜天庾撥餘贏應知此後時猶逺可謂目前價尚平東作方始距麥秋之時猶逺雖目前糧價尚平而早為儲蓄以待賑糶糶之用庶備可以無患耳備以不虞早為計疆臣善體惻民生御製日日六韻庚戌日日覲光庶歡呼夾路行視今較昔篤落後繞前迎每日鑾輿經過之處黃童白叟夾道跪迎甚至有落後者復繞至前途歡呼載道覺愛戴之情更倍往年蓋豫夀躋八旬康強如昔猶舉時巡令典稽之史册實所罕聞宜乎羣黎瞻覲益深慶幸而豫既迎邀昊眷又何敢遴惜恩膏是以直𨽻有疊次展賑之外復免災歉銀糧一百四五十萬庶盡代天子民之職耳都為去聲康寧計不教呵叱驚身衣鮮須口食可充盈所見誠堪幸向隅猶切怦殷殷慿顧處即我寸田情二十六日奉上諭朕此次展謁兩陵巡幸山東所有沿途經過地方著加恩蠲免本年地丁錢糧十分之三臣和珅等謹奏本日接駕老民共一千八十名臣等遵旨按照年嵗分别擬賞開單呈覽奏入俱奉旨按名賞給賞年九十一嵗之欽賜光祿寺寺丞趙象觀年八十三嵗之欽賜翰林院檢討李東耀二員大縀各一匹賞年一百嵗以上之周經等二名緞各一匹銀牌各三面賞年八十嵗以上之唐萬錦等三百一名銀牌各二面賞年七十嵗以上之張作興等五百七名銀牌各一面二十七日奉上諭朕年屆八旬敷天錫慶業經降旨將各省錢糧通行蠲免兹巡幸山左鑾輿經涖之處閭閻童叟夾道歡迎具徴愛戴誠悃允宜重加惠澤俾茅簷益沐恩膏因思東省各屬節年因災緩徴銀兩貧民積欠尚多若一律徴輸恐民力不無拮據著再加恩將乾隆四十九年未完銀三十萬八千三百餘兩五十年未完銀六十九萬七百餘兩五十一年未完銀七十三萬九千一百餘兩全行豁免以期比户得免催科益臻樂利副朕入疆行慶恩施無已之至意該部即遵諭行御製降旨豁免山東緩徴積欠詩以志事庚戍山左幸逢稔屢年因災之欠在其前山左自丁未戊申己酉連年以來春夏雨㿩時若冬雪優沾各屬二麥秋禾收成豐稔均獲九分有餘其前此數年間偶有水旱不齊因災緩徴之處現在所有民欠均非近年之項也入疆悉故惠應施去聲三載緩徴豁以全此次巡幸山左鑾輿所涖童叟歡迎倍形愛戴兹入疆伊始允宜普沛恩膏因思各屬從前積欠尚多若一律徴輸恐民力不無拮據即降旨將四十九五十五十一年未完銀一百七十餘萬兩全行豁免俾閭閻益臻樂利以副行慶展義之意足食更加免追呼去聲安居可以恣興眠即看麥隴芃苖緑設雨應收餅餌駢連日經過地方麥苖芃蔚盈望菁蔥地方官雖稱土脈含潤不至望雨然春澤惟期優渥又為之生望雨之念矣又奉上諭此次巡幸山東所有該省辦差各營汛兵丁俱著查明賞給兩月錢糧以昭恩賚二十八日奉上諭朕此次巡幸山東辦差兵丁業已渥施愷澤所有青州德州駐防旗兵派有差務者著查明賞給兩月錢糧用敷行慶施惠至意御製賜山東巡撫長麟庚戍山左羣黎一何幸屢綏更值撫臣賢所嘉執敬以無事不敢放心於有年須識安民在察吏漫勤扈蹕務增妍持盈朂爾休稱泰謙鞏惟豫亦勵虔三月初二日奉上諭山東省在籍人員于靈巖建設經壇情殷祝嘏劉樽王景張誠基李封等著各賞大緞一匹其郎中道府以下等官二十一員俱著各賞八絲緞一匹初七日駕詣岱廟拈香御製謁岱廟瞻禮庚戌來因瞻岱宗岱廟謁誠恭豫以壽躋八旬世臻安阜恭謁泰岱宗祭闕里用申虔謝以路便先至安即恭詣城中瞻岱廟先行禮封禪事無我阜安祈為去聲農代天敷物育福國錫時雍九叩申虔謝八旬實罕逢是日奉上諭此次巡幸山東所有山東及各省士子迎鑾獻賦特加考試其考取一等之貢生杜堮生員程拱宇俱著賞給舉人準其一體會試其考取二等之保开李廷芳李堯詢蔣天樞黃旭何塏張興鏞沈清瑞俱著賞給緞一匹駕駐泰安府行宫賜山東巡撫大小官員等食御製賜食山東諸大小吏成什示意庚戌將筐兼賜食無事酌觥紛凡賜食非有外藩向不用酒况值行春麗聊酬執役勤幸逢綏屢慶山東屢逢稔嵗民安自吏治順實可慶幸也不是素餐羣既富當言教却思子厚文嘗謂既富而後可以言教此夫子之訓然當今之世談何容易若不問其生計而亟亟於教化不不有如栁宗元種樹之喻非以愛之實以害之耶初九日奉上諭朕此次巡幸山左於回鑾時駐蹕天津所有東省長蘆兩處商人情殷瞻就踴躍欣忭具見悃誠因念蘆東鹽務節經恩施調劑以紓商力今翠華臨涖允宜再沛恩膏著將山東五十四五十五應完課銀三十六萬八千四百餘兩長蘆五十四年應完課銀五十七萬二千九百餘兩自本年奏銷後加恩分作八年帶徴俾商力益資饒裕以示朕行慶施惠有加無已之至意該部即遵諭行十二日駕駐泉林行宫賜長蘆商人等食十三日臣和珅等謹奏查節次聖駕臨幸曲阜俱恩賞衍聖公及四氏子孫緞匹銀兩等物謹開單進呈所有賞賚各物照向例遣內務府大臣偕禮部堂官於詩禮堂頒給謹奏賞衍聖公孔憲培大緞四匹八絲緞四匹銀鼠蟒袍一件銀鼠補褂一件賞五經博士二十一員每員蟒緞一件賞四氏子孫有職人員陪祀執事人員七十一員每員八絲緞一匹賞四氏子孫舉人三名每名銀六兩賞四氏子孫貢監生員一百三十一名每名銀三兩賞禮生樂舞生二百六十四員每名銀五錢賞孔氏族中老民四百二十七名每名銀五錢重銀牌一面賞孔氏佃户老民一百二十八名每名三錢重銀牌一面十四日奉上諭朕此次巡幸山東祗謁孔林恩施疊沛業已慶洽羣黎更念齊魯諸生比户絃歌近依聖里當此鑾輿臨涖允宜嘉會膠庠式敷化澤所有山東省本年入學名數大學著增額五名中學增額四名小學增額三名該學政其悉心搜録遴拔真才以副朕樂育人材至意十五日駕詣闕里文廟行釋奠禮載御製詩並恭聖德門是日賜衍聖公合族等食十六日駕詣孔林酹酒御製謁孔林酹酒庚戌一杯天地境萬載帝王師奠爵不禁淚得門那有其神蓍吉凶草直楷菀枯枝模法同終古奚論賜植時是日奉上諭朕此次巡幸山東祗謁孔林所有蹕路往來山東省承辦差務之文武大小各員宜沛恩施用昭慶澤著該撫查明咨部有罰俸住俸降級之案俱準其捐復其無此等罰俸案件者各加一級十八日奉上諭朕此次巡幸山東所有扈從官員人等俱令由陸路行走毋庸乘坐船隻以省船户等守候之勞現在隨用大小各船為數雖屬無多而水手人等當差出力亦宜體恤著仍照上屆巡幸山東之例於常值外每水手一名日增給銀二分俾得均沾實惠是日駕自濟寧州登安福艫御製登安福艫作庚戍奢望古稀望竟酬岱宗闕里禮躬修豫庚子七旬時即顒冀若蒙闕里天貺夀躋八帙必當躬詣岱宗以申謝悃兼觀民風雖自矢敬誠然不免為奢望兹來竟遂夙衷禮成回蹕誠非常厚幸也康疆八十叨天貺安福今朝發御舟戒滿鞏謙勉恆志吳江浙海憶從頭幸哉到處民親愛博施去聲非難肯靳留四月初八日駕駐栁墅行宫御製至栁墅行宫即事一律庚戌浮橋策馬過河濱河上行宫緑栁循臺館嫌看重去聲修葺商民豫祝夥排陳今嵗長蘆鹽商等以豫八旬大慶豫設排當并有樓臺點綴以申祝悃雖曰商衆設辦然商力豈非民力弗以為喜轉增弗懌恃以成事不説惟引為已愧而已既成不説愧於已適可修儀示逺人適安南阮光平遣謝恩價使黎伯璫等至天津即令於道旁馬前瞻覲降旨慰問並於次日宴賚以示優眷題壁舊辭何太似重霖如例皺眉頻是日賜隨駕王公大臣及安南國貢使黎伯璫吳為貴等食御製臨門賜食得句庚戌岱髙阜曲望符全今嵗八帙夀辰敬謁今岱宗此豫十數年來夙願仰蒙闕里昊貺竟克符望禮成旋蹕實深額慶信宿津門駐蹕便愁自登舟緣渴雨豫念切劭農每於課雨占晴心殷朝暮雖逰豫未嘗稍間昨自濟寧登安福艫即盻甘霖以滋宿麥而兩旬來尚未邀渥澤正顒渴望厭他祝帙閙喧天自東巡回蹕至津門衆商等情殷祝嘏點綴陳設衢歌巷舞以效豳雅稱觥之誼畿甸繁庶億兆喧闐鑒衆情之悅豫固所不禁然豫方延佇沛霖為民心切即此臨門食頃翹望雲彩卜度倣徨侍食臣僚奔走執役之人皆所親見即阡陌農民亦久聞而熟信者耳扈來百辟應頒賜遣謝陪臣命厠筵安南陪臣黎伯璫等昨已瞻覲將自此遣歸因令綴班與宴俾得仰見上國威儀具以知羣情愛戴今日雖當燕樂心實不懌恐逺人見而生畏命其能詩者和之足知豫憫農憂勤歸國流傳雖逺在陬澨亦當知豫愛民之意也雖聽聲歌心不懌漫疑臨樂底怦然初九日駕仍駐栁墅行宫賜長蘆商人等食初十日駕自天津回蹕御製天津起程回蹕之作庚戍東巡蕆事沐天恩豫庚子七旬時矢願得邀里兹昊貺至八旬正夀之年當敬叩岱宗闕幸東巡蕆禮諸事順成實仰蒙能言上蒼恩佑感激之深不喻也邇日愁心望雨煩祗以陪臣至瞻覲却聽商衆獻鋪敦商衆等以今嵗欣逢大慶巡蒞津門點綴排當歌舞以申祝悃本非豫之所喜因念安南遣謝陪臣黎伯璫適至瞻覲當有宴賚以示柔逺之意亦遂聽之但邇日望雨殷煩尤覺喧闐雜沓之可厭耳每聞歌管翻嫌閙乍喜歸帆漸逺喧不敢如前陳宿願將從子矣笑無言至乾隆六十年豫年八十有五即當歸政居寧夀宫以就頤養若能仰沐敢如天眷或躋九帙即精力尚強亦當另行商議故不昔嵗之復存奢望矣十五日駕回蹕至圓明園御製回蹕至御園疊戊申舊作韻庚戌春光早送付巡船登陸連朝望雨旋稍幸畿南尺半渥旋去聲愁京北寸餘傳十三日之雨畿南各報四五六寸不等惟京城以北祗有寸餘愁仍未解是以明早即親詣黑龍潭虔禱慙無調燮安民術惟有倣徨責已虔明曉龍潭親詣禱雱沱優賜救農田臣等欽惟我皇上本宅衷之勤恁備福履之康疆五十五年中屢沛省方之澤兹際八旬展慶東國言巡民以瞻就為殷吏以奉公為亟微特供頓儲偫不損纎毫之費且自郊圻以逹齊魯胥邀懋賞滂敷如雨膏之不私一物者然蓋察吏安民行慶施惠御製記謂皆人君本分之為而以臣民私意測之實不敢冀幸於分外而無不僥逾於分外者維時賜榖賜金賜秩賜舉賜幣賜食諸典並行而其間優老起廢惠逺恤商靡弗優沾愷澤臣等謹編入恩賚以志我皇上宣德布義為從來巡典所無而多祜之允綏益廣夀宇彌綸之慶則揚庥頌美豈班固崔駰輩東巡之頌所能仿佛萬一者與
