body:
  text: 歌頌十二萬夀九如闡福對工部尚書臣福長安嵗上章月在酉十有三日大吉祥之辰恭逄八十嵗聖夀大慶歡浹瀛禆慶彌髙厚百順為福萬古鮮偶先是中外臣民籲舉盛典上沖遜再三而弗受僉同申請益用悅茂嘉答諄殷詔可其奏於時寰宇之紳纓耆舊黃髮眉叟暨職貢之邦國棧航之裔胄喁喁于于望闕下而奔走風舉雲矞駢聚輻輳上乃於七月十四日錫宴避暑山莊之淡泊敬誠殿越十日熱河旋蹕諸蒙古回部生身人跽送於廣仁嶺右而朝鮮南掌安南諸國土司生畨人等逮西北各部落之扈從入都者先驅後乘􅛺軫合趨鱗賑殷阜臣以不文日扈屬車之九九麗矚洞觀目眩神瞀行至天閶之旁康馗之首見夫巖隱丈人談道文學屬國之使者下車聫襼逡巡前行揖珥筆大夫而問曰懿鑠哉聖人之福之大也几蘧炎黃荒逺遼邁自伊耆氏以來四千餘年萬祥億瑞圖史具載雖散見而迭出未足嫓今日之大備蒙聞德為福基􅞗應罔外聖人之德何以纍高積厚致斯龎禠之沛艾曠邃古而一會子大夫近侍禁衛日親幾要庶幾罄溟量測景繪振蟄壤之聞根擴井蟲之眼界誠歡誠忭願奉良誨大夫作而對曰傎哉問乎殆猶欲管窺昊穹錐指柔祇耳乾之易坤之簡皇極之體紛紛翼翼日燾冒遊衍乎其中莫能名其所以顧子含真抱淳殫思極軌僕久玷侍從幸依天咫敢不就所見聞略述愚恉夫聖人之德先敬天而勤民齋眀其心潔齊其身泰壇八觚南郊肇禋大報日至祈榖上辛常雩龍見必躬必親鳴雞求衣辨色御宸居九重之晬穆常慮周乎畇畇雨寸雪尺批章是詢有事祈禱荃宰為紃或偏隅之告歉必貸粟而賑均元會行慶滲漉重申是以察九鳸調四鱗月令正夏田功歌豳合殥絃之億兆熙熙然如享太牢而登春丈人曰大夫挈領提綱博我以皇道迪我以真聞願更乞奉若時憲之義揭太平之道真大夫曰參贊化育沕穆之精厥彰厥微名非常名仰廣運之不息元得一而常貞萬幾握符璣懸鑑平釐政親民冬繩夏衡帝車杓指中央運行南巡狩六自河迄瀛建塘甃石引溜刷清祖光宗烈興京盛京鑾輿四謁祭畢香升弓劍石馬肅然容聲攬津躔於析木秩岱望於云亭拜金絲之禮器瞻鐵佛之巖扃泝仙莊而進柴媕攻同而肄兵匪徒飾觚稜以逭暑陋仁夀與冷陘是以山靈效祉川后揚靈包星宿為襟帶絡松漠為金城如四時日月錯行代明不言而嵗功成文學曰善某知其大矣願子條舉件繫侔揣夫巍煥之流形焉大夫曰斟元培化文盛道光晨露湯詠緼瑟虞裳日排嵗課集曰宸章五采繢作八體毫翔石渠寶笈翠琬鐫芳五經為肴饌百史為笙簧輯要評鑑萃經顔堂纂職官之沿革辨聲韻之微茫仿荀朂之部分衰永樂之典藏搜遺籍於璧扃巖鐍給官札於天祿琳琅計䇿則三萬六千披幐則朱緑元黃其外若陪都王基天寧佛場金焦之麓橋竺之旁詔流傳於逢布乃並弆夫囊箱如奎星圜曲之麗天漢靡涯角而弗彰文學曰此詩書之教澤而未及禮樂之明昌也大夫曰則又頒禮器制圖式爵宗支修玉牒實録戰圖詒謀是敕建三雍之上儀臨圜橋之講席考中聲於一字播雅奏於三百補廣微之笙詩訂載堉之宫律簫韶復興岑華既斥采貞珉於鴻都排殘字於吉日娟娟籕文亭亭周碣辨半滿之梵音遵圖書而重譯是以祥嗈協和民庶闓懌儒館獻歌禮官惇莭如虞夏商之渾噩兼東西京之潤飾為文事之極則文學􅌓貽色駭唯唯側立使者前曰某等僻在遐裔氷瀛雪磧久矣仰聖武而讋栗請覼縷而申説大夫曰灝氣成物金事主西康居萬里逹乎渠犂谷量載馬屯迾鳴雞掃攙槍於井絡釁玉壘之鼓鼙淬蘭錡之步伐摧雪碉與雲梯黃圖凱唱紫閣名題蘭隴石峯隕蘀摶泥海人不憓風濤隔暌屢授策而易帥權遲速而應徯殱魁及黨芋田薯畦憺威稜於廓爾喀定洪教於三佛齊古之聰明睿智神武而不殺者有如是兮使者曰然則土宇販章之厚屏翰屬籍之盛可得而稽與大夫曰大漠之北青海之濆四十八部星布雲屯采勃律而産致探昆崚而源分遙遙戎索嶪嶪花門茸裘駝褐菉幣􅀈彬復有中山之裔東海之民魚鶼鳥鰈嵗見行人南極丹徼驃國歸仁瑤光之獸兹白之文西踰衛藏恆沙無垠銀函象牒護持轉輪撫交址之壤社憫黎伯之僮昏景風錫爵扶桑􅀈氛爰款關而入覲鄙代身之金人貢任樂以祝嘏請法服之章身藻扈詩作職貢圖陳衣冠俶詭不可殫論窮章亥之測笇曽莫知其涯津如北極之居所萬二千恆星拱衛而向辰使者竦然動客肅然正色曰此皆聖主柔逺之效應如草澤如春吾儕幸會極而近光猶滋液之駢轃不知中土耆庶又何如沐膏而戴恩大夫曰夀人夀世蕃釐延洪梨眉鮐背鶴髮鳩笻際五十年之國慶宴三千叟於廷中彤扉晝敞湑露春融豐貂文綺加禮優隆詔制科之兩試遴皓首而經窮或搴榮於桂譜或錫紱於逵鴻眷卿僚之耆艾許馳道以花驄嘉黃閣之領袖會聞喜之重逄春官入告天筆褒崇而且懋興黌舍釐正文風浮豔必黜清真居宗念詩書易禮春秋之五籍戒墨守而専攻仿黃初之課試闡紫陽之折𠂻科遞輪夫甲乙經兼洽乎大中爰開特榜廣額泮宫匪直拔十而得五期畯良之並庸魁芒爥野景緯昭穹如偓佺羡門之屬涉仙壺而下閬風其樂也雍容矧今兹際大慶之嘉會更錫福之滂釀三子者皆曰願子大夫一一敶之大夫曰天門詄蕩王路蕩平鴻禧無量鳯綍傳宣文階武格秩級一遷就新除而錫命俾寵誥於光前卿二以下愆尤畢湔丁租普免逋牒既㸐毋收租稅及爾佃田茨椽蔀屋益裕囷㕓肆眚宥赦欽恤民天髙年翟茀寒燈青氊鰥孤惸獨困躓顛連月展大官之米春給水衡之錢凡草野耆民老婦五代一堂登奏剡者數百家靡不旌門綽楔賚豫便蕃是以民不疵癘田無虸蝝跂行蠕動咸若秩然如造化之澤物不遺一類焉三子曰富哉大夫之言盛哉聖人之德蟠際燾載何能導美於萬一宜受福之綿綿至於億萬斯年大夫曰然而聖人猶乾乾不已麗密純懿保泰持盈含和吐氣敕時幾於朝常勵端平於羣吏甄育綿區陶埏庶彚浮曲河之榮光翔齋房之仙翅詔中外之封章戒勿言夫符瑞惟是法天時劭民事開延喜之華采姒書之義兆休徴於惟時厪五者之來備以八帙應八疇為嚮用之所自是曰八徴耄念之寶繼古希而刻璽立彛訓之敷言掞天藻而作記兹者桂序月盈椿華日麗堂開五代觴稱萬嵗共球駿龎月竁日際猶復惇節儉戒藻繢儲祉無疆申錫滋至千聖百王疇能擬議蓋聖人之德如天如地而福量亦隨以積纍者也於是三子者眉飛色舞扺足額手相謂曰吾儕戴天而不知髙履地而不知厚辱高論之發蒙窺至誠之悠久福德相因貞固純茂竭愚賤之聞知實編載所未有何幸生熙洽之朝厠簮笏之後向闕庭而九拜願我皇萬夀萬萬夀闢寶祚之洪庥汜元氣乎宇宙言竟三揖而退意欣欣如有獲其愛戴頌揚之誠不啻若是其口出臣少直禁廷涵濡帝則欲勃發以導揚正葵忱之洋溢適道聼而塗説謹述聞而托實如天保之九如覺喻巧而言拙敢拜獻乎彤墀惟大聖人之采擇萬夀恭紀七言律詩三十首謹序工部尚書臣金簡皇帝御極之五十五年嵗在庚戌秋八月辛酉恭逄聖夀八旬垓宇鬯禧耆庶臚頌邃皇以來圖牒罕儷矧乃乾符闡坤珍闢山盈川沖風循雲矞凡纓笏之士巖谷之叟臮夫東西南之國莫不欵塞來享躋堂稱觥天子俙然於念用嚮用之原德澤滲漉靡逺勿轃天人之間含真抱和此其篤祜延休雖億兆亰秭鳥能播笇而測哉臣以弇陋近𨽻禁籍蒙皇上教飬生成至今臣年七十幸遇此萬古未有之盛典竊如華封人之祝堯有不能已於言者謹次上下平韻成七言律詩三十首以獻八八籌添五五中祥風和氣萬方同健行體與羲爻叶敷錫疇因姒範通禆海有泉皆道酈瀛山無嶽不呼嵩古稀天子孜孜日又見星周斗柄東基福由來備九重敬勤心與旰宵容靈臺察鳸功成嵗輅木扶犁典劭農孝事郊壇仁事廟雨咨夏旱雪咨冬久徴悠逺誠無息普作寰中大化醲河海南天作紀雙六􅛍屢省浙緣江勢因南北分坍漲流釃清黃志簍椿雁堵從今廬井晏鯨波不獨澨隅降機宜指授神懷疊水國朝宗闓澤龎瀋遼左右肇豳岐展謁常殷繼序思樂府新題全韻體周原舊事土風詩桐枝雪枉封因紹葛本分榮秩有差謨烈五朝尊實録皇圗奕􅑤福多綏杓運中央式九圍帝車嵗嵗厪民依臺懷峯朗參雲鷲淀渚堤完鞏日畿岱畎宜春嗤漢檢霞莊夏凊載虞旗珠囊照灼瑤光下荃宰環流奉弗違天筆為章麗藻舒排吟日課萬機餘神明創解珠船獲根柢真詮學海儲上泝元音葛天闋旁通羣籍惠施車觀文久道爰成化不為詞華競子虛石渠故事詔文儒藝轄搜羅璧府腴盡許道山抄祕本肯令學港陋方偶桃萊栁丣讐岐説宗滙淵源總合趨聖教同文翻象載大千一覽護文殊正始中和邃古稽一聲一字五音齊詩歌操縵先風雅月律旋鐘應攝提譜按開元增美備圈訛載堉闢沉迷莖雲扶耒前無論虞軫祥嗈復旦兮文章六藝始根荄破碎紛綸後起乖世出相臺傳刻本帝因萃室錫名齋制科甲令兼程課輪試申重按次排經訓災畬崇翼教萬流涵泳聖人涯鴻都十石峙崔嵬篆古曽同吉日推籕史字原存約略歐陽集録費疑猜秦權足正莆田誤周雅重編獵鼓開若使昌黎生見此羲娥今日煥昭回遊藝何非茹道真畫禪書聖見精神銀􅗚刻向三希續繭紙翻騰八柱新松陛雲飛兼作繪蕊毫花盎便為春李家粉本雞雛飼一片如天曠蕩仁天弧讋栗掃欃雲至教雷霆武翊文白屋丁屯生計足金城戊尉地形分渠犁已拓伊循域蔥雪曽銘定逺勳回準悉歸燾宇內相將板楯化苑芹金川大小本同源僰道西行寨口繁吠犬心甘外燾幕連雞勢欲突籬籓碉樓挫險無堅壘槃瓠開疆有列屯科布索隆傳檄定鞮鞻凱樂在和門曼衍紅綃蜃市漫將軍橫海䇿材官旗常彪炳丹青閣里社搜除黑白九薯舍咸知懸耜樂花番亦效執殳歡時中聖算權遲速不獨神兵虎旅桓邊徼無端起觸蠻睿謨早已燭神姦星連海外占風角人自天西覲日顔一一妖氛揮霧市千千世界淨花鬘帝中帝釋佛中佛願以須彌祝夀山日南郡外有山川祇坐孱庸損國權節帥臨江仗蒼兕邊城洗瘴定朱鳶風雲阻絶形如此叔伯靡同勢已然帝謂厭黎因立阮廢興絶續總承天上服光榮珥漢貂叩關來赴會同遙春風璽册馳封粵暑驛籖符護度遼離紀作屏桑扈篤需恩嘉宴鹿蘋邀式微舊緒兼存恤世世簮纓尺五朝木邦化外彈丸拋謝罪歸誠志弗淆六詔山川徠纍譯卅年雨露保危巢斑雲香象其文蔚貝葉金絲厥貢包律吕從知聲教訖百蠻奚啻狀南交瞻天部落各分曹祝嘏歡騰望闕髙松漠宴開筵詐馬錦韉馱至道通獒稱觥願切歌三雅扈獵才嫺講六韜尉候直連青海外年年納賮到神皋逖矣人來海不波齊天樂上萬年歌尋橦豈止都虞國采玉休誇勃律河露犬紈牛圖菉幣庶車間馬頌卷阿自來瑞牒真希有六帝登三未足多沮漆綿綿瓞有瓜一堂五代盛爭誇江鱗送喜當春狩潢玉鍾靈炳夜華宇宙承流凡幾輩帝王備福古誰家奎章繩武垂書額世世雲仍詎有涯川嶽滂洋效祉長紛紛嘉瑞入封章瓊禾被野連雙穗瑶草當春見九光同氣産如周士半耆年書比絳人強彤庭宴上三千叟又領佺期介夀臧慶典難逄宙合并龎鴻溥鬯遍埏紘風清俗濯歸金鑑夏矩春規報玉衡元會朝正敷令甲夀星在嵗應由庚絲綸鳯口初銜出太史雲占五色明紫垣縟緯燭奎星甲乙科連繼丙丁儒館淵源先造士文風釐正首明經曲江再宴迎三夀黃閣耆英啓九齡特榜宏開賢路濶蒼牙含煦扇逵蓱田功夙夜民依切惟正輪蠲粒我蒸倉廯萬邦豐告屢􅝀茨寸壤嵗輸曽魚鱗舊牒全逋豁雁啄窮簷上釜登總自雨暘寒燠備康年明賜叶休徴官方澄敘握宸謀釐政親民簡厥修黜陟考如虞典肅循良書比漢廷優鵷行進秩加三錫鳯誥褒封逮九流豢飬思深卿月上湔除吏牘舊瑕尤星軺四出告山林迓福承釐祝佛心頒賚水衡榮翟茀貢名黌市廣青襟月麋扈粟豐享久春樹雞竿解宥深上界神仙齊翊衛歡音大地動雷吟堯襟舜抱劇沖涵珥筆無須第頌談延喜華開丹篆刻訓彛義取緑圖含康強逄吉孚繇兆正直剛柔配兩參好德端歸皇作極和甘玉燭四時覃上塞為停秋獮禮回鑾行慶答輿僉九天韶頀徠轅壤萬國共球集鰈鶼思浥玉盤仙掌渥福隨金粟月輪添丹幐記實宜流絢盛典臣慚槖筆兼身依天咫著朝衫眷舊蒙榮屢進銜寧夀宫基恢景福無量佛界侍香嚴乾強不息庥蕃晉益動旡疆效感咸小草願承椿算日如升獻頌意猶緘八旬萬夀盛典卷九十二
