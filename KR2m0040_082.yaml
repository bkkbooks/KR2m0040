front:
  text: 欽定四庫全書八旬萬夀盛典卷八十三
  hash: sha256:3e4128d79607ba7308738fb402fa602448baef36226a0834127b2022a6b243fb
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_082-1a, image: WYG0661/WYG0661-0096c.png}
body:
  text: 歌頌三萬夀恭擬跋御製八徴耄念之寶記一首大學士公臣阿桂臣聞帝王之政潔道樞者惟心揆化機者則惟理理經緯萬端而本原於帝縡故必人事協乎矩乃德與天符必德與天符乃馨香感福祿備焉洪範一篇和同於天人之際蓋以此也我皇上斟元陳樞總持六幕軒銘堯誡日慎一日於今五十有五載兹逢八旬萬夀之期更特鐫八徴耄念之寶親製記文以昭慎憲省成之淵衷咸謂年彌髙德彌劭精明強固將與方儀圓象同悠久無疆臣跽讀而繹思之我皇上得久照緝熙光明前特命於經筵歌抑戒以著耄而勤學之思今嵗進講周易跽聆御論於乾坤大象闡自勉自然之義大聖人協撰乾元健行不息臣工固莫不仰窺之姬公陳訓稱無逸永年武王著銘曰敬慎必恭恭則夀跽讀御製無逸論五福五代堂記大聖人綿算延洪康強逢吉臣工亦莫不頌祝之然念之云者有實用焉非徒曰心之精神謂之聖也徴之云者有顯證焉非徒以讖緯術數推衍禨祥也蓋洛書之數一曰五行明天道二曰五事明人事八曰庶徴明天之通乎人九曰五福明人之極乎天而居中扼要則歸本五位之皇極鄭康成孔安國皆曰皇者大也極者中也大中者無過不及之謂也權衡在宥規矩從心乃以役使羣動萬化咸宜焉舜曰執中湯曰建中胥是志也臣仰荷聖渥通籍已五十五年揚厯中外洊登禁近得日瞻穆穆之光雖識見檮昧未足知聖化之萬一然步躔之所測究勝握管之所窺伏見我皇上提挈天綱經綸百度與時張弛消息變通如井田封建車戰斷不可行於後世者皆著論以闢其謬而禮樂刑政師古之意以權今之宜與二帝三王心法治法皆若合符節我皇上念典於學茹涵百代抉經之心執聖之權御製詩五集陶鑄雅頌御製文二集含吐典謨自天苞地符未闡斯祕而義關勸戒弗尚華詞明著於聖諭欽定四庫全書函溢六千卷逾八萬極古今圖籍之富而權衡曲當衮鉞炳如不容一非聖人語又極義例之謹嚴我皇上神武天鍚威弧震疊凝神九天之上而制勝萬里之外龍沙䓤雪三十六國指顧蕩平冉駹兩國吐畨九姓古來號為天險者旗鏠所指咸籍場艾旃鮫室蜃窟大瀛隔越亦長鯨就剪海不揚波然逆則討服則舍茍尉他稽首康莋陳詩則義取止戈綏柔曲逮兩階干羽原與青邱夔鼓稱物以施我皇上論辦官材甄别流品仿虞典之三考侔周京之六計滋蘭刈艾披沙㨂金日月貞明物無遁影然菁莪樂育茅茹彚征貢舉增科學校擴額四門大闢俊民用章至題特奏之名標五老之榜莫不彈冠結綬頌夀考作人我皇上綜核邦計示儉防奢釐剔侵漁杜絶冒濫持籌司會出納有經然民生國計所關則不言撙節統計御極以來蠲租賦者不知幾千百萬免秸銍者不知幾千百萬增賑恤者不知幾千百萬貸鹽策蘆課者不知幾千百萬築河渠城垣者不知幾千百萬至搜軍實修武備一嵗加餉三百萬更久久無極又何嘗纎毫靳惜歟我皇上明察庶物矜慎祥刑稂莠剪而嘉禾榮雷霆鼓而勾萌動辟以止辟用弼教協中若情異怙終則恩宏湯網自金雞肆眚以外爽鳩讞牘嵗有矜疑載秋官之籍者蓋不能縷數焉凡兹聖政皆秉大中蓋照臨如鑒之明故萬事萬物之情具燭其隱裁制如衡之凖故不偏不倚之節各適其宜箕子所謂皇極者此也皇上所以念用徴者亦此也臣備員樞密內朝燕見日聆玉音仰識睿慮周詳或圖度於幾先或防微於事後無不窮人情事勢之微而權以天理其緩急輕重之機諸臣所不能驟喻者每委曲宣示恍然開悟如仰觀三光而臣所意喻心領欲贊頌而無以形容者尤在身經之數事夫倐忽萬變莫過於兵皇上征伊犂討回部定金川以及秦隴諸役臣並執殳以從其間山川險阻隨地殊形進退攻守因時異勢臣身任戎行尚持疑弗審皇上發縱指示先機決勝千里外如指諸掌軒皇之親臨涿野不是過也曼衍無定莫過於水臣嘗奉命數視洪河一閲大江於橫流之所衝擊孰險孰夷孰築孰濬渺無涯涘猝不得端倪皇上揆度形勢指示機宜驗若符劵尅期順軌神禹之躬乘四載亦不是過也至情偽萬狀無過訟庭秋官案牘臣所總掌雖與司讞諸臣研核情詞參稽律令罔敢弗詳弗慎然輕重出入一經皇上酌裁必批導窽會辨析毫釐每承訓誨皆曠若發蒙非造化在手心矩不踰能若是順應咸宜歟非用志不分恆久無息能如是精義入神歟然則臣所謂八徴之念本於皇極者確無疑矣臣因經義而推之是訓是行以近天子之光曰天子作民父母以為天下王皇極之文也今九域之內方趾圓顱雲合鱗萃同額手而祝純嘏非其驗乎無偏無黨王道蕩蕩無黨無偏王道平平無反無側王道正直無有作好遵王之道無有作惡遵王之路會其有極歸其有極皇極之文也今炎海雪山之外譯使奉琛名王詣闕同獻萬年之觥為開闢以來所未聞又非其驗乎然則所謂皇建其有極斂時五福用敷錫厥庶民維時厥庶民于汝極錫汝保極亦必驗可知矣億萬長齡可據經文為劵即可據御製為劵彼伏勝董仲舒劉向劉歆之流附會五行烏足知聖人用中之精義哉萬夀頌二十四章謹序大學士臣嵇璜臣聞京垓演䇿天皇開萬嵗之祥甲子成編黃帝引百齡之慶衢壤效歌於唐代祉集三多星雲呈瑞於虞廷歡聫八伯周稚則矢音保定箕疇則錫貺康強唯太和之元氣長調斯有道之貞符協應欽惟我皇上福基自德夀本於仁統貫三才博厚髙明悠久紀綱八極剛健中正粹精挈斗柄以㪺元澤普衢尊而廣設握珠囊以燭逺光涵軒鏡而長懸仰惟帝祚之延洪疊見天庥之申錫恭遇上章紀嵗少皥司辰慶一堂五世之昌期屆萬夀八旬之盛會虹流電繞萃炳煥之祥符鳯舞麟遊應升平之繁祉瑤樞夜朗映南極以呈輝金闕辰開接東瀛而煥采德克明而益劭誠不息而彌徴春八千秋八千八八肇循環之算天數五地數五五五叶圖位之中運會世胥統於元位祿名總賅以夀爾乃絲綸疊布膏雨覃敷四弛鏐租閲三年而必遍再蠲玉粒普八省而咸周秉圭以禮東方儀重乎泥金檢玉置譯而徠南服誠孚乎納賮輸琛百僚邀晉級之榮畀崇階於內外多士列翹材之選聨恩榜於春秋賚幣行糜台耉均叨愷惠賜詩豫秩耆才並沐殊施推三宥之仁典特昭夫欽恤展百神之祀福倍介於昭明斯則慶洽天人情通上下弧南辰北偕遊熙皥之天卿月民星競頌光華之旦所以八方會極九有輸忱山聞祝嘏之三呼水納朝宗之萬𣲖苑綴長春之樹景燦仙壺家分太極之泉祥凝寶甕三千叟眉梨髮秀飫熙朝長飬之恩二百户子繼孫繩羅盛世蕃滋之象方趾圓顱之輩奔走偕來東鶼西鰈之區尊親共戴升如日恆如月呈糾縵於慶霄暢者垓􅑴者埏合軒鼚於麗字駢帝夏皇春之紀集盛于斯溯龍編鳯籀以來生民未有用宜昭登協運易簡同規綿吉算於億千萬齡薦臻福應總上儀於七十二帝懋迪嘉祥臣幸際昌辰欣逢盛典治世之民多夀喜長趨禁近之班聖人之德如天愧莫贊鋪張之筆藉申葵向敬獻蕪詞泝醲化而闡懿綱未工藻繪仰夀山而瞻福海曷罄揄揚謹拜手而頌曰皇建有極久道化成聖神文武光大髙明五元十夀後甲先庚德邁振古百福允升其一惟天行健惟聖法天淯陽萬品紘覆八埏巍巍蕩蕩持樞執圜聿懷昊貺昭事日虔其二南郊北郊蠲潔精禋既匡既敕必躬必親圭玉藻采寅餞寅賔留俞合莫至諴感神其三前寧榖詒昭哉維則於皇紹基作求世德謨烈顯承覲揚丕赫鑒於成憲祗事無斁其四一日萬幾我皇勤政執兩用中不絿不競作所無逸書屏是鏡莊敬日強以承天慶其五命時百僚大小法廉若金在範若馭在銜八聨八枋詢謀惟僉欽哉有位萬民是瞻其六帝眷下民天燾父怙宵旰疇咨三農九土曰暘而暘曰雨而雨迄用康年孔修六府其七民庶且富加惠無窮再蠲全漕四豁正供匪惟正供積逋與同百千萬億南北西東其八匪惟積逋渥恩稠疊若邉有屯若軍有帖若苖有算若鹺有策概豫實除俾安生業其九學曰辟雍厥惟周制五百餘年逮今肇備大昕帝臨秩禮濟濟聽講圜橋口愈心醉其十藹藹多士占畢是勤恩榜疊舉髦才悉掄泰占彚吉觀筮利賔載歌芃朴聖夀作人其十一黃髮皤皤昌時人瑞文綺載加精鏐廣賜亦有髦才抒文就試畀爾頭銜用嘉爾志其十二惟皇篤祜繁衍天潢璿源孕彩日幹騰芳振振繞膝五世一堂上稽書契邁羲軒黃其十三爛兮縵兮富有天章典謨雅頌玉質金相精理至教垂示無疆珍荷賜書燭霄榮光其十四聖學淵如討源竟委糾先儒謬闡往聖旨獵碣車攻岐陽鼎峙籕篆摩鎸用光萬紀其十五聖人大寶念用八徴乾坤麗象河洛效能五者來備庶績其凝于時保之月益嵗增其十六文治甄陶鴻鈞大冶梧棲于岡蘋食于野頒四庫書廣萬間厦吉士濯磨宏逹大雅其十七二月東巡省方問俗升馨岱宗肅儀齋遫遂登孔堂心源遙續為民迓釐為道重學其十八於赫化光靡逺弗協西東被漸北南諧燮小邦味喁大邦震讋既畏既懷擴版恢牒其十九憬彼院藩南交新宅懷我好音叩關搏額稟朔於前繼以身役祝釐錫福世為屬國其二十朱波內面越裳偕來維廓爾喀珍香表懷亦有生畨越海踰臺會於闕下王會充陪其二十昔者王會羈縻是圖今者王會不戒而孚矧逢大慶雲集嵩呼羣星庶星拱宸北樞其二十二日躔夀星臚歡九宇連襼歌衢春臺和煦軒乎其舞鼚乎其鼓願萬萬嵗為萬國主其二十三惟皇敬德久孚上天埏泝垓鬯禮昭樂宣宜民宜入道全福全天錫皇帝億萬斯年其二十四八旬萬夀盛典卷八十三
