  text: 欽定四庫全書八旬萬夀盛典卷七十三恩賚十二
  hash: sha256:046d78606b6131345da59a2d54b91fe24d1bc987d51072c074743c87baf1366c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_073-1a, image: WYG0660/WYG0660-0872a.png}
body:
  text: 臣等謹案燕以示慈惠詩小雅鹿鳴以下五章皆君燕臣之詞而臣子祝報之忱必以詒福遍德為善頌至如南山蓼蕭諸什每歌夀豈並譽德音蒸蒸然衎衎然願承嵗飫時宴之樂誠澤及四海慶流千載之嘉會也我皇上福祿來成上下交泰斟元氣而頤太和不啻堯樽禹膳之普渥矣欣兹介齡八表恩溢寰宇當元日令辰晨參晝會一時贊拜稱萬嵗肆筵合樂禮洽慶融無有小大內外之臣咸得蹈舞班行捧觴上夀需雲之吉湛露之濃盛矣溥矣莫與京矣越若秋七月獻祝山莊迭開蝦宴以待御園布幄同樂欣誾綵舞娛奉于乾清鴻藻鋪陳於寧夀極溟杯嶽豆之列無以喻聖渥之髙深蓋視漢唐酺樂之會布德猶未及旬即豳風公堂兕觥之舉亦不過一國臣民藉抒忠愛而已豈如我皇上五代臚歡萬方均賜堂簾喜起胥蒙俶祉而忭鴻施益惟申籲於無疆之床也哉乾隆五十五年正月初一日皇上御太和殿賜內外王貝勒貝子公台吉塔布囊伯克及文武大小官員朝鮮琉球暹羅廓爾喀四國使臣等筵宴御製元正太和殿賜宴紀事二律庚戌晨參午會慶元正幸復浹旬一舉行庚午豫年四旬始始於元正賜宴太和殿以後每至十年禮臣稽典先期奉請自庚子至今嵗庚戌又十閲年慶登八帙世際重熙元正朝會依例舉行用洽羣情實昭景貺四十肇臻八成十午庚旋值戍臨庚帝蒙天眷為獨厚夕惕朝乾所戒盈和共百工承鍚羡難斯罷也矯豫情十五推年五十逄豫年二十五嵗踐祚自後紀年逄五則為正夀紀年遇十春秋又恰逄五五與十皆成數而今嵗五十五年又值天地之數自然會合循環相望未可思議昊倉眷祐豫若有獨厚者然欽膺天數惠偏鐘歸誠適值正平聲而賀廓爾喀在西藏之西萬里歸誠適于嵗內嘉平望到間京元正亦隨班末行禮得瞻朝會典儀自必倍加欣幸祝夀兼知貢以重暹羅本年值例貢之期專遣使臣並賫萬夀貢品至朝鮮嵗有慶祝例貢今嵗因八旬萬夀復增貢一分非重其物嘉其愛戴之忱可謂明於大義玉爵屠蘇百禮洽金猊瑞靄萬祥濃撫時幸值承平會泰九三思凛益恭是日卯時內外王貝勒貝子公台吉塔布囊伯克克等俱朝服在太和門齊集文武大臣有頂帶官員俱朝服暨朝鮮琉球暹羅廊爾喀來使在午門外齊集鑾儀衛設法駕鹵簿於太和殿前至午門外樂部和聲署設中和韶樂於太和殿簷下設丹陛大樂於太和門內東西兩旁俱北向領侍衛內大臣禮部理藩院內務府堂官共視設席內務府尚膳正內管領預設皇上御宴桌於寶座前設黃涼棚反坫於丹陛御道南正中設內外王公及一二品王公大臣台吉塔布囊伯克等席於殿內東西各七行均東西相向寶座左右設後扈大臣席少後僉向寶座前左右設前引大臣席東西相向又西設起居注日講官席均僉向殿門外西簷下設都察院堂官席東向東簷下設理藩院堂官席西向丹陛下設二品以上諸世爵暨侍衛暨三品以下文武各官外國來使等席左右各三行東西相向左翼又東設喜起舞大臣席西向禮部帶慶隆舞大臣一員席於黃涼棚之左又帶慶隆舞大臣一員及內務府大臣席於黃涼棚之右陳設畢鴻臚寺官理藩院官引內外王以下文武大小官員俱入內外王貝勒貝子公在丹陛排立台吉塔布囊伯克文武大臣及大小官員外國來使在丹墀內排立已刻禮部堂官奏筵宴齊備請皇上升太和殿午門鳴鐘鼓中和韶樂作奏元平之章皇上御太和殿升寶座樂止鑾儀衛官贊鳴鞭階下三鳴鞭鴻臚寺官理藩院官引內外王貝勒貝子公並一二品文武大臣以及台吉塔布囊伯克等在殿內按翼依次各於本位行一叩禮坐引二品以上世爵並侍衛及三品以下各官在丹陛上各於本位行一叩禮坐引朝鮮等國進貢使臣於右翼班末行一叩禮坐護軍恭領尚膳正內管領等恭進宴桌於皇上御前退各歸班立尚茶正進茶丹陛清樂奏海宇升平日之章皇上進茶王以下文武大小官員各於本位跪行一叩禮茶畢仍坐侍衛及內務府官員等分賜王貝勒貝子公大臣官員外國來使茶俱就位次行一叩禮飲畢復行一叩禮樂止展席羃掌儀司官入黃羃內由反坫上一員奉壺一員奉爵一員執金巵以次進至殿中門閾外之左西面立丹陛清樂作奏玉殿雲開之章進爵大臣離席釋補服王以下皆興進爵大臣進前跪王以下咸於坐次跪掌儀司官舉壺實酒於爵由中門入西面跪授爵興退進爵大臣奉爵興由中陛升至御前當右北面跪恭進皇上酒興由右陛下至原跪處行一叩禮王以下俱隨行一叩禮進爵大臣興由右陛升跪接爵仍由中陛下殿奏蒙古樂曲次掌儀司官引朝鮮斛斗伎人回部伎人金川畨子畨童等陳百戲畢俱退內外王等以下公以上台吉塔布囊伯克文武大臣及各官員外國來使各於坐次行一跪三叩禮丹陛大樂作奏慶平之章鑾儀衛官贊鳴鞭陛下三鳴鞭中和韶樂作奏和平之章皇上還宫樂止衆皆出禮成臣等謹案元正朝會賀祉開筵自我皇上四旬大慶肇舉斯典閲庚辰庚寅庚子俱循舊例本年元旦載闡上儀際雲日之呈祥集冠裳而式序時也履端布惠康爵普斟允百禮之具洽焉逺至重譯逺人四瀛賀介亦獲趨附末班觀儀有秩尤伊古未有之盛臣等遍沃恩膏備瞻鴻典欣幸莫能名言蓋從兹夀稱春斚慶佇秋弧循次類舉將京垓億兆不能紀數矣秋七月駕駐避暑山莊初九日張樂為始內外王大臣等咸賜入坐每日坐次俱載本賞賜服食器皿諸珍品分門賞賚十一日賜王大臣蒙古王公哈密汗土爾扈特都爾伯特哈薩克來使安南國王緬甸南掌國陪金川土司臺灣生畨等入坐十四日御淡泊敬誠殿賜王大臣蒙古王公都爾伯特哈密汗哈薩克來使安南國王緬甸南掌國陪臣金川土司臺灣生畨等一百七十一人筵宴晚並賜萬樹園觀煙火御製山莊錫宴祝嘏各外藩即事庚戌八旬夀亦世常傳慙愧稱釐內外駢六帝中間三合古自漢以來帝王登古稀者惟漢武帝梁武帝唐明皇宋髙宗元世祖明太祖六帝其中惟梁武帝宋髙宗元世祖年登八十而三帝之中惟元世祖可稱賢主然亦未能如豫之五代一堂詳見八徴耄念之寶記一堂五代獨蒙天何修而得誠惕若所遇不期審偶然益慎孜孜待歸政祗餘五年然適百里者半九十正是此時不敢不勉又不敢自必或當頥老飬餘年山莊皇祖此柔遐無減提封實有加綏藩皇祖締搆山莊為惠逺之地豫仰承川近前烈自西陲底定拓地二萬餘里既又平定兩金年緬甸及廓爾喀諸國亦先後歸化且安南國王親身祝嘏東西朔南會為一家提封式廓實為亘古所無豫惟益凛鞏謙以敬答佑貺耳屢舉華筵欽憶烈近臨神御默應嘉南瀛北漠通諸國西藏東麗會一家消息盈虛理豈爽益謙損滿鑒寧賖是日皇上手賜巵酒者二十三人阮光平貢格喇布坦旺扎爾多爾濟拉旺多爾濟車登多爾濟齊旺多爾濟策林納木扎勒齊巴克多爾濟策林烏巴什巴圖滿珠巴咱爾喇什端羅布喇旺拉布坦雲端多爾濟舍楞納旺索諾木索諾木巴爾珠爾濟克默特伊什德勒克烏巴什桑濟扎爾沙拉扣肯卓爾齊庫庫岱十七日十九日二十日賜入坐如前臣等伏見是年敷天臚慶雲集祝釐西北諸藩如額魯特霍碩特都爾伯特土爾扈特烏梁海哈薩克及各回城伯克等皆先期踵至來與王會皇上垂念生身者多即於山莊宴賚其東南諸國如安南國王阮光平及朝鮮緬甸南掌各國使臣金川臺灣生畨亦相繼羅典屬因於十四日特舉華筵一體敷惠越日命迤北諸部歸遊牧蓋悉遵皇祖時綏藩舊典也皇上撫兹大順猶惕小康臣等載繹御詩益欽仰顯承志切福畀攸同而來朝錫豫視昔大蒙太平空同丹穴以為四極者未底斯盛至若蹌舞之翩聨魚龍之曼衍闐沓殷軫逹於京師真耳所未聞目所未覩之鴻慶矣是月三十日皇上回蹕至圓明園八月初一日命於同樂園張樂為始臣和珅謹奏為奏聞事八月初一日同樂園開戲看守之王大臣額駙侍衛軍機大臣及安南國王回子畨子各國來使等俱擬長班進內其餘王大臣蒙古王公外省大臣等分為兩班每分三十餘人更換入內並常入內者每日約共一百二十餘人繕寫紅緑頭牌二分進呈御覽為此請旨謹奏十二日皇上進大內於重華宫張樂十三日慶萬萬夀御乾清宫家宴皇子皇孫曽孫元孫以次舞綵稱慶禮成仍命張樂於寧夀宫之閲是樓御製乾清宫家宴得句庚戌質明慶賀聨時宴風日晴和天錫禨著論近慙四之得位祿名夀原於大德豫荷躋天祖眷佑幸得夀八旬自視祗覺欿然惟有益凛萬幾以答嘉貺近著四得論申明其義敕懷益凛萬惟幾八旬開帙春秋永五代同堂今古稀帝王五代同堂者史牒未聞今日正夀家宴座中五代臚歡實為非常鴻慶然亦不敢蕼然自足也敬識滿謙招受除曰欣不及惕依依臣等欽惟我皇上祉備三多前此增題五福五代堂已占初祜開先行衍來晜仍雲之祝上年十一月以新嵗為八旬正夀諸皇子稟承家法孝道克循特命進封親王貝勒崇示恩禮兹者鴻慶屆期爰錫家宴萃雅瓞風麟之繁盛繞膝承歡稱觴舞綵奉天容之春晬誠非常隆典也恭繹御什惟凛勑幾之懷鞏謙受之福顧兹慶洽天宗益欽純佑則又增祥萬葉茂算億齡之本矣其綵舞製詞譜入樂歌分載典禮門十六日駕蒞圓明園二十日御正大光明殿賜王以下滿漢文武大臣蒙古回部王公土爾扈特來使安南國王朝鮮安南緬甸南掌各陪臣金川土司臺灣生畨及兩淮浙江長蘆商人等二百二十三人筵宴御製賜宴內外藩王文武諸臣即席成什六韻庚戌祝釐雖是衆誠申天恩諸事蕆豫仰沐中旬天恩夀登八帙固深感幸而自七月於山莊即舉行慶典錫宴外藩及旋京後由御園往還宫禁中間御殿受賀宴賚駢蕃並中外臣民夾道臚歡舞綵屆時俱值風日晴和衆情欣洽尤徵益感上蒼篤愛賜貺彰明凝承之下能不益畏常勵惕乾之意耶益因時敘一心寅諸巡撫命還省畢巡撫中來京祝釐者屢經召見賜宴因念地方緊要於十五日諭遣各回本任各布按歸厯陛陳其有巡撫未來而布按來京者蓋數十人亦即於十六十七兩日普行召見訓諭並各提鎮皆面諭令其各歸安惠萬民訓外吏晴和今日宴朝臣承筐是用將百辟勞去聲酒亦惟行一巡因便瀛藩分散遣今早錫宴禮成後念蒙古王公諸回部及朝鮮安南緬甸南掌各陪臣並四川臺灣諸畨來此已經逾月即於宴次令其各回本部所嘉戀闕意猶諄諸藩及各陪臣畨衆人等月餘以來扈隨瞻就恩誼交孚兹當還階班舞依依不舍之意發自中誠逹於顔面尤堪嘉悅內務府等衙門謹奏為筵宴事本月二十日正大光明殿恩賞筵宴是日陳中和韶樂於殿簷兩傍陳丹陛於出入賢良門內臣等公同看視預設皇上御宴桌於寶座前隨桌列於兩傍賞賜物件在殿前搭黃棚陳設坫桌金玉器皿在出入賢良門下陳設開殿上閣扇宗室王公蒙古王貝勒貝子公回子王公安南國王及朝鮮安南緬甸南掌使臣土爾扈特來使土司畨子京城文武滿漢大臣衍聖公外省提督巡撫等俱各按次入坐御前乾清門侍衛將儀仗陳立於御座傍屆時奏請皇上御正大光明殿奏樂皇上升座樂止衆行一叩禮坐侍衛等進大宴桌奏樂尚茶正詣皇上前進茶衆俱在坐次一叩茶畢侍衛等分賜衆等茶樂止皇上前大宴桌撤黃袱掌儀司官髙舉壺爵由中路進奏樂衆皆立執壺爵官員上殿階在門外東翼向西立斟酒獻爵大臣離席釋補服向上跪接酒進前跪敬獻皇上酒行一叩禮獻爵大臣進前接爵下仍接行一叩禮飲畢仍一叩服補服爵大臣跪接行一叩禮飲畢仍一叩服補服入班坐衆皆坐執壺爵官員退皇上進宴尚膳正等舉肉饌進並分賜兩傍內管領等進酒桌將次手賜酒時侍衛等進酒管筵大臣立視侍衛等遞衆人酒一巡衆皆行一叩禮飲畢再行一叩禮是時什榜等進前奏曲善撲等按次進前演撲各色承應人等陳百戲畢撤宴桌衆皆在坐次一跪三叩首奏樂皇上還宫樂止衆皆出再入宴王公大臣侍衛執事官等俱穿蟒𫀆補服謹將宴圖一併進呈謹奏是日皇上手賜巵酒者三十九人睿親王莊親王怡親王阮光平諴郡王克勤郡王貢格喇布坦旺扎爾多爾濟巴圖滿珠巴咱爾拉旺多爾濟旺沁班巴爾拉旺喇布坦索諾木巴爾珠爾桑濟扎爾雲端多爾濟納斡逹爾濟額爾德錫爾沙拉扣肯邁哈默特鄂三阿桂和珅嵇璜王杰福康安海蘭察彭元瑞董誥孔憲昭朝鮮陪臣二緬甸陪臣二南掌陪臣三金川土司二臣等謹案燕喜受祉謂天子以燕禮洽臣下而受福者孔多焉如漢儀之正會止饗近僚唐典之千秋侈頒令甲未足以光國慶而鬯鴻施矣欽惟我皇上勵旰食之恆勤酌衢尊而普被茂登耋夀共戴天長自元日以逮正慶之月疊舉嘉筵歡飫中外法饌雲漿之賜華鐙廣樂之陳莫不醉飽太平逺諧愈暢矧以聖情寫豫式燕又綏御詩五萬中無一言及酒而手巵之逮羣下異數頻施彌恩周而誼洽斯時灑如肅受忭荷龍光用蘄綽綰萬年允亘古未逢之慶夫豈特醹醴酌斗引翼維祺遂足以彰介眉之盛典也乎
