front:
  text: 欽定四庫全書八旬萬夀盛典卷六聖德二敬德三皇上以夀登八旬
  hash: sha256:ea74ffe7f3f32e210e1ad019647cde4549124173ba606ad0abd98e16fffb0f30
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_006-1a, image: WYG0660/WYG0660-0093c.png}
body:
  text: 中祀親祭一周乾隆五十四年躬詣先農壇行禮御製耕藉日恭祭先農壇禮成述事己酉草七承明祀五十四年之間已親祀草七次八旬近次年及茲能執禮於是盡心虔年近八旬欲于今後年間凡自後即可依例遣官詳見祭中祀皆親祭一周厯代帝王廟詩識語興榖功垂古綏豐惠助天壇成逮觀瘞欲退意卷然乾隆五十五年皇上親詣朝日壇夕月壇行禮御製仲春朝日壇禮成述事庚戌天恩八旬夀中祀蕆躬親豫幸夀登八帙身體康健可符躬中祀親祭一周之願茲仲春朝日壇祀禮成仰荷為獨天恩洵厚捧璧疏一紀以朝日壇向用赤璋考周禮赤璋禮南方非以祀日鄭注云半圭為璋制亦不符又周禮玉人圭璧五寸以祀日為禮器圗時詳加考定朝日壇用赤璧既符古制冀泱神歆升薌當仲春無私能久照有赫總宣仁觀燎禮成退惓然心倍寅御製中秋日夕月壇禮成述事庚戌中秋節恰秋分值平秋西成曲憶頻中祀幸能行以遍自去年春以近八旬敬願於是中祀皆親祭一周以盡為君之職以於祀帝王廟夕先農壇能朝日壇成文廟皆已親茲並月壇亦躬祭禮實深欽幸一心寧敢懈於寅徒因戎詰疏親詣按會典凡行中祀於即位後皆親詣禮一次嗣後俱遣官恭代此定例也四夕月壇之祭豫自踐阼過草七月即吉後於乾隆三兩年曾躬親行禮六年以後每嵗秋獮木蘭遂依例遣官至十三年又親祭一次及今嵗禮成計凡四次既以正夀俯順衆情還宫行慶恰值秋分願西壇蕆事得遂豫何中祀一周之感荷神祐當為如茲用八旬蕆六禋樂奏保光成禮退送光神樂歌保之章回瞻不盡意猶諄乾隆五十四年皇上親詣厯代帝王廟行禮御製季春祭厯代帝王廟禮成述事己酉恭承祖訓示千古增入廟曽躬祭臨康熙六十一年延臣遵奉百四皇祖諭旨議增厯代帝王廟祀一十三位爾時議者不能仰體則闌聖意且疏奏在後五大事前數日討論多疏如漢入桓靈而於前代並未議及出入頗覺不倫豫於甲辰嵗閲大清通禮見崇祀位號弗愜於懷乃敕大學士九卿等更議增祀晉元帝以來二十五帝而於桓靈則徹出之以彰千秋公論次年仲春入祀神主於廟因即躬禮告虔用申妥侑乙已至今三載閲季春將事一心忱述之七字義斯著記以長萹意更深乙巳禮成述事一律既已詳著增祀之義復念此入廟與不入廟之分儼寓旌列彰痺之意我後世子子孫孫祈然而天永命將以綿萬祀無疆之庥胥當憬然而思惕懼因更為記一篇其所以凛難諶之戒者意更深矣五十四年親祀七及能執禮致豫欽會典載中祀皆遣官厯代帝王廟等是也惟始即位應一親行餘皆候旨朕凡親行者六次矣念明年即八旬夙願於致政以前郊廟大祀朂必躬親其能與否敬俟天貺若中祀則應依例遣官欲於今後年間及此身體尚健於凡中祀皆親祭一周以盡負扆抱蜀之職用識緣起如右乾隆五十五年二月上丁皇上親祭文廟三月聖駕東巡詣闕里釋奠御製仲春丁祭至聖先師禮成述事庚戌挈壺宣夜告時良載奠椒芹禮素王中祀八旬躬致敬昨年以夀將八旬擬歸政前凡中祀郊廟大祀嵗仍躬親至之例應遣官者亦欲親祭一周以盡豫職是以去春於先農壇厯代帝王廟皆已躬祭成禮茲值文廟丁祭之期自當親詣釋奠用符夙願幼攻老朂志彌長辟雍重建曾憑席辟雍為天子之學元明以來未備其制癸卯春於太學彛倫堂前詳稽古制創建圜水甲辰冬告竣遂於乙巳上丁躬詣薦歆並親臨講席以致寅恭而光典禮闕里將臨祗面牆今嵗東巡當仍詣承闕里致虔以深景仰而數十年欽至教返之躬行蒞政猶覺未敢自信耳踐阼承天五十五君師兼責愧難當御製釋奠禮成有作庚戌禮成釋奠暇餘幾周視宫牆慢駕歸禮成後於彛倫堂用膳視事因周覽廟學以志徘徊依戀之忱久甃圜橋泓一沼古辟雍在郊外或引水為之今建於廟右彛倫堂前其地乏水因開四井以供汲用所為復古而不泥古也今過之見甃石鱗次清流益尺澄涵淳徹具有風水成文之致新刊十鼓列前扉近以周宣王石鼓所存三百十字排次成什即命亦刻十鼓置戟門南左右今已觀成詳見前所製序胥關重道崇文舉更識務鮮上聲實非望不入經七十載豫自六嵗讀書至今七十四載舉成數也瞻欲去尚依依御製三月望日釋奠先師禮成述事庚戌為君要事祭為先中祀躬親詣欲全風願歸政以前於二年郊欲於廟大祀嵗必躬親而一內中祀之例應遣官者亦躬行一次以盡為君之職八度茲來八旬逮自戊辰以來詣闕里釋奠旬先師及今而八豫亦夀躋八鴻貺優隆實為厚幸奠芹昨過奠箕連啓蹕前二日正值春仲上丁巳親詣祀文廟行禮茲至意闕里再舉釋奠之儀亦中必視祭一周之也生民未有道垂世宇宙以來德贊天六嵗一衷幸蕆禮宫牆臨别意拳然臣等謹按會典開載凡過中祀致祭自始即位一親行餘並遣官恭代我皇上慎重明禋禮隆咸秩備集長年之貺允符夙願之寅爰於例應遣官之祀一二年間具蕆崇儀用光令典蓋惟馨香至德無往不盡其誠而又聖躬莊敬日強乃無往而不安行自裕也若夫大祀中祀之外于乾隆五十年恩詔條內遣祭風火雷雨神廟增列雲神又嶽鎮海瀆諸祀嵗申妥侑臣等謹自四十五年以後恭查親蒞隆儀及特旨告祭加封諸典彚載於後皇上敬修羣祀乾隆五十五年聖夀八旬躬詣岱廟瞻禮御製謁岱廟瞻禮來因瞻岱宗岱廟謁誠恭豫以夀躋八旬世臻安阜恭謁泰岱宗祭闕里用申虔謝以路便先至安即恭詣城中瞻岱廟先行禮封禪事無我阜安祈為去聲農代天敷物育福國錫時雍九叩申虔謝八旬實罕逢先是乾隆四十五年聖駕五巡江浙駐蹕泰安府親詣岱廟行禮四十八年命河南撫臣重修中嶽神祠是年聖駕四詣盛京回蹕入關致祭北鎮五十五年國慶頒詔遣官祭告本年八旬萬夀東巡親祀岱廟餘各遣祭如禮其詔欵事宜分載典禮門祭告類乾隆五十五年東巡回蹕至天津府躬詣海神廟行禮御製策馬由天津府城至海神廟拈香疊丙申詩韻庚戌八旬䇿馬過城闉露冕因教悅萬民幼挈老扶依舊衆叩瞻躍喜較先親所慚仍是昔年况丙申東巡回蹕至天津及戊申春巡幸天津時俱以望而殷懷與今嵗情形相似為之慚悶致請殷希神祐諄虔謁自慚誠不至靦稱惠鑒誠真先是乾隆四十五年聖駕五巡江浙臨閲海塘親詣海神廟瞻禮四十九年六巡江浙禮亦如之是年五月十八日諭內閣曰前經降旨於山海關地方特建北海神廟該處為王迹肇興之地茲當崇宇聿新肇修秩祀自應特𣲖宗藩代申誠敬著交太常寺將諸王名單開列具奏請旨四十八年聖駕四詣盛京躬祀北海神廟五十年國慶暨本年八旬萬夀恩詔遣祭海神如禮並載典禮門祭告類乾隆五十五年東巡回蹕躬謁分水龍王廟御製謁分水龍王廟庚戌原山溯遙本達兖濟鴻功漢書地理志泰山郡萊蕪縣原山汾水出西南入濟水經所載亦同今汶上縣屬兖州府即禹貢所謂浮於汶建於濟是也分水南而北崇祠西向東天然因地利神貺藉人工汶水分流濟運人但知明宋禮用白老人之䇿其實因地脊自然形勢道為分流自昔人皆不識惟老人能識之耳自明迄今漕運實資利濟近年東省疏濬攴幹各河水匱收蓄充裕汶河水勢平穩毋庸叧籌宣泄仰荷神庥益深額手感謝昔弱今流壯蒙庥感莫窮先是乾隆四十五年四十九年兩次聖駕南巡俱親祭分水安瀾龍王廟並河神各祠其自庚子後命立廟加封增祀遣祭者如南河之陶莊清口淮瀆等祠東河之蘭陽睢寧漳水銅瓦廂夙神等祠皆薦虔禋並製碑記匾聨以昭崇報又如五十四年臺灣大功告成官兵渡洋順利仰賴天后神庥靈應顯著特命於福建湄州及各沿海祠宇地方官為致祭春秋一體舉行臣等謹按有虞順時之方柴燎五嶽望于山川遍于羣神後世饗報功德者率由此義然皆循事舉必祈之文而非有諸福可致之祥應期畢臻乃以妥精禋而協幽贊也我皇上敬德延禧久登燮和之治光嶽效其靈應祥瀾習其安恬然且懷柔備至肸蠁逺通歲時巡方望祀特典報功禮有加隆文無不秩本年八旬大慶先期詔祠天下名山大川而躬蒞猶勤益嚴祗敬斯惟本一心之沕穆用致六幕之延洪信乎精誠之至交於神明具徵大聖人致恭作肅之全體也乎八旬萬夀盛典卷六
