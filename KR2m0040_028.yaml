body:
  text: 盛事四五世同堂二乾隆五十五年旌賞五世同堂百嵗以上夀民楊添祿等及未屆百齡知州齊佳士等六十一人禮部謹題為請旌事據雲南巡撫談尚忠奏稱夀宇鬯熙曼羡錫羣黎之福遐荒表瑞繁昌覘庶姓之同兹有蒙自縣民楊添祿現年一百嵗五世同堂一門集慶映滇雲之五色循陔而舞綵行多占夀宿之一星衍算而介眉綏厚宜邀褒典敬俟恩俞奉上諭據談尚忠奏蒙自縣民楊添祿現年百嵗一堂五世請旨旌表等語楊添祿夀屆期頥曽元繞膝洵為升平人瑞特賜御書扁額並親製詩章以昭榮寵所有應行加恩賞賚及建坊旌表之處仍著該部察例辦理欽此應由內務府支取縀一匹銀十兩轉給祇領仍令該撫轉飭地方官給銀三十兩聼本家自行建坊並給與升平人瑞字樣可也奉旨依議御製新正二日雲南巡撫談尚忠奏蒙自縣百嵗夀民楊添祿五世同堂詩以賜之庚戍督撫新正有奏箋率陳吉事逹郵傳廖曽如向張和古乾隆五十年四川江西各奏百嵗夀民張子翼古朝爵俱五世同堂曽親書扁額御製詩章以賜至前嵗湖南奏百嵗夀民廖啓家五世同堂亦即依例賜賚今嵗為豫八旬正夀開韶行慶據談尚忠奏雲南蒙自縣有百嵗夀民楊添祿夀屆期頥曽元繞膝允徴世際隆熙嘉祥疊見仍即書扁製詩賜之因思楊添祿以百嵗見五世而子年方八旬元孫載錫年已七齡就傅讀書是先彼二十餘年矣楊復呈兹後繼前五世一堂瑞已罕髙齡百帙夀稱駢什成更覺自厚幸勝彼猶先二十年御書扁額頥夀鍾祥又題為欽奉上諭事據陕甘總督勒保奏稱欽惟我皇上夀考作人庥徵斂福卜延洪于聖祚八旬臚萬國之歡膺篤眷于皇穹五代衍一堂之慶惟純禧之集嘏肇自天家斯和氣所鍾祥不遺庶姓兹有現任甘肅秦州知州齊佳士年七十一嵗有元孫一人該知州籍𨽻齊邦職分秦牧七旬強仕曽隨千叟以邀榮百口同堂更喜一門之聚順衍雲礽于後嗣孫又生孫傳弓冶于前型士恆為士應帝室􅏨繁之瑞民間喜溢閭書獻周官版負之圖嵗首欣賡華祝仰鴻庥之廣錫九如虔頌升恆臚盛世之嘉祥百爾同深忭舞奉上諭據勒保奏秦州直𨽻州知州齊佳士現年七十一嵗五世同堂等語齊佳士七旬司牧五世綿祥洵仕籍所罕聞實熙朝之盛事特賜御書扁額並親製詩章用昭褒異所有應行加恩賞賚之處著該部察例辦理欽此查乾隆五十年欽奉諭旨未屆百齡五世同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩今齊佳士業蒙恩賜扁額詩章所有應賞縀匹銀兩應令該督遵照辦理可也奉旨依議御製新正六日陕甘總督勒保奏秦州知州齊佳士山東巡撫長麟奏曺縣夀民吳世齊俱五世同堂詩以賜之庚戍吉章方伯報開年最勝新年三事駢昨甫滇南曽賜什昨新正二日雲南撫臣談尚忠奏蒙自縣百嵗夀民楊添祿五世同堂已依例書扁製詩賜之今欣山左并成萹兹據勒保奏秦州牧齊佳士長麟同日奏曹縣民吳世齊年過期頥曽元繞膝春朝行慶人瑞駢臻而山左一區連聞盛事更堪嘉異除應建坊旌表加恩賞賚之處敕部照例辦理外仍即親書扁額並製詩章分賜以昭盛世祥徴雖殊其夀七和百齊佳士現年七十一嵗吳世齊現年一百五嵗都喜同堂曽與元盛世祥徵人我共蒙天佑耳益夔然御書扁額保赤鍾祥又題為欽奉上諭事據山東巡撫長麟奏稱岱嶽注長生之籍世際恆春仙源呈積慶之圖家承蕃祉兹有曺州府曺縣民吳世齊現年一百五嵗其子吳全亦年逾七旬曽元繞膝五世一堂子舍舞萊衣之嵗慶洽蘭陔充閭增蓬矢之祥歡生蔀屋洵稱盛事兾沛殊恩奉上諭據長麟奏曺縣民人吳世齊現年一百五嵗五世同堂請旨旌表等語吳世齊夀越期頥曽元繞膝洵為盛世休徴特賜御書扁額並親製詩章以昭榮寵所有應行加恩賞賚及建坊旌表之處著該部察例辦理欽此應由內務府支取縀一匹銀十兩交該撫轉給祇領仍飭給建坊銀三十兩聼本家自行建坊並給與升平人瑞字樣可也奉旨依議御製詩恭載齊佳士條御書扁額頥登世衍又題為欽奉上諭事據調任江西巡撫何裕城奏稱中宸􅊀福錦綳增桂邸之庥下邑徴祥綵舞動花封之色兹有現任安福縣知縣時本榮親父時舒安係山東單縣生貟迎養在署現年八十四歲精神矍鑠五世一堂恩推章服之榮身叨祿養善積家庭之慶孫亦飴含宜荷隆施以稱眀詔奉上諭據何裕城奏安福縣知縣時本榮親父生貟時舒安現年八十四嵗精神矍鑠五世同堂等語時舒安就養官署年逾八旬曽元繞膝實為熙朝嘉瑞所有應行加恩賞賚著該部察例辦理欽此查乾隆五十年欽奉諭旨未屆百齡五世同堂者著該督撫分别年嵗給豫扁額縀匹銀兩應令該撫遵照辦理可也奉旨依議又題為欽奉上諭事據前任四川總督李世傑疏稱皇之人多夀式羾禎苻天佑命惟純用彰蕃祉兹有雙流縣耆民李芳英現年九十嵗五代一堂人閲人成世已近期齡子之子生孫駢臻嘉慶洵屬升平之瑞宜昭錫賚之恩奉旨該部議奏欽此查乾隆五十年欽奉諭旨未屆百齡五代同堂者著各該督撫分别年嵗給豫扁額賞給縀匹銀兩應行令該督遵照辦理可也奉旨依議又題為百齡上夀五世同堂題請旌表事據署四川總督孫士毅奏稱欽惟我皇上太和醖釀夀宇延洪五福名堂恆久道而康強逄吉八徵篆寶乾行健而景祚無疆鴻庥普被於茅簷人瑞更徵夫巾幗兹有江津縣夀婦彭余氏現年一百嵗守莭七十二載子彭肇榮年已八十餘孫六人曽孫九人元孫四人青年守志白髮完貞逰化日之舒長身沐三朝雨露荷仁風之長養膝依四代曽元承歡已擬夫籛鏗舞逾萊戲盛事爭傳於巴蜀枝引桐繁宜題貞夀之坊允稱旌揚之典奉上諭據孫士毅奏江津縣夀婦彭余氏現年一百嵗五世同堂請旨旌表等語彭余氏夀臻百齡曽元繞膝洵為盛世休徵特賜御書扁額以示恩錫所有應加賞賚及建坊旌表之處仍著該部察例辦理摺并發欽此臣等查與定例相苻應準其旌表官給建坊銀三十兩聼本家自行建坊並給與貞夀之門字樣可也奉旨依議御書扁額貞世延祺又題為詳請恩賞事據署江西巡撫姚棻奏稱胄齒離經錫福衍潢源之澤禔增泰策祝釐臚海宇之歡仁夀咸躋繁昌有象兹有德興縣耆民傅元正年八十二嵗生子二人孫十人曽孫三人並有元孫取名遇恩逰熙宇以延齡夀增耄耋錫嘉名而志盛慶洽髙元宜荷優恩以彰瑞應奉上諭據姚棻奏德興縣民人傅元正現年八十二嵗五世同堂請旨照例錫賚等語傅元正年臻耄耋膝繞曽元洵為盛世休徴所有應行加恩賞賚之處著該部察例辦理摺并發欽此查乾隆五十年欽奉諭旨未屆百齡五世同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩應行令該撫遵照辦理可也奉旨依議又題為欽奉恩詔事據原任安徽巡撫何裕城奏稱國慶瓜蕃嵗月際八千之算户殷版籍子孫符千億之祥兹有原任翰林院庶吉士曺昞現年八十一嵗現任徽州府學教授吕韶現年八十嵗歙縣監生張惇方現年八十九嵗耆民姚一溥現年八十嵗潛山縣耆民余文章現年八十七嵗涇縣耆民沈必可現年八十嵗南陵縣監生秦耀祖現年八十六嵗耆民秦連茹現年九十嵗俱五世同堂或澤守詩書孫抱孫而志喜或業安耕鑿世閲世以偕增共樂堯衢宜膺周賚奉上諭何裕城奏安徽省原任翰林院庶吉士曺昞現任徽州府學教授吕韶監生張惇方秦耀祖耆民姚一溥余文章沈必可秦連茹俱現年八十以上五世同堂請各錫豫恩賚等語曺昞等俱年臻耆艾膝繞曽元洵為升平人瑞所有應行加恩賞賚之處著該部察例辦理摺并發欽此查乾隆五十年欽奉諭旨未屆百齡五世同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩應行令該撫遵照辦理可也奉旨依議又題為欽奉恩詔事據山西巡撫海寧奏稱世夀覃禧户著殷昌之象家肥叶吉人延似續之庥兹有陽曲縣捐職從九品郭天隆現年八十五嵗五世同堂瑜珥瑶環處朴俗而初無侈飾鳩車竹馬撫諸曽而又報宜男洵為繁庶之徴應荷恩慈之錫奉上諭海寧奏陽曲縣職貟郭天隆現年八十五嵗五世同堂請照例錫賚等語郭天隆耆齡矍鑠繞膝曽元洵為夀宇庥徵所有應行賞賚之處著該部察例辦理摺併發欽此查乾隆五十年欽奉諭旨未屆百齡五代同堂者著各該督撫分别年嵗給豫匾額縀匹銀兩應行令該撫遵照辦理可也奉旨依議又題為欽奉上諭事據原任浙江巡撫琅玕奏稱爽惟民迪吉際恩慶而彌彰斂時福維皇萃庥徴而用錫兹有山隂縣耆民王茂源􅌘縣耆民錢竒俊蘭溪縣耆民葉瑞元江山縣耆民王兆霈俱年八十以上五世同堂不知不識安耕鑿而育子孫有幹有年延似續而逰熙皥兹為上瑞宜籲優恩奉上諭琅玕奏耆民王茂源等俱年臻八十以上五世同堂請旨錫豫恩賚等語王茂源錢竒㑓葉瑞元王兆霈俱年登耄耋膝繞曽元洵為盛世休徴所有應行賞賚之處著該部照例辦理摺并發欽此查乾隆五十年欽奉諭旨未屆百齡五世同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩應行令該撫遵照辦理可也奉旨依議又題為欽奉恩詔事據署江西巡撫姚棻奏稱頌盛事於天家慶深鼇抃紀庥徴於蔀屋虔效鳬歡兹有彭澤縣原任四川成都縣縣丞袁大正現年八十一嵗五世同堂墨綬銅章昔沐恩波於劍外綵衣文褓更增佳氣於庭前洵稱左蠡之嘉祥仰籲中朝之賁錫奉上諭姚棻奏江西彭澤縣職貟袁大正現年八十一嵗五世同堂請照例錫豫恩賚等語袁大正耄耋康強曽元蕃衍實為夀宇嘉徴所有應行錫賚之處著該部察例具奏摺并發欽此查乾隆五十年欽奉諭旨未及百齡五代同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩應行令該撫遵照辦理可也奉旨依議又題為欽奉恩詔事據護理安徽巡撫周樽奏稱延洪徴軒籙之文萬年臚頌舄奕邁周宗之慶百世衍支兹有涇縣貢生胡先粢現年六十八嵗有元孫二人監生查時世現年八十三嵗休寧縣耆民張之寬現年八十四嵗俱有元孫一人順聚一堂釐延五代依依繞膝桐枝又報孫生濟濟趨庭梓里如占星聚洵茅簷之樂事祈楓陛之推恩奉上諭據周樽奏安徽涇縣貢生胡先粢監生查時世休寧縣耆民張之寬俱年登耄耋五世同堂請照例錫賚等語胡先粢等夀履康強門庭衍慶洵為盛世嘉徵所有應行賞賚之處著該部察例具奏摺并發欽此查乾隆五十年欽奉諭旨未屆百齡五代同堂者著各該督撫分别年嵗給豫扁額縀匹銀兩應令該撫遵照分别旌賞可也奉旨依議又題為夀民夀婦五世同堂懇恩旌賚事據湖南巡撫浦霖奏稱宇啿皇春乾燾著大生之象仁躋世夀萃亨苻引吉之占兹有湘隂縣民胡先哲年九十二嵗生貟顧尚傑年八十七嵗善化縣監生楊士彥年八十嵗湘潭縣民胡錫連年八十七嵗醴陵縣監生易子範年八十六嵗監生張居閣年八十一嵗攸縣武生王命卿年八十嵗城步縣民楊志宏年八十嵗武陵縣舉人楊健年九十嵗俱五世同堂又善化縣生貟羅世秀之母任氏現年一百嵗清泉縣民鄭伯紅之母王氏現年一百嵗安鄉縣武生張孫綖之母計氏現年一百一嵗俱係五世同堂祥鍾南嶽籍注東華由紳耆以逮閻閭釐女士而從孫子或科分孝秀力田久服先疇或􅋵勵閨闈貽榖俾承舊德父之祖猶有父並慶弄孫孫之子為曽孫亦既抱子數苻九老九人合七百餘年夀作三朋三婦更期頥屆嵗允矣嘉祥之集宜邀曠典之頒奉上諭浦霖奏湖南湘隂縣民胡先哲生貟顧尚傑善化縣監生楊士彥湘潭縣民胡錫蓮醴陵縣監生楊子範監生張居閣攸縣