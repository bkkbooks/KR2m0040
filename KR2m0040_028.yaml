年一百一嵗五世同堂請予錫賚旌表䓁語王瑞臣年逾期頥曽元衍澤洵属盛世嘉徴所有應行賞賚及建坊之處著該部察例具奏摺并發欽此應由内務府支領緞一疋銀十両轉給祗領仍令該撫轉飭地方官給與建坊銀三十両聼本家自行建坊並給與昇平人瑞字様可也奉㫖依議又題為欽奉上諭事㨿陕西廵撫秦承恩奏稱仁推安老煦薄海以如春吉叶宜孫頌生民之作瑞兹有臨潼縣耆民王之巽年八十四嵗五世同堂仰托大椿之䕃小草春長廣徵初瓞之庥蕃淑實衍敬祈恩奨以誌嘉祥奉上諭秦承恩奏臨潼縣耆民王之巽現年八十四嵗五世同堂請予錫賚䓁語所有應行賞賚之處著該部察例具奏摺并發欽此查乾隆五十年欽奉諭㫖未届百齡五世同堂者著各該督撫分别年嵗給予扁額縀疋銀兩應行令該撫照例辦理可也奉㫖依議又題為詳請恩賚事㨿䕶理江西廵撫託倫奏稱角亢明太紫之符龎眉接武户口溢丁黄之版螽羽延禔兹有萬安縣民劉徳懋現年九十嵗南昌縣民吳正英現年八十八嵗萍鄊縣民生羅錦現年八十四嵗髙安縣武生丁昱現年八十嵗廣昌縣生貟何裕現年七十八嵗俱五世一堂人偕五老之逰共喜曽孫有子慶值三多之祝同為夀世徴祥式籲優恩用彰瑞應奉上諭託倫奏江西萬安縣民劉徳懋南昌縣民吳正英萍鄊縣監生羅錦髙安縣武生丁昱廣昌縣生貟何裕俱年躋耄耋五世同堂請照例錫賚䓁語劉徳懋䓁艾夀康强曽元衍慶實為盛世嘉徴所有應行賞賚之處著該部察例具題欽此查乾隆五十年欽奉諭㫖未届百齡五世同堂者著各該督撫分别年嵗給予扁額縀疋銀両應行令該撫遵照辦理可也奉㫖依議又題為欽奉上諭事㨿閩浙縂督伍拉納奏稱國有嘉祥錫羡匝於緜宇家増式榖推恩爰籲絲言兹有上杭縣監生何大川現年九十嵗連江縣耆民張維開現年九十一嵗長泰縣耆民陳文通現年八十九嵗五世同堂有秩年増五代叶熊占之吉無疆慶錫九重敷麟定之庥欣值昌期臻斯上瑞奉上諭伍拉納奏監生何大川民人張惟開陳文通䓁俱年届九旬五世同堂請予賞賚等語何大川張惟開陳文通䓁均年臻耄耋膝繞曽元洵属休徵人瑞所有應行賞賚之處著該部察例具奏摺并發欽此查乾隆五十年欽奉諭㫖未届百齡五世同堂者著各該督撫分别年嵗給予扁額縀疋銀両應行令該督遵照辦理可也奉㫖依議又題為欽奉上諭事㨿䕶理河南廵撫景安奏稱璿圖瑞唘罄紫澥以量籌瑶牒祥開𨗳銀潢而積慶惟諸福備膺於宸扆斯嘉祥普被於閭閻兹有洛陽縣耆民賈三才現年八十七嵗鞏縣監生趙廣生現年七十六嵗汜水縣耆民雒文正現年八十一嵗俱五世一堂園果分甘已喜抱孫於子舎瓦盆注酒又増賀客於衡門慶溢鄊閭恩祈魏闕奉上諭景安奏監生趙廣生耆民賈三才雒文正䓁俱年登耄耋五世同堂請㫖錫賚䓁語趙廣生賈三才雒文正䓁一門聚順繞膝曽元洵為昇平盛事所有應行賞賚之處著該部照例具奏摺并發欽此查乾隆五十年欽奉諭㫖未届百齡五代同堂者著各該督撫分别年嵗給予扁額縀疋銀両應行令該撫遵照辦理可也奉㫖依議又題為耆民夀逾百齡五代同堂懇恩旌表事㨿雲貴縂督富綱奏稱徳普生生引雲礽於勿替恩推老老羞夀耉以靡遺兹有易門縣耆民周璻現年一百一嵗五世同堂齡越期頥家繁榖似用髙曽之規矩親授箕裘懸孫子之桑蓬又増蘭玉旌門有典廣宇騰歡奉上諭富綱奏易門縣耆民周璻現年一百一嵗五世同堂請㫖賞賚旌表䓁語周璻年逾期頥曽元繞膝洵属昇平人瑞所有應行賞賚及建坊旌表之處著該部察例具奏摺并發欽此應由内務府支取縀一疋銀十両轉給祗領仍令該撫轉飭地方官給銀三十兩聼本家自行建坊並給予昇平人瑞字樣可也奉㫖依議臣䓁謹案爾雅釋親逓舉曽孫元孫之名劉熈釋名復訓釋其義謂主於夀考者而言左傳曰及而元孫以元孫為最逺也然三代以前載籍所𫝊未聞有親見元孫之盛伏讀御製詩識古来見元孫者於唐得一人焉曰錢朗宋得一人焉曰張燾元得一人焉曰吴宗元明得三人焉曰羅恢曰歸璿曰文徴明粤千餘年而僅得六人豈必羙而弗𫝊盖繁嘉茂之慶於一家固未易數數遘矣我皇上懋滋景裕純洽繁禧御製五福五代之之記以慶祉之迭臻徴天貺之稠篤申祜引祉徧融夀宇乾隆五十年直省彚冊上聞者多㡬至二百家舉從古累朝所罕遘者駢集於一時繼此特章入告嵗有増加熈勰之苻方逓演於靡既焉且前此六人中惟錢朗一百七十餘嵗今則趙元寅郭有英趙琳劉萬迎䓁俱百齡有餘其夀逈勝於燾與徴明而齊佳士時本榮韓克鋐䓁以現任牧令得備家慶亦非宗元恢璿所能希及皇言敷福爰有宸章賁錫御扁光題照耀乎天閶燦炳於珠緯而諸人且附御集以垂永久寵褒之典伊古所無爾雅曰子子孫孫引無極也斯惟祥麟趾定之徵以萃此茂豫哉八旬萬夀盛典卷二十九
