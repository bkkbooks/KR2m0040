body:
  text: 八旬萬夀盛典卷一百五歌頌二十五萬夀九如篇九言上下旬各九十韻翰林院侍講臣吳夀昌春皇握符闡珍數用九甄變六峜元化幬載如陶姚聖人懷鈐與載斗罔弗勤思亹穆遊象初乾維坤軸上下奠樞紐天乃錫豫河洛呈圖書首山遵渚二月日辛丑赤文吐甲泥檢皆華㻬題期立象惟聖克膺受爰昉符契誕保長㦛㦛惟純佑命天用錫眉夀六府三事允治其歌諸我皇聰明天亶作元后埏紘匝化萬物咸喜與至誠博厚髙明又悠久聖齡八􅐆受祐釐貞符紀元五十五載世殷孜孜惟日不足承權輿乃命選玉抑埴琢螭紐八徵耋念之寶繆篆攄欽繹記文理藴析縷綹闡疇原範妙義苞胥餘向歆房孟諸説概勿取五事握要皇極言用敷曰敬曰勤曰愛篤孚缶禕哉大德斂福庥祥儲庚章戍茂月日嘉聚酉夀星汁紀寶算瀛籌輸帝允籲祝行慶肇嵗首敷天率土蒼赤騰歡愈民忘帝力知識於何有請以管蠡萬一抒皇模欽承昊縡惠鍾嫓父母父母御製詩有子於敢言報之句若寅夕惕健運璇機樞躬身嵗三大祀燎升槱日長至郊禱龍見雩禮行方澤廟左與社右苾芬肸蠁咸致其歆居穹壇三成田步纍登阜周旋折旋閲久瞻安舒執徐嵗次僉議集然否禮儀少簡帝始俯允俞昭事面稽倍用篤天牖神策祗受一以誠相於仰惟光烈久埀熾而㷆紹衣繩武帝念勤揚訏五朝册寶虔奉煥瓊玖豐岐締造四謁欽前謨豐碑鎸烈贔屭巨鼇蟉薩爾滸地猶有風雲趨紀恩堂髙槮橚煥栱科大哉肯構睿藻輝瓊琚寶録訓謨昕夙覽循瀏憲章萬葉於此傳災畬精神為聖天錫信亶厚書屏榜柱戒逸深躊躇傳餐有候匭逹即裁剖御門聽政起視晨光紓內部院臣洎外守臣某日宣時覲諏度無數疏下及庶僚更畨列墄扣文銓武選引對方拜除有時宵衣侍旦尚巡掫謄章未逹剪燭吟氊廬曰臨兆民凛乎若馭朽撫辰凝績一一煩咨茹民依稼穡軫念在畝畝待養有如待飼來僆糴熙時化育民氣樂勃勃染翰寓意猶復增栩蘧詎以描摹形似付繪手欲令司牧懷保同呵噓紺轅黛耜一墢肇千耦柞芟社稼百室勤耰鋤司農奏穀嵗杪計秉籔疆吏報雨十日紛使䮉一榖二榖不登事亦偶截漕發粟恩命猶飢豫栽培嘉殖尤欲剔稂莠惟明克允諄勸消鉏鋙體天仁愛弼教賴五紏何用讕言三宥詡唐虞聖人光被照臨及幽蔀省方展義時復勤鸞車榑桑麗旭龍斾揚䬀􅂒維南六辛鬯沭其猶醵籌河相度衆議息忕狃濬淤遏溜因勢釃與瀦陶莊刷引水志立清口箭流澄駛次第恬淮徐海門龕赭峙山夾峻陡洪濤漂疾訇磕來鯨呿揵以巨石鱗次接星罶坻平坍漲磧鹵安畋漁爾乃東登日觀豁晴嶁西曕臺麓中禮嵩髙呼東西澱沽水滙若溝漊黃圖三輔宣泄資溉渠翕河喬嶽秩祀閟圭卣翠華所至夾道迎旄旟廪陳廯給足食到䴺􅀈聖恩渥沛豫復仍優租秀髦隨輦捃擇殫薪梄鏐牌鳩杖銀髮來于于疇令栝枝旁鮮曲楺官材論定湔滌寬簮裾在昔漢唐盛主懸纊黈稅租豫半詔或及一隅豈如四蠲正供罄升斗秸秷再蠲漕艘停挽糈閭閻熙熙登穫介朋酒屯衛展展休養蕃丁徒作為成易輻轂運無韖八風應琯玉燭調裘綀維皇威福剛克疆弗友逆誅順祐斯理誠非虛蠢兹回部凖噶爾小醜烏什小大金川穴鼷鵌總師禆師各各印繫肘後先稟受神算揚威弧方其怙險跳梁縱指嗾鈐機電爥逺逹崑崙墟雪山月竁萬里裏糧糗犁庭掃穴一夕平﨑嶇論文解惑昭示衆沮忸地益二萬置屯同周阹又如臨關狂竪中風走河蘭回孽兩閧依險砠東寧阻海豨逞突蹯􅚵天戈所指受孚來衙衙凱歌九奏棡鼓動夔吼戰圖五繪組繫誰趦趄􅌢弓櫜矢罝兔化赳赳誕敷文德干羽瑶階揄聖人典學道藝拓淵藪搜輯甲乙景丁珍璠璵鈎沉抰奧至理異攻掊折哀乙覽立訓嚴紛拏鴻文千百上溯軼韓栁御詩五萬逺紹諧莖扶經筵春啓講畫勤指拇緝熙躬踐妙旨時杷梳四閣翼翼三閣紹其後傳鈔惠許南國羣含咀橋門圜水馥郁擷芹茒上丁入學釋奠陳豆菹昔詠靈臺鐘鼓奏矇瞍今觀胄襟聽講彬魚魚其時繽紛瑞霰階璨琇天顔愈霽謂兆遺蝗祛孫卿勸學擬以蘭芷滫矧際盛世甘或慙莊樗六開恩榜優士及耆耉上塞立學絃誦聞比閭考圗建典儀器盛法守更定律吕駢注雅俗殊黌門十碣重製集蝌蚪譜詩後訖殷武前關睢下視容臺協律悉培塿中和美善大備非補苴即今八荒嚮風大開誘航瀛梯棧重舌歸徯余自來職貢備藩等列部名𨽻典屬各已通象胥厥有臺海朱波眼䫜臼請號軒舞瞻禮耳貫鐻鎮南關逺乃可撤門牡藩王賜襲冠帶同依屠炎徼萬程彳亍束車􅀈威德誕際金鴉兼玉蜍帝膝曽元錫福遍黎叟瑞人表楔尊醴盈中衢族居纍葉淳俗化箕帚同堂五世二百霑湛湑撝宫謙抑寅念殿內叩天庥保佑耄期勤彌諝詎用騶虞麟鳯美郊棷夀身夀民夀世洪延譽小臣摛毫晉祝愧淺鯫願效升恆保定均陳臚萬夀恭集千字文五言律詩二十五首謹序翰林院侍講臣吳省蘭臣惟苞符啓聖司契秉籙夀身夀世之憲循蜚因提年祚遼眇靡得而詳史皇察奎星圜曲之藝爰創文字用存注記若二靈九龍運期數百千萬嵗得算長逺賴是慬傳文聲相生字益孳乳春皇蒼牙遹興文教嗣此列辟乘六御天以德得夀即以文夀德而世亦夀焉金繩玉版昭示無極斯大挍也洪維我皇上合天德作元命法乾行健體乾自強臨御及今五十五年純固之精神先後若一日而聖神文武大經大法品騭賾彚悉懸著於御製詩文蓋夀身夀世之憲自生民來富有日新未有斯盛也歲庚子古稀聖莭臣曽重次梁臣周興嗣千字文一篇莊頌純嘏兹歲庚戍恭屆八旬萬夀八徴在念成明章康天人協應凡時鳥候蟲咸知鳴豫竊以聖帙彌崇德功亦彌盛猶字之遞生無量焉謹案庚子以來十年中文德武功顯庸創制與時念庶徴以念萬民者復集興嗣千文為五言律詩二十五首附衢壤歌謡之末其興嗣本及臣重次本二字相連仍避復襲繼此元貞迭運無疆萬萬夀每嵗逄庚臣當凖依排次用申葵向臣曷勝慶忭欣幸之至詩曰建五會其極詳稽篤祜長則皇上紀年逄五則為數五旬慶若紀年逄十春秋逄五天地之十相承元運所以無量也丙辰居位正甲子運圖光命於皇上七旬萬夀前花甲時憲書增注重周比嵗維奄茂厥陽在上章欲纍沙作䇿𨽻首豈容量右一動息求民莫及茲寶是銘事陳書出洛念用庶惟星農劭恬冬夏官刑朗渭涇天行曰時若璣斡秉洪冥曰自御製八徴耄念之寶副章強不息御製寶記有云念庶徴即以念萬民臣謹案九疇念用庶徴即繼以嚮用五福福一曰夀誠以皇極之建在斂福以敷錫庶民念即斂之實也庶徴協應以肅乂哲謀聖之德念即攸好德也常有是念是以常有是嚮嚮即天錫之義中庸推大德之德祿位名以夀為歸謂三者得夀而夀保洪範之福先夀謂以下四者德夀而後嚮八徴夀長耄念與民也德所以與天同錫福庶天同右二孝思每感露宅邑奉初生矢射約要果皇帝諭太宗文衣冠言語弗改舊制時習騎射紹衣德言屢申皇上訓誥磐恆愛慕并土肥利犢引俗美膳羔烹丹輦逍過熟敦宗幸兩京繩興京盛京四謁祖武王業所基並珠邱皇上紹諭萬世法守右三祿受重貽武稱髙號最尊閏辰閏二月慶得王皇元孫事國祥家慶為從古帝未有盛懸元遙次嫡劉熙釋名元孫懸也上懸於髙祖也啓世早催昆堂立階增陛太御製五福五代堂聨句詩注自祖至今共有十一世臣謹案自太宗至皇子至皇元世宗為字輩皇上上五世自皇孫下奉二宗室為上下五世軒嫓玉牒蕃昌黃盛野庸葉傳根多男二百戶各省陸續奏到五世同堂者二百餘家皆蒙族賞麟趾之化暢沂垓埏命筆表瞻門右四的翠枝桐剪隂被施逺條紈巾聚國戚觴酒睦公朝虢叔情伊密周親義特超帶盟真具邇自漆弗忘遼宗皇上睦親九族以尊褒功雪祖敬如為睿忠親王諸人枉錫爵繼絶先舉於前十年中壬寅復按品級間散宗室頂帶癸丑正月又普宴宗室於乾賜清宫與宴者二千人各葦敦頒賜如意朝珠文玩玩綺帛銀兩有差行仁莫踰斯盛右五燕禮修虞制侈儀嚬老更帝臨真駕父誰敢辱當兄絳縣田垂賞黃封柸滿盛華顛讀典故園綺坐間盈祖仁皇上御極之五十年依乾隆皇帝康熙癸巳年例於聖已正月六日舉千叟宴於者乾清宫與宴三千人其未與宴而邀頒賞復數千人極從古養老未有之盛蔡雍獨斷有天子父事三老兄事五更之文白虎通直以為老更各一人且曰父一而已不宜有三其謬御製三老五更説闢右六璧水巧疏逹可規紫殿圓乃營舉釋菜所習近分綿甚敬潔馨席益恭論易筵乙巳仲春上丁奠遂皇上以肇建辟雍落成學親詣文廟釋臨御辟雍殿講大及易乾卦自衍聖公王大臣以下圖橋門而聼者數千人謹按默拱聼槐市辨纓連右七金鐘既適律鑄寧夀宫新金鐘成石鼓覆摩文雅玩好而􅀢殆珍索與墳東都短碣勒大學列楹聞舊器恐潛滅永新克荷君周宣石鼓久在太學三百皇上以近榻字多漶漫之親加排次將所存十字仍集為十章并為序製新鼓勒文並列風國學新鼓置戟門外其舊鼓命繚垣以蔽雨俾永萬祀至熱河為每歲秋獮以著駐蹕之地亦製新鼓於文廟攻同舄芾之盛右八宫商即工尺務靡顧焉非嵇散絃寧寂倫吹莭罔譏笙詩逸唱並瑟調指端幾漢府改房邈徊徨束廣微明朱載堉樂譜注工尺等字而遺宫商五音並以牌名小令分譜雅頌諸諸未免援古入俗其琴譜一絃長至十六彈更近靡曼失一字一音之舊特商具敕樂部諸臣為之釐考並將三百篇增譜宫可歌咏又瑟譜久已失傳亦晳命工講求務與古合至笙詩六篇有聲無辭束所補蕪淺未稱御製補篇歌於鄉飲盛世元音視漢以樂府改周房中失之陋矣右九河流説九曲伏見踐崑虛藉匪效輕軻惡從辨古渠西域吐蕃二河源聚訟日久壬寅侍衛阿必逹祭告青海河神奉命務採河源奏稱星宿海西南三百里有阿勒坦郭勒水色黃穿星宿海合流至貴德堡始名黃河又阿勒坦郭勒之西有巨石名阿勒坦噶達案齊老崖壁黃赤色上有天池池中流泉噴湧釃為百道皆作金色則真黃河之上源在今皇上考漢書河出崑崙之文昌海定崑崙為回部中部部諸水皆東注蒲即鹽澤鹽澤之水入地伏流至青海始出是為重源再發因纂河源紀略千載蒙古一旦始豁阿勒坦蒙古語謂黃金也郭勒河也阿勒坦噶逹素北極星也齊老石也星宿海蒙古語謂之鄂敦他臘舊稱火郭腦兒回中遵歷後鳥外俶尋餘寥漠荒唐迹訓言振曠如右十仰觀俯察處照宙字形知畫始實宣陋集成恃定疑化功遣紙墨於載皇上立言之精靡不大含細入一歸道御製詩彚之已五萬首御製文一千百餘篇並宸章之富亘古莫俊業寓囊帷四庫御纂之書不可勝紀自庚子以來若全書前後七分俱已插架若大清一統志續三通音韻述微日下舊聞考熱河志河源紀略職官考等書亦次第告竣刋布手口讚皆竭皇哉妙合羲伏羲以一畫開文字之始至一皇上而真集大成右十彼雞徘且竦母也意同嘉謂已佐人牧何祇鞠我家寒矜績婦紡熱惻穯夫杷於藝亦仁育樂飛起鳯車戊申皇上軫念民依時時如傷在抱偶以御筆倣李迪雞雛待飼圖吏並念撫字之宜勤牧俾題詩墨刻保又宣示疆念傳布親民司各盡心懷太常寺向有仙蝶不時常見是冬偶出所司篋以呈覽亦入題詠雖聖世不以異物稱祥而勤民之至則太和翔洽昆蟲闓懌其理自在也右十二往者臯蘭竟佳兵有郡羌辛丑春撒拉爾畨回蘇阿洪等因爭立新教殺傷舊教多人秉間侵占河州肆逆後事命大學士阿桂等撲滅之總督李侍堯於善宜多有姑息邪教回民田五等復得紏衆暗修石峯堡甲辰夏稱為伊師馬明心復仇於小山起事皇上命福康安總督陜甘大學士阿桂率師收捕逆黨盡皆伏法皆由睿算指示先幾成功迅速弗致滋蔓以靖嘉師尹丸收赤白楚劍下甘涼禍斬猶搖稿本誅似毁粳審機勞昃夕發賊慮無傍右十三池鯤浴雨嘯俠據抗龍驤臺灣孤懸海外丙午冬姦民林爽文莊大田搆亂閩省將吏未能深合機宜即時勦滅伏法皇上命福康安海蘭察率師討平之皆生致因像命為福康安等立生祠繪於臺灣俾海疆望威知畏宿莾躍馳困孤城弱寡傷領軍委福海捕盜得林莊嗣取貌存趙英姿駭異方右十四厭德黎推阮威信惠實通叛乎禽孟獲服則爵歸忠宋嘉祐中於闐來貢封為特進歸忠保順􅠫鱗黑韓王驚雁遐翔杳亡鸁晚去空冠裳耽履視勿弔戚蒙戎安南僻在瘴鄉相仍篡奪自黎氏服屬本朝最為恭順因與阮光平搆釁嗣後黎維祁播遷失國叩關籲救爰南國命疆吏督師收復黎城護之歸國並鑄給安王新印乃黎維祁聞阮光平復擾之報棄印委城先逃至鎮南關皇上以黎維祁巽懦無能即再為遣送亦不能復守倘被戕害是絶黎後且黎氏立國已久興廢有數自係天厭其德而阮光平震懾其子天威投誠歸命先遣其姪赴以闕朝貢復挈阮光垂親來祝嘏因封安南國王而遷黎維祁及其眷屬於京師官以佐領優給廪祿第宅遵用本朝冠服室家安聚無孤裘蒙戎之感仰見洵仁皇上承之盡也天廣運綏靖靖要荒之至義右十五黜霸頓虧祀甲辰夏録載皇上閲祀歷代聖祖實勑議增帝王諭旨凡以帝王曽在位者除無道被弒亡國之主外盡應入廟而會議疏言偏安亡弒不祀祀典又議入遼金不入東西晉元魏前後五代未免意存偏向因命廷臣詳議增祀傾垣眺陟邙除户皇上以前明十三陵頺廢共用敕令修咠部顔料工部木料不計外帑二十八萬六千餘兩志因持牒問骸為植松藏主木晉神字議增晉元帝以下二十五帝撒漢桓靈二主用符祖訓明樓矯步廊落之躬假廟宰造煒斯煌乙巳春明陵皇上親祀歷代帝王廟並詣奠酬湛澤醲施汜濩幽漠右十六簡才布巨政勸誡杜頗疲止火抽薪必和鹹任性宜吏治官方絿競皇上隨時整飭不使稍有弛怠剛柔因事權衡務期於民生有益絲琴淡薄守綵組法亷隨不懼猷難免良臣拜寵綏右十七敕令興賢巨巖阿奈晦沈離經弟譽貢投芥職嚴針五皇上釐剔科場用之俞廷臣議鄉會二場並試經以兾通經致士並諄諭考官一秉公明母秋曲承學司衡一時愧感丕變枇弊髮毛伐操衡晝夜深梧岡玉笋映蒸士少悲心右十八乂康衣食富再四沛丁糧欠豁皇上愛養黎元勤求藏富凡偏災賑恤積免隨時沛澤動輒數百萬丙寅庚寅丁酉及本年庚戌四次普免天下正賦丙戌己亥兩次輪免各省漕糧蠲復洪仁實史册所未有飽飯稷橫畝飢餐黍載箱韓終飫充李召伯稅遊棠草舍諸兒女薑藍鬱翳牆右十九身致魚麗治詩序魚麗美萬物盛多能備禮也文武以天保以下治內采薇以下治外始憂勤終逸樂故美萬物盛多可告神明本年外均八旬萬夀元旦特頒恩詔神人共逹中霑滲漉涌濡實備倫物歡嘗糟給牀賤卑體眠寐師濟省扶匡禹扇驅煩設湯羅解罪張貴慈真慎刻甚皇上整肅紀綱而不為己聖謨所及陬澨咸知退詠等安常右二十吉旦飄銀樹鳴招仙地優賔王接别帳鱗羽盡羣州凌獸率埸象騰駒入塞猷會興載朝貢諸圖朝鮮每嵗遣使入貢安南琉球暹羅則率間三嵗使臣多不相值本年朝正諸國咸在巴勤布向阻聲教亦輸誠朝貢𬗟甸南掌各遣頭目賫金葉表馴象方物爻閭並會嘉謙載張古王會開圖未有斯盛紛云謝雕顙續此笑歌浮右二十一蓋轉嶽雲青淑慶答岱靈秦碑磨垢耻孔璧靜音聆豫助傳妍景謙辭誚禪亭洞淵切肆祭誠一侍珠庭甲辰以春以八御宇五旬萬夀年國慶行慶登岱受釐今東巡並詣孔林展禮二右二十孰賴攝縻力獨資悅畏愚南交逐暑路安南國王阮光平赴闕恭祝萬夀西使清霜途巴勤布上年歸順遣頭目瞻仰天顔驢背川溪逼羊腸谷岫殊緬甸朝鮮南掌等國哲木尊丹巴呼圖克圖噶爾丹錫呼圖呼圖克圖都爾伯特上爾扈特霍碩特烏梁海哈薩克外藩蒙古兩金川土司甘肅土司臺灣生畨並來祝釐染箋將妾隱靣內屬貞姑布魯特畢班璧特之祖母年一百九嵗遣孫請安右二十三執竸基緣聖夙堅燭理精陶鈞物善納潔矩道攸平目結榮懷色耳移溫語聲寸環來魏闕對日願能名右二十四月魄養暉足璇霄御氣澄八千秋以寫左右史相登鑑想稼卿奏通興唐龍朔中改司農卿為司稼卿磻欣釣友承萬年談積閏轂曜讓升恆右二十五萬夀頌八章恭集御製文句并序安徽學政國子監司業臣秦潮蓋嘗深維大順大同之化升平纍洽益綿延惇固於無疆元氣之所絪緼同遊春臺化宇偉嘉禎之萃薈御八風兮穆旻乾苞坤絡輔翊生成六合一家言歸有極敻乎尚矣權輿二典之贊堯舜也致巍乎煥乎之盛美凝受皇天大寶命於穆聖德作覩萬方心乎肅肅日有孜孜佛時仔肩樂以天下凡茲薄海蒼生淪浹肌髓雲集景從以篤我國家無疆之慶惟曰欲至於萬年古稀天子永夀於萬正夀之慶茲逮八十洪範有言雨暘時若八惟庶徴福德無涯玩五皇極之辭箕子蓋引而未發念庶徴即所以念萬民德者福之基無疆悠久其徴自與常人異所由躋海宇於蕩平仁夀之域也瑞應之符圖於王會受小共大共奉贄來朝逺至開闢之所未賔越大濛疏逖曶爽䫜靣纒頭鱗萃魚麗跋涉萬里而來以祝無量夀算皇哉唐哉猗歟盛矣蓋自太極判而隂陽生宅中建極明王道之無外未有躋此崇隆者也若夫獲福必歸於好德居九重之穆清存誠主敬儲神致精俾緝熙於純嘏實惟五福為宜錫祉延齡靈淑鐘萃荷天之龍五代同堂百祀蒙庥為今古稀有之吉瑞乃若心通造化一體天地大生廣生之心虔申對越欽柴揚槱業業兢兢黼衮端穆以邀肸蠁而昭祀事即舉祈榖之祭旁秩祀典知稼穯難不遑暇逸嵗舉耕藉之儀以劭樹藝而較晴雨鞠保胥勤古未有過焉敬奉神器繼繩光烈列祖列宗單心繼序既纂修實録成書平旦莊誦周而復始嵗時太廟鐘鼓降福輝庖咸列愾乎僾乎久大之規不亦庥歟粵稽自古帝王文德武功立極萬古惟聖時憲因文見道敕幾之暇郁若其文無體不備先經次史炳炳麟麟仰見心符道要智鏡在躬而與天地之文相似也爰發金匱石室之藏訪名山徴載籍玉簡琅函臚列具備簡命儒臣稽圖譜七録之目採録經史子集所載四庫因之薈萃源流嘉與海內學者日不暇給乃示燃藜亦亹披覽君師之道兼隆文之時義大矣哉天子之學曰辟雍圜橋首善蔚有德造秩如彬如嵗出塞外避暑山莊以為此處宜興學校命有司鳩工庀材式葺式營然後究極理數洞契元聲鑄此鐘鏄磬不可闕諧協六同中和大備而新為十鼓廣示藝林重刻之由炳焉與三代同風於是石鼓之文雲霞暉麗集古帝王文治之大成敻乎與天地為昭矣文教彰明我戎是修以是奮武非黷武習武木蘭森沉萬旅用出瑞獸招丁甲而發指四十九旗環集輻輳審度發機密授方略於閫師拓地伊犂喀什噶爾葉爾羌周二萬餘里凖部回部霆奮席捲咸以為時雨之師朝四部落之衆而有土爾扈特全部歸順之事銘志鴻功何其神也金川平定安我蜀陬藏地處蜀與滇之徼聨軫偕來朔連牧羊之鄙南奠臺澎瀛壖炎島胥昄章耕牧東眺扶桑俾海隅日出之逺均豫户庭也合內外為一家豐功駿烈孰有大於此者乎由是天人協應負扆答陽慕義獻琛將將蕃后祝釐宴衎駢坒殷闐陋彼陟封七十二代豈可同日而語哉聖人之心慎之又慎持不矜不伐之淵沖旰斯宵斯思艱圖易故乃下明詔仰德流以休以息是噢是咻於是乎有加額之恩庶政之周詳不可以一二事舉舉大事者莫重於河與漕德水之樞紐以疏以瀹厥惟上腴漕艘估舶雲帆直逹澤至溥也南巡之事以求民寧為萬世規且為之記焉即今浙海之區奠盤石之安流乃軌注功至仁也乃者謁闕里過杏壇時邁自東松蒼花茂巖巖泰山絳雲承蓋山聲告慶俞哉亦其時矣今也逄國大慶血氣之倫臚歡祝嘏綿逺增髙遊於大當龎眉皓首招搖佺羡傍斗窺星莫如其古馥馥香林曼陀紛落人天遍仰燦燦離離魚龍曼衍倩浰而雷動朝嵐夕靄水態林姿若三壼之隱現於鏡海雲天者以有此圓明園也當是時金吾整駕棽麗六飛魚鑰曙開九華芝蓋乃御黻座而觀臣僚粹容如日月麗天夔夔列君劍珮簪纓萬里奔走彌暢皇風六星惟夀麗於南極俯寰中之北拱大椿以八千嵗為春秋續虞廷賡歌之義雅頌興焉羣臣例當進獻辭賦蕩蕩難名其奚以攄慤誠凡御製詩文規天矩地圭臬羣經天下之文章其孰能及此乎昕夕尋繹兼綜而條貫之蔚為國華頌是曼夀其辭曰體乾作則帝系綿昌惟精惟一含隂含陽沐以膏澤博考典章斂時五福來賁夀康其一祖武是仰五后纘承法天行健六位時乘日月環照曰升曰恆勿替引之奕葉雲礽其二民風噩噩樂樂利利函括萬邦歸於有制擴土之廣遍無窮際一人孩之夀以萬世其三察吏求賢禮樂明備以籌海塘既膏既溉河奏安瀾惟土物愛萬物致養於萬千載其四矢其文德一日萬幾圖左史右百度惟熙辟雍鐘鼓璧水環之釋奠視學展敬尊師其五武成九次雷霆亦福中外一家盡為臣僕勒碑太學玉山是矗咫尺天威與時茂育其六溯源會極比地凝精萬流景附安集邊城騎麟駕鶴何天衢亨我疆我理慶叶西成其七夀先五福道在節宣庶徴之八衍繹範言化成久道初日麗天延洪曼羡皇圖永綿其八萬夀頌九章謹序恩賜國子監司業銜一百十嵗臣鐘嶽臣聞天地之大德曰生德生無息聖人之大寶曰位寶位常尊是以三元玉篋備著皇年十紀琅函悉登帝算流虹繞電竒祥傳慶誕之篇拜洛觀河異祉記蕃來之牒葳蕤衍奧表聖即以徴符熿朗昭融顯德因而樂夀蓋自疏化循蜚以上結繩卷領以來莫不代有延祥世稱洪瑞欽惟皇帝陛下申命自天誕膺多祜聖人首出邁唐虞三代而一人福祿躬道合日月九如而萬夀百神受職環趨紫府之班五嶽披圖肅獻青童之笈佩瑑文而延喜受命惟庥拜寶册於長安永昌既夀誕敷文德照臨回雲日之光丕振武功底定勵風雷之勇啓龜圖於虎觀緑字朱文賔象譯於鴻臚赤鯷烏戈天潢衍派振繩發五代之祥皇極凝禧德夀萃萬年之慶洪維懿鑠既地納而海容仰繪光華實日輝而川鏡茲者昌辰慶際當元數之五五年聖節歡逄自八旬而萬萬夀九重有喜方與世以長春六宇蒙恩更因時而錫福開春頒詔獻嵗觀風五輅星陳及姒王之二月六飛夙駕修虞后之四巡松道鳴鸞躬展鳯文之策杏壇紆軫親瞻麟紱之鄉布闓澤於和風崇封造士沛湛恩於時雨賜復緩刑宜乎百靈效順五福駢臻六幕咸熙三多備頌人瑞則耆民夀族荷萬載之滋培物珍則瑞草嘉禾被九天之膏露而且八埏共理四海為家方慶節之初傳各占雲而來赴新封羅斛拜綰駝章入宴生畨人將鹿幣見頂經之佛國西旅來庭羣奉表於舌人南邦逺附洵百生而一遇為千古所稀聞臣海濵下士閩地拘儒占畢粗通恩綸頻奉溯自萬夀七旬之嵗適逄四門廣闢之秋臣以龎眉未能鴻舉仰蒙渥澤賜入賢書隔嵗同上春官特旨許成進士青袍甫曳宫錦增榮烏楔加崇奎章炳煥逮聖駕南巡臣恭迎西浙又蒙恩賞司業職銜寵錫宸章墨寶辟雍蹌躋同列橫經睿藻琳琅竒文捧衷乾隆五十年國慶特開千叟嘉宴臣以恩秩獲預末筵天酒醍醐奉雲尊而飽飫聖文珠玉拜星翰而欽承凡茲異數之頻邀具屬皇仁之浩蕩臣生當聖代百有十年閩地於京師五千餘里以臣庸愚尚荷聖渥允見仁恩普覆合濮鉛祝栗而咸孚大德醲覃繞丹穴空桐而悉被臣謭陋無文不足以敷揚聖治然比諸擊壤之民願歌帝德華封之老敬頌堯年從此貞符多富景命延長百祿是遒四方來賀髙探岱碣總七十二代代及無疆逺嫓天皇享萬八千年年還有慶臣誠歡誠忭謹拜手稽首而獻頌曰天眷聖德德合無疆乘乾出治履泰當陽侔羲嫓皥軼虞邁唐福祺茂介夀祉延慶一章皇祚履綏皇恩彌溥毖祀勤民揆文奮武蒸士闢門燕耆引户解網儀湯下車式禹二章皇帝曰欽雨賜寒燠四序循環九疇衍籙玉燭宜時金􅀈宜足製寶八徴耄念是朂三章皇帝曰欽善日維殷禹惜分隂堯警倦勤黜華崇實登質去文符瑞虛言其勿以聞四章皇帝曰欽中外一理祝嘏陳詞民情實喜京邑既行郡縣斯止勿勞民財用介繁祉五章帝維念民民益欣舞扶老擕稚接迹踵武瞻望鸞旗傾領法鼓遊豫康田春秋助補六章煌煌京邑天子攸居昌辰芳靄夀日紆徐鈞天設樂益地呈圖觚稜金雀閬風蓬壼七章名王親庭侍子咸至測水歸皇占風受吏睢盱萬狀咿嗢千致共趨夀辰為天子媚八章庸末小臣長養聖時龍光頻荷鳩杖同持往還萬里虔祝鴻釐祝天子夀夀萬萬期九章八旬萬夀盛典卷一百五
