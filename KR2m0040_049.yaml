遜初兹又據奏該省秋禾約收十分者咸寧等十廳州縣九分有餘者五即等七廳州縣九分者髙陵等十四州縣八分有餘者汧陽等十七廳縣八分者咸陽等十三州縣七分有餘者耀州等八州縣統計六十九廳州縣秋禾約收八分有餘其沿邉之延安榆林綏德三府州屬節候稍遲俟報齊後歸入實收分數題報等語該省秋成雖較麥收稍減而已在八分以上亦屬中豐矣亦自中豐民足食更無小歉俗安居屢綏西望誠欣彼陜省連嵗夏秋收成俱在八九分以上洵堪欣慰滿損一心為去聲惕豫富教此時言豈昜不忘桞氏郭駝書御製貴州巡撫額勒春奏報通省秋收九分有餘詩以志慰庚戌山田昜致雨亦復不愁霖黔省在萬山中經年多雨而山田易泄亦不畏霖故嵗多報稔是以多逄稔因之每慰心兹據額勒春奏本年各屬早晚二稻次第登場所有七十四廳州縣內十分收成者三十四處九分收成者四十處合計通省秋收實共九分有餘較之往嵗更覺豐裕現在新糧入市米價日見平減洵足慰懷九餘則近十昨繼更綏今衣食民苖帖寧須稱武臨貴州民苗雜處昔常不靖今久安貼苗人且有讀書者且嵗獲屢豐衣食既足奪攘不興亦無事臨之以威武也御製四川總督保寧奏報秋收九分有餘詩以志慰庚戌全蜀年來嵗號收山田易雨易為流川省亦以多山故雨易而泄亦易常無旱潦之虞不愁旱亦無虞潦常穫夏還有稔秋九近十堪上豐報兹據保寧奏川省各屬收成九分有餘者八府五州一廳九分者一府二州一廳八分有餘者一府二廳一州八分者一府一州七分有餘者一廳合計通省秋收共九分有餘洵稱上稔民和畨免一餐憂內安外靖衣食足西顧惟深保泰謀御製江蘇巡撫福嵩奏報秋禾收成八分有餘詩以志慰庚戌江省秋收報後時撫臣昜待彚陳遲前以江蘇省未奏秋收分數馳旨催訊實因新易撫臣必待各屬報齊覆加確核是以不免稽遲耳雖然合計中稔矣兹據福嵩奏江蘇收成十分者二十一廳州縣九分以上暨九分者二十九廳州縣八分以上暨八分者二縣七分以上暨七分者十二州縣六分有餘者三縣五分有餘者一縣不及五分者二縣統計通省秋收尚屬八分有餘可稱中稔等語實以偏災獨念之該省今嵗秋雨稍多山陽等十數州縣內低窪之田多被淹浸較之别屬收成自減分數已屢飭地方大吏加意賑恤以紓繾念蓋雖屬偏災而貧乏堪憐實不能去諸懷也鄰郡有無縱相濟一區貧乏莫教遺因豐者慰因歉戚方寸恆慚鮮定期御製陜甘總督勒保奏報秋禾收成八分有餘詩以志慰庚戌秋收繼夏收齊報八分稠勒保前奏甘省夏禾收成八分有餘兹又據奏秋禾收成分數寧夏甘州二府各九分有餘鞏昌平涼涼州西寧四府暨秦州階州肅州安西四直𨽻州各八分有餘涇州直𨽻州八分蘭州慶陽二府各七分有餘合計通省秋收實在八分有餘甘省貧瘠之區夏秋疊穫中稔殊深慶慰中稔既疊獲萬民庶解憂究為貧瘠處尚慎蓋藏謀三縣逄霜早緩征詔降優又奏蘭州府屬之臯蘭金縣靖逺三縣秋禾間有被霜之處雖尚不及一隅中之一隅然亦即降旨緩征以示軫念邉氓至意御製湖廣總督畢沅報中晚稻收成九分有餘詩以志慰庚戌早中晚稻幸三登耄念八徵慶叶徴湖北今嵗早稻收成已報九分有餘兹中晚二稻復據畢沅奏稱收成十分者十州縣九分有餘者十二州縣九分者三十五州縣八分有餘者七州縣八分者四州縣合通省共六十八州縣統計亦九分有餘等語豫以夀躋八旬寶鐫八徵耄念覩兹一嵗三登豐穰叶慶稽之載藉實亦罕聞前沴庶幾元氣復荆州江陵等州縣自前嵗災沴之後去嵗雖已獲中豐而元氣尚未必全復今幸得此上稔小民生計庶可漸充冬牟又見衆農興畢沅并奏近日膏雨頻霑節過秋社正可及時趕種冬麥民情倍覺恬熙蓋藏民固自為計教化官當善示恆楚民好訟故及之各省豐多報歉少今歲各直省奏報夏秋收成分數多在八九分以上幅員遼濶不無偏隅偶歉要亦不及百分之一心殷保泰能不益切凜兢撫兹泰運蓋兢兢御製江西署巡撫託倫湖南巡撫浦霖各報中晚稻收成九分以上詩以志慰庚戌江右湖南魚米鄉有收普足濟倉箱幸聞兩省遞佳信各報三登均上穰今嵗江西湖南早稻收成均報九分有餘兹當中晚二稻收穫之時據託倫浦霖同時奏到仍各九分有餘兩省疆域毗連均獲三登洵稱上瑞擬致民安祈嵗稔無煩吏治自時康豐多歉少頻閲奏慶慰益增惕不遑御製江蘇巡撫福嵩奏到二麥收成分數詩以志慰庚戌收麥江蘇報應早昜其宣撫到因遲江蘇巡撫閔鶚元因徇庇髙郵州知州吳煥袒護蠧吏假印冒徴一案革職拿問因將福嵩調任蘇撫福嵩于五月初旬方經到任是以奏報較遲重征侵蝕屢為弊吏治役姦可不知髙郵之案正在審辦間復據福嵩奏江寧句容縣有書辦侵蝕銀糧至數千金一案該省書役舞弊骫法自督撫以及府縣等竟置之不問吏治至此尚可問乎是以不得不嚴加懲治以示警戒補奏兹聞九分賸褔嵩奏江蘇省二麥實收分數內收成十分者溧水長洲等三十七廳州縣九分者上元句容等十五廳州縣八分有餘者山陽阜寧等八州縣八分者江浦安東等四縣七分有餘者豐沛等四縣七分者海州併所屬贛榆縣統計江蘇通省二麥收成實九分有餘等語遐思如見萬民怡南巡六度輿情悉親切相關更倍之臣等謹案洪範以八庶徴屬天九五福屬人蓋八徴全為農功而八徴之時若即為五福之先兆從來召和致祥之道皆取必於隂陽之叶宜况於四海之大民計之殷無不自皇極敷鍚而彰其應者乎我皇上披圖刻玉瑞闡八徴凡兹雨晹燠寒風之順序我農民實攸賴之年來不特腹地耕氓疊增嵗穫即新疆伊犁烏嚕木齊之逺亦皆墾屯服畝屢報有秋衍繹範意五行以稼穡居中八政以食稱首至百榖用成而庶徴乃見天庥之備五福用申天鍚之純其義有昭然不爽者伏讀御製五福富頌云有天下者其富若無然亦有焉乃在民乎是惟不言所利而自能以美利利天下穰穰綏壽正今日之謂也既聚天下之富以富一人所為合天下之夀以夀一人也而夀次以富之義亦於斯可互證矣八旬萬夀盛典卷四十九
