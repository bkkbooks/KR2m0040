body:
  text: 盛事十賜科第職銜二乾隆四十五年庚子科鄉試賜髙年應試諸生孟盼等舉人三十名乾隆四十五年九月初九日奉上諭本年順天鄉試諸生中三場完卷年屆八十者孟盼等九名榜發俱未中式念其踴躍觀光至老弗衰宜沛渥恩以廣化澤著加恩將孟盼郭青塏李青繹杜子甫鄭其德梁丙晉韓庚甲髙本亮李允實等俱賞給舉人準其一體會試俾皓首寒儒得償夙願用昭嘉惠士林之至意乾隆四十五年十一月十八日奉上諭本年各直省鄉試據該督撫等奏應試士子內有年八十九十以上者三場完竣榜發未經中式念其踴躍觀光至老勿衰宜沛渥恩以廣化澤所有江南省之吳球蔡綱杜琦劉行芳汪自強胡承球夏之璜江西省之鄭忠亮皮金綬鄭定猷湖北省之沈聚奎廣東省之張衍説潘峩饒鳴陽林成彬林懋烈并中式副榜之楊最德雲南省之錢兆基周世德俱著加恩賞給舉人一體會試俾皓首寒儒得償夙願用昭嘉惠士林之至意乾隆四十五年十一月二十九日奉上諭據富綱奏本年閩省鄉試有侯官縣廪生林朝綱現年八十六嵗連江縣附生黃建洛現年八十二嵗三場完竣俱未中式等語林朝綱黃建洛俱著加恩賞給舉人一體會試乾隆四十八年癸卯科鄉試賜髙年應試諸生田集盛等舉人二十三名乾隆四十八年九月十九日奉上諭本年順天鄉試諸生中年屆八十以上三場完竣者田集盛等三名榜發俱未中式念其年已衰老猶能踴躍觀光宜沛渥恩以廣作人雅化著加恩將田集盛王賓段三連三名賞給舉人準其一體會試俾皓首窮經者得償夙願用昭嘉惠士林至意乾隆四十八年九月二十八日奉上諭據何裕城奏本年河南鄉試有湯隂縣學生員許錫桓年九十二嵗榜發未經中式等語許錫桓年逾九旬尚能志切觀光宜沛渥恩以彰作人雅化著加恩賞給舉人準其一體會試用副朕嘉惠耆年至意乾隆四十八年十一月十三日奉上諭據閔鶚元奏本年江南鄉試諸生內有涇縣學鄭應鳴池州府學曹文超東流縣學馮荃霍邱縣學邢簠儀徴縣學陳謨等五名均年在八十以上三場完竣等語鄭應鳴等年逾八旬猶能踴躍觀光宜沛渥恩以廣作人雅化著加恩將鄭應鳴曹文超馮荃邢簠陳謨五名賞給舉人準其一體會試用副朕嘉惠耆儒至意乾隆四十八年十一月十三日奉上諭據畢沅奏陜西鄉試諸生內有渭南縣學附生劉力一寶雞縣學附生吳光烈均年屆八旬三場完竣等語劉力一吳光烈年臻耄耋猶能踴躍觀光宜沛渥恩以廣作人雅化著加恩賞給舉人準其一體會試副朕嘉惠耆儒至意乾隆四十九年正月初九日奉上諭據福嵩奏癸卯科浙闈鄉試有年屆九十之張本並年屆八十以上之毛德成等六名三場完卷未經中式等語張本毛德成朱紹璧翁體貴吳家仁董德潤年俱耄耋踴躍觀光殊堪嘉尚著加恩賞給舉人一體會試以示嘉惠耆年之至意乾隆四十九年二月初三日奉上諭據明興奏癸卯科山東鄉試有年屆八十以上之生員焦會塗等六名三場完卷未經中式該生等俱年逾八旬踴躍觀光深堪嘉尚兹當鑾輅經由允宜特沛恩施以示奬勵焦會塗張申趙象觀張自道徐簡揚梁重華著加恩賞給舉人準其一體會試用昭省方作人優惠耆齡之至意乾隆五十一年丙午科鄉試賜髙年應試諸生侯鍈等舉人四十四名乾隆五十一年九月十三日奉上諭前據吳省欽奏本年順天鄉試諸生中年屆八十以上者侯鍈等五名三場俱已完卷等語現在榜發俱未中式但念該生等年逾八帙猶能踴躍觀光宜沛渥恩以廣作人雅化俱著加恩將侯鍈蘇彩飛王泓梁元鉟劉子旭俱賞給舉人一體會試使皓首窮經者得償夙志用昭嘉惠耆齡至意乾隆五十一年九月二十八日奉上諭據何裕城奏本年鄉試生員塗紅鵬年八十八嵗三場試畢文藝尚屬平順等語該生年逾八帙猶能踴躍觀光宜沛渥恩以廣作人雅化著加恩將塗紅鵬賞給舉人準其一體會試俾皓首窮經者得償夙志用昭嘉惠耆齡至意乾隆五十一年九月二十九日奉上諭據保寧奏忠州梁山縣生員彭省非現年八十六嵗敘州府南溪縣生員談諭美現年八十嵗鄉試三場完卷等語彭省非等俱年躋耄耋志切觀光宜沛渥恩以彰作人雅化彭省非談諭美俱著賞給舉人準其一體會試俾皓首窮經者得償夙志用昭嘉惠耆齡至意乾隆五十一年十月初七日奉上諭據畢沅奏河南本年鄉試諸生中年屆九十者王協恭一名年屆八十以上者程鳴岐等四名年屆八十者王輝祖等二名俱已三場完卷並未中式該生等年逾耄耋俱各踴躍觀光宜沛渥恩以廣作人雅化著加恩將王協恭程鳴岐韋元勳閻遐齡毛景燧王輝祖同思義七名俱著賞給舉人準其一體會試俾膠庠耆耉得償窮經夙願用昭嘉惠耆齡至意乾隆五十一年十月初十日奉上諭據圖薩布奏本年廣東鄉試年屆九十以上者三人內謝啓祚一名已經中式舉人彭一猷中式副榜謝璜三場完卷未經中式等語除謝啓祚業經中式舉人外彭一猷謝璜俱著加恩賞給舉人準其一體會試俾膠庠耆耄得遂窮經素願以副朕嘉惠耆齡至意乾隆五十一年十月十五日奉上諭據徐嗣曾奏本年鄉試諸生中年屆八十以上者林復發曾錫嘏二名三場完卷並未中式該生等年逾耄耋踴躍觀光殊堪嘉尚林復發曽錫嘏俱著賞給舉人準其一體會試俾膠庠耆耉得償窮經夙願用昭嘉惠耆齡雅化作人至意乾隆五十一年十月二十日奉上諭據永保奏陜西鄉試士子房彥貴喬壬俱年踰八旬又浦霖奏貢生葉有聲年逾九十生員何紹怡王澤周俱年逾八十以上俱各三場完竣未經中式該生等年登耄耋尚能踴躍觀光殊堪嘉尚房彥貴喬壬葉有聲何紹怡王澤周俱著加恩賞給舉人準其一體會試俾膠庠耆耉得償窮經夙願用昭嘉惠耆齡雅化作人至意乾隆五十一年十月二十一日奉上諭李慶棻奏本年鄉試諸生中年屆八十以上者孫彥葛維楠李良棟三名俱三場完卷未經中式該生等年逾耄耋踴躍觀光殊堪嘉尚孫彥葛維楠李良棟俱著加恩賞給舉人準其一體會試俾皓首窮經者得償夙志用昭嘉惠耆齡至意乾隆五十一年十月二十六日奉上諭據明興奏本年山東省鄉試諸生年屆九十以上者李宏道一名年屆八十以上者王渭揚等三名年屆八十者李晃等三名俱三場完卷並未中式該生等年逾耄耋奮志觀光殊堪嘉尚李宏道王渭揚桑振東軒轅圻李晃方永祥王家賔俱著加恩賞給舉人準其一體會試俾膠庠耆耉得遂窮經夙願用昭嘉惠耆齡雅化作人至意乾隆五十一年十一月初五日奉上諭據閔鶚元奏江南本年鄉試諸生中年屆八十以上者趙有為等六名俱已三場完卷未經中式該生等年躋耄耋俱各踴躍觀光宜沛殊恩以廣作人雅化著加恩將趙有為金有光許承恩趙宏誠張家賢陳詩六名俱賞給舉人準其一體會試俾膠庠耉耉得償窮經夙願用昭嘉惠耆齡至意乾隆五十一年十二月十五日奉上諭據琅玕奏本年鄉試諸生中有年逾八十之章宸衛等四名俱三場完卷未經中式該生等年臻耄耋踴躍觀光宜沛殊恩以廣作人雅化章宸衛張啓瀟任際泰周岸登俱著加恩賞給舉人準其一體會試俾膠庠耆耉得遂窮經夙志用昭嘉惠耆齡至意乾隆五十三年戊申科鄉試賜髙年應試諸生康士雍等舉人三十九名乾隆五十三年九月十七日奉上諭據伊齡阿等奏本年順天鄉試諸生中年屆八十以上者康士雍張洪振二名三場俱已完卷榜發未經中式但念該生等年臻耄耋猶能踴躍觀光精神不懈允為藝林盛事康士雍張洪振俱著加恩賞給舉人準其一體會試俾償讀書夙志用昭夀世作人至意乾隆五十三年九月二十三日奉上諭據長麟奏本年山東鄉試諸生中年屆耄耋奮志觀光多至五十餘人俱三場完竣未經中式就中擇其年屆八十以上入學年分較早者李發枝李可士李承宗王兆隆王克昌五名文理俱無疵謬等語該生等或齒近期頤或遊庠年久猶能踴躍棘闈爭先恐後洵為熙朝瑞徵藝林盛事李發枝李可士李承宗王兆隆王克昌俱著加恩賞給舉人準其一體會試俾償皓首窮經夙願用昭夀世作人至意乾隆五十三年九月二十九日奉上諭據何裕城伍拉納浦霖奏此次應試年老各生江西省年屆八十以上者一人福建省年屆八十以上者三人湖南省年屆九十以上者一人俱三場完竣未經中式等語該生等年臻耄耋踴躍觀光精神矍鑠允為藝林盛事所有江西生員鄧嶽福建生員王奕年陳友仁李紹灝湖南生員李洪福俱著加恩賞給舉人準其一體會試乾隆五十三年十月十五日奉上諭據琅玕奏本年浙省鄉試諸生中年逾八十以上之貢生徐愛蓮陳兆熜附生劉方振王震安塢宗望宋佳玉等六名俱三場完竣未經中式等語徐愛蓮等年逾八旬精神矍鑠踴躍觀光洵為藝林嘉瑞徐愛蓮陳兆熜劉方振王震安塢宗望宋佳玉俱著加恩賞給舉人一體會試俾皓首窮經得償夙願用昭夀世作人至意乾隆五十三年十月十五日奉上諭據談尚忠奏琅鹽井學嵗貢生袁旻年八十四嵗三場完竣未經中式等語袁旻年逾八旬精神矍鑠踴躍觀光實為儒林嘉瑞袁旻著加恩賞給舉人準其一體會試以示朕夀世作人嘉惠耆齡至意乾隆五十三年十月二十日奉上諭據圖薩布奏本年廣東鄉試諸生中年躋九十之羅舜臣吳相江鳯鳴陳鳯翔三場完竣未經中式又據李慶棻奏本年貴州鄉試諸生內有遊鑑乾朱錦雯胡之寧年登八十三場完竣俱未中式該生等皓首窮經精神矍鑠踴躍觀光洵為藝林嘉瑞羅舜臣吳相江鳯鳴陳鳯翔遊鑑乾朱錦雯胡之寧俱著加恩賞給舉人一體會試用昭夀世作人至意乾隆五十三年十一月初六日奉上諭據閔鶚元奏本年應試諸生內江蘇省湯振王長駕吳霖王日熭畢文琳等五名安徽省王聖際胡先桂翟承春等三名均年在八十以上三場完竣未經中式又據惠齡奏湖北應試諸生吳梅舒繼芬年皆八十以上三場完竣榜發無名諸生等年逾八旬精神矍鑠踴躍觀光實為儒林嘉瑞湯振王長駕吳霖王日慧畢文琳王聖際胡先桂翟承春吳梅舒繼芬均著加恩賞給舉人準其一體會試以示朕夀世作人嘉惠耆齡至意乾隆五十三年十一月初八日奉上諭據孫永清奏廣西全州嵗貢生唐熙現年八十三嵗三場完竣未經中式等語唐熙年逾八旬精神矍鑠猶能踴躍觀光洵為士林嘉瑞著加恩賞給舉人準其一體會試以示朕夀世作人嘉惠耆齡至意乾隆五十三年十一月十三日奉上諭據巴延三奏陜西省附生張夢熊蔣遇辛年逾八十以上三場完竣未經中式等語張夢熊蔣遇辛年逾耄耋踴躍觀光洵為升平盛事著賞給舉人一體會試以示嘉惠耆齡至意乾隆五十四年己酉恩科鄉試賜髙年應試諸生左昌宗等舉人九十四名髙日新等副榜八十六名乾隆五十四年九月初十日奉上諭前據伊齡阿等奏本年順天鄉試諸生中年屆八十以上者左昌宗等九名七十以上者髙日新等三十三名俱三場完竣現在榜發俱未中式俯念該生等年臻耄耋猶踴躍觀光洵為藝林盛事其年在八十以上之左昌宗武宅鎬鄭學洙李垠塗文魁章敬修王朝臣胡自勉孫有誦九名並年在七十以上之副榜單備俱著賞給舉人準其一體會試其年在七十以上之髙日新馬克惠倪克勤孫大興王錫桓王家相安永宜馬元倬潘掄元安容瑛楊世法張應楫郭斌劉夢桂畢汾劉懿廣阮錫嘉王琨張日新黎淳張鑣宋炳炎賀雲程劉哲史彭年王文崔九州梁棟劉素位謝立吉髙瑛林見性俱著加恩賞給副榜以彰夀世作人至意乾隆五十四年十二月初五日奉上諭本年鄉試諸生年屆八十七十以上未經中式者除順天業經降旨分别加恩外兹據各省陸續奏到諸生中年躋耄耋踴躍觀光共百有餘人雖未經中式而三場均能完竣洵為士林盛事所有江南省八十以上之胡椿周宗勛許以恭劉鴻宣鵬徐日暄董作礪翁炳魏文鴻劉湘翟臯王道烜汪飛熊劉繩凖葉逢年張進履薑球等十七名江西省八十以上之黃景亮胡道南蕭士芝董夢江等四名浙江省八十以上之方宗華何大烈閔之琰馮全修魯學孟張諤等六名福建省八十以上之吳維新朱光章陳卜仁等三名湖北省八十以上之劉化鯤王奉元徐宗詔米有榮等四名湖南省八十以上之劉丰年李光旵李國霞李逢源歐陽謨吳家修文承發等七名河南省八十以上之湯希賢程紹先喬元熙武伸席梧貴吕朴季如璧等七名山東省八十以上之王有年王宗逺郭偉績趙泉趙瑞嵐等五名山西省八十以上之李文眀孫公輔李如山孫元麟郭長源吳企晳等六名陜西省八十以上之張大烈張守經閻輔輝張振師尚友等五名四川省八十以上之潘履謙戴文璧劉洪文王體亨王升平李維岱等六名廣東省八十以上之李賴豫楊家樹馬登翰李光雲邱修己關睿南何紹綱等七名雲南省八十以上之湯祚昌錢大有等二名貴州省八十以上之楊宜科黃中理趙錫爵徐苾王德洪等五名俱著加恩賞給舉人準其一體會試其浙江省七十以上之沈志超胡以晉徐由湘黃敏樓象春范鈺潘兆謙李鴻鄭拱秀張愛士士周嘉祺沈慧業等十二名湖北省七十以上之劉中陵蕭光泰張元瓏袁國桂邱雨濬李華盧薰楊大謨劉先士方玉堂冉三桂邱文開關力魁周三鼎等十四名湖南省七十以上之黃佑啓山西省七十以上之宋守祀蕭鳴山薄文龍王夢熊劉煥王克惠杜霘髙曰敬郝兆珠周汝第郭延山萬之幹強屾王振祚孫大發李時旺劉衣德薛掄魁趙學普李溥趙掄逹李晚榮孫膺祜王憲武王儀烜陳丹書馮憲鄴等二十七名俱著加恩賞給副榜以彰夀世作人至意直𨽻總督臣劉峩謹題為據情代奏恭謝天恩事據康士雍張洪振等呈稱竊惟盛世崇儒萬國仰敷文之治熙朝重士四門隆籲俊之恩慶壽宇之鴻開億兆咸登夀域頌春暉之廣被耄耆盡入春臺兹屆乾隆五十五年恭逢皇上八旬萬夀預于五十三年戊申舉行正科鄉試士雍等畿內寒儒燕山下士八十載夏絃春誦羣霑化日之舒長百餘年摩義漸仁共沭薰風之披拂承筐鼓篋每嫌壯不如人矮屋低簷幾忘老之在我屢剪三條之華燭莫乘萬里之長風乃景駐桑榆仰荷離明之當午材慚樗櫟復邀巽命之重申鳳誥頒來許附賢書之末鹿鳴宴後仍趨都試之期洵士林未有之竒逢實夀世作人之盛典雖囊中頴脫問數還竒而格外恩施所遭非偶青雲得路白屋增輝合嵩呼華祝以輸誠總藝苑儒林而志慶理合呈乞代題恭謝天恩據此臣等看得舉人康士雍張洪振等身依庠序年屆期頤久厯昌辰未遂鹿鳴之願幸蒙曠典方占鴻漸之庥永矢感夫隆慈倍增光于晚嵗雖曰詩書食報荷天家雨露之施實惟夀考作人仰聖主菁莪之化理合恭疏具題報聞臣等謹案易曰觀乎人文以化成天下又曰聖人久于其道而天下化成一人夀考作人黨庠州序中莫不是訓是行以近天子之光矧其皓首窮經涵濡至久者歟我國家三年貢士賢網廣張皇上溥栽培之澤盡鼓舞之神自乾隆四十四年特開七旬萬夀恩科五十三年復詔開八旬萬夀恩科單寒績學之儒疊逢盛際咸得自奮科名而龎眉秀髮八旬九旬以上踴躍觀光者姓名上列恩旨遄頒上年併七十以上亦蒙加賜副榜樂育之恩尤為至廣竊考古者興賢之書比其德行道藝而獻之然而洽蒸髦之詠者未聞兼引年之典漢制賢士遣詣相國府年老者勿遣元朔之詔旅耆老與選豪俊並舉夫計偕之典長吏會屬僚設賔主陳俎豆備管絃牲用少牢行鄉飲酒禮歌鹿鳴之章徴耆艾聚少長而觀焉今以耆艾之士得與斯選斯亦榮矣本不獲與而特頒茂渥俾償夙願作士林之嘉瑞稱盛世之耆儒其為榮幸又何如矧夫耄耋成羣鮐背相望十年來賜科至三百六人之多計年合二萬餘千以上崇文綏夀誠逺軼夫姚思姒命之盛也哉八旬萬夀盛典卷三十四
