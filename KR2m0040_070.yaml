front:
  text: 欽定四庫全書八旬萬夀盛典卷七十恩賚九本年恩科一
  hash: sha256:bab8febe60d2138035a507ac9e196f4369696755afb932a8a4bf7e8b4c67fded
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_070-1a, image: WYG0660/WYG0660-0831a.png}
body:
  text: 臣等欽惟我皇上元化陶甄羣倫普被教育五十餘年之乆天下士子蒸蒸向風莫不思敦實學勵真材以副聖天子籲俊旁求之徳意自龍飛首祚肇舉丙辰科鄉㑹試越壬申庚辰庚寅已亥皆以國慶之年叠開恩榜兹逢耋夀膺禧預宣綸綍載舉特科有道亨期作人盛治於斯為至仰惟聖澤􅉼濡屢廣登進之途以振興士類前者欽定文武兩闈賜宴樂章殷然屬望於棫樸之英干城之選兾叶慶以得人是以俊髦蔚起士氣奮揚比年來玉闗之遥亦登解額者齡之衆羣切觀光斯鴻鈞之鼓物於不自知而實際㑹之所未嘗覯者也臣等或身䝉任使或快覩遭逄窃謂自漢制賢良孝亷諸科剛毅勇猛諸選以來取士之盛無如今日育才之盛亦無如我皇上者易曰聖人乆于其道而天下化成又曰㧞茅茹以其彚征吉夫孰非恩敷多士炳耀無窮之茂軌也歟皇上以八旬萬夀詔開恩科於乾隆五十四年秋舉行鄉試五十五年春舉行㑹試以光作人鉅典乾隆五十二年十月初一日奉上諭前據王公大臣及直省督撫大吏等以乾隆五十五年朕八旬慶節請舉行萬夀慶典朕以内外臣工等臚歡祝嘏出自積誠是以降㫖允行朕臨御五十餘年夀躋上耋五世一堂篤慶錫光歡騰率土宜沛特恩用光鉅典除恩詔條欵届期頒發外所有下届鄉㑹試正科著于五十三年八月五十四年三月預先舉行五十四年秋舉行恩科鄉試五十五年春舉行恩科㑹試以示朕樂育敷恩夀世作人至意五十四年己酉萬夀科鄉試禮部按道里逺近先期宻題請差主考皇上以次遣官分典試事中式如額禮部題奉欽㸃兵部尚書孫士毅工部右侍郎鄒奕孝内閣學士兼禮部侍郎圖敏為順天主考官取中舉人二百三十二名副榜四十一名内閣學士兼禮部侍郎胡髙望吏部考功司主事賀賢志為江南主考官取中舉人一百十四名副榜二十二名大理寺卿趙佑翰林院編修錢樾為江西主考官取中舉人九十四名副榜十八名禮部侍郎竇光鼐翰林院編修程昌期為浙江主考官取中舉人九十四名副榜十八名翰林院侍讀陳嗣龍工部都水司主事劉青照為福建主考官取中舉人八十五名副榜十七名翰林院修撰史致光吏部文選司員外郎恭㤗為湖北主考官取中舉人四十七名副榜九名翰林院檢討徐鑑鄧再馨為湖南主考官取中舉人四十六名副榜九名翰林院編修裴謙陳萬全為河南主考官取中舉人七十一名副榜十三名户科掌印給事中馮應榴户部廣西司主事陳廷慶為山東主考官取中舉人六十九名副榜十三名翰林院編修秦承業右春坊右庶子李潢為山西主考官取中舉人六十名副榜十二名吏部稽勲司郎中江濬源詹事府洗馬周興岱為陕西主考官取中舉人六十名副榜十二名翰林院編修温汝适禮部精膳司主事劉若璪為四川主考官取中舉人六十名副榜十二名刑部四川司郎中金光悌工部都水司主事陳學頴為廣東主考官取中舉人七十一名副榜十四名禮部主客司郎中方維甸翰林院編修崔景儀為廣西主考官取中舉人四十五名副榜九名翰林院編修馮集梧檢討劉錫五為雲南主考官取中舉人五十四名副榜十名户部雲南司員外郎薩彬圖兵部武選司郎中王錕為貴州主考官取中舉人四十名副榜八名共中式一千四百八十名十月萬夀科武鄉試兵部奏請一體舉行兵部題奉欽㸃多羅儀郡王永璇多羅定郡王綿恩禮部尚書常青都統公阿克東阿兵部左侍郎伊齡阿户部右侍郎汪承霈為順天武鄉試監射大臣翰林院侍讀學士平恕編修朱攸為主考官取中武舉一百五十一名各直省照例以總督廵撫監臨主考兩江總督書麟取中江蘓安徽武舉六十三名江西廵撫何裕城取中武舉四十四名浙江廵撫覺羅琅玕取中武舉五十名福建廵撫徐嗣曽取中武舉五十名湖北廵撫恵齡取中武舉二十五名湖南廵撫浦霖取中武舉二十四名河南廵撫梁肯堂取中武舉四十七名山東廵撫覺羅長齡取中武舉四十六名山西廵撫海寜取中武舉四十名陕西廵撫覺羅巴延三取中武舉五十名陕甘總督勒保取中武舉甘肅五十名四川總督李世傑取中武舉四十名廣東廵撫郭世勲取中武舉四十四名廣西廵撫孫永清取中武舉三十名雲南廵譚尚忠取中武舉四十二名貴州廵撫陳步瀛取忠武舉二十三名共中式六百六十八名五十五年庚戍三月萬夀科㑹試天下舉人於禮部欽定知貢舉總裁同考等官并八旗直省中式額數禮部題奉欽㸃禮部右侍郎鐵保刑部左侍郎姜晟為知貢舉官大學士王杰吏部右侍郎朱珪工部左侍郎鄒奕孝為總裁官翰林院侍讀學士陸伯焜侍講學士陳崇本侍讀陳萬青詹事府洗馬周瓊左春坊左賛善羅修源編修俞廷棆吴錫麒甘立猷吴樹本邵玉清吏部稽勲司主事史國華刑部浙江司員外郎王奉曾工部虞衡司主事樊士鑑掌江南道監察御史黄瀛元河南道監察御史王春煦國子監助教沈維坤為同考官三月二十七日禮部題中式額數奉㫖這㑹試滿洲䝉古取中三名漢軍取中一名直𨽻取中十一名奉天取中一名山東取中十名山西取中六名河南取中五名陕西取中二名江南取中二十八名浙江取中八名江西取中七名湖北取中三名湖南取中三名福建取中四名廣東取中三名廣西取中一名四川取中三名貴州取中二名雲南取中一名共中式一百二名九月萬夀科㑹試天下武舉欽定知武舉監射較射總裁同考等官并八旗直省中式額數兵部題奉欽㸃和碩嘉親王永琰多羅定郡王綿恩禮部尚書常青户部右侍郎慶成為監射大臣兵部尚書慶桂劉峩兵部左侍郎趙鍈右侍郎䖍禮寳為較射大臣刑部左侍郎姜晟為知武舉官内閣學士兼禮部侍郎翁方綱詹事府少詹事平恕為主考官刑科掌印給事中查善長禮科掌印給事中王鍾健吏部考功司郎中宋㴻禮部主客司主事王璸為同考官九月十七日兵部題中式額數奉㫖這考試漢軍取中二名直𨽻取中七名陕西取中六名廣東取中五名河南取中一名山東取中四名江南取中二名山西取中三名湖北取中一名湖南取中一名四川取中一名廣西取中一名福建取中一名浙江取中二名江西取中一名雲南取中一名貴州取中一名共中式四十名四月二十一日皇上䇿試天下貢士朱文翰等於保和殿禮部題奉欽㸃大學士公阿桂大學士伯和珅吏部尚書彭元瑞吏部左侍郎金士松禮部右侍郎鐡保署禮部左侍郎沈初刑部左侍郎姜晟内閣學士兼禮部侍郎玉保為讀卷官是日早諸貢士赴保和殿殿試皇上賜䇿問奉天承運皇帝制曰朕祗承大寳命仰荷燕翼貽庥御㝢久長日慎一日惟是納隍馭朽厪于子恵兆民上答昊縡恩徳今幸年躋八旬康强勤恁未敢髙自頥飬抑非術致駐延孜孜不息久習而安用致五代逢吉四裔向風保赤誠求鮐倪愛戴然猶仔肩罔怠思欲持敬宅心鑑古出治千倉藏富六計勵官而集思廣益貴乎周逮廼詢爾多士以佇昌言洪範九疇五福騐之人八徴騐之天而總原于五事之敬用故主敬者天人之合也尚書道政事賅帝王五代心𫝊萬世治要其中深切著明惟曷其奈何弗敬一語足蔽全書向曽于讀召誥篇闡厥義宗矣若夫耆媯子姒之臨其下禹皋伊旦之貢其君六體十例中與斯言互為發明者可臚舉歟易詩禮春秋可旁通歟大戴禮逸周書管子晏子荀卿成相淮南主術亦有紬繹斯語者歟帝範帝學大寳丹扆二箴大學衍義飬正國説或言主敬或不言主敬而義相印事相彰者可指述歟能以此揚明廷抑用資宥宻也以古為鑑可知治忽編年之體通鑑謙不敢繼春秋而託于繼左傳其平生精力書局自隨同譔者何人分代者何属採取者正史外何書略而為目録㭊而為甲子紀年訂而為考異别而為稽古録體例可敶歟分而冠之以綱為綱目盡出朱子之意歟逺而追之于古曰前紀徴引盡軌于正歟續當代者長編五朝九朝有全帙歟建炎以来朝野雜記不少約歟續後代者宋元通鑑兩家之作孰優歟然且紀統紀年不出至公紀事紀辭或嫌失實炎興存宋宣光黜元黄帝國畫萬區后啟鼎鑄九賦釋兵權者詫竒謀躭晏安者夸至孝火牛燧象虎渡蝗遷昔備之鑑評尚無愆于春秋之義乎蠲貸之政恵澤攸先損上益下恵心元吉易義可繹歟昔人謂古者畫井受田故無蠲政然帝王因利利民周官之職左傳之文其制亦相近者歟除民田租史昉漢文有蠲半者有蠲十之三者有免逋者有免酒課坊税者有廵幸而蠲有封禅而蠲有幸舊宅而蠲有軍所過而蠲有優聖人林廟而蠲皆能指其年代稽其事實歟寛緩之令宋人謂之倚閣或且廹于私衷累于破限甚至有黄紙放白紙収者當時章奏剴陳之能言其弊歟至於放民租而以内庫撥還非示人私歟因免賦而及私債不擾民歟朕課晴問雨為民亟三時布闓敷醲為民謀四鬴自乾隆五十年以前蠲貸已二千萬萬積嵗有加焉本年以大慶普蠲天下錢糧三年而徧兾裕盈寜而廣和樂民力其有紓歟奉行其盡善歟多士自田間来盍讜陳之善為政者安民必先察吏堯典重乎允厘舜歌戒其叢脞其要在先事後食勿欺而已周官太宰受其㑹正其治聴其政事嵗月日皆有期㑹能詳之歟三載考績三考黜陟幽明又有十二年之廵狩大明黜陟立法之意可徴諸説經家歟唐考流外官四等宋考百官三等皆以勤為上能列其目歟城隍修理為二十七最之一窃盗十一而得十為中考能舉其故事歟官箴百官箴之所規政經之所尚㫁章可取歟戒石本有全辭節鐫公庭何時所頒發歟朕耄念殷求出則秉燭待章居則宵衣鮮寐以盡負扆之職盂水方圓之謂何何猶有延玩庇餙者率作興事慎憲省成法猶未盡良歟凡此立敬則不忒法古則不愆孚恵則不屯其膏莅勤則不懈于位書之簡䇿為治譜庀之朝夕為躬行予曷敢不亹其孰敢勿蘉上下交修予一人藉報帝載鴻貺之隆爾萬方更勝公堂兕觥之祝家修廷獻明道敷言毋諱毋膚朕将親遴焉二十五日皇上御太和殿賜諸貢士等進士及第出身有差是日早讀卷等官并諸王以下文武百官各具朝服赴太和殿前侍立禮部官捧黄榜置于丹陛正中黄案上鴻臚寺官𫝊制唱名奉天承運皇帝制曰乾隆五十五年四月二十一日䇿試天下貢士朱文翰等一百二名第一甲賜進士及第第二甲賜進士出身第三甲賜同進士出身故兹誥示十月十六日皇上䇿試天下武舉魏廷魁等於太和殿兵部題奉欽㸃吏部尚書彭元瑞禮部右侍郎鐵保都察院副都御史陸錫熊詹事府詹事伯麟為讀卷官是日早諸武舉赴太和殿殿試皇帝賜䇿問奉天承運皇帝制曰朕撫御寰宇五十有五年先幾克詰奄致敉寜逺服嚮風靈䑓偃伯惟是簡蒐訓整誠豫謀成不敢以無事而去兵致啟恬嬉之漸凡稽查縻冒綏靖海隅申嚴警衛者皆宜講求之裕國家軍制磐石八旗有勇知方度越前代而健鋭火器兩營屢成大凱實為得力惟緑營虚額占差名糧殊為積弊近已給武弁飬亷釐兵丁實額矣夫兵法最重虚實臨事之虚實在情形平時之虚實在訓練有額無兵與無額同冇兵不練與虚額同宜何如而使實額皆成實用歟古疆域以海為界今則海表多入輿圖商舶興販往来生計攸繫重洋寜帖所以裕生民也頋盗案時聞聚匪宜飭于是有更制海船之議既以輕剽未可舉行又有捜島焚藔之説則未利民而先厲民更為未善夫沙嶼非盡可耕聚居必資口食禁米出洋舊有成例或奉行嚴宻即可渙其羣歟禁虣安良譏察出入居者以保甲行者以口票船照法綦明矣頋違禁貨物或有透漏出疆私越驀渡者公行而兵以為奸弁以為利且有逃人積匪至十數年而若罔聞知者遇事整飭自宜猛知懲戒矣将何如而使悉知盡心盡力俾莠稂除而肥我善稼歟此皆戎政常行不容稍有懈弛者多士如有所見其縷陳之毋浮毋隐朕将親覧焉十八日皇上御紫光閣較射十九日復御紫光閣親試技勇二十日賜諸武舉等進士及第出身有差是日早讀卷等官并諸王以下文武百官各具朝服赴太和殿前侍立兵部官捧黄榜置於丹陛正中黄案上鴻臚寺官𫝊制唱名奉天承運皇帝制曰乾隆五十五年十月十六日䇿試天下武舉魏廷魁等四十一名第一甲賜武進士及第第二甲賜武進士出身第三甲賜同武進士出身故兹誥示
