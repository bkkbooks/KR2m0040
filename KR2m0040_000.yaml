body:
  text: 進表大學士公臣阿桂等謹奏臣等恭纂八旬萬夀盛典告成謹奉表恭進者臣等誠歡誠忭稽首頓首慶惟我皇上福集箕疇夀增軒紀堂顔四得具位録名夀而宜民寶篆八徴省嵗日月星而來偹三乘三履統天之御五十五叶大衍之全萬嵗樂以由庚八帙盈乎步戍環瀛喜洽戴斗愈騰鑒黎赤之貢箋爰允祝釐之請籲簮紳而載筆特摛紀盛之編粵若繞電兆禧流虹篤祜祁乙酉溈丙戌宛授受之相承文庚寅武壬辰儼後先而中立軒轅以戊生為土德之王成湯以乙日應元鳥之祥三統云遙邈莫祥於僂祘六帝未逮但得半於添籌溯唐室之開元肇誕辰而立節絲囊綬帶通戚里之饋飴白帝田神託民間之報賽張九齡千秋金鑑之録徒緬古風王虞休八宫誕聖之歌侈􅀈俗樂談延參成徐岱陋三教講論之誣大同紹興至元鮮一代聖神之實翻九流之舊目探四庫之新藏從大撓納甲以來罕臻茲會即史皇制字而下未見有書維康熙初集之垂乃癸巳六旬所輯圗鐫翠版迹耀金繩時甫當飴侍沖齡聖以繼聖逮今而觥稱大慶書不一書德紹祖以彌謙遲二十年之後事屬辭而相比昉七十夀有加首冠之甲之詩文次敘近旬之功德鏤瑞疊祥駢之牒用告嘉符注晨參畫會之班式彰巨典設科蠲賦恩賚示上德之宣獻册染豪繪頌採下情之逹攦目析八門之富托實袪一語之夸臣等率同總纂纂修等雀躍編蒲夔欽授簡馮典禮典屬之牘官舉上儀鳩工書工畫之儔子來副墨矢寅衷而成帙塵乙覽以仰裁竊省全函是億齡之起例試攄六事洵萬世所曠逢自昔睿文輒囏閎製躓山躓垤堯戒三年風薰風時舜琴一操朕在位七十載紀言出自史臣厥享國五十年述德乃由家相今則同天道久與日銘新詩取編年嵗積黃綾兩本文真夀世義通漆簡六經每録數篇即裒多卷道充尺籍百倍于堯典禹謨聖惜寸陰長閲夫皇春帝夏斯萬世未有者一也間尋螙籍競詫鴻功玁狁近逐於太原徐方逺矜於江漢勤軒皇之教戰尚恐霧迷謝光武之閉關自勞鬚白今則四知先覺三捷頻馳赤囊靜洗於鯤身銅柱遙開于象郡驃來獻樂畨伏頂經時措之而咸宜老謀壯決天巍乎其罔外大畏小懷有如如歸我戰則克况乎濛西拓土事宜在卅載以前藏外宣威勝續人十全之記斯萬世未有者二也有媯宅位猶戒倦勤周穆詰方必言荒度演洛書之嚮用次在康寧數曲禮之引年名殊耆艾今則日強以敬天健惟恆宵衣旰食之居諸夕惕朝乾而悠久禋祗廟社升歆匪懈於躬行日月農黌抱蜀咸周於親獻秋上蘭而講武塵清六轡郊原冬佛臘以臨筵步陟三層樓閣玉雕鳩首屏楖栗而未扶楮灑蠅頭却雞靆而弗御不導引而夀聖與人同亶聰明作元天之將縱斯萬世未有者三也諸家撰述多騖禨祥元狩元鼎以紀年神爵神麚之建號餘杭半壁縑披濩澤之圖丹徒布衣史創吳興之志今則寶道不愛福祿罄宜見元孫者二百家慶餘瓞室師國子者百五嵗講聽槐街鹿鳴邀再宴之卮麟趾捧四男之粟然且皖呈黑米詎若屢經晉報清河如如底績冬藏蝶見什勤勒於太常春始帛飄事弗宣於史館惟勤民夀年豐為上瑞不詡天時人事之郅隆斯萬世未有者四也古云職貢例付丹青立本摹列國之衣冠賈耽志諸畨之道里漢屯戊巳羈縻右臂之謀明致梯航荒䀛西洋以外今則舊基締構新宇規恢胥此享王躋之仁夀畢班璧特因頤婦而賜翎華篤由東稟疆人而剃髮緬使順徠於花象交王叩覲於朱鳶坎扒窪解貢名經珠露海知書慶節汗王台吉並集爻閭屯練降番亦依仙仗天髙秋孟山莊特宴生身日近年班沙塞本行熟路斯萬世未有者五也賦徴忠愛頌媺形容卿雲復旦之詞賡惟八伯柏梁和時之唱聮者數臣吳楚不登於國風夀榖苐肄於樂府今則文思光被典學崇深一記抉洪範之精兩論闡中庸之藴趨彤庭之訓皇子聞詩播紫閣之章陪臣屬和謡衢三百睿句被以管絃祝嘏十千夷樂譜為僸佅手第從臣之頌荷加賜者十人胸開下學之蒙俯改題者全韻詩以言志臚謳吟舞蹈之歡君乃作師廣敦厚溫柔之教斯萬世未有者六也如上所系悉載於書緑字赤文粲長生之芝籙琅函玉簡握益夀之蘿圖炳爍天文煒煌家法迪光册府流曜藝林堯以勳而舜以華書皆名典旦繫爻而文繫卦易統稱周頒向綿區彌下際上蟠之宇庋諸棐几排左圖右史之籖從兹萬夀重輪繼此十年一部蜚英聲而騰茂實人皇萬八千嵗寶緘益牣於酉山揚偉績而張鴻庥盛典百二十􅗡祕録允推為甲觀臣等曷勝欣喜踴躍之至謹將纂成八旬萬夀盛典裝潢八函計四十册隨表恭進以聞乾隆五十七年十月日大學士公臣阿桂大學士臣嵇璜大學士伯臣和珅大學士臣王杰大學士公臣福康安大學士臣孫士毅吏部尚書臣金簡户部尚書臣福長安户部尚書臣董誥兵部尚書臣慶桂工部尚書臣彭元瑞吏部左侍郎臣金士松吏部右侍郎臣沈初欽定四庫全書八旬萬夀盛典奏摺大學士公臣阿桂等謹奏為大慶祝釐上儀紀實恭請編輯八旬萬夀盛典以顯苞符以光册府事欽惟我皇上乾行合撰隆運重熙億祀昌辰篤若水稚華之瑞萬靈慶會轃常羊荆馬之祥年三登而汁帝期綏以多者嵗豐人樂夀八表而躋仁域遊於宇者詠德舍淳至誠之悠久無疆冠百王而首出皇極之康強逢吉膺五福以大同豈惟子姒黃姚潔喬齡而莫並亦越羲炎巢燧輪景祚以未逢洪惟五十五年恭逢八旬萬夀九五演易九五演範疊五策天地之全八千嵗春八千嵗秋積八入宫商之頌嶽輸川效集萬有以承歡萊北臺南寫羣情而請祝仰蒙睿鑒俯錫俞音方當鮮集鳬趨披鰈國鶼邦之悃矧繄簮毫濡墨綴西清東閣之班竊以三皇各嵗萬八千史臣勒之古牒伊耆在位七十載虞典首於尚書姬公遵迪哲之人表殷宗之克夀宰我論德繫之説問皇帝之永年肇聖節於五日之絲囊上寶書有千秋之金鑑皆傳紀撰布在縑緗粵稽康熙癸巳三月之辰實惟聖祖甲子六周之度時啓事允臣工之奏厥成編志盛美之模我皇上率祖攸行自天申錫凡一二日敕幾之罔暇悉家法法丕承况二十年稱暢之展期廣舊章之成憲宜煥琅編之色重宣瑶籙之光惟是躬握治平心參造化敬天法祖勤政愛民內聖外皇之規細目宏綱之綜秉文德則文二集詩五集彚全書四庫而為昭鑠武功則平凖部蕩回部綏金川兩番之耆定孚慈惠而司農之籍笇億萬以全蠲考制作而太史之書監三五而大備具載左言右動之記注且經帝典王謨之法揮大莫名天小難言聖豫億兆人以共聞共見民可使知取二三䇿以稽舜稽堯書不盡意茲臚盛典取協夀符昔時讓善為懷六甲慎恆言之福撝謙皆言七帙謝獻嘏之文羣志未申九秋以冀滙籖羅於二酉叶環轉於重庚擬以今衆所陳昉自古稀之説十年一集由七旬至於八旬萬嵗三呼起初帙絫為億帙倣前書而一例攦全部以六門首辨宸章次揄聖德崇閎敬典恩施普汜於環瀛點染成圗歌詠偹呈於擊壤均踵事以􅍇後先之合撰兼旁通以耀作述之加隆更有著績邇年目當創始騰膚功之逺播撮盛事之嘉祥則若掃苞􅀈於石峯戎無伏莾築鯨鯢於鹿耳海不揚波滇徼逋酋誓酬恩而納賮日南舊國感申義以親朝髙句驪拜尚齒之筵布魯特跪長年之婦暹羅斛國刻新印以册封屋鼇社番增故國之職貢總本精神之康裕蟠際綋埏益彰赫濯之聲靈彌綸宇宙况乃制多邁古兆每應期五代同堂豐庭闈之衍瓞十葉以外晉階級於本支嘉筵紹於彤墀老吾老及三千叟太和充於蔀屋孫生孫者二百家辟雍道德之流講仁敬而詮更老黌舍關門之表西鎮迪而東興桓耄耋觀光賜秋試春闈或罷官而登第期頤綿算賚天章奎畫增繡假與朱提望吉帛之晨飄塔如仁佛啓綵衣之冬蟄蝶亦能仙雖盛世不侈瑞應之圗而夀宇自副吉機之卜蓋嚴恭寅畏所其無逸彌培曼羡之原斯聰明睿智足以有臨倍切尊親之戴丕冒海隅出日夀考且寧大亨天下隨時會歸有極歌太平於既醉萬年頌介昭明羾純嘏以來同四方民大和會抑戒百嵗譜全詩入殿左之絃禹貢九州斥彌文惟土宜之獻於彛訓斂而敷錫隨聖政先以編摩作為一經虞虞夏之渾渾爾垂諸萬世揭日月之昭昭然臣等願積瀛籌身依天咫值駿龎之慶雲動風翔陶鴻朗之基溟長嶽固乾坤有象繪毫素以非全章亥難量舉跬步而詎足擬竭方隅之見強稱大道之名奉三無私聖人之作也如覆載照致四必得昊天其子之以保祐申請誦六章之詩川至日升月恆山阜岡陵松柏之茂厪敦九功之敘利用厚生正德水火金木土穀惟修久道以成義存乎先勞無倦神明而夀理徴諸莊敬日強虔抽麟管之編共籥兕觥之什潤色未工載筆尚仰稟於文思鋪張匪事摛詞但實􅀈於郅治抃攄衆志翹瀆聖聰謹合詞恭請伏祈恩準施行臣等無任歡躍待命之至謹奏乾隆五十四年正月初八日奏本曰奉旨知道了欽定四庫全書八旬萬夀盛典凡例十二則一恭纂八旬萬夀盛典凡以載德揚輝臚歡紀盛溯自乾隆四十五年皇上七旬萬夀湛恩􅐮澤覃及臣民即宜撰列成編敷陳美偹乃聖懷謙約未允舉行慶典屆今八旬周帙薄海內外始獲效祝抒忱統此十年中炳鑠淳懿之規積久愈茂臣等軒鼚鼓舞之願亦積久彌虔今所綜輯敬以古稀為先庚肇慶按年類載綱舉目從蘄昭久道化成之盛軌一全書體例恭依康熙五十二年萬夀盛典初集分門排次如宸章聖德典禮恩賚圗繪歌頌六門謹循舊貫以次臚載洪惟我皇上德威逺播景貺駢集鴻勳偉績史册所無滋至之庥諸福之應畢萃一時臣等躬際郅隆職司珥筆謹增聖功盛事二門一以彰格被之逺一以識嘉祥之備摛毫紀實非事鋪張一典內分門如宸章聖德聖功盛事諸類登載自乾隆四十五年庚子逮今五十五年庚戌幹運一周道光萬祀盛猷丕煥茂祉龎鴻簡不勝書裒成纍帙至典禮恩賚圖繪歌頌各門恭臚本年慶典邁成周王會之模儷伊耆康衢之祝尤屬一時馨烈千古上儀一恭纂宸章一門欽惟御製詩文道貫羣經義昭信史日新富有一一本諸實政發為至文編在御集以數千萬計淵富海涵未能備登臣等敬加紬繹凡紀事之篇有關本事者悉於各門分類恭載兹卷惟録紀年之作文自古稀説以下詩自庚子元旦以下取叶夀符按年編次臣等管窺所及間附案語以識欣懌誠服之忱一恭纂聖德一門欽惟皇上文武聖神體天合撰昭事之至誠繼述之盡善緝熙宥密行健日強典學右文誠求保赤巍巍蕩蕩莫得名言億兆臣民實有共聞共見者雖摹天繪日未能罄廣大昭明之量而攦事紀實比於左右史言動之書倍為親切謹分類撰德式彰美備恭依康熙盛典之例一恭纂聖功一門欽惟聖武逺揚膚功屢告平定凖回兩部大小金川事在乾隆四十五年以前各有方略全書久已頒布海內兹巷惟紀庚子以後如安南之輸誠入覲緬甸之不戰徠歸廓爾喀之納土降順胥仰賴智周健運握算幾先故能應會赴機鴻勳迅集又若臺灣蘭州石峯堡之應時俘馘亦皆出於睿謨籌畫並徴諸紀略之書撮舉大綱附載以昭聲威赫濯之盛彌見精神運量之周一恭纂盛門一門皇上崇實黜華從不侈言瑞應而昊乾甄貺嘉瑞疊彰天宗蕃衍夀宇咸躋慶茂耆筵恩增名籍户興仁讓嵗告綏豐諸福可致之祥皆皇極斂敷之實儲祥衍羡雲集川增聿彰仁夀萬年之盛條分年系並有關於國祥家增事惟其實義惟其正若前代繪瑞應之圗輯符瑞之志者概無取焉一恭纂典禮一門洪惟本年舉行慶典凡元會朝正山莊行慶御園蒞蹕正殿受朝內自皇子皇孫皇曽孫皇元孫舞綵稱觴外暨庶邦君長東西南朔萬里偕徠下至商賈兵民厥數無萬咸大和會禮備樂明凡受賀之隆儀覲謁之次第恩宴之頻繁其在秩宗之儀注典屬之承應皆具於編若夫導引衢歌悉臚實事安南嘏曲譜入樂章樂附於禮亦綴登焉一恭纂恩賚一門本年慶典自元旦恩詔二十二條湛恩普被復特旨第四次普免天下錢糧三年而遍以及登岱謁聖回鑾津甸行慶施惠元吉有孚避暑山莊圓明園寧夀宫燕賚錫豫靁動天隨雲行雨施凡外藩內吏下逮工商賤技之微曲賚靡遺數難悉紀舉綱分目總其大凡一恭纂圖繪一門皇上勤求郅治夙夜孜孜稱祝繁文概所弗取前嵗因內外臣工合詞立籲方允舉行慶典又慮爭先效悃或不免鬪靡增華特派大臣總司其事仍先期命各省督撫曉諭耆老士庶毋毋庸跋涉逺來至屬車偶過見所辦點綴稍形稠密特降諭旨令司事者酌減綵飾而自御園以逹禁城道旁跽祝者無慮億萬萬人會同之盛伊古所無允宜摹繪流傳垂示久逺一恭纂歌頌一門正夀之慶例進嘏詞雖管窺蠡測無當髙深而矢詩遂歌各抒忠愛自皇子以下臣僚生監賡揚恐後體製兼賅伏讀御製四得兩論凡臣下之作皆爝火蠅聲不堪舉似然而覽培塿彌仰岱岱之髙挹潢潦形河海之廣不容闕也擇其尤雅綴附末編一典列八門事徴十載仰見我皇上體乾行健集百王千聖之大成斯膺千載一時之景運臣等遭際升平難名巍煥就所聞覩登諸簡編從此算益椿長福符川至由九旬萬夀以進期頤至於無量算每十年一舉慶典當更鋪鴻藻申景鑠隨時賡續以志萬年有道之隆焉八旬萬夀盛典欽定四庫全書八旬萬夀盛典卷一宸章一卷二宸章二卷三宸章三卷四宸章四卷五聖德一敬德一卷六聖德二敬德二卷七聖德三孝德卷八聖德四勤德一卷九聖德五勤德二卷十聖德六健德卷十一聖德七仁德一卷十二聖德八仁德二卷十三聖德九文德一卷十四聖德十文德二卷十五聖德十一儉德卷十六聖德十二謙德一卷十七聖德十三謙德二卷十八聖功一安南歸降一卷十九聖功二安南歸降二卷二十聖功三緬甸歸順卷二十一聖功四廓爾喀降順卷二十二聖功五附載平定臺灣一卷二十三聖功六附載平定臺灣二卷二十四聖功七附載平定甘肅回卷二十五盛事一慶得皇元孫一卷二十六盛事二慶得皇元孫二卷二十七盛事三五世同堂一卷二十八盛事四五世同堂二卷二十九盛事五數世同居卷三十盛事六千叟宴一卷三十一盛事七千叟宴二卷三十二盛事八千叟宴三卷三十三盛事九賜科第職銜一卷三十四盛事十賜科第職銜二卷三十五盛事十一夀民夀婦一卷三十六盛事十二夀民夀婦二卷三十七盛事十三夀民夀婦三卷三十八盛事十四夀民夀婦四卷三十九盛事十五夀民夀婦五卷四十盛事十六辟雍一卷四十一盛事十七辟雍二卷四十二盛事十八班禪入覲卷四十三盛事十九民數穀數一卷四十四盛事二十民數榖數二卷四十五盛事三十一一産四男三男卷四十六盛事二十二收成分數一卷四十七盛事二十三收成分數二卷四十八盛事二十四收成分數三卷四十九盛事二十五收成分數四卷五十典禮一慶祝一卷五十一典禮二慶祝二卷五十二典禮三慶祝三卷五十三典禮四朝會卷五十四典禮五祭告卷五十五典禮六鑾儀卷五十六典禮七樂章一卷五十七典禮八樂章二卷五十八典禮九樂章三卷五十九典禮十樂章四卷六十典禮十一樂章五卷六十一典禮十二樂章六卷六十二恩賚一本年恩詔一卷六十三恩賚二本年恩詔二卷六十四恩賚三本年恩詔三卷六十五恩賚四本年蠲賦一卷六十六恩賚五本年蠲賦二卷六十七恩賚六本年蠲賦三卷六十八恩賚七本年蠲賦四卷六十九恩賚八本年蠲賦五卷七十恩賚九本年恩科一卷七十一恩賚十本年恩科二卷七十二恩賚十一本年東巡卷七十三恩賚十二恩宴卷七十四恩賚十三賞賚一卷七十五恩賚十四卷七十六恩賚十五賞賚三卷七十七圖繪一圖一卷七十八圖繪二圖二卷七十九圖繪三圗説一卷八十圖繪四圖説二卷八十一歌頌一卷八十二歌頌二卷八十三歌頌三卷八十四歌頌四卷八十五歌頌五卷八十六歌頌六卷八十七歌頌七卷八十八歌頌八卷八十九歌頌九卷九十歌頌十卷九十一歌頌十一卷九十二歌頌十二卷九十三歌頌十三卷九十四歌頌十四卷九十五歌頌十五卷九十六歌頌十六卷九十七歌頌十七卷九十八歌頌十八卷九十九歌頌十九卷一百歌頌二十卷一百一歌頌二十一卷一百二歌頌二十二卷一百三歌頌二十三卷一百四歌頌二十四卷一百五歌頌二十五卷一百六歌頌二十六卷一百七歌頌二十七卷一百八歌頌二十八卷一百九歌頌二十九卷一百十歌頌三十卷一百十一歌頌三十一卷一百十二歌頌三十二卷一百十三歌頌三十三卷一百十四歌頌三十四卷一百十五歌頌三十五卷一百十六歌頌三十六卷一百十七歌頌三十七卷一百十八歌頌三十八卷一百十九歌頌三十九卷一百二十歌頌四十
