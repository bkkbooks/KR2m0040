  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_000-1a, image: WYG0660/WYG0660-0001a.png}
body:
  text: 進表大學士公臣阿桂等謹奏臣等恭纂八旬萬夀盛典告成謹奉表恭進者臣等誠懽誠忭稽首頓首慶惟我皇上福集箕疇夀増軒紀堂顔四得具位錄名夀而宜民寳篆八徴省嵗日月星而來偹三乗三履統天之御五十五叶大衍之全萬嵗樂以由庚八袠盈乎步戍環瀛喜洽戴斗愉騰鑒黎赤之貢牋爰允祝釐之請籲簮紳而載筆特摛紀盛之編粤若繞電兆禧流虹篤祜祁乙酉溈丙戌宛授受之相承文庚寅武壬辰儼後先而中立軒轅以戊生為土徳之王成湯以乙日應元鳥之祥三統云遥邈莫祥於僂祘六帝未逮但得半於添籌溯唐室之開元肇誕辰而立節絲嚢綬帯通戚里之饋飴白帝田神託民間之報賽張九齡千秋金鑑之録徒緬古風王虞休八宫誕聖之歌侈􅀈俗樂談延參成徐岱陋三教講論之誣大同紹興至元鮮一代聖神之實繙九流之舊目探四庫之新蔵從大撓納甲以來罕臻茲㑹即史皇制字而下未見有書維康熙初集之垂迺癸巳六旬所輯圗鐫翠版蹟耀金䋲時甫當飴侍冲齡聖以繼聖逮今而觥稱大慶書不一書徳紹祖以彌謙遅二十年之後事屬辭而相比昉七十夀有加首冠之甲之詩文次叙近旬之功徳鏤瑞叠祥駢之牒用告嘉符注晨參畫㑹之班式彰鉅典設科蠲賦恩賚示上徳之宣獻冊染豪繪頌採下情之逹攦目㭊八門之富摭實袪一語之夸臣等率同總纂纂修等雀躍編蒲䕫欽授簡馮典禮典屬之牘官舉上儀鳩工書工畫之儔子來副墨矢寅衷而成帙塵乙覽以仰裁竊省全函是億齡之起例試攄六事洵萬世所曠逢自昔睿文輒囏閎製躓山躓垤堯戒三年風薫風時舜琴一操朕在位七十載紀言出自史臣厥享國五十年述徳乃由家相今則同天道乆與日銘新詩取編年嵗積黄綾兩本文真夀世義通漆簡六經每録數篇即裒多卷道充尺籍百倍于堯典禹謨聖惜寸陰長閲夫皇春帝夏斯萬世未有者一也間尋螙籍競詫鴻功玁狁近逐於太原徐方逺矜於江漢勤軒皇之教戰尚恐霧迷謝光武之閉関自勞鬚白今則四知先覺三㨗頻馳赤嚢静洗於鯤身銅柱遥開于象郡驃來獻樂畨伏頂經時措之而咸宜老謀壮决天巍乎其罔外大畏小懐有如如歸我戰則克况乎濛西拓土事宜在卅載以前蔵外宣威勝續人十全之記斯萬世未有者二也有媯宅位猶戒倦勤周穆詰方必言荒度演洛書之嚮用次在康寕数曲禮之引年名殊耆艾今則日强以敬天健惟恒宵衣旰食之居諸夕惕朝乾而悠乆禋祗廟社升歆匪懈於躬行日月農黌抱蜀咸周於親獻秋上蘭而講武塵清六轡郊原冬佛臘以臨筵歩陟三層楼閣玉雕鳩首屏楖栗而未扶楮灑蠅頭却雞靆而弗御不導引而夀聖與人同亶聰明作元天之将縱斯萬世未有者三也諸家撰述多騖禨祥元狩元鼎以紀年神爵神䴥之建號餘杭半壁縑披濩澤之圖丹徒布衣史創呉興之志今則寳道不愛福禄罄宜見元孫者二百家慶餘瓞室師國子者百五嵗講聴槐街鹿鳴邀再宴之卮麟趾捧四男之粟然且皖呈黒米詎若屡經晋報清河如如底績冬蔵蝶見什勤勒於太常春始帛飄事弗宣於史館惟勤民夀年豐為上瑞不詡天時人事之郅隆斯萬世未有者四也古云職貢例付丹青立本摹列國之衣冠賈躭志諸畨之道里漢屯戊巳羈縻右臂之謀明致梯航荒䀜西洋以外今則舊基締構新宇規恢胥此享王躋之仁夀畢班璧特因頤婦而賜翎華篤由東禀畺人而薙髪緬使順徠於花象交王敂覲於朱䳒坎扒窪觧貢名經珠露海知書慶節汗王台吉並集爻閭屯練降番亦依仙仗天髙秋孟山荘特宴生身日近年班沙塞本行熟路斯萬世未有者五也賦徴忠愛頌媺形容卿雲復旦之詞賡惟八伯柏梁和時之唱聮者數臣呉楚不登於國風夀榖苐肄於樂府今則文思光被典學崇深一記抉洪範之精兩論闡中庸之藴趨彤庭之訓皇子聞詩播紫閣之章陪臣屬和謡衢三百睿句被以管絃祝嘏十千夷樂譜為僸佅手第從臣之頌荷加賜者十人胸開下學之䝉俯改題者全韻詩以言志臚謳吟舞蹈之歡君乃作師廣敦厚温柔之教斯萬世未有者六也如上所系悉載於書緑字赤文粲長生之芝籙琅函玉簡握益夀之蘿圖炳爍天文煒煌家法迪光冊府流曜藝林堯以勲而舜以華書皆名典旦繫爻而文繫卦易統稱周頒向綿區彌下際上蟠之㝢庋諸棐几排左圖右史之籖從兹萬夀重輪繼此十年一部蜚英聲而騰茂實人皇萬八千嵗寳緘益牣於酉山揚偉績而張鴻庥盛典百二十􅗡秘錄允推為甲觀臣等曷勝欣喜踴躍之至謹将纂成八旬萬夀盛典装潢八函計四十冊隨表恭進以聞乾隆五十七年十月日大學士公臣阿桂大學士臣嵇璜大學士伯臣和珅大學士臣王杰大學士公臣福康安大學士臣孫士毅吏部尚書臣金簡户部尚書臣福長安户部尚書臣董誥兵部尚書臣慶桂工部尚書臣彭元瑞吏部左侍郎臣金士松吏部右侍郎臣沈初欽定四庫全書八旬萬夀盛典奏摺大學士公臣阿桂等謹奏為大慶祝釐上儀紀實恭請編輯八旬萬夀盛典以顯苞符以光冊府事欽惟我皇上乾行合撰隆運重熙億禩昌辰篤若水稺華之瑞萬靈慶㑹轃常羊荆馬之祥年三登而汁帝期綏以多者嵗豐人樂夀八表而躋仁域遊於宇者詠徳舎淳至誠之悠乆無疆冠百王而首出皇極之康强逢吉膺五福以大同豈惟子姒黄姚絜喬齡而莫並亦越羲炎巢燧輪景祚以未逢洪惟五十五年恭逢八旬萬夀九五演易九五演範疊五策天地之全八千嵗春八千嵗秋積八入宫商之頌嶽輸川效集萬有以承歡萊北䑓南寫羣情而請祝仰䝉睿鑒俯錫俞音方當鮮集鳬趨披鰈國鶼邦之悃矧繄簮毫濡墨綴西清東閣之班竊以三皇各嵗萬八千史臣勒之古牒伊耆在位七十載虞典首於尚書姬公遵迪哲之人表殷宗之克夀宰我論徳繫之説問皇帝之永年肇聖節於五日之絲嚢上寳書有千秋之金鑑皆傳紀譔布在縑緗粤稽康熙癸巳三月之辰實惟聖祖甲子六週之度時啟事允臣工之奏厥成編誌盛美之模我皇上率祖攸行自天申錫凡一二日勅㡬之罔暇悉家法法丕承况二十年稱暢之展期廣舊章之成憲宜煥琅編之色重宣瑶籙之光惟是躬握治平心叅造化敬天法祖勤政愛民内聖外皇之規細目宏綱之綜秉文徳則文二集詩五集彚全書四庫而為昭鑠武功則平凖部蕩回部綏金川兩番之耆定孚慈恵而司農之籍笇億萬以全蠲考制作而太史之書監三五而大備具載左言右動之記注且經帝典王謨之法揮大莫名天小難言聖予億兆人以共聞共見民可使知取二三䇿以稽舜稽堯書不盡意茲臚盛典取協夀符昔時讓善為懐六甲慎恒言之福撝謙皆言七袠謝獻嘏之文羣志未申九秋以冀滙籖羅於二酉叶環轉於重庚擬以今衆所陳昉自古稀之説十年一集由七旬至於八旬萬嵗三呼起初帙絫為億帙倣前書而一例攦全部以六門首弁宸章次揄聖徳崇閎敬典㤙施普汜於環瀛㸃染成圗歌詠偹呈於撃壌均踵事以􅍇後先之合撰兼旁通以耀作述之加隆更有著績邇年目當創始騰膚功之逺播撮盛事之嘉祥則若掃苞􅀈於石峯戎無伏莾築鯨鯢於鹿耳海不揚波滇徼逋酋誓酬㤙而納賮日南舊國感申義以親朝髙句驪拜尚齒之筵布魯特跪長年之婦暹羅斛國刻新印以冊封屋鼇社番増故國之職貢總本精神之康裕蟠際綋埏益彰赫濯之聲靈彌綸宇宙况廼制多邁古兆每應期五代同堂豐庭闈之衍瓞十葉以外晉階級於本支嘉筵紹於彤墀老吾老及三千叟太和充於蔀屋孫生孫者二百家辟雍道徳之流講仁敬而詮更老黌舎関門之表西鎮廸而東興桓耄耋觀光賜秋試春闈或罷官而登第期頤緜算賚天章奎畫増繡叚與朱提望吉帛之晨飄塔如仁佛啟綵衣之冬蟄蝶亦能仙雖盛世不侈瑞應之圗而夀㝢自副吉機之卜葢嚴恭寅畏所其無逸彌培曼羡之原斯聰明睿智足以有臨倍切尊親之戴丕冐海隅出日夀考且寕大亨天下隨時㑹歸有極歌太平於既醉萬年頌介昭明羾純嘏以來同四方民大和㑹抑戒百嵗譜全詩入殿左之絃禹貢九州斥彌文惟土宜之獻於彛訓歛而敷錫隨聖政先以編摩作為一經虞虞夏之渾渾爾垂諸萬世掲日月之昭昭然臣等願積瀛籌身依天咫值駿龎之慶雲動風翔陶鴻朗之基溟長嶽固乾坤有象繪毫素以非全章亥難量舉跬歩而詎足擬竭方隅之見強稱大道之名奉三無私聖人之作也如覆載照致四必得昊天其子之以保祐申請誦六章之詩川至日升月恒山阜岡陵松柏之茂厪敦九功之叙利用厚生正徳水火金木土穀惟修乆道以成義存乎先勞無倦神明而夀理徴諸荘敬日強䖍抽麟管之編共籥兕觥之什潤色未工載筆尚仰禀於文思鋪張匪事摛詞但實􅀈於郅治抃攄衆志翹凟聖聰謹合詞恭請伏祈恩准施行臣等無任歡躍待命之至謹奏乾隆五十四年正月初八日奏本曰奉㫖知道了欽定四庫全書八旬萬夀盛典凡例十二則一恭纂八旬萬夀盛典凡以載徳揚輝臚歡紀盛溯自乾隆四十五年皇上七旬萬夀湛恩􅐮澤覃及臣民即宜撰列成編敷陳美偹乃聖懐謙約未允舉行慶典届今八旬週袠薄海内外始獲効祝抒忱統此十年中炳鑠淳懿之規積乆愈茂臣等軒鼚鼓舞之願亦積乆彌䖍今所綜輯敬以古稀為先庚肇慶按年類載綱舉目從蘄昭乆道化成之盛軌一全書體例恭依康熙五十二年萬夀盛典初集分門排次如宸章聖徳典禮㤙賚圗繪歌頌六門謹循舊貫以次臚載洪惟我皇上徳威逺播景貺駢集鴻勲偉績史冊所無滋至之庥諸福之應畢萃一時臣等躬際郅隆職司珥筆謹増聖功盛事二門一以彰格被之逺一以識嘉祥之備摛毫紀實非事鋪張一典内分門如宸章聖徳聖功盛事諸類登載自乾隆四十五年庚子逮今五十五年庚戌幹運一週道光萬禩盛猷丕煥茂祉龎鴻簡不勝書裒成累帙至典禮㤙賚圖繪歌頌各門恭臚本年慶典邁成周王㑹之模儷伊耆康衢之祝尤属一時馨烈千古上儀一恭纂宸章一門欽惟御製詩文道貫羣經義昭信史日新富有一一本諸實政發為至文編在御集以數千萬計淵富海涵未能備登臣等敬加紬繹凡紀事之篇有関本事者悉於各門分類恭載兹卷惟録紀年之作文自古稀說以下詩自庚子元旦以下取叶夀符按年編次臣等管窺所及間附案語以識欣懌誠服之忱一恭纂聖徳一門欽惟皇上文武聖神體天合撰昭事之至誠繼述之盡善緝熙宥宻行健日强典學右文誠求保赤巍巍蕩蕩莫得名言億兆臣民寔有共聞共見者雖摹天繪日未能罄廣大昭明之量而攦事紀實比於左右史言動之書倍為親切謹分類撰徳式彰美備恭依康熙盛典之例一恭纂聖功一門欽惟聖武逺揚膚功屢告平定凖回兩部大小金川事在乾隆四十五年以前各有方畧全書乆已頒布海内兹巷惟紀庚子以後如安南之輸誠入覲緬甸之不戰徠歸廓爾喀之納土降順胥仰頼智周健運握算㡬先故能應㑹赴機鴻勲迅集又若臺灣蘭州石峯堡之應時俘馘亦皆出於睿謨籌畫並徴諸紀畧之書撮舉大綱附載以昭聲威赫濯之盛彌見精神運量之周一恭纂盛門一門皇上崇實黜華從不侈言瑞應而昊乾甄貺嘉瑞叠彰天宗蕃衍夀宇咸躋慶茂耆筵㤙増名籍户興仁譲嵗告綏豐諸福可致之祥皆皇極歛敷之實儲祥衍羡雲集川増聿彰仁夀萬年之盛條分年系並有関於國祥家増事惟其寔義惟其正若前代繪瑞應之圗輯符瑞之志者概無取焉一恭纂典禮一門洪惟本年舉行慶典凡元㑹朝正山荘行慶御園莅蹕正殿受朝内自皇子皇孫皇曽孫皇元孫舞綵稱觴外暨庶邦君長東西南朔萬里偕徠下至商賈兵民厥数無萬咸大和㑹禮備樂明凡受賀之隆儀覲謁之次第㤙宴之頻繁其在秩宗之儀注典属之承應皆具於編若夫導引衢歌悉臚實事安南嘏曲譜入樂章樂附於禮亦綴登焉一恭纂㤙賚一門本年慶典自元旦㤙詔二十二條湛㤙普被復特㫖第四次普免天下錢糧三年而徧以及登岱謁聖回鑾津甸行慶施恵元吉有孚避暑山荘圓明園寧夀宫燕賚錫予靁動天隨雲行雨施凡外藩内吏下逮工商賤技之㣲曲賚靡遺數難悉紀舉綱分目總其大凡一恭纂圖繪一門皇上勤求郅治夙夜孜孜稱祝繁文概所弗取前嵗因内外臣工合詞立籲方允舉行慶典又慮争先効悃或不免闘靡増華特派大臣總司其事仍先期命各省督撫曉諭耆老士庶毋毋庸䟦渉逺來至属車偶過見所辦㸃綴稍形稠宻特降諭㫖令司事者酌減綵飾而自御園以逹禁城道旁跽祝者無慮億萬萬人㑹同之盛伊古所無允宜摹繪流傳垂示乆逺一恭纂歌頌一門正夀之慶例進嘏詞雖管窺蠡測無當髙深而矢詩遂歌各抒忠愛自皇子以下臣僚生監賡颺恐後體製兼賅伏讀御製四得兩論凡臣下之作皆爝火蝇聲不堪舉似然而覽培塿彌仰岱岱之髙挹潢潦形河海之廣不容闕也擇其尤雅綴附末編一典列八門事徴十載仰見我皇上體乾行健集百王千聖之大成斯膺千載一時之景運臣等遭際昇平難名巍煥就所聞覩登諸簡編從此算益椿長福符川至由九旬萬夀以進期頤至於無量算每十年一舉慶典當更鋪鴻藻申景鑠隨時賡續以誌萬年有道之隆焉八旬萬夀盛典欽定四庫全書八旬萬夀盛典卷一宸章一卷二宸章二卷三宸章三卷四宸章四卷五聖徳一敬徳一卷六聖徳二敬徳二卷七聖徳三孝徳卷八聖徳四勤徳一卷九聖徳五勤徳二卷十聖徳六健徳卷十一聖徳七仁徳一卷十二聖徳八仁徳二卷十三聖徳九文徳一卷十四聖徳十文徳二卷十五聖徳十一儉徳卷十六聖徳十二謙徳一卷十七聖徳十三謙徳二卷十八聖功一安南歸降一卷十九聖功二安南歸降二卷二十聖功三緬甸歸順卷二十一聖功四廓爾喀降順卷二十二聖功五附載平定䑓湾一卷二十三聖功六附載平定䑓湾二卷二十四聖功七附載平定甘肅回卷二十五盛事一慶得皇元孫一卷二十六盛事二慶得皇元孫二卷二十七盛事三五世同堂一卷二十八盛事四五世同堂二卷二十九盛事五数世同居卷三十盛事六千叟宴一卷三十一盛事七千叟宴二卷三十二盛事八千叟宴三卷三十三盛事九賜科第職銜一卷三十四盛事十賜科第職銜二卷三十五盛事十一夀民夀婦一卷三十六盛事十二夀民夀婦二卷三十七盛事十三夀民夀婦三卷三十八盛事十四夀民夀婦四卷三十九盛事十五夀民夀婦五卷四十盛事十六辟雍一卷四十一盛事十七辟雍二卷四十二盛事十八班禅入覲卷四十三盛事十九民数穀数一卷四十四盛事二十民数榖数二卷四十五盛事三十一一産四男三男卷四十六盛事二十二收成分数一卷四十七盛事二十三收成分数二卷四十八盛事二十四收成分数三卷四十九盛事二十五收成分数四卷五十典禮一慶祝一卷五十一典禮二慶祝二卷五十二典禮三慶祝三卷五十三典禮四朝㑹卷五十四典禮五祭告卷五十五典禮六鑾儀卷五十六典禮七樂章一卷五十七典禮八樂章二卷五十八典禮九樂章三卷五十九典禮十樂章四卷六十典禮十一樂章五卷六十一典禮十二樂章六卷六十二㤙賚一本年㤙詔一卷六十三㤙賚二本年㤙詔二卷六十四㤙賚三本年㤙詔三卷六十五㤙賚四本年蠲賦一卷六十六㤙賚五本年蠲賦二卷六十七㤙賚六本年蠲賦三卷六十八㤙賚七本年蠲賦四卷六十九㤙賚八本年蠲賦五卷七十㤙賚九本年㤙科一卷七十一㤙賚十本年㤙科二卷七十二㤙賚十一本年東廵卷七十三㤙賚十二㤙宴卷七十四㤙賚十三賞賚一卷七十五㤙賚十四卷七十六㤙賚十五賞賚三卷七十七圖繪一圖一卷七十八圖繪二圖二卷七十九圖繪三圗說一卷八十圖繪四圖說二卷八十一歌頌一卷八十二歌頌二卷八十三歌頌三卷八十四歌頌四卷八十五歌頌五卷八十六歌頌六卷八十七歌頌七卷八十八歌頌八卷八十九歌頌九卷九十歌頌十卷九十一歌頌十一卷九十二歌頌十二卷九十三歌頌十三卷九十四歌頌十四卷九十五歌頌十五卷九十六歌頌十六卷九十七歌頌十七卷九十八歌頌十八卷九十九歌頌十九卷一百歌頌二十卷一百一歌頌二十一卷一百二歌頌二十二卷一百三歌頌二十三卷一百四歌頌二十四卷一百五歌頌二十五卷一百六歌頌二十六卷一百七歌頌二十七卷一百八歌頌二十八卷一百九歌頌二十九卷一百十歌頌三十卷一百十一歌頌三十一卷一百十二歌頌三十二卷一百十三歌頌三十三卷一百十四歌頌三十四卷一百十五歌頌三十五卷一百十六歌頌三十六卷一百十七歌頌三十七卷一百十八歌頌三十八卷一百十九歌頌三十九卷一百二十歌頌四十
