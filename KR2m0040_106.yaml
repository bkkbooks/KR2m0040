body:
  text: 欽定四庫全書八旬萬夀盛典卷一百七歌頌二十七萬夀㳟紀五言律詩六十首㳟集御製詩句翰林院修撰臣胡長齡元旦延千喜精神入九秋肇稱八袠慶亦欲萬民周鸞鳯方翔翥山河共峙流洪長凝寳位歛福錫箕疇其一玉宇三霄近如臨員嵪㫄祝齡從衆請抃躍有餘慶自益無疆夀是為大吉祥萬年欣五福民庻共平康其二神縡欽元化齋宫著肅雝黄流盛旱麓曙色辨壇松對越嚴將祀穹㝠仰聖蹤躬承嵗弗懈天愛有殊鍾其三重熙承累洽法傳企咸寧締造思當日欽承切式刑長篇欽識績爾滸御製薩書事祖訓亹聰聴讀皇上每晨㳟實録慎守衣冠舊卧碑勒箭亭其四月宇臨雲牖松風萬壑涼見暑山御製圓明園堂避莊紀恩記長年偏憶㓜肯構見扵墻觸景懷承器佳名㑹一堂紹庭欽陟降丁甲䕶虹梁其五勤政古無匹堯文此式刑御門集朝彦月吏對明廷晝日每三接每日院大召見部臣𠡠幾恊九經對時此宣席無逸近書屏無逸御座多揭篇其六一心周九寓雨潤日暄匀為是勤宵旰占晴御製詩篇多問雨之作惟應慱訪詢驛晴雨詢各省隂雪情形庻民從所好槖籥被無垠次第奏章逹十千嵗取新收成命直省奏報分數其七歴年寛正賦更與逭漕糧繼澤斯為澤農祥兆嵗祥萬方均在宥六徳煥鴻章乾隆丙寅庚寅丁酉三免天下錢糧丙戌庚子免漕糧迄本年普蠲正供鴻恩几六遇損上道斯炳今年典更詳其八新正寛大詔念爾小民依賑貸不遺力觧推隠已饑近城分設厰冬月五城例設粥厰察吏驗歌祈富媪行將試春光次第歸其九旗民驗蕃庻毓徳想魚魚秉穂仍貽厥嵗底八旗恩賞地租華紛奚事諸逄年歌樂愷節制視盈虚送臘椒花頌三餘樂嵗餘其十湛恩周蔀屋二鬴切咨詢户口滋千億阜財鮮窘貧青黄藉有恃民榖數胥陳奏民命户部數穀數省嵗心猶切秉誠一念純其十一政典闗休助鳴鑾駕六飛過正廵幸免經賦積逋普教蠲正賦藉可驗民依茲益閭閻富都欣玉䇿揮恵心勿問吉絃誦逹邦畿其十二參三奉光大負扆乆滋㳟雩祭舉龍見常定禮雩苴茅罷土封肇興諮衆議敬事𠡠司宗調幕逄時若嘉祥應九農其十三有舉應數典還教闕補全簋尊酬上日欽定壇廟祭器寳鼎羃祥煙執玉抒誠敬明禋重吉蠲祭壇用玉社稷朝章弗相襲沿革與時權纂式圖皇朝禮器其十四鼎新古帝廟出治審其源嚴殿衣冠閟清時禮樂蕃欲明興替故倬彼聖人言見帝王御製祭歴代廟禮成記千載丹青貌披圖鑒戒存御製南薫殿奉十五蔵圖像記其言念皇圖纉心惟無逸銘況乎持大寳寳御製敬朝傳寳天勤民之定國二十五原頼弆前型庻績率批斷化工賛毒亭銀檠輝㡢屋片刻為延停燭待廵幸行在秉章其十六倍仰髙齡健鸞旗此重陳康强縁大徳耕耤率先民凍解泥融土寰中物報春㺯田占有喜蘭路濕無塵其十七夙夜主於學分隂惜細旃春風坐綺席典學重經筵每以疇咨罷允標登岸先經論御製宣講文淵宜後峙從此入華編其十八璧水恒論道太學新建辟雍學親臨釋奠講朝家典制垂聲喧鳷鵲瓦盖文廟易黄瓦標凖鳯凰池端冕丹書勘重檐曙色披五三養老度經訓絶多岐見説御製三老五更其十九依次十二月虞廷聖教宣古旋欽定樂章復相為宫法延清契道筦解愠以薫絃玉磬叅承處製和闐玉特磬古鐘依律編得周鏄鐘仿鑄入中和韶樂似聞拊石際合在洽熙年其二十有數詩三百都成角徴音詩經欽定樂譜宫商即工尺戛玉復摐金恰合為之譜千秋例自今遐思雅頌際一字一絃吟其二十一樂自稱西舞祥調玉燭宣中和天地位内外一家連月竁天方接燕饗增回部畨部西蔵樂舞龍池鳯閣邊總干知徳意今日許陪筵其二十二嘉饗荅韶節大乾清宫宴宗室元孫吉已徴昨胥錫冠帶宗室頂帯賜四品更㸔弄雲仍十一玉牒世禮以家人重時蒙恩佑承堯親思典載松茂並川增其二十三鳥祥官紀號已見數名紛津逮知其自職官命纂考釐工政益勤辨方章品物麾可奮三軍職品定武級所尚﨣桓實增武職養亷裁虚糧補足實額林林勉立勲其二十四健鋭垂營制八旗子弟兵泰平無戰伐耆定貴先聲聚處無他誘詰戎益致精冰嬉將試藝及節有權衡冬月冰嬉其二行賞十五崇儒因廣學一代紀綱呈拱北近仙境安西繫逺情安西熱河先後立學人文日寖盛簡職企掄英儒士藍衫列率領駕幸熱河學臣諸生迎蹕道左沿途喜氣迎其二十六政清刑自簡萬物被甄陶切以慈祥導誰能繩墨撡甄心企空洞鑑物察秋豪教弼皋陶法益欽天聼髙其二十七六廵勞􅞬橇一氣逹洪渦為壑疏湮塞改絃别引河開陶莊引河然因定水誌壬午口水南廵定清誌非是詠巻阿資運功無盡蒸為六合和其二十八溯河得望海上駟出星䦨六度江鄉幸萬年磐石完培髙斵山骨改築浙江石塘鞏護幸隄寛觀水有其術同人應所安其二十九竹簡論車輦豈如造化工六經無隠彼二典企欽崇文初御製二集樂此不知倦表揚藴以中徳功言並重治理溯洪濛其三十三百蔽以一萬言頃刻成㨗於響銅鉢考樂叶韶韺沐浴文章海詩書稽古評嵗當五位合詩五御製集珠貫驗天行其三十一幾暇崇情托晴軒飛白時敬勝御製齋帖建廊藏帖版軒蘭御刻三希堂墨妙亭八柱重考正淳化帖雪堂欽定快帖觀象玩金柅繪事閒中賞待飼御臨李廸雞雛圖頒賜長言乃各摛多能固天縱樂此不為疲其三十二經史子集富嘉謨示聖人右文遵舊制式古緬先民總貫諸家解能傳一脈真神詮昔曾揭郅治逮和醇其三十三全書收四庫出治寓深謨四徳曾掄長圓大内文淵明圜文源盛京文􅘦文避暑山莊津四閣並為儲書之所三分𬗟昔圖建揚州文滙金山文宗杭州文瀾三閣並賜書三分是因翻大典豈止玩緗儲天一閣取式蘭漪碧練鋪其三十四金管研摩久詩書淑兆民同為製活字珎武英殿排聚版刷印各書爰始刻貞珉部無御刋經史等大慮數十百種博古瑶圅萃布來方䇿新法輪演國語譒譯嵗清字蔵經今告成樂夀荅昌晨其三十五奠茒霑精氣敦牟伴祭儀車攻𬗟復古良匠命精追今年皇上崇文紹古刻十頒周器十事於闕里重排石鼓文新鼓寘太學及熱河文廟錦繡天工纂昌時造物貽見鼓文御製石記古苔斑結籀不必詠周詩其三十六王褒􅊰徳論情見聖人辭見開惑御製論撻伐前猷在昊蒼優貺垂睿謨千載頌奏績五年期疆闢二萬里新耕争力為新疆屯田十七其三西傾歸馬初囘衆築城居轉靣兇謀黠馳驅戒旅胥三千突騋牝偏伍列麗魚掃穴犁庭罷無徴有戰如其三十八搆釁隣封冗王師斯有徴風雲森羽衛壮氣指天棖跬歩皆竒險踔碉如履平兩金乆耆定萬里順風行其三十九忽然據賊㓂三島水中央健鋭練精旅將軍發大黄懷柔無逺近臺灣之役生畨咸踴躍用命平定後隨從凱師入覲挈要在謀長林麓依清曠軒文日月光見屋記御製四知書其四十北藩茲世僕西極奠鴻功向化非招致㑹殊則以同情聨新舊客上年安南緬甸巴勒布以次歸順籌滿海山叢欣荅初韶令筵開湛露融各藩部年班於紫光閣其四賜宴十一陪京凡四莅皋應立伉將修廟盛京一如制度郊京都以繼還兼創為龍必有光五朝藏册寳新成和闐玉奉舊存尊藏盛京五朝册寳恭太廟萬葉衍銀潢修安奉玉牒成崇謨閣益合欽豳館蘿圖物意昌土風御製詩盛京賦及二物産其四十懿徳書金匱攄誠各効能開基􅘦天造勉繼亦貽繩諸王復開國始封號所重心惟赤肇兹王業興推恩與旌雪追爵加復睿親王封配饗代閲㡬千增其四十三六度南廵止見南廵御製記淳風式萬邦荒唐笑封禅幸山東藻鑑辨淳龎河勢成丁字風全静渡艭天津幸三呼遐算祝河南幸離垢梵王幢其四幸五臺十四拱極思維北親聞風撫南蒐詰戎聖祖建避暑山莊於熱河每嵗秋綏逺皇上謹循家法觀田俯樓堞出閲麗正門稼乗興䟦驂驔蹕駕幸熱河啟圍木蘭行率皆乘馬每嵗秋蒐舉徐將禮樂涵陻熱河㕔為承徳府立志文廟建學命纂熱河興州沿革蹟在徳有名談其四十五稱觴聚五世五福肇名堂甲辰春聖祖題五福堂額以孫乃増賜世宗皇上得皇元書五福五代堂作記前後緒相接言筌聖豈藏松雲清棟牗𤓰瓞演銀潢於古陳洪範龍墀化日長其四十六養老恵恩施甲辰正月宴賜千叟含飴想侍筵上恭侍聖祖舉是宴時爵襄皇黼座行儀懽呼徧白叟真瑞勝竒編輯千叟宴詩成帙囊挂天臺杖杖及賜與宴者各物有差碑新虯篆鐫老五命鐫於國御製三更説學碑隂仙壺叨澤渥春在鳯凰絃其四十七初春頒涣汗本年元正頒萬夀恩詔啿啿物由庚有徳須教洽時行與物生絲綸頒岳牧仁夀祝華平鳯篆鵷班布觀同百福成其四十八東鰈西鶼合朝正并賀春本年五國同時朝覲威儀輯王㑹垂拱御元辰物備九州貢春為四徳仁五星㑹營室錫爵逺方均其四十九堂亷欽斂錫祇合効葵傾温樹深移影宫花仰向榮椒尊陳白獸天酒下蓬瀛元旦官宴賜百卜晝未卜夜傳柑喜起賡每嵗重華宫茶宴聨句其五十難老期臣庻殷殷切恵鮮更思躋夀世百嵗夀民加賜銀縀屢報見曾元民間五代同堂者凡二百餘家田宅無分樹數世同居者加旌閭賜華胥極樂天睦雍堪勵俗格外命恩宣其五十一六度期羣度恩科乃特科豈令終老肄獲企席珎多晚逹頭先白近光肩欲摩子科賜年老舉第職銜春官新定制自丁丑試詩定鄉㑹塲比年畢通命輪試五經試五經倚詠興如何其五十二應時陳盛祀中祀一週躬祭蠲吉展鴻儀二月東廵狩言臻曲阜祠造成遵聖軌禪岱耻秦碑那舉升中禮方將禄永綏其五十三滇海銷兵氣流沙仰集鱗猶聞肅慎獻發徳碣瀛濵震旦惟南海羣星拱北辰祝釐申篤悃䝉古回部朝鮮安南南掌𬗟甸等國及各土司生畨等鱗集闗下䖍祝鴻釐無一不王臣其五十四嗣服祈承命頒恩自法宫阮光平乞從天朝冠服所請皇上嘉其懇誠俯允豈云循典故兼以奬丹衷章黻彬儀度袍衫雅稱融賢王誠愛戴同喜迓東風其五十五優鉢含風燦經因白馬來𬗟甸貢經萬夀流恩歸槖籥夀世共春臺花是恒春蕋座傳延喜杯滇南待澤乆始自逺人徠其五十六太平開萬象林邑貢陳初𬗟甸貢花象南掌貢子象並稱竒異十嵗一重煥南掌國十年一貢九賔覲帝居竒珎來海舶諸戲舞龍魚阮光平詣樂闕親祝本釐㳟製曲擕國樂人奏舞獻夀階下松齡祝仙籌億數餘其五十七雨暘燠寒風尚書六卷中四言標合撰鐫之寳八徴耄念作記八法㑹其同洪範彛倫叙箕疇王道崇愜心㸔寳字欽若凛淵衷其五十八團圞三五近花滿鳯麟洲碧􅗛翔雲㸃銀潢瑞靄浮人人閲花甲嵗嵗沐申庥如此神仙境空勞海上舟其五十九總祝無疆夀新成六十章八旬開寳袠纂盛典萬夀萬姓仰龍光負扆調元化承恩並日長載賡天保什得句亦天香其六十
