body:
  text: 欽定四庫全書八旬萬夀盛典卷八十九歌頌九萬夀恭紀演連珠一百首謹序户部尚書臣曺文埴乾隆五十五年嵗在上章律中南吕日躔夀星之次恭逢皇上八旬萬夀慶辰中外臣庶懽忻蹈舞顒効展覲之至願鬯申祝嘏之㣲忱貞符溢夫簡牒盛典盈夫幬載泃䦕闢所希覯而於今始欣遇者也洪惟皇上福基崇鞏夀徴引延臨御以来祗承天祖受民勤政右文振武制禮作樂展親興賢飬老柔逺凡所以導含生之和迓大順之庥綜創守乎一致動經緯乎萬世皆乾乾孜孜日新月盛所由以啟夀昌之景運隆郅治之極軌嘉符協聚蕃祉曡膺懿鑠㢤易言乆道化成禮稱大徳必得惟大聖人誕受昊貺握其左契焉兹者愈輿誠修懋典醇化蓲敷寰瀛茂豫賔服砥属通譯貢獻新封之安南仰荷徳威請襲冠帯躬効鞫􅎽我大清大一統之規模斯為極盛而睿謨悠乆耄念敬蘉惟庶徴時若是厪鐫諸芝璽昭示鴻萹維勤不已之聖心盖持之億萬年無有紀極臣夙直禁闥深沭聖恩豢飬教誨備極髙厚生成之徳歸飬四載渥澤優滋體恤曲加於逾格愛戴倍切於撫衷爰抒誠籲恭赴殿廷䖍祝萬萬夀臣曷勝欽戴慶抃之至謹演連珠一百首拜手稽首以獻其詞曰臣聞符珍握闡迺迓繁釐圖籙羡延聿彰純佑是以重熈篤祐福緒衍於宸躬乆照凝庥祥源滙於曼夀其一臣聞畫八重列乾坤之䇿斯揲位五十成蔀元之章攸布是以籌増景祚納禄而衍億齡慶鑠敷天舉典而俞衆籲其二臣聞徇齊敦敏元后秉於天亶緝熈執競典學躋以日新是以冠勲華之業能哲能恵合君師之統乃聖乃神其三臣聞天地萬物之祖受福則那黍稷明徳之馨惟聖時憲是以三大祀嵗崇祡燎通昊貺以至諴萬斯年躬陟郊壇孚乾行乎至健其四臣聞皇舞綴逺桑林肇其祀典盛樂律協曲䑓載其儀文是以定辰見之候待澤於稠曡崇夏孟之舉應禱於敬勤其五臣聞守祧所掌重於典瑞宗器是陳煥以延喜是以山輝川耀呈寳五朝肪截瑜鎪藏珍萬祀其六臣聞豳風七月王業所權輿皇矣一萹帝眷所慿式是以聰聴寳訓盥誦而廸鴻猷啟佑後人世守而昭燕翼其七臣聞商鳦發祥業隆相土周烏流瑞蹟啟髙山是以見凛羹墻龍興超乎百代布在方䇿駿烈耀乎九寰其八臣聞先聲破竹克㨗本於同心衆志成城無敵斯為大武是以紀木厨之一戰悉封四路之鯨鯢詳玉帳之六韜如覩八旗之熊虎臣聞服哻尚冕商周之制不沿走馬張弓豳岐之俗自茂是以述訓典以恪守其容有章勒貞珉而勉敦爾能各奏其十臣聞似續前徽心傳式凛繼䋲大業澤逮愈長是以思松壑之含飴益勤纘緒題梠楣而煥采用識肯堂其十一臣聞謨凛勅命庶事以康訓紀延年無逸作所是以披章燃寳炬勤切求衣聴政御彤扉務决當宁其十二臣聞五帝其臣莫及不廢都俞百官敬爾在公猶煩慎簡是以鳬趨辨色侍臣即荷傳宣鷺序近光未秩亦邀登選其十三臣聞魚書渙汗若雨露之滋鳳綍敷音等風雷之發是以丹毫進御昭賁乎堮垠紫極宣批輝耀乎黼黻其十四臣聞汦汦庶類醴飲者和樂啿啿羣生景照者呼忭是以體仁敷暢暘若雨若勤疇咨省嵗豐穣民數榖數欣駢羡其十五臣聞庶邦正供則三壌而賦定羣黎徧徳籌四鬴而哺含是以帑鏐艘粟普蠲賜租賜復露積盖藏益裕至冄至三其十六臣聞姒氏賜金饔資乎主徳姬室奠賈貴錢徴於職司是以賑議極次之分儉嵗無非樂業官謹糴糶之法酌盈乃以劑虧其十七臣聞衢尊斯設非壺飱之私恵羲轡既爥詎爝火之㣲温是以冬令屆祁塞粒食飽徳春祺展甘液粟賜加恩其十八臣聞聖經猶日月窓牖詎宣其光至教若河海潢港莫竟其委是以儀修春殿陳傳䟽於縫紳義抉天章闡苞符於綈几其十九臣聞宫墻聖域奕禩卬思車服禮器學子快覩是以孔門崇舊址翼黄瓦而翬飛周笵頒吉金暈碧花而苔古其二十臣聞辟水雍宫豐鎬特肇厥制環林槐市元明徒襲其名是以泉瀹海流創三千年所未建方中圓外邁十二室而加閎其二十一臣聞農祥晨正則三推之典備明禋亥吉則一墢之脈滋是以華首耆甿侍玉趾而勚穡事紺轅終畆怡天顔而詠禾詞其二十二臣聞崇壌興行辨賔主介僎之儀飲酒尊老定天地隂陽之位是以酌政教之本鄊禮可行轃孝弟之風王道故易其二十三臣聞截筩絫黍之法元音協諸噐律占氣叶之應盛世象厥功是以鎛鐘鏗八音先堂顔韻古鞮鞻掌諸國樂陛鬯風同其二十四臣聞州来聘魯三百徧歌杜氏在漢四篇能奏是以詩皆入樂譜定琴瑟鐘磬管之繁古亦猶今名復宫商角徴羽之舊其二十五臣聞笙詩有詞匪束晳能補抑戒肄雅惟衛武克誦是以用之邦國吐詞為葩經被諸管絃以規為輿頌其二十六臣聞櫛沐風雨舊閲在山河懿親屏翰榮名書典誥是以追謚復爵表宗英之勞析圭銘勛復始封之號其二十七臣聞毓慶銀潢筵几明其苞體分華璿蕚簪紱蔚其柯枝是以源溯六朝十一世廣既睦之嘉醼秩班四品二千人荷罔替之寵施其二十八臣聞大法小亷澄叙而工亮文揆武奮選授而知臨是以朂爾位之靖共時儆臣鑑秉大公以陶鑄益凛官箴其二十九臣聞剔毛攬翮制科大博選之方飛翹揚滯俊髦卜彚征之吉是以杏葩桂粟逢國慶而芳増經笥詩嚢遵功令而化溢其三十臣聞弓矢斯槖雅化興於庠序禮樂所屆儒風起乎邉塞是以釋菜鼓篋沙磧聞絃歌灌燧銷鋒袀服羡衿佩其三十一臣聞辟以止辟明允溯虞刑期無刑詳慎紀漢是以體好生之徳圜土滌寃民秉無私之懐爰書仰睿㫁其三十二臣聞髙墉是衛命式于九圍周道如砥制超乎四逹是以撫屏藩之孔固聳堞蟬連喜道路之共遵列衢軒豁其三十三臣聞虖池奔注夏秋必禦其衝沽淀滙趨東西毎疏其委是以架虹梁之矗矗立砥柱而安瀾俯葦渚之叢叢逹海門而順軌其三十四臣聞戢桃花之浪榮澤胥澄帖竹箭之波崑崙可接是以佑孚齊禱合金隄而驟成源考信徴踰星海而逺渉其三十五臣聞東隄刷沙成法資扵相度釃渠導脈新猷殫其周防是以六度示機宜波清淮甸萬年資利頼溜掣陶荘其三十六臣聞鯷壑之廣豈犀弩可遏其勢鷺濤之汎非竹楗可禦其衝是以石骨棱棱衛坍漲而亹復梅樁簇簇指龕赭而波溶其三十七臣聞書羅十體政學之所貫賅才孕萬象端倪於以豁逹是以文成法立九天星日之照臨氣盛言長四海波瀾之壮濶其三十八臣聞無邪以蔽錧六義之紐樞多文為富殫百思之尋繹是以卷逾五百睿思睿藻所淹涵什摛數萬實心實政所充積其三十九臣聞香山長於諷諭徒執其一平水釐夫聲韻孰拈其全是以剔秕政而陳良法千餘年美刺殊㫖揚祖烈而鑑古史百六部上下分編其四十臣聞古禮别經曲儒林守闕信史昭炯鑑直筆黜華是以裒義以闢榛蕪息諸家之聚訟立論而嚴衮鉞屏衆議之浮夸其四十一臣聞酉山扄鐍羾秘府則價重乙夜披攬恵士林則教普是以庫區四海逮藝苑之津梁閣映七星繢文囿之藻斧其四十二臣聞漢隸立石惟蔡邕之寫經宋雕夀梨有畢昇之活字是以證經史以善本精印廣其傳萃剞劂以多珍弁端稽厥制其四十三臣聞運筆以心八法呈其體勢化工在手萬象通乎神明是以宸翰麗天龍鸞効舞寳繪冩物翹蠕貢情其四十四臣聞良工藝諫足驗輿情赤子誠求試稽羽族是以哺鷄伊喔繪翰音而念阻飢啄粟嘐喈掞鳳藻而告司牧其四十五臣聞農桑為政之經毎流傳乎粉本布帛為民攸藉允仰給乎木棉是以鐫石神全功被圜周之宇題圖幅滿暖生吉貝之田其四十六臣聞雙鈎廓填神采傳諸楮墨十鼓譌闕呵䕶等於球圖是以墨寳署軒堂弆宋搨元鐫而加整法物位黌序排吉詞籀筆而重摹其四十七臣聞大勇爰錫穿七札以電馳神武丕昭貫六鈞以風送是以十發中九稱歌徧魚雅之儔三驅曡雙習藝練貔虎之衆其四十八臣聞肆覲懐徕所至謂之幸周阹獵較多獲以待頒是以仙荘嵗蹕䋲武而列藩宴衎木蘭秋獮詰戎而七萃技嫻其四十九臣聞征代玁狁用奏膚公克㨗蓬婆廼定絶徼是以螳蟻畢駭屠維則帝徳誕敷俘馘同獻柔兆則天威逺耀其五十臣聞北紘西域禹貢未悉輿圖苜宿蒲捎漢史毎臚物産是以統冊九旗為臣僕張兩朝撻伐之威収二萬里為户庭拓千古幅員之限其五十一臣聞瀛壖乆成樂土煮海耕沙潢池迅殄妖氛灌螢振蘀是以牙璋發興桓禽二䜿而賈餘勇生祠建赤嵌㨗九旬而承睿畧其五十二臣聞充國建議樹候尉之竒勲諸葛雜耕垂屯戍之上䇿是以鑄劍㦸為農器厥地逹蒲葱布亞旅於牧塲其榖宜稲麥其五十三臣聞圜法既行屬𨽻亦權厥利上幣既逹厎貢因輸其誠是以號奉天朝鼓鑄徧大䝉之野人擎國寳懽乎存普爾之名其五十四臣聞大宛牧澤歌天馬之籋雲于闐撈河羡寳玉之出水是以萬里刷秣入御廏而調良三采浮筠羾天閶而邐迤其五十五臣聞山川道里土訓紀述職言語文字象胥通来庭是以西被流沙卅六國悉収圖籍右行㸃漆重九譯咸辨聲形其五十六臣聞禡祭致禱禮尤崇於凱旋㨗書告功物更數夫俘獲是以弢弓脱劍藏靈斿以結旌奪胄搴旗紀奉常而載籍其五十七臣聞黍稷雨雪之詩勞還奏雅鼓吹鐃歌之製飲至騰驩是以抱膝覲顔御䑓而寵師武論功頒賞開閣而宴赳桓其五十八臣聞犁庭埽閭風雲翊夫昌運横戈注矢丹青貎其英姿是以三大㨗皆仰神謨勞資心膂數百賢曡成茂績照寫鬚眉其五十九臣聞鐘鼎題勛長垂史冊鼓鼙宣力屢煥畫圖是以繪天罼之申威形工聚米状兵符之迅發勢比摧枯其六十臣聞燕然之石可銘國威逺播横海之名特署軍志聿裒是以奎畫摩崖照筰徼格登而光逺雲章泐石示鯨身鹿耳而化周其六十一臣聞爕諧漸被𨽻典属而誠愈翹朝覲宗遇凛句臚而儀益習是以年班蟻附裘帕偕来正㑹鳬趨鶼鰈並集其六十二臣聞沐和飱信感喻於無能名助順歸慈勃發於不能已是以宅屋鼇社俗淳悶而土饒渉澎湖島𠂻吐輸而天咫其六十三臣聞敂闗通欵非傳檄所招徕挈部請朝必量地以輯撫是以伊綿嘉兆頻納嚮化之忱衛拉全歸盡属分編之佀其六十四臣聞受命黄耉知烈風迅雷之無聲納貢白雉占入律干吕之有氣是以道通六詔呈金葉於闗門珍效百蠻貢花牙於象魏其六十五臣聞大鈞之燾萬類陶鑄以成甘露之滋百昌句萌乃擢是以怵威懐徳備比户之藩封悔過輸誠頒中天之正朔其六十六臣聞井絡以西編名請吏衛藏之界奉贄獻𠂻是以繙貝多之秘文顧依佛日改冒耏之舊俗欽溯皇風其六十七臣聞塗山玉帛之輯列服率従貞觀朝貢之盛諸國来享是以陸懾水慄咸蛾伏而輸琛服竒物瑰因鱗次以圖像其六十八臣聞天格麗日荒服織於錦韝玉宇照躔榮光起於銀漢是以驪珠分彩錫陬澨以矞皇霞榜流輝徧盖輿而燦爛其六十九臣聞邰岐溯澗泉之源古風敦樸豐沛都枌榆之社王氣環迴是以舉廵典於鎬豐烈承謨顯修禋祀於郊廟地獻天開其七十臣聞東南賦藪求瘼而户可封吴越澤國宅土而裕以飬是以籲忱萬姓省觀益慶安全舉典六廵民物彌増浩穣其七十一臣聞畿輔地近補助尤先渤澥利饒宣洩攸頼是以析津迓蹕引沙岸之縈紆淀池汎艫列渚田之繡繪其七十二臣聞五嶽之長治石徒侈靡文萬世之師少牢未臻隆祀是以岱宗作鎮升香齊魯之封宣聖傳心展儀洙泗之里其七十三臣聞䑓懐結刹蹟著曼殊清凉轉石法傳震旦是以天花迓輦卜兆姓之康年梵唄迎鑾増億齡之寳算其七十四臣聞荆河惟豫州膏腴沃壌嵩少曰神嶽靈秀奥區是以課吏觀風候屆三登之慶受釐錫嘏民工萬嵗之呼其七十五臣聞徳維日新銘諸几杖嘏云天錫敷厥閭欄是以夀屆七旬特琢寳以志瑞功髙六帝猶著説以居謙其七十六臣聞瓞衍椒蕃千億廣其萃睦源長派引雲礽兆其熾昌是以士族惟六姓事探袐籍天家慶五世喜奏飛章其七十七臣聞垂裕展盛曡見於熈辰膺祜紹祺彌彰夫㤗㝢是以福曜麗乎璿極大文紀祥行殿敞乎温源吉詞增嘏其七十八臣聞寜謐以彌性苞茂基培夀愷以綏和輪奐規拓是以紫㣲左界披三路而麗彌北斗上垣運重霄而煜爚其七十九臣聞華構建杓垂藻翔虬之状絳雲流彩編珠曡璧之光是以鐙燦九枝表佛光者四照聨標雙柱宣帝徳者八方其八十臣聞龍筍發元音擇三品所㝡貴鯨鏗導衆樂必百諫而後精是以嵗紀由庚雅奏而介景福律吹叶酉金聲而集大成其八十一臣聞四代尚齒考憲乞乎惇史百年加豆傳酳饋於禮經是以耆筵冄錫紀盛則三千叟廣墀獻夀積算則廿萬齡其八十二臣聞祥和所被下多逢吉之樂郅隆既蒸户有敦睦之行是以介眉繞膝夀世瑞駢推産同財義門風盛其八十三臣聞節筋力之禮異數載加有耆艾之福竒榮是眷是以趨直辰入仍賜小車題名甲周重叨恩醼其八十四臣聞士氣培飬華首猶叅試席髙年矍鑠榮名乃預清班是以鮐鯢聚連襼榮希一第絲綸許釋褐懽被九寰其八十五臣聞招提演梵共闡真乗窣堵凌霄具瞻瑞牒是以法雲常䕶儼示應扵金輪吉帛髙懸弗侈祥扵貝葉其八十六臣聞仁澤及昆蟲蠕動性感祥風灑庶類蘧栩徳懐是以帝錫曰仙俾擅羣真之籙神明而夀長近太常之齋其八十七臣聞易凖天地道與彌綸位列方圓體分變互是以摛詞三互集聨茵列席之懽揲卦萬千博迭起循生之趣其八十八臣聞堯封光被迎召者天庥禹疇福演順應者人事是以撫兹億兆姓叙時承禧念用八庶徴鈐丹示記其八九臣聞六幕斟元仰流而輸葵向初韻廸吉㪺醲而賦蕭斯是以墀舞朝元綿區樂和㑹觴稱介夀湛露徧漉滋其九十臣聞坱圠大洽之候恵心有孚㴻濡式布之辰醇意正浃是以十行錫羡上下訢和元日垂温朝野勰爕其九十一臣聞名山大川嘉貺所延者廣神皋福壌聳誠所布者遥是以奉香函而馳夤儀惟謹乗星軺而出徳音孔昭其九十二臣聞懋賞在位簮紱進秩推恩報本鈿軸捧章是以體亮職之㣲勤百辟胥加班級寵貽令之素志五雲悉荷輝光其九十三臣聞足國足民薄歛莫如免算惟威惟爱詳讞尤切廣仁是以四沛豊施正供於以普給三宥觧澤減議益以自新其九十四臣聞萋梧芃樸醲化作人肄雅鼓篋文治被美是以科増籲俊翹蘂榜之英月免積分逮槐市之士其九十五臣聞六星麗弧競占鮮采百年稱兕快覩康疆是以越期頥以十齡紀添鶴算祝福嘏而再覲齒先鵷行其九十六臣聞心充渥洽䟦萬程以遄征榖際罄宜効四方以来賀是以南交奉表被盛代之錦章北闕擎觴承温顔於黼座其九十七臣聞懸車頥性優老之典榮循陔備飬教孝之恩溥是以温綸霑渥感育物以滋培夀㝢龎禠喜瞻天而鼔儛其九十八臣聞祝鶉居以多夀敦樸之言是獻答鹿鳴以九如揚扢之詞載登是以分帙臚恩則紀實愉洽舉典循例則遇旬慶増其九十九臣聞貞元循環大圓斡運旗翼叶算鴻化舒延是以頌溢三多葆保佑命申之乆論詮四得統位禄名夀之全其一百八旬萬夀盛典卷八十九
