body:
  text: 欽定四庫全書八旬萬夀盛典卷八十二歌頌二萬夀錦屏賦一首大學士九卿臣嵇璜等璇霄斡運珠緯回旋鴻絧欻吸元氣綿綿惟天行健惟聖憲天惟誠無息惟無逸永年道合符乎帝縡自齊夀乎大圜天根月􅒸迭起貞元六甲五子萬萬周環維八旬之初屆荷申錫之便蕃諸福備臻洪算彌延四瀛陳祝六幕臚歡琛賮合遝歌頌駢闐伊簮毫於丹地日三接乎龍顔咸攄忱而掞藻已臯拜而揚言惟三槐與九棘叨卿月之崇班際升恆之久照均涵育於陶甄譬春鶊之應律亦羣囀而迎暄雖駢坒繁禧推莢不能以殫𢾗馨香至治罄牘莫得而備傳然天不可窮而可測以七政之晷度池不可盡而可紀以兩戒之山川尺木所量亦黃祗之片壤寸管所見亦丹曦之一躔懿綱醲化經緯萬端外彌綸乎四海內總𨽻于六官各分職而率屬奉綸綍之所宣殫知識以窺測亦或得一二于萬千于是臣巴延三臣瑪興阿臣保成拜手言曰澄敘吏治天官所掌考績維嚴程材期廣我皇上提挈天綱道無偏黨舜尺刌度軒銅規朗登崇俊又慎周典之論材辨别神姦垂禹鼎之鑄象一黜一陟弗濫弗枉均賞罰之自招類形聲之影響卿尹暨於庶僚嶽牧逮乎令長趨紫垣而輪對登彤墀而瞻仰親詢事而考言恆求衣于昧爽五十五載居今溯曩信強固而精明軼三五而無兩卜萬夀之延洪可取徴于既往臣諾穆親臣蔣賜棨臣慶成暨臣蘇凌阿臣劉秉恬拜手言曰總持會計職在司農合千萬億之賦制三十年之通體國經野酌儉籌豐我皇上樽節愛飬地寶恆充權衡國用圖度田功再停轉粟四蠲正供天膏滋液恩波瀛溶若夫金穰木飢占星所主箕風畢雨視月所從或隂陽之偶沴適氣數之相逄並資帝力代補天工經營其賑貸寬減其租庸雖纍萬纍億無辭糜費一方一隅亦繫宸衷蓋屢加而靡已實縷數而難終是以澤霑壤叟惠浹衢童飲伊耆之蠟籥豳國之風歌吟響答祝獻華封知至仁之必夀衍鳯紀於無窮臣常青臣紀昀臣德明臣鐵保拜手言曰帝媯三禮秩宗是職茂典恭逄儀章肅飭繼文祖以重光咸遵循乎舊迹惟令主客古典屬國貢集八夤路通九譯兹夀宇之宏擴彌梯航之絡繹靈鮫效賮於東瀛神鹿呈圖于西域驃國之樂合奏於琅璈越裳之使旅登於瑤席梁元之所未繪顔籕之所莫識更有丹徼名王抒忱吐臆逺從桂管之南遄趨松州之北奉瓊斚而稽首稱堯齡之萬億自攝提以至今曾未覿諸史籍至于鳴豫導和象功昭德溯泠綸之截筒稽后夔之附石三百五篇定風雅之宫啇一十二管通隂陽之翕闢於以見制作之典則禮樂陶冶詩書膏澤魯泮博采其芹藻周雅增求其朴棫文明有象而奎躔吐耀夀考作人而雲漢絢色於以見教思之培植鴻造涵育羣生滋息一門集其曽元千叟聚於京邑五老之榜耆耉覲夫天光百齡之瑞耕鑿歌夫帝力於以見太和之洋溢若夫禮祀精誠百神感格登黍稷以升香奏韶韺而薦璧臣德瑛臣李臺親瞻昭事之無斁雲上於天象符羲易鹿鳴饗以笙簧天保祝以松柏臣武隆阿臣蔣曰綸親見燕飲賡歌之愈懌蓋浹中外之歡心均本斂福之敷錫臣劉峩臣吉慶臣趙鍈拜手言曰夏官司馬實統六師恭逄軒帝親握戎機坐黼扆而制勝燭萬里之嶮巇九天九地一正一竒神明變化妙用莫窺逮策勳而注籍始仿佛其端倪西征碎葉迅縛昆彌貮負右桎再舉參旗花門熸熖復飲月支遂拓宇二萬包絡濛池吐蕃九姓妖鳥羣飛削平二竪震我靈夔雞籠鹿耳漲海無涯神謨獨斷亦剪鯨鯢劖樂石以勒績几四樹乎盤螭山左隴右藴崇芟夷雖尅期蕩滌螳蝟視之已駕軼乎方叔之江漢裴度之淮西蓋睿籌若是之無遺也然而精練貔虎慎簡熊羆申明紀律警戒恬嬉乘金天而大獮尚親臨松漠以馳驅至天育驃騎騋牝蕃兹五花六印蹀􅞃權竒臣世魁臣秦清稽核贏縮岡敢嬴疲亦惟一人之宵旰能振舉其綱維臣胡季堂臣穆精阿臣薑晟臣玉德臣王昶拜手言曰一溫一肅天道之經一發一斂物理之恆惠則雨露威則雷霆隂陽互濟四序乃成故重華垂裳而庭堅明刑我皇上勤求民隱曲察獄情秉玉衡以揆理澄氷鏡而鑒形期酌裁以求當無姑息以近名然而雞竿肆赦樓宣綸而布澤狴扉釋繫恆減重而歸輕檢書以除籍體蒼昊之好生恆仰承乎天語悟仁義之兼行臣舒常臣巴彥學臣哈福納臣陸錫熊暨臣慶齡掌烏臺以司憲參鳩律以持平亦同聲以揚贊曰惟允而惟明臣金簡臣德成臣鄒奕孝臣阿必逹臣張若渟拜手言曰溯典蒼姬冬官居六五材並飭百工咸屬括舉宏綱略厥細目大者河渠次則土木蕩潏黃流千里一曲禦風濤之剽悍次防隄之修築或驚湍之涌溢迅搴茭而湛玉靈胥怒潮龕赭所束滉漾銀海天臨親矚營石埭以屹立鎮魚龍而馴伏楚江澎湃日浴月沐鯨波衝擊蟻穴滲漉藉神謨之指授還南荆于平陸莫不度支浩繁轉運相續青趺朱提連檣擊轂恆溢量而多贏睿慮尚虞其不足至於軒皇合符舜帝巡嶽屢省方而觀民恆誡奢而尚朴輦路惟資夫灑掃行殿無崇乎華縟舟梁取濟乎車徒薪芻不侵乎樵牧咸供頓之有程慮或擾乎蔀屋信仁心之為質宜備迓乎天福别有天潢司籍蓬山講藝周𨽻宗伯今分為二同作頌聲繼乎其次臣孟邵拜手言曰本支百世公族公姓序其昭穆掌其教令溯源從祖篤親惟聖豐其廪祿溢于熙寧之所請辨其章服榮于嘉靖之所定詠行葦之勿踐知周京之積慶既醉備乎五福綿嘉祥于無竟臣伯麟亦拜手言曰古之宫僚今為翰苑即春官之外史惟圖籍之是典仰見我皇上天藻日新道源奧衍闡苞苻于玉宇耀儀璘于金版越十載而一編允範金而垂逺天祿石渠搜蘿祕簡積六千帙溢八萬卷皆聖鑒所親裁付儒臣而編纂日綜理乎庶績悉稟承於睿算尚乙夜之懋勒親琅函與金管倚剛健之神明實古今之所鮮至於外納章奏內徴詔旨綸閣銀台職相表裏則有臣夢吉臣汪承霈暨臣玉保臣多龍武臣扎郎阿臣鄭際堂臣翁方綱臣李潢拜手言曰虞命納言始惟龍作唐置侍郎是為鳯閣掌綈囊之出入備披牘而批諾分下六曹紛綸浩博咸立判其從違更無勞于揆度鏡屢照而不疲矩從心而奚酌信志氣之如神恆臨機而湛若復有禁籞深藪近依祕殿周𨽻天官明歸內宦今制酌中四曹别建據所徴窺陳詞以贊則臣伊齡阿臣舒文拜手言曰官禮雎麟同條共貫化起二南風被九縣燕間亦謹乎起居暇豫不忘乎宵旰年彌髙而彌劭信精勤之無倦雖􅉏御之末微亦得側聞而仰見若夫典守郊圻統司都邑雖綰郡符實挂朝籍亦矢其音敷陳帝澤則臣吳省欽拜手言曰三輔之首近光之地雖于六職無所附麗興諸曺司事則相繫宣布恩綸奉行德意臣典赤縣最先承制萬井提封六鄉六遂婦孺歌舞之情閭閻和樂之氣擊轅之律迭奏鼓腹之圖可繪朝臣所不及見聞者臣皆得而睹記昔柏梁聨句京兆尹侍臣效詠歌竊附斯例敢代甸服之民稽首而呼萬嵗斯時也前唱後和遞陳互舉名言不足以形容稠疊不能以覼縷愧挂一而漏萬方拾遺以續補臣嵇璜整肅冠裳正容而語曰述治法者可臚其目窺心源者宜溯其綱天何以圓地何以方嶽瀆何以融結日星何以晶光春夏何以雨露秋冬何以氷霜有太極之動靜乃生兩儀之隂陽也故百福之集德操其感應萬機之宰心司其弛張元元本本厥理可詳我皇上幬載合契川嶽效祥五代昌熾八襄夀康而軒銘堯誡咨警無忘鐫寶璽之璘㻞摛奎藻之煒煌傳帝學於箕子溯天錫于姒王嫓瑤圖而並重同金鑒之在旁蓋範演九疇而敬用居其次二數尊五位而皇極立乎中央惟天符之類應準人事而相當知息息之默感用孜孜而不遑繄百度之咸熙繫一念之有常是曰聖敬是曰乾剛是曰於穆不已是曰悠久無疆惟恭則夀實驗彰彰是遐齡所以貞固而景祚所以延長是為天人之叶契而非華藻之頌揚是為斂敷之有本而非術數之測量於是回環跪誦紬繹天章悟基命于有密惟莊敬之日強信多福之自求非臣鄰所贊襄拜手稽首鳬趨雁行惟闡演耄念之聖志以敬上萬年之觴萬夀錦屏恭擬八徴耄念之寶頌十二章敬集御製文句大學士伯臣和珅巍巍聖皇大寶曰位凝命敕幾合德于天地在德不在寶斯引福紀五福夀最八旬初暨八旬萬夀萬萬夀無疆苞符延洪用撫天下萬萬邦用克上協天心純佑命于日引月長八十曰耄紀曲禮之年聖人至德聖人即天天行健君子終日乾乾夙興夜寐一日未息肩心永念之在兹弗懈益虔其一緬惟尚書心法治法箕疇凡九敘彛倫時其圖衍疇策洪範有言舉水火金木土俾我民其永利利始貌終思敬恭將事由食貨庶政分司而用乂敬授民時協乎五紀維皇建極玩五皇極之辭蕩蕩平平為下民君師好是正直迭用柔剛子孫其逄吉身其康強斂時五福或名其堂景鑠哉皇帝致治衍繹範言心源符契八惟庶徴以徴信實而寶以愈重以詔示無斁其二心乎肅肅作肅惟恭敬天尊祖郊廟明禋必親必躬雖八十年一哉皇𠂻旁秩百祀肸蠁斯通欲得五風十雨虔禱于宫中萬物致飬上下交而其志同渙汗其大號心􅀈占農鏐租漕糈王政所崇輪蠲各省賦稅籌之無窮凡有水旱發內帑賑恤轉歉為豐藏富在民實實隆隆如澤之潤浸以醇釀對時雨兮無私則公其三從斯作乂裒然文顯德日進文日多本末共貫聖學髙深灑為奎翰炳如日星而章雲漢修辭立其景撰悠逺誕興東土恭天成命監成憲敬奉神器著為令典虞夏以來至明代為得半而失半約以皇度罔或偭隃尺寸幾暇怡情吮毫搆韻發聲為律澤於古以餘潤次第甲乙厥數無萬有典有則用之絲綸曰惟久照咸切尊親曰晹如日之升康乂我民人其四明哲煌煌靜虛動燭雖隔九重九有咸矚既明且哲前典斯劭每觀實録先劬心于問燎黼衮端穆辨色出視朝能察之能執之政治規條簡任公卿百執事明四方之目弼成教化式敬爾由獄坐悉情偽雷霆亦福天鑒恢恢萬民恆在懷燠沐垂溫躋之春臺其五廣運於上蘉哉負扆兼善于謀隨宜指示皇耆其武闢疆二萬餘里金川平定與諸土司齒西師建勳平定凖噶爾四大回部疆界厥地後平定兩金川事弗可已南奠臺澎南盡交址緬甸歸順廓爾喀南掌等國兹以其麇至逰于化宇罔不忭喜天以為聰亦又何求智勇深沈無不籌度咨諏無寒則萬物不成斯謀斯猷其六惟睿作聖明者明理章志貞教莫善乎禮功成作樂中和大備嵗事秋獮柔逺寧邇以教以安惟民所止翼翼鸞輅不宴息深宫六度南巡愷澤龎鴻運道民生莫大於河工海之有塘壩爰以成功覃齊浹魯遂躋岱宗夀相臺懷欣展呼嵩陪京甸服慶忭攸同惟聖時憲民欲天從惟庶民從者其名為風其七王者敬嵗亭育博其愛協氣汜濩相推相代雖屢豐見告勿謂豫大省嵗省成兆民永賴于時為春杏花菖葉乃亦有秋則萬寶咸實寒暑靡間命直省旬月奏報雨雪以主嵗功實欣藹所浹百辟卿士取法自然占氣候于十有二月道在莭宣出入自爾師虞無曠庶官日慎一日明晦無愆徴諸庶民一人是主而衆星共之而顧兹寰宇有宿有統好從乎風雨其八百榖用成敬兹降祥嵗舉耕藉之典斯穡事之孔良百昌之繁廡綿綿穰穰民安郡縣我倉我箱屯豐濛汜守禦相望惟后非賢不乂其德曰明以正官方吏治蒸蒸賢否清濁立判旌廉擢能文武並勵心可于城其職官各賜飬亷而曲體其情詰戎習衆實稱其名宏綱巨目各有所成其九籲俊興賢倬為章於夀考棫朴誦詩蔚為德造文明燕喜秩如彬如兩試仍恩推蕊榜彚吉茅茹老而益壯棘院耆儒陳詩而獻頌者故廣其登進之途親臨辟雍右文稽古篆籀之迹而新為十鼓文淵文源若津若溯輯四庫書都為四部分為三類方以類聚避暑山莊曰承德府學校既設俾欽俾慕是以作人左右萬流景附其十皇之人多夀一人孩之合中外為家一人裁之五代同堂爾乃吉祚大來奕葉雲礽久矣悠哉五福堂者福海大環支蕃五世蓋摺奏浩繁前後凡二百祝頌闐歡仰聖祖之徽猷九寰㪺醲乎衢尊式燕且喜稱觴獻夀于其間門旌人瑞恩澤旁覃越百嵗以扶鳩以飬以恬六合一家而康而安其十一八之念徴身為表儀天人之際永欽識之寶于有德天庥是滋率由舊章用以其時信天主人夫何然疑古稀天子今古誠稀及耄而三念兹在兹正夀之慶懷福履綏和闐瑞珍既琢既追豐紐重臺蟠以文螭乾圓坤方敻乎煒而嘉應在庶徴庶徴之八用迓鴻禧為萬世法程視此頌辭其十二萬夀錦屏恭賦敬集御製文句大學士臣王杰泰鴻環均寶算盈積元氣昭融斂時敷錫自古帝王位祿名以夀彌昌必推本于大德皇帝致治諴民阜物葆法宫以協時符帝車于太乙昭萬年之有道亘千古而鮮匹正夀之慶欣開八帙顯名丕揚吉語臚實維時逺邇欣愈口億聲一我大清蒙天眷祐應運而興洪惟我列祖列宗締造維新大孝備矣彛憲是承敕明旦凛紹庭單心繼序儼然天祖之式慿也金􅒫氣霽恭逢誕聖之辰七政比躔以摛耀九寰㪺醲乎衢尊以延鴻算以燕聖人至于熙皥之世膺禔孔厚時雍協和輔相左右叶浸以醇醲亦曰悠久底區宇于和恆願福祿之永茂叶治化翔洽神遊于太和洋溢之世者實為從古所未有亦惟虔鞏孜孜建中表正秉莊敬以日強體貞元而凝命亶聰明睿智之資際纍洽重熙之運叶總萬有之紛綸運中天之璣鏡文德武功外王內聖省方問俗正心勑政匪居匪康其難其慎昭晰乎上天降監之原以篤我國家無疆之慶是以璿流育慶介禧錫羡五世曽元瓜綿瓞蔓用此顔堂灑為奎翰厥彰祥源金輝玉燦皇之人多夀萬億基算門旌人瑞爛若霞電綺眉𥅆耳熾昌式燕擊壤聽歌靈臺時憲用叶崇禧嵗萬又萬由是天人協應羲和增録八風體政四方從欲省嵗祈年巖廊睟穆時暘時雨偉兆郁郁躋一世于仁夀藻華昌乎姬籙擇言鐫寶蓋莫若洪範八徴之念所以承天之福是宜廣宣湛闓布德孔時履端撓甲魚鑰曙開綸綍是宣雨露垂滋嘉與九有臣民慶駢豐施蠲惟正者萬千垂一代之鴻規沐以膏澤躋之春臺偉嘉禎之薈萃璣籥撙總以迓釐凡百有位疊奉嘏詞特榜興賢域朴誦詩國之耆耉與夫士民慶豫之忱亦皆歡欣踴躍聨軫偕來若乃車書南北萬國朝宗外逮四裔君長咸徠獻夀興其肅恭山莊秋巡內外札薩克自舊𨽻蒙古喀爾喀青海王公凖部回城哈薩布露條支之東若安集延若拔逹克山不約而同瀛壖炎島藩服星拱叶緬甸歸順西旅底貢叶安南雖南瀛小邦耶榮號崇封來覲行殿彌暢皇風煌煌帝京景集雲從逖光函其愷悌臚歡訖于瀛濛綿綿穰穰實實隆隆俾緝熙于純嘏垂景祐于無窮故乃持盈保泰益凛天寵叶致巍乎煥乎之盛美持不矜不伐之淵沖圖于王會盛典矞皇叶同天所燾固不能以言語形容猗歟盛矣自黃虞以來疇與潔崇八旬萬夀盛典卷八十二
