  text: 欽定四庫全書八旬萬夀盛典卷第九聖徳五勤徳二皇上勤念雨暘本年夀屆八旬頒詢誌慰益厪時若
  hash: sha256:1cd6570e088fc1441913b703627d69614882a30647ca6521c5539a2f812e2300
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_009-1a, image: WYG0660/WYG0660-0123c.png}
body:
  text: 乾隆五十五年二月二十四日諭浙江廵撫琅玕前據奏上年十二月雨水糧價情形兹屆二月下旬所有本年春間是兩得雨迄今未報著傳諭将該省何時得雨並有無望澤之處迅速奏奏御製浙江廵撫琅玕奏雨水情形詩以飭之庚戌迤南閩廣北江蘇霑雨遺杭有是乎馳諭因敎問詳悉前以閩廣江蘇已各報得雨而浙江地處南北適中斷斷無不得雨澤之理琅玕轉未奏至因降㫖馳詢章未接奏同殊兹琅玕報至未接馳問之前所奏據稱杭州省城於正月初五六十一二三及二十八九等日連次得雨並據各然屬禀報大約相同等語與江蘇得雨日期有同有殊應早為呈奏以慰繾懐乃正月初旬已得雨澤嗣又續沛甘膏竟遲至二月十五日始行入吿殊不以民事為重即傳㫖申飭並令明白回奏究之膏澤已均渥幸以豐綏或可圗慙愧安民無别術祈年逺近實勤吾乾隆五十五年三月十九日直直𨽻總督梁肯據閆正祥奏查閲營伍地方方摺内稱直𨽻等處時霽日久不無望澤雖未明言缺雨澤望雨之情自見著傳諭将近日各属有無雨澤是否不致乾旱之處詳悉查明即行據實具奏御製直𨽻總督梁肯堂奏報得雨詩以誌事庚戌迎鑾舟次過津南遇雨因之馳旅驂却與水途日同廿幸其霔壠寸逾三據梁肯堂由天津一帶查閲水營縴道於二十日行抵滄州地方自未至至亥時得雨三寸并據長麟奏濟南此時膏澤滋培麥田大有禆益且是日雲氣濃厚勢必廣沾現在飛查各屬另行彚奏即兹遣請神祠處亦沭沛膏沃野覃前命慶成馳往濟南到龍洞虔禱二十日未時馳即於是日申時起至亥時得雨三寸并據長麟奏濟南東昌泰安曹州各府属厯城等十八州縣均於二十日得雨一陣不過寸許盻望之心益切兹閲所奏慰與愧并應識為君之難矣奏牘展觀艱措語一為慰矣一増慙是日諭江蘇廵撫閔鶚元江蘇前經書麟於二月内奏過春雨優渥情形一月以来想田畦又需膏澤現在該省是否續沛甘霖尚未據該撫奏到著傳諭即将有無望澤之處迅速具奏御製江蘇廵撫閔鶚元奏報雨水情形詩以誌事庚戌安歙季春報獲雨否曽因即問江蘇前因署安徽廵撫布政使康基田奏安省二月内先後均已得雨復以三月初旬連得㴻澤念江蘇自書麟奏報二月内得雨後又将一月其時書麟由山東迎覲尚未抵任因馳詢閔鶚元江蘇曽否續得雨澤令其迅速奏覆以慰厪念廿日􅉈霑有兹據閔鶚元奏報江蘇松江常州鎮江太倉揚州通州等府州屬地方扵三月初六七及十一四五等日各得雨二三寸至二十二十一兩日大雨霶沛尤為霑足即日東昌驟過無二十日駐東昌小營傍晚驟雨自北而至旋即為催過正江蘇得雨之時也大麥實成小麥穂水積澤積陸田濡摺内又稱現在大麥結實小麥吐穂池塘充滿亦得蓄水養秋田更為有益淮徐憶及待續奏又據稱淮安徐州海州等屬待陸續禀報佳信督臣早報吾日前書麟奏回抵徐州一路至宿遷地方於二十日得雨七八寸盖宿遷距行在不逺是以先行奏到而閔鶚元在蘇州較逺故未知此淮徐徐之雨也是月二十七日諭留辦事王大臣近日京城分壇祈雨是否曽曽得甘霖著傳諭即行據實具奏御製留京辦事王大臣報雨詩以誌事庚戌望前得雨問京師十四日自兩間房起程蹕途雷雨交作竟日疎宻相間極為深透因厪念京師馳詢留京王大臣令其速奏以慰企懐今報通為四寸滋先據王大臣奏十四日京師自丑至辰得雨約有三寸其時勢猶未止因極思仰慰予即先發報續奏己午之交雨勢勢復交綿宻統計是日得雨共有四寸餘等語農田得此自必倍加長發然究不及闗外之透足耳欣慰之餘仍深保望雖覺田間膏澤被究輸闗外渥優施一欣一盼難為意日彼日兹總切思却見山雲常聚散幾去聲霑甘􅉈普無遺乾隆五十五年九月十三日諭直𨽻總督梁肯堂河南廵撫穆和藺山東廵撫長麟本日朕駐蹕南苑大雨傾注頗為深透看来雲氣寛廣東南西北一帶尤為濃原河南山東地方必已得有透雨至直𨽻地方自必同沾甘霖著傳諭即将曽否同時得雨情形迅速具奏御製直𨽻總督梁肯堂按察使阿精阿各報得雨詩以誌事庚戌涿州六寸保陽五梁肯堂奏於十二日由固安回省住宿涿州是夜亥時雷雨數陣至次日辰時雨勢未止實有六寸續據按察使阿精阿奏保定省城亦於十三日自丑至辰得雨五寸等語京縣迤南似遍沾未識豫齊澤何若早教馳問逓郵籖御製山東廵撫長麟報雨詩以誌慰庚戌八府齊霑足據長麟奏東昌於四月十三日自辰至午雷雨滂沱省城實為深透旋據濟南泰安武定沂州兖州東昌青州箂州等八府所屬七十二州縣報稱得雨自二三寸至深透不等四州報未齊惟登州曹州濟寜臨城等屬屬未報齊現在飭查續奏果如昨所料昨以梁肯堂奏直𨽻景州一帶得雨不過一二寸料及接壤東省之徳州臨清上處未必得雨今據奏果不出所料然濟南等府俱已深透可不致有亢旱之虞矣寛幸早斯睽市價日稱減又據奏該省糧價于十二日得雨後即已減落至十三日雨後麥價又復稍減亦以麥収可望市獪不致有囤積之弊耳民情秋可徯月餘略釋自月中旬在山東境内即為之心殷望澤今巳月餘批閱来摺方覺額慶敬彌躋乾隆五十五年五月十四日諭留辦事王大臣本日寅刻朕自兩間房啟行行至青石梁雷雨交作勢甚滂沛京師距此不逺是否同時普霑著即行查明具奏御製留京王大臣報雨詩以誌慰庚戌闗外優霑闗内欠其零厪盻喜音馳兩畨兹滂䝉滂霈五寸至深利耖耔前據留京王大臣奏京城十七日得雨一寸餘因即傳諭如現在未經續被甘霖着皇子等分赴兹黒龍潭覺生寺兩處虔誠祈禱如已得雨即速馳奏據王大臣等奏京城自十七日得雨後倐隂倐晴時有微雨因俱不成分寸是以未經具奏今於二十六日戌刻雷雨交作移時方止計有二寸復於二十七日亥刻大雨傾注勢甚滂沛得雨又有三寸刨騐入土分寸直接地下濕氣現在大田長發之時已共得雨五寸極為深透並無望澤之䖏等語黍禾秋穫幸堪期西南每晚雲容重普沃甘霖兾繼施此間雖毎日作雨但不過一二寸交夏之時亦兾再渥優膏也乾隆五十五年六月初六日諭留京辦事王大臣據奏京城本月初二三日時有雲氣徃来未經得雨自得雨之後已屆浹旬未獲續霑渥㴻著傳諭将日内有無續霈甘霖之處即行具奏御製留京王大臣奏報得雨詩以誌慰庚戌春来夏初近京旱幸而禾黍已生苗霑濡雖屬欠盈晝霶霈何期報徹朝留京王大臣奏京城自廿六七日得雨之後時或微雨不成分寸天氣炎熱已覺望澤本月初七日酉刻雷雨大作直至亥刻稍止初八日夘刻又復大雨傾注入土共計七寸有餘現在尚未止㸃雲氣濃厚勢甚寛廣将来秋収可望不致減少分數等語京城前次得雨未透正為肹澤滋得連朝渥霈可謂優霑覧奏奏深欣慰益切暢乾蘇髙榮萎農事起出藏價價市風調不禁額手慰南望既慰益兢慎旰宵臣等伏睹我皇上八旬臨御勤課雨暘每於農望未殷早厪睿念是以詢則馳諭喜則誌唫恭讀五十五年中御集詩章凡報雨望雨之萹不下數千百首兹敬録本年聖製藉以見我皇上叙時布徳先事慮民無出八徵耄念寳記所云雨暘之時不可不常騐者盖惟懋省嵗之勤乃以備休徵之應福疇夀慶宜有如箕範所陳也哉皇上夀登八旬躬親祈澤御製詣黑龍潭祈雨庚戌雨澤南優北欠充神壇步禱敢辭躬黍禾稱種去聲果看種去嵗秋雨過多今春土甚滋潤故黍禾早已佈種今皆出土菁葱益為望澤耳麰麥期豐惜欠豐二麥本期稔收自春入夏被旱即日下優霑亦必減分數矣渥霈或猶獲其半望雲未敢信乎衷憶曽恩鑒並叨恵不慙去聲凟祈籲佑䝉御製詣玉泉山第一泉龍王廟祈雨庚戌靈泉佑京國憶載荷慿依昔每申虔請曽蒙賜渰祁麥殷待秋熟禾亟盻霖霏肅叩施甘澤代天福帝畿御製還宫𫝊臚御殿由覺生寺祈雨之作庚戌昨仍雨及寸而晴四月廿三日日感以誠愧亦誠去嵗祗園竟依例兾如灑道沛傾盆去嵗五月中旬盻雨命皇子等在覺生寺設壇祈請閲七日尚未沛澤適以御傳還宫敬詣壇所積誠黙禱途中即獲霑渥今早亦以臚回宫依例詣壇虔請兾幸即日甘霖優霈庶麥収可増分數髙地麥萎低地茂優霑分數去聲或猶増黍禾出土胥芃緑益盻甘膏愁不勝向南地潤總無塵自二十二日詣玉泉祈雨後復連日未申問得雨陣雨而城中較之御園頗優是以今早蹕途所經向南近城一帶地土猶覺滋潤小大霔膏實未均總似近予處息細今據長麟奏蹕途所經臨清東昌徳州各屬望雨之處俱已深透即連日京城迤南雨勢較大而御園獨小感慰之餘惟深自責耳返躬責或靳施仁臣等謹案爾雅曰甘雨時降萬物以嘉盖澤物重乎及時而非若千里之潤十日之期侈太平之瑞應云爾也我皇上殷懐民事感召天和用致暘雨弗愆年榖順成之慶臣等謹已恭載本年頒詢誌慰諸什以仰見聖人厪懐時若之殷而若祈甘雨見於詩命有司祀雨師見於禮皇上迺不惜髙年之勞用申躬籲之敬却輿拾級肅步虔登宜乎俄傾立應逺近優霑有以孚志氣之如神而丕昭順協者歟皇上嵗勤閲武用繩家法以勵衆勞御製觀射壬寅朝家重詰戎挽弓尤長技巡幸扈羽林路廪外仍賜向例凡扈從侍衛官員均按日賞給路費至熱河随圍先期於宫門較射能中鵠者於路費外分别等差復加優賞然必令較射視中去聲為等次御門引輪班年年率成例向未臂病時身先去聲每親試今乃坐而觀舎矢徒指示昔見命中人晨星祇一二戊辰秋九月於大西門集近侍諸臣較射連發二十矢中福隆九彼時親見者今已稀有惟扎拉豐阿安皆年少命侍禁廷養育猶及經見云其餘多新進後言那免致矍相宣尼為殿廷文皇𨽻觀徳實在兹五字誌五愧御製閲火器營兵因成六韻壬寅火器誠要用營居築水濵火器營建自乾隆癸巳年此地濵長河以其去城市逺不致衣食侈費一意習勞肄武也欲因逺城市可以致精純萬礟齊聲發千軍一志淳武成斯敢忘律在衆胥遵㓜習義猶美火器營兵紀律整齊技藝嫻熟其十嵗子弟演放進步連環鎗者亦䏻如法㓜童即能如是亦可嘉尚因命偏加賞賚以示奨勸勞思善亦真旌勤偏加賞教養總須均御製過南嶺閲健鋭營肄武作壬寅健鋭置營乆逺奢俾習勤香山初置健鋭營選八旗精壮子弟列營聚處其地逺隔城市奢華於習勤肄武猶為有益從来出桓赳屢藉建功勲營中官兵屢令調𣲖出京㝡為勇敢平定西陲及兩金川均著勞績是日觀操練果然超匹羣賞因旌善布等第要明分四月二十一日親閲健鋭營鳥鎗弓箭及馬上四鎗四箭并各種技藝俱能嫻熟超羣因命頒賞其超衆者加倍賞給以示優奨御製閲武癸夘不黷還勤詰由来經國常因乗駐鑾暇遂閲訓貎方分翼登梯壘健鋭營習雲梯馬步射鳥鎗諸技最為精練每校射時雲梯兵按旗分翼賈勇先登尤稱趫㨗總戎試射塲是日適夀春鎮縂兵袁敏重慶鎮縂兵馬鎮國来覲因命試射以觀其技練習否也未能親示度略覺恧無遑向年每閲武時必先親射艱於持滿命中每引為愧步射艱於持滿命中每引為愧屢見於詩也御製閲武癸夘長河右岸畔火器建兵營俾以隔城市因之致鋭精火器營於乾隆癸巳年移建西頂左之長河岸别為一營以去城市逺得心專習勞肄武也其演放進步連環鎗法有童而習之者技藝最為精熟每縁路便閲亦欲賞兼行近年毎縁徃西頂路便簡閲分别賞賚既示奨勸亦於旗人生計資益也恰值貴山覲携觀廣甸呈哈薩克阿卜勒比斯適遣其子噶岱来覲於四月十三日在山髙水長賜宴賞賚後因於十五日亦命随至教塲與觀操演旌旗壮風色組練耀曦明三進轟雷發大閲九進始發連環鎗斯為日行小操故三進即發雙馳雄電爭無過小隊試非詡逺人驚然寓詰戎意毋㤀保泰情御製閲武乙巳健鋭雲梯營實自茂辰始事因伐促浸促浸即大金川歸降宥其死厥後乃背盟猖獗搆禍起終滅雨金川自戊辰嵗於香山置健鋭營訓練八旗勁旅屢調出征勇敢素著平定兩金川實資其力興屯晏乆矣誠資衆軍力亦藉訓練耳凖夷及回部蕩平胥賴此健鋭營列伍卒處地逺京城無習俗外誘技易精勤平定準夷回部時用之俱著成效實勝寺有碑績纂文皇美昔我山杏太宗文皇帝以偏師破明兵十三萬於松山歸而建實勝寺於盛京以昭功續前此己巳嵗金川旋旋因就西山舊寺葺新之名曰實信寺用紹前光詳見實信寺碑文所以每駐兹閲武遵前軌既用示詰戎兼以行賚予叶馬健銳營鳥鎗弓箭及上四鎗四箭各種技藝俱能精熟即十嵗以下㓜童亦有䏻嫻習者每親臨閲視分别頒賞其超衆者加倍賞給以示鼓勵所為豈徒然不出敬勤理御製觀射丙午扈園行賞例應然觀射分其等次焉向例秋彌扈從諸臣先期分日於宫門前較射中三矢及四五矢者分别等次賞賚馬匹銀兩有差右屈左支國所重心平體直道之詮仍教兒輩代身先去聲不自庚辰臂病以来雖身先示度仍命隨重皇子步射以志無忘家法莫忘家風以意傳屢中承歡兹坐此余自十二嵗恭侍語褒皇祖臨門試射每因屢中荷䝉天嘉故己夘射詩有屢中親承丙午仁祖歡之句自壬寅至今凡六十四年矣深慙六十四年前御製閲武丁未健鋭營兹駐今将四十年雖安不忘耳得力則誠然戊辰嵗於香置健鋭營訓練八旗兵丁素稱精鋭從前平定準夷回部大小金川屢經徵調實為得力詎獨驍騰㨗所嘉心意堅滿州兵臨陣以退縮為恥不似緑營懦怯惡習徃徃有兵不顧将脱迯之軍兹因臺灣逆匪林爽文等糾衆不法調兵進勦乃因黄仕簡任承恩二人觀望誤事以致賊勢鴟張總兵郝壮猷所帶兵丁遇賊潰散退回郡城其畏葸失律罪無可逭若緑營弁兵俱能如八旗勁旅奮勇堅心埋根前進自當早獲渠魁撲滅蕆事矣閒因示戎詰亦以寓恩宣香山地逺京地健鋭營列伍萃處無外誘習氣故䏻操練精熟每駐蹕此地必親臨閲視分别頒賞其中技勇超衆者加倍恩賚以示鼓勵御製閲火器營兵丁未火器營分建長河西㟁濵癸巳年於西頂北之長河岸建改營房移城中火器兵之半於此居之其地去城中稍逺俾得得専心習勞肄武技藝純臻純熟之逺城市益可致精純九進閲真練毎大閲火器營操演九進始發連環鎗其日行小操則三進即發六韜匪慢循雲梯一例賞施惠本應均昨駐静宜園閲健鋭營兵分别頒賞兹来閲視非徒簡其技勇亦所以均恩賞也御製觀射丁未秋圍賞等定其差優劣惟因射别之每嵗秋圍前令扈從諸臣於宫門前較射人各五矢有中三矢及四五矢者賞賚馬匹銀兩有差以示鼔勵數典逺猶憶貞觀承恩近實沭康熈㓜齡呈藝曽連中去聲此日随行無一知余年十二随侍皇祖曽於宫門前諸臣命射發矢連中者矣聖顔大悦今扈蹕無一及此事端然坐閲靣増怩御製閲武戊申輕輿清曉過南山閲武旌勞未可刪所媿躬倡平聲未乘騎昔年閲武必乘馬至教塲或親御弧矢示之身先之道固應如是近以年近八旬雖精力尚健亦宜節勞以從衆願遂乗䡖輿以徃究用自媿云敢忘衆力近平蠻自立香山健鋭營以来屢𣲖出征屢有成效上年臺灣逆匪滋事先𣲖翼長等八人前往領兵打仗後復簡𣲖巴圖魯百人随福康安等進勦果能迅奏膚功實為奮勇出力然予心益深兢惕詰戎之念未敢一日忘也益當克詰訓惟懋並視等差賞以頒莫謂例行託遊豫無非事也政胥闗御製出賢良門觀射己酉奎畫四言垂訓良心殷董正合明􅏡率因佐治吉惟士用以淑民道在王毎嵗詰戎臨發駕豫期觀徳試當塲昔曽親御勵無逸今則坐憑異常向年每遇校射必先親御弧矢示衆自庚辰臂病後遂踈步射時以為愧㓜即精勤五射習老至猶劼毖萬幾忙卅年示度哈薩平聲部己夘春於此閲射維時哈薩克入覲是日親發二十矢中十八矢閲今正三十年矣彼雖樂觀百戲不若示以射藝使彼不敢䡖視中國予之所以遵祖制而迓天庥者意實在此迅矣居誠足惜勗哉宵旰此仍蘉曽元聰聽加之意永保天庥四海彊臣等謹案騎射為我朝家法所重皇上諭立卧碑以垂世守訓綦嚴也羽林之士時荷親加校閲第其差等勉以精神若火器營建於長河健鋭營建於香山有年其技夙嫻其紀律亦最整故䏻糾恒輩出屢著成勞而皆由平日訓練精勤乃獲備勁旅以資九伐每嵗秋獮扈圍諸臣例於宫門前先期集試勸賞有加曩者逺使来朝預瞻示度間值鎮臣入覲並命程材所以宣威而勵勇者無不備至焉又如廵方詰武閲江寕杭州之旗兵京口錢塘之水師天津之營正定之鎮隨在練長材而戒疎惰盖百年不用而簡習無忘率同此意不復贅陳若夫髙年示健親御率先謹分載扵健徳門欽定八旬萬夀盛典卷九
