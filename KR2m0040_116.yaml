body:
  text: 歌頌三十七萬夀三賦翰林院庶吉士臣洪梧臣聞太乙所居是為紫極春皇之國厥有神洲昻南夥鳯之園亢外流烏之㑹古者祥呈辰下瑞紀雲飛受禄字於洪流闡金緘之恭館髙陽萬國來萃河濵黄帝羣臣言臻洹浦南弓東璧羾福周宫北羽西槎迎仙堯圃欽惟皇帝陛下八徴延祉九􅀢開祥乾元増睿聖之齡洪範紀天皇之夀龍章鳯契鏤寳篆以承庥玉燭金壺席蘿圖而厪念般濯爭來于脽壌輪囷下照于合宫爰俞萬國之歡乃佈三衡之詔魚騰鳥企摯虞増秩之年鼔笛棚車宋凖登科之歲於是要荒慕徳西踰昆侖車服加書南撫交趾白狼三譯詢黄髪而來王烏弋重溟仰青雲而禀朔天子精禋錫羡闓澤均禧幸五麟七鳯之廬受九夷十蠻之享秋登武列鼇抃方壺宴邇文津鸞翔温樹天顔惟穆夀宇宏開候南極于員穹受西王之華琯羣情既浹法駕方旋文囿與民同之樂郊乃大和㑹三條㪚樂炫覩名王十日酺尊朋歡士女然後乃以慶莭陽鼂輯瑞乎太和之殿祥煙釦陛景旭彤􅒉登歌曼夀之章拜舞天齊之曲豈特鳥音蓮葉六十邦奏賀之書露甕荃車三萬里冠裳之國竊惟陛下御極五十五年勲徳巍巍文章郁郁舜功二十銘載夔鐘周澤京坻聞諸豳雅顔閻墨妙莫稱形容燕許文工豈䏻覼縷謹因行慶之地敬獻介禧之詞三祝等于華封三呼同于嵩嶽慚太冲之十載敢賦三都隮杜甫于青旻具陳三禮謹序避暑山荘錫燕賦候維炎序律中蕤賓月杓壬午日旅庚寅皇帝既有事於方壇肆言廵於上塞乾健為心民勞為愛漢有慶而將酺周引年而用賚迺六玉輅之葳㽔九參斿之沛艾出迎暾之東闕轢案漢之南閭紅橋塞水青磴闗塗雲迎鳯麗電閃龍趨火隂磧栁雨意河蒲羲馭度于廣仁虞門開于麗正興州是謂神臯山莊此焉夏清九成陋貞觀之銘左介布明堂之令烟霞可以適沖情山水足以娯聖性年年羽獵先秋歲嵗瑶池頌慶獻璿圗于西旅怖銅鼓于南人先零幕逺頡利封新真龍仗馬瑞象天麟華香佛樹水玉河珉雕題椎髻之酋漏海九都之國紫塞來王朱波戴徳衆星之拱北辰秋分之候南極爰遵道而揚鑣咸遡風而憑軾巖軒􅌄窱磵户遮迴薫來栢殿暑去蘭臺歸雲石梃落照流杯賡吟永晝校射恢台人間兠率天外蓬萊於是海㑹咸臻獅林時叙覿黄帝於夀邱謁元囂於華渚受餼于漯水之濵列館于汾河之滸峩峩藏寺寳界時隮翼翼鹵簿光臨谷西輿前膜拜道左迎睼豐同六合稔覽千畦爾乃月吉秋新雲開天朗受羅什之名經覲臣佗之大長燦赤土之多羅抃文单之舞象織皮禹貢之奉珍茲曰周書之執壤南宫啟讌合殿開筵司彛九獻廣樂俱懸蕭傅正呼韓之坐元侯拜繁遏之篇頌天皇兮億載樂嘉㑹兮萬年既而燈設九華帳開萬樹對角觝之紛陳聼兜鞮之咸具將使罄海同禧承天錫祜念徴綿玉燭之年禮佛識金䋲之路然後恤逺先歸于京景溯樂未徹於承雲慶方流於元圃圓明園稱慶賦爰有堯衢蕩蕩文囿熙熙周民九識漢表諸司神仙柱下五老河湄來同王㑹共祝純禧户㪚綵以為霞地鎔金而似海幻犁靬於城闉接麟洲於爽塏吹簫之王子疑來薦棗之安期宛在皇帝六龍回轡五鳯停驂澄湖萬頃閬苑千巖䕫龍景從鵷鷺䟃𧽼仙壺聞于禁禦瑞靄麗于裾簮於時玉露瀼瀼桂華郁郁陶典西成豳圻大熟洞廷張樂之濵博望乗槎之曲兩戒銀河千花繡谷移來浮玉宛對江天耽耽樓觀浙淅泠泉經壇連于梵刹書閣麗于文源有江南之佳麗接呉㑹之山川王淵四子之詩徳秀賢人之頌付部伎以新編軼仙韶之妙弄繡襟哦聖夀之章玉管入卿雲之夢聲依日以來雲儛翻花而翔鳯吹苓嚳喜鼓􅛘堯逰歌僮七十沛樂三候縱觀安福之闕奏伎洛城之樓淳還六合道泰千秋婆羅到足撢國旋毬行行亞字處處衢謳若乃大啟仙閎同臻夀宇十洲之琳碧相輝兩曜之光華在覩梁鄒不限於蒭蕘属國同羅于庭廡鏗金猛􅒶之鐘樹羽靈鼉之鼓歌萬歲之詞奏昇平之譜大聲發於咸卷燕樂調於仙吕幢幡則千佛同場鸞鶴則羣仙繞户秦公娱廣樂之逰儀伯貢鼚哉之舞所以溥皇祺均篤祜聫萬國之歡心奉八旬之仁主賡詩麟徳之庭拜酒華林之圃繄聖皇之勤政仰乾行於御園未中宵而展禁每非閏而居門紹神堯之棟宇見黄帝之曽元丹毫萬札墨勅千言傅宣漏永入對花暄吟霙小苑測雨前軒既齋禋而來宅聿廵獮而廻轅玉泉天漢之流西嶺神州之鏡総勝槩於黄圖同遨逰于皎鏡歌載歌兮世永康樂復樂兮皇有慶太和殿受賀賦鳬鐘早振鳯闕先開千官夙戒萬國皆來天長届矣元首康哉爾乃秋將中兮夜未央趨閶闔兮夀君王凛鴻臚之序位奉宗伯之儀章御史糾于九品理藩秩乎庶方穆穆皇皇濟濟蹌蹌先陳聖莭之表待獻萬年之觴述職之維藩對越近光之羣后翺翔黼繡充庭旌旗夾陛仙仗俱陳庭燎有㫼玉輅設於外朝象輿肅於閑衛於是鯨鏗右左雅奏中和雲浮采現日上華多天子方憑鳯扆俯鸞坡堂髙㢘逺喜浹歡羅司儀贊拜典樂升歌率舞來於緬服搏拊自於闐河悦名王之孴孴集國老之皤皤皇儀孔究嘉樂有那協絪緼于中外承夀愷之恩波壌奠三千朝服七十太保西率唐公東立干羽兩階玉帛萬國乃有六盟王公四衛拉特竹城奉藩木邦受職東麗西歐南訛朔昜無小無大有嚴有翼塗印度之殊香煥鮫人之異餙獨孤之金鏡千年立本之華圖五色惟皇純嘏奉若無私欽明廣運神武仁慈闓恩濊澤雨解雲施百年生息萬里光曦溯生民之帝極信無間于伊耆於是禮成太和宴開寧夀潢族莘振仙班輻輳萬舞在庭九歌同奏酒醴維醹以介耆舊肴核維旅有秩籩豆咸拜手而稱觴既騰歡而勉懋是時九州嘉樂六合恬愉家家懐葛户户黄虞士沐三升之化農承普賜之租商富鹽田於山海工捐追琢於璠璵効負暄于宋父兮同就日于皇衢登春臺而享太牢兮若羣逰于華胥麗太千之寳界仰億萬於璇圗皇有厪于如恒念彌殷于乆照方夕月於夜明乃儲精于堂突盖保㤗之鴻謨實延禧之妙要登夀世於成鳩撫諸侯之殷頫萬夀頌十二章集文選并序翰林院庶吉士臣顧王霖臣聞古人之言皇初之首上紀開闢遂古之初必有明聖顯懿之徳宅心醰粹齒算延長柏皇栗陸以前先天而順顓頊元㝠之紀厯年茲多養之如春故有一切之夀泊然無感而貽千載之功上哉夐乎不可紀已洪荒樸畧皇王之迹已殊維清緝熈神人之和允洽於茲為盛以古况今伏惟聖朝奕世勤民兆基開業皇帝陛下體膺上聖欽翼昊天神應休臻昭華之珍既闡晷緯昭應㤗階之平可升是以得一奉宸儀型孚于萬國率由舊則功徳著于祖宗三后始基一人有慶妥綏天保殷五代之純熈敬逹郊禋荅三靈之蕃祉皇風載韙玉燭陽明悦重華之無為巍巍蕩蕩踵羲皇而齊㤗炳炳麟麟書契以來未之或絶皇唐之世何以加茲於是聖王乃握乾符詢朝政聴覽之暇焕乎文章摛藻為春昭章雲漢讌歌以詠同量乾坤侯其禕而大哉體乎於斯時也天子受四海之圖籍收百世之闕文乃有秘書府之延閣自三墳五典六藝百家詳畧異聞大備茲日依劉㰴七畧曽何足云作帝典一萹不以過此時文載都威武紛紜屯神虎于秋方義征不譓稀鳴桴于砥路化際無間是以六合元亨九野清泰方握河沈璧封岱勒成綜孔氏之舊章乆瞻先覺奉至尊之休徳存問髙年乃崇禮官正雅樂歌投頌考文章纉典禮于辟雍奉觴豆于國叟於是皇澤豐沛羣士嚮臻旋束帛之戔戔増四門之穆穆牧州典郡凛負重于春冰三事九司効蓬心于秋實小大畢力勲績惟光仰測天璣嵗躔奄茂上膺萬夀下泝八埏爰考休徴下明詔疎徭役振困乏發京倉㪚禁財下有大哉之君下獻南山之夀凛秋暑退逢吉丁辰開王㑹之阜昌第從臣之嘉頌是日也張鈞天之廣樂流春澤之渥恩金鄰象郡之渠各帥種落文身祼袒之國具惟帝臣㪚樂移風獻琛執贄誠千載之嘉㑹信天下之壯觀也昔者臯繇謨虞奚斯頌魯崇廣被時雍之美格天光表之功卓哉煌煌粲乎隐隐前代美之不其然歟凡庸固陋策名清時學于舊史氏允懐多福利用賔王則夫誦美有章賦詩稱夀不亦宜乎遂作頌曰顯朝惟清混一區宇聖上同天皇皇帝祜握樞臨極萬國攸平翼恭帝祖憲度著明其一五十之年于今五稔庶績其凝旰食晏寢夕惕若慓加勞三皇多厯年所寧濟四方其二崇哉乎徳允信允文綷以藻咏暉光日新武莭是宣龔行天罰南煬丹崖西厭月􅒸其三于彼西疆曰納其降重譯貢篚如熙春陽南越相夷罙入其阻請受纓縻普天率土其四功成作樂下舞上歌詩三百篇同律克和乃流辟雍聖皇莅止爼豆莘莘濟濟多士其五屢惟豐年百物殷阜人胥恱欣何生不茂省方廵狩帝曰俞哉勤䘏民隠望君之來其六申命羣司西盪河源以流河曲嘘噏百川流渭通涇控清引濁剖晰毫釐潺湲徑復其七開元首正伏聞恩詔敬法䘏刑興㢘舉孝惟穀之恤以浸黎元皤皤國老署行議年其八惟命之嘉于何不有千品萬官恩隆父母獻惟皇士翼翼邕邕三餘靡失明試以功其九少昊司農皇慶攸興五位時序三光宣精備嘉祥用朝羣辟僸佅兠離罔不具集其十吉日良辰即宫廣讌酣胥無譁豐肴衎衎海内同悦應㑹皇都受茲介福洋溢八區其十一惟徳動天乃眷斯顧萬祥必臻不可勝數沐浴福應兆民頼之天錫難老長無極兮其十二萬夀太平曲三十首謹序翰林院庶吉士臣錢福胙欽惟我皇上功侔軒籙道總羲圖資五緯而彌綸奠三垂而統楫乾符體健龍文孚闡極之型泰策延熈鳯紀肇披元之㑹際六宇同春之日正八旬展慶之辰瑞衍蘿圖越五稔而年贏週甲祥凝芝檢介萬夀而歲協長庚矧夫鴻慶蕃臻龎禠􅞗應衍瓜綿於玉牒華雲蒸五福之堂孕榖秀於金科瑞日煥八徴之寳六連景化意類凝薫菉幣駢羅棧壑梯山之瑞華封翼戴扣轅擊壌之歡慶普金圻禧均玉甸爰肅迎秋之駕早回避暑之鑾翠陌祥煙香穗裊猊爐之篆黄圖瑞靄修僮揚鳯䍐之華月麗銀盤朗十洲之澄鏡露凝寳甕奠四表之安盂匝字騰歡寰區臚頌天子乃御太和之廣殿納錫羡之嘉符琦繖雲馳彚千官於鼇禁簮裾颷聚肅九拜於螭㘭秩隆禮而覲龍顔歌聲舞節沛稠恩而宣鳯諾里忭塗歡咸欽覆幬之施競效升恒之頌臣席芳芸館依景蓬瀛就日輸忱幸遇乎羲年昊歲採風獻悃竊蒐夫巷祝衢謡三十章依韻徴吟半頌徳銘恩之什億萬載膺圖納禄盡延齡錫嘏之符謹儷蕪言䖍申鼚舞其詞曰福緒祥源萃聖躬騰華照㝢格璇穹糺雲彩絢瑶墀上萬歲歡心萬國同方軒邁扈軼堯雍帝徳如天百福宗遍酌衢尊飫芳㫖㪺元醲化勝醅醲世緒欽承道益龎觀風甲夜燦銀釭琳籖底用投堦石御事無分隻與䨇劭農恤榖軫勤思杝緒庥徴雨及時一自觀耕勞黛耜年年歡詠大田詩記誦鴻文說古稀又欽耄念凛時幾璇齡叠見鐫珉琬福自天申不待祈惇誨儒林富石渠宸心善日寳三餘酉山乙帳疇堪擬福地琅函四庫書史評經訓契宸謨著論應刪衆説郛盛業千秋争寳貴連城一字重璠璵聖製神功造化齊侍臣著作奉金閨敷雲麗日頻摛藻定有光華映壁奎凝承荃宰秩燔柴薦座黄琮祀典偕欲識元功符両大郊壇歲歲懋清齋嶽神清峻鎮埏垓詔舉明煙祼玉罍盛世不登封禅頌祥風寳露暢春臺河海宣防睿畫頻徳洋流澤溥洪鈞揚珠起玉祥何限陬澨占風識聖人率典巡方翠蹕勤釐工考徳紀崇勲南逾浙水東臨岱太室崆峒陋昔聞緇林㽅爼道常存釋奠躬親秩祀敦自是皇情符聖揆鴻章鉅制萬年尊槐宫軒敞迓瓊鑾特啟橋門聚聼觀霧集烟霏延儁彦海流花洽喻風湍獵碣糢糊積蘚班籀文竒字讀誰嫻自蒙喆鑑重排次偽説蕪辭一例刪夀宇祥開重引年龎眉熈豫樂堯天恩輝不數華林宴千叟扶笻侍玉筵雅律宣和協鳯簫中聲釐定七音調萬民側聽鈞天樂閶闔風清奏九韶玫陛敷文弛玉弰舞階干羽拂雲梢金隣黒齒咸遵化億里荒紘帝度包整旅尤欽睿算操犁庭搟邑秉龍韜狼星夜掩欃雲靖㨗凱聲中解戰袍重譯盱眙納賮多風烟萬里驟輕駝蠻歈逺勝龜茲樂催放名花叵鉢羅述慶臚觀九陌賖又聞三殿渥恩加豐年人拜蠲租詔喜溢康衢十萬家晉署頭銜鵷鷺行天書錫類耀金章門添寳閥森華戰奕世沾恩頌不忘蕊榜祥遴藝藪英星潢朗曜闢雲程秋風桂樹春風杏㡬輩扶摇上玉京耆儒皓首困窮經遍給巍科寵碩齡鶴髪麟衫輝暎處爭誇人瑞集堯庭解組諸員異數膺蕪株重慶瑞芝蒸恩波浩漾真涵海淨滌塵瑕賦飲冰丹鳯門開聖澤優赦書驛遞騐星流金幡廣種無量福一片慈雲覆九州龍樓肅望拜恩深十賚重頒内帑金化日舒長民氣樂烏騰魚躍總歡心觀酺庶類頌含甘鼓笛棚車處處譜喜見璣衡調玉燭貞符詳協泰階三九重雲日許翹瞻天上弧芒映玉蟾共慶堯年申億萬繁禧欲並海籌添呼嵩叩闕整朝衫㤗宇瑶華貞玉函四海昇平無一事譜將俚曲應韶咸萬夀詩仿長慶體一百韻㳟集御製句翰林院庶吉士臣龎士冠五福箕疇夀居首億萬斯年祝曼耉錫嘏欣逢開八旬天與夀因徳與夀五位撫辰慶典呈十成紀歲五常并古稀薄海廑懐保十年一舉又逢庚太和元㑹㳟南靣孕虞育夏天心眷行健體乾勵自強對時志切三才奠齋心齋體即齋宫倉璧欽昇帝座崇青仰圜惟乘軋芴泰壇東峙燎雲紅日惟勤敬荅天祉功祖徳宗垂萬禩經緯成周道法同堂構萬年綿福履謨烈顯承奉大全嘉徳懿言在簡編祖訓聰聴仰深意繩武而今勵仔肩篆凝瑞靄猊噴霧升薌昭穆莭頻度太室蒸嘗愾僾同玉階金戺瀼朝露春仲經筵躬必行虞傳惟一與惟精智者樂兮仁者夀地博厚而天髙明㡬康惟是天上敕運斗旋杓環紫極統軍萬里國威宣廟謨本欲安絶域厄魯蕩平回部運賢王奔走相周旋彼以敬來酬以惠西瀛職工正聫駢逖疏率與光明耀一天朗日懸清照行張凱宴勞凱還十行寛大新頒詔威弧有事射天狼曰惟聲罪不庭方金川大小穴俱埽鯨鮞懲逆武維揚閶闔九重開詄􅀢紫光將晝凌烟像論功行賞策忠勤四海臣民咸共仰時狩由來武備修三驅羽騎鴉星流木蘭歲歲秋圍舉吉日應同雅在周廓清籩徼威已振將卒一心同効藎偃武歡騰禮樂彬輸誠屬國咸來覲百辟衣冠式禮儀絃歌鼓琴敦書詩鳴球聲引羽干舞文運方當春午時聖藻千秋同糺縵羲圖文籙三才貫義與宣尼可合之屏息不䏻一詞贊右文大典舉春和瑯嬛秘籍厯増多四庫全書抄四部稗官雜識槩蒐羅㪚編裒集還全璧魚魯縱教精致覈一再成咏藻鑑懸玉篆金題璽文赤清文漢義各陳書遂命裝黄弆石渠今古英華率全薈詎寧銓奥到蟲魚千秋金鑑垂圖史鏡清無私昭協理載道惟文語不磨遍翻古史曽誰比石鼔之數符天干特開廣殿集衣冠為憐漫漶臨新本都下傾城咸饜觀䕫也由來不世出丹陛樂鳴叶韶律幾餘考訂為重鐫即看璧府裒成帙猶日孜孜朂惟寅惕乾一意永勤民明禋盛禮既三代由來無事必躬親星言駕彼六龍夙萬靈此日雲車肅土膏特潤賚苗芉田蠶四海殷同祝日臨吉亥應農祥視履先期命太常重農要欲所無逸一墢三推古禮祥幕調雨十兼風五身是九重心萬户大造無私澤被均作息重看唐代古恒年賑恤捄汙萊一氣春和萬室該南薫茂對澄懐永衢歌巷舞博顔開家給人足何以惠减賦蠲逋施次第養恬引欲溥垓埏渥恩實幸贏常歲六度南廵于邁勵上下和樂胥歡欣休助非闗循故典編氓一路頌聲聞肆觀東后修五玉祗應風化孚民俗蕩蕩恩覃薄海堧不獨黄圖調玉燭崇儒雅化示寰瀛近止尼山慰素誠到來即謁大成殿心殷瞻就魯諸生菁莪棫樸風人藻旭日正輝三秀草闕里西瞻路不迢平心正體斯契道釋奠回鑾禮岱宗周垣圜峙肅重重漢柏唐槐都好在聖日光華朗碧峰即今河水清仍注鷹嘴鹿疃䇿隄務沙漲金堤凟協靈歌舞農夫喜行路通漕籌農意各存以莭以宣寳穡蕃引渠建牐農功頼崇墉比櫛看村村海塘條石從新作窮源逹委細籌度石塘接築俾民安寰宇清宴胥和樂克明無逸訓堪聼書云弼教在明刑赦除本為灾眚肆惟念民艱求厥寧同任股肱民杜寄了識安民在察吏六計弊吏總以亷到處閭閻歌樂利求賢說盡聖皇心恩牓重開惠士林鳯池多少簮毫者連年沐澤渥而深柏梁賡已宴千叟笑呼摩肩還接肘湛露三廵共拜嘉介眉􅀢進兠羅手元孫五代喜同堂本支百世奕禩昌上瑞古今真此罕更希慶典数無央一堂敦和家人吉派衍千年四品秩廣寒法曲宴中秋年年最喜稱觴日施恩要欲遍千官特許儒臣禮數寛咫尺玉堂清切地花瓷賜茗擘龍團新附更畨逓相覲羊酪馬酮都獻賮東澥南瀛許並陪惟是薫披仰我舜東鰈瞻光接北鞮按程馬到憐穿蹄服物舊稱方物貢其名不可僕指稽六星又見朝南極此是人間真瑞色昌辰吉事喜重重百歲老人歌厚徳王路由庚逹大䝉蓬島瑶臺福海中梵王經裏極樂界無量夀希與佛同天上拜恩霑雨露枝暖萬年曦煦􅀢敷天駢疊錫新禧萬禩皇清綿寳祚乾符丕慶協坤靈九苞丹鳯來虞廷侍臣羣獻南山頌聖夀應増億萬齡
