front:
  text: 欽定四庫全書八旬萬夀盛典卷十九聖功二安南歸降二命補繪安南戰圖製詩紀績御製補詠安南戰圖六律有序己酉
  hash: sha256:738d17a2df28608aebd89bb439f3fe637a24edb7370bf3a0a832ffe1b98da879
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_019-1a, image: WYG0660/WYG0660-0219a.png}
body:
  text: 詢孫士毅安南戰事縷晰以陳因命畫院各為之圖補詠近體而序之曰安南戰圖非如伊犁回部金川臺灣之始以戰而終以成功也非以戰成功則可勿圖而圗之者實緣我將帥之臣軍旅之士涉逺冒險攻堅破鋭更有抱忠捐軀者不為之圖以紀其績則豫何忍且阮惠之悔罪乞降原因有征斯亦未嘗非始終一事耳夫有征無戰尚矣戰而有成功次之豫自定伊犁平回部勦金川以至近日戡定臺灣之役皆經指授機要戰無不克功無不取以成此數大功蓋戡亂伐暴難言偃武則雖不能有征無戰而俱獲成功要皆天心佑順乃克臻此成而復變又終于不戰而成功其事當較于戰而成功者為勝焉阮惠復至黎城黎維祁仍棄其國可謂變出不意然豫調福康安為兩廣總督仍將集兵聲討逮阮惠冉四籲懇又遣親姪阮光顯詣福康安處賫表求降福康安察其情形實出至誠然後據情入告豫因思黎維祁不能立國既徴討亦天心厭棄而中朝又不利其土地即使集兵聲不過歸于降服而究未必即服其心則何如此之不戰而屈者發于中誠蕆功寧衆轉為大順之機是更足以見天心之佑豫躬實為至厚耳是豈人力所謀乎天也藐躬臨蒞五十四載受天之佑不一而足而于安南之事復不戰而成功則豫之所感激鴻貺益深敬畏者當何如間嘗論之使孫士毅收黎城之後即能鋭師至廣南獲阮惠又如孫士毅遵旨早班師雖無許世亨等三將之捐軀將未至我境而黎城復失其能不旋師以救之乎又如孫士毅亦同三武臣之捐軀沙場則士毅乃督戎重臣傷國體為大不得不興師問罪是誠加兵無已時矣且許世亨委曲護令孫士毅振旅而還使已亦同歸則更有説乃仍捐軀疆場其知方有勇為常人所不能每一道及為之落淚嘉尚至孫士毅非不知朕之奬勵功臣賞延後世設亦捐軀則其公爵必世襲罔替人誰不死且本欲衝鋒致命逮聽許世亨之言以國事為重寧歸而受朕之罰而朕豈肯不諒其心加以罰哉是二臣者其事不同而心則同兹事機之會總戎振旅以歸三將令藩國立祠酬忠且阮惠因有此過而畏罪求降不勞一旅以定海邦是皆昊運旋轉默為呵護豈豫一人思慮所能及哉自茲以後益深敬勤靜待天恩六年歸政夫何敢更生别念乎此補詠安南戰圖之什所由作也嘉觀訶􅴎之戰孫士毅出鎮南關在諒山分兵兩路一由枚坡令參將張純等至嘉觀路會齊一由江漢令總兵張朝龍等徑趨三異柱右等處嘉觀屯聚多人一聞大兵勢盛望風驚逸而不從亂之土官率領土民數百人俯伏投順自此經過嘉觀奮力勦殺或跽而降或抗而殱或擒而戮追至訶􅴎地方山谷峻隘適張朝龍截其去路會合夾攻勦殺不可勝計河邉求救恤諸煢安南數代以來被陪臣鄭氏世擅國柄阮惠藉詞伐鄭旋即占據黎城以致嗣孫黎維祁出走至上年五月內嗣孫之母妻及眷屬奔至廣西水口關外沿河地方號呼求救疆臣以聞豫憐其恭順本朝百數十年即降旨從優撫恤並令督臣興師致討大義所關事非得已無外王師事有征禁旅不須七萃發總戎惟帥兩疆兵初孫士毅奏請素有威望重臣督率旗兵徑旅至彼征勦豫以道路寫逺㨂發稽時且該督素稱賢能深堪倚任提督許世亨亦才猷夙著因即命統原駐各關隘廣西兵四千名又添調一千名及􅊾調廣東兵五千名共足一萬之數令總兵張朝龍尚維升等分領前進而第一戰參將張純等即有嘉觀之捷勦殺無數先聲固已奪人持危治亂原出正簟食壺漿多順迎螳臂那當大車轍嘉觀一戰赫先聲三異柱右之戰總兵張朝龍統兵三千名內分一千五百名令參將張純帶領從嘉觀前進張朝龍帶一千五百名從三異繞至柱右等處夾攻殱戮奪獲米糧軍械無算生擒兵辨一百餘名而副將慶成叧帶兵三百名伏于附近柱右之頴繼地方生擒已降復叛之陳名炳解赴軍營正法尤強人意師行二黨叩營門巢近一酋逃負恩初孫士毅抵鎮南關偽將諒山督潘啓德來降其協陳名炳因見􅊾文甚為悚懼亦即情願歸順孫士毅加賞給劄令其回糾義勇隨兵嗣阮黨吳初寄信哄嚇潘啓德不為彼誘而名炳旋即逃回黎城被阮惠拘其妻子仍加任用柱右之戰即名炳領兵前來抗拒既降復叛情實難宥正旅偏軍窮列寨右抽左旋去聲勦蠻村張朝龍至三異柱右交界地方正在扎營瞥見對面山坡兵衆蜂擁前來該鎮率領將辨及張純所帶兵兩路夾攻沿途村寨放火焚燒𠞰殺甚衆獲畨多米胥資飽是役雖不資安南一草一木至於獲彼餈糧正足供軍食也繫寇長纓那許奔孫士毅更令慶成預領兵三百餘名潛赴要路攔截生獲騎馬者三人而陳名炳即在其內似此反覆之人不致有逃顯戮洵稱快事誠喜國威延世將名勳思克有元孫慶成之髙祖孫思克國初屢著勳績有此元孫可謂無忝家聲夀昌江之戰總兵尚維升副將慶成等帶兵兼程前進五鼓至夀昌江時值重霧瀰漫阮兵猝不及防傷死不計其數餘衆拚命逃竄擠斷浮橋我兵斫竹編筏刻即奪江而前無不餘勇可賈三江橫亘此為脣固守羣攖最要津乘霧定方掩牙帳渡瀘卜漏失重垠阮衆滿擬大兵由一路前進是以設寨屯劄希截官軍糧運不料大兵各路俱進無從掩襲因退保夀昌市球富良三江以為堅挋之計及尚維升與慶成等連夜帶兵一千二百名兼程前進五鼓抵夀昌江岸乘霧殱戮浮橋既斷立即斫竹編筏迅刻渡江奮勇進勦阮衆所恃之險已奪其一自此遂成破竹之勢擬之唐蘇定方乘霧襲頡利牙帳宋趙遹計破瀘戎卜漏恃險事頗覺相類攻堅悉鋭已奪魄砍竹編槎可當去聲䑳將領前驅衆軍奮嘉其同是漢軍人尚維升乃國初所封平南王尚可喜之後裔與慶成同係漢軍此畨奮力均堪嘉豫市球江之戰官兵抵市球江阮衆蟻聚南岸頗有自髙壓下之勢以是連日衝奪不能得利孫士毅佯令義民搭蓋浮橋令總兵張朝龍夜半于左邉暗渡抄出彼營之後喊聲震地大兵亦由浮橋渡江夾攻勦殺數千生擒五百餘人遇險應如襲後攻諭馳未至不期同先是豫念三江之阻馳諭孫士毅當地利相持不能速進之處可于上下遊密探間道潛渡如田豐之乘間襲河南李訴之夜半攻蔡城出其不意當能制勝此旨未到之前孫士毅奏市球江之捷竟與諭旨不期而合可稱能事統軍素悉田豐䇿勇將偏饒李訴雄臨下據髙彼頗熾出竒制勝我成功官兵駐劄市球江北岸地形低下勢難仰攻阮衆見我兵不得地利自髙壓下屢從浮橋及所駕小船衝突前來我兵扎筏緩不濟急孫士毅與提督許世亨相商令官兵一靣排列多炮隔江攻打並令義民搬運竹木作搭蓋浮橋欲渡之象一靣跴探左邉二十里之外江勢潦曲為阮衆耳目所不及之處密令張朝龍帶兵二千名于夜半用竹筏及農家小船裹帶乾糧陸續暗渡復令李化龍以兵五百接應于是官兵度已潛渡有恃無恐勇氣倍增而張朝龍暗從彼營後呐喊排墻而進阮衆不知兵從何來魂膽俱失棄寨奔逃大兵遂即渡江分路進𠞰此兵家出竒制勝之道也黎城將近兵威鼓衆志維揚企績崇富良江之戰富良江乃黎城門户阮衆見官兵將至將大小船隻收至南岸江心施放鎗炮我兵不能迅渡孫士毅察看阮兵勢漸潰亂令將辨用農家小船及竹筏于日間勦殺江心兵衆而于次日五鼓許世亨率二百餘人直至彼岸彼于昏夜之間不辨兵數窘迫無措繼而我兵搶奪數船更畨濟渡痛加勦戮并燒沉江心船艘十餘隻全軍渡江黎氏宗族及百姓人等遂開城出降不攻而克門户黎城曰富良彼雖固壘衆倉皇數舟獨入真稱壯既勇知方深惜臧官兵至富良江許世亨覔小農船及竹筏率兵二百餘人徑渡彼岸繼又搶奪船隻更畨𣲖載官軍其勇壯之概真為超衆及阮惠復來孫士毅尚復領兵身先衝敵幸而許世亨力為勸阻並令武辨控騎遄行于是孫士毅振旅入關不致有損國威而許世亨仍即致命疆場似此勇且知方之賢臣能不倍加惋惜復國一王仍棄守立祠三將示留芳提督許世亨總兵張朝龍尚維升等臨陳捐軀國家固已從優議恤賞延于世並令阮惠于安南立祠以祭而阮惠奏請官爵封諡即于彼處建立祠堂垂芳奕代此更足以酬奬忠魂矣至阮惠冉四籲求伏罪歸降實出真誠揆度事機悉屬合理正當從其所請赦過加恩事以順成不越佳兵之戒矣酬忠撫順遵王道無事佳兵兆吉祥阮惠遣姪阮光顯入覲賜宴之圖黎維祁復國後不能自立一聞阮惠復來又即逃奔內地天厭其德誠非虛語豫惟奉天曷敢違越不值復興兵衛彼復國也嗣據福康安奏阮惠再四籲懇悔罪歸順出于至誠豫亦不欲為己甚因即允其所請撤兵阮惠先遣其親姪阮光顯入覲輸悃並稱明嵗當親詣闕廷祝釐因以乞封昨接表文嘉其情詞真摯急欲得天朝封號為榮即敕封為安南國王兹阮光顯來至山莊正屆萬夀莭令其一體與宴用示恩榮誰能不戰屈人兵戰後畏威懷乃誠黎氏可憐受天厭阮家應與錫朝禎今秋已自親姪遣明嵗還稱躬己行似此輸誠外邦鮮嘉哉那忍靳恩榮新封安南國王阮光平籲請頒示正朔並乞開關通市優詔許之十二月初四日奉上諭福康安奏成林自安南宣封進關後于途次接見福康安詢悉安南一切情形摺內稱阮光平以安南僻處夷荒籲請天朝頒示正朔又以該國物産本微加以連年兵燹物力衰耗懇恩將水口關準令商販出入則全境生靈俱獲利用等語阮光平膺受封爵得偹藩服感激歡忭具見肫誠前經遣使進貢并再三籲請於明春親自赴京瞻覲祝釐忱悃可嘉業已俯允所請今又以安南僻處荒陬懇頒正朔該國王于締造之初即能崇奉天朝定時正朔為急務朕心深為嘉慰自應即為頒發俾得敬受正朔永逺遵循但向來朝鮮國係遣使臣先期於十月朔日祗領憲書今安南逺在南交若每年照朝鮮國之例遣陪臣到京謹領返國時已逾春正元旦之期該國臣民轉未能及時遵奉殊非體念逺人之道今諭該部即將五十五年時憲書發往交該督即委員賫至鎮南關令該國鎮目轉交國王祗領嗣後每年即著該部照朝鮮請領數目將時憲書發交廣西令該撫照此次之例屆期頒給無庸該國遣使進京以示體恤至安南向通貿易自設禁以來罕有內地貨物該國民用所需諒必日形短絀今該國王抒誠效悃已就藩封其境內黎元皆我赤子自應準其開關貿易早一日則民受一日之利况安南甫經兵燹之餘閭閻凋敝物力維艱尤須急為通市俾得有無懋遷漸臻饒裕並著該督撫將水口等關即令照常貿易以副朕胞與為懷一視同仁至意安南國王臣阮光平謹奏茲欽奉頒賜乾隆五十五年時憲書著禮臣嗣後屆期頒給發交臣國之諒山鎮目祗領不拘朝鮮國遣使赴京候領之例並奉諭旨俯念臣國連嵗被兵物力衰耗特賜開平而水口兩關俾通市易仰惟聖德如天無微不燭頒正授時而嵗功不忒蠻荒瞢於銖黍晷刻之度自是氣候不至差訛開關互市而泉貨可通下民病於懋遷有無之難繼今物力不至短絀鴻慈體恤之至真是天髙地厚莫可形容臣仰荷恩私無階報稱惟有翹瞻天闕長傾葵藿之忱恪守藩封永述共球之職謹奉表稱謝者伏以皇極建中廣運大同之化聖恩覃逺難名鴻造之仁翹首雲端捫心海際欽惟大皇帝陛下奉三體道錫五綏猷主宰於上不勞惟深惟幾精神之所運動包含其大無外所照所至血氣莫不尊親際蟠盡在於帡幪胞與都歸于容蓋昊天之四府者時也體天行事回旋于遐阻而不遺聖人之百貨可極焉與人為公施濟在痌瘝而尤切蓋發育道存乎廣大而阜成義本于通融法春秋嵗首體元夏朔寵頒七政示璣衡之象取噬嗑日中為市周關弛禁九圜通珍寶之途明時欽天度之昭彰利用仰皇仁之溥博天乃道道乃久天皇正朔億年承夀考之庥土有人人有財土宇昄章萬世溢豐饒之頌臣欽膺厚眷祗沐隆沾鈞韶咫尺不違願無二無虞奉彛訓為樹本立基之凖玉帛五三有恪期不虧不竦荷寵光于同風共貫之庭臣下情無任瞻天仰聖感激欣忭之至謹奉表稱謝以聞乾隆五十五年恩封阮光平長子光纘為世子加賜珍幣有差奉天承運皇帝制曰朕惟一人宅中御外化覃屬國之封列辟守典承休佑啓克家之胄稟義方於夙夜念篤尊親知大德之生成情徴愛戴用沛以宗藩之懋賞特昭夫曠格之殊恩維安南逺介炎荒而國王恪遵臣職藩邦新造承家綿茀祿之長崇爵初膺篤祐遂就瞻之切表箋籲懇賮獻情殷際普天同慶之辰欣躋夀宇效薄海臚歡之頌同暢皇風爰嘉令器家賢更喜維城宗子爾阮光纘乃安南國王阮光平之冡嗣粹質溫醇英姿瑰特聽鶴鳴之隂和聿培蘭玉成行當鯉訓之親承快睹荆枝首茁詒燕翼而鎮撫有方震為長子譽龍光而箕裘克紹晉叶康候有嘉德而裕及後昆故推恩而賞延奕世今封爾為安南國王世子錫之敕命於戲雨自葉以流根如喬如梓材由斫而塗艧肯構肯堂儀文特賞爾榮典䇿載綏爾寵爾其在家思孝在國思忠勵乃心於匪懈學為人臣學為人子修厥業以無愆允不墜夫芳聲並懋承乎多祉欽哉毋替朕命七月初九日安南國王阮光平入覲於避暑山莊行在行抱見請安禮八月至京恭祝皇上八旬萬夀禮成恩命回國陛辭陳謝慶祝宴賚禮暨分載典禮門及御製詩恩賚門安南國王臣阮光平謹奏臣萬里趨朝謝恩祝嘏自行抵熱河山莊以來幸得瞻拜龍顔仰蒙天語殷肫曲加慰勞臣傖陋蠢愚何以當茲榮遇欽惟大皇帝陛下撫御萬國一視同仁作則作師為君為父明與日月並量與天地參此照臨怙冒之公而下土臣民瞻仰之所共至於待臣恩禮優異顧復不殊則係臣一身之所獨膺豈惟夙昔意料不及蓋實三生之至幸而千載之竒逢今仰奉宸衷垂念臣國初創締造方􅎋旋降恩旨賜之回國宣臣近御座旁諭以溫語聖慈眷憐諄懇周到臣感激涕零不知所云念臣受恩如此之重被寵如此之優惟願夜寐夙興長依黼座而恩諭不敢不遵國事又不能久曠進退躑躅依結彌深屈指九千里行邁之遙追思四十日趨承之幸骨鏤心銘愈覺難于摹寫臣歸國之後謹當凜遵彛訓恪篤忠虔慿藉寵光以鎮邦國奉承聲教以偹藩翰洪惟大皇帝純嘏天錫茲遇八旬開秩猶復勤理萬幾不自暇逸仰瞻天容穆僅似五句將來聖夀九旬慶覃瀛海康強純固悠久無疆屆期臣當重詣彤墀冉趨王會以覲天顔以述候職此臣之大願也臣現當辭闕身去心留感遇銜恩五中怵惕計臣此次陛辭之後至臣將來叩祝九旬萬夀之時不過十逾寒暑北辰在望拱嚮殊殷臣實不勝激切依戀之至謹奏臣等伏覩我皇上納降安南一事始終以敬奉天以誠字小權量於輕重久長之計而成此息兵安衆之全功臣等鋪敘鴻猷略于始事戰功先幾制勝者具見于御製戰圖輔詠詩中自簡任臣福康安督軍聲討阮光平即懼悚悔罪再四乞降並懇親詣闕廷恭祝八旬萬夀且先遣其姪光顯獻悃籲恩兾垂赦宥此事機之會更何事勞師勤逺以震耀於炎海一隅也哉夫聖人奉若之道惟弗違王者仁義之師多不戰彼自顧威不足而藉口閉關與視其利可圖而私心牟得者萬不足以語此矧聖朝正大光明之體聿成耆定逺謨既以興滅繼絶者正綱紀于前復以傾覆栽培者布寵綏于後自此銷𤇺海徼奉賮天庭稟正翔而襲衣冠世荷洪施之渥而又躬瞻黼座叩祝椿禧感遇銜恩誼真情摯以視古所稱頡利請降告功爭侈呼韓上夀客禮虛崇者曷若兹之忠虔篤效歡被生成長覆育于乾坤悠久之中也乎八旬萬夀盛典卷十九
