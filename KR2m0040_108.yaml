body:
  text: 欽定四庫全書八旬萬夀盛典卷一百九歌頌二十九萬夀八徴頌謹序翰林院編修臣秦泉乾隆五十五年嵗在上章月屆仲秋恭遇皇上八旬萬夀聖節維時寰瀛內外億兆臣民翹趾樹頷悉吐誠素願申祝嘏喁喁齶齶不能自已蔚然盎然並轃嘉會乃聖懷沖挹方詔中外勿以彌文侈進獻而惠育黎元膏澤下逮一時若蠲賦開科靡不洪施優渥布濩八區天人協氣蒸為太和甘􅉈景風百昌豐殖皥皥如也粵若稽古頌禱之辭莫善於詩既醉燕飲也則􅊀五福之頌天保感恩也則有九如之禱矧今昌期翔洽化被埏紘我皇上事天之誠法祖之敬愛民之仁與夫膚功偉略奮武揆文國家典制之隆聲容之盛萬邦和會寅迓蕃釐可謂萃百王之大成曠千古而罕覯者矣臣又伏覩宵旰勤求孜孜惟日苞符萬品契合庶徴親製寶篆曰八徴耄念之寶至矣哉宥密緝熙之全功撫辰凝績之實效化成久道流衍無窮暨乎洪暉普慶上理懋臻照景飲醴期頥愈樂扶杖而觀聼者咸含和而食德稱曰盛哉乎斯世臣愚以為聖德莫隆於敬天勤民敬用五事即推人事以驗天心聖人為天之子天子子萬世萬民而躋之仁夀之宇厥庶民胥保惠胥教誨無一夫不獲其所則荷天之龍亦必以萬世萬民夀為聖人夀而聖人又推天之所以降福者穰穰簡簡用敷錫厥萬世萬民是以延洪曼羡增受神策周而復始罔有紀極宜乎福嘏日溶髙明博厚自強不息日進無疆不息則久久則徴無疆惟休休徴丕應夀與天齊也臣職在詞垣敬獻八徴頌八章仰陳黼扆導下忱於萬一其辭曰天篤景祜睿哲欽承含宏翕受萬福是膺三神浹歡五辰時撫乾苞坤符懿鑠純嘏皇帝誠敬履盛撝謙蜵蜎蠖濩明旦維嚴紺殿紫壇迎長南兆靁鼓雲門煉薪緼燎祈春雩夏祗肅躬親豐融肸蠁至今八旬寶貺駢羅溫颸甘澍霞蔚雲增陽蓲隂煦蕃釐戢孴庶績康哉庥徴迭遘書瑞靈臺其一維清緝熙奄有四海元會運世契叶昊縡導揚祖烈纍洽重熙列聖遞傳鞏此丕基帝武纘純愓勤夙夜考絢丹縢用光穠化周邠胥宇漢沛歌風作堂紀恩陟降伊通四詣陪都典崇報本僾見愾聞芮鞫原巘昭兹來許全韻成章紹衣劼毖繼序弗遑遹駿前寧在帝左右暘雨時徴以佑眉夀其二於穆蒼蒼萬靈所仰俾作君師引恬引養皇帝愛民恫癏乃身龎鴻纍積厚德深仁蠲賦惟四蠲漕惟二詄蕩泰符節宣協氣繁禧孔賁豫大豐亨綿隄巨萬河海底平總總林林桑麻給足十雨五風休和沐浴帝厪寒燠茅蔀周咨損上益下民莫能知人力普存蟬聨祉祚厥有祥徴邦綏豐屢其三浩如淵海萬派趨東全書薈萃聿稟折衷甲乙丙丁藝㡡四庫皇帝睿聖輝映䇿府分建七閣津逮南邦琅嬛委宛富美無雙三萬六千丹文緑字綈几琅函鑠乎大􅊀證經訂史議禮審音焜耀奎藻沾溉儒林頒列黌宫璇題渾噩元氣淋漓日星回薄災畬謨典聖學崇髙景徴懿顯髦士甄陶其四羲易知幾皇帝神武厚屬櫜鞬有赫斯怒凖噶爾部一戰耆平兩和卓木五稔勳成洞燭樞機咸欽睿斷籌運萬全勢􅍾勝算南交入覲𬗟甸輸誠薄來厚往詎限禆瀛偃伯靈臺圖形紫閣鍚命酬庸豐珉崿崿五十五載四極和同馨烈彌懋殷地呼嵩區宇乂寧蒸黎順則定保眀徴我皇威德其五嘉禮咸備秩祀孔眀皇帝時邁率祖攸行六巡南方龍驤沛艾捍海籌河劭農省耒為民介景泰岱升香寧成樂利福祿溥將輯瑞封山東魯展禮盥薦孚顒蹌蹌濟濟崇頒十事古藻璘彬殷彜夏勺黃瓦丹楹吉日車攻重排石鼓周雅籀文光嫓岣嶁旻旻穆穆美備如斯丕徴文郁威儀孔時其六大樂同和元音布濩皇帝乘乾聲律身度綏猷建極戬榖罄宜中和韶奏獸舞鳳儀三百葩經夙疑同律樂譜親裁八音克一鳴球戞擊玉産和闐西江古韻鏄鐘鑄焉清廟明堂比隆虞舜純如皎如金聲玉振逺逮西藏畨人回人揄揚聖澤縵舞畢陳磬管鏘鏘簫韶繹繹金石有徴鼓吹六籍其七先庚皇覽景貺宣轃乾行六幕離照重輪恆蔭松椿載圎月桂繡甸臚歡芳塍普惠蓂敷軒戺時殷仲秋湛恩汪濊以佇豫逰五代一堂誕􅈾帝祉鞠􅛏綵觴天顔燕喜內由卿尹外逹藩王鯢齒鮐背髦譽膠庠雅頌京都升平化宇擊壤謳衢軒舞鼚鼓圖範際地輿蓋蟠天夀徴南極皇帝萬年其八萬夀恭擬樂府十六章謹序翰林院編修臣余集臣聞太和布濩衡正階平協氣嘉生中外禔福象容表慶均禧九垓蹈德詠仁大樂斯作臣伏見皇帝陛下㪺元馭籙典學敕幾健法乾行寅孚昊眷紹聞衣言繩繩繼繼蓋五十五年如一日而道洽政治澤潤寰宇樂華禮葉延美大光純嘏緝熙嘉符懋燦未有如今日之盛兹蓋伏遇八旬萬夀聖節南瑜東賮駢蕃王會歌頌之作遍及朝野臣以菲材職在編修仰覩鴻規誠歡誠忭敬按樂府譜辭十六章以當康衢之謡華封之祝謹拜手稽首而獻詞曰天子當陽盛德在金以殷仲秋試從風驗律祥通夤極占雲按節徴應圖疇人捧葵心天將桂酒璧月清光盈殿頭瞻南極有觚稜瑞靄蓊鬱皇州絲綸大小共球任鼇抃千官擁八騶比羲珠農玉駢蕃介祉虞絃唐萐逴躒徽猷聞嶽呼三維天錫五玉藻朱紘十二旒乾行健又宣和𨗳順篤懋鴻庥夀星明受天之命何天之龍承天之祜綜庶績兢兢業業夙夜齋心閟瓊宇擇元日向南郊北面蒸蔚薪燔燎炷漸調起雲和琴瑟都應靁鼗靁鼓彛訓嘉言能晰數迪前庥明昭式序將一代登庸制作丕鞏兹億年基緒又底事取文華金匱方謂昭兹來許仰思成紹庭上下俾緝熙于純嘏凡此肅肅雍雍早共見敬天法祖慶隆平萬國咸寧與百神爾主行幾遍雷霆風雨出震流虹渚邁振古書載惟幾自昔詩歌下武寶鼎現東郊平秩仲月臨耕藉黛耜舉青犁出三推陳冒橛百辟均衡石新雨過蒼龍玉軑輕煙濕畝畝春波溢井井秋成得瑞麥秀嘉禾殖九州因地利六府先民食天語至三農齊戴寅賔日千秋嵗玉几橫經正春在南榮日麗東閣鵷鷺蟬貂萬玉鏘鳴帷幄濟濟桓班咨度更穆穆嚴徐儼恪守四字觀易陳詩御爐煙滿金鶴醲化盈廷霑渥况考言詢事司勳申約九品官人都入三年計𣙜本是揚清激濁定無有虛縻好爵統天下經濟文章範圍咸就規彠萬年歡樂善堂開翰墨研珠玉灑雲天五針題笏三傑著瑶篇刪盡丹函翠藴紫庭黃竹白麟朱鴈自譜南薰入舜絃酉山負扆甲觀陳編三餘靜紀長年書磊硌石刻更金填幾處奎章髙閣風動碧牙籖長生樂五福陳疇念八徴敘彛倫雨暘寒燠寶同登紫泥蒸石鼓新排收􅞚趩字磷磷車攻吉日句重增古何能太平時聰明神武允矣赫赫王師震拓盡西羌邉竟收咫尺榆關蔥嶺宛馬貢葡萄進却漸與酒泉分濬聼月下一曲伊涼都奏升平答忠信後時更有金川𬗟甸居國西南相近看撫定燉煌萬里牂河四靣卭筰為州郡堅碉陡磴正密密橦花交映滿滇南天氣如春碧雞先警征部樂性相通西極巴勒布婆羅密玉龍頷下金神仗外天魔都屈將珠林法苑重翻譯九部獻三車集五祴去千燈出自頂蓮花皈佛文軫接安南認桂嶺濃煙如拭敕命阮光平質館通朝謁對輝煌天書册號臚歡膜拜慈雲慧日海水知歸處東風吹畫鷁塞垣春璧水橋門初幸展星駕勾陳駐景雍雍西序東膠命矇瞍大昕鼓振合聲頒樂和鸞應陳禮器曲臺新峻從今四術毋荒教國子六書聲韻上林春五經六藝垂文字省試兩次三科取士紅綾賜杏花十里長安市養髙年適饌省醴先貴齒餘及行糜授几東榮洗服官伊始拖金紫瑶池燕青旗二月巡方出萬國統車書頒恩澤繡滿五色芳塍上與琮璜辨蒼赤天子命輶軒陳詩入望祀逺近山川岱宗親覿恍如縣圃開仙閭闢舉趾日觀峯頭秦松漢柏亭亭碧絲竹壁中聞文宣宅春草碧振廩何須敷奏早是蠲租新舊三司錢貸無差漏樾蔭同登仁夀秋霜不比春雲厚赦天下鶴軿鸞輳王三宥棘木三公左右秋蘂香神中四瀆河為大天險從教漭漾淮浦風恬江流月湧都視此間消長澄清如掌似現出榮光圖書日朗髙堰修隄江南秋水碧于紡海塘近多則壤漸胥江越壑禹門寧浪亥既珠擎支祁鎖靜子午靈濤相向臨平山外有一帶清湍鴐鵝人放天慶安瀾與恩波共廣齊天樂湛露初歌鹿鳴先奏還賡棠棣詩萹外饔司掌酒正禮無愆錫爾腵修肥羜中心貺降福于天羣公外宗人合食鄉老國中賢堯厨同醉飽示慈命宴飾喜加籩幸延英門啓萬嵗觴連不數漢廷賔服春正月來飲甘泉簮裾盛金匏在席葆佾舞瓊筵滿庭芳一堂五世千秋紀慶邦家燕喜自今以始綿綿瓜瓞施于孫子載稽唐宋徴前史詎六家能擬敷天之下凡周之士時純熙矣賀聖朝五德生王千靈啓聖九重閶闔秋清率土謳歌天人同聼和聲蓬壺髙轉蓮旗影躋重光玉律金衡驗貞符如日之升如月之恆封中鼎上嘉祥遍見頳莖碧毳紫脫華平於萬斯年巍巍蕩蕩難名微臣願效南山頌愧纎音下里巴人祝無疆福祿來崇福祿來成慶春澤萬夀徴符萹謹序翰林院編修臣卲晉涵臣晉涵稽首頓首言欽惟我皇上篤祜延熙化融久照五十有五載嵗在上章恭屆八旬萬夀聖莭和雍桄被煥焯珍符薄海臣民咸戴景承輝翺祥忭豫燮欱歡歈詠揚於仁夀之宇臣竊惟唐臣栁宗元作貞符萹言受命休符不於祥於其仁詞恉甚瓌然當時鮮功德可紀語皆蹈虛臣遭逄盛世備員史館親見洪猷懋績景鑠於前古炳耀乎來兹謹推天人感應之原撰徴符一萹用顯著大德受命必得之符諶見諸實徴禕炳奕祀其詞曰粵若昊蒼篤祐我聖清撰合德肖化久協成我皇上御宇初載太嵗在辰實惟唐典伊耆踐祚之嵗肇嘉運於上元沖漠宣厥繇引翼厖鴻乃若默感兆於睿衷曰豫一人寅承茲丕丕基劭纘祖武恪修圖羕豫惟是繩厥貽謀持久以孜孜爰翊亮天工信飭庶采命四方大吏毋奏祥瑞乃昭事欽若諲禮於圜丘方澤秩於上下羣祀親奉瓉幣祁寒盛夏惟無斁乃紹德言嚴對越禴祠蒸嘗奉灌薦秬芬芬苾苾寶訓實録雒誦周環煜顯茲謨烈乃諏詢於庭廣集益圖敉寧其各敷陳講義軌正史闡常經乃躬行節儉任九職以均九式安陶唐之階尚夏后之食乃董正邦治批章展牘晷發無遺召卿寺以瞻對覲嶽牧以周咨乃勤小民之依榖數民數司農嵗稽偶遘偏隅薄沴恩膏醲沃給餔給糜乃詔大小臣工毋偏厥黨毋毗厥私毋飾術以嘗巧毋名浮而實漓其勤恁乃職蠲潔乃忱汝或有纎曲之隱疇克掩於旭日之照臨維時翔洽茂豫鏡榮燭和潤殷賑於阜庶昭玉律與金科叶以鼚乎之舞揚以康哉之歌春孳夏楙凱養澍濡五十餘年之間六合之內融融皥皥衎衎如也皇帝淵然篤念撫茲懋圖曰惟天惟祖宗肸蠁豐融嘉况幠告曷敢不肅迓鴻庥仔巨俶乂以紹茲久道且夫巨典之允敘非其時弗舉偉略之克登非其人弗承盛業之用襄非其道弗彰今既秩祜修和厖禠錫羡矣尚克持之以恆行之以漸寧或不竺虔寧或不蘉勉爰於重光協洽之春肇舉南巡之典先期給內府緡錢平治路衢隴安其耔市樂其估祗掃除乎郊陌泯絲毫之供輸天子乃登禮名山釐治惇俗進資滌垢優老給復造士陳詩詰戎載韣愈歌夾道闓澤霑霮若丑若午若酉籌河觀海計萬姓以敉恬躬臨相度至再至三亦粵十五載􅀈子及辰河澄展鏡海靜鋪鱗歸德則增隄掔硈范塘則甃石嶙峋普東南之美利民應草而莩春澤益覃焉惠彌厚焉前後凡三十有四年六巡之典懋焉西師初舉衆論持疑宸謨獨斷算握前幾鼓致果於徑旅䇿兼程於援師或宣之圖或授之策凖部則摩壘犁庭回部則衝圍駢捷凍解於雪山煙澄於月􅒸用以昭助順於天心揚洪輝於前烈五年而大功告蕆桓桓焉翼翼焉天山環繞瀚海回旋我田我牧我井我泉徠驈騜於西極貢璆琳於和闐繄金川之負固也始荷解網之寬終恃負嵎之險氷合箐迷懸崖側廠王師進討削寨平碉毚薰其窟鳥硩其巢計周詳之區畫稟睿算之持堅凱還奏績亦聿五年地過乎三危威悛乎九姓土司喁喁更畨嵗覲大武所由昭耆定也聖代右文集成今古汁光耀於東壁之躔掞精華於羣玉之府遹廣藝苑之獻書或挈之籝或連以軸遹披永樂之叢萹則澄其金則簡其礫恢恢囷囷麟麟焯焯紛羣言以孴薈若奫潫瀖泋欱百谷以滙歸榷揚潛隱研核矕華咸折𠂻於聖裁綴零編與散帙胥璧合而琲排辨卷端而題咏宣至論以昭垂釐以四部儲以四閣青綘素黔應時辨色淵津源溯瀠潢會極綜其分帙積十四萬而贏四千溯觀成於肇迪計程期以十年劉向輯略之録荀朂中經之簿孝緒七録之編方斯隘矣敻惟五三六經之傳顯道惟彰稽則承翼冠德卓猷者申戬崇慶疇則云一煴質暗而洌浮奧沈閟兆以鬱乃詡揚也昭兹帝縡相時監裁成以茂對蟠濯祺嘉亘古一會絣穆郃臧將朗敷夫閎業迭運行於逡躔必引以舒長之養日大聖人至誠周洽成功之嵗月每炳乎幾先滂仁協義持恆引久傒應乎天庸煥懿鑠庸翊洪延是則施以渥澤久乃镾浹纂以武功久乃益崇矢以文教久乃愈劭記曰久則徴徴則悠逺亶哉忱矣大聖人之德之純亦如燾載之融以淳耀也皇帝祉偕春茂德與日新伸符仁夀溥錫福於兆民藏冨閭閻墉崇櫛比正賦全蠲益三而為四臺海寧瀾社畨內首式廓戰圖武成告九嘉惠南邦增峙三閣詔許傳鈔鳬趨爵躍爰建辟雍璧合水圓流古香於芹藻俌上善於成均列岐陽之獵碣結瓊彩於籀文煥鴻章於集錦詞擷舊而為新爰表百官令章維則文釐厥司武定其秩爰究河源闡訛都實淮井濟滎通情四瀆爰備中和審定樂章鏄鐘特磬球雍璆梁慶隆進舞棽麗焜煌爰訂全詩爰調古樂七均攸諧八能遞作譜合於南豳雅頌律協於重敏迭經風醇俗懋感人和平斯悠逺之徴所為浸潭逢涌磅礴埏􅴝哉月正元日誕布溫綸醲恩廣惠巽命重申乃東巡於泰岱象司春而溥仁溯泉林以釋菜緬合揆而同規洵生民以來所未有茲乃道􅊀於君師聖天子強固精明之體純純常常法健行以不息延厚德以無疆裕五世之慶開五福之堂圖陳王會合宙騰驤貝函象譯徼棧瀛航西踰天竺東指榑桑而南交之君長亦依光入覲請錫冠帶陪寮寀鞠􅎽以上萬年之觴皇哉煒哉乾符坤珍燦著融光嘉徴彚至抨圜顱方距跂行喙息之倫僉懌然於郅瑞之彰天子製八徴耄念之寶猶亹亹於敬事醲政演疇斂福肅乂哲謀彚聖猷而時若爰茲八表雍睦協氣薰蒸瑞人駢接濟濟繩繩孿生四乳庶兆日增合居九世提抱雲仍揚輝戴曝為升為恆潤和夀宇是為至順之徴萬夀頌二十章恭集御製文句并序翰林院編修臣嚴福臣聞鴻化煙煴萬億基算協氣汜濩八千為秋凝禧集瑞開萬世之太平扇景濩甘躋一世於仁夀鳳翽麟逰不可勝紀梯航重譯莫不來同隆古以來史册所傳未有盛焉者也我國家受天眷命列聖垂庥深仁厚澤纍洽重熙以茂衍億萬年無疆之祉敷之彛訓者蓋不可殫述矣皇帝繼序建極綏猷道兼創守德洋恩溥涵浹羣生瀛壖炎島大漠蠻陬日月所照血氣之屬咸切尊親皇哉何化理之神也嵗庚戍秋八月八帙爰開百福備致然帝王之福本諸身徴諸庶民推而放諸四海嘉應在庶徴蓋莫若洪範八徴之念念庶徴即所以念萬民以是為敬天之本以迓天庥以是為法祖之規欽承祖德天德王道無不一以貫之也臨御以來常如一日洎乎七十萬夀之年鐫古稀天子之寶煥為宸章灑為奎翰以云古稀今古誠稀而繼之曰猶日孜孜聖學髙深執精一之中􅋵治平之要亦於斯可覩矣爾乃吉祚大來箕範敷錫新茲景福瑞疊祥駢有德者之得其位得其祿得其名夀上自羲軒罕有及者正夀之慶中外歸忱咸徠獻夀羣臣例當進獻詞賦顧惟寡昧扣槃捫籥無能企逮萬一載晉長言駢彰夀牒是猶繪日月星辰以象天無俟繁稱矣聖人之情匪文莫闡凡御製詩文頒布天下炳如日星實與典謨訓誥相輝映天下之文章孰有大於此者乎莊誦繹思衍義綴詞竊擬南山之頌其詞曰體乾之元克臻郅隆巍乎煥乎文德武功薄海內外喁喁向風八旬初暨萬福來崇一章皇清開國列聖肇興以聖繼聖業業兢兢宵衣旰食地平天成極建維五得一以凝二章肸蠁昭融曰惟百神儀具禮洽敢有弗欽薦馨郊廟尤厪聖心致齋致慤必躬必親三章五代同堂斯引福紀子孫繩繩麟振其趾慶駢豐施苞符介祉以和召和如是如是四章衍繹範言箕疇凡九八之念徴資福以受聖人體天是以恆久錫福庶民國之耆耉五章翠華巡省展義觀風於樂南國樂與民同覃齊浹魯遂躋岱宗聞呼者三喬嶽維嵩六章河奏安瀾溯源會極吳越海塘厥有成績以疏以瀹指示經畫孰與並隆禹之眀德七章勤恤民隱凡茲林林暑雨祁寒心更難諶賜復蠲租出內帑金數逾千萬深入人心八章熙績寧人訓敕有位無曠庶官顧名思義率循舊典良法美意吏治蒸蒸弗替厥志九章辟雍鐘鼓璧水環之圜橋首善棽麗六飛行釋奠禮祗謁先師心源符契斯文在茲十章作人棫朴教思無窮敦崇實學廣勵士風秩如彬如浸以醇醲朝陽鳳翽慶忭攸同十一章煌煌聖訓因文以傳無體不備載在簡編敕幾摛藻意在筆前金輝玉燦如日麗天十二章稽古右文文教彰眀四庫之輯次第進呈抉疑示的幾暇怡情廣大精微遹觀厥成十三章洞契元聲親考律吕萹章音莭亦惟其所既製鎛鐘泗濵同拊金聲玉振功垂萬古十四章在古周宣覲光揚烈因事成什而泐之石約文申義重撫其迹炳炳麟麟以宣偉績十五章習武木蘭後法先垂嵗事秋獮絡繹羽儀選徒屬鞬殪虎洞麋詰戎保泰鞏我丕基十六章皇耆其武赫濯撻伐迅奏膚功犁庭掃穴開疆二萬䇿勳按籍止戈拓邉畋田宅宅十七章疆宇安晏向南定之雷霆亦福乃霈恩施畀以爵秩夙夜是祗來京祝嘏咫尺天威十八章西藏頻來南掌等國無逺弗屆海隅出日慕義獻琛輻輳鱗集統一萬邦恩威所及十九章上儀具舉若網若綱圖于王會盛典矞皇羣工士庶抃手稱慶吉語臚實萬夀無疆二十章
