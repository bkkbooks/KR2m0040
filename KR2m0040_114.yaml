body:
  text: 欽定四庫全書八旬萬夀盛典卷一百十五歌頌三十五萬夀集千字文賦翰林院編修臣㳺光繹國家受命綿逺列聖安乂積和充盈璣衡守正淵嶽效靈左言回靣堅昆寫誠帝心黙顧百禄是并庸以晋琁圖於益盛垂暉篤祐世頼尊榮皇上康寳位累神基仁扶俗豫義動人隨真意自逹髙美遥歸兹者澄河唘運令莭定儀八月秋朗萬年慶貽念用稽書履綏稱詩欣騰宙合情荅嘉師適我稼納塲圓魄入眺銀牀露滴紫極星曜有属戎亭息兵塞垣馳輶官僚恵訓郡邑優㳺壹切分爵洛都領牧虞州横草抁志刻石宣猷與諸深溪曠漠古莽卑耳羅姑身熱之倫皆詠浴頓䫙結想青霄厯遐谷摩修芒蘭皐載藁騾背束􅌩駒驅軻轉逐隂槐棠鱗次矢躍奄奉當陽車駕因止離宫簡吉旦具法従登翠殿良相冠纓甲士劔弁綘陛翔鵾巖廊立鴈端拱静臨庶職仰贊爾其佳氣鬱𥘉曦明丹組聚巨典行瞻拜魚雅尹伯公卿鈞樂俶𤼵伐鼓驚聴絲桐競作𨼆助亷貞陶染鳥獸樓鳳斯鳴琴酒催筵兩階賔賢桓信巧㑹似約羣仙珍膳毎富笙瑟實妍尋常羔犢交懸幾千書接靡耽禮非虚存據經黜辱恭譲獲遵歌聆既飽皃悦容温元造永䔍歡聲寔云且夫善弗别營業必宿成天子育物難老荷寵長生曰惟躬致績劭徳馨敬觀嚴畏夙夜甚祗輦路冬親主祭攸宜廣途潔火被麗四施龍興建號誅弔過湯筞平宇縣厥勞寕忘宗廟秉枇惻楚東房辨律審音引俊幸學孔牆𫝊薪周器駭目璧府連箱墨桼委曲墳素肆設崑岫移玉御集煌如比户翫讀泾渭濟水牋解索獨舊碣重勒空疑取足文事服焉𠡠武臣字同裳誰捕首禍孰唱大匡顛回困川滅林斬荘推轂知率此往彼亡巾扇謂指飄毛吹穅持弦毁帳振威凌霜銘碑賊竟制貢要荒軍力驤也在朝則伊傅撡規丙魏任矩論政資虢門刑誚吕才譽侠鍾裴詞茟續李杜竭忠箴闕煩理弊去願直敢阿盡謝矯語察野而踐敦睦勉眠湌男杷女紡罔虧暑寒渠肥嵗飫疏菜餘園頗習釣射輕更步磻畆税再熟市寂盗丸惡懼終改腸厭何嚬恥侈貴本謙謹條閒外若縁海奏工利巨夏禹沙鹹樹藝帷席恬處孟門杳邈廻斡得所寓懐農稷恐傷飢疲煒已勸穡乎執洪縻英霸陟仕潛晦投機丁糧㪚賞罪𨽻䝉慈洞燭愚賤父母愛兒故能翦叛唘土陋漢超唐鞠黎封阮坐遣悚惶俯伏陪侍殊殷羗納韓紀紙烝涼柰趙璧秦珠堂楹暎帯南象西環易殆地芥五福茂承史牒居官㣲羽退藏出近君王精藍妙感紈綺孤張枝嫡九葉孝弟盖詳妾婦幕説省凊中京乃猶夕靡寐昃始食飬欲給求矜寡植弱務使攝口體釋悲慼飯寸田舍尺宅沈冥淡慮浮垢見色逍遥章閏短髮少白維時多祜早布淑化㫄流新来嵇醼二宰後凋即下及民間亦莫不形骸克慎姿性勿颻摇同盟好戚友黍叔菽同對招松梧翳宻傾觴藉糟羊雞筍薑舉伍烹調杯盤談笑思逼鬱寥兄况通乎功嘗日起道可無為名嗣祀岱治等畫衣異木抽根甘雨落池金驢果嘯綵禽紛飛方将薄禅通譏増城絜量岡阜並跡升恒豈恃陳鍳假嘉通景誠逸華庭哉萬夀詩一百二十韻擬柏梁體恭集御製詩句翰林院編修臣施杓康健八旬年祝齡共球閶闔㑹寰瀛濟濟蹌蹌引璧卿晨賀丹墀瑞色明五位撫辰慶典呈六氣均調物象亨大都赤縣恊符貞天眷欽承意兢兢不息自强勵以誠撫序心殷六位乗斡施灰琯有權衡㤗幕穹窿捧璧升大裘将事曙光凝三獻卿雲擁帝觥房爼恢恢大武登功祖徳宗切繼繩燕翼貽謀萬葉承以親九族著虞經無逸㡬垂元與曽瓜瓞緜緜百世徴史筞皇家得鮮聆軒宫疇政騐晨星蓲蓲陽徳發孶萌大駕葳蕤出鳳城省耕要欲趂春晴村民瞻就遍郊坰麗日和風陶以蒸黍髙稲下茂連塍豐徴祀粥飫香秔承平豈復有戰争地為王土人王氓逺靖何邦敢弗庭毎申廟算諭先庚真将軍可謂知兵一可當千衆賊驚撫定伊犁功慶成回部大定興農耕觻得鈞耆昔受盟厄魯和通以次平近外部落嚴候偵北漠西崑畢覲正飲至筵開及薦櫻為撫鯨鑑溯翦鯨木蘭麌鹿聴呦鳴大獮時乗晃斾旌帷幕髙張翠毾㲪扈蹕諸藩衣是鶯却教飛葢傍雲扄礌硠磅磕輷匉訇烏號夏服手中抨布魯咋舌頌威􅏢道徳千秋示典程立言炳若日星晶鏗然流韻清泠泠自是發鯨非撞莛禮樂百年以後興后䕫戛擊諧詔韺鼓以大鼗聲彭彭首崇彛訓式膠黌敬以臨雍祀上丁陶鎔不廢鐵中錚卞璞和璧紛縦横冊藏二酉富芸甍嚴其魚魯欲求精文規全豹蔚乎弸唐函漢畧較他贏義在尊經靡不勝炎代蒐求多註評江河日月道恢宏閣収遺蹟欲充楹紛綸如合五候鯖静對淵穆含古馨筵開翰墨韻重賡錦嚢寳匱緘瑶瑛海宇承平户口増瑞氣扶輿上玉京山圍萬夀倚如屏展義非徒循羙名惟念民艱求厥寜監官周視海塘形紆蹕因教信宿停河伯昭庥信有靈五老鬚眉宛笑迎宵衣問政惕深更蓮壺依案聴丁丁自呈鑑照待羣情諸天之上玉壺氷遥遥佇俟喜音聴普教各郡緩輸征書云弼教在明刑雞竿爰命覃恩并蕊榜三塲特地行務捐艾葉擷荃蘅即此扶摇北海鵬襃衣博帯真儒生詩歌愷悌有慿慿玉殿疏龍五色層北紘向化至烝烝闗河遥别客斯騰西䝉奉表馳使伻于闐綠玉含菁英非環非玦非璜珩貢物表敬慚菲輕懐恩今挈百千朋有心惟觧向陽傾懐逺應施慶賜仍百珍飣盒大官餳金匙嘗飽手調羮琉璃氷結梵王燈燉燉煌煌煜熒熒依稀云是佛圖澄金幢玉節恒青青宫懸従業依管聲九苞丹鳯来虞廷火棗金芝應節榮松老靈根長茯苓都知獻夀座前擎世世欽遵福永膺重熈累洽萬年清扵萬斯年未覺盈萬夀恭紀易象符祥頌八章謹序翰林院編修臣張錦芳皇上臨御之五十五年和氣祥風濡浃區㝢庥徴丕應上瑞咸臻秋八月聖夀躋八旬薄海臣民歡欣鳬藻獲申祝嘏同効歌衢盖自昔帝王康彊仁夀載在史冊未有若我皇上之錫羡垂鴻納一世於福祿之林者也臣竊稽漢書志云王者繼天順地序氣成物統八卦調八風理八政正八莭諧八音舞八佾監八方被八荒以成天地之功盖易道之全數備於八古聖人所以開物成務極於参贊位育其道莫外乎此欽惟我皇上得一奉宸體元則大道符羲畫神契河圖無疆惟庥不息則乆前者四十五年古稀介福迄今夀登八袠耄念庶徴洪算逓増數符易象洵所謂先天不違後天奉時者矣夫乾之行健即聖徳之至誠無息所以荅蒼旻恭祖舊者也坤之載物即聖功之博厚悠乆所以安磐石固苞桑者也離為日之烜即作人之盛治所以稽古右文登賢籲俊者也震為雷之動即赫奕之威稜所以柔逺能邇中外一家者也坎為水而潤物皇仁之飬老慈㓜所以滋液渗漉無生不育者似之巽為風而申命九重之徳音明詔所以風流令行不介以孚者象之至于説言乎兑成言乎艮則鼚鼓軒舞醸為太和俗晏風淳惇大成裕巍乎煥乎無得而稱矣故九疇言夀而八卦不言夀盖不言夀而夀寓其中不獨乾之自疆坤之餘慶而凡八卦中言亨言利貞者皆有亨通利遂正固之義且經卦有八其别則六十有四其䇿則萬有一千五百二十逓推逓衍生生不窮與聖夀之日引月長者適相符合臣身際昌期職司紀載謹推闡卦徳之全製為易象符祥頌敬祝皇躬億萬年無量之夀其辭曰乾元統天剛健中正聖人則之緝熈止敬世徳貽謀奕禩延慶繼序克勤日新月盛䖍鞏勞謙福基徳柄抱蜀不言中道若性昊縡旭卉精符神應動握化樞静懸心鏡淵理旁矚虚衷兼聴無逸掲箴有恒敷政萬幾匪康寸隂執競扵萬斯年祈天永命其一承天者地徳合旡疆聖人法之其道大光安以敦仁厚以發祥繩繩揖揖我室家君王蕩蕩平平我土宇昄章輿情顒幸時夏陳常六馭六勤求瘼省方河則有防海則有塘築堰如雲甃石如梁臺懐嵩岱是秩是望百神受職庶事用康於萬斯年恢我皇綱其二日月麗天草木麗土聖人監之文治是普論著經筵函披冊府龍圖受堯宛委開禹祕閣全書橋門十鼓乙覧訂譌宸編復古雲漢為章琳瑯在廡匠成雋髦游息藝圃匪惟成之又顯榮之秋賦春闈甲乙其程之天文煥矣人文燦矣於萬斯年光華其復旦矣其三雷出地奮神氣風霆聖人象之赫聲濯靈周官九伐軒轅五兵戊巳名校驃騎列營秋獮肄武山蹕揚旌徳威所加如蟄咸驚封狼􅓔羆不戰而屈降王欵闗屬國詣闕西賮南琛夜光明月鞮譯無曠苞篚㒺竭王㑹繪圖行人典謁於萬斯年服我成烈其四浩浩川源囬薄厚坤聖人推之為雨露恩展親錫類施及外藩耆筵肆設禮均逹尊杖頒靈夀醖酌衢樽飲和食徳日麗春温遂賜租税贍此黎元敦庚癸呼惟積紅是餔孰暵乾虞惟尺澤是濡皤皤庶老恵溥翁媪復子若孫以頤夀考於萬斯年仰鴻慈之懐保其五風和善入鼓盪八紘聖人同之仁言仁聲如綸如綍是訓是行順氣成象鈞天在庭譜詩恊律九韶六瑩琴瑟笙鏞廣大和平天語皇皇徳音秩秩木鳳銜来金雞掲出民爵聿加祥刑惟恤陬澨逖聴淪髓浃膚塗歌邑誦前喁後于於萬斯年文命誕敷其六孚兑之吉順天應人聖人體之説以先民嗛嗛匪徳煦煦匪仁惟動徯志羣懽交欣鑿飲耕食㤀帝之力視顛行填順帝之則下逮芸生跂行喙息蝡動蜎飛暢遂自得巍巍可象蕩蕩難名媚兹一人同我太平芹美欲獻葵心願傾於萬斯年播為頌聲其七物成乎艮保合利貞聖人符之乆道化成治功成矣萬物由庚嵗功成矣百室盈寜象緯應矣卿雲星星地産徵矣醴泉芝英至徳無為天下在宥五福錫民百祥奉夀昊嵗羲年舜日堯春㑹極歸極日新又新山崇川増埏沂垓暢於萬斯年覆載同量其八萬夀恭紀五言排律一百韻謹序四川學政翰林院編修臣戴均元皇帝五十有五年嵗在上章秋八月恭遇八旬大慶萬萬夀敷天會極亘堮闐歡欽惟乾行合撰㤗英延釐恩施普浃於寰瀛歌詠臚陳扵擊壌自軒羲巢燧以来未遘斯盛臣以江右輇材沐浴教飬備職詞垣兹者祗承寵命視學四川不獲隨班行之末蹈舞呼嵩竊復思經籍所載臣庶祝嘏之詞自華封而後書曰欲至于萬年詩曰萬夀無疆實繁嘉頌幸逢曼羡之期在廷儒臣在野憲老以迄鶼邦鰈國之衆莫不寫羣情而申祝臣謹譔五言長律百韻以攄忭躍之忱爰拜手稽首而獻詩曰寳算開昌祚貞符唘吉辰純熈恭則夀健運徳如春馨業承三統祥源肇八旬福疇皇極建夀宇太和臻蕩蕩天為則安安聖所循沖襟昭濬哲粹表仰忱恂皇矣時為柄康哉化若神握樞金鏡朗調燭玉杓匀淵穆惟恭已心齋自表寅蠲誠伸綘幄昭事格蒼昊禮肅靈壇享輝函鎮瑞璘六宗騂繭豢七祀豆籩儐藻奠将䖍敬璆縣展潔諲苾芬羅黼構雍肅莅楧桭纉緒神彌恪延洪志克夤従来綿燕翼即以體鴻鈞列聖璿圖煥五朝寳籙遵習勤瞻御韘肄武勒貞珉國語霞綳燦天威鹿椅輑殿名崇政署堂牓紀恩頻周訓書無逸湯銘監又新寅恭同大戊郁嶷想髙辛允紹修和理胥闗創守因靣稽心作矩肩仔道為紃軫念先黔赤訏謨被廣輪明堂宵旰切蔀屋暑寒嚬涣號惟衣徳㳺原總席仁户教丁賦豁野息癸呼泯耕織圖傳璹禾麻俗寫豳農壇祈彧彧耤畆履畇畇望澤星言駕歌豐天藻彬王衡従不忒翠蹕復時廵清路鑾輿載旌門羽葆溱臺懐髙屼峍嵩少鬱嶙峋雲闕升香迥杏壇耀奠親鸞旂迴嶽麓鳳舸溯河脣夏諺臚吴㑹春膏沛浙濵瀾安䟽竹箭堰鞏屹魚鱗八牐沙流迅三亹汐候逡翔行恒首嵗時邁實因民秉燭章馳驛求衣夜向晨恩膏隨輦路批答仰天闉允矣皇猷裕欽哉聖訓諄文思崇帝治典學廣廷詢奥唘苞符祕言敷道徳淳説經誠嶽嶽數典毎誾誾扆座裳垂陛帷筵篋唘箘宸章光黼黻御翰炳絲綸文苑千篇富詩函五集斌髙軒森墨妙傑閣貯文津璧沼三雍建瑯嬛四庫竣相臺編復萃籕史鼓重陳制遡豐岐古文兼子姒純秩宗増紀載彤伯審和旼集禮綱兼目編圖敔應籈書成超杜佑樂定邁伶倫懸鎛諧韶濩吹笙恊介僎道原資損益跡並指沈湮敬繹淮源記如臨濟瀆瀕濼濡嚴考索涇渭析奫淪詎數仙槎客曽過瀚海漘形方嗤史序地志拓歐忞版益虞州廣疆恢亥步䟴敷天同雨露畫野極枵鶉共仰文華治還昭武徳振仗排雄虎兕蒐舉致麖麕避暑山荘莅乗秋獵騎駪令嚴貉共表行肅鐸無徇犀甲軍容壮􅋃星天討伸伊犁歸典略黙克擴疆㽦傳􅊾阿蘓定輸琛扈特賔風髙秋貢馬月望夜撈玽地利金川闢天聲竹仔填嘉禾書累牘方物果同珍重譯通千島生蠻順七閩雲霏碧漢吕翬獻越裳鷷懿化彌青徼熈光靄紫宸璇霄星見丙絲誥綍重申材育芃芃棫詩賡濟濟榛春官宏選造秋賦廣陶甄靈嶽熉珠薦環林頌牒瞵鵷班榮錫類鳩杖喜扶身遇宥寛黥籍恩優逮服袀瀛壖蠲粒税天府賚錢緡廣𠡠虹梁亘還憐雁户迍綏豐糧積畆藏富稷盈囷恵洽雞雛哺仁翔鳯子馴恩波濡海鏡耆域展坤垠㑹輯伊綿峪郊趨衛拉駰金甌恢笮徼玉琯貢鯷人鼇抃偕千叟龍光被九真秋輝三五桂嵗閲八千椿易闡乾行健詩資懿戒醇黄羲欣際遇佺羡詎能鄰芝苑華芉茂瑶階濶逹蓁履祥欽亹亹頥夀祝詵詵惇叙瓜貽瓞凝庥趾兆麟淳風烝義里髦算晋儒紳葵向傾陬澨蕪吟愧侍臣康寕長歛錫億禩聖恩均
