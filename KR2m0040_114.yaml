body:
  text: 欽定四庫全書八旬萬夀盛典卷一百十五歌頌三十五萬夀集千字文賦翰林院編修臣遊光繹國家受命綿逺列聖安乂積和充盈璣衡守正淵嶽效靈左言回靣堅昆寫誠帝心默顧百祿是并庸以晉琁圖於益盛垂暉篤祐世賴尊榮皇上康寶位纍神基仁扶俗豫義動人隨真意自逹髙美遙歸兹者澄河啓運令莭定儀八月秋朗萬年慶貽念用稽書履綏稱詩欣騰宙合情答嘉師適我稼納場圓魄入眺銀牀露滴紫極星曜有屬戎亭息兵塞垣馳輶官僚惠訓郡邑優遊一切分爵洛都領牧虞州橫草抁志刻石宣猷與諸深溪曠漠古莽卑耳羅姑身熱之倫皆詠浴頓顙結想青霄厯遐谷摩修芒蘭皋載藁騾背束􅌩駒驅軻轉逐隂槐棠鱗次矢躍奄奉當陽車駕因止離宫簡吉旦具法從登翠殿良相冠纓甲士劔辨綘陛翔鵾巖廊立鴈端拱靜臨庶職仰贊爾其佳氣鬱𥘉曦明丹組聚巨典行瞻拜魚雅尹伯公卿鈞樂俶發伐鼓驚聽絲桐競作隱助亷貞陶染鳥獸樓鳳斯鳴琴酒催筵兩階賔賢桓信巧會似約羣仙珍膳每富笙瑟實妍尋常羔犢交懸幾千書接靡耽禮非虛存據經黜辱恭讓獲遵歌聆既飽貌悅容溫元造永篤歡聲實云且夫善弗别營業必宿成天子育物難老荷寵長生曰惟躬致績劭德馨敬觀嚴畏夙夜甚祗輦路冬親主祭攸宜廣途潔火被麗四施龍興建號誅弔過湯策平宇縣厥勞寧忘宗廟秉枇惻楚東房辨律審音引俊幸學孔牆傳薪周器駭目璧府連箱墨漆委曲墳素肆設崑岫移玉御集煌如比户玩讀涇渭濟水箋解索獨舊碣重勒空疑取足文事服焉敕武臣字同裳誰捕首禍孰唱大匡顛回困川滅林斬莊推轂知率此往彼亡巾扇謂指飄毛吹粳持弦毁帳振威凌霜銘碑賊竟制貢要荒軍力驤也在朝則伊傅撡規丙魏任矩論政資虢門刑誚吕才譽俠鍾裴詞茟續李杜竭忠針闕煩理弊去願直敢阿盡謝矯語察野而踐敦睦勉眠餐男杷女紡罔虧暑寒渠肥嵗飫疏菜餘園頗習釣射輕更步磻畝稅再熟市寂盜丸惡懼終改腸厭何嚬恥侈貴本謙謹條間外若緣海奏工利巨夏禹沙鹹樹藝帷席恬處孟門杳邈回斡得所寓懷農稷恐傷飢疲煒已勸穡乎執洪縻英霸陟仕潛晦投機丁糧散賞罪𨽻蒙慈洞燭愚賤父母愛兒故能翦叛啓土陋漢超唐鞠黎封阮坐遣悚惶俯伏陪侍殊殷羌納韓紀紙蒸涼奈趙璧秦珠堂楹映帶南象西環易殆地芥五福茂承史牒居官微羽退藏出近君王精藍妙感紈綺孤張枝嫡九葉孝弟蓋詳妾婦幕説省凊中京乃猶夕靡寐昃始食飬欲給求矜寡植弱務使攝口體釋悲戚飯寸田舍尺宅沈冥淡慮浮垢見色逍遙章閏短髮少白維時多祜早布淑化旁流新來嵇宴二宰後凋即下及民間亦莫不形骸克慎姿性勿颻搖同盟好戚友黍叔菽同對招松梧翳密傾觴藉糟羊雞筍薑舉伍烹調杯盤談笑思逼鬱寥兄况通乎功嘗日起道可無為名嗣祀岱治等畫衣異木抽根甘雨落池金驢果嘯綵禽紛飛方將薄禪通譏增城潔量岡阜並迹升恆豈恃陳鑒假嘉通景誠逸華庭哉萬夀詩一百二十韻擬柏梁體恭集御製詩句翰林院編修臣施杓康健八旬年祝齡共球閶闔會寰瀛濟濟蹌蹌引璧卿晨賀丹墀瑞色明五位撫辰慶典呈六氣均調物象亨大都赤縣協符貞天眷欽承意兢兢不息自強勵以誠撫序心殷六位乘斡施灰琯有權衡泰幕穹窿捧璧升大裘將事曙光凝三獻卿雲擁帝觥房爼恢恢大武登功祖德宗切繼繩燕翼貽謀萬葉承以親九族著虞經無逸幾垂元與曽瓜瓞綿綿百世徴史策皇家得鮮聆軒宫疇政驗晨星蓲蓲陽德發孶萌大駕葳蕤出鳳城省耕要欲趂春晴村民瞻就遍郊坰麗日和風陶以蒸黍髙稻下茂連塍豐徴祀粥飫香粳承平豈復有戰爭地為王土人王氓逺靖何邦敢弗庭每申廟算諭先庚真將軍可謂知兵一可當千衆賊驚撫定伊犁功慶成回部大定興農耕觻得鈞耆昔受盟厄魯和通以次平近外部落嚴候偵北漠西崑畢覲正飲至筵開及薦櫻為撫鯨鑑溯翦鯨木蘭麌鹿聽呦鳴大獮時乘晃斾旌帷幕髙張翠毾㲪扈蹕諸藩衣是鶯却教飛蓋傍雲扄礌硠磅磕輷匉訇烏號夏服手中抨布魯咋舌頌威􅏢道德千秋示典程立言炳若日星晶鏗然流韻清泠泠自是發鯨非撞莛禮樂百年以後興后夔戛擊諧詔韺鼓以大鼗聲彭彭首崇彛訓式膠黌敬以臨雍祀上丁陶鎔不廢鐵中錚卞璞和璧紛縱橫册藏二酉富藝甍嚴其魚魯欲求精文規全豹蔚乎弸唐函漢略較他贏義在尊經靡不勝炎代搜求多注評江河日月道恢宏閣收遺迹欲充楹紛綸如合五候鯖靜對淵穆含古馨筵開翰墨韻重賡錦囊寶匱緘瑶瑛海宇承平户口增瑞氣扶輿上玉京山圍萬夀倚如屏展義非徒循美名惟念民艱求厥寧監官周視海塘形紆蹕因教信宿停河伯昭庥信有靈五老鬚眉宛笑迎宵衣問政惕深更蓮壺依案聽丁丁自呈鑑照待羣情諸天之上玉壺氷遙遙佇俟喜音聽普教各郡緩輸征書云弼教在明刑雞竿爰命覃恩并蕊榜三場特地行務捐艾葉擷荃蘅即此扶搖北海鵬褒衣博帶真儒生詩歌愷悌有慿慿玉殿疏龍五色層北紘向化至蒸蒸關河遙别客斯騰西蒙奉表馳使伻于闐緑玉含菁英非環非玦非璜珩貢物表敬慚菲輕懷恩今挈百千朋有心惟解向陽傾懷逺應施慶賜仍百珍飣盒大官餳金匙嘗飽手調羮琉璃氷結梵王燈燉燉煌煌煜熒熒依稀云是佛圖澄金幢玉節恆青青宫懸從業依管聲九苞丹鳯來虞廷火棗金芝應節榮松老靈根長茯苓都知獻夀座前擎世世欽遵福永膺重熙纍洽萬年清于萬斯年未覺盈萬夀恭紀易象符祥頌八章謹序翰林院編修臣張錦芳皇上臨御之五十五年和氣祥風濡浹區宇庥徴丕應上瑞咸臻秋八月聖夀躋八旬薄海臣民歡欣鳬藻獲申祝嘏同效歌衢蓋自昔帝王康強仁夀載在史册未有若我皇上之錫羡垂鴻納一世於福祿之林者也臣竊稽漢書志云王者繼天順地序氣成物統八卦調八風理八政正八莭諧八音舞八佾監八方被八荒以成天地之功蓋易道之全數備於八古聖人所以開物成務極於參贊位育其道莫外乎此欽惟我皇上得一奉宸體元則大道符羲畫神契河圖無疆惟庥不息則久前者四十五年古稀介福迄今夀登八帙耄念庶徴洪算遞增數符易象洵所謂先天不違後天奉時者矣夫乾之行健即聖德之至誠無息所以答蒼旻恭祖舊者也坤之載物即聖功之博厚悠久所以安磐石固苞桑者也離為日之烜即作人之盛治所以稽古右文登賢籲俊者也震為雷之動即赫奕之威稜所以柔逺能邇中外一家者也坎為水而潤物皇仁之飬老慈幼所以滋液滲漉無生不育者似之巽為風而申命九重之德音明詔所以風流令行不介以孚者象之至于説言乎兑成言乎艮則鼚鼓軒舞釀為太和俗晏風淳惇大成裕巍乎煥乎無得而稱矣故九疇言夀而八卦不言夀蓋不言夀而夀寓其中不獨乾之自疆坤之餘慶而凡八卦中言亨言利貞者皆有亨通利遂正固之義且經卦有八其别則六十有四其䇿則萬有一千五百二十遞推遞衍生生不窮與聖夀之日引月長者適相符合臣身際昌期職司紀載謹推闡卦德之全製為易象符祥頌敬祝皇躬億萬年無量之夀其辭曰乾元統天剛健中正聖人則之緝熙止敬世德貽謀奕祀延慶繼序克勤日新月盛虔鞏勞謙福基德柄抱蜀不言中道若性昊縡旭卉精符神應動握化樞靜懸心鏡淵理旁矚虛衷兼聽無逸揭針有恆敷政萬幾匪康寸隂執競于萬斯年祈天永命其一承天者地德合旡疆聖人法之其道大光安以敦仁厚以發祥繩繩揖揖我室家君王蕩蕩平平我土宇昄章輿情顒幸時夏陳常六馭六勤求瘼省方河則有防海則有塘築堰如雲甃石如梁臺懷嵩岱是秩是望百神受職庶事用康於萬斯年恢我皇綱其二日月麗天草木麗土聖人監之文治是普論著經筵函披册府龍圖受堯宛委開禹祕閣全書橋門十鼓乙覽訂訛宸編復古雲漢為章琳琅在廡匠成雋髦遊息藝圃匪惟成之又顯榮之秋賦春闈甲乙其程之天文煥矣人文燦矣於萬斯年光華其復旦矣其三雷出地奮神氣風霆聖人象之赫聲濯靈周官九伐軒轅五兵戊巳名校驃騎列營秋獮肄武山蹕揚旌德威所加如蟄咸驚封狼􅓔羆不戰而屈降王欵關屬國詣闕西賮南琛夜光明月鞮譯無曠苞篚罔竭王會繪圖行人典謁於萬斯年服我成烈其四浩浩川源回薄厚坤聖人推之為雨露恩展親錫類施及外藩耆筵肆設禮均逹尊杖頒靈夀醖酌衢樽飲和食德日麗春溫遂賜租稅贍此黎元敦庚癸呼惟積紅是餔孰暵乾虞惟尺澤是濡皤皤庶老惠溥翁媪復子若孫以頤夀考於萬斯年仰鴻慈之懷保其五風和善入鼓蕩八紘聖人同之仁言仁聲如綸如綍是訓是行順氣成象鈞天在庭譜詩協律九韶六瑩琴瑟笙鏞廣大和平天語皇皇德音秩秩木鳳銜來金雞揭出民爵聿加祥刑惟恤陬澨逖聽淪髓浹膚塗歌邑誦前喁後于於萬斯年文命誕敷其六孚兑之吉順天應人聖人體之説以先民嗛嗛匪德煦煦匪仁惟動徯志羣歡交欣鑿飲耕食忘帝之力視顛行填順帝之則下逮藝生跂行喙息蠕動蜎飛暢遂自得巍巍可象蕩蕩難名媚兹一人同我太平芹美欲獻葵心願傾於萬斯年播為頌聲其七物成乎艮保合利貞聖人符之久道化成治功成矣萬物由庚嵗功成矣百室盈寧象緯應矣卿雲星星地産徵矣醴泉芝英至德無為天下在宥五福錫民百祥奉夀昊嵗羲年舜日堯春會極歸極日新又新山崇川增埏沂垓暢於萬斯年覆載同量其八萬夀恭紀五言排律一百韻謹序四川學政翰林院編修臣戴均元皇帝五十有五年嵗在上章秋八月恭遇八旬大慶萬萬夀敷天會極亘堮闐歡欽惟乾行合撰泰英延釐恩施普浹於寰瀛歌詠臚陳于擊壤自軒羲巢燧以來未遘斯盛臣以江右輇材沐浴教飬備職詞垣兹者祗承寵命視學四川不獲隨班行之末蹈舞呼嵩竊復思經籍所載臣庶祝嘏之詞自華封而後書曰欲至于萬年詩曰萬夀無疆實繁嘉頌幸逢曼羡之期在廷儒臣在野憲老以迄鶼邦鰈國之衆莫不寫羣情而申祝臣謹撰五言長律百韻以攄忭躍之忱爰拜手稽首而獻詩曰寶算開昌祚貞符啓吉辰純熙恭則夀健運德如春馨業承三統祥源肇八旬福疇皇極建夀宇太和臻蕩蕩天為則安安聖所循沖襟昭濬哲粹表仰忱恂皇矣時為柄康哉化若神握樞金鏡朗調燭玉杓勻淵穆惟恭已心齋自表寅蠲誠伸綘幄昭事格蒼昊禮肅靈壇享輝函鎮瑞璘六宗騂繭豢七祀豆籩儐藻奠將虔敬璆縣展潔諲苾芬羅黼構雍肅蒞楧桭纘緒神彌恪延洪志克夤從來綿燕翼即以體鴻鈞列聖璿圖煥五朝寶籙遵習勤瞻御韘肄武勒貞珉國語霞綳燦天威鹿椅輑殿名崇政署堂榜紀恩頻周訓書無逸湯銘監又新寅恭同大戊郁嶷想髙辛允紹修和理胥關創守因靣稽心作矩肩仔道為紃軫念先黔赤訏謨被廣輪明堂宵旰切蔀屋暑寒嚬涣號惟衣德遊原總席仁户教丁賦豁野息癸呼泯耕織圖傳璹禾麻俗寫豳農壇祈彧彧藉畝履畇畇望澤星言駕歌豐天藻彬王衡從不忒翠蹕復時巡清路鑾輿載旌門羽葆溱臺懷髙屼峍嵩少鬱嶙峋雲闕升香迥杏壇耀奠親鸞旗回嶽麓鳳舸溯河脣夏諺臚吳會春膏沛浙濵瀾安疏竹箭堰鞏屹魚鱗八閘沙流迅三亹汐候逡翔行恆首嵗時邁實因民秉燭章馳驛求衣夜向晨恩膏隨輦路批答仰天闉允矣皇猷裕欽哉聖訓諄文思崇帝治典學廣廷詢奧啓苞符祕言敷道德淳説經誠嶽嶽數典每誾誾扆座裳垂陛帷筵篋啓箘宸章光黼黻御翰炳絲綸文苑千篇富詩函五集斌髙軒森墨妙傑閣貯文津璧沼三雍建琅嬛四庫竣相臺編復萃籕史鼓重陳制遡豐岐古文兼子姒純秩宗增紀載彤伯審和旻集禮綱兼目編圖敔應籈書成超杜佑樂定邁伶倫懸鎛諧韶濩吹笙協介僎道原資損益迹並指沈湮敬繹淮源記如臨濟瀆瀕濼濡嚴考索涇渭析奫淪詎數仙槎客曽過瀚海漘形方嗤史序地志拓歐忞版益虞州廣疆恢亥步䟴敷天同雨露畫野極枵鶉共仰文華治還昭武德振仗排雄虎兕搜舉致麖麕避暑山莊蒞乘秋獵騎侁令嚴貉共表行肅鐸無徇犀甲軍容壯􅋃星天討伸伊犁歸典略默克擴疆畇傳􅊾阿蘇定輸琛扈特賔風髙秋貢馬月望夜撈玽地利金川闢天聲竹仔填嘉禾書纍牘方物果同珍重譯通千島生蠻順七閩雲霏碧漢吕翬獻越裳鷷懿化彌青徼熙光靄紫宸璇霄星見丙絲誥綍重申材育芃芃棫詩賡濟濟榛春官宏選造秋賦廣陶甄靈嶽熉珠薦環林頌牒瞵鵷班榮錫類鳩杖喜扶身遇宥寬黥籍恩優逮服袀瀛壖蠲粒稅天府賚錢緡廣敕虹梁亘還憐雁户迍綏豐糧積畝藏富稷盈囷惠洽雞雛哺仁翔鳯子馴恩波濡海鏡耆域展坤垠會輯伊綿峪郊趨衛拉駰金甌恢笮徼玉琯貢鯷人鼇抃偕千叟龍光被九真秋輝三五桂嵗閲八千椿易闡乾行健詩資懿戒醇黃羲欣際遇佺羡詎能鄰芝苑華芉茂瑶階濶逹蓁履祥欽亹亹頥夀祝詵詵惇敘瓜貽瓞凝庥趾兆麟淳風蒸義里髦算晉儒紳葵向傾陬澨蕪吟愧侍臣康寧長斂錫億祀聖恩均
