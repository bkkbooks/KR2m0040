body:
  text: 歌頌十五萬夀恭紀萬年歌三十首謹序户部右侍郎臣慶成欽惟我皇上縡運乾綱庥綿鼎祚握貞苻於翠琯考絢祉於丹函芝檢長凝錫昌昌之福緒蘿圖鞏固偹奕奕之祥源運躋唐日姬齡治邁羲年昊嵗焱馳文命浹流沙蟠木之鄉燀赫威稜綏瘴海氷碉之地龎禠溥鬯熈九有於春臺醲化覃敷納羣生於夀㝢臻五世一堂之慶届八旬萬夀之期保合太和紀算極蔀章之盛緝熈純嘏建元協天地之全餐藉淳風臻耄耋者三千叟泳㳺闓澤抱曽元者二百家鰈國鶼邦共近光乎晋晝日支月竁咸飽徳乎需雲固已吉萬而祥千奚啻登三而咸五廼際開韶之首復覘重巽之申洪化澤於九垓溥同波濊鬯祥恩於六宇休與風翺八表歡騰三垂慶協梯山浮壑羣斟舜日衢尊驂篠擕笻競上堯天華祝臣夙随豹尾覩星旄雲䍐之章今綴鵷行瞻繡葆牙幢之絢忱輸巷舞歡附馗謡其詞曰帝車獨運斗杓東閶闔祥開繞紫宫軒筴長綿仁夀慶萬山無嶽不呼嵩八八相生卦畫重月盈桂序吉祥逢建中數衍箕疇五垓㝢均沾大化醲瀋遼王業造家邦櫛沐經綸遹駿龎純錫備䝉天眷渥萬年卜祚古無䨇泰壇昭報潔明齍祈穀躬親鑒在兹自是仁人能格帝條風協候雨知時封章奏報達京圻乚夜披宣勑萬㡬共仰明誠能爥隐十洲澄鏡朗清輝六􅛍江甸迓鑾輿禹績敷宣遍瀹疏睿畫周防繩祖武排樁甃石奠民居衍沃興京啟壯圖瓊軒四謁燦祥符䄄亭檢岱無文秩翠渚應呈賁篆鱸宸翰光昭煥璧奎琅函四庫燭青藜縹囊緗帙璀瑶軸文治從教到譯鞮鴻都苔石耀羲媧蝌籕重新睿製排辨正昌黎周雅合紛紛聚訟㫖多乖中和建極創新裁虞軫祥嗈景慶開一字一聲頒玉律咸池夏濩八音該五集輝煌聖製新㡬間摛藻即為春更繙象載敷洪教學海珠船祕逮津甲科造士五經分輪試重頒巽命聞蕊榜特開賢路濶青衿廣額荷陶薫碧桃丹桂劚雲根九萬扶摇荷寵恩皓首觀光償夙願銜階分錫耀蓬門溟徼懐柔聖澤寛盱睢通譯拜瓊鑾金桃玉鬯陳庭實菉幣駢羅萬國歡海外恬風靖八蠻南賨忭舞覲龍顔欣陪期衞循章服毳鷩新從紫禁頒大小金川地勢連天戈西指靖狼烟番疆逺隔堯封外齊上丹書頌舜年婼羗梯棧競趨朝萬里葱山積霧消瀝悃臚歡呈妙伎娑盤獻舞入雲謡心傳千古契神交孔思周情帝量包泰岱雲開迎翠輦聖人親莅聖人郊田功夙夜念民勞維正蠲除沛澤膏綏萬屢豐民慶溢鼚軒鼓舞戞雲璈泰運均調玉燭和飲芳挹㫖遍衢歌貢􅎇川嶽紛符瑞九茁瑶芝兩穂禾聖日還符佛日華一堂五代盛争誇康彊逢吉増椿紀奕世雲仍福履嘉古稀鐫寳凜㡬康八袠新開介夀觴撙總羲圖敷禹範自天旉錫慶無疆寳篆新摹耄念縈雨暘寒燠契皇情八徵特為民依切帝徳如天大莫名肇慶元正茁瑞蓂圖開王㑹祝軒齡鳯書銜出皇恩渥五色祥雲拱帝庭星從箕畢叶休徵萃福迎釐本敬承為黜華文申訓誥服膺倍切凛􅍾氷綸章頒自玉螭頭三錫榮加逮九流觧紱羣工叨異數恩波重沐滌瑕尤耆老扶鳩廑睿心奏書疊晋戴恩深鸞章鳯諾宣榮賚喜洽佺期鶴髪簪山莊旋蹕策金驂甌宇祥和帝澤覃里忭塗歡齊介慶秋中星彩耀弧南天街羽衛列森嚴瑞算稠綿海屋添無量福兼無量夀延洪敷錫答輿僉文階特晋換頭銜珍重龍綸燦寳函願祝堯齡申億萬泰元神筴啟瑶緘萬夀恭擬古歌九章謹序户部右侍郎臣韓鑅臣聞民生而志詠歌所含興發皇世萬代永耽盖惟聖人神靈首出膺祉緐富醰修醲化深浹人心故其時含生載氣之倫陶染聖渥沐浴膏澤莫不口之言之千人唱萬人和如風過簫羣籟畢發如雷奮地諸萌畢達喁喁于于罔克自抑觀於雅頌所述南山之歌萬夀天保之祝九如純嘏緝熙詳於載見綏眉介祉載在來雝可得而披也若乃事存三五篇系八九賡皇叶帝遹聖揚神抑又進矣我皇上功徳髙深夀祺申永文教敷被武義光赫和神寧人恢紘拓宇漸摩之乆蕩蕩難名服屬之多萬萬前古嵗在上章奄茂龍飛五十有五年慶際八旬萬夀敷天介慶率土臚歡寰宇内外波赴雲凑蕃來京華極思殫誠祝釐效欵上有王公大臣下則百僚耆士綴文摛藻歌頌聖徳矞皇典則羣體畢備而外藩屬國漸被聲教來應王㑹䖍祝洪禧者亦能作為聲詩敷揚大業抒寫忠誠煌煌乎誠亘古所未聞希世而一㑹者也臣職佐度支躬承恩渥雖文采固陋綴學未精亦思勉竭悃衷跁跒為詩榮鏡顯符伶詠聖祚伏謂我皇上包元履徳執象陳樞則太和舒和不足歌也甄陶六合裁制萬邦則隆安正安不足方也夙夜毖祀灌獻躬親則明堂寳鼎不足炫也武功九成拓地萬里則鐃歌朱鷺不足紀也四巡展義六駕觀民則甘泉樅陽不足陳也萬方王㑹旅百充庭則白麟赤雁不足吟也同文三國和章七人則唐莋蓬萊不足聞也夫測天地者雖莫竟其崇深而圓方可度繪日月者雖莫窮其光曜而升恒可程自四始以來流為樂府五季而後轉相規模郊廟朝廷禋祀燕享異代同聲而歌功頌徳之作韓詩栁雅號為卓鑠而時不足以相稱三百之什又尊之為經莫敢規橅今皇上以如天之徳普盖地之庥六幕八埏齊聲協頌允宜準繩十紀絺繪三皇庶㡬歌舞鴻庥之萬一是用廣搜博考採古歌謡之名事合吉祥義歸典訓者附麗一皇道補演秘文一曰玉牒辭二曰大化歌三曰載民歌四曰無射歌五曰宫樂謡六曰豐年頌七曰神鳯操八曰大順歌九曰龍衮頌詳列於左各注所言雖葛天八闋名未全收而夔后九功數惟一貫謹拜手稽首獻之闕下用對揚聖天子萬夀萬萬夀之景運歌曰皇天垂儲興東方百千萬禩篤我皇乾亨坤慶皇夀昌安萬國定四陲永無極右擬古玉牒辭歌皇帝萬年有道泰鴻絪緼粤宛渾淪含養蠢化大美無言蠉飛跂息含精飫醇聖人御宇功侔大造饑則有食勞則使妥眉棃孩稚各以心禱穰穰熙熙樂我皇道右擬古大化歌歌皇帝乆道化成民之好帝則成民之善帝則馨民之慶帝則寧坤為輿行無疆載萬物利永貞右擬古載民歌歌皇帝行慶施惠聖人履極兮天下綏寜逺人慕徳兮莫不來庭陸有西域兮水則東瀛雕題交趾兮鑿齒竒肱譯云祝聖兮異口同聲右擬古無射歌歌皇帝王㑹萬方六飛夙駕兮時巡岱宗觀風問俗兮匪言崇封念昔省方兮于臺于嵩江介六巡兮指示塘工今來孔林兮更暢儒風聖人舉典兮日新彌隆右擬古宫樂謡歌皇帝時巡東方時和嵗稔惟帝之力九賦既貞三壤咸則錫羡延洪四蠲霈徳綏邦屢豐益茂稼穡右擬古豐年頌歌正供皇帝普免戴仁抱義惟鳯之英竒律歸昌惟鳯之聲秋秋蹌蹌巢閣儀庭卷阿託詠賢亦其朋應時夀聖億載千齡右擬古神鳯操歌皇帝開科取士家有來雲繞膝将将皇有聖徳大而能生天支五葉五福名堂八徵省嵗逢吉康彊右擬古大順歌歌皇帝五代同堂垂裳被衮履泰乗乾四方來賀萬夀八旬精神純固福祉緜緜本支百世天子萬年右擬古龍衮頌歌皇帝萬夀無疆聖夀無疆詞十章依唐臣楊巨源韻謹序禮部右侍郎臣鐵保臣聞訪洪疇於十三載嚮五福而念庶徵作小雅者廿一人答九如以歌天保越萬八千嵗而為紀直邁三皇等七十二君以稀儔豈惟六帝猶陳抑戒勤不倦於耄期恒勵乾行聖自由於睿念浹加年于衍洛欣符五位十成干協吉于大横恭届八旬萬夀寰瀛共慶大地皆春川效嶽修上助髙深之致翾飛蝡動咸鳴燾載之恩固知蕩蕩者無能名莫罄三言之祝然而昭昭者随所見猶思一管之窺况實政早播于聴聞斯嘏詞率由于胸臆欽惟我皇上惟天為大如日之升建皇極以用敷本健行而不息奈何弗敬掲召誥之一言則知其依凛周公之七始乾稱父坤稱母躬祀而典茂肅雝仁率祖義率親紀恩之堂維前後本刀玉球圖之㫖寳詠勤民師豆觴机鑑之銘屏書勵政揆文奮武七徳與七閣胥成寜夀樂全五福増五代斯建勅㡬慎憲惟君子知柔知剛知㣲知彰申命用休故大徳得位得禄得名得夀而猶聖懐自抑帝道彌謙當開七袠之夀編願上千秋之寳鑑乃止萬民之籲更徯十載為期日居月諸君之望有如其嵗㑹萃時合天弗違而况於人熙運今逢羣情増忭惟天數五元轃泰筴之重聞嶽呼三律轉伶筩之八遂聨章而上請始鑒悃以俯俞吉祚大來恩綸沛降元正錫宴㪺醲醑于螭頭觧澤申仁銜天書于鳯口生民以來未有盛四蠲惟正之供詩書所稱何以加三年有成之效賜服官者爵一級用及于爾所生申曲赦以法三章俾從欲予以治馨香至徳告祠于天下名山大川粟帛隆施徧及於海隅蒼生黎獻恩牓聨開於比嵗青袍咸奮甲科奏名特放乎耆儒絳縣不書亥字是以鴻庥景附鱗集仰流例覲年班元㑹新來五國恒披奏牘外畺亦報百齡象獻文身驃呈金葉敂闗請吏嘉南阮之歸忠詣闕來王騐東風而上夀廼于青陽之月特舉蒼輅之巡至岱宗秩山川玉檢陋登封之碣幸闕里觀禮器金聲發御極之碑既蕆上儀載修盛典琅書屢續欲至於萬年寳籙新増惟佑於一徳象成作樂聿昭崇殿之金鏞稽古右文重勒辟雍之石鼓至矣盡矣皇哉唐哉備闡坤珍爰鐫御寳繼信天古稀而有作得聖之時發禹叙箕演所未聞于帝其訓苞苻啟藴席上瑞以膺圖禆海臚歡祝蕃釐以第頌而臣備員禮署忝列詞垣冀竭涓埃仰摹天日依唐臣之舊韻效舜陛之賡歌開寳之事無足言彼何為而有作唐虞之際斯為盛苐自愧其不文曰雨暘燠寒風時備徵克念如山阜岡陵川至恭進長言聖䇲苞符闡皇禔茀禄康八徵疇演範億紀蔀乗章嵗琯庚横卜星弧丙叶方祗勤心念耄誕佑福膺長軒藻文琳耀姚圖翠版香上元基積算瑞籙獻東王黼扆恭成久權輿懋迪前繹思隆啟鐀秩禮毖升煙照世三千齋心卅六絃見知躬率祖時若道欽天景並暘暉爚華增霱䕃妍大寰羅泰㝢展慶筦昌年獻民廑固夲勵政飭崇虛大有輪年賦同人絫世居井籌河海澨田課麥蠶初振廩覘封牘弛鏐迨出車丁夫恬樂利戊尉被豐餘熙若春臺上淳風茂赫胥書契恢皇䆳光華被帝宸百家陶仰鑄七閣藻含春天縱閎稽古雲章倬咏仁敷言標治統立教澤儒身儀永羲娥曜情逾周孔臣文千詩四萬日煥祕函新允武六師靖成勲九奏同先㡬孚介石勝纛滿祥風馬秣桃闗再蠻爭毳幕空天方皆典屬海國屢膚功至論垂開惑神謀運作聰徳威駢助順昊貺畀求宗圖益坤維外輪周亥歩時瀛濛杯泛逺嵎昧晷量遲闐璧宛駒貢淮琛越雉詩近藩供塞宴諸部按邉旗貝葉函經使朱波納欵思日南冠帶襲鴻化景天墀禮文昭損益樂律備中和法物陶匏正元音鎛特多臨雍橋映璧在泮輦迴珂萬嵗金鏞奏重光石鼓歌期頤恩載讌更老議無過鉅典昌明㑹㣲涓匯聖波懿鑠遵遼瀋時巡重鎬京東封嶽神秀西禮佛光明翠葆吳旍展春潮越練生樂山兼樂水占雨復占晴瑞靄嵩呼應仁風甸服清仙荘多嵗月芝盖擁霞城智攬官人哲才蒸髦士林九階登俊廣六牓沛恩深最慎瑕瑜辨旁求鞀鐸音露雷胥造化日月在淵襟順則安和宇颺言喜起心孜孜成郅治宵旰惜分隂輿盖祥争羾京垓數莫知萬方覲王㑹五代繞孫枝夀斚康寧晋乾爻健順随眷貽釐用輯抑戒訓攸垂春氣三皇合脩齡六帝卑㣲臣叨典禮鞠􅎽上鴻儀萬夀恭頌九章謹序禮部侍郎直𨽻學政臣劉墉臣聞貞元運世璇樞延軒筴之釐巍煥當陽綿宇曼堯年之祉爛丹文於鳯紀枝幹恒春輝黄氣於珠垣景卿齊曜八徵叙範姒疇應開袠之期五代顔堂周瓞衍本支之世逺徠邇懌臚菉幣於爻閭嵗稔時和燦珠嚢於調幕合八八逓生之贏數大闡乾符際五五相得之祥年欣増泰筴曠䆳古之嘉㑹至今日而獨隆欽惟我皇上久道化成法天行健瑶光鏡宇上階陳六泰之符華盖旋車中極運四和之柄撫五辰以凝庶績翠鷃調司普八表以揚仁風朱䳒息瘴逮至蜵涓蠖䕶春雨膏濡訖於烏滸狼䐠秋霜令肅垓埏廣袤皇矣益地之圖經緯光昌煥乎崇文之館惟不息則乆徵悠逺要在至誠由無易以成明章康斯為來備佛天佛日歸功徳於無量尊前夀世夀人紀春秋於大椿嵗裏是惟福因徳致治與道融執契象於皇春勅時㡬於帝耄青壇耤畝涓吉亥以推犂蒼殿祈年練上辛而秉鬯雨分雪尺較量入乙夜之詩雲潤日暄祠禱肅寅階之禮劭農正鳸咸登玉燭於芳茲偏壤劬鴻盡貸珠倉以粒我鞏宣防則瀛壖瀆澨六畨秉虞狩機宜暢瀦洩則淀渚津躔千里溥殷畿樂利凝釐蒼籙金蓮選佛之塲肄武白藏木蘭獮田之典記今嵗韶開嶰籥正東巡秩檢雲巒堂拜金絲撫十噐而顒孔思頌臚崧嶽合曼碩以傃魯詹凡奉若而弗違皆無逸以作所若乃詩函數萬緼瑟吟虞軫之萹文類盈千苞絡啟羲圖之秘排成籖帙淵源分及支流抄入巾箱韋布許窺中秘以五音合五調十二嗈和繼后䕫於一字定一聲三百篇圈訛載堉闡大千經義象載繙成辨半滿梵音龍書寫就考鴻都之石碣秦權則説正莆田集蝌籕之殘文周雅則詩鐫獵鼓表章經學於今並試夫甲科釐正文風自昔㡬頒夫申命矞皇俊偉茂矣尚哉至於戒亭虚候扶木掃氛開二萬里星屯歩連葱雪列卌八家毳幕障徹龍沙紫閣麟袍鐃吹奏黄門之凱紅綃鯷壑将軍䇿横海之勲恩從風翺瑞干雲吕所以渌江貢鰈青海徠鶼荷蘭欵塞之降畨銀簮叩鼓竺印繙經之衛蔵金㲲書函六詔羣趨棧烏䝉而献象十年壹見筐赤芾於紈牛復有甫紹景風來随繡斧其人秀雅近伏波銅柱之標厥篚元黄嗤莫氏金身之代賡詩章以祝嘏鞮籥咸吹籲法服以章身軒裳恪守衣冠既錫帝乃嘉允其誠典禮如常爾仍勿改其舊時則仙荘秋霽行幄日長澹泊敬誠之殿需賚琱筵要荒侯甸之臣旅趨瓊苑飲福源而飫徳儀夀阯以徠釐於是霞蹕旋秋月輪紀桂轅童壤叟瞻咫尺之宸顔巷舞衢歌效三呼之嵩祝導西華之玉路煙陌祥飛拱北極之丹暉風區闓集鞭鳴啟殿仗馬則列舞雲齊鼓節趨朝閽象則負瓶日麗金吾隊裏分六十四旄頭雲䍐之章釦砌䦨邊偹八十一綉葆牙幢之絢耆臣鮐背侍玫陛而儲歡廷秩鵷班聴雲門而肅拜生民以來未有曰欲至於萬年聖人之夀如天古更稀於七袠彼梁宋有元之帝曷擬鴻庥即唐虞大夏之朝遜臻龎祉然而孜孜猶日浩浩其天朝正元㑹之辰鳯司乍奏敷錫庶民之福龍綍先頒按舜牧而復正供榖人益裕溥周佃而輸租帑逋牒全㸐章倬星潢特牓則㑺科疊奏珂鳴仙佩具僚則清級榮除亥身題絳縣之年門旌綽楔甲令弛丹書之𨽻草長圜扉望徧類禋薦徳馨於嶽瀆孤惸鱞寡賚仁粟於天民允宜慶洽由庚庥滋見丙得位禄名而歸之夀嵗律循環合運㑹世而統於元雲仍奕葉臣身依鰲禁世席鴻慈夙聨卿月之班崇深莫賛近荷使星之出髙厚彌叨欣嘉㑹於中天幸睋光於上瑞絢流芝檢願雨暘燠寒風時祚永蘿圖為萬億秭垓京兆繹百順之為福敢罄管窺錐指之忱肄九如以答君祇慚萊北臺南之雅其辭曰皇建有極柄挈四時均禧宙合茀禄罄宜潢陼偹福堂構崇基皇王遜軌長受鴻釐其一緹籥闓庚璇衡大壮地十衍成天三協向緑字攄徵丹扆承貺永念在茲皇風丕鬯其二自天降康蕃禔嵦即惟㡬惟康時萬時億罄域梯霄飲和食徳篆玉昭文珍禕是式其三文治覃旉武功景鑠土宇昄章増其式廓晷緯昭融琛符燾幕瑞􅢅仁莩松芝喬鶴其四道光上爥協氣下翔喁和揆景連襼掎裳曰父母慶洗腆是将上儀具舉如熙春陽其五庶悃載敶展典斯俞豫戒華侈樂惟民俱春酒在堂樂府騰衢綏眉綽綰皇心則愉其六伊嘏我皇用大和㑹北爕南諧鞮寄罔外湛露霑湑徳輝仰藹茂對育萬錫保耆艾其七顯鑠隆懿申命用庥瓊籌跨鹿玉杖扶鳩纓緌進秩稌黍裕謀翾蠕跂喙萬化承流其八開韶翊運顯謨攸續起元體乾延喜式玉中濩應咸銘湯受頊於萬斯年遹光寳籙其九八旬萬夀盛典卷九十五
