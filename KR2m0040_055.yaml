body:
  text: 典禮六鑾儀臣等謹按三皇夀世傳乘雲駕六羽之儀洎乎堯造彤車舜建鸞和夏綏殷輅制遞詳矣顧以揚帝代之閎規天行星陳燦無弗備至於茂彰鴻典炳煥夀圗雖夙具之儀觀而法仗流輝有同創見則三五以來所未逢也我皇上景運升恆斗車呈端自乾隆十三年釐定鑾儀之制煌煌乎彛章軌物職在掌儀是以太和御仗朝萬國以來同長壽金幢協億年之增慶詎止崇縟藻耀聲明已哉良由聖世蕩平會極俯洽尊親一時趨承其間不啻覘五老翼轅八神扈節之盛焉本年大駕秋巡適屆祝釐舉典雲馗祥靄羽衛森翹無不欣際會之亨嘉籍伸就日瞻天之悃是皆郅德昭垂無在非與民相見之實乃得旁窺導從踴躍歡騰而不自禁者也以視漢唐鹵簿之圗儀衛之志曷能方美萬一歟乾隆五十五年皇上八旬萬夀秋七月駕駐避暑山莊舉行慶典二十四日啓蹕回御園八月十二日進宫十三日御殿受賀十六日幸御園具設鹵簿如儀臣福長安謹奏為奏聞事本年恭逢皇上八旬萬夀舉行慶典自七月十二日起臣等擬由鑾儀衛預備大駕鹵簿一分屆時陳設騎駕鹵簿一分於各鑾輿經行之前步引排列至聖駕在熱河詣扎什倫布等處瞻禮及萬樹園筵宴各備用輕步亮輿是月啓鑾回京恭備孔雀頂朱轅輿俟駕至圓明園進宫之日備用禮輿所有陳列鹵簿處所俱奏用旗手衛鼓樂為此奏聞請旨謹奏奉旨知道了七月十二日皇上詣扎什倫布廟瞻禮乘輕步輿舁以八人自惠迪吉門起設大駕鹵簿導以騎駕鹵簿作樂十四日皇上御淡泊敬誠殿賜宴陳大駕鹵簿晚詣萬樹園觀煙火乘輕步輿舁以十六人自文津閣橋東起陳大駕鹵簿導以騎駕鹵簿俱作樂二十日駕詣萬樹園張幄賜宴乘輕步輿舁以十六人自文津閣橋東起陳大駕鹵簿導以騎駕鹵簿俱作樂二十四日皇上啓鑾回京乘孔雀頂朱轅輿舁以八人陳大駕鹵簿於麗正門外導以騎駕鹵簿至三岔口駐蹕俱作樂三十日駕至圓明園乘孔雀頂朱轅輿舁以八人陳大駕鹵簿於大東門外騎駕鹵簿自前屯導引俱作樂騎駕鹵簿先後之序輕步輿一乘次達馬十次金提爐二次金香合二次左金盥盆一次右金水碗一次左金小瓶一次右金大瓶一次左馬杌一次右交椅一次儀刀三十次櫜鞬三十次豹尾鎗三十次殳四次戟四次九龍曲蓋四次青紅黃三色錦縀繖四十次月白錦縀繖四次翠華蓋四次紫紅錦縀方繖八次靜鞭四次黃錦縀扇十四次米色錦縀扇二次紅錦縀扇六次黃錦縀扇十六次紅鸞鳳扇八次長夀幢四次紫幢二次霓幢四次羽葆幢四次信幡二次絳引幡四次龍頭竿幡四次教孝表節旌二次明刑弼教旌二次行慶施惠旌二次褒功懷逺旌二次敷文旌二次振武旌二次納言旌二次進善旌二次金節二次儀鍠氅二次黃麾二次青錦縀纛八次紅錦縀纛八次黃錦縀纛八次月白錦縀纛八次黑錦縀纛八次黃錦縀纛二次紅錦縀纛二次月白錦縀纛二次黑錦縀纛二次月白錦縀纛二次青錦縀纛二次月白錦縀纛四次青錦縀纛二次月白錦縀纛二次青縀纛二次藍縀纛二次黃縀纛二次紅縀纛二次藍雲縀纛二十八次米色錦縀纛二次五色錦縀纛五次藍雲縀纛八次紅雲縀纛八次黃錦縀纛二次月白錦縀纛二次五色金龍小旗二十次金鉞十六次星十六次卧瓜十六次立瓜十六次吾仗十六次御仗十六次引仗十二次紅燈二次龍鼓二十四次仗鼓四次串板四次龍笛十二次紅燈二次金二次龍鼓二十四次畫角二十四次紅燈二次金鉦四次大銅角十六次小銅角十六次金口角八次笙二次管二次雲鑼二次平笛二次陀羅鼓二次鈸二次銅鼓四次金二八月十二日皇上進宫乘禮輿舁以十六人陳大駕鹵簿自西華門內至隆宗門祗迎導以騎駕鹵簿作樂臣阿桂等謹奏為奏聞事本年皇上萬夀大慶由圓明園至西華門沿路恭備景亭競獻歌舞歡迎夾道溢巷闐衢十二日皇上進宫隨扈諸臣若槩行乘馬未免稍形擁擠酌擬睿親王淳頴公永琨及御前大臣額駙侍衛領侍衛內大臣前引後扈大臣等騎馬隨行外其餘乾清門蒙古王公額駙台吉及乾清門侍衛各侍衛等酌分三撥預令前往更換排班其章京排班人等俱量其足用出派先令步行前往換班之後仍即退避至十六日駕往圓明園之時仍照預備為此謹奏請旨奉旨乾清門行走蒙古王公額駙台吉等分為三撥各站在所指之處由彼散去跟隨人無庸餘照所奏十三日皇上萬夀大慶聖節是日黎明鑾儀衛陳法駕鹵簿於太和殿前陳步輦於太和門外陳五輅於午門外陳馴象於五輅之南陳仗馬於丹墀中道之左右俱東西相向恭俟皇上升殿儀注見本門朝會十六日皇上詣御園乘禮輿舁以十六人大駕鹵簿在御園大宫門外祗迎導以騎駕鹵簿作樂二十日皇上御正大光明殿筵宴陳大駕鹵簿於出入賢良門外導以騎駕鹵簿作樂大駕鹵簿先後之序玉輅一次金輅一次象輅一次革輅一次木輅一次金輦一次玉輦一次寶象五次導象四次大銅角八次小銅角八次金鉦四次紅燈二次畫角二十四次龍鼓二十四次金二次紅燈二次龍笛十二次串板四次仗鼓四次龍鼓二十四次紅燈二次引仗六次御仗十次吾仗十次卧瓜十次立瓜十次星十次金鉞十次出警入蹕旗二次五色小旗三十次翠華旗二次金鼓二次門旗二次日月旗二次五色雷旗五次五色雲旗五次八風旗八次甘雨旗四次軫宿旗一次翼宿旗一次張宿旗一次星宿旗一次栁宿旗一次鬼宿旗一次井宿旗一次參宿旗一次觜宿旗一次畢宿旗一次昴宿旗一次胃宿旗一次婁宿旗一次奎宿旗一次壁宿旗一次室宿旗一次危宿旗一次虛宿旗一次女宿旗一次牛宿旗一次斗宿旗一次箕宿旗一次尾宿旗一次心宿旗一次房宿旗一次氐宿旗一次