body:
  text: 盛事十一夀民夀婦一臣等欽惟我皇上備百順之祥萃大同之慶儲齡衍羡胥天下而納之敦龎純固之中人第知惟皇保錫福敷庶民其醖釀者綦厚而不知所以隆引翼洽庥和者本軒籙之延洪樂堯民之順則用能躋之仁夀共介大年其徴應為尤著也慶逄八帙崇祺康強益算天下臣民亦咸欣葆其天和數臻期耋即在外疆屯牧亦報頤婦百齡遣子祝釐並叨優奬蓋聖懷崇實無事侈人瑞以為嘉祥而郅化蒸濡既久耆民夀婦安養長年允極中外熙恬之盛所謂合萬萬人奉萬萬算有積京秭垓壤之數而彌贏者耳乾隆四十五年旌表夀民陳洪如夀婦王氏等二十八人禮部謹題為請旨雙旌事據安徽巡撫閔鶚元疏稱範敘彛倫夀富錫攸好德乾知大始咸恆象繼家人惟引年典邁三王斯偕老人逄百歲兹有亳州夀民陳洪如現年一百六歲妻王氏現年一百一歲刻鳩並倚弋雁同心饁耕安作息之常鰈鶼比瑞雨露休栽培之厚松柏齊齡宜荷殊恩以彰茂典臣等查與定例相符應準其旌表各給建坊銀三十兩並期頥偕老字樣奉旨依議陳洪如王氏俱著加恩各賞上用縀一匹銀十兩夫婦並臻百嵗允屬熙朝上瑞因御製詩章以賜用示恩榮而光旌典御製亳州夀民陳洪如夀百六嵗妻王氏百一嵗詩以紀瑞夀民夀婦本常披禮部題百嵗賜恩本嵗不下十數百嵗同登鮮見之山左廣東各一閲山東巨野縣民姚宏毅年百一嵗妻百嵗于丙戌年題旌廣東廣州民楊啓能年百嵗妻年百一嵗於辛巳年題旌徽疆歙屬兩逄竒大湖縣民朱憲章與妻劉皆百嵗于庚寅年題旌亳州亦安徽所屬是一省之期頤偕老者再見矣夫耕婦織胥良善子繞孫圍篤慶禧偕老期熙逮兹四前此題旌夫婦同登百嵗者俱親製詩章以賜兹如例成什賜之臨御四十餘年四紀瑞事亦仁夀之徵也旌揚合與異恩施禮部謹題為詳請題旌以彰人瑞事據直𨽻總督楊景素疏稱運際中天仁夀祥徴宇縣地聫左輔敦龎俗逮閨闈兹有交河縣夀婦及時氏現年一百四嵗守針規而筠操彌貞課蠶織而榆暉自暖前此年登耄耋疊邀賜粟之恩今兹嵗越期熙宜荷旌閭之典臣等核與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議時氏著加恩賞給上用縀一匹銀十兩又題為題請旌表事據調任安徽巡撫閔鶚元疏稱盛治雍熙率土荷升平之福太和翔洽敷天徴仁夀之祥兹有太湖縣夀民侯紹璉現年一百四嵗南陵縣夀婦章陶氏現年一百一嵗性並淳良居惟勤撲服髙曽之畎畝安耕鑿以忘年課婦子之蠺桑引飬恬而難老宜光綽楔以表閭閻臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞貞夀之門各字樣奉旨依議侯紹璉陶氏著加恩各賞給上用縀一匹銀十兩又題為懇賜請旌以廣皇仁事據護理江西巡撫秦雄飛等疏稱治際雍熙庶老有延齡之慶恩隆引翼盛朝崇羞耉之文兹有贑縣夀民鍾添佑現年一百五嵗廣昌縣夀民饒學聫現年一百嵗里閭稱曰善人耕鑿安於帝世預下邑飲鄉之選德被歌笙作康衢鼓腹之氓歡臚擊壤享大年而並健膺茂典以咸宜臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議鍾添佑著加恩賞給上用縀一匹銀十兩又題為公懇請旌以彰人瑞事據江西巡撫郝碩疏稱澤浹坤輿介景際萬年之慶治隆泰運作朋符三夀之徴兹有樂平縣夀婦彭葉氏現年一百一嵗石城縣夀婦溫劉氏奉新縣夀婦胡陳氏各現年一百嵗務勤儉而崇孝敬家室和平敦雍睦而篤慈祥閨闈禮法克享大年于盛世宜邀褒典之殊榮臣等查與定例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議葉氏著加恩賞給上用縀一匹銀十兩又題為請旌人瑞事據署浙江巡撫三寶等疏稱化洽太和海宇遍生成之德治臻熙皥閭閻多仁夀之祥兹有永嘉縣夀民程宗憲現年一百十嵗會稽縣武生朱清顯現年一百嵗或頥志枌榆或泳涯芹藻業安稼穡含和而周甲將重志在桑蓬攬揆而紀辰盈百典允符于表里俞伏俟夫明綸臣等核與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議程宗憲著加恩賞給上用緞一匹銀十兩又題為年逾百齡懇請旌表以彰人瑞事據浙江巡撫王亶望疏稱澤洽髙深上瑞並臻海宇德同覆載遐齡共慶閨幃兹有石門縣夀婦談陳氏現年一百三嵗性秉幽貞儀嫻淑慎慈訓朂詩書之業藻泮傳芬耄年分粟帛之榮松姿益茂籲頒旌典式沛仁恩臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議陳氏著加恩賞給上用緞一匹銀十兩又奏為請旨事據福建巡撫富綱疏稱夀考作人賜第恩兼益算康寧錫極喬齡典協旌閭兹有莆田縣欽賜進士郭鍾嶽生海嶠而希光困風簷而逮耄秋試與春闈並落名胥特奏以邀恩殊榮將上瑞偕臻年果增延于司命茂同松柏疊承大造之栽培景駐桑榆益切晞陽之煦嫗籲施綽楔式賁章逄臣等查定例夀至百嵗者給建坊銀三十兩並升平人瑞字樣今郭鍾嶽於上年特賜舉人又於本年三月內奉旨賞給進士仰荷聖恩固已至優極渥兹據該撫題請旌表之處應否仍照舊例準其建坊並給與升平人瑞字樣理合請旨遵行奉旨依議又題為請旌人瑞事據前任湖南巡撫李湖疏稱時雍風動閭閶共樂春臺久道化成巾幗同登夀宇兹有醴陵縣夀婦黃鄧氏現年一百嵗婦道克循耆齡難老飲和食德子孫安畎畝之常抱莭含淳女士實室家之壼宜邀旌典式俟綸言臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議又題為懇請題旌事據陜甘總督勒爾謹疏稱夀愷覃敷嵗月有舒長之慶淳和普汜閭閻承曼羡之庥兹有撫彛廳夀民桞洪仁現年一百三嵗秦州夀民張效孔現年一百嵗薰德善良服疇撲嗇當萬夀七旬之初屆軒籙增長正百齡二老之並臻堯衢叶瑞恰稱引年之詔爰符表宅之文臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議桞洪仁著加恩賞給上用縀一匹銀十兩又奏為請旨事據四川總督文綬疏稱箕疇斂福臣民蒙嚮用之庥井絡翔和閨閫沐引恬之澤兹有現任四川阜和協副將馬詔蛟之母曽氏係原任湖南辰州協標都司馬秉良之妻現年一百四嵗身膺雙誥夀越百齡曾因引對之時上邀清問知有期頥之母特沛褒綸日星懸奎榜之輝皮弊拜尚方之賜命遄歸而侍養捧檄知榮循成例以祈恩旌門有典奉旨該部議奏欽此又十一月二十二日奉上諭四川阜和協副將馬詔蛟前在軍營曽經出力本日兵部將該員帶領引見詢知伊母曽氏年逾百齡實為升平人瑞著加恩賞給御書匾額並上用緞四匹貂皮六張用示優奬仍令該員即速回任侍養伊母以昭朕嘉惠耆年之至意欽此臣等伏查定例夀至百嵗者給與建坊銀三十兩並貞夀之門字樣各等語今四川阜和協副將馬詔蛟之母年逾百嵗奉旨賞給御書匾額並上用緞貂皮仰荷聖恩至優極渥現據該督題請旌表應否仍照舊例令該地方官給與建坊銀兩並貞夀之門字樣之處伏候諭旨遵行奉旨依議御書匾額閫德耆年又題為請旌人瑞事據廣東巡撫李質頴疏稱典重引年沐洪延于嶺海福敷難老彰茂渥于絲綸兹有博羅縣夀民謝卓琳現年一百嵗新興縣監生葉顯時茂名縣夀民楊文憲新寧縣夀民伍允瑞各現年一百三嵗髙要縣夀民龍近溪現年一百一嵗逰河而民亦惟星生值榮光之世入學而更應為叟欣逄尚齒之朝萬夀萬億斯年華封願祝五人五百餘嵗仙嶠增輝仰懇旌揚以彰瑞應臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議葉顯時楊文憲伍允瑞龍近溪著加恩各賞給上用緞一匹銀十兩又題為公報人瑞懇請轉詳以廣皇仁事據廣東巡撫李質頴疏稱夀祉覃敷海宇著遐齡之慶福疇廣錫閨門彰純嘏之庥兹有惠來縣夀婦唐林氏現年一百嵗開平縣夀婦關李氏現年一百三嵗賦質安和持躬端淑事翁姑而歡承菽水課子孫而身列膠庠柏茂松蒼荷堯天之栽植蘭芳桂馥樂舜日之舒長允稱人瑞之徴宜沐天家之典臣等查與定例相符應準其旌表各給建坊銀三十兩並貞夀之門字樣奉旨依議李氏著加恩賞給上用緞一匹銀十兩又題為遵旨照例請旌事據原任雲南巡撫孫士毅疏稱箕疇備嚮斂敷不隔遐陬軒籙增長夀耉先昭上瑞兹有賔川州生員張似騫現年一百二嵗昆明縣夀民耿越現年一百嵗沐熙朝之雨露椿樹長榮撫膝下之孫曽蘭枝擢秀冬讀書而秋學禮儒生之嵗月偏舒子言孝而父言慈田野之風光自古惟一人膺萬年之永祚斯羣黎多百嵗之遐齡洵屬休徴允符旌典臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人瑞字樣奉旨依議張似騫著加恩賞給上用緞一匹銀十兩又題為請旌人瑞事據原任貴州巡撫舒常疏稱敦龎式固逰泰宇以偕春夀考且寧遍坤輿而錫祉兹有清平縣夀婦鞠姚氏現年一百三嵗荷聖朝之恬養鶴算彌長蒙帝德之涵濡萱枝益茂允稱人瑞宜沛鴻恩臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議姚氏著加恩賞給上用緞一匹銀十兩乾隆四十六年旌表夀民霍進名夀婦張氏等五十二人禮部謹題為年屆百齡恭請旌表以彰人瑞事據直𨽻總督袁守侗疏稱至澤涵濡海宇沐維祺之錫淳風披拂郊圻徴上夀之祥兹有巨鹿縣夀民霍進名現年一百嵗逰帝世之熙恬遞增蓂朔樂皇春之浩蕩益茂椿年昔邀粟帛之恩今籲旌揚之典臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議又題為公舉百齡以彰人瑞事據直𨽻總督袁守侗疏稱澤鬯黃圖家有靈萱之慶徽流彤管地占孤竹之祥兹有昌黎縣夀婦李張氏現年一百一嵗柔德無愆義方克訓教子預成均之選型家惟女士之宗幸依化日舒長悉賴熙朝涵育閨宗作瑞國典宜褒臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議張氏著加恩賞給上用緞一匹銀十兩又題為欽奉恩詔事據山東巡撫國泰疏稱角亢徴曼夀之符祥昭列宿海岱注長生之籍福及羣氓兹有東昌衛民桞君贊現年一百嵗賦性醇良持躬謹厚耕田鑿井久安熙皥之天食德飲和適協期頥之慶克臻上夀宜荷殊榮臣等查與定例相符應準其旌表官給建坊銀三十兩並升平人瑞字樣奉旨依議又題為欽奉恩詔事據山西巡撫雅德疏稱仁夀鍾祥蔀屋遍熙春之俗延洪錫福康衢多化日之民兹有大同縣夀民袁力陳鳳升現年各一百二嵗性安勤儉志樂恬和恪循耕鑿之常不染浮囂之習前登耄耋屢邀粟帛恩榮今越期頥更復杖綦矍鑠應請旌揚之典用昭人瑞之符臣等查與定例相符應準其旌表各給建坊銀三十兩並升平人專字棒奉旨依議袁力陳鳳升俱著加恩賞給上用緞一匹銀十兩又題為欽奉恩詔事據調任山西巡撫雅德疏稱聖化覃敷率土協安貞之吉皇仁丕育窮簷鍾夀耉之祥兹有靈邱縣夀婦李王氏現年一百三嵗松筠比莭金石同堅皓髮童顔久沐自天雨露含飴扶杖欣依在室孫曽洵為聖世庥徴宜荷天家旌典臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣奉旨依議王氏著加恩賞給上用縀一匹銀十兩又題為欽奉恩詔事據河南巡撫富勒渾疏稱福衍箕疇用錫遍羣黎之德仁覃蔀屋可封占比户之庥兹有滎陽縣夀民魏楫現年一百十一嵗泛水縣夀民王六行現年一百嵗禹州夀民張誠志李花富各現年一百嵗永城縣夀民陳銑現年一