  text: 欽定四庫全書八旬萬夀盛典卷七十四恩賚十三賞賚一
  hash: sha256:3446f5bd7623312aa3daf408c4a268f1293b90fc4360b9e91091eb3efbd0bab4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_074-1a, image: WYG0660/WYG0660-0882c.png}
body:
  text: 臣等欽惟我皇上寵錫萬方慶賞懋德皆本萬年純健之精神孚恩禮於羣下是以嵗時賚豫悉有恆經而逾格之施往往流於既溢所謂天子所豫天子命之者義至重也考史䇿稱覲君之賜諸侯王以下奉皮薦璧玉賀乃以金錢財物答之其外臣入朝客省齎賜酒食而已或間賜民爵一級授耉老几杖舉無關誕慶令典毋亦狹歟方今夀宇同春雖萌卉肖翹畢涵雨露至於天墀入賀晉祝億齡不特翔舞班聨咸深愈快即化外之愚田間之陋皆得曲獻其衷乃芹曝之悃方愧末由自將而圜蓋無私陽春遍及接萬里之逺如在堂階同一視之仁胥霑膏澤一時物賚無算官秩並加工商技藝之微兼施溥逮有餘惠焉因以思臣民衆庶無時不被聖人之恩則亦無事不蒙聖人之賜臣等既綜輯恩賚一門而茂賞之敷復分次臚舉益以昭帝王之福為天下之公有申錫於無疆者夫豈縟文之是尚也哉乾隆五十五年秋皇上萬壽慶節中外王公諸臣咸預拜賜自七月初九日至八月二十等日疊頒金玉幣帛器物茶果有差一賜宗室親王郡王貝勒貝子鎮國公輔國公等二十九人共玉如意二十五柄蟒粧等縀二百六匹帽緯二十七匣大小荷包三十九對瓷漆牙盤瓶碗搬指等一百四十七件及茶果諸品詔欵本門恩賜分載恩詔一賜滿漢文武諸臣京職大學士尚書都統御前侍衛散秩大臣侍郎副都統以下侍衛驍騎校以上等官外任總督將軍提督巡撫總兵鹽漕織造關督以下道府將備丞倅辨目等官以上一百九十四人共玉如意八十四柄綢縀等七百十九匹帽緯三百三十匣大小荷包三百三十八對瓷漆牙盤瓶碗煙壺搬指等七百六十件及茶果諸品一賜蒙古內外扎薩克汗親王郡王貝勒貝子公額駙台吉塔布囊等一百六人共玉如意一百三柄朝珠一百四十盤縀錦綢綾氊絨紗葛等一千七百九十匹帽緯三百十二匣大小荷包三百五十對扇一百四十匣瓷漆牙盤瓶碗煙壺搬指等一千零三百十件及茶果諸品一賜回部哈薩克哈密汗王台吉子弟貝勒貝子公台吉副使伯克等三十五人共玉如意六柄縀錦綢綾氊絨等三百九匹帽緯一百八匣瓷漆盤碗煙壺搬指等三百十五件及茶果諸品一賜安南國王御筆詩一章詩扇一柄聨扁一副西湖圖一卷木蘭秋獮詩一卷嘉符啓瑞圖一册御製詩文集二十二函玉佛一尊玉如意四柄玉東方朔一件玉碗二對玉盒一對玉玩二件珊瑚朝珠一盤銀一萬兩馬一匹黃韁一副金冠五頂蟒袍七件蟒粧等縀一百二十七匹帽緯五匣金帶一條玉帶一條時辰表帶鈎一副自鳴鐘一座帶鐘時辰表二個大小荷包十二對扇二柄銀絲匣九個漆桌二張玻璃琺琅瓷漆盤碗花瓶煙壺等器五十二件硯二方筆墨各四匣絹箋四卷及茶果珍饌諸品馬等特賜冠帶袍物見謝摺世子一人金冠一頂陪臣員從行人護衛隨人管象人等一百五名共大元寶十一個銀七百四十兩縀綢等六百九十匹布六百九十五匹大小荷包二十二對扇六柄筆墨三十六匣絹箋十九卷香四百五十枝玻璃瓷漆盤碗等一百五十六件及茶果珍饌諸品一賜朝鮮國玉玉如意一柄蟒粧等縀四十四匹貂皮一百張馬一匹鞍轡一副硯二方筆墨各二匣絹箋二卷交來使齎回正副使書狀官大通官押物官從人等六十四人共銀一千四百六十兩縀綢等一百三十八匹大小荷包二十一對布四十六匹馬二匹鞍一副香四百五十枝瓷漆盤碗煙壺等七十八件及茶果珍饌諸品一賜緬甸國王御書扇一柄又扇一柄玉佛一尊玉如意一柄金鑲玉亭一座蟒粧等縀一百十八匹玉器六件琺琅爐瓶一具硯一方玻璃瓷器八十三件交來使齎回大小頭目通事事從役三十人共平定金川戰圖平定回部戰圖二分大元寶二十二個小元寶一百個銀三百八十兩縀綢絹等二百二十四匹大小荷包二十二對扇四柄布一百五十六匹香四百五十枝瓷漆牙盤煙壺等器一百九十二件及茶果珍饌諸品一賜南掌國王御書扇一柄又扇一柄玉佛一尊玉如意一柄金鑲玉亭一座蟒粧等縀八十六匹玻璃器十件五色絹一百張五色箋一百張交來使齎回頭目先目通事後生從役十九人共平定金川戰圖平定回部戰圖二分大元寶六個銀一百五十五兩縀綢絹等一百二十四匹大小荷包十二對扇二柄布一百二匹香四百五十枝瓷漆牙盤煙壺等器一百十六件及茶果珍饌諸品一賜金川畨二品以下至六品土司土辨土舍頭人等四十四人共如意二十八柄銀九百二十兩縀綢等二百九十二匹帽緯八十四匣緯帽二十頂蟒袍補服裏衣各二十件朝珠二十盤帶二十條大小荷包二十對扇二十四柄靴襪各二十對墊褥二十副瓷漆牙盤煙壺搬指等二百九十件及茶果諸品一賜臺灣生番頭目帶領番子義民首通事社丁等二十一人共縀綢二百十二匹大小荷包三十對布一百九十二匹瓷漆盤碗煙壺火燧等器三百二十一件及茶果諸品八月初七等日西藏達賴喇嘛班禪額爾德呢及哲布尊丹巴呼圖克圖噶爾丹錫勒圖呼圖克圖等恭遞丹書慶讃萬壽各賜佛供珍器幣物有差一賜達賴喇嘛玉佛一尊玉如意一柄玉器一件銅鈴杵一分雲産石朝珠一盤六十兩重銀茶桶一件銀壺一件銀執盂一件琺琅瓶一件盤一對玻璃瓶一對爐瓶盒一件玳瑁盤一對大小哈達五十五個繡黃縀袍一件蟒粧縀各二匹大縀三十匹大小荷包四對靠背坐褥一分呼圖克圖公扎薩克台吉堪布來使等三十三人共玉如意三柄銅鈴杵三分雲産石朝珠一盤雕鞍一副三十兩重銀茶桶二件銀執盂一件玻璃盤一對瓶十三對碗五對琺琅盤三對瓶一對碗一對大小哈達十四個蟒粧等縀二十四匹大縀一百五十九匹虎皮三張豹皮五張獺皮三張布六百七十匹大小荷包七對一賜班禪額爾德呢玉佛一尊玉如意一柄玉器一件銅鈴杵一分雲産石朝珠一盤三十兩重銀茶桶一件銀壺一件銀執盂一件琺琅瓶一對盤一對玻璃瓶一對盤一對大小哈達二十個繡黃縀袍一件蟒粧縀各二匹大縀二十匹大小荷包四對靠背坐褥一分呼圖克圖嵗本堪布來使等二十一人共玉如意一柄銅鈴杵一分三十兩重銀茶桶二件銀壺一件銀執盂一件琺琅盤三對玻璃瓶二對又一件碗一對大小哈達十四個蟒袍一件蟒粧等縀八十四匹大縀八十六匹布三百五十六匹大小荷包六對一賜哲布尊丹巴呼圖克圖噶爾丹錫勒圖呼圖克圖及各呼圖克圖呼畢勒罕堪布喇嘛等一百五十二人共御書金拓金剛經塔一軸玉佛二尊西畨七佛像一分玉如意四柄銅鈴杵三十三分時辰表二個大小哈達三十個瓷塔二座琺琅瓶二對盤二件玻璃碗十對玻璃瓷器三十七件粧錦等縀三百八十匹大小荷包七十六對五色香餅四盒香一百五十五束是月十二日噶爾丹錫勒圖呼圖克圖等領喇嘛九百人在福佑寺等處恭迎聖駕共賞銀九百兩臣等謹按桑扈之詩首言人君受天之祜次言萬邦百辟之獲福攸同由乎寵錫之厚隨其等而有加多出常禮之外者也我皇上大慶之期萬國朝宗嵩呼輯瑞凡與拜舞彤庭若戴穹蒼而親父母乃荷天顔忭喜珍賜疊頒自宗親臣屬以逮藩服逺人各豫以錦綺瓊瑶之品祗受咸歡即在黃衣慶讃徠獻逺誠亦莫不普諸吉祥遍施多寶蓋千古以來無如我皇上之大福則亦無如我皇上之大恩曲逮而彌廣預拜賜之榮者允宜欽望外之殊施而竊志親承之幸則雅詩所稱君子萬年福祿宜之者有同慶也謹附録安南朝鮮國王謝表以紀欣感之如一云安南國王阮光平奏言臣萬里趨朝謝恩祝嘏行抵熱河山莊幸得瞻拜龍顔抱見請安仰蒙天語殷肫曲加慰勞賜以佛像如意珍貝駢羅藏鏹盈萬旋命觀太常之樂授尚方之餐恍然如聽鈞天如飲沆瀣若乃引對殿門仰親裁夫銓擢封章奏御誦批答乎丹毫以臣愚陋何以當兹榮遇欽惟大皇帝陛下撫御萬方至仁燾育此下土臣民所共欣戴於無已者至於待臣恩禮千載竒逢三生至幸誠夢想所不到臣初進覲即奉賞冠帶袍馬金玉器玩不可數紀是聖心軫臣跋涉之勞而格外加恩也逮臣進見于淡泊敬誠殿欽奉宴賞錦綵縀紬各色又蒙加賞玉器朝珠錦匹文寶是聖心鑒臣肫篤之忱而不以尋常藩封見待也至御製詩文御筆圖軸乃天地之大文人間之鴻寶而亦以賜臣其他寶玉竒品膳饈珍味恩賜絡繹不絶于道尤且曲徇微情特加異典賜以親王冠服俾臣章采華躬示寵於王會趨蹌之列而臣之陪臣隨從人等無一不霑渥賜且臣弱息逺在南交遙蒙恩敕俾正維城自臣至其子若臣莫不戴天地生成之德古今外藩受知實未有如之遇也今仰奉宸衷垂念臣國初創締造方殷勢難久留朝侍旋諭回國臣感銜恩不知所報惟顒俟聖夀九旬重詣闕廷頻祝萬萬年悠久無疆之慶臣不勝感激依戀之至謹奉表稱謝以聞朝鮮國王臣李祘言乾隆五十五年十月十一日臣承準進賀兼謝恩陪臣昌城尉黃仁點等回自京師齎到禮部咨節該主客司案呈本年朝鮮國王遣使具表慶祝皇上八旬萬夀仰蒙聖恩在圓明園賞賜該王物件相應開單知照等因奉此竊伏念臣忝守遐陬偏沐晠化前後蒙被與天無極乃兹進賀陪臣朝天之行恩諭諄摯賜賚便蕃嵩呼慶節猥蒙華衮之奬琛獻菲品重益瓊玖之錫縀貂鞍馬絹箋筆墨已是由心之嘉貺而至如意紋硯之珍乃侈宸詩御銘之鐫雲漢昭回榮光輝燭此實往牒所未曽聞屬國之未敢承者臣雙擎傳玩九頓莊誦謹與匝域臣民感戴頌祝謹奉表稱謝者臣祘誠惶誠恐稽首稽首伏以楓宸北拱粗效抃蹈之忱芝函東頒猥荷希異之渥感結千縷恩踰百朋伏念臣久沭皇慈叨守先緒春秋玉帛之靡懈常戴恤小之仁天地雨露之若偏敢忽事大之禮不意星使之載返遽蒙心貺之特紆蜀錦與華貂而誕宣無非御府之佳品宛駒並寶鞍而遙降更侈文房之希珍乃若奎藻兩篇特鐫寶玉二品帝化致庶徴之應綏以屢豐聖德膺九如之庥錫我多福雲章逺垂於鰈域星文並輝於虹光蓋眷偏隆於弊邦而賚迥出於常格兹蓋伏遇皇帝陛下化洽五紀祚衍萬齡逺近説懷長荷盈成之福日月臨照咸頌喣濡之恩遂令鯷封屢被鴻渥臣敢不每思銘佩益勉圖酬地偏馬韓縱阻執玉之列心懸象魏徒􅋀朝海之誠臣瞻天仰聖無任激切屏營之至謹奉表稱謝以聞朝鮮國王臣李祘言乾隆五十五年十一月十一日臣承準禮部咨本年朝鮮國王遣使來京慶祝皇上八旬萬壽於七月內前赴熱河瞻覲仰蒙聖恩賞賜該使臣等相應知照等因竊念小邦久沐洪化前後聖眷曠絶今古乃者執賮之賤價粗效祝華之微忱猥蒙隆私薦被優渥熱河迎蹕近瞻日表之儀夀山陪宴獲叨嵩呼之列趨登御舟仙境聳矚親授玉杯法醖淪肌寵已極矣榮亦至矣况復近緞花囊既頒內府之珍藏駿馬雕鞍又侈天廄之殊錫彩硯賁來華管隨降恩光所暨匝域咸聳自顧偏邦何以得此於聖朝也臣與一國臣民感激頌祝謹奉表稱謝者臣祘誠惶誠恐稽首稽首伏以使車遄征慶萬壽之令節法筵近侍荷一視之隆私鰈域均歡龍光偏被伏念臣處東地僻拱北誠深熱河之羽葆遙瞻縱阻呼嵩之列左海之包匭靡懈常切就日之忱不料陪臣賀八旬之行遽蒙上國饗一朝之渥節回繞電幸值萬國同抃之辰恩降自天至有三價與宴之寵蓋以視內服之聖眷特加貺中心之殊恩兹蓋伏遇皇帝陛下道冠古今澤洽中外得壽得祿迓日升月恆之庥受共受球符天覆地燾之德遂推異數亦及荒陬臣敢不祗慶皇禔恪修侯度東流萬折恆思江漢之朝北望三時彌切岡陵之祝臣瞻天仰聖無任激切屏營之至謹奉表稱謝以聞八旬萬壽盛典卷七十四
