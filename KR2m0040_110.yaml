body:
  text: 欽定四庫全書八旬萬壽盛典卷一百十一歌頌萬壽頌十二章集五經并序翰林院編修臣曹振鏞臣聞之春秋傳德者本也禮記聖人作而萬物覩易與天地合其德易其感人深禮記是以自天祐之實受其福易於萬斯年詩恆久而不已也易帝德廣運書承天而時行易天行健易聖人則之易以自強不息易聖人在上春秋傳五十有五易一日二日萬幾書罔不惟民之承書道洽政治書百姓休和春秋傳而嵗習其祥春秋傳受天百祿詩將於此乎在春秋傳至治馨香書以敬事上帝書齊之日禮記雍雍在宫詩時厥民書以致其禋祀春秋傳以祈國實禮記饗帝於郊禮記必躬親之禮記大雩春秋治定制禮禮記必身親蒞之禮記帝曰欽哉書祀國之大事也春秋傳羣神羣祀春秋傳嵗遍春秋傳執事有恪詩敬之至也禮記德之基也易是謂承天之祜禮記紹聞衣德言書追孝於前文人書繩其祖武詩於穆穆清廟詩王命作册書寶春秋傳以球玉禮記有事於太廟禮記必敬視之禮記右社稷禮記陳尊爼列籩豆禮記玉曰嘉玉禮記用玉氣也禮記惇敘九族書於是乎有享宴之禮春秋傳論撰其先祖之有德善功烈勳勞慶賞聲名列於天下禮記賞延于世書社稷宗廟書庸勳親親春秋傳德之本也易是謂大順禮記政以治民春秋傳煦嫗覆育萬物禮記而加之以共春秋傳發號施令書班朝治軍禮記考禮正刑一德禮記夙夜罔或不勤書詢事考言書乃日覲四嶽羣牧書周爰咨諏詩示情也禮記執燭禮記坐以待旦書爾有嘉謀嘉猷書舉而措之易示德也禮記厥眀禮記聽政禮記於南門之外禮記示事也禮記君子所其無逸書以徴於書春秋傳而治道備矣禮記推而行之易德之修也易此之謂大當禮記皇帝清問下民書保合太和易命農勉作禮記帥三公九卿諸侯大夫躬耕帝籍禮記以為民祈福禮記以庶邦惟正之供書以萬民惟正之供書大賚于四海書嵩髙維嶽詩王乃時巡書南巡守書自南河至於江禮記沿於江海書東巡守至於岱宗書西巡守書如初書行慶施惠禮記問百年者就見之禮記鄉飲酒之義禮記度德而處之春秋傳以相成也春秋傳禮之經也春秋傳五十年書乙巳春秋傳帝曰俞書豫有臣三千書黃髮台背詩宴以示慈惠春秋傳率乃祖攸行書美之至也易德之裕也易此之謂盛德禮記天子視學禮記必釋奠於先聖先師禮記則有獻捷春秋傳在泮獻功詩頖宫周學也禮記天子曰辟雍禮記古之制也春秋傳大哉王言書量功命日春秋傳略基址春秋傳不日成之詩上丁禮記親往視之禮記乃講學之春秋傳崇德也禮記鼓禮記介于石易周詩有之曰春秋傳我車既攻我馬既同詩其辭文易其道甚大易因重而撫之春秋傳多之為美禮記錯綜其數易文以足言春秋傳天下誦而歌舞之春秋傳乃修祭典禮記於成均禮記祀事孔明詩惟兖州書祭先師先聖焉禮記敬致書至于再至于三書德之地也易夫是之謂至隆禮記作者之謂聖禮記聖謨洋洋書修辭立其誠易大矣哉易觀乎天文易純粹精也易導河書弱水既西書導淮自桐柏書導渭自鳥鼠同穴書涇以渭濁詩或源也或委也禮記言以考典春秋傳而觀其會通易眀之以文章春秋傳天文也易詩言志書其旨逺易故能彌綸天地之道易妙萬物而為言者也易皆可歌也春秋傳書同文禮記天子之閣禮記凡七書是故大備禮記天下文明易德之聚也易此之謂德音禮記射之為言者繹也禮記唯天子受命于天禮記手弓禮記抽矢春秋傳射之春秋傳則射中矣禮記秋獮春秋傳駕言行狩詩以數軍實春秋傳以習五戎禮記不惟逸豫書所以示也易帝光天之下書越在外服書莫不率從詩其或不恭書則武震以攝威之春秋傳西被于流沙書啓其疆土春秋傳不寧惟是春秋傳西戎即敘書推而放諸南海而準禮記獻俘受馘春秋傳舍爵䇿勳焉春秋傳宅南交書師徒不勤春秋傳懷服如歸春秋傳入覲于王詩稱彼兕觥詩禮之加燕好春秋傳同福祿來逺人春秋傳德之柄也易是之謂大同書德至矣哉大矣春秋傳蔑以加矣春秋傳順氣成象禮記皇則受之書文子文孫書適曽孫適元孫五世其昌春秋傳振振兮詩繩繩兮詩綿綿瓜瓞詩大有慶也易所謂福也春秋傳如此之謂備禮記嵗書庚戍書秋八月春秋辛酉春秋天子萬壽詩八十禮記春王正月春秋天子乃以元日禮記重巽以申命易命祀山林川澤禮記懷柔百神詩賞公卿大夫於朝禮記降德于衆兆民禮記年自七十以上春秋傳有加禮焉春秋傳前此者春秋傳蒸我髦士詩曰選士禮記曰造士禮記必取賢斂才焉禮記小大之臣書羣黎百姓詩僉曰書天子作民父母書仁孰大焉春秋傳吉孰大焉春秋傳帝曰書豫思日孜孜書乃化成天下易八庶徴書其道大光易念兹在茲書以為寶禮記其文炳也易故記曰禮記五皇極書斂時五福書用敷錫厥庶民書其義一也禮記懋哉懋哉書帝念哉書聖人久於其道而天下化成易必得其夀禮記其此之謂歟禮記敢再拜稽首春秋傳作頌曰春秋傳維清緝熙詩惟聖時憲書剛健篤實輝光易敬修其可願書有孚惠心易萬邦黎獻書故物無不懷仁禮記亦克用勸書右一章稱秩元祀書用咸和萬民書以共皇天上帝禮記夙夜惟寅書罔不祗肅書遍于羣神書惟聖人為能饗帝禮記能歆神人春秋傳右二章佑我烈祖書罔有不欽書大告武成書厥貢惟球琳書命作册虔書來獻其琛詩以親九族書克廣德心朝夕臨政春秋傳朝夕而行之春秋傳不敢自暇自逸書惟日孜孜書弼我丕丕基書百志惟熙書右四章専而農民禮記曰篤不忘書天子三推禮記豐年穰穰詩時邁其邦詩其益無方易求民之莫詩而照之以天光春秋傳錫爾純嘏詩俾爾壽而臧詩其車三千詩濟濟蹌蹌詩飲酒樂豈詩民説旡疆易右五章釋奠於其先聖先師禮記肅肅雍雍禮記鼓舞當於五聲禮記其大有顒詩而玩其辭易而擬諸其形容易節奏合以成文禮記詔之瞽宗禮記右六章為章于天詩王敬作所書遂成天地之文易昭之來許詩帝庸作歌書與四時合其序易説禮樂而敦詩書春秋傳惟帝時舉書遹觀厥成詩各以其敘書器而藏之春秋傳天子所豫詩右七章天子之功詩增其式廓詩大動以威書用戒戎作詩莫敢不來王詩莫敢不諾詩及彼南夷詩天子是若詩以來會時事春秋傳萬壽攸酢詩以近天子之光書洵訏且樂詩右八章如日之升詩如天之福春秋傳吉事有祥書景命有僕詩及而元孫春秋傳以綏後祿詩本支百世詩振振公族詩右九章天子萬壽詩以殷仲秋書正月朔旦書敷政優優詩天子布德行惠禮記允升于大猷書四方來賀詩百祿是遒詩右十章不息則久禮記故受之以恆易聖人之大寶易曰念用庶徴書思其艱以圖其易書庶績其凝書萬民靡不承詩右十一章惟我君之德禮記四方于宣詩嚮用五福書而和樂興焉禮記是用作歌詩昭回于天詩以介眉壽詩惟曰欲至于萬年書右十二章萬壽詩十章集文選并序翰林院編修馮馮集梧臣聞歌以詠言沭浴福應則寄言以廣意粵若稽古堯稱則天華封致乘雲之拜周風既洽登壇有降火之祥統和天人其歸一揆若夫應感之會雍容垂拱含至德之和平元符靈契永錫洪算六籍闕而不書窮神觀化固未能縷形其所由然也蓋以一人治天下惟精惟一運自然之妙有而不有其功然後精誠通於神明是以祥光總至福應尤盛保延壽而宜子孫故曰福所以興惟人所召美哉邈乎休徴之所偉兆則五帝三王之道其疇能亘之哉伏惟聖朝受命于天保大全祚世有哲聖重熙而纍洽百有餘年矣今陛下遵天之道操斗極握乾符儀刑祖宗紹隆前緒懸衡天下既陶既甄和理日濟萬物咸得其宜乃貞吉之元符允集兹日天錫難老上膺萬壽發祥流慶受之自然且夫王者非徒聰明神武豐茂世之規永年之術以成其福祿者也是惟熙載翼翼矜矜參天地而施化恢惟宇宙以翔鴻業以介丕祉誠千載之嘉會是以其詳可得而言伏惟陛下欽翼昊天敬躬祀典必先齋戒黍稷馨香供禘郊之粢盛竭誠盡敬拜起靈壇以為萬姓請命于皇天於是隂陽交和風雨玊燭二儀煙煴應之如響夫國家之道農為正本致敬在祈年于時也協風應律時至氣動肆覲天宗司農撰播殖之器躬三推于天田蓋用昭明寅畏順時立政蒸民於農桑是以感而應之厥初生民啓靈篇兮披瑞圖炳炳麟麟德茂存乎六世至于經緯乾坤體元則大為萬世規信聖祖之蕃錫時惟我皇承聿懷之福是凖是儀有所造作必酌之于故實求矩矱之所同所以致孝也傳曰有開必先詩曰永世克孝然則聖人所以為聖者有自來矣陛下以聖明統世昧旦丕顯夜寐以思雖一日萬幾事無大小日經聖聼敬惟無怠爾乃嶢榭迎風俯臨煙雨關外一區此焉清暑而皇情眷眷動攝羣會綜覆精裁若乃順時莭而搜狩射中獲多犒勤賞功勸之以弗怠亦所以永安也皇輿整駕巡乎岱嶽純化既敷則惠存江南亦所以省風助教不遑遊宴歷年滋多莫之課而自厲其勤若此蓋聞聖主之養民也勸穡以足百姓百姓不足若已納之于隍是以嘔咐受之若羣雛之從母也今聖上慮深求瘼亮稼穡之艱難每勞來而安集之故恤貧緩富發倉廩布德惠應時而蠲動以萬計蓋不可勝數屢下明詔慈仁殷勤施暢春風飽于盛德譬猶鷇卵飛且鳴矣其令州縣因形設象俾若神對振平惠以字小人而生生之理足矣昔之為文者摛藻下筆徒以賞好異情雖睿發于巧心而知德者鮮矣陛下睿聖考論文義吟咏情性著於竹帛説數十餘萬言研道德之元奧金玊淵海五曜霄映增輝日月富有之業書籍未見郁郁乎煥哉天經地緯斧之藻之宜其為大也次有天祿石渠圖書之淵陳農所未究衆獻而儲校文講義之官教使刋定使綴學立志得輝乎光明此亦天下要言妙道也當今皇帝盛明掩四海而為家雍部之內回而昧之者結儔附黨天子命上宰翼而鷹揚素旄一麾回首內向故制勝于廟算役不二時皆取定俄頃于彼西疆地方幾萬里靡有兵革之事洪規逺略此非其效與於廓靈海島嶼綿邈一夫揮戟其會如林於是天子知頑素之迷惑耀威靈而講武事不可以已乃命上將親奉成規樓船萬艘撇波而濟水是以義兵雲合猛氣紛紜登飛梁斬叢棘蹶嶄巖赴洞穴潛達旁通剖彼窟宅呼吸萬里洗兵海島兵舉而皇威暢天下晏如也帝嘉茂庸大啓爵命進以顯秩車服有輝並圖青史銘功景鍾勛績維光隆于今日矣是以異人慕響東震日域西蕩河源南諧越裳北臨沙漠目極四裔蹶角受化思稟正朔喁喁如也聖王作制規同造物所以篤俗訓民宣和情志禮樂在是矣蓋損益隨時文質相濟前事之不忘作者之師也聖神紀物禮典舊章大備茲日盛三雍之上儀皇帝親臨講論乎六藝引而申之足以埀世立教非鑽仰者所庶幾也左制辟雍引流激水長為委輸周環回復于是天下學士鱗集仰流真神明之式也昔周之宣岐陽之搜讐校篆籕式銘盤石陽文隂縵厥迹猶存于是聖上以錯文見義綴而序之古文畢發十恆八九深略緯文復存于聖世矣其奏樂也尋變入節曲折合符雷同相從自古而然然未盡其理也皇帝體膺上聖神心所受觀法于節奏赴曲之音各守一以司應左箎右笙百賴羣鳴一音稱物風動神行宫判始辨聆清和之正聲非純德之鴻圖亦未達禮樂之情也聖德欽明尊事黃耉存問髙年乃申舊章涓吉日貽晏好會三千景附皤皤然被黃髮者罔不具集降至尊以訓恭貴賤以班愔愔醧宴于是皇澤豐沛恩隱周渥洪德施壽觴舉賦詩申懷屬而和者和樂怡懌此亦欵誠之至也才為世出利用賔王總禮官之甲科不激而自遇矣至若齒危髮秀之老驤首天路求之曠年於是不售陛下明並日月曲留降鑒加非次之榮擢自羣萃獨化于陶鈞之上年過九十非止恆授軿青紫升之霄漢舒蓄思之悱憤咸含和而吐氣蓋天子穆然盤桓育養元化滂流躋俗于仁壽之地是以耆儒碩老暉映先達以為美談非遇其時其孰能與于此乎且夫天下大器也答三靈之蕃祉膺多福以安悆不可以虛詞借也皇帝御天下五十五年嵗躔奄茂八月辛酉誕節令圖良時在兹是日也三光宣精慶雲扶質天帝運期而會昌參象乎聖躬若合符契夫修德以錫符仁洽道豐受兹介福萬邦愷樂下獻南山之壽觀聼之所踴躍也猶謙讓而未俞也于時纓緌之徒三事九司僉爾而進曰陛下以至聖之德大庇生民盛烈光乎重葉故有一切之壽為天下主則聞長世之善經率土咸序以貢忠誠故乃萬世一時也于是天子稀然改容曰念哉仰膺乾顧祇承怵惕年其逮耉宇內康寧天瑞之徴賜朕休實一人有慶當與天下共之乃申之以炯戒曰上下通情皆奉觴上壽宴喜之樂無使名過實天子乃御玊輦登明堂承以正月令辰對揚天人總神靈之貺佑于是天清日晏萬流仰鏡周軒中天用朝羣辟陛戟百重九賔相儀自上下下鴈行有序肅肅焉濟濟焉彰聖主之威神第從臣之嘉頌斯受命者之典業也是以六合之內遐方疏俗金鄰象郡之渠皆響風慕義襁負執贄重譯而至覿天皇于瓊宫填庭溢闕稱萬壽以獻觴于是庭實千品綺錯鱗比白象逸駿獻狀絳闕丹青圖其珍瑋不可盡識猗歟偉歟此天下之壯觀疇德瑞聖之符焉于斯時也聞王會之阜昌美盛德之形容歡欣踴躍莫不憂遊以自得因稱詩曰穆穆天子兆民賴止又曰愔愔我王夀考無疆或云上壽百二十福履既所綏聖心眷嘉節與天享巍巍由斯言之帝圖宏逺則黎元與之同慶誠可喜也夫符瑞之表授之者天也惟德動天所從來遠矣盛哉皇家帝世天啓其心物極其性膺期誕德符采照爛况瓜瓞所興殷五代之純熙神降之吉期應紹至光我帝典樂我皇道汪汪乎丕天之大律方四三皇而六五帝自開闢以來未之聞也然則歌詠所興又惡可以已乎哉臣家承素業謬得升降承明之闕愧無以稱職洪聖啓運辰晷重光千載一會遘茲多幸誠思畢力竭情舒音而詠至德昧道懵學不足自宣每觀才士之所作蔚矣其文選義按部有應風雅不勝慺慺采托羣言比其義類集而讃之抑不足以揄揚宏美亦欲以究天人之際而抒情素陳詩展義第一至第十為如干帙係之篇末詩曰顯朝惟清世有明聖聖皇紹祚夤威寶命帝載緝熙天下歸仁百年上壽萬祥必臻一章元祀惟稱惟帝惟祖徠祇郊禋有秩斯祐天地無心感而遂通玊燭陽明造化為工二章理有大歸運鍾下武聖哲所施貽我髙矩率由舊則念茲在茲永言配命維清緝熙三章聖朝乾乾勞謙日昃惠訓不倦永世貽則我皇實念洪範九疇休徴自至何思何修四章生民之命所寶惟榖皇澤廣被何生不育毛羽産鷇託之丹青殷勤之旨民樂其生五章至人攄思天臨海鏡斧藻至德日新為盛乃撰四部啓發篇章韻與道合文以化光六章王師薄代神略獨斷擁旄萬里廟勝之算帝疇爾庸厥庸孔多服爵帝典勒銘山阿七章天秩有禮大豫協樂德博化光大人有作禮儀孔明音容選和陶化染學下舞工歌八章聖帝德流淵旋雲被稟仰太和枯條以肄鯢齒眉壽䇿名清時永錫難老萬物熙熙九章皇慶攸興用集寶命得一奉宸麗哉神聖光明顯融道隆自天延年益壽永永萬年十章
