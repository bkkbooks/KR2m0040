front:
  text: 欽定四庫全書八旬萬夀盛典卷二十九
  hash: sha256:f31101f94866bc5194d4d519f146b3c51bdf802bb6ffe4c91b1159dc4392c6db
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_029-1a, image: WYG0660/WYG0660-0338a.png}
body:
  text: 盛事五數世同居臣等謹案同居共爨之盛前代典重旌門然亦不過寬其繇役賜之粟帛以為宅里之榮已耳我皇上治洽同風教惇睦族天家之慶羡先于篤厚本支下逮編氓微賤亦咸以幸際升平聚族久長為樂故若嵗時蠟社里閭尚罄其歡愈矧在一門之近分誼相接恩義尤親其雍睦宜有倍摯者焉臣等敬維盛世祥和浹于區宇凡家庭之萃順皆荷朝廷教化用徵泰運郅熙是以講讓型仁無不思以民彛之率兾仰承旌淑之恩謹就十年來直省牒報民間數世同居者彚著于編藉彰錫福大同之實事而聖人善善從長之義亦于斯可見焉矣乾隆四十八年旌表陕西長安縣民張洲七世同居禮部謹題為題請旌表事據陕西巡撫畢沅疏稱長安縣民張洲一門孝友奕世循良食舊德而服先疇羣安耕鑿飲亷泉而居讓谷共勗慈和會食百人無間言于父母昆弟同居七世率教典于任恤睦姻洵稱盛世之嘉祥宜作里閭之矜式臣等查與定例相符應令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議乾隆四十九年旌表河南偃師縣民任天篤九世同居禮部謹題為題請旌表事據河南巡撫何裕城奏稱世際重熙海宇沐平章之化時逄交泰閭閻徵聚順之庥兹有偃師縣民任天篤等誼敦同氣法善齊家安作息而逰手無聞合內外而間言不起代傳九世依然張氏之同居丁及百餘宛似鄭門之合食良規足式褒典宜加奉上諭據何裕城奉偃師縣民任天篤等自伊四世祖任光玉至四世孫任瑞豐九世同居洵為郅治庥徴請旨旌表等語任天篤家庭聚順雍睦可風宜推旌淑之恩益廣型仁之化兹親製詩一章並書匾額以賜其應賞給緞匹建坊旌表之處該部照例具題欽此應行該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵至恩賞縀匹由內務府領出交該省提塘賫送該撫轉給祗領可也奉旨依議御製河南巡撫何裕城奏報河南府偃師縣民任天篤九世同居詩以賜之甲辰三詠同居率西陕乾隆己卯年陕西乾州民寧爾強家八世同居乙酉年陕西涇陽縣貢生張璘家七世同居丁亥年陕西三水縣民趙資家八世同居均經該撫奏聞建坊旌表並製詩書扁以賜用示優奬兹河南巡撫何裕城奏河南府偃師縣民任天篤九世同居尤為罕覯除敕部照例豫旌外復親製此什並御書義門敦族匾額賜之以彰太平盛事兹吟九世乃天中清時自是稱盛事豫土由來敦厚風八寧七張今過一陳牢楊爨古齊公任鄰孝友適為姓彰表應教篤慶崇御書匾額義門敦族旌表江西萬載縣民周耀德六世同居禮部謹題為題請旌表事據江西巡撫伊星阿疏稱萬載縣民周繼德六世同居一門敦睦合炊煙于纍代食德飲和聚丁口者百餘型仁講讓宜邀旌典以樹風聲臣等查與定例相苻應令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議乾隆五十年旌表福建侯官縣職員許王臣七世同居禮部謹題為題請旌表事據福建巡撫雅德奏稱聖澤宏敷寰宇召祥和之氣皇仁普被海濵昭雍睦之風兹有侯官縣職員許王臣支綿七世丁衍百餘弓冶箕裘奉詩書而延世澤災畬播穫本孝弟以振家聲宜賜褒旌式彰聖化奉上諭據雅德奏侯官縣職貟許王臣自曽祖許友至伊曽孫同居七世丁衍百餘洵為盛世庥徴請旨旌表等語許王臣家庭聚順雍睦可風宜推旌淑之恩益廣型仁之化兹特親製詩章御書匾額以賜其應賞給縀匹建坊旌表之處該部照例具題欽此應請令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行至恩賞縀匹由內務府領出交該省提塘賫送該撫轉給祇領可也奉旨依議御製福建侯官縣職貟許王臣家七世同居詩以賜之乙巳數世同居弗一足向年陕西乾州民寧爾強八世同居涇陽縣貢生張璘七世同居三水縣民趙資八世同居福建百嵗夀民沈起龍夫婦齊眉五世同居河南偃師縣民任天篤九世同居均經該撫請旌並製詩書扁以賜兹福建巡撫雅德奏侯官縣職貟許王臣家自曽祖許友與許賔弟兄共㸑至王臣已經歷四傳逮其曽孫凡經七世百有餘人纍葉同居科第蟬聨詩書孝友洵為盛事等語因飭部照例旌表並賜匾額題詩以旌雍睦總緣恩沐纍熙朝詎惟表户金帛賜合與題萹姓氏昭和睦允稱惇史鮮上聲孝亷漫憶漢家嘲欲長善善應嘉豫匪詡升平教化調御書匾額海國醇風旌表陕西大荔縣捐職州同李朝恩七世同居禮部謹題為題請旌表事據護理陕西巡撫圖薩布疏稱大荔縣捐職州同李朝恩家傳孝弟世守醇良士恆士而農恆農聚順垂百年之久田尓田而宅尓宅貽謀至七葉而遙朂四世之孫曽咸遵祖訓萃百餘之子姓共率民彛下可維桑梓之淳風上可驗行葦之雅化允宜闡揚懿媺潤色雍熙臣等查與定例相苻應令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議乾隆五十四年旌表山東商河縣武生白可任八世同居禮部謹題為題請旌表事據山東巡撫覺羅長麟奏武定府商河縣武生白可任秉性醇良傳家孝友一門會食衍瓜瓞以長繁八世同居紹箕裘于勿替實升平之盛事宜褒典之榮邀奉上諭據長麟奏商河縣武生白可任八世同居懇請旌奬等語白可任家門雍穆子姓蕃昌纍世同居共敦親誼允宜加恩褒奬以為民俗儀型著賞給御書扁額所有應行旌表之處該部察例具題欽此應請行令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議御書匾額義睦傳家旌表河南魯山縣生員傳麟瑞七世同居禮部謹題為題請旌表事據河南巡撫梁肯堂奏魯山縣生貟傅麟瑞誼篤本支居無異㸑男正外而女正內百年之堂構如新子言孝而父言慈七世之繼繩克守庶邀旌淑以廣時雍奉上諭據梁肯堂奏河南魯山縣生貟傅麟瑞七世同居子孫一百五十餘人懇請旌表等語傅麟瑞一門式好七世同居子孫衆多共敦姻睦洵為盛世休徴特製詩章並御書匾額以賜所有應行旌表之處著該部照例具題欽此應行令該撫轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議御製河南巡撫梁肯堂奏魯山縣生員傅麟瑞七世同居子孫一百五十餘人詩以賜之己酉中州夙號民風古麟瑞傳今聞實可嘉七世同居如許王臣氏向年福建撫臣奏侯官縣職員許王臣家七世同居科第蟬聨詩書孝友洵為盛事曽有詩旌奬百人共㸑勝楊播家魏書楊播一家之內百口同㸑庭無間言兹傅麟瑞百五十餘人七世同居實屬逺邁前聞因勑部照例旌表並御書扁額特製詩章以旌敦睦雍雍敦睦倡鄊里藹藹致祥表近遐敢曰休徴因泰運安民調化敬惟加御書扁額敦睦傳家乾隆五十五年旌表山西太平縣候選知府王協七世同居禮部謹題為七世同居請旨旌表事據山西巡撫海寧疏稱講讓型仁親睦著教民之典移風易俗熙雍彰郅治之苻兹有太平候選知府王協世業詩書家傳孝友闔門八十餘口彛訓聰聼同居二百餘年家風恪守宜荷旌閭之寵用徴盛世之祥奉旨該部議奏欽此臣等查與旌表之例相苻應行令該撫轉飭地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議旌表甘肅固原州監生陳蕣十世同居禮部謹題為題請旌表事據陕甘總督勒保奏稱敦敘恩隆式篤􅀢宗之誼睦姻化洽允苻表宅之文兹有固原州監生陳蕣合族同居一門集慶上祖禰而下子姓綿延已十世之遙友昆弟而撫孫曽蕃衍在百丁以外宜膺茂奬以勵淳風奉上諭據勒保奏甘肅固原州監生陳蕣十世同居一門男婦大小一百三十餘人等語陳蕣合族同居業經十世兄弟歡愈孫曽蕃衍洵為盛世休徴特製詩章並書匾額以賜所有應行旌表之處著該部照例具題欽此應請行令該督轉飭該地方官給銀三十兩聼本家自行建坊其忠義孝弟祠內題名之處照定例遵行奉旨依議御製陕甘總督勒保奏固原州監生陳蕣十世同居一門一百三十餘人詩以賜之庚戌去嵗肯堂七世報新春勒保更三加上年河南巡撫梁肯堂奏魯山縣生員傅麟瑞七世同居曽御書扁額並製詩章賜之兹勒保奏陳蕣十世同居男婦大小一百三十餘人更為過之古楊今許已稱盛魏書載楊播一家百口同㸑庭無間言至向年福建巡撫奏侯官縣職員許王臣家七世同居科第蟬聨詩書孝友浚光輝映已屬史册所罕覯昨豫兹甘較匪遐兹相隔一年河南有傳麟瑞甘肅又有陳蕣一門雍睦泃為升平盛事因敕部照例旌表亦即書額製詩以賜弗以多辭欣俗厚肯稱祥即信時嘉載咨大小長民吏崇實相將漫瑞誇御書扁額聚順延祺臣等謹案史傳所載數世同居者唐則有張公藝宋則有李罕澄許祚陳競胡仲堯裘承詢姚宗明元則有張閏鄭文嗣芮世通向存義丁煦明則有鄭濓王應王燾每代不過數人而史册已稱其閨門雍睦近于淳古矜為僅見之事我朝化洽敦龎純熙懋緝皇上敷郅教之隆播時雍之治鏡六宇以榮和融為家瑞前此乾州之寧爾強涇陽之張璘三水之趙資既各旌門賜什矣惇行順德接踵連閭自癸卯至今諸大吏封章入告纍世合居者又若干人且有至十世者焉蓋舉前史所謂百年創見者駢集于一時斯非和調玉燭宣景耀以抒豫順有因時而迭見者歟仰惟慶澤滂施備承優奬建坊賜額璀璨天書而任天篤等兼蒙御賜詩章炳天經而光人紀褒逾華衮祉逮雲礽奬勵之方卓越乎前古家修姻睦户尚輯和又豈唐宋元明所能希及哉八旬萬夀盛典卷二十九
