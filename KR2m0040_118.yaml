body:
  text: 欽定四庫全書八旬萬夀盛典卷一百十九歌頌三十九萬夀頌十二章謹序湖南學政内閣侍讀臣張姚成臣聞錫福敷言皇極覘庶徴之應緝熙永禄聖猷騐成命之孚惟不息允恊乎乾樞斯旡疆彌益乎坤紀泰元推筴貞符衍萬八春秋章部増年夀籙紀三千甲子寰㝢躋春臺之樂雲物頻書都幾集王會之圖星躔式序欽惟皇帝陛下治隆廣運化洽重熙以作君而兼作師建中學懋本法天而為法祖奉若心精文徳誕敷彚琳瑯而集成鴻笈武功丕炳訖象寄而威耀龍斿溯自説著古稀一二日萬㡬㒺暇迄今記成耋念八十載庻事彌勤先甲而咨布徳音扵大丙撫辰則治鬯淳化于由庚㢲命重申銀烏調翰兑徳為悦木鳯銜綸稽農籍而普免租庸丁户樂登塲之業詔春官而榮除耄耋甲科増題塔之人恵我有孚敷天同慶减三居於嘉石胏石仁下禹車廣十賚于賜粟賜縑歌傳堯壤時邁載遵夫岱岳太龢早洽於神州三雍則璧沼流輝膏醰榛楛千畆則籍田獻賦澤溢倉箱麟趾開五代之堂慶逮苑檐二百家曾元衍福鳩杖萃元旦之讌歡騰皤髪三千叟更老凝祥箕畢従風繪披圖于巡洛角亢垂曜紀刻玉于游河譜元㑹而義備燈辭勒鴻模而蹟超獵碣番徕鼇社長鯨恬鹿耳之波地本越裳子象貢雕題之瑞佛藏合掌心而膜拜暹羅刻新印以受封馳金葉於滇池奉表効南荒大長靖炎風於雒鼓輸誠趨北户名王鰈泳鶼翔洵竹書所罕覯岳輸川効更史牒所未聞乃太平雖邁乎周成而懿戒尚敶夫衛武先勞無倦軼六帝而宵旰彌殷荘敬日强念八徴而雨暘時厪惟乙心秉昭融之羙健法天行用申錫徴曼羡之符顒孚昊貺五元十夀演垓運于羲圖月琯日徽叶旋宫扵軒律弧呈秋旦騎接氐南姚紀延洪盛典光昭扵史冊軒齡篤祐禕儀偏播乎瀛寰小臣素切葵忱兢持氷尺願籥兕觥之什潤色難工竊慚蠡管之能敷揚莫罄謹拜手稽首而獻頌曰帝徳廣運帝車環轂齋受頊書慶延軒籙無易乃康嚮福錫福於萬斯年受天百祿其一天數五地數五五位相得受天之祐五十有五􅑤合符乎上古嵗紀長庚天子萬夀初元肇祚布徳孔厚恵爾耄耋章爾俊秀海隅蒼生如飲醇酧皆自我天覆以老老幼幼其三五世其昌五福有堂𬗟兹羮墻惟一人之慶寳紐龍章子孫䋲䋲以衍厥祥其四皇之訓言圭組球璧化工斧斤元氣融液皇之掞畫琮璜璋珀大海波瀾雲漢機石其五文徳既炳武功載赫車書一統聲教四訖回面内向頖林鴞集露犬紈牛貢珍彤闕其六民亦寧止稌黍盈埸北綏南屢浃于邊甿叶四蠲租賦萬户悦康師師民畜斯饇斯漿繄我皇之澤降福穰穰其七帝曰欽哉惟刑之恤惟天子有慶爾𤯝則釋烏赦夜傳雞竽曉掲枯荑春生湛恩滭渤其八慱厚髙明以幬以覆聖人偹徳必得其夀上下訢合百昌在宥塔飄吉帛蝶舞僊褎弗侈祥徴和盎宇宙其九聖人大寳八徴鎸辭爻畫凖虙範疇演箕中天紐文交龍盤螭帝樂燕酺重華賡詩以介乎景祺其十先庚元日臣工上言願輯威儀以光大文雕鏤羲娥規矩地天巍巍蕩蕩帝祉洪延其十一金􅒫酉仲觜蠵旦中幹技交際象緯恊従維聖人夀萬方来同抒愉詠歡普翔仁風祝萬萬嵗仰嫓昊穹其十二萬夀恭紀九言詩一百韻禮部主事臣宋鳴琦庚戌皇帝八旬萬夀嵗臣謹拜手稽首陳聲詩握符闡珍五十有五載敬天法祖於緝維雍熙大哉至哉資生以資始乃憲乃成惟時而惟㡬帝躬萬善駢羅集景福皇家五世綰綽崇繁禧是時秋陽方中月華滿煥若卿雲有爛天章竒爰有親王上公列爵五織文綃金之蟒霞錦翍内大小臣外大小臣等跪進無極無量南山巵自臣孩提􅦋粥所聞見洎臣釋褐通籍瞻就時甬龠鼓舞萬一效臚祝仰戴蕩蕩莫載名言為惟帝精誠郊祀動天鑒享用燔柴圭璧純牲犧瑑用信天主人之寶玉曰有成命昊天其子之休徴曰時暘若時雨若十十五五風雨無愆期烈祖太宗冊寶及彛訓諷誦紀實端拱同靈蓍宗藩庸勲賜爵復其始鍚之鞏帶榮被天潢枝帝用推恩鍚類洽嘉貺幬載臣鄰師濟民黔黎天門九重晴開麗詄蕩肆覲百辟辨色咸威遅魚湏羔裘班趨青瑣闥峩冠委珮細駐爐烟絲周文無逸御書遍行殿封事入告睿燭無纎遺龍光燕譽樂只詠既醉蓼蕭湛露不足陳其辭民生繁殖嵗登有負版尤厪水旱咨詢勤邦基書詳快雪堂帖表霙瑞樹羽黒龍潭水親䖍祈四蠲率土正賦累億萬再豁天庾漕粟寛耘耔自餘偏灾議留議撫息逺郊近輔餔啜皆瓊麋李圖雞雛待飼亦偶爾遭遇聖鑒臨賜千春垂棉花之圖耕織互刻畫龍章載煥暖靄敷茅茨始知大法小亷有至道隐如淪浃骨髓連膚肌始知尊親愛戴闗至性㨗如鼗􅬧響應援枹槌允哉聖神文武帝惟偹上掩循蜚巢燧軒轅羲仁惟如天乃裕如淵智惟念典學念切惟民彛克勤克儉申論開衆惑讀誥讀範乙夜勤捜披文成大千詩積數萬首賡之明良喜起髙伊耆校十三經二十有三史刋為武英殿本精毫釐更掲禮家義䟽正偭錯頓使周官戴記還矩䂓遼金元史國語合繁㑹天使人事朗鑒窮鬚眉抱硜守義節取賜省錄天包地藴海納無成虧貳臣之傳創制劃雷電四生有象吟詠彯龍彲扶輿磅礴皇覽大一統河淮濟瀆渙釋同氷澌淹中稷下竒侅尚體要四庫萬卷祕閣開葳蕤版名聚珍天徳潤斧藻若畫方罫磊閜攅星棊重排車攻馬同邁周鼓俛睨韓潮蘇海同涔蹄瞻彼木天東璧倬雲漢家有賜書寳氣猶淋漓遂幸棘闈宸翰沛沾灑區别寸心得失殊雲泥楩楠杞梓嵗貢實靈囿科第甲乙恩許爭磨治内流外銓驅䇿盡羣力干城免置皇路交驅馳敷天廣大頑苗或梗化兩階干羽屢舞煩疇咨蠢兹凖噶爾烏什回部金川大小齒鑿言侏􅍣師于所涖庭穴忽迅掃大凱既奏鐃鐲旋旌旗郊勞之臺殊禮慶再至紫光之閣圖象凡三施昨者毘舍一灣沸魚釡澎湖鹿耳浩蕩迎王師寧謐海鏡指顧靖南服熱河文廟告成如西陲􅘧成銘詞圖成司馬法合并九伐焜燿昭来兹森森勝纛翕赫藏䆳殿纍纍俘器鎮伏同支祁惟帝揆文奮武光奕葉永用制禮作樂扶綱維禴祠烝嘗大典有必飭正簿祭器藻繪頒彤墀遍存往祀忠孝衍廟食椒馨畢逹縹緲生歡怡聖惟大成宫用有閟侐帝彰至徳覆以黄琉璃頒周彛器嚴重載十事讚誦生民未有峩豐碑辟雍臨幸觀聴以萬衆經筵講讀左右趨臯䕫方春始和農祥告晨正青紘黛耜染履方三推膠宫虞庠教胄軼三代旁逹鄉飲酒禮豳風吹每従鑾輿羽衛冠劍側細耳鈞天廣樂迴輕颸典隆朝覲搏拊每聞作樂經釐定章句無参差鐘磬鏄特次第登簴業中和韶舞苞彩来凰儀補諧笙詩厖洪被倫物陋彼束晳眇小無聞知國風雅頌五聲正舊譜翕純皦繹一律歸咸宜鹿鳴苹野之秋杏林宴多士繞筵傾聴来如麋稽古桓榮魚雅就班列預聆抑戒講燕承恩私是時畨回兩部拂格舞伊唲黠戞拍恊和天倪溯由伶倫造律際斯盛可括大濩大武包咸池象功昭徳感通最㣲妙阜財解愠民物羣遨嬉盛京豐邑今古匹亨裕六飛四駕坦蕩遵荘逵於冀於魯呉越梁魏晉納總納秸侯甸要荒綏于時省方補助問風俗何止夏諺逰豫安胼胝佳哉周原禹甸眺葱鬱但覩掎裳連襼相扶攜斑者白者負者戴者𨗳髫者丱者奉者持者隨爛銀之牌草衣卉服叟簇擁五雲華盖天杠芝詔增弟子貟以廣厲士復召試良士以登其楣記經規畫河海効順處好山一一環抱江瀰瀰行慶施恵勾股莫布算合峙福夀崇閣臻須彌蔵經金字翻譯總梵筴普陀宗乗妙相尊菩提大瀛海中大九州之内王㑹職貢圖乗容叅稽暹羅恭謹泥首膺玉冊𬗟甸獉狉革面安耕犂生畨雕題環耳来踵接土爾扈特戢角隨肱麾㾗都斯坦東西布魯特拔逹哈薩安集氓蚩蚩廓爾喀及南掌普入貢安南鍚土受爵親祝釐羣伏天可汗真大皇帝仰諦天日表具龍鳯姿荒服謭陋文字罔測識震驚神武豁逹含仁慈山荘駐觀稼穡辨種種螟蟊息喙麻麥青猗猗髙秋校獵講武數軍實前後哨鹿賦筆盤雲螭御鎗中虎御矢疊中鵠萬目萬首舒悃如舒葵昔誦古稀天子説至道今屆八徴耄念鐫瑶脂寧夀宫成萬事本鍾律皇極殿宴千叟酣酴釄累數百人鮐背見五代布魯特婦跪請皆期頤纉成天家玉牒十一世自昔荷天百祿歌維祺螭頭沛恩羣生福啿啿鳯觜銜詔十色烟霏霏吉帛仙蝶瑞應盎元氣六十四卦燈字神扶持是年帝乃東巡岱宗首親詣闕里涵泳於泗涯徐迴鑾輿向離覲岳牧其神蓐收屆節安衡司衢謳巷舞堯尊而舜酒眷佑擁䕶交下交神祗小臣職𨽻儀部親盛典九首獻頌忭舞依階資萬夀恭紀原福一篇謹序内閣中書臣丁榮祚乾隆五十五年皇上八旬萬萬夀於時天澄地寧氣調憲平中外禔福自侍従之臣封疆之吏以逮儒館之彦旄穉之氓咸歡喜踴躍歌謡舞蹈溢於衢路臣謹按祁姚氏至徳光宅稽古同天史臣作二典以紀盛績自時厥後頌揚之體代有區殊大要主乎恢文殚意以極鋪張揚厲之盛伏惟我皇上聖徳郅治自蜚提以来所未有遊扵仁夀之宇者不識不知莫能名言其所以然恭讀御製詩有大徳之徴四胥得之句臣細繹聖言乃知古者三皇五帝福備扵身而施及于天下必有所以致之之由謹竭慮抒誠撰為原福一篇以濡泳睿緒敷鍚純嘏上祈聖天子覆載之長山岳之固億萬萬年無極其辭曰懿夫福之宗也其惟天其惟聖人乎天職生覆動化従新執大同之制調泰鴻之氣嘔生吹落而不可罄節章光愛神明而不可竭若是者何也曰行健而已矣聖人以其自强不息者法天之行健紀綱八極經緯六合覆露照𨗳普氾無私皇兮将兮以延其羙大之光兮是故聖人先天而天弗違後天而奉天時與天同徳即與天同夀所以立人道之極而為百福之主也洪惟皇帝包元履徳榮鏡㝢宇睿周乎萬品道洽乎四垠萬夀八旬一堂五世膺受多祉光矅上下逮於萌生則有與耆老之恩宴者三千人民間五代同堂者二百家其中百年以上者什率得七八九其舉子八十九十以上賜科第及官春秋兩試重赴鹿鳴棫樸之宴者先後相望妙應寺之吉帛太常之仙蝶祥徴疊見昭融普徧一人夀而天下之民物無不偕夀斯聖人之夀矣斯聖人之福矣在昔姒氏之興也天鍚龜書厥疇有九其次九為五福五福之一曰夀其居中者為五皇極皇建其有極用敷鍚厥庶民其次八曰庶徴曰雨曰暘曰燠曰寒曰風曰時五者来備各以其叙若然福之原根於皇極而八徴應之是故天之顯仁藏用以成此富有日新之化是天之極也即天之福也聖之盡性致命以致此盛徳大業之符是聖之極也即聖之福也凡夫隂陽之和風雨之時嘉穀之登人民之阜跂蠕之蕃息天以是為降福以是為敷福天之命不已聖人之徳亦不已其為福之原則一而已矣曰若稽古泰始成鳩之道其治萬八千嵗其制下究上際周洎徧照豨韋氏得之以挈天地伏羲得之以襲氣母其徳上及泰清下及泰寧中及萬靈品式周備衆祥畢具閲世既邈書缺有間矣其詳不可得聞也亦越大撓紀甲子以後躬蹈至徳天胙為之神明主者自勲華而外無能比儷豈天之勒福抑所以承之者未至也盖天地之氣相因相昷重襲藴積者四千餘年而後扵今日乃萃而發之是天福之㑹而聖人受福之極軌抑古帝者未有之禕儀也揆厥所元盖有數者焉於穆淵體敇天之命祗承大祀嚴恭寅畏斯伊耆氏欽昊之盛褱也懿綱羙法祖武是䋲昧爽丕顯肅稽聖録斯有虞氏紹堯之令典也且堯舜瘦癯黴黑若腊若腒清㣲其身以聴視天下而求民利瘼皇帝簡心庶政一日萬㡬秉燭待章引見庶僚至扵籌酌民食累蠲正供賑貸無算厪念雨澤垂心耕穫盖勤政愛民仁溥恩洽也如此皇帝典學緝熙御製詩文積千萬首禮器樂譜隨時釐定乃至武義璜璜自凖部回部之屬小征大匡百蠻震疊延頸舉踵顒顒詘膝盖文徳武功偹制作宣義問也如此此所以粒食之生粲如晏如滋液渗漉汦汦含育葳蕤感而蒙牙翔泳懐而孚信茂矣羙矣徳莫尚也治莫加也福之原其在是矣以徳致福以福引夀惟天地先之惟皇帝恭之夀者福之致也福者徳之致也此自然之理不繫乎運數之説與夫延𨗳之方故庶類含生之屬皆有自然之氣以應之不言而同然不自知其所以然自大小臣工下而至於億兆之民外而至於蕃服之君長無不誠歡誠喜忭舞而稱曰皇帝萬萬夀盛乎哉福其至矣乎徳其至矣乎萬夀恭紀五言排律一百韻内閣中書臣朱承寵極北宸端扆弧南瑞耀芒八旬開夀㝢五位正中央糺縵卿雲爛帡幪化日長普天調玉燭奕世鞏金湯昊眷申無已乾行愓未遑賛参宏茂育宵旰敕㡬康鳯紀丙辰始鴻猷庚甲張風霆宣教捷雨露沛恩瀼若保心懐赤如臨念凛蒼春臺和氣洽夏診頌聲洋吁咈咨廷陛衣冠拜闔閶時聞歌喜起復詔舉賢良制作追姚姒規模陋漢唐稽田勤寳穡詒榖兆餘慶祖烈恢逾大皇圖拓更昌一家中外合萬國徳威揚方跡圓顱族雕題鑿齒鄉抒忱咸式化欵塞競来王誰復頑同梗重煩掃以槍聖心恒宥罪天討必誅狂首定凖夷險旋披回部猖分符陳虎旅建纛署龍驤睿算􅋵千勝元戎啟十行雉攻墉仡仡蛇布陣堂堂罙入深無阻堅摧勇莫當追奔㸔僕鹿效順許牵羊莽木雲屯蟻金川雪弄蜣竽梟驚電煽礟獮震雷硠一例軍旋凱三邊地盡疆鐃歌賡競病圖畵溢縑緗蠢爾萑苻類藐兹濟漯傍益憐同䑕伏不戰自蠶僵弓掛天山月煙澄瀚海狼洗兵韜鐡甲挽水㵼銀黄仍厪恬嬉念何曾􅊀禦忘順時秋習獮校射騎飛繮雁塞張鵝鸛鸞輿駕驌驦于田嫻甫草獻賦薄長楊緯武功誠赫經文治更彰垂謨開禹服端拱象虞裳作所懐無逸勤修矢益蘉日星昭帝徳雲漢倬天章萬有咸包孕三才允發皇集成編緯曜卷富浩琳琅四庫搜金匱千函彚石倉汗牛䭾計輛辟蠧貯連箱蓬觀經讐向蘭臺鼎説匡閣凡經七建館又列三廂今古大成集多能天縦将國書垂字母樂譜正聲綱獵碣岐陽舊蝌文籀史詳圜池週㶑灔新鼓卧竒礓響是鐘鏞叩章還金玉相儒林均沐浴禮教信輝煌猶日孜孜敕惟思賛賛襄法亷懲大小威福恊柔剛裁制無留牘樞機慎括囊鑒㣲心鏡徹容大度波汪特與清蟊蠧毋令長莠稂拊循及鰥寡通恵列工商莆萐堯厨扇薰絃舜陛鏘重農恒積穀阜俗并勤桑鹿町鳴鳩婦蠶家祀馬孃省耕行衍壤占候應晨祥昭事先祈穀殷籌屢發棠深仁宏解網虚譽斥吞蝗澤國東瀕海河堤北界漳波翻防浸溢濤湧駭撞搪瓠子宫誰築鹽官宅慮荒六巡親相度萬姓起痍傷不惜捐金富頻教建牐忙雲根排砐硪竹楗借蒼筤沿岸環居屋輕㠶稳渡航筈流長任脱弩射不湏强清晏人争頌盈寧户盡償貞符彌宙宇瑞應獻巖廊大典時頒舉隆儀秩有常郊壇尊泰畤齋宿衛嚴装璧斚宵升奠羶蕭􅌊合薌鏗鍧繁樂奏煥赫百靈翔宫廟輝丹雘春秋肅禘嘗當年存劔舃列聖見羹墻陵自東西謁庭還陟降望孝思深懓愾盥薦鬱馨香天祖誠昭格神人福降穰八徴疇衍範雙琥篆分璜耄念何曽倦成謨未易量元正朝百辟㢲令渙三陽東岱崇躬祀南交許覲光孔林頒卣敦魯璧聴絲黄恩榜珊張網文星斗戴筐祥看麟集囿吉覩鳯鳴罔曠典還稠叠洪慈溥霈霶老更釐漢制粟帛賚虞庠宥眚雞竿下蠲租雀啄塲嵩呼喧帝陛華祀徧康荘寵誥泥封紫盈廷手捧黄階榮蓬户煥彩舞佩聲􅟚世沐龍墀眷清分鶴俸糧迎鑾邀簡擢拜闕效趨蹌心喜承膏露才慚䇿跛眻敬成千字頌恭上萬年觴萬夀恭擬柏梁體詩一百韻謹序國子監助教臣謝登儁洪惟皇上夀唘升恒福覃垠堮恩俞愷懇特舉八旬萬夀慶典頒詔天下恵液優渥芸生啿啿祈頌億齡咸欽徳邵禧凝左契斯握懿鑠哉敬禮昊乾祗承前烈斟化敕㡬顯猷融道恢廓九㝢恵康品類煥文鑠武制禮作樂浸潯衍溢五十五年之乆日新不已是以紹五朝之熙洽撫五葉之蕃衍總宙豐穰寧謐頤性飬夀享期頤列曾元穰産同財至十餘世疆吏時時入告至扵飲化歸仁梯棧絡繹皆不待招徕而自至新封之安南國王禀正朔請襲冠服成職貢圖效華封祝大一統無外之模萬斯年無疆之慶治道之隆福嘏之茂軒頊以来扵今始遇皇上聖徳淵沖益懋䖍鞏御製八徴耄念之寳記昭示垓極誠為健運之貞符由斯以推京垓億兆寳籙曼延召嘉貺而滙嘉祥皆皇自敬徳有以致之也臣偹員醲化屢荷覃禧兹逢聖夀延洪敷天合慶臣不揣㣲賤固陋願附於衢世歌詠上祝萬萬年謹效柏梁體敬成百韻拜手稽首以獻詩曰斗樞幹運歸璣璿夀星珠燦弧南躔八旬秩啟貞元旋林林愛戴祈頌䖍帝曰俞迺綸音宣函香搢鬯軺車遄鸞誥載鍚髙級遷正供悉免丁男錢甲乙榜増文武便課弛積分弟子員耆老粟帛忻攀牽雞竿肆赦圜扉湔遊夀㝢者情殷􅚳億萬衆祝億萬年維帝郅治周寰埏乆安馴致滋體乾圓壇矩澤吉日㳙躬瞻珠熉聴玉鋗時祫太室豐粢牷羣祀咸秩簠豆籩維帝祗遹寅仔肩龍興駿烈方䇿編木厨戰績超阪泉締營堂功茂焉訓申萬葉典則沿難責守成至理詮周書尤契無逸篇求衣問燎中勤拳日咨輔弼月慎銓吏尚悃愊嚴削朘批章浩瀚丹毫挻若䋲凖規衡矩權獄無枉縦無頗偏愛飬億庻敷恵鮮至再至三恩普蠲帑庾賑貸厰粥饘罷催逋帖舒胼孿三推加一耕叱犍華黍芃麥覘陌阡曰暘曰雨時結悁文如雲漢章于天詩包詩聖鎔詩仙論史上下年四千評斥曲筆鍼膚孱乙覽四庫精校研纂刋羣籍羅蘭荃羲畫法出於自然宋元搨收翼若蟬十鼓重紀周宣畋三百十字闕若全圖詠耕織與木棉仿李迪畫生矝憐大勇十發的九穿策决玉帳麾戈鋋筰徼再捷俘馘駢北紘畧定渠捜邉蒲昌葱嶺列居鄽三月迅掃安䑓壖紫光繪像標凌煙磨崖奎藻輝層巔烏孫慕義兆伊綿大宛貴山途蜿蜒西竺金經𬗟金箋屋鼇畨語聲蜒蟬安南古郡名朱鳶其王鞠􅛏輸忱堅服天朝服榮𥚹􅝆盡所燾冐歡依縁事待時舉規拓前丁承丙象曰心傳緑瓦易黄新陶甄周笵十器苔斑纒創建璧水波洄㳬塞垠袀服誇青氊壬林百禮圖貫聫一字一音揮虞絃興桓翠蹕嵗往還詰戎秋獮風鳴弦巡方茂舉揚旌旃軌順河定恬海㽭展親賜秩開廣筵始封咸復襃勲賢千叟醧醼排彭籛昇平人瑞顔屋櫋期頤台耉圖曾元下逮蠕動長蠉蜷匝宇蕩蕩而平平登春䑓者情為田􅍭生樂勝如願船甘液渗漉和風扇庶徴厪念芝璽鎸至誠乆道純以専慶辰卿矞呈員􅘢中和雅奏陳宮縣香烟馥郁聞鳴鞭臚愉羾喜班後先夀踰赫胥超驪連誕受昊貺来駢闐福茂松柏釐増川億齡慶衍鴻禔延八旬萬夀盛典卷一百十九
