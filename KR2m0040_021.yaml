  text: 欽定四庫全書八旬萬夀盛典卷二十一聖功四廓爾喀歸順
  hash: sha256:088c35b9792c5af55db521b59e5ea01f4279dcf101ace5b903dd4b3cefc394d1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_021-1a, image: WYG0660/WYG0660-0241a.png}
body:
  text: 臣等謹按禹征三苖載於書􅎋宗克鬼方著於易周宣伐玁狁至太原詠於詩良由化外之愚負恃險逺王者興師討罪或𠞰絶之懾服之德力雖云異用而國威所重則同也三代以前且無蜀徼之地矧雪山以外芒昧荒䀛越二萬餘里之遼濶者乎方今威德逺暨懷徠無垠中外久享敉寧之福我皇上耄齡健運最慎用兵即間有天討之加亦無不本諸宸算精詳熟籌若素爰成所向之克捷乃昨戊申夏遽有廓爾喀滋擾後藏邉徼之事王師甫罙入即報聞風逺遁而聖心慎重謂勿恃目前之寧靜宜䇿久逺之安全恭讀御製邉報詩有往彼逃事如順我還彼至咎我誰歸之句先機逺慮審勢度情實為備至蓋聖人如天之度何所不容而茍非諭之使革威之使服則奚以察其至誠而神我爥照幾先貫徹事後無窮之妙用耶臣等恭紀聖功既列安南緬甸二國歸順以彰鴻謨駿烈重輳疊臻之盛而兹廓爾喀小部亦適傾心面內遣使匍叩逺來元會綴班欣祝萬夀開韶之慶夫乃知聖度之大實由於聖心之密而悉歸於聖皇錫福之同正不特功懋耆成為足震耀典册者也乾隆五十四年恩準廓爾喀國長拉特納巴都爾乞降乾隆五十四年六月初二日臣鄂輝等謹奏為廓爾喀専遣頭目請罪乞降恭摺奏聞仰祈聖鑒事竊臣等於五月二十五日據總兵穆克登阿張芝元率同噶布倫等帶領廓爾喀大頭目噶登嘛撒海哈哩烏巴第哇并小頭人哈哈噠爾等十餘人前來環跪營門抒誠請罪臣等察看該畨等情形悚惶戰栗口不能言當令通事以好言撫慰逐加查詢據稟我廓爾喀逺在邉外與唐古忒人衆和好彼此互相貿易積有嵗年近因西藏之人不以睦鄰修好為念凡販賣貨物任意加收稅項并於食鹽內攙和砂土又嫌銀錢低潮駁回不用我管事頭人屢次寄信講論伊等總置不理我廓爾喀椎魯無知以致侵犯藏地原欲與西藏頭人剖晰此等情節照舊交通並無别意況我廓爾喀現有千百人在西藏傭工貿易藏內之人亦有在我境內販運糧食布匹者彼此都未受傷去冬我等從脅噶爾退回濟嚨時西藏曽差喇嘛與我等講議後聞天朝大兵前來我等不敢抗拒旋即遁回今春本擬來營請罪因雪大路逺人衆畏寒所以稽延時日昨蒙辦事大人賞給我國長諭帖傳宣大皇帝恩典不加誅戮準我小部落歸誠同為天朝百姓實我邉外小畨大幸又蒙大皇帝鴻恩將從前在藏滋事之噶布倫索諾木旺扎勒父子並加收稅銀之第巴等均革退治罪並將辦事駐藏大臣更換我國長頭人及百姓等聽見無不感仰大皇帝公正嚴明叩頭稱頌今幸將各情節申訴嗣後西藏人衆與我等照舊往來和好只求施恩將兩邉貿易等事商議剖定情願久逺遵行斷不敢再犯邉界我國長拉特納巴都爾今年始十五嵗係頭人噶箕等辦事特遣我頭人噶登嘛撒海哈哩烏巴第哇帶領衆頭目來營代為稟訴等情臣等隨將天朝聲勢烜赫皇上睿謨廣運威德遐敷莭經掃蕩賊氛莫不望風披靡一一曉示復恭宣聖主如天好生之心勸善懲惡視天下如一家從不稍分畛域該頭人暨畨衆等頗能領會觀其詞色實屬傾心畏服隨令會同西藏噶布倫第巴等將減稅售鹽及銀錢等事逐項説明立定規條并派能事將僃帶同幹練滿漢屯土員辨暨噶布倫第巴頭人勘明邉界於濟嚨聶拉木宗喀等處緊要隘口堆砌鄂博碉卡以定疆界又設立佛座飭令對衆頂經設誓該頭人畨衆立即免冠伏地叩頭喁喁不已至前嵗廓爾喀懇進表文之事臣等向該頭目查詢據稱前年我國長曽繕稟求西藏大人情願恭請大皇帝聖安進表納貢未得回信今若要原寫稟稿我國長當照樣録送求為代奏我國長就可沾恩等語臣等詳加體察該畨等既能悔罪輸誠尚不致自外生成自應仰懇鴻慈俯如所請準其投誠以昭聖朝寬大之仁臣等隨賞給噶登嘛撒海哈哩烏巴第哇暨衆畨目等綢緞煙茶銀牌等物莫不鼓舞歡欣喜形于色現飭辦事之噶布倫第巴等暫住濟嚨俟該畨等録呈前稟到日即行據實奏聞為此恭摺馳奏謹奏奉上諭據鄂輝等奏廓爾喀頭目來營乞降一摺所辦尚為妥協覽奏稍慰惟內稱拉特納巴都爾今年始十五嵗幼稚無知所有該處大小諸事俱係頭人噶箕等掌管等語此言殊不足信試思拉特納巴都爾甚幼去嵗豈能如此橫行即伊屬下頭目管事亦斷不敢任意擅専興此大舉廓爾喀原係三部落後因恃強兼併合而為一去年侵犯藏地必係出自伊父之意大兵未到以前適伊父物故嗣子新立是以大兵甫至始則退回固守繼復觀望遲延其年幼不能謀事至此始見鄂輝等于此情莭何不一加體訪且該將軍等領兵已至濟嚨即當乘機鼓舞罙入彼疆俾伊等懾服以彰聲勢現在兵既撤回朕亦不好黷武況今天下幅􅊷廣逺即得此廓爾喀區區部落亦復何增毫末但藏內唐古忒人衆素性懦怯去嵗因廓爾喀一至即望風退遁以致濟嚨等處被掠今鄂輝雖據該頭目立誓設盟永不敢再犯界境而夷性狡詐反覆無常考諸史册于立盟後隨即改言起事者亦復不少廓爾喀之盟又何足深恃耶總之此次既費我兵力若不計出萬全使廓爾喀永逺不敢再至立定規條將來大兵一撤或一二年後該畨等又來侵犯豈彼時復于內地紛紛派兵前往征𠞰乎鄂輝等與廓爾喀頭目畨衆勘定疆界取具盟書斷不可草草了事務于唐古忒人衆內酌選數百兵丁駐劄要處平時加意訓練倘有廓爾喀畨衆偶來侵擾即可奮勇截殺使之聞風畏懼自不敢復滋事端著即將善後事宜遵旨悉心妥辦御製將軍鄂輝等奏報收復宗喀濟嚨聶拉木等處廓爾喀悔罪乞降歸順信至詩以志事己酉偏師護藏匪佳兵雪阻軍郵盻信怦上年七月內駐藏大臣慶林等奏廓爾喀在附近後藏地方搶掠濟嚨聶拉木宗喀等處隨令將軍鄂輝等帶領駐防滿兵五百名緑營兵一千三百名屯練降畨一千二百名分起前進護蕆並聲罪致討旋即據奏賊畨一聞大兵進𠞰紛紛退遁及我兵收復宗喀後適因春雪連綿難以進取明知賊畨斷無能為而阻雪稽延不禁盻望懸切次苐畨邉俱已復畏懷逺部自歸誠前據奏二月下旬天氣稍晴一面即督兵由積雪微薄處迤邐前進並派將辨帶領善能登陟漢土兵丁開挖路徑翻山罙入遂將濟嚨聶拉木等處俱行收復而賊衆先已逺竄現已逼近廓爾喀畨界並飭令鎮將帶同戴綳喇嘛苐巴等到彼境內傳唤緊要頭人適遇前次仲巴薩嘉兩呼圗克圗遣往諭話之喇嘛諾勒聶勒巴勒卓二人來營詢知彼處驚懼情形並云廓爾喀頭人因雪大怕冷俟天氣晴暖即同二呼圗克圖前來叩見願附編氓等語彼之屈抑原為雪豫也勸懲付以明此事初起時豫即意駐藏大臣慶林等必有辦理不善之處隨令巴忠速往查辦嗣據奏查出廓爾喀因噶布倫索諾木旺札勒平日若纍商人聶拉木地方第巴桑噶私行加稅鹽內攙土又不用彼處錢文心懷嫌怨及五十二年向慶林等告稱納表進貢而索諾木旺札勒恐其控告伊等遂揑稱表內言詞不遜慶林被其欺瞞未經具奏廓爾喀無處申訴致有侵擾邉界一事隨將慶林革職在彼處枷號示衆雅滿泰雖到任未久但不能查出亦即革職作為筆帖式效力行走其私自加稅之桑噶剌字發遣索諾木旺札勒雖已畏罪服毒身死亦不準伊子承襲台吉彼之屈抑既伸宜其有輸誠歸順之心矣此事前後俱不出豫所料又何莫非事耶天牖豫衷俾得速蕆其歸順不因耀黷武啓衷天貺凛持盈七月初八日臣鄂輝等謹奏為廓爾喀感激天恩復遣頭目前來懇求進表納貢恭摺奏聞事據留住濟嚨之噶布倫第巴等稟稱廓爾喀頭人回至該部落一一告知國長更加敬畏復遣大頭人巴都爾薩野星夜前來即欲叩見輸誠等情臣等因即於拉子地方暫行駐劄一面仍令總兵穆克登阿張芝元由薩喀一路查看卡隘安設防兵轉至前途蟒卡木地方而紅帽喇嘛沙嗎爾巴業已帶領廓爾喀頭人到彼當經面見該鎮等先為通欵詞意極為恭敬嗣令巴都爾薩野等迎接具述伊國長感頌之意并送畨綢布匹米麵等物又令隨從小畨焚香跪道該鎮等復加開導將邉界一切交易往來事件逐條諭知該頭目巴都爾薩野跪聆之下感激天恩情願永逺遵奉該鎮等即令于前次噶登嘛撒海等所立畨書名畫字鈐用圗記結內亦皆心恱誠服隨經該鎮等將備帶綢緞煙茶等物分别賞賚俱各歡欣叩頭當據大頭目巴都爾薩野稟稱伊國長差有頭人扎薩拉木塔巴巴克森巴呢二名並帶散畨十數人前來經該鎮等帶領於六月初六日趕赴拉子地方臣等先期整頓軍容臚列賞需率同在事文武傳令進見該畨等環跪營門匍匐叩頭呈送哈達并卡契綢各二匹孔雀尾一束當令通事以好言嘉慰據該畨等稟稱伊國長暨畨部頭目百姓感仰大皇帝公正嚴明之德宥過恕罪之恩無可報答特遣我扎薩喇木塔巴巴克森巴呢二人前來叩謝髙厚之恩我國長情願進表納貢遵奉天朝法度與西藏之人永相和好再不敢侵犯地界現在表貢等物我國長處業已趕緊辦理惟是廓爾喀係邉野地方所産並無珍異不過土物幾種伏望將軍大人代奏轉懇大皇帝施恩就是我國長及衆頭人世世子孫沾感不盡此時我國長之叔巴都爾薩野已同紅帽呼圖克圗見過兩位總兵大人轉回陽布地方催促表文貢禮不日即可賫到等語臣等察看該頭人等敬畏向慕之誠實出真情因賞給羊隻飯食安頓在營外寨落居住一宿次日加賞綢緞銀牌又帶賞伊國長拉特納巴都爾大緞錦綢朝珠荷包等物并差委守備嚴廷良伴同前往直入該部落傳諭一切俟該畨所遣頭目賫呈表貢到日即行派員護送進京如蒙聖主寬大之仁宥其翻然悔悟略施恩澤則該部落同為盛世編氓永遵約法似與奠安衛藏大有俾益所有廓爾喀復遣頭目籲懇情由合先恭摺奏聞謹奏奉上諭據鄂輝等奏廓爾喀復遣大頭人赴營稟稱情願具表納貢永歸王化等語廓爾喀拉特納巴都爾于上年即欲呈獻貢物因駐藏大臣等隱匿不奏未及舉行今復遣頭目抒誠進貢恭順可嘉現交軍機大臣存記俟其來使呈賫表貢至京時再行酌量施恩豫以封爵並賞給該頭目等職銜用示鼓勵著傳諭鄂輝等俟廓爾喀頭目恭賫表文貢品到藏即派委妥員護送進京一面先行具奏御製將軍鄂輝等奏廓爾喀歸順實信並班師迥藏事宜詩以志事己酉偏師安藏匪佳兵遲就都緣阻雪程去夏廓爾喀侵擾後藏邉界信至即命鄂輝等帶兵嚴𠞰使彼怖懼固威不敢再犯乃官兵始至彼收復宗喀之後旋因春雪微薄處帶領善能登陟之漢土兵丁開路罙入將濟嚨聶拉木等處盡行收復而賊畨已早畏竄逺揚及前次仲巴薩嘉兩喇嘛遣往諭話之人回稱廓爾喀頭人即欲來營請罪願求內附亦以雪山髙大未能即至以此蕆事不能迅速我往彼逃昨曽慮上年據奏賊衆逃遁情形衆人鮮不以為易于完事殊不思我兵到彼必當嚴行𠞰辦俟彼震懾之後再傳唤彼處頭人令其立誓定界方為得體不然彼聞大兵將至即畏威逺避倘我兵既撤彼復潛出滋擾是彼轉以逸待勞而爾時又須調兵籌餉成何事體是以上年邉報詩有我往彼逃事如順我還彼至咎誰歸之句誠不肯貪近效而忘逺計也畏威懷德既歸誠兹據鄂輝等奏總兵穆克登阿張芝元率同西藏之噶布倫哇并小事帶領廓爾喀大頭目噶登嘛撒海哩烏巴巴第頭人哈哈噠爾等十餘人於五月二十五日前來環跪營門悔罪求恩據稱彼處與唐古忒本是和好近因西藏之人將貿易貨物任意加收稅額并于食鹽內攙和砂土又嫌銀錢低潮不用彼管事頭人曽屢次寄信講説付之不理是以無知侵犯邉界及聞天兵到來不敢抗拒聞風退回本欲於春間即來求懇實因雪山髙大是以遲延且稱彼處同為天朝百姓蒙大皇帝不加誅戮并將西藏多事之噶布倫索諾木旺札勒父子及加稅之第巴桑噶均革退治罪又將駐藏大人俱即更換彼王子頭人無不感仰大皇帝公正嚴明之德以後永遵王化斷不敢多事等語此事初起時豫即意慶林等必有辦理不善之處因令巴忠馳往查辦嗣經察實具奏果有抑勒買賣不接廓爾喀奏書之事因俱分别治罪今據所云果不出豫所料又據奏該頭目等詞色之間實屬傾心悅服現在勘明邉界於濟嚨聶拉木宗喀要隘處所堆砌鄂博碉卡以定界限又令於佛座前頂經立誓並取具永不滋事圖記結狀存案是其畏威懷德實出誠心祗可俯允所請以完此事亦不值掃穴擒渠以誇示威武也底須掃穴窮大武申命防邉奠衆氓此事鄂輝等如早有識力彼雖有歸順之言亦當揚我兵威取彼附近部落數處使彼目覩天威方為攻心之䇿至於設誓表心豈堪深恃今既計不出此豫亦不欲為其已甚俱善後事宜亦不可不孰籌審慮慎防其後因申諭鄂輝等班師回藏後於西藏畨衆所需口糧應由達賴喇嘛商上給與蓋往年駐藏大臣原不甚管理彼處事務此次既經用兵護彼若不預為經畫防範彼或再來鞭長莫及長此安窮并令明白宣示達賴喇嘛等自當共喻為彼之意徐俟陪臣奉表至五十二年廓爾喀原向慶林等告求納表進貢因索諾木旺札勒等恐其控告伊等諸弊揑稱表內言詞不遜慶林等為其所愚未即具奏兹據該頭目等稱仍當照樣謄寫若肯代為陳奏彼王子等無不沾恩等語將來俟其奉表投誠自應令其照舊往來貿易以昭柔之意意而豫籌畫此事將及一嵗巨細無不出自心裁一朝歸順亦可釋此勞念矣畫籌又幸釋心怦八月初二日臣鄂輝等謹奏為奏聞事據守備嚴廷良等稟稱自入廓爾喀境後該畨等備辦夫馬供應殷勤六月初十日將抵陽布之先該國長拉特納巴都爾並伊叔巴都爾薩野率領大小頭目畨衆數百人在離寨三四十里之地擺列旗幟鼓吹并用象隻整備錦鞍排隊迎接隨至拉特納巴都爾官寨將奉發諭帖令隨帶通曉畨語之辨目詳加宣示並經紅帽沙嗎爾巴呼圗克圗逐一開導曉諭拉特納巴都爾及巴都爾薩野與衆頭人等俯伏跪聽甚為恭敬悅服當經巴都爾薩野代伊姪拉特納巴都爾面屬通事稟稱我廓爾喀小畨豈不知尊敬天朝祗因逺隔西藏無人通信是以未能如願前嵗我叔姪與頭人等商量曽具稟懇求西藏大人轉奏又被噶布倫等駁回未蒙準行今將軍參贊大人要原稟字稿查看並許代為陳奏現交頭人等即行呈送前因邉界事情常受藏內之人欺侮以致干犯界實屬冒昧今蒙大皇帝格外鴻恩不加誅戮屢奉將軍參贊大人傳諭并將西藏與我處交易往來及邉界等事分别剖斷我等實在感恩畏罪從此斷不敢再行滋事現在趕辦表文貢物即差大小頭人賫呈前進惟求將軍參贊大人遣送赴京若蒙大皇帝恩施將廓爾喀小畨與唐古忒人等一樣管教就是我等世世子孫沾感不盡等語守備隨至行館歇宿該頭目等紛紛叩謁欵待甚周又據沙嗎爾巴呼圗克圗告稱該畨所遣頭人等尚須料理行裝及包褁貢物必得少待一二日方可一同起程是以在彼暫駐於六月十三日據拉特納巴都爾暨巴都爾薩野遣派大頭目巴拉巴都爾喀哇斯哈哩薩野二名並隨從小頭目及散畨共二十餘名并將從前原稟字稿均交守備帶領自陽布起程仍從濟嚨一路行走惟近日山水漲發行程恐未能迅速等情臣等查廓爾喀節次所遣頭人情詞均極恭順今守備嚴廷良等直抵彼寨詳加飭諭而該王子及頭目等尤覺誠心感服即敬修表貢遣使前來自應宣揚恩澤以示懷柔計守備嚴廷良帶領該畨等於七月初十左右定可抵札什倫布臣等現已専差妥辨并飭隨營第巴頭人馳赴前途妥為照料一俟該貢使等到時即查明人數貢品帶赴前藏以便護送進京為此謹奏八月十八日奉上諭昨據鄂輝奏廓爾喀専遣大頭人噶箕二人一名巴拉巴都爾喀哇斯一名哈哩薩野并小頭人散畨二十三名恭賫表貢於七月十五日已抵札什倫布現在妥為照料伴送進京等語上年緬甸貢使及本年安南貢使至熱河瞻覲經過沿途地方各督撫俱令叩見並優加犒賞廓爾喀逺處西陲從前並未通職貢且不嫺中國禮儀非如緬甸安南近屆南服久慕華風者可比著傳諭各督撫於該貢使過境時止須照每年達賴喇嘛班禪所遣呈遞丹書克堪布過境之例妥與居處飲食並計算日期務令於年前到京瞻覲不必如緬甸安南貢使令其叩見將此各諭令知之臣鄂輝等謹奏為廓爾喀貢使現自前藏起程入覲開列人數貢單仰祈睿鑒事竊廓爾喀差遣大頭目二名散畨二十三名恭賫表文貢物齊抵札什倫布偹陳伊國長拉特納巴都爾感激愛戴之誠當經逐加撫慰賞給銀兩衣物妥為照料前進各緣由恭摺奏聞在案臣成德隨帶領自札什倫布起程該畨等一路鼓舞歡欣極為馴善茲於上月二十九日已抵前藏即會同臣舒濓普福傳該頭目巴拉巴都爾喀哇斯并哈哩薩野等面加詢問伊等誠心向化情詞亦與前次所稟無異伏查現來頭人畨衆初次經行內地且時屆深秋天氣漸寒途中間有氷雪冷凍之處其禦寒衣履在所必需況自西藏以至成都站路頗長該畨等素不善騎尤須隨時照料臣等現已逐項籌辦并飭委將偹各員及台站汛辨于經行險峻處所加意整偹並派撥兵丁畨目接替護送仍専派第巴營官一路照料俾該畨等不致辛苦自必愈加歡躍兹臣成德帶領先於八月初九日自藏起程計期十月內可抵成都再當料理前進總期臘月中旬到京所有廓爾喀貢使自藏起程日期理合恭摺具奏謹奏九月初六日奉硃批好知道了十二月二十一日廓爾喀頭目巴拉巴都爾喀哇斯哈哩薩野等恭奉表貢夀經入覲及畨御製詠廓爾喀所進貝葉經詩使名目分載典禮門慶祝類廓爾喀微臣拉特納巴都爾同微臣之叔巴都爾薩野合掌誠心其表天下萬國大皇帝萬嵗三寶佛駕前微臣祖父在日即有心要向大皇帝前進表總未得進若當時進呈已受了大恩典不但今世并子子孫孫都受恩施至微臣之身亦要誠心進表總以道逺無由自達上年曽具表懇求進貢又有阻抑今蒙欽差大人差員到廓爾喀地方宣布大皇帝如此德意微臣實中心悅服再不肯歸順别國只虔心歸順大皇帝微臣自祖父以來要行之事如今都已如願微臣所住廓爾喀之地在京師西南方從前有甲噶爾普拉各處部落曽發兵前來都被微臣截堵回去仰賴佛天保佑微臣等已謹慎未曽被彼侵占此等情事前此未荷大皇帝鑒照兹得一併上達微臣心中愈加欣幸今恭進表文懇求恩典願乞大皇帝賞微臣敕旨一道沾恩無既微臣不勝激切屏營之至恩封拉特納巴都爾為額爾德呢王及其叔巴都爾薩野為圖薩拉克齊公賜之敕諭其入覲之頭目畨衆籲遵國制剃髮分别賞給頂帶並屢賜宴賚遣歸奉天承運皇帝制曰爾廓爾喀與唐古忒素相和好交通貿易往來已久去嵗朕聞爾等驟起爭端即欲發大兵命將軍大臣等嚴懲爾罪逮將軍大臣等查詢明白乃知噶布倫索諾木旺扎勒第巴桑噶等私加稅額妄行尅取各情爾等不勝苦纍故呈遞駐藏大臣欲求進表納貢詎索諾木旺扎勒等匿不稟聞駐藏大臣又未查出代奏以致負屈未伸激成事端念爾尚非有心抗拒今索諾木旺扎勒已故其台吉職銜革退不準承襲並將桑噶治罪更換能事大臣二員駐藏辦事爾聞大兵一至即竄回退避叩懇將軍大臣等具疏奏聞前來進貢朕念爾能返躬悔過是以恕爾妄肆滋擾之罪且鑒爾誠心歸命遣大頭目哈哩薩野等奉表乞恩殊堪嘉奬即將哈哩薩野等數人優賜筵賞兹特敕封爾拉特納巴都爾為額爾德呢王賜以寶石帽頂四團龍補褂密臘朝珠佩帶荷包等物封爾叔巴都爾薩野為圗薩拉克齊公賜以珊瑚帽頂蟒袍補褂密臘朝珠佩帶荷包等物大頭目瑪木薩野哈哩烏巴第哇等授為戴奉賜三品帽頂蟒袍朝珠佩帶荷包等物仍降敕與爾拉特納巴都爾併賞給爾叔巴都爾薩野各色大緞三十匹花緞四匹閃緞二匹金線緞二匹粧緞二匹倭緞坐褥面五件五十兩重銀茶桶一件五十兩重銀盆一件琺琅瓶一對玻璃瓶一對玻璃碟二對把磁碗二對磁碗二對盛奶茶磁碗二對交與哈哩薩野等帶回俟彼到日按件查收入覲頭目哈哩薩野巴拉巴都爾喀哇斯等俱授為第巴賜四品帽頂貂皮補褂狐皮蟒袍朝珠佩帶荷包等物並賞戴孔雀領每人賞錦三匹倭緞三匹八絲緞五匹五絲緞五匹銀五十兩玻璃器三件磁器五件大荷包一對小荷包四對鼻煙壺一對火􅀈二件茶葉二瓶小頭目怎達克德哩等六人每人賞錦一匹倭緞一匹八絲緞三匹五絲緞三匹銀二十兩玻璃器一件磁器二件小荷包二對鼻煙壺一個火􅀈一件茶葉二瓶並將現來怎達克德哩等二十三人各賜戴金頂賞給灰鼠褂皮袍佩帶荷包等物令伊等隨閲煙火方今藏內庶事嚴立章程貨稅亦定成額朕乃統治天下萬國之君諸務莫不秉公毫無偏倚爾等誠能恭順循法朕必從厚加恩如違科條亦必重懲今爾拉特納巴都爾受朕渥恩當思圖報皈依達賴喇嘛等守分安常仍與唐古忒等互相和好公平貿易約束屬下各安樂利庶得永承恩眷特諭臣等謹按衛藏為振興黃教之地嵗有常員駐兵防守與廓爾喀界址甚明貿易相資祗以邉畨素性重利且易積小嫌非敢不凛赫濯之聲威而迹阻敻幽末由自達致勞我王師申討其蠢愚無識使然耳皇上天日照臨赦過宥罪導之以所易從示之以所允服遂乃獻經設誓錫爵加榮襲王會之衣冠與奉觴于萬嵗可謂誠無不格矣而御製詩猶以我往彼逃我歸彼至為慎再三申誡大聖人知微知彰誠所謂不逆億而自先覺者洎辛亥七月廓爾喀果以與唐古忒私債微嫌復滋擾札什倫布么髍之族固不值掃穴擒渠始揚國武然邉畨狡黠非威不懾唐古忒怯懦非兵力不寧爰於是年冬十一月命福康安海蘭察等統率徑旅進𠞰以次年六月進兵所向無前摧枯拉朽旬日間連克擦木邦杏瑪噶爾轄爾甲諸地方收復濟嚨攻奪碉卡石寨數十座殱獲無算徑渡熱索橋入廓爾喀境克東覺山梁廓爾喀窮蹙乞降經福康安等嚴檄駁斥復進兵攻取雍雅堆補木集木集以至帕朗古深入七百餘里七戰七勝殱擒不下五六千人距其巢穴僅百里許一舉即可蕩平於是廓爾喀遣大小頭人賫稟三四通匍叩軍門乞求降順瀝陳與唐古忒爭端搆釁實不敢有一毫抗拒天朝之意惟求大皇帝如天覆載開一線生路此後永遵法制與唐古忒和好斷不敢再有反覆云云并遣大頭目虔修表貢呈獻馴象畨馬樂工前來福康安等具以入告皇上睿謨指畫重念邉徼生靈同係天朝赤子鑒其悔罪之誠獻地之切降旨班師納降時壬子嵗八月二十有二日也臣等恭纂八旬萬夀盛典適於是時告成表進謹於卷後附載始末以見皇上至誠至明先幾燭照萬里之外如視指掌萬人之情如見肺腑而馭邉懷逺討叛舍服仰見聖夀逾髙精神益固宸算周詳實為億萬祀不易之良法以繫庚戌後之事謹撮大略附識至𠞰辦降順各事宜顒俟纂成廓爾喀紀略再於九旬萬夀恭纂盛典時敬謹臚敘云八旬萬夀盛典卷二十一
