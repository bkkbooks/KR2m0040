body:
  text: 盛事二十四收成分數三乾隆五十四年直省收成分數直𨽻省二麥八分有餘秋禾八分江蘇省二麥九分有餘秋禾八分有餘安徽省二麥八分有餘秋禾七分有餘江西省二麥早稻晚稻八分有餘浙江省春花蠶絲早禾晚禾九分有餘福建省二麥早稻七分有餘晚稻八分有餘湖北省二麥早稻晚稻八分餘湖南省二麥八分早稻九分有餘中晚二稻九分河南省二麥九分秋禾八分山東省二麥十分秋禾九分有餘山西省二麥秋禾九分有餘陜西省二麥秋禾八分有餘甘肅省夏禾秋禾九分四川省夏熟八分有餘秋禾九分有餘廣東省夏禾八分有餘秋禾九分廣西省二麥早稻晚稻七分有餘雲南省豆麥秋收稻榖雜糧九分有餘貴州省夏收秋禾九分有餘伊犂各屯二十八分至二十九分零塔爾巴哈台各屯一十五分零喀喇沙爾各屯一十三分至一十五分零烏什各屯二十分零烏嚕木齊巴里坤各營屯一十五分零吐魯畨各屯一十二分至一十五分零哈密各屯一十五分至一十六分零御製河南巡撫梁肯堂奏報二麥約收八分有餘詩以志慰己酉正繾河南雨澤稀寄詢臨勘切民依昨據梁肯堂四月十八日奏報豫省雨澤仍係三月下旬情形方以此間四月十二三之雨已及直𨽻山東而豫省未得均霑為念豫省河北三府屢年歉收今春雨膏更殷盼望因命阿桂赴楚之便會同該撫留心查勘據實以聞今日該撫報收成八分餘為之稍慰欣披各屬以時報約過八分致旱非據奏豫省一百八廳州縣二麥約收分數十分者祥符等四州縣九分有餘者濬縣等七州縣九分者杞縣等二十八縣八分有餘者陳留等二十四州縣八分者通許等四十五廳州縣合計通省收成約八分有餘等語豫省最重麥收兹仍得八分有餘尚屬中稔數日厪旱之懷因為稍慰然尚俟阿桂查勘實信耳夙識麥秋重豫省流通水路達京畿運河自臨清以北惟藉豫省之衛水濟運今嵗河北三府不致缺而故衛水充盈糧艘迅速抵通而京師麥價亦可望其日減矣萬方衣食一心計忍不孜孜慎敕幾御製浙江布政使顧學潮報春花蠶絲收成豐稔詩以志慰己酉田協霑膏蠶協晴九分兩得報收成顧學潮奏浙江各屬春雨霑足大麥陸續登場小麥亦俱結實飽綻春蠶漸次成萌現據查明各府州縣春花蠶絲收成分數杭州嘉興寧波紹興溫州五府屬二麥約九分有餘湖州金華嚴州處州四府屬二麥約有九分台州衢州二府二麥約八分有餘統計通省二麥收成九分杭州嘉興二府屬蠶絲收成九分有餘湖州府屬蠶絲收成九分統計蠶絲收成亦九分有餘田功需澤蠶事需晴兹幸晴雨各協並獲豐收實堪慰慶足衣資食酬民願旰食宵衣慰我情護撫司藩合申奏巡撫琅玕入覲顧學潮護理撫篆收成分數例得陳奏慎微戒滿益盟誠封章南北多吉語昨據福康安奏安南阮惠進表乞降兹又據阿桂顧學潮奏河南浙江豐收情形吉語駢臻洵屬大順欣慰之下敬畏益深自問何修幸畏并御製江西巡撫何裕城安徽巡撫陳用敷各奏報麥收分數詩以志慰己酉南暖北涼氣候然麥收南早北遲延八分同得殊報日安徽巡撫陳用敷江西巡撫何裕城同時奏到通省二麥約收分數俱八分有餘及披閲拜摺日期江西係四月十六日具奏安徽係四月草六日具奏自係南北氣候涼暖各殊故收成遲早亦異而江西在南故到遲安徽在北故到速其為有年固無殊也計里殊行同有年餅餌可期價減市黍禾更喜茂連阡偏災兩省昨嵗被去秋江西安徽沿江濵湖州縣俱以水勢漲彂間有偏災兹幸兩省胥獲稔收感謝昊恩倍增虔惕幸接青黃慰謝虔御製山東巡撫長麟奏報二麥收成十分詩以志慰己酉從來收麥計其分八九分登已足欣何幸青齊稱十穫誠為厯載未前聞長麟奏山東二麥約收分數通省十府二直𨽻州內濟南東昌武定青州曹州等府屬之沙地泰安沂州登州萊州等府屬之山坡地收成九分有餘者餘地畝俱十分有餘兖州臨清濟寧等府州屬之沿河窪地收成九分其餘地畝俱十分有餘合計通省約有十分實為數年內所僅見等語東省昨嵗秋田已屬豐收而今年麥秋更逢上稔感蒙鴻貺莫可名言惟有諄勉該撫共勵敬勤以兾仰答庥耳天秋田昨嵗况逢稔夏稼今年又遍耘慶慰之餘無别諭囑諄戒滿敬加勤御製湖北巡撫惠齡奏麥收分數及雨水情形詩以志慰己酉水過涸田廣種麥是為最要接青黃九贏牽以八猶賸接短因之補厥長楚北地方向來種麥本廣上年被水多之後涸出田畝補種二麥較往嵗更多兹據惠齡奏麥收分數九分有餘者三縣九分者三十五州縣八分有餘者六縣八分者二十四州縣牽計通省六十八州縣收成雖不足九分而已八分有餘小民正值插秧之時獲此接濟口食有資益得服勤農事歡慰倍越尋常更喜宜晴牟刈穗時沾佳􅉈稻分秧又據稱該省自三月中旬以來每旬均得透雨一二次交夏後晴􅉈經旬二麥得以及時刈獲現在稻秧已漸蒔竣所有池塘陂隁均有蓄水足資長養此間苗秀殊常好望雨正需資灌漿此間自四月十二以前屢得透雨二麥極為芃茂惟日內正在麥穗灌槳時並望沛澤將來麥收或可致九十分若再五日不雨則可惜只成七八分而已御製直𨽻總督劉峩奏報二麥約收分數詩以志慰己酉直𨽻近山左麥收報反遲蓋因南北候故異後先期直𨽻近畿劉峩奏報二麥約收分數轉在山左之後自因南北涼暖異候故收成遲早各殊之耳十欠漫生惜八餘亦可怡直𨽻入春以來雨澤優渥二麥無不暢茂兹將各屬成熟之期據奏約收分數九分有餘者大名一府九分者順德廣平趙州八分有餘者順天保定永平遵化易州深州六府八分者正定天津承德冀州定州五府州七分有餘者河間一府六分有餘者宣化一府牽計通省麥收約八分有餘雖不及山左之報有十分亦尚可稱中稔矣自憐還自解究欠足之知御製陜西巡撫巴延三奏報麥收分數詩以志事己酉陜以麥為重八分報有餘巴延三奏陕省六十八廳州縣二麥約收分數內十分者三縣九分有餘者十一廳州縣九分者十二廳州縣八分有餘者二十四廳州縣八分者十州縣七分有餘者七縣七分者一廳統計共八分有餘陕省各屬多以麥收為重今嵗自春徂夏甘􅉈應時現在將次登場可得中稔閭閻衣食既足盜賊自清批覽之餘洵堪慶慰自春霑雨足入夏穫秋如衣食民誠裕村莊盜自疏正供依限納賸欠命全除又據奏陕西應征錢糧通完一摺內稱五十三年額征錢糧草束均已全完帶征緩征各項亦皆納期完納惟潼關華州華隂等處尚有未完緩征銀三千一百六十三兩零未完耗羡銀四百七十四兩零並潼關未完緩征糧一百二十二石零現在照例帶征該省近年稔收小民踴躍輸將殊屬急公可嘉因即降旨將未完各項加恩全行豁免俾小民普無逋欠得免追呼以副惠愛黎元有加無已之意御製湖南巡撫浦霖奏二麥收成八分詩以志事己酉湖南土性别與麥不相宜種植每勤勸青黃頗借資浦霖奏湖南地土多不宜麥向來種麥之處止有二十四州縣自後茶陵等五州縣間種二麥本年又勸諭武陵華容二縣亦令試種兹現陸續登場合計三十一屬麥收實有八分當此青黃不接之際于民食頗資接濟八分中稔報卅屬萬民怡近逺及遲早一心十二時御製河南巡撫梁肯堂報二麥收成九分並雨暘時若詩以志慰己酉迤北伊南夏收定潔長補短九分餘河南巡撫梁肯堂奏二麥實在收成分數開封歸德彰德衛輝四府及汝陕二州所屬州縣皆八分有餘懷慶河南南陽汝寧陳州五府及許光二州所屬州縣皆九分有餘合計通省二麥實有九分等語宜暘牟麥回青免足雨黍禾助長上聲如又奏稱據開封等九府四州稟報于五月初八九暨十四十八十九并二十二十一二等日各得雨自一二寸至六七寸及深透不等早禾得此􅉈澤滋培倍見暢茂晚田亦俱及時播種此時二麥早已登場足稱豐稔糧價平減聞之殊堪欣慰何幸其逢遙慶彼略嫌將過近厪豫京畿春雨優渥自四月十二日以後晴霽逾月望澤正殷五月草四日喜得甘􅉈旋即放晴于未收之麥及禾黍益滋飽滿生發日來積隂雨勢綿密未止又恐過多于已收之麥有礙晒曝未免為之厪念耳三朝間頓殊愁喜昨北至還宫齋戒憑輿厯覽已收之麥既得晴霽晒曝弗慮發芽未熟之麥及大田得霑時雨更資充實芃茂實為欣喜今日又逢綿雨恐致過多三日間愁喜頓殊信乎為君之難也可識君難直筆書御製四川總督李世傑奏報麥收八分餘及雨水情形詩以志慰己酉川省年年幸屢綏向稱湖廣尚過之向稱湖廣熟天下足而四川近年以來屢獲豐稔産米尤多下遊之江廣各省咸資轉運接濟不啻過之麥牟秋報八分稔黍稻雨經一尺滋兹據李世傑奏川省二麥播種早者三月內即經結實其次于四月間均各黃熟核計九分者順慶敘州潼川嘉定四府達州忠州二直𨽻州敘永一廳八分有餘者成都重慶夔州龍安寧逺保寧六府眉州卭州資州綿州茂州酉陽六直𨽻州石砫一廳八分者雅州府瀘州直𨽻州及理畨廳合計通省麥收實八分有餘又四月十七八九及二十二三四等日各屬普得甘雨入土深透現在早插禾苗已經長發餘亦栽種齊全彌望青蔥民氣歡暢等語可望農功符築納自然民氣叶熙怡盜風息內畨馴外從前川省嘓嚕賊匪最為民間之害自大加懲創以來地方官俱知實力緝辦有犯必懲近年閭閻安靖盜風久息其沿邉各土司畨夷等自大小金川平定後輸誠向化共享太平民生其間實為樂土也樂土蒼生愜綣思御製雲南巡撫談尚忠奏報秋禾收成九分餘詩以志慰己酉滇黔雖極逺有社稷民人黔既奏豐遇昨貴州護撫布政司汪新奏貴州通省秋收九分有餘滇隨欣稔陳前談尚忠奏雲南省自八月初旬以來晴多雨少暄潤得宜秋禾顆粒益臻飽滿現屆成熟之際據各屬所報收成分數八九十分不等約計通省總在九分以上等語風淳政簡處災少穫多辰深幸邉氓福慰餘增惕寅御製江蘇巡撫閔鶚元奏報麥收九分有餘詩以志事己酉逺方前奏近翻後則以詢查轉致遲湖南湖北浙江江西等省麥收分數早已奏到江南省道近轉遲因閔鶚元前奏僅分江南江北而于總散數目均未聲敘明晰因傳旨查詢今日始據覆奏江北江南稔概矣分多分少數去聲牽之前據閔鶚元覆奏大江南北二麥收成十分者長洲元和等二十四州縣廳收成九分有餘者潭水丹徒等九縣收成九分者上元江寧等二十七州縣廳合計通省麥收九分有餘等語九仍餘也誠民幸黃實接焉慶嵗綏不獨斯乎頻吉報今嵗各省奏報麥收率在八分以上戒盈慎滿益夔夔御製山西巡撫海寧奏麥收九分有餘並雨水情形詩以志慰己酉甘霖通省遍二麥九分收據海寧奏晉省麥收分數臨汾等八州縣約收十分有餘榆次等三十一州縣約收十分陽曲等十九州縣約九分有餘襄垣等二十四州縣約收八分懷仁等四廳約收七分有餘歸化等四廳約收七分合計通省麥收共九分有餘又據奏山西省城于閏五月初四初七等日兩次得雨入土深透並據九府十直𨽻州所屬州縣及歸綏道所屬各廳陸續報到同于此兩日內得雨自四五六寸至深透不等該省麥收既已豐稔而秋田更獲甘膏農民歡忭覽奏深為慶慰目下青黃接田中禾黍稠三秋時尚逺四釜語權休近據各省奏報多稱大田可望豐收戒之在滿祗益增惕耳不獨晉省爾寰區謙鞏求御製山東巡撫長麟奏報收成九分有餘詩以志慰己酉北省雖然賴麥秋大田究以重秋收曰㿩曰雨慶時若我黍我禾胥穫稠長麟奏本年東省地方􅉈雨優霑晴暄應候各處秋田無不乘時普種雖間有低窪地畝因雨水連綿不無稍減分數而髙阜平衍之區均屬一律暢茂倍極豐蔚現在髙粱早榖業己次第刈穫豆子晚榖棉花黍稷等項亦皆纍纍秀實俱為稔足據各屬稟報約收分數濟南武定青州萊州四府屬均有十分兖州東昌曺州登州四府屬均九分有餘泰安沂州濟寧臨清四府州屬約八分有餘合計通省收成約九分有餘等語東省今春麥收已獲上稔兹秋收又復九分有餘披覽之下深為欣慰各屬笇稱九分賸一心慰解萬民愁守謙戒滿盟恆念廣為去聲寰中願更悠御製河南巡撫梁肯堂江西巡撫何裕城各奏報秋收八分有餘詩以志慰己酉發奏不同到日同是因近逺速遲通江西河南各報秋收分數江西以六月二十日發摺河南以七月十二日發摺道有逺近是以同日奏到西江自以稻為重北豫斯稱禾實充各屬雖然非一致八分總可號中豐何裕城奏江西早稻收成分數八分者四十七廳州縣九分者三十二廳州縣合計通省八分有餘梁肯堂奏河南秋禾約收分數九分者十四廳州縣八分以上及八分者五十九州縣七分以上及七分者三十五州縣合計通省約亦八分有餘兩省俱獲中豐可為農民慶慰南瞻豈不共民慶戒滿正殷益惕衷御製直𨽻總督劉峩奏報秋禾收成八分詩以志慰己酉今年多稼本期豐秋雨失暄粒未充春夏間直𨽻雨澤優霑禾黍均資茂暢原可期普獲豐收至交秋後雨水乃多顆粒未能飽綻致減分數兹據劉峩奏永平等五州府約收八分有餘順天等九府州廳約收八分河間五府州縣約收七分有餘通計合屬約收共有八分等語是猶可稱中稔也深惜十將二分減致看禾與黍胥同雖然尚可稱中稔未敢因之滿一衷低處究憐遭漫溢劉峩並奏地形低窪之處間有被淹浸者因命詳查飭屬妥為撫恤毋致一夫失所頻煩申諭恤民窮御製湖南巡撫浦霖奏報早稻收成九分有餘詩以志慰己酉昨嵗即稱豐今春麥登稔兹值早稻收復九分餘審浦霖奏湖南通省早稻收成分數計七十四廳州縣內除永綏桂東二廳不種早稻外其餘收成九分有餘者二十六廳州縣九分者三十一廳州縣八分有餘者十縣八分者五州縣合計通省實共九分有餘現在糧價平減民情恱豫等語該省去嵗秋收九分有餘今夏麥秋收成亦有八分兹又報稱上稔實屬屢豐優于他省何幸湖之南綏屢霑恩甚亦不惟此方各省奏章品雨㿩率以時熟多鮮災祲叶之今嵗各省秋收分數俱約在九分上下間有被水處山東惟蒙隂一縣江蘇惟睢寧等七州縣安徽惟泗旴𣅿二州縣河南惟永城等四縣直𨽻則清苑等四十餘州縣多因瀕河低窪至被淹浸遂成偏災然統計各省州縣不及二十分之一已即令各督撫加意賑恤當不致有失所遇此實厚幸持盈益增凛御製陜甘總督勒保奏報夏禾收成九分詩以志慰己酉去嵗八分今九分偏災更幸略無聞去嵗甘省秋成八分有餘其偏被􅀢旱之平涼等州及被水之平羅縣屬即經降旨將應徴正借錢糧及舊欠錢糧草束槩豫緩徴以紓民力兹據該督勒保奏甘省今年雨暘應時田禾暢茂夏禾現已登場計鞏昌等五府州收九分有餘蘭州等三府州收九分慶陽等五府州收八分有餘合計通省共收九分現在雨水調勻秋禾可期豐稔等語是分數既優于去年而更無偏災待恤之處實為該省閭閻額慶閭閻誠慶衣食足老幼兼辭賑恤勤地瘠民貧處稍救賦徴租納政休紛西瞻額手仍申祝綏屢惟希意篤殷御製廣東督撫福康安圗薩布報早稻收成八分有餘詩以志慰己酉七閩春雨微愁短東粵鄰疆並去聲繫情九十屬州兹合計八分餘稻報收成福康安圖薩布奏廣東早稻收成分數內九分者四州縣八分有餘者一十六廳州縣八分者五十四州縣七分有餘者十一州縣七分者六州縣合計通省收成八分有餘現在中晚稻亦俱發生暢茂山後雨澤應時秋收可並期豐稔夏秋為澤設時若中晚之登更冀贏擘奏囊能勿稱慰慰哉益畏慎持盈御製山西巡撫海寧奏通省秋收九分有餘詩以志慰疊去嵗韻己酉各省收成忖度中欣瞻三晉報登豐較于去嵗分增一晉省去嵗秋收止八分有餘兹據海寧奏今嵗秋禾約收分數內十分者榆次等二十七州縣九分有餘者陽曲等三十四廳州縣九分者浮山等二十二州縣八分有餘者吉州等四州縣七分有餘者寄嵐等十三廳州縣七分者右玉等十廳縣合計通省約收九分有餘以去嵗較之庶稱上稔實幸吾民氣自充知節儉方勿慮别計三九處定能同憐他好樂毋荒戒蟋蟀三章紀國風御製四川總督李世傑奏報早晚收成九分以外詩以志慰己酉從來鮮遇偏災處今嵗收成贏九分早稻已登晚禾實夜霖常渥晝晴欣李世傑奏川省早稻于六月間收穫大半至七月初旬已一律收齊其晚稻雜糧八月望前普可登場約計收成在九分以外且喜常得􅉈雨多在夜間而日間大半晴霄是刈割更得及時民情極為悅豫淘塘髙下為蓄計瀦水冬春備灌勤又據奏該省雨水調勻不特田禾結實飽滿農民並深淘塘堰廣為瀦蓄以備冬春灌溉之用似此殫力田疇逢登慮歉宜獲盈寧之報矣似此逢豐預慮歉良農辛苦愜披聞御製湖南巡撫浦霖奏報中晚二稻收成九分詩以志慰己酉早稻已曾九分獲今稱中晚亦如斯前據浦霖奏湖省早稻收成九分有餘已有詩志慰兹復奏中晚二稻接續登場計收成九分有餘者三十三廳州縣九分者二十五廳州縣八分有餘者二十州縣八分者六縣合計通省實有九分該省連嵗稔收積貯本屬充盈今嵗又逢三稻豐穰民苗樂業覽奏益深欣慶手加額慶何修遇目與心馳幸不期富以教之言且置滿招謙受理應思秋霖更報渥蕎菜又據奏該省秋日晴爽收斂甫畢于八月十七八九等日省城密雨優渥並據各府州報晴雨均調得以及時趕種冬蕎油菜農民無不歡恱南望誠欣誠畏寅御製陜西巡撫秦承恩奏報秋禾收成八分有餘詩以志慰己酉西秦邇嵗多逢熟二麥獲收早奏聞夏間據前任巡撫巴延三奏報二麥收成八分有餘兹報八分登禾黍前據秦承恩奏該省入秋以後雨澤均霑田禾豐稔現在查核約收分數十分者五郎等一十廳縣九分有餘者臨潼等十州縣九分者孝義等二十七廳州縣七分有餘者靖邊等三州縣七分者保安等二縣統計八十七廳州縣約收八分有餘等語是該省夏秋俱稱中稔堪為農慶可稱中稔副耕耘三農幸已酬辛苦一己能無生慰欣旋慮慰欣近驕泰益增警戒朂憂勤御製湖北巡撫惠齡奏中晚二稻收成八分餘詩以志慰己酉南報九分北八分惠齡奏湖北通省六十八州縣內除江陵監利潛江荆門四州縣被水田地不計外其餘各屬中晚二稻收成九分有餘者一縣九分者七州縣八分有餘者四州縣八分者四十九州縣七分者七州縣合計共得八分有餘等語是該省雖較之湖南九分有餘者少減而亦可稱中稔矣既為惜矣亦為欣豈能各省副綏屢亦號中豐答穡勤一二偏災仍賑恤前據畢沅等奏六月內因漢江上遊暴漲致適近漢水之潛江荆門等四州縣倒灌受淹分别撫恤緩借現飭該管道府詳細確勘已即批令撫恤之處妥速為之俾受實惠叮嚀諸吏共殷勤更稱和暖平糧價庶復閭閻元氣誾御製江蘇巡撫閔鶚元奏報秋禾收成八分餘詩以志慰己酉蘇撫今朝達奏書展觀慰惜並殷豫閔鶚元奏江蘇省夏秋雨澤霑足江南俱臻上稔惟江北之淮西徐州海州三府屬雨水稍多河流盛漲田禾間有淹浸覽奏為之慰惜交至江隂稔自常連鎮河潦災侵淮與徐據奏各屬秋禾收成分數松江太倉二府州總各八分蘇州常州二府總各九分有餘鎮江府總計九分有餘淮安府總計六分有餘徐州府總計九分有餘合計通省收成八分有餘等語該省總計猶稱中稔雖豐歉不齊而有無相濟歉收各屬或不致有失所之虞歉北豐南通省計截長補短八分餘有無鄰郡相通藉溝壑吾民庶免諸御製貴州布政使汪新奏報秋成九分有餘詩以志慰己酉黔撫掄才調廣東旬宣護理奏箋通貴州巡撫郭世勳于六月間調任廣東其新任巡撫陳步灜未到任之先藩司汪新護理撫篆是以奏報秋成分數已欣二麥逢收好比較去年更覺豐黔省本年二麥已獲稔收兹屆早晚二禾陸續登場彚奏各府廳州縣內十分收成者二十六處九分收成者四十五處八分收成者三處合計通省實有九分有餘較之上年尤為豐稔現在糧價日見平減民苗無不歡悅餘九分堪稱上稔平諸價實濟孤窮邇來報嵗多佳信切切持盈益惕衷八旬萬夀盛典卷四十八
