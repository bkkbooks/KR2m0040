body:
  text: 盛事二十四收成分數三乾隆五十四年直省收成分數直𨽻省二麥八分有餘秋禾八分江蘇省二麥九分有餘秋禾八分有餘安徽省二麥八分有餘秋禾七分有餘江西省二麥早稻晚稻八分有餘浙江省春花蠶絲早禾晚禾九分有餘福建省二麥早稻七分有餘晚稻八分有餘湖北省二麥早稻晚稻八分餘湖南省二麥八分早稻九分有餘中晚二稻九分河南省二麥九分秋禾八分山東省二麥十分秋禾九分有餘山西省二麥秋禾九分有餘陜西省二麥秋禾八分有餘甘肅省夏禾秋禾九分四川省夏熟八分有餘秋禾九分有餘廣東省夏禾八分有餘秋禾九分廣西省二麥早稻晚稻七分有餘雲南省豆麥秋收稻榖雜糧九分有餘貴州省夏收秋禾九分有餘伊犂各屯二十八分至二十九分零塔爾巴哈台各屯一十五分零喀喇沙爾各屯一十三分至一十五分零烏什各屯二十分零烏嚕木齊巴里坤各營屯一十五分零吐魯畨各屯一十二分至一十五分零哈宻各屯一十五分至一十六分零御製河南巡撫梁肯堂奏報二麥約收八分有餘詩以誌慰己酉正繾河南雨澤稀寄詢臨勘切民依昨據梁肯堂四月十八日奏報豫省雨澤仍係三月下旬情形方以此間四月十二三之雨已及直𨽻山東而豫省未得均霑為念豫省河北三府屢年歉收今春雨膏更殷盼望因命阿桂赴楚之便㑹同該撫留心查勘據實以聞今日該撫報收成八分餘為之稍慰欣披各屬以時報約過八分致旱非據奏豫省一百八㕔州縣二麥約收分數十分者祥符等四州縣九分有餘者濬縣等七州縣九分者杞縣等二十八縣八分有餘者陳留等二十四州縣八分者通許等四十五㕔州縣合計通省收成約八分有餘等語豫省最重麥收兹仍得八分有餘尚屬中稔數日厪旱之懷因為稍慰然尚俟阿桂查勘實信耳夙識麥秋重豫省流通水路達京畿運河自臨清以北惟藉豫省之衞水濟運今嵗河北三府不致缺而故衞水充盈糧艘迅速抵通而京師麥價亦可望其日減矣萬方衣食一心計忍不孜孜慎勅㡬御製浙江布政使顧學潮報春花蠶絲收成豐稔詩以誌慰己酉田協霑膏蠶協晴九分兩得報收成顧學潮奏浙江各屬春雨霑足大麥陸續登塲小麥亦俱結實飽綻春蠶漸次成萌現據查明各府州縣春花蠶絲収成分數杭州嘉興寧波紹興温州五府属二麥約九分有餘湖州金華嚴州處州四府属二麥約有九分台州衢州二府二麥約八分有餘統計通省二麥收成九分杭州嘉興二府属蠶絲收成九分有餘湖州府属蠶絲收成九分統計蠶絲收成亦九分有餘田功需澤蠶事需晴兹幸晴雨各協並獲豐收實堪慰慶足衣資食酬民願旰食宵衣慰我情䕶撫司藩合申奏巡撫琅玕入覲顧學潮䕶理撫篆收成分數例得陳奏慎㣲戒滿益盟誠封章南北多吉語昨據福康安奏安南阮惠進表乞降兹又據阿桂顧學潮奏河南浙江豐收情形吉語駢臻洵属大順欣慰之下敬畏益深自問何修幸畏并御製江西巡撫何裕城安徽廵撫陳用敷各奏報麥收分數詩以誌慰己酉南暖北凉氣候然麥收南早北遟延八分同得殊報日安徽巡撫陳用敷江西巡撫何裕城同時奏到通省二麥約收分數俱八分有餘及披閲拜摺日期江西係四月十六日具奏安徽係四月廿六日具奏自係南北氣候凉暖各殊故收成遟早亦異而江西在南故到遟安徽在北故到速其為有年固無殊也計里殊行同有年餅餌可期價減市黍禾更喜茂連阡偏灾兩省昨嵗被去秋江西安徽沿江濵湖州縣俱以水勢漲彂間有偏灾兹幸兩省胥𫉬稔收感謝昊恩倍増䖍惕幸接青黄慰謝䖍御製山東巡撫長麟奏報二麥收成十分詩以誌慰己酉従来收麥計其分八九分登已足欣何幸青齊稱十穫誠為厯載未前聞長麟奏山東二麥約收分數通省十府二直𨽻州内濟南東昌武定青州曹州等府属之沙地泰安沂州登州萊州等府属之山坡地收成九分有餘者餘地畝俱十分有餘兖州臨清濟寕等府州属之沿河窪地收成九分其餘地畝俱十分有餘合計通省約有十分實為數年内所僅見等語東省昨嵗秋田已属豐收而今年麥秋更逢上稔感䝉鴻貺莫可名言惟有諄勉該撫共勵敬勤以兾仰荅庥耳天秋田昨嵗况逢稔夏稼今年又遍耘慶慰之餘無别諭嘱諄戒滿敬加勤御製湖北巡撫惠齡奏麥收分數及雨水情形詩以誌慰己酉水過涸田廣種麥是為最要接青黄九贏牽以八猶賸接短因之補厥長楚北地方向来種麥本廣上年被水多之後涸出田畆補種二麥較徃嵗更多兹據恵齡奏麥收分數九分有餘者三縣九分者三十五州縣八分有餘者六縣八分者二十四州縣牽計通省六十八州縣收成雖不足九分而已八分有餘小民正值挿秧之時獲此接濟口食有資益得服勤農事歡慰倍越尋常更喜宜晴麰刈穂時沾佳􅉈稻分秧又據稱該省自三月中旬以来每旬均得透雨一二次交夏後晴􅉈經旬二麥得以及時刈𫉬現在稻秧已漸蒔竣所有池塘陂隁均有蓄水足資長養此間苗秀殊常好望雨正需資灌漿此間自四月十二以前屢得透雨二麥極為芃茂惟日内正在麥穂灌槳時並望沛澤将来麥收或可致九十分若再五日不雨則可惜衹成七八分而已御製直𨽻總督劉峩奏報二麥約收分數詩以誌慰己酉直𨽻近山左麥收報反遲盖因南北候故異後先期直𨽻近畿劉峩奏報二麥約收分數轉在山左之後自因南北凉暖異候故收成遲早各殊之耳十欠漫生惜八餘亦可怡直𨽻入春以来雨澤優渥二麥無不暢茂兹将各属成熟之期據奏約收分數九分有餘者大名一府九分者順徳廣平趙州八分有餘者順天保定永平遵化易州深州六府八分者正定天津承徳冀州定州五府州七分有餘者河間一府六分有餘者宣化一府牽計通省麥收約八分有餘雖不及山左之報有十分亦尚可稱中稔矣自憐還自觧究欠足之知御製陜西巡撫巴延三奏報麥收分數詩以誌事己酉陜以麥為重八分報有餘巴延三奏陕省六十八㕔州縣二麥約收分數内十分者三縣九分有餘者十一㕔州縣九分者十二㕔州縣八分有餘者二十四㕔州縣八分者十州縣七分有餘者七縣七分者一㕔統計共八分有餘陕省各属多以麥收為重今嵗自春徂夏甘􅉈應時現在将次登塲可得中稔閭閻衣食既足盗賊自清批覽之餘洵堪慶慰自春霑雨足入夏穫秋如衣食民誠裕村荘盗自疎正供依限納賸欠命全除又據奏陕西應征錢粮通完一摺内稱五十三年額征錢粮草束均已全完帶征緩征各項亦皆納期完納惟潼闗華州華隂等處尚有未完緩征銀三千一百六十三兩零未完耗羡銀四百七十四兩零並潼關未完緩征粮一百二十二石零現在照例帶征該省近年稔收小民踴躍輸将殊属急公可嘉因即降㫖将未完各項加恩全行豁免俾小民普無逋欠得免追呼以副恵愛黎元有加無已之意御製湖南巡撫浦霖奏二麥收成八分詩以誌事己酉湖南土性别與麥不相宜種植每勤勸青黄頗借資浦霖奏湖南地土多不宜麥向来種麥之處止有二十四州縣自後茶陵等五州縣間種二麥本年又勸諭武陵華容二縣亦令試種兹現陸續登塲合計三十一屬麥收實有八分當此青黄不接之際扵民食頗資接濟八分中稔報卅属萬民怡近逺及遲早一心十二時御製河南巡撫梁肯堂報二麥收成九分並雨暘時若詩以誌慰己酉迤北伊南夏收定絜長補短九分餘河南巡撫梁肯堂奏二麥實在收成分數開封歸徳彰徳衛輝四府及汝陕二州所属州縣皆八分有餘懐慶河南南陽汝寕陳州五府及許光二州所属州縣皆九分有餘合計通省二麥實有九分等語宜暘麰麥迴青免足雨黍禾助長上聲如又奏稱據開封等九府四州禀報扵五月初八九暨十四十八十九并二十二十一二等日各得雨自一二寸至六七寸及深透不等早禾得此􅉈澤滋培倍見暢茂晚田亦俱及時播種此時二麥早已登塲足稱豐稔粮價平减聞之殊堪欣慰何幸其逢遥慶彼略嫌将過近厪予京畿春雨優渥自四月十二日以後晴霽逾月望澤正殷五月廿四日喜得甘􅉈旋即放晴于未收之麥及禾黍益滋飽滿生發日来積隂雨勢綿宻未止又恐過多扵已收之麥有礙晒曝未免為之厪念耳三朝間頓殊愁喜昨北至還宫齋戒憑輿厯覽已收之麥既得晴霽晒曝弗慮發芽未熟之麥及大田得霑時雨更資充實芃茂實為欣喜今日又逢綿雨恐致過多三日間愁喜頓殊信乎為君之難也可識君難直筆書御製四川總督李世傑奏報麥收八分餘及雨水情形詩以誌慰己酉川省年年幸屢綏向稱湖廣尚過之向稱湖廣熟天下足而四川近年以来屢獲豐稔産米尤多下㳺之江廣各省咸資轉運接濟不啻過之麥麰秋報八分稔黍稻雨經一尺滋兹據李世傑奏川省二麥播種早者三月内即經結實其次于四月間均各黄熟核計九分者順慶叙州潼川嘉定四府達州忠州二直𨽻州叙永一㕔八分有餘者成都重慶夔州龍安寕逺保寕六府眉州卭州資州綿州茂州酉陽六直𨽻州石砫一㕔八分者雅州府瀘州直𨽻州及理畨㕔合計通省麥收實八分有餘又四月十七八九及二十二三四等日各属普得甘雨入土深透現在早挿禾苗已經長發餘亦栽種齊全彌望青葱民氣歡暢等語可望農功符築納自然民氣叶熙怡盗風息内畨馴外從前川省嘓嚕賊匪最為民間之害自大加懲創以来地方官俱知實力緝辦有犯必懲近年閭閻安靖盗風乆息其沿邉各土司畨夷等自大小金川平定後輸誠向化共享太平民生其間實為樂土也樂土蒼生惬綣思御製雲南巡撫譚尚忠奏報秋禾收成九分餘詩以誌慰己酉滇黔雖極逺有社稷民人黔既奏豐遇昨貴州䕶撫布政司汪新奏貴州通省秋收九分有餘滇隨欣稔陳前譚尚忠奏雲南省自八月初旬以来晴多雨少暄潤得宜秋禾顆粒益臻飽滿現届成熟之際據各属所報收成分數八九十分不等約計通省總在九分以上等語風淳政簡處灾少穫多辰深幸邉氓福慰餘增惕寅御製江蘇巡撫閔鶚元奏報麥收九分有餘詩以誌事己酉逺方前奏近翻後則以詢查轉致遲湖南湖北浙江江西等省麥收分數早已奏到江南省道近轉遲因閔鶚元前奏僅分江南江北而扵總散數目均未聲叙明晰因傳㫖查詢今日始據覆奏江北江南稔概矣分多分少數去聲牽之前據閔鶚元覆奏大江南北二麥收成十分者長洲元和等二十四州縣㕔收成九分有餘者潭水丹徒等九縣收成九分者上元江寕等二十七州縣㕔合計通省麥收九分有餘等語九仍餘也誠民幸黄實接焉慶嵗綏不獨斯乎頻吉報今嵗各省奏報麥收率在八分以上戒盈慎滿益夔夔御製山西巡撫海寕奏麥收九分有餘並雨水情形詩以誌慰己酉甘霖通省遍二麥九分收據海寕奏晉省麥收分數臨汾等八州縣約收十分有餘榆次等三十一州縣約收十分陽曲等十九州縣約九分有餘襄垣等二十四州縣約收八分懐仁等四㕔約收七分有餘歸化等四㕔約收七分合計通省麥收共九分有餘又據奏山西省城扵閏五月初四初七等日兩次得雨入土深透並據九府十直𨽻州所属州縣及歸綏道所属各㕔陸續報到同于此兩日内得雨自四五六寸至深透不等該省麥收既已豐稔而秋田更獲甘膏農民歡忭覽奏深為慶慰目下青黄接田中禾黍稠三秋時尚逺四鬴語權休近據各省奏報多稱大田可望豐收戒之在滿祗益増惕耳不獨晉省爾寰區謙鞏求御製山東巡撫長麟奏報收成九分有餘詩以誌慰己酉北省雖然賴麥秋大田究以重秋收曰𤾉曰雨慶時若我黍我禾胥穫稠長麟奏本年東省地方􅉈雨優霑晴暄應候各處秋田無不乗時普種雖間有低窪地畝因雨水連綿不無稍減分數而髙阜平衍之區均属一律暢茂倍極豐蔚現在髙粱早榖業己次第刈穫豆子晚榖棉花黍稷等項亦皆纍纍秀實俱為稔足據各属稟報約收分數濟南武定青州萊州四府属均有十分兖州東昌曺州登州四府属均九分有餘泰安沂州濟寕臨清四府州属約八分有餘合計通省收成約九分有餘等語東省今春麥收已獲上稔兹秋收又復九分有餘披覽之下深為欣慰各属笇稱九分賸一心慰觧萬民愁守謙戒滿盟恒念廣為去聲寰中願更悠御製河南巡撫梁肯堂江西巡撫何裕城各奏報秋收八分有餘詩以誌慰己酉發奏不同到日同是因近逺速遲通江西河南各報秋收分數江西以六月二十日發摺河南以七月十二日發摺道有逺近是以同日奏到西江自以稻為重北豫斯稱禾實充各属雖然非一致八分總可號中豐何裕城奏江西早稻收成分數八分者四十七㕔州縣九分者三十二㕔州縣合計通省八分有餘梁肯堂奏河南秋禾約收分數九分者十四㕔州縣八分以上及八分者五十九州縣七分以上及七分者三十五州縣合計通省約亦八分有餘兩省俱獲中豐可為農民慶慰南瞻豈不共民慶戒滿正殷益惕衷御製直𨽻總督劉峩奏報秋禾收成八分詩以誌慰己酉今年多稼本期豐秋雨失暄粒未充春夏間直𨽻雨澤優霑禾黍均資茂暢原可期普獲豐收至交秋後雨水乃多顆粒未能飽綻致減分數兹據劉峩奏永平等五州府約收八分有餘順天等九府州㕔約收八分河間五府州縣約收七分有餘通計合属約收共有八分等語是猶可稱中稔也深惜十将二分減致看禾與黍胥同雖然尚可稱中稔未敢因之滿一衷低處究憐遭漫溢劉峩並奏地形低窪之處間有被淹浸者因命詳查飭属妥為撫恤毋致一夫失所頻煩申諭恤民窮御製湖南巡撫浦霖奏報早稻收成九分有餘詩以誌慰己酉昨嵗即稱豐今春麥登稔兹值早稻收復九分餘審浦霖奏湖南通省早稻收成分數計七十四㕔州縣内除永綏桂東二㕔不種早稻外其餘收成九分有餘者二十六㕔州縣九分者三十一㕔州縣八分有餘者十縣八分者五州縣合計通省實共九分有餘現在粮價平減民情恱豫等語該省去嵗秋收九分有餘今夏麥秋收成亦有八分兹又報稱上稔實屬屢豐優扵他省何幸湖之南綏屢霑恩甚亦不惟此方各省奏章品雨𤾉率以時熟多鮮灾祲叶之今嵗各省秋收分數俱約在九分上下間有被水處山東惟䝉隂一縣江蘇惟睢寕等七州縣安徽惟泗旴𣅿二州縣河南惟永城等四縣直𨽻則清苑等四十餘州縣多因瀕河低窪至被淹浸遂成偏灾然統計各省州縣不及二十分之一已即令各督撫加意賑恤當不致有失所遇此實厚幸持盈益增凛御製陜甘總督勒保奏報夏禾收成九分詩以誌慰己酉去嵗八分今九分偏灾更幸畧無聞去嵗甘省秋成八分有餘其偏被􅀢旱之平凉等州及被水之平羅縣属即經降㫖将應徴正借錢粮及舊欠錢粮草束槩予緩徴以紓民力兹據該督勒保奏甘省今年雨暘應時田禾暢茂夏禾現已登塲計鞏昌等五府州收九分有餘蘭州等三府州收九分慶陽等五府州收八分有餘合計通省共收九分現在雨水調匀秋禾可期豐稔等語是分數既優于去年而更無偏灾待恤之處實為該省閭閻額慶閭閻誠慶衣食足老幼兼辭賑恤勤地瘠民貧處稍救賦徴租納政休紛西瞻額手仍申祝綏屢惟希意篤殷御製廣東督撫福康安圗薩布報早稻收成八分有餘詩以誌慰己酉七閩春雨微愁短東粤隣疆並去聲繋情九十属州兹合計八分餘稻報收成福康安圖薩布奏廣東早稻收成分數内九分者四州縣八分有餘者一十六㕔州縣八分者五十四州縣七分有餘者十一州縣七分者六州縣合計通省收成八分有餘現在中晚稻亦俱發生暢茂山後雨澤應時秋收可並期豐稔夏秋為澤設時若中晚之登更冀贏擘奏嚢能勿稱慰慰哉益畏慎持盈御製山西巡撫海寧奏通省秋收九分有餘詩以誌慰叠去嵗韻己酉各省收成忖度中欣瞻三晉報登豐較于去嵗分增一晉省去嵗秋收止八分有餘兹據海寕奏今嵗秋禾約收分數内十分者榆次等二十七州縣九分有餘者陽曲等三十四㕔州縣九分者浮山等二十二州縣八分有餘者吉州等四州縣七分有餘者寄嵐等十三㕔州縣七分者右玉等十㕔縣合計通省約收九分有餘以去嵗較之庶稱上稔實幸吾民氣自充知節儉方勿慮别計三九處定能同憐他好樂毋荒戒蟋蟀三章紀國風御製四川總督李世傑奏報早晚收成九分以外詩以誌慰己酉從来鮮遇偏灾䖏今嵗收成贏九分早稻已登晚禾實夜霖常渥晝晴欣李世傑奏川省早稻于六月間收穫大半至七月初旬已一律收齊其晚稻雜粮八月望前普可登塲約計收成在九分以外且喜常得􅉈雨多在夜間而日間大半晴霄是刈割更得及時民情極為悦豫淘塘髙下為蓄計瀦水冬春備灌勤又據奏該省雨水調匀不特田禾結實飽滿農民並深淘塘堰廣為瀦蓄以備冬春灌溉之用似此殚力田疇逢登慮歉宜獲盈寕之報矣似此逢豐預慮歉良農辛苦惬披聞御製湖南巡撫浦霖奏報中晚二稻收成九分詩以誌慰己酉早稻已曾九分獲今稱中晚亦如斯前據浦霖奏湖省早稻收成九分有餘已有詩誌慰兹復奏中晚二稻接續登塲計收成九分有餘者三十三㕔州縣九分者二十五㕔州縣八分有餘者二十州縣八分者六縣合計通省實有九分該省連嵗稔收積貯本属充盈今嵗又逢三稻豐穰民苗樂業覽奏益深欣慶手加額慶何修遇目與心馳幸不期富以教之言且置滿招謙受理應思秋霖更報渥蕎菜又據奏該省秋日晴爽收歛甫畢扵八月十七八九等日省城宻雨優渥並據各府州報晴雨均調得以及時趕種冬蕎油菜農民無不歡恱南望誠欣誠畏寅御製陜西巡撫秦承恩奏報秋禾收成八分有餘詩以誌慰己酉西秦邇嵗多逢熟二麥獲收早奏聞夏間據前任巡撫巴延三奏報二麥收成八分有餘兹報八分登禾黍前據秦承㤙奏該省入秋以後雨澤均霑田禾豐稔現在查核約收分數十分者五郎等一十㕔縣九分有餘者臨潼等十州縣九分者孝義等二十七㕔州縣七分有餘者靖邊等三州縣七分者保安等二縣統計八十七㕔州縣約收八分有餘等語是該省夏秋俱稱中稔堪為農慶可稱中稔副耕耘三農幸已酬辛苦一己能無生慰欣旋慮慰欣近驕泰益增儆戒朂憂勤御製湖北巡撫惠齡奏中晚二稻收成八分餘詩以誌慰己酉南報九分北八分惠齡奏湖北通省六十八州縣内除江陵監利潜江荆門四州縣被水田地不計外其餘各属中晚二稻收成九分有餘者一縣九分者七州縣八分有餘者四州縣八分者四十九州縣七分者七州縣合計共得八分有餘等語是該省雖較之湖南九分有餘者少减而亦可稱中稔矣既為惜矣亦為欣豈能各省副綏屢亦號中豐答穡勤一二偏灾仍賑恤前據畢沅等奏六月内因漢江上㳺暴漲致適近漢水之潜江荆門等四州縣倒灌受淹分别撫恤緩借現飭該管道府詳細確勘已即批令撫恤之處妥速為之俾受實恵叮嚀諸吏共慇懃更稱和暖平糧價庶復閭閻元氣誾御製江蘇巡撫閔鶚元奏報秋禾收成八分餘詩以誌慰己酉蘇撫今朝達奏書展觀慰惜並殷予閔鶚元奏江蘇省夏秋雨澤霑足江南俱臻上稔惟江北之淮西徐州海州三府属雨水稍多河流盛漲田禾間有淹浸覽奏為之慰惜交至江隂稔自常連鎮河潦灾侵淮與徐據奏各属秋禾收成分數松江太倉二府州總各八分蘇州常州二府總各九分有餘鎮江府總計九分有餘淮安府總計六分有餘徐州府總計九分有餘合計通省收成八分有餘等語該省總計猶稱中稔雖豐歉不齊而有無相濟歉收各属或不致有失所之虞歉北豐南通省計截長補短八分餘有無鄰郡相通藉溝壑吾民庶免諸御製貴州布政使汪新奏報秋成九分有餘詩以誌慰己酉黔撫掄才調廣東旬宣䕶理奏牋通貴州巡撫郭世勲扵六月間調任廣東其新任巡撫陳步灜未到任之先藩司汪新䕶理撫篆是以奏報秋成分數已欣二麥逢收好比較去年更覺豐黔省本年二麥已獲稔收兹届早晚二禾陸續登塲彚奏各府㕔州縣内十分收成者二十六處九分收成者四十五處八分收成者三處合計通省實有九分有餘較之上年尤為豐稔現在糧價日見平減民苗無不歡悦餘九分堪稱上稔平諸價實濟孤窮邇来報嵗多佳信切切持盈益惕衷八旬萬夀盛典卷四十八
