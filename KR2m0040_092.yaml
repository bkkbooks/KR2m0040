body:
  text: 歌頌十三萬夀恭頌九章謹序兩江總督臣孫士毅臣謹案河圖天地之數皆五五位得合積五十有五其間八卦成列積八八而重之象在中爻亦在中生生不已合萬有一千五百二十極之於無盡之數洛書錫禹是曰洪範以皇極為統自三至五五居中自九至五五居中五行推五紀皇極建焉三德推五福皇極行焉保極之道疇次五基之錫極之祥疇次九演之疇主五而虛十環以七八九六參互成十棣通河圖而圖之數與位亦至十而合若五若十乃河洛一氣之運所由軮軋元化諧􅝂萬彚至誠之德之純於穆不已者也今皇上龍集五十五年協天地之紀上章八月恭遇萬夀八旬又符八八引伸之義旬慶逢十紀年逄五五五遞生八八載積貞元之會盛矣延洪之義羡矣京垓億兆孰得而涯際哉亮哉生氏萬萬世未之有也稽古攝提合雒世統始肇天地皇合萬八千人皇合四萬五千六百金天髙陽髙辛喬齡表炳平陽在位百載三代後諸帝大年至七十者六八十者三其可稱僅一而慶祚未轃焉我皇上𢡟景運迓鴻釐貫三才緝萬祀五福五代一堂駢慶斗樞虹渚迥邁疇曩匪直風雨玉燭七政聫珠以侈敶瑞符也必將三靈集祉有開無窮以福中外以鞏磐石煌煌乎卬承昊貺旻旻穆穆泰元富媪之神監民視聼協於克一配命無斁云時乃山鎮敦艮河榮海靖膏醲蒸庥布濩而不韞韣兆人熙春於臺黎耉樂綏乎宇襁元孫者二百家杖期頤者數百姓嘉宴之集三千叟合㸑之居十一世萬邦屢豐之懿慶四男並茲之上祥鬯泝旁魄邇遊遐泳協氣所演隨物斯見冬栩仙蝶晨曵佛帊加以仁風波溢義聲飈騰四海若庭八紘在闥曩者凖回部暨儧拉促浸掃霧犁庭昄章恢拓凡沙度繩行以梯以航以其職來貢矣臺氓弗靖蕭斧是膏生番􅋾􅋾效命南交小邦新造偕朝鮮暹羅𬗟甸南掌諸逺裔匐伏萬里喁喁嚮化衛藏通譯頂經膜拜職方氏之掌典屬國之司雲鶼波鰈王會元正式燕奏樂若斯之列翕翕焉習習焉樹頷蛾伏內靣稽首曰中國有聖人依光末處竊比圉𨽻維皇萬有年嵗緝熙迪介光天之下敻哉禕而三五六經載籍之博能㑂佛盛典所紀哉然我皇上淵居沖懿德讓抑如天數二十有五得位踐阼斯今八旬甲子日富凝命敕幾若一日二日申念天人相與之微在洪範八庶徴篆寶念勤劭兹景福而兢兢於乾九三日夕愓厲之旨乾德剛健純粹以是自強不息作對鴻佑寅纘駿烈敷文奮武勤政愛民量涵海以并包治養春而煦噢故能合撰兩儀阜時九瀛虞后四得以夀登之福源之總偹焉皇極之建驗焉夫道德淵富水流風偃崇教也治之辟雍以式之赫聲肆闡蔚炳用光銘勳也修之石鼓以襲之澤古肄雅效珍黌序興學也放之鎮迪興桓以洽之耄耆篤志宣榮稽古錫羡也釐之科名官秩以引之著作宏達書林校祕考萟也二京與南甸分庋之縑素爛如六籍極博籲俊也兩闈與下庠廣置之茹茅繹如多士交藹王道以之由庚羣生以之奄茂月正元吉雲需燕衎天言涣頒維正嵗供普四方而蠲之兹次四焉滋液滲漉湛恩龎鴻歡歌溢乎蔀屋忭舞暨乎邊徼卉然布恩詔覃慶舉典習祥省方猗那於穆軒臺展敬青旗蒼輅駕至於岱宗峩峩尼邱舍菜若幣震耀哉上儀八九遙迹金泥玉檢靡而不典曾何足云哉人苐知蟠際熙洽知周道濟率邇逖聽薰蒸透徹野吹籥而娛邠俗馗含哺而載堯天百祥扇於四和千聖合于一範抑知秉睿思之勤恁運健行之強固正位凝命貞元回環萬化根棋以是禔福頤吉蓋福量若此之韙也月南吕之秋仲當觜觿之旦中角宿在辰夀星躔次天文志老人一星在弧南秋分見丙則治平主壽昌夫君象惟日聖誕八旬之期在夀星八月之次協應苞符孕精圖書宰疇之五推圖之十衍天地五十五神䇿以至萬有一千五百二十伏誦庚子春御製詩五位輪年十必遇十成紀嵗五常并自庚至庚又浹旬數將部與紀相乘而洪算莫或概量已臣渥被寵遇叨侍禁近又重承簡畀保釐兩江力小任重滋懼鼎餗檮昧不文不足雍容揄揚萬之一伏仰皇上天縱睿知日新問學定禮制樂匪述伊作宣闡治功彪炳萬古至如敕幾餘暇詩成五集文成二集古稀五福有説八徴耄念之寶有記洪範有論所以究時幾正旨推德福大原發株擢奧日光月回繫象典謨有若斯精粹者與臣一辭莫贊竊念嚮依霄漢所懷不申滋抱內疚爰殫忱竭慮綜苞元斂福之義冀以窺盛德之形容作頌九章章十六句謹拜手稽首以獻其辭曰天無私親親我聖清白山緑江仙果孕靈豐鎬配命攸暨宅京政治道洽曰時泰平我皇樂天而敬旦明惟敬日強與天健行埢垣峛崺禋柴迄成必躬昭事載契無聲右第一章敬天天眷是常前光普濩作求世德有秩多祜於鑠顯承謨列丕敘皇祖榖詒懷輯九土聖惟勤止昭哉繩武有密緝熙奠兹區宇訓録尋紬愾乎聞睹匪直禘嘗清廟設虡右苐二章法祖惟時惟幾惟日孜孜大書無逸曰民是依於皇涖政弗倦堯期批章宵永召對晷移巡河視海省方以時今仲春月登岱受釐陰陽寒燠庶徴勤思執兩用中庶績𢡟熙右苐三章勤政皇恩斯濊亮哉遍德廣厦細旃循度萬國皇心乎民民安粒食籽種屢貸賑粟屢飭三壤正供與民休息一二三四分年分域緩急曲籌豐􅀈黍稷老忭童歌忘帝之力右苐四章惠民堯文文思遵養重華器服甄鑑鐘磬樅牙彬彬禮樂訖于流沙藻摛自天光燭五車典謨雅頌匪直竒葩辟雍環海石鼓蒸霞玉府璧府津溯何涯穆哉敷教膠黌惠嘉右苐五章文治德威憺稜不戁不竦允塞皇猷九垠雷動式廓疆圉祁連卭籠南甸蹌奔西番騰踴海灣波戢交址星拱羔跪稱觥載沐天寵靡不率從款關接踵至德之光至仁之勇右苐六章武烈率土尊親物睹聖作聰明睿知有臨式廓維生安性而勉而學五事五常五德藴璞與時運行煥若顒若若淵靜深若天溥博史贊堯欽顔仰孔卓亶時卬瞻仁夀知樂右苐七章德運圖書表裏五五貞符以十成之福徴聖謨八十萬夀運協璿樞五代偹矣五福萃諸羲軒逮兹延洪孰如開韶宴胥渥逾賜酺式頌恩綍覃洽九區博厚髙明悠久與俱右苐八章福徴福首尊夀大德必得德無定名皇𢡟主極孔闡仁者姬銘恭則於皇繹思自天平格惟曰念耄寧論戒抑三星叶運六帝掩迹是繩皇祖時萬時億臣臚歡聲敬播樂職右苐九章夀愷萬夀恭紀十二申一篇湖廣總督臣畢沅臣謹案比事連引之體昉自枚乘之發張協則而擬之義在頌揚厥後為契為勵為召為述體製相仍然皆局於篇目鮮克鬯抒其詞臣今演而廣之為十二申用敷揚聖天子嘉祜純延申錫無疆之篤慶謹頓首稽首以獻昌符𢡟啓嵗協上章日月為夀星之次耿華耀於角亢豫浹陬澨遊和翺祥時則有衡湘耆叟問於江漢使臣曰戴景者蓲敷濡化者匝洽凱俊宜南惠颸掦燮飲和而順則者融矣繹矣爰昭景福爰展夀圖絣嘉綏祉逄涌桄舒臚歡歈於萬國慶遭遘於亨期遐稽史牒六帝不克擬演陳疇範八徴應乎時懿夫洪庥之稠疊洵𢡟演而豐施也徴應之著可灼知歟願使者其詳言之使臣曰權輿沕穆顯道維彰疇肇而闢疇淑而昌今者攝提協度蒼龍合紀調四極與四和煥珍符以延喜揆厥端由應期順恉昭假維天昭事維聖持久以恆抒誠以敬圓壇方澤嵗事躬親夏雩春榖偹致精禋繄蠲饎之上儀編大小而咸秩禮修於祡槱之崇樂嫓於英莖之節肅豆籩於几筵亮執事而有恪濟濟蹌蹌峩峩翼翼擬瑞靄以紛郁裛罏煙以馣苾薦嘉孔惠孚應如幾諶抒顒若常嘏陳釐齊璿璣於七政調瓊琯於四時玉燭融而朗爥金甌靖而恬熙劭吉綏以成裕致戩祓於福基逮集議於執徐定純常之儀注簡田步與升成欽攝齊之禮度締修忱於神縡翊對越而益虔紹升馨之嵗舉徴兆禠以引年耆叟曰淵哉斯誠保佑申而康茀祿矣然則昭敬洵我朝之成法乎使臣曰紹庭賡頌衣德傳書乃揚盛烈炳神謨軼羲軒之寶籙邁豐鎬之球圖奉丕基以繩武鞏億載之貞符盥誦繹思寶訓實録方略則開創分猷表傳則王公比屬襄亮采以飭功宣閎規以啓篤騎射衣冠弗忘舊俗禮器成圖式垂芳躅緬克艱之締造乃四詣於陪京雅爾哈則雄關仍號薩爾滸則豐碑勒銘雲雷締象雨露抒誠展匣韜之弓劒燦珠斗而流形佳氣蟠以蔥鬱崇規裕以長寧自仁率祖紀恩有堂宗親敦念蕃兆麟祥普言錫爵紹瓞綿長唯纘承之純固始綏福以流慶耆叟曰殷監成憲周作恭先迪光顯緒疇克若是其駿濯融延哉繼志之盛願繹敶之使臣曰晙旭升暉朏輪恆耀聖治光覃健行久照先春布澤未明求衣報章封事夕達晨披燭忱情於萬類體纎巨而靡遺奉巡隨輦絡赴庚郵程符遞進晷發無留卿辟時宣樞臣日接課績程材綸音胥浹殿陛涖朝寧依聼政燾覆惟公衡懸至正典學則春啓講筵肄武則秋行獮令嵗習為經時行維柄嶽牧述職使節乘軺俾抒忱以揚對奉德音以孔昭六載上計兩曹分銓百餘庶職並許覲顔澄官方以秩敘重亷法於班聨審黜陟之自取執大中以秉權計及閭閻慮周隱微普玉律與金科必順時而劑冝慎孜孜之至訓恆篤念以益蘉惟無逸以作所洵欽德之日強耆叟曰大觀在上洋為聖謨遐披道管達於扶輿願有述也使臣曰苞符煥采皇極敷言沛江河於瀛渤耿奎璧於台垣彚古今以函納集聲振以昭宣御詩五萬文逾九百珠璨日輝軒圖羲畫一萬有而六五經融神載而滋道脈奉至論以折𠂻合羣言而就敘三禮則區别仍聨三通則續賡兼補志方輿而九域披綿明職掌而百官潤黼評要之鑑史統宗審律之聲詩叶譜析脣堮以述微繪罍彛而鑑古崑崙辨黃流之源泰岱以白山為祖分編遞就四庫集成三萬六千以總薈絳青黔素以分呈帙較崇文為富體兼公武而精提要則總賅端末著録則標目簡明四閣分儲崇楣翼冀淵蓄澄瀅津濡瀝液源歸墟于瀛壖溯過潤於豐畢流傳副墨迪嘉南邦江介則三山得偶浙河則天一為雙洽柔逺於同文翻梵經於貝葉演上諦於三乘亦同時而就孴耆叟曰邃古以來丹書緑字之徴也斯雅治所由日興乎使臣曰文軌攸同敦崇實學頒經史於膠庠饒會垣之講幄章令新釐誦弦逺暨研律而調以八均通經而貫于五緯計偕時賦恩榜六開擷山韞川懷之秀廣南金東箭之才縵倬雲於碧漢滋瑞莢於堯階復有燈火絳帷風簷皓首名耀丹綸秩偕華綬擢材異等𢡟舉制科鴻詞則霞箋並擘經學則珠笈同摩書觀石室音矢卷阿蹕路陳詩胄襟獻賦凱被溫和澤先寒素凡登畯而興賢若巒譍而谷赴成均敷教詔建辟雍橋垂虹而夭紹水圜璧而沖瀜藻流香古槐結陰濃協中聲於絲竹宣閎義于鼓鐘乃涓吉朝行釋奠懿先後之合符肅梪登而嘉薦析古訓於老更聆御論而式燕周京石鼓輝映橋門篆結瓊而尚舊詩集錦而雕新釗儒修以惇誨敷醇化於昭文耆叟曰樂職中和雅詞並進大武九成願言其盛使臣曰義征不譓惟斷乃成天心祐順形為風霆繄西師之始舉羣情特以惶疑仰睿謨之夙定操神算於先機方伊犁之甫戡值降人之反覆屏浮議之撼搖不旋踵而收復既而回人助梗凖部交訌垤環聚蟻窠結攢蜂偵先行而斷後築長圍而急攻成衆志以持堅䇿援師以奮迅合旅衝圍分鑣並進烈烈桓桓星馳電震轂轉風稜旗捎月暈捷於燕然之師鋭於常山之陳大漠犁庭枿銷餘燼金川初討王旅嘽推乞降悔罪湯綱仁開繼乃封狼生狶土梟聨獍恃彼締姻擾兹九姓揚天威以靖逆耿井鉞與參旓嵎摧負虎崖墮驚猱穿側㕒以破箐騰絶厒而攻碉遂乃狐窮薰穴鳥逼焚巢煙澄露霽涷解雪銷臨清則一舉告寧蘭州則再加駢捷掃臺灣之橫氛渡樓船而瀾謐凡兹偉績悉稟淵謨䇿勳飲至宣示戰圖耆叟曰盛矣哉德威揚詡肇開版宇願遂言之使臣曰薄海時雍被光四表蟠木西回榑桑東繞宅中圖大環拱神京灤河抱塞承德新營𬗟古績於興中傳窣波兮三座乃廣勵於學官錫篆碣於墄左伊式廓之西陲地未闢於曠古熲逖照之景輝納八紘於闥户九達則遙分月􅒸三周則近指天山列雉而峙以環堞安鳩而帶以通闤引水成渠相土則壤華實之腴嵗登豐穰開屯設牧因俗宜民蔥嶺之右流沙之濵壁倚蓬婆雪融滴博橋接維洲雲鋪隴麥章亥東西之步商髙方廣之籌劉安志􅣹形於八索虞聳表穹天於四遊又孰如此之廣輪丕敘天闓滂流至於蒙古諸藩分旗久屬循峪路於伊綿取會歸而仰矚土爾扈特誠皈部全踰由旬之纍萬授逰牧而安便增環圖以益地信仁覆之無偏耆叟曰率土喁歡封巒望幸願述中謡用徴徯應使臣曰禮稱展義易著省方式昭盛典遹舉鴻章申嘉惠於星南乃六巡夫江浙越岫迎青吳波漾碧晃合鏡於重湖浮三山於一葉泰岱則練卷天門嵩嶽則闥排夏室兩沽之水𨗳漢津五臺之葩輝佛日編耄齔而歡迎契宸𠂻以豫悅瞻御輦所經過荷聖慈之軫恤祇衢路以掃除泯絲毫之供億虔登禮之修秩溥慶澤之覃施階登亷善録及矜疑秀野蜚英之彥童酡頥夀之姿俗以三登而𢡟材寧一眚而遺試習流於奔溜懷挾纊於暾曦胥懌歈而鼚舞咸隨忭于鸞旗爰覩天章麗旭睿藻磨崖敘便程於成作協阜庶以雍諧炳龍文之璀璨耀糾縵於平階耆叟曰以豫以逰載翕允猶願進言之使臣曰伊大河之南注也合鋪敦於淮浦𨗳洪澤以沇溶逮迤揚於淵獻乃告漫於儀封沷考城而瀆漾溢沛澤以毗豐維軫念之孔殷命重臣以相度承指授以機宜由地行以疏瀹濬下演之盤盓瀦旁流之汨柏修防既鞏引派斯長湖清甓社浪靜陶莊雲曵金門之口風傳銅瓦之廂既乃因勢回蟠合流順導仍歸德之古隄搴長茭而奏效送箭於安東顗廬居於四墺藉刷黃於韋繞詔審定乎淮源出曾巔而􅟫􅟫乍平縈於井幹潔清流以率軌徴逺慶乎寧瀾若浙海之隄壖迭元明而峙護覘北漲而南坍涌灘沙而復互鹽倉則湍沛中回范塘則潏湟中赴編薪禦其急衝揵石垂其永固兹江流之回洑剗中鬱之蘆洲亘虹隄於荆岸咸􅀈奉夫宸猷耆叟曰瀅澄流水為源為委茂澤時承請言其渥沛使臣曰孚如禕哉大聖人之裕民有加靡已也沍雪瞻雲晴雩望雨省耕劭農延嘉含哺偏隅小沴恩與恤除遂瞻依以愜願恆軒舞乎中衢被春膏以滋豫更優給而賜租洵所為原泉溉濯而踵頂敷腴者矣請言其大者翔和純洽正賦四蠲重茨梁於露積潤閈井以雲聮衡量則京垓積秭多稼則三九增綿繄豐時之迭屢更益道之悠延青穭培以再熟丹頴秀以雙連溢倉箱而藏富裛至和以演年又如嵗漕東南天庾正供渠澮川通舳艫雲擁奉德音以再免霑普惠于耕屯餘秫稌以億萬充倉廯以鋪麟繇豐亨于恆久洵史䇿所稀聞酌衢尊而共飫僉躋堂以熙春耆叟曰暢紀濡延黃綿崇疊至治綿馨共球斯集願進言之使臣曰我國家之光宅區宇也西汃南濮悉奉尊親通于虬户達以雁臣今者逢泰運際昌辰榮光鐘宇舊采連氤含生負氣向化歸仁思獻琛以納順隨輯瑞以來殷昭麗日於天中耀遐垠以煦育南徼被其優沾東畨申其瞻矚滇雲南指地維朱波願受封而請號仰溫綍于鑾坡進駢田之驃樂隨案衍而登歌南掌屬國貢象丹墀稟梁山之陽質偹肅穆于朝儀逺域敻邉曰廓爾喀占風雨而如期踰梯航而得路識聖化而屆誠陳貢函而結愫景開北户地接南交藩王效恪入覲天朝伸祝釐之至願偹寅列于班寮洵上德以徠逺協儀舞于簫韶耆叟曰醇化便章康歌衢笑獻祉呈祥願言則效使臣曰信乎休嘉凱豫之氣磅礴于廣輿也聖天子德昭春茂化與日舒八旬萬夀之典猶欲謙而弗居繼乃以寰海內外臣民之籲請也爰順輿情舉茂典乃復申諭臣工務時朂勉調雍洽以安民期奉職之無忝華黍豐和聿稱上善黃􅓿丹秬之詞徒形曼衍也慶遭國夀千叟承恩列階抃拜黃髮如雲百齡演算人瑞標坊合居數世雍睦同堂四男駢舉提抱曽元斯其為實著之祥乎凡淵騫而山聳若近闕而依光願率楚南北之臣僚士庶北向稽首而上萬年之觴耆叟聞之相與鼓舞而翺翔八旬萬夀盛典卷九十三
