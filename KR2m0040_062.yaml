body:
  text: 欽定四庫全書八旬萬夀盛典卷六十二恩賚一本年恩詔一臣等欽惟我皇上泰運輯釐寰宇均被五十餘年中慶洽恩滂莫能紀數自古稀大慶稱祝未俞恵施仍溥迨夫國慶重逄式敷渥賚實昭千百代未備之規模蓋帝王之恩以綏夀與帝王之夀以廣恩有推暨於靡已者我皇上之恩皆本天祖之恩以為恩天篤眷而祗承申命之庥祖詒謀而逺紹錫光之慶惟實心行乎實政斯大夀沛以大仁兹屆八旬蕃祉徳音鬯發既特先登俊之科復重申普蠲之令䦕詔布愷詔謄廿有二條廣殿賜酺典茂十年一舉東廵以薦馨祈福秋覲以行慶示慈内自王公卿尹下至工商藝事之㣲外而藩服君長以逮陪隸奔走之衆莫不輸忱効祝即莫不優賚普霑極非常之異數是我皇上萬萬年錫福敦仁之元化益叶萬萬年頤夀保泰之貞符揆諸御論恵心恵徳之㫖所謂勿問其施亦不計及人之愛戴者自然而無施之弗溥無愛戴之弗殫其誠元吉有孚民說無疆應斯象也從兹大介洪龎頻宣闓澍中外淪浹奕禩垂光詎僅兹簡牒所登遂足以揚淳而闡澤也歟乾隆五十五年皇上八旬萬夀正月初一日御殿受賀禮儀特頒恩詔諸臣民於天安門跪聼宣讀禮臣欽奉頒發如制奉天承運皇帝制曰朕誕膺景命䖍鞏丕基思錫極以用敷凛聿懐于昭事於今五十五年矣仰荷上蒼篤眷列聖詒謀㝢縣乂安朝宁雍肅宫廷之上五代一堂垓極之遥萬方同軌粤以今兹八月為朕夀届八旬前因籲請諸臣勉允祝釐之請亦既恩敷多士特䦕登俊之科而且停貢獻之繁文禁郡邑之私祝務黜華而崇實諒孚徳而恵心廼者阮光平不戰歸誠寵畀藩封之爵廓爾喀騰歡靣内長依屬國之班緬甸荒陬遣使逺呈金表生畨異域輸心來叩彤墀矧夫内郡耆氓外藩夀耉逾期頤者千餘計見曽元者二百家嘉和㑹之咸勤屬享王之畢至朕撫延洪之運躬宵旰之勞問夜求衣劼毖倍厪於宥宻廵方肄武精神式固於純常厯年陳無逸之篇終日勵自勤之訓惟徳惟勤恤将敬為受天永命祈曰夀曰康寧聿慰我薄海羣黎望昔卌五載古稀介景推仁曽逮閭閻迨五十年國慶重熈恵下復頒綸綍獲此久長之祉彌殷懐保之忱我皇祖聖夀六旬先普蠲夫惟正予一人恩施三沛仍祗遹以攸行凡所以引養引恬並切夫求寧求莫是用龎鴻佈澤單緝熈夙夜之心惟期溥率翔和綿保定升恒之盛所有應行事宜䦕列於後一五嶽四瀆等祀及風雲雷雨火各神應遣官致祭著察例舉行一各直省有同堂五世者著各督撫查明具奏賜予恩賚一自王公以下覺羅十五嵗以上者俱加恩賜一公主以下至格格俱加恩賜一王妃以下奉恩将軍妻以上年過六十者俱加恩賜一外藩王貝勒貝子公扎薩克台吉塔布囊及其福晉妻室年過六十者俱加恩賜一滿漢大臣及命婦年過六十者俱加恩賜一内外滿漢文武各官俱加一級一内外大小各官除各以現在品級已得封贈外凢陞級及改任者著照新銜封贈一内外文武官員有因公罣誤降革留任者該部查明奏請䦕復一國子監貢監生及各官學教習免坐監期一月一各省儒學以正貢作恩貢以次貢作嵗貢一滿漢孝子順孫義夫節婦該管官細加諮訪確具事實奏交禮部核實旌表一滿漢兵丁曾經効力行間因病年老閒住者著加恩賜一八旗滿洲䝉古漢軍兵丁及内扎薩克喀爾喀等䝉古年七十八十九十以上者分别賞賚至百嵗者題明旌表並加賞大縀一疋銀十兩一軍民年七十以上者酌加賞賚八十以上者給與絹一疋棉一斤米一石肉十斤九十以上者倍之至百嵗者題明旌表並加賞大縀一疋銀十兩一各省道路橋梁間有損壊者著該地方官查明修理以利行旅一各省現犯軍流以下人犯俱著减等發落其在配軍流人犯已過十年安分守法别無過犯者著各省督撫分别咨部查照向例核議奏請省釋一各省監禁人犯著将上年秋朝審緩决至三次各犯仍照節次查辦之例查明所犯情節分别减等發落其緩决二次人犯内有案情本輕可予矜原者亦著該部查明請㫖定奪一各處養濟院所有鰥寡孤獨及殘疾無靠之人有司留心以時養贍毋致失所一從前各省偏灾地方所有借給貧民籽種口糧牛具等項查明實係力不能完者着予豁免一厯代帝王陵寢先師孔子闕里應遣官致祭著察例舉行於戱予惟從欲以治庸降徳于衆兆民天其申命用庥綏眉夀於皇多祜布告天下咸使聞知皇上御殿頒萬夀恩詔儀正月初一日昧爽鑾儀衛官預陳皇上鑾儀樂部官設樂禮部鴻臚寺官預設詔書黄案于太和殿内東旁鑾儀衛設黄蓋雲盤於丹墀内禮部官設龍亭香亭於午門外工部官設金鳳於天安門上正中設宣詔臺於門上東第一間内閣學士具朝服恭捧詔書安設於太和殿内東旁黄案上恭俟皇上陞殿受慶賀禮大學士捧詔書至太和殿簷下授禮部堂官禮部堂官跪受由中階左旁至丹陛正中安設於黄案上行一跪九叩禮跪捧詔書起由中階降禮部官捧雲盤跪接詔書安置雲盤内舉起鑾儀衛張黄蓋由中路出太和門文武百官朝鮮安南琉球暹羅使臣暨廓爾喀來使等由昭徳門貞度門随出是時皇上受賀禮成還宫禮部官捧詔書至午門外安設龍亭内行一跪三叩禮鑾儀衛校尉舁亭香亭在前龍亭在後樂部和聲署作導迎樂御仗前引禮部堂官司官随至天安門城樓捧詔官於龍亭前行一跪三叩禮捧詔書至髙臺設於黄案上龍亭香亭移設於天安門前正中文武百官於金水橋南按翼齊集鴻臚寺官贊排班贊進文武百官皆排班北向立耆老領催另為一班俱随排立宣詔官登臺西向立鴻臚寺官贊有詔衆皆跪宣讀官宣清漢詔書訖贊叩衆行三跪九叩禮捧詔官捧詔書置朶雲内綵繩懸繋由金鳳口中銜下禮部官接受仍安設於龍亭内由大清門出樂部和聲署作樂御仗前引至禮部望闕排列香案禮部堂官率司員行三跪九叩禮恭鐫詔書頒行天下禮部謹奏為奏明請㫖事查定例恭遇慶典頒發恩詔臣部鐫刻謄黄頒給在京王公及各部院八旗等衙門至各省應頒詔書於内閣中書各衙門筆帖式内揀選咨送臣部掣簽由兵部給發勘合前徃頒發每次敬謹遵行在案今年恭遇皇上八旬萬夀頒詔天下臣部恭鐫謄黄将應頒之王公及部院八旗照例頒發外其各省将軍督撫提鎮應派賫送人員行據各衙門陸續移送到部照例令各該員掣定處所由兵部給發勘合遵照定限恭賫詔書前徃頒發再朝鮮國應頒詔書例應奏𣲖大臣侍衛賫送如遇有該國使臣在京俱經臣部奏明即交該使臣帯徃以省紛繁此次正值該國年貢使臣在京其頒發朝鮮詔書應請即交該國使臣帯徃理合奏明請㫖㳟候命下臣等欽遵辦理為此謹奏請㫖乾隆五十五年正月初八日奏本日奉㫖知道了其安南琉球暹羅三國亦著照朝鮮之例一體頒發恩詔即交各該貢使賫回初十日命於乾清門頒賜恩詔於朝鮮安南琉球暹羅等四國是日命宣朝正在京之朝鮮國正使陪臣李性源副使陪臣趙宗鉉安南國正使陪臣阮宏匡陳登大副使陪臣宋名朗琉球國正使陪臣向處中副使陪臣鄭永功暹羅國正使陪臣丕雅史滑里遜通那赤突副使陪臣帕喎汶悉呢􅀈喔撫突等恭詣乾清門頒賜恩詔一道各使臣欣幸祗領恭齎回國朝鮮國王臣李祘言乾隆五十五年三月二十六臣欽奉詔㫖遵依䦕讀訖竊伏念乾隆五十五年八月十三日欣遇我皇上八旬之寳籙彌光萬夀之聖節載届茲莫非皇天眷祐列祖篤慶化仰無内而無外南斗増耀誦如升而如恒上世罕聞遐裔同忭以至海隅蒼生舉莫不蹈舞歌詠于仁夀之宇猗我熈朝無疆之庥億萬斯年於戱盛哉臣與一國臣民瞻北極而馳誠頌南山而獻夀不勝慶忭之至謹奉表稱表稱賀者臣祘誠歡誠忭稽首頓首上賀伏以九五福曰康曰徳調玉燭于㤗階八千嵗為春為秋鞏金甌于夀世事曠簡䇿歡溢屏藩欽惟皇帝陛下一徳統天萬方歸聖澤洽雨露囿動植而徧覃仁覆帡幪涵蠕翾而並育肆當躋八袠震夙之慶益仰逾五紀臨御之庥瑞日方中於麗天均億兆之戴徳昌辰載臻於誕月欣千一之膺祥猗歟百禄之來崇展也四海之咸慶伏念臣北拱誠篤東漸化霑魏闕懸心跡阻塗山之㑹玉華封祝聖願殷海屋之添籌臣無任瞻天仰聖歡忭慶幸之至謹奉表稱賀以聞安南國王臣阮光平言乾隆五十五年正月初十日臣遣謝恩使臣阮宏匡等在京䝉皇上𫝊㫖特賜萬夀恩詔俾齎還國臣不勝歡幸蹈舞感荷無涯㳟即良辰九頓祗領謹奉表稱謝者臣光平誠惶誠恐稽首頓首伏以璿圖廣運洽萬方和㑹之庥鼎籙光昭備四海尊親之戴仁風載韙際溥率於紘埏慶澤均覃景來同於玉帛懽騰區宇喜溢寰瀛伏念臣僻處交南殷懐拱北前者抒誠羾牘荷批荅於丹毫重以頒勅函封示成全於紫綍備極鴻慈之難報何圖鸞詔之並承十行乍啟恍玉音之親聆一視同仁匝海邦而咸忭榮出恒例寵冠諸藩兹葢伏遇皇帝陛下夀齊天地徳備照臨懿茲八萬嵗悠長之祚遂令鰈國與被龍光臣惟有仰戴恩綸䖍祈聖算寸心向日快軒紀之同符萬里瞻雲企堯廷而獻祝臣無任瞻天仰聖榮忭依感之至謹奉表稱謝以聞琉球國中山王臣尚穆誠惶誠恐稽首頓首謹奉表上言伏以皇春布澤闡乾坤悠久之符聖祚凝庥垂日月升恒之照鼎来諸福同九㝢之車書賁若大文焕三霄之綸綍羣方志忭逺裔臚歡欽惟皇帝陛下中和建極仁夀推恩化成久道調玉燭以乗時運洽重熈撫璿衡而集瑞欣遇聖齡之八袠誕敷恩詔之十行臣穆備藩外島効職中山夙荷至仁如天莫伸仰酬于萬一欣被陽春及物屡霑優賜于再三臣入貢陪臣紫巾官向處中正議大夫鄭永功等賫捧欽賞詔書到國臣九拜祗領並與舉國臣民宣述天朝鴻化愷恵敷于八夤盛世徳音聲教廣于重譯預承渥眷曷罄愉私伏願嘉釐茂介寳籙洪延九如備福稱夀斚而祝南山萬國朝宗積仙籌而盈東海臣無任瞻天仰聖歡幸感激之至謹拜表以聞暹羅國王臣鄭華誠惶誠恐稽首叩首奉表大皇帝萬嵗萬嵗萬萬嵗伏以福錫昇平太和翔化于宇宙夀徴悠久大年齊量于乾坤鴻仁逺被合山陬瀛澨以臚歡涣號式頒胥鰈域鶼邦而誌慶猥以海隅之率俾屢承天上之恩施欣逢大皇帝陛下萬年寳祚八袠昌辰如綸如綍揚景命以維新為龍為光宣徳音于不已臣情殷祝嘏職備獻琛未遂率舞于堯墀惟効焚香於斛國兹者進貢使臣丕雅史滑里遜通那赤突帕喎汶悉呢􅀈喔撫突等歸自天朝捧来恩詔不遺踈逖之列竊預頒賜之榮顒瞻日出九重之鸞誥騰輝𫝊告波區萬里之鮫人動色極亘古未有之異數增舉國交慶之下忱臣不勝榮幸歡感之至謹拜表以聞臣等謹案詔令之布昉於漢初凡恵下之政随事定名其志博而言典者如親祀求賢賜爵優老勸農免租議律頒赦諸大端要皆宣布煌煌載在書䇿顧或以荅有司或以令列侯或偶行於方外之國動以徳弗及逺為言曷若我聖朝緯理乂安萬方同軌温垂丹綍極鬯垓泝埏之盛風敬惟臨御以来覃恩之詔凡十次徳施所逮洵乎一人慶而兆民頼焉廼者舊𨽻之藩封新歸之屬國先春入賀遣使来朝欣逄正夀頒綸預承寵錫捧歸瀛裔舉國騰歡詫為亘古未有之榮幸中庸所謂聲名洋溢施及蠻貊凡有血氣莫不尊親者誠有如斯燾載含宏日月環照之量也矣臣等㳟載恩詔冠端附以四國賀謝表章以徴漸被之感而詔欵内事𨽻各部及外省題咨内部議覆得㫖允行者謹案照欵目實事實数以次臚叙於後八旬萬夀盛典卷六十二
