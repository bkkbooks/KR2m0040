body:
  text: 欽定四庫全書八旬萬夀盛典卷九十四歌頌十四萬夀恭擬江淮擊楫謡九章謹序漕運總督臣管幹珍臣嘗考洪範九疇次八庶徵曰九五福而以夀居福首蓋王者念用時敘休徵洽汁於時珍符闓懌之氣鴹萃一人之身天用眷於有德沓祉厖褫罔弗攸俾􅞗應之理有如斯者我皇上健行不息靡日不以敬天勤民為念臨御以來文德敷武功鑠宙合宴謐荒憬遐鬯雖古稱太平之盛無以加諸而猶孜孜於持盈保泰之道厪厪於斂時敷錫之原宜其綿瑞産嘏與天無極矣嵗庚戍仲秋之月辛酉恭逢聖夀八旬開帙之期上方旋蹕自避暑山莊受臣民慶賀禮景雲叢聚八風循通五世一堂繩繩翼翼凡踰沙軼漠棧山航海之國俱以次叩關來朝洎夫禮官儒林惇用篤誨之士鯢齒梨眉鮐背之叟莫不抃蹈衢壤頌天子之萬年皇上乃申錫無疆之庥滋液滲漉復田賦賚粟帛開特科攽曲赦既有詔施行復命鐫玉為寶曰八徵耄念仰見省嵗之殷敕幾之謹夙夜不敢康聖人之情見乎辭視彼延夀之刻及觀河拜洛獻媯遊扈之説相懸奚翅億萬耶臣以懵學玷侍從洊膺寵數拔置卿二簡督漕庾一年于兹每往來江淮間聞篙師棹郎沐膏咏勤之語居多言雖不文而順則喁于猶有扣轅擊壤之遺意謹裒采為謡九章敢拜手稽首以獻懿哉聖德恆久離章梯霄磬域躋爾夀康荃宰俯鏡降祉滂洋青龍在商橫夀星見於丁方八千椿算開無疆星輝虹繞駢轃乎五代之堂山膏潄醴河潤榮光盧牟六合而不言瑞惟雨暘燠寒風時乃是用蘉丹文赤篆蟠螭截肪照灼圖牒兮孕虞育唐其一灝英旋樞若鼓有楟至誠無息則圜而行合天地數為五十有五席蘿圖而奠清寧六􅛍斿乎江介四展謁乎豐京翕河抱溟檢岱禋亭洋嗈協軫其聲中乎韶韺氓羞幸覷吏礪端平四海之內咸承風濯俗以答􅀈而效靈吾儕蚩蚩如踐旄敦而度髙酌汍濫而窺深曽何能磬萬一之名其二奎曲縟景緯儒館為淵源宸翰十萬第甲乙豈數葛天八闋堯神人遊羣玉之册府緑函緗帙籖幐爇藝嵗給上谷墨月縻大官紙三萬六千軸載以瑶華輪自天祿延室以達於外史抗七閣為通津洪教闡象載一再譯同文審三微晞七均采歸昌命伶倫驥毛虬甲獵碣十辨宗韋韓斥紛綸編琲疊璧媕周雅緑槐黌市重鐫珉哂曲學之瀐澀幸演迤乎糾雲其三泰儀斡運威噞秋霜神武七式粵振旅自金方回凖革靣犁庭掃穴置耕桑􅀢瓠通譯促浸拓疆蠢彼蘇田臮林莊震蕩懾栗揮天槍南漸島崓西隴羌譬若風隕蘀海澆螢曽不匝月而殱夔魖與獝狂洗兵刷馬鋒銷燧障萬里一坰尉候相望願世世長為安樂氓其四燾幕遐敻縯紘垓埏我皇道平平竁􅒸何逺陬澨何偏東南徑二萬里西北之廣倍焉青海澔涆渌江淪漣嵗一納賮浪舶駝韉兹白之獸獻驃國徠控洱而泝滇鳶瘴簪鼓球江彗鋋承天助順奠彼山川廓爾哈面內欵塞居延凡白澤之未圖大章之未步西王母之未獻疇勿登我爻閭菉幣之編其五曲臺眂上儀遺年古未有渥瑞兹龎鴻帝曰人惟舊圜流建橋門送拜迎三夀茨階㪺衢尊需雲飫千叟乾元開大酺丞尉致羊酒哂彼元會儀較此瞪乎後瀛嶽篤蕃禔纍牘入函奏禮官甲乙科窮經紛皓首賚秩均有差署年量從厚老臣帝座旁髙領彭佺袖聞喜宴重遨嘉話洛中九恆春蒲栁榮南山松柏茂其六斟元鞴化觀文以成釐正宗黜絺繪詔自今決科其課試夫五經際闡禧而晉帙廣翹材以育英桐岫簉翼桂譜搴榮羾奎垣而旁魄爥藻儷兮漢京充庭金箭匝序笏纓上乃念虔鞏于有位凡百執事洎卿大夫各就見階進一秩俾寵告于爾所生鳯銜十賚翠章淑旌僉含和吐氣而頌德聲其七察鳸調鷃井壤登豐均振迭蠲俶𢡟田功維醲化汜濩隱賑視赤緊望差上下中普免天下惟正之供顧猶厪茨簷之卑處恐實不至于劬鴻其今占名田雇力者毋收今年租庸梠無懸耜野有滯種它如豁逋牒恤孤􅀢禁罔濶圜土空晷緯景應長庚春融允宜槱燎薦熂疈辜升中告綽綰于名山大川百神秩祀之宗其八戴穹圓者不知昊縡之巍巍依陽曦而宅照不知皓靈于何胚胎堯襟舜抱詎聞思擬議所能賅恭維八旬天子念八徵疇圖表裏相根荄先天卦位昉成數從茲泰元增䇲自萬有一千五百二十遞推衍夫億兆亰垓瑶光下燭星雲回我皇萬夀萬萬夀有如此稊米之積川之來稊米之積川之來呼耶歈唱歌臺菜敻乎盛哉其九萬夀恭紀七言詩一首柏梁體二百韻謹序吏部左侍郎臣金士松皇帝膺圖御宇介受純祉五十有五載嵗在上章日月會夀星之次其辰辛酉恭屆八旬萬夀昌辰寰瀛凱豫充被熙和粵若初恩言肇宣詔開春秋甲乙科蠲四方惟正之供乃月正元日頒溫綸敷慶澤普錫福于四表辨于上下神祗咸秩乃昭燕于廷山豆瀛尊佅僸率舞太史告百穀之瑞兆于田功爰撰令日祡燎泰壇嘉貺絣答遂東巡泰岱祗禮孔林令章備舉問俗陳詩百工黎庶大和會五月鑾輅幸避暑山莊羣藩翹跂奔走偕來徼外曠逺屬國輸琛納賮南交君長親覲祝釐願受冠帶矢長列藩服懿夫聖德之廣被靡逺不暨也維時共球之集揚逖率邇協滙于亰師輯昭王會軒舞迎鑾樹頷竦􅖪思旅底厥悃皇上乃順輿情懋舉盛典膺延喜之玉晉萬年之觴越在內服王公卿尹庶士百執事越在外服嶽牧羣有司暨里居耉成人僉瞻矚丹墀虔祝聖天子祜篤融長之運純純常常奕奕允自今寶算延洪天庥滋至其周于元會運世如環斯循申翼以萬億年臣備員卿二侍直內廷飫聽歡歈竊慕賡揚之義惟七言昉于漢世而全篇備自柏梁謹仿其體成千四百言遭逢之盛視尹吉甫召虎之倫實逺過之臣不勝大幸不揆媕陋謹拜手稽首以獻其詞曰光融夀宇舒延覃角亢星麗瑶階南庚長戌茂景曜占成嘉于酉月日兼卿雲藂藂醲露馠駢祥輯祉和氣涵純常寶算瀛籌添八徵帝念感至諴承滋納凱調和甘榮光鏡宇通蔚藍元正丹綍彩鳯鵮與春偕來澤普霑昊縡契合帝德欽苾芬肹蠁親奉歆每嵗躬舉大祀三圜壇方澤昭事嚴執徐之嵗集議僉方成田步夙所堪簡儀倍致崇肅瞻閲久無斁天心監泰一神䇿啓佑深如幾如式調和愔仰惟謨烈天與參紹衣繩武昭誠諶灌秬對越升香馦虔奉册寶輝珠函豐岐四詣瞻旌縿雲雷締造神威戡伊薩爾滸豐碑劖紀恩之堂貽橚椮松風萬壑開晴嵐瓜瓞引紹緒遞􅀈宗藩錫宴歌懕懕聖皇勤治日照臨百工信飭功績廞封章批發時無淹寧依聼政曦光暹樞臣日對承綸音嶽牧時覲來駸駸諏咨民隱宣幽隌金科玉律釐洪纎與時攸宜民所忺官方澄敘計上廉因材而篤辨杞柟蕩平遵路無頗譣眚瑕洗滌恩波沾慈雲覆被芳澍􅬆時巡展義春和湛南國六望鑾旗毿維茲浙海臨沙溓兩山夾峙排赭龕三亹吞吐回潮濫親臨相度懷民碞長茭用楗巨石嵌北岸漸漲南坻坍范塘鞏固聫岈㟏籌河豫計波澄湉憶昨儀漫工懘惉徙清河議徒詀喃北崇南庳形勢覘金門遏溜風卷􅀈歸德古隄舊鑿鏨因髙培厚融泥黏瀾寧淮甸茂秫稴天門練卷雲襹􅗒嵩髙漢柏蟠蒼岑兩淀緑鋪伊水衾五臺花馥栴檀林經過翠輦民樂妉春膏疊被饒浸潭優租賜復濡列䦲鏐牌捧持錫髮鬖黃綿溫换冬衣襤寒原翹秀精擇撢書升論秀增新銜苔紋湔濯潤雨􅀢稠華上黍苗䅧䅧水青羅帶山碧簮象契仁智諧宸襟懸崖睿藻鐫瑶瑊彤霞萬丈披層霒益道長裕孚惠心林林環繞歌有壬夏而平糶滋玉䊤寒給糜淖春生鬵便程補助增飽饜更昭茂澤普沃漸四蠲正賦潤閭閻穫登再稻繭八蠶隴翬翟羽桑飛鵀春臺納豫薰含㶣墉崇百室凌阜􅀈羔羊朋酒頥老鴆力田孝弟俗靜倓運漕再免翔南帆屯衛優洽蕃丁男通庾充溢鋪􅭜􅀈四時玉燭融和􅀢八荒暨訖通鰈鶼疇或渝教煩戈錟天鑒順佑逆者􅨹井鉞煌耀參旗緂帝握神策操玉鈐電驅雙轂颷馳驂凖噶爾部元餘􅑒兩和卓木狼噬貪天戈所指光熊􅀈威㥄貙兕批虪甝雪搏圓礫月鋭鐮天山瀚海鉦鼓儳犁庭掃穴騰金鐵論昭解惑息衆􅠗金川負固逋鼪䶃攻碉氣振凌巖巉霧衝叢箐剪密筨巢穿鵂鵩窟取毚遂使鳥道成平巖鴻圗益地通崟㕋里闢二萬韜弭函安西屯種渠引新疆雪水洗鹵鹹嘉禾翼秀蕫莭芟維州麥稞環韭籖宅畋樂業飽且酣暍蔭樾下松檜檆回孽競閧兩用餤折箠旋踵收猲獫臺島鯨突化觸麙鹿耳波涌迎祥帆榑桑曙色消氛䘲凱歌海外和聲韾悉稟睿算揚威銛武成九告逖逺詹詔繪紫光肅劔鐔戰圖宣示輝旗綅勒銘紀績謨炎炎埏紘齊軌舒帷幨同文雅化敷閎談典學稽古聖性耽集成四庫供搜探永樂舊典驅陳蟫獻書不待邀帛縑舟車捆載留梅黬鑒别誰區圭與㻸經進乙覽排藝籖折衷至訓昭古今經子奧義窮深湛史集垂後徵信諶逺紹上溯雲師郯掌故間及稗乘談四閣翼翼度廣尋𣲖分南國三江潯亦如星宿拱彩蟾流貽善本梨棗槧傳鈔並許伸畢占教澤䕻土霑時霖御詩五萬諧韶咸鴻文二集天筆拈奎壁璀璨開雲緘詔開圜璧溶流瀐香生芹茆槐披隂禮行釋奠排旌彡御論義符敬勝針作君作師位並任集成石鼓鎸珉琳橋門觀聽環胄襟士不談道樵夫慙或鉏而帶或織簾繹思經訓味粹醰六開恩榜采箭金中林棫朴鹿野芩宣㝎律吕審玉玪重敏迭栁分清耹黃鍾響詎同􅀢甔中倫古調無差侵熊朋來瑟薑夔琴一音一字辨堮􅬺訂全詩譜黍析孅慶隆進舞輝􅢹􅢹中和備樂調彀綝克諧聲叶來儀禽即今諸國納賮賝暹羅踰渤通航􅻽南掌呈象竒毛傪名香西藏宣馣􅴭臺畨旅致眀月蚶緬驃錫命感覆盦廓爾喀進貝葉函交藩躬覲南指針請奉冠帶孚厥愖五福五代堂翬簷夀民夀世嶺髮黅瑞人坊斫山嵒嶜曽元提抱調和鹼嘉徵駢萃化宇恬聖敬悠久持以謙皇極敷錫周蒼黔中衢之尊共酌斟九如晉祝臣民諳萬方鼚舞同歡吟萬夀恭紀四言詩一篇三百二十二句謹序吏部右侍郎臣沈初欽惟我皇上御宇之五十五年秋八月恭遇八旬萬夀聖莭先是嵗庚子羣臣以皇上夀躋古稀籲詞祝嘏聖德謙沖不允所請至是又十年天庥滋至聖夀益隆鴻施駿業顯懿景鑠率土氓庶咸願上萬夀無疆之祝中外大吏覩羣情之恱豫合辭請舉慶典乃發德音覃慶惠滋液滲漉暢垓泝埏自元旦賜宴羣工孟秋之月于山莊宣奏鈞樂肆覲藩服蹕旋亰師屆慶辰御正朝受賀自王公以至卿尹庶司舊藩新部抃舞欣暢莫可名言煌煌乎千載一時之遇也粵稽自古帝王大德得夀無不多𩔶年所誠以聖同乎天天之行不息聖之誠亦不息天之命不已聖之德亦不已所謂同也然而伊耆之惇九族未聞詳臚子姓姬后之育百男亦未聞迭見曽元則受天之祜雖昌而大猶未極其至也蕩蕩之德巍巍之功純純之祉繩繩之慶􅀈有盛于今日者乎皇上猶兢兢業業日慎一日既于七旬萬夀之年製古稀天子之寶副以猶日孜孜並著説以申其義兹復取洪範次八念用庶徵語篆八徵耄念之寶又副以自強不息御製記以寅承昊貺敷錫庶民乾乾夕惕日進無疆為念是猶書無逸之文于屏揭戒得之訓于堂薄海臣庶咸喻皇自敬德祈天永命之至意所以壇廟大祀必皆躬親行禮今年復宣諭禮官中祀皆親詣一周以昭誠敬諏二月初吉舉東巡守之禮躬秩岱宗展謁闕里聖容穆穆不懈益虔健行之德與天合符洵嘉樂之詩所謂受祿于天保佑命之自天申之者也德孚于上光化于下夀期頤者以千計見曽元者二百家和氣醇化涵濡浹洽耆民耉長仰副夀考作人之盛矧復皇風溥被浩蕩靡涯異域荒陬喁喁慕義自古聲教未通之國無不稽首闕下恭獻夀巵臣等敬編萬夀盛典一書于天章聖德典禮恩賚圖繪歌頌六門之外復增聖功盛事二門誠足卑塗山之玉帛而軼爻閭之車乘矣臣獲侍內廷目覩皇上盛德大業炳麟逴躒冠乎謨典欲效詩人詠歌之義以宣上德而達下情而管窺蠡測不能揄揚萬分之一謹撰四言詩一萹拜手稽首以獻嵗在上章支直奄茂月應金穰星見弧宿皇帝陛下八旬萬夀協氣和醲化洽厚庶彚欣誾羣生阜富中外受福莫不瞻就羣工籲祝勤懇敶辭乃下俞旨乃沛恩施天子若曰豫思民依豫代昊蒼惠此庶黎貸汝稅賦汝家用肥賚汝粟帛汝老用依豫宥汝愆襟恤圜扉其汝卿士用錫爾禧典命晉秩禮官布儀簮𥚑蹈舞戴我皇慈聖懷謙沖慎德若始曰時庶徵豫永念爾八十曰耄記在曲禮天惟顯斯敢不敬止遴玉鎸篆遹示深旨八徵耄念厥寶莫擬既作大寶大文爰記奉天惟寅視民猶子孜孜自強有進靡已于赫我朝受命孔長戰薩爾滸威㥄丕揚列聖遞嬗緝熙重光昌基景祚畀於我皇我皇建極文武聖神聖不自聖舊章率循陪都四蒞南國六巡製全韻詩羮墻儼親史宬峩峩實録藏珍我皇欽觀間日一陳凡大謨訓是奉是遵萬幾之繁綜覽魁柄批答封章敷宣詔令監司牧尹下逮一命召見引見用人必稱有隱必陳並觀兼聽疇倄厥職帝則有慶疇曠厥官帝用董正聖人無心遇事立應若水鑑形如天正性埏埴萬類乂安兆姓捍海治河隄防綿亘相度平險擘畫緯經巨費發帑咸奏底定皇錫庶民曰大賚爾蠲租者再惟嵗丙已蠲賦者三逮今四矣富藏閭閻力𢡟耘耔偏隅或歉帝用厪止展賑常賑命善經理及告豐登皇心乃喜詔封疆臣雨雪嵗啓陳奏稍遲責其懈弛有涉祥瑞必戒其始環顧隰原髙廪錯峙邉屯之外亦穫秬秠沐浴歌詠綏屢樂只對時育物建極敷言日新富有積數萬萹敬天勤民盛德聿宣倬矣雲漢浩乎淵泉至文昭布闡揚精詮理潔其綱大中無偏古所未發今則躍然意愜辭卓旨立義堅與道為體因言以傳王謨帝典聖備其全苞孕星嶽琢磨方圓化成天下是為衡權心法治法一貫斯文用合神妙功參地天諸家説經傳疏注箋睿解訂訛識據象嶺周觀前史得失糾紛丹豪評隲剔隱抉根覺世衷聖垂訓體乾搜輯羣書四閣四庫既刋聚珍復頒三部全書之副詞垣是貯日下多士均俾傳布翼翼太學羣材受鑄爰建辟雍式周矩度親臨講學圜聽快覩石鼓遺文重編章句以惠來者典則備具載定樂譜補佚正誤宫商悉調工尺駢注發為中和諧于韶頀制作善美教澤汜濩于惟聖人義正仁育有不率教必令讋伏昔準噶爾兩和卓木大小金川先後濟惡臺灣阻海蠢兹蠻觸堂堂王師雷迅電速搗穴犁巢逐竄執􅕚淨洗甲兵嵗則大熟五告武成成于帷幄逺方聞之罔不觳觫土爾扈特願就藩牧痕都斯坦願作臣僕維廓爾喀路隔西竺敬慕皇風請受羈束方物畢獻遣大頭目奉三寶佛合掌頂祝罽賧陸離靸鞜連續緬甸南掌暹羅之屬及夫生番無有不服安南君長懷德向風稟朔職貢稽首來同服我衣冠列我臣工事我君父肫摯由衷帝嘉悃欵錫豫優崇鴈臣鳬藻喈喈雍雍我朝幅員逺軼三代我皇拓土益廣而大鎮迪道屬嘉峪關外曰安西府曩牒未載橫經鼓篋士數百輩惟承德府設于上塞特創文廟亦置官廨日􅒸月竁蒸蒸藹藹風雲測占海宇亨泰是由我皇奉若天時壇廟大祀祈穀崇儀精禋蠲潔必親必祇五十五年聖敬日躋天人叶應習習祁祁雨晹時若福履綏之昔在沖齡親侍聖祖題五福堂實兆纘緒乾隆甲辰帝見元孫增書五代用紀麟振昨嵗就傅新正入宴皇家盛事從古未見維天維祖眷祐聖躬彌性純固篤祜延洪宵衣視事秋獮肄功四闢進善三推劭農健行不息執兩用中民生聖時熙煕皥皥黃髮台背期頤夀考拜恩宴者三千耉老賜杖賜幣重以天藻百嵗之坊聯屬王道五世同堂屢見奏表春試耆儒官以檢討及學正銜惠溥澤浩百有十嵗閩之龎皓晉階鴻臚寵命綏保諸福之來環應疊兆美哉盛哉大哉皇哉天冒八極聖陶九陔髙明悠久鼓舞化裁衢歌聲暢王會圖開萬方臣庶奔走偕來臣願聖夀萬億京垓八旬萬夀盛典卷九十四
