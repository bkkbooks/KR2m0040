front:
  text: 欽定四庫全書八旬萬夀盛典卷六十七恩賚六本年蠲賦三
  hash: sha256:d9fd2d6ad0f4de66d972676463c3b463087807314a6a94a6efeb7a330fc68bd4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_067-1a, image: WYG0660/WYG0660-0794a.png}
body:
  text: 福建巡撫臣徐嗣曾謹題為恭謝天恩事據布政使伊轍布詳據福州府知府成寧等會詳據閩縣等各州縣詳據在籍大學士蔡新等僉呈稱欽惟我皇上德洽羣生恩周寰宇天庥滋至久保合於太和聖敬日躋用緝熙於純嘏歌盛治而已欣熙皥念民依而尚厪蓋藏遡自御極以來疊荷皇仁之被家給人足再蠲惟正之供慶行惠施三奉溫綸之沛固已陬澨咸安耕鑿黔黎久慶升平恭逢八秩昌辰重荷元正曠典一人有慶兆民賴而率土歡騰萬夀無疆九有同而普天澤廣綸書特下全蠲秸銍之徴溫旨遙頒並免租庸之納一十七省共戴尊親億萬斯年長沾樂利丹山碧水湛恩與膏雨偕流白叟黃童喜氣與頌聲俱暢民安作息三山之兊澤彌亨年慶豐登七月之豳風如繪康衢尊獻含哺稱介夀之觴海屋籌添食德上長生之籙所有感激下忱謹合詞呈請轉詳代題恭謝天恩等情據此該署閩縣知縣吉夀等詳稱伏惟聖德懋昭皇仁廣被呼嵩祝華延夀宇於無疆扇景濩甘荷殊恩於莫外有年頻紀早覘庾積廪盈常賦特蠲更見衢歌巷舞三山喜溢十郡歡騰躋萬姓於春臺信億齡之嘉會堯階日麗愷澤覃敷禹甸風遙湛恩屢沛青疇緑壤億萬里銍秸並除白叟黃童十七省笙歌齊奏南山北斗仰黼座以呈祥十雨五風共康年而獻祝兹據該紳士蔡新等僉呈謝悃理合轉詳等情據此該福州府知府成寧等欽惟帝德覃敷皇仁疊沛和風甘雨涵濡於侯甸要荒文德武功震耀於東西南朔太和醖釀一人肇錫蕃釐化日舒長六合咸登夀宇夫耕婦織屢兆豐年巷舞衢歌欣逢盛世信熙朝之極軌誠郅治之休風仰維乾德無疆泰辰伊始騰恩詔於八旬萬夀共慶盈寧蠲正賦於五十五年盡沾樂利阜財解愠如被南薰千倉萬箱獨饒滄海長申燕喜永載鴻熙據此該布政使伊轍布欽惟軒紀洪延玊燭恆調於六宇堯仁廣被璇圗久協夫萬邦補助頻施數已逾於億秭丁糧普免惠更越以再三兹荷元日恩綸為普八旬慶典該紳士等優遊夀宇沐浴仁膏蒙申錫之有加荷推慈於無極凡納總納銍納秸全弛度支合杖鄉杖國杖朝感臚樂利仙霞益夀枌榆之食德何窮南海稱觴葵藿之傾心自切理合據情轉詳察核具題等情到臣據此該臣欽惟我皇上仁孚九有道洽三無問俗省方時厪知依之念阜財制用屢勤若保之求閭閻久享盈寧蒼赤咸歌熙皥兹欣逢皇上寶集八徵論抒四得特霈始和詔旨普免天下錢糧春膏無遲速之區惠澤逾尋常之格豳風可籥禹甸胥畇沐三次之鴻慈於今而四頌萬年之景運自古無雙九陛承流三山齊舞歌康衢之黎老惟頌昌期耕瀛海之生畨亦申嘏祝允聖朝之盛事蓋前代所罕聞臣不敢壅於上聞謹會同閩浙總督臣覺羅伍拉納合詞具題伏祈皇上睿鑒謹題奉旨該部知道湖北巡撫臣惠齡謹題為恭謝天恩事據布政使陳淮等詳據武昌等十府轉據江夏等州縣衛所士民呈稱欽惟我皇上仁育萬方澤周四表瑞符協應兆五風十雨之祥民氣恬和享千倉萬箱之慶固已薄海久安於熙皥羣黎共樂夫盈寧茲乃恭逢萬夀八旬之期欣邀千載一時之典特頒綸綍普免賦租統十八省而均荷皇慈合億萬人而咸霑聖德仁同一視遐陬無不被之方隅期以三年次第有因時之良法殊施稠疊生成厪切於小民渥澤滂洋髙厚直逾於大造幸際方中之景運億載蒙庥難酬莫大之鴻恩同聲祝嘏所有感激微忱理合恭籲轉詳題謝天恩等情由府轉詳到司欽惟我皇上德含覆載仁並生成念厪於箕風畢雨之情勤施於旰食宵衣之際殊恩遍布已邀錫賚之三周溫詔下頒還幸恩膏之四洽恭逢萬夀八旬之盛賜復九州百姓之家賦稅全蠲草野之蓋藏尤厚遐陬普被閭閻之康樂為書經國計而均以三年法良意美合寰宇而仁同一視室盈婦寧恩諭從天歡聲動地江深漢廣莫名聖澤之汪洋日升月恆幸際昌時之熾盛仰北辰而抒悃受福無疆聽南紀之呼嵩普天同慶茲據武昌等十府詳據江夏等州縣衛所士民人等籲詳代題等情理合據情會詳查核具題到臣欽惟我皇上德協清寧恩同覆載健行不息易占六位之成茀祿維康詩頌九如之句兹當八旬萬夀欣看五世一堂慶集宫庭歡騰海宇特沛初春之膏澤普蠲直省之金錢躋萬姓於春臺開八荒之夀宇江永漢廣難名帝德之高深巷舞衢歌彌戴皇仁之浩蕩從此京秭垓壤慶比户之皆盈南朔東西集萬方而來賀臣謹會同湖廣總督臣畢沅合詞恭疏題謝伏乞皇上睿鑒施行奉旨該部知道湖南巡撫臣浦霖謹題為恭謝天恩事據布政使王懿德詳據長沙等府會詳據各州縣廳衛詳據紳士羅典耆民鄭永清等呈稱欽惟我皇上德懋健行化成久道八紘霑闓澤普蒙樂利之庥六合遍淳風聿著皥熙之象固涵濡之普被已淪浹之難名茲者欣逢萬夀慶洽八旬備名位祿夀之全必歸大德統南北東西之廣咸被鴻庥引飬引恬富已久藏於庶納𢤂納秸賦頻惟正之蠲合直省以輪年先周瘠土減輸租於業户更廣深仁典等生際昌期恭逢曠典泳逰夀宇順帝則於不知不識之天渙汗恩綸樂豐年於多黍多稌之日益臻康阜莫罄歡欣循出作入息之常敢忘帝力效擊壤呼嵩之祝仰答天恩伏乞詳請題謝等情由府州轉詳該布政使王懿德等會看得世際郅隆賴一人之有慶民安豐樂欣萬國之咸寧兹者恭逢皇上衍慶八旬集禧五代聽十行之傳詔正賦全蠲分三載以輪年歉區先及湛恩汪濊匝瀛嶼以咸周闓澤覃敷溯瀟湘而渥被堯天篤慶彌仰延洪禹甸騰歡益臻安阜耕田鑿井羣欣有腳之春剝棗稱觥願上無疆之頌茲據士民合詞籲請題謝等情到臣據此該臣看得鳩民昭郅治皡皡成風鳯闕下恩綸元元遍德覩盈寧之益著宜歌頌之難名欽惟我皇上至仁丕冒兩大無私愷澤旁流萬年有祜恭慶八旬之萬夀齊呼萬嵗於八紘軒籙誕膺堯天共戴綿延瓜瓞萃五世於一堂小大共球來萬邦之重譯實古來所罕覩共仰光華更望外之有加廣宣綸綍綜丁田之賦遍九域以全蠲量出入之均别三年以遞免嵗亦無恙既蠲緩之攸分富以其鄰更佃租之並減序後先而廣被昭裒益之平施胥蒙睿慮之周益見生民之厚十行詔布統海內以騰歡三楚地偏望日邉而銜戴臣等依光北極供職南邦嵗屢豐而共慶承庥恩彌渥而益徴藏富衢歌巷舞已遍瀟湘七澤之鄉受祿宜民願上松柏九如之頌臣謹代抒下悃敬達上聞會同湖廣總督臣畢沅合詞恭疏題謝伏祈皇上睿鑒施行奉旨該部知道河南巡撫臣穆和藺謹題為恭謝天恩事據布政使景安等詳據開封等九府四直𨽻州轉據祥符等一百三州縣士民呈稱欽惟我皇上仁育萬方恩敷九有堯尊普酌符願聖人夀之辭舜軫常調致阜吾民財之盛福徵備於時若風風人而雨雨人善政篤於厚生衣衣我而食食我頻年緩徵賜復廣露積於閭閻到處登榖告穰比崇墉於囷廩大河南北久流浩浩之仁二室東西曷喻巍巍之德茲逢八旬萬夀欣際千載一時詔沛雞竿恩頒燕席並元辰之特旨布諭宣恩免直省之正供奉時行慶當家給人足之會勤施四次普蠲洵法良意美之圗量豫三年遞及欣聞巽命幸沃豐膏遍河聲嶽色之間雲蒸喜氣同日升月恆之久山祝聖齡伏乞申請題謝等情由府州彚詳到司由司轉詳到臣欽惟我皇上夀富熾昌聖仁博濟洪禔普錫洽慶於東西南朔之區時憲省成協順於嵗月日星之軌六合躋春臺之上民氣恬熙八旬欣夀宇之開帝期曼羡維中州之宅土本宜沃野深耕相小民而知依恆共逢年力穡茲荷恩綸蠲賦一寬令甲之常更籌良法輪年盡免地丁之入奉宣德意共樂豐年山農澤農地農每幸催科之無擾五榖九榖百榖自饒高廩之多儲地告河清詎俟千年而一人齊嵩祝咸呼萬嵗者三臣不敢壅於上聞謹具疏代題恭謝天恩伏祈皇上睿鑒奉旨該部知道山東巡撫臣覺羅長麟謹題為恭謝天恩事據布政使繆其吉等詳據濟南等府州轉據歷城等州縣衛所紳士呈稱竊思九賦為經國之常夙垂令典什一乃中正之法久奉成規上地下地辨其方恆用一而緩二納秸納􅖽殊其制每耕三而餘三欽惟我皇上德協羲軒仁同姚姒溥祥和於宙合共沐生成敷愷惠於田功羣安恬養固已士民被澤化國之日舒以長耕鑿蒙庥康衢之民作而息萬邦告屢豐之慶億齡欣有道之長方殷惟正之供敢覬有孚之惠茲值五世一堂之慶恭際八旬萬夀之期特降諭旨將乾隆五十六年錢糧通行蠲免澤如雲行而雨施德已髓浹而肌淪當翠華之七巡荷綸音之疊沛宸𠂻籌邦本深知稼穡之艱難睿慮念民依益廣閭閻之儲蓄鮮一夫之不獲期三年而有成常邀樂利於升平咸享安恬於盛世含哺鼓腹皆由帝力之生成巷舞衢歌一本輿情之歡愛惟是下懷愚悃無由上達宸聰伏祈轉詳據情題奏等情據此該厯城等縣查得草野急公之願每樂輸將國家惟正之供久垂令典欽惟我皇上德𢡟堯階仁周禹甸廣春秋之補助屢兆豐穰知稼穡之艱難尤敦儉朴固已升平共享樂利咸臻矣兹復邀賦額之全蠲沛恩施而通免山陬海澨既致慶於盈寧魯甸齊郊更荷恩而豐裕讀十行之丹詔深仁偕渤海同流齊萬嵗之山呼聖夀與岱宗並峙茲據各紳士公籲前來轉請具題以甲謝悃等情據此該濟南府知府等會看得維正偹度支之需自有成則薄斂渥閭閻之惠疊布深仁欽惟我皇上宵旰精勤仁慈普覆知周稼穡常願百室盈寧念切雨暘惟冀三時不害固已羣登熙皡歌浩蕩於昌期共沐安康樂生成於盛世兹復承普天同慶之日施率土廣被之恩免億萬之丁糧異數敻超今古逾再三之申命殊恩迭沛寰區分次第於三年魯甸齊郊咸歌樂利遍和甘於四海山陬海澨悉沐豐盈所以夀總歸仁羣效華封之祝民惟遍德咸歌天保之章屢荷鴻庥均登夀宇雖户安耕鑿難名帝德之無疆而世際亨嘉莫喻輿情之交忭兹據厯城等州縣衛詳請題謝等情到司據此該布政使繆其吉看得夀宇鴻開仰光華於舜日恩施特沛沐雨露於堯天欽惟我皇上躋八旬萬夀之昌期備五世一堂之盛事普天同慶薄海騰歡誠史册所希聞實古今所罕覯伏念愛民如子錫福同天平時軫念蒸黎每不惜萬千之帑藏此日舉行慶典更普施億兆之恩膏承異數之頒逺及於山陬海澨被至仁之育近周乎魯甸齊郊本年之嵗額全蠲數載之舊徵盡豁憶自正供全貸迄今已四免輸將即此分郡停徵統計而三年溥遍皇仁廣布億萬家鼓腹含哺丹詔遙傳十八省民安物阜梯山航海集萬國之共球巷舞衢歌極兆人之頌祝理合轉詳具題等情到臣該臣看得茅簷蔀屋久安耕鑿於升平魯甸齊郊咸享豐亨而愛戴欽惟我皇上乾行合撰泰運重熙年三登而闡帝期嵗豐人樂夀八旬而躋仁宇詠德含淳當翠華之七巡荷綸音之疊沛已無一夫不獲欣看萬姓咸寧兹恭逢八旬萬夀之昌期普天同慶快覩五世一堂之盛事率土騰歡伏念帝德醲敷頻施和煦皇仁廣浹復免徴輸十八省之嵗額全蠲次第而計期三載億萬家之舊徴盡貸今茲而已免四輪三齊長沐涵濡十郡同深頌祝是以輿情歡忭齊呼聖夀之無疆慶祉延洪共感天恩之大賚兹據布政使繆其吉詳據濟南等府州縣衛所轉據紳士萬斯年等合詞叩謝恭懇代題等情前來臣不敢壅於上聞謹代題恭謝天恩伏祈聖鑒謹具題聞奉旨該部知道
