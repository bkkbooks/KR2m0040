body:
  text: 欽定四庫全書八旬萬夀盛典卷十一聖德七仁德臣等謹案仁者必夀理有不求而得者恭讀御製經筵論謂夀非一己之私而有萬世之言大哉聖言實萬世帝王立德之鴻規矣本年慶介八旬正誕仁夀凝禧固已嘏集福崇鬯浹於太和之宇竊維皇上之夀如穹圜之貞運四序未易以數周知而皇上之仁亦如昊澤之泛濩無私遍萬物而莫窮其紀斯五十餘午郅德大政誠名言之而弗罄一端者伏繹四得續論引易語發明有取於繫傳守位曰仁聚人曰財理財正辭禁民為非曰義之旨因反覆究索藉以窺我皇上保樂洽夀之本原焉如覃恩之詔凡十次矣而十載中頒其三普蠲之詔凡六次矣而錢糧與漕糧十載中免其二又如大赦之詔減宥並行而隨事渥施優恤於慶典巡典之外此即繫辭曰仁曰財曰義之功用也此即皇上體仁之至綏夀之所以無窮者也而若加恩宗室以逮臣工士庶之叨被洪慈者不一而足約舉之以備例事所無至於籌水利重農功仁也而本於勤謹已著之本門勤德其他恩施溥博或以昭萬年之曠典或以示示四裔之殊榮則分載恩賚門皇上七旬萬夀八旬萬夀及乾隆五十年恭遇國慶覃恩頒詔凡三次先是乾隆四十五年皇上七旬萬夀臣民請舉慶典未蒙允行仍沛特恩於是年正月初一日頒詔天下五十年欣逢國慶覃恩頒詔一如前儀乾隆四十五年詔奉天承運皇帝詔曰朕統御寰區勤求郅治茂時育物畏懼滋深仰賴上蒼眷佑列祖貽庥海宇敉寧輿圗式廓孜孜夙夜於今四十五年春秋正屆七旬緬惟皇祖聖祖仁皇帝法天行健久道化成我皇考世宗憲皇帝丕繼鴻謨厚澤深仁淪肌浹髓朕祗遹寅虔不敢暇逸以承前烈惟冀實心實政永底升平至如臣工慶賀繁文概所弗取第念中外臣民企慕瞻依彌形篤摯已於乾隆四十三年普免天下漕糧並特開鄉會試恩科以宏樂利之庥以廣作人之化今兹履端協慶率土咸熙允宜俯愜輿情溥施大澤我皇祖六旬萬夀曽特頒恩詔遐邇均霑朕惟以皇祖之心為心覃敷闓澤嘉與天下臣民共躋仁夀用稱朕敬天法祖加惠黎元之至意所有應行事宜開列於後一五嶽四瀆等祀應遣官致祭著察例舉行一歷代帝王陵寢先師孔子闕里應遣官致祭著察例舉行一自王以下宗室覺羅十五嵗以上者俱加恩賜一滿漢大臣年六十以上者俱加恩賜一內外滿漢文武各官俱加一級一內外大小各官除各以現在品級已得封贈外凡升級改任者著照新銜封贈一凡試職各員俱準實授一國子監貢監生及各官學教習免坐監期一月一各省儒學以正貢作恩貢以次貢作嵗貢一滿漢孝子順孫義夫節婦該管官細加咨訪確具事實奏交禮部核實旌表一滿洲兵丁原係兵甲效吏行間因病年老間住者著加恩賜一八旗滿洲蒙古漢軍兵丁及內扎薩克喀爾喀等蒙古年七十八十九十以上者分别賞賚至百嵗者題請旌表一軍民年七十以上者許一丁侍養免其雜派差役八十以上給與絹一匹綿一斤米一石肉十斤九十以上者倍之至百嵗者題明旌表一凡嶽鎮海瀆廟宇有傾頽者該地方官估計工料具奏修葺以昭誠敬一各省道路橋梁間有損壞者地方官查明修理以利行旅一直省有坍沒田地其虛糧仍相沿追納者該地方官查明咨部奏請豁免一從前各省偏災地方所有借給貧民籽種口糧牛具等項查明實係力不能完者著豫豁免一各處養濟院所有鰥寡狐獨及殘疾無告之人有司留心以時養贍毋致失所一內外官員有因公詿誤降革留任者該部查明奏請開復一各省軍流以下人犯俱著減等發落於戲惠此萬方俾緝熙于純嘏斂時五福用敷錫厥庶民布告天下咸使聞知乾隆五十年詔奉天承運皇帝詔曰朕膺圗建極熙績撫辰恭荷上蒼篤祜列聖貽謨遐邇乂安版圖式廓夙夜兢業弗敢康寧仰惟皇祖聖祖仁皇帝化成久道仁義漸摩皇考世宗憲皇帝纍洽重熙涵濡休養朕祗承世德敬迓鴻釐於今五十年夀逾古稀康強勤政稽三代以上帝王御宇紀登久祚者代不數覯洎漢而後史册更鮮聞焉方今昊穹申命繁禧茂集於朕躬五世元孫一堂衍慶緝熙純嘏之休浹於海宇凡兹中外臣民咸登仁夀際斯熙會洵千載一時爰循祖典於上春六日懋舉耆筵龎眉鳩杖集於闕廷者三千叟二月上丁恭行釋奠乃臨新建辟雍引年講學用以導揚庥眀式兹觀聽上儀具舉丕烈用光我國家億萬斯年之福申錫無疆惟爾海內羣黎向化喁喁瞻依彌摯前者朕七旬萬夀曽普頒恩詔闓澤覃敷今御極五十年嘉慶疊臻尤為繄古稀有朕惟一人有慶兆民允賴是宜特沛殊恩下符輿望用稱朕敬天法祖加惠黎元之至意所有應行事宜開列於後一各直省有同堂五世者著各督撫查明咨送軍機處彚奏給豫賞賚一五嶽四瀆等祀及風雨雷火雲神應遣官致祭著察例舉行一歷代帝王陵寢先師孔子闕里應遣官致祭著察例舉行一王妃以下奉恩將軍之妻以上公主以下鄉君以上年過六十者俱加恩賜一外藩王妃以下公扎薩克台吉塔布囊妻以上年過六十者俱加恩賜一滿漢大臣命婦年過六十者俱加恩賜一八旗滿洲蒙古漢軍兵丁及內扎薩克喀爾喀等蒙古未經入宴之年七十八十九十以上者分别賞賚至百嵗者題明給與建坊銀兩並加賞大縀一匹銀十兩一滿洲兵丁係披甲效力行間年過六十因殘廢疾病間住不能入宴者著加恩賜一軍民年七十以上者許一丁侍養免其雜派差役八十以上者給與絹一匹綿一斤米一石肉十斤九十以上者倍之百嵗者題眀旌表並加賞大縀一匹銀十兩一各省儒學以正貢作恩貢次貢作嵗貢一國子監貢監生及各官學教習免其坐監期一月一內外滿漢大臣文武官員俱加一級試職各員俱準實授一內外大小各官除各以現在品級已得封贈外凡升級及改任者著照新䘖封贈一各省軍流以下人犯俱著減等發落一各處養濟院所有鰥寡孤獨及殘疾無告之人有司留心以時養贍毋致失所一滿漢孝子順孫義夫節婦該管官細加咨訪確具事實奏交禮部核實旌表於戲斂五福錫厥庶民以洽百禮式九圍受兹多祜曰至萬年布告天下咸使聞知乾隆五十五年詔分載本年恩賚門恩詔右臣等恭舉前後恩詔而以本年頒布二十二條分系恩賚門者蓋以賚之義専屬於行慶而詔則兼綜於行仁典以時而遞加令率先而廣布惠此萬方以綏多祜稱鴻矞焉若乃五位十成會萃時合南諧北燮近恱逺來兹大夀之詔於例賜朝鮮外復頒及安南琉球暹羅諸國則又夀錫寰區仁敷化外合之古稀國慶兩次益足宣美揚庥者耳乾隆四十五年聖夀七旬詔免各省漕糧五十五年聖夀八旬復詔普免天下錢糧本年載恩恩蠲分賚門節年加恩蠲貸各款具有成數臣嵇璜等謹奏為恭查蠲免錢糧數目恭摺奏聞事欽惟我皇上承列祖列宗之緒恢至久至大之基惠愛黎元勤求民瘼深仁厚澤浹髓淪肌自御宇至今五十年蠲租賜復未易枚舉臣等謹綜計五十年來户部奉行普免天下地丁錢糧者三次共銀七千六百六十八萬五千四百餘兩糧五十三萬一千四百餘石普免天下漕糧者二次共九百餘萬石又節年各省水旱災歉賑恤及蠲免民欠地丁鹽課共銀一萬三千四百五十二萬三千餘兩米榖豆共一千一百二十五萬六千餘石又巡幸恩蠲地丁鹽課漕倉民欠等項共銀一千四百四十六萬三千七百餘兩米麥豆共七十六萬八千一百餘石總計節次普免蠲免共銀二萬萬二千五百六十七萬餘兩共米麥豆二千一百五十一萬一千餘石臣等恭查乾隆元年以來節次所奉恩旨統核户部蠲賑銀糧數逾二萬萬遐稽往牒從未見有闓澤覃敷湛恩汪濊若此者也謹恭摺奏聞伏祈皇睿鑒謹奏臣和珅等謹奏遵旨將乾隆四十九年以後各省水旱災荒蠲免錢糧及豁免民欠未完并動項賑恤共用銀若干萬兩之處交查户部兹據覆稱自四十九年以後各省因災蠲免及豁免民欠未完共銀六百三萬二千四百餘兩米穀一百五萬九千五百餘石各省被有偏災動項賑恤共用銀一千八百五十一萬八千九百餘兩米穀一百一十四萬五千一百餘石統計四年內蒙恩蠲賑等銀共二千四百五十五萬二百餘兩米穀二百二十萬四千五百餘石等語謹奏右臣等敬録乾隆五十年五十三年覆奏蠲免全數二摺其本年恩旨普蠲酌蠲各款目並分載於恩賚門竊伏見我皇上愛育黎元與民藏富遇慶辰而覃渥澤博施濟衆深契大易惠心元吉有孚勿問之占至偶值偏隅水旱不惜多費帑金俾一夫不失其所而且展賑常賑月限無拘積欠豁除動逾數十百萬或蹕路所經又必酌免地丁錢糧凡兹溥錫深仁莫能枚舉良由聖心誠求保赤以稱物之施致足民之用綏豐介祉懋鴻慶於方長箕範一篇雖未始言仁而攸好錫民已裕其本所由九福備福以夀富開其先也歟皇上七旬萬夀及國慶時巡屢頒恩赦乾隆五十五年八旬萬夀詔命停免秋讞復敇所司分别減釋如例分載門恩賚先是乾隆四十五年皇上七旬萬夀特頒恩詔內開各直省軍流以下人犯俱著減等發落五十年國慶頒詔一如前例是年舉行千叟宴皇上矜恤年老監禁人犯俱豫減免省釋凡事在恩詔前者刑部欽遵辦理庚子聖駕五巡江浙所有江蘇安徽浙江三省軍流以下事在恩詔後者並豫減等癸卯聖駕四詣盛京所有奉天吉林黑龍江等處一應情實人犯俱得減等軍流以下悉豫寬免甲辰六巡江浙欽奉恩諭與庚子同是年直𨽻山東需雨甚殷一體加恩減等有差自庚子以後清理庶獄凡三其緩決三次分别減等者四十七年計五千二百二十餘名四十九年計三千二百七十餘名五十二年計二千九百九十餘名是年監禁官犯並豫釋放外藩蒙古情罪較重者如之又四十八年京師佇望雨澤減軍流以下罪名五十三年亦以待雨減免徒罪以下各犯均諭刑部查明情節議奏悉豫寬宥施行乾隆五十五年七月二十九日奉上諭本年屆朕八旬萬夀自當照例將秋朝審情實人犯加恩停其勾決而刑部九卿科道等因係停勾之年於各省秋審朝審招册案犯核議具題時想亦不過虛應故典未必照每年詳慎辦理但其中有情罪重大者如糾衆匪劫奪犯傷差妖言惑衆逞凶殘殺並官員侵漁帑項勒斂民財之類非殘忍不法即有關於民俗官方豫以監候已屬法外之仁使更久稽顯戮不特死者含寃莫釋而莠民姦吏日逺漸忘非所以肅刑章而昭炯戒刑部以為應仍於秋審勾到在案本不多朕矜慎庶獄不厭詳推所有此次刑部另開情重各犯仍著會同九卿科道和衷研核倘有核其情節尚可緩至明年者九卿科道不妨切實指出簽商讞獄大典在常時尚宜詳慎况際此行慶施惠之時乎至御史謝清問前次條陳各欵向有刑部問擬罪名不宜加從重字樣一條顯係沽名邀譽已眀降諭旨抉其隱微但既有此奏刑部九卿科道於核議情重人犯時即著謝清問在旁察聽將此等人犯是否實係情真罪當不能不從重辦理之處逐案指示以服其心若謝清問另有所見亦不妨隨同簽出以示朕慎重刑章大公至正之意臣等謹案天地之大德曰生帝王之大德曰好生從來矜恤之仁所關於化理者綦重也我皇上布愷宣恩久協咸中之慶近自七旬覃詔以後屢沛殊施用申曲赦欣逢夀釐登八歡洽敷天彌用推廣生成德音廣布蓋仰答天心俯全民命所以播祥和而流慶澤者至矣極矣臣等謹以事例分系恩賚爰綜敘節年曠典之加而以本年諭停秋讞仍令精核詳推以昭欽慎者特著於編欽定八旬萬夀盛典卷十一
