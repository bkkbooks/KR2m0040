  text: 欽定四庫全書八旬萬夀盛典卷二十聖功三𬗟甸歸順
  hash: sha256:2f4db0dc1364b5e431c72ba1d5a8006ff08c155cf471876c9334495ed7667b5f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_020-1a, image: WYG0660/WYG0660-0229a.png}
body:
  text: 臣等謹案弗加征而自臣屬謂之歸順其義恭見扵御製土爾扈特歸順記文盖謂降而来服者所畏在威順而来歸者所懐在徳若兹𬗟甸之敂闗内附則實由我皇上威徳交至有以格其嚮化之誠適逄慶祉滂敷歸仁浃愷爰俾綏土宇而列藩封良厚幸也竊惟我國家天聲逺播恒惟是安輯邊徼使之共享敉寧自乾隆三十四年䇿師征𬗟所向克捷已計日可以奏功爾時𬗟酋畏懼乞降即荷恩命停止進勦此皆大聖人以如天好生之心擴如天覆物之量審時度勢慮出萬全初非利其尺土抑非欲悉主悉臣為我僕屬而後已也逮今鴻勲昭布耆成屢宣荒徼殊區具有聞見乃以時隔廿年心輸萬里函呈金表至謂一日不得臣服則此身枉生天地之間是曩者新街江裔之㨗固為聲罪致罸所不可無而後此官屯罷兵以預操今日不戰屈人之劵者臣等恭讀本年賜奨𬗟甸國王詩有經事自惟老勝壮之句益仰皇上登大耋之齡集咸寧之福内安順外彌凛謙懐惟成功之不居迺以卜延禔之攸厚者乎乾隆五十三年恩准𬗟甸國長孟隕投誠内附乾隆五十三年六月初四日雲貴總督臣富綱謹奏為𬗟甸遣目納欵投誠恭摺奏聞事乾隆五十三年五月初二日據順寧府知府全保署順雲營叅将花連布㑹禀據耿馬土司罕朝璦報稱耿馬所管之滚弄江大渡隔岸即係𬗟甸木邦地方四月二十日有𬗟酋孟隕遣大頭目業𣺌瑞洞細哈覺控委盧撒亞三名小頭目十二名跟役一百餘人恭賫金葉表文金塔馴象寳石金箔檀香大呢象牙漆盒等物又具咨文一件絨氊洋布等物四種齊至江邉懇求進貢並稱老官屯一路山髙瘴大象隻難行故從木邦前来朝璦當即查明屬實令来人暫住等候先將文書接収轉呈等情臣當將孟隕咨呈𬗟文譯出據稱伊係甕藉牙第四子自幼為僧因兄懵駁身後姪贅角牙襲職相繼作孽自取㓕亡國人迎我掌管國事我深知從前懵駁父子行事錯謬䝉大皇帝恩徳如天自撤兵以後不加征𠞰感激實深屡欲乞求進貢因暹羅國時相侵擾並移建城池未得偹辦今荷大皇帝洪福逺庇𬗟地得享安寧特差心腹大頭目業渺瑞洞細哈覺控委盧撒亞等遵照古禮賫送表文象隻貢物懇乞轉奏送京叩覲天顔稍申下悃等語查孟隕係𬗟酋懵駁之弟贅角牙之叔乾隆四十七年因孟魯致死贅角牙復被國人将孟魯殺害公立孟隕經臣具摺奏明數年以来毫無動靜臣惟恪遵前奉諭㫖督飭沿邉文武嚴宻巡防不使稍有踈懈今孟隕差遣頭目具表納欵雖情詞恭順誠懇但𬗟夷情性猜疑孟隕自幼出家於懵駁滋擾抗拒之處並未與聞自為國人迎立後即已深知悔懼惟因内難甫平旋與暹羅打仗是以至今始行遣目進貢臣詳察情形其納欵抒誠似屬真實可信自應據情馳奏仰候聖明訓示遵行查現在滚弄江一帶烟瘴盛發所有来目人等以及象隻什物不便聴其住居外江難以稽防致滋㪚失臣當經飛飭該副将定住㑹同順寧文武㸃騐明白先帶至順寧地方暫行安頓嚴密防守妥為照料臣現奉諭㫖查閲營伍即自省起程馳赴該處查㸔情形面向來目詳詢一切親加料理恭候奉到諭㫖准其進貢臣即派妥幹大員伴送来目酌帶跟役恭賫表文貢物先行起程象隻亦叧派員管解送京其餘同来人衆均留郡城等候毋庸隨行致多糜費所有譯出表文文書同貢物清單一併恭呈御覽伏祈皇上睿鍳訓示遵行謹奏奉上諭緬甸僻在荒服我國家帑藏豐盈威棱逺播朕之所以停止進剿者並非因兵力不足特以該處水土惡劣地多瘴癘乂值該國畏懼懇求朕體上天好生之徳遂諭令撤兵自撤兵後十餘年来邉境相安且懵駁與伊子贅角牙相繼作孽自外生成俱已身遭夷滅孟隕本在𬗟甸為僧前此之事與伊無涉今因該國無主衆頭目等推舉掌管國事差遣頭目進表納欵閲其表文情詞甚為恭順誠懇此係好事将来該頭目等到時朕方欲重加賞賚富綱接據禀報自應一靣具奏一靣即選員䕶送来京乃始則疑其狡詐派員前往察看虚實已屬過慮繼復以無闗𦂳要之揚重英向其跟究富綱何不曉事若此著傳㫖嚴行申飭並著傳諭該督接奉此㫖即一面遴派妥員䕶送該頭目等迅速前來行在呈進表物如能於萬夀前到熱河固好若計算日期八月初旬前後不能趕到即扵出哨時到熱河祗候維時蒙古諸王公皆扈蹕山荘俾逺國貢使同入筵宴瞻覲尤為盛事御製雲貴總督富綱奏報𬗟甸稱臣進貢詩以誌事戊申官屯謝罪求罷戰己即𫝊宣命止戈昔年征𬗟甸之役事非得已迨己丑冬經畧大學士傅恒扵新街江裔連破賊壘遂進攻老官屯繼㧞屯西一砦絶其糧援已可計日蕆事維時聞其水土惡劣我将士多受病者深為憐憫若更待春至陽生則瘴癘益甚扵是有班師之諭而𫝊恒適亦奏𬗟酋懵駁遣大頭目詣軍營籲求貸罪罷兵因檄諭解圍撤兵盖其始以聲罪之師不可以已既而審度事勢恤我征人遂爾止戈原非利其土地必欲窮兵也嗣是二十年来亦且置之度外兹據雲貴總督富綱奏掌管國事孟隕遣大頭目三名小頭人十二名賫金葉表文並馴象金塔等件欵闗進貢情詞甚為恭順詎可阻其向化之誠即諭令准其前耒行在並臨時酌加優賚以示柔逺至意却逮廿年無信息何稱一旦入漸摩遜辭並未馳文帝奉表翻看来趙駝羈彼重英異蘇武督臣致訊似為過按漢書趙佗當秦末自立為南粤武王髙帝已定天下為中國勞若釋而不誅佗既復僭稱帝號文帝立遣陸賈使南粤賜書告諭佗恐頓首稱臣盖文帝初鎮撫天下不欲興兵誅討惟貶損詞意兾其感服而佗果稱臣奉貢書生選懦之見率以為是予則以為大失中國駕馭外域之道盖外域惟知畏威不知懐徳此意向列論之若今之𬗟甸則大不然初以滋事邉疆興師問罪既因其籲求貸不加討亦不適舍之而已豈值以一紙之書婉諭臣服而兹孟隕欵闗進貢詞順禮恭且據督臣譯其来文謂其父甕藉牙承管國事至其兄懵駁𫝊子贅角牙同時為惡獲罪天朝繼蒙寛赦不加征勦感激實深伊與懵駁父子素不和睦藏身𬗟寺為僧自贅角牙自取滅亡衆頭目舉伊掌管國事屢欲乞求進貢因暹羅時相侵擾並移建城池未遑将使兹特差心腹賫表並具貢物懇祈轉奏乞恕已前之罪永作域外之臣謝罪入貢歸誠出扵傾心向化其恭順過趙佗逺矣至總督富綱詢以楊重英之事實過扵苛求楊重英不過一臬司在木邦被緬甸之兵遮去留彼非若蘓武之奉使朝廷也其縛送與否皆無所闗係何必致問因嚴飭富綱令罷之且蘇武在匃奴娶妻生子向已薄之聞重英在𬗟甸求死數次而不得若復無娶妻生子之事是較蘓武為優矣並戲及之又奉上諭𬗟甸僻在荒服今孟隕既悔罪抒誠欵闗進貢自應遂其向化之心已諭令富綱選派妥員䕶送該頭目等恭賫表物迅速行走如萬夀前不能抵行在即於出哨前趕到熱河祗候與䝉古諸王公同時筵宴瞻覲其所帶象隻沿途累重不妨另派妥員照料在後行走著沿途各督撫即行寛為預偹夫馬俟該頭目等到境即行妥為照料䕶送俾得迅速遄行不致稍有遅滯所有經過省㑹府城等䖏著該地方官預偹筵席禮待以示柔逺之意九月初四日孟隕遣使細哈覺控等奉表入覲於避暑山荘行在恩賜宴賚回國管轄緬甸地方小臣孟隕謹奏大皇帝寳殿小臣父甕藉牙因替舊𬗟酋奔噠喇平亂承襲掌管地方𫝊至小臣兄懵駁違悖父命𫝊子贅角牙同時為惡得罪天朝䝉發大兵問罪旋䝉寛赦不加征勦小臣與兄弟叔侄素不和睦藏身緬寺為僧至贅角牙自作罪孽家庭禍起身遭夷滅國中無主衆頭目以小臣甕藉牙第四子公舉掌管國事續因暹羅侵擾防患不暇復因改建城郭於蠻得地方至今六年仰叨天佑稍得安寧大皇帝恩徳如天四海臣服萬國歸心小臣𬗟甸逺處極南不得臣服天朝共受太平之福此身枉在天地之間此心時刻難安今小臣追悔已乆特遣心腹頭目業渺瑞洞細哈覺控委盧撒亞等䖍呈土貢金葉表文一件金塔座髙三尺頂嵌好寳石一顆馴象八雙藍寳石戒篐三個金箔一百搭象牙二十隻紅白檀香五十斤紅黄緑大呢三疋漆盒四個小盒子五十個申請雲貴總督代為奏明求大皇帝如天之量恕𬗟國已前之罪永得作外域之臣世世子孫叨蒙聖恩於億萬年矣謹具表以聞御製賜宴𬗟甸陪臣即席六韻戊申滇南金葉𬗟文呈来者徕去聲之嘉至誠昔日歸降此歸順己丑命經畧大學士𫝊恒征𬗟其冬連破賊壘于新街江裔業将乗勝攻取老官屯旋因其乞降班師然亦不過姑貸其罪究未臣服其心也兹該國掌管國事孟隕遣大頭日三人及小頭日等賫金葉表文及金塔馴象等物欵闗進貢並稱其兄懵駁傳子贅角牙同時為惡獲罪天朝而伊與懵駁父子素不相睦今特遣心腹入貢投誠乞恕已前之罪永作外域之臣等語是此日歸順之心出扵至誠深堪嘉悦不惟無戰並無征閉闗未可學光武馳諭原非遣陸生方伯猶摉遮去吏富綱扵𬗟甸貢使不即令其前来瞻覲又復跟究楊重英下落甚為錯謬楊重英僅一臬司随軍辦理糧務被其遮㽞並非奉使之臣可比乃令該頭日等復遣人囘國告知該國長倘彼心懐疑畏寧不阻其恭順之忱已傳旨嚴行申飭外臣兼獻未回兵嗣奏𬗟甸将楊重英送出已于七月初二日抵内地耿馬地方並帶出従前失迷兵丁四名及廣東民數人益見該國長實屬傾心向化令該頭目等至山荘拜進共國長之表因厚加宴賚以示殊恩山荘宴賚逄佳節是日重九海國車書遵大清惇史澷稱增此創皇圖惟慎奉其盈敕諭𬗟甸國長孟隕并加恩賜奉天承運皇帝敕諭𬗟甸國長孟隕知悉朕惟輸誠納賮炎陬修職貢之儀舍服招携王制重懐柔之典念荒徼克循舊服則朝廷宜沛新綸爾𬗟甸國長孟隕本為支子暫托釋門因兄姪梗化而戕殘為國人擇親而擁戴前愆力改来享情􅎋既遣使以将䖍復陳詞之維摰具明忱悃良可襃嘉是用降敕奨諭賜國長並國長之妻佛像文綺珍玩器皿等物國長尚其敬受益矢恪恭朕復念爾國長當家庭搆亂之餘甫掌國事為土宇敉寧之計移建城垣正宜永戢兵端修和隣好俾爾人庶咸遂樂生副朕眷懐用承寵錫故兹敕諭命傳諭𬗟甸與暹羅二國修好九月初四日奉上諭暹羅𬗟甸兩國向来搆兵不睦暹羅業經受封而𬗟甸現在投誠内附俱係屬國嗣後該二國應彼此修好同受天朝恩眷不得仍前搆兵除𬗟甸回國時先行𫝊知外俟暹羅貢使到日一併𫝊知令其回國告知該國王敬謹遵照恩遣夷則列等六人回國十月二十五日奉上諭本年𬗟甸敂闗納欵遣使賫表進貢因思四十一年曾将該處夷老段等十一名發往吉林黒龍江今該國既悔罪輸誠其前此發遣之人自應給回曾降旨諭令将軍等查明􅀈夷等下落兹據查尚存有則列波浦波些孟伍拉喀者朶六人伴送到京已敕部交滇省引見人員之便帶送前往著𫝊諭富綱譚尚忠俟􅀈夷等到滇時即派員轉送出闗令其歸國以示懐柔綏輯至意乾隆五十五年𬗟甸國長並隕遣使謝恩恭祝皇上八旬萬夀宴賞儀物分載恩賚門並乞封號敕襃允之並加賜詩什珍物有差管轄𬗟甸地方小臣孟隕謹奏大皇帝寳殿小臣前嵗遣目投誠仰蒙恩准上年貢使細哈覺控等轉回阿瓦復賫到御賜各種珍物小臣隨出城三站叩頭跪領不勝感激欽幸嗣又蒙賞還𬗟人孟伍拉喀者朶波浦等六名小臣即差目赴闗接領回國恩徳如天舉國欣戴今年八月恭逢大皇帝八旬萬夀小臣現已䖍具表文并小國土物差心腹頭目叩闗求總督代奏外伏念小臣已蒙恩淮内附自當永沐生成仰求大皇帝逾格恩施敕賞小臣阿瓦封號并准十年進貢一次俾子子孫孫得以世世稱藩仰承聖澤冄自禁止通商以後邉夷生計甚是艱難伏祈照舊開闗使小國所産棉花等物藉以銷售不但小臣身蒙厚徳即舉國臣民均沐天恩於萬萬年矣謹具表以聞三月二十五日奉上諭𬗟甸國長孟隕敂闗内附効悃惟􅎋前已遣使恭進方物備邀賞賚燕胥兹以朕八旬夀辰普天同慶復敬備表貢遣使来京祝釐逺涉萬里實屬恭順可嘉自應俯允所請給予封號以資綏輯俟其貢使到時冄将鍚封敕書及國王印信交令賫回兹先降敕襃諭並親書御製詩章以賜仍加賞珍珠手串荷包等件以示優眷該督等接奉後即照安南之例遣道府大員二人親賫恭捧前往宣封面交祗領該國長偹沐寵榮自必倍加欣感奉天承運皇帝敇諭𬗟甸國長孟隕知悉據雲督縂督富綱奏爾深感天朝厚恩敬偹表貢遣使叩祝萬夀並欲求請封號已将表文呈覽朕披閲表内詞義肫懇祈籲情􅎋誠悃實屬可嘉朕惟懐柔藩服徳化所先効悃将䖍宜加襃鍚爾自嗣攝國事以來即遣陪臣具表敂闗輸誠納賮朕特鑒爾恭順降敕襃奨並賜爾佛像文綺珍玩器皿等物用昭優貺兹復以朕八旬萬夀率土臚歡遣使祝釐逺涉萬里尤見向化之忱已命雲貴總督飭送来使前赴熱河行在與䝉古王公回部伯克及安南國王庶邦君長等同預筵宴瞻仰朝儀並當加以優賚共沐恩榮至爾以攝國有年欲懇請天朝封號以資鎮撫因念爾國逺在炎􅑍恪共職貢兹於遣使之前先期坐擺致潔告䖍更徴謹恪朕甚嘉焉已降㫖交該部封爾王爵俟爾使臣到京再将錫封印信勅書交與賫回兹先降敕襃諭親書御製詩章以賜加賞珍珠手串一掛使爾益加欣忭並使爾舉國臣民同深慶幸已令該督遣大員二人親賫恭捧送至爾國面交祗領爾既受兹寵錫偹沐殊榮益當倍矢敬共恪遵候度屏藩南服延及子孫仰副朕撫逺綏来至意特諭御製雲貴總督富綱奏𬗟甸國長孟隕遣使祝釐並乞封號詩以賜奨庚戌奉表前年施恵往請封今嵗竭誠歸赤心那限萬里隔黄詔従教舉國輝經事自惟老勝壮化民因識徳贏威内安外順胥天佑益切屏榮凛􅀈㡬又奉上諭𬗟甸自禁止通商以来需用中國物件無従購覓而該國所産棉花等物亦不能進闗銷售今納貢稱藩列扵屬國應准其照舊開闗通市以資逺夷生計此事不值寫入敇諭著該督即一面照㑹孟隕一靣飭知沿邉官員定期開闗市易以示嘉恵逺人之意恩封孟隕為𬗟甸國王賜之敕印奉天承運皇帝制曰朕惟徳孚柔逺王朝隆無外之模忱切向風屬國被咸寧之福既敬将夫職貢懇偹遐藩宜襃錫以恩綸允綏嗣服龍光斯賁爵命維新爾𬗟甸國長孟隕地處炎􅑍系居支庶曩者家遭多難禍亂相尋繼因國頼長君攀援共戴敂闗納賮恪恭著攝立之年降􅎁頒珍恵愷浃歸仁之感兹以今嵗為朕八旬萬夀敷天慶叶薄海歡騰籲大吏以抒情遣陪臣而祝嘏先期齋潔葵傾矢在寸心重譯来同琛獻踰乎萬里休徴所應肫欵堪嘉至爾國世裔載延邦基復整干戈是戢期鎮撫夫民人鐘簴常新思奠安夫土宇瀝攄䖍悃跂藉榮施仰祈封號於天家文披金葉逺賜詩章於下國寵荷珠光今封爾阿瓦𬗟甸國王錫之敕印王其勉修政事慎簡官僚敦輯睦於鄰封垂敉寧於邉境永受無疆之慶流及子孫一堅不貳之誠保其宗社欽哉毋替朕命新封𬗟甸國王孟隕奉表謝恩新封𬗟甸國王小臣孟隕謹奏大皇帝寶殿小臣従前投誠納貢業䝉恩准歸附今年八月恭逄大皇帝八旬萬夀萬國稱慶小臣䖍偹表貢遣目慶祝分所當然但冐昧求請封號通商實切惶恐前據老官屯頭目稟奉雲貴總督􅊾諭得知使臣便居未駝等尚未到京已奉大皇帝勅諭准封王爵御賜珍物欽差大員降臨小國宣封小臣一聞此信喜出望外當即諭知老官屯頭目孟幹修理道路住處並遣子應也同阿𣺌大萬星赴官屯一路伺候小臣親出四站至九鈕城跪迎敕諭並集僧衆誦經拜佛於七月初十日受封王爵跪領敕諭御製詩章珍珠手串荷包等物伏念小臣遐方陋質毫無報効仰蒙殊恩襃奨賜封王爵俟便居未駝等到京即将印信敇書交與賫回不但小臣身逄盛世得邀寵寓即世世子孫亦得長守邉隅永為臣僕荷蒙恩賞珍物小國素所未見並奉天使𫝊知通商一事已奉縂督示諭奏䝉大皇帝恩准開闗舉國人民無不歡欣感戴共頌皇恩浩蕩小臣感激下忱不能自已惟有䖍誠㘴擺遥祝萬夀無疆恭具金葉表文並小國土産件物差心腹頭目便居也控蘇令覺應荅覺等隨同天使進闗並咨求縂督代為奏明叩謝天恩小臣受封之日即諭知通國臣民共誓恪供藩服十年進貢一次俾世代子孫永沐皇恩扵弗替謹具表恭謝以聞臣等謹案𬗟甸古朱波地漢通西南夷謂之撣唐謂之驃宋元至明謂之𬗟累代羈縻率未嘗内附我朝定鼎之初廓清寰宇挈其屬降乾隆十六年始遣頭目奉表修貢三十一年厥酋懵駁滋擾獲罪嗣荷恩命釋弗加兵五十三年其支庶孟隕謝罪入貢盖閲二十餘年未經通使而乃聞風感慕不事招徕自然向化夫孰非聲教之逺暨有以生其嚮往作其恭順乃以聫逖邇於一體者乎皇上申訓俯鑒忱悃守臣毋重生其疑畏逮使至即䝉恩禮渥施更勅示以固圉睦鄰之道五十五年乃復遣使陳謝祝夀乞封花象之呈身坎扒窪經之頂禮䖍祈寳算跂藉龍光其肫欵為已至也臣等仰惟聖朝徳洽綏來功昭馭逺錫王封於阿瓦陋臣服於粤陀洵希古之盛事以是知勲威所屆用能擴此無外之模而况慶流亨㑹迴殊東謝西趙之僅登職貢已哉八旬萬夀盛典卷二十
