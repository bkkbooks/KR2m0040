body:
  text: 盛事十五夀民夀婦五乾隆五十四年旌表夀民吳國瑞夀婦劉羅氏等十二人禮部謹題為題請旌表事據湖北廵撫恵齡奏江夏縣夀民吳國瑞現年一百二嵗性質醇良精神矍鑠健能濟勝百齡尚渉他鄉樂有承顔四世歡依繞膝故園昨返人疑化鶴之仙耆夀雖多實冠扶鳩之侣允宜表瑞敬俟推恩奉上諭恵齡奏江夏縣民吳國瑞現年一百二歳孫曾繞膝請㫖旌表等語吳國瑞年逾百齡精神矍鑠洵為昇平人瑞特賜御製詩章所有應行賞賚及建坊旌表之處著該部照例具題欽此應遵㫖准其旌表由内務府支取縀一疋銀十兩轉給祗領仍官給建坊銀三十兩並昇平人瑞字様奉㫖依議吳國瑞著加恩賞給上用縀一疋銀十兩御製湖北廵撫恵齡奏百嵗夀民吳國瑞孫曽四世一堂詩以誌事新正奏疏逹金門率用休徴稱吉言江夏民登一百二盛時夀冠衆黎元湖北廵撫恵齡奏江夏縣夀民吳國瑞現年一百二嵗四世一堂孫曽繞膝允稱人瑞因即諭部照例優加恩賚用昭盛世嘉祥康强身尚行他郡期艾嵗方返故園又據奏吳國瑞向日出外始于上年囬籍隨據府縣詳報由司核轉具奏等語以百嵗之人尚能逰厯他鄉其精神康健又逺勝厯年各省所報百歳夀民張子翼等人矣繞膝孫曽纔四世勝伊五世見元孫又題為題請旌表事據廣東廵撫圗薩布疏稱聖朝宏育物之仁恩周遥壌帝世重引年之典瑞應喬齡茲有南海縣夀民陳朗忠現年一百二嵗品行端方性天藹吉家𫝊孝友庭闈有雍睦之風世守耕桑里巷著老成之望仰祈大造被以殊榮臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議陳朗忠著加恩賞給上用縀一疋銀十兩又題為請旌表事據東廣廵撫圖薩布奏南海縣夀民闗活源現年一百二嵗和平養福謹厚持躬紹箕裘而不墜家聲率鄉邑而並敦善行適協大年之慶宜邀特沛之恩奉上諭南海縣民闗活源優游化宇夀逾百齡實屬昇平人瑞所有應行旌表之處著該部照例具題欽此臣等查與定例相符應請行令該撫轉飭地方官給建坊銀三十兩並昇平人瑞字様奉㫖依議闗活源著加恩賞給上用縀一疋銀十兩又題為循例請㫖旌表事據江西廵撫何裕城疏稱絲綸錫祉閭閻蒙夀愷之庥旟旐占祥家室有期頥之慶茲有宜黄縣夀婦劉羅氏現年一百一嵗婦道無虧母儀足式勤劬積歳欣鶴算之頻添渙汗承恩賴鴻慈之廣被臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議羅氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事乾隆五十四年八月初七日奉上諭福康安奏廣東新寧縣夀民李適本現年一百二嵗淳良謹厚孝友可風請㫖旌表等語李適本年逾期頥康强矍櫟洵為昇平人瑞所有應行旌表及賞給銀兩縀疋之處著該部照例具題用示優奬耆年至意欽此臣等核與旌表之例相符應由内務府支領縀一疋銀十兩轉給祇領仍官給建坊銀三十兩並昇平人瑞字様奉㫖依議李適本著加恩賞給上用縀一疋銀十兩又題為請旌人瑞事據江蘇廵撫閔鄂元疏稱八表從風景緝熙於純嘏百祥佑順孚元吉于惠心茲有儀徴縣夀婦萬夏氏現年一百一嵗性本幽閒儀稱淑慎克勤克儉宜家貽榖似之祥引養引恬表宅協旌褒之典臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議夏氏著加恩賞給上用縀一疋銀十兩又奏為遵㫖議奏事據前任廣東廵撫圖薩布疏稱五福用敷錫蒼生率俾于海隅百年曰期頥黄髪介蕃于帝祉茲有嘉應州夀民呉俊奇現年一百嵗品行淳良精神矍鑠居一鄉而稱善典重老成膺百夀而増年褒崇令甲臣部核與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議又題為題請旌表事據䕶理浙江廵撫顧學潮疏稱人登夀宇著郅治之凝庥恩逮髙年溥隆施于表宅茲有鄞縣夀民毛文玉現年一百一嵗持躬謹厚賦性醇和閲三萬六千日年滿百而彌長肇三百有六旬歲初朞而遞衍允為昇平上瑞宜邀寵命優頒臣部查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議毛文玉著加恩賞給上用縀一疋銀十兩又題為題請旌表事乾隆五十四年八月初三日奉上諭李世傑奏四川墊江縣民盧樸先現年一百二嵗瀘州民孫丕權現年一百嵗均各精神强健樂業安居請㫖旌表等語盧樸先等俱年届期頥康强矍鑠洵為昇平人瑞所有應行旌表及各賞給銀兩縀疋之處著該部照例具題示用優奬耆年至意欽此臣部核與旌表之例相符應由内務府支領縀一疋銀十兩轉給祇領仍各給建坊銀三十兩並昇平人瑞字様奉㫖依議盧樸先著加恩賞給上用縀一疋銀十兩又題為題請旌表事據前任廣東廵撫圖薩布疏稱聖徳覃敷人瑞逺徴于海嶠皇仁普被庥嘉叠著于閨幃茲有新㑹縣夀婦林區氏現年一百一歲秉性安􅈺教家勤慎在昔鸞章下賁封邀一命之榮届今鶴箕彌増典協百齡之盛臣部核與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議林區氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據雲貴縂督富綱奏太和縣夀民趙世望現年一百一歲賦性淳良持身謹慤沐三朝之雨露含哺安作息之常度百歲之春秋繞膝篤孫曽之慶鬯皇仁而逺無弗届處邉徼而夀亦維祺聿徴瑞應之符允稱褒揚之典奉上諭富綱奏太和縣民趙世望現年一百一歲精神强健孫曽繞膝請㫖旌表等語趙世望年逾期頥康强矍鑠洵昇平人瑞所有應行旌表及賞給縀疋銀兩之處著該部照例具題以昭優奨耆年至意欽此臣部核與旌表之例相符應由内務府支領縀一疋銀十兩轉給祗領仍官給建坊銀三十兩並昇平人瑞字様奉㫖依議趙世望著加恩賞給上用縀一疋銀十兩乾隆五十五年旌表夀民梁殿伯夀婦陳潘氏等十一人禮部謹題為題請旌表事據廣東廵撫郭世勲疏稱軒俈衍貞符八萬齡臚萬方之慶葛懐熙夀宇百一歳呈百粤之祥茲有南海縣耆民梁殿伯現年一百一歲性賦淳龎質安恬養為一鄉之善士依逺嶠以長生届百年曰期頥閱周朞而益算順帝則歡歌于衢壌厚民氣恒長其子孫允為郅治之嘉徴宜荷榮褒之鉅典奉上諭郭世勲奏南海縣夀民梁殿伯現年一百一嵗孫曾繁衍視履康强請㫖旌表等語梁殿伯年越期頥孫曾繞膝洵為昇平人瑞其應行建坊旌表及賞給縀疋之處著該部照例具題摺併發欽此臣部核與旌表之例相符應請官給建坊銀三十兩並昇平人瑞字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議梁殿伯著加恩賞給上用縀一疋銀十兩又題為題請旌表事據廣東廵撫郭世勲疏稱太和翔洽閭閻共樂春臺郅治覃敷巾幗咸登夀域兹有南海縣夀婦陳潘氏現年一百嵗秉質柔嘉持躬淑慎釐延女士茂松柏之有心代衍孫曾茁芝蘭而繞膝洵屬聖朝瑞應宜邀令典褒榮臣部核與旌表之例相符應請官給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支給縀一疋銀十兩轉給祗領奉㫖依議又題為題請旌表事據江蘇廵撫閔鶚元疏稱夀寓長生醲化普蒸於宙合聖朝上瑞大年慶錫於閨幃茲有丹徒縣夀婦方祖氏現年一百嵗儀嫺淑慎質葆安貞恬江國之淳風煦天家之化日昔登耄耋屢膺粟帛恩榮今届期頥允稱旌揚鉅典臣部查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議又題為題請旌表事據江西廵撫何裕城疏稱帝徳如春協氣溥寰中之應皇人多夀長年徴閫内之祥茲有新城縣夀婦江鄧氏現年一百一嵗女貞叶順婦職脩勤巾幗淳風喜春秋之滿百孫曾介祉肇嵗月以重朞洵稱嘉瑞於昇平宜荷彛章之寵錫臣部核與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議鄧氏著加恩賞給上用縀一疋銀十兩又題為題請旌表事據四川總督李世傑疏稱璧山縣夀婦雷藍氏梁山縣夀婦董王氏均届百嵗壼儀久著内則夙嫺庇聖朝培養之仁祥徴閨闥荷帝錫純常之嘏慶届期頥人瑞聿彰恩褒允副臣部核與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議又題為題請旌表事據陜西廵撫秦承恩疏稱太和夀世垓延共溥春祺令徳宜民閫闥咸沾化育兹有長安縣夀婦楊張氏現年一百二嵗禀淑儀於内則室家之壼攸宜膺繁祉於中閨孫子之詒有榖允為熙朝嘉瑞宜邀褒錫彛章臣部核與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議張氏著再加恩賞給上用縀一疋銀十兩又題為題請旌表事據浙江廵撫琅玕奏稱天台縣耆民龎韶九現年一百一嵗躬安耕鑿算益期頥敦十室之忠信積善家有餘慶逾百度之春秋曼夀世為上瑞允符令甲宜荷恩申奉上諭據琅玕奏天台縣耆民龎韶九現年一百一嵗素行善良精力强健請㫖旌表等語龎韶九年逾期頥精神矍鑠洵為昇平人瑞其應行建坊旌表及賞給縀疋銀兩之處著該部照例具題摺併發欽此臣部查與旌表之例相符應請官給建坊銀三十兩並昇平人瑞字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議龎韶九著加恩賞給上用縀一疋銀十兩又題為題請旌表事據江西廵撫何裕城奏稱南昌縣耆民趙登祜現年一百一嵗業守蓬門光舒榆景效堯民之順則擊壤懽歌際軒籙之增齡登臺共樂洵属熙朝嘉瑞宜膺盛世旌揚奉上諭據何裕城奏南昌縣耆民趙登祜現年一百一嵗素行善良精神强健請㫖旌表等語趙登祜年逾期精神矍鑠洵為昇平人瑞其應行建坊旌表及賞給縀疋銀兩之處著該部照例具題摺併發欽此臣部核與旌表之例相符應請官給建坊銀三十兩並昇平人瑞字様恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議趙登祜著加恩賞給上用縀一疋銀十兩又題為題請旌表事據廣東廵撫郭世勲疏稱聖澤􅉼濡福畀生成於九寓皇仁鬯洽夀徴純佑於重閨茲有南海縣夀婦劉羅氏現年一百二嵗賦性端嚴禀姿柔順行成壼内介眉則嵗月増延歡洽庭前繞膝則孫曾環侍洵屬盛朝瑞應宜膺茂典褒榮臣部校與旌表之例相符應請官給建坊銀三十兩並貞夀之門字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議羅氏著再加恩賞給上用縀一疋銀十兩又題為題請旌表事據陜甘總督勒保奏稱甘州府撫彞㕔老民鄭汝仁現年一百一嵗生處邉陲作息恒安素業躬逢盛世優游克享長年共北辰所欣臚八旬萬夀之歡逖西土人幸登百有三齡之瑞宜剡章之入告實褒典之允符奉上諭勒保奏甘州府撫彞㕔老民鄭汝仁現年一百一嵗請㫖旌表等語鄭汝仁年逾百齡精神矍鑠洵為昇平人瑞所有應行建坊旌表及賞給銀兩縀疋之處著該部照例具題併摺發欽此臣部核與旌表之例相符應請官給建坊銀三十兩並昇平人瑞字様併遵照本年恩詔内開百嵗加賞由内務府支領縀一疋銀十兩轉給祗領奉㫖依議鄭汝仁著加恩賞給上用縀一疋銀十兩臣等謹案古帝皇斟元陳樞象符合氣以亭育萬有逺者億齡其時人風真淳蕃祉夀耉三代而降崇禮百年之制不概見記有就見之文而其説不可通行漢唐以後間有粟帛牛酒之賜爵級版受之條不過因事布惠偶及耆年其以一人曼羡之慶錫及天下期頥之侣肩踵相望者概乎未之有聞也我朝定例凡年至百嵗者由督撫題請旌表官給坊銀三十兩坊之額男子曰昇平人瑞婦人曰貞夀之門夫婦並登百嵗者則曰期頥偕老自百一嵗以上又加賜内府縀疋銀兩有差或特降温諭以寵嘉之其尤異者至御製詩章御書匾額以賜引年之盛伊古所無自乾隆四十五年七旬萬夀至今各省大吏毎一剡章自一人至十數人自百嵗至百數十歳姓名上逹茂渥遄頒綜計禮部覆准凡若干人布嚕特部落亦有嵗越期頥仰邀恩錫者仁夀之徴無逺弗届其百嵗而得五世元孫非謹以耆齡專美者㳟載本門五世同堂類以彰純祜之迭申至八十九十粟帛之頒不可數紀謹分載恩賚門八旬萬夀盛典卷三十九
