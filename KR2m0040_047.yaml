即陸續登埸閭閻生計㿽當充裕覽奏為之稍慰麥收早穫豐市價中平校佇待中晚收仍可平减糶南望稱稍慰慰豈勝慙悼御製上下江廵撫各報收成分數詩以誌事戊申兩江各報收成數去聲上乃七分下九分前因書麟奏兩江地方刈穫中晚二禾情形未經分晰叙明因傳諭閔鶚元等將各該處收成分數確查速奏以慰厪念茲據陳用敷奏安徽通省合計收成七分有餘閔鶚元奏江蘇通省合計收成九分有餘近北因教潦水被安徽沿江濱湖州縣既已水勢漲發間被淹浸收成未能豐稔至江蘇淮北一帶亦因六七月間雨水較多河湖盛漲並有開放閘壩之水下注以致淮安徐州海州三屬窪下地畆被淹是以收成亦覺稍歉逺南欣淂稔秋聞其蘇州松江常州太倉四府州屬則收成十分揚州鎮江二府屬則收成九分有餘實堪欣慰界隣幸可通融濟轉壑實無飢饉紛又據閔鶚元奏淮北一帶被水地方其退涸較遲未能一律豐收之區合通省而計不過百分中之三四分而各處麥收俱稔商販通融糧價尚屬平賤仍恐向隅有獨嘆緩徵喻吏撫綏勤淮北瀕臨河湖一帶本係積歉之後今嵗被水田畆殊堪軫念即降㫖今将蕭縣碭山豐縣沛縣安東清河桃源海州江寜上元句容江浦六合十三州縣新舊錢糧漕米概予緩徵其山陽塩城阜寜三縣雖有薄收而新舊錢糧並徵亦未免拮据並令将舊欠緩至明年秋成後徵收以紓民力俾免向隅之嘆御製署山西廵撫海寜奏通省秋收八分有餘詩以誌慰茂申八分餘穫稔之中春澤北遲欠普豐海寜奏晉省秋禾約收分數泰谷等十九州縣約九分有餘陽曲等二十三州縣約九分泰原等八縣約八分有餘榆次等三十四㕔州縣約八分祈縣等約八㕔州縣約七分有餘石樓等九州縣約七有分豐鎮等三㕔縣約六分有餘汾陽等六州縣約五分餘合計通省約收八分有餘等語晉省各屬本年雨晹時若大田均慶有收惟大同府屬春間得雨稍遲未獲普豐然總計通省八分有餘尚稱中稔却已閭閻繾飢饉幸教場圃致盈充更欣秋雨隰原渥争播甫田麰麥同奚藉重申餘九諭由來知儉是唐風御製陕西廵撫巴延三奏報秋禾雨澤及約收分數詩以誌慰戊申各數足秋雨收成約八分前據巴延三奏陕省入秋以來雨水霑足茲又奏稱八月初十十一日蜜雨連朝所種榖糜及各色雜糧正當結實之際淂此雨澤顆粒㿽加飽滿其各屬約收分數九分有餘者墊厔等七州縣九分者紫陽等八縣八分有餘者孝義二十四㕔州縣八分者富平等十五州縣七分有餘者鄠縣等十五㕔州縣七分者咸寜等十㕔州縣六分有餘者甘泉等四州縣六分者醴泉等四州縣統計八十七廳州縣秋禾約收八分等語邇日正屇築埸納稼之時豐盈有慶民情欣悦可知寜惟一心慰實為去聲萬民欣盗賊自當鮮足衣食則鮮盗賊葢藏仍合勤更希冬雪渥宿麥利耕耘御製湖南廵撫浦霖報中晚稻通省收成九分有餘詩以誌慰戊申湖南六州縣被水祗低田涸地補種遍髙區仍穫全九分餘計省浦霖奏報湖南通省七十四㕔州縣内除溆浦華容安鄉灃州武陵龍陽六州縣因夏間雨多低田有被淹之處水涸後補種晚禾雜糧現在逐加確勘外其餘各屬及溆浦等六州縣境内未經被水之田中晚二稻均已登埸收成九分有餘者三十㕔州縣九分者三十六㕔州縣八分有餘者四縣八分者四縣通省計有九分等語萬姓幸逄年南望能無慰念其北㿽憐御製湖北廵撫恵齡奏通省中晚二稻收成七分有餘並積水消退糧價平减詩以誌慰戊申湖北今年重沴行恫瘝赤子旰宵縈謂将何以度冬月不料猶稱穫七成湖北省因夏季雨水較多伏汛盛漲以致沿江傍湖低田多被淹浸前據恵齡奏該省早稻收成尚有七分茲𣸪據奏所有勘不成災地方及未曽被水各屬民屯田合計通省六十八州縣併算中晚二稻收成共七分有餘現在市販充裕價值中平所有武昌鄖陽施南各府屬及蒲圻等三縣並較上月稍减等語是實仰䝉昊貺誠始念不及此也通省計雖稍意慰一隅嘆尚切心怦漲消宿麥勸耕普又據恵麟奏稱被水田地間有涸退稍遲之處雖未及補種雜糧正可乘此翻犁佈種二麥其未經翻種處所一律借給資本俾令及早種麥以待春收翹籲春秋救萬氓御製䕶理福建廵撫印務伊轍布奏報雨水收成分數詩以誌慰戊申寅亮誠憐舊督賢李侍堯歴任總督素稱能事上年因剿捕臺湾逆匪調任閩浙駐劄厦門辦理軍儲一切俱能迅速周妥隨即加㤙賞還伯爵以示寵眷詎意春間以肩背生瘡遂爾溘逝深為憐惜撫臣海外未言旋福建廵撫徐嗣曽上年渡臺湾經理糧餉事務既大功告藏所有善後事宜雖經福康安於回京以前俱已立定章程然臺湾甫經平定不可無大員在彼安輯撫綏據奏年前可旋省而此時則尚未内渡也即真新簡方登道前因李侍堯病勢未能即痊已命福康安馳往暫行署任嗣淂李侍堯之信因念海疆甫定非簡用重臣不可而福康安威名已著即令補授閩浙總督實於地方有禆但登途未及一月計程尚未至彼耳䕶理因之得奏箋藩司伊轍布現在䕶理撫篆地方事務例淂陳奏禾稻秋收八分上原田雨澤七閩全伊轍布奏福建省自九月十二三日以後連次淂雨各屬亦俱霑渥並奏報收成分數九分有餘者永安等四縣九分者順昌等十二州縣八分有餘者屏南等十三縣八分者閩縣等三十一州縣七分者福清等四縣核計通省實在八分有餘糧價平减民情深為恬適總戎安渡鹿仔港乃繋苞桑釋逺牽七月間命奎林往代普吉保為臺湾鎮總兵已經數月總未淂接到任之信為之繾念不置茲據伊轍布奏奎林初次放洋後將抵鹿仔港被風吹回在永定澳登岸由陸路赴崇武澳守風嗣於十月初九日放洋十一日已扺鹿仔港登㟁等語渡海守風亦事之常但奎林不即據實奏聞以慰厪懷殊屬不曉事體今淂確信且慰且飭之御製署陕甘總督勒保奏甘肅收成八分有餘詩以誌慰戊申弊行每嵗報灾被弊去連年遇稔頻甘省因王亶望等冐賑侵蝕監糧是以每嵗虚報灾以市利及大加懲治之後據歴任督臣李侍堯福康安奏報屢嵗稱豐惟以實陳飭諸吏弗因逭賦問於民冐賑開捐弊固在官而歴年免徵民亦隂沾其利然予止懲貪官之罪而弗忍追問貧民此治民之要也中豐固幸安老㓜偏歉仍教賑弱貧正值督臣同閲奏慰中増惕我君臣茲據署督臣勒保奏甘省秋未統計收成八分有餘雖有偏被雹旱之平凉華亭武威平畨荘浪臯蘭金縣狄道八州縣及被水之平羅縣屬以收成稍歉請将本年應徵正借錢糧及舊欠銀糧草束緩至來嵗徵收以紓民力然數處秋收尚在五六分以上不致成灾而通省俱獲中豐實堪慶幸茲督臣福康安自臺湾成功來京留之尚未赴任同閲此奏自深欣慰也八旬萬夀盛典卷四十七
