body:
  text: 盛事二十三收成分數二乾隆五十二年直省收成分數直𨽻省二麥七分有餘秋禾九分有餘江蘇省二麥九分有餘秋禾八分有餘安徽省二麥秋禾八分有餘江西省二麥早稻晚稻八分有餘浙江省二麥春花九分有餘蚕絲九分早禾晚禾九分有餘福建省二麥九分早稻晚稻七分湖北省二麥早稻中晚二稻八分有餘湖南省早稻八分有餘中晚二稻九分有餘河南省二麥秋禾九分有餘山東省秋禾九分有餘山西省二麥八分秋禾八分有餘陕西省夏禾八分有餘秋禾九分有餘甘肅省夏禾秋禾八分四川省夏熟八分有餘秋禾九分有餘廣東省早禾晚禾七分廣西省二麥早稻晚稻七分有餘雲南省豆麥秋禾九分有餘貴州省夏禾秋禾九分有餘伊犂各屯二十八分零塔爾巴哈台一十八分零喀喇沙爾各屯一十五分至一十七分零鳥什各屯二十分零烏嚕木齊巴里坤各營屯一十五分零哈宻各屯一十五分至一十六分零吐魯畨各屯一十四分至十六分零御製河南廵撫畢沅奏甘雨普霑並麥收分數詩以誌慰丁未前年豫齊歉齊輕而豫重豫蓋已洊飢前乙巳嵗山東河南均因缺雨成灾而河南則旱乆連嵗不登較之山東偶被偏灾者尤重至上年兩省雨水充足二麥秋禾俱獲豐稔合計收成約均在八九分以上去冬今春豫省雨澤優渥而山東則不能一律普霑是以現在麥收情形又覺豫勝於齊也齊則灾偏降叶昨嵗胥登秋吾民受㤙總冬春豫霑膏齊乃不齊並叶屢接豫撫章優渥各屬統茲約報麥收九分有餘綜覽之為欣羡此何向隅恐莭次據畢沅奏報豫省各屬春夏以來雨水應時兹因㑹勘河工由省渡河而東於四月十六日起至十八日止甘雨淋漓優施兩晝夜省城及開封衛輝歸徳彰徳各屬均報同日甘膏渥沛逺近普霑不但麥粒飽綻各項雜糧俱淂滋培長飬其已經刈麥之區又可翻犂播種秋榖並據彚報通省一百八㕔州縣二麥約收分數合計九分有餘日擊城鄉市集到處歡闐糧食充盈價日平賤等語麥價日以賤秋田胥佈種更稱贖迴地十之八九返叶山上年畢沅奏豫省灾區地畆有西富民放債凖折之事莭經申曉諭示减利聼其迴贖畢沅辦理得冝上年節次奏稱八月以前贖過地三十萬五百餘畆又自九月至十月復贖過地二十六萬三千一百餘畆茲又據奏自十一月至正月底又贖過地四萬一千九百餘畆統計贖過地共六十萬五千餘畆約有十之八九覽奏為之欣慰額手慶民蘇元氣庶復鞏惟是近山左繾念愁心孔御製安徽廵撫書麟奏晴雨應時麥收豐稔情形詩以誌慰丁未前年灾重昨偏灾前嵗安徽省各屬旱灾甚重為之預食籌截留漕米賞給口糧籽種以裕民昨年通省内惟定逺等十七州縣中有被水之處其餘各屬統計收成約有八九分亦屢經飭諭大吏加意撫恤徽歙南瞻刻繋懷大麥收完小麥逮八分不啻九分皆兹據書麟奏安徽省今春多屬雨水霑足四月間晴霽旬餘大麥收割將畢淂資曝曬小麥漸次黄熟早秧挿蒔已齊彌望青葱其已割大麥之田塘堰均有蓄水又各乘時翻犂播種市集糧食充盈價值平减各屬開報二麥約收七八九分不等實為豐稔等語覽奏為之欣慰宜暘割穂羣資曬潤雨挿秧又正佳慶慰吾民獲蘇濟㿽深敬畏戒盈乖御製署湖南廵撫舒常奏報二麥有收詩以誌慰丁未乙巳深憐湖北飢幸逄丙午有秋資雖然元氣豈易復為去聲是農功恒繋思却喜飛章行館到報收二麥八分披舒常奏湖北省二麥收成分數九分者十三州縣八分有餘者一縣八分者五十州縣七分有餘者二縣七分者二州縣統計通省六十八州縣實八分有餘更稱時若秋堪卜敢以滿期以敬期御製總督李世傑奏三省麥收詩以誌慰丁未徽歙麥登早悉知五月初據書麟奏安徽晴雨應時麥收豐稔統計通省收成約有八九分等語江南江右報豐隨茲據李世傑奏三江麥収分數稱江蘇省麥收九分有餘江西省亦八分有餘糧價日見平减民人樂業披閲之餘不勝欣慰市鄽糧價日平减髙下田功普沃滋馳望能無増慰慶盟心惟有勵䖍寅邇來左近炎歊熾思淂甘霖渥潤之御製湖廣總督舒常廵撫姜晟奏報早稻収成八分有餘並請酌動倉榖運閩省偹糶詩以誌慰即用楚省二麥有收詩韻丁未最憐前嵗楚逄飢幸遇昨年秋穫資二麥復収早稻熟此封遂切彼疆思五月間據舒常奏湖北省二麥收成八分有餘茲又㑹同姜晟奏湖北早稻收成亦八分有餘並稱臺湾逆首尚未就擒所有軍需糧米雖浙江江西等省預備充足但恐賊匪肆擾附近郡城耕作或多曠悞湖北省雨晹時若早稻豐收查淂隣近水次州縣貯倉榖石共有四十餘萬公同籌酌擬動支榖二十萬石碾米一十萬石遴委道府一員為總運由江西一路運至閩省又舒常奏湖南省年嵗亦卜有秋即日鞫案前往擬與撫臣浦霖酌議亦動榖碾米運閩以資備用各等語足見體國急公深堪慰悦隨令交部議叙以示嘉奨濟粮遥備軍儲用運榖茲欣奏牘披體國如斯知政樂得人不負素心期御製河南廵撫畢沅奏秋收九分有餘詩以誌慰丁未豫壤昨年已有收今春麥稔榖登秋慶稱通省九分慰據畢沅奏豫省一百八㕔州縣除歸徳屬之商邱寜陵二縣被灾不計分數外其睢州永城鹿邑柘城髙阜處所及距河較逺地方仍屬有收約計收成十分者祥符等五十二㕔州縣九分有餘者杞縣等三十一州縣九分者通許等十八州縣八分有餘者永城等五州縣合計通省約收九分有餘豫省兩年以來連獲豐收殊深慶幸仍切一隅萬姓憂夏間睢汎漫工商邱等五縣被淹輕重不等綜計通省未及百分中之一二雖據奏稱目下糧價平减民情歡悦然即此一隅灾黎深堪憫念慰勿抵愁此為君之所以難也雖曰相資平米價莫忘獨歎墊居愁南瞻慰勿抵憂甚是即為君難所由御製山東廵撫長麟奏報秋成九分有餘詩以誌慰丁未齊郊春澤究稱偏積欠曽教緩歴年三月間據長麟奏山東省雨澤未淂深透因即降㫖将歴城等五十三州縣及衛所上年緩徵糧米并前次未經分年帶徵之項俱著緩至本年秋收後分作二年帶徵其應帶徵積年欠項亦分别展限以舒民力詳見前作命緩徵山東歴年積欠錢糧詩注幸得尺膏霑夏月普茲碩穂熟秋田九分以計稔逄嵗茲據奏稱東省登州萊州沂州兖州濟寜臨清六府州屬大田播種較早髙梁榖子長發亦極暢盛至青州武定濟南東昌泰安曹州六府屬淂雨稍遲所種晚榖豆子等項亦屬野無隙地自六月以後雨晹時若其早種髙梁等項俱已豐登其晚榖黍稷等項至八月底亦可一律全收計登州沂州兖州臨清四府州屬收成約有十分清州武定濟南東昌四府屬收成約有八分合計通省收成約九分有餘較之豫省麥收雖覺少遜然秋成淂此已足惬副所望萬寳胥登恩沭天較比齊疆麥收遜慰中自哂太求全御製署陕甘總督勒保奏報秋田八分收成詩以誌慰丁未邇嵗甘省未報灾向連嵗灾因作弊甘省自壬寅年李侍堯奏通省秋收九分以後連嵗俱未報灾前至王亶望等每嵗報灾冐賑浸蝕監糧及大加懲創後嵗亦屢稔可知吏治肅清自可仰邀天貺也審知亦勿罪愚民惟罪欺天之惡吏今年春夏雨澤稀督臣先事已奏至本年春夏之交據督臣福康安奏報甘省雨澤短少時深厪念及五月中旬連淂透雨後六七八月晹雨均調秋成仍可望有收後經淂雨仍有收署督臣茲陳次苐被霜雹者乃偏灾緩徵借榖胥按例各府州收雖不同合省總以八分計因福康安勦滅臺湾逆賊令勒保往署督印茲據奏安西一州暨所屬收成七分蘭州平涼甘州涼州四府并肅州直𨽻州所屬除被霜雹地畆外各收成七分有餘鞏昌慶陽寜夏西寜四府并秦州階州涇州三直𨽻州所屬除被雹地畆外各收成八分有餘通省統計收成八分有餘其先經偏被雹旱補種晚稻及霜信較早秋田徽有受傷之處收成雖在五六分以上不致成灾但秋收未免歉薄請将本年正借錢糧及舊欠緩至來嵗徵收用紓民力仍察㸔今冬明春情形如有缺籽乏食之户分别酌借倉糧以資接濟等語當即批令督屬妥辦俾受實恵額手吾民免飢饉並飭妥辦俾受恵恵民掃逆胥實政惟盡吾心仰天賜乾隆五十三年直省收成分數直𨽻省二麥八分秋禾九分有餘江蘇省夏收秋收九分有餘安徽省夏收八分有餘秋收七分有餘江西省二麥早稻晚稻八分有餘浙江省春花蚕絲九分有餘早禾九分晚禾九分有餘福建省二麥七分有餘早稻晚稻八分有餘湖北省二麥八分有餘中晚二稻七分有餘湖南省二麥八分有餘早稻中晚二稻九分有餘河南省二麥秋禾八分有餘山東省二麥七分有餘秋禾九分有餘山西省二麥七分有餘秋禾九分有餘陕西省二麥九分秋禾八分有餘甘肅省夏禾秋禾八分有餘四川省夏熟秋收八分有餘廣東省早禾晚禾八分有餘廣西省二麥七分有餘早稻晚稻八分有餘雲南省豆麥秋收稻榖雜糧九分有餘貴州省夏收秋收九分有餘伊犂各屯一十八分至二十八分零塔爾巴哈臺各屯二十一分零喀喇沙爾各屯一十五分零烏什各屯二十分零烏嚕木齊巴里坤各營屯一十五分至一十八分零吐魯畨各屯一十二分至一十五分零哈宻各屯一十五分至一十六分零御製廣東總督孫士毅奏報春雨霑足麥收豐稔情形詩以誌慰戊申東粤近隣閩賊平民氣誾當林爽文等滋事時粤東就近多徵調兼緝捕逸匪不無繹騷茲兇逆胥已捕誅海疆平靖彼處民氣亦可安恬矣澤需嵗惟首霖霈月終旬據孫士毅奏粤東入春以來地土㣲乾旋於正月廿二日潮州府一帶宻雨淋漓自宵逹旦頗為霑透至二月初九日方始開霽二麥淂此結實飽綻現已有刈穫者可卜一例豊收至早禾俱已翻犁二月下旬即可栽挿又廣州省城及肇慶恵州嘉應各府直𨽻州淂雨情形逺近相同糧價日就平减覧奏深為欣慰惟北省望雨仍不免懸切耳繼此時優霔起耕遍隰畇披章寜不慰望雨此憂頻御製兩江總督書麟江蘇廵撫閔鶚元各報麥收分數詩以誌慰戊申總督知三省撫臣悉一方安徽總督報據書奏奏上下江各州縣二麥約收分數已經報到者七八九十分不等向例奏報收成分數撫臣應各詳悉專奏茲書麟時以㑹勘秋錄正在江蘇故安徽撫臣尚未奏至而總督就各屬所禀先行具奏大概耳吳下撫臣詳閔鶚元奏大江以南所屬二麥已經黄熟以次登塲據江寜蘇州松江常州鎮江太倉各屬禀報麥收均有九分十分不等其大江以北所屬氣候較遲二麥亦将次成熟據各屬陸續禀報亦約有八九十分等語八九十分穫北南中普臧江南省以大江分南北在江以南者蘇松常鎮等府屬在江以北者淮徐通海等府州屬其江寜楊州等府則介於中故云同民慶逄嵗㿽敬待秋長御製湖北廵撫姜晟報二麥收八分餘詩以誌慰戊申優霑春雨夏初晴二麥正資結穂成通省八分有餘穫諸商各價自然平姜晟奏湖北省春夏雨暘應時四月中旬以後幸值晴霽二麥及時刈穫現已一律登場查核通省九分收成者六州縣八分有餘者二縣八分者五十六州縣七分有餘者二縣七分者二州縣總計收成實在八分有餘等語際此夏收豐稔不特糧價日平而民間日用所需亦可無虞踊貴屢綏幸繼昨年稔時若更期秋稼盈湖北去嵗豐稔茲又麥秋告稔元氣可復况據稱省城復於五月二十六七日甘霖渥沛濕雲濃羃逺近定必圴霑現在分秧蒔挿之際淂此應時雨澤是該省秋成更堪預卜手額南瞻曷勝慰慰餘䖍鞏敬彌生御製江西廵撫何裕城奏二麥收成八分餘詩以誌慰戊申麥收南省早於北四月中旬已報登各屬都臻八九際江西