body:
  text: 歌頌萬夀恭紀七言律詩六十四章恭集庚韻御製詩用八謹序戶部尚書臣董誥皇帝御極之五十有五年嵗德在庚日月會於夀星之次恭遇聖夀八旬天地昭融人神歡喜薄海內外裔夷君長圓顱方趾之倫莫不重譯叩關鱗集關下儛蹈昌期猗歟盛哉臣愚以為是太和元會權輿俶肇之期也粵自羲皇一畫孳啓苞符羲之數圓神以五方智於八故卦成於八重為八八以動為四千九十有六圖中於五成於五五以衍為萬有一千五百二十而䇿之數始一周所謂天施地生益進無方蓋萬萬而未有紀極矣洪惟我皇上乾健坤貞嚮離出震建極錫極於兹五十有五年煥為大文布為皇武徵為夀疇元氣所至山川出雲負氣含生有目咸覩御製詩文篇垂五萬經筵發論圜橋臨講淵源津􅘦四庫粲陳人倫之至立言之精書契以來蔚乎觀止省方設教翕河晏海以洎雅經重譜宣碣載摹闐球在懸鎛鐘備製文章之盛倬于雲漢我武維揚宣捷者九西師一役拓疆二萬金川再征蕆以五年中間籌筆應機神謨獨運東西朔南偕來奔走𨽻乎職貢之圗者三百有餘部今者南交躬覲侍陛承恩臺嶠生畨瞻天匍伏濟濟乎奉衣冠稟正朔軼隆干羽懿乎哉稽諸邃古未兹有也蓋羲主創皇上義兼述作合先天後天之藴為念學念功之本固與一畫開天同符合由是覲揚詒裕以篤我祜惟天惟祖􅀢宗實右康之翕受敷施皇集其成五福親受五代燕翼應五五嘉會之亨當八八相生之始竊惟五者圖之中數八者卦之成數因而重之則為大易全經之六十有四嗣是乘之為億兆為京垓為不可算斯臣所謂權輿俶肇者也今年春皇上以鴻慶臻期迓釐泰岱展謁闕里既蒞山莊乃俞中外臣民籲祝之請回鑾行慶上儀炳舉在廷臣工莫不懷握鉛槧砥礪濯磨冀有所撰述揄揚萬一而臣叨職禁近日得仰瞻穆穆之光受恩最深誠宜悉力殫精宣布職業如宵雅之頌九如顧惟檮昧擬議莫名竊以奎畫所垂乾端坤倪奧備圖書庶幾因聖人之文以敷揚聖人之盛德大業惟是咏雲門者難為音遊崑閬者難為寶矧乃聖文淵海富賅萬有量天繪日理窮鑽仰而天日所臨容光必照不隨所見為大小昭昭之多具覘全體易言先庚後庚孕義極博而且吉庚形詠乎雅詩由庚間歌於儀禮先儒説經者一以庚訓續一以訓道或又以申命謂庚或又謂庚言剛物至秋始堅剛故釋氏亦言金剛般若波羅密為佛無量夀臣謹仰繹經言旁綜諸詁伏以聖人垂五履八嵗紀大橫實維聖節干支而十日十二子相配鈞環轂轉庚庚迭繼周旋無窮適與羲䇿相乘允有協於保佑命自天申之義抑聲詩所始五均八音義自環生韻書繫八以庚宜有天契至德錫符期應紹至億萬萬年起祘乎是積祘乎是延鴻曼羡懋哉景鑠不勝踴躍歡忭之至私即管窺所及恭集御製七言詩成八庚韻律體六十四章謹拜手稽首以獻康疆八十叨天貺九宇車書奉大清五世曽元胥繞侍百年中外久承平羲圖文籙三才貫方卦圖蓍衆理呈兹獲箕疇念時敘便期萬物遂由庚右一九疇箕子疇書衍帝範原開帝學棖省嵗寰中多錫祉垂衣日久慎持盈觀民要為安民計心法由來治法并製寶仍勤庶徴念及人敕政慎施行右二恭承祖訓示千古感召天和福萬氓有戒文恬誇豫大不為物蔽在離明三言惠迪吉欽仰一語為君難最精位祿夀名得因德祝釐欣願海山盈右二太和廣運昭安阜慶典今年舉帝京億萬人增億萬夀吉祥雲裏吉祥聲月如不夜常稱午干協大橫恰值庚天錫八旬曼以羡益欽天眷凛持盈早覺關山喜氣迎光明日月永銷兵七聞鴻捷叨天佑六度南巡慶典行舊部新藩同賀喜黔圍黎繞驗其情惠心勿問思羲象大德應符震出亨右五正供普免培民氣陳粟相因露積贏一二偏災仍賑恤萬千寶穡可登盈時巡展義率由舊行賞推恩例視成際此繁滋仁夀世京垓億兆願康平右六五旬五載久臨蒞勤政明廷接九卿大率為民非為己端惟時雨與時晴聨遐惠衆繁難却返朴還淳義寓精光祿減明十之九承先示儉總關情右七閲摺硃批手自評宵衣問政惕深更披章豈不為之慰求當無非盡此誠日有事焉資善政義如是耳貴躬行內安外順胥天佑肯忘黔黎有仰生右八小亷大法勉敦實詎止刑清政亦清靜照萬幾無固必本之兩字曰欽眀軍機策弗纎毫爽乾惕攄斯一念誠鼓以雷霆潤風雨果然天地有權衡右九大禮躬親嵗嵗行太和玉輦啓平明穹窿氣象垂春幄糾縵雲霞煥寶楹雖是節勞語從衆到斯瞻仰敬攄誠齋宫靜養神心謐永祝雍熙豫庶氓右十要覽作而成憲述顯承佑啓泰階平三謨二典分明在內聖外王模楷呈昭若至今鴻訓示朂哉惟是體乾行由來家法貽千祀繼緒心殷惕捧盈右十一大知大仁兼大勇奉時惟是應時行百王屈指誰同德萬事由來有志成朂我八旗永為式孰非前烈賴經營敬觀實録思開創顧諟恆勤劼毖誠右十二向已圖書貯大成聖人垂訓久光明積年纍月而窮究精義嘉言與論評典備六千年燭照區分五百草函盛近因四庫參詳校益識文謨望道情右十三百川於此朝宗海飛閣凌雲切太清夏鼎周彛自典重唐函漢略較他贏成編割裂異大典薈要重教撮至精稽古右文惟是亟襄哉贊贊朂諸卿右十四直傳一貫天人學排日詩章似例成萬里之間諭尺咫千秋以上驗平生若詢及節應時句未是吟風弄月情理趣鳶飛復魚躍化工無盡此探精右十五信天天眷古稀有日益孜孜若捧盈著説證明千古舛針詞惟朂一心誠勒銘敬慎周武語戒得原循聖祖情創業守成殊理道更申知過義尤精右十六漢氏讕言在訂􅘱底從月令考間評春秋冬夏於焉對蠕動肖翹各别名誰辨方言及爾雅漫論渭濁與涇清分明角解非同麈細體方知聖語精右十七江河日月道恢宏國學惟新逮落成如意吉祥綿祖慶崇儒雅化示寰瀛宜頒湛露聨疏逖何似菁莪育俊英新石重教增舊石靈鼉奏不數砰訇右十八中和樂奏升平曲鑽仰堯章益屏榮巷舞衢歌申衆悃新題舊什閲關情五音宫商徴羽角四德乾元亨利貞詎曰因難而見巧乃知天地有元聲右十九四推蕆禮置朱紘次第三王及九卿倬被公田經舜步莫非爾極粒民生絲楊錦杏吟情逗雨笠煙簑稼具呈試上觀耕臺上望勸農一幅畫中行右二十博恩應與耀光明蕊榜三場特地行所貴清真兼雅正預捐蕭艾擷荃蘅遺書搜索佐文治授職由來重老成漫説禎祥棲以鳯鄰哉思日贊治平右二十一夀錫寰區百草增千祥萬福萃元正迎年鼓聽都曇響照世杯開不夜城萬户皇都春富貴九華蓮燭翠縱橫柏梁賡已宴千叟又得新詩紀上庚右二十二悅心甘雨霑三白仍望春雲霈瑞霙層閣已懸銀作網萬峯都以玉為英曰休曰助新頒旨宜麥宜禾總愜情一嵗祈農接終始春生夏長逮秋成右二十三晴多祈雨雨祈晴髙下田胥萬寶成有所會心常命筆無過飛興念農耕蠲租賜賑不稽澤接踵迎鑾多頌聲惟以實陳飭諸吏勿將容易説豐亨右二十四開閶詄蕩元辰會丹艧維新旭彩明寶篆書聨徴吉語鳳笙按曲是春聲一堂幸值五代慶數典應看四庫呈家宴乾清歌具爾同民翹首祝釐情右二十五濟濟蹌蹌引辟卿時幾歌作佇臯賡無非稽古居今處相和敲金戛玉聲何必鸞觴浮六醴收將仙液煮三清兩階干羽重華德思義還因惕顧名右二十六文翰班仍內翰并文華廣殿集儒卿親裁御論抒心會亦曰尊聞在力行何必虞臣進歌頌首崇彛訓式膠黌五倫知止須勤朂思日新懷瑩德情右二十七仙蓂十二度敷榮月朔因為禮寺行譯以國書宣白業時因福地靜塵情恰如一月千江印聽是天龍法喜聲一部心經示空色如來如是本圓成右二十八四壁圖書鑑古今别裁可識寓心精畫禪筆陳皆相似鳥顧花芳互有情兩字瞻茲虛以愛七言權當序而行天倪道管參元要神解還因靜賞生右二十九恩頒軍士皆鳬藻沙暖龍塠免踐更旗籍緑營維內外農功旅况叶休貞武成事事胥如意契算迢迢似宿盟列陳旌旗特親閲馳驅真是賴羣英右三十五年籌筆拓強萬大地山川一掌平武偃文修順天道野田磧土有人耕試調馴馬雲中錦且聼流鶯栁外聲檢校漢唐西域傳畏威懷德既歸誠右三十一厄魯和通以次平金川嘉兆卜師貞八旗子弟心如石七萃材官古莫衡必有真才濟實用誰能不戰屈人兵誠孚度索懸橦地扎薩蒙恩數世更右三十二鐻鍝膜拜法王燈㲥毦衣冠侍子伻舞雜都盧觀曼衍化行勃律志銷兵即看鳬藻尊親意不籍調停典屬情瀛漠笮卭春宴共承天萬里共元正右三十三師古量材琢碧瑛和闐嵗貢羾都京鎛鐘特磬均依古玉振金聲集大成何異商尊及周卣要當晣理更研精還思韞石山輝映欲笑吳中陸士衡右三十四臺嶠生畨許惠承為聽指使各將誠二魁俘虜靖遐壤一夜傳聲遍帝城勇將歸來兼福將禮行惟是奉天行視如遲乃欣成速飲至筵開及薦櫻右三十五逾年征𬗟底遲成一可當千衆賊驚此日創來即創得不惟無戰並無征纒頭羣喜瞻天表有象因之頌太平獨幸文身南掌使憐他一例載由誠右三十六交趾安南後改名阮家應與錫期禎仰流嘉彼明於順受寵由來勵若驚一統咸賔欽錫羡三畨耆武匪佳兵衣冠蹌濟遵王會况是朝家舊法程右三十七南北東西共文軌詩篇來往達音聲無雙善本教重泐有六古稀賴賜禎遊奕似臻安養國恩膏直逮孽多城呼韓上夀尋常事夀宇思將遍九瀛右三十八春隂瓊島紀春明秀占人間有玉京此日賢王爭扈從當年學士號登瀛船從紅雨香中繫輦向青陽左個行倒影樓臺依碧水漪瀾不起鏡光平右三十九仙園韶景薰馨暢小仗黃麾度禁城有數軒楹資憩息無雙風月屬昆明樹籠寶殿千年閲座對西山一坐橫最是瑶階稱祝日玉輪將滿玉霄清右四十難在守城創不易大東座鎮翼陪京丕基敬繼五朝業北戒遙踰萬里程最久升平軼唐漢摩挲往迹辦金明書成開國懷前永猶仰天聰此赫聲右四十一四代未行或有待萬幾敕毖省其成一時龍虎風雲附却漏山河帶礪盟王會千官鏘劍佩本根百世示權衡諡增一字非私惠敢或從情作重輕右四十二監在勝朝基命密尚憐氣節在公卿誠敦君鑑復臣鑑觀察民生即我生因以輿圖考當日誰傳麟筆紀春正二臣傳復分甲乙定論難辭惇史評右四十三山莊侍祖承恩地習武柔遐以次行塞即京華林即上星為含譽雲為卿家絃戶誦文風蔚鳩杖鶯衣父老迎承德朝炊萬家起豐徴祀粥飫香粳右四十四普陀于右須彌左縮地居然此赤城咫尺琳宫並瑶圃非誇畫棟與雕甍祥垂青幕燈金熖律暖原蕪毯緑萌設教由來貴神道畏懷逺部自歸誠右四十五露草千蹄踏玉英霓旌搖曵曉曦明萬靈此日雲車肅諸部皆携獵騎行沐雨􅌨風恆此共駱漿乳餅總輸誠虎神鎗寶貽皇祖疊中非誇技擅精右四十六筵開灑馬錦雲騰宴罷歌時達網城野甸霜華如玉豔宜人風物叶金行非誇多獸因農隙亦似承歡允衆誠原是向年行慣例等城清曉視調羮右四十七盤山山色遞前旌地回因知近玉京鏡水雲岑標道趣風鞍露冕浹民情兩峯天闢仙壺路百烏林翻韶濩聲却想臺懷駐輦處天花天樂動逄迎華幹西來走嵩嶽無邉詩景入行程攀躋直到香山寺仿佛華連舍衛成半笠滄波三月雨幾盤雲徑萬峯晴題崖緑字煙蘿蔓漢柏隂中句偶成右四十九臺回俯郊永示後龍旗玉駱出都城應教春宴繼凱宴為撫鏗鯨溯翦鯨上將隨車金䍡􅝹新條覆畝緑縱橫嘉名永定貽皇祖正務觀河此日程右五十岱廟森嚴玉陛升配天生物鎮蒼精帶齊襟魯歸憑攬松韻泉聲總快情詎比登封誇豫大無非民事厪躬行携來四氏齊迎輅近止尼山慰素誠右五十一越水吳山幾度評順時清蹕此巡行無邉佳景源源至有喜春光靣靣迎竹箭桃花觀浩勢方壺圓嶠回滄瀛南邦水土平成慶却為觀民不趲程右五十二積土陶莊勢九成閲河歷歷仰堯營九重歡戚同茅屋兩壩東西示定程曲突徙薪誠上策揚揚止沸可無驚討源直到真源處紀載從來艱確名右五十三籌度柴塘教易石無非保障厪民生記云凡事豫則立子曰三年必有成祇以對時懷位育可知恩澤沛寰瀛屢蒙天貺昭神貺萬夀增如大海并右五十四旬五象天六爻衍十成紀嵗五常并久安長治心斯企昔易今難每繾情奉以三無畏夙夜大哉一氣與流行景禧綏履如川至祿夀駢臻算介瀛右五十五山館延緣駐翠旌綵亭預祝貢輿情恆春樹擁三山近及節花開五沃擎是則重華歌解愠雅如七月詠稱觥生身慶祝來諸部厚往仍照例賚行右五十六曉蹕乘涼喜快晴金仙羽衛化人城敢希穆穆居歆眷倍切乾乾保泰情寶閣便成無量夀箇燈常放大光明層樓金瓦輝香象果格朱波績底成右五十七喜氣迎鑾達帝京天開閬苑簇霞英篆凝瑞靄猊噴霧響徹雲璈鹿叶聲小部魚龍陳角抵雙騫鸞鳳下銀瀛香飄丹桂三千界柏酒擎來獻夀觥右五十八松枝葦度結香棚物物春臺總向榮特喜百齡來碩老傳宣次第問民情同居數世史稀見髙節為鄰德表貞一例香山南讓北不須金馬羡仙卿右五十九聨蹁鞠􅛏路旁迎引勝還娛攬結情俯視六街誠富庶靜觀萬類入空明東鶼西鰈誰分域鈴馱輜車各趲程都道今年逄大慶春臺登願鞏升平右六十園生歡喜靣前迎擬逹臣民祝嘏情萬嵗三元恆此對十年一舉又逄庚八埏萃慶承天佑四壁繪圖告武成南極六星臨北闕共球閶闔會寰瀛右六十一皇祖九霄垂佑顯六年一日此丹誠放彌卷退符精義虔鞏流謙慎捧盈知者樂兼仁者夀靜為用復泰為貞雙撑寶柱輝皇極吉語徴來有共情右六十二逄源左右垂雲藻惟聖人通天地情不涉言辭契倪管底因流嬗識元貞留餘純嘏方來備於萬斯年未覺盈得自侍臣親眼見有欣鳬雁亦和鳴右六十三數成上下經羲卦嵗嵗籌添海屋盈大德躬應五福備旁通曲盡六爻情金純什襲守惟甲玉斗回旋屆指庚一喜由來生萬喜重熙纍洽萬年清右六十四八旬萬夀盛典卷八十八
