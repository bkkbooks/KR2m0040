body:
  text: 欽定四庫全書八旬萬夀盛典卷九十七歌頌十七萬夀㳟演連珠十六首謹序刑部左侍郎臣穆精額皇上御極五十五年體乾剛履坤順運大鈞恢宏謨統揖羣元制平八表宇寧區謐順帝則而不知朝熙門穆近天光而自覩慶八旬之曼夀鞏萬年之丕基化宇皥皥羣生䝉䝉竊以管窺穹儀蠡挹溟量導揚羙善抒發忠孝曰有職者可得言焉皇上自代天理物之初則以法祖愛民為念大祀中祀練辰朔而嵗必親五朝三朝藏寳册而晨必讀御門聼政旰未食而自朝秉燭待章宵亦衣而問夜建勤政之殿揭無逸之篇宸章煥而日麗雲回睿謨運而風馳霆驟鑄金鐘而譜定亦十事之先頒製石鼔而文成與四庫以同夀特編五集集備於初韻記十全全周又始紫房握䇿丹塞投戈炎風朔雪之鄉珠胎獻浦沐日浴月之地玉磬浮濵拓土奚啻三千通譯已逾四萬奏民數榖數户逓増而蓄有九年免糟糧錢糧灾雖薄而賑惟倍口劭農觀稼之先耒耜必載問雨占晴之暇耕織成圖三雍講學恩牓長開千叟趨朝慶筵廣設青梁冀兖及於揚敷天下對河漢江淮注之海由地中行詔六事之本大小皆亷協五刑之中重輕有要建極保極是行以近於光大生廣生盛羙不言所利天人之際交矣聖神之事備矣是用昊貺増庥箕疇衍範八月八旬之筴天子萬年五福五代之堂本支百世翔卿合緯景曜燦於堯階澄鏡恬溶鬯草茁於文囿吉帛飄而縈瑞靄仙禽集而引祥嗈三呼階舞趨班多矍鑠之臣萬叠衢歌按拍盡淳龎之叟梯山航海而來祝大皇帝飛錫説經之衆頌至聖人自甲子迄庚申嘉節在千秋以上由東西暨南朔歡聲知萬國之同朝覲享燕大禮備而有經男婦臣民隆恩推於無外皇王之夀無疆奕􅑤之庥曷極臣幸依夀宇長侍外朝萬物如春謝臯蘇而乎憲一人有慶效班陸以抒誠謹拜手稽首而獻詞曰臣聞得一以清開元範而規物制九為數淯陽維以承嘉是以帝徳參純合撰乎盖天宣夜聖儀若典上配乎放勲重華臣聞玉衡正綱華盖極燭乎六合金猊表瑞紫宫紘曜夫三辰是以曰雨曰暘蒸元氣為江海相因相昷翔仁風以鳯麟臣聞以虚為徳蕩蕩乎無名含氣者化蒼蒼其正色是以紫庭合粹陳殷薦以居歆黄屋凝尊拱無為而順則臣聞堯有十二州洪著延禧之牒舜百有十嵗不廢籋雲之驂是以東廵至岱先五岳之一南山如夀呼萬嵗者三臣聞鵬霄式廓仰華曜者曯景於榑桑鯷壑來琛瞻青雲者梯航於銅柱是以鞏金隄之百尺静偃蛟宫頒玉瑞於重淵不鳴鼉鼔臣聞下寛大之詔首著耆年為唐虞之臣罔不夀考是以商芝獻瑞喜綺夏之作朋玉枝引年呼躬榮為元老臣聞頒三五之式則尺寸懸夫祥圗定中和之聲則鳴舞合於瑞節是以翔庭片羽先丹穴而來儀懸塔千絲叶黄裳之元吉臣聞輯藏編於太史教本作師布懿典於名山代堪傳是是以臨流建閣文無範則恣於川逮聖無津觀于海者難為水臣聞崇化勵賢首善必自京師始臨雍觀饗興禮以為天下先是以参預講筵冠領重成均之職翺翔學府津梁守至道之筌臣聞在泮鸞和濟濟多士髙罔鳯􅞪藹藹吉人是以行幄陳詩隰羽亦思霄漢臨軒釋褐角招自説君臣臣聞翔鸞翥鳯摩娑垂掘臼之文追頡揖冰錯落息銜箝之口是以八代散軼天工守而不頗二雅𥚹迫聖謨章而益夀臣聞倉后造書剖靈出祕周官治射觀徳為先是以雲章在天鸞鳯翔為八法星流入月的暈徹其重圓臣聞帝徳聖神而繼之曰武王猷允塞而隆之以功是以玁狁行誅遂罷新田之役有苗既格惟揚舞羽之風臣聞廓萬年之聖域裒對敷天式九有之帝圍離光燭旦是以屯聨䓗嶺川原盡燠陽春駕馭崐崚星海直通天漢臣聞書曰敬刑哲恵所以懋乃政易言勅法雷電於以申其威是以簡敬直文刋章而定一律原情肆赦執中而奉三㣲臣聞際虞廷之喜起皋陶颺言羙周京之對揚吉甫作誦是以雕文鏤素非能掞藻乎太清舞徳歌功長慶藩釐於天統萬夀㳟頌十二章謹序各頌集毛詩序集詩譜篇序集小序刑部左侍郎臣姜晟頌之言容論功誦徳歌之舞之要於極賢聖之情著為後王之義法莫大乎此矣天子之徳嚴㳟寅畏光熙前緒格於上下制禮作樂省方設教使民有政有居咸被其徳至於獲嘉瑞以集天命於厥身應以麟趾盛之至也虞書曰詩言志其得聖人之化者頌聲乃作至於臣在王官修典刑盛徳之隆昭昭在斯其諸致太平徳洽之詩放於此乎詩之正經比而合之各於其黨而作其頌十二篇監三代之成功明天道之助所以顯神明昭至徳也維清緝熙受祖也言能酌先祖之道以成其福禄焉維清緝熙無競維烈三后在天皇王維辟載用有嗣日靖四方不顯不承休有烈光念兹戎功我應受之匪今斯今子孫保之我徂維求定肆其靖之迄用有成先祖是皇我受命溥將右第一章昊天有成命守成也太平之君子能持盈守成可吿於神明矣昊天有成命敬之敬之上帝既命命於下國四方攸同莫匪爾極兢兢業業日監在兹不顯維徳昊天其子之是饗是宜維天其右之以祈黄耉克昌厥後維天之命永言保之右第二章立我烝民澤及四海也能以道化其民萬物之生無不得其所焉立我蒸民民莫不榖遹求厥寧既優既渥生民如何既庶且多求民之莫有稷有黍亦有髙廪天子所予載芟載柞孔恵孔時匪降自天福祿如茨實畮實藉以開百室右第三章百禮既至能備禮也得其時制以齊其民則能為邦家立太平之基矣百禮既至以享以祀以其介圭上下奠瘞籩豆静嘉靡神不舉既載清酟以祈甘雨祈年孔夙以我覃耜説於農郊田畯至喜威儀孔時蒸蒸皇皇以洽百禮率由舊章右第四章雝雝在宫始作樂以養天下也治世之音安以樂則王道成也雝雝在宫於論鼔鐘鼔鐘將將萬舞洋洋既和且平喤喤厥聲時靡有爭遹觀厥成琴瑟撃鼔簫管備舉既備乃奏烝衎烈祖右第五章矢其文徳有文章樂育材也人有士君子之行焉矢其文徳曰求厥章我其收之思輯用光既作泮宫於樂辟雍君子至止藹藹王多吉士有斐君子為章於天學有緝熙於光明告於文人右第六章載戢干戈告成大武也有常徳以立武事疆理天下萬物得由其道也載戢干戈耆定武功桓桓於征薄伐西戎用逷蠻方遂荒大東薄言震之赫赫業業是絶是忽王師之所海外有截正域彼西方四方既平幅員既長帝命率育恵此中國右第七章時邁其邦廵守而祀四岳河海也君能下下以奉禹功所以育人民也時邁其邦來旬來宣來方禋祀觀其流泉式是百辟恵此南國允也天子廼疆廼理懐柔百神莫不率從允猶翕河至於海邦以新以蒸不震不騰纘禹之緒以對於天下右第八章豈弟君子忠厚也人倫既正而刑罰能慎微其臣掌其職焉故永歌之豈弟君子擇三有事克共明刑爰得我直叶庶人之愚宜岸宜獄不僭不濫綏以多福式訛爾心啔之闢之舍彼有罪教之誨之是斷是度萬民是若庶無罪悔以燕天子右第九章綏我眉夀恵及下也養老乞言既飲食之則天下喜樂之矣綏我眉夀䋲其祖武黄髪台背式燕且譽籩豆有踐俾筵俾几自天子所飲酒樂豈萬夀攸酢既醉既飽俾爾耆而艾永錫難老右第十章天子萬夀報也言皇天親有徳申之以百福千祿焉天子萬夀小大稽首於萬斯年奄有九有四方來賀至於南海叶有震且業順帝之則來獻其琛封建厥福萬有千嵗裒時之對右第十一章天保定爾太平也王者之風天下純被臣能歸羙以報其土焉天保定爾受命既固敷天之下思皇多祜子孫千億紹庭上下春日載陽其命維新實覃實訏宜民宜人世徳作求永錫爾類宜大夫庶士俾爾昌而熾媚兹一人萬福來求以矢其音對揚王休右第十二章萬夀恭祀四言詩一百首刑部右侍郎臣王昶帝徳合天天申保佑鼎籙延洪備膺福夀其一萬流仰鏡六幕同春歛時敷錫握符闡珍其二寅承昊貺行健孜孜五十五年奉三無私其三三垓八觚瑄玉親奉黼繡竹宫著釐綏寵其四蒼龍左角星曰天田雩於首夏為榖祈年其五六宗羣神宗伯是掌中祀一週豐融肸蠁其六占晴問雨心繫三農靈湫禱澤嘉霆霑濃其七簿正祭器博古􅀈禮龍勺堆彛馨香酒醴其八列聖燕詒實訓實録紹聞衣言晨興敬讀其九西昆貢玉册尊朝龍文鏤彩鳯藻鐫苕其十堂名紀恩記分前後松壑花臺牆棟牖其十一煌煌彛訓元􅀢用鐫騎射冠服率由不愆其十二雄闗躬戰曰薩爾滸書事勒詞經文緯武其十三締造規模紀於方畧長發其祥昄章鴻拓其十四振振麟趾五代一堂雲仍戯綵萬世具昌其十五朱果毓祥𤓰絲萬葉上下五世天潢玉牒其十六勤政顔楹無逸銘扆自彊不息勲華竝偉其十七萬牘羾閶睿裁罔逸燭剪玉檠露含丹筆其十八董正羣僚周官時叙晝接近光咸承天語其十九灤水之陽清凉蓬苑肆覲外藩因之柔逺其二十白山黒水龍盤虎踞眷念豳岐陪京游豫其二十一越角呉根六臨鸞輅闓澤頻施彌綸布濩其二十二津門近輔沽淀所滙鬟之奠之瀾安瀛海其二十三星旓沛艾太室五臺香林震旦中天洞開其二十四幸少皥墟及孔子宅壁響金絲壇留琴策其二十五舞萬春丁露門釋奠鼓徴興秩采芹酌薦其二十六辟廱海流古制從朔圜橋觀聼親臨講學其二十七宣碣籕書蛟螭蟠屈十鼔重刋千秋法物其二十八榖祈上辛耤耕吉亥黛耜紺轅躬推弗怠其二十九榖數民數司農嵗獻二十倍前屢豐綏萬其三十四免正供二千萬萬漢文賜租曽何足論其三十一玉粒香秔全蠲者再含哺熈熈春祈秋賽其三十二廪發陳紅賦留􅖽秸保息振貧恵覃坱北其三十三漸江龕赭秋濤壮猛代石築塘鱗波澄浄其三十四維彼清口淮黄分流誌石宣洩隄防乃周其三十九伊家六塘洪流順軌翕河如鏡機宜親授其三十六淇園下竹瓠子楗薪浪恬鯷壑隄合龍津其三十七水道源流宸章剖析上嫓禹益下卑桑酈其三十八講筵談經毫析理窟御論敷宣昭如日月其三十九惟聖人文積千餘首地負天涵奎光射斗其四十惟聖人詩五萬有餘含風欱雅弦誦比閭其四十一臨池摛翰鳯翥鸞翔墨雲筆露妙契鍾王其四十二花藥葱蒨雲山㟢嶔墨海餘閒造化為心其四十三相臺五經佳本久佚稽古右文萃兹一室其四十四召誥一言七觀可蔽敬勝者吉丹書同諦其四十五惟史有評實為辨囿衡鑑大公一洗往陋其四十六文獻典章式賛隆化續纂三通邁杜鄭馬其四十七雎盱萬状吚嗢九譯職貢成圖蕭閻避席其四十八志廣輪數肇周司徒亘天為㝢一統黄圖其四十九四庫編書七文建閣宛委羽陵阮録劉畧其五十詩三百篇入樂復古絃歌之音合於韶武其五十一樂貢兩伯歌奏八能兠離禁末鞮鞻是徴其五十二江出古鏄橅鑄銑鉦玉采和闐特罄辨聲其五十三周噐十事敬陳闕里修以乙瑛掌於卒史其五十四制科两舉才士經儒戴筐六宿光彩如珠其五十五蕊榜秋魁南宫春冠盛世三元蜚英虎觀其五十六龍鍾握管席㡌青衫恩攀郗桂寵錫頭銜其五十七聖文既煥聖武復昭蠭旂大乙上應招摇其五十八大西門射廿中十九樂莭騶虞楅雕龍首其五十九秋爽伊綿三驅即鹿肄武詰戎湯網親祝其六十昔凖葛爾蠢蠢邉境三車棱來乘機㡳定其六十二哈薩克投布魯特駭永定要荒暨烏梁海其六十二反側無恒二和卓木既梏貳負安汝牧畜其六十三蔥嶺西通烏什内附贊普名王斤奚别部其六十四促浸攅拉飛走路窮髙碉疊摧翠珉銘功其六十五距海伏莽虺蜴是潜揚帆破浪一鼔而殱其六十六弧曜澄霄紫光開閣錫宴圖形勲旌褒卾其六十七告成太學文勒穹碑丹淵濁鹿駿烈同垂其六十八良冶笵金聿圖戰績曰篤不忘仁者無敵其六十九共球鱗萃受兹駿龎桄被聲教歸順歸降其七十内扎薩克四十九旗傾心順命無事羈縻其七十一魚通磨梭極於衛藏隨使車來喜瞻仙仗其七十二瀛嶼澎湖厥南畨社逺度重洋誕孚元化其七十三阿瓦三江古稱驃國云何輸欵星輝南極其七十四五天竺西曰廓爾喀表逹戴綳亦感亦化其七十五安南入覲夏正乆頒翠翎黄褶蘭錡鵷班其七十六職方有志王㑹有書紈牛􅌲鶴萃於爻閭其七十七丹穴榑桑梯航接踵五國朝正駢羅星拱其七十八八袠初開庶徴恒念嵗省星從五福斯騐其七十九製璽琱瓊開函抑埴朵殿聫吟蕩平建極其八十暘雨曰時隂陽順運是為真瑞玉燭所醖其八十一獻嵗王正紫宸曙啟渙汗徳音寳書鳯紙其八十二庪縣浮沈懐柔喬翕莤鬯蕭茅皇華靡及其八十三丹綸紫誥錫命維三榮施展孝章服恩覃其八十四爵賜一級遍及百僚大法小亷仰戴羲堯其八十五徳門人瑞孝友敦龎曽元衍慶綽楔橦橦其八十六夀越耆頤海籌益算寵賚自天提組纂其八十七叟㑹三千需雲酺讌鳩杖雍容鮐顔梨靣其八十八竿立金雞躔空貫索共慶咸中歸安耕鑿其八十九秋香窊窅春林爛漫恩榜作人倬彼雲漢其九十黄扉國老弱冠登朝瓊林重宴玉鼎和調其九十一閩叟矍鑠來介夀觥百有十嵗秩晋清卿其九十二玉券珠巾銀䋲芝檢盛典編摩光生琬琰其九十三嵗陽上章月建壮橘夀星之次角亢躔日其九十四玉宇秋澄金莖露潤萬寳豊登霞觴㪺晉其九十五魚龍曼衍馗闥喧闐昇平普慶萬祉蝉聨其九十六梵筵祝釐驩騰衢唱伊嘏我皇與佛無量其九十七九賔廷臚四和輻湊華祝嵩呼雲韶鈞奏其九十八淵耀徳星慶霄麗景秋分南郊曙見於丙其九十九筴増泰元慶延九囿日升月恒億萬萬夀其一百八旬萬夀盛典卷九十七
