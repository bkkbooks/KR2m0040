body:
  text: 乾隆五十五年原任大學士蔡新尚書曹文埴詣闕恭祝皇上萬夀先年詔福建安徽督撫察其能否逺來并令傳旨告之曲示體恤至是咸預稱慶特賜蔡新詩一章以寵其行復命沿途酌給舟輿加賞上參以資頤養曹文埴之母並賜如意貂緞乾隆五十四年八月十四日奉上諭明年朕八旬萬夀前經俯允王公大臣之請舉行慶祝在籍大學士蔡新尚書曹文埴自必進京祝嘏苐念蔡新年逾八旬而曹文埴之母則年已望九若屆期蔡新精神矍鑠曹文埴之母亦復體履康強伊二人自當前詣闕廷以伸慶祝之誠倘蔡新精力未能如舊曹文埴之母亦漸形衰老則髙年跋涉斷非所宜而曹文埴逺涉京師不獲朝夕侍養伊母子亦未免彼此懸戀在蔡新曹文埴俱係大臣心殷葵向必不肯以私情上達因思福建安徽督撫近在同省見聞較切務宜留心體察如蔡新曹文埴有不能逺來之勢該督撫即應力為阻止倘伊二人以朕萬夀未得與在廷臣工共伸慶祝即令在籍望闕行禮均足以展其忱悃也著該督撫將此旨告知蔡新曹文埴以示朕優加體恤至意御製豫告大學士蔡新來京祝夀詩以賜之庚戌八旬幸我身猶健九望憐卿會膝前祇問蒼生待悉告相看白髮尚依然六千里豈江山隔一片心原上下聨摛藻志豫終始意臨􅀈忍賦送行篇乾隆五十五年八月十四日奉上諭豫告大學士蔡新年逾八旬跋涉逺來抒誠祝嘏具見悃忱召見筵宴時看其精神步履矍鑠如前朕心深為嘉慰現在慶祝後自應令其仍回原籍但念自京至閩道路較逺著經過沿途各地方官酌偹船隻肩輿俾得行程安頓並給給人參一斤以資頥養示朕優眷耆臣恩加無已至意臣蔡新謹奏為恭謝天恩事竊臣恭際椿禧獲伸葵向仰聖躬之純固慰洽頻年承慶賚之便蕃恩優三接荷佩囊之親解奉宸翰之寵頒兹復以臣歸程較逺命沿途酌給舟輿復賜上參一斤以資頥養臣跪誦綸音感深肌體欽承優賜倍切兢惶伏念江湖魏闕昌辰多眷戀之私珍餌蒲輪皓首感生成之德捧奎章之下賁俯聯一片臣心效華祝以上酬長頌九如天夀六千里忍言遽去億萬年冀許頻來歸偕測海之人共話太平琅嶠誠結瞻天之願屢隨王會於彤庭所有臣感激依戀微忱謹具摺恭謝天恩伏乞睿鑒謹奏臣曹文埴謹奏為恭謝天恩事本月十三日蒙恩賞臣母如意一柄又十四日內閣奉上諭曹文埴之母賞給大緞一匹貂皮十張欽此臣跪捧恭領感激難名伏念本年恭逢皇上八旬萬夀中外臣民臚歡洽慶臣得趨詣闕廷瞻天祝嘏偹觀慶典屢奉隆施實為千古遭逄之至幸臣母年髙不能親申叩祝以抒欣戴積忱遙望九重方深悚仄乃蒙渥澤優加恩光下賁浮筠煥采琢芝朵以延齡珍木多文鎪檀枝而布馥蔚豐貂之氄溫毳丰茸展文綺之華吉雲燦爛荷熙辰之異數悉內府之竒珍捧歸而獻南陔欣博慈顔悅豫拜受而依北闕感邀聖德髙深刻骨銘心頂戴無量謹繕摺恭謝天恩伏乞睿鑒謹奏一百十嵗國子監司業銜郭鍾嶽恭祝萬夀恩加鴻臚寺少卿銜隆隆五十五年八月初五日內閣奉上諭司業銜郭鍾嶽現年一百十嵗自福建原籍詣闕祝釐精神矍鑠步履康強洵為升平人瑞著加恩賞給鴻臚寺少卿銜用示朕優老引年至意加鴻臚寺少卿銜臣郭鍾嶽謹奏為恭謝天恩事本月初五日奉上諭郭鍾嶽著加恩賞給鴻臚寺少卿銜欽此竊臣八閩下士百嵗期齡生長太平祝聖人願多夀身逰化宇荷天子許近光數庚甲之迎鑾瞻五巡與六巡之盛逮乙巳之開宴預千叟中一叟之榮補書淡墨微名非儒生之夢想所及俯念寒氊篤志更國子之恩秩特頒凡皆九十九嵗以後之竒逄况際五十五年無疆之大慶扶鳩詣闕擕來仙屋之籌稱兕介釐託在皇人之榖乃復宣鳯綍以晉階儼鴻臚之參佐質慚蒲謝何期冉拜頭銜蔭仰椿榮惟兾常抒額祝歸話朝廷異數恩復加恩幸延耉老長年夀還增夀所有感激微忱謹具摺恭謝天恩謹奏署江西巡撫姚棻入覲祝釐恩賜其母貂縀署江西巡撫臣姚棻謹奏為恭謝天恩事本月十七日蒙恩賞臣母方氏大緞二匹豐貂六張臣謹叩頭祇領伏念臣母於乾隆五十年五十四年蒙特賜御書扁額大緞貂皮屢被恩施時深感戴欣逄慶典咸覲天顔隨鵷序以嵩呼近龍光而爵喜仰沐聖慈之錫類復頒內府之殊珍彩煥層霄文綺賁魚軒之色溫生愛日豐貂增翟茀之華􅘦曩時雲漢為章久荷褒榮於鳯藻慶此日絲綸下賁迭膺寵錫於蘭陔拜自彤庭憶績室鳴機之夜歸陳子舍幸慈闈設帨之期臚歡實切於全家銜感愈深於慶節所有臣感激下忱理合繕摺恭謝天恩伏乞睿鑒謹奏臣等謹案朝廷禮遇大臣恩加耆碩或且錫類及於所生此非特一身一家之私慶也蓋一人躬備諸福爰敷福於羣工聖鑒俯垂體恤周至有臣下所不敢覬幸萬一者仰惟九重殷注預止髙年跋涉之勞曲體人子晨昏之養洵恩優而誼篤焉逮觀夫矍鑠來朝愈以情聫上下趨蹌晉祝兼之寵賁庭闈且使期齡膺加秩之榮疆史拜駢珍之賜遭逄至此朝野同歡何其沾被之溢於分外也乎當斯時也聞命者詫為竒遘旁觀者播為美談因以知皇上夀祺之貞固皆純龎之慶澤有以推衍於無窮咸願受祉悠長閲十年而重逄曼羡益忭頌於無已焉爾滿漢罷職文武各官建設經壇共申嵩祝恩賜録用給銜者七百五人其候補候選等各有職人員均加一級臣阿桂等謹奏為奏聞請旨事恭查向來建設經壇廢員革職之文武大員開列名單進呈除奉旨扣除外俱賞給降二等職銜其餘文武廢員由軍機處詳核案情將情節輕者帶領引見其餘均分别給銜原銜及降等職銜其休致候補候選降調之員各加一級厯來遵辦在案本年恭逄皇上八旬萬夀普天同慶凡在京及各省在籍人員共效嵩呼建設經壇虔申祝嘏今據廣通寺夀福禪林雙關帝廟慈獻寺四處經壇名册開送前來與本年春間直𨽻新城山東靈巖建設經壇接駕各廢員一并核辦臣等謹將革職各員內在京文職三品京堂以上武職副都統以上在外武職將軍提鎮文職巡撫等大員開列名單案由進呈應否加恩之處伏候欽定其餘革職文武各員臣等詳核原案除留緝人員毋庸置議外所有文職知縣以上武職守偹以上各員酌加核定分為三等擇其情節尚輕者列為一等三十九員開敘案由請旨帶領引見列為二等者一百七十八員酌擬賞給原銜列為三等者一百六十九員酌擬降一等賞給職銜此內如從前已給原銜者毋庸冉豫加銜其應降等給銜之人從前已經得過降等職銜者此次仍按等加給如有軍流以上餘罪雖經納贖此次應得原銜者仍降一等其應得降等職銜者冉降一等無可遞降者文武俱量豫從九品職銜其革去職銜者均降二等給豫職銜至刑部司獄五城吏目苑副覺羅學副管長護軍校兩司道府各衙門首領佐雜教職千把外委差官等員人數既多毋庸另分等次均酌擬賞給降一等職銜凡級無可降之員仍各給豫原銜至例應加級人員除現任職官外其降調告病告養休致候補候選捐銜及揀選截取就職凡有職銜人員均各加一分者免其處分毋庸加級所有應行給銜加級人員恭候降旨後將經壇原册及直𨽻山東建設經壇名册一併發交吏兵二部逐一按名核對遵照辦理冉未經揀選就職之舉人貢監生員等及文武新科進士已蒙特開萬夀恩科共沾渥澤毋庸冉議已革之舉人生監等多係緣事及覆試斥革情節較重應毋庸議謹將臣等核辨廢員緣由酌擬具奏並分繕清單恭呈御覽謹奏十月十三日奉上諭朕八旬夀辰中外臣工同申歡慶所有滿漢緣事罷職各員會集京師建設經壇共伸祝嘏本年春間巡幸山東該員等亦有在新城靈巖等處設壇頂祝者自應分别加恩覃敷慶澤兹據軍機大臣將吏兵二部册開各員案由情莭分别等第開列清單核議具奏朕詳加披閲核其情莭較輕尚堪録用之范衷穆克登泰常愷文瑞晉仰馥邉廷掄福保凌廣赤沈世燾豐紳福參泰李燦舒慶雲李振文郭繼儀范清漋常德徐坤陳務本劉鰲劉得榮文祿趙增陳元善陳純士荆自新張昉郝文星丁雲銘宫慕超扎爾杭阿盧芝田藍玉皂五保梁煥哈芬布時興李步崇李棨俱著交吏兵二部帶領引見其革職文武內外各大員三全李友棠謝溶生敦福任承恩安麟富珠禮托賔泰何俊施國麟亦著一併帶領引見候朕冉降諭旨其餘應行賞銜加級分别辦理之處著照軍機大臣所議行俾得共膺品服之榮以示朕錫慶施恩闓澤均沾至意吏部於十月初五日帶領引見奉旨李友棠謝溶生俱著賞給三品職銜回籍范衷著以主事用其革職之案帶於新任穆克登泰晉仰馥俱著賞給降二等銜文瑞著仍以員外郎用常愷著仍以內管領用其革職之案各帶於新任凌廣赤福參泰俱著以主事用其革職之案帶於新任福保沈世燾俱著賞給降二等銜休致豐紳著賞給降三等銜休致舒慶雲李振文郭繼儀李燦俱著發往各原省以同知用其革職之案俱著帶於新任范清漋常德著發往各原省以通判用徐坤陳務本著發往各原省以縣丞用其革職之案俱著帶於新任劉鰲著賞給降二等銜休致趙增陳純士著仍以知縣用其革職之案各帶於新任劉德榮文祿張昉陳元善郝文星丁雲銘宫慕超俱著賞給原銜休致兵部同日帶領引見奉旨三全著賞給三品頂帶休致安麟著在頭等侍衛上行走托賔泰著在二等侍衛上行走何俊著賞給三品頂帶休致扎克杭阿著賞給四品頂帶休致皂五保著在三等侍衛上行走田藍玉著發往福建以守備補用梁煥著以守偹用哈芬布著在三等侍衛上行走時興著在藍翎侍衛上行走李步堂著賞給千總頂帶休致任承恩著交巡捕營以參將補用施國麟著賞給三品頂帶休致吏部議列二等官原任翰林院編修祝坤待詔朱玉衡詹事府左庶子九十四御史鄭澄郎中靈育主事張為裘內務府管領得勝保郎中四福理藩院貟外郎齊克坦國子監助教吉清布政使永慶富明安按察使巴尼琿糧道初之朴巡道觀祿文德劉光昱知府觀亮恆豫袁鑒張思振廷育倬令阿李心耕何文耀彭時清韓永同知周道隆李炳夏家瑜許祖堯沈霽劉長松諾明阿孔繼棟提舉吳升通判楊朝炳李英栁遂夏葛應淳丁時勤蕭應錩張正仁運判汪寶善知州書明阿興德戴書紳王鴻譽李祖直黃廷鏞張埛宋鑣陳良翼莫和元知縣沈絢吕奎曜沈可培李璜蔣振閶唐汝風張秉越舒元灝劉立詮楊復鍾廷英張袁錫衡潘衡俞潮何霈霖李樹德蔣大綸興德魯光訓朱兆煓金仁覺羅永慶黃宗伊查浩王露張燮鼎黃叔傳羅拔陳士鳯舒展李嵩喬葉夢齡蕭虞單湘楊震春何秉權胡京王孚鏞汪斌郭德平梁世祿陸鳴梧潘成章李文起陳愷馬良騏洪星煥張其昺余芳吳廷竒田登徐志鼎陳寶田徐藩李敬敏徐秉文馬崇信程􅀈胡守業朱潛發巴精阿以上一百十六員俱係緣事革職並無餘罪列入二等應給原給又主事廖占鰲張旭齡大理寺寺丞劉秉恮通判王烈知州沈長春亢依祿金垍王葆元知縣捐升知州許承志知縣李策歐陽樹韓為霖熊起磻陳士駿談清趙椿齡以上十六員俱係革職後擬問徒杖應降一等給銜又員外郎業成額按察使王廷燮糧道王均巡道朱瀾知府王汝璧張燮同知徐聫奎通判施雲漢知州景椿知縣李名揚孫震李光萬吳蘭榖邉士堪以上十四員俱係革職後問擬軍流應降二等給銜議列三等官原任鴻臚寺卿劉樽國子監司業黃夀齡郎中吾祖望袁鎬富森捐郎中銜范李員外郎王訒主事王肇成李洵周嘉猷李靜淵趙溶王德潤內閣中書康儀鈞張位筆帖式保住誠德明寶德增蕚副指揮王棻徐恩巡道邉學海知府任溥施誠同知羅美睿劉望齡吳鐄饒九嶷通判張源曽土州同捐升通判泰山知州厲學沂張純髙映侯雲漢多澤厚賡景明知縣施峻任作又任惠塗寧先王炳耀李椿田嘉種劉鳯鳴雷樽楊秉彛張慶綰胥繩武張道昌周愛蓮劉業俊姚龍光孫功烈曹思鑑馬文灝馬衍宗髙虞祥張埰曹學詩宋維翰劉元鼎才彚征夏至選王辛李舒乙牛敬一洪煦丁履仁賀永瑞胡焜持莊張挺汲沈逺標葉橒焦式沖以上七十五員俱係革職後並無餘罪列入三等應降一等給銜又員外郎彥方筆帖式咸和福存副指揮金􅘏鹽法道周廷俊知府牛繩祖同知鄭邦柱李洗心葉潞提舉吳燧知州于煌吳鳯來瞿朝宗知縣顧永中翟建屏王秉正張士凱王其緒吳巘王惺邱龍標徐延翰富森布米錦趙廷樞江繩黃德齡張潤王志楷李孝澍孔育檀金序瑑李恩宜趙淳丁鐘戈雲錦李世侽李天英劉光第夏侯錡以上四十員俱係革職後問擬徒杖應冉降一等給銜又給事中葛鳴陽郎中宋國瑽員外郎圖山布李闊按察使吳之黼鹽運使沈樹聲張萬選糧道鄭澐巡道俞成王麗馬權周升桓知府弓養正方林范思敬馮埏李華鍾程夢元張官五鄭廷望同知景晊楊先儀席纘湯廷芳通判李敘知州楊奎永錫陳珏成胡錦曹麟開知縣孔昭烜馮汝為劉瑨王家幹張景運侯秉鈞王猶龍林琅奉鄧謙利以上三十九員俱係革職後問擬軍流應冉降二等給銜又員外郎永善苑副明慶副管長廣慶博士陸新應降一等給銜司務愛仁阿應降二等給銜筆帖式銜㝎德應降三等給銜知州陳煥應降一等給銜知縣明德布應降三等給銜佐二教職李寶裔祝汝弼沈驥雲勵世求劉天綸黃燦魏翼于庚李世龍柴中榆魏九倫于紹曽邱思永黃冠軍毛敬昭楊照丁觀堯張廷獻聶瑜朱桐黃珩吳士謹邱德孚劉焜王起元劉大吕沈元欽汪兆鼎黃時和孟大年湯汝梅陸昌曽屈振甲梁烜宋思謙萬祚彬周志禮張曽翥孫鈵吳曙雲張裕柱胡尊仁楊孟虔王千里潘元振李炳霞陳雯張述宗張士俊歐煥奎程瀛登王德華吳彬鄭其鳯張應綵張廷樞周天錫查潛宋宗璟王令份梅曰瑚周謨揚諸葛移莊汝明孫廷拔潘河黃良柱盧嶠何琳石雙南朱龍耀陳照張士璟鄭琯吳元升徐燦髙夀王錫正趙萬年俞觀旭王瑜陳廷照劉濬劉照書徐如洪丁名敬丁名敇唐寶樹辛開一程學韓薛天佑王錦文曺學周崇髙李憲祖包大鶴孔昭錦孫濤姚昉朱懷玉單國榮假雲龍徐維則程元鼎盧輝增楊朝玉宋天夀繆湘以上一百零八員應降一等給銜佐雜張學英李徑楠查桐蕭濬洪基陳英棟髙其梅楊占先朱惇德黃元泰屠士林邵宗堯蕭斐章蕭應鎮王鑙張濓周禮周佳士王嶽揚沈玉麟李景劉必逵陳應恩馬昶李廷選陸兆元吕岐翥劉庚生張培郭堤嚴文珍梁士璋髙秀升徐岱吳超龍熊芳姚應龍姚承裕張應選謝用鴻謝詔銓周世珏朱浩閻逄源鍾式金陳嘉謨王文華諶孝曽利緯周鏜趙連璧馮繼先羅恩深曹文裕馬麟書陸吉韓曰煌李大均沈大宇錢亷張藻曽馬廷鑑張錫誠張保模徐德華王明福張寶材丁文濱王恆伯金廷佐袁士元趙萬清李烜戈豳丁啓元繆廷琨李從龍王赤南顧基胡炯董漢亮唐崶謝元發顧德煒茹鳳鳴王錫圭朱照逺周徹李奉珽陳箎李琳王維新俞邦彥錢坤王槐宋熠張玉吳景照沈如髙奕孝朱葵寧祖慰陳文煥陳開甲孟兆濬秦永寧史積琳李先甲謝世蘭周邦賢李培單應璜單煟吕曠懷周維清劉勛李星橋吕浩王煥蘇以泰劉人傑何光曙馬元泰蘇錫章何致慶張藺誠黃文杰盧文耀汪鏻周相容吳瓏湯泰生孫良奕蔡文彬馬泰謝際運韓書陸之璽牛緒祖方珠李若虛程拱宗曹鑄韓昌宋枚黃應元陳廷錦丁蔭榮屈芳琇何錫韓朱鑾趙士璜何重謙黃鳳周嗣業盧玉成張兆鯤惲育秀劉心法張琪趙存焯曽灝蔣攸鍌宋之黻趙世昌陳大鳳陸執玉蒲滋馨任廷梅王廷瓚余啓鰲張治張裕福朱大用馮灝張大鵬張霖查宜芳程兆勝史宗朝卞潮鈕正緗李萬春陳錫文陸廷揚倪文煥黃鶴邱奎射吳敬臣蔣世煥施作梅程繕杜報恩張增琛駱鶴年陳以湜葛崇仁胡禮模安宇樂馮允欽李雲棠濮師惲一清田含初趙萬年鄭熥劉尚恕朱載鑑史泰孟廷璽徐銘標樊鈺王秉彛胡章溥申譓魯恕棨杜杰穆士濓張拱辰姚益佩賈希朱陳曽楣陶淦王繼棕胡堯棟何兆玉姚承華胡瑛金城喬洞莫玉紱孫錫純杜安邦任廷弼王士端邵嗣榖陳其道狄培沈鈺李蕙周德沛袁樂昌洪嵩年劉暟楊念槐張南至以上二百四十六員應降一等給銜查該員等俱係無級可降微員應各給與原銜以上共六百六十二員俱分别等第給銜奉旨如所議行八月二十六日奉上諭編修周厚轅前因大考休致今來京祝嘏進獻詩册復命出題考試所作詩句文理尚順且該員因繕寫越幅列入四等休致並非文理荒疏尚可加恩録用周厚轅著仍以編修用臣等謹案盛王之世人無棄材大易著無咎善補過之占周官垂冉宥曰過失之典有深意焉我皇上愛惜人材拔幽起伏不以微瑕偶纍致廢斥之自甘是以甄録頻施曲示成全於格外兹遇熙辰行慶大小偕來悔前此曠官之失感平昔受恩之隆藉申匍叩祝釐冉瞻天日斯亦振奮騰躍不能自己之悃忱乃皇上特申新命引對彤廷或舊秩之復除或降資而量授務各遂其圖報之私至夫加級給銜陟新階而榮命服實羣沾夫浩蕩焉慶賞為德有如斯之洪纎畢暨也哉
