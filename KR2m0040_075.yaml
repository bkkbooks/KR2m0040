body:
  text: 乾隆五十五年原任大學士蔡新尚書曹文埴詣闕恭祝皇上萬夀先年詔福建安徽督撫察其能否逺來并令𫝊㫖告之曲示體恤至是咸預稱慶特賜蔡新詩一章以寵其行復命沿途酌給舟輿加賞上葠以資頤養曹文埴之母並賜如意貂緞乾隆五十四年八月十四日奉上諭明年朕八旬萬夀前經俯允王公大臣之請舉行慶祝在籍大學士蔡新尚書曹文埴自必進京祝嘏苐念蔡新年逾八旬而曹文埴之母則年已望九若屆期蔡新精神矍鑠曹文埴之母亦復體履康强伊二人自當前詣闕廷以伸慶祝之誠倘蔡新精力未能如舊曹文埴之母亦漸形衰老則髙年䟦涉斷非所宜而曹文埴逺涉京師不獲朝夕侍養伊母子亦未免彼此懸戀在蔡新曹文埴俱係大臣心殷葵向必不肯以私情上達因思福建安徽督撫近在同省見聞較切務宜留心體察如蔡新曹文埴有不能逺来之勢該督撫即應力為阻止倘伊二人以朕萬夀未得與在廷臣工共伸慶祝即令在籍望闕行禮均足以展其忱悃也著該督撫将此㫖告知蔡新曹文埴以示朕優加體恤至意御製予告大學士蔡新來京祝夀詩以賜之庚戌八旬幸我身猶健九望憐卿㑹膝前祇問蒼生待悉告相看白髪尚依然六千里豈江山隔一片心原上下聨摛藻誌予終始意臨􅀈忍賦送行篇乾隆五十五年八月十四日奉上諭予告大學士蔡新年逾八旬䟦涉逺來抒誠祝嘏具見悃忱召見筵宴時看其精神歩履矍鑠如前朕心深為嘉慰現在慶祝後自應令其仍囬原籍但念自京至閩道路較逺著經過沿途各地方官酌偹船隻肩輿俾得行程安頓並給給人參一斤以資頥養示朕優眷耆臣恩加無已至意臣蔡新謹奏為恭謝天恩事竊臣恭際椿禧獲伸葵向仰聖躬之純固慰洽頻年承慶賚之便蕃恩優三接荷佩嚢之親解奉宸翰之寵頒兹復以臣歸程較逺命沿途酌給舟輿復賜上葠一斤以資頥養臣跪誦綸音感深肌體欽承優賜倍切兢惶伏念江湖魏闕昌辰多眷戀之私珍餌蒲輪皓首感生成之徳捧奎章之下賁俯聯一片臣心効華祝以上酬長頌九如天夀六千里忍言遽去億萬年冀許頻來歸偕測海之人共話太平琅嶠誠結瞻天之願屢隨王㑹於彤庭所有臣感激依戀微忱謹具摺恭謝天恩伏乞睿鑒謹奏臣曹文埴謹奏為恭謝天恩事本月十三日蒙恩賞臣母如意一柄又十四日内閣奉上諭曹文埴之母賞給大緞一疋貂皮十張欽此臣跪捧恭領感激難名伏念本年恭逢皇上八旬萬夀中外臣民臚歡洽慶臣得趨詣闕廷瞻天祝嘏偹觀慶典屢奉隆施實為千古遭逄之至幸臣母年髙不能親申叩祝以抒欣戴積忱遥望九重方深悚仄乃蒙渥澤優加恩光下賁浮筠煥采琢芝朶以延齡珍木多文鎪檀枝而布馥蔚豐貂之氄温毳丰茸展文綺之華吉雲燦爛荷熙辰之異數悉内府之竒珍捧歸而獻南陔欣博慈顔悅豫拜受而依北闕感邀聖徳髙深刻骨銘心頂戴無量謹繕摺恭謝天恩伏乞睿鑒謹奏一百十嵗國子監司業銜郭鍾岳㳟祝萬夀恩加鴻臚寺少卿銜隆隆五十五年八月初五日内閣奉上諭司業銜郭鍾岳現年一百十嵗自福建原籍詣闕祝釐精神矍鑠步履康强洵為昇平人瑞著加恩賞給鴻臚寺少卿銜用示朕優老引年至意加鴻臚寺少卿銜臣郭鍾岳謹奏為恭謝天恩事本月初五日奉上諭郭鍾岳著加恩賞給鴻臚寺少卿銜欽此竊臣八閩下士百嵗期齡生長太平祝聖人願多夀身逰化㝢荷天子許近光數庚甲之迎鑾瞻五巡與六巡之盛迨乙巳之開宴預千叟中一叟之榮補書淡墨微名非儒生之夢想所及俯念寒氊䔍志更國子之恩秩特頒凡皆九十九嵗以後之竒逄况際五十五年無疆之大慶扶鳩詣闕擕來仙屋之籌稱兕介釐託在皇人之榖乃復宣鳯綍以晉階儼鴻臚之參佐質慚蒲謝何期冄拜頭銜蔭仰椿榮惟兾常抒額祝歸話朝廷異數恩復加恩幸延耉老長年夀還増夀所有感激微忱謹具摺恭謝天恩謹奏署江西巡撫姚棻入覲祝釐恩賜其母貂縀署江西巡撫臣姚棻謹奏為㳟謝天恩事本月十七日蒙恩賞臣母方氏大緞二疋豐貂六張臣謹叩頭祇領伏念臣母於乾隆五十年五十四年蒙特賜御書扁額大緞貂皮屢被恩施時深感戴欣逄慶典咸覲天顔隨鵷序以嵩呼近龍光而爵喜仰沐聖慈之錫類復頒内府之殊珍彩煥層霄文綺賁魚軒之色温生愛日豐貂増翟茀之華􅘦曩時雲漢為章久荷褒榮於鳯藻慶此日絲綸下賁迭膺寵錫於蘭陔拜自彤庭憶績室鳴機之夜歸陳子舍幸慈闈設帨之期臚歡實切於全家銜感愈深於慶節所有臣感激下忱理合繕摺恭謝天恩伏乞睿鑒謹奏臣等謹案朝廷禮遇大臣恩加耆碩或且錫類及於所生此非特一身一家之私慶也盖一人躬備諸福爰敷福於羣工聖鑒俯垂體恤周至有臣下所不敢覬幸萬一者仰惟九重殷注預止髙年跋渉之勞曲體人子晨昏之養洵恩優而誼篤焉迨觀夫矍鑠來朝愈以情聫上下趨蹌晉祝兼之寵賁庭闈且使期齡膺加秩之榮疆史拜駢珍之賜遭逄至此朝野同懽何其沾被之溢於分外也乎當斯時也聞命者詫為竒遘旁觀者播為羙談因以知皇上夀祺之貞固皆純龎之慶澤有以推衍於無窮咸願受祉悠長閲十年而重逄曼羨益忭頌於無已焉爾滿漢罷職文武各官建設經壇共申嵩祝恩賜錄用給銜者七百五人其候補候選等各有職人員均加一級臣阿桂等謹奏為奏聞請㫖事恭查向來建設經壇廢員革職之文武大員開列名單進呈除奉㫖扣除外俱賞給降二等職銜其餘文武廢員由軍機處詳核案情将情節輕者带領引見其餘均分别給銜原銜及降等職銜其休致候補候選降調之員各加一級厯来遵辦在案本年恭逄皇上八旬萬夀普天同慶凡在京及各省在籍人員共效嵩呼建設經壇䖍申祝嘏今據廣通寺夀福禪林雙闗帝廟慈獻寺四處經壇名册開送前来與本年春間直𨽻新城山東靈巖建設經壇接駕各廢員一并核辦臣等謹将革職各員内在京文職三品京堂以上武職副都統以上在外武職将軍提鎮文職巡撫等大員開列名單案由進呈應否加恩之處伏候欽定其餘革職文武各員臣等詳核原案除留緝人員毋庸置議外所有文職知縣以上武職守偹以上各員酌加核定分為三等擇其情節尚輕者列為一等三十九員開叙案由請㫖带領引見列為二等者一百七十八員酌擬賞給原銜列為三等者一百六十九員酌擬降一等賞給職銜此内如従前已給原銜者毋庸冄予加銜其應降等給銜之人従前已經得過降等職銜者此次仍按等加給如有軍流以上餘罪雖經納贖此次應得原銜者仍降一等其應得降等職銜者冄降一等無可遞降者文武俱量予従九品職銜其革去職銜者均降二等給予職銜至刑部司獄五城吏目苑副覺羅學副管長䕶軍校兩司道府各衙門首領佐雜教職千把外委差官等員人數既多毋庸另分等次均酌擬賞給降一等職銜凡級無可降之員仍各給予原銜至例應加級人員除現任職官外其降調告病告養休致候補候選捐銜及揀選截取就職凡有職銜人員均各加一分者免其處分毋庸加級所有應行給銜加級人員恭候降㫖後将經壇原册及直𨽻山東建設經壇名册一併發交吏兵二部逐一按名核對遵照辦理冄未經揀選就職之舉人貢監生員等及文武新科進士已蒙特開萬夀恩科共沾渥澤毋庸冄議已革之舉人生監等多係縁事及覆試斥革情節較重應毋庸議謹将臣等核辨廢員縁由酌擬具奏並分繕清单恭呈御覽謹奏十月十三日奉上諭朕八旬夀辰中外臣工同申歡慶所有滿漢縁事罷職各員會集京師建設經壇共伸祝嘏本年春間巡幸山東該員等亦有在新城靈巖等䖏設壇頂祝者自應分别加恩覃敷慶澤兹據軍機大臣将吏兵二部册開各員案由情莭分别等第開列清單核議具奏朕詳加披閲核其情莭較䡖尚堪錄用之范衷穆克登泰常愷文瑞晋仰馥邉廷掄福保凌廣赤沈世燾豐紳福参㤗李燦舒慶雲李振文郭繼儀范清漋常徳徐坤陳務本劉鰲劉得榮文祿趙増陳元善陳純士荆自新張昉郝文星丁雲銘宫慕超扎爾杭阿盧芝田藍玉皂五保梁煥哈芬布時興李歩崇李棨俱著交吏兵二部带領引見其革職文武内外各大員三全李友棠謝溶生敦福任承恩安麟富珠禮托賔泰何俊施國麟亦著一併带領引見候朕冄降諭㫖其餘應行賞銜加級分别辦理之處著照軍機大臣所議行俾得共膺品服之榮以示朕錫慶施恩闓澤均沾至意吏部於十月初五日帶領引見奉㫖李友棠謝溶生俱著賞給三品職銜囘籍范衷著以主事用其革職之案带於新任穆克登泰晋仰馥俱著賞給降二等銜文瑞著仍以員外郎用常愷著仍以内管領用其革職之案各带於新任凌廣赤福参泰俱著以主事用其革職之案带於新任福保沈世燾俱著賞給降二等銜休致豐紳著賞給降三等銜休致舒慶雲李振文郭繼儀李燦俱著發往各原省以同知用其革職之案俱著带於新任范清漋常徳著發往各原省以通判用徐坤陳務本著發往各原省以縣丞用其革職之案俱著带於新任劉鰲著賞給䧏二等銜休致趙増陳純士著仍以知縣用其革職之案各带於新任劉徳榮文祿張昉陳元善郝文星丁雲銘宫慕超俱著賞給原銜休致兵部同日帯領引見奉㫖三全著賞給三品頂帯休致安麟著在頭等侍衛上行走托賔泰著在二等侍衛上行走何俊著賞給三品頂带休致扎克杭阿著賞給四品頂帯休致皂五保著在三等侍衛上行走田藍玉著發往福建以守備補用梁煥著以守偹用哈芬布著在三等侍衛上行走時興著在藍翎侍衛上行走李步堂著賞給千總頂带休致任承恩著交巡捕營以叅将補用施國麟著賞給三品頂帯休致吏部議列二等官原任翰林院編修祝堃待詔朱玉衡詹事府左庶子九十四御史鄭澂郎中靈毓主事張為裘内務府管領得勝保郎中四福理藩院貟外郎齊克坦國子監助教吉清布政使永慶富明安按察使巴尼琿糧道初之朴巡道觀祿文徳劉光昱知府觀亮恒豫袁鑒張思振廷毓倬令阿李心耕何文耀彭時清韓永同知周道隆李炳夏家瑜許祖堯沈霽劉長松諾明阿孔繼棟提舉呉昇通判楊朝炳李英栁遂夏葛應淳丁時勤蕭應錩張正仁運判汪寳善知州書明阿興徳戴書紳王鴻譽李祖直黄廷鏞張埛宋鑣陳良翼莫和元知縣沈絢吕奎曜沈可培李璜蒋振閶唐汝風張秉越舒元灝劉立詮楊復鍾廷英張袁錫衡潘衡俞潮何霈霖李𣗳徳蒋大綸興徳魯光訓朱兆煓金仁覺羅永慶黄宗伊查浩王露張燮鼎黄叔𫝊羅㧞陳士鳯舒展李嵩喬葉夢齡蕭虞單湘楊震春何秉權胡京王孚鏞汪斌郭徳平梁世祿陸鳴梧潘成章李文起陳愷馬良騏洪星煥張其昺余芳呉廷竒田登徐志鼎陳寳田徐藩李敬敏徐秉文馬崇信程􅀈胡守業朱潜發巴精阿以上一百十六員俱係縁事革職並無餘罪列入二等應給原給又主事廖占鰲張旭齡大理寺寺丞劉秉恮通判王烈知州沈長春亢依祿金垍王葆元知縣捐陞知州許承志知縣李策歐陽樹韓為霖熊起磻陳士駿談清趙椿齡以上十六員俱係革職後擬問徒杖應降一等給銜又員外郎業成額按察使王廷燮糧道王均巡道朱瀾知府王汝璧張燮同知徐聫奎通判施雲漢知州景椿知縣李名揚孫震李光萬呉蘭榖邉士堪以上十四員俱係革職後問擬軍流應降二等給銜議列三等官原任鴻臚寺卿劉墫國子監司業黄夀齡郎中吾祖望袁鎬富森捐郎中銜范李員外郎王訒主事王肇成李洵周嘉猷李静淵趙溶王徳潤内閣中書康儀鈞張位筆帖式保住誠徳明寳德増蕚副指揮王棻徐恩巡道邉學海知府任溥施誠同知羅羙睿劉望齡呉鐄饒九嶷通判張源曽土州同捐陞通判㤗山知州厲學沂張純髙暎侯雲漢多澤厚賡景明知縣施峻任作又任恵涂寜先王炳耀李椿田嘉種劉鳯鳴雷墫楊秉彛張慶綰胥䋲武張道昌周愛蓮劉業俊姚龍光孫功烈曹思鑑馬文灝馬衍宗髙虞祥張埰曹學詩宋維翰劉元鼎才彚征夏至選王辛李舒乙牛敬一洪煦丁履仁賀永瑞胡焜持荘張挺汲沈逺標葉橒焦式沖以上七十五員俱係革職後並無餘罪列入三等應降一等給銜又員外郎彦方筆帖式咸和福存副指揮金􅘏鹽法道周廷俊知府牛繩祖同知鄭邦柱李洗心葉潞提舉吳燧知州于煌吳鳯来瞿朝宗知縣顧永中翟建屏王秉正張士凱王其緒呉巘王惺邱龍標徐延翰富森布米錦趙廷樞江繩黄徳齡張潤王志楷李孝㴻孔毓檀金序瑑李恩宜趙淳丁鐘戈雲錦李世侽李天英劉光第夏侯錡以上四十員俱係革職後問擬徒杖應冄降一等給銜又給事中葛鳴陽郎中宋國瑽員外郎圖山布李闊按察使吳之黼鹽運使沈𣗳聲張萬選糧道鄭澐巡道俞成王麗馬權周升桓知府弓養正方林范思敬馮埏李華鍾程夣元張官五鄭廷望同知景晊楊先儀席纉湯廷芳通判李叙知州楊奞永錫陳珏成胡錦曹麟開知縣孔昭烜馮汝為劉瑨王家幹張景運侯秉鈞王猶龍林瑯奉鄧謙利以上三十九員俱係革職後問擬軍流應冄降二等給銜又員外郎永善苑副明慶副管長廣慶博士陸新應降一等給銜司務愛仁阿應降二等給銜筆帖式銜㝎徳應降三等給銜知州陳煥應降一等給銜知縣明徳布應降三等給銜佐貳教職李寳裔祝汝弼沈驥雲勵世求劉天綸黄燦魏翼于庚李世龍柴中榆魏九倫于紹曽邱思永黄冠軍毛敬昭楊照丁觀堯張廷獻聶瑜朱桐黄珩呉士謹邱徳孚劉焜王起元劉大吕沈元欽汪兆鼎黄時和孟大年湯汝梅陸昌曽屈振甲梁烜宋思謙萬祚彬周志禮張曽翥孫鈵呉曙雲張裕柱胡尊仁楊孟䖍王千里潘元振李炳霞陳雯張述宗張士俊歐煥奎程瀛登王徳華呉彬鄭其鳯張應綵張廷樞周天錫查潜宋宗璟王令份梅曰瑚周謨揚諸葛移荘汝明孫廷㧞潘河黄良柱盧嶠何琳石雙南朱龍耀陳照張士璟鄭琯吳元陞徐燦髙夀王錫正趙萬年俞觀旭王瑜陳廷照劉濬劉照書徐如洪丁名敬丁名敇唐寳𣗳辛開一程學韓薛天佑王錦文曺學周崇髙李憲祖包大鶴孔昭錦孫濤姚昉朱懐玉單國榮叚雲龍徐維則程元鼎盧輝増楊朝玉宋天夀繆湘以上一百零八員應降一等給銜佐雜張學英李勁楠查桐蕭濬洪基陳英棟髙其梅楊占先朱惇徳黄元泰屠士林邵宗堯蕭斐章蕭應鎮王鑙張濓周禮周佳士王岳揚沈玉麟李景劉必逵陳應恩馬昶李廷選陸兆元吕岐翥劉庚生張培郭堤嚴文珍梁士璋髙秀升徐岱呉超龍熊芳姚應龍姚承裕張應選謝用鴻謝詔銓周世珏朱浩閆逄源鍾式金陳嘉謨王文華諶孝曽利緯周鏜趙連璧馮繼先羅恩深曹文裕馬麟書陸吉韓曰煌李大均沈大宇錢亷張藻曽馬廷鑑張錫誠張保模徐德華王明福張寳材丁文濱王恒伯金廷佐袁士元趙萬清李烜戈豳丁啓元繆廷琨李従龍王赤南顧基胡烱董漢亮唐崶謝元發顧徳煒茹鳳鳴王錫圭朱照逺周徹李奉珽陳箎李琳王維新俞邦彦錢堃王槐宋熠張玉吳景照沈如髙奕孝朱葵寗祖慰陳文煥陳開甲孟兆濬秦永寜史積琳李先甲謝世蘭周邦賢李培單應璜單煟吕曠懐周維清劉勛李星橋吕浩王煥蘓以泰劉人傑何光曙馬元㤗蘇錫章何致慶張藺誠黄文杰盧文耀汪鏻周相容呉瓏湯㤗生孫良奕蔡文彬馬㤗謝際運韓書陸之璽牛緒祖方珠李若虚程拱宗曹鑄韓昌宋枚黄應元陳廷錦丁蔭榮屈芳琇何錫韓朱鑾趙士璜何重謙黄鳳周嗣業盧玉成張兆鯤惲毓秀劉心法張琪趙存焯曽灝蒋攸鍌宋之黻趙世昌陳大鳳陸執玉蒲滋馨任廷梅王廷瓚余啟鰲張治張裕福朱大用馮灝張大鵬張霖查宜芳程兆勝史宗朝卞潮鈕正緗李萬春陳錫文陸廷颺倪文煥黄鶴邱奎射吳敬臣蒋世煥施作梅程繕杜報恩張増琛駱鶴年陳以湜葛崇仁胡禮模安宇樂馮允欽李雲棠濮師惲一清田含初趙萬年鄭熥劉尚恕朱載鑑史㤗孟廷璽徐銘標樊鈺王秉彛胡章溥申譓魯恕棨杜杰穆士濓張拱辰姚益佩賈希朱陳曽楣陶淦王繼棕胡堯棟何兆玉姚承華胡瑛金城喬峒莫玉紱孫錫純杜安邦任廷弼王士端邵嗣榖陳其道狄培沈鈺李蕙周徳沛袁樂昌洪嵩年劉暟楊念槐張南至以上二百四十六員應降一等給銜查該員等俱係無級可降微員應各給與原銜以上共六百六十二員俱分别等第給銜奉㫖如所議行八月二十六日奉上諭編修周厚轅前因大考休致今来京祝嘏進獻詩册復命出題考試所作詩句文理尚順且該員因繕冩越幅列入四等休致並非文理荒䟽尚可加恩錄用周厚轅著仍以編修用臣等謹案盛王之世人無棄材大易著无咎善補過之占周官垂冄宥曰過失之典有深意焉我皇上愛惜人材拔幽起伏不以微瑕偶累致廢斥之自甘是以甄錄頻施曲示成全於格外兹遇熙辰行慶大小偕来悔前此曠官之失感平昔受恩之隆藉申匍叩祝釐冄瞻天日斯亦振奮騰躍不能自己之悃忱迺皇上特申新命引對彤廷或舊秩之復除或降資而量授務各遂其圖報之私至夫加級給銜陟新階而榮命服寔羣沾夫浩蕩焉慶賞為徳有如斯之洪纎畢暨也哉
