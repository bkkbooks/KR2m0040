body:
  text: 欽定四庫全書八旬萬夀盛典卷四十六盛事二十二收成分數一臣等欽惟我皇上以實心行實政於天人協應之理無不本至誠為感召雖遇庥嘉迭見從弗侈言祥瑞臣等纂輯盛事而以收成分數臚諸簡編者誠以事雖日用慶實帝貽惟兹登榖告豐屢臻大有斯真天下萬民之福而即我皇上萬年瑞應之受禨於天者也竊考豳詩首章最詳田事自禾稼以及桑蠶果菜之候必驗其熟以記嵗供之成然後有稱觥獻羔之禮以為萬夀無疆慶蓋詩之成即王道之成也顧豐鎬僅一國耳非如我朝內恬外闢幅員所屆環數萬里林總之民皆上繫乎聖人敦崇本計重農貴粟之一心是惟天時順成地利饒益乃足以紓九重之勤惕而慶兆姓之阜康焉伏覩聖夀八旬祈穰履畝劭農功者嵗修其常至于時玉甘霖占雲問夜溉則謀澤刈則課晴無一時之或間而且靣詢及於疆吏欣覽示于驛章是以各省有晴雨之報有糧價之報有約收之報有實收分數之報或陳奏稍稽旋馳諭問務核其實逮乎上稔頻聞睿情志喜彌復欽感昊慈篤撝謙滋敬畏之弗遑蓋春生夏長秋收冬藏在天地原不居其功維聖人乃能體天地之心為心用率育我蒸黎普修和而迓嘉祉然則興榖之利厚民之生豈非盛事之大而且真者歟乾隆四十五年直省收成分數直隸省二麥秋禾八分有餘江蘇省二麥秋禾九分有餘安徽省二麥秋禾八分有餘江西省二麥九分旱稻晚稻九分有餘浙江省二麥春花蠶絲早禾晚禾九分有餘福建省二麥八分有餘早禾晚禾九分有餘湖北省二麥早稻八分有餘中晚二稻九分湖南省早稻八分中晚二稻九分有餘河南省二麥九分有餘秋禾八分有餘山東省二麥八分秋禾九分有餘山西省二麥八分有餘秋禾九分有餘陜西省夏禾八分有餘秋禾九分有餘甘肅省夏禾秋禾八分有餘四川省夏熟八分有餘秋禾八分廣東省早禾晚禾九分廣西省二麥早稻八分有餘晚稻九分有餘雲南省豆麥秋收稻榖雜糧九分有餘貴州省夏收八分有餘秋收九分有餘伊犂各屯二十八分零塔爾巴哈臺各屯一十八分零喀喇沙爾各屯一十八分零烏什各屯一十九分零烏嚕木齊巴里坤吐魯畨各營屯一十五分至一十八分零哈密各屯一十八分零乾隆四十六年直省收成分數直隸省二麥九分有餘秋禾九分江蘇省二麥九分有餘秋禾八分有餘安徽省二麥八分有餘秋禾七分有餘江西省二麥早稻九分有餘晚稻八分有餘浙江省二麥春花蠶絲早禾晚禾九分有餘福建省二麥早稻八分有餘晚稻九分有餘湖北省二麥早稻八分有餘中晚二七分有餘湖南省二麥八分早稻中晚二稻八分有餘河南省二麥九分秋禾八分有餘山東省二麥九分有餘秋禾七分有餘山西省二麥秋禾九分有餘陜西省夏麥秋禾九分甘肅省夏禾七分有餘秋禾八分有餘四川省夏熟八分有餘秋禾九分有餘廣東省早禾晚禾八分有餘廣西省二麥早稻晚稻八分有餘雲南省豆麥秋收稻榖雜糧九分有餘貴州省夏收八分有餘秋收九分有餘伊犁各屯二十八分零塔爾巴哈臺各屯一十八分零喀喇沙爾各屯一十六分零烏什各屯一十九分零烏嚕木齊巴里坤吐魯畨各營屯一十五分至一十八分零哈密各屯一十八分零御製麥收辛丑麥熟今年勝往年北南一例報豐連今嵗麥收北省之直𨽻山東河南報九分有餘南省之浙江福建湖北湖南廣東奏報九分及八分有餘南北一例豐收實為近年罕覯曰欣曰懼心難措遇此何修益惕乾御製陜甘總督李侍堯奏報秋收七分有餘并秋雨情形詩以志事辛丑甘省春夏間今年雨頻暨以此命詳察乃盡悉積弊向來甘省每嵗報旱今春因叛回蘇四十三之事遣大學士阿桂尚書和珅先後往甘據節次奏報四五月間攻賊之際每以雨阻且新任藩司福嵩亦據實奏報得雨曽有詩志慰因命詳查甘省節年報旱緣由始得盡悉王亶望等上下勾通折收監糧藉賑冒銷之弊寧濫毋或遺原期民受惠剝民入私槖濫乃至鬻吏方伯如坐尸上下通一氣始以甘省頻年災旱地方吏請收捐監糧偹賑部議準行原令祗收本色米使民受實惠王亶望乃私收折色銀與首府蔣全迪串通各州縣冒賑分肥毫無忌憚甚至如麥桓之指缺賄求公行鬻吏而總督勒爾謹竟如木偶一任各屬恣意妄行並未奏聞斯而不抵法君誠若旒綴然恐覬覦者錯會吾之意謂吾或靳賑重增吾之罪既令而復申三五已不啻甘省冒賑一案經阿桂等查審得實因命將勒爾謹王亶望王廷贊解至熱河親鞫分别治罪以彰國法其蔣全迪程棟以下各犯按贓多寡分别治罪庶剔除積弊此後或遇賑濟俾窮民實受恩惠但恐為督撫者誤會此意因噎廢食致將災賑之事靳固不舉因屢降諭旨嚴切曉諭遇有嵗歉即當據實奏報並令督撫率屬員痛除積弊俾窮民均受實惠不啻三令五申矣即以甘省言偏災仍命恤叶公甘省本年報偏災者已少仍傳喻李侍堯派委明幹正大員詳悉查勘即不成災亦量豫撫恤蠲緩或借給口糧籽種以資接濟今接報秋收七分荷天賜李侍堯奏甘省夏秋以來除被水被雹受偏災數處其餘皆雨澤調勻秋禾粟榖雜糧大半黃熟間有收割者寧夏水田稻榖亦漸成熟收成約在七分以上此或因今嵗積弊一清而民情豫順感召天和雨晹時若未必不由此也市集糧價平吾民或少濟貪官何處無捐監大竒蔽侵帑復剝民豈有不招戾積弊一以清召和理應致三釜遍閭閻閲奏心誠慰歷久被人欺是吾之過事視過可知仁自解兼明志乾隆四十七年直省收成分數直𨽻省二麥八分有餘秋禾九分有餘江蘇省二麥秋禾九分有餘安徽省二麥秋禾八分有餘浙江省二麥春花蠶絲早禾九分有餘晚禾九分福建省二麥八分有餘早稻晚稻九分有餘湖北省二麥八分有