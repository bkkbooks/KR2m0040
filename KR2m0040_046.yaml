施賑貸弗遲留四月間據明興奏厯城等十九州縣春來缺雨被旱稍重因即降㫖借給兩月口粮其被旱稍輕之章邱等二十二州縣借給一月口粮并徳州齊河等二十六州縣所有本年應徴新舊錢粮俱緩至秋成後徴收以紓民力又因米價未平馳諭盛京将軍由海道撥粮數萬石一靣起運一靣令明興委員由海道接運俾得及早接濟民食幸哉佳􅉈優沾夏慰矣大田稔遇秋驛𫝊齊郊十府廣計來通省九分收嗣于六月間據明興節次奏報得雨通省普霑各属秋禾雜粮俱十分茂盛兹屆登場後明興奏報收成分數沂州萊州約有十分武定青州濟寧約有九分有餘濟南泰安兖州曹州東昌登州臨清約有九分合計通省收成約共九分有餘覽奏實為欣慰灾餘元氣庶少復申命催科莫亟求東省歉嵗後幸遇豐年因即批諭以毋使暴殄盖藏為要至于催科更不必急惟當養民之力庶灾餘元氣易復耳御製河南巡撫畢沅奏報秋收分數詩以誌事丙午齊豫連年嵗事歉最闗心曲念民痡麥收豫較齊嬴矣今嵗據畢沅奏報河南麥收豐稔為數年來所未有惟汲縣等四属得雨未透二麥亦尚有五分山東春雨較少二麥不免歉收是豫較齊嬴也禾熟齊為豫勝乎山東省自六月以來據明興節次奏報通省雨水充足秋成合計九分有餘兹畢沅奏豫省通計秋成八分有餘是齊為勝豫也通省八分餘亦幸生蝗十縣望成孤畢沅奏通省十三府州所属秋收分數自十分至七分不等合計八分有餘惟祥符等十四州縣于七月中旬後間生螞蚱晚榖糜子不無損傷約收六分有餘等語美中不足應懐惕撫恤毋令呼向隅祥符等縣螞蚱間生實為美中不足因批諭此數州縣曽撫恤不致成灾否御製兩江總督李世傑奏報秋禾有收詩以誌慰丙午兩江嵗事報登秋淮属青黄漲沴投李世傑奏七月底及閏七月間上下兩江並江西近省各属均報得雨二三四次稻田揚花吐穂穎栗可觀三省可望一律豐收現在粮價平减其淮揚鳯泗被水處所經撫臣藩司逐一勘明分别極次貧民給予撫恤一兩月目下白露已近其坍損房屋給予修葺銀兩清江浦已将積水車戽沿隄栖止棚民亦陸續還歸安業其文武衙署亦飭量為修整等語覽奏稍為慰藉然今年淮黄並漲雖他属有收得資接濟而灾黎積歉之餘遭此水患繾念無刻去諸懐也雖曰偏灾念隅向肯教賙賑靳恩稠今嵗淮揚等属偏灾因上年被旱之後秋禾復淹小民生計倍加拮据已屢諭該督撫等盡心撫綏毋使一夫失所兹據李世傑奏諄諭司道等督率趕𦂳辦理俾灾黎早沾實恵不得稍為遲緩其司家庄楊家漫庄口亦加催儧市集稭料運工修築以其一律及早完竣等語美而未盡善懷怍一亦已飢在切求莫謂隣村可接濟洊臻溝壑可忘不御製湖北巡撫李封安徽巡撫書麟各報收成分數詩以誌慰丙午湖北安徽昨嵗歉乾旋坤轉此秋登一朝兩處佳音閲兩省一時慰念増李封奏報湖北通省六十八州縣早稻收成九分八分七分不等合計七分有餘書麟奏報安徽除一隅被淹外其餘各州縣早稻秫稭頗稱豐稔晚稻黄豆粟榖等項均陸續刈割約計通省收成八九分不等粮價照前平减民情樂業等語該二省昨嵗被旱今皆奏報有收轉歉為豐實荷為天賜覽奏之稍慰生物為心天地徳沭恩惟愧旰宵兢偏灾仍切向隅嘆次第月粮給以應安省本年鳯陽之定逺等九州縣因一隅被灾前經降㫖賞給兩月口粮靈壁等四州縣賞給一月口粮兹據奏已就近于廬鳯道庫酌發銀兩率属妥速查辦御製河南巡撫畢沅奏報秋收及贖田畝詩以誌慰丙午叠遭饑饉鬻耕田經理頻頻馳諭宣前因河南連嵗歉收據畢沅奏貧民鬻賣耕田晉省富户有赴豫放債準折之事因節次降㫖曉諭減利聽贖並傳諭晉省紳官令其諄切勸諭鄉里毋致掯贖使貧民得還本業詳見前誌事詩今嵗幸䝉天悔禍吾民乃慶稼逢年夏收秋獲稔稱兩卅萬半千畝贖全兹據畢沅奏今嵗幸荷雨暘時若夏秋二熟均獲有年現在粮價平减其贖田事宜今各州縣将賣出地畝總數造冊存查按旬摺報截至八月底共已贖過地三十萬五百餘畝等語該省此時雖元氣未䏻盡復而貧民得服先疇藉資樂利為之稍慰未可輕言元氣復慰心南望尚拳然御製陜甘總督福康安奏報甘省有收詩以誌慰丙午督行撫事府開蘭陜甘總督駐劄蘭州兼管巡撫事務穡寳登秋具春看蠧吏除奸政自肅甘省自王亶望等侵帑殃民嚴加惩創後吏治肅清嵗亦屢稔邊民逢嵗俗胥安九分以上誠希遇據福康安奏甘省本年夏秋雨膏頻霈髙下深霑各属遲早不齊秋成俱稱大有河東各府州先已登場河西一帶次苐刈穫各属禀報約計通省秋收九分以上市集充盈粮價日見平减等語五載而來幸屢觀甘省地本瘠薄希逢豐稔自壬寅年據李侍堯奏報甘肅通省秋禾收成九分連年率稱有收今復得此實堪欣慰前此揑灾弗追究逭徴何礙恵氓寛前次王亶望等每嵗揑報灾荒以為開銷監粮之地及事敗露後亦止嚴懲墨吏而已其冐賑所蠲銀米概不徴追盖徴吏固不得不嚴而恵氓則不妨于寛也八旬萬夀盛典卷四十六
