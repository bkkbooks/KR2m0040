front:
  text: 欽定四庫全書八旬萬夀盛典卷六十九恩賚八本年蠲賦五
  hash: sha256:5fc54a6b0dc0509dc6af44a7f633236f48ed17ba6f1bc36bca5e1a88fdf4b6f1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_069-1a, image: WYG0660/WYG0660-0819a.png}
body:
  text: 署四川總督臣孫士毅謹題為恭謝天恩事據四川布政使和寜等詳據成都等十一府眉州等九直𨽻州叙永等四直𨽻廳轉據所属州縣土司詳稱紳士顧嵩楷百嵗老民盧樸先孫丕權等呈稱欽惟我皇上惠錫無疆恩覃有慶萬載衍長生之籙仁夀同登四瀛飲太極之泉醇醲咸沃年屢豐于綏萬猶蠲租給復之時行用各足於餘三更布澤施仁之叠被方幸帡幪庶類共樂春臺更欣燾冒羣黎偕逰夀宇惟五十五年之恩膏屢沛逢八旬萬夀而巽命重申停各省之催科免下民之征税天倉秸銍曾載蠲額賦之輸農部度支已三荷温綸之錫既分年而輪免復計佃以减租雖在四川僻處西南亦無一夫不邀雨露奉十行之寳墨咸欽有道聖人逢八秩之元春共祝無量夀佛豳風介夀小民方籲切稱觥王制引年庶老更優叨錫福算絳人之嵗月欲循舊例祝釐溯燕禮于膠庠弗令長途趨闕恩流三峡蕩蕩難名徳峻䨇峩巍巍莫並嵩楷等簮紳預列畎畆安棲仰天上之絲綸惟増鼓舞指平疇之稌黍共慶盈寜户有葢蔵願進康衢而敬頌情殷叩祝謹偕蔀屋以臚謳為此合詞呈請轉詳前来相應詳請查核具題等情到臣據此該臣看得輸将是効嵗有常供賦稅普蠲古稱盛典欽惟我皇上軒紀洪延堯仁廣被運符行健萬年長衍夫箕疇恩協廣生九賦咸充于禹貢閭閻樂嵗皆欣有脚之陽春雲日瞻天共祝無疆之聖夀恭逢慶典特沛恩綸寰瀛並沐皇仁免正供而及業佃巴蜀亦叨嘉惠由内地以迄新疆帝力不知耕鑿效華封之祝一人有慶謳歌周邉徼而遥臣職忝封圻材慚樗櫟聼巴人之頌蔵富于民陳無逸之圗惟仁者夀慶盈寜于一十八省非徒西顧之眷優篤庥祐於萬六千春長咏南山而忭舞兹據成都等府廳州縣紳士耆民具呈感謝縁由經布政使和寜詳請具題前来察其情詞出自至誠感激理合具題代謝天恩伏祈皇上睿鑒施行謹具題聞奉㫖該部知道廣東廵撫臣郭世勲謹題為恭謝天恩事據布政使許祖京等詳據廣州等十府三州轉據南海等州縣詳稱據合省紳士里民陳其熀等呈稱竊其熀等踐土食毛幸際太平之盛治戴高履厚羣安皇極之綏猷深仁偏浃于閭閻嵗嵗頻書大有渥澤普沾于海嶠家家共慶盈寜欽惟我皇上徳建中和仁徵康乂化成久道垂拱而治八夤福錫無疆勰序而調六幕固已民安物阜邉陬盡沐皇恩抑且鼓腹含哺黎庶同逰夀宇際累洽重熈之㑹恭逢八秩元春推損上益下之恩復奉十行闓諭叠施惠澤四沛恩綸蠲按年輸納之租豁直省地丁之額分三年以遞及耆民扶杖而觀合萬姓以均沾士庶呼嵩而祝似此敷天慶典真為亘古奇逢詔下九重歡騰萬國從此皇圗益固合衢歌巷舞以臚謳聖夀無疆與日升月恒而効祝為此呈懇題謝天恩等情欽惟我皇上福備箕疇恩覃禹甸聖有作而萬物覩殊方咸仰光華天不言而四時成薄海胥逰熈皥化成乆道千百國共躋春臺惠溥無疆億兆人同沾闓澤葢蔵素裕曾頒三錫之綸賑貸兼施頻下九重之詔惟衣租而食稅原有常經繄沐膏而詠勤更邀曠典廼者祝嘏臚歡始和布令金枝衍慶宏開五代之堂寳籙徵祥慶演八旬之筴登延洪之夀㝢蒼黎方獻曝抒誠沛汪濊之醲膏紫綍已先春施惠雨暘時叙念民依而益廣仁心稼穡年豐蠲租賦而特施恩命為民蔵富與物皆春三載一週十行四霈真曠古稀聞之大澤休嘉布濩于兩間實敷天同慶之昌辰謳頌騰聲於四海瞻依舜日羣占北斗之祥忭舞堯年共切南山之祝代申下悃敬逹輿情茲據廣州等十府三州轉據所属紳士里民籲請恭謝前来相應詳請題謝等情到臣據此欽惟我皇上行健敷仁體元錫福保民若赤八埏蒙樂利之休生物如春四海沐昇平之化固已共登康乂家家鼓腹含哺胥慶盈寜處處衢歌巷舞兹者恭遇八旬聖節萬夀元春爰當獻嵗之令辰特沛敷天之闓澤豁三千萬之賦稅四沐殊恩寛億兆姓之輸将屢邀盛典大小郡均匀遞及體嘉貺以流膏十八省逺近同沾厚生民而蔵富恩既覃而益溥海隅融地寳之滋惠已渥而更周嶺表慶日升之頌臣等恭捧綸音敬宣徳意茅簷蔀屋聼呼嶽以同聲食徳飲和知戴天之彌仰兹據詳請代題前來臣等不敢壅於上聞謹㑹同兩廣總督臣福康安合詞題謝伏乞皇上睿鑒施行奉㫖該部知道䕶理廣西廵撫布政使臣英善謹題為恭謝天恩事據署布政使事左江道黄符綵等詳據桂林等十一府州詳據各州縣轉據所属紳士耆民呈稱欽惟我皇上帝徳覃敷同覆幬之無量天恩廣被統寰宇而咸周勤政重農民隐遥通乎黼座輕徭薄賦隆施叠沛乎閭檐耆年仰撫字之仁衣帛食肉丁壮沐涵濡之化鑿井耕田食舊徳而服先疇罔報鴻恩於萬一被祥風而沐甘雨重邀曠典於冄三本年欣逢皇上萬夀届期八旬大慶鴻庥廣布荷正供之全蠲㴻澤頻施無一夫之不獲輪年分免閲三次而漢土均沾一視同仁通直省而要荒胥徧高天厚地雨露無私浹髄淪肌尊親共戴民生聖世躬沐皇仁鼓腹含哺樂重熈之日月給求養欲快迭被之恩膏八千嵗為春為秋長依椿䕃億萬户並生並育唯效葵傾敬抒忭舞之誠願上升恒之頌謹聨名具呈伏祈轉詳代題恭謝天恩等情據此該府州等欽惟我皇上道融精一徳載行生敬天勤民宵旰厪農桑之念綏豐保㤗遐邇蒙化育之仁租稅頻蠲年有順成之慶帑金叠賜人欣樂利之周固已薄海承恩衆志咸傾乎斗北寰區徧徳鴻庥普浃於天南矣兹值萬夀昌期八旬大慶足民蔵富已開億萬世無疆之休布澤推仁更蠲十八省惟正之賦歡騰西粤漢土均沾慶溢邉隅苗猺並戴覃恩普被甫十載而重頒按地輪蠲閲三秋而悉徧扣轅擊壤共登仁夀之天拊籥吹豳競獻洪延之祝欣逢盛典實切歡忱相應轉請題謝等情據此該司道等欽惟我皇上廣大敷仁中和建極生成愛養合億兆而厪切九重博濟勤施入宵旰而常如一日際兹籌添聖籙夀无疆而惟至萬年乃復廣溥天庥供維正而統蠲全賦分年遞免經三載而咸周按户全蠲無一夫之不被從兹杏花菖葉倍饒長畮之資白叟黄童並效康衢之舞洪恩沛宇偕潯江灕水以長流景祚延禧共桂嶺堯山而比峻敬惟特典允惬輿情體有加無已之仁奉行必力際千載一時之盛感戴非常如草從風兆庶仰化工之溥有葵向日萬年祝純嘏之長理合詳請代題等情到臣欽惟我皇上恩隆懐保澤被蒼黎八紘當熈皥之時愈培邦本六府際修和之㑹彌厚民生觀薄海之安恬乆臻郅治計歴年之蠲賚叠溥鴻施兹逢八旬萬夀之昌期洵属千載一時之嘉㑹特頒申命普免丁糧按地輪蠲垂恩廣被俾夀而富式舞且歌錫福蕃昌旉九重之愛育綏康稠叠慶比户之盈寜花縣桑田處處含哺鼓腹三江五嶺村村擊壤謳衢一人之景祐洪延敷天同祝六合之恩膏遍逮率土騰歡食徳飲和共享昇平之福重熈累洽咸沾樂利之休簡編實無此嘉徵蒼赤皆傳為異數頌無疆之聖夀閲八十載而巽命常申荷丕冒之皇仁遍億兆人而豐亨共慶臣恭逢盛典既高厚之難名虔捧丹書更歡欣而莫喻謹㑹同署兩廣總督廣東廵撫臣郭世勲合詞具題伏乞皇上睿鑒施行謹題奉㫖該部知道雲南廵撫臣譚尙忠謹題為恭謝天恩事據布政使李承鄴等㑹詳據雲南等府廳州縣紳士鄉耆等呈稱欽惟我皇上惠洽垓埏恩覃雨露調四時之玉燭共上春臺席萬禩之蘿圗同登夀㝢官符罷納推仁不止于再三户帖停徵錫福寜殊於遐邇繄坤維之僻壤實益部之舊疆荷熈朝奕葉之庥豐年屢告蒙聖主如天之福大有頻書際兹望杏瞻蒲将布一黎之種早卜築埸納稼定饒三鬴之糧固已户慶盈寜人歌樂利矣属維大章奄茂之嵗恭届八旬萬夀之辰軒紀洪開嵗首下雞竿之詔星軺逺莅天南來鳳闕之書逢年而予以蠲租催科不擾則壤而許其輪免調劑攸宜有田既被夫洪施奚啻大酺之賜承佃亦沾夫餘潤豈徒滯穗之携盖由聖徳高深嫓美乎堯天舜日是以恩波浩蕩直溢乎洱海昆池感切楓宸情殷梓里捧九天之綸綍惠尤洽于含哺指萬井之篝車歡實深於蔵富静聼風謡互答遍起耕田鑿井之歌行看瑞應駢臻益徵甘雨和風之㑹傍弧南而致頌惟稱萬夀無疆依北斗而傾心齊祝一人有慶所有感激欣慶下忱理合呈請代題恭謝天恩等情轉詳到臣據此欽惟我皇上夀叶升恒恩均幬載錫福籌裕民之䇿寛租厪蔵富之思調玉燭於寒燠雨𤾉兆金穰於禾麻菽麥䨇岐呈瑞頻年早賦盈寜萬寳告成比户猶歌􅕗穗更仰堯曦普照欣逢軒紀洪延經四次以蠲庸酌三秋而貸賦徳音逺被即碧雞金馬皆煜爚而翔輝温綍分頒惟白叟黄童共扶攜而聼詔歡逾擊壤頌溢呼嵩㴻澤覃敷遍行慶於一十八省醲膏倍飫效祝釐於萬億千年今據布政使等㑹詳據各紳士耆庶等呈請代題恭謝天恩前來理合具題伏乞皇上睿鑒施行奉㫖該部知道貴州廵撫臣額勒春謹題為恭謝天恩事據布政使汪新等詳據貴陽等一十三府據紳士耆民等呈稱欽惟我皇上徳奉三無仁周六合惠施不倦膏已渥而彌殷巽命重申澤屢加而愈溥是以繁禧茂集萬方叠慶綏和郅治覃敷四海咸登康阜茲者恭逢萬夀八旬之令節欣值一堂五世之昌期再沛絲綸復寛租賦厚民生於蔵富分先後而異數全邀敷天澤以流膏按府州而殊施遞及此固普天率土逖邇均沾不獨貴水富山高深莫喻所有感激㣲忱理合公籲題謝等情由司道據情詳請題謝到臣欽惟我皇上徳協乾符治隆㤗運仁風煦物普天共沐陽春甘雨成膏匝地均沾渥澤茲者恭逢萬夀八旬之令節欣值一堂五世之昌期特沛殊恩頻頒異數臣恭奉恩綸謹宣聖徳分先後普免合三嵗而俱周按州府蠲除無一夫之不逮荒陬僻壤咸鼓腹而頌皇仁白叟黄童盡泥首而申嵩祝茲據布政使汪新等詳據合省紳士耆民呈請題謝前來臣不敢壅於上聞理合㑹同雲貴總督臣富綱恭疏具題伏乞皇上睿鑒施行為此謹題奉㫖該部知道右臣等編次蠲賦盛典附録直省陳謝諸疏盖以臣僚紳士忭戴積忱亦既獻頌颺言欽邀御選載於歌頌一門至草茅黎庶惟知擊壤歡呼順則於安和之宇廼復際登豐之咸樂慶蕃祉之攸同奉詔普蠲流膏既溢有非小民望澤之私所敢覬及者顧若駢儷之文廼畺吏入告陳言之體而在田間愚賤鼓舞謳歈則各本其忠愛之忱慇然而欲逹雖一時竭誠報謝率由下里芻言而十八省之風土攸殊億萬衆之聲情如一所為籲諸大吏以上獻宸聰者至真切而無片詞之飾是與臣僚紳士之歌頌文質若有不同其為抒徳逹情實無二致也謹按省備登以彰感孚之盛以誌慶幸之深而我皇上之福祿申重延庥於萬億及秭尤有言語形容所莫罄者爾
