  text: 欽定四庫全書八旬萬夀盛典卷七十一恩賚十本年恩科二
  hash: sha256:cea9fdc515a01b116dfe337440c5960fd543f71d255639a3bda15f021b08c8a6
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_071-1a, image: WYG0660/WYG0660-0840a.png}
body:
  text: 直省督撫奏以八旬萬夀開科士子籲請陳謝直𨽻總督臣劉峩等謹題為聖主夀考作人多士欣逢曠典公籲代謝天恩事據直𨽻闔省舉人貢監生員邱三祝裴聫璧王有齡戴介眉李延庚等呈稱欽惟我皇上學紹唐虞夀齊軒嚳博厚髙明悠久本中庸不息之誠剛健篤實輝光著大易日新之德南弧應象拱御宿於三垣北極徴祥位斗魁於七曲崇儒重道文運正如日方中興賢育才教澤逮普天之下首善蒙庥於畿輔習業則春誦夏絃上庠詠化於興桓譽髦則菁峩芃朴躬逄盛世預啓特科咸欣頌晉萬年傳玉音於帝陛佇見輝騰五色題金榜於天門握槧肩摩快觀光於棘院焚香頂祝亟奮志於藝窗仰祈題謝代達下情到臣欽惟我皇上至治崇文大德得夀化敷時雨育詩書禮樂之英道洽同風興庠序學校之教屢廣科名之定額蕊榜邀榮六開鄉會之特科椿齡茂慶金臺選駿三千空兾野之羣北海搏鵬九萬振滄溟之翮從此人文蔚起占際會於風雲遍聞多士歡聲歌升恆之日月今據士子感激真誠籲謝天恩臣不敢壅於上聞謹會同順天學政臣金士松恭疏具題伏乞皇上睿鑒施行兩江總督臣書麟等謹題為萬夀開科多士臚慶欣逄茂典代謝天恩事據江蘇安慶兩省舉人貢監生員任鳴盛徐晉福禇文昌顧椿年潘慶齡等呈稱欽惟我皇上嘏備純常化成久道大德必夀得位得祿得名皇極之言是彞是行是訓河清海晏正苞符啓閟之期璧合珠聫覩雲漢為章之景前此六巡嘉惠賜舉偕廣額以俱行今兹八帙敷恩特榜隨正科而迭試地處斗牛之野祥光煜爚以騰霄天開奎壁之躔瑞彩熒煌而照宇文宗文滙翻縹帙而鸞翔江北江南萃青𫀆而鵠跱固已人淳化育士樂甄陶處膠序而各勉澤躬誦詩書而咸思勸學欣逢耋齡介景更慶髦士攸宜萬年特科六啓宣綸雲陛歡切於夏絃春誦之儔握管風簷兾預于東箭南金之選仰作人於夀世宏造士於制科忭溢儒林祝延聖算懇請據情題謝等情到臣欽惟我皇上乾元廣大泰運光亨郅治同文栽培切因材之篤洪鈞鼓物陶鎔歸就範之模惟三吳六皖之生才夙稱淵藪繼秋實春華而擷秀羣萃菁英兹際福演箕疇協俊民用章之吉恩開蕊榜著人文成化之庥鄉校集試於白門佇蘋蒿鹿呦之奏禮闈載登於黃甲起梧桐鳯翽之音益仰盛世文明莫罄下情鼓舞理合會同江蘇學政臣沈初安徽學政臣秦潮具疏代題恭謝天恩伏乞皇上睿鑒施行江西巡撫臣何裕城等謹題為慶榜疊覃光昭文治代輿悃恭謝天恩事據江西闔省舉人貢監生員陳上理茅連茹周榮恩謝天夀等呈稱欽惟我皇上恩煥絲綸道光經緯皇極五福衍姒疇敷訓之言夀考萬年溥鎬京作人之化聖勤念典帝王學本異於儒生士快彚征吉人多惟媚於天子伊牛斗分西江之野倬漢騰輝矧角亢依南極之躔占星應瑞拜重申之巽命六啓特科欣八帙之履祥載推渥澤秋風槐苑偕來應舉之忙春日杏林共羡題名之喜樂承教育恪奉清真雅正之宗同慶舒長更仰剛健文明之德莫名葵悃敬頌椿禧等情到臣欽惟我皇上德同天運夀並日升篤物因材萬彚沐栽培之澤觀文成化四表蒙格被之庥富中祕之藏書汲古遍經史子集廣上庠而論秀敷教暨南朔東西固已作君作師集大成於羣聖乃猶選士造士宏樂育於多才兹者先五十二年而布恩綸次二十四科而開慶榜六逢增試位恰應夫戴匡九如祝釐慶交騰於獻斚虞門籲俊聿揚有道之庥軒莢迎祥願上無疆之頌據呈士子感激真誠謹會同學政臣翁方綱恭疏具題代謝天恩伏乞皇上睿鑒施行浙江巡撫臣覺羅琅玕等謹題為聖夀敷恩多士稱慶公籲代題以伸謝悃事據浙江闔省舉人貢監生員沈咸寧戴福基許奎吳蘂甲等呈稱欽惟我皇上治洽純仁德臻綏夀乾元合撰法天健以自強泰宇均禧觀人文而成化夙夜基命學緝熙於光明彝訓敷言皇建極而斂鍚普羣倫之蒸被教澤頻加廣庶類之栽培人才尤厪矧天施雨露渥中外之恩膏而地美湖山備東南之材産文瀾建閣縹囊分四庫之儲翠輦省方青襟迓六巡之慶兹以洪延曼夀協升恆日月之符益惟樂育英才闡際會風雲之盛聫科並試正學易學禮以輪經特榜重開增為春為秋而祝事品慙東箭希入彀以程材祥企南弧映戴匡而耀彩所有欣感下忱呈請題謝等情到臣欽惟我皇上學管道樞仁敷夀宇奎文炳耀探軒圖堯鏡之微聖教昭垂啓孔思周情之祕人材就範荷陶鑄於洪鈞士類含英煦陽和於大造嵗舉興賢之典萃杏華桂粟以揚馨恩加籲俊之科合華祝嵩呼而增慶兹八旬之介祉日重光而月重輪俾兩試之掄才千人俊而萬人傑輝騰珠榜佇搜越産之竒珍喜聽綸音益洽康衢之軒舞據呈輿悃代逹宸聰謹會同學政臣朱圭恭疏具題伏乞皇上睿鑒施行福建巡撫臣徐嗣曽等謹題為聖主福敷建極夀世恩重作人公籲代伸謝悃事據福建闔省舉人貢監生員曺有年詹吉士應丹詔賀長庚等合詞呈稱欽惟我皇上心法一中躬膺萬福文明久照光同日月之行景命常新撰應天人之合堂開五代兼得位得祿得名得夀之隆算衍八旬致用成用明用章用康之治乃以國家掄才之典蒸髦士而攸宜預於寰瀛稱祝之年藹吉人而有慶映仙霞於五色欣聫南斗珠躔接神嶠於三山爭覩大羅蕊榜覬羣材之入彀得路天衢願介景之添籌臚歡雲陛為此聫名呈懇伏祈代謝天恩等情到臣欽惟我皇上昊紀凝祥軒齡協瑞慶敷垓極正同文與同倫教洽紘埏肆有德而有造介萬年於八帙瑞牒重新增兩試於一科溫綸特沛春風時雨沾化育之深仁景星慶雲耀文昌之佳氣從此茅茹叶吉孚易象之彚征棫朴興賢誦雅詩之夀考謹會同福建學政臣陸錫熊具疏代題恭謝天恩伏乞皇上睿鑒施行湖北巡撫臣惠齡等謹題為聖夀敷天集慶恩科多士臚歡據情恭謝皇仁事據湖北闔省舉人貢監生員沈聫光龍門鯉陳錦文喬登秩洪國榜等呈稱欽惟我皇上福茂升恆勳崇巍煥聖由天縱著博厚髙明悠久之徴學本日新闡剛健篤實輝光之德君師統備布寵綏於四方庠序恩敷溥栽成於多士欣遇萬年衍慶呈星回雲縵之祥更增兩試程材沛江深漢廣之澤綸綍預宣於北闕昭籲俊以旁求章縫志喜於南邦卜觀光而利用惟有敦禮樂詩書之選振奮漸逵算京垓億秭之年祝延鼎籙謹呈公籲乞謝天恩等情到臣欽惟我皇上道洽時雍夀徴初祜泰階協序覘玉燭以常調奎藻騰輝映瑶樞而增朗千百國人才蔚起同文同倫億萬年景祚延洪有章有慶兹以椿齡之八帙特開蕊榜於六科人樂由庚學覘探酉禹貢荆州之域朝宗共滙夫恩波堯封華祝之人獻頌同殷於抃舞據呈欣感輿情謹會同學政臣吳省蘭具疏恭謝天恩伏乞皇上睿鑒施行湖南巡撫臣浦霖等謹題為聖夀延洪恩科覃慶欣逢作人雅化代陳欣感輿情事據湖南闔省舉人貢監生員唐鴻禧李如璧賀景運陳夀圖等呈稱欽惟我皇上德寓鴻龎夀祺引翼元苞藴祉疇圖敶五福之祥泰運叶期神策衍萬年之紀仰範圍於至化成天地自然之文抒黼藻於太平光書契以來之治譽髦斯士周詩詠棫朴作人觀國用賓易象占茅茹彚吉欣際介齡衍慶瑞牒增新重邀巨典興賢恩綸先沛杏葩桂粟佇蕊榜以聫芳沅芷湘蘭愧楚材之萃秀惟有北辰星拱長瞻五緯之躔南嶽雲翔同效三呼之祝等情到臣欽惟我皇上化浹乾樞福凝鼎祚億齡衍盛昭景運於天中寰宇登春鬯鴻熙於下土四民首士育黨庠膠序之英三物興賢崇禮樂詩書之澤乃者夀籌晉祝欣展慶於萬八千年恩榜作人快觀光於一十六省丙丁應位覘瑞彩以絪緼甲乙增科叶文明之炳蔚佇雲蒸集於多士歡呼騰嶽麓之間願川至備於九如喜氣溢湖湘之表兹據士子公呈感忭真情理合會同學政臣張姚成具疏謹題恭謝天恩伏乞皇上睿鑒施行河南巡撫臣梁肯堂等謹題為夀宇延禧恩綸增試歡臚多士懇達輿情事據河南闔省舉人貢監生員戴錫綸陳嵩峻卜文蔚祝大同等呈稱欽惟我皇上化洽調元福基敬德羲圖呈瑞衍五元十夀之貞符姬籙延祥協辰武寅文之中數前遇稀齡介景雖稱祝以未逾曽邀特榜增科屢登材於極盛兹奉五十二年之宣詔預申八旬萬夀之覃恩鄉會並掄春秋遞舉惟下士沐甄陶之澤德行藝砥礪交加矧中州生文物之邦富庶教漸摩已久欣聞巽命願依奎聚之光虔頌恆釐益切嵩呼之祝謹臚衆悃兾達宸聰等情到臣欽惟我皇上頤夀敦仁崇儒迪教澤敷寰海周澗瀍左右以同流瑞靄中天先太少東西而告慶十次荷恩綸之鍚大賚攸行八旬逢寶算之添特科預啓霓裳集詠探秋風桂闕之馨雁塔題名馳春日杏園之駿覩熙朝之茂典髦士臚歡增夀宇之洪庥臣鄰共忭據呈公籲理合代題謹會同學政臣劉種之具疏恭謝天恩伏乞皇上睿鑒施行山東巡撫臣長麟等謹題為欽奉恩綸疊開慶榜據情陳謝仰祈睿鑒事據山東闔省舉人貢監生員劉錫祉朱青選張奎祥賀增夀等呈稱欽惟我皇上泰運洽熙福徴保錫本道統為治統允執厥中觀天文及人文化成在下省方至岱宗之麓同律度量衡希聖登闕里之堂瞻車服禮器萃文物聲明之盛梯嶂航瀛陳夀富康寧之疇圖河拜雒海隅日出咸欽率俾之庥雲倬天章共暏昭回之景爰以八旬之慶寶籙增書欣兹六度之恩珠宫開榜從此家絃户誦勸學承鄹魯之遺允惟論秀書升造士流豐鎬之澤所有忭感微衷仰兾據情上達等因到臣欽惟我皇上治紹唐虞道源洙泗貞符啓運肇萬八千歲之皇春德藴敷文貫五三六經之聖學範圍天下金受礪而泥受鈞照臨日中雲兮縵而旦兮復恭遇春禧茂算晉軒籙以長生特增蕊榜興賢軼周官之大比蓬萊有路山川呈海岱之祥棫朴作人文章倬雲漢之盛今據士子呈請代謝天恩謹會同學政臣劉權之恭疏具題伏乞皇上睿鑒施行山西巡撫臣海寧等謹題為恭謝萬夀開科敬陳多士輿悃事據山西闔省舉人貢監生員成宇寧王會圖呂青雲常錫嘏等呈稱欽惟我皇上文德光亨貞符曼羡宸居太乙巍巍共北之尊夀曜後庚煜煜自西之彩五迓臺懷巡輦羣稱無量以恆春八徴箕範演疇備叶大同而逢吉兹遇慶辰茂介臚敷天獻祝之誠預聞恩命誕敷洽多士觀光之喜懷才就試虗車敢飾乎輪轅命中決科省括期凖乎正鵠荷綸音而鼓舞寒儒之上進彌殷祝寶帙以洪延溫詔之重申有慶敬呈頌悃伏懇代題等情到臣欽惟我皇上命敕時幾德崇日進文思稽古闡堯廷光被之勳夀考作人廣周室譽髦之澤草四科迭開貢舉重以恩榜之頻敷十六省茂選儒英逢兹介齡之增慶春鄉秋會徴人文蔚起之庥日升月恆協天保戬榖之頌忭兩河之士子懷鉛勵志於兩闈聼三晉之謳歌酌斚臚愈於三祝據呈感謝前來謹會同學政臣鄭際唐具疏代題恭謝天恩伏乞皇上睿鑒施行陜甘總督臣勒保等謹題為欣逢夀世恩科儒林慶溢公籲陳謝天恩事據陜西甘肅兩省舉人貢監生員髙聫甲紀先登姚重光文拱夀等呈稱欽惟我皇上德備福基道光文治苞元啓運天經地緯之為昭戩榖協宜日升月恆之有慶孚惠心於垓極九有蒙庥沛雅化於膠黌三升論秀惟學校廣儲才之地聲教逺訖於玉門矧科名闢登俊之途恩命覃敷於金闕士崇經術集兩省之儒襟人奮亨衢荷萬年之慶榜從此南弧夀宿聫五緯於奎躔即今西嶽華山效三呼於嵩祝莫名欣躍兾達謝悰等因到臣欽惟我皇上玉扆調元瑶籌鍚羡大德位祿名夀備保右申命之庥至誠博厚髙明著悠久成物之驗勤求郅治厪所其無逸之針茂育英才興樂且有儀之頌固已鴻暉匝宇澤普被於羣倫藻黼依光歡遍騰于多士者矣兹屆八旬曼夀之昌辰爰敷六度恩科之異數圖書輯瑞衍姒疇鍚福之徴鐘鼓振聲軼鎬雍作人之化喜見科聨甲乙翔雲路以同登更占輝映丙丁企星階而獻祝據呈忭感下情謹會同陜甘學政臣邱庭漋恭疏代謝天恩伏乞皇上睿鑒施行四川總督臣李世傑謹題為恭逄萬夀加科籲請題謝天恩事據四川闔省舉人貢監生員髙承恩歐文選諶昌緒陳慶年等呈稱欽惟我皇上蕃祉茂膺洪慈廣被紀元五位探䇿而衍億齡敷慶八夤舉典而俞衆籲首宣綸綍開特榜以興賢加惠章縫繼正科而登俊際經術昌明之會循兩試以輪年快士風振起之時總羣材而博選地分東井著有象之文明喜溢西川頌作人之雅化謹申葵向虔祝椿禧伏祈代達等情到臣欽惟我皇上德懋日蘉嘏崇天鍚珠囊應瑞照臨延六幕之祥紫綍敷恩湛濊布十行之詔萬民熙熙而樂共快登春多士濟濟以寧頻邀籲俊兹慶覃於夀宇如松柏無不爾或承先寵賁於人文拔茅茹以其彚征吉萃蜀都之羣彥行瞻雲路以翺翔聼錦里之臚歡共仰天衢而軒鼚兹據各呈感頌環籲代題到臣謹會同學政臣邵洪具疏恭謝天恩伏乞皇上睿鑒施行廣東巡撫臣郭世勳等謹題為耋齡增慶髦士臚歡恭謝恩科代申輿悃事據廣東闔省舉人貢監生員庾泰鈞蘇景眉馮觀育伍福疇等呈稱欽惟我皇上德懋健行福徴嚮用緝熙典學勤宥密以重仔肩引翼介祺備熾昌而綏眉夀彼大同紹興至元之代莫比景命之隆自攝提合雒禪通以來未遘洪禔之盛至夫恩光久照皆文章禮樂之輝煌教澤深濡遍膠序黨庠之俊彥慶臚祝帙先增試於鄉會兩闈喜溢通寰成稱頌於春秋萬紀在銀瀛之下士願㪺海以為樽惟寶籙之長生共添籌而益笇難名輿悃虔介修齡謹具公呈伏乞題謝到臣欽惟我皇上保合太和康強逢吉堂開五代天家增福祿之長閣應七星海內仰文章之富凡涵和於郅宇羣欽仁夀之延洪矧嘉惠於萟林屢俾科名之博選乃者八旬睿算允羾牘於羣工六啓恩闈廣掄材於多士珠囊獻瑞遙瞻斗北之輝珊網搜竒爰集海南之俊聼鴻施而九拜亘古希逢祝鳯紀於萬年與天無極謹會同學政臣關槐據情具疏代題恭謝天恩伏乞皇上睿鑒施行廣西巡撫臣孫永清等謹題為聖夀無強人文有慶恭陳輿悃申謝皇仁事據廣而闔省舉人貢監生員朱純奎蔣上遴萬科烺龔介眉等呈稱欽惟我皇上治茂洽熙德孚恭夀右文稽古毖宥密之全功重道崇儒廣甄陶之雅化惟升平之日久樂漸仁摩義以成風况作育之恩深遍户誦家絃而泳澤乃以五十二年之申命聿沛新綸預開八旬萬夀之特科重增慶榜春生桂管邉隅之嚮學彌殷吉彚茅茹曠典之臚歡尤切敬呈環籲兾達宸聰等情到臣欽惟我皇上聖教覃敷天恩溥被千百國之人才鼎盛合山陬海澨以同風億萬年之文運光亨覩霞蔚雲蒸而焕彩漆齒雕題之輩猶欣鼓舞於鶼林懷鉛抱槧之儔更企翺翔於鵬路兹屆八旬而開恩榜曼羡延庥願合九有而獻夀觥歡呼匝宇理合會同學政臣潘曽起恭疏具題代謝天恩伏乞皇上睿鑒施行雲南巡撫臣談尚忠等為恭謝萬夀恩科事據雲南闔省舉人貢監生員李時昌徐揚達文鍾運戴聖化等呈稱欽惟我皇上運啓乾符䇿推昊嵗睿文炳煥括典謨雅頌之精奎府儲珍搜甲乙丙丁之祕太平淳化轃萬年有道之祥多士彚征廣三物興賢之典固已仁翔義洽聲教被於荒陬咸思經明行修砥礪勤於末學兹介修齡之八帙夀在作人特開慶榜於六科恩先造士仰北樞之時柄斟元氣而闡洪禔騰南詔之恩綸作人才而綏夀愷幸觀光之有路同獻祝之惟誠為此呈懇題謝等因到臣欽惟我皇上黼座調元璿籌輯慶帝圖欽翼仁如天而智如神人文化成仰觀象而俯觀法布醇和之嘉澤四海同流登俊乂於昌辰萬年來賀乃者新綸載沛慶引翼而彌長特試增科廣譽髦而胥忭滇強萬里景聲教以風翔華祝三多聼歡呼於嵩效採臚愈於下士兾仰達於上聞謹會同學政臣汪如洋具疏恭謝天恩伏乞皇上睿鑒施行貴州巡撫臣陳步瀛等謹題為萬夀開科普天欣戴懇請恭謝皇仁事據貴州闔省舉人貢監生員王廷瑞聞聖謨髙文光賀天夀等呈稱欽惟我皇上元化彌綸夀祺引翼太平緯理文運開於萬年寰宇燮諧聲教訖於四海仰敷言而敷福俊民用章兼作君而作師寵綏克相萃十六省人文之盛久崇學校以儲材屆億萬年景運之長更廣科名而增試耄齡覃慶同申華祝之忱邉徼騰歡豈限點強之逺遙瞻楓陛晉頌椿禧等情到臣欽惟我皇上乾健自強離明久照澤敷雨露霑湛濊於八荒運際風雲布經綸於六合惟賓興之巨典舉春鄉秋會以聫科矧誕聖之昌期遍海澨山陬而稱慶乃播德音於綸綍兩闈博選羣才益深勵志於章縫六度頻邀嘉惠歡臚士子叶夀胥與試之歌喜溢臣鄰切恩大難名之戴兹據呈請具前來謹會同學政臣吳夀昌繕疏恭謝天恩伏乞皇上睿鑒施行右臣等編次開科盛典附以士子陳謝諸疏仰見我皇上文教日隆所以昭垂鴻軌浹洽人心者縱極感頌微忱莫贊髙深於萬一顧竊惟聖學淵深御製詩文歲增月益而於經史之訂訛闡祕睿鑒精詳刋布海內無非嘉惠萟林之至意近命分年輪試五經俾多士務實屏浮咸勤研習又且慎簡掄廣登選一時懷瑾握愈之輩胥得奮志功名沐裁成而被昭曠是以正夀稱慶自三雍鼓篋以逮逺方縫掖諸生莫不雲集亨衢跽獻天子萬年之頌蓋以漸摩教澤者深斯愛戴之誠發於心之所不容已豈特聞德音而志忭歌夀考之作人為足以竭媚兹之忱也乎是科特恩賜舉重宴邀榮諸典備載於盛事門八旬萬夀盛典卷七十一
