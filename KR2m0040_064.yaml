front:
  text: 欽定四庫全書八旬萬夀盛典卷六十四恩賚三本年恩詔三詔賜年老旗兵及內扎薩克之蒙古老人等銀兩有差
  hash: sha256:0a9606248ae59dd9e9f53bdb5aac4f95dc2d74441f9bc763b9774d55814b18d6
