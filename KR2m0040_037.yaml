依議黄氏江氏俱著加恩賞給上用緞一疋銀十兩又題為題請旌表事據湖廣總督特成額奏通城縣民吳添佑現年一百一嵗精神矍鑠杖履優游身越百齡子嗣亦七旬以外緒傳四世孫曽得廿有餘人洵為上瑞之徴宜荷特恩之錫奉上諭據特成額等奏湖北通城縣民吳添佑現年一百一嵗請㫖旌表等語呉添佑夀享期頤孫曽繞膝洵為昇平人瑞其應行建坊旌表及賞給緞疋銀兩之處著該部照例具題摺併發欽此應行令該撫轉飭該地方官給銀三十兩聽本家自行建坊並給與昇平人瑞字様其恩賞緞疋銀兩臣部行文内務府支領交該省提塘賫送該撫轉給祇領可也奉㫖依議吳添佑著加恩賞給上用緞一疋銀十兩又題為循例請旌事據調任陜西巡撫何裕城疏稱福履綏之下里有介眉之慶熾昌俾爾熙朝隆尚齒之文兹有咸寧縣夀婦梁杜氏現年一百一嵗安貞協吉淑慎其儀守勤儉之家風彌増豫順際龎鴻之國慶宜賜褒榮臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議杜氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據調任四川總督李世傑疏稱南弧曜采作人徴夀宇之符東井垂芒難老得誦黌之侣兹有涪州生員甘克和年一百一嵗入膠庠而論齒行輩都稀處州里而為儀康強猶昔宜邀顯綍以勵研經臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議甘克和著加恩賞給上用緞一疋銀十兩又題為題請旌表事據兩廣總督兼署廣東巡撫富勒渾奏稱天無私燾炎陬協耆艾之徴聖不遺年惇史紀耉成之徳兹有新寧縣夀民雷徳珀現年一百二嵗生逢盛世躬荷鴻庥享百二之遐齡彌形矍鑠與三千之叟宴並樂熙雍洵為上瑞之符宜荷殊榮之錫奉上諭據富勒渾奏廣東新寜縣民雷徳珀現年一百二嵗請㫖旌表等語雷徳珀年逾百齡精神矍鑠洵為昇平人瑞著照例旌表該部知道摺併發欽此應行文該撫轉飭該地方官照例給銀三十兩聴本家自行建坊並給與昇平人瑞字様奉㫖依議雷徳珀著加恩賞給上用縀一疋銀十兩八旬萬夀盛典卷三十七
