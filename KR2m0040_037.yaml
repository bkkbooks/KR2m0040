  text: 欽定四庫全書八旬萬壽盛典卷三十七
  hash: sha256:9d6d6e6d0ab955defbd8c41284c971b23c021fe3147f874ce9a2dec328ec7cf7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_037-1a, image: WYG0660/WYG0660-0437a.png}
body:
  text: 盛事十三夀民夀婦三乾隆五十年旌表壽民杜旺奉壽婦連氏等四十八人禮部謹題為題請旌表事據直𨽻總督劉峩疏稱時雍致治太和先被于郊圻天保宜民多福並詒于黎庶兹有博野縣夀民杜旺奉鉅鹿縣夀民喬連各現年一百嵗東明縣夀民崔靖一現年一百二嵗服先疇之作息世樂黄羲際國慶之延洪人同佺羨允稱上瑞宜沐殊榮臣等查與定例相符應准其旌表官給建坊銀三十兩並昇平人瑞字様奉㫖依議崔靖一著加恩賞給上用緞一疋銀十兩又題為題請旌表事據直𨽻總督劉峩疏稱治隆仁夀躋斯世于夀而臧化逮柔貞風比戸于貞而固兹有任邱縣夀婦劉連氏現年一百一嵗霸州夀婦孟劉氏河間縣夀婦李張氏各現年一百嵗任邱縣夀婦許王氏現年一百七嵗天津縣夀婦周張氏現年一百三嵗性皆淑慎算越期頤星見弧南多夀並徴于宣夜萱言樹北大年遂閲於長春宜邀旌奬之榮式表閨闈之瑞臣等核與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議連氏王氏周張氏著加恩各賞給上用緞一疋銀十兩又題為題請旌表事據山東巡撫明興疏稱徳徧羣黎天保上九如之頌仁覃薄海壽祺徴四老之同兹有東平守禦所民薛士鉦現年一百嵗東昌衛民夏朝奉現年一百一嵗清平縣民劉來現年一百二嵗寧陽縣民趙養公現年一百三嵗性本醇良人推孝友飲和食徳為康衢鼓腹之氓積善餘慶注岱嶽長生之籍允稱人瑞宜荷皇仁臣等核與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議夏朝奉劉來趙養公著加恩各賞給上用緞一疋銀十兩又題為題請旌表事據山東巡撫明興疏稱樹之風聲至于海隅出日釐爾女士時惟皇極敷民兹有滕縣夀婦种裴氏現年一百二嵗聊城縣夀婦王姜氏齊河縣夀婦王朱氏俱現年一百嵗無有非儀克循禮法松貞柏勁沐雨露於三朝桂馥蘭芳萃孫曽於一室允稱上瑞宜荷殊褒臣等核與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議裴氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據山西巡撫農起疏稱夀愷覃敷錫遐齡于比閈恩慈廣被光煒管于窮簷兹有陽曲縣夀婦郭氏現年一百一嵗婦職克修女箴無忝守儉勤之舊俗裳葛咸宜安熙皥之淳風桑榆倍暖宜邀茂渥以示褒榮臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議郭氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據河南巡撫畢沅疏稱化美含貞表宅勵冰霜之操典隆養老褒恩晞日月之光兹有獲嘉縣夀婦杜李氏矢志靡他守箴無忝持七十八年之苦節集蓼甘回厯一百六嵗之長齡樹蘐景駐宜荷絲綸之寵以増巾幗之榮臣等核與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議李氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據江蘇巡撫閔鶚元疏稱道協由庚熙皥㑹蕩平之極星明見丙夀昌占黎庶之同兹有銅山縣夀民吳三禄現年一百一嵗畢經現年一百三嵗贛榆縣夀民宗文舉現年一百三嵗性各和平人皆敦厚處家庭之内孝友堪風安耕鑿之常儉勤足式並符褒典宜荷優旌臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議吳三禄畢經宗文舉著加恩各賞給上用緞一疋銀十兩又題為題請旌表事據江蘇巡撫閔鶚元疏稱帝有恩言旅耆齡而引養民逰熙宇綏多福以均霑兹有江寧縣夀婦李武氏現年一百嵗昭文縣夀婦唐曹氏現年一百三嵗無錫縣夀婦盧顧氏現年一百嵗銅山縣夀婦朱郝氏現年一百四嵗沐三朝雨露之恩祥符仁夀聚四代孫曽之樂慶溢門庭宜荷天慈用昭人瑞臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議曹氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據安徽巡撫書麟疏稱頌川増而錫祉羣黎多黄髪之祥歌風始以諴民上夀紀彤毫之瑞兹有霍山縣夀婦李朱氏現年一百一嵗身惟儉約性本柔貞黽勉同心既持家而克謹優㳺盛世遂閲嵗以滋多敢籲明綸用褒蔀屋臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議朱氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據浙江巡撫福崧奏海寧州民顧均玉現年一百一嵗顧武恭現年一百四嵗天台縣民林均治現年一百二嵗性質醇良精神矍鑠飲和食徳安作息于熙恬物愛心臧樂昇平於悠乆前以齒登耄耋已邀錫賚之恩今兹夀越期頤宜荷旌揚之典奉上諭據福崧奏海寧州民顧均玉現年一百一嵗顧武恭現年一百四嵗又天台縣民林均治現年一百二嵗請㫖旌表等語顧均玉等年踰百齡精神矍鑠洵為昇平人瑞其應行旌表及賞給緞疋銀兩之處著該部照例具題摺併發欽此應遵㫖行令該撫轉飭該地方官各給銀三十兩聴本家自行建坊並照例給與昇平人瑞字様其恩賞緞疋銀兩臣部行文内務府支領交該省提塘賫送該撫轉給祇領可也奉㫖依議顧均玉顧武恭林均治俱著加恩賞給上用緞一疋銀十兩又題為題請旌表事據浙江巡撫福崧疏稱澤洽咸和福履普綏于海㝢道符恒乆夀祺兼錫夫閨闈兹有嘉善縣夀婦薛顧氏現年一百一嵗性本柔貞儀惟淑慎逾百齡之遐算永獲康寧裕四世之後昆彌増昌熾洵稱人瑞宜荷恩綸臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議顧氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據福建巡撫雅徳疏稱蒼掖凝禔普景祺於嶠外彤編紀瑞徴眉夀于瀛壖兹有同安縣夀婦髙洪氏現年一百一嵗龍溪縣夀婦陳黄氏現年一百三嵗克全婦道無忝母儀鶴算長週閲百年之甲子蘭陔就養延四世之箕裘宜荷鴻慈以彰燕喜臣等查與定例相符應准其旌表各給建坊銀三十兩並貞夀之門字様奉㫖依議洪氏黄氏俱著加恩賞給上用緞一疋銀十兩又題為題請旌表事據湖廣總督特成額奏稱芷江縣民周仲珍現年一百二嵗性惟淳樸夀越期頤際郅運之延洪錫羨而彌形強健安康衢之作息飲和而乆樂昇平宜籲旌綸用光宅里奉上諭特成額奏湖南芷江縣民周仲珍現年一百二嵗精力康健等語周仲珍年逾百齡精神矍鑠洵屬昇平人瑞著准其照例旌表以示嘉惠耆齡之意該部知道摺併發欽此應遵㫖行令該撫轉飭該地方官給銀三十兩聴本家自行建坊並給與昇平人瑞字様其恩賞銀緞臣部行文内務府支領發交該省提塘賫送該撫轉給祇領可也奉㫖依議周仲珍著加恩賞給上用緞一疋銀十兩又題為題請旌表事據湖南巡撫李綬疏稱頌上升恒國衍龎鴻之慶和徴保合家多夀耉之祥兹有攸縣夀婦李蕭氏現年一百一嵗純厚宅心儉勤持已名聞族黨洵為閨閫之完人夀越期頤允屬聖朝之上瑞宜邀旌典仰懇殊恩臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議蕭氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據陜西巡撫何裕城奏稱長安縣民孟世强現年一百一嵗精神矍鑠性質淳良安耕鑿于邉陲宴未預三千之列荷栽培于盛世慶益覘億兆之同仰冀綸恩用敷箕福奉上諭何裕城奏陜西長安縣民孟世强現年一百一嵗世安耕鑿躬享遐齡應請旌表等語孟世强年逾百齡精神矍鑠素行淳良洵屬昇平人瑞著准其照例旌表以示嘉惠耆齡之意該部知道摺併發欽此應遵㫖准其旌表行令該撫轉飭地方官照例給銀三十兩聽本家自行建坊並給與昇平人瑞字様其恩賞銀緞臣部行文内務府支領交該省提塘賫送該撫轉給祇領可也奉㫖依議孟世强著加恩賞給上用緞一疋銀十兩又題為題請旌表事據署陜甘總督慶桂奏稱太和翔洽一人隆休養之恩至徳覃敷四海沐生成之澤兹有秦州夀民張昂隆徳縣夀民王大寧俱現年一百二嵗生逢盛世躬荷祥庥乆安比户之風性惟誠樸自食康衢之力年越期頤昔頻叨粟帛之榮今籲沛旌揚之典奉上諭據慶桂奏甘肅秦州民張昂隆徳縣民王大寧現年各一百二嵗請照例旌表等語張昂王大寧年逾大耋精神矍鑠洵屬昇平人瑞著照例旌表該部知道摺併發欽此應行文該督轉飭該地方官給銀三十兩聽本家自行建坊并給與昇平人瑞字様其恩賞銀緞臣部行文内務府支領交該省提塘賫送該督轉給祇領可也奉㫖依議張昂王大寧俱著加恩賞給上用緞一疋銀十兩又題為題請旌表事據調任陜西巡撫畢沅疏稱夀宇同躋暢皇風于㝢縣熙臺共上徴耆瑞于閨門兹有長安縣夀婦劉胡氏現年一百一嵗行叶箴規俗安耕饁萱枝駐景欣蔀屋之生春榆嵗晞陽覺長安之近日慶荷熙朝之典用彰夀世之庥臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議胡氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據四川總督李世傑疏稱至治無私特重引年之典太平有象疊開人紀之祥兹有瀘州民劉明燦現年一百嵗營山縣民文光蓬現年一百三嵗清溪縣民王天福現年一百嵗涪州民唐可惠現年一百九嵗其妻羅氏現年一百嵗三臺縣民陳文彩現年一百嵗或夫婦齊眉或孫曽繞膝倡隨偕老椿靈還喜萱貞居邑相望松茂更覘柏悦數恰符乎五老贏舉案之期頤澤並沐夫三朝樂歌衢之作息均稱上瑞宜荷殊褒臣等核與定例相符應准其旌表各給建坊銀三十兩其夀民給與昇平人瑞字様夫婦同登百嵗者給與期頤偕老字様奉㫖依議文光蓬唐可惠著加恩各賞給上用緞一疋銀十兩又題為題請旌表事據廣東巡撫孫士毅疏稱聖澤覃敷人瑞逺徴于外嶠皇仁廣被庥嘉疊著于編氓兹有徳慶州夀民董履豐現年一百四嵗新寧縣夀民李芳俊現年一百三嵗行遵古訓徳協鄉評游化日之舒長籌添海屋閲昌期之悠乆夀紀松齡洵為盛世庥徴宜荷熙朝茂典臣等查與定例相符應准其旌表各給建坊銀三十兩並昇平人瑞字様奉㫖依議董履豐李芳俊著加恩各賞給上用緞一疋銀十兩又題為題請旌表事據廣東巡撫孫士毅疏稱治隆熙皥民欣夀宇之躋譽叶柔嘉福懋貞齡之錫兹有順徳縣夀婦温鄧氏現年一百一嵗越百齡而介景嵗月頻増萃四代以承歡孫曽共繞允為人瑞宜荷天恩臣等查與定例相符應准其旌表官給建坊銀三十兩並貞夀之門字様奉㫖依議鄧氏著加恩賞給上用緞一疋銀十兩又題為題請旌表事據雲南巡撫劉秉恬奏稱阿迷州夀民王國琰現年一百三嵗賦性淳良持躬端謹沐聖朝之雨露椿樹長榮撫奕葉之孫曾蘭枝並茂前此年登耄耋頻邀粟帛殊恩今兹夀越期頤宜荷旌揚鉅典奉上諭據劉秉恬奏雲南阿迷州民王國琰現年一百三嵗請㫖旌表一摺王國琰夀過期頤孫曽繞膝洵為昇平人瑞宜加恩賚用示寵榮兹御書扁額以賜其應賞給銀兩緞疋及建坊旌表著該部照例具題摺併發欽此應行文該撫轉飭該地方官給銀三十兩聽本家自行建坊並照例給與昇平人瑞字様其恩賞銀緞臣部行文内務府支領同御書扁額一併敬謹封固交該省提塘賫送該撫轉給祇領可也奉㫖依議王國琰著加恩賞給上用緞一疋銀十兩御書扁額南弧垂采又題為題請旌表事據貴州巡撫永保疏稱時逢郅治引年特重於虞庠運際昇平上夀頻徴於禹甸惟皇仁之怙冒無疆斯人瑞之嘉祥迭應兹有畢節縣夀民劉淳福現年一百嵗沐聖朝之豢養已屆期頤樂化日之舒長彌増矍鑠洵屬邊隅之盛事宜邀鉅典之榮施臣等查與定例相符應准其旌表官給建坊銀