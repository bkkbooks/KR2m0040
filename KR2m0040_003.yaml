  text: 欽定四庫全書八旬萬夀盛典卷三宸章三
  hash: sha256:fd0047209a4d856a239afcd97eb7eeea063885fb1d39b4234a4bc8918abfd5e8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_003-1a, image: WYG0660/WYG0660-0049a.png}
body:
  text: 乾隆五十一年皇上聖夀七十六御製詩文丙午元旦踐阼已周大衍數得年七十六身康敢因蒞久忘無逸惟是體乾最自強百嵗休和致豈易萬民衣食計猶長以兹日慎日增惕肯作虛言襲慶當新正重華宫青宫吉語仰新春萬宇顒希福輳轃大衍數周開嵗帙今為五十一年同堂代五荷天申東朝頤彼待一九寧夀宫在乾清宫之左侍歸政頤老尚餘九嵗亦可稱東朝矣雖戲談誠佳話此室居之閲六旬豫自十二嵗入居育慶宫十七娶皇后始居此重華宫逮今六十年矣設曰重華顧名義瞪乎後矣愧惟真題抑齋重華東璧圖書架重華宫之兩廂東為古香齋貯古今圖書全部西為抑齋皆向時所題名也户對西齋翰墨茵憶昔窮經資饜飫即今勤政敢逡巡右壇祈嵗逮齋日將祀進宫社稷壇因齋戒左殿崇文集講臣太和殿之左為文華殿乃進講所御擬於二月初六日行經筵禮賜宴命教歌抑戒經筵後例賜講官宴而無樂侑席兹特命樂工歌大雅抑戒之章遂以為例豫於清暇亦時命歌以聽之且自戒也老來最欲武公循啓蹕幸避暑山莊之作昨經方澤致虔衷啓蹕應臨避暑宫惟是撫綏法皇祖非因遊豫暢吾躬送鑾萃已盈百辟䇿馬勤猶望八翁董子曽云在勉強外王內聖要胥同靜坐齋中偶爾成詠幾餘無事齋中坐忽忽七旬望八旬雖未凍梨逮耄耋且欣碩果且精神不為疲樂此弗倦恆以德新其又新祗擬十年歸政後息肩方可作間人讀易五十仍過草五年幾間讀易慕韋編凶和悔吝吉占少亨與利貞元統全進退存亡知守正玩辭觀象佑從天夫包含廣矣大矣切己一言曰體乾乾隆五十二年皇上聖夀七十七御製詩丁未元旦五旬有二紀年始久敬益深敕念中嘉爆聲聲鳴逹曙祥曦昈昈朗升東春秋望八餘三載宵旰勤民最一躬盥潄瓣香無别冀虔虔惟是祝綏豐元旦試筆長律元朝率詠三自甲子嵗每元旦必有試筆詩而自自乙亥以後率為長律二首共元旦為三章三元應律迓禧覃始終將逮成增懼政治敢云久所諳昨嵗賀正罷餘愓去嵗元旦以辰弗集罷行賀正禮新春言吉兆欣探窶亦識持者挾綏屢頻求不識慙慈寧停賀周十載層殿西瞻意不舒過隙白駒真迅爾如傷黎獻每厪豫古稀天子元孫兩嵗前又得一元孫女丁未乾隆吉旦初欲去陳言猶戛戛銀箋試筆又成書新正重華宫青宫花甲嵗周諳雍正丁未豫年十七始居重華宫至今嵗丁未正六十年襲慶何非帝澤覃十一世兹親見七前嵗得元孫載錫因命查于太祖長子褚英支派下載字輩下又得一輩因賜命奉皇奉夀為十一世而豫逮事皇祖皇考下見子皇孫皇曽孫皇元孫是親見七世矣仰蒙未有天眷錫慶蕃昌實為古所八旬夀逮近餘三豫今年七十有七閲三年即為八旬正夀夙願乾隆六十年歸政則為八旬有六矣兹尚孜孜自勵不敢少懈敬勤耳聨茵東壁開文燕迓至初正賦雅談舊什親題遍楣梠不渝一敬祝農蠶古香齋有感到處書齊古古香取名六十一年長豫自雍正五年移住重華宫即以東廂為古香齊踐阼後凡御園山莊佳處無不以是為名屈指六十一年矣幾曽書史得真味祗覺昔今度幻光修已蓬心惟有愧治人蒿目更無方對時又值春和候漢詔勤民那可忘漢文帝以方春和時下詔勤民即周禮始和布令之意兹每於嵗前馳論各督撫咨詢民隱新正降旨施惠亦猶西京遺意也題彭元瑞撰皇極殿燈聨詞有序寶柱簇行行綵勝製昉乾清繡幡先靣靣華燈慶長寧夀乾清宫燈柱樹於獵月草四日即每日綴燈聨至嵗除日換燈收聨此舊例也俟八載方臨兹御而萬事貴豫以成蘄集吉語於王春用表祥祀於皇極爰咨內翰聿奏聨詞其惟瑞簮朵殿之毫久經豫納大鈞之鑄成文來上省覽載嘉體以偶連裁草言而雲屬辨由位正動八方以風行十六聨務去陳言五十年胥臚實政曷克臻此賴天恩祖德之貽是惟艱哉皆旰食霄衣所致語有徴而可信思取巧而不佻異宋宫內禪之三盛真稀古駕明製虛詞之耦事必因時乾清宫燈聨仍明代翰臣所擬不過點竄燈節虛詞巽元瑞此聨逺甚什以辨吟書宜表卷屬辭泰陛較富張説之七言述職明廷實殊章懋之一疏屈指籌開八帙建竿生靄靄之春盟心宇御六旬負扆猶孜孜之日云爾凡事曽聞豫立詮嘉稱元瑞製燈聨東西次第南而北左右分明後與前神以通靈氣以運六為之儷四為駢雙撑寶柱輝皇極燈柱樹皇極殿前虔祝天恩待八年啓蹕幸避暑山莊之作老來畏暑意饒前方澤祭過平聲啓蹕旃麥已半收黃積圃禾仍有望緑芃田獨馳瞻拜先顒若每嵗至避暑山莊日即先至永佑寺瞻禮神御衆仰康總躍然向率䇿騎啓行擬待八旬始罷乘馬兹猶循舊例亦自揣體氣尚康強如昔也擬屆八旬罷鞍馬待之亦祗剩三年賜大學士嵇璜時微疾而痊進見喜而得句用辛丑御門日作韻爾日籌瀛髮率宣臺灣逆匪林爽文等尚未就擒近命福康安海蘭察率巴圖魯侍衛章京百餘人又調各省兵萬人前往𠞰捕每日籌辦軍書佇望捷音殊深焦急重臣掄俊率軍先採喜愈談前席碩果權休稱避賢同閣四中今獨在懸車一去慢頻連四十六年十一月御門日承旨閣臣耆年者四人時大學士英亷稽璜協辦大學士尚書永貴蔡新俱年逾七十今存者祇蔡新嵇璜二人而蔡新於前嵗致仕家居嵇璜亦欲乞休上年新正首賜以詩有一去已憐一為甚再隨應識再非宜之句今日嵇璜以微疾痊愈進見喜其精神尚健弗忍令其遽作歸計也却云慶八旬七返首肯同卿待戍年稽璜感余慰留稱願待余八旬萬夀後再行陳請僂指三年即已屆期彼時自當允其所請耳乾隆五十三年皇上聖夀七十八御製詩文讀洪範洪範一書為箕子衍聖禹之言以誥武王者不惟姬周一代制治之源即萬世帝王制治之源也九疇之敘在君則係於極之建不建在民人則由於訓之行不行蔡沈二言盡之矣而余獨以為萬世帝王制治之源者何蓋君者民之本也譬之本乎本正而枝自隨故疇雖有九無一不關于為君者之一身一心可不慎乎然余之所以有會心者固在皇極之建九疇之省而原始要終則在乎第九之嚮用威用矣余蒙天篤佑得建五福五代之堂其説已見前記兹以六極自省幸而無其五而不能去其一所謂憂也春憂雨之不足夏憂雨之或過秋憂嵗之不登冬憂雪之未降無不先時忖度切切於懷至於古稀説之八弊庚子余作古稀説數前代之弊政有八曰強藩曰外患曰權臣曰外戚曰女謁曰寺曰姦臣曰佞幸幸皆無一仿佛者今又閲八年隨時省察不敢自恃其無為慮或萌其漸未嘗不日愓於懷云時憂其或萌合寰中之萬民時憂其失所所謂先天下之憂而憂者不可究極而後天下之樂而樂者曽無幾希是則此憂不能去而亦不忍去且更不敢去也夫季世之君但知其樂而不知其憂以致受大憂而不可救藥者多矣余幸於六極中免其五而得其一則此憂也將拳拳守之而惟恐其失之或者邀昊貺符宿願得歸政之後庶可免此憂乎然更當教子孫以體余之憂為憂方當萬世守之庶幾永承天眷是則臣民或可去其憂而為君者終無去嵗之道萬世為君者其尚勉守此憂庶幾不致大憂而保後樂尚敬之哉臣等伏見我皇上精勤乾惕惟日孜孜五十年來如一日所以享大同之盛膺偹福之全為自古盛王所莫及皇上既偹五福兼省六極獨以為惟憂不能去且不忍去亦不敢去將拳拳守之而惟恐失之亦以見保邦國之之謨無刻不在先憂中而惟厪一憂斯致五福理本循環惟聖人為能見及者矣戊申元旦元辰喜值會干支是日甲子百嵗稀逢肇首禧甲是東方生物始子居北極冠時基朝乾夕惕欽無逸雨較晴量勵有寅七十八翁八旬近七年歸政此徯之元旦試筆太和元會萬方趨五十三年教敬敷戒在得乎老已至思其艱也易為圖却非求治成欲速惟是惟終始弗渝天子古稀敢稱倦孜孜猶日最勤吾康熙三載逮今嵗一百還饒甘五年康熙三年元旦甲子至今嵗元旦又值甲子凡一百百二十五字子重逢真是幸青陽篤祜益增綿功鄰耆定賴天祐剪雈苻靖海堧立春前一日福康安奏十一月二十五日已攻克大理􅍻賊巢林爽文竄入內山官兵入山搜捕計時當可就擒始以七言終五字每嵗元旦及試筆詩皆七言除夕詩皆五言數十年來遂成常例遂成常例屬吟箋新正樂夀堂古希有八八旬近歸政仍徯七嵗留尚此宵衣勤旰食那能後樂勝先憂申來未去屈指數上聲減嵗增年隨意酬豫今年七旬有八自明年至八十有五歸政之期惟待七年距歸政減一嵗則豫又增一年也亶沭天恩遂初願快哉此外更何求得間室古稀猶是日孜孜那得居斯間片時若果丙辰亶其至念兹允出在於兹上元鐙詞有序璇霄月燭先天圓體圍三綺席華鐙映不夜元音隔八每以撫時抒咏例成排嵗為編溯開什於攝提逮昨年之協洽積疊經三十七次自丙寅始作鐙詞至昨嵗丁未凡三十七篇春色宜人迤邐為四六八章丙寅初唱八章後間有四章六章者自辛未以來每嵗例作八章嵗華紀麗大抵申祝慶占豐之念亦以通西瀛北漠之情播為豳籥之音譜入象胥之譯多雖益善數恐不鮮兹者豐楙迎年申堅肇吉環周六甲開首祚於嵗朝今嵗元旦甲子規滿一輪候圓靈於元夜十五日望封犢背田間之兆兆五行浪帖鯤身海表之軍聲三捷人向光音天裏詩宜鈞樂奏中爰發在心之言因為屈指以計嵗紀尚三之二屇堯典之倦勤大衍七萬有千合羲經之積數分章序卦繼嵗連吟平草一而鉢速響時仄四三而珠嵌字裏六十四卦中平聲二十一皆押為韻仄聲四十三則於詩中見本字難因見巧麗不涉纎梁簡文之詠卦名偏非全舉宋嚴羽之臚詩體古未前聞竒畫今開乾至比而成嵗哉生始兆弦漸望以都圓或能符羲文周孔之全經惟仰賴天地祖宗之純佑易生生而大偹律八八以相成維五十三年之春際三五初摛鐙詠羅六十四卦之目裁四六乃製辨言屈指倦勤餘八年鐙詞六十四應全每嵗八章是恰應成六十四章也每章擬以卦名什副望恩惟待昊乾上元每嵗例西園同樂新疆及舊藩詎為去聲怡情賞寶月曰厪深意奠輿坤及時膏澤可教屯光武寧當學閉門弗藉舌人通譯語乾隆八年始習蒙古語二十五年平回部遂習回語四十一年兩金川略習畨語四十五年因班禪來禪兼習唐古忒語是以每嵗年班蒙古回部畨部等到京接見即以其語慰問無藉通譯元夕命新舊諸畨入同樂園隨觀燈火並燕笑聨晴用示柔逺之意燈聨席共歡論元宵恰值望宵中上元本以正月十五得名而置望亦有在十六七者今嵗元宵恰值月望更副嘉名賞集東瀛西大蒙近年上元節賜宴觀燈朝鮮使臣亦令與宴去嵗以該國有世子之事命該使臣於元旦朝賀後起程回國今年仍令隨同新疆分藩入班與宴際此逺來及近悅敢誇化洽與功崇飛空星點達斯須火樹銀花燦萬株占得羲經卦之五雲天宴樂曰惟需千尋貫斗蛾輝麗八照流虹鶴𦦨丹恐涉矜張深自訟勝分敬怠慎其端臺灣耆定逮班師休養羣黎命妥為臺灣自逆匪滋事以來良民逃避失業深堪憫惻去嵗已節次降旨將五十二三年臺灣全郡並嘉義縣五十四年地丁錢糧概豫豁免今逆犯林爽文父母家屬俱已拿獲該犯亦窮蹙竄入埔裡社埔尾一帶畨社等協同圍截擒拿不難尅期蕆事而被難羣黎正當加意休養一靣命地方大吏妥為安輯以副軫念今夕春臺賞煙火那能南望免遐思流雲點綴幻晴晦時有飛花落碧空建國親侯比去聲之吉順時行慶月惟中臣等伏讀厯年御製鐙詞皆所以惠逺聨情祝豐偕樂體含風雅義具典謨兹者分章序卦綜六十四卦而八八以全衍萬有千䇿而永永無極體新義正伊古所無知周道濟開物成務之全胥于是焉見之且彖象十翼原為韻語天地自然之文又有適相符合者矣隨安堂有會豫十七嵗居重華宫時曽顔書室曰隨安取隨遇而安之義即位後於西苑及圓明園長春園清漪園靜宜園湯泉避暑山莊等處每以題額今六十年以來隨遇之義益堪靜驗重華昔所額閲六十年中到處題三字惟時驗一躬安居造以道隨物會其通更愜符名者臺灣兹定功輕輿六韻輕輿向舊衙舊衙門行宫原明季內侍之衙門也屢有詩論之十八里非遐獵騎春搜獵是日沿途小獵國語謂之阿達密略寓春搜之義非如木蘭秋獵大獵合圍國語所謂阿巴喇密也字風法篡家子孫勘射義我朝最重騎射無不自幼學習兹自天津回鑾駐蹕南苑數日皇子皇孫皇曽孫輩來迎即命隨行射獵以觀觀其藝之能否憑輿無事口占是律亦以志愧云平仄就詩義雖曰心猶喜其如力不加逸行稍自恧教寓此惟賖六十六年我豫自十二嵗侍六十皇祖在此今七十有八是六年矣隙隂了未差啓蹕幸避暑山莊即事往嵗撰良恆據鞍習勞示健衆胥歡向年每詣山莊必乘騎啓行亦寓習勞之意一時扈從及送駕諸臣無不以豫年近八旬而康健如初共深慶忭冏卿曠職應從罰儀使進輿匪溺安今日啓蹕時上駟院竟將御馬遲誤自應分别議處責懲因乘輕輿就道非豫意圖安逸有殊往例也遵養古稀庶亦可斯勤三度却非難以豫年逾古稀即乘輿亦遵養之道但自度精力尚強是以上年啓蹕詩有擬待八旬罷鞍馬之句僂指亦僅三年必不至以䇿馬為難是冏卿雖屬曠職而拈句轉增新意耳優霑膏澤時暘若緑野青蔥入慰觀山莊啓蹕木蘭之圍之作中秋恰度餅瓜筵啓蹕行圍例按前益壯老當語猶古自強不息卦惟乾川塗潦退幸非沴北遜南收厯閲田往年秋收關外率勝關內昨據劉峩奏保定河間遵化等十府州屬約收八分有餘其餘德等府屬約收八分有餘是今嵗秋收雖北遜於南然蹕途周覽農田漸次刈穫已屬豐年景象逮八旬將罷乘騎欣兹一再尚鳴鞭回蹕至御園之作乘輿此去乘輿返向詣山莊必乘馬啓行既寓習勞亦以示健意至八旬可以遵養上年詩因有擬待八旬罷鞍馬之句今夏以僕臣遲悮御馬遂乘肩輿就道非豫自度精力以策馬為難也四月光隂迅似飛望八旬旋閲八載袪惟危在守惟微至緣秋仲罷獵早今秋木蘭圍場圍場地皆沮洳故罷獵而歸較常年至御園早數日覺異常年獵罷歸栁緑楓丹繪園景刻詢臺報攬遊稀今夏駐藏大臣慶麟等忽有廓爾喀部落侵犯衛蕆西邊之報是以撥兵籌餉日勞於心問報不論晝夜今日回蹕至御園適接慶齡奏廓爾喀聞大兵將至已釋圍竄回即命書旨馳諭機宜大兵不可因賊退即回若賊聞我兵已回而復來成何事體必當示以兵威令其知畏不敢再犯以期永靖遐邊丨臣等謹案是嵗回蹕時正值𬗟甸入貢使臣至山莊瞻覲而廓爾喀擾後藏畨部我師一至即時歸順且得其屢次籲求朝貢實情一蒙俞旨踴躍來庭誓世世永為臣僕是皆從古末曽臣服荒逺之國同時并效享王真史册所罕覩也乾隆五十四年己酉皇上聖夀七十九御製詩文八徴耄念之寶記豫年七十時用杜甫句鐫古稀天子之寶而即繼之曰猶日孜孜不敢怠於政也蒙天眷佑幸無大隕越於兹又浹旬矣思有所以副八旬開帙之慶鐫諸璽以殿諸御筆蓋莫若洪範八徴之念且豫夙立願八十有五滿乾隆六十之數即當歸政今雖八十逮歸政之嵗尚有六年一日未息肩萬民恆在懷庶徴之八可不念乎念庶徴即所以念萬民曲禮八十曰耄老而智衰之謂兹逮八十幸賴天佑身體康強一日萬幾未形智衰不可不自勉也如至果不能自勉則亦不敢曠職以待六年之期何則壇廟之事不可不躬親雨暘之時不可不常驗中外之政不可不日勤民物之養不可不心存茍失其一叢脞隨之則吾豈敢是則耄而敬念庶幾仍古稀猶日孜孜之念也亦五福五代堂之説所謂皇極斂錫之志也亦即近讀洪範著論所謂六極中不能去其三曰憂之意也夫漢唐以來古稀天子才得六六之中至八旬者才得三三帝之中惟元世祖可稱賢其二則豫所鄙也三代下諸帝登七十者僅六見豫尚所為古稀説而六帝之中惟梁武帝宋髙宗元世祖年登八十梁武帝自貽傾覆宋髙宗忘恥偷安皆所素鄙惟元世祖乃創業大有之為君踐踐阼不早建號僅三十五年傳孫成宗其諸王世系元史雖無世可稽但計其世次訖順帝不過四傳亦不能如今五同堂之盛然則豫之仰荷天眷至為深厚不特云稀且自古所未有如是而不祗承鴻貺愛養黎元則豫曷敢抑亦有所不忍也即元世祖亦未如豫之五代同堂是豫沐昊乾鴻貺為獨深而豫之所寅承錫羡當何如亦曰體天愛民誠心勤政與洪範五之斂錫八之念徴九之三憂孜孜惕惕日進無疆云爾豫之孫能心豫之心政豫之政惕豫之惕憂豫之憂或得仰邀天眷有年至七旬八旬者繼用此寶則又我大清國億萬斯年無疆之休所不敢必而深願者也是為記臣等伏見我皇上宵旰勤勞懷保惠鮮之政與雨暘寒燠之時念兹在兹無時或釋乃者八旬肇慶取洪範念用庶徴之文鐫寶以志御製記文發明體天愛民誠心勤政之實謂即古稀猶日孜孜之志日慎一日以凝鴻貺而答昊慈大同之兆偹福之隆皆應念而徴有莫之致而至者惟敬誠乾愓勵無逸於深衷斯保右命申迓庥徴于滋至繼自今先天弗違後天奉若億萬斯年之慶階睿念之所運量焉爾己酉元旦喜暴聲中昕曙暉太和元會聚冠衣東瀛北漠聨西旅三百八旬始萬幾今年閏五月得三百八十四日舉成數也所幸一身七葉見豫上事一身皇祖下得元孫是已見七世詎惟今鮮古來稀何修遇弗忍言矣益慎益欽昊貺巍元旦試筆農諺申過酉入礽乞漿得酒祝休徴論旬負扆七將八數去聲世弄孫元繼曽漫惜增為嵗減且欣年減是年增處尊蒞久滋深畏消息理照切業兢四始開晨法太微敕幾方寸凛惟幾亮功凝績理紀協九宇萬邦留熟祈戒老已忘戒彼壯用寬自勝用其威厯干以六逮乎丙歸政吾將泯是非題匣貯古稀天子寶天子古稀九玉章匣貯間畫工獻彼技射虎肖其間匣蓋靣鐫飾射虎圖宛肖圍場中光景已十年閲何曽一瞬慳雄心漸消泯逸志在髙間幸盤山啓蹕之作春日行時動養和宜老年盤山送佳氣御苑發華旃潤野無塵坌連阡看麥芊東門仍跨馬上年五月幸避暑山莊啓蹕日上駟院將御馬遲悮因乘輿而行非意圖安逸也今日仍乘馬一時扈從及送駕諸臣無不同深慶忭萬衆意欣然啓蹕幸避暑山莊即事得句乘輿去嵗僕臣差向年幸山莊必乘馬啓行去嵗以上駟院偹馬遲悮乃乘輕輿非更往例也避濘今朝更御車連日放晴而昨夜復大雨逹旦因念肩輿者泥濘難行不惟不乘馬且更御車矣近八自漸殊遜昔停三已覺再難加本擇吉初一日啓蹕因二十八九日之雨是以改期今日然扈從人等已俶裝多待三日勢難再停而行未數里雨亦旋止尤為可喜往年雨獵那辭勩往嵗木蘭行圍雖遇雨亦不止獵是以屢有雨獵之作若因雨復即改行期是豫耽居御園矣此日園居可戀嘉兵役修除實勞矣普教優賜費非奢修道兵役頗皆出力因命從優人各賞銀一兩以示體恤登四靣雲山亭子一嵗虛簷必一巡輕輿復此陟嶙峋侵晨幾點收殘雨傍午髙空淨碧旻且喜山田暴多稼那無逸興答清辰拈毫笑謂孤亭道共汝行將度八旬是亭搆于康熙辛卯正與豫齊年也中秋日即事興州承德古今置避暑山莊即御園每嵗于斯行慶典明秋當乃度宫垣每年在山莊舉行慶典率成常例明年為豫八旬萬夀仰沐昊蒼篤佑載籍罕聞自當回蹕京城御殿受賀俾臣庶各伸祝嘏之忱乎歸政五年此自明年至乙卯歸政之期僅餘五載自當於此度節敬邀鴻貺得否如期一意存翰侣册呈厯來什展嫌頻疊砌陳言廷陳有彚書御製中秋詩册進呈者展閲雖意興各殊而陳言未免頻見疊出者入崖口崖口平從舊路入昨年遇潦偶然思情當曲體惟兹衆知不可惟者是時去年入崖口偶緣潦水盛漲雖扈從人等俱至大營而行李多未能到不可不而體衆情罷圍旋蹕然農隙講武時不可違家法昭垂意最深逺今年自當依例舉行及老仍應厪武詰柔遐兼以沛恩施豫雖年屆八旬而精力尚健不敢以詰武為勞矧蒙古王公台吉等每年於萬夀前至山莊宴賚駢蕃即布圍之千二百人俱有賞賜是柔遐之中兼寓恩施法制誠為美善秋雲朗霽山原廓獮典前年正若斯出崖口作君職詰戎率蕆為擬八旬後可勿乘騎今嵗仍必舉行秋獮亦猶一二年內欲豫中祀皆親祭一周以盡君職之意詳見巴顔和樂行圍即事詩注出崖口合御車宜明春禁苑開八慶後嵗山莊望九期明秋八旬慶典固當于京城御殿受賀後嵗至山莊避暑則年已望九理應節勞罷乘騎矣未致政寧當自逸擬臨觀敬效前規豫年十二待皇祖皇祖行圍維時詢之年矣御前諸臣知圍中弗乘騎者已數今秋連舉十三圍馬上命中不減昔時仰邀優厚後嵗即不欲乘騎然秋獮令典我朝天眷更加家法所貽豫未致政以前不敢自逸屆期仍擬率皇子及孫曽元輩進哨令皇子等行圍而豫于看城臨觀或坐而引弓射獸倣效待之盛事惟前規是亦伊古所無天恩之默佑耳能如是否心誠願虔待天恩佑賚垂回蹕御園有作避暑獮秋蕆旋蹕古稀九老幸康強馳驅有節知珍重重年屆八旬䇿騎自當有節是以近嵗木蘭圍中不復甚馳驅今嵗偶遇前禽近馬猶能中獲則素所練習固非竒異也射獵無妨偶效常往返倐經四月速旰宵敢懈萬幾忙十分稔望二分失春夏直省田苗長茂未可兾上豐惟因秋雨過多低窪處所不無淹浸據報止有八分經途體察誠如所云殊甚軫惜體察沿途惜不遑即事雜言望雪今年殊往年惟因掃疊賞行便今嵗秋雨霑足不似往年盻雪之􅎋惟每年得雪後掃疊培樹加賞步軍園丁人等是以刻下轉兾雪澤也南西園事兩耆定去嵗此時正盼望安南郭爾喀報捷之信兹阮光平廓爾喀俱已歸順與年班蒙古回部及朝鮮琉球暹羅諸國俱已入貢賀正東朔諸藩宿致虔庶政心欽銘敢懈八徴耄念寶新鐫春朝吉日幸成用坐位帖言久稱旃豫因來嵗八旬正夀鐫八徴耄念之寶仲冬即已鐫成於立春吉日遂行鈐用因念顔真卿坐位帖有行百里半九十里之言而猶恐難副其名兹得鈐用御書乎新年即至何莫非天恩眷佑己酉除夕今嵗值夏閏便宜一月多忽仍大除到雅合五言哦卷燭紅猶昔㷒煙白揚和古稀已艱致厯數倐旬過八旬萬夀盛典卷三
