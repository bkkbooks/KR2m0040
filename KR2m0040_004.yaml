body:
  text: 乾隆五十五年皇上聖夀八十御製詩文四詩論昨自避暑山荘㢠至御園之作有慙徳徳無稱四得之句盖引而未發兹乃叙而論之夫子思引孔子之言以為位祿名夀胥因徳而得之則知有徳而得之者為實無徳而得之者為虚若予無其實而得其虚其慙愧可勝言哉盖予之位天地之所命宗祖之所授無是二者予因何而得之亦惟栗栗危懼慮官厥官遑敢自詡其得以傲物哉至於祿則九寓所同仰萬民所共春豈啻十目十手之視指哉毫釐之失謬以千里威福玉食一渉私欲之作必致越其始而隕厥終能保保其得乎若夫名為實之賔實則賔之主也居九重之上臨百辟之尊孰不以虚言譽之即今八旬大慶之獻詞頌者不可僂指數則此名也亶其實乎雖文徳武功微有實蹟之可稱然無一不由兢兢業業中所出且恐具其始而失其終得将不保敢自怡乎兹逮八旬不可不謂之夀然此夀乃天地黙佑祖宗延禧予一人幸逢其㑹敢強顔以為有所致哉且予五十五年之間無一日因微疾而不理事者求仙素所鄙即醫理並不識亦惟慎起居莭餘食以為養生之常道耳則又有何術之可得凡此四者皆予所得而實皆非徳之所致也非徳之所致則所謂有其名而無其實忸怩之不暇又何能蕼然自居而不疑方将慎半九十之懼孜孜矻矻以待五年之歸政可稱全人則惟敬待天恩而不敢或必者耳着論自警並以示羣臣之獻詞頌者四得續論近作四得之論非自謙也盖紀身之鮮實徳與己之所實見耳然尚有未盡意者前論切乎已續論公天下抑亦有所獨者耳盖中庸苐十七章子曰至子孫保之而止所以戒為天子者保其位而已此皆夫子之言其下四得之繹則皆子思之語非夫子之語也以位言之易曰君子思不出其位則君子之位也又曰聖人之大寳曰位則聖人之位豈豈必曰天子之位乎堯舜禹有天子之徳可謂得天子之位其餘皆不可謂得天子之位孔夫子有聖人之徳可謂得聖人之位其餘皆不可謂得聖人之位也孟子所云故益伊尹周公不有天下其心未嘗不羡天子之位雖欲行其道之意耶然非至言也盖益得益之位伊尹得伊尹之位周公得周公之位非不得也若孔子必無是語而朱子註子思此章直以為必受命為天子是亦孟子之遺意耳予以為後世之亂臣賊子未必非此言有以啟之然此言非予言之他人不敢言也且自古至今無一代無天子是皆得其位者乎予不敢以得位自居實因徳不勝而滋懼耳至於祿則自天子以至百辟卿士皆食祿者也盡其職乃可謂之得鰥厥官不可謂之得而其本均不出於修徳也王禹偁待漏院之記微見其端矣若夫名乃實之賔實者徳之謂也無其實而有其名不滋愧乎三代以下惟恐不好名予謂此語亦未臻而清流操室中之戈者非因名有以害之乎夀則秉來之氣數所不可強盗蹠夀而顔淵天盗蹠果得夀乎顔淵果不得夀乎古來莭以以終者謂之不能得保其夀可乎兹故申而論之以戒後世之不務修其徳而徒慕四得以反致敗其徳且以靖天下後世之托聖賢之書以妄興其欲有所得之得之心有位與無位之人可不深思所以自處哉作是論時引用繋辭聖人之大寳曰位盖亦斷章取義耳予之意則以為天子有天子之位聖人有聖人之位分而言之然亦非始予意也盖中庸上莭孔子之言德為聖人尊為天子已區而三之矣既而思之繋辭本文下即繼以何以守位曰仁何以聚民曰財理財正辭禁民為非曰義是則天子之事也似繋辭所指聖人即天子然按諸經從無尊時天子為聖人如後代所稱聖君聖主聖上者大禹謨乃聖乃神為益對舜稱堯之詞微子之命克齊聖廣淵為成王對微子稱湯之詞皆非稱堂時天子也三代上君臣之際情親而切質無取乎頌語惟荘子華封人祝堯使聖人夀使聖人富使聖人多男子為當時語堯因聖人也然則稱天子為聖人起於用秦之開亦如朕之字専為天子自及乃昉自秦也十翼為孔子作不應作繫辭有是語且上繫苐十一章若莫大憲貴莫乎乎聖人又分著矣歐陽修以擇之不精繁衍叢脞近於戰國後語疑十翼為雜取後世講師之説非孔子所作亦不為無見論成偶思及之并按於後臣等謹按徳者得也徳為福基一得而無不得其理可信之天皇上正位凝命茀祿用康聖筭之延洪與天為量良由聖人居天子之位徳彌劭而福日増實於必得之理有符合者乃淵衷讓羙復申以修徳致福之原屏頌揚而戒歆慕㳟繹聖論二萹成已成物彚為一原皆前聖所未發一人一人之祿祿名夀敷錫為四海之位祿名夀而欽承昊貺日進無疆於中庸之理推之彌廣按之彌深矣庚午元旦庚戌三陽又肇春天恩沐得八之旬七希曾數六誠有三逮應知半未臻三代後帝王年登古稀者惟漢武帝梁武帝唐明皇宋髙宗元世祖明太祖六帝至於年登八十者又惟梁武帝宋髙宗元世祖三帝然搃未五代同堂矧予仰沐天恩備邀諸福尤深感荷幸值乆安户孳盛殷懐長治俗還淳自强不息重銘志予既鎸入八徴耄念之寳副以自強不息亦猶七旬時刻古希天之之寳副以猶日孜孜皆銘乾惕之志也歸政乾乾待丙辰元旦試筆元旦試茟例成詩秉燭撫箋藻句摛心喜臘逾春肇日思艱絲貴米昂時由今視昔曽何濟救弊補偏惟勉為漢武云云汲黯戅非予事祇忸増怩養性殿即事例以初韶迓新祉慶開八袠拂吟箋題詞又復逮三嵗自丁未題詩後逮今又三年矣歸政仍當候五年栢植假山漸成古梅稱真樹欲􅍭妍有無為裏分心性丙辰題養性殿詩云養心期有為養性保無欲心動而性静也要之均宜得養一字縂湏養以全新正重華宫茶宴廷臣及内廷翰林用八徴耄念之寳聫句復得詩二律古稀天子未教行登八如前太矯情庚子年王公及内外臣工奏請慶祝七旬萬夀未即允行前嵗復再三懇求於今嵗舉行八旬慶典于思藐躬荷膺天眷寔為史冊所罕聞而天下臣民愛戴之忱出於至誠如再為固却轉属矯情因俯允所請仍飭毋得過於華侈致滋縻費製寳仍勤庶徴念聫萹惟冀衆規呈較於衛武銘以誠比似周寧銘以誠機鑑豆觴資日用絲綸况此繋王貞刻璽由來祖制遺臣擬皇祖望七時欲刻一通用小璽命内廷翰文皆無當聖意者乃定戒之在得四字予于七旬時鎸古稀天子猶日孜孜寳及此次鎸八徴耄念之寳不息二寳亦㳟倣我皇祖之意藉自儆惕云兩言戒得緬宏規作堂前與後為記避暑山荘戒得堂有前後記二萹紀袠七過八及期自幸毎因増自慽予受矢願皇祖眷顧之恩至為優渥亦祇希皇祖享國之年即當歸政今惟餘六載竊幸已躋八袠惟念及皇以幼齡踐阼在位六十一年而夀實未七旬追憶之餘毎切愴懐惟慚那更侈惟怡六春秋閲當歸政獲否天恩敬俟之八徴耄念之寳聫句有序紀曲禮之年近期頥而稱耄中庸之之㫖誠悠乆以為徴惟有所受之而夀以名且於時保之而寳乃大盟宿心而冩篆開春首以聫吟時則翰直由庚枝論奄茂佇月陽之臨橘逮日閏之餘桐是予震夙之期撫乃乾行之運河圖之合天地重五而大衍無窮黄鍾為事本根隔八而相生不已嵗増月益予惟調幕之蘉日就雲瞻衆迺稱觥之籲俯鍳羣情之莫奪勉依慶之之獲申瞬迅轉於駒光肩仔承於駿業現夀者相赤子心憶含飴䝉􅀈於方沖洎受鬯付遺於未壮幾至萬而京垓億兆指難處於恒沙嵗積旬而二十九千八十嵗凡二萬八千八百日舉成數也心靡間於刻漏周伯星之見凡幾華封人之祝漸多豈意宵肝之尋常遂躋春秋之八十溯自三代以下如前六帝之中及耄惟三稱賢僅一粤蒙古開基之主當至元致治之秋建號則三紀未踰卜世則四傳已訖考秦漢以來諸帝登古稀者凡六見其中躋八袠者僅三梁帝宋髙宗固不足道惟元世祖可稱賢主而建號祇三十五年𫝊孫成宗訖順帝方四世亦不能如今五代同堂詳見八徴耄念之實記百代皆為天子従未聞運㑹之全五福已偹藐躬總特荷眷貽之厚在盛世不言瑞應而皇極宜有歛敷比者屢綏而稼穡順成允治而海河循軌型仁講讓民聚指以同居績學抱經士弹冠而賜苐野斟菊液二萬餘里之老婦問安國衍瓞綿百九四家之元孫在抱羅斛則新封如礪朱波則底貢厥琛兩畨四川土司臺灣生畨之土目年班四國朝鮮安南琉球暹羅之陪臣元㑹人遥西極廓爾喀使遣頂經宅定南交阮光平先來請朔顧惟凉薄躬何徳以克轃上賴洽熈事非常而胥㑹言之夸矣方懐蹈虎而渉水命不易哉曷副披圖而刻玉語無徴而不信心永念之在兹記書忩尋今古之文欽孔壁具帝王之治王歸自鎬國舊封箕重訪道於胥餘述錫疇於文命理藴洛書之九位算符洪範之八徴序雨𤾉寒燠風之時應視聽貎言思之敬惟星惟日惟月惟嵗省勤上下之交用成用明用章用康精騐天人之際冕端受頊盤浴銘湯是用篆以成章勒之延喜色華華而質粹道絜矩而形方得夀偕宣鼓之成計字協羲爻之畫寳文六字引之嚮用引首曰嚮用五福副以健行副章曰自強不息佩押紐以交龍座侑觴而稱兕淮南子喻因抑埴模範斯存乾清宫記並尊蔵球圖埒重不言既夀陋藍田繆篆之鎸即此𫝊心鄙嘉靖醮章之卬殿諸御茟文足徴而識此長年𫝊予後人嗣其念而世恒寳用薌之作記絃可賡詩四七廵母以頌以規千萬嵗不在璽在徳耳惟亮功百職卿士師尹彛倫共念於箕疇予尚邀福九齡夜寐夙興抑戒更徴於衛雅御製逾七幸當開八袠箕疇耄念八徴符鎸琳用此資抑埴予于上年長至月因開嵗夀躋八袠思復鎸璽以資鈐用宜莫若洪範八徴之念乃命選和闐良玉刻為八徴耄念之寳盖予仰荷一日天庥康強猶昔而勤政愛民固不敢不自勉也㪺茗胥教洽燕酺新正上八重華宫茶宴為毎年例事今嵗㳟遇嵗皇旬萬夀行慶施恵隆儀稠叠際此獻開韶即以八徴耄念之寳幸命題聫句較往嵗尢深慶天子萬年新酌斝元旦叅晝大和殿筵宴毎十年一舉乃神㑹之典始自庚午皇上四旬大慶迨庚辰庚寅庚子俱循舊例今年元旦復舉上儀示慈恵以洽羣情合中外而稱為開萬夀洵韶盛事聖人大寳豫書殳天子皇上因庚子七旬萬夀鎸古稀之寳又于上冬豫鎸此寳以副位固昌期易繋辭聖人大寳曰與禄名夀同其必得者也記爰攄志謙招福我御朝世際洽熙逺邁前古錫福皇上宇五十餘年以來欲福益躋仁夀日等㳟繹自勉御製記猶以寅承錫羡孜孜惕惕進無彊仰見聖懷謙抑彌劭真所謂徳者福之基福者徳之致也臣阿桂詩迺載賡頌屏䛕自古人臣仰賡詩章如尚書所載庸作載歌尚矣二百以後鮮克嗣音我皇上盛徳大業為前代史牒所未有臣等所陳皆五十五年之周必實心寳政非如唐張説請製千秋莭之疏宋大賀天申莭之表徒以虚詞貢䛕也月琯日徽叶伶侓叶八萬夀在八月琯音日次十三徽諧琹軫吹律軒皇旋宫協應相召相生恰符無彊嘉兆五元十夀衍羲圖易大衍之數五十王弼説以五乗十推而演之為萬有一千五百二十為天地自然之數之成皇上誕膺大寳之嵗二十有五是紀元逢十數即聖誕逢五之中數聖誕逢十之成數即紀元逢五之中數以羲圖演之萬億京垓正未有艾也氐南周伯躔隣騎宋史天文志景徳三年四月伐寅周伯星見出氐南騎官西一度状如半月可以鍳物按太乙占王者制禮作樂内外得宜君上夀考國祚大昌則周伯星出臣嵇璜秋丙老人位見弧晋書天文志老人一星在弧南一曰南極常以秋分之旦見于丙見則治平主夀昌辰武寅文中兩聖周文王生于殷祖甲二十八祀庚寅年武王生于殷帝乙三十二祀壬辰年見楊觀光致知小語我之庚皇上誕于康熙五十年辛夘以六甲次苐輪寅辛夘壬辰適中聖誕之年兩聖而立我聞予問考諸儒周書無逸論殷中宗享國七十有五年髙宗享國五十有九年祖甲享國三十有三年盖周公所聞如此大戴禮載宰予問黄帝三百年先儒言紀年之久君夀之長者皆引為證據山荘羾牘羣依藻乾隆五十三年八月十三日睿親王淳穎等大學士九卿阿桂等一摺各直省将将督撫提鎮都統學政塩闗織造諸臣都爾嘉劉峩等一摺合抒忱悃並據紳士軍民人等陳請㳟舉籲申慶典再三皇上始猶未允諸臣環懇至臣和珅榖旦敶箋請集蒲上年正月八日大學士軍機大臣南書房翰林等㳟請照康熙萬夀盛典之例編輯章天皇上八旬萬夀盛典一書依舊例分聖徳典禮恩賚圖繪歌頌六門又増門用聖功盛事二昭羙備前典典經再旬越康熙癸已輯成書聖祖六旬萬夀舉行慶典編皇上率至祖攸行後期廿載八旬始展隆禮古稀稀又十年踰杜甫詩以七十為古稀至八十則更稀矣皇上自七旬萬夀刻古稀天子之寳至今信千八旬十年以來勅㡬凝命如一日古帝王所希有也子於父母洗非腆戊申文有皇上平定臺灣告成熱河母文廟碑云天地天子之父子於父母不可言報我深仁皇上臨御以來代天子民誠求保赤厚澤浹髓淪肌是皇上以母亦非天地為父母天下臣民以父母皇上為父可言報惟是臣民之家厥慶皆有洗腆用酒之舉况躋堂祝夀載在經義而所謂頌禱者亦惟萬夀無疆之語以申愛戴不容已之忱又豈敢腆以言厚言厚庶幾洗以而已臣王杰御製予與臣黎恵有孚請舉慶典固屬臣民祝嘏之忱然予惟普沛恩施以盡為君之道向於經筵著論觧易有孚恵徳句以為不應計及人之愛戴即此意也子嵗夀辰原卻矣庚子嵗朕七旬誕辰中外臣民籲誠祝嘏朕未經允行仍頒恩詔開鄉㑹試恩科輪各省漕粮以洽羣悃戌年誕節勉聴夫今嵗八旬正夀朕以羣情難遏勉俞所請苐申諭毋得過事華侈期通上下之情仍寓莭儉之㫖庚庚昌吉端蒙佑予毎逢庚嵗為正夀今已閲八庚而智慮未哀惟盖戴昊蒼眷佑之隆耳乙乙心盟更顯謨阼之皇上以乙夘嵗紹登大寳毎宣日黙告上蒼若蒙天諭廷臣踐眷至紀充六十年乙邜後即當歸政必不敢上同祖仰見我皇上紹廷御宇丕顕前皇謨而羮墻之慕毎念不㤀祖徳讀誥揭屏撰咸合全書御製讀召誥以曷其奈何弗敬足為一言之敝乃千古讀尚書者所未及又於無逸一萹莅事御書數四如所圓明園屏静宜園之勤政殿引見之御皆揭是萹盖尚書為二帝三王治天下之要而召誥之王敬作所與無逸所稱皇自敬徳尤千古帝王祈天永命之實也三憂五福訓長敷曰予御製景福宫五福頌引洪範五皇極之辭攸好徳汝則錫之福發明帝王之福乃天下之公而非一身一家之私其徴自與常異而于讀洪範萹中偹論不能去三曰憂之義所謂先天下之憂而憂皇極意焉敷敷言于洪範三致箕號弗更平壤周定天下封諸侯先代之後如祝薊杞陳皆名其國即㣲子亦受封於宋箕為商畿内詩侯之封入周但稱箕子者蔡沈謂陳洪範之後武王封于朝鮮然卒未聞周有朝鮮之國盖箕子義不成周武王亦遂其志而不臣之陳櫟曰雖封朝鮮終稱箕子終不臣周也不臣周所以正萬世君臣之大法陳洪範所以𫝊萬世天人之大法臣彭元瑞紀祀名終奉亳姑爾雅商曰祀周曰年泰誓稱維十有三年洪範稱維十有三杞孔安國曰箕子稱祀不㤀本黄度曰不改啇家舊制孔頴逹遂謂此萹不是史臣叙述必是箕子既對武王之後退而自撰其事故稱祀然夏氏以為古者史官于人君言動無不書者豈有武王訪箕子其事如此之大史乃不錄而箕子自錄之理陳雅言以此説極是故蔡沈曰祀者因箕子之辭夫周史臣之辭而因因箕子之稱祀正見武王不必箕子為聖人之大也帝相下民出自洛孔傳天與禹神亀負文而出列于背有數至九禹遂因而苐之以成九類朱子語類問洪範之書林氏以為洛出書之説不可深信某窃謂易明河出圖洛出書豈得不之信耽蔡沈亦請治水功成洛光呈瑞如簫部作而鳯儀春秋作而麟至亦其理也世戴戴九履一左三右七二四為肩六八為足即洛書之數陳師凱云當補五數居中一句始偹然則範起於數數出於洛水非必如漢儒所説初一以下六十五字列於亀背為洛書本文也禹循大法㑹於嵞洪大也範法也皆爾雅釋詀文宋薛季宣以篆文書洪範通洪為鴻範為范王充耘曰聖人治天下之大法粲然如指諸掌自禹始禹以洪範治天下聲教四訖執玉帛者萬國大㑹塗山孔氏正義謂既得九類以後聖王法而行之從之則治違之則亂常道攸斁攸叙由洛書耳證諸天則徴休咎洪範以八庻徴属天九五福属人故為次八次九所以貫徹于天人之際也曽鞏謂人極治而通於神明猶不敢自信故故参吾之得失於天臣董誥驗在躬凴念聖愚尚書全觧曰念用庶徴反求諸已之謂庶徴者以已之得失可否騐之于在天時之應者也不可湏臾離故曰念用盖聖狂之分在克念罔念之介耳穿鑿機祥藜閣向洪範但言休徴咎徴尚書大𫝊始分六沴以二月三月司貌四月五月司視六月七月司言八月九司聴聽十月十一月司思十二月正月司皇極已為穿鑿劉向作鴻範五行傳班固本為為五行志毎事必有其志支離更甚張晦之深闢其非謂春秋逮戰國秦漢之世學洪範及春秋者以言灾異多為能班固述五行志何休注公春秋凡灾異之起又以時事配之多非其義皆失聖人之意倒顛簡䇿草廬呉元吴澄作尚書纂言分九疇經傳謂八庻徴𫝊下錯入四五紀傳文王柏因之遂作正定洪範以曰王省為嵗移按五曰厯數之下彼盖以嵗月日星之字與五紀相同故竄改經籍以就已意林之竒曰箕子陳庶徴列雨𤾉寒燠風於上而言五者来偹于下不當于中間又贅以曰時二字與五者並列而為六也盖時者嵗月日之時謂之庶徴其騐不一而足雨𤾉燠寒陽之象也嵗月日時騐之於陽陽之象也五者來備而下所以申言曰雨曰𤾉曰燠曰寒曰風之義也曰王省維嵗而下所以申言曰時之義也之竒之説如此經文非錯簡明矣往來氣運説宗鄭尚書全觧隂陽之氣運于天地間往來屈伸有此五者雨與𤾉對燠與寒對風凡氣非風不行猶金木水火非土不處故土氣為風王樵亦謂思為四事之主風行四氣之間土旺四時時之季此自相符臣常青次苐行生衷折朱吴仁傑曰易以坎為水雨以二之則雨為水以離為火日以烜之則𤾉為火詩月初吉又云日月方燠則燠為木漢志引左傳金寒之言顔師古謂金行在西故謂之寒則寒為金語類問舊本謂雨属木吴仁傑説雨属水朱子曰㸔來雨只属水自分説乂貌言視聴思皆以次苐相属者或别𫝊為氏是王應麟困學紀聞云五者來備史記作五是來備故宋人有以曰時五者來備為一句者以爾雅時訓是也後漢書李尋𫝊得其人則五代來備荀爽傳五韙咸備各以其叙事懐太子注兩引史記一作五一作五是盖氏與是同音韙與是同義皆古籍流傳異文廡誰正詁作蕪孔傳廡豐也疏云釋詁文考古文廡作無而有無之無但作无作亾後人既以無无為有無之無故此徑加广以别之廡乃堂下周屋音同而義異非矣爾雅釋詁郭璞注繁蕪豐盛貌邢昺疏蕪者繁蕪也洪範庻草蕃蕪廡音義同則廡可作蕪許慎説文字注云豊也从林則廡又可作無矣彛倫斁嗣彛倫叙王元耘曰九疇非始于禹如卜筮起于伏羲甲子始于黄帝是也禹特修明之不然禹以前豈無彛倫耶臣紀昀御製一極備同一極無林之竒云聖人雖有致祥召和之道可以取必于隂陽之不乖而其警戒修省之心則不可㤀是以所念不獨休徴而又有咎徴焉隂陽之氣偶失其和則及身自省去其所以咎而反于休則其徴莫不各以其叙矣其言深切著明有合經㫖肅乂誓謀聖奚敢雨𤾉寒燠風騐殊庻徴之應本于五事之偹如漢儒之論以為有是事必有是應誠属膠固難通然必如王安石説都不消感應将若字做似字觧作譬喻亦非召和致祥之道宋儒符舜功曰感應之理非謂行此一事即有此一應統而言之一修徳則凢徳必修一氣和則凢氣必和分而言之則肅者雨之類乂者𤾉之類求其所以然固各有所當其説自較精切曰明曰旦凛昭鍳予幸當重熈累洽之際數十來以來以天下之大地方偏灾或所不免而大槩年榖順成屢豐報慶非敢自謂五事之修要皆曷敢上蒼𢡟眷乃克臻此明旦敬事之恍少懈耳有夏有冬旋斗樞蔡注觧日月之行則有冬有夏云日有中道極南至于牽牛則為冬至極北至于東井則為夏至孔傳則謂日月之行冬至各有常度君臣政治大小各有常法深得辰居星拱之象齋受頊書諴罔問帝王傳心之學間知見知各有統緒武王齋戒端冕以受帝顓頊之丹書逺紹心法不必並書洪範九疇禹受之天武受之禹我之機皇上以洪範之文作寳亦如武受丹書銘鑑豆觴皆帝王心法逺宗之要也政追舜典實堪摹孔子刪書斷自唐虞舉凡禮樂政刑兵農水火治天下大經大法皆首見於典遠邁皇上勤修實政五十五年來創制顯庸無不前古臣等謹就管窺所及聖徳之協庶徴者謹據實臚陳雝宫駿廟心齋一壇皇上法大祀嵗天行徤聖敬日躋常如一廟必躬親五十餘年日而于祭朝日精夕月潔帝王廟凡遇親亦必禋鷁近因文廟諸中祀夀躋八旬復越寅躬祀一週以申欽慤至於法宫我㳟禱雨告風心齋嚴翼此垂拱對皇上聖徳之㳟以作肅也臣慶桂下澤上生膏沃濡管子云如天雨然澤下尺生上尺盖謂聖人之徳下逮于人如天降時雨能生萬物我皇上愛育黎元丙寅唐寅丁酉及本年四次普免各省地丁錢糧丙戌巳亥兩次輪免七省漕糧恩施溥博亘古未有至偶遇一隅水早不惜數百萬帑金命各督撫實心賑䘏而且展賑常賑不拘月限總期一夫不致失所其餘豁免積欠動逾數十百萬或蹕路所經又必酌蠲地丁錢糧凡以藏富于民俾臻殷阜此即我皇上曰肅時雨若之一徴也著述言先誠必立立言之盛本諸立徳立功我居易皇上文以載道御製仿白新樂府及全韻詩闡述之兢業上自我朝發祖徳之崇隆昭祥東土及列繼聖宏規下逮唐虞以迄勝國得失烱鍳進退百王據事直書而于敬天命守神器三復及之四御製詩自丙辰以來毎十二年編為一集初集四千一百五十餘首二集八千四百餘首三集萬有一千七百餘首四集九千七百餘首自甲辰以來現在㳟編五集者又幾五千餘首彚之以四萬計自甲御製文自丙辰至癸未編初集者五百餘萹申至乙巳編二集者幾五百編與丙午後未刻者彚之凡千一百餘萹無不可以垂世立教即撫時賦物對景抒懐亦必本于精理道心而不屑為風雲月露易所謂修辭立誠言之有物此我皇上聖徳之從以作乂也綍絲從後信難渝中庸賛至聖之徳曰言而民莫不信而極其盛至于凡有血氣莫不尊親壤扶皇上詔諭所及深入民隠容光必照遐方僻杖觀聴者煦嫗徳化温如春霽而信皦皦日此我之一皇上曰乂時暘若徴也掌觀紋但端旈黈心術皇上燭炳幾先明照萬里于凡人才識否親之誠偽而物無遁形庶獄明慎核讞册之䡖重而按無疑竇他若鑑古而審時代評藝而别偽真無不洞若觀火即始見終盖垂拱穆清而六合皆運淵𠂻此我臣喀皇上聖徳之明以作哲也寧阿背負曝争獻昧嵎孔傳解曰哲時燠若謂君能昭哲則時燠順之蔡傳以燠属木而引小明之詩日月方燠以證燠之為春為木按荘子至治之世衆人熈熈如登春臺我皇上照臨所届東及朝鮮西至霍罕無不各安耕鑿來享來王此我皇上口哲時燠若之一徴也察邇聽彛中允執日夙皇上聰聽興㳟覧實祖始出視考彛訓毎錄事而於察邇祖宗寶訓毎述以訓臣民而又如舜之好問臣工建白茍有可採必加俞允至内而部院諸臣外而督撫以及道府下至微員毎中權召對諏詢凡以達下情而通民莫而執兩用衡黙運此我作謀皇上聖徳之作謀也起元藏用道如郛運籌皇上發慮出謀従容中道毎當軍書旁午决勝不差累黍而于河道之蓄洩海防之形勢皆成盖親臨相度在事諸臣禀承主以睿算用底厥天以嵗寒而成萬物猶人謀而成萬事此之一皇上曰謀時寒若徴曰待章宣諭思真睿孟子言心之官則思思之極則通于微至事事無所不通則作聖矣我皇上時幾𠡠命精一執中每封章所謂批荅綸詔披宣至誠如神先幾立㫁正孟子聖而不可知之謂神尤非臣等摹繪揣聴所能形容萬一此又我皇上聖徳之睿以作聖也臣胡季堂易俗樹聲軌共趨虞書之俾予従欲論語之無為而治皆言聖人在上教化四逹如風鼓動莫不靡然我我朝法度修明紀綱整勅士習民風蒸蒸日上此皇上白聖時風若之一徴也左右史登偏挂漏政所皇上膺圖既久身被聖頌即茅檐蔀屋心知皆能預聞傳説不必待記言記動之史也詩文集具詎揚鋪凡大政大事必有賦咏序記者因御製詩文集具在皆與政通讀言見鋪張聖非臣等之揚厲也得全者聖聖時憲説所皇上全徳全福而言必稱謂惟天聪明惟聖時憲也臣福天正傳康安御製求是於天天畀俞予嘗謂國之将興必有禎祥之賜然禎祥之賜由乎天而致天之之則由乎人每㳟讀實錄實錄仰見我集鴻太祖創業艱難求是于年丕天復讎乎祖用勲開基定業大清億萬丕基實肇于此予是以兢兢業業夙夜不遑凛惟休惟恤之戒存監殷監夏之心垂示後世子孫常存此念詳見己未嵗我戰書太祖薩爾滸山之之事隂量晴籌尤謹課予於四方農時尤深厪念每因各直省督撫及順天府尹奏報晴雨應期必加欣慰或陳奏稍稽傳諭飭查盖深宫五夜籌量靡寧正不敢稍弛警惕也北綏南屢願頻俱去年各省奏報秋收分數山東山西陜甘湖南湖北四川福建雲貴等處約九分直𨽻江南廣東廣西等處約八分屢豊之象南北相同披覧之餘殊深額慶乾乾惟是勞王省右王省惟嵗坎坎常因懼職孤右卿士惟月陋臣等幸厠卿士之列自維謭稱職為難毎懐詩人坎坎伐檀之譏鼎鼎尹箴停晷轡右師尹惟日師師民畜貫星珠右庶民惟星不惟逸豫圭随𣙗惟王省嵗則卿士師尹各省于日月不敢暇逸而庶民亦各安政教不違其欲上行下效如圭之隨𣙗也臣金簡必有禎祥鼔應枹三代以下毎侈言符瑞物康皇上實心行實政惟以年榖順成民阜為重正如洪範所陳百榖用成乂用明俊民用章家用平康皆天人相應之理確有可徴正不必䨇穂三茅始登瑞牒昨因各省諸臣謝誡諭賜御製御製太常仙蝶詩特申帝耤親維秬維秠年之皇上劭農敬事自即位以來五十四間親舉斯禮已二十八次去嵗以年近八旬實為命自後遣官行禮興榖祝豊前古所未有邉屯報多黍多稌年來不獨内地各處豊稔即新彊伊犁烏嚕木齊等處亦屯政日開腹地人民遷居耕種聚落殷盛嵗穫迭増嬴羡毎陳陳相因右百榖用成持亷飭法官歸冶皇上澄叙官方内外大小諸臣随材器使時加瑕瑜訓誨毎逢京察大計分别黜陟必核辨功罪不掩以昭大功至正之心冶心天下臣民無不共仰鴻鈞之陶也臣舒常綱舉目張王秉鉄我朝内外官制折衷前代已臻羙備皇上復因時損益如添設江寧布政使各省驛傳歸按察使設西安承徳二府及州縣各官随時改定繁簡等缺添給武職養亷各省坐糧名糧改挑實兵更定武職官階綱舉目張太阿在握正荀子所謂王鉄也右乂用明恩榜疊覃苹食鹿自乾隆丙辰壬申庚辰庚寅已亥及昨嵗已酉皆以逢國大慶特開者恩科鄉試㑹試以廣登進鄉試諸生年逾八十賜舉人七十以上者賜副榜其㑹試舉人年老者分别太學建立辟雍賜以檢討學正等銜又于親臨講學設立承徳府文廟置生員並予鄉試中額他如嘉峪闗外鎮廸道属亦設學官取士鄉試中式者恩許馳驛㑹試毎逢取入彀者巡蹕所至獻賦諸生冩四召試錄欽賜中書及舉人校庫全書弆藏滙四庫外復宗閣命續繕三部分頒重頒揚州文閣金山文杭州文瀾閣及刻淳化閣帖於諸書圖圖書集成佩文韻府於蔵書家武英殿刋經史三通及聚珍版流傳海内嘉恵藝林士子涵濡皆鄉教澤如辛丑文科之錢􅙺甲戌武科之顧麟㑹殿試三元為百年以來科名盛事羣材廣選鳯棲梧凡簡用庶官於月選各途外加恩甄錄如壬戌甲戌㑹試後選遺卷為明通榜壬申辛已丙戌壬辰辛丑丁未㑹彳後挑選下苐舉人皆口别等苐引見以知縣教職等官錄用毎届十二年各省選拔諸生貢入成均朝考後擇其尤者分别以京京官知縣教職錄用士子凡有一材一藝者皆得踴躍功名共遵皇路右後民用章家早麟趾咏我嵗喜皇上䔍昨嵗辰見元孫袩凝庥於甲皇上以皇元孫年已就傳僅六命查四庫全書所載唐宋以來及見元孫者家今各陸續奏到五代同堂者現有張子翼古朝爵等幾二百家太和翔洽繁衍丁黄以宋慶普為國祥推之益廣矣臣李綬人得嵗紛鳩首扶叟宴入聖祖仁皇帝舉行千宴者千人皇上時在冲齡侍宴親見至乾隆五十年繼舉是典入宴者三千人餘不入宴而被賞賚者又幾千人七言广老賡更執醤韻十體進詩自古養老之典所謂三五割牲者御製屢正之而盛禮之成醲浹渗漉至大吏上奏禮部議旌老民老婦嵗不下數十人百嵗以外加賞銀幣且賜詩章而福建省夀布欽賜司葉郭鍾岳一百十嵗來京就祝嚕特畢班壁特之祖母一百九嵗遣孫請者深安太平之世人多夀考其所涵嫗也右家用平廣洪釋延洪大圓鏡範通模範化工鑪姒功𫝊學醰而粹尚書以念為言不一惟大禹謨所云惟帝念􅀢説念所云念終始典於學二語為能分疏内聖外王之藴我皇上取洪範之文以鎸斯寳作君作矣師一以貫之􅀢臣金士松御製荒穆勤姚瑕與瑜書之言耄者有二吕刑之稱穆王曰耄荒大禹謨舜之言曰耄勤自古君心敬肆之分其幾甚微相去甚逺瑕瑜並列法勤戒荒予滋亹矣無易乃康祝之耳孔安國傳嵗月日時無易謂君臣無逸各順其常而家國享平康之福予與爾諸臣共勉之有惛曰耄慎哉乎禮記八十九十曰耄鄭注耄惛㤀也引左傳老将知耄又及之予幸躋八旬而知慮未衰猶然日慎一日也孜孜以日猶昨志副章曰自强不息即前者猶日孜孜之意虩虩員來豈異途引首寳文曰嚮用五福盖即八徴耄念之而伸之易震彖傳震來虩虩恐致福也聖人之致福未有不従恐懼修省來者六字分行爻畫虙八徴耄念之寳文凡六字正與羲爻相協四言攦句體規虞虞書危微精一之訓均以四言成句兹寳文八徴耄念亦四言乾丨交紐中天徳紐為交龍象取龍徳中正朱臣珪坤象開方奠地隅是寳正方法地縦横四寸髙凡三寸七分太尉芝泥鈴逞怪緯書河圖舜以太尉即位與三公臨觀於黄河龍負圖出置舜前黄金柙白玉檢黄金䋲黄芝泥草曰黄章符璽按太尉乃秦官堯時安得有此名盖䜟緯起於西漢之末王莽假符命以圖簒竊故有太尉即位之説至其名物怪誕更不足深闢也軒轅黄璽䜟沿膚春秋運斗樞黄帝時黄龍負圖中有璽章文曰天黄符璽亦即因河圖所載舜事附㑹又以為軒轅時事可見䜟緯家以此勦説雷同耳同文所識云石䃭玉海祥符元年五月甲子詳定所言唐開元中玉匱金匱封訖以受命寳印之又貞觀中議更造玉璽一方一寸二分同受命寳今請别造玉寳方寸二分同受命寳以封金玉匱又開元中石䃭以天下同文印封之舊史無制度請以金鑄大小同御前寳以天下同文之寳為文二寳封畢進内甲申命叅知政事馮拯書封禅玉寳金寳臣劉墉定命雖珍亦珷玞宋史輿服志徽宗政和七年従於闐得大玉踰二尺色如截肪製為寳文曰範圍天地幽賛神明和合太和萬夀無彊其寳九寸號曰定命寳合前所有寳為九詔以九寳為稱以定命寳為首且曰八寳者國之神器至于定命寳乃我所自製也又詔鎮國受命寳與天皇帝之寳其數有八盖非乾元用九之數比得寳玉於異域受定命之符於神霄乃以範圍天地云云十字字為文縦廣之制其寸亦九號曰定命寳來年元曰祇受又詔差官奏告天地宗廟社稷並御大慶殿受寳百寮稱賀徽宗不知慎守神器徒侈言受命雖材羙工巧不啻珷玞之溷玉也崔彧貢朝由拾得續文獻通考至元三十年崔彧得玉印于拾得家以為傳國璽獻之明邱濬曰秦璽在漢為元后所擲角有微玷魏文帝刻其旁曰魏受漢傳國之璽今此印非秦所製者明甚疑即宋元符所得于成陽民家者也云云臣等㳟讀属御製國朝傳寳記乾隆三年髙斌督河時奏進員濬寳應河所得玉璽古澤可愛文與輟耕錄所載蔡仲平本頗朕謂此好事者仿刻所為貯之别殿視為玩好舊器而已仰見聖識髙卓足以破千古徼求矜耀之惑咸熈藏府獲成都魏志咸熙元年六月衛瓘至成都得璧玉印文似成信字宣示百官蔵於相國府寳花御押一兒戲登辛雜識載宋太祖至度宗十五朝御押近示自御製嘉靖玉印記云天子宸章擇言鎸璽以警正也即偶寓别裁然近玩物不足為訓若趙宋之君皆有御押已属不正聖論髙明光大臣等誦習不勝欽服初臣沈詔受欽崇兩史巫宋真宗天禧元年召輔臣於滋福殿觀新刻皇帝昭受乾符之寳初祭醮祠表皆用御前之寳上以未盡恪恭故改製焉仁宗慶厯八年下學士院定其文别刻皇帝欽崇國祀之寶宰臣陳執中書以代昭受乾符之寳嘉靖醮章嗤玉􅘧内府舊蔵玉印一刻為為文皆不能曉于法官劉元斌等辨之稱道家心印用醮籙上章等事非道御製記云此印既刻以玉而其紐復用蹲龍家方士所敢用者知為嘉靖好道乃其修醮飛章之所用較之秦皇漢武益為可鄙汾隂駕祀妄金塗建炎以來朝野雜記載淳熙十四年有士人聶愿者獲一古印文曰皇帝駕祀祀汾隂之寳九字重十三兩以為真宗西祀所作時吴琚為淮東總領以五百千賞之取寳獻于朝詔蔵天章閣聶愿以其寳乃金金所鑄償價未足詣御史府訢之蔣世修為中執法請命有司覆實且言祖宗傳寳復歸中禁縦使是銅亦當薄賞務重大體豈校細微事下工部将作監覆騐之果銅耳建康墾土空探筞宋書符瑞志晋建武元年建康民虞由懇土得白玉麒麟璽一文曰長夀萬年獻晋王盖元帝假此以為中興之符聳動衆聴亦如劉盆子之探符得立也臣阿必逹御製靈武召兵等棄繻玉海六合大同之印唐肅宗靈武召兵所用按是時𫝊國璽尚在蜀中不過以此印號召兵馬雖侈言六合亦如闗侯之有契繻不足言寳也既夀永昌器已幻玉璽譜曰𫝊國璽是秦始皇所刻其玉出藍田山丞相李斯篆其文曰受命于天既受永昌又宋鄭文寳玉璽記載𫝊授本末曰秦璽其圍四寸至漢謂之𫝊國璽厯代皆用其名永嘉之後復歸江左者晋璽也太和之末得自西燕更渉六朝至于隋代者慕容燕璽也劉裕北伐得之闗中厯晋至隋者姚秦璽也開運間入契丹者石晋璽也當時皆誤以為秦璽實則秦璽之失已乆云云向嘗作國朝傳寳記云夫秦璽煨燼古人論之詳矣即使尚存政斯之物何得與本朝𫝊寳同貯善夫唐梁肅之言曰鼎之䡖重璽之去來視徳之髙下位之安危然則人君承守之祖宗付畀思以永膺斯寳引而勿替其非什襲固謂謂夫日新厥徳居安慮危凝受則皇天大寳命則徳足重寳而寳以愈重然寳固不足重况荆凡得失其事甚幻耶建中表正語多誣續文獻通考建文三年凝命神寳方一尺尺六寸九分帝親定其文曰天命明徳表正萬方精一執中宇宙永昌先是帝在儲位夢神人致上帝命授以重寳元年使者還自西得青於雪山山方踰二尺二年春正月帝郊祀宿齋宫夕夣若有覩乃警寤命玉人琢為大璽冬十二月工成名凝命神寳至是以告天地祖宗為文宣示遐邇百官稱賀大宴於奉天門頒賞四夷朝使夫刻璽以為王貞託諸夢寐已失之誣方今和闐春秋底貢美質巨材至九千餘觔不啻倍蓗過之彼區區二尺青玉何足珎重耶撰辭祇自銘惕息予既刻入徴耄念之寳重思執玉持盈𢡟徳永圖之意不可不丕播萬姓傳示子孫因作記以冩我心取義何嘗冩悦愉七十御製八徴耄念之寳記首叙年時用杜甫句鎸古稀天子之寳蒙天副天眷佑幸無大隕越於兹乂浹旬矣思有所以八旬開袠之慶鎸為璽以殿諸御茟盖莫若洪範八徴之念云云仰見兩刻皇上兢兢業業日引月長自七旬迄今璽文初不以悦而聖夀益陸稍隣愉有弛乾惕也周頌仔肩缷尚未製記御又曰予夙願八十有五滿乾隆六十之之數即當歸政今逮歸政之嵗尚有六十一日未息肩萬民恒在懐庶徴之八可不念乎云云仰見於夙皇上凝承寳位孜亹日新胞與之懐真靡間夜也舜歌叢脞戒其母廟之御製記又曰親雨暘壇時不可祀不可不躬之不曰勤民之之養不可不心存茍失其一叢脞隨之則吾豈敢云云仰見皇上萬幾日理鉅細無遺廣運之徳所由與姚溈嫓隆也康彊適性恒荘敬御製記又曰兹逮八旬幸賴形天佑身體康彊一日萬幾未智衰不可不自勉也云云仰見湧行皇上覘時問夜秉燭待章控轡雲馳下業泉禮拜跪規矩冲和三推廣畆彌見従容乙夜細書不資靉靆無論耆艾無此矍鑠即少壮亦未有能習勞整暇若此者皆由荘敬日彊正丹書所謂㳟則夀也臣鄒奕孝占闗闗情厪牧芻御製記又曰念庶徴即所以念萬民云云管子有言食者民之天凡雨暘燠寒風天之占騐皆闗民之休戚仰見有騐皇上誠求保赤盖善言天者必于人也申錫無疆彌曼羡寅承有昊敢馳驅為獨御製記又曰予沐深而予之所寅承昊乾鴻貺錫羡當何如云云仰見之隆皇上昭事小心茂膺多福益因昊貺倍切祇承之念嘉樂之詩保佑命之自天申之説經者以保佑申三者為重叠輻輳之辭盖天春聖人引無極也六三一孰崇閎竝天子御製記又曰漢唐以來古稀纔得六六之中至八旬者纔得三而三帝之中惟元世祖可稱賢其二則予所鄙也即元祖亦未如予之五代同堂云云按三代以下帝王夀登七十者僅武帝梁武帝唐明皇宋髙宗元世祖明太祖六帝其中惟梁武帝宋髙宗元世祖年登八十無論梁武帝宋髙宗不足言即元世祖大有為之君可稱賢主然踐祚非早建號僅三十五年𫝊孫成宗其諸王世系元史雖無表可稽但計其世次訖順帝不過四𫝊以視我皇上五代同堂聞直御宇五十五年以來康疆逢吉不特古所稀自古未有也臣鄭際唐二十五輕玩好娱為國朝受始用璽寳文天命采古制國書嗣又兼用古篆尊藏夀交泰殿中凡三十有九此外復有受命於天既永昌璽及髙斌所進寳應玉璽亦附藏内殿殿考正皇上以所貯厯年既乆紀載失真且有重複排次定為二十五寳以符天數並申言人君躬膺大寳在徳而不在器大哉詳見王言洵足祛漢唐以來諸君侈言符瑞之惑朝藏御製國寳記内禁鈐青祛舊載稱皇御製國朝蔵寳記云㑹典舊帝奉天之寳即傳國璽謬兩郊大祀及聖節宫中告天青詞用之語尤誕大祀遵古禮用祝版署名不用寳聖莭宫中未嘗有告天事或道籙祝釐時一行之亦不不過偶存其教耳未嘗命文臣為青詞亦未嘗用寳盖緣當日修㑹典諸臣無宿學卓識未曽請㫖取裁徒沼明明内監所書冊檔承譌襲􅍝遂至於此翰臣輟擬仰成模廷翰林聖祖聖夀望七旬嘗欲鎸通用小璽命内擬文皆無當聖意者乃定用戒之在得四字庚子嵗戒得皇上夀躋七旬於避暑山荘新作書堂顔曰即闈聖祖未發之㫖今鎸不假八徴耄念之寳遂亦詞臣帖擬也羮墻額賜堂添慶世聖祖御書五福堂匾額及宗恭摹懸之雍和宫圓賜園明乾隆丙申之屏皇上葺寧夀宫之上景福宫因作五福頌書問至甲辰皇喜得元孫五代同堂因即暑景福宫増為五福五代堂而于圓明園及避山荘勤政殿後亦懸是額並鎸五福五代堂古稀天椿子寳以致慶臣達回凖功彰論採腴庚辰西師蕆事凖回兩部盡入版圖而皇上追維用兵之始衆議不無疑阻中睿謨獨斷不五年而大功告成作開惑論以示外設為春秋碩儒臻成大夫徃問之詞而折衷於信信信天主天主人人因鎸也天主人論中語什賦勤民民為守敬皇帝仁天勤民之寳皇帝皆聖祖世宗憲以鈐御御書者詩記皇上御茟亦常用之戊辰嵗製四言其梗槩推本天民視聴揭以綱綱提要四字心𫝊於千萬葉永矢乾乾矢乾乾之句所以聖子孫萬萬世憲章遵用之凖廵攄明理理寧迂本於御製南廵記發明舉事機宜必敬天明理敬天斯能愛民明理斯能體物因鎸敬天勤民寳寄意和闐鉅質􅋙底旅寳材以和闐精玉為之考宋徽宗時以和闐産玉遣使索之其國王表稱于闐國偻儸有福力知文法黒汗王書與東方日出處大世界田地主漢家阿舅大官家表中稱所湏大玉一時難得湏俟三四年後採得再進可見當日雖遣使徃而而不能必致今和闐乆入疆索毎嵗貢玉入京壊材巨質絡繹捆載以供典瑞之用古稱西旅貢􅋙不足言矣臣阿肅御製察哈鴻勲朡厥俘書序湯伐三朡俘厥寳玉作寳寳可見古聖王亦未始不以圭為瑞我太宗文皇帝天聪九年貝勒多爾衮等收復察哈爾林丹汗全部獲厯代𫝊國玉璽明年四月俞諸貝勒大臣及諸外藩䓁之詣以符瑞炳著建寳國號曰大清改元崇徳我朝函一區夏雖在徳不在太宗特俯徇輿情為應於湯天順人之舉可謂有光矣宵旰敷倫朂仍已予仰邀羡延昊佑錫洪得刻此寳以殿御筆並石渠圖籍亦加鈐用非以自幸實隨寓目可藉可以自儆耳子孫用璽盼遥吾後嗣子孫誠能法予念庶徴即以念萬民之心至七旬八旬亦用此寳以鞏我大清億萬年丕丕基庶足慰予祈天永命之願耳可能符望惟天貺予建寧夀宫為歸政後莬裘因於宫内建閣名之曰符望今距乾隆六十一年僅隔六載果能幸邀望為鴻貺則予望克符矣直到頤和匪數拘人寧夀宫有閲頤和軒按曲禮生至百年十載各有稱名若幼弱壮強艾耆老期之類獨耄兼言八十九十陸徳明經典釋文謂一本作八十曰耋九十曰耄不知耋亦兼七十八十徳明於易釋文復依馬氏作七十曰耋而詩秦風毛傳八十曰耋左僖九年杜注七十曰耋故邢昺爾雅䟽曰耄有七十八十無正文也即耄属八十而許慎説文九十曰耄劉熙釋名則七十曰耄大抵耄自七十至百年為日最長舜年六十受命在位三十有三載則九十三矣而曰耄期若謂九十百年之間衞武公九十有五作抑戒曰亦聿既耄然則期頤以前皆可曰耄由此積數百千萬億京垓秭有𨽻首不能算摩醯首羅不能知者灑墨露垂栞翠版念之御書八徴耄寳記刻石頒函雲捧耀筠觚刻御筆寳記墨頒賜中外初元肇祚寛騰詔今嵗行天聖夀八旬敷天同慶於元旦特下歡春恩詔頒下皇上斂時錫福而薄海騰䑓普樂誠為盛朝熙錢熙朝臣􅙺二富藏氓普免租元旦貽庥上以八旬夀辰仰荷重譯祝天來庭祖率土稱慶以至梯航嘏従古史牒實所未覯允宜廣宣湛闓敷錫兆民将乾隆五十五年各直省應徴錢糧通行觸免我沛皇上加恵元元實邁恩綸叠藏富閭閻仁政千古矣繞膝三安封錫礪上年十一月初八日承家上以新年為大慶諸皇子禀法孝道克循皇八旬六子進封質親王嘉皇十一子封為成親王貝皇十五子封為嘉王親王皇十七子封為勒四國産呈砮㑹典載朝國毎年遣使入貢琉球國間嵗一貢安南暹羅二國俱三年一貢向時依期入貢各國使臣不能相值今嵗元旦朝賀行禮四國適㑹共球鶼鰈之盛自古王㑹開圖未能有此鉅觀也南交将覲堯時授今嵗阮光平親福康覲㳟祝光平萬夀先于上年十二月内據安奏阮以安南僻處炎荒請初即天朝頒示正朔朝定皇上以該國王締造之能崇奉天時正朔深可嘉尚因即降發往㫖允行諭禮部即将乾隆五十五年時憲書交該督等委員賫至鎮南闗令該國鎮目轉交國祇領並數目諭嗣後毎年即著禮部照朝鮮請領時憲書發交廣西巡撫照此次之例先期頒給無庸逺使赴京請領臣嚴福西極還賖佛拜膜廓爾喀在後藏外上年歸順遣大頭目巴拉八都爾喀哇斯哈哩薩野二名帯散畨二十三名㳟賫表文貢物赴京朝寳佛覲表内稱敬奉大皇帝即如敬進奉三合掌誠心皈依大皇帝駕前等語詞意極為㳟順于上年十二月抄到京瞻仰天顔優蒙蒙錫賚帝發生山蹕莅二月東巡禮崇望秩朝於方岳義舉周官原為古聖王不易之典即𡊮宏漢紀曰東方者萬物之所始山嶽者靈氣之所宅求之物本必于其始取其所必于其宗宗其説亦属可取但後代侈言告功不特剏封禅之儀并専刻寳璽以為金泥玉檢之用最為誕妄我皇上以八旬展敬降為㫖今春二月八日啓蹕前詣泰安登瀆岳薦馨民祈福利且副就瞻按慶典本有岳之祭岱宗為五岳之長刻寳躬親禋禮亦宜之非如漢唐宋升中之􅀢即亦非供封禅之用也素王仁夀泮旂紆文皇上崇儒重道統合君師每年春秋釋奠廟或親詣行禮或遣官致祭去祭去嵗以慶迓八旬於凡二中祀皆欲以盡為君之職今嵗月上丁将親祭一周親詣釋奠而於東巡復仁夀躬瞻如闕里蠲潔薦享景仰之懐恰符不僅詩魯頌徒以芹藻鸞旂侈言在泮之盛也春燈排詠隂陽復自乾隆丙寅始毎嵗丿元俱以來御製燈詞四章六章八章不等自辛未例作八章五十三年戊申章章皇上計至六十年歸政相距八載嵗賦燈詞恰符義經全圖因以卦名之平聲二十一宿捭為韻聲四十三則于詩中蔽入本字今嵗所用自隨封卦剝下起復恰合隂陽生生不已之數臣程昌期石鼓偕鎸潘薛徒周宣石鼓向在太學皇上閲近時搨本惜其字跡澷漶所存僅三百十字因親加排次截長補短仍為十章并為之序命新製十鼓列文並列國學又以熱河為毎嵗恵遠詰戎之地亦命于文廟鎸刻十鼔列于㦸門而太學之舊鼓則命下命繚垣以蔽風雨俾永萬世其文宋薛尚功以諸家各有訓釋元潘迪重作音訓刻碑鼔旁因並長為命詞臣依新編鼓文字次苐擇諸家之音訓附刻傳千御製序文碑隂與廸碑並古俾閲者一目瞭然宿次角亢歡贊華爾雅釋天夀星角亢也本年正月初五日值角初六日值亢正逢茶宴野諧箕畢樂遊衢春秋緯云月離于箕則風揚沙詩月離于畢俾滂沱矣是二星本有好風好雨之異而月能各從其好猶庶民之休咎係乎上人之得失也今世際熈和和小民遂生復性真不啻逰康衢而歌耕鑿也近光衆效躋稱兕豳風躋堂稱兕之語為自古介眉數典然曰公堂不過一國臣民共申祝頌而已洪範極之敷言是訓是行以近天子之光曰天子作民父母者為天下王云云觧經者謂之父母者親之之辭謂之天為王者尊之之辭洪範之尊之尊君親上較風更廣大真摯矣臣秦承業御製好徳台殷隙過駒五福之四曰攸好徳宋曽鞏謂福言攸好則致民於善可知故庶民攸好徳則錫之福所以勸天下之人使協於中即予記中念庶徴即以念萬民之意此念盖數十年常如一日非自今日始也篇近夸兮増恧怩視為規也益勤劬䖍希五叙歛五福皇極敷恩遍九區新正幸御園即事有作撰吉鑾輿出鳯闉奉時施恵仰流鱗又㸔御苑為春苑倐過七旬稱八旬食旰衣宵仍朂已雨量晴較總因民自疆不息吾宿願耄念寳成繼用向有自疆不息寳以殿御書庚子年鎸古稀天子之寳副以猶日孜孜兹以夀躋八旬鎸八徴耄念之寳仍副以自疆不息盖經書中自儆之語雖多而象首乾法無踰天行健至為切要者於此語唘蹕幸避暑山荘即事避暑撰良往例循乘輿符望發清晨毎嵗幸山荘唘鑾日必來馬常云待八旬然後乘輿亦遵養之道應爾是以丁未詩有擬届八旬罷鞍馬待亦祇剰三年之句今已符望是以清晨即乘肩輿而出生身祝慶來諸部蒙古未出痘者謂之生身今嵗西北新舊各蒙古以至哈薩克因朕八旬大慶胥請偕來祝嘏情殊難却但念其中生身者頗多若令其進京不習水土必致出痘予心有所弗忍是以令其由口外行走于七月内至山荘行慶宴賫以示體恤逺人之至意庥逮八旬無易由逢無曰茍有懐畏滿有増寅山荘侍祖承恩地赤子心仍不失諄臣等伏惟今嵗㳟遇曼夀宫辰中外臚歡莫不情殷慶祝皇上厪念西北新舊各蒙古及哈薩克多係生身特命于七月内齊集避山荘俾得先期展慶就近抒忱兹當撰良唘蹕即以恵逺為懐體恤之恩無微不至其届期燕嚮錫賫諸典詳見典禮門至避暑山荘即事露重山田霽曉雲廣仁嶺過意増欣城隍永籲金甌固熱河自井里皇祖締搆山荘以來民物恬熙殷富儼成一大暑㑹壬辰嵗命升為承徳府依祀典創建祈城隍廟毎嵗臨幸山荘必先親致辨香以保障孔廟新排石鼓文熱河既升㕔為府増定學額並度地建立石文廟至此亦必躬親展謁去冬就冬就太學鼓現存三百十字重排十章親製石鼔立于㦸門之前因念此處為恵逺詰戎之地亦命于文廟鎸製排列用以昭武功而光文治行慶今年萃中外今嵗八旬大慶自應于京城舉行慶典以遂中外祝嘏之城因念西北新舊各蒙古及哈薩克其中生身者頗多令其由口外行走于七月内至山荘慶賀賀俾忱悃持盈一已盈憂勤髫齡敢㤀承恩地祖訓聰聴尊所聞登四面雲山亭子奎章辛邜額垂親誰謂無因却有因予以康熈辛邜生而亭亦搆于是嵗此中夙因不可思議七月上如七月下是處為山荘中最髙處毎嵗于七月下旬漸凉爽始一登之今嵗以祝釐外藩來兹者多又以下旬即當唘蹕還宫行慶故于上旬即來登亦佳話也八旬亭坐八旬人去嵗登此有共汝行将度八旬之句兹來如踐前言碧天雲净懐同豁素宇風生興亦新逺望山田秀将實時𤾉若益祝心寅避暑山荘迴蹕即事之作八十初開寳袠新宫中行慶合旋輪予仰邀旬為昊貺夀躋八従古所罕有俯允臣民所請於宫中行慶因于七月迴迴蹕鱗瀛列國恩覃遍雁塞生身宴鍚竣今嵗祝嘏安南等國或親身或遣陪臣皆先期至山荘其見愛戴之忱其迤北生身未出痘者合南北諸藩均于山荘錫宴今早唘鑾即即迤北生身者各回本處亦體恤逺人之意也撫此庥嘉惟益惕戒其盈滿敢㤀寅廣仁嶺名是日雨雨陟原恒事多稼芃山利是真迴蹕御園之作月餘先昔御園返徃年駐驆山荘於萬夀莭後方始行獵九月中旬外乃返御園今年仰沐殿受昊恩夀登八袠禮宜御殿受賀以順羣情旋京較早月餘迺以八旬慶典諧慚愧徳無稱四得盈虗戒有切中懐沿途看穡昨年勝入苑尋題秋中佳雖是輿情申祝悃微嫌争羙過安排内外臣工籲請舉行慶典兹自御園至宫沿途排列㸃綴用申誠悃惟争為羙麗未免嫌其繁費耳八月十二日進宫行宫旬慶賀禮沿觀内外所備衢歌巷舞自覺過當因成二律大慶未教行庚子庚子七旬未允臣民之請舉行慶典今嵗八旬昊恩優錫實亦史冊罕聞如再矯情過却未免阻衆悃忱昊恩優錫浃重臻矯情可再衆誠阻予夀願同萬姓均五十五年天地數八旬八月誕生辰慿輿厯覧訝過當弗以為愧為愧頻不惟夹路笙歌沸抑且蔽街樓閣羅増已慚翻心怵惕幸天庥賜日晴和今早進宫沿途羅列景亭競陳歌舞衆情固覺欣躍設遇隂雨物力亦覺可惜昨日微隂幸今天氣清朗夾道臚歡俱得申慶忭之忱是亦仰荷天庥也詎知踵事華如許昔年㳟值旬慶聖母六旬七旬八旬藉博過當慈懽今為予八典司事者踵事増華殊嫌雖絰㫖諭酌行减徹然好為議論者保無退有後言雖徹然好議論者保無退有後言且予方以不及㳟慶皇考六旬暨覩兹聖母九旬為憾兹雖羣情難却而繁費不覺轉益歉懐矣那免後言滋恁麽慶典分明成闕典為君難誠語非訛臣等伏見萬夀慶辰梯航鱗集由圓明園至大内衢歌巷舞介景臚歡又當玉宇舒晴金風薦爽天人愷洽奔走子來十二日㳟迎聖駕還宫自王公卿尹以逮耆庶外暨朝鮮安南琉暹羅南掌緬甸各藩服并土司生畨等分道班迎焚香迎焚載道仰覩天容睟穆深幸萬古以來未有之遭逢而惟以仰承睿指不敢過事繁華㳟繹奎章感天休而惜物力期普仁夀於大同所由元化滋漉龎鴻交鬯莫不奠親從此億兆京垓積而至於無有窮紀長得近天子之光祝聖人之夀固中外臣庶所共為祝幸者矣宴坐齋中偶爾成詠忽度八旬本不期論成四得述衷思人之常也已偶遇天獨哉哉衆所知自夏入秋恒栗栗每隂而霽幸時時今嵗舉行慶典中外臣工誠悃固不可却然自山荘以及旋京一切朝儀宴享典禮繁多又由御園往回宫禁沿途綴景臚歡未免過于繁費雖早𫝊㫖减徹而勢難槩止中設偶遇隂雨不特儀文難整肅物力亦覺可惜故自入夏後即已時深惕慮乃月餘以來凡值行慶之日先期或值濃隂届時俱獲開霽至昨廿一日慶典蕆事百凡可稱順遂今日宴坐回思倍覺其何昊蒼䔍眷洵非易得於此而不益勵寅㳟予心忍乎諸凡順遂諸儀蕆宴坐閒吟心益䕫古稀六帝三登八所鄙宋梁所慕元嘗攷三代下帝王夀登古稱者六而躋八十者惟梁武帝宗髙宗元世祖三帝梁宋二帝予所素鄙惟元世一可稱傑出而稱其世次至順帝不過四𫝊亦未能如予之親見五代元孫是予八旬之夀諸福備膺實為従古所未聞自惟藐躬受天鴻貺思有所以副之者又豈言詞所能宣述耶惟至元稱一代傑遜乾隆看五世孫自思昊貺如何受益惕藐躬不盡言或可丙辰幸歸政希之詎敢必心存臣等欽惟我皇上建極敷言乆道丿化臣等伏見聖袠延增而純固之神明愈臻於仁熟義精之境是以丹毫闡繹視昔有加焉兹㳟錄為宸章一門􅘦自七旬開袠以來十一載紀年之作而精微廣大有羙畢涵臣等既幸遭逢懿鑠獲與編摩尤幸夫鴻慶備轃上儀甫輯由是登期頤以衍章蔀先庚後庚循還迭運嗣此宸藻紀年與時增盛臣等惟當依甸續繕更慶自彊不息之隆軌焉八旬萬夀盛典卷四
