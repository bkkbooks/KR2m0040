body:
  text: 欽定四庫全書八旬萬夀盛典卷八十四歌頌四聖夀無疆詞一百首用唐楊巨源體恭集御製詩句謹序大學士伯臣和珅臣惟帝王撫辰出震景貺凝承備致貞符永言配命稽揆往牒夐乎尚矣至保泰若奉盈貞久如慎始以純固之精神迓純祐之禔福得一之撰訢合清寧葢曠乎未之聞也臣謹案中庸以至誠無息徴之悠久其推大徳之得祿位名於得夀而極其至誠謂上三者帝王猶共薌之至祈天永命於不可必者能决其必得斯得之大為莫與京書曰惟克天徳自作元命者此也我皇上莊敬日强法天行健臨御五十餘年孜孜如一日精禋肸蠁殷薦必躬昭欽若也紹衣徳言顯承謨烈光繼述也旰食晏寢貞亮百度劭政本也去煩蠲苛阜成康濟恤民隠也道豐仁洽成永成功煦恵涵春温展義規秋肅斐有章於文囿憬不憓以戎鈐迴斡造化而雨晹之時若必課量藏富比閭而賦漕之普蠲且再四巡方則補助春秋肄獮亦綢繆隂雨辨章之治上鬯九垓而下浹乎九藪景福時萬叶我太平寶胄開五世而方昌絳年書太史而未艾仁夀之徴實越䆳古嵗庚戍八月日躔夀星之次恭届八旬萬夀聖節三靈効慶六㝢臚歡宅交新造之藩度幕逺徠之長或欵紫濛之塞或通朱波之津或駕海而轉䑳或棧山而飛轡表騰金葉雲集爻閭萬口同聲親祝曼夀上再三沖愻始俞廷臣之請受釐行慶覃敷闓澤調幕斟衢神人胥洽然猶體乾純徳迭運元貞八徴厪念璽以夀之記以章之謂念庶徴即以念庶民也臣伏揆惟天不息故覆育黎庶厯章㑹統元而無量惟聖無息故愛育黎庶亦積億兆京秭垓年而無量所謂大徳得夀以永其禄位名者實惟皇上為與天同徳而同體也臣日侍禁近欣逢慶典思有稱述以繼衢壤之音自惟檮昧不足以摹日月而量海嶽竊仿唐臣楊巨源聖夀無疆詞體恭集御製詩句成一百首冀以聖人之辭莊頌聖人之夀臣不勝歡躍慶忭之至謹拜手稽首陳詩曰九瀛咸奉朔振美物由庚攘攘觀羣族熙熙樂太平八旬開寶袠千古作章程今嵗等恭八旬萬夀慶洽敷天臣輯萬夀盛典以志千古未有之盛樂史祥風叶韶年物象呈璿璣斡衡軸仁夀祝華苹妥帖三秋景豐亨乃大亨右一維欽括堯典啓萬帝圖鴻敬奉璿璣斡匪求玉帛充上本行健以法天五十餘年如一日升中薦昊蒼同體不特醴之盛澄觀萬物備顧諟四朝同穆穆含元氣乾乾倍省躬所期資福力益凛亮天工本於御製八徵耄念之寳記首申信欽明天眷而歸寅承錫羡仰繹文思益亮工千古同揆領要契元始心源溯莫窮右二髙山瞻彼作千禩啓千春二典傳家法宗功逮後人帙環上每日夙興恭覽誦始出視政昔之列祖實錄分耿光大烈皆今之丕顯丕承天聰繼天命揚武並揚仁本朝太宗締聖神肇啓為造鴻基實太祖王業之本破明御製薩爾滸山之戰書事紀我太祖師於薩爾滸山實惟求是於天復讐乎抒勞效悃國家祖萬斯年聖嗣賢臣億實基於此玉宇常經想瑤編拜受新貽謨恒憶祖切已在勤民國本由來重風期豐芑淳右三開國超三代毋忘家法原鴻猷思祖業御製紀憲皇帝恩堂記紀康熙壬寅帝於上隨世宗侍聖祖仁皇圓明園眷顧之聖子示萬􅑤神孫隆昭孺慕想親恩兩字欽心繹千秋焕墨痕天法世宗憲皇帝聖訓曰敬祖勤政愛民皇上御製四箴掲於錫養心殿是訓是行誠歛福福之本無私奉久照繼武識前言瞻近近咫尺庥和逮孝孫史記五帝皆一家之胄而聖於聖不相及禹不詒孫湯非翼子孰若我皇上備侍兩朝以聖見超軼前聖作述之隆古敬誠天語定億載永蟠根右四春臺一氣鬯只向萬民占治道籌教養深恩被閭閻令皆知此味所以識其恬溥如上徳洋恩天漿時至無所不被海隅蒼生共遊熙皞畫景分明寫詩題即事拈一犁殊破塊四鬴乃連覘額慶叨天賜優霑果是霑右五比户安耕鑿承天撫八陲靈臺律有驗甘􅉈渥逢施四徳曾掄長重華實受之佳音各馳奏戎索永延釐徳臨上本仁為御以來近恩施屢沛民氣倍豐服遐陬咸徵時若韶令迎人轉遐齡以徳基南瀛連嵗晏金殿玉樓披右六息息相闗切㡬康慎匪今丹書爰取義無逸以為箴矻矻何時止溶溶鎮酌斟封章上惟聖時憲五夜常勤强實批答籌量機務大徳康靡間於宵旰乾坤千古運饑溺聖人心保障資三省始終惟一欽明堂扉左闔敬與慕俱深右七御門實舊典虞旦爛卿雲聴政上日勅萬㡬承諸臣無不仰御門親訓重念居天位時惟受大君重華垂有耀實地鄙無聞被逺心何極釐工政益勤率因成例事寧祗具儀文屏息瞻霄漢五絃詠是薫右八咸熙庶哉績咨政毎宵衣吏上每日地方召見臣工及入覲之畺咨詢事宜往往移晷凡以達下情而宣上徳也一徳叨恩寵明廷待指揮臣工摺奏日侍上隨事剖决仰賛親授機宜臣等宻勿實無以萬一凛乎朽索喻念爾小民依宛是玉壺在如臨聖日輝㡬曽圖已逸常守道心微實政祛虚語逢庥益慎㡬右九泰符宏錫極永賴聖謨多動植消而息盈虚理不訛金穰占吉兆白屋煦春和從類竒文覩生者上毎舉大政攸繫國計民炳於天章足為萬年守法安瀾永佑歌於斯悟津逮曽不賦添科到處瞻光被奎文山並峩右十土膏蘇大地景物漸沖融踈宻時相間南東畝亦芃載咨携大吏逐頓駐離宫悉上勤求民務各省農桑占騐巡蹕所届緑壤青疇具覘周咨必宸豫務本民風厚芳郊懿賞充四時惟粤宛一意祝和豐極目西成好金風玉露中右十一黍萁陳俎豆與物樂時昌榖日占三白新年第一祥甄心企空洞恭已籲倉箱國本所重在於民食榖肅誠蠲潔嵗必躬皇上於上辛祈親實感天人相應之理秉穂仍貽厥誠輸肅祼将上辛邀帝祐寳穡卜其康珍重農桑候瞻雲出瑞房右十二佇望甘霖灑快晴亦閲時敷為大地澤益勵九歌思自是心無逸相看意與遲民惟厪惻隠章不厭詳披重暘上庶徴之念最雨飭畺吏以時奏報乙夜有間親覽未嘗此喜真堪喜引詩毎得詩凡各處晴雨奏到必有慰御詩誌情由欣茂對樂此不為疲右十三春園攬豐澤豈是豫卷阿引水學種稻臨御園闢田引水著於聖駕時每以劭農寳穡篇什為書號得禾化工誠大矣庶政問如何脈脈符仁義熙熙沐太和萬年資普濟四海尚謳歌越是霑膏後祈民福祐多右十四軒楹無藻飾圖以閲耕桑耕織圖各一卷宋於潜令樓鑰所繪諸生程棨摹聖祖仁皇帝時重繪成冊上法臣排㢧祖勤民寶翰奎章業已顔楣勒版復與廷聨韻本色大文實逺合於九歌董勸之義壁勒千年字心殷萬寳穰籌農宜稼穡觀徳想衣裳自有瑶光映可知春意昌古稽文與佩漢詔義猶詳畫意真堪繪金鋪藹淑光右十五京兆循鴻典儲牛待耤田每嵗季春京尹依故事預備之禮耕耤禮儀皇上躬御耒耜成親耕以先天下益祈時若賜率欲以身先聨步披葱蒨扶犂邁逺阡卿以上躬耤後三王九次從耕用襄大禮是惟土物愛更切望民天音矢載賡繼届耕上每耤必矢音親製禾詞盖本民事以允符虞帝宣韶之㫖盡懷無逸篇翠華隨日轉芃蔚縟春煙右十六歴年寛正賦厚貺本無私酉迄上恩浹寰區深惜民力丙寅庚寅丁本年叠次蠲免各省正賦雖春收屢給概予罷征藏富於民益臻殷阜解澤心無吝臨民恵在施逭逋資職殖各省積欠地丁均以百十萬計屢經恩予豁免沃壤瓜見膏滋弗以豐忘歉寧因逺或遺萬方胥在宥四部待休兹恩施上以新疆等處地逺徼外蠲免宜徧本年地丁錢糧一體俾屯種兵民均沾闓澤謂彼昌昌者春聲總是怡右十七賑加分次第更以免漕糧史冊所載蠲租賜復之詔或及一隅或留半税全漕上於丙戍己亥丙次普免七省逾格恩施洵為千古罕覯布治遵前矩安和願萬方民情益親切恵施要周詳屢見雲垂宇虚標月滿匡佐天貽稼穡希祐富耕桑懷保相闗處承恩並日長右十八返樸闗行政居髙恒念卑虚車祛藻繪觀象玩金柅訝此流隂速期均薄海知起居喜惟樸數典可㤀兹服用上恭已行儉祖制宮府一循未嘗増飾凡以愛惜物力仍舊貫也澹則心無欲依然古作師至人歸静寄絜矩率箴規右十九雙雛如仰望厪念在深宫朂爾官如母亨哉畜以通示鑒上愛育黎元體物雛待仿内府所藏雞飼圖并吏俾御題詩章刻石之意頒賜畺共副子諒豈弟祗期長養遂實切恤瘝恫要以聨堂陛何當入檻籠春圖揮一氣萬物育薫風藝圃游心處寰區徧徳同右二十以休存夏諺鼓腹遍郊圻畿甸上屢次展所經巡鑾輅無非事者三輔人民每切就瞻之願玉輦行西闕金根出鳯闈十行無靳澤數宇駐宵衣所過各郡縣宿頓之處俱邀頒賜恩減免正賦正供老民迎駕如例布政宜崇本澄心待萬㡬咸中方有慶無逸以為依比户香花接康衢敞御幃右二十一時巡指江國覽景信無雙爽氣催征轡風全静渡艭行春三月近訪古六朝邦欣看尊親意誰云聲色摐上率聖祖仁皇帝六度南巡度祖攸行展義考行慶施恵先後如一湛㤙周蔀屋煙景罨軒窻聖蹟光巖穴心旌獨自降每駐行宫必有蹕日題詠臣每扈隨清誦堯文不勝欽服右二十二河工謀保障来往不辭疲河工為東南保障蹕親皇上六勤翠示機宜永臻安奠利𨗳因其勢渟澄詎有涯宣防籌次第底績貴無為乾隆辛未嵗西北上命増築髙堰五壩建淮安城石堤丁丑則於徐州北䕶城土隄易石壬午定清口出水誌濬六塘下游庚子加築徐城石工及韓家山至奎山一帶永資鞏䕶逺超禹跡水鏡涵虚朗金隄築鞏基神祠躬致拜聖訓久昭垂河臣恪遵水患指示機宜數十年来下河無益徴神祗效順利運通商賈寰中許共知右二十三減從指徐州南河居下游果然引正溜自是悉防修康熙己夘於清口迤西隔岸治陶荘引河并於南岸築壩逼溜時河臣經理未善隨濬隨淤乾隆己未溜為上命重臣經視覆奏以為難行乃以木龍挑補救計至丙申春復命繪圖呈丁酉覽奉乘汛硃筆㸃記其處遂以季秋興工於春仲放溜達周家荘㑹清東下其去清口較昔逺五里許遂收清刷黄之效實非司河諸臣所能仰賛萬一也底以消清晏恒斯繫樂憂轉輸看古跡漕運欲周流永利風帆旅無非保障謀神堯復神禹一脈永垂庥右二十四魚鱗排齲齲兩岸謹修防浙江海塘自戴家橋以西皆柴塘難資鞏䕶魚上南巡親臨閲視因於老鹽倉等處改建鱗石塘仍留舊塘以為重門保障之計目極山川秀功同日月光築基期永固挈要在謀長范公塘土堤形勢甚薄上申命守臣詳悉籌畫采石鳩工所費帑銀億萬從此濵海黔黎永資樂利更喜沙痕漲爰成竹箭祥萬年培國本千載固苞桑至止緣觀海如臨圓嶠旁右二十五萬景自天成巍巍煥煥京三臨溯皇祖祖盛京為三幸仁皇帝列祖發祥基命之地自陪京我皇上繩祖聖武而追来孝於癸亥甲戍戊戍癸夘凡四次祗事展成垂為盛典累葉正承平綵旭迎穹幕祥風滿鳯城僾聞希黻扆聖藻燭文薨旁及御製盛京賦列陳皋永懐王迹之興政典土風奥區神天作周頌之列髙山商詩之陳景員其義一也嘉䕃濃成幄鳴鑾爽拂旌黄圖佑千載肯構乃恢宏右二十六杳藹雲生路升香岱嶽青輦親上望秩山川於臺懐中嶽皆釐以翠莅東巡則屢登泰岱用迓蕃遂羣生長養應時陳盛祀暢若對圓靈事以有巡述書猶闢逕庭司馬相如封禪文鋪張符瑞語涉夸誕我皇上懋舉盛儀用馨明徳玉檢金書未足倫比鬯圭陳凛凛屓贔永亭亭地是諸天上心惟無逸銘樂山仁者夀延夀萬千齡右二十七道重尼山近崇儒禮素王廟本朝盛京於太宗文皇帝初定丕基即建文列聖相承尊崇備至上質秉生知道隆祖述每於東巡親詣闕里展謁孔林穆然見古昔倬彼仰羮墻敬識宣尼語身登夫子堂廊哉徳乃大仰止志方長萬古生民首千秋祭典光聖人能自得允叶麗天祥右二十八内朗原惟鏡清齋潔意身因心觀厥徼惟謹不踰循祀先上崇修祀典凡宫懋昭郊壇大期莅宿齋誠敬茂對方知慰欽承倍惕寅始升顒夜氣沃盥授絺巾自是當遷坐曰祈預致禋肅儀雖有别志永一心純右二十九嵗時展殷薦大饗舉常禋太室烝嘗永千秋禮樂新質儀遵古昔執爵進宗親香霧霏神鼎衣冠㑹紫宸祗迎欽陟降受載右嘉賔常得懷前鑒名還溯體仁右三十珍重寸隂中心原溯莫窮千秋垂睿藻萬國仰重瞳惟恐多因畧太虚有不空自然生道趣照處與神融疵求上聖學淵深於先儒釋經諸説剖言析理去醇欽定三禮義疏周易述義詩義折衷春秋直解諸書藝林頒布學宫嘉恵可閲今兮古應知異總同徘徊講席側思義毎殷衷右三十一三春開講幄典學重經筵繩武心恒切因文道以詮上臨御經筵於講官進講後親宣御論發前人所未發聴講諸臣無不悦服研㡬窮理窟玩象汲神淵聖日常懸照仁皇丕烈傳臣纂解聖祖仁皇帝崇尚實學諸經親為指正固已訓命儒行萬世之心上率而行源如一僾聞親一脈無逸誦終篇示訓誠諄矣彬彬玉案前右三十二欽緬兩應然菁莪辟沼連辟雍見於王制盖昉文王靈臺武有天下遂為天子之學先是廷臣建議請立以乏水而格癸夘春上命詳稽古制于太學彛倫堂前肇建辟雍穿井汲泉引為圜水世祖御製碑文申年辟訓復古而不可泥古自元迄今五百餘雍之制始備肇興諮衆議親詣致心䖍乙巳上丁釋奠後快覩上親臨講學圜橋門而聴者咸歡欣共仰文明猶見先王制均叨廣庇天豈云循典故端以溯心傳肅肅旂常列聲聲角徵懸於論惟共鼓己丑春釋奠前一日成殿上命出内府周笵銅器陳大本年春復于㡬暇将太學石鼓現存三百十字重排製鼓列于大成門前楹以光庠序並御製重排石鼓詩紀事一并泐石勝境契真詮右三十三一派中和氣簫韶九奏融之祀欽定中和韶樂用饗朝㑹酌古凖今八音諧聴庥凝皇有極祖述念何窮緬想無為治南来虞舜風雲門土鼓始九曲大瀛通回部上屢蕆武功八荒重譯因増用畨部西藏樂舞倍仰聲容之盛林筦調宫徴乾坤觧藴隆撫時惟盎鬯廣闢四門聰西江来古器合度亦堪欣乾隆己夘江西臨江府得古博鍾以獻上既考古定名貯之十韻古堂復懸詔樂部仿鑄鏄鐘二以備宫紐檢符分寸瑰竒煥秘文穆然徴上瑞鑑爾振嘉聞喜是充庭貢圖標昭代勲鍾繪入圖式皇朝禮器一陽初應律八伯已歌雲玉磬叅承處流年新舊分右三十五樂初修拊石合度更渾渾特磬上以和闐貢玉作編磬依律分宮備聲振始終之節萬古聖集大成揆同地寶何曽愛春官典可論和闐𨽻属四部備春上底定武功地寶效靈上陳天府用官之典彌覘聖世之祥中規成肉好水磨去聲省工煩石工出痕都斯坦用水磨製噐工速且省見說能延喜全難辨迹痕璚華連翡翠雜器勝瑶琨富媪将侈富和闐此溯源右三十六宫商即工尺一字一絃吟以文上閲朱載堉琴譜字之傳自合音奏毛詩三百篇字字可播管絃音天命廷臣依工尺等字定為詩譜一字一然合節絲竹兹非尚興觀可悦心芸編翻未暇周雅永垂音宴樂嘉賔集犧尊清酒斟詩譜既定章恩命于經筵樸歌抑戒之榮宴歌棫之章鷹揚宴歌干城之章賔興歌鹿鳴之章玉振金聲於斯為盛天倪叅有契典樂創於今黼座風颺徳遥遥碧殿深右三十七欹案觀宵雅還教闕補全六朝傳賦詠萬象冺蹄筌補上以笙詩補于束晳未究厥㫖特製六章于音義節奏一歸正始敕政有餘暇吟詩答舊縁鏗鏘突金石舒叠徧垓埏生意滋韶苑春風在管絃詩成肄諸太常奏之命于鄉飲酒禮與稽資汲古今日許陪筵右三十八平仄就詩義裒編今合珠四聲切韻創自周顒成於沈約上天亶聰明依一百六部之次上去御製全韻詩以上下平述列聖謨烈入韻陳厯代盛衰得失之故綴璧聨珠亘古未有不須勞捃摭即此示猷謨韻學諸書如唐孫愐之廣韻宋宋祁等之集韻明之洪武正韻收字取音或失之貪多或拘於窒隘指其御序中特謬繩武顒然念侔聲静以輸佩文依竹素徼頒示聖祖仁皇帝御定佩文詩韻音韻闡中外皇上欽定音韻述微部依佩文韻音依闡微用三合切音集千古韻學之大成滴露試研朱架是琳瑯笥天垂星斗區四言標合撰部首御序四聲五部中凡一尾必用四年從其朔也通體宻紋鋪右三十九三百六旬凖長言乃各摛令詩御製七十二侯月核形極理有化工在手之妙㡬翻經聖算不必詠周詩邠七月一章表裏月令我辰日皇上仰察天時俯悉物候凡星月之序昆蟲草木之時動闗授時宸燭炳著奎章允為千古之標凖黙騐盈虚理難辭往復披悠然㑹心所總是讀書時小春御製説据小雅嵗亦陽止本義辨明小春即陽月又鹿角記麋角解説辨明鹿麋皆解角於夏惟塵解角於冬因於月命靈臺時憲更正并令詩著其義馬節物排年紀所無要日知新詩五七體珠斗若為推右四十新題賡舊韻雅合在香山白居御製新樂府序以易新樂府五十章為君臣民物而作特效其體雖曰俯同之什允為萬世詩史丙夜㡬常勅千年語不刪雖云世次逺祇以性情闗陳御製樂府祖徳之崇隆標逈别繼述之指要視有唐秕政相承是非重言反復詩訓永昭言念百王後何曽一瞬慳摛詞或蠲綺見豹底論斑得句思前詠况乘㡬務閒右四十一片時安五字嵗以數千期麗日條風際天倪月窟詩合嵗御製詩每十二年編為一集適星一周以嵗成嵗周而復始琴書静以好筆硯鎮相隨允矣為章美要歸茂對時典型鵷鷺集灑落玉珠姿芳序宴賞時與儒臣聨詠展卷清吟處春音萬物知右四十二兩間供静玩用協煥乎文富有上載道為文日新御製文初二集已千計有嬴糺縵光華自有文字以来遜此巍煥也樸斵今猶覩清真不貴紛政所御製文皆數十年来實心實繫仰繹之餘具見歸有會極含思抽乙乙與物共欣欣義若符乾徳蘉其仰放勲之於上本欽為徳著文允符唐帝堪消㡬政暇永衣徳言聞翰墨出親手朂哉魚雅羣右四十二百家純與駁聖語重躬親漫擬無還有難叅精與神家指上精涉百訛正謬一經闢示可拓萬古心胸那能不求解到此悟迷津涇清御製渭濁紀實不韙陶淵明讀書不求甚解之言實千古讀書者之鑑圖史静為用林泉自有真大端應悉記往勘命諸臣源以上博古証今前後諸水遣勘河淮涇渭真昭質實御製考纂輯河源紀畧一洗沿誤合相琉璃界敷為萬彚新右四十四牙籖供古鑑謬復御批通鑑輯覽正從前書法之釐御批之出自親裁者為評鍳闡要一字褒貶約而愈賅懸諸日月大政紀瑤編撫卷増乾惕批章審正偏綱目舊分正運偏閏續綱目於元至正十五年明興之後即標斥元代國號史臣纂輯覧時請於崇禎十七年甲申仿例特書當大大清順治元年䝉諭是時明綂猶存仍書紀嵗即福王封號尚可比宋之建炎必俟蕪湖被執始書明亾正大光明為從古發凡起例所未有必躬於古訓時躬御批武丁夢説形求必於民間先物色特未厭人望為此神道設教示後永無愆唐髙祖舍太宗而立建成明太祖舍成祖而立太孫俱泥立嫡之説不足以示後指御批特其失宣付詞臣寫翻成一覽全誠如設規矩詎止在文詮要義微言剖徘徊浴日淵右四十五殷勤譯國語創古足垂今藉以明三作犂然中八音志切上紹聞重訂清文鑑每門首作復國字旁附漢字對音一合二合三合釋以常言彚滿珠䝉古漢字三合切音兼及西藏梵字俾天下共喻同文之化陳編同汲綆聖藻煥懸針大訓應同列遺蹤借探尋多能固天縱觸目毎闗心持正裁浮議所引上閲遼金元三史國語多涉讕文特為辨正堯文寓意深右四十六歸極保皇極誰知蕩蕩容以逹欽定大清會典大清通禮一以和邦國一鄉閭為國家億萬年久安長治之本乾坤惟一大禮樂自姬宗寶冊垂文徳會典一書經成志事聖祖所排纂世宗兩朝作述皇上纉以嚮典例並載宜區㑹典則例各為部於是若網在綱有條不紊穹㝠仰聖蹤虚車凛有戒負扆久滋恭巍煥觀成美形容杳莫從睿謨千載頌至理契中庸右四十七禮圖繪有據須任典常資著範上監定禮器考圖為皇朝禮器圖式六合車書㑹千秋寶矩垂同心為固守言禮器者自漢儒始紛如聚訟器上以前之作者本精意以制則器傳後之述者執器而不求精意則器敝宜去臆説附㑹以守至正良匠命精追一切鹵簿儀仗輦輅至冠服樂器臺儀武具以次釐定成憲猶堪鑒圖民乃得宜尊卑因以序經訓絶多岐欽定三禮義疏後附繪圖考纂輯畫一皇朝禮器圖仍取舊説拆中家法繩無弛先知覺後知右四十八方輿應有志人意即天心奥宇坤維鎮侯興上帝臨畫州思禹跡隨處仰堯襟年間凡聖祖仁皇帝時纂大清一綂志書成於雍正三百五十餘卷皇上久道化成聲教四訖六為命館臣重加纂輯補舊増新計為門二十卷四百三十式廊版章克光祖武樂土真堪㑹司民是所欽民風上於中外疆域土俗古蹟必核其真傳信萬世館臣纂輯時悉禀睿裁得成美備太蒙胥列侍兩戒幻難諶興屯上平定西域拓地二萬餘里又收大小金川設戍萬古不臣之國重譯來朝統志之輯莫盛於今中外鴻基固古遥藉可尋右四十九牙籖分四部是處有書堂兼發上詔求天下遺籍秘閣之藏欽定為四庫全書每部三萬六千冊於文大内源盛京圓明園避暑山莊分定文淵溯文文津四閣藏弆又於全書中掇擇精華為薈要二部各萬二千冊分貯摛藻堂味腴書屋皆親加乙覧並多金山御製詩冠首又繕三分貯於揚州之文滙閣之文宗閣西湖之文瀾閣庋架流傳嫏嬛㫖許東南鈔逺布酉祕不足士傳也即此澄心鏡允宜貯縹緗衣冠集魚雅丁甲䕶虹梁綠字尋疑見諸臣校勘之踈時䝉指正芸編散古香於焉適枕葄煥若備文章幾暇親書史言筌聖豈藏右五十同為製活字彬若輯明廷齊就編珠綴芸馡汗簡青館編上御極以來開纂之書甚多及開四庫全書館復類繁命擇世所罕見有禆考鏡者剞劂流傳因種多製活字為聚珍版書契以來未之或紀烟雲相罨䕶攢簇鎖瓏􅌑佳蹟神常足良工心運靈誰能摹筆仗特地示真形即此千秋寳藝林嘉話聴右五十一金薤珍千載苕華勒壁貞通靈無不妙等級自分明帖又上排次内府所藏名跡為三希堂墨妙軒重刻淳化閣快雪堂蘭亭八柱傳播藝苑翰墨因心静雲霞此處生硬黄鋪棐几鼂采葆光瑩殿以幾餘筆還資工作成御上多能天縦六法入神鐫書敬勝齋帖為士林楷則澄心豫消暇無界不三清右五十三繪事閒中賞千秋蹟信諸仰叅兼俯察取實亦凝虚造化上萬幾餘暇旁涉繪事元氣在握為師有非顧陸之規規所能彷彿妙藴恰收拾雲烟幻卷舒際空恒澹澹得意兩如如詮義書屏扆明光舊綺疏每遇前人圖繪辨别真以題識宸鍳精確加自来收藏家可及天機活潑處妙契静觀餘右五十三不黷還勤詰春和頳幕融時巡上毎申諭督撫提鎮勤舉操演凡無不所莅必親加簡閲間有調遣争先效㨗羽林嚴警蹕武閲簡驍雄㓜習義猶美健鋭火器二營勁旅技藝嫻熟步伐整齊所向無敵即㓜齡子弟演放進步連環鎗皆能如法最䝉宸賞周行實可崇舟圍排緁獵鏡影澹涵空暇兼聖駕南巡行帳閲武之閱水操軍容胥備儼若千夫立依然有禮風歡聲毳帳合駐䍐五雲中右五十四凖夷及回部經始乃於兹凖回兩部自定朔漠聖祖仁皇帝平後運靖逺兩朝經營未𨽻疆宇綏邊一惟義勝用光上睿謨廣前業狼子心終野軒轅自有竒凖夷纂奪相仍扺伊上憫其部衆敂闗来請兩路出兵直犁一戰而克逹瓦齊就縛乃阿睦爾撒納及回部兩和卓木偕徳駾竄重勞聲討克日致杲皆由睿斷獨裁臣下稟受集大方畧以勲也連環兩耳貫奏績五年期自乙亥迄庚辰五年問凖回兩部悉定撻伐敉么冦革心來逺夷闢疆二萬里長佐太平基膚功既奏哈薩克布魯特拔逹克山愛烏罕安集延痕都斯坦霍罕之属二萬餘里皆我幅員所屆矣大漠勞三駕而今被皞熙右五十五武備由來赫金川已化仁懐柔無逺近奔走厪臣隣部落輸誠久軍營區畫頻金川居西蜀桃闗外雍正年間從征得授符檄與諸土司齒乾隆戊辰以莎羅奔郎卡與鄰畨搆釁天兵追勦革面請降開網鴻仁加之赦宥甫十年而郎卡又與内地之諸土司為難逆子索諾木與小金川僧格桑相比為奸上决䇿平之閲五年大功告蕆兩金川盡歸版圖自應戒姑息索諾木等始與各土司搆隙於姑上命畺吏隨宜彈壓乃意存省事近息於是易師進兵討定其地都覺有精神三進轟雷發千軍一志淳逆酋窮竄據三碉官兵用大砲環轟罙入其阻索諾木始率其兄弟土婦大頭目人等投出乞命因俘獻京師四陲蕆鴻績民榖數胥陳右五十六攘外先安内勞抒望逺襟有征不可恕實用勵同心匪戊皇上徳威溥布先後𠞰定臨清石峯堡逆申平定臺灣之役士民咸赴同仇事聞與在事諸臣一體䝉恩奨叙有差海嶠首俘至京師貯喜音聖功明以示祖徳到于今臺灣自阜安前聖祖仁皇帝平定後百餘年来民物嵗逆醜滋事上親决機宜誅除甚速為克繩祖烈也胥宇周原膴文華廣殿深萬方含一照久道仰君臨右五十七逺服歸王化所嘉心意堅分封山若礪在宥物胥甄輻輳來諸部蕃滋逾百年西師既定諸部歸仁土爾扈特為䝉古四衛拉特之一困苦俄羅斯徴調挈全部七萬餘衆来歸彼部自國初以来先後臣服迄今無不𨽻職方者跪瞻誠戀戀捧讀倍乾乾堪詠車惟好為希雨沛天八方歸槖籥内外一家連右五十八凱歸應勞酒閶闔受新俘師凱上定兩金川及凖回二部于旋先期郊勞受俘獻王太廟撻伐前猷在騰歡萬騎呼敷天新霈澤宥命舊奸瞿盛事誠觀止侵尋成畫圖戰圖上屢奏武功於以彰隆業並命繪紫光閣列前後五十功臣繪像親為製贊每因瞻祖烈正用息烝徒啓佑鴻規逺生機日日殊右五十九凡此封疆拓徘徊調燮方民艱詢迤邐土俗驗周祥内外奚分界撫循集衆長澤流成沃壤凖回兩部平定後屯政大開宅宅佃田商農輻輳三十餘年行之盡利駐劄該處辦事大臣頻次奏大熟有二十分以上者又於兩金川設鎮安營率降畨屯種阡陌日開與内地赤縣相埒風入總文章閲塞兼修武興文並設庠嘉峪闗外設府一州二縣七皆有學官弟子員近有舉鄉試者文治光明斯真無外洗兵真是喜萬姓仰龍光右六十牧馬嘶聲壯騂騏我馬同西極自古稱多馬之地回部既歸版圖各奉地産充牣皆天閑如愛烏罕四駿哈薩克十駿㧞達山八駿荷宸題而哈薩克之貿易伊犁者較内地馬價僅三之一以充屯田之用並給沿邊營伍嵗以内府縀匹充馬價物良值平中外䝉利旌門仍扈蹕馭物凛乾衷武備修嚴肅咸賔混外中酪酥為湛露聲教届烏䝉據勝三邊接趨承萬里風騰驤龍鳯勢顥氣接鴻濛右六十一新疆嵗貢果爰土作同甘育物對時茂風和露瑞含之三上式廓輿圖物土之宜咸以入獻如回城果哈宻之𤓰每嵗陳筐将篚上登玉筵匪為土貢之珍並徵物華之富含滋欣氣備韶彚已薫酣仙苑初春啟璇池浩澤涵蓬瀛原不逺遐壤庶因覃緑葡萄来自布哈其種無核截條而種回語曰竒石蜜食近移栽上苑其類甚繁遷地而良具徴蕃廡咸若之應玉塞十山叠親聞風撫南右六十二毎嵗秋蒐舉多因習武功毎嵗扈從駕莅熱河待獮凡大臣侍衛及八旗期門佽飛之士畢集肄武亦事承家法也山荘開詄蕩闗塞迥臨空左右賢王㑹勤宣警蹕中䝉古札薩克王公台吉等於馬山荘朝覲随圍執役毎獵晨先往撒圍互進詐晏作什榜以侑食陳相撲及教駣之技千官陳罕罼奮力總羆熊獻獲甘誰後忘懷與物同簋尊酧上日圍罼出鹿柴門從公恩賞筵席小大允為典熙朝盛萬里有從風右六十三飲鹿遵巖裔因之見物情每嵗哨鹿例在秋分後上冲齡侍聖祖仁皇帝習聞故事嗣登哨鹿大寳祇承明於祖武恭讀御製前後兩賦具見庶物晨趨備儀衛未午駐行旌省括各審固獻新来射生顯承三聖緒無取大庖盈鳥獸歸咸若林泉果静明獵期不欲久颮颮鄙西京右六十四順時陳國俗沼面尚凝氷乍可微風拂依然藻鑑慿毎季冬太液氷凝八旂與内府三旂簡習氷嬉分棚校閲擲綵毬設旌門懸的演射上親臨閲視旌勇均賚雲標披颯爽馳射各呈能即景因成句無觀不與澄用兹嘉乃績就下易於登黙騐隂陽運䖍恭倍已増右六十五由来重弓矢善教紀文皇言悉依太宗文皇帝垂諭諸王貝勒大臣等衣服語舊制并時時練習騎射毋效漢俗上敬述示子孫前徽屢降勿忘諭㫖並勒卧碑於箭亭臣庶聰聴用綿丕顯敬仰奎文在無非祖蹟蘉一身為表率武上法弓矢形祖繩詠每御諸歌善後飭隄防武帳多餘暇明廷引對敭無爭傳矍圃建徳賜周王繩武顒然念千年詎改常右六十六念舊衣冠慎天㤙待遂初端惟乾是體欣與古相於於箭上紹聞衣徳既勒全韻詩祖訓亭並於御製皇朝禮器圖式序新建辟雍圜水記中重告戒藻繪匪所尚華紛奚事諸繚綾上恭已行儉伏讀主崇御製新樂府一什仰見聖樸歸淳至意何曽鄰率畧詎止重瑶琚祗以紹庭切堪通論政書惟斯不改度毓徳想魚魚右六十七祖宗貽玉寶庶以鬯聲靈追逺心恒凛堯文此式刑向於度未能太廟尊藏上特選五朝冊寶玉色寸一律精璆重造安奉至盛京太廟其舊寶送尊藏以傳永义更希臻上瑞原賴弆前型方水生瑤瑾虹光射斗星器超一切物樸具古時形太室卿雲焕端稱以徳馨右六十八展親醻伯叔九族永惟親西上戚邇宗枝前於苑惇叙殿賜宗室王公以下等宴用柏梁體聨句癸卯正月復於乾清宫普宴宗支二千數百人優加錫賚静騐冲融志還遵禮數彬三韓恢舊業一本溯天倫入闗上以睿親王當開國時首先率衆公忠最著身後被誣削爵特予雪枉繼絶王克賜謚曰忠並與禮親王鄭親王豫親王肅親勤郡王補位配享太廟俾其後入襲慶承家感激思奮映座椒花麗翔屏燕鏤銀歡言歌既醉宴樂擬家人宗室王公子弟皆恩給四品頂帶即閑散者亦一體邀恩優禮宗潢前古所未有永念覃敷慶應知大造仁右六十九麟趾闗睢意曽元膝下看鴻規思纘紹家法永綏安師友羅羣彦風光到上䦨皇子入皇孫例於六嵗即出就傅乙巳嵗特選儒臣直尚書房皇上於宗宴賦詩以是時年皇元孫生甫二齡俟六嵗讀書時即令入宴上已預慶㑹實副國家億萬年丕基之慶儒臣同坐論學海願觀瀾蓮漏延清晝瑶葩鬬曉寒閒情咨翰墨長奉萬年歡右七十循名當責實廷對玉墀前龍虎傳臚唱聨本朝自設科以來㑹狀舉及鄉㑹兩元固不乏人惟乾隆甲戍武榜顧麟辛丑文榜錢棨皆三元為數百年科目盛事經綸在簡編以士上釐正文體以清真雅正為宗近又子通經致用徒習専家難云博洽經詔自戊申鄉試始以五經輪試至壬子鄉試五已徧嗣後鄉㑹試二場五經各出一題俾佔畢淹通共敦實學疇咨期籲俊部職細掄賢新進士引見及庶吉士散館多有分部及外授者文運風雲壮懐新禮樂宣璇璣調化雨金鼎裊祥煙預育菁莪盛深恩永八埏右七十一興賢頒試帖自昔創於今乾隆丁丑㑹試始詩一命於二場増五言排律八韻首嗣自鄉㑹試著為令庚子移置首場及排律召試士朝考因之其學臣嵗科兩試用五言六韻子幸際永昌期無不言鳴盛喜是充庭貢惟欽望道心藻思惟乙乙秀士㑹林林契妙神常達英華燦且沈同然思中的作式毎先吟御欽定詩題必有製詩程式多士寳几瑤牋燦南薫騐舜琴右七十二召試登寒畯敷陳在所羅渇賢别有託倚詠興如何上於辛未始舉試後南巡士子迎乙一鑾獻冊者命大臣彚欽定甲等賞給舉人中書二等賞給縀疋至人進東巡及天津由是召試一等者諸生賞給舉士賞給中書寒畯之途益廣特地扶摇上裁成徳行科詩書延俊秀永久沐恩波養士期真士執柯還伐柯惟公明以剖獲企席珍多右七十三重道非徒重恩科乃特科乾隆丙辰壬申庚辰庚寅己亥己酉皆以逢國大庚特開卿㑹恩科用廣人夀考作之化奎文懸日月書史足吟哦培養慎萌蘖旁求此廣羅丙戍壬辰辛丑丁未挑選下第舉人分别録用又朝考録用選㧞貢生皆恩例也九歌揚政要六幕永綏和晚達頭先白近光肩欲摩後分上嘉恵耆儒凡自七十以上者鄉試榜别欽賜舉人副榜㑹試榜後分别銜皓欽賜司業檢討等首臚歡昇平人瑞風雲龍虎㑹鳩杖有恩波右七十四量才授職要求實匪求名因地成髙下重官上慎方引見臣工臨期遷調悉視其人之髙下與缺之繁簡以期實效詮時騐治平月官依次選畺吏善推行設布上増定官制於江寧添政使歸各省驛務按察使設安西道府州縣缺承徳府各州縣缺皆隨時審立有闗司牧之重者玉軫誰能譜文樞賴共衡上簡畀文衡屢申訓戒共守繩墨建營今似昨沿路閲如京京城舊祗三營考定命増設五營又添設武職養亷官階以重軍政四政和於燭均勞騐衆情右七十五付物有權衡評量秋讞情豈非天下福先辨寸心平獄毎上矜慎庶秋審讞辭必無枉親核再三無縱曰曲斯惟直惟明更要誠於一上切案件無不栽以大公即一笞一杖亦不使稍畸輕重又恩赦減等法外施仁無嵗無之十行寛大詔一代紀綱呈切以慈祥𨗳髙標風月清虚虚實實處要道在躬行右七十六陶謨允期徳却好在春温應識官方要猶看唐法存問刑衙門按擬失當者分别失出失入處分五服五刑實為明允惟公弗假借寃獄與平反外省或有疑獄及地方官承審不得實者上必遣大臣馳讞多所更定明㫁存心地空澄自逺繁仁風敷嶺海徳水挹清源民隠芻蕘達無邪蔽一言右七十七去宄消塵案心為天下勞或地上廣暨仁風莠頑胥化其一二奸宄方官吏不實力稽緝别經弋獲者必嚴坐以罪研精憶良弼勅法省刑曹近以各直省咨部文件往復稽延命分别設立月限以清庶務仰見特皇上凝承大寶孜亹日新内外大小臣工當共體健行也永念協和治都闗馭逺韜至人用心鏡萬物被甄陶疾苦閭閻切神竒筆墨操一誠勤穆穆黻扆惕居髙右七十八濟運資浮送盈虚理不訛僉謀期奠久永佑願安波粟轉千艘逺蒸為六合和百年滋富庶一氣達洪渦漕艘上節次申臣釐命河臣疏浚運河以通並嚴飭漕弊以裕丁力下恤民生上籌不國計並行悖昊貺秋逢稔謀猷午夜過全漕過淮暨銜尾到通多右七十九誠非虚費帑惟願萬千斯細度修防理疇咨經緯施上屢發重帑和雇民工修理黄瓦壇廟宫殿及文廟改用建師武成殿葺道紫光閣各部院衙署京内外城垣路一時制作萬世法守規模誠有異輕重以為差形勢大端指休和百世禆多聞惟擇善利物匪求私仍厪齊民苦青黄頗借資朝國定制無力役之征凡遇大工興作無業貧民得以工代賑之益右八十鼎新古帝廟望道百王同以守還兼創惟明抑且公金兩上以大清通禮所載厯代帝王廟祀入遼朝而東西晉前後五代創守之主祀典闕如特二十諭更議増祀晉元帝以下五帝以示大公至正羮牆増慨慕治理溯鴻濛圭璧雖無緝孚承或可通古帝王陵寢以時修治並因堯陵傳説紛如祀用命地方官各就其處致普肸饗永言欽陟降景仰似崆峒盛禮遵先典乾坤方寸中右八十一欣答初韶令蘿圖物意昌青陽鸞輅轉湛露玉觴瀼元旦午太和殿筵宴乃晨叅畫㑹之典始自庚迨庚辰庚寅庚子本年庚戌叠舉大鬴㪺韶盛徳飫仁開事屏展芳椒麗泥鋪御道黄止齊咸奉度忭躍有餘慶敬騐回星紀新添麗日長載賡天保什大地與風光右八十二錦江曽有句年或古稀臻自益無疆夀乾隆庚子其副上七旬萬夀用杜甫句鐫古稀天子之寳曰猶日孜孜御製古稀説謙徳尊光實寅承錫羡之本天開大造春徘徊瞻聖藻爰始刻貞珉西藏丹書進盈廷鷺羽振萬夀七旬西藏班禅額爾徳尼逺来祝者例嘏其前後衛藏每嵗遣使奉丹書慶讃於新正恭進從心不踰矩稱徳乃為仁个个琳瑯列同為無上珍右八十三夀身兼夀世格外命恩宣典於上御極之五十年依叟宴與聖祖六旬盛新正初六日再舉千宴者三千人其一品大臣以上及年届九十以上者並慶酧召至御前賜觴以著天恩國酢一堂之盛瑞露瀼成幄含飴想侍筵都人傳燕喜荘叟笑難詮階下松齡祝千叟欽定宴樂歌於升坐韶樂奏隆平之章於大宴進茶清樂奏章夀愷昇平人瑞之章於進酒清樂奏紫禁春開之於還角宮韶樂奏慶平之章徴相宣元音夀世行宫景物妍春風坐綺席台背聳隆肩斂錫箕疇黽華胥極樂天右八十四賜馬禁城内崇規祖考留十者上眷體耆年大臣年逾六依舊例許於紫禁城騎馬身居九重上恩欲庶官周適可驅輕騎歡欣迓六騶佳哉開㤗運具爾沐天庥行漏催寒夜乘時欲酌籌喜逢添算日馭逺仰鴻猷右八十五北斗挹璇杓髙居俯九霄徳将仁一致意與境俱超實藉羣言採惟欣六幕調年年承福祚往往聴衢謡一派恩波似千方逺意昭祝釐從衆請之請上聖徳淵如毎遇夀在慶辰弗允羣臣本年八旬聖京諸王大臣各直省官吏盛京䝉古王公以下合誠環懇仰蒙恩許仍屢諭毋致煩飾以示體䘏喜氣鬯官僚右八十六元旦延千喜十行大詔頒本年詔如聖夀八旬普天同慶於元旦頒行舉恩蠲免祭告賞賚貤封眚赦靡不畢我臺普皇上斂時錫福而九宇騰歡春樂誠伊古未有之盛軌也篩簾晴旭麗雞樹玉華斑言念開千古同然企宇寰天恩歌有慶庶政勅無閒條暢陽初發鴻文淺印殷歡聲騰萬户歴覽一怡顔右八十七賢王誠愛戴寳樹叠分枝王子上以八旬大慶諸禀承家法孝道克循進封為親王貝勒既許歡心洽早基毓徳時欣承明賜溥永仰聖文垂繞砌榮三秀敷天布萬禧大公惟順應觸景憶含飴家法匪今始罄宜無不宜右八十八行将至香界致祀遣春官毎遇朝官慶典必舉望秩遣奉香幣祭告宛識清凉近由他碧宇寛承筐将素幣上駟出星䦨實以資匡贊因之叶燠寒秩宗尊百祀王氣鎮三韓路入雲霞表同心發喜歡右八十九數八稱功徳隨時騐庶徴本年八月上依聖夀八旬皇古稀鐫寳之例復刻八徴耄念之寶並萬民御製八徴耄念之寳記闡繹念庶徴即以念之㫖理大論宏炳煥千古仰見齡錫敬徳劭民休徴協應尤宜曼羡金石同固也盖緣福萬物惟有祝三登敬識牖民誼肇兹王業興史書不多事代閲㡬千増三代以後帝王夀躋七十以上者纔得六六帝中登八十者纔得三梁武帝宋髙宗元世祖三帝中惟元世祖可稱賢而建號止三十五年又迄順帝四傳耳我盛歴皇上大徳邁古夀康無量五世一堂之溯羣辟未之前聞也保泰常欽若淵懷愜静慿瑞圖休鼓舞勉繼亦貽繩右九十百年經五世五福肇名堂寧上於甲辰嵗慶得顔皇元孫即代夀宫之景福宫曰五福五堂且為之記以誌國家希有之瑞克纘三皇後欽稱萬夀觴宗枝綿玉牒萬葉衍銀潢皇本朝自世至上凡六太祖髙皇帝至因皇元孫為十世字命宗人府查賜名奉太祖長孫禇英支下得奉派二人福奉夀盖自太祖以下已十有一世足徴篤祐皇朝積慶之厚尤仰聖神之隆朱邸恩輝永龍墀化日長桐圭傳錫慶行葦樂無央實是熙朝瑞惟天降百祥右九十一安福念同民庚庚吉兆申一心奚所托有願必能伸壺裏年為日寰中物報春命查上普福同民乙巳嵗者凡各省夀民五世一堂二百嗣是嵗有奏報和氣涵濡具徴一人錫極之盛耆年縁令徳聖語重躬新幻裊天衣縷恩頒翠綺均永言姚帝陛草木亦天真右九十二蘧然夢有蝶藻筆掞堪吟趣味南華永文章大塊任含生適真性契理擬知音綴景休煩飾上實心實政黙召嘉祥屢太常戒廷臣勿言符瑞昨以諸臣謝賜御製仙蝶詩摺重申諭訓㤀筌詩亦深所期多吉士益勵有孚心莫謾騰諛口明窻即寸隂右九十三坦坦通無外頒恩自法宫威儀切王㑹燕賜永敦弓千載丹青貌三霄顥氣通㑹典載朝鮮每年遣賜入貢琉球間嵗一貢安南暹羅三年一貢各國賜臣多不相值今嵗元旦朝賀行禮諸國咸在共球鶼鰈之盛自古王㑹開圗未有如此鉅觀也令頒懸度地籌滿海山叢用以旌良善而今逮大䝉廓爾喀逺處徼外内阻聲教去嵗輸誠入貢並懇遵為恭天朝之制薙髪易服實順可瞻壺與嶠同喜迓東風右九十四西南門户固黙佑仰蒼靈嗣服祈承命去嵗安南内訌阮光平歸誠向化五十詔封安南國王該國齎表謝恩請頒乾隆五年時憲並親詣禮闕廷恭祝封其子聖夀纘為恩賜駢蕃優加隆并詔阮光安南國王世子以示柔逺之意輸誠貢大庭本年慶典緬甸南掌各遣大頭目人等齎金葉表文馴象方物逺来慶祝盖聖徳之茂丕暨遐荒實前古所罕見土宜齎以售緬甸既輸土貢並請天㤙許其通市得㫖報可感極轉無寧鐘鼓克諧奏笙歌合與聴一衷陳玉帛中國表儀型来覲都歡喜嘉苻應六星右九十六萬年徴夀永夀世共春臺勤治無過矣調元益懋哉泰階圜煦麗玉魄映花皚天祐開今業鴻禧乃大来苞乾恢度量勝地暢清陪温樹深移影千山朗照開右九十六嵗當五位合今嵗年以聖夀適逢惟十五五乘五實御極之五聖位乎天循環無極斂福錫羣黎是地洵佳矣千秋胥樂兮聖情寧有極天若敬常稽寰宇登臺意清陽兆國禔東西數萬里風物畫圖齊鏡面披仁夀浮邱可右擕右九十七團欒三五近月在六星躔鏡水屏山地龍池鳯閣邊暢觀真曠若有宇曰超然佳話留今日恩波例往年肇稱八袠慶爽傎九秋天恒仰貞明徳符祥介夀筵右九十八下風任瞻仰佳氣鎮䓤然到處惟欽聖殷懷益仰前延清契道筦解愠以薫絃八月聖夀於十三日恰符琴軫而我同舜皇上揮絃之化實已逺治也億萬百千嵗星辰日月天何須覔蓬閬可以識堯年地是恒春地杯因獻夀傳右九十九百首豈辭繁言泉可試言彤廷增喜氣丹扆體乾元觀徳威儀秩清時禮樂蕃五辰涵萬象大幹衍崇崐八奏咸池㑹太和曉日暾細流因不擇額手謝天恩右一百八旬萬夀盛典卷八十四
