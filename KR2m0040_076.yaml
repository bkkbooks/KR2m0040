body:
  text: 乾隆五十五年八月二十二日内閣奉上諭本年朕八旬夀辰中外臣民俱踴躍輸誠共申祝嘏前嵗即經王公大臣及督撫大吏等陳請辦理慶典經朕特派總理各事宜並諄諄訓諭毋得踵事増華致滋縻費兹朕于十二日進宫受賀十六日禮成出御園徃來閲視道旁㸃景綵飾雖未免尚多華瞻而規置安頓之處均屬整齊妥協不惟外藩君長暨諸國貢使人等目覩昇平景象鼓舞欣忭即工匠人衆以至附近舖户俱可藉此稍霑利益且西直門外添盖之舖面皆資商賈貿易開張民間日用交易甚便而外省所輸經費較之三十六年有减無増所辦㸃綴都較三十六年更為完好是此次舉行慶典既足抒臣民愛戴之忱而經理詳定章程留心稽察俾臻妥善所有總辦慶典之阿桂和珅福長安胡季堂金簡李綬伊齡阿均著加恩交部議叙其在事出力之總辦監督各工員亦著查明分别等第一體議叙以示朕行慶施恵至意臣阿桂等跪奏為恭謝天恩事十月二十七日奉㫖總辦慶典之阿桂和珅福長安胡季堂金簡李綬伊齡阿俱著加二級欽此欽惟我皇上泰運重熙乾行合撰正輪週于當午慶溢璇圖叶環轉于逢庚算長瑶籙建五而備膺五福登三而慶遇三秋鑒羣倫獻嘏之情殷舉八衺稱觥之典茂仿蓬壺於海上積叠籌合合角亢于中天迴環珠斗兼旬秋朗祥雲與麗日争輝萬里風和仙樂共衢歌並轉羅香載道學膜拜以争徠執玉盈階效帣韝而恐後允稱熙臺之上瑞聿開王㑹之新圖迺復崇儉為懐撝謙著吉鑾輿乍莅先節彌文鳯罕重經均敷闓澤聚工商而交市懋遷益荷皇仁増廛肆以居民逰泳胥叨帝澤凡此九重乘時之敷錫實為億年初覯之規模臣等志切臚歡職慚協力燕喜惟吹夫豳籥鳩工非藉于岐鼛愧荷絲綸特加甄叙竊幸階増兩級現叨逾格之新榮再瞻典洽九旬還沐慶成之舊例臣等曷勝感激歡忭之至謹合詞繕摺恭謝天恩謹奏十一月初一日奉㫖知道了十一月初一日奉㫖總辦慶典工程係和珅金簡専司其事著于所加二級外再加一級彭元瑞前曽查勘工程現又纂輯萬夀盛典亦著一體加二級臣和珅金簡彭元瑞奏為恭謝天恩事竊臣幸依夀寓洊被寵光苞符交㑹於慶辰祝頌藉申於盛典集九垓之觥斚如聞太室山呼合萬國之梯航竝入爻閭王㑹獻臺莱于豳雅陳鼚舞於堯衢即上夀溯自三皇未必臚歡之廣况聖齡髙于六帝宜登紀盛之書而且大賚推恩恵心孚吉執役飽子來之直懋遷欣利市之増捧賜銀牌徧被杖國杖鄉之叟分頒鏐帑下逮攻金攻木之工心恒厪于屏華謨必垂諸經久論宣四得見天人和一之符記念八徴叶風雨和㑹之應際兹嘉禮競効歡心方以在事為榮自知何力之有喜庶同于舞綵愧未足以竭綿臣和珅等情切兕稱職司鳩庀數比蕃於康錫適符接晝之三恩獨曠於班聨仰被歛時之五臣元瑞偶塵省視叨預編摩能未効一職之勤殊慙稱塞叙忽荷重階之晉自問僥逾運值長春啟户之微蟲各奮天垂膏露依階之寸草俱榮感惟勤慎之交銘心願升恒之久照所有臣等感激下忱理合繕摺恭謝天恩伏祈睿鑒謹奏羣臣進獻萬夀詩册遴選百篇載歌頌門恭呈御覽恩賜大縀者十有二人十月二十三日奉㫖内閣學士翁方綱順天府府尹吳省欽翰林院侍講呉夀昌編修劉鳯誥禮部主事宋鳴琦俱著賞大縀二疋翰林院編修盧䕃溥俞廷棆程嘉謨阮元庶吉士張師誠舉人周嘉猷生員施鑾坡俱著賞大縀一疋臣翁方綱跪奏為恭謝天恩事本月二十三日軍機處𫝊㫖賞臣大縀二疋欽此竊臣猥以庸愚叠荷聖主鴻慈恩眷優崇㳙埃未報本年恭遇皇上八旬萬夀臣隨衆繕進頌册敬繹聖人躬踐範疇之訓雖勉強鋪陳經義不過掇拾後儒注釋之詞而於乾坤之容日月之光毫髪未能摹繪捫心揣分正切悚惶乃䝉聖恩逾格隆施寵光下賁榮霑綺繡欣依温綍之垂被服恩輝永荷長春之錫所有微臣感激下忱理合繕摺叩謝天恩謹奏臣吳省欽謹奏為恭謝天恩事本月二十三日軍機處𫝊㫖賞臣大縀二疋臣謹詣宮門叩頭祗領竊臣職居京尹盛仰王畿日月之所照臨梯航于焉和㑹八徴衍慶萬方蒙玉燭之調大誥覃敷三輔共春臺之樂仰聖躬之純固親耤親田同夀宇之太平來王來享衢歌壤頌臣偕歡忭於康莊鳯舞麟儀臣預趨蹌於廷陛乃以巍巍贊大穆穆窺天附西京樂職之詞陳小雅介釐之義猥蒙特賞雲霞下於九天捧出雙縑光彩盈於萬户雖臣率兆民而進祝忻喜愜而詞意親而臣偕八伯以臚歡賡颺申而主恩渥所有感激微忱臣謹繕摺叩謝天恩伏祈睿鑒謹奏臣阿桂等謹奏為據情代奏恭謝天恩事據翰林院侍講吳夀昌等呈稱本月二十三日奉㫖侍講吳夀昌編修劉鳯誥禮部主事宋鳴琦各賞大縀二疋編修盧䕃溥俞廷棆程嘉謨阮元庶吉士張師誠舉人周嘉猷生員施鑾坡各賞大縀一疋欽此謹叩頭祗領伏念夀昌等學愧雕蟲才慚刻鵠讀祕書於三館増一知半解以無能編慶牒於萬齡稽五帝三皇所未有恭遇我皇上右文典學念耄闡徴四得兩論尊謙昭聖徳之光九如全詩多福協天保之頌此在寰瀛臚祝真言語之㡬窮若徒藻縟摛詞更髙深之無當臣等近承教養勉習業於文章仰覩光華凛敷言於彛訓健行貞吉占泰九三乾九三之爻富有日新闚文二集詩五集之秘偕壤塗而詠澤惟欽天大難名㑹章蔀以算年共卜夀増無量乃荷文縑寵錫温綍褒嘉捧來霞彩同欣被服之榮賜出雲階下逮章縫之士所有忭感下忱謹具呈懇請代謝天恩理合據情代奏伏祈睿鑒謹奏先是七月二十五日原任翰林院編修周厚轅原任大學士梁國治之子舉人梁承雲原任尚書周煌之子舉人周興嶧迎鑾獻册恩賞周厚轅大縀二疋梁承雲周興嶧各一疋勑各省督撫曉諭耆老不必逺來慶祝届期順天及各省在京之年老官員兵民等恭迎聖駕仍加恩賞乾隆五十五年二月十七日奉上諭朕披閱康熙年間萬夀盛典恭載聖祖仁皇帝六旬萬夀時各省老民多有來京慶祝者今朕夀屆八旬普天同慶薄海臣民咸深忭舞朕恐外省文武大員紛紛籲請是以每省酌派二三員並令各帶道府承倅將偹等官來京以遂其祝釐瞻覲之忱至各省耆民人等雖未降㫖准其赴闕而草野情殷葵向思欲逺來効悃祝延萬夀者各省想亦不少朕思年老之人正須頥養長途䟦渉未免辛勤或因不服水土偶生疾病轉非體恤髙年之意不但外省地方道路遥逺不便前來即順天直𨽻老民僻居郷隅亦不必齊赴京師致滋勞頓前已于恩詔内查明各省耆民賚以粟布銀兩溥被恩施兹特再降諭㫖著各督撫轉飭地方官出示曉諭凡欲來京慶祝之老民等俱著不必前來以副朕安老引年之至意将此通諭知之是年八月恩賞各省在京迎駕之八十嵗以上官五員每員二十兩重銀牌一面七十嵗以上官九員每員十五兩重銀牌一面九十嵗以上兵民四十四名每名五錢重銀牌一面七十六十歳以上兵民八十七名毎名四錢重銀牌一面又順天府屬迎駕之九十嵗以上至七十嵗以上老民六十四名恩賞銀牌各一面餑餑十二槕又浙江省在京迎駕駕之九十嵗以上老民八名恩賞一兩重銀牌各九面夀杖各一根八十嵗以上老民四十九名每名一兩重銀牌八面七十嵗以上老民三名每名一兩重銀牌七面兩淮浙江長蘆等商人承辨萬夀慶典特㫖分别賞賚並賜入宴見本門筵宴乾隆五十五年八月十二日奉上諭本年朕八旬夀辰中外臚歡兩淮商人情殷祝嘏踴躍急公具見悃忱其一應運課等項業經節次調劑以抒商力今該商等愛戴輸誠共伸華祝允宜特沛恩施用昭嘉賞所有此次兩淮承辦㸃景之總商洪箴逺鄭旅吉汪日初王履泰尉躋美江正大張大安巴敬順巴恒大余晟瑞黄瀠泰程儉徳張廣徳羅榮泰鮑有恒黄恒茂張肇恒孫世昌汪肇泰吳開大吳是聚巴善裕汪益新鮑逢吉賈恒順等共二十五名俱著加恩於現在職銜各加頂戴一級以示奬勵又奉上諭今嵗朕八旬慶節率土臚歡現在來京祝嘏臣民俱已叠沛恩施同沾愷澤所有承辦慶典之浙江商人志切呼嵩亦宜一體加恩用昭嘉奬著将該商等本年應交柴塘生息銀十二萬兩於五十六年為始分作三年帶完以示朕錫福施恩至意八月二十五頒賞三四品職銜兩淮商人洪箴逺鄭旅吉汪日初王履泰江正大張大安巴敬順浙江商人何承和方瑞登吳志仁姚泰許紹奉五六品職銜兩淮商人程儉徳巴恒泰黄瀠泰俞晟瑞浙江商人楊恒昌汪順吳本初吳仁豐天津商人王佩第愷劉克昌楊世安張永鋭金起霖楊秉樾徐都齊嘉榖魏臨任振宗張天瑞李金鑑李文禄七八品職銜兩淮商人尉躋美浙江商人江立本天津商人及貢監商人朱晉郭鴻宋思徳展秉禮董調元于義昇李汝士韓鴻起范承業張帝臣張爾發等共四十七人共耕織圖詩畫十二分九老㑹詩四十七張漳絨寜綢宫綢絹共三百二十八疋大小荷包一百十八對貂皮二百三十四張兩淮鹽政臣全徳謹奏為代奏謝恩事竊照兩淮商人洪箴逺等世受聖恩感深覆載籲請來京承辦萬夀慶典於本月十二日恭奉恩㫖俱著加恩於現在職銜各加頂帶一級欽此該商等拜命之餘歡呼感戴隨據呈稱箴逺等鹺業淮南世叨恩渥恭迓六飛之時莅寵賁湖山欣逢七萃之頻臨榮増爵級或全蠲綱課特恩沛而藏富彌多或借運帑金商本裕而奇贏累倍比者疏宣積滯嚴緝私銷奉樽節之規條愈流通於鹽筴春風萬竈海濱則斥鹵充盈返照連江漢口則㠶檣上下感君恩之優厚葵向常殷祝聖夀之崇髙嵩呼倍切逯鈞天之嘉宴大樂初聞許福地以偕遊珍鏐普被既便蕃之晉錫復重命以巽申華簮並沭於龍光新級同鐫於鳯紀無兹華祝未効區區際此堯天真同蕩蕩伏願九旬萬夀常瞻王㑹以胥來三江五湖引領帝車之時邁所有箴逺等感激下情謹合詞呈請代謝天恩理合據呈代奏伏祈睿鑒謹奏臣江蘭謹奏為恭謝天恩事竊臣世荷恩培欣逢夀社仰邀殊擢重陟卿垣得隨鵷鷺於慶霄獲覩共球於王㑹兹復䝉特恩加臣弟江蕃三品頂戴臣聞命之餘實深感戴欽惟我皇上泰符順應乾徳健行光華普被於萬方廣運彌勤於乙夜叙九疇而有慶先叶八徴備五福而蒙庥親覘七代五十五年方長之景運二十二史未有之隆期舉率土以臚歡獨全家而誌感寵被迎鑾江上淮南草木生輝恩沾稱兕堂前闕下衣冠増煥伏願堯天旦旦軒紀年年千齡共樂於登臺億載抒誠於擊壤所有臣感激微忱謹率臣弟江蕃䖍候工次叩謝天恩理合繕摺奏聞謹奏臣琅玕謹奏為代奏謝恩事本月十二日恭奉恩㫖浙江商人本年應交柴塘生息銀十二萬兩於五十六年為始分作三年帶完欽此該商等感戴天恩歡呼抃舞隨據呈稱竊商等幸際軒齡欣瞻禹㑹感恩培之優渥三舋久慶安瀾遊夀宇之熙恬六幸曽迎駐輦擬抒誠於鰲戴湖山則縮地未能僅効悃於兕稱雲日則躋堂彌近乃荷芳林錫宴内府頒珍慰麗澤之同情承負暄之重賞兹復温綸特沛寵渥優沾塘工本捍禦之恩億萬重蒙貸息坍漲荷精神之燭三年復沭奇贏惟有合頌三多申祈五福九旬有慶更隨天竺雲來萬夀無疆願共海潮音廣所有感激下忱謹具呈懇請代謝天恩理合據呈轉奏謹奏恩賞正一真人張起隆賢良寺僧實寜杭州各寺僧實䕃等八月十二日正一真人張起隆賢良聖因浄慈雲林法喜等僧衆恭迎聖駕恩賞張起隆八絲縀一疋五絲縀一疋春綢一疋絹一疋大古香三十枝藏香三十枝僧實寜實䕃等五名四體字無量夀佛兕請雨經各二部銅佛各一尊香色絹各一疋香色春綢各一疋大古香各二十枝藏香各二十枝僧衆十六名香色絹各一疋大古香各五枝藏香各五枝恩賞迎駕慶祝之工匠雜技人等八月十二日皇上自圓明園進宮沿途慶祝之工匠雜技人等六千二百二十四名共賞銀六千三百四十六兩臣等欽惟我皇上瑞叶苞符垓瀛萃慶稽十有二萬皇極之書從未轃斯景運天下之祝嘏來庭者如百川之朝海衆星之拱辰方愧悃忱之未能畢獻豈復僥希聖澤於格外顧幸盛世地天交泰之㑹人和嵗豐開慶典於都畿適逢旭日麗霄祥風拂路迓鑾儀而有喜陳王㑹以増圖在集事之臣子來之庶惟恐殫力未周其曷以仰承聖豫而我皇之溥益臣民者則愈無不至焉睿謨崇儉而庀工兼予以重階茂徳光謙而臚頌惟嘉其得體矧野老之葵傾莫遏工商之鳩役争先讃大年如夀佛長春鬯休風則康衢轃集媚兹之義不過略展寸私而厚賚均頒已繁稠之逮徧然則聖人之不遺一勞不吝一賞非皆徳之渥著用以協悠逺而鬯溥施者乎
