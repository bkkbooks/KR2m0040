  text: 欽定四庫全書八旬萬夀盛典卷七十六恩賚十五賞賚三恩敘萬夀慶典在事諸臣特豫晉級
  hash: sha256:4ba7e302232c814b7eb5de7d5b1e8619128e7ea0665786d49c4263b6d22a26c1
