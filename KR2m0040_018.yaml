body:
  text: 欽定四庫全書八旬萬夀盛典卷十八聖功一安南歸降一臣等謹案周雅江漢之什盛陳武功然其一再曰天子萬年天子萬夀云者葢偶遇陳師伐逺經營告成遂於四方既平王心載寧之時稱萬年萬夀以致其祝願而非有捷勲之屢聞獻夀之實事足垂奕紀者也洪惟我皇上億齡介福九憗䝉庥一時鰈國偕来鴻臣親賀禕儀嘉典照耀瀛寰臣等竊推原暨訖之由與夫功績之著益仰天禎厚集聖武逺揚允轃夀㝢同風之極軌焉遡惟鴻勲九奏若平回定凖収兩金川事在乾隆四十五年以前逮兹庚子後方畧之書既以昭垂冊府矣兹自七旬以後膚功屢奏掃逆則原非黷武撫順則並不勞師良由健行智照決勝㡬先故能應㑹赴機算無遺策視史稱漢光武每一發兵頭鬚為白者誠卑卑不足道也臣等恭輯盛典増列聖功一門如安南之乞降請覲入侍祝釐緬甸之震讋威稜輸忱内属廓爾喀之頂經籲順叩闕来王竝䀜昧陬澨之區遼逖要荒之外得備屏藩並瞻天日允宜震耀典冊創見特書至如平臺灣亂民平甘肅逆回之舉恭見御製文謂弗值薌其説然皆出於神謨籌畫聖略布昭先握四知爰徴四得亦宜附載備見精神運量之先周焉臣等謹撮舉事之大綱敬錄御製詩文以昭經緯之備葢即此十載之中上勞睿算克鞏洪禔大順大同為軒皇御世以來所未遘也而豈鋪張景鑠之所可罄者哉乾隆五十四年㤙准安南國王阮光平乞降安南國小目臣阮光平謹奏為冒瀝微誠仰干天聴事欽惟大皇帝陛下受天景命為萬國君御宇五十餘年洪㤙溥洽華夷内外同風共貫臣安南界居炎徼久沐聖朝聲教草木昆蟲皆是大皇帝生之植之乃自二百年來黎王失柄權臣鄭氏専有其國順廣一帶又為土目阮潢所占阮者黎臣也迨十世孫阮淳失政順廣之民不附臣阮光平生長廣南之西山以一介布衣謬為廣民所推遂先有廣南以南之地非與黎氏有君臣之分也甲午秋鄭氏取順化之地侵軼臣之小邑民人罹其毒害丙午夏臣公憤所激起兵取順化之地因而直抵黎城誅滅鄭棟還政於黎黎王感臣之義因以女歸其年前黎王維褍謝世國人請立其嗣孫維祁襲位事定臣旋即南返詎意黎維祁誘臣叛将阮整搆衅於臣之邉鄙丁未冬臣遣一小将問阮整之罪黎維祁為其所挾棄國而逃戊申夏臣至黎城敬謹遣价叩闗備經以國情乞為題奏日者邉臣反書却使不即逓達臣不得已旋歸順化去年大兵出闗征勦臣逺道聞信自念與黎氏有功無釁且從來一片畏天事大真衷壅於上聞再委行价賫具呈文三道叩禀轅門不料大兵直抵黎城殺守兵甚衆臣自揣進退無據隨即奉具表文三次敬謹遣价叩闗請罪投降未示意指臣更不勝傍徨悚懼今䝉大皇帝命重臣駐節邉闗臣一腔心緒委曲未明之處即可暴白是以合境臣民合家男女無不懽忻感激惟念臣本無抗拒之心而有抗拒之迹若臣心不䝉大皇帝鑒及則臣罪難求大皇帝宥赦竊惟安南自丁氏以來代有遷革中國因其請命而授之盖栽培傾覆付之無心亦惟體天行化順其自然而已今臣負兹𤯝誤遭兹時㑹理宜匍匐躬詣闕廷陳情謝罪惟以國内新罹兵革之後人情惶惑尚未安集臣子尚幼臣兄弟俱在廣南一帶無人可使謹遣臣親姪阮光顯隨表入覲伏惟大皇帝欽崇天道覆昏殖禮一本至公恕蠻貊無知之罪鑒懇廹籲奏之誠樹牧立屏用新寵命俾臣得以保障一方恪共侯服則事有統攝民獲乂安皆由大皇帝幬載之仁臣謹當奉脩藩貢以表至誠臣拱北馳神望闕翹首不勝廹切􅎋懇戰栗屏營待命之至謹奉表以聞乾隆五十四年五月初三日勅諭安南阮光平曰據協辦大學士兩廣總督公福康安等奏爾遣親姪阮光顯敬賫表貢抵闗乞降并将原表呈覽並據阮光顯禀稱爾俟國事稍定尚乞親自到京瞻覲等語安南黎氏立國已久且臣事天朝恪共職貢百有餘年素著恭順爾在廣南從前並未修朝貢上年黎維祁母妻赴闗控訴以爾佔據其國籲請救援此事為天朝字小存亾體統攸係是以前任督臣孫士毅自請帶兵出闗其所辦甚正並無不合爾雖曽遣叩闗辨訴苐守邉之臣向來止知有黎而不知有阬駁回原稟亦經奏聞所辦本正然督臣孫士毅奏克復黎城之後朕即以黎氏近年以來國内多故黎維祁又復怯懦無能優柔廢弛㸔來天心竟有厭棄黎氏之意朕從來辦理庶務無不順天而行隨經諭孫士毅黎城既復當即撤兵並不令其復至廣南問爾前此興兵搆釁之罪也乃孫士毅於克復黎城後未能遵㫖速撤在彼躭延一月有餘兹爾率衆至黎城欲向黎維祁詢問官兵在此豈有坐視之理爾以安南頭目敢於抗拒官兵獲罪甚重是以将福康安調任兩廣總督原令調集大兵整軍問罪但念爾屢次遣人叩闗請罪並於未出官兵不敢阻擾善為収養敬謹送回是爾尚知畏懼悔罪隨令督臣福康安等暫緩進討今爾所進表文以爾與黎氏並無上下之分安南僻在海陬爾與黎氏有無名分原無辨証爾既以負眚較重應躬詣闕廷請罪因國内甫罹兵革人情惶惑先遣爾姪阮光顯隨表入覲實為恭謹小心可以赦爾前罪不加進討已令左江道湯雄業䕶送爾姪阮光顯來京瞻覲但爾雖自知悔懼其抗拒官兵之處究難觧免若非親身詣闕請罪乞㤙遽思仰邀封號天朝無此體制爾既未列藩服所有貢物亦未便収納著發交領回如爾必欲輸誠納欵長享寵榮乾隆五十五年八月屆朕八旬萬夀維時距今又越年餘爾國内亦當安集爾即可禀知督臣親自赴京以遂瞻雲就日之私屆時朕鑒爾畏感悃忱自必格外加㤙或即封以王爵爾世世子孫可以長守安南彼時再呈進貢物亦即可賞収仍當加之厚賜以示優眷朕臨御五十餘年凡庶拜藩部無不待以誠信即如從前平定凖噶爾時厄魯特台吉舎楞曽将副都統唐喀祿戕害逃至俄羅斯地方後于土爾扈特投順時舎楞即隨同投進朕念其悔罪之心特加㤙宥仍封王爵賞給㳺牧地方居住可見朕撫綏方夏無不仁至義盡兹特賜爾珍珠手串一掛爾當祇承㤙命計程於明年六七月内至京親詣闕廷懇請以兾永承眷渥勉之欽哉特諭御製安南阮恵進表悔罪投誠歸順既允其請詩以誌事己酉除逆扶危師有名孱王仍自棄其城一臣振旅堪稱智二将捐軀可惜貞安南黎氏臣服本朝百數十年一旦為阮恵所侵逼除逆扶危在我之師原為有名無如黎維祁不能自振既為之復其土疆襲其封號乃見阮恵復來仍即棄國内投予去冬所云班天厭其徳之説如􅋵左劵猶幸孫士毅始雖不即遵師之㫖繼尚振旅而還無損國威尚為深識大體惟提督許世亨總兵張朝龍等臨陣捐軀堪為軫惜然已優加爵賞亦足以償其忠貞之志矣聲罪不難致我討審㡬原可鑒其誠阮恵復至黎城自知罪過重大屢次欵闗悔罪乞降孫士毅俱不允為代奏及福康安調任兩粤阮恵懾其威名益加震讋再三籲懇並諭其國内如遇天朝人經過加意照料伴送進闗兹又遣其親姪阮光顯親至福康安處賫表納貢兾求降附據福康安奏稱察看阮光顯輸服畏感情形溢於詞色之表至表内詳叙黎阮搆衅始末並無敢有抗拒官兵之心且其登覆縛送戕害提鎮之人語意委婉尤為誠敬得體而表末復聲明此時先令阮光顯進京代躬瞻覲俟其國事稍定阬恵於明年八旬萬夀之前即當親身入覲閲其情詞洵屬出于至誠等語因思國家徳威逺播調兵聲討正復何難但彼既悔罪抒忱出于忠悃審度事㡬亦可曲為鍳宥正不必為其已甚因即開誠布公賜以勅諭恕其前愆牖其新機在天朝光明正大之心中外所當共喻也明年詣闕親輸服乃可加封示寵榮阮恵此次乞降可以舎其罪矣惟所稱願附藩封恪修職貢一節必待明年親身詣闕方可錫以封號俾得長沐寵榮是以現在所進貢物概令給還亦必俟其明年親身呈進方可収受此又國家體制所闗不容䡖易者耳㫖俞阮光平來朝躬祝萬夀之請賜封光平為安南國王安南國小目臣阮光平謹奏為敬陳瞻覲微忱仰干天聴事臣欽奉勅書宣諭不咎既往嘉與維新並以乾隆五十五年聖夀八旬祝釐大典賜臣進京瞻覲以遂瞻雲就日之私臣荘誦綸音敬恭高捧聖徳如天鑒臣微誠不以傖荒遐隔将列之明堂故頒下朝覲之禮臣誠􅌚誠忭無任感激欽惟大皇帝陛下徳邁羲炎道隆軒昊五十餘年太平天子治隆福備曠古所無臣生長廣南雖其地不與中華通而閩廣海舶往來絡繹竊嘗稔聞中國文華聲明之盛尤仰望大皇帝仁義道徳之隆臣誠願譜在寳書瞻就雲日匪直以海不揚波為中國有聖人之騐也前臣於親姪阮光顯欵闗代躬行禮時實曽面囑俟國事稍定入覲京師盖臣一片真誠惟知敬天命尊天子循其職分之當然也伏惟聖天子天生至徳祿位名夀兼而有之來年八月恭逢八旬萬夀聖節吉祥盛事慶滿寰瀛臣獲依日月之光同效華封之祝實為至願擬将國事早為處分謹於明年春夏間禀明兩廣總督轉奏候賜瞻覲以抒下悃仰惟宸淵洞照欣感實深惟是臣明嵗進京恭祝萬夀時庶邦君長咸在朝賀之列臣荒逺土酋忝與王㑹跼蹐無地惶懼交并且臣本國自黎祚告終干戈旁午民墜塗炭旄倪皇皇日顒綏輯幸得早有繫屬即國内日就和寧伏望聖徳洞燭微情逾格加㤙假臣封號俾得奉有名分慿藉天寵鳩集小邦實䝉聖天子覆載生成之徳自臣及其子孫世守南服為天朝之藩屏惟有一心恭順以期永荷天㤙於無替也臣遥瞻絳闕仰望㤙慈不勝激切屏營之至謹奉表以聞六月二十二日勅諭新封安南國王阮光平曰據協辦大學士兩廣總督公福康安奏為爾具表謝㤙展陳覲悃朕披閲表内詞義肫懇並請於明年進京入覲祝釐祈籲􅎋切具見恭謹所有賫到貢物已諭令賞収以遂爾芹曝之獻至表内懇請格外加㤙給以封號俾得奉有名分鳩集小邦等語安南以黎維祁庸憒無能天厭其徳國祚告終爾現已悔罪投誠遣親姪阮光顯奉表瞻覲祈求懇切不啻再三朕順天而行有廢有興悉歸大公至正本擬俟爾明嵗親行叩覲時賞給王爵兹閲爾表内所稱造邦伊始必湏仰賴天朝寵榮方足以資駕馭因念爾國甫經兵燹之餘民人未獲安輯若不重以天朝封號恐一時呼應不靈自係實在情形爾既據實陳明並不稍事虚飾朕轉因爾所言屬實深為嘉與且王者有分土無分民安南雖逺在炎荒皆吾赤子中外自當一體爾能慿藉寵靈撫綏整頓使國内民庶悉就安寧實朕所深願用是即降㤙綸封爾為安南國王俾資鎮撫並親書御製詩章賜為爾國世寳嗣後凡有表詞及本國行文之處俱准其書冩國王名號至從前福康安檄諭内或稱為爾或稱為土目亦已令其改為國王之稱以示優異其應行發給印信勅書現交各衙門撰文鑄篆俟爾姪阮光顯到京交與賫回爾其益當小心敬畏恪守藩封永承㤙眷特諭御製降㫖封阮光平為安南國王詩以誌事即書賜之己酉三畨耆武匪佳兵予自即位以來平伊犂定回部収金川俱荷天牖予衷三蕆大功實以順機䝉利土佑而成非逞兵威地也昨嵗安南重去聲有征無奈復黎黎厭徳爰教封阮阮輸誠光平本求於明嵗入覲恭祝八旬萬夀因以乞封兹接閲謝表有慿假封號鳩集小邦之語情詞真摯深為嘉予因即降勅封為安南國王俾得世守土疆永為藩服守封疆勿滋他族𫝊子孫恒奉大清幸沐天㤙欽久道不遑日監凛持盈八月阮光平遣姪光顯入覲於避暑山荘行在是月二十二日命留京王大臣頒賜𠡠印於太和門授光顯恭齎回國奉天承運皇帝制曰朕惟王化遐覃伐罪因而舎服侯封恪守事大所以畏天鑒誠悃於荒陬貰其既往沛㤙膏於屬國嘉與維新賁兹寵命之頒朂以訓行之率維安南地居炎徼開十三道之封疆而黎氏臣事天朝修百餘年之職貢每趨王㑹舊附方輿自遭難以流離遂式微而控愬方謂興師復國字小堪與圖存何期弃印委城積弱仍歸失守殆天心厭其薄徳致世祚迄於終淪爾阮光平起自西山界斯南服向非君臣之分浸成婚媾之仇釁啟交訌情殊負固抗顔行於倉猝雖無心而難掩前愆悔罪疚以湔除願華面而自深痛艾表箋籲切使先猶子以抒忱琛獻憬來躬預明年之祝嘏自非仰邀封爵榮藉寵光曷由下莅臣氓妥資鳩集凢此陳詞以實胥徴效順彌䖍况王者無分民詎在昄章其土宇而生人有司牧是宜輯寧爾邦家爰布寵綏俾慿鎮撫今封爾為安南國王錫之新印於戯有興有廢天子惟順天而行無貳無虞國人咸舉國以聴王其懋将丹欵肅矢冰兢固圉以長其子孫勿使偪滋他族悉心以勤於夙夜㒺令逸欲有邦益敬奉乎明威庶永承夫渥典欽哉毋替朕命宣封安南國王禮成阮光平遣使陳謝御製新封安南國王阮光平遣陪臣進貢並稱明年三月起程入覲詩以誌事適唐張謂戲贈杜侍御送貢物詩在側即用其韻己酉阮光平新膺封號恭進謝㤙貢物並本年例貢一分念該國王出于至誠若不賞収未免阻其誠悃因降㫖将本年例貢一分留抵下次正貢以示體恤並𫝊諭沿途督撫於該國王經過時待以賓禮用昭優眷孚意君臣事不難誠肫那藉設盟壇阮光平聞福康安調任粤東因再四籲懇輸誠宥罪並資送内地兵弁入闗又為提督許世亨總兵張朝龍尚維昇等建立祠宇以贖前愆今嵗萬夀節前先遣親姪阮光顯來至山荘祝嘏乞㤙並稱伊于明嵗親來瞻覲慶祝八旬萬夀嘉其恭順肫誠因即降勅書頒給新印封為安南國王兹據福康安等奏阮光平擇吉拜受封爵歡忭難名既具表陳謝復遣陪臣賫進謝㤙貢物並本年應進例貢是其恭事之心實属真摯異于藉設盟壇勉受朝命者矣來朝北闕親而近弗異南邦衣與冠今嵗阮光顯至山荘即令服其本國衣冠入覲明嵗阮光平來京亦不令改易衣冠國家撫馭外藩定制如此班接諸王鄰雁列筵開八月享雞寒羊淹雞寒出鹽鉄論賢藩貢悃殊侍御紀實聊慿信史㸔新封安南國王臣阮光平謹奏為恭謝聖㤙敬陳下悃仰祈睿鑒事臣安南五服之外屏也自前代丁氏啟宇内屬受封從此世代相承迭膺封爵之命然而地僻桂郊天逺楓陛天朝因以化外外之宋皇所賜黎王桓之書元朝所徴陳王烜之詔千年信史事猶可徴大抵秋肅之意多春温之意少祇以函封請命姑賜包容固未有㤙施稠叠珎珠偕玊諭而寵頒宸翰輝煌御詩並勅書而榮錫如今日大皇帝之隆㤙與臣光平之遭遇者也臣本廣南之田舎子由於黎鄭二强搆兵滋亂淪胥以敗交南無主臣幸為同志所推叩闗請命雖有恪恭一念之誠而未得展出入三覲之敬臣所遣親姪阮光顯賫逓投順之表身未及闕而㤙賜已施臣嗣遣家臣黄道秀獻上謝㤙表文方當候命而寵綸旋降臣伏讀前後勅書聖天子諄諄以順天而行播諸温諭聖人之心即天也栽培傾覆大都順其自然加以手串之珠天子将賜履焉欲其合璧聨珠旋繞北辰而有綿延不窮之象也御賜之詩諄諄以守封疆𫝊子孫為訓而且勉之以欽久道凛持盈尤欲其兢業持守祇承天庥以長守南服之侯度也夫春秋之義大一統聖人一視同仁併包徧覆㤙澤所加聲教所暨即胥敖蓬艾咸在盖容亭育之中頋臣實寡昧膺此榮光由本國黎陳以上迄於貉龍建國之初創見而曠聞何以荅高厚始生之萬一臣自聞封㫖即由义安起程感激歡欣急願早承㤙命適勞頓冒寒舊疾復作伏念臣謬膺封爵即為南服屏藩若不自愛其身病勢増劇是在臣家國為小而孤負大皇帝如天之㤙負罪益重用敢禀明調治另改宣封日期焦急呻吟中感念無量天㤙實為至優極渥淪肌浹髓夙恙頓除於十月十五日敬謹領受御詩勅書從此司牧南交臣世世子孫恪遵聖訓永奉大清臣以西山布衣榮膺封號自問無可報答惟於明年三月上旬起身赴京瞻仰天顔恭祝大皇帝八旬萬夀並兾日聆訓諭稍得政治之本遵奉施行俾舉國臣庶䝉庥實臣之大願望也臣仰感隆㤙俯攄衷表謹遴選家臣阮宏匡宋名朗黎梁慎等賫逓謝㤙表文並謝儀欵闗奏進再奉照向例今年正值臣國嵗貢之期任土之禮不敢稽曠謹接遣家臣陳登大阮止信阮偍等将貢儀一併恭逓進闗伏望聖㤙曲垂矜宥准賜臣所遣行价等名恭詣闕廷瞻覲並将謝儀貢儀上進庶得恪守舊章永覃新澤無缺共球之職不墜屏翰之修臣下情無任瞻天仰聖激切願望之至謹奉表以聞八旬萬夀盛典卷十八
