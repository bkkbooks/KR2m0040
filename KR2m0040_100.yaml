body:
  text: 歌頌二十一萬夀頌九章謹序內閣學士臣李潢臣聞夀為仁徴福以德致詩書所紀祝嘏之詞莫備於天保一篇而天人相感建極錫福之理則洪範為尤著竊考三五以來其間受篤祜介純禧者莫不顯奕當時垂光簡册以熙鴻號於無窮然求其天人協應諸福畢至擅古今未有之隆足以鈞陶軒昊而髙視奕祀者固敻乎其未之有聞也欽惟皇上德備中和功兼參兩文武聖神函育四極維茲八月恭逄聖夀八旬大慶日月光華瑞應昭著嵩呼華祝中外相屬象勺之童黃髮之叟壤歌轅曲遍於衢野九譯之使越裳之長獻琛效賮奔走偕來凡夫圓頂方趾秉有血氣心知之性者以下逮乎跂行喙息蠕動蠉飛之倫蓋莫不鼚乎鼓軒乎舞斟酌醲化矣於斯時也句臚傳響殿廷濟濟儀式明備虞韶協律奉觴上夀宸衷悅豫播澤寰宇偕登仁夀敷天之慶萬國臚歡英聲茂實洋溢八區臣竊惟皇上久道化成億兆之衆已安袵席而聖心乾惕懷保彌殷舉凡閭閻之計雨㿩之期動關宵旰賜復蠲租之詔頻年下逮河防海塘諸役睿慮周詳規畫盡善是天行之健之見於涖庶政勤民事者固己纎悉靡遺而郊廟藉田經筵諸巨典咸恪勤將事無間寒暑今嵗二月之吉又復升香東岱釋奠孔林蹕路所經省方觀民蓋聖天子懋舉崇儀罔自暇逸殊不以為勞也夫以重華之德耄期倦勤尚煩咨警皇上敬天勤民事必躬親至誠悠久莊敬日強古人有言賢於堯舜遠矣詎不信歟故以湛恩汪濊中外禔福威德所加遐方慕義其大者則凖回二部入我版圖列屯相望土爾扈特遠踰絶塞全部歸誠前後兩藏之衆宣揚梵唄上祝蕃釐大小金川及各土司古所稱卭僰冉駹之地擕負老幼效誠溪洞𬗟甸荒僥驃樂花象奉表來獻臺灣生熟畨化外種人荷戈助順入覲闕廷安南僻壤懷德內向不戰而服襲我冠帶北靣蛾伏其他若髙麗琉球諸國之舊列王會者更未易悉數也是以協氣翔洽潤澤豐美泰和嘉貺醖釀沖融聖人曼夀合撰清寧五福五代祚流萬葉遐邇承恩含和吐氣期頤大耄鳩杖為羣而各省大吏以曾元繞膝入告者且源源而來未之有艾也斯固非雕繢虛辭所能潤色矣然則祝聖祺者自今以始齊軌周雅合符箕範履日月升恆之運備康強逄吉之占不誠萬萬年莫之紀極也哉臣幸際昌期謹獻頌九章以合詩人九如之義庶幾盛德鴻庥略陳萬一其辭曰帝貺嘉祉惟天佑聖瑞協珠囊祥開金鏡泰元神策錫羡增慶翕受敷施各正性命一章穆穆我皇布澤如春八荒户牖共荷陶甄文德既昭率土歸仁干羽兩階用懷逺人二章逖矣遠人天恩廣被月窟西來朱波南至九賔列庭萬方輯瑞同祝大年梯航咸萃三章維此安南古之交州鱗介衣裳聖德懷柔遠踰九真拜獻共球夀宇熙熙鳬藻鴻猷四章二月之吉介釐岱宗東國展祀化洽鼓鐘省風圻輔籲俊劭農謳吟禹甸舞抃堯封五章習習和風祁祁甘雨蕃我黍稷盈我倉庾百榖用成五辰既撫帝念八徴永承吉祜六章泰平三登民生樂育帝德覃敷蠲租賜復恩明行葦歡騰棫朴蹈德詠仁受天多福七章猗歟聖皇五福五代祥衍天宗禧凝昊縡錫厥庶民黃耉鮐背曾元繩繩帝用大賚八章天行維健聖德同天百福之宗寶算洪延瑞啓圖牒頌洽垓埏錫祉無疆於萬斯年九章萬夀頌九章謹序左副都御史臣陸錫熊臣聞碧盧首出億齡儲玉劵之華龍嶽時乘兩大配雲章之治握巨象而體太極撰合神元調鴻氣而受真符權操法攬蒼牙推策衍八八於河圖元律通微乘五五於嵗紀枋成鳩之沕穆寶籙天齊邁比翼之真淳旋支轂轉斯則紀鳯蜚麟之后尚遜陳樞戴干荷勝之君猶慙凝化卓蹤冠德事鮮前聞流祚延期道光司契者已欽惟皇帝陛下體乾廣運履泰重熙瑶光彰紫氣之祥星虹沓彩琦表應赤圗之瑞雲日騰輝九五陳疇富夀與康寧並嚮八千紀牒春秋偕元會俱長大同廓無外之模時雍風動諸福際畢臻之盛山鞏川增惟凝承顧諟之本於一心知保右命申之必歸大德粵自七旬初介撝宫之謙德彌彰當夫四海來同率土之殷情未展仰穹蒼而愈峻莫窺一氣之旋望瀛渤以增寬但見萬流之赴略舉十年為斷用徴百福之同爾其蒼璧黃琮嵗承嚴祀靁鼗靈鼓躬致精煙節登降之縟儀禮時為大薦馨香之至德誠一則孚義取乘陽祈嵗定首春之制職勤抱蜀按年秩中祀之文繩大烈以仔肩實録則排晨遞閲衣德言以垂訓前謨則敬告毋忘成方略於琅編善述盡覲揚之義繪鴻勳於寶帙赫聲昭震疊之威選粹質以鏤徽稱産惟德致紀土風而懷故俗物識心臧至若心乾惕以敇幾躬旰宵而明作總綱維而在握無逸精勤運樞斗以居尊有常悠久延對不遺疏逖咨詢而觀聼咸周奏章靡間營圍批覽而隱微洞燭開物成務四方仰綸綍之宣彰往察來萬里等户庭之視省方展義奠海觀河籌樂利於窮簷為民殷望靖波濤於澤國法祖時巡升泰岱者三濊澤春敷於闓澍禮臺懷者五瑞光宵見於金容湛汪暢津淀西東補助遍郊圻逺近屬車入境給復頻仍行殿飾陳增華勿事蹕未啓而先頒賚帑澤普汜而尤重髙年若乃承家法以詰戎順天行而命獮錘峰夏靜迎涼鳴古塞之鞭蘭錡秋清講武肅永安之駕驟飛龍於峻坂一發雙連忖伏虎於深叢洞胸逹腋歡聲雷動忭表貉之名藩武節飇馳作期門之勇氣况復大文淵富聖製日新機運天成象鴻鈞之有宰毫揮電速綴麟管以無停篇章綜性道之全始甲乙而兩編已具吟詠括治平之要至癸卯而四集先成燦寶墨之騰鶱上規羲畫妙化工之點染時有豳圗集美富於大成百家海滙廣流傳於中祕七閣星羅琳琅珍鑑古之儲璧合獨尊萃室琬琰富傳真之刻金生並耀周廊創經筵於圜橋四門敞闢集新篇於古籕十鼓重排若夫丕振天聲重申軍律燭光幾於萬里蜜諭遄馳握成算於三霄方行克詰掃畨回之遺孽一隅梟獍胥殱蕩海島之邪氛兩路渠魁盡縳告武成者九安民和衆以為懷奉無私者三罰罪賞功之必當核名糧於五額餉足兵增養廉節於師貞祿優軍實豈僅凖回兩部豐占鱗甽之屯衛拉全疆逺備鴈臣之列金川土宇作我邉封玉壘兵戈銷為農器而已爾乃堂開五福璿題增詒燕之光寶篆八徴玉筯繼古稀之刻人二千而錫爵肆筵則行葦恩隆世十一以命名衍澤則振麟慶洽啓彤廷之叟宴杖鄉杖國杖朝開曼夀之儒科賜第賜銜賜舉兆繁昌於比户見元孫者二百家躋仁夀於寰區逾期嵗者千百計居同十世奚九世之堪誇乳報四男豈三男之足擬昌禔習應協氣旁流於時兆叶橫庚星明見丙帙八旬而介景治五紀以方隆慶肇履端六合暢欣誾之氣恩覃寰宇三元宣浩蕩之仁值四國之來庭歡臚海外正十行之布告春盎區中按年而遞復者三輸將普免曠典實於今而四溥率均霑則有百餘旗蒙名王二萬里新疆屬部髙句驪之舊壤暹羅斛之故封南掌遐陬中山絶島洮河之宣慰趲拉之土司測海占風舊𨽻職方之藉棧山軼漠來同王會之圖復有地偏藏徼允納貢而輸忱社隔屋鼇助擒渠而效順𬗟甸感戢戈之德請封而厥使重來安南銜苴土之恩祝嘏而其王自至斯並居鄰荒極黃軒之所未臣境處幽遐章亥之所未步走軍前而遮訴永作邉氓掎逆首以成俘願同內服竒花巨象隨鏤表以通誠緑綟金駝進彤墀而謁聖於是桂宫氣爽蘭塞秋髙霄明玉燭之符日在夀星之次龍旗拂漢順蹕路以言旋鳯蓋翔風望御園而蒞止四方民大和會駢肩羾華祝之忱萬邦來效享王鞮舌輳明堂之位溢閭閻之喜氣邑誦塗歌萃川嶽之貢珍山車澤馬蹌蹌在列無疆介萬夀之祺穆穆以臨有慶同兆民之豫斯實唐虞以後潔景福而誰儔羲昊以前較隆儀而莫匹者矣臣猥以蕪學膺被殊恩奉職七閩快覩菁莪之盛紬書四庫幸依奎璧之光燃藜自愧多踈鉛槧昧形聲之别掃葉尚容補過縹緗翻瀍澗之間瞻王氣於大東來從天府拱辰居於北極祝效華封謹拜手稽首獻頌曰白嶽凝祥黃樞啓聖天漢源崇榑桑旭映萬福攸同億齡際盛上下五代舄奕蕃慶其一郅隆五紀延洪八旬體仁惟健恭已以寅仰承家法上憲穹旻不震不動之德之純其二知徹微彰道兼創守蕩蕩難名乾乾可久金鏡髙懸珠鈐在手文德函三武功告九其三翕河晏海析津岱宗六巡江浙四詣岐豐塞畋控轡雨獵彎弓負嵎洞脅鋌險通中其四本身律度規天制作寶册瓊瑶鳴球鐘鏄圜水流雍全詩譜樂庶績允釐大理物博其五如保赤子不遺一夫嵗有蠲貸户免征輸四三丁賦萬億漕租龎鴻澤沛渙汗春敷其六萬夀維祺四方來賀東極諾羅西通歐邏壯户朝𥚑朔溟貢馱共辰於中菉幣自左其七時寒時燠曰雨曰㿩中宵佇報未旦詢章庥徴叶應睿念其蘉老勤志盛寶璽用光其八景福既崇太和洋溢靄靄流虹曈曈瑞日匝地騰歡自天佑吉純嘏爾常所其無逸其九曰從虞夏上溯軒羲德功疇儷福祉疇儀京垓衍策元會旋支治億萬載煥乎巍巍其十萬夀賦謹序署通政使司通政使臣汪承霈臣聞非雲入吕糾縵興歌如日麗天光華駐照星渚呈祥於軒紀山聲告慶於漢圗雍容揄揚鋪陳庥懿凡以通下情而盡忠孝固臣子之極思也欽惟我皇上清寧合撰健順協中巍巍蕩蕩德難名道亦難名純純常常福無量夀亦無量發祥隤祉天人贊孚篤慶延洪景鑠彌劭亶其宜矣茲者嵗值上章時維壯月聖功以積久而愈彰帝圗亦順時而彌壯秋分之夕嘉瑞現於弧南日躔角亢亦會夀星之次普天祝嘏亘海臚歡恭慶八旬萬夀協五五之中數遞衍靡窮旋八八之伶筒循環無已粵稽簡册年登耄耋者厥惟三君我皇上業兼守創統合君師勳暢閫垠功髙三五漢唐以降疇得比崇而臣世沐鴻慈欣瞻駿業溯湛仁於黃閣遇並溫蘇理故業於青箱學慚羲獻幸逢千載而一時敢效九如而三祝敬拜手稽首而獻賦曰天佑璿祚聖恢夀宇循合洛以紀年際太蒙而啓土既歌九功載修六府風人雨人為君為父爰自西而自東咸式歌而且舞麌麌遊原般般育圃偉休嘉之協應蓋振古未之覩也爰稽羲皡下逮漢唐斗樞電繞昴宿搖光輝煌金鏡璀璨珠囊錫嘉名於肇聖溯典禮於天長莫不侈陳悅愈舞蹈蹌蹌惟我皇上之受命而篤生也日為君象會於夀星泰元迪祉媪神萃靈冠百王而首出齊二儀以錫齡粵溯肇基敦龎淳固長白峯回混同波注仙果蟠根靈鵲繞護等嶽峙與淵渟實稟粹於太素及乎龍飛御天膺圗受册雲行雨施坤闔乾闢聖人之心惟精惟一法乎健行所其無逸鸞輅龍鱗乘輿時出致精禋於穹昊隆玉幣於方示上辛秉鬯吉亥推犂黃流夕縮紫熖宵輝犬圓納祿柔祗集釐用錫我皇上萬年丕丕基也於是建七萃以灕呼驂六蚪兮沛艾將有事乎配林遂奄觀夫泰岱九點煙濃一杯海大溯盛典於柴望識王者之無外爰過杏壇載撫遺檜絲竹如聞琴書宛在俎豆莘莘吉士藹藹奏玉振與金聲共鸞鬖而鳯翽道德之富辟雍海流命夫惇悔師儒挍讐魏邴之屬淵雲之儔靡不肅雍聼講泮奐而優遊於斯之時成賢逖紆崇教巋樹古槐蔥鬱而成隂石鼓輪囷而森布伐於論之鐘徴大昕之鼓鄒枚擅乎文章毛鄭専其訓詁然此第觀乎人文而猶未覩聖人之文也五集二集炳炳烺烺珠輝煜赩璧體圓方輕翰飛而花花發文鋒振而磬管鏘惟日新而富有合性道於文章蓋發前古之未發而豈臣下所能詳文治既彰武功時肄棽麗六飛森沉萬騎虹旗拂天神鉦殷地嶺越流斡河泝伊遜周阹武衛羅列百藩秦成施力要趹追蹤飛者遇鏃走者值鋒齊五步與六伐歌吉日與車攻法文昌而命將開武庫而舉烽軒皇三戰姬武一戎掃伊犁之穴銘格登之峯惟聖襟之英斷乃一舉而成功神策風行廟謨電發削平滴博掃蕩回鶻究聖武於河源殫皇威於月􅒸滇徼逋酋日南新欵表金葉以攄誠奉文犀而躬獻蓋自泰逺以西邠國以東祝栗以南濮鉛以北咸懷德畏威無思而不服若夫數庶政之周詳尤不能以更僕紀綱八極經緯萬物登皡皡而皆春勉孜孜於惟日斯乃陶唐氏之所以光四表也瑞出西江貢珍闐河鏄鐘特磬樂備中和斯乃有虞氏之所以奏九㲈也陶莊釃渠龕赭隄激萬派朝宗河清川翕斯乃夏后氏之所以奠九州也聲振宇宙功不踰時陋殷宗撻伐之規焉木蘭按哨大漠橫秋小周宣岐陽之搜焉務農三時躬耕一墢鉤盾弄田洪縻羈隰同苻乎后稷經史子集四庫璘紛淵源津溯郁郁其文爰紹夫姬公穰金飢木蠲租出榖藏富在民連登上熟勝周官保息之則焉大小法亷讞獄不淹中成獨督採聼克兼密吕刑審克之旨焉稽載籍而莫並眇古昔而寡儔蓋神聖之事既備而帝皇之道周矣於是際天棖而開宇亘地軸而為家通玉河而輦賮連渥水而來騧聨蟬封而紆綟逐翎侯而拜牙攬舟車以遵路溯川陸之光華遂開明堂負扆當陽披職貢之圖藉俯列辟之冠裳展帝容而穆穆隆上儀之煌煌蓋帶裳幅舄以入覲者如衆星之拱北莫不鼇抃羔跪而祝洪算以無疆於焉陳庭實列旨酒揭南斗為上尊拓西池為重酎玉觴既舉嘉珍時御六莖肆奏八佾式舞傑裔鞮鞻魚龍曼衍罔不畢具爾乃天閶乍啓陸海駢闐丙御乍却俞騎不前曾壇伉如雕綵繪飾震旦森嚴香林復疊應真八百有園布金吉祥現相歡喜流音緬丹青之寰宇聽宫徴之山川帛悠揚而告吉蝶戲舞而皆仙莫不遊青襟於唐日而娛白首於犧年行填填視顛顛相與尊衢而賀曰盛哉乎斯世蓋赫胥之時所不能及漢唐靡得言焉然而上方沖穆淵涵去奢去汰淡乎黜浮淳乎保泰陳賔筵歌抑戒綸綍宣雨露沛錫便蕃恩湛濊給百寮士民逮免鏐租課殿最工商惠三農賴降氤氲福中外覆露照蹈以煦以育富庶殷寧由於不欲瑶甕雕鎪玉山鬱峍白環珍羽寶於有德星雲卿景爛爛麟麟人文天文本乎立誠雪窖氷山威稜坱圠神武天授成於不殺惟德動天惟天佑德協應蒼縡時萬時億乾象運旋鑿度建極離象貞道光景曜昔宗河獻寶天岱􅀢靈山傳祕響谷動神音祝聖人之萬夀與天地而貞恆遂為頌曰天降祉兮媪富釐家環海兮子蒸黎三年登兮洽帝期嶽貢器兮川效珍曬璧日兮舒錦雲祚延洪兮膺天慶頌我皇兮萬億年萬夀恭擬序一首大理寺卿江西學政臣趙佑天祚聖清萬年景祜列祖神宗肇造丕承以奄有區夏環海內外日出入之鄉莫不戴尊嚴奉慈怙皇帝御極五十有五載是符天地之數八帙既開庶徴畢來體天行健耄而勤念寶章再鐫鴻眷益臻於是慶典紛煴渥膏奫淪騰歡雷殷獻頌雲屯三多之祝願猶虛不若我皇之克臻其實也九如之稱引猶隘不若我皇之克備其全也小臣不文誠歡誠忭謹拜手稽首上言蓋臣聞六經言福夀者莫著於詩書二雅之教曰報以介福萬夀無疆曰夀考維祺以介景福皆言古人君能敬天祖虔享祀有恩澤以逮下於是乎人和而神降之福也然考其事多為告利成酬燕勞不過臣子善頌善禱之詞而非確有可命之名可紀之數以見其如何福如何夀也誠以福莫大於夀亦莫難於夀唯其不可必得而矜言之故洪範陳五福特先之以夀而揭其義於皇極之疇曰皇建其有極斂時五福用敷錫厥庶民止於至善之謂極無所不用其極之謂建斂者敷錫之本敷錫者斂之用蓋由一人之福以為天下之福而即合天下之福以成一人之福福無窮夀亦無窮非建有極不能洪惟天之於人君無不豫以無窮之福而獨於我朝常旋至而立應於我皇上更有加而無己者若天之報之實皇之召之皇既無所不用其極則天亦無所不用其極皇之所自造遂為天之所不違則五十五載中所以凝承昊貺合德無疆誠有非名言所可罄非前古後今所可擬者矣夫古之克享福夀者莫如堯雖舜猶覺其不逮下此而周公作無逸舉其人則若殷王中宗及髙宗及祖甲及周文王詳其數則或七十有五年或五十有九年或三十有三年或五十年厥惟中宗之享國足繼堯後而後此漢唐以下無足繼中宗者即有年逾七十如漢武帝梁武帝唐明皇宋髙宗元世祖明太祖六帝非惟建極之德本不足比隆即其享國之年亦不能多紀是則我聖祖仁皇帝聖如神仁如天由沖齡踐阼以至六十一年大哉誠為殷周以來建極之一人也而我皇上聖以繼聖事事本於法天繩祖蓋自懋膺主器之初即有默契天心之祝爰以健行不息之德益著化成久道之符前此寶勒稀齡積四百餘之甲子今茲算增上夀登八萬嵗之春秋不尤直接古皇而漢唐以下之君誠有不足論者哉且夫帝王之所謂福與夀非徒身其康強已也必將保定孔固單厚多益逺則萬方樂化國之舒近則一家大本支之慶周南之美文王是以由公子而兼及公姓公族説之者曰姓之為言孫也族則曾元之倫也蓋周家數世之仁具見其中矣然考文王當日究不過詩人頌禱之詞而其實其全罕可述焉豈惟文王即上而中宗猶是也再上而堯亦猶是也下此而漢唐以後六帝尤其易見者也唯我皇上振振之趾五世迭仍焉詵詵之羽一堂咸集焉而且先甲之年早麟符之特啓後庚之嵗行鳯卜之方滋是又詩所云子子孫勿替引之爾雅釋之以永無極也者臣竊稽往籍多陳符瑞而豈如倫序之完真上祥也燕貽之逺展長樂也由是而升煙以告虔則神效其靈非封禪之繁也行慶而施惠則人順其則非歡虞之小也以至廓聲教可訖之區來從古不賔之國一皆聖天子之巍乎成功煥乎文章默運於無方而軿輳為有象者而夀不誠臻其實福不誠備其全矣哉然而我皇上猶日兢兢於法天繩祖而不自己臣嘗敬繹無逸之美四人迪哲也而必推本於知穡穡之難小人之勞一再曰不敢荒寧不敢逰盤皆言無逸所以致夀也我皇上則愈夀而愈無逸書之無逸以為戒勉之詞皇上之無逸則為安行之至蓋嚴恭寅畏之心懷保惠鮮之理而積之以純常敦固之氣閲五十有五載如一日亦既萬民之無不和萬邦之無不正小大之無或違矣而所以致乾惕飭贊襄者彌無所不用其極凡見於欽頌諭旨與夫御製詩文所謂猶胥訓誥胥保惠胥教誨天下皆可得而喻也萬世皆可得而法也臣以庸愚微末屢邀恩寵謹自庚子越甲辰乙巳三進序册深維乾坤之容日月之光雖極藻繢鋪張不足以效一辭之贊唯是推明詩書所述無逸不己之理希妄測髙深於萬一今復越十年而聖德之彌髙彌劭者益非名言所能罄雖由是而九帙而萬萬齡總無以易於聖製八徴耄念之寶之至義也臣方備員江介職在斯文敢不益勵氷淵恪遵靣奉恩訓以期仰答夀考作人之盛是用戁竦震動寧質無華繕呈宸覽竊幸遭遇之非常敬效賡揚於無既云八旬萬夀盛典卷一百一
