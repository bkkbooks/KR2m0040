  text: 欽定四庫全書八旬萬夀盛典卷八十
  hash: sha256:dfe7bc4889ffe58f178879c7b4452dc0b94be6afd6d917c186a3ded64b7509d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_079-1a, image: WYG0661/WYG0661-0066a.png}
body:
  text: 圖繪四圖説二自西直門至西華門圖説進西直門路右重簷演劇綵臺左為迎駕官員集所中設香案後列金書百夀字屏風重廊疊檻間架曲折文石疏筠幽花秀木夾侍康衢稍前為立象上植幡竿五色陸離迎風耀日竿頂作海屋狀乘雲擁護八仙翔步其中蕊珠牌坊一南有竹徑依坡陀列屋三楹錦苔扣砌羅植嘉花鶴童鹿女自在遊舞仙春瑞景仿佛見兹又南為鼇山十六座對面疊落遊廊燈綵髙下緑隂如幄過圓亭為白石平臺一上作女仙衣霞帔冠戴勝二女侍捧蟠桃導於前二人執雉尾扇擁後皆竦容鞠􅎽仰瞻雲表上有跨青鸞泝雲而下者如西王母狀迤東為崇夀寺山門之左作寶樹然燈象上設三寶法相幡蓋棽麗纓絡流蘇四面皆薝蔔林綴以蓮燈香海光明千花四照一尊者作禮和南衆僧合十讃佛後有白馬馱經象極莊嚴洵為人天勝景南面為龍燈棚雲生簷際龍垂牖間往來起伏競相耀映自此飛甍瑋麗傑構參差演劇而外百戲駢羅或作天女獻花或作嬰兒戲綵壤韶轅頀魚頡鳥𦐄夾道歡呼觀者如堵云堯天光被牌坊在道之南其北為流水橋亭負山植援山作兩峯環合狀兩峯之間隱隱起有樓堞旁峙窣堵坡稍東徑演劇臺粉牆一帶扶以朱欄碧桃玉李芬郁異色隔花則秋千罥索曳縠揄裾瓊樓瑶臺兩兩相對前則為山一座洞壑空嵌青杉緑楊漁樵問答擔月林間吟風犢背太平村樂景也又北有月臺髙出重簷下為平臺氍毺漫地上作仙官獻福八童子各持七寶供奉象前為重樓數楹蟬聫映帶極東為三層臺清泉白石葩蓋柯雲猿鶴同遊作銜枝獻果之狀北則武􅊂九曲遊女歌採茶之歌花架竹籬亭臺間出過方勝亭及西洋房左為百福法相右為太平有象徑西洋平臺則重樓復宇丹鳳朝陽傑出雲表其北即三界勝景牌坊然後過橫橋云橋之左為西洋水閣迤東花臺一座上有十二天女獻花面如意廳回廊曲闥旋轉如折又東為恆春圃千葩萬蕊紅紫紛披仙翾翔集有數童子手執紈扇上下盤辟其北三層方閣迤東有書樓藝籖縹帙充塞棟宇琳宫仙館遙相對峙參差于林巒洞壑間北面紅欄一曲畫地為水淪漣渺瀰內設青蒼赤三龍舟旗幟篙楫各以其色後有白石橋一座圓亭如笠寫齒層層橋兩旁各立綵牌坊密林如翳林表峯岫隱隱如碧玉簮自此折而南為五鳳臺臺之前為采蓮景松橈桂楫搖漾中流碧筒丹菂鈿影波紋過楊栁之渚曳木蘭之舟則有漁父持竿曬網青蒻緑蓑隨風上下對面有亭作方麯形亭外朱欄數十步豁然平敞碧樹周阿仙鼠戲舞二童子捧桃枝執靈夀杖擁老翁而跨驢者是葛稚川移居圖中景也萬卷書樓在大道之左結構崇麗粉堞嵳峩西則重房曲榻雲璈徐奏仙樂鏘鳴旁甃為碧玉池中植菡萏萬柄過演劇綵臺為靈芝亭正與松徑相對由松徑直上為觀音山小橋流水屈曲以達巔頂山下作迎神賽會香燈簫鼓之狀迤南則蟹舍漁莊煙波一碧水源盡處突出髙峯祥雲瀰滿中有仙人驂鸞而立右為玉女渡河之景雲階月地輝映康衢稍南為函關作城闉狀有老人乘青牛車而行三面亭臺均極壯瑋過演劇重臺照壁數仭左為萬寶秋成倉廯櫛比輸載如雲篝車咿軋一帶竹籬坻場平曠舂揄簸揉童叟爭趨是海宇豐登氣象前有百夀廳為兩淮商民迎鑾慶祝之所右為漢使乘槎仙源一曲隱見支機徑五頂亭三層平臺及西洋房回廊十二楹為桂花廳金粟霏香月輪方滿見驂鸞三數人翔舞於康莊者則中逵北拱關帝廟之仙門也山門南為菊花牌坊酈泉分導近對南山下有十數仙子手執夀字方勝朝拱鑾輿又南為鳳凰亭其西則翠屏一曲峯腰岩頂三素雲開列植桃枝上綴蟠桃千實光彩映曜迤南一亭形似花籃中設祥芝仙卉其東則碧海仙橋松藤纒絡流丹刻翠隱見喬林左右亭臺或為卍字或為如意或為三元獻瑞或為雙鳳朝陽直抵大市街之四牌樓其東西面二牌樓後俱列嵐嶂如羅浮兩峯似離若合長松偃蓋修篁便娟桃李滿山塔字宏麗下為百老人各衣綵衣龎眉華髮扶杖來觀同聲歡頌自此折而東以達西安門云過四牌樓同行道左為百花臺右為五雲樓樓前為西洋線法山雲窗霧閣深入數重如海上三山可望而不可即下設西洋水法亭三座拔地雲根一柱四圍繞立舞鶴雲起漸髙輪囷磅礴排擁銀臺鶴珠噴泉上注窗闥灌頂湧出百道飛注如泰山之霤穿櫩入牖又如漢殿仙人金莖承露巧製竒觀一時獨勝北面為百夀字照牆舞雲戲綵瑶臺仙館邐迤分布笙簧鼓吹韶頀齊鳴前設五輅立象天仗方排禁門洞啓曦暉翕赩瑞靄馡馚自西直門直此市㕓櫛比煙井雲連纓笏匝序元齠巷歌農商婦孺咸俾來觀瞻帝京之勝景熙夀宇之昌期茂對時育盡入藻繪中矣西安門內兩旁六方亭㕓舍鱗次樓榭參錯過西洋塔為綵牌坊二重嵐疊嶂之狀映帶左右又有菜園花圃藥欄茨舍直東為孔雀亭翠羽褵褷迎暉閶闔西面山子一座上築瓊樓過綵牌坊進三座門紅牆邐迤彤闥周排綵樹倚雲祥葩霏蓋至金鼇玉蝀之橋則玉河煙景太液波光平川如掌蕅渚鳧汀風亭水榭望若圗畫艇子三兩泝洄上下其有左旗右幟錦纜牙檣則御舟之維於北渚也橋之東即承光殿循墻為過街綵坊面南為花神廟外立百花牌坊繚以朱欄後有三層樓最後遊廊九折東偏為仙臺負山嶻嶪俯瞰錦城是為浙江耆民商人迎鑾慶祝之所自此進內三座門門之東面演劇綵臺一恭演南極呈祥大戲北面西洋式方亭南為牌坊額曰恭則夀迤前藥欄花架綴以西洋房數十楹過赤鳳臺又一綵坊坊之南山子一座林樾清窈橋徑曲折作白猿獻果之戲又為鼇山二十四楹極山川之竒麗繢洞天之勝景前接福佑寺牌坊紺宇琳館碧瓦參差對面則羣峯拱列琅玕萬箇過桃式演劇臺扁曰綏山獻瑞又毗盧亭子旁設擡閣五座俱取吉祥綴景有童子粧束嶷然竦立髙出簷際中衢為流雲牌坊從此林巒臺榭層見迭出景亭之後闤市毗聨天閶曉景人海歡騰較之紫禁城外尤為繁麗矣流雲牌坊之左山子一座列植喬柯紅翠相間兩面對置西洋樓房玲瓏網户結構精嚴左為遊廊數十楹右為月臺布置點綴如西泠明聖湖塘風景中衢立綵牌坊又南為城闉一額曰錢塘勝景過此則斜廊轉角對出如翼道西面西華門為線法山室宇崇沓巖竇空嵌山表為流雲牌坊左右復為小山山之麓為在籍大員來京慶祝跪迎聖駕之所此自西直門至西華門圖繪之大槩也右臣等恭撰圗説二謹自圎明園聖駕出宫門時以至駕入西華門進宫按其里地以諸王貝勒貝子公安南國王阮光平及各外藩陪𨽻文武大員官員在籍大臣各商民耆庶等恭迎聖駕跽瞻法仗為之序次俱各就圖幅標注所在以見斯時萬方效祝企踵臚歡實幸躬睹禮明樂備之隆用以揚福釐而洽親愛至于點景綴設屢奉諭旨勿復踵事增華慶節前期既特命量減綵飾還宫日更命警蹕勿施故兹圖中所列皆摹景物之真藉著質文之兼尚而若都城內外坊衢陌巷金碧相輝繒綵交設樂風雨之時敘耀鐙月之光華較之登春臺逰華胥猶揣摩想像之詞未若兹之慶豐綏夀萬祥駢輳為毫翰之所不勝寫者矣八旬萬夀盛典卷八十
