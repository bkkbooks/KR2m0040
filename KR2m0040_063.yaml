body:
  text: 乾隆五十五年萬夀覃恩詔賜王公以下及年過六十之外藩福晉妻室滿漢大臣命婦等綵幣有差户部謹題為欽奉恩詔事乾隆五十五年正月初一日欽奉恩詔内開臣部應辦事宜謹按欵比照節次例案分晰酌議臣等議得恩賜王公以下覺羅十五嵗以上一欵臣部酌議和碩親王賞給大蟒縀一疋暗蟒一疋粧縀一疋片金一疋藍素一疋字縀一疋衣素一疋紗一疋彭縀二次大縀二疋共十二疋多羅郡王賞給大蟒縀一疋暗蟒一疋粧縀一疋字縀一疋衣素一疋紗一疋宫紬一疋倭縀一疋次大縀一疋彭縀一疋共十疋多羅貝勒賞給大蟒縀一疋三等蟒一疋大閃縀一疋大縀一疋衣素一疋洋縀彭縀紗各一疋共八疋固山貝子賞給小蟒縀一疋大閃縀一疋洋縀一疋衣素一疋彭縀一疋紗一疋共六疋鎮國公輔國公賞給三等蟒一疋藍素一疋彭縀一疋共三疋未入八分公賞給小閃縀一疋大縀一疋紗一疋共三疋鎮國将軍輔國将軍賞給大縀一疋紗一疋共二疋奉國将軍奉恩将軍賞給次大縀一疋綾一疋共二疋宗室十五嵗以上者賞給彭縀一疋生素絹一疋共二疋覺羅十五嵗以上者賞給彭縀一疋又恩賜公主以下至格格一欵臣部酌議固倫公主賞給大蟒縀一疋金線蟒一疋粧縀一疋次粧縀一疋中錦一疋草錦一疋片金一疋金字縀一疋大縀一疋彭縀一疋共十疋和碩格格小蟒縀一疋小閃縀一疋三等蟒一疋大縀一疋彭縀一疋紗一疋共六疋多羅格格賞給小蟒縀一疋小閃縀一疋大縀一疋彭縀一疋共四疋多羅貝勒之女多羅格格併固山格格賞給暗蟒一疋次大縀一疋共二疋公之女格格賞給三等蟒一疋次大縀一疋共二疋又恩賜王妃以下奉恩将軍妻以上年過六十者一欵臣部酌議和碩親王福晉賞給大蟒縀一疋暗蟒一疋草錦一疋片金一疋藍素一疋字縀一疋衣素一疋紗一疋彭縀一疋大縀一疋共十疋多羅郡王福晉賞給大蟒縀一疋金線縀一疋草錦一疋倭縀一疋字縀一疋衣素一疋紗一疋宫綢一疋共八疋多羅貝勒福晉賞給大蟒縀一疋粧縀一疋草錦一疋字縀一疋衣素一疋洋縀一疋共六疋世子長子夫人賞給小蟒縀一疋粧縀一疋洋縀一疋衣素一疋共四疋貝子夫人賞給小蟒縀一疋粧縀一疋洋縀一疋衣素一疋共四疋鎮國公輔國公妻賞給粧縀一疋藍素一疋共二疋鎮國将軍輔國将軍奉國将軍奉恩将軍妻賞給大縀一疋相應行文宗人府八旗将應賞縀疋數目造冊咨送臣部賞給又恩賜外藩王貝勒貝子公扎薩克台吉塔布囊及其福晉妻室年過六十者一欵臣部酌議外藩親王賞給小蟒縀一疋大閃縀一疋衣素一疋洋縀一疋紗一疋紡絲一疋杭紬一疋共七疋郡王賞給小蟒縀一疋大閃縀一疋次衣素一疋紗一次杭紬一疋共五疋貝勒賞給小蟒縀一疋大縀一疋彭彭一疋共三疋貝子賞給三等蟒一疋次大縀一疋共二疋公賞給大縀一疋扎薩克台吉塔布囊額駙等賞給彭縀一疋親王之福晉賞給小蟒縀一疋小閃縀一疋洋縀一疋紗一疋生素絹一疋羅一疋共六疋郡王之福晉賞給三等蟒一疋小閃縀一疋次洋縀一疋紗一疋生素絹一疋共五疋貝勒之夫人賞給三等蟒一疋衣素一疋彭縀一疋杭紬一疋共四疋公之妻賞給次大縀一疋生素絹一疋共二疋扎薩克台吉塔布囊之妻賞給彭縀一疋相應行文理藩院轉行各蒙古地方将年過六十者應賞縀疋数目造冊移送理藩院核明轉送臣部賞給又恩賜滿漢大臣及命婦年過六十者一欵臣部酌議滿漢一品二品大臣年六十以上者賞給小閃縀一疋衣素一疋滿漢一品二品官命婦年六十以上者賞給小閃縀一疋次洋縀一疋相應行文八旗等各衙門造冊咨送臣部賞給俟賞完之日将所賞縀疋数目另行奏聞以上酌議應賞條欵恭候命下臣部入載例冊遵行臣等未敢擅便謹題請㫖二月十三日題十五日奉㫖依議户部縀疋庫賞過縀疋開列扵後親王六位縀各十二疋共七十二疋郡王五位縀各十疋共五十疋貝勒四位縀各八疋共三十二疋貝子四位縀各六疋共二十四疋鎮國公三位縀各三疋共九疋輔國公五位縀各三疋共十五疋未入八分公五位縀各三疋共十五疋鎮國将軍十五位縀各二疋共三十疋輔國将軍二十位緞各二疋共四十疋奉國将軍二十位縀各二疋各四十疋奉恩将軍九十二位縀各二疋共一百八十四疋宗室十五嵗以上者二千零六十六人縀各二疋共四千一百三十二疋覺羅十五嵗以上者一千五百六十八人縀各二疋共三千一百三十六疋以上共賞過蟒粧片金等縀七千七百七十九疋固倫公主一位縀十疋多羅格格九位縀各四疋共三十六疋固山格格三位縀各二疋共六疋格格九位縀各二疋共十八疋郡王福晉二位縀各八疋共十六疋公之妻四位縀各二位計共八疋将軍之妻十五位縀各一疋共十五疋以上共賞過蟒籹等縀一百九疋喀爾喀親王二位縀各七疋共十四疋貝子一位縀三疋貝子一位縀二疋輔國公一位縀一疋台吉二員縀各一疋共二疋敖漢貝子一位縀二疋喀拉沁公一位縀一疋青海吉吉一員縀一疋都爾伯特台吉一員縀一疋郭爾羅斯台吉一員縀一疋克什克騰台吉一員縀一疋鄂勒特台吉一員縀一疋巴林額駙一員縀一疋以上共賞過蟒粧等縀三十一疋科爾沁固倫公主一位縀十疋和碩格格六位縀各六疋共三十六疋王之女格格二位縀各四疋共八疋貝勒之女格格四位縀各二疋共八疋固山格格九位縀各二疋共十八疋公之女格格十五位縀各二疋共三十疋喀爾喀多爾格格一位縀四疋阿拉善多羅格格一位縀四疋固山格格一位縀二疋公之女格格一位縀二疋阿霸垓郡王之母一位縀五疋貝子夫人一位縀三疋公之妻二位縀各二疋共四疋扎魯持貝勒夫人一位縀四疋阿巴哈納爾貝勒夫人一位縀四疋土黙特貝子夫人一位縀三疋鄂爾多斯貝子夫人一位縀三疋公之妻一位縀二疋烏拉特公之祖母一位縀二疋喀爾喀汗之母一位縀六疋郡王之祖母一位縀五疋親王福晉一位縀五疋貝勒夫人一位縀四疋公之妻八位縀各二疋共十六疋台吉之妻十五人縀各一疋共十五疋青海郡王福晉一位縀五疋公之妻四人縀各二疋共八疋台吉之妻一人縀一疋以上共給賞過蠎粧等縀二百十七疋大學士公一員公四員侯一員伯一員縀各三疋共二十一疋尚書六員左都御史一員都統三員都統職銜一員侍郎十二員副都統十員副都統職銜一員㪚秩大臣二員内務府大臣職銜一員男一員䕶軍統領二員内閣學士一員縀各二疋共七十疋公之妻三人侯之母一人侯之妻二人伯之妻二人縀各三疋共二十四疋一品命婦二十二人二品命婦二十七人縀各二疋共一百十八疋以上共賞過縀一百八十九疋臣等欽惟我朝隆禮親支茂承家法以及崇奨蕃翰優洽朝紳賚予並霑迄無虚嵗至夫慶節均禧特昭異數由近戚以逹外藩自列宁以逮命婦筐篚之賜齒及格者同之允夀世之隆施周浃扵無外者也臣等編次恩例益仰我皇上湛愷彌綸推之有其序施之有其等從兹羣倫藻耀黼黻元黄顧章身之多榮莫非聖澤之所光被則萬年稱慶之期即萬國拜恩之日有蹈舞於無窮者爾詔給内外大小各官新銜封贈吏部謹題為欽奉恩詔事乾隆五十五年正月初一日恭遇恩詔内開一内外大小各官除各以現在品級已得封贈外凡陞級及改任者著照新銜封贈欽此查㑹典内開覃恩得膺封贈五品以上授誥命六品以下授勅命一品封贈三代二品三品封贈二代四品至七品封贈一代俱如子孫官八九品封本身而止四品以下各官有情愿以本身妻室封典貤封祖父母父母者准其貤封三品以上貤封者請㫖定奪各官應封職銜以詔下之日為定俱照新加之級給與封典加級多者仍限以制七品以下不得踰五品五六品不得踰四品三四品不得踰二品各官任内遇前詔已封後改任者照改任封陞任者照陞任封陞銜㽞任者以陞銜封兼任者以本任封額外郎中員外主事並額外主事上學習進士奉特㫖分發各部辦事及内外署事官或經保題奉㫖俞允或奉特㫖署理及佐襍官咨部署理已准部覆者一例給封其奉特旨陞授以及推陞題陞等官已離原任未到新任者仍照前任職銜給封丁憂終養官仍照原官品級給封京官給與加級封典外官有加級者不論新舊不准照加級請封又土官請封該督撫覈明咨部彚題各等語又乾隆五十年續經臣部條奏内開八品以下不得踰七品七品不得踰五品四品以下不得陳請貤封曾祖父母外姻止許貤封外祖父母官員遇前詔已經封過後改任者照改任封贈陞任者照陞任封贈如前詔已照現任品級受封今雖加級不曾換職者不准重封查改任受封係専指品級雖同另改新任而言如員外之轉御史同知之轉直𨽻州官階相等職任逈殊自應照新銜給與封典其餘如司員調部道府州縣調任雖署新銜而職既仍舊級亦未增該員等業於上次受封豈得前後一官兩請封典嗣後凡衙門地方調易而職階相同者不准重封至京官既有照加級請封之例自應按其現在所加之級給封所有加級既增晉階較大各員俱照向例給封級多者仍限以制如八品以下不得過七品之類其捐納各級槩不准計算等因奉硃批所議是依議欽此欽遵各在案今恭遇恩詔臣等遵照現頒㑹典及條奏定例除告假候補及捐納分部學習等官俱不准給與封典外其在京陞級改任大小各官以詔下之日為定照新加之級分別給與應得封典在外陞任改任大小各官俱照現在本任職銜分别給與應得封典不准照加級請封藩臬及三品貤封各員詳報督撫核明具奏臣部核覆請題頒給恭候命下通行内外各部院衙門八旗直𨽻各省所有應行請封各官均以奉詔之日為始定限二年以内開明出身履厯應封應贈名姓以及従前曾否受封滿洲䝉古漢軍官員由各該旗都統查明送部盛京各官由盛京五部查明送部在京大小漢官取具同鄉京官印結由各部院衙門送部在外大小各官取具冊結由各該督撫府尹送部臣部照例題請掲送内閣撰給誥勅如有過二年期限不行呈請者毋庸頒給臣等未敢擅便謹題請㫖本年二月十一日題十四日奉㫖依議兵部謹題為欽奉恩詔事本年正月初一日恭遇恩詔内開一内外大小各官除各以現在品級已得封贈外凡陞級及改任者著照新銜封贈欽此臣等查得定例請封各官職銜加級俱以詔下之日為定給與封典官員遇覃恩毎任中止封贈一次餘前詔未經受封者照現在品級具題封贈外如已經封過後改任者照改任封贈陞職者照陞職封贈旗員京官加級者俱照新加之級給與封典滿洲蒙古漢軍旂員陞轉在詔前者不分己未到任俱准封贈其為緑營官者仍照漢官例雖在詔前陞轉詔後到任者不准封贈若受封未領誥軸又遇恩詔請改新銜者不必具題掲送内閣改給已領者繳還原軸亦准改給等語又乾隆二十七年奉上諭奏請貤封嗣後除督撫提鎮等仍循例自行摺奏請㫖外其藩臬副将以下着詳報督撫提鎮核明彚奏仍飭交吏兵二部核覆准行欽此又乾隆三十一年奉上諭嗣後凡遇覃恩應定以二年為限全行辦給不得仍前怠緩其過期不呈請者即毋庸頒給欽遵在案又乾隆五十年經吏部議准一二品官不得貤封髙祖父母四品以下不得貤封曾祖父母外姻止許貤封外祖父母京官照加級請封官階級数與上次請封時相同者不准重封加級既增晉階較大俱照例給封級多者仍限以制三品四不得踰二品五品六品不得踰四品七品不得踰五品八品以下不得踰七品等因又乾隆五十一年軍機㑹議武職増列官階以足十八階之數與文職相埒至封典名號一二品封為将軍三四品封為都尉五六七品封為騎尉八九品封為校尉等因又乾隆五十二年臣部議准河南山東河營恊辦守偹作為從五品給與從五品封典等因各在案今此次恭遇恩詔應封各官應照厯奉諭旨及題定條例限二年内将履厯封贈代數該員妻室存殁姓名開註曾否受封及封過何項官爵在京滿洲蒙古漢軍八旗官員由各該都統在外駐防官員由各該将軍都統副都統城守尉等官緑營官員由各該省督撫提鎮将所屬應封各官職名查明取具印文佐領圖結及同鄉官印結造冊送部臣部查明照例題封冄查吏部八九品佐雜請封各員例不具題掲送内閣撰給勅命武職八九品請封各員自應仿照吏部之例畫一辦理合併聲明恭候命下臣部行文八旗各直省駐防綠營一體遵照臣等未敢擅便謹題請㫖本年二月二十九日題三月初七日奉㫖依議吏部題請封典給過誥勅京官一品受封八員二品受封二十員貤封三員三品受封七員貤封五員四品受封十一員貤封十員五品受封二百五十六員貤封九十四員六品受封二百三十四員貤封一百十八員七品受封二百二十五員貤封一百十八員八品受封二百九十四員貤封八十六員九品受封一百六十四員貤封一百三員外官一品受封二員二品受封七員貤封十員三品受封四員貤封十員四品受封四十七員貤封四十四員五品受封三十四員貤封七十七員六品受封三十四員貤封四十四員七品受封八十二員貤封三百八十五員八品受封十九員貤封九百三十四員九品受封二員貤封三百十六員其未經到部者照例陸續題結兵部題請封典給過誥勅武職一品受封二十八員二品受封五十八員貤封六員三品受封一百七十八員貤封二十七員四品受封三百八員貤封五十一員五品受封三百六十一員馳封八十五員六品受封七百五十九員馳封一百五十二員七品受封二百零一員貤封一百九員八品受封三十六員貤封三員九品受封五十三員貤封二員其未經到部者照例陸續題結臣等謹按封贈之制所以體臣下顯親之情而即以勵其身典至鉅也恩至渥也唐宋以来或遇郊赦偶行或非達官弗與既多濫舉且侈空言方今聖訓煌煌臣等恭讀御製題告身辭謂我國家一掃厯代陋習文武官制誥惟視其品之大小為髙下明訓數語足以彰其前而朂其後揆聖人是彛是訓之大義即聖人教忠教孝之深思至于恩澤覃敷則未嘗不曲為推暨是以一人有慶百爾承庥折圭擔爵之儔咸得捧鸞書而誌喜又且區分等級定制莫踰旁及族姻私衷畢逹不特我朝推恩之隆超軼前代我皇上行慶之茂又豈載筆所能殚述者哉詔賜内外滿漢文武各官加一級其因公罣悮降革㽞任者開復之吏部謹題為欽奉恩詔事該臣等議得乾隆五十五年正月初一日欽奉恩詔内開一内外文武官員有因公罣悞降革㽞任者該部查明奏請開復欽此伏查乾隆四十五年欽奉恩詔經臣部奏定開復章程在京三品以上官員有部議降級革職㽞任及部議降革奉㫖從寛㽞任併革任註冊各案行文各衙門造冊送部将事屬因公在恩詔以前者均開列清單具題應否開復之處恭候欽定等因具奏奉㫖知道了欽此欽遵辦理在案今恭逢乾隆五十五年正月初一日㤙詔據各該衙門将三品以上大員任内所有事故先後造冊到部除在京四品以下官員及在外大小各官均俟造冊到齊之日臣部另行查辦具題所有大員内如降革案件従前係兵部内務府議處之案應行令該衙門查核辦理今将大學士公阿桂等任内因公降革㽞任各案在本年正月初一日欽奉恩詔以前者摘叙案由繕冩清单進呈其應否開復之處恭候欽定俟命下之日行文各衙門一體遵照臣部未敢擅便謹題請㫖乾隆五十五年六月初二日題本月初五日奉㫖阿桂和珅嵇璜王杰扎郎阿彭元瑞瑪興阿金士松巴延三董誥諾穆親蒋賜􅙺韓鑅常青紀昀徳明鐵保劉墉竇光鼐慶桂李世傑劉峩䖍禮寳喀寧阿胡季堂姜晟玉徳福長安金簡徳成張若停舒常李綬巴彦學哈福納陸錫熊巴忠徳勒克蘓凌阿劉秉恬吉夣熊吴省欽因公降革㽞任各案俱准其開復兵部謹題為欽奉恩詔事該臣等本年正月初一日欽奉恩詔内開一内外官員有因公罣悮降革㽞任者該部查明奏請開復欽此查乾隆四十五年欽奉恩詔經吏部奏定章程在京三品以上官員有部議降級革職㽞任部議降革奉㫖従寛㽞任并革任註冊各案将事屬因公在恩詔以前者開列清单具題應否開復之處恭候欽定等因奏准在案兹本年欽奉恩詔開復降革㽞任條欵于本年五月二十一日據吏部知照現照四十五年奏定章程辦理等因移咨前来併據在京各該旗将大小官員事故開録案由陸續造冊咨送到部除在京三品以下官員應行開復者隨案附入彚題未經送到外省駐防大臣官員均俟造冊到齊臣部另行查核具題其大員内降革案件從前吏部議處之案臣部俱照原奏行令該衙門查核辦理今将正黄旗漢軍都統存㤗等十員因公罣悮各案或係照例降級㽞任或係部議降調革職奉㫖從寛㽞任臣部查明均在本年正月初一日欽奉恩詔以前摘叙案由另繕清单進呈其應否開復之處恭候欽定俟命下之日行文各該處一體遵照等因乾隆五十五年六月十一日題本月十四日奉㫖存㤗喀寧阿慶桂伍岱諾穆親富鋭徳福徳明鄂岳永安因公降革留任各案俱准其開復臣等謹案虞書稱御衆以寛又曰宥過無大盖謂法以簡而易行而徳之廣運者彌至也我皇上懋賞庶僚叙功為最即有一事之弗察微𤯝之偶留皆荷聖徳含宏曲加成就兹者誕膺鴻慶鬯發徳音無有小大之臣胥賜一階而又寛仁及下惟是不咎既往嘉與維新竊伏念羣工之策力方奮切扵退思而洪量之并包益優容扵使過其曷不感承日月之照而湔沐扵雨露之膏者乎詔直省儒學以正貢作恩貢次貢作嵗貢禮部為欽奉恩詔事本年正月初一日詔欵内開各省儒學以正貢作恩貢以次貢作嵗貢欽此該省府州縣學如係應貢年分自應照例舉行即間有學分歇貢之年亦應查照次年舉行之例辦理其已經考准之嵗貢照例換給恩貢執照相應通行各該學政一體遵照辦理順天省考准恩貢九十八名嵗貢九十八名奉天省考准恩貢九名嵗貢九名江蘓省考准恩貢五十八名嵗貢五十八名安徽省考准恩貢六十九名嵗貢六十九名江西省考准恩貢九十三名嵗貢九十二名浙江省考准恩貢九十四名嵗貢九十三名福建省考准恩貢五十四名嵗貢五十二名湖北省考准恩貢七十七名嵗貢七十六名湖南省考准恩貢七十八名嵗貢七十五名河南省考准恩貢一百十八名嵗貢一百十八名山東省考准恩貢一百二十三名嵗貢一百二十一名山西省考准恩貢一百十四名嵗貢一百十四名陕西省考准恩貢一百三名嵗貢八十八名四川省考准恩貢一百二十六名嵗貢一百二十五名廣東省考准恩貢七十九名嵗貢五十六名廣西省考准恩貢六十四名嵗貢六十三名雲南省考准恩貢四十四名嵗貢四十四名貴州省考准恩貢六十二名嵗貢四十九名詔旌滿漢孝子順孫義夫節婦禮部謹題為彚題旌表事本年正月初一日恭奉恩詔滿漢孝子順孫義夫節婦該管官具題交禮部核實賜旌隨行知各旗駐防兹據各該旗都統總管内務府大臣并各省駐防将軍都統副都統城守尉等咨送節婦三百五十六口貞女一口造具冊結均属孝義兼全阨窮堪憫請給銀建坊應如所請准其旌表俟命下之日行文户部各給建坊銀三十兩聴本家自行建坊其左右翼節孝祠内設牌之處行文工部照例遵行乾隆五十五年十二月十三日奉㫖依議又題為彚題旌表事據各府尹督撫學政咨送孝子四名孝女一口順孫一名節婦四百五十六口貞女二十口造具冊結均屬孝義兼全阨窮堪憫請給銀建坊應如所請准其旌表俟命下之日行文各省轉行該地方官各給建坊銀三十兩聴本家自行建坊其各州縣㕔節孝祠内設牌之處照例遵行又節婦六口循分守節已符年例亦應如所請給與清標彤管匾額并令各該地方官鐫刻姓氏扵碑内載入本州縣誌書同日奉㫖依議臣等謹按膠黌之重明經閭里之嚴旌淑凡以興行育徳敦教化而樹風聲者也在昔堯舜之世命司徒教以人倫使知父子有親君臣有義夫婦有别長㓜有予朋友有信至三代設有庠序學校扵是秀民沐詩書之澤比户循禮義之防彬彬然稱醇俗焉我皇上既隆賔興以造士復舉鄉飲以序賢比户淳龎四民則傚咸幸承平蒙福相與詠聖澤扵無疆迺者成均之選宅里之旌人才衆多風化逾茂是我皇上以徳為立教之原即以徳為得夀之本久扵其道而化成誠逺軼乎唐虞三代之盛也歟八旬萬夀盛典卷六十三
