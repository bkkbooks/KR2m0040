不得踰四品七品不得踰五品八品以下不得踰七品等因又乾隆五十一年軍機會議武職增列官階以足十八階之數與文職相埒至封典名號一二品封為將軍三四品封為都尉五六七品封為騎尉八九品封為校尉等因又乾隆五十二年臣部議準河南山東河營協辦守偹作為從五品給與從五品封典等因各在案今此次恭遇恩詔應封各官應照厯奉諭旨及題定條例限二年內將履厯封贈代數該員妻室存殁姓名開注曾否受封及封過何項官爵在京滿洲蒙古漢軍八旗官員由各該都統在外駐防官員由各該將軍都統副都統城守尉等官緑營官員由各該省督撫提鎮將所屬應封各官職名查明取具印文佐領圖結及同鄉官印結造册送部臣部查明照例題封冉查吏部八九品佐雜請封各員例不具題揭送內閣撰給敕命武職八九品請封各員自應仿照吏部之例畫一辦理合併聲明恭候命下臣部行文八旗各直省駐防緑營一體遵照臣等未敢擅便謹題請旨本年二月二十九日題三月初七日奉旨依議吏部題請封典給過誥敕京官一品受封八員二品受封二十員貤封三員三品受封七員貤封五員四品受封十一員貤封十員五品受封二百五十六員貤封九十四員六品受封二百三十四員貤封一百十八員七品受封二百二十五員貤封一百十八員八品受封二百九十四員貤封八十六員九品受封一百六十四員貤封一百三員外官一品受封二員二品受封七員貤封十員三品受封四員貤封十員四品受封四十七員貤封四十四員五品受封三十四員貤封七十七員六品受封三十四員貤封四十四員七品受封八十二員貤封三百八十五員八品受封十九員貤封九百三十四員九品受封二員貤封三百十六員其未經到部者照例陸續題結兵部題請封典給過誥敕武職一品受封二十八員二品受封五十八員貤封六員三品受封一百七十八員貤封二十七員四品受封三百八員貤封五十一員五品受封三百六十一員馳封八十五員六品受封七百五十九員馳封一百五十二員七品受封二百零一員貤封一百九員八品受封三十六員貤封三員九品受封五十三員貤封二員其未經到部者照例陸續題結臣等謹按封贈之制所以體臣下顯親之情而即以勵其身典至巨也恩至渥也唐宋以來或遇郊赦偶行或非達官弗與既多濫舉且侈空言方今聖訓煌煌臣等恭讀御製題告身辭謂我國家一掃厯代陋習文武官制誥惟視其品之大小為髙下明訓數語足以彰其前而朂其後揆聖人是彛是訓之大義即聖人教忠教孝之深思至于恩澤覃敷則未嘗不曲為推暨是以一人有慶百爾承庥折圭擔爵之儔咸得捧鸞書而志喜又且區分等級定制莫踰旁及族姻私衷畢逹不特我朝推恩之隆超軼前代我皇上行慶之茂又豈載筆所能殫述者哉詔賜內外滿漢文武各官加一級其因公罣悮降革留任者開復之吏部謹題為欽奉恩詔事該臣等議得乾隆五十五年正月初一日欽奉恩詔內開一內外文武官員有因公罣誤降革留任者該部查明奏請開復欽此伏查乾隆四十五年欽奉恩詔經臣部奏定開復章程在京三品以上官員有部議降級革職留任及部議降革奉旨從寬留任併革任注册各案行文各衙門造册送部將事屬因公在恩詔以前者均開列清單具題應否開復之處恭候欽定等因具奏奉旨知道了欽此欽遵辦理在案今恭逢乾隆五十五年正月初一日恩詔據各該衙門將三品以上大員任內所有事故先後造册到部除在京四品以下官員及在外大小各官均俟造册到齊之日臣部另行查辦具題所有大員內如降革案件從前係兵部內務府議處之案應行令該衙門查核辦理今將大學士公阿桂等任內因公降革留任各案在本年正月初一日欽奉恩詔以前者摘敘案由繕寫清單進呈其應否開復之處恭候欽定俟命下之日行文各衙門一體遵照臣部未敢擅便謹題請旨乾隆五十五年六月初二日題本月初五日奉旨阿桂和珅嵇璜王杰扎郎阿彭元瑞瑪興阿金士松巴延三董誥諾穆親蔣賜􅙺韓鑅常青紀昀德明鐵保劉墉竇光鼐慶桂李世傑劉峩虔禮寶喀寧阿胡季堂薑晟玉德福長安金簡德成張若停舒常李綬巴彥學哈福納陸錫熊巴忠德勒克蘇凌阿劉秉恬吉夢熊吳省欽因公降革留任各案俱準其開復兵部謹題為欽奉恩詔事該臣等本年正月初一日欽奉恩詔內開一內外官員有因公罣悮降革留任者該部查明奏請開復欽此查乾隆四十五年欽奉恩詔經吏部奏定章程在京三品以上官員有部議降級革職留任部議降革奉旨從寬留任并革任注册各案將事屬因公在恩詔以前者開列清單具題應否開復之處恭候欽定等因奏準在案兹本年欽奉恩詔開復降革留任條欵于本年五月二十一日據吏部知照現照四十五年奏定章程辦理等因移咨前來併據在京各該旗將大小官員事故開録案由陸續造册咨送到部除在京三品以下官員應行開復者隨案附入彚題未經送到外省駐防大臣官員均俟造册到齊臣部另行查核具題其大員內降革案件從前吏部議處之案臣部俱照原奏行令該衙門查核辦理今將正黃旗漢軍都統存泰等十員因公罣悮各案或係照例降級留任或係部議降調革職奉旨從寬留任臣部查明均在本年正月初一日欽奉恩詔以前摘敘案由另繕清單進呈其應否開復之處恭候欽定俟命下之日行文各該處一體遵照等因乾隆五十五年六月十一日題本月十四日奉旨存泰喀寧阿慶桂伍岱諾穆親富鋭德福德明鄂嶽永安因公降革留任各案俱準其開復臣等謹案虞書稱御衆以寬又曰宥過無大蓋謂法以簡而易行而德之廣運者彌至也我皇上懋賞庶僚敘功為最即有一事之弗察微眚之偶留皆荷聖德含宏曲加成就兹者誕膺鴻慶鬯發德音無有小大之臣胥賜一階而又寬仁及下惟是不咎既往嘉與維新竊伏念羣工之策力方奮切于退思而洪量之并包益優容于使過其曷不感承日月之照而湔沐于雨露之膏者乎詔直省儒學以正貢作恩貢次貢作嵗貢禮部為欽奉恩詔事本年正月初一日詔欵內開各省儒學以正貢作恩貢以次貢作嵗貢欽此該省府州縣學如係應貢年分自應照例舉行即間有學分歇貢之年亦應查照次年舉行之例辦理其已經考準之嵗貢照例換給恩貢執照相應通行各該學政一體遵照辦理順天省考準恩貢九十八名嵗貢九十八名奉天省考準恩貢九名嵗貢九名江蘇省考準恩貢五十八名嵗貢五十八名安徽省考準恩貢六十九名嵗貢六十九名江西省考準恩貢九十三名嵗貢九十二名浙江省考準恩貢九十四名嵗貢九十三名福建省考準恩貢五十四名嵗貢五十二名湖北省考準恩貢七十七名嵗貢七十六名湖南省考準恩貢七十八名嵗貢七十五名河南省考準恩貢一百十八名嵗貢一百十八名山東省考準恩貢一百二十三名嵗貢一百二十一名山西省考準恩貢一百十四名嵗貢一百十四名陕西省考準恩貢一百三名嵗貢八十八名四川省考準恩貢一百二十六名嵗貢一百二十五名廣東省考準恩貢七十九名嵗貢五十六名廣西省考準恩貢六十四名嵗貢六十三名雲南省考準恩貢四十四名嵗貢四十四名貴州省考準恩貢六十二名嵗貢四十九名詔旌滿漢孝子順孫義夫節婦禮部謹題為彚題旌表事本年正月初一日恭奉恩詔滿漢孝子順孫義夫節婦該管官具題交禮部核實賜旌隨行知各旗駐防兹據各該旗都統總管內務府大臣并各省駐防將軍都統副都統城守尉等咨送節婦三百五十六口貞女一口造具册結均屬孝義兼全厄窮堪憫請給銀建坊應如所請準其旌表俟命下之日行文户部各給建坊銀三十兩聽本家自行建坊其左右翼節孝祠內設牌之處行文工部照例遵行乾隆五十五年十二月十三日奉旨依議又題為彚題旌表事據各府尹督撫學政咨送孝子四名孝女一口順孫一名節婦四百五十六口貞女二十口造具册結均屬孝義兼全厄窮堪憫請給銀建坊應如所請準其旌表俟命下之日行文各省轉行該地方官各給建坊銀三十兩聽本家自行建坊其各州縣廳節孝祠內設牌之處照例遵行又節婦六口循分守節已符年例亦應如所請給與清標彤管匾額并令各該地方官鐫刻姓氏于碑內載入本州縣志書同日奉旨依議臣等謹按膠黌之重明經閭里之嚴旌淑凡以興行育德敦教化而樹風聲者也在昔堯舜之世命司徒教以人倫使知父子有親君臣有義夫婦有别長幼有豫朋友有信至三代設有庠序學校于是秀民沐詩書之澤比户循禮義之防彬彬然稱醇俗焉我皇上既隆賔興以造士復舉鄉飲以序賢比户淳龎四民則效咸幸承平蒙福相與詠聖澤于無疆乃者成均之選宅里之旌人才衆多風化逾茂是我皇上以德為立教之原即以德為得夀之本久于其道而化成誠逺軼乎唐虞三代之盛也歟八旬萬夀盛典卷六十三
