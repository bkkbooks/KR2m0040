  text: 乾隆五十五年萬夀覃恩詔賜王公以下及年過六十之外藩福晉妻室滿漢大臣命婦等綵幣有差户部謹題為欽奉恩詔事乾隆五十五年正月初一日欽奉恩詔內開臣部應辦事宜謹按欵比照節次例案分晰酌議臣等議得恩賜王公以下覺羅十五嵗以上一欵臣部酌議和碩親王賞給大蟒縀一匹暗蟒一匹粧縀一匹片金一匹藍素一匹字縀一匹衣素一匹紗一匹彭縀二次大縀二匹共十二匹多羅郡王賞給大蟒縀一匹暗蟒一匹粧縀一匹字縀一匹衣素一匹紗一匹宫紬一匹倭縀一匹次大縀一匹彭縀一匹共十匹多羅貝勒賞給大蟒縀一匹三等蟒一匹大閃縀一匹大縀一匹衣素一匹洋縀彭縀紗各一匹共八匹固山貝子賞給小蟒縀一匹大閃縀一匹洋縀一匹衣素一匹彭縀一匹紗一匹共六匹鎮國公輔國公賞給三等蟒一匹藍素一匹彭縀一匹共三匹未入八分公賞給小閃縀一匹大縀一匹紗一匹共三匹鎮國將軍輔國將軍賞給大縀一匹紗一匹共二匹奉國將軍奉恩將軍賞給次大縀一匹綾一匹共二匹宗室十五嵗以上者賞給彭縀一匹生素絹一匹共二匹覺羅十五嵗以上者賞給彭縀一匹又恩賜公主以下至格格一欵臣部酌議固倫公主賞給大蟒縀一匹金線蟒一匹粧縀一匹次粧縀一匹中錦一匹草錦一匹片金一匹金字縀一匹大縀一匹彭縀一匹共十匹和碩格格小蟒縀一匹小閃縀一匹三等蟒一匹大縀一匹彭縀一匹紗一匹共六匹多羅格格賞給小蟒縀一匹小閃縀一匹大縀一匹彭縀一匹共四匹多羅貝勒之女多羅格格併固山格格賞給暗蟒一匹次大縀一匹共二匹公之女格格賞給三等蟒一匹次大縀一匹共二匹又恩賜王妃以下奉恩將軍妻以上年過六十者一欵臣部酌議和碩親王福晉賞給大蟒縀一匹暗蟒一匹草錦一匹片金一匹藍素一匹字縀一匹衣素一匹紗一匹彭縀一匹大縀一匹共十匹多羅郡王福晉賞給大蟒縀一匹金線縀一匹草錦一匹倭縀一匹字縀一匹衣素一匹紗一匹宫綢一匹共八匹多羅貝勒福晉賞給大蟒縀一匹粧縀一匹草錦一匹字縀一匹衣素一匹洋縀一匹共六匹世子長子夫人賞給小蟒縀一匹粧縀一匹洋縀一匹衣素一匹共四匹貝子夫人賞給小蟒縀一匹粧縀一匹洋縀一匹衣素一匹共四匹鎮國公輔國公妻賞給粧縀一匹藍素一匹共二匹鎮國將軍輔國將軍奉國將軍奉恩將軍妻賞給大縀一匹相應行文宗人府八旗將應賞縀匹數目造册咨送臣部賞給又恩賜外藩王貝勒貝子公扎薩克台吉塔布囊及其福晉妻室年過六十者一欵臣部酌議外藩親王賞給小蟒縀一匹大閃縀一匹衣素一匹洋縀一匹紗一匹紡絲一匹杭紬一匹共七匹郡王賞給小蟒縀一匹大閃縀一匹次衣素一匹紗一次杭紬一匹共五匹貝勒賞給小蟒縀一匹大縀一匹彭彭一匹共三匹貝子賞給三等蟒一匹次大縀一匹共二匹公賞給大縀一匹扎薩克台吉塔布囊額駙等賞給彭縀一匹親王之福晉賞給小蟒縀一匹小閃縀一匹洋縀一匹紗一匹生素絹一匹羅一匹共六匹郡王之福晉賞給三等蟒一匹小閃縀一匹次洋縀一匹紗一匹生素絹一匹共五匹貝勒之夫人賞給三等蟒一匹衣素一匹彭縀一匹杭紬一匹共四匹公之妻賞給次大縀一匹生素絹一匹共二匹扎薩克台吉塔布囊之妻賞給彭縀一匹相應行文理藩院轉行各蒙古地方將年過六十者應賞縀匹數目造册移送理藩院核明轉送臣部賞給又恩賜滿漢大臣及命婦年過六十者一欵臣部酌議滿漢一品二品大臣年六十以上者賞給小閃縀一匹衣素一匹滿漢一品二品官命婦年六十以上者賞給小閃縀一匹次洋縀一匹相應行文八旗等各衙門造册咨送臣部賞給俟賞完之日將所賞縀匹數目另行奏聞以上酌議應賞條欵恭候命下臣部入載例册遵行臣等未敢擅便謹題請旨二月十三日題十五日奉旨依議户部縀匹庫賞過縀匹開列于後親王六位縀各十二匹共七十二匹郡王五位縀各十匹共五十匹貝勒四位縀各八匹共三十二匹貝子四位縀各六匹共二十四匹鎮國公三位縀各三匹共九匹輔國公五位縀各三匹共十五匹未入八分公五位縀各三匹共十五匹鎮國將軍十五位縀各二匹共三十匹輔國將軍二十位緞各二匹共四十匹奉國將軍二十位縀各二匹各四十匹奉恩將軍九十二位縀各二匹共一百八十四匹宗室十五嵗以上者二千零六十六人縀各二匹共四千一百三十二匹覺羅十五嵗以上者一千五百六十八人縀各二匹共三千一百三十六匹以上共賞過蟒粧片金等縀七千七百七十九匹固倫公主一位縀十匹多羅格格九位縀各四匹共三十六匹固山格格三位縀各二匹共六匹格格九位縀各二匹共十八匹郡王福晉二位縀各八匹共十六匹公之妻四位縀各二位計共八匹將軍之妻十五位縀各一匹共十五匹以上共賞過蟒籹等縀一百九匹喀爾喀親王二位縀各七匹共十四匹貝子一位縀三匹貝子一位縀二匹輔國公一位縀一匹台吉二員縀各一匹共二匹敖漢貝子一位縀二匹喀拉沁公一位縀一匹青海吉吉一員縀一匹都爾伯特台吉一員縀一匹郭爾羅斯台吉一員縀一匹克什克騰台吉一員縀一匹鄂勒特台吉一員縀一匹巴林額駙一員縀一匹以上共賞過蟒粧等縀三十一匹科爾沁固倫公主一位縀十匹和碩格格六位縀各六匹共三十六匹王之女格格二位縀各四匹共八匹貝勒之女格格四位縀各二匹共八匹固山格格九位縀各二匹共十八匹公之女格格十五位縀各二匹共三十匹喀爾喀多爾格格一位縀四匹阿拉善多羅格格一位縀四匹固山格格一位縀二匹公之女格格一位縀二匹阿霸垓郡王之母一位縀五匹貝子夫人一位縀三匹公之妻二位縀各二匹