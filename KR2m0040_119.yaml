body:
  text: 欽定四庫全書八旬萬夀盛典卷一百二十歌頌四十萬夀頌集洪範字二十四章謹序原任兵部主事舉人臣周嘉猷臣惟尚書一編為帝王治天下之要而敷言福徳精騐天人尤莫備於洪範我皇上執中建極久道化成凡敬天法祖愛民勤政之心積五十五年如一日巍巍乎三皇不足四五帝不足六全徳全福夀身夀世為自古史牒所未有猶復謙衷彌劭稽古立訓伏讀御製景福宫五福頌發明帝王之福乃天下之公非一身一家之私而於讀洪範篇中備論不能去三日憂之義大哉王言於洪範三致意焉近以夀躋八旬製八徴耄念之寳御書寳記石刻頒賜中外今歳重華宫茶宴即以命題聫句仰見我皇上凝承寳位孜亹日新誠求保赤之懷靡間夙夜凡庶徴之雨暘寒燠風與帝徳之肅乂哲謀聖無不以時相應真所謂徳者福之基福者徳之致聖夀無疆億萬斯年受天之祜實基於此兹際大慶昌期普天歡戴臣草茅下士敬效嵩呼謹就洪範之文綴集成頌拜手稽首以獻頌曰皇帝聖哲則天之行日疆以敬俊徳克明康乂八極協正三辰恒于其道上下平成一章聖聖洪謀恭天成命惟皇一心聰聼彛訓建厥三無稽之百行敷聞在下以明庻政二章我皇聼政惟日惟時事豫則立政行不疑無僣于大無斁于微若金受範訓汝庶司三章惟帝知人擇能而使司土司稼司木司水同心協恭以為民紀用相國家其惟吉士四章為父為母聖人憂民思其好惡聼其上陳吉光福草王心不賓民無疾苦王心則寜五章食為民天占于星土五日一風十日一雨我稼既同穡人為叙三時不􅊣惟皇鍚予六章二月初吉帝乃省方風陳下士知柔知剛訪事考言正隲其邦我王一豫義行徳章七章帝念聖人立人倫極司冦攸居龜䝉之側玉路方來祀事不􅑯師道用章四方為則八章歳徴俊乂聖夀作人近光日下占協用賓徳成而上言惟有倫師師者士皇路共遵九章庶邦惟正帝曰無徴榖蕃歳有富俾斯民冬日之燠夏日之隂天髙徳大聖人成能十章帝命士師敬而聼之無辜弗虐惟貎有稽明其曲直用休用威革心悔咎民各有知十一章人之夀考國之乂寧八十九十歳歳賔興乃保厥居乃康其身帝鍚之福三夀作朋十二章富有王言言歸有徳一日百章風行水立金玉其光日星其色惟天聰明惟帝時克十三章吉日之章既同既好百家聞知疇能守道洪惟睿思歳月稽考三百十言明徴是保十四章七徳不違六師有備睿訓皇皇明視無外頗側既平金革不事内寧外静風光月霽十五章帝念水邦時用稽謀沈陻其乂震蕩無憂隂隂夏木驛驛平疇既從既作八方䝉休十六章天叙有則厥惟五倫聖人在上使民興能歸于一徳子子臣臣保受王命光大髙明十七章天子建極四國是正徳協九成作者謂聖五色八風金貞玉潤為事為民不違天聼十八章光天之下政一道同士恒為士農恒為農惟正是乂惟吉是從聖有恒訓草上之風十九章大徳受命福備于身我皇貞範蕩蕩明明保夀者相立聖人心時乃天道無為而成二十章帝嗣蕃昌帝身康吉若木敷光五星從徳福備天家及于邦國皇初以來一人立極二十一章時惟八月星夀于箕三呼協吉庶民子來近邦嚮徳外蕃畏威紀成王㑹天下同歸二十二章歳以日成三百有六克一皇心無日不肅敬天保民雨暘寒燠占事知來休徴協卜二十三章八徴是念作為天章于時保之邦乃大昌福髙五帝道範三王共天無極曰夀而康二十四章萬夀恭擬柏梁體詩二百韻舉人臣梁承雲符開聖紀象握乾辰樞汁度循璣璿挺桐庻彚均受甄色羅九勲相鈎聫庶徴有兆冲念宣寳華照爛丹書鐫歛時鍚福蕃祉駢八旬算演椿八千幬覆歡臚和蘭荃輸曝獻觥馳祝延願億萬載金甌堅矢音稽􅉔敶諸篇維皇尊祖敬且䖍羮牆對越時仔肩山髙長白勢蜿蜒江澄鴨緑波潺湲源流推闡核實詮如堯伊耆周澗瀍如日黄道星紫躔字頭十二龍連卷編年紀月溯所沿自東唘宇定鼎燕寢廟翼翼桷有梴四勤象載揚虹旃卬維世澤垂杯棬薦珍蒲海温則瑄瑶光一氣騰珠櫋堂開五福五代傳緜緜𤓰瓞孫曽元馨香答貺彌勤拳維皇懋學通神淵貫通百代如珠穿春風進講開經筵雅歌抑戒已事竣乾元闡㫖提愚顓自然自勉理畢硏天心炯炯月在川子莊輔嗣猶言筌躡根理窟文運旋炳哉謨典中天懸煌哉雅頌五緯連茂時對物逸興遄頫仰上下叅魚鳶指鴻筆如修椽維皇文治輝八埏駢羅四庫遺跧史抽乙乙經便便側稽子集紛丹鉛小善初不遺諓諓綵毫垂露春花娟掃除落葉秋風扇皇言舄奕砭拘攣河海可納細不捐淵源津溯深奫潫更三閣建目共撋四羊三豕誰結悁太乙下視青藜然光明勝入多寳船維皇神武算萬全山川險要聚目前制勝券握韜鋒鋋通三萬里揮霓鞭憫彼螳臂張空弮蠢爾蜃室嘘腥涎衆頑跂跂百足蚿我徒増増疾惡鸇將軍鎻甲馳青􅗬一聲霹靂鳴弓弦禽不得瞥獸不猭欃雲落地消連蜷洗兵雨過戰血湔囬帆風送紅旗還俘則獻之組可服則徠之刄可眠銅銘髙勒山谸谸名王目懾斿滇滇簫勺羣慝昏嚚悛神明淵黙曕九天維皇重士崇畯賢文星藻聚宻織緶上雍考度繩櫨枅湯湯璧海波洄㳬榱華倒影垂鬘鬋井文交綺鱗蜿蟬大昕鼓奏鼉鼘鼘帝勤瑶軫雲軿胥鼚胥㒇戞珮瓀祁祁嶽嶽衣同褰圜橋萬目齊佪儃旁徴獵碣岐陽畋左驂旛旛右騝騝矕文亮在周宣年宇文之說卑戔戔元音絡繹珠更編戢孴星斗移樞璇摩挲雒誦手欲胼醇風所􅀈逮井廛子矜縁督袪便儇衡文使者相馬歅盡收綠駬青驪駽菁莪雅化基儒氊一人丕振斯文權維皇優老曲賜憐七十八十異豆籩非肉不飽加肥牷非帛不煖加純棉恩周千叟藻席挻投壺算合東王純彫觴翠樽來仚仚文縑齒杖歸翩翩儒生亦樂幸華顛三條燭盡帝憫焉一第慰汝窐衡邅一官償汝詩書専春風入顔紅兩顴再拜陛下歌蕩平維皇省俗觀風愆葩瑵指路民嘕嘕克諧徃寗疾苦痊風人雨人善日遷惟春之褀韶且姸函蒙祉福闤闠闐翠鱸折溜河水漣蒼靈放􅜜騰藻韉岱宗嶤嶷鑿巗岍膋蕭肅􅌊升中煙石函竊陋金泥填宸襟自企尼山巔苾芬展敬臨廟堧緇壇文杏花緜芊圍以杞梓松楠楩時中妙契歡􅚳􅚳物華咸樂舒新嫣沂童亦荷恩膏徧浩蕩直到春波邉維皇立政籌㡬先陽開隂闔神為鍵䂓之萬之超輪扁端衡宻㝣東西銓中樞統攝内外員絲毫但懼民生朘百萬那惜水府錢江河屢厪聖慮煎剔鬟表裏區汙沺芟除臠積通濺濺波神來徃珠耀蠙安瀾永息雷風祅䇿功疾不待步鋗旰食景每趖花磚維皇劭農重力田親祈年榖垂紘綖栁絲過雨青仟仟紺轅綴耜洪縻搴自上下下服爾犍餘從同同列町田耎芸夫亦各趨陌阡蛻龍軋軋秧馬騫西風壓畆盈霜秈千斯萬斯富廪廯豐年不待瓊茒篿吉夢更復盈魴鱣公堂和樂人獻豜君王猶恐民不饘十七省賦同日蠲抵元化日真宰咽黍膏濃厚慈雲躔維皇至仁及蠕蠉但遺一物心孔㾓恤孤存問矜瘼瘨憫嫠表楔榮女媊協氣旁達非滳涓菢雛亦染天毫鮮綵蝶亦化齋房仙世登成鳩俗蹎蹎風氣初似開漁佃時無凄寒無炎燀民不夭札田不蝝羣仰至徳名無縁維皇徳膏流潺潺維天戬榖垂緜緜􅞹然大戞彌幅􅊷圖橅王㑹驚愚孱衣魚吹角䰅髪鬈花象穹鼻垂蜵蜎日南慕徳如慕羶俶奉冠帯衯𥚹􅝆天西佛子黄教禪祝釐合十袈裟揎觚稜金雀飛翾翾龍象岋嶫盈玉磌堯厨萐䕶瓊漿汧液池波薆敖漢蓮扶榆左見儛偓佺駢田右聼歌彭籛九龍越契津莫舷六帝慙徳徒跼踡龎禠璣貫光揚焆衢尊滿㪺太極泉歸昌竒律鳴䵿絃九如願補康成箋萬夀恭集千字文九言古詩擬柏梁體謹序生員臣施鸞坡欽惟我皇上統紹乎三祖二宗慶衍於一堂五代功懋以武成九次道隆於耄念八徴治開稽古右文則獵碣十章秘書七閣恩溥對時育物則正供四免法駕六廵人瑞斯百歳普旌國夀既千耆合宴盖惟萬事萬理獨操萬化洪鈞是用萬國萬民共仰萬年天子兹五十有五載秋八月慶八旬五福膺圖八風告瑞鍚庶民保極時若歳月日時肆上帝降康兆積京垓億兆有大則豫得全者昌臣陋玷單辭惶疏半觧荷恩施之再造復名厠於諸生三千里䖍叩皇都八萬歳欣逢聖節莫窺萬善當萬方祝嘏之期重次千文代千佛名經之頂文遵令甲虚一而大衍周環韻誌先庚戴九乃當陽叶律成一百一十一句敬歌一徳一心計九百九十九言勉效九如九頌其辭曰臣聞化鈞調斡分隂陽河圖洛書妙義傳羲黄重五位得乃天生地成叶是故宙合若此乎靈長操為員規布則矩絜方自禅通後景祐集我皇歳枝奄茂厥徳曰上章仰惟帝年履八之巨慶微垣耀暉列宿映珠囊川阜納禄率土欣乂康歡侍色笑並聚來昆將福増比嶽御墨懸深堂禹洪念用刻玊謙尊光燕貽夙受赤子心靡忘煒哉盛朝辰拱鍾業煌基命立極治政可具詳崑珍設寳䇿牒嚴守蔵所無逸維知稼而劭農叶奈何弗敬讀召愛二公叶每初正及冬夏馨祭嘗恭鞠感謝壁枇卑履切謹竭承叶雨佳時恵累寸煩悚聼叶推杷執縻踐籍染㳺場已饑慼稷昃食濟銀糧兩釋轉運男婦居充箱仁施宻散既富猶惻傷於兹四沛直省舍稅丁叶奏牋手答丹筆審慮精叶黜浮杜競絲髪洞鑑衡叶誡古左右近戚毁譽登叶壹任賢郡邑佐誰市聲叶弊察去甚渠其㨿切在弦觧更叶慈悲隠切實慎條法刑叶翫易師孔樹論筵對經叶㡬閒恱志庸作歌雲卿叶信夫詩者足以發性情叶箴銘辨說即物理寓誠叶碑辭威逺持約懼虧盈叶過藍善本豈止逼束笙叶鼓磨貞碣字次周非秦叶語研漢晦渭退涇宜升叶貴耳卑目士也姑面牆毛韓糟魄譏令羣疑亡定史誅背晚閏矜孤忠叶篤親表號晉虢嫡嗣䝉叶璧府舊蹟大内多勒楹叶肆收墳簡才俊躭淵英叶中和吹律淡漠儀鳯鳴叶音移工尺琴指歸嵇牀特縣制羙假歌赫也廟存其相殿池環水俶建星麗匡力田孝弟文學起遼荒輶車路遣芥取意熱腸户聆紡績友睦扇亷讓叶畫鷄貎李母育勅趙張斯千養老膳飫資事兄虚黄切谿磻寂釣東綺皆離商華顛尹傳㒺催凌早霜沈機黙攝務宰寵辱平叶翦彫㓕殆息判匪好兵叶伊囬寥野庶牧最肥良西宇杳邈形要摩甘凉恬眠飽飯兒女唱岫岡滿伐閥通世仕帶甲超外營叶官弁優給積罪終莫當坐唘戎索攸徃利軍行音杭問孰嘯惡盗倫投火烹叶林賊顰效霸㨿空羊羊鳥疲獸困捕逐敢云抗叶遥秉堅節躬桓賞殊功叶骸姿矯異紫闕續寫容叶歴舉南幸曲盖因親民叶改陶䟽引抽薪誚宣房别有鹹州鱗石顧眺寧叶皋園榮植梧漆翳槐棠餘諸果實菜叔菽通荷筍薑家安人適覆畆穡從横叶松根桐葉席藳結短亭叶歩瞻岱宗禮器祀素王陪都敦俗頗詠燭照穅慕想翠流白領嶺通真魏唐巖阿凊暑陟口臨塞莊下體雁賓魚妾少熟身叶委羽達賴伯克恥恃盟叶木蘭帷帳射獲飡等城叶動連矢的獨巧紛恐驚叶勸遐振武習勞猷訓并宫門鉅象俠輦陳絳庭叶勿侈禽孟邇亦隨頓顙叶晝徘夕徊垢浴求盤湯宅交談助陋彼寡弱眀叶欲招竟不能致虚見金叶弔黎厭禍封阮扶必興叶盖使陛階拜稽懐畏傾叶冠纓潔楚遵勉綏嘉名叶璇霄静處淑氣潜鬱蒸叶斬新吉采丙夜縁青㝠叶仙衣飄且颻焉出奉常樓端落紙曠典被神京叶轂馳軻接屬國騰服羌露紈璣組職貢羅脩廊尋塗入㑹驢犢駒驘驤劍丸巾瑟百藝輕鵾翔謂君父豫羔酒稱杯觴温言再造黍谷逍寒芒草莽賤愚寐思祗駭惶九如讃雅爵躍俯道旁伏願聖主萬載駕飛龍叶似旦日始髙秋月澄朗叶緜恒沙廣隸首難盡量永與薄海同樂垂虞裳右臣等恭輯八旬萬夀盛典編次八門弁首敬錄宸章而以羣臣所獻書屏繕册諸文仰邀乙覽者釐為歌頌一門附登卷末臣等伏惟聖夀七旬之年御製古稀說申闡頌不忘規之訓著眀敇㡬毖敬鞏謙受福之本懷是以臣等敬録庚子後宸章即以是說為冠以見兹編盛典之非徒事揄揚已也慶逢大耋増齡膺從古帝王未有之洪祉則亦竭天下臣民賛頌之愚而愈無以効菲誠於萬一也然而繪日摹天雖窮逺識候蟲時鳥莫閟發音際兹多夀同文之世親見大聖人郅徳垂於穹表豐功耀於海寰而又嘉瑞駢彰稠恩渥逮一時禮儀告備圖史徴祥億禩昌期疇如今日則夫稍知字義皆當有以發抒愛戴敷寫語言以共鳴厥盛矧荷聖澤陶鈞久涵至教藉此摛毫紀實尤臣子㣲分所宜然書稱賡颺拜手雅誌矢詩遂歌有同情也夫此歌頌之獻臣工恪遵睿訓惟務修辭立誠愳蹈騁博見才之失且焉敢以辭章末萟妄託扵鋪張揚勵之為然或誌遭逄之幸申切感以寫愉組經集之陳備實徴而隸事或服膺御製剏珥筆之所無或援攷方言代舌人而有𫐠攄忱晉祝情至文生與本年恩蠲布詔農民亦獻謝詞賀表譯書外域皆臚吉語其言萬殊而其欣頌之私揔歸一致焉自是閲十年而重賡曼夀皇多彛訓福衍敷言豈啻帝媯歌詠題九萬之瓊牋益竢臣向編摩廣三千之寳牘不其偉歟八旬萬夀盛典卷一百二十
