body:
  text: 欽定四庫全書八旬萬夀盛典卷十二聖徳八仁徳二皇上加恩宗室以乾隆四十七年欽定品秩復以四十八年正月普宴於乾清宫乾隆四十七年九月十五日奉上諭近觀蒙古世襲家譜知各蒙古王公子嗣及閒散台吉塔布囊年已及嵗者俱各按定例給以應得品級頂帶而宗室中除承襲封爵及現有官職外其閒散宗室向無按品給頂之例現在宗支繁衍𤓰􅚩緜延皆我祖宗派系流傳譜列銀潢名登玉牒乃以身無職級竟至與齊民無别殊不足以示親親而崇體制著將王貝勒貝子公子嗣及閒散宗室年已及嵗者俱照蒙古王公台吉塔布囊之例分别給予品級官頂帶宗室現在當差職分較小者准其與閒散宗室一體照例換給官頂在宗室等身有品級自必各知自愛不致蕩檢踰閑其中或有不肖犯法之人亦照蒙古台吉塔布囊之例即行革去官頂如此則扵褒榮之中仍寓勸懲之意藉此可以教育成全而天家子姓俱得邀章服之榮益足昭國家睦族展親之詣甚盛典也所有如何分别嫡庶等第酌給官頂之處著大學士軍機大臣會同宗人府詳悉妥議具奏至聖祖世宗之孫及現在皇子皇孫曽孫元孫軰俱可戴紅絨結頂其如何分别支派逺近准其戴用之處亦著一并妥議具奏再覺羅亦係宗親但派系稍逺向原准其同旗人應試出仕且有任各省州縣者若一體另結官頂扵現行統屬儀制轉多未協毋庸另行議及將此通諭知之御製敦叙殿得句癸夘丙寅斯設宴丗載逮今年憶丙寅八月扵敦叙殿錫宴宗親維時與宴者朕諸叔昆弟子姓凡百人有事未至者尚五十餘人有柏梁體聫句詩逮今癸夘凡三十八年矣彼聚尊及近兹聫卑以全窄嫌庭院席寛就殿墀筵昨嵗加恩宗室分别議及頂戴兹以春正十日嘉宴行慶賀禮本支繁衍至二千人瀛臺敦叙殿墀限扵地隘難以肆筵因扵乾清宫丹陛上錫宴實盛典佳話也數典實因此重成五字篇御製正月十日乾清宫普宴宗室得句誌喜十韻有序癸夘韶開玉琯堯蓂敷十葉之春派毓璇源姬瓞衍萬年之祚昔初紀展親錫宴敞瀛苑而聫賡洎昨秋詔爵宣綸普天潢而示寵懋典踵行扵敦叙廣筵肇唘扵乾清臚子姓者凡二千人支繁十世自王公以及三四品燕衎一堂既増秩以賜金復承筐而授斚序賢序齒孝弟之心油然有本有文禮樂之事備矣仰龍興扵東土慶逮雲礽遡麟趾扵西京恩推水木凖四十九旗之世例爾子孫勉承錫類之榮席百丗餘載之皇圖我國家永迪興仁之教歡申渥闓喜誌長言事成時節藉因縁宗子加官此日全向来閒散宗室無按品給頂之例昨嵗秋因閲䝉古家譜知各蒙古王公子嗣年已及嵗者俱給以頂戴陡恩我宗室支派繁衍轉無職級不足以示親親而崇體制爰降㫖將王貝勒貝子公之嗣及宗室年已及嵗者俱照蒙古王公台吉塔布囊之例分别給予頂戴其宗室現在當差職分較小者亦准其與閒散宗室一體給與頂戴因令大學士軍機大臣㑹同宗人府分别詳議奏聞四代未行或有待自我蒙古世祖定鼎燕京加恩世襲即為今現行例而我宗室除王公以至奉恩将軍各有世襲其餘盡為閒散宗室無頂戴官䘖我皇祖皇考加恩宗室者無所不至而未降斯㫖即予歴四十七年之久亦未思及此昨秋方有此諭豈非舉大事亦必有時節因縁乎一時爰舉乃無愆仁皇憲帝恩垂鑒近派逺支禄永延式詠緜𤓰胥祖澤遂歌行葦列賔筵六朝慶衍葉百億十世居滋人二千我朝宗室皆本支太祖髙皇帝雲礽繁衍已及十世此次與宴自王貝勒貝子公以及三四品頂戴者共一千三百八人其三四品頂戴人員有事不能與宴者五百六十九人合計共二千人各頒賜如意朝珠文玩綺帛銀兩有差起瀋前勲寧忘爾例元後嗣合同然戊戌年因恭閲藎臣列聖實錄得備悉懿親勤勞佐命之勲因降㫖復還睿親王多爾衮封號追諡曰忠並令補繼襲封又豫親王多鐸禮親王代善鄭親王濟爾哈朗肅親王豪格克勤郡王岳託其子孫所襲均非始封之名交軍機大臣㑹同宗人府議復其原號並補置牌位配享子嗣太廟至蒙古乃元之後裔其王公台吉塔布嚢等年巳及嵗者尚各按定例給以應得品級頂戴况宗室閒散名登此可玉牒自應一體定議給予頂戴且俾各知自愛藉以教育成全益足昭國家展親睦族之誼簪纓被矣禮義朂家室肫乎孝弟先醉酒莫言兹飽徳篤親匪曰慢興賢已欣設席長㓜序復有承筐次第宣共沐天庥示海宇大清國祚萬斯年臣等謹案黄帝二十五宗得姓者十四人祚延於後髙陽髙辛氏有才子十六族世濟其美堯典稱九族親睦周詩美同姓大封古帝王祥洽貞齡茂鍾世緒由来尚矣我皇上寳籙凝釐萬年昌祚遡自太祖以下至奉字派為十一世敬念祖宗延禧之厚聖神篤祜之隆於乾隆四十七年欽定宗室品秩寵班冠服典懋肆筵維時萃二千人之衆介眉獻觥歡臚慶牒盖立愛自親始興仁以孝弟先扵以知聖天子令徳夀豈其恩誼為最摯者矣皇上優眷臣工乾隆四十九年命自三品以上年逾七十者俱免早朝五十一年賞降革留任官員仍支俸米五十三年諭閣臣不兼部務者並准俸米雙支如例乾隆四十九年九月二十七日奉上諭朕年老寡寐每日夙興原即扵養心殿視事諸臣自家入朝趨直住居稍逺者其起身必當更早大學士嵇璜蔡新伍彌泰俱年逾七旬現交冬令氣候漸冷若衝寒早起扵頤養之道究屬非宜嗣後嵇璜蔡新伍彌泰俱著加恩令其扵日出後進朝如遇風雪沍寒之日即不入直亦可其三品以上七旬之大臣凖此以示朕優眷老臣之意乾隆五十一年二月初七日奉上諭向来在京文武官員有罰俸處分者止罰俸銀其俸米仍支領而降革留任人員因重分較重是以降級留任者照所降之級支領俸米革職留任者停其支領第念在京官員多仰藉禄糈以資辦公若将俸米一併停減當差未免拮据其令自今以後凡在京文武官員有降級革職留任者止将俸銀分别停減其應得俸米俱准其照原品支領以示朕體恤臣工禄以養㢘之意且京師多米流通亦一善事也乾隆五十三年七月初二日奉上諭向来六部尚書侍郎每年俱給予雙俸雙米而大學士之兼管部務者則照尚書例俸米俱屬雙支其不兼部之大學士每年係雙俸單米大學士領袖班聫職分較大所得俸米比尚書轉少殊未允協嗣後大學士之不兼部務者亦著加恩給與雙俸雙米以符體制臣等伏覩我皇上推恩臣工有加無已自夫夀逾古稀勤勞如一沍寒戒候猶求衣問燎之不遑迺蒙眷愛耆臣詔扵日出趨直凡兹有位靡弗忭勉之交深者矣敬惟皇上徳懋於勞已而仁實周扵恤人即如禄糈之頒或分非應得或例不兼支皆荷優予之恩以示同仁而符體制臣等益惟殫夙夜之誠以庶㡬敬事後食之義用冀稍酬豢養云爾皇上加恩武臣乾隆四十六年命増内外官養㢘並諭一切賞用凖支正省其各省原扣兵丁名糧改挑實額乾隆四十六年六月初四日奉上諭向来各省提鎮以下至將弁等俱有分扣兵丁名糧作為得項者此固舊例如此且武職衙門非如文員之定有養㢘是以即将此項為公用養贍之資但此例定自何年或係雍正年間議定文職養㢘時一體酌給其每員應得若干係何名目各省是否一例按照地方情形品級大小酌定數目多寡又或各省參差不同著交各該部将定例年月及現在欵項數目分晰查眀開單具奏至此事因仍已久恐又有於定數外私自尅扣増添者若每員任内私扣一名後任積漸加増侵扣無所底止督撫姑息不加查察久之即為虚額空糧之弊尤不可不徹底清查著通諭各督撫将各省提鎮以下武職現在分扣名糧實數及有無私添之處查明據實具奏此事既久朕槩従寛不究若稍有𨼆匿或致别經查出惟該督撫是問将此通諭知之乾隆四十六年八月十五日奉上諭國家設民衛民簡核軍實期扵行伍整齊兵額充足如兵丁等紅白事件従前設有生息恵濟銀兩以資賞卹後因生息名色有闗國體特敇停止昨據阿桂奏陜甘添兵案内籌及賞卹聲請酌復恵濟銀兩朕以國家賞兵之費藉商生息支給究屬非宜已𫝊諭阿桂等令其動用正項開銷矣兹袁守侗海禄前赴行在令軍機大臣傳㫖詢問直𨽻雲南賞兵銀兩支銷欵項據稱直𨽻裁扣公糧銀二萬兩雲南裁扣公糧銀一萬六千餘兩以備賞用等語看来各省大都如此兵丁紅白銀兩原係加恵營伍格外施恩若因此裁扣名糧致兵額不足殊非核實營伍之道况今户部帑項豐盈各省藩庫積存充裕即現在京營添兵四千九百名陜甘二省各營添一萬二千九百餘名其馬步糧餉合之各省兵賞卹紅白銀兩約筭嵗支尚不及百萬國家何靳此費不令開銷正帑而各省乃紛紛裁扣名糧又且請復生息甚無謂也朕臨御四十六年以来惟事事以敬天勤民為念凡三次普免天下地丁錢糧兩次普蠲各省漕糧以及遇灾即賑總計何啻萬萬又並未加増賦税仰荷上蒼嘉祐開拓邊陲府蔵殷實國用充饒朕又豈肯稍存靳惜致令有司開聚斂尅扣之端乎所有各省營伍賞卹兵丁紅白銀兩自乾隆四十七年為始著扵正項支給造册報部核銷至各省提鎮以下武職貟弁俱有應得坐糧馬乾等項前於六月内業經降㫖通諭各省督撫將各該省武職所得公項逐一查明覆奏俟奏報到齊令軍機大臣㑹同該部核辦照文員之例議給賞養㢘其所扣兵餉即可挑補實額核計添給養㢘嵗支亦不及二百萬兩官員既無拮据而各省又増添兵力於營伍大有禆益朕御極之初户部庫項不過三千萬餘兩今已増至七千餘萬復有何不足而不加恵天下散財以得民乎所有辦理添補兵額紅白賞卹銀兩及裁添名糧養㢘縁由明晰曉諭中外知之臣等伏惟我國家撫御承平官有常禄不於文武生區别之見邇年來皇上恩加軍旅優恤戎行特奉温綸兼籌贍養之費自専閫以逮末弁胥命與文職一體増給養㢘復申諭一切賞用悉予嵗支其原扣名糧改補實額俾免虚糜盖聖天子於持平之中寓核實之道因時酌劑而不使習沿例事致恩澤之或有未均也立法如是其周施仁如是其溥以視唐府兵致假人為傭宋屯軍僅給錢宴犒其本末輕重何如也㢤皇上加恵寒畯疊舉大挑之典乾隆四十六年詔舉行如例五十二年恩命於㑹試榜前舉行並給年老舉子職䘖有差分載門盛事乾隆四十六年五月初五日奉上諭各省大挑舉人分發試用原以疏通壅滯俾得及鋒自試向例原以省分大小酌定挑數自乾隆三十七年壬辰大挑部臣始以逺省挑十之六近省挑十之五定例請㫖固為邊逺士子跋渉較艱格外優恤起見而未思及近省中式者本来人多逺省本來人少兹朕閲本年各省大挑舉人名單内所挑近省科分有逺至三十五六年者而逺省科分冣久總不過二十餘年揆其所以盖因直𨽻江浙等省近係中式舉人㑹試三科後始行揀選而雲貴川廣等逺省㑹試一科後即行揀選是以逺省科分略深者業已挨班選用其得官已較近省為優今大挑舉人若再按五六分挑取則大省科分較深之舉人轉多壅滯扵一視同仁之道未為平允除本年已經辦畢毋庸再議外至乾隆五十二年丁未科再加恩舉行大挑時無論省分逺近但就人數多寡均匀挑取俾各省士子均得乘時自効以示朕加恵寒畯之至意乾隆五十二年三月二十一日奉上諭向来大挑舉人俱於㑹試榜後該部定期奏請揀選但念各省舉人㑹試旅食京師若俟榜發後再行挑選未免又需時日此次大挑舉人著即在榜前辦理俾得及早回籍毋需守候以示體恤再此内有年老舉人精力巳衰情願得受京䘖者並著派出揀選之王大臣照上屆之例按其年齒分别存記俟榜發後開單具奏照例賞給職䘖用昭恵愛耆齡夀考作人至意臣等伏惟四方多士幸際昌辰羣霑慶澤無不奮志科名而我皇上加恵寒氊屢舉挑選之典七旬萬夀後已兩次行之復以人數多寡各殊守候需時可念酌示變通用廣選途而矜旅食即在耆儒未遇皆邀格外之榮施扵以知士類蒙庥無在非大聖人曲成不遺之徳也皇上預籌民食本年萬夀聖節特派大臣於京師五城發粟平糶乾隆五十五年七月二十七日奉上諭本年朕八旬夀辰各直省文武大吏齊集京師者多率土臣民共伸祝嘏兼之辦理慶典㸃綴商匠雲集人數實衆京城米價不無稍増現在京倉米數充盈著發給梭米三萬石照時價減糶事務著派胡季堂保成諾穆親蔣賜􅙺鐡保吉慶虔禮寳姜晟徳成張若渟每城二人妥為經理於月月初一日起開倉出以平市價而裕民食副朕行慶施恵有加無巳至意臣等欽惟我皇上仁溥如天恩施自近今秋恭舉慶典羣方奔走偕来鱗集輦下爰頒闓諭發粟三萬石命大臣扵京師五城平糶煌煌徳意即一事而宅心之廣大具可見矣伏惟聖天子博愛長人式法扵涵濡休養固已愷恵流而政經舉朝野中外身被心知乃至日用飲食之微亦徧羣黎百姓之徳以是錫祥保泰迓天祜而揚祖庥吉祚大来以愉以懌是所謂包四徳貫四端體仁即以體元體元即以體乾是致樂以天下夀以萬世者也臣等躬逢誌盛挂一漏百雖分類恭載藉窺福徳相因之本而浩蕩難名實無以鋪張懿茂云爾
