body:
  text: 欽定四庫全書八旬萬夀盛典卷九十九歌頌十九萬夀九敘安徽巡撫臣朱圭惟邃初虛廓漢垠肇祛天地五龍循蜚詹乎泰燧章蔀罕漫不得而記矣厥斟元陳樞闡繹紹天攝提之可數者自黃帝元年甲子至我皇上五十五年庚戌蓋四千四百八十有七年三代而下登八三帝惟元差賢疇若我皇上重華熙洽文武創守咸帝皇於三五協苞苻於兆繇昊縡申祐戬榖單厚嵗陽橫庚月躔留酉緯曜協祥為八旬萬夀萬萬夀于是曽元繞膝五代一堂來晜仍雲𣲖演天潢者咸奉萬年觴而祝無疆曰我大清之肇造于東也發祥朱果基長白而溯混同厖幠厚德肩􅀈豐功受天命以御宇協清陽之古封皇哉五朝淳懿葆育元氣鬯通儲億萬載曼羡之夀以貺我聖躬故乃握符闡珍承昊蒼而致孝乾坤父母馨德響報陟三成之圜壇神志通而虔告楅繭犢以春祈瞻蒼龍而夏雩琢榖璧羡勒文版書躬親肅將萬祀若初日朝月夕秋􅒫春舒既篤天祜遹追祖德拓西域而貢璆藏玊册之寶刻巡瀋陽而賦陪京編方略于開國遵射服而刋碑陳禮器而圖式太宗膺乎傳寶敬勤體于抑埴書躬戰于松山想締造之屹嶷皇祖篤慶垂眷我皇受丕基而紀恩記前後兮彌詳鏤月開雲之臺萬壑松風之堂啓實録以環誦憶頷領于羮墻睦親表忠睿王復號佐命懿親封爵配廟綿綿瓜瓞振振麟趾葛虆能庇行葦勿履慶元孫之嘉瑞題五福以綏祉其名奉福奉夀登玉牒而儷金枝者蓋十有一世于此矣且夫祚軒轅者草五宗濟陽辛者十六族惇敘則星敶綺文展親則器分珍玉賜品惟四繪章篆轂先上元而開筵御乾清以宴曲于斯之時莫不霑澤璿源分華若木蕃蔭庇于本根愷悌流乎天屬咸曰天子萬年以篤我本支百世之福于以仰我皇上保定孔固謨烈寅承馮馮翼翼莘莘繩繩位上下而接五世增疇䇿而念八徴也粵有五等分爵六官聫事三台麗乎文昌九棘位乎朝士環帝座而依辰極者僉摛翰祝釐闡萬年之嘉瑞曰臣聞泰元流化運樞穹圜極古今之至夀鮮推步其嵗年聖人御宇行健體乾純一不息惟聖即天今將仰衡握管而窺焉斯偏而未全竊見我皇上實心實政敬明無逸一日二日有萬幾五十五年如一日巍巍楓宸此焉勤政御天門之詄蕩宣綸綍而申令修容銘帶待旦飭服丹豪批奏玊檠翦燭登光曶爽辨色清穆端揆既覲卿士乃召御賾若神燭幾于奧天不言而行生日久照而朗耀傳餐嚮午移晷既旰退聞宫漏猶親經案文成越千詩富五萬稟濬哲于天縱乃幾微之無間弧矢躬御神武邁倫草發而中十九驚堵觀之臣鄰或雍容而控轡當益壯于八旬爾乃降轂詞垣賡句東壁史括舊章書纂新册承文思之指示必修辭而典核銓流分曹澄之以公雖下逮乎一命亦上覲夫九重眷彼民數飭于司農登版胥壽綏藉屢豐揔章協樂宗伯掌禮廟器凖古壇圭有邸朝祀饗燕親製樂章歌三百之雅頌協五音于宫商鑄鏄鐘之鉦銑戞玉磬之琳琅奮武定級計亷增俸軍廣分團鋭彍習用詳讞仁深肆眚恩重空貫索之明星揭雞竿于丹鳯冬官率典匠人庀工隄防河海城塗廟宫輯元圭于嵞山記黃圖於扶風乃知過以著論何聖懷之彌沖聖不自聖臣艱厥臣修職陪位近禁依宸教之逾師育之如親願蕃釐之萬億八千嵗為秋春也若乃節鎮握符嶽牧輯瑞十有八省屏藩所寄及二千石下至羣吏合九有之歡心慶萬齡于郅治曰蓋開開疆無量延夀無疆自我天覆幅􅊷孔長禹迹之所未艐周索之所未詳胥我土宇何有漢唐我國家之初經營也考地括象畫野分星峙以嶽瀆環以禆瀛及我皇拓地二萬餘里乃包崑山而薄西溟于是掌運六合心懤九寰錯壤建牧畫土任官暑寒泯咨康田即安澤厪三時驛詢四砥霑嘉禾而遂生掞睿藻以志喜吏黷斯辜民秕乃鋤治理奬實侈靡斥虛天日臨于厞陋明旦鑑于馳驅故明之通也鏡積無厚而妍媸呈公之溥也權懸無欺而輕重衡馭枋有經乾綱獨握露雷凝釋春秋溫肅皇上獨深思夫醇化之流洽羣黎之殷羡嵩岱貺嘉而河海清晏也是用遲之又遲巡典六舉察吏觀民以欽法我聖祖遂簡七萃飭六飛花蓋玉瑵星旃雲旗􅀈􅀈闐闐駢駢騑騑爾乃玉輅軿連于泰巔翠華棽麗于日觀普淖薦乎封中禋煙升乎天半降軹闕里弭節孔林車服陳器金絲聞音涉河浮江踐吳屆越環萬民于繡甸問百年之黃髮進疆吏以考最因望幸而籌民隱靡惠不施有依必軫飭先勞之未勤兮警飢溺之當憫渾渾濁河湯湯清淮志石下釃引渠北排啓六塘以宣流鬟九派于江涯浙海濤飛柴塘石建尾閭泄乎中亹鱗次崇其疊堰亘玉梁之百里發水衡之億萬是皆駐蹕親籌指圖開示與夫灑沉而津淀疏楗薪而豫隄閟嵩室恆臺觀周臨冀神禹之績莫與京而衛民之道備矣是惟我皇上廓紘恢綱暢垓溯埏九重端拱萬宇承宣環蘄萬夀於萬斯年也爾其杖朝杖鄉秀眉龎首耆臣艾士與宴千叟者咸率宇內百年鮐耋億千兆齡吹萬同聲以增我聖壽曰將以八月幾望日十有三躔合壽星角亢同瞻秋分之曙老人見于弧南靈臺疇人進曰帝者壽命延洪厥有是占惟我皇上繁祉衍流鴻祚純保敷錫五福覃被諸老體茲耉造厪厥晨趨紫垣聨騎青瑣肩輿依天彌健沐道更腴廷有千秋里有二疏詩傳真率之會鄊繪耆英之圖相與𣙜古嵗論大年黃庭景經緑玉祕編比神期羡駐顔喬佺友茅君于珠闕逢桂父于璚田引年彤庭尚齒筍席年蘄綰綽之鼎算錫泰元之䇿繄懷貞元而服神明哉惟天夀平格也昔我皇祖千叟肇宴我皇承顔沖齡侍殿紹庭思恩繼序受眷惟御極五十年盛典再舉所以積慶重光法上儀而膺下武也當軒賜酒列陛開筵夀有百五叟惟三千黃閣宣其寅亮絳縣數其亥年皤皤然黃髮齯齒曰惟三朝仁澤之所延若夫瓊道巢雞南陽種菊翁號季河女稱羅郁月有謄章時聞奏牘錫詩建坊頒金賚粟莆田郭叟百有十齡拜籍春官陪職司成復屆昌期入覲大廷更有梨靣懷牒艾齒窮經徹棘圍而賜第列氷銜以競清台衮重宴乎恩榮令長再與夫鹿鳴漳浦一老鄉公國耆伏火映頰丹心傾葵望楓宸以籲慶詔蒲輪而勿馳拜稽前席天顔悅怡貞符疊臻升平景麗一堂五代者二百家聚族同居者一十七世布魯特婦重譯二萬祝大皇帝萃人瑞以同紀擴夀宇而合契天子萬年斯之謂歟僉曰竊聞交乾坤兮橐籥緯坎離于卯酉豈知我皇上四極四和中心無為而至正是守邁五龍之竒齡餐三秀之內芝豈知我皇上體信達順四靈為嘼而天下大肥也非聖人而大德其孰能與于斯若夫講道論德之儒抱槧握翰之士孝亷明經博士弟子相與崇論閎議觀文察理曰竊聞惟夀作人倬漢為章棫朴所以美文王也我皇上稽古同文久道成化集五經于萃室披萬卷于幾暇述周易以通漢宋解春秋而例王霸考姬周之禮儀軼杜鄭而超孔賈評通鑑于古代定綱目于勝朝譯國語以成志溯元金以迄遼薛史表微劉書闡舊樂府協音笙詩入奏顯謨揚烈詩全一百六韻焉對時育物句詳七十二候焉文醇詩醇淮源河源濡灤涇渭江濟崑崙考辨之富不可殫論掞天摛藻臨池灑翰龍翔鳯輝金鎔玉璨敬勝鐫書雪晴據案淳化墨妙之摹八柱三希之玩雖寶繪之緒餘必超古而獨冠書輯四庫文建七閣使遣陳農典搜永樂補闕纂殘校訛讐錯聚珍賞竒薈要返約開東璧而奎躔明擴西崑而册府拓乃有羣儒志讀祕書人登虎觀之席陌闐鴻都之車三萬六千册州次部居而詩代辨辭者數百有餘天子以為治隆道德政舉賢良建辟雍于太學列橋門而啓明堂圜海璧流夏屋金黃周器十事府史所藏蹕鸞和節鼓鷺奏聲登拜殿廡列筵膠黌講肄經禮親辨老更搢紳觀聽雅歌吹笙煌煌穆穆道暢而禮成列戟當門厥有石鼓蒼籀遺文膠轕千古我皇訂之重排二五會萃妙合錯綜參伍缺鼉拏蛟錬石再補列國學以敷文置灤亰而揚武于是門闢賢路國設禮羅月魄象飲鹿鳴升歌春袍草淺秋山桂多蓋非大比而奏甲第者試舉兩制恩開六科於斯之時衆材鬱為楨幹大化成其翹秀潤色鴻鬯協氣醇茂光華矕乎鱗彪文德洽乎燾厚戫戫乎份份乎萬古獨隆咸曰惟天子聖夀也于是薄海內外億兆之民食德飲和含澤被仁祝美意於延年頌夀榖於皇仁曰蓋聞四表敉寧三光昭麗中外禔福泰平書嵗聖人之所以夀世也和氣龎鴻上理朴醇先疇舊德百年相因聖人之所以夀民也是以萬方蒸其太和羣倫祈其純祐流祉擁庥俾皇躬以曼夀粵稽開國計口授田殆千六百萬焉及我皇上重熙纍洽承平相傳至二萬七千萬乃二十倍於前躬節儉以著論因孳息而綏豐詔司徒以獻數飭疆吏使課農陟靈湫而禱雨製宸章以告風甘霖報霑于萬里時玉書祥于三冬乃撰靈辰練吉亥吹律風和瓜見土凍解縹軛紺轅繱犗黛耜朝陽晞于東郊雲氛垂乎青畤歌禾詞以勸穡撫御耦而降趾農畯劭四推之勤甸師飭千畝之祀是以致孝足農一舉而具二美也慶澤覃布渥恩廣施弛中邦之成賦蠲度支之全租甄口率而勿納算緡却而勿輸藏富蔀屋騰歡畷盧推惠心于勿問施我德于有孚蓋我皇之普貸凡三復蠲今四乃二千萬萬有餘天庾供糧兩除轉漕七省免輸五年分調或截挽以贍近或開廪而均糶茍偏祲之偶被必馳牘而入告計愆逋豁發帑濟饉祁寒行糜春祺加賑除課訂于巴賨捐賧租于蠻賮用是感咸和書大有樂盈寧登仁夀祥圖曼羡而熙洽瑞應駢聨而單厚若夫平露屈軼麒麟鳯凰沼逰采鱗皂伏飛黃却貞符而勿膺惟紀人瑞于上祥八千為秋八月庚申帝車回乎上苑徑天衢而羾紫宸卿雲縵野爽風篲塵鰲戴嶽抃樓臺金銀閣道連屬百戲幻陳蒸紅霞于蟠木飛玉淙兮天紳于時龍斿羽纛翠蓋鑾輪千乘萬騎􅚳􅚳轔轔普海共日在宥同春歌衢節以三百鏘天樂于九鈞倡豫鳴盛編珠貫綸曰天子萬夀樂哉夀世之夀民則有大德苾芻初地黃教軌範闍黎般若精妙逰兜率化樂自在天之宇贊曼珠師利大皇帝之號咸膜拜稽首合十頌敫白我皇帝言蓋聞三千大千鎮以須彌居南面者為閻浮提是大震旦我皇治之溯大教之乍興爰七佛之出世居五印度布大智慧及五百年而東行遂起衰而振替我皇帝總統三乘後佛受記是以逺撫長駕澤流荒裔徠達賴與班禪撫喀木及藏衛曩者嵗在庚子聖夀七旬神威遍觀乎十方斯陀重譯而來臣其至也珠瓔鈴毦繹絡斒璘金牛蹲伏而矗華蓋香象蹣跚而蹙珠塵擁師子之髙座敷吉貝之重茵憶往世之轉世恍無著之與天親也兹者聖夀延釐慶開八秩有廓喀之懇誠奉金經而屈膝命薩野及八都共丹書而並出維依清曠是名極樂雲護龍天風含鈴鐸經八萬劫夀而摩尼常瑩供千萬億佛而天花不著至于清涼法界迹著文殊中臺環峙演教之區望華幢與寶蓋計五駐乎金輿别有普濟法雷望海靈應布地則七寶斑斕疏池則八水流泳迦陵之鳥晨鳴留犁之光夜淨闌盾七重香雲十種天樂鏗鍧恆沙澒洞毒龍蟄而不驚怖鴿安而不恐二十億萬里之金粟長堅四十逾繕那之風輪不動若夫山莊迤北聿建普陀須彌福夀列乎其陂蓋以衍宗喀巴之法裔居前後藏之婆羅于是穹碑崒屹睿藻輝煌精藍淨國選勝道場文留貝葉函啓栴檀摩騰初來乎東土耆婆爰謁夫夀天攝四生及九類揭正見與正觀迎寶華之滿祴嗅薝蔔之盈壇皇帝乃發龍藏之文究馬馱之迹訂三合之切音衍國書于金册蓋自迦葉傳言鳩摩始譯雖九部之畢賅亦四諦之久闢未聞如今日之宏賾者也我聞佛説昔無量夀佛具四十八願其夀命久長極推算于百千萬億而不能舉其劵其神智洞達威力自在雖聲聞衆庶布億萬由旬而一掌可載其國土一切天人衣服飲食華香清醇長和風之披拂信溫麗之如春聽華樹之妙音步衆寶之輕塵我皇帝錫羡紹庥夀命無量即是無量夀佛之億千萬劫而不改法相也極閻浮界有情世間繩梯索引請吏欵關即是無量夀佛之威光照耀而天人附扳也若民生之熙皥㪺寶甕之神漿自通都迄聚落罔恐怖與倣徨即是無量夀佛之耳襲法音而身被德香也維時諸大乘衆作是説已咸識聖人之夀不可稱紀膜拜讃頌皆大歡喜别有月竁日際塞部海澨異語同譯殊期並詣曰萬萬嵗祝大皇帝爰夫我朝之德威逺制也蕩烏拉服髙麗四十九旗和林諸裔震讋乎萬邦臣僕乎百世皇祖揚聖武懷逺服闢三衛于甌脫獵興桓之上谷皇上拓區宇而懾藩籬率祖武以垂國俗常以金􅒫之月行圍于木蘭雁磧早霜龍沙戒寒草蓐猶緑林薄欲丹鹿柴千里崖口九盤植黃纛為中權兮張桓門于巴顔會藍旗以看城兮翼御騎于興安于是星流電擊山敦雲鋪角麟拉乕掌熊􅚵狐洞麅麈鋋貔貙徼鶴鵠畢雉鳬乃御神鎗控星弧翎獝毛狘他他藉藉灑被乎周阹于是喀爾科爾左賢右賢千二百騎穹廬蓋天奏什榜而進宴戲角撲以列筵復有名藩子弟詐馬既畢教駣親試綰帶結衣絙竿控轡恩洽中外武慓逖邇自松江屬乎蔥嶺蓋二三萬里昔者西荒凖部逋酋遺孽兩朝經營未豫翦剟我皇赦之延喙息而不絶貪狼封豕窳匿竄竊呼衍須卜渾邪休屠咸叩關而望拯遂致討而得俘阿睦梗煽征叛搜逋二負梏而九嬰刷應龍降而蚩尤誅遂蕩沙雅克庫車冞葉爾羌略阿克蘇夾黑水而撤圍薄玉山以擒渠于是兩部蕩平犂庭掃閭和闐烏什霍罕恩都屯種數萬里歸我版圖開惑信天內定聖謨桃徼金川𨽻諸土司郎卡搆釁勞我王師狼子蟨負螳斧蝥絲乃破美諾陷烏圍摧堅搗隘及噶喇依遊釡貫索俘走馘飛土爾扈特全部順歸賜以遊牧謀厥食衣曰降曰順皆我天威么髍林莊蠢蠕海嶠樓船飛渡露布踵報社番獉狉咸仰覆燾傾覆栽培天厭黎氏我皇鑒之乃憫阮懼心錫用寶册而胙諸交趾銅嶺珠崖富良之路曷若拔克達山格宗明宗之固藤胄竹襟桴筏之具孰與石碉鹿塞米窖丸樹天討巽申蕞爾敢競是以誠懇再三而卒獲寬命也遂乃集共球萃梯航易冠帶覲山莊暹羅受策而拜庭南掌識海以來王木邦金齒阿瓦瀾滄金表鑄文于戛里之國馴象貢貢于猛密之鄉外臺菉幣爻閭賜筵蹌舞逶迤魚龍曼延登雲見日掞藻自天頒戰圖而示荒徼奉正朔而祝大年鞠􅎽飲飫之禮既畢因相與咿嗢顧語雎盱為構咸畏威而懷德曰無疆之夀是我皇上祜篤萬祀歡臚九囿也是時天子心契仁夀之原穆然無為儼乎深思顧寰宇之和會鑒輿情之熙怡敬作所于周誥銘無逸之書辭曰俞咈哉蓋諸所論著沿其流而未識其源也得其一而未綜其全也仰天子之夀萬年烏覩致夀之本然乎且夫河通天苞洛流地符八卦成列羲爻重而畫圖焉九疇咸敘禹範畀而衍書焉大聖人握上德之契管至道之樞乘天時行斂福用敷尚哉敻乎可得而仰模也自強非勉不息故久剛健居陽篤實載厚盛德日新大業富有體乾元以長人出庶物而居首天弗違乎聖先聖奉時於天後是以同揆合撰貺兹仁夀五十五數生成大易推之萬年以衍乾畫是為一萬二千五百焉乃合聖齡而增厥策四十有五箕疇自乘隂隲默定相協其凝天子乃敘倫陳疇念用八徴建其有極保錫惟皇訓行正直會歸平康彛言是敷萬邦其昌開庶民以王道近天子之耿光鑒爾康色克用柔剛非有畸于威福乃康寧而明章若夫庶徴之來驗以五事占嵗省成敘五來備我皇上恭為夀基端拱欽其一為貌惟恭作肅時雨若而可徴布惠澤之霑渥臣欽民從時憲用誨其二為言惟從作又時㿩若而可徴位當陽以茂對闢門明目燭微鑒徹其三為視惟明作哲時燠若而可徴化如春以煦悅達聰察邇逺謨嘉猷其四為聽惟聰作謀時寒若而可徴德凝成而擁庥睿知廣淵亶由天性其五為思惟睿作聖時風若而可徴治從欲而動應爾乃庶徴既用五福咸備先憂厪三好德念四德為福基福為德致論皇極之由錫證中庸之祿位闡經義以暢厥旨信天人之合粹此聖人所以治軼羲軒運符天地也于是三靈祥協八維星共拜手稽首上萬年之嘉頌曰天子之夀夀以萬方自天篤之俾熾而昌大同協吉純乾粹光於萬斯年念徴無疆萬壽樂府九章謹序雲南巡撫臣談尚忠嵗懋上章日月會壽星之紀恭屆皇上八旬萬夀昌辰協祉絣嘉桄被純和於六字薄海內外臚豫燮歡粵若初恩言肇宣詔開甲乙科咨於司農令天下毋納粟秷總秸一嵗乃月正元日天子誕敷文命普錫福於四方慶靄南翔恩綸達於滇海維時滇南之會治寮宷郡邑羣有司百執事里居耉成人以及邊陲世吏徼外屬國之長官咸樹頷翹趾駢集會垣恭聆溫綍臣奉持使節敬𨗳揚聖天子篤祜延長申裕引庥之德意乃言曰鴻惟乾符坤珍駿祺錫羡泰元神策延範益疇皇上受天之龍照臨函夏昧爽丕顯旋樞斡運五十有五載惟強固精明之體行健不息罔一日弗敉於勤用克充翊景命肸蠁豐融每嵗三舉大祀虔祈方澤躬詣壇陔親奉圭瓚嵗秩於上下神祗咸遍至誠孚格百順攸臻遹承顯謨丕烈以守兼創肅奉册寶巨典式昭大訓寶録日循雒誦四謁盛京緬雲雷之締造勒碑珉於薩爾滸辨源流於混同江懿夫本昭事之欽若翼纘緒以紹聞所由奮光迪德於陬澨而僉懷企矚者乎若夫夙夜敕幾飭功慎省疇咨鮮晷昃之暇疏奏無一昔之淹當寧則署書勤政行在則秉燭傒章用舍勸威因材自取董正治官以為民極爰舉省方之典六巡江浙恬海翕河西臺中嵩東臨泰岱春豫津淀秋獮木蘭以補以助無非事者每嵗給復優租積數倍於億秭遭逢國慶施大澤之溥正賦全蠲暨於今而四達亦既藏富滋豐淪肌浹髓矣皇帝猶軫念於雨暘益劭兹小民之依胥保惠胥教誨俾無一夫不獲其所也疆吏入覲因事諏咨申誡以保赤厚生課實效而屏虛詞恪共厥職牧令銓計並許覲顔重親民之選凡在蔀屋之隱曲靡不達於八聰雖萬里之外四極之表若依闕庭而近天子之光是惟純熙滂茂鏡榮燭和化成於悠久以宣偉略則星竁月􅒸列收安屯里踰二萬金川雪磴闢為垣塗以及掃臨水之氛翦蘭州之枿靖臺海之波告大武之九成焉以彰文治則皇極敷言是彛是訓文千篇而詩五集耿兩曜而貫六經煥備圖書範冶今古爍融丹府廣四庫七閣之儲焉以垂制度則輯會典圖禮器宴千叟表職官建辟雍增石鼓中和協樂慶隆進舞律調一字譜訂全詩感人心而天下和平聖人舉禮樂以為昭焉皇哉煒哉亘古一會繄在雲南為禹貢梁州南境依景承輝若日月之照臨蒙燠而被彩矧際嘉祥疊至被戩胥臻時和年豐河澄江謐百齡演算纍世睦居提抱曽元耆英錫爵實至之符斯為上瑞貢琛納賮遍於廣􅴝緬甸受封南掌底貢廓爾喀重譯來享而南交之君長親入朝以效祝福釐都哉聖天子功德巍巍合天之行自今寶算延洪純純常常憴憴其亦如天無極申引于萬億年於是會治寮寀不約同辭閣境之黃髮黔齔及邊陲世吏徼外屬國之長皆忭躍軒鼚矢口協音甬欱於余謡中謡之莭奏臣謹案漢時益州進慕德懷德之歌而漢益州郡治實為今晉寧州境杜佑通典載驃樂之文即為今緬甸屬國是則滇海邊土遍野謳吟自忘弇陋要皆發於愛戴之忱詞無雕飾臣職在採風飫聽愈歌抨各鬯抒厥詞協於樂府秩陳臚敘竊附於萋菶雍喈卷阿矢音之義於是中慶益寧榖昌富民宜良連然之民進而歌五華燦之詞曰山五華雲五色拜雲亭熲帝德德之楙春合宙德之敷養日舒鵠纚斐雲翾洄五華燦詔書開章麟麟闓俁俁奉詔書煌哉詡凱以颸湛以雨詔錫爵昭亷法詔惠民庾廯殷詔惇俗民式榖嘉利澤寶象河光長嶺祿益坡騫而聳拜厥嘉恩言普燦五華建平霑益歸厚為美芳華之民進而歌玊屏峙之詞曰玊屏峙兮雲為梯聎連雲兮雲上躋閶闔開兮詄蕩鵕鸃揚兮􅗒襹豐融兮昊貺逢涌兮聖涯慶雲藂藂符泰一䕻土平豑開百室滂仁斯諧義斯䵒鋪上黍以稠荂潤甘澤以蘛腴澤如春景命申天心格眷有德元謀祿勸姚安永寧昭通之民進而歌康衢廣之詞曰康衢廣􅢳烏蒙障卭筰迤川東川峽蟠回文教洽七經東授舊所業遙瞻祕閣四部儲部分鱗次左右居流傳疆域志樊綽留其書從事天南臨六詔苴咩城回清溪繞黑齒青蛉仍夙號聖朝聲教逺胥暨羅布綝纚井鹽利式廓唐臣風土記葉榆匡川師宗開化之民進而歌鳯羽河之詞曰溶溶鳯羽河䡾䡾金梭島點蒼鬱嵯峨漾水出其表縣名符實濡太和百祿山肇嘉庥多不見羅平楊自發雍睦同居標綽楔又不見祿豐張世賢紹緒挾洽娛長年川隴湖湘雲氣接瑞彩繽紛瑞人列駢依夀宇昭升華協瑞乃得二百家維南有山鳯儀集金沙通啓南交譯聖治屆逺來鴻臣藩王祝釐謁紫宸元江之僰人蒲蠻進而歌溫玉泉之詞曰泉流溫玉襟帶回洑三幹亭亭井生瑞木瑞繞百尺枝緑葉紛葳蕤華平色端正氿泉漢溉之浥此豐巴部繄以桃花人巴部得豐嵗桃蹊延逺春寶山亦有蹊麗水澄其泥金波瑩璧彩光曜紛陸離金相符鎛鐘璧姿諧特磬淳化調元音宫縣雅樂正鴻圖柔逺遍八埏璆琳輯瑞來和闐麗江永北徼外諸畨進而歌亘彩虹之詞曰彩虹亘以金梁瀅波𨗳以瀾滄臨九睒兮匝嶪涇三渡兮遊翔聸德躔兮斗極依仁輝兮若英卉霏霏其秋郁樹盈盈其春榮岫璀璀其琳碧徑穆穆其蒼莨竭中孚以賓服咸角稽而來王戴帡幪於福宇效字舞兮洋洋木邦猛密孟養諸土司進而歌天馬徠之詞曰天馬徠關門闢通孟廣延猛别灣甸雲逺接翅排思陀車里藍蔚堆錦屏近矚山崔巍景蘭景董崇其隈元珠開化光瀠回箐鳴竹鶹峯孔雀羊布織文光繛約蕉鋭淨瓶疇所削石風丹凝青紙拓遭亨期兮展嘉符依夀世兮延昌圖緬甸之部目進而歌聸星階之詞曰星階兮式瞻春羕兮恩覃台垣兮耿正洽教兮星南南徼兮依光慈開兮湯網赭之硜兮銅之垣徹九馗兮寬廣葛為𥚑兮蕉為衫披輦路兮䟃𧽼靖朱波兮江流灂陳廣胥兮驃國樂貢通巴勒布兮皇威逺服願受封號兮緬人之福臣謹率諸僚為合樂之章恭進延春祺之詞曰延春之祺重洽純熙夀星建酉角亢為期惟天悠久行恆昭健聖德同之神謨廣運蕃釐備致巽命重申上儀斯舉用慰臣民四必得符攸徴斯受臣民拜揚億齡獻夀八旬萬夀盛典卷九十九
