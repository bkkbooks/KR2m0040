body:
  text: 歌頌三十六萬夀恭編御製詩八徴耄念記進表原任翰林院編修臣周厚轅臣謹奏欣逢皇上八旬大慶萬夀萬萬夀先春命鐫八徴耄念之寶御製記文宣示寰宇臣伏讀萬遍心悅誠服復恭繹御製詩初二三四五集中義相發明言咸徴實敬互證分系編成八徴耄念記實盥手繕録隨表恭進者伏以旱縡告貞符六氣調一元之運軒齡衍神策九疇備五福之全皇極之建曰用敷敘倫圭錫大寶之文曰既夀延喜玉鐫心永念之在兹煥成堯戒言無徴而不信庸叶舜歌美驗八徴義通一貫臣謹誠歡誠忭稽首頓首竊惟天有顯道河以圖而洛以書帝隲下民箕所言乃禹所受初五行以播氣次五事以言人政必揭其綱維紀乃窮乎幽渺極居中而正直德判三以剛柔七逢吉以大同九嚮福而先夀理昭乎民彛物則故大其詞曰洪學粹乎內聖外王故納之器曰範維庶徴之用念當八位以協時治媺乎用成用明用章用康功密乎維星維嵗維月維日是謂天人之合亦如日月之行然而者是淆於漢書若順疑於王氏傳編劉向説太近於禨祥文定吳澄章遂移其前後雖武王之訪道尚曰不知即箕子之陳詞苐聞在昔欲明大法端重立言兹蓋伏遇皇帝陛下德念福基誠徴純久夀兼乎得位得名得祿言敷而是彛是訓是行乃襲慶於天苞地符閲綿算於皇春帝夏年登八帙日凛萬幾積大衍之策成五五有合遞旋宫之輪轉八八相生豈三帝之能儕即一賢而未逮遂以嵗華之開始刻成鼂采以凝祥底貢從白玉河濵抑埴向紫泥封裏義有取乎省嵗瑞大備於敘時燦六字以成文勒出天章雲篆抒一篇而作記抉露乾端坤倪且夫至誠如神久道成化萬福備矣一言蔽之申開惑以信天述紀巡之明理家慶名堂以五代古稀闡説於七旬四閣臚章三希入篆兹欲徴於吉語特有得於範言蓋以揭一哉心之全遂以彰五者備之應匪且有且念兹在兹積八十年閲二萬八千餘日之久羅數萬首在初二三四五集之編記維挈領而振綱詩乃駢珠而積玉則有三春甫及即盼霖興一雨未優頓虞風散冬寒暑雨厪一嵗之民勞夏日秋陽辨五方之物性或抒情於晝漏輒志事於朝函寒太液以嬉氷燠山莊而觀稼永夕永朝之在念隨時隨地之可徴言道則一本而萬殊立言則層見而疊出如大海之運詩配江河而記則歸墟如渾天之圜詩分宿躔而記則全體攦為雨暘燠寒風之五部絫以億兆京垓秭自八旬合典謨雅頌為一經祝夀福康寧而好德臣迹塵翰苑來自江鄉匪卿士師尹之倫得聞詩教效副墨雒誦之職庶代頌言愧業托乎編摩實情深於舞蹈欽萬民之在念西疇願教農歌際八表之來庭南國新頒御集伏願蘿圖益茂椿算無疆皇之夀萬八千同天無極詩之義承持志與嵗俱增化國之日舒以長堯典授時皆十雨五風之嵗治世之音安以樂舜琴解阜即九如三祝之辭謹將所編御製八徴耄念記實五十四册凡六函裝潢隨表恭進以聞萬夀恭紀七言排律一百韻謹序翰林院檢討臣汪滋畹上章奄茂之嵗恭逢我皇上八旬萬萬夀瑞雯翔宇慶溢京垓麗景臨霄歡同覆載仰天皇之玉篆虬龍盤八會之文聆帝昊之元音鸑鷟叶八風之奏集衣裳而儀萬國開閶闔而覲諸侯歈頌滿於衢塗瞻呼羅於鮐幼是嵗也南交輯瑞阿瓦輸琛名王則父子俱來享幣則珍竒畢集三江花象職貢希聞五竺丹書稱名無量生畨顒化越巨海於頻年伯克趨風踰流沙之萬里豈特六盟部落鼇抃如雲九譯荷蘭狼歌就日余吾麗水受號唐年西𤏡南夷恢疆漢代而已哉天子方穆穆宸居乾乾元始羲圖符五五之數五福斂敷軒律開九九之祥九如保定璇霄朗曜燭照逾神玉斗珠衡樞中獨運壬林百禮倍嚴對越之心僾愾三齋彌切躬親之敬洪縻藉畝四海綏豐法駕臨雍九州興學秋風崖口天弧隨塞月俱懸春色蒙隂帝輅與思膏同屆先是黃封籲請紫極臚呼聖齡千古希逢嘉會從來未有重以光華賁宇勳德同天豐碑逺植於瀛東何止肇州十二正朔同承於域外寧惟弼服五千溯自定準夷平回部收從漫輯臺壖玉水接於昆侖星源探於北極耕屯廣漢建都護之名城彈壓重溟有將軍之幕府四十九旗之族鴈侣雍容二萬餘里而遙駝裝駱驛社人覲聖見泰一於鴻濛藏佛朝天禮文殊於忉利昨者威揚炎徼耆定黎城存舊服於王官錫新封於下國貢金同於九牧碩切來庭抗表竭於千言心殷詣闕於是金沙誦德獻夀祈封雪嶺聞風塗香頂禮方輈結軫數州為會極之途秅米牲牢列郡有迎賓之館殷人作頌莫不來王禹會同期曽無後至蓋精誠毖治知難所以無難而仁夀懷柔戒得因之必得者也夫以七閣崇文之富三雍訓學之隆五經舊萃於相臺十鼓新刋於槐肆萬幾少暇睿藻頻摛二月中秋經筵聿舉仰堯文之有煥家奉千函欽舜作之惟幾人知七始麟經闡鑑四千年衮鉞彌嚴鳯詔頒恩億萬廪京坻溥賜繄敬天而法祖惟惠庶而親民宸衷每寄於篇章封事日勞於批答雅歌行葦篤親之典彌隆笙譜南陔飬老之儀尤茂所以千人共宴聖朝眉夀如林五代同堂慶緒雲仍綿瓞紀穰穰之上瑞天錫嵩年合旦旦之歡歈人思華祝九畿康喜豈獨臣鄰六合休和同趨輦轂皇上俯俞羣請大慰輿情先秋宏造士之科元日布覃恩之詔正供普免四沐深仁逋課俱蠲重叨渥典爵級優於有位鸞誥仍頒欽恤訖於無刑雞竿爰樹增青襟之學額益袀服之名糧秩祀遍於山川蕃賚均於中外列邦捧去戰圖兼二十二條八月方來慶典維五十五載於是詣岱宗而展敬幸闕里以明虔行春而廣沛恩施巡守而大彰黜陟臚宣正殿親祝方壇駐九夏於方壺肄六鈞於上寨秋延萬樹鎬宴先逢苑接三山鈞天迭奏夀星躔次廷臣疆吏同迎禧節臨朝舊隸新藩咸在雲霞百里春臺恍入華胥璈􅀢千家秋島無殊月宇第淵雲之頌詩書同奏百篇煥奎壁之文論續再抒四得仰天文之五集觀海難名繹帝念之八徴膺圖共慶小臣十年禁殿早窺中祕之書一載菁林已上瀛洲之直貢衢謡之百韻遞衍厖禠綜壤頌于七言益綽長律云爾羲圖嘉會垂亨禮箕範繁釐錫吉康亹亹純修踰頊嚳熙熙郅治嫓姚唐貞符行地原無息健法圜穹本自強夀以仁基安則久福緣德懋熾而昌旦明申警宏光被夙夜寅恭篤就將壇陟三成郊珽搢社修五土邸圭囊巍峩今烈基繩祖翕赫前猷緒纘皇袚德齋宫明鳯炬薦馨寢廟潔羔薌璽傳日角昭勤敬額紀雲楣煥構堂聖略神韜三館輯璘籖玉册五朝藏事書薩滸虬螭護訓述豐碑贔屭昂實録晨觀周復始淵衷夕惕念無忘階平應瑞承薇座文曲騰輝戴斗匡象譯六書諧點畫鴻都七閣耀綈緗雍宫古制芹流碧膠廟新模瓦易黃育士灤河懸堵肆興賢渥水植宫牆五經選俊醇儒顯八韻掄才雅化揚祕苑賡虞恭拜手崇筵歌抑靜垂裳千篇謨範心源合五集津梁學海航七二候詩分格物草三史筆闡提綱梨雕朵殿珍璆聚藝錫儒林琬琰裝壁册輶編謨定命麟經虙畫典陳常儀圖禮纂朝綱肅佛藏經翻國語琅鳥火授時增甲子鹿麋訂誤協隂陽重排鼓碣天文爍更定河源地脈彰為訪民風摹七月允傳書聖衍三倉已欣夀宇文明浹聿溯神區武烈揚準噶爾平裳獻雉勒烏圍服袒牽羊紅旗壘捷金方拓黑木巢傾烏什攘銘揭康居蚩霧淨畝屯大食稷雲香虎門濤息摧樓蜃鹿港兵銷揃轍螳備豫共推宸慮邃整師夙仰睿籌臧雄關閲實容荼火徑旅填虛氣奮驤隊列諸藩威四部營添五數法中央瀛臺誨武氷嬉舉玉塞修戎獮禮劻殊賞特優鳬藻士合圍躬御虎神槍勾陳夙衛環黃道􅋃矢新勳宴紫光謨烈敉寧欽作乂旰宵圖理懋方剛硃飛鳯札朝批牘翠爇蘭膏夜待章無逸幾畨鐫桂殿克勤到處篆松杗綸宣竟日聨堂陛衮御侵晨闢闔閶孔惠孔時瞻有喜求寧求莫視如傷上辛蒼玉田功禱吉亥青壇農事蘉曠澤全蠲南畝稅駢恩屢截北倉糧馳星春驛咨晴雨挾日秋成報稻梁蔀屋偏災輸帑積銅街平價發倉箱甘霖隨輦昭神應快雪書函兆嵗穰雉聳金城逞逴躒鯨潛水國順隄防排樁清口標新志閘石洪瀧改舊磄淀滙東西綏栁口河分南北引陶莊無邊樂利氓安堵不侈逰觀帝省方少室三呼羣象屹陪京四蒞輅鸞瑲八龍飍靸臨青畤六驥襂纚謁素王海日樓觀山湧角陳雲艦肄水翻芒太平景驗鶯花谷蕃阜風陳魚稻鄉巡仿五年仁澤遍樂超三代德音張冬官考製鐘形古秋水搜材磬韻鏘一字一音夔拊石九成九奏鳯調簧由庚軼什葩經補半子希聲黍琯量直轢英雲咸濩武駢排角徴羽宫商侏􅍣任昧增畨部雅頌風謡協律郎樂備禮明千載會善彰惡疸萬民望震雷離電乾剛斷解雨需雲兑澤雱湯網宏開三靣宥堯尊滿酌九衢嘗渠渠夏屋帡幪廣藹藹春臺品彚洋御論祛疑更老辨鄉師導飲介僎良銀融雪彩牌鐫字纊挾春溫帛卷囊千叟延洪環綺席百齡膺寵矗巍坊緇袍皓首新銜襲黃耉青燈宿䭭償耆尹鹿鳴重授几耋僚鳯闕緩擕韁榮褒式榖熙春藹老許台槐避曉霜樂愷佳辰張曲宴惇宗元夜衎天漿振振寶胄銀潢衍奕奕朝冠翠羽煌爵秩追封釐玉版鴻功特諡勒瑶礓乾清幄敞雲流矞惇敘筵開露滴瀼萼府遞蕃公族姓萱階紛集逺梯檣班禪錫卓莊嚴土夀媪金頒勃律疆玉配鰈鶼來月竁璧加駵駱驟星房綵花異象通忱愫金葉同文欵悚惶過悔南交親覲扆德懷西域逖承筐年班自昔輪支弋日就于今走甸荒拔達山徠軒鼓舞婆夷水濟遫趨蹌戰圖練甲光屯社封册綸申重使航陪隸揚詩隨豹尾生畨習禮附鵷行烏孫有别全歸域赤子何分盡覆廊觚竹謾誇周索廣樓蘭空侈漢輿詳圖成金碧輝璣組摹就丹青陋鹿狼匝宇庥風登皥皥重華瑞日麗蒼蒼瓊林鬱秀巢鸞鸑珠沼凝膏牣鯉魴吉帛永綏無量夀嘉禾長發有年祥雲鳩冉冉班笻簇仙蝶翩翩粉翅翔念厪八徴時若聖堂聨五世篤其慶如山如阜如松柏曰燠曰寒曰雨暘集嘏月欣逢酉正介釐嵗恰值庚長晶輪縹眇香霏桂金掌崔峩露盥薔號涣頒絲迎鳯紀知臨受賮輯狼㬻舞師陳器干麾列酒正排尊事昔芳竺院説經宣貝葉鑾坡奏賦鄙長楊典修中外升恆祝歡徹人天説豫觴願取葵傾芹獻意恭攄黼座藻旒旁萬夀太平頌謹序翰林院庶吉士臣辛從益臣聞邃古之初儀象包渾有神聖焉開天畫地品物宗生帝用圖河疇洛禔福于厥躬循蜚以前蕃釐夀考甲子或萬八千嵗夫豈罔徴而熒紀牒信哉皇建有極天錫無疆凡厥庶民胥引飬恬宜致升恆之劭慶乎洪惟我朝聖聖相承纍洽重熙以肇我聖皇出震乘乾益丕冒率育咸成列祖功于不怠爰乃啓珠囊握金鏡順黃序接朱宣府修事和風行化洽廣輪鰲極候尉日域湛恩周濡古罕倫比竊嘗仰觀聖人之福應厥有攸自古者神后膺籙受祚必憲天本祖熙載寧人皇上每嵗三大祀必躬詣行禮定常雩鐫信天主人之寶敬天也新製五朝册寶尊藏太廟每晨恭讀實録周而復始命編開國方略卧碑述太宗訓守冠服騎射法祖也御門聽政日召見內外大臣官員時引見文武員辨行在秉燭待章御書無逸篇揭各宫殿勤政也户部嵗奏民數榖數各省嵗報收成數驛詢雨水情形普免錢糧四次漕糧二次省方觀民蠲正供免積欠又隨時恩加蠲賑詳決秋讞愛民也至于敦宗室崇節儉廣庠序慎銓選修禮器協樂章謹成憲順時措鴻典徽猷不可殫述若乃稽古右文書契之修度越前代欽定四庫全書集千古大成御製文二集積千餘首詩五集積數萬首皇謨睿藻日炳雲昭其武功駿烈則平準噶爾收回部蕩金川臺灣安南所向風靡緬甸廓爾喀諸部歸誠效順疆索之廣古未有焉朝鮮琉球暹羅南掌諸國梯航重譯入享贄者不勝計也猗歟休哉甚盛德哉易曰自天祐之書曰天聽于民夫功德輔相裁成彌綸天地至于海隅出日罔不率俾天祐也衢歌華祝天所聽也是以天庥洊至諸福備應書徴五序雅祝萬年今嵗幹在庚説文庚者秋成萬物庚庚有實也笙詩萬物得由其道亦曰由庚月在酉酉為夀星次而五十五季又合大衍生成之數經卦皆八因而重之引而伸之則萬有一千五百二十正符于聖夀無疆臣竊嘗綜考伊古鴻濛肇分道化渾淳懷葛尚矣人多夀愷而文明未備姚姒以降道極數隆質亦靡焉我皇握符闡珍苞河洛之文撰清寧之文故登民仁夀醇美嚳然天祚聖人將永申錫之竒齡邁五龍攝提所紀奚有量也謹拜稽首上四言太平頌百韻曰皇祚延洪列聖鼎授蒼縡儲庥黃示順祐石紐鏡符玉燭杓候嘉洊祥仍淵趨海奏天誕聖皇綏猷維后序思纘武德辰拱宿窽領隂陽嫥捖宇宙靈囊大包榮鏡廣帙日昭月融風靡雲覆何政不淳何生不茂林無獝飛山無狘走波長鯤鮞澤豐蒲䓮朝裳謹笥野服升秀馬却于糞鴟革于囿董吏以深講武以狩農蘉其鎡紅緊其簆工不竒技啇不飾售煮海飫民鑄山通貿竹落帶渠石楗捍潄風雨依旬漕艘逐溜帆鼓應鼉檣竿射鱟千里瞬過重關朝叩交衢四通廣陌環輳山虎澤龍匭菁包柚或珠獻川或玉輦岫宛駒龍媒肅矢石鍭禹賦駢羅成壇奔奏蠢爾西域蠆螫猘嗾天弧一指風馳霆驟土扈欵開金川罷􅀈準夷回部震懾顛仆亭障間邏烽尾息彀蔥嶺河流玉關春逗空桐丹穴載日開雺帝用敷文文德覃究建閣寫書充棟齊廇玉峯策府罅苴逸收睿裁天縱發蒙指謬開拓萬古一洗飣餖金河尋騫石鼓編籀中聲按夔還律考竇頒庠聚珍流通坊購禮備樂章師濟左右髦士國生羽儀天就雍雍鸞翔肅肅鵷簉抃舞堯階天子萬夀天子曰都恭膺昊佑五十五年闓澤霑透既阜既康余益敇懋荒垓紘􅓨瀾安軌蹂五代堂增八旬躬遘匪帝私余余其仰副維臣若民余翼哺彀皇則斂敷其錫以富凡百守典章率由舊井飬占元勿幕乃甃乃命賜租農嬉者槈乃命開科儒紆者綬乃禮髙年庠羅者豆乃表貞閭衢穹者獸增秩貤封榮前熠後振滯復爵寬愆赦繆俾軍裕餉俾民飽餾蠲帑流膏禮神薦酎典虔祀修勾龍彛蜼穆穆迓衡諸福來酭正月初吉律中大蔟交泰體元天風行姤綸綍條頒弗枝弗漏艾齒扶觀棘顔歡覯胝手傳鈔悅耳傾讀慶益圭蓬恩覃薪槱清秋聖節天宇晴繡華渚流虹輕雲散飂四表觀光五方集輻水陸叢臻邸館蜂僦街陳百戲角彩紛糅水戴蓬鼇山飛靈鷲洞爥千門霞蒸雲皺人樂華胥熙熙往復爰逮郡國家酺户酘士摛其華文美其搆摹繪陶唐鐘鑑鯨吼乃及絶域嗢咿傴僂菉幣爻閭竒毛異鷇樂我皇風徘徊宿留望闕嵩呼齊心翹首皇思淵蜎恭默中霤珠旒邃延潛孚聲臭觀範禹圖推策文繇鐫章製文螭蟠玉鏤以示無忘珍黃永守申最屏藩溫諭使輶雛雞待哺德音敬紬至哉聖人羣生在宥邁五登三茀祿多又猶日孜孜安老懷幼臣慙弇鄙樵魯區瞀握管紀休難名髙厚敬祝我皇萬齡億胄
