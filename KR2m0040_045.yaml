body:
  text: 欽定四庫全書八旬萬夀盛典卷四十五盛事二十一一産四男三男臣等謹案攣生之事自諸史志及文獻通考咸有專門列於瑞應誠以盛世休養之隆太和涵育之茂與三登豐兆同編者大有之與廣生皆昊蒼眷錫之庥也然孜宋遼諸史所載惟一産三男者或數十年而一見或一方而偶聞與夫人瑞之坊均稱僅事未有如我皇上至仁茂育羣族繁滋適逢大慶之年帝祉多夀既煦化於生民天室多男更衍祥於氓庶至有以一産四男告者洪惟國家户口日增祇令州縣册具實數悉免丁糧如一産三男之瑞經禮部以時彚奏賞賚嵗不絶書計自庚子至庚戌每牒報或六人或七八人凡五十餘户得百六十餘口殷繁之象非特史書所未覩而宜民廣被實較堯之祝華文之歌麟尤備美焉爰登一産四男於簡首以彰聖朝禔福之駢敷其三男者並按十年以來編載用孚洽熙之盛于靡已爾乾隆五十五年恩賞直𨽻完縣民陳化新妻劉氏一産四男直𨽻總督臣梁肯堂謹奏為據報一産四男恭摺奏聞事本年五月二十六日據完縣知縣戴書培稟報縣民陳化新之妻劉氏一産四男現俱存活請照例給賞等情臣即批行藩司轉給賞錢米布匹並諭令加意撫養竊惟大化涵濡民物致滋生之盛太和翔洽閭閻昭蕃庶之休故禾以九穗呈祥而人以攣生衍慶三男並育已屬希聞四子偕生尤為僅見占嵗無年月日時之異一乳得伯仲叔季之全頌邰室之瓜綿上應聖朝嘉瑞贈黎陽之榖帛奚誇舊史傳聞除據詳咨部外謹具摺奏聞奉硃批覽乾隆四十五年恩賞直𨽻景州民梁功妻申氏等六人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督袁守侗咨報河間府景州民梁功之妻申氏四川總督文綬咨報保寧府昭化縣民王宰仕之妻張氏原任浙江巡撫王亶望咨報杭州府錢塘縣民張軼眉之妻裴氏湖北巡撫鄭大進咨報襄陽府光化縣民魏子桃之妻楊氏調任河南巡撫榮柱咨報開封府鄢陵縣民張起雲之妻邢氏山西巡撫喀寧阿咨報潞安府屯留縣民孫兆寶之妻牛氏俱一産三男其應賞各本家米五石布十匹各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆四十六年恩賞直𨽻寧津縣民萬富民妻馬氏等四人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據原任直𨽻總督袁守侗咨報河間府寧津縣民萬富名之妻馬氏河南巡撫富勒渾咨報開封府鄢陵縣民馬永恕之妻張氏升任湖南巡撫劉墉咨報衡州府常寧縣民張生菽之妻吳氏原任四川總督文綬咨報綿州梓潼縣民羅全秀之妻楊氏俱一産三男其應賞各本家米五石布十匹各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆四十七年恩賞直𨽻通州民劉佩妻馬氏等三人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據原任直𨽻總督鄭大進咨報通州民劉佩之妻馬氏江蘇巡撫閔鶚元咨報髙郵州民于志學之妻管氏河南巡撫李世傑咨報裕州民羅鳯舞之妻皮氏俱一産三男其應賞各本家米五石布十匹各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆四十八年恩賞直𨽻元氏縣民劉竒妻髙氏等四人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據原任直𨽻總督袁守侗咨報正定府元氏縣民劉竒之妻髙氏山東巡撫明興咨報平度州民劉晏之妻王氏萊州府掖縣民髙起林之妻孫氏兖州府嶧縣民孫育恩之妻鄭氏俱一産三男其應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆四十九年恩賞直𨽻巨鹿縣民王三平妻尹氏等五人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督劉峩咨報順德府巨鹿縣民王三平之妻尹氏江蘇巡撫閔鶚元咨報淮安府山陽縣民陳起之妻班氏浙江巡撫福嵩咨報紹興府會稽縣民吳如璋之妻宋氏調任湖南巡撫伊星阿咨報長沙府醴陵縣民李宗桞之妻談氏河南巡撫何裕城咨報南陽府裕州民薛文照之妻李氏俱一産三男其應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆五十年恩賞直𨽻寧津縣民劉丕服妻張氏等八人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督劉峩咨報河間府寧津縣民劉丕服之妻張氏兼管奉夫府尹鄂寶咨報承德縣民于朝亮之妻張氏山東巡撫明興咨報登州府萊陽縣民劉成盛之妻吕氏河南巡撫畢沅咨報汝州民李大士之妻季氏護理江西巡撫李承鄴咨報南昌府新建縣民黎獻文之妻熊氏升任福建巡撫雅德咨報福州府連江縣民滕奎珍之妻吳氏署湖南巡撫特成額咨報辰州府乾州廳民吳老貴之妻石氏調任貴州巡撫永保咨報鎮逺縣清江廳塘兵許必顯之妻王氏俱一産三男其應賞給各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆五十一年恩賞四川新寧縣民傅學義妻羅氏等三人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據調任四川總督李世傑咨報達州新寧縣民傅學義之妻羅氏河南巡撫畢沅咨報陜州民鄭順之妻陳氏安徽巡撫書麟咨報寧國府南陵縣民任及賴之妻羅氏俱一産三男其應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆五十二年恩賞直𨽻曲周縣民麻佳彥妻齊氏等七人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督劉峩咨報廣平府曲周縣民麻佳彥之妻齊氏協辦大學士仍管陜甘總督事務福康安咨報鞏昌府洮州民王芝臣之妻侯氏安徽巡撫書麟咨報寧國府涇縣民吳謀之妻徐氏河南巡撫畢沅咨報衛輝府獲嘉縣民聶士聰之妻史氏懷慶府修武縣民朱永富之妻馮氏湖北巡撫薑晟咨報安陸府京山縣民李羣來之妻毛氏湖南巡撫浦霖咨報長沙府益陽縣民吳東漢之妻周氏俱一彥三男其應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆五十三年恩賞直𨽻天津縣民黃世達妻孫氏等三人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督劉峩咨報天津府天津縣民黃世達之妻孫氏升任河南巡撫畢沅咨報衛輝府延津縣民申令友之妻袁氏江蘇巡撫閔鶚元咨報徐州府睢寧縣民歐成起之妻王氏俱一産三男其應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了乾隆五十四年恩賞直𨽻寧津縣民李成用妻于氏等十一人一産三男禮部謹題為一産三男事查會典內開一産三男準給米五石布十匹今據直𨽻總督劉峩咨報河間府寧津縣民李成用之妻于氏順天府順義縣民張理之妻柯氏前任四川總督李世傑咨報保寧府昭化縣民張應輝之妻劉氏廣安州民廖伯萬之妻朱氏敘州府宜賔縣民萬方麟之妻陳氏河南巡撫梁肯堂咨報南陽府南陽縣民楊有信之妻王氏山東巡撫覺羅長麟咨報濟南府陵縣民孫耀才之妻曹氏萊州府掖縣民王登之妻孫氏江西巡撫何裕城咨報南昌府武寧縣民雷元溥之妻張氏原任貴州巡撫李慶棻咨報思州府民李運貴之妻髙氏管理奉天府尹事務宜興等咨報海城縣民陳佐龍之妻杜氏俱一産三男應賞各本家米五石布十匹除各該督撫咨明户部查照賞給外理合照例彚題奉旨知道了臣等謹案庥嘉之應惟以實事可徴者方不騖於禨祥之説方今仁化翔洽齠稚咸霑皇上保赤誠求惠懷周浹是以民間同産三四男之盛疊輳駢臻人瑞之繁允為僅見而湛恩所及令典攸施錢布之頒小民生而戴德正不特徒循例事蓋實足以備盛世之祥徴者矣八旬萬夀盛典卷四十五
