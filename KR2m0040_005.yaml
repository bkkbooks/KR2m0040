body:
  text: 欽定四庫全書八旬萬夀盛典卷五聖徳一敬徳一臣等謹按稱天子為聖人昉於華封祝堯三辭而帝典一書史臣首紀之曰克明俊徳葢堯之徳無能名而堯之舜則臣民所共戴而慕焉者巍巍放勲立極萬古夫豈徒致夀富多男之頒已乎洪惟我皇上廣運欽承攸好歛錫五十餘載以來篤膺昊貺統輯夀釐惟修徳之日蘉聿用祗迪寸𠂻運量天下粤若古稀六帝亦有登八三君而年彌髙徳彌劭如我皇上者開闢至今天子而聖人允兼備而尠前聞焉伏惟御極既乆以宥宻之基命昭恒徳之日新凡夫立政敷言不特在庭在外臣隣欽承親炙即薄海億兆亦所共見共聞臣等恭編盛典推原致福之由謹約舉十年近事分類以繋用備寔徴曰敬徳以明昭事曰孝徳以羙作求曰健徳以著保躬頤性之原曰勤徳以彰省憲諴民之本仁孚恵而徳心式廣文起化而徳教旁流至今儉勵還淳謙尊撝吉神明合撰進修日強夫惟徳如天乃福亦如天惟曰臻於萬年與天為無極臣民之誌慶寕有量哉皇上親嵗郊祀乾隆五十五年聖夀八旬躬詣圜丘方澤親祀如初御製庚戌冬至日南郊大祀禮成述事庚戌大祀欽承幸八旬三成拾級陟如循長年人感昊㤙篤仰事子䝉俯育親昆上樵蒸一元燎和鳴薌呹九鈞申禮竣欲退難為退度度其能籲貺頻御製庚戌夏至方澤禮成述事庚戌厚徳資生候一誠執祀辰安安䝉貺佑嵗嵗朂躬親五月符祥數八旬受恵身仍祈霈甘㴻與物共含仁先是乾隆四十四年皇上以越嵗庚子正届七旬萬夀定皇子恭代配壇獻帛爵禮是年十一月初六日奉上諭朕自踐阼以來恭遇郊壇大祀一切儀文典禮悉本誠恪之心謹敬将事以期昭格厯四十四年如一曰弗敢稍有懈弛惟是越嵗庚子朕春秋已届七旬雖自信精力如舊凡升降拜獻尚可弗愆於儀但迎神進爵儀典繁重若各壇位前俱仍親詣轉恐過疲生憊於精意或有未孚非所以展精禋而答鴻貺也因思正位上香獻爵朕必當躬晉申䖍至列祖列宗配位上香朕仍親致其獻帛爵諸禮著自今年冬至南郊為始令諸皇子代陳邇年郊壇大典令諸皇子敬侍觀禮即所以預教之也庶朕稍節起跪之勞一心専於祼薦此非所之敢萌怠念也㑹典開載郊壇之祀原可遣親王恭代敬憶皇祖聖夀六旬以後因歩履少艱大祀雖遣官恭代仍於壇門荘跪以将誠意今朕幸拜登尚可如常祗期省曲節以壹志明禋並非躭安逸而倦於對越凡天下臣民皆可諒朕本懐即上帝祖宗亦必鑒朕悃忱且不特此也嗣是而八旬能常如今日而不衰必不敢因年嵗屢増於禋祀稍有或佚如䝉上蒼眷佑得遂朕之初願至八十六嵗歸政惟當始終弗懈以伸朕敬天法祖之深𠂻耳著各該衙門敬遵辦理並通諭中外知之乾隆五十一年定於郊壇讀祝拜位上増偹小幄次一分是年十一月初二日奉上諭人君者天之子當以敬天勤民為首務方可以承昊貺而迓鴻庥設於對越之事心生懈忽不能敬謹将事是不成其為天之子而昊蒼亦㫁不錫之嘉祐也朕臨御五十一年以來恭遇郊壇大祀無不祗肅躬親冬至南郊親詣五十一次上辛祈榖親詣四十九次惟乾隆五年及四十九年因躬躬偶爾違和遣皇子親王恭代而當臨祀時一切儀文典禮悉本誠恪之心躬申䖍敬以期昭格近來雖年逾古稀壹志明禋益勤勿懈是以仰䝉上蒼鑒朕忱悃得有期頣之夀精神強固猶日孜孜萬幾親理郊祀大典俱能肅将祼獻升降周旋勿愆於儀緬維上天如此篤眷惟有益懋寅恭豈忍以年夀已髙稍耽安逸致精意或有未孚朕世世子孫纉緒膺圖若能以朕之心為心無刻不以敬天為念於郊壇大祀嚴恭寅畏盡敬盡誠自亦必仰邀昊穹眷顧錫以大年寔我大清億萬載無疆之庥倘不能凛承朕志永矢䖍恭稍萌怠忽即非朕之子孫天亦㫁不錫之以福也向來致祭郊壇於壇之二成設有幄次以偹拜跪行禮迎神上香進爵供胙上壇行禮畢仍回降至拜次嗣因朕年届六旬恐精力不能如前将亞獻終獻飲福受胙諸儀改於壇上讀祝位次行禮以節登陟之勞仍不致或愆儀節此朕自欲每次躬親祀事是以稍存簡易非敢於郊祀大典存耽逸之見也惟念将來朕春秋日髙誠恐歩履或稍遜於前意欲於壇上讀祝拜位添設小幄次一分俟朕年至八旬即於此内行禮設此二三年内遇風雪沍寒亦可稍資蔽禦如果仰䝉上天眷佑仍能精力如舊至八旬而不衰尚必照常行禮所有添設幄次原可偹而不用著軍機大臣㑹同工部太常寺敬謹詳勘将應添幄次尺寸比二成之幄次收小酌擬呈覽再行偹辦此非朕之敢萌逸念也盖郊祀大典蠲潔躬承惟期誠意感孚䖍申寅恪倘因儀節繁重或至精力不勝勉強将事或令人恭代則於精一凝承之意轉有未盡此後郊壇大祀朕必嵗嵗躬行至八十六嵗歸政時始終勿懈以伸朕敬天法祖之志我子孫若能繼成無斁方可永膺洪貺垂裕萬年矣臣等謹按郊禋鉅典儀節嚴重皇上對越寅恭弗懈益虔夀逾古稀每嵗率親詣無間仰惟聖夀彌髙精神彌固爰議儀節以壹凝承乃定配壇代奠之儀仍修正幕躬承之敬至于讀祝拜位雖命増幄次備而弗用益見聖人健孚恒乆積萬年而惟矢一誠是以見諸訓諭及禮成述事嵗有詩篇惟以答鴻庥凝眷命兢兢業業三致意焉盖皇上旦明宥宻無事不敬以作所而至於篤穹輿之嘉貺如父母之不敢言報尤極小心翼翼之忱當夫㤙鑒式憑欽承昭事恪恭震肅以通諴感其格契者㣲其迓禧者所由悠且乆歟皇上毎嵗躬舉祈穀乾隆五十五年聖夀八旬親詣行禮如初御製上辛祈穀禮成述事庚戌百王孰弗萬方臨帝眷均䝉藐獨深踐阼年臻天地數銘盤日朂惕乾心八旬敬得承祀辛五載勤徯歸政欽秋雨雖優冬雪欠春霙冀渥麥秧鍼先是乾隆四十六年定祈穀仍用上辛是年正月二十四日奉上諭本月二十三日禮部具題壬寅各壇廟祭祀齋戒日期一本冊内正月十四日次辛祀祈穀壇所擬甚屬不當天子父天母地祗承之義不可稍弛從前雍正七年恭奉皇考世宗憲皇帝諭㫖以定例正月上辛若在初五日以前則改於次辛但元旦朝賀乃朕躬之禮義若因此而展祈穀之期於心寔有未安着于上辛行禮煌煌聖訓寔屬萬世不刋之論朕御極以來遇正月初三日以以前上辛因必湏隔年齋戒是以改用次辛其有初四日上辛亦改用次辛行禮者則因聖母皇太后祝釐初祉朕於元辰躬率王公大臣拜賀東朝儀節不容稍缺至明嵗正月初四日上辛並非禸年可比矣該部何得亦改次辛况冬至南郊禮成有於次日受賀者所謂禮縁義起而義以方外尤必敬以直内如為臣下意在尊君不敢輕易朝正令典亦當偹查往例具奏請㫖乃禮部遽行題逹閣臣並不細心請㫖擬簽必待朕自行看出耶所有禮部堂官著交部嚴加議處大學士等著交部察議至祀典本屬吉禮而上辛祈穀尤嵗首鉅典乃該部必於二十三日具題閣臣亦即於是日呈進朕雖不以此責偹而諸臣踈忽若是可謂不知仰體朕懐矣所有明嵗祈穀行禮仍用上辛並着為令将此通諭中外知之是年二月初一日奉上諭禮莫大乎敬天義莫隆於郊祀前以禮部具題壬寅年祭祀壇廟各日期将祈穀行禮改用次辛所擬不當已明降諭㫖仍用上辛矣孟孟祈穀所以迓陽氣而兆農祥考諸經傳盖指立春以後之上辛而非元旦以後之上辛雍正年間恭奉皇考聖諭飭禮臣定議允宜永逺遵守敬思其義若上辛在立春前舉行與乗陽之義未為精當又上辛設在正月初三日以前則當於舊臘隔年齋戒而太廟祫祭寔為合饗大禮即宫中拜神亦屬國朝定例若於齋戒期内照舊舉行於専一致敬之道似猶未協其應如何斟酌古今益臻明備並非世遵守可行之處著大學士九卿詳悉妥議具奏是是年定詣壇祈穀日於皇乾殿西垣門外降輦歩詣二月初三日奉上諭朕自臨御以來每遇郊祀大典無不蠲潔躬承四十六年如一日今仰荷昊蒼眷佑夀逾古稀仍當躬親行禮而一切登降禮儀歩履究覺稍遜於前若遣官恭代非朕勤於躬親昭事之初心而勉强将事復于精一凝承之意轉有未盡因諭該部前徃敬視祈穀宿齋宫詣壇瞻拜日降輦處兹據福隆安等奏請擬由皇乾殿西墻門外降輿較為近便等語應如所奏交各該衙門遵照辦理此朕仰體上天眷愛朕躬長申寅恪之意将來朕子孫纉緒凝庥有夀登古稀者亦可欽承朕志於郊壇大祝嵗嵗躬行率由此典以上邀皇天眷顧之隆庶㡬無疆惟休永膺昊貺垂裕萬年将此通諭中外知之是年十二月十二日奉上諭明年元旦係上辛祈榖齋戒日期所有元旦應行拈香各處仍親詣行禮初五日陞殿受賀臣等謹按孟春祈穀三大祀之一皇上斟酌古今折𠂻禮意仍循合饗拜神之典朝正之期爰展乘陽之義並昭於以垂定制而訓方来允億萬年所當恪守臣等恭查乾隆四十五年以後頻嵗親承又若孟夏常雩禮與郊禋並重欣逄夀登大耋躬莅肅将惟矢誠假以召天和是以佑命之統因日躋之敬而彌篤不特綏豐協順有以徴大聖人孚感之神云爾也皇上每嵗親祀社稷壇本年聖夀八旬躬詣行禮如初御製庚戍仲春社稷壇禮成述事庚戌三祭四朝齋社朝日壇祀文廟為中祀致齋二日三祭稷壇大致齋三日今春分丁戊相連故齋期自初三日為始凡四日云躬親蕆禮皆䝉庥仍健旺致敬敢違乖土穀民之命安和心以懐秋膏雖積潤春澤更祈佳臣等謹按天子之社為萬方籲福報功我皇上每遇吉戊祈穣躬親晋玉嵗致精䖍本年夀祉鴻龎時和玉燭登平協奏履健升馨從來物土兆祥未若兹之親祈罔懈者也臣等恭編敬徳謹以邇年來皇上躬承大祀壹志凝承昭垂定制者載於卷首而若髙齡展恪中祀一週爰以次臚叙云八旬萬夀盛典卷五
