body:
  text: 欽定四庫全書八旬萬夀盛典卷一百八歌頌二十八萬夀恭紀賦頌十二章謹序翰林院編修臣謝墉臣惟溯自䆳古之初天地人皇元始應世各八千嵗以迄循蜚䟽仡五帝之紀數徃知來元㑹載周有開必先欽惟聖皇誕膺寳祚粤在上章奄茂為乾隆五十有五年恭逢八十萬夀合天地之數以衍乾坤之策推八㑹之文以符十華之劵懿乎哉亘數千年而一覯若是其炳耀六合景鑠萬古也仰惟我皇上斟元陳樞秉籙司契得道之柄荷天之龍由於彌性純常協極帝縡是以夀考維褀介祉禔福三靈效順萬國咸寜自五三六經所載勲華之盛未足以罄焉臣竊以為際兹神化民宜大理物博無庸以子雲相如孟堅平子靡麗之詞形容夫儀若祥淑之萬一也不揣愚陋操佔畢之素以成下里之歌敬第為賦頌十二章其第一章曰徳耀嘉謹記叡性淵穆顯藏無間心鏡萬機自然炳燭故能合四荒四極逈遐逷濶之宇而運之扆闥無不照重離而耀之以光明也其第二章曰昊穹佑謹記聖敬祗翼昭事欽寅肸蠁豐融達於帝座凡作長歛蔵之司一叶之時若所以召通正而致綏豐也其第三章曰祖烈恢謹記兩朝志竟昄章式廓袛廸前光以康逺服于自古未臣之民厥户口之於自古未畧之地厥屯耕之葢勲兼乎黄農而蹟邁乎禹翳也其第四章曰闓澤旉謹記大恵之頒普蠲惟正萬夀保艾多福錫慶是則博施之富積算極乎經姟而周澤之渥歌舞騰乎億兆有孚恵心羣黎徧徳也其第五章曰聖文煥謹記天章萬卷言成典訓崇論谹議陶鑄淵㴠至于羣玉之藏綜圖籍而薈萃焉四庫所羅統朔南而嘉恵焉斯則君師之隆軌邁七畧而兼三不朽者也其第六章曰神武昭謹記蔥嶺雪山龍韜授鉞闢三萬里四衛普寜若夫笻筰以外冉駹以西儧刺促浸徳威疉施並禀神策運籌以决勝耆定易豫象所稱順動詩皇矣所云篤祜者也其第七章曰河源顯謹記天苞地符應時乃彰乾坤端倪待聖而作既通道而底西王之國遂端拱而致河圗之祥此靈協于懐柔而瑞呈于天一者也其第八章曰石皷新謹記岐陽大蒐史籕古文遺跡纂排適昭威武以是璧雍圜水觀聼為之日新而文囿三驅命中共瞻天授者也其第九章曰安南格謹記嶺隔桂林江流富良文徳誕服惕息享王此伏波之柱所未能撫而諸葛之鉦所未能招乃納貢而輸忱入覲而祝嘏也其第十章曰花象徠謹記爨𤏡之鄉撣縹之地逺逾木邦來自金齒率舞其儀咸若而至夫且上軼乎成周之㑹而寧不逺超乎貞觀之圖則徳之休明無逺弗屆也其第十一章曰五代堂謹記皇祖詒謀五福崇搆聖聖相承孫孫弗替五福五代萬有千歳逺推之世系而不經見近考之帝紀而未前聞也其第十二章曰八徴寳謹記天錫九疇庻徴帝念俾夀而昌克勤不倦是惟皇極之敷言而應之康强逢吉聖人之大寳而徴諸悠久旡疆也臣于是欣忭蹈舞聫屬而繹之曰徳之馨香升聞於天徳之作求繩其祖武天祖並佑之者厥由勤恤民隠而除其害博愛之仁有嘉徳而無違心也且夫愛之覃於中外者教之融於文武也于疆于理漸被暨訖或原或委軒豁呈露奎璧橋門慶協嘉㑹冠帶蠻服拱受蕃釐也昭徳之致諸福之物輻輳並徴吉事有祥千載一時也以是介期頤衍來晜慶綽綰錫珍符於萬斯年不可紀極矣徳耀嘉第一章臣惟聖人之徳上及太清下及太寧中及萬靈爰基命於宥宻聿不大於色聲盖徳者得也萬化之樞紐而百福之璣衡也皇上乗乾始體泰元則巍巍禀安安粤自徇齊敦敏聰明同符軒轅也文思恭讓光被嫓美放勲也御極以來廣運在蜵蜎蠖濩之中而化馳若神極之五億之選之寥廓而無垠夫其維淵維黙如雲如日以熙載達天徳也丕顯丕承以引以翼以纘緒率祖徳也是訓是行錫極保極以仁心振民徳也夫何亹亹穆穆而人綱人紀之畢飭也兢兢憴憴而官聫官治之咸秩也以是行師大師克以是柔遠逺人格盖將襲九窽重九􅀢廓四方拆八極剛徤中正天常也含宏光大地則也人之窺聖人者皆謂皇上至公也而至明皆謂皇上至勤也而至誠經曰誠則明矣明則誠矣竊嘗恭讀御製執中成憲序曰大學所謂明徳即虞書所謂道心所謂物格致知即所謂惟精所謂正心誠意即所謂惟一所謂止至善即所謂允執厥中允矣聖謨紹聞自道所得而其指歸昭若發矇矣夫聖人之徳該乎動静而貫乎微顯者也大徳無我而育羣生大化因時而宰萬善其於保定孔固握乎氣數之先正位凝命持乎運㑹之轉考之樂緯有曰稽耀嘉夫徳不自耀也維其嘉矣則有耀矣易曰一闔一闢之謂變一隂一陽之謂道是以如天地之無不持載無不覆幬如日月之無不臨照也謹頌曰天行徤徳正中嘉樂顯顯受禄崇廣哉熙熙八極光華惟徳之嘉耀乎無涯光被䀜爽爥幽遐徳惟一罔不吉夀盈萬積無算昊穹佑第二章粤若惟聖格天惟天佑聖夐哉圜則九重之曠邈峻極而至誠之感若響應矣我皇上度對越凛執兢子萬民以承天庥式九圍以祗帝命欽若圜丘方澤之燔燎祈年大雩之祭禜詎徒潔其粢盛豐其犧牷陳其珪璧琮璜作其鐘鏞管磬已哉葢有欽明而精一者焉以徹乎穆清而假乎聖敬臣嘗恭侍禁近與驤駿奔矣當夫良耜初報蜡臘方勤景齋明於法駕凝蒸上而煙煴積精禋以將享遂宻釀夫同雲方禮成而澤逮每盈尺而兆阜蕃爾乃蠶月麥秋戴勝桑隂越有小旱靈雨未零肅珍舘之亶格凝度鞏於居歆佇飛甘而灑潤快觧愠于薫琴爰乃統六宗而引提之合百神而䙃禷之師旅有助順之祥崇貺叠錫愷樂達數萬里而外矣河海有安瀾之慶嘉應駢呈康阜遍十八州之大矣夫玉齍量幣祝史能飭其物而不能宣其義也叔降獻酌禮官能賛其儀而不能通其意也聖皇以明敬孚之以精誠籲之一動念而召和一舉事而綏祜所由延洪禧承景祚遹惟感通在元𣺌幽黙之至微而揚詡在呴嫗覆育之廣布臣謹繹思之聖人一天也以聖格天不待履壇墠薦豆籩陳禱福升柴而後卜其申錫與其吉蠲也是故窺聖而不參以五行五事之符協則不足以徴上蒼純佑之㨗言天而第泥於五方五神之儀位則不足以探至聖昭格之㣲故曰先天而天弗違後天而奉天時自天佑之自天申之不亦宜乎謹頌曰泰元尊徳司契厥契維何陟降一氣於穆不言孔時孔恵奉三無私萬年光被祖烈恢第三章臣嘗恭讀御製創業守成難易說曰創業者未竟之難皆守成者分内之難也夫惟謨烈逺則聲靈宣教典浹則威澤寛臣又嘗恭讀御製普寧寺碑文曰皇天有輔徳之私至聖有越世之度君子有見機之作兆人有可格之誠夫乃恍然於聖猷之運量至深而聖教之融洽至精也夫自三代以還九州攸界道未溥于大同化未臻于無外以是威信莫逮于四荒而經緯總域以兩戒臣竊惟禹蹟所未邁者浮圖之俗象教之國久矣事佛匪懈矣夫孔子聖也為震旦師釋迦佛也為西土師禮曰修其教不易其俗齊其政不易其宜五方之民皆有性也不可推移皇上紹聞衣徳奮一怒而振旅揮城摲邑不可殫紀也考四萬餘里於玉門稽三十六國於班史凡諸國土之佛道神化古稱降靈聖挺賢懿者如天之福覆幬而亭毒之為之分部落以旋定之建墖廟以寧輯之說法以覺悟之振徳以齊一之莊嚴七寳布金千億諒哉融性道教作天人師以聖王之徳政兼法王之願力有若軒帝勤崆峒之問重華致西王之謁徳教之大包涵一切誠不可以一法執也是惟性體昭曠教澤融㑹總徳威於一源旉化育於四大帝學之淵深浩博迴超漢唐宋諸儒而一洗其芥蔕儒者則曰素王得位釋氏則曰調御再世二而一一而二無量之夀無量之福利也謹頌曰仁皇昔西頋燕貽待純熙熙主垂仁慈耆定興西師出之五濁界為重轉法輪以是大神威降伏萬波旬有來衆花門頂禮敬黄教人王即法王總十方部號供養普慈雲和南大歡喜凡彼華蔵海咸承安隱㫖法音鏗華鐘振動覺衆寐曰西土震旦究竟無同異宏闡古佛義寳雨曼陀羅長示夀者相長瞻玉燭和甄陶歸一笵無此疆爾界譬如日月光旦旦燭幽晦亦如甘露味羣萌受滋液是謂善繼述四方以無拂闓澤旉第四章臣惟至聖之勤民本元善為愷悌同仁覆之無涯爰博施而衆濟則嘗逖稽前聞逺推古帝當艱食而疇咨每阻飢之惕志是以禹有則惠之懐文有如傷之視其在三代以還詔令除租僅一見於漢文或與田租之半罕聞繼澤之勤彼唐室之議䘏惟存恵乎從軍雖渙汗其大號將下究而猶屯我皇上軫黎元勤撫字非旱潦而沛恩當豐登而錫恵自御宇於丙辰逮受釐於庚戍膏澤之降也已閱一再而三四乃分年而除之分地而賜之每一詔下而普天率土銀糓之蠲以千萬萬計其他偏隅之免征賑恤之屢被綜大農之度支核寰區之賦稅殆無從紀數於𨽻首而悉祘於周髀也夫其黍稌五土原隰三農既得積儲倉廪比櫛崇墉即彼石田之宇下隰之區尤皇上之所軫念而矜䘏之所旁敷廼有服之􅖽秸藪之薪蒸鎮服藩服之疇五觳五鳬之塍凡蒭茭之所入均鼓舞而承優賚於三登乃聖慈惻然猶不能已於若保也憫五蠧之為奸或舞文而中飽運心鏡以燭之俾䝉翳之悉掃夫而後莫不熙熙於慈恵之師而安安於稼穡之寳然且宫中府中供御撙節嵗㑹計之倍蓗什伯葢克儉者在巖廊而既富者在井邑是又澄源於平治之源而立極于清净之極者也臣恭讀御製節儉論盖以制數度議徳行實惟自上下下其道大光之為益也謹頌曰聖徳同天普汜覆濩仁風慶雲甘雨恵露非不足補非不給助自天降康秉穂載路惠此元元赫胥含哺始自皇畿達于侯甸賜金賜租分年分郡宸𠂻載衡早俾普遍或舞于衢或謳於佃熙皥堯天逰豫夏諺億兆人家積榖無萬請祝聖人夀同此算聖文煥第五章臣聞載道之謂文而文教之隆非夫聖人在天子之位而又久道化成曼夀多福則不能敷章設教以極乎天蟠乎地自雨粟以降萃古皇王后辟而莫與倫比也且夫聖如孔子而茍無其位則托諸空言而不能見諸行事故分道於八儒而爭鳴於百氏歴選列辟則既罕稱斯誼矣惟我聖皇兼欽明濬哲之上質而加以緝熙敬止焉自帷宫典學以至景命誕膺閱今聖夀八袠御製諸集文成數萬巻溢數千闡道徳之奥指抉性命之真詮其於繼也臨講筵攄御論探理窟於圖疇接心傳于堯舜正諸說岐趨而一衷于古聖之大訓搜載籍而擷其腴超萬象而宣其藴原於得之躬修而非徒炳烺於學問其于史也别公私定正閏嚴紀實務傳信三長惟識為最難而任好惡為予奪葢不可以不慎所以等百世王而作羣倫鑑者春秋天子之事端賴論定而不紊爰乃兼綜而條貫之䟽通而揚㩁之上考天時之儀象下辨地紀之脈絡大者窮星河細者析骼角按禮器而定彛章蕃黄鐘而定雅樂極格致於萬殊究物理而賁若至若翠華所蒞咏吟山水每念農艱動闗民紀則又雨暘寒燠胥入甄陶而月露風雲咸歸性理者也若夫萃典文於太古集著述於羣儒魏汲冡未獲竹簡漢謁者莫載使車逺窮羲畫下逮虞初命詞臣使校理給筆札以徴書或待詔於金馬或染翰于石渠與乎斯烈者皆得綰半通之綬以分榮於太乙藜照之餘書成而奏御者盖六萬六千册貯之文淵之髙閣爰四庫之攸分遂乃御園山莊文源文津盛京文溯四閣切雲極數天一名義攸存江浙之地行館仙寰宿環七宿鼎峙三山諄命疆吏嘉與儒冠俾遜志而汲古得握鉛而懷丹宏作人之雅化以共逰學海之寛若夫國書之譯六籍既參梵經貝夾字母華嚴西畨衛蔵象鞮再三益以䝉古同文不刋是又聖學之統四部洲以貫徹而包函之者也謹頌曰天文炳兮雲漢章光耀墳典兮嫓羲皇册府璘斌兮陳琳琅酉山之積兮宛委之蔵萬年有道兮運㑹昌神武昭苐六章臣惟虞書言徳之廣運曰乃武乃文魯頌言徳之敬明曰允文允武然而書則繼之曰為天下君頌則繼之曰自求伊祜是以大文三曽而貴義與徳大武三曽而偃武與力易曰惟㡬也故能成天下之務惟深也故能通天下之志惟神也故不疾而速不行而至其我皇上神武之謂乎夫惟有剛徤篤實不息之精神而後有聰明睿智無窮之謀畧有智勇天錫非常之靈承而後有莊敬日强匪懈之勲烈臣聞古者戰功之多皆言黄帝盖享其利服其教畏其神夀其三百歳矣我皇上之平伊犁也俘達瓦齊平回部也殱阿睦爾撒納誅大小和卓木拓土者二萬餘里而傳箭及於天方黙克平兩金川也俘僧格桑擒索諾木夷地險靖畨族夫皆伐簒也戡亂也討叛也盖履信思順天人交助易以知險簡以知阻故睿算所運若龍興而雷震如轂轉而鈞旋其他㺯兵潢池之輩偶一竊發即聚而殱㫋惟夫海嶠之永靖更見畨酋之款闗綜武成之敷九皆聖謨之秩秩而非徒恃勁旅之桓桓是故機有遲速而神乎機者遲也而實速之權有難易而妙其權者易也而先難之懿神䇿之超乎人謀鬼謀而運乎九天九淵早徹乎雷動風舉太壹天一之秘風后力牧鵊冶容區之篇臣惟武有七徳始之禁暴戢兵繼之保大定功夫然故民遹安衆遹和財遹豐我皇上綏靖邉徼於執訊獲醜也若拾芥於撥亂反正也若轉蓬神威之震也㨗而醇化之浹也醲此聖人之赫聲濯靈無以異於戮蚩尤與應龍故武者所以救民救民所以夀世也夀世則惟多夀之主始克有其膚公遐稽史册惟我皇神武乃逺嫓夫有熊是以荒䀜闇昧之宇咸得覩靈䑓偃伯而禮樂交通也謹頌曰西極既屬兮西南夷平増其式廓兮應天而時行四塞之外仰徳威兮莫不來庭銷金甲兮事屯耕邉籌鞏固兮聖人有金城始之武者終之文大哉耀徳不觀兵河源顯第七章臣惟大順之世天不愛道地不愛寳而要必聖喆之君為能握其紀溯其源以穿溟滓而窮天造臣嘗考爾雅之文曰河出昆侖虗色白所渠并千七百一川色黄千里一曲一直恭讀御製河源各詩文皇上因治河祭河廼遣侍衞徃青海窮源得黄金河有北極星石水源釃為百道而河出昆侖之言益以昭晳夫昆侖在今回部之地即漢西域也虞舜以治水命大禹而曰昆侖析支渠搜西戎即叙古稱其地號西王母昔者西王母貢白玉環於虞舜而益地圖附焉當是時龍魚負文固必析其源流而非同漢張騫之未覩者矣元代訪焉至鄂敦淖爾而即誌其所則河之真源數千年未顯夫固有待於體天合撰奄有西極之共主也夫昆侖河源之說括地象所稱有八柱焉其髙入天有三千六百軸九城十二樓金䑓玉闕上拂星辰焉山海經謂為帝之下都玉山平圃實為之鄰丹邱福庭羽氏夀民極靈異於前聞今而知昆侖之源伏流行地恭讀御製已示其真矣其旁若産玉産馬之區昔之所載枝斯璿瑰􅀈瑶玲璅今則和闐之人采嘉玉以貢而舂山之珤重􅀈氏之所守悉供服御而登玉府矣昔之所載蒲梢汗血騕褭乗黄今則大宛之人擇善馬以獻而天馬之子渥洼之良悉入駟閑而效騰驤矣夫乗吉良而多夀服瑾瑜而禦不祥其說為叡哲所弗道頋自舜禹至今徃代之所弗賓者其土守悉𨽻焉自漢唐至今徃代之所未顯者其源流畢詳焉自夫葱嶺鹽澤諸地皆聖武為之奠定而疆理之者也乃於稽宋志河渠元志地理辨其誣証其是譯其名義而阿勒垣郭勒噶達素齋老之為黄金河北極星石可得而紀也臣以是知河源之顯為皇輿無外之驗聖夀無疆之徴所謂如川之方至以莫不増者也然則自漢迄元上下數千年發其端而未竟如九仞之終虧洵至徳之淵涵無極而靈源之昭著有時彼馬遷班固所云惡覩所謂昆侖者終将快覩之矣謹頌曰黄圖式廓聖夀曼天一之根探灝瀚地靈上接天池星北極璇樞拂銀漢帝遣侍臣溯洄之蒲昌遥注𣺌無岸渾渾泡泡泑澤中沸沸湯湯峚山畔一川色作黄金英百道泉飛珍珠涣乗槎博望昔未登山經水經空汗澷於皇闢土三十載祭川萬里踰星海允猶翕河裒對同手指青邱紀章亥石鼓新第八章臣惟徳之休明經文而緯武時之㑹合轢古而切今是故綜作述而神之者至明至聖也融道藝而一之者至精至深也粤成周之大狩紀獵碣於宣王繄史臣之作歌有籕文之矞皇歴秦漢晋魏六代千有餘載於陳倉之野苔封蘚剥始顯蹟於有唐虞禇觀之歎其墨妙韋韓詠焉為之闡揚逮宋世而蘓梅繼作艷稱夫蛟龍之欝律猶存四百六十之飛鳯凰閲金元與勝國信神物之呵䕶當盛世之右文列㦸門而争覩雖淋炙之無虞猶斷缺之莫補欣逄乙覽親披宸衷濬發念太武之九成嘉册府之四徹帝曰俞哉寳翰飛丹首尾嚢括詔之儒臣足成其八比事屬詞明本係末懿妙義之維新乃竒文之由舊重摹繪夫珪璋爰載鐫夫瑶玖蟠蟠龍魚蜿蜿科蚪逺揖軒倉上耀星斗臣乃盥誦而稱曰斯為大清之石鼓矣夫籀書特妙於三千年以前而大顯于三千年以後信哉孔子西行不到秦天工毋乃令鬼守不惟嗜古之大儒所莫能襄抑亦中興之令辟所不能有若是者洵足慴六丁壓二酉傲宛委笑岣嶁遂使驚動蟄翔鸞翥鳯之文若早為聖神文武而夀此貞珉天子樂而玩焉乃大書而顔之曰文成石夀復摛藻而記之曰㑹萃時合也臣伏而思之曠代而一覩者㑹也百年而後興者時也㑹之既萃時弗遥矣時之既合㑹弗暌矣是故史籀周宣之臣也廼車攻吉日錄於雅而石鼔未登於詩詎非有待於徳威交鬯中外一家之聖而後洩其竒昔之賦六月戰千畝㑹東都平淮徐者方斯蔑矣若然則精氣之存可徴於應物而羲娥之遺曷慨於昌黎是鳯翔不得侈其八觀而歐陽無庸獻其三疑也謹頌曰周道㣲石鼓淪聖瑞協石鼓新㑹之萃徳功言時之合君臣民列甲癸誌丙申辟雍樂簴業陳灤京地爛橋門瞻鳯藻絢虹紳包三古鬯九垠岐陽蒐何足云安南格第九章臣惟聖人奉天故以上天之心為心聖人子萬國故以萬國之心為心是以兼容而并包者鈞陶之廣也因時而建徳者柔懷之深也安南交趾之國自漢唐以來叛服之不一羈縻之相仍皇上以乾坤之量幬載之以日月之光照臨之溯元明之不靖經陳黎之遞侵彼蠻觸之時鬭殆干戈之日尋昔人謂四夷之爭中國之利此覇略之談而非聖人悉主悉臣並生並育之意也天厭黎氏弗祚其國皇上乃因阮氏之輸誠乞封號以内屬既畏威而抒厥悃忱亦慕義而願為臣僕帝用俞焉遂梯山貢琛測水受吏奉表欵闗至於再四守臣達其忱天子奬其志其王乃披瘴霧于鳶跕之鄉衝蠻烟於蛟蜃之澨率其官僚將其子弟載馳載驅無虞無貳廼以孟秋之辰登于中夏之地入覲雲莊祝釐彤陛如小草之傾陽若細流之來滙天子乃賚以嘉珍錫之芳醼既醉既飽孔恵孔燕覩黼黻之光華瞻文物而欣羡易冠帯而列親藩詠安吉而賡晏粲稽顙樹頤振動舞旋維時四夷酋長及千百國入貢稱祝之陪臣聫𬒮接祍蹈徳詠仁莫不忭舞而言曰盛哉乎大皇帝中土之聖人也吾儕蕞爾國敢不來王來享億萬載永戴尊親皇上嘉重譯之義人之服固邁乎越裳之入貢而花象之徠又何異嘉禾之豐穰也哉謹頌曰憬彼越裳馴象是獻接武而來迢迢𬗟甸戞里蒲甘滌瑕回靣秋爽兩階曉晴三殿詄蕩天門繽紛彩扇花象巍峩竒文攸煥神靈滋液瑶光星見百濮九菌犀翠曷玩圖之王㑹職貢有爛非物之珍繄徳之薦南方曰象敬執壤奠萬國觀瞻億年舞抃五代堂第十一章臣惟易占餘慶書稱百祥福履之集於純徳者誠未易紀算而測量然若多福多夀多男見於華封之祝陶唐而古簡所載二十五宗蕃于黄帝則百斯男衍於文王為千古之盛歴代莫得而方夫詎能如我聖性之粹也以春秋八千之權輿七年以前獲兹嘉瑞非麟趾䘇斯之所可形容而瓞緜椒衍之所得擬議也夫徳者福基而福為徳致夀為福先而福以夀備聖謨洋洋瑶篇炳示敬天命以綏之祥愛民生以施之恵勤政事以懋之和親賢能以襄之治夫且載推好徳之詞以申斂錫之義葢萬善彚於宸衷而百集福於聖世夫固日升月恒長卜其芋寧松茂竹苞永存於塗暨矣臣伏而推之五福五代五五二十五相乗而符天度恭逢紀元五十有五而合天地之數萬夀八十以八乘之乾坤之䇿萬有一千二百五十具仰新宫之攸寧衍洪算而始布欣占六代之方來于指顧也謹頌曰重熙景運祖武䋲翬飛燕翼輪奐承於皇述事天慶膺本支九族繞膝登萬年之觴拜舞稱五福頌列錦屏徴聖夀延洪兆雲仍八徴寳第十二章臣惟洪範九疇上帝之寳也錫之神禹而彛倫叙文命敷錫之聖皇而徳旡疆夀不老盖協應于敬事者徴曰庥而斂敷於建極者徳攸好萬古之經三才之道也皇上七十萬夀鐫古稀天子之寳而繼之曰猶日孜孜十年之間身益以康強思益以聖叡徳施之溥無間於宵衣旰食而元化之馳不隔於月竁日際然且淵衷穆乎依然凛時幾勤愓厲也洪惟八十萬夀之辰鐫玉焉曰八徴耄念之寳御製文以紀之有曰念庶徴即所以念萬民三復紬繹盛治之淳也而猶以八徴聖人之勤也皇躬之徤也而猶曰耄念聖人之仁也臣惟自昔傳國之以寳稱者大抵侈陳受命與其夀昌珎藍田之玉炫鵠頭之章皆沿其文而襲其器無其徳而夸其祥已耳景聖性之凝命煥徳業而焜煌惟夫九五福之斂時而敷錫本於八庶徴之敬念而弗㤀臣嘗恭讀御製國朝傳寳記曰寳器非寳寳於有徳徳足重寳寳以愈重大矣哉所由述祖徳而承天寵故五福之集兆曰大同而五事之原基于敬用是以庶民協風雨之従而萬國象星辰之拱夫然則寳非和璧而苞符之秘粲乎其璱瑮也制不龍螭而敦琢之章宛乎其陸離也篆不斯籀而雲漢之倬煜乎其樞斗也諒哉聖徳之耄不倦勤而至誠之徴則悠久是故啟靈準之聴統兆人而㑹歸炳曜度之甄起百王而無偶矣謹頌曰於鑠洛書明徳承庥聖皇纘績煥乎嘉猷八徴耄念實惟智周聖人大寳寳非琳球天載之合民莫之求眉夀時萬無斁於箕疇八旬萬夀盛典卷一百八
