  text: 欽定四庫全書八旬萬夀盛典卷二十七
  hash: sha256:6c4e94a0b0560fd9afeea5b7f8a9e45744e34a9f855985bbb1b0ab05a91f4888
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2m0040_WYG_027-1a, image: WYG0660/WYG0660-0304a.png}
body:
  text: 盛事三五世同堂一臣等謹案國家禔福之隆莫茂於延祺奕世聿揚似續之庥欽惟我皇上慶益蕃滋恩深懷保亦既克昌著美衍一堂五世之祥臣等謹編盛事以慶得皇元孫冠簡而民間之仰霑郅福喜溢抱孫籍以增堯祝三多之忭者可以次臚紀焉蓋在齊民長飬生齒繁昌惟知快夀宇之同躋得共沐安懷為幸而不謂閭簷賤末亦獲因國祉之崇洪彰家祥之繁衍既諭詢之遍及更御詠之叨榮亘古未有之遭逢至今日而咸欣親遘又且元辰宣詔嘉賜均頒重以夀屆百齡歡騰繞膝榜書示奬茂典優承盛矣哉君親之愛胞與同之合四海為一家其篤禧正未有艾豈惟唐以來簡牒所紀僅載錢朗等六家為引年鍾慶之彰著者哉乾隆四十五年旌表五世同堂百歲以上夀民趙元寅等二人禮部謹題為欽奉上諭事據湖北巡撫鄭大進奏本年正月初一日欽奉恩詔軍民年至百歲者題名旌表兹查有襄陽縣民趙元寅現年一百十一歲有子四人長子趙成秀年八十一歲餘皆年六十五十以上孫五人曽孫四人元孫一人五世同堂臣查趙元寅身際淳熙業安稼穡傳瓞則五華遞演方續慶夫雲仍紀籌則百度增長將兩周夫甲子惟重熙際盛躋仁夀于寰區斯聚順呈祥萃庥和于一室允苻旌典宜籲優恩奉上諭據鄭大進奏襄陽縣民趙元寅年一百十一歲曽元五世實屬升平人瑞照例請旌等語趙元寅著照所請準其旌表並于例賞外著加恩多賞一倍冉行加賞御筆匾額用昭嘉奬欽此應行令該撫轉飭地方官給銀六十兩聽本家自行建坊並行文內務府支取上用緞二匹銀二十兩并御筆匾額一併封固交該撫轉給祇領可也奉旨依議御書匾額又題為題請旌表事據調任江蘇巡撫楊魁疏稱億萬增年純嘏備膺于扆寧垓埏溥澤引恬下逮夫閭閻兹有上元縣夀婦胡朱氏現年一百二歲膝繞曽元齒逾耄耋闓澤沐三朝之久萱樹恆春含飴欣五世之同筠貞貫歲洵昌時之上瑞宜渥典之榮邀臣等查與定例相符應準其旌表官給建坊銀三十兩並貞夀之門字樣可也奉旨依議朱氏著加恩賞給上用縀一匹銀十兩乾隆四十九年旌表五世同堂夀民劉棨及其妻王氏禮部謹題為懇恩特賜雙旌事據山西巡撫農起奏爽惟民迪吉雍熙均保艾之仁久于化道成溥率著咸恆之慶期頥聚順允協嘉祥夫婦偕臧尤稱盛事兹有靈邱縣民劉棨之妻王氏年一百二歲安貞協吉和順迎祥越花甲于百齡效倡隨于一室允合引年之典宜隆表瑞之文至伊夫劉棨年九十六歲翠楔雙旌雖未符于令甲玉鳩並倚乃幸際夫昌辰膝繞曽元慶貽數世眉齊耄耋躬享長年希格外之恩榮寵錫特加曠典庶方來之歲月延長並荷鴻慈奉上諭據農起奏靈邱縣民劉棨妻王氏現年一百二歲劉棨年亦九十六歲夫婦齊眉曽元繞膝可否懇恩雙旌等語劉棨夫婦年臻大耋唱隨協慶五世一堂實為吉祥盛事著加恩準其特豫雙旌用彰恩錫以副朕加惠耆齡至意該部知道欽此應照例各給建坊銀三十兩並建一方給與期頥偕老字樣可也奉旨依議乾隆五十年旌賞直省五世同堂百歲以上及未屆百齡張文聚等民一百九十五人禮部謹題為題請旌表事據署四川總督保寧奏奉上諭朕仰承天眷喜得五世元孫實為從古罕有盛事因思各省紳士庶民或亦有身及五世同堂者著傳諭各督撫遍行曉諭令其自行呈報朕當加恩賚以昭盛典經督臣李世傑刋發謄黃遍行曉諭令其自行呈報兹據各屬先後具報五世同堂之士民黃于京等二十二人除將原册呈送軍機處彚辦外惟查二十二家內有逹州民張子翼一人現年一百歲又係五世同堂尤為升平人瑞欽惟我皇上景運重熙昌期篤慶祝萬年之聖夀仰古希而進頌無疆垂五世之孫謀推餘慶而廣敷下土兹以邉隅耆庶亦呈衍瓞之祥而且上瑞期頥兼得靈椿之歲遍德受皇家之福代啓雲礽太和徵盛世之庥人登仁夀允符旌典宜荷褒榮奉上諭保寧奏四川逹州民張子翼現年百歲五世同堂一摺張子翼夀享期頥曽元繞膝洵為升平人瑞宜加恩賚以示寵榮兹親製詩章御書匾額以賜其應賞銀兩縀匹及建坊之處著該部照例具題欽此應行令該督轉飭地方官給銀三十兩聽本家自行建坊並給與升平人瑞字樣具恩賞縀匹銀兩由內務府支取轉給祇領可也奉旨依議御製四川逹州百歲夀民張子翼五世同堂詩以賜之四川特地報嘉祥衍慶頥齡人姓張署四川總督保寧奏報逹州民張子翼現年百歲有子三人孫八人曽孫六人元孫三人百歲夀民五世同堂尤為升平瑞應因御書頥齡衍慶扁額並成此什以賜一老百年登夀帙元孫五代喜同堂太和元氣天庥沐寰宇熙春祖德昌際此繁滋仁夀世益厪懷保念無遑御書匾額頥齡衍慶又題為題請旌表事據護理江西巡撫李承鄴奏龍泉縣民古朝爵上夀百齡同堂五代頌南山而錫祉室家溱溱依左蠡以㴠恩子孫蟄蟄童顔台背不須鳩杖之扶繞膝含飴更備蘭陔之飬洵稱嘉瑞宜沐殊榮奉上諭據李承鄴奏江西龍泉縣民古朝爵現年百歲五世同堂一摺古朝爵夀享期頥曽元繞膝洵為升平人瑞宜加恩賚以示寵榮兹親製詩章御書匾額以賜其應賞給銀兩縀匹及建坊旌表著該部照例具題欽此應行令該撫轉飭地方官給銀三十兩聽本家自行建坊並給與升平人瑞字樣其恩賞縀匹銀兩由內務府支取轉給祇領可也奉旨依議御製江西龍泉縣百歲夀民古朝爵五世同堂用賜四川夀民張子翼詩韻賜之作善應知降百祥江西古並四川張己看躋夀百年帙復喜歡同五代堂食德飲和三世永龍泉夀民古朝爵生于康熙二十四年屆今年一百歲子孫曽元並萃一堂兹據該護撫奏報請旌因御書匾額並用昨賜四川夀民張子翼百歲五世同堂詩韻以賜新春集慶頻詠繁禧實為升年盛事夫耕婦織一家昌新春頻詠繁禧句祇益持盈敬或遑御書匾額繁頥餘慶軍機處謹奏恭查四十九年欽奉諭旨令各省督撫查明所屬州縣紳士庶民中有身及五代同堂者詳悉造册咨送軍機處彚奏加恩賞賚嗣經臣等擬入恩昭條欵內於本年元旦頒發通行現據各督撫將所屬紳紳士庶民五代同堂者一百九十四人咨送所有四川民張子翼江西民古朝爵二人俱年躋百齡曽元繞膝該督撫等專摺具奏仰蒙恩賜御製詩章匾額並照例給豫旌表暨縀匹銀兩外謹將各省咨送五代一堂之紳士庶民等分别年歲開具清單恭呈御覽五世同堂一百歲以上四人直𨽻順義縣民郭有英年一百三歲山東聊城縣民張羽年一百二歲厯城縣民劉湘年一百歲廣西桂平縣生員鍾君寵年一百歲五世同堂九十歲以上六十二人盛京復州民張文聚年九十一歲直𨽻霸州生員王士新年九十六河間縣民朱來升年九十三兾州民康希尹年九十四張璧年九十四張法重年九十一江西盧陵縣鄉飲羅世法年九十四瑞金縣民劉元香年九十六浙江嘉善縣監生姚廷訓年九十義烏縣民朱燏年九十福建閩縣民林上忍年九十四南安縣民黃景福年九十三許伯瑶年九十三謝世量年九十七惠安縣民陳升年九十同安縣武生顔敏求年九十三龍溪縣民鄭應南年九十二上杭縣監生鍾世弼年九十二永定縣監生胡京春年九十一大田縣民林孔諧年九十龍巖州武生吳奮揚年九十四湖北蒲圻縣民李進也年九十三興國州民石廷彥年九十七孝感縣民熊榮九年九十蘄水縣軍籍民華廷訓年九十三安陸縣民古茂黃年九十六應城縣民王言倫年九十德安守禦所軍籍民董億任年九十二湖南慈利縣民蕭登賜年九十安鄉縣民樊實維年九十六桃源縣民唐之玫年九十三衡陽縣民黃俊生年九十六衡山縣民汪克俊年九十七陳康岐年九十五生員陳魁年九十酃縣民殷段仁年九十五郴州民曺德緯年九十八桂陽縣民朱俊庭年九十三長沙縣民羅國服年九十三湘陰縣民周騰蛟年九十五湘鄉縣民周久有年九十五曺令聞年九十一巴陵縣民何建逺年九十三龔良玉年九十三河南商水縣民谷飬民年九十六太康縣民薑文舉年九十五山東濰縣民丁績年九十九山西靈邱縣民劉棨年九十六崞縣民常選士年九十七侯傑年九十一陜西朝邑縣民王景合年九十七咸寧縣民齊瑜年九十五大荔縣民扈士均年九十四川達州民龎汝濤年九十九仁夀縣民周肇昌年九十四華陽縣民楊教文年九十漢州生員黃于京年九十一金堂縣民李崇文年九十一珙縣原任灌縣訓導袁士鈞年九十樂山縣生員劉騰飛年九十貴州遵義縣民孫月英年九十八五世同堂八十歲以上九十九人直𨽻順義縣生員髙志年八十大城縣民張明逺年八十五博野縣民周興福年八十六彭元德年八十五周思聰年八十六肅寧縣吏員李濟民年八十五藁城縣民孟孝德年八十四巨鹿縣民李智年八十九武璋年八十王之學年八十七磁州民張明龍年八十一威縣民范之美年八十七大名縣民李蘭年八十二李沖年八十七長垣縣民郭榮貴年八十三劉普年八十五兾州民王曰俞年八十三劉琳年八十三饒陽縣民張士英年八十一江南績溪縣民曺國澧年八十九懷逺縣民陳維賓年八十八江陰縣民王日新年八十八上元縣候選州同談淳年八十四江西分宜縣鄉飲李元斌年八十八上髙縣民李時彥年八十一黃粵常年八十七奉新縣監生王煥年八十四貴溪縣民何子章年八十二樂平縣監生王世爵年八十二新昌縣民鍾寧興年八十八長寧縣民廖永榮年八十五寧都州民溫揆侣年八十三石城縣監生賴其輕年八十八民羅正瑶年八十一安樂縣民董永文年八十三浙江仁和縣民趙道生年八十六福建龍巖州監生貤封宣武大夫邱中瑞年八十九武平縣貢生鍾鏊年八十一上杭縣監生郭嵩年八十七建寧縣原任貴州永定州知州陳衍年八十光澤縣民鄧貞元年八十六詔安縣貢生沈彥鳯年八十三漳浦縣民潘文泰年八十二仙逰縣監生余攀龍年八十五湖北京山縣原任貴州按察使降二等職銜熊繹祖年八十十九州民蕭秩緒年八十六湖南安鄉縣生員裴晫年八十八龍陽縣監生髙志清年八十六桃源縣民張善誘年八十八髙殿一年八十九零陵縣監生趙宗舜年八十六耒陽縣民樊玊美年八十五衡山縣民丁添佑年八十八徐宗漢年八十生員歐陽謨年八十二酃縣民劉炳興年八十八臨武縣民盧舜良年八十七桂陽縣生員黃湘年八十三長沙縣民孫上哲年八十五羅忠誨年八十八生員周質年八十四湘鄉縣監生葛鈺年八十一河南虞城縣民張宏恩年八十四山西文水縣民趙大儒年八十六大同縣民王世璽年八十三盂縣生員髙振業年八十一河津縣民柴可宗年八十崞縣民劉益年八十六鳯臺監生生孫晉年八十沁水縣生員王淑德年八十二欣州生員郭金錫年八十六民漫灝年八十一河曲縣民李如竹年八十陜西咸陽縣民民蘇士倫年八十一劉天秀年八十大荔縣民王維先年八十六潼關廳民吳文學年八十八朝邑縣民程錫年八十四薛耀年八十一翟長仁年八十六武功縣民何敬年八十九甘肅狄道州貢生袁璽年八十六四州蒲江縣民曺瓊年八十九杜開榜年八十五石砫廳生員馬萬振年八十八樂山縣民雷正乾年八十五雲陽縣民咼同志年八十三洪雅縣民劉金廣年八十二梁山縣民田子溥年八十八新寧縣民李尚忠年八十六酆都縣民員許文修年八十一大竹縣民王忠謨年八十一瀘州民徐子清年八十墊江縣捐納正七品知縣職銜盧天柱年八十廣東長樂縣貢生封昭武大夫李世馨年八十雲南祿豐縣民張世賢年八十羅平州民