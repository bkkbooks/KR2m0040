水縣民李淵本秉資醇厚植行敦龎已介景于百齡復綿熙於五代志不諼於樂樂利利升平躬際三朝引無極於子子孫孫忠信行聞十室惟蕃禧之懋輯延洪統萬億千載而遙斯嘉應之疊彰紀盛在百九四家而外宜膺茂渥以示寵榮奉上諭秦承恩奏白水縣夀民李淵本現年百歲精神之鑠五世同堂請旨旌表等語李淵本年臻耄耋慶洽孫曽洵屬升平人瑞所有應行建坊旌表加恩賞賚之處著該部照例具題欽此應照古朝爵之例由內務府支領縀一匹銀十兩仍令該撫轉飭地方官給銀三十兩聽本家自行建坊並給與升平人瑞字樣可也奉旨依議乾隆五十三年旌表五世同堂百歲夀民寥啓家百歲以上夀婦汪氏等三人禮部謹題為請旌人瑞事據湖南巡撫浦霖奏稱欽我惟皇上福備箕疇慶逾華祝太和翔洽萃百順以凝禔元氣彌綸統羣生而錫福四海登於仁夀百齡應其禎祥兹有善化縣夀民廖啓家現年一百歲質本敦寵家傳清白趨庭長幼皆逾杖鄉杖國之年繞膝曽元分承力學力田之訓允符上瑞宜荷榮褒奉上諭據浦霖奏善化縣民寥啓家現年百歲曽元繞膝請旨旌表等語寥啓家夀屆期頥慶延五世洵屬升平人瑞特賜御書匾額並親製詩章以示寵榮所有應行加恩賞賚及建坊旌表之處仍著該部察例辦理欽此應請照李淵本之例由內務府支取縀一匹銀十兩轉給祇領仍行令該撫轉飭地方官給銀三十兩聽本家自行建坊並給與升平人瑞字樣可也奉旨依議御製湖南善化縣百歲夀民廖啓家五世同堂詩以賜之冉疊前韻纍洽民間多衍祥早聞兩報古和張乾隆五十年四川有逹州百歲夀民張子翼江西有龍泉縣百歲夀民古朝爵俱五世同堂允稱人瑞各書匾額並製詩章以賜兹據湖南撫臣奏善化縣夀民廖啓家現年百歲曽元繞膝時際升平嘉祥屢見殊堪慶幸亦即書額並冉疊賜張子翼詩韻賜之逮兹廖氏朋三夀同彼元孫盍一堂民慶允為國之慶世昌敢曰化斯昌危明憂盛有成語保泰惟深惕不遑御書匾額期頥衍慶又題為題請旌表事據四川總督保寧奏運際重熙天保叶九如之祝祥徴庶錫時雍彰百福之同兹有成都縣民劉萬迎年一百一歲有子四人孫九人曽孫十人元孫三人躋歲月之期頥椿枝長茂喜曽元之繞膝椒實斯繁式符仁夀之期用表升平之瑞奉上諭據保寧奏成都縣民劉萬迎現年一百一歲五世同堂曽元繞膝請旨旌表等語劉萬迎夀逾期頥慶延五世洵屬升平人瑞特賜御書匾額並製詩章以示寵榮所有應行加恩及建坊旌表之處著該部察例具題欽此應由內務府支取縀一匹銀十兩轉給祇領仍令該撫轉飭地方官給銀三十兩聽本家自行建坊並給與升平人瑞字樣可也奉旨依議御製四川成都縣百歲夀民劉萬迎五世同堂因三疊賜逹州夀民張子翼詩韻賜之由來素性不言祥人瑞難教祕弗張謂張大其事也却是今春閲兩奏幸他西蜀冉同堂新年湖南巡撫奏善化縣百歲夀民廖啓家五世同堂以冉疊乙巳賜四川逹州百歲夀民張子翼五世同堂詩韻賜之兹又據四川總督奏成都縣夀民劉萬迎現年一百一歲有子四人孫九人曽孫十人元孫三人一省之中期頥再見繞膝曽元洵為升平人瑞因依例御書匾額並三疊前韻以賜邇值瀛壖報捷生擒逆首慶集春韶頻詠嘉祥益深寅敬深惟兹殖萬民樂虔兾綏豐百物昌更值俘凶靖海嶠曰欣曰敬並無遑御書匾額期頥衍慶又題為題請旌表事據河南巡撫畢沅奏獲嘉縣夀婦徐汪氏現年一百八歲五世一堂貞順含章康強逢吉桑榆駐景百齡猶未艾之年蘭桂咸芳五世卜其昌之兆際楓宸之輯祉福溢綿區肆蔀屋之蒙庥慶承多祜允符褒典榮俟恩綸奉上諭據畢沅奏獲嘉縣民婦徐汪氏現年一百八歲曽元繞膝五世一堂請旨旌表等語徐汪氏夀逾百齡慶延五世洵屬升平人瑞所有應行加恩賞賚及建坊旌表之處著該部照例具題欽此應由內務府支取縀一匹銀十兩轉給祇領仍令該撫轉飭地方官給銀三十兩聽本家自行建坊並給與貞夀之門字樣可也奉旨依議乾隆五十四年恩賞五世同堂喬文源等二人奉上諭前據綿恩奏直𨽻永年縣生員喬庚辛呈明五世同堂伊父監生喬文源現年八十五歲等語喬文源身列成均年登耄耋其子孫五世同堂洵屬升平盛事喬文源著交直𨽻總督查明咨部照例旌賞以示朕錫福敷恩至意又奉上諭何裕城奏寧都州生員曽鏡現年八十歲五世同居可否給豫匾額銀縀等語曽鏡年臻八帙五世同堂實為升平人瑞應著該撫給豫匾額並賞給縀匹銀兩以昭錫福推恩至意八旬萬夀盛典卷二十七
